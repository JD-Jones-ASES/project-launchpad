<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 8, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Decolonization", "back": "The process by which European colonial empires dismantled and transferred sovereignty to new independent states. Between 1945 and 1980, more than eighty new nations emerged across Asia, Africa, the Middle East, and the Caribbean — arguably the most consequential political transformation of the twentieth century. Ranged from negotiated transfers to bloody wars of national liberation.", "id": "fc01"}, {"front": "Satyagraha", "back": "Gandhi's philosophy of nonviolent resistance: combining Sanskrit words for 'truth' (satya) and 'force' (graha). Holds that injustice is overcome not through violence but through the moral force of those who willingly accept suffering rather than comply with unjust laws. The practitioner seeks to convert the opponent, not destroy them. Distinguished from passive resistance — requires active, organized, disciplined action.", "id": "fc02"}, {"front": "Mohandas Gandhi (1869–1948)", "back": "Central figure of Indian independence; developed satyagraha while fighting racial discrimination in South Africa (1893–1914). Transformed Indian nationalism into a mass movement mobilizing the rural poor. Key campaigns: Non-Cooperation Movement (1920–22), Salt March (1930), Quit India Movement (1942). Insisted means and ends are inseparable. Assassinated January 1948 by a Hindu nationalist who blamed his accommodation of Muslims.", "id": "fc03"}, {"front": "Salt March (1930)", "back": "Gandhi's 240-mile walk to the sea to illegally harvest salt, defying the British salt monopoly. Strategic genius: salt was universal (every Indian used it), British-monopolized, and producible by anyone. Made civil disobedience accessible to the poorest Indian. Attracted international press and demonstrated colonial enforcement brutality. Permanently delegitimized British rule in Indian and British public opinion.", "id": "fc04"}, {"front": "Non-Cooperation Movement (1920–22)", "back": "Gandhi's mass campaign in which millions boycotted British goods, schools, and institutions. Demonstrated that mass nonviolent resistance could mobilize ordinary Indians, not just the English-educated elite — transforming the independence movement into a genuine mass movement.", "id": "fc05"}, {"front": "Quit India Movement (1942)", "back": "Gandhi's 1942 campaign demanding immediate Indian independence during World War II, when Britain was dependent on Indian support. Reflected Gandhi's conviction that the moment of British vulnerability should be used to press for independence — the means (British wartime vulnerability) serving the end (independence) through nonviolent pressure.", "id": "fc06"}, {"front": "Partition of India (1947)", "back": "The division of the Indian subcontinent into two independent states — predominantly Hindu India and predominantly Muslim Pakistan — at independence in August 1947. Triggered one of the largest mass migrations in history (~14 million people crossing new borders) and communal violence killing an estimated 200,000 to 2 million people. Gandhi was devastated by the violence and was assassinated weeks later.", "id": "fc07"}, {"front": "Pieds-noirs", "back": "The approximately one million European settlers in Algeria who had established themselves as permanently resident and legally dominant over the indigenous Muslim population of nine million. Their political and economic stakes in continued colonial rule made Algerian independence structurally much more difficult than Indian independence — they were the key variable explaining why Algeria required armed struggle.", "id": "fc08"}, {"front": "Front de Libération Nationale (FLN)", "back": "The Algerian independence organization that launched an armed revolt on November 1, 1954 — less than six months after France's defeat at Dien Bien Phu in Vietnam. Led the eight-year Algerian War of Independence (1954–62) through sustained guerrilla warfare. The FLN's struggle exposed France's human rights contradiction and ultimately led to Algerian independence through the Evian Accords (1962).", "id": "fc09"}, {"front": "Algerian War of Independence (1954–62)", "back": "Eight-year armed conflict between the FLN and France, characterized by guerrilla warfare, terrorism targeting civilian populations on both sides, and the French military's systematic use of torture. Cost an estimated 300,000–1.5 million Algerian lives. Destabilized the French Fourth Republic, brought de Gaulle to power, and ended with the Evian Accords (1962) and 91% Algerian vote for independence.", "id": "fc10"}, {"front": "Evian Accords (1962)", "back": "Agreement ending the Algerian War of Independence in March 1962, followed by a referendum in which 91% of Algerians voted for independence. Ended 130 years of French colonization and approximately one million pieds-noirs fled to France within weeks — one of the largest refugee migrations in European history.", "id": "fc11"}, {"front": "Mau Mau Uprising (Kenya, 1952–60)", "back": "Guerrilla revolt primarily among the Kikuyu people dispossessed by British settler farming in Kenya. Britain responded with mass detention camps, systematic torture, and collective punishment. Atrocities documented by British historians only in the 2000s. Kenya gained independence in 1963. Illustrates that British colonialism, like French, used extreme violence to suppress independence movements.", "id": "fc12"}, {"front": "Kwame Nkrumah", "back": "Leader of Ghana's independence movement and Ghana's first prime minister (independence 1957) — the first sub-Saharan African nation to gain independence. Nkrumah was a leading pan-Africanist who argued for African unity as well as independence, and was a founder of the Organization of African Unity (1963).", "id": "fc13"}, {"front": "Year of Africa (1960)", "back": "The year in which seventeen African nations became independent — the largest single-year wave of decolonization in history. Most transitions were negotiated rather than armed, reflecting European colonial powers' calculation that the cost of holding colonies by force exceeded the economic benefit, a calculation accelerated by the damage of the Algerian War to France.", "id": "fc14"}, {"front": "Frantz Fanon", "back": "Martinican psychiatrist who joined the Algerian FLN and wrote The Wretched of the Earth (1961). Argued that colonial violence had internalized self-hatred in colonized peoples, and that anti-colonial violence was necessary to 'cleanse' this psychological damage. Contested by Gandhi's nonviolent model. Fanon's insistence that decolonization required cultural as well as political transformation influenced independence movements across Africa, the Caribbean, and Latin America.", "id": "fc15"}, {"front": "The Wretched of the Earth (1961)", "back": "Frantz Fanon's influential anti-colonial work arguing that colonial violence had psychologically damaged colonized peoples and that revolutionary violence was necessary for their liberation. Presented decolonization as requiring cultural and psychological transformation, not just political transfer of power. Became a foundational text for liberation movements across the Global South.", "id": "fc16"}, {"front": "Five variables shaping negotiation vs. armed struggle (source framework)", "back": "The source identifies five variables: (1) presence/absence of a large settler population; (2) economic value of the colony to the metropolitan power; (3) military and organizational strength of the independence movement; (4) political situation in the colonial metropole (democratic pressure against colonial war?); (5) Cold War pressures (superpower support for independence?). India had all five favoring compromise; Algeria had them favoring resistance.", "id": "fc17"}, {"front": "Why was India's independence negotiated rather than violent? (causation)", "back": "No large settler population with economic/political stakes in continued rule; Britain faced democratic pressure against colonial war; Indian independence movement had mass organizational strength under Gandhi; Cold War context made continued colonialism increasingly costly diplomatically. All five structural variables favored compromise, making negotiated transfer the rational outcome for both sides.", "id": "fc18"}, {"front": "Why did Algeria require armed struggle? (causation)", "back": "France treated Algeria as an integral part of metropolitan France (three departments with National Assembly representation). One million pieds-noirs had legal dominance over nine million Algerians and strong economic/political stakes in continued colonial rule. This settler-colony structure gave France strong internal incentives to resist independence that did not exist in India. The structural variables made compromise very difficult.", "id": "fc19"}, {"front": "SPICE-T: Cultural theme in decolonization", "back": "Decolonization was not only a political transfer but a cultural and psychological process. Gandhi insisted new Indian identity could not be built through colonial-replicating violence. Fanon argued colonial violence had damaged colonized peoples' psychology, requiring cultural as well as political liberation. Both reflect the recognition that colonialism operated at the cultural level — shaping how colonized peoples understood themselves — and that independence required cultural transformation.", "id": "fc20"}, {"front": "SPICE-T: Political theme — colonial borders at independence", "back": "European colonial borders drawn for administrative convenience rather than cultural or ecological logic became the borders of new independent states. The OAU endorsed uti possidetis (1964) — accepting colonial borders as permanent. This political decision had profound Social and Political consequences: it created multi-ethnic states without historical unity, split ethnic groups across borders, and laid foundations for post-colonial conflict.", "id": "fc21"}, {"front": "Compare Gandhi's satyagraha with Fanon's theory of anti-colonial violence (comparison)", "back": "Both recognized decolonization required cultural/psychological as well as political transformation. Gandhi: violence replicates colonial coercion and corrupts the independent state; nonviolent suffering exposes colonial brutality and achieves moral conversion. Fanon: colonial violence has psychologically damaged colonized peoples; only the experience of fighting back can restore their dignity and agency. Same diagnosis (colonialism is psychologically as well as politically damaging); opposite prescriptions for cure.", "id": "fc22"}, {"front": "How did colonialism shape post-independence nation-building challenges? (causation + continuity)", "back": "Colonial inheritances included: borders drawn for European administrative purposes rather than indigenous political logic; economies structured to export raw materials rather than serve domestic development; civil services and legal systems designed for colonial control; populations whose loyalties to ethnic/religious/regional groups had been deliberately antagonized by colonial divide-and-rule policies. Independence transferred power but not a clean slate.", "id": "fc23"}, {"front": "What made the Algerian War significant beyond Algeria's independence? (significance)", "back": "The Algerian War: (1) exposed France's human rights contradiction — a republic claiming universal values fighting with torture; (2) destabilized the French Fourth Republic and brought de Gaulle to power; (3) accelerated European calculations that holding colonies by force cost more than it was worth; (4) sent approximately one million pieds-noirs as refugees to France; (5) provided Fanon with his primary experience for The Wretched of the Earth.", "id": "fc24"}, {"front": "What was the global legacy of Gandhi's methods? (significance)", "back": "Gandhi's influence extended far beyond India: his satyagraha philosophy directly inspired the American Civil Rights Movement under Martin Luther King Jr., South Africa's anti-apartheid campaigns, and nonviolent resistance movements on every continent. He remains the defining global symbol of nonviolent political resistance, demonstrating that mass civil disobedience could be a powerful tool against entrenched power structures.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
