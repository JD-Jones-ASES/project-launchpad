<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Meritocracy", "back": "A system in which individuals are selected for positions based on demonstrated ability and knowledge rather than birth or hereditary status. The Song civil service exam embodied a meritocratic ideal, though in practice the cost of education limited access to wealthy families.", "id": "fc01"}, {"front": "Jinshi degree", "back": "The most prestigious credential in the Song Empire, awarded at the palace examination in the capital Kaifeng. It opened the door to high official appointment and was the pinnacle of the civil service examination system.", "id": "fc02"}, {"front": "Scholar-gentry class", "back": "The educated elite class in Song China whose status derived from learning and imperial appointment rather than land or noble lineage. They staffed the prefectures and ministries administering taxation, waterworks, granaries, and local justice.", "id": "fc03"}, {"front": "Neo-Confucianism", "back": "A Song-era philosophical synthesis associated with Zhu Xi (1130–1200) that fused Confucian ethics with Buddhist metaphysics and Daoist cosmology. It emphasized self-cultivation, hierarchical social relationships, and became the official state ideology of later Chinese dynasties and spread to Korea, Japan, and Vietnam.", "id": "fc04"}, {"front": "Zhu Xi (1130–1200)", "back": "The Song philosopher most closely associated with Neo-Confucianism. His synthesis of Confucian ethics with Buddhist and Daoist ideas became the basis of the civil service examination curriculum and shaped East Asian intellectual life for centuries.", "id": "fc05"}, {"front": "Five Relationships (Neo-Confucian)", "back": "The social hierarchy prescribed by Neo-Confucianism: ruler–subject, father–son, husband–wife, elder sibling–younger sibling, and friend–friend. Each relationship assigned duties and deference, placing every person within a web of hierarchical obligations.", "id": "fc06"}, {"front": "Foot binding", "back": "The practice of tightly wrapping young girls' feet to prevent normal growth, which spread from elite classes during the Song period. It was simultaneously a mark of elite femininity, a constraint on mobility, and a signal of family wealth — only households with servants could afford non-working daughters.", "id": "fc07"}, {"front": "Tang–Song Transition", "back": "The period of economic and technological transformation that historians identify as bringing China closer to self-sustaining economic growth than any premodern society before the Industrial Revolution. It featured surpluses in iron, paper money, the compass, and gunpowder weaponry.", "id": "fc08"}, {"front": "Gunpowder (Song applications)", "back": "Known since the Tang dynasty, gunpowder's military applications were systematized during the Song: fire bombs, rocket arrows, and fire-lance weapons (a precursor to the gun). The technology eventually diffused westward to transform warfare globally.", "id": "fc09"}, {"front": "Magnetic compass (maritime use)", "back": "Chinese sailors had used magnetized needles to find south since at least the ninth century. During the Song period, maritime compasses became standard navigation tools enabling year-round sailing. The technology reached Islamic and eventually European navigators, underpinning fifteenth-century transoceanic voyages.", "id": "fc10"}, {"front": "Paper money (jiaozi / guanzi)", "back": "State-backed paper currency invented during the Song dynasty. Earlier private 'flying money' certificates evolved into standardized state notes backed by copper reserves. Paper money made large commercial transactions practical and stimulated Song China's vibrant internal trade networks.", "id": "fc11"}, {"front": "Tribute system (Song external relations)", "back": "The diplomatic-commercial framework governing Song China's relations with neighboring states. Foreign states sent periodic embassies with 'tribute' gifts; the emperor returned lavish gifts and permitted trade. It created a Sinocentric order in which neighbors traded while maintaining political independence.", "id": "fc12"}, {"front": "Kaifeng", "back": "The Song dynasty capital where the palace examination (awarding the jinshi degree) took place. A major commercial metropolis and administrative center, its vitality is depicted in Zhang Zeduan's famous scroll Along the River During the Qingming Festival.", "id": "fc13"}, {"front": "Movable type printing (Song invention)", "back": "A Song innovation that made texts more affordable and widened the circle of literate men who could aspire to official careers. By making the Confucian classics accessible, it expanded (though did not fully democratize) preparation for the civil service examinations.", "id": "fc14"}, {"front": "Song iron production", "back": "Song China's estimated iron output of 125,000 tons per year in the eleventh century was comparable to all of Europe's combined production seven centuries later. This surplus iron went into plowshares, weapons, tools, and military infrastructure.", "id": "fc15"}, {"front": "What political problem did the Song dynasty's examination system solve?", "back": "It reduced the power of hereditary aristocratic families who might rival imperial authority by staffing the bureaucracy with men loyal to the throne through demonstrated ability — replacing lineage with learning as the basis for elite status.", "id": "fc16"}, {"front": "Why did the Song state field an army of over one million soldiers?", "back": "Song military capacity was sustained not by conquest but by administrative extraction from a commercialized, productive agrarian economy. The efficiency of the scholar-gentry bureaucracy enabled revenue mobilization at a scale contemporaries elsewhere could not match.", "id": "fc17"}, {"front": "SPICE-T: What Economic theme does Song paper money illustrate?", "back": "Song paper money illustrates the Economic theme — it stimulated internal trade by enabling large transactions without heavy coinage, connecting Song China's specialized regional economies and fueling the Tang–Song commercial revolution.", "id": "fc18"}, {"front": "SPICE-T: What Social theme does foot binding illustrate?", "back": "Foot binding illustrates the Social theme — it enforced gender hierarchy and female subordination as an expression of Neo-Confucian values, while simultaneously signaling class status, demonstrating how social norms can simultaneously oppress and mark prestige.", "id": "fc19"}, {"front": "SPICE-T: What Political theme does the civil service examination illustrate?", "back": "The civil service examination illustrates the Political theme — it was a tool of state-building that reduced aristocratic power, created a meritocratic bureaucracy loyal to the throne, and sustained imperial governance across an empire of 60–100 million people.", "id": "fc20"}, {"front": "How did Neo-Confucianism spread beyond China?", "back": "Neo-Confucianism spread to Korea, Japan, and Vietnam. In Korea, the Joseon dynasty adopted it comprehensively, reorganizing society around Confucian hierarchical principles. In Japan, it became increasingly influential in the Edo period.", "id": "fc21"}, {"front": "Continuity/Change: How did the Song transform the earlier civil service examination?", "back": "The Song transformed the examination — inherited from the Han and Tang — into the PRIMARY mechanism of elite recruitment, expanding it dramatically so that tens of thousands sat each cycle, compared to earlier more limited use, making it the defining institution of Song governance.", "id": "fc22"}, {"front": "What is the significance of the 'frustrated educated class' produced by the Song exam system?", "back": "Because the state could not employ all successful scholars, a surplus of educated men — ambitious but without official posts — arose. Their social anxieties shaped Song culture and politics, illustrating how meritocratic systems can generate as many tensions as they resolve.", "id": "fc23"}, {"front": "Comparison: How did Song meritocracy differ from European feudal aristocracy?", "back": "Song elites owed their status to learning and imperial appointment; European feudal elites owed their status to hereditary land tenure and military service. The Song scholar-gentry class was created by the state through examination; European nobles were largely independent of central appointment.", "id": "fc24"}, {"front": "Why is the Song dynasty described as the 'densest and most productive thread' of the Global Tapestry?", "back": "Song China combined the world's most sophisticated bureaucratic state, exceptional agricultural and iron-production surpluses, a commercial revolution driven by paper money, and transformative technologies (compass, gunpowder) that diffused across Afro-Eurasia — making it central to understanding the period 1200–1450.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
