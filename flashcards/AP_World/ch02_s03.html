<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Trans-Saharan trade", "back": "A network of overland caravan routes crossing the Sahara Desert, linking the gold- and salt-producing regions of West Africa to North Africa and the Mediterranean. Operating from at least the 3rd century CE, these routes transmitted gold, salt, enslaved people, kola nuts, ivory, and cloth, and were the primary conduit through which Islam spread into sub-Saharan Africa.", "id": "fc01"}, {"front": "Gold–salt trade", "back": "The foundational economic exchange of the trans-Saharan system: gold mined in West African fields (Bambuk, Bure, and later Akan) moved northward to North African markets; rock salt quarried at Saharan deposits (especially Taghaza) moved southward. Arab geographers reported that the two commodities were sometimes traded pound for pound.", "id": "fc02"}, {"front": "Why was the camel essential to trans-Saharan commerce?", "back": "The dromedary camel could travel 160 kilometers between water sources, carry 270 kg of cargo, and withstand extreme temperature variation—the only pack animal capable of crossing the Sahara reliably. The North African camel saddle (c. 3rd century CE) further increased cargo capacity, scaling up the commercial system.", "id": "fc03"}, {"front": "Mali Empire (c. 1235–1400)", "back": "A West African empire under the Keita dynasty that controlled both the goldfields and the major trans-Saharan trade routes, extracting taxes from caravans and accumulating extraordinary wealth. It adopted Islam while maintaining traditional religious ceremonies—a pragmatic syncretism—and made Timbuktu a center of Islamic scholarship.", "id": "fc04"}, {"front": "Mansa Musa", "back": "The most famous ruler of the Mali Empire, who undertook the hajj to Mecca in 1324. His pilgrimage, during which he distributed so much gold that it reportedly depressed gold prices across the Mediterranean, became the most famous demonstration of West African wealth in the medieval world. He is depicted in the Catalan Atlas (1375) holding a gold nugget.", "id": "fc05"}, {"front": "Timbuktu", "back": "A city on the Niger River bend that served as Mali's primary commercial and intellectual center. It hosted mosques, manuscript libraries, and madrasas (Islamic schools) that attracted students from across North and West Africa, demonstrating how trans-Saharan trade wealth funded Islamic scholarship.", "id": "fc06"}, {"front": "Taghaza", "back": "A Saharan salt mine in present-day Mali where rock salt was quarried by enslaved workers and loaded onto camels for transport southward. Salt from Taghaza was essential to the gold–salt exchange that powered the trans-Saharan economy.", "id": "fc07"}, {"front": "Why did West African rulers adopt Islam voluntarily?", "back": "Islam provided three pragmatic benefits: (1) a literate administrative class (Islamic clerics as judges, tax administrators, diplomats), (2) legitimacy for trade with the wider Muslim world, and (3) prestigious cultural connections. Critically, adoption did not require abandoning indigenous spiritual practices—rulers maintained traditional religious ceremonies alongside Islam.", "id": "fc08"}, {"front": "Syncretism", "back": "The blending of different religious or cultural traditions. In the trans-Saharan context, Malian syncretism combined Islamic practice with traditional African religious ceremonies—simultaneously Islamic and indigenous. Ibn Battuta admired Mali's governance but criticized this syncretic religious practice as insufficiently orthodox.", "id": "fc09"}, {"front": "Ibn Battuta in Mali (1352–1353)", "back": "The Moroccan Muslim scholar visited Mali and wrote a detailed account, simultaneously admiring the empire's prosperity, justice, and order while criticizing the mixing of Islamic and indigenous religious practices at court. His account is a primary source for 14th-century Malian life and reflects the complexity of Islamic encounter with sub-Saharan African culture.", "id": "fc10"}, {"front": "Bambuk and Bure goldfields", "back": "The primary gold-producing regions of West Africa, located along the upper Senegal and Niger rivers. These goldfields made the western Sudan the main source of monetary gold for the Islamic world and medieval Europe, fueling the wealth of the Ghana, Mali, and Songhai empires.", "id": "fc11"}, {"front": "Sijilmasa", "back": "A major staging city in Morocco at the northern terminus of trans-Saharan routes, where Saharan goods (especially gold) entered the Mediterranean commercial system. Its wealth was built on the gold trade flowing northward from West Africa.", "id": "fc12"}, {"front": "Kola nuts — significance in trans-Saharan trade", "back": "A stimulant grown in West African forest zones, valued in Islamic societies where alcohol was prohibited. Kola nuts moved northward through the trans-Saharan network as a significant trade commodity alongside gold and enslaved people—evidence that the trade carried diverse goods beyond monetary metals.", "id": "fc13"}, {"front": "How did Islam serve as a commercial technology in West Africa?", "back": "Shared Islamic legal structures (sharia) provided a common framework for commercial contracts, reducing transaction costs between Muslim merchants across North and West Africa. Arabic literacy enabled written correspondence across long distances. Conversion signaled trustworthiness to Muslim trading partners—faith functioned as a commercial credential.", "id": "fc14"}, {"front": "Tuareg guides", "back": "Professional desert guides who navigated trans-Saharan caravans across the Sahara, using accumulated knowledge of routes, oasis locations, and star navigation. Their expertise was essential infrastructure for the caravan system.", "id": "fc15"}, {"front": "Djenné and Gao", "back": "Niger River bend cities alongside Timbuktu that served as southern staging points where trans-Saharan caravans assembled, loaded with gold and other West African goods before departing northward. All three cities were key nodes in Mali's commercial and administrative network.", "id": "fc16"}, {"front": "Dromedary camel vs. Bactrian camel", "back": "The dromedary (one-humped) was used in trans-Saharan and Middle Eastern trade; the Bactrian (two-humped) was used on the Silk Roads in Central Asia. Both were crucial pack animals for overland trade across arid regions, illustrating how different regional environments selected for different camel varieties.", "id": "fc17"}, {"front": "Camel saddle innovation (c. 3rd century CE)", "back": "The North African camel saddle transferred the load from the camel's back to its sides, allowing heavier cargo and more comfortable riding—dramatically increasing the volume of goods caravans could move. This seemingly minor innovation had large-scale commercial consequences.", "id": "fc18"}, {"front": "SPICE-T: Economic theme in trans-Saharan trade", "back": "The gold–salt exchange was the structural engine of a commercial system that made West African empires among the wealthiest in the medieval world. Mali's control of both goldfields and caravan routes—and the taxes extracted from passing caravans—generated wealth that rivaled any contemporary European kingdom.", "id": "fc19"}, {"front": "SPICE-T: Cultural theme in trans-Saharan trade", "back": "The trans-Saharan routes were the primary conduit for Islam's spread into sub-Saharan Africa. Islam brought Arabic literacy, Islamic legal structures, and architectural styles (Sahelian mud-brick mosque tradition). Trade-driven cultural change was additive rather than replacing—West African rulers maintained indigenous ceremonies alongside Islamic practice.", "id": "fc20"}, {"front": "Madrasa", "back": "An Islamic school providing education in the Quran, Islamic law, and related subjects. The madrasas of Timbuktu attracted students from across North and West Africa, demonstrating that trans-Saharan trade wealth funded intellectual institutions that integrated West Africa into the wider Islamic scholarly world.", "id": "fc21"}, {"front": "Enslaved people in trans-Saharan trade", "back": "Historians estimate several thousand enslaved people crossed the Sahara annually by the 14th century, captured in warfare by Sahelian states and sold northward for domestic service and labor in North Africa and the Middle East. The trans-Saharan slave trade was a significant element of the network's commercial volume.", "id": "fc22"}, {"front": "Continuity and Change: West Africa 1200–1450", "back": "Continuity: the gold–salt exchange and caravan infrastructure persisted. Change: Islam spread more deeply into West African governance and scholarship; Timbuktu grew into a major intellectual center; the Mali Empire expanded and then declined; Songhai began its rise. The routes themselves remained constant; the political and religious landscape transformed.", "id": "fc23"}, {"front": "Compare: Trans-Saharan vs. Silk Road overland systems", "back": "Both used caravans, relay stops, and experienced guides. Both transmitted Islam and other goods. Key differences: Silk Roads crossed multiple political zones from China to the Mediterranean; trans-Saharan routes connected two geographically defined zones (sub-Saharan / North African). The camel was critical to both but in different varieties (dromedary vs. Bactrian).", "id": "fc24"}, {"front": "Catalan Atlas (1375)", "back": "A major medieval European world map that depicted Mansa Musa of Mali holding a gold nugget at the center of sub-Saharan Africa, demonstrating that European cartographers had real geographic knowledge of West Africa's wealth flowing through Mediterranean and North African commercial contacts.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
