<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Enlightenment?", "back": "An intellectual movement (roughly 1650–1800) that argued human reason — not religion or tradition — was the proper tool for understanding nature, organizing society, and evaluating government. It provided the vocabulary for Atlantic revolutions.", "id": "fc01"}, {"front": "natural rights", "back": "Rights belonging to all human beings by virtue of their humanity, not granted by rulers or laws. Locke identified them as life, liberty, and property — inalienable and pre-political, constraining what any government could legitimately do.", "id": "fc02"}, {"front": "social contract", "back": "The philosophical concept that legitimate government rests on an agreement among individuals to form a political community and submit to authority in exchange for protection of their rights. If government violates the contract, the people may alter or abolish it.", "id": "fc03"}, {"front": "John Locke (1632–1704)", "back": "English philosopher whose Two Treatises of Government argued that natural rights (life, liberty, property) preceded government, that authority derived from popular consent, and that people had a right to resist tyrannical government. Written in the aftermath of England's Glorious Revolution.", "id": "fc04"}, {"front": "Two Treatises of Government (1689)", "back": "Locke's foundational text arguing that government derives legitimacy from protecting natural rights and the consent of the governed. Became the intellectual backbone of American revolutionary arguments against British taxation.", "id": "fc05"}, {"front": "philosophes", "back": "French Enlightenment writers — including Voltaire, Diderot, d'Alembert, and Montesquieu — who carried Enlightenment ideas to a wider literate public through satire, encyclopedias, and comparative political analysis.", "id": "fc06"}, {"front": "Voltaire (1694–1778)", "back": "French philosophe who used satire, letters, and encyclopedic entries to attack religious superstition, judicial torture, and clerical privilege — making Enlightenment critique accessible and socially provocative.", "id": "fc07"}, {"front": "Encyclopédie (1751–1772)", "back": "A massive collaborative project compiled by Diderot and d'Alembert systematizing Enlightenment knowledge. Embodied the conviction that accurate information, freely shared, could improve human life; became a vehicle for spreading Enlightenment ideas.", "id": "fc08"}, {"front": "Montesquieu (1689–1755)", "back": "French philosophe who analyzed governments comparatively in The Spirit of the Laws (1748) and advocated separation of powers — dividing authority among legislative, executive, and judicial branches — to prevent tyrannical concentration.", "id": "fc09"}, {"front": "separation of powers", "back": "Montesquieu's principle that governmental authority should be divided among legislative, executive, and judicial branches so no single person or body could concentrate it. Directly adopted in the U.S. Constitution and other revolutionary-era governments.", "id": "fc10"}, {"front": "Jean-Jacques Rousseau (1712–1778)", "back": "The Enlightenment's most radical voice, arguing that private property was the root of inequality and that legitimate governance required the 'general will' — the collective interest of all citizens, not just powerful factions.", "id": "fc11"}, {"front": "general will", "back": "Rousseau's concept of the collective interest of all citizens as a community, which superseded individual or factional interests. Legitimate government should express and serve the general will rather than any private interest.", "id": "fc12"}, {"front": "Discourse on the Origin of Inequality (1755)", "back": "Rousseau's work arguing that human beings were corrupted by civilization and private property, losing a natural goodness they had in a pre-social state. Laid the groundwork for his more radical political theory.", "id": "fc13"}, {"front": "Mary Wollstonecraft (1759–1797)", "back": "British author of A Vindication of the Rights of Woman (1792), one of the founding texts of modern feminism. She used Enlightenment logic — reason as the basis of rights — to argue that women, being equally rational, must be equally entitled to rights.", "id": "fc14"}, {"front": "A Vindication of the Rights of Woman (1792)", "back": "Wollstonecraft's argument that if reason is the basis of rights, women must be equally entitled to them. Women's apparent inferiority was the product of education, not nature — demonstrating that Enlightenment logic could be turned against the gender hierarchies its male practitioners accepted.", "id": "fc15"}, {"front": "Adam Smith (1723–1790)", "back": "Scottish economist who applied Enlightenment reasoning to economic life in The Wealth of Nations (1776), arguing that free markets governed by the 'invisible hand' of competition would allocate resources more efficiently than mercantilist state direction.", "id": "fc16"}, {"front": "laissez-faire economics", "back": "Adam Smith's argument for free markets with minimal government interference, where competition and self-interest (the 'invisible hand') would allocate resources efficiently. Became the intellectual foundation for industrial capitalism.", "id": "fc17"}, {"front": "The Wealth of Nations (1776)", "back": "Adam Smith's critique of mercantilism arguing that free-market competition — not state direction — would produce the greatest economic efficiency. Published the same year as the Declaration of Independence.", "id": "fc18"}, {"front": "Scientific Revolution", "back": "The seventeenth-century intellectual movement demonstrating that observation and mathematical reasoning could uncover universal laws (e.g., Newton's laws of motion). Inspired Enlightenment thinkers to ask whether rational principles could similarly govern human society.", "id": "fc19"}, {"front": "Glorious Revolution (1688–1689)", "back": "The English revolution that removed James II and established parliamentary supremacy. Locke wrote his Two Treatises in its aftermath, giving the outcome a principled philosophical justification that reverberated across the Atlantic.", "id": "fc20"}, {"front": "What SPICE-T theme best captures the Enlightenment's challenge to absolute monarchy?", "back": "Political (P): The Enlightenment's social contract theory relocated sovereignty from hereditary rulers to the people, providing the theoretical basis for constitutional government, separation of powers, and the right of revolution — all of which shaped Atlantic revolutionary politics.", "id": "fc21"}, {"front": "How did the Scientific Revolution connect to Enlightenment political thought?", "back": "If Newton's laws could explain the motion of planets through reason and observation, Enlightenment thinkers argued that analogous rational principles could identify the proper organization of society — measuring existing institutions like monarchy against rational standards.", "id": "fc22"}, {"front": "What was the key tension in the Enlightenment's universalism?", "back": "The Enlightenment proclaimed universal natural rights for 'all men,' yet most male philosophes excluded women, enslaved people, and colonial subjects from those rights in practice. Wollstonecraft, Haitian rebels, and others exposed this contradiction by applying Enlightenment logic consistently.", "id": "fc23"}, {"front": "How did Rousseau's view of private property differ from Locke's?", "back": "Locke treated property as a fundamental natural right. Rousseau argued that private property was itself the root of social inequality, corrupting the natural goodness of human beings — a far more radical position that influenced later socialist critiques.", "id": "fc24"}, {"front": "How did the Encyclopédie embody Enlightenment ideals?", "back": "By systematizing knowledge across all fields and making it available to a wider literate public, Diderot and d'Alembert's project embodied the Enlightenment conviction that accurate, freely shared information could improve human society — a practical application of reason.", "id": "fc25"}, {"front": "Why does the Enlightenment matter for AP World History Unit 5?", "back": "The Enlightenment provided the shared political vocabulary — natural rights, popular sovereignty, social contract, separation of powers — that Atlantic revolutionaries in America, France, Haiti, and Latin America all drew on to justify their revolutions between 1776 and 1826.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
