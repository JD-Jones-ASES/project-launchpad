<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "MAIN (acronym for WWI causes)", "back": "The four structural causes of World War I: Militarism, Alliances, Imperialism, and Nationalism. Each reinforced the others; together they created a system so tightly wound that almost any spark could ignite a general war.", "id": "fc01"}, {"front": "Militarism", "back": "The glorification of military power and belief that warfare was a legitimate, even noble, tool of national policy. It drove a sustained arms race across Europe before 1914 and produced military planning cultures — like the Schlieffen Plan — that prioritized mobilization speed over diplomatic deliberation.", "id": "fc02"}, {"front": "Schlieffen Plan", "back": "Germany's strategic plan requiring a rapid attack through neutral Belgium to knock France out of the war before turning east against Russia. It had no 'pause option': once mobilization began, it had to proceed to its conclusion — meaning military timetables drove decisions in the July Crisis, not diplomacy.", "id": "fc03"}, {"front": "HMS Dreadnought (1906)", "back": "A British battleship launched in 1906 that rendered all existing battleships obsolete and triggered a new round of Anglo-German naval building competition — a concrete example of militarism's arms-race logic before WWI.", "id": "fc04"}, {"front": "Triple Alliance", "back": "The mutual defense pact linking Germany, Austria-Hungary, and Italy before World War I. Italy ultimately entered the war on the Allied side in 1915 rather than honoring the alliance.", "id": "fc05"}, {"front": "Triple Entente", "back": "The looser arrangement of mutual support uniting France, Russia, and Britain before World War I. Together with the Triple Alliance it divided Europe into two armed camps whose interlocking commitments turned the July Crisis into a world war.", "id": "fc06"}, {"front": "July Crisis (1914)", "back": "The six-week escalation from the assassination of Franz Ferdinand (28 June) to European-wide war (4 August 1914). The alliance system transformed a bilateral Austro-Serbian dispute into a world war as each power honored its commitments: Russia defended Serbia, Germany honored Austria-Hungary, Britain defended Belgian neutrality.", "id": "fc07"}, {"front": "Alliance system as 'escalation machine'", "back": "The alliance system rewarded commitment and punished hesitation: any power that failed to support its ally risked losing the alliance entirely, while each act of support triggered a counter-response. It did not make WWI inevitable but transformed a manageable crisis into a catastrophic one.", "id": "fc08"}, {"front": "Gavrilo Princip", "back": "A Bosnian Serb nationalist who assassinated Archduke Franz Ferdinand in Sarajevo on 28 June 1914. The assassination was not an isolated incident but 'the culmination of years of South Slavic agitation' and nationalism's 'most dramatic act' — a political murder committed in the belief that nations, not dynasties, should govern peoples.", "id": "fc09"}, {"front": "Archduke Franz Ferdinand", "back": "The heir to the Austro-Hungarian throne, assassinated in Sarajevo on 28 June 1914 by Gavrilo Princip. His assassination served as the immediate trigger — though not the structural cause — of World War I.", "id": "fc10"}, {"front": "Moroccan Crises (1905–1906, 1911)", "back": "Two confrontations between France and Germany over control of Morocco that brought the powers close to war and contributed to a general climate of great-power rivalry. Cited as examples of how imperial competition created specific flashpoints before 1914.", "id": "fc11"}, {"front": "Balkan Wars (1912–1913)", "back": "Two wars among Balkan states that reshuffled Balkan territory, humiliated Austria-Hungary, and emboldened Serbia — heightening the tensions that made the July 1914 crisis explosive. Part of the imperial-competition context that preceded WWI.", "id": "fc12"}, {"front": "Indian troops in World War I", "back": "Over 1.5 million Indian troops served in British armies across multiple theaters — France, Flanders, Mesopotamia, East Africa, Gallipoli — forming the single largest recruitment pool in the British war effort. Their participation demonstrates WWI's global character as an imperial war.", "id": "fc13"}, {"front": "Tirailleurs sénégalais", "back": "Approximately 600,000 African troops from French West Africa who fought in France and across the African continent. An estimated 200,000 African civilians and soldiers died in the East Africa campaign alone, illustrating that WWI mobilized African populations as full combatants, not merely auxiliaries.", "id": "fc14"}, {"front": "Chinese Labour Corps", "back": "140,000 Chinese laborers recruited from Shandong province who worked behind British and French lines on the Western Front, digging trenches, repairing roads, and handling ammunition. Kept segregated and largely invisible in Allied records — evidence of the war's global reach and the exploitation of colonial labor.", "id": "fc15"}, {"front": "Self-determination", "back": "The principle that peoples sharing a common language, culture, or historical identity have the right to determine their own political status. Woodrow Wilson articulated it as a war aim in 1918, but its application proved problematic: drawing ethnic borders was geometrically impossible without creating new minorities, and the promise was extended primarily to white Europeans while denied to colonized peoples.", "id": "fc16"}, {"front": "Pan-German nationalism and 'Einkreisung'", "back": "Pan-German nationalists argued Germany's 'place in the sun' — colonial possessions and international prestige commensurate with its industrial power — had been denied by Britain and France. The sense of encirclement (Einkreisung) — that France and Russia were hemming Germany in — intensified the feeling that war was inevitable and better fought sooner.", "id": "fc17"}, {"front": "Britain's 1839 treaty obligation", "back": "A treaty guaranteeing Belgian neutrality that bound Britain to declare war on Germany when German troops crossed into Belgium on 4 August 1914. It illustrates how the alliance system automatically drew powers into a conflict they might otherwise have avoided.", "id": "fc18"}, {"front": "How did the Balkan situation exemplify nationalism as a cause of WWI?", "back": "Austria-Hungary saw Serbia — an independent South Slavic state actively sponsoring pan-Slavic nationalism within Habsburg territory — as an existential threat. The Sarajevo assassination was the culmination of years of South Slavic agitation, representing nationalism's direct challenge to multi-ethnic dynastic empire.", "id": "fc19"}, {"front": "SPICE-T: How did imperialism make WWI a genuinely global war?", "back": "Because the European powers that fought WWI each controlled vast colonial empires, the war was immediately global: India, French West Africa, East Africa, Australia, New Zealand, Canada, South Africa, and China all contributed manpower. WWI mobilized the populations of every inhabited continent — it was not a European war with colonial auxiliaries but a world war driven by imperial systems.", "id": "fc20"}, {"front": "Why did mobilization timetables matter more than diplomacy in July 1914?", "back": "Military war plans — especially the Schlieffen Plan and Russia's general mobilization requirement — had no pause options. Each power feared that hesitation would allow rivals to mobilize first, gaining a decisive advantage. This meant military logic superseded diplomatic deliberation once the crisis began escalating.", "id": "fc21"}, {"front": "What made WWI's global character significant for subsequent history?", "back": "The mobilization of Indian, African, and other colonial troops for a European war that promised self-determination raised expectations among colonized peoples that went unmet at Versailles. The broken promises of WWI's global character fueled decolonization movements in Asia, Africa, and the Middle East for the following half-century.", "id": "fc22"}, {"front": "East Africa campaign (WWI)", "back": "A grinding guerrilla war fought across modern-day Tanzania, Mozambique, and Zambia between German forces under Paul von Lettow-Vorbeck (using African Askari soldiers) and larger Allied forces. An estimated 200,000 African civilians and soldiers died — a theater of WWI almost entirely fought and suffered by African populations.", "id": "fc23"}, {"front": "What is the key lesson of the alliance system for AP World History analysis?", "back": "Rigid alliance commitments can automatically escalate local conflicts into global ones by rewarding commitment over negotiation. The alliance system did not make WWI inevitable but made it catastrophic once the July Crisis began — a lesson about how formal alliance structures shape the choices available to state leaders in a crisis.", "id": "fc24"}, {"front": "Arms race before 1914", "back": "Germany and Britain competed for naval supremacy (launching Dreadnought-class battleships from 1906). Germany doubled its army between 1870 and 1914; France, Russia, and Austria-Hungary responded in kind. Military budgets grew 50% or more in the decade before the war, collectively mobilizing tens of millions of men.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
