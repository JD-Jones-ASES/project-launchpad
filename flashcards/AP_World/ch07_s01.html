<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Turkification", "back": "The Ottoman Young Turk policy of imposing Turkish language, culture, and identity on the empire's non-Turkish minorities — Armenians, Kurds, Arabs, Greeks — as a tool of modernization and national cohesion. It escalated during World War I and provided the ideological framework for the Armenian Genocide of 1915.", "id": "fc01"}, {"front": "Committee of Union and Progress (CUP)", "back": "The Young Turk political organization that deposed Sultan Abdülhamid II in the revolution of 1908 and subsequently governed the Ottoman Empire. The CUP pursued coercive Turkification policies and bore primary responsibility for organizing the Armenian Genocide during World War I.", "id": "fc02"}, {"front": "Armenian Genocide (1915–1923)", "back": "The systematic deportation and massacre of the Ottoman Empire's Armenian population ordered by the CUP during World War I. Estimates range from 600,000 to 1.5 million Armenians killed through execution, death marches, and deliberate starvation — recognized by historians as the first genocide of the twentieth century.", "id": "fc03"}, {"front": "Treaty of Sèvres (1920)", "back": "The post-WWI treaty that partitioned Anatolia among Greece, Armenia, France, Italy, and a proposed Kurdish zone, leaving the Ottoman sultan as a figurehead. It was repudiated by the Turkish nationalist movement under Mustafa Kemal and replaced by the Treaty of Lausanne (1923).", "id": "fc04"}, {"front": "Mustafa Kemal (Atatürk)", "back": "The Turkish military commander and nationalist leader who repudiated the Treaty of Sèvres, expelled Greek forces from Anatolia (1919–1922), and founded the Republic of Turkey in October 1923, abolishing the Ottoman sultanate and later the caliphate.", "id": "fc05"}, {"front": "Republic of Turkey — founding date", "back": "October 1923. The Ottoman sultanate had been abolished in November 1922; the caliphate followed in March 1924. Together these acts ended a dynasty and an imperial tradition of more than six centuries.", "id": "fc06"}, {"front": "Unequal treaty", "back": "A treaty imposed on a weaker state by a stronger one following military defeat, in which the weaker state makes major concessions — territorial, economic, or legal — without receiving equivalent benefits. China signed dozens of such treaties with Britain, France, Russia, the United States, and Japan between 1842 and 1911.", "id": "fc07"}, {"front": "Opium Wars (First and Second)", "back": "The First Opium War (1839–1842) and Second Opium War (1856–1860) were conflicts in which Britain (and France in the second) defeated China militarily and forced the Qing to sign unequal treaties opening treaty ports, ceding Hong Kong, and granting extraterritoriality to foreign nationals.", "id": "fc08"}, {"front": "Extraterritoriality", "back": "The legal principle, embedded in unequal treaties with China, that foreign nationals in China were subject to the laws of their home country rather than Chinese law. It symbolized the Qing's loss of sovereignty and became a major grievance fueling Chinese nationalism.", "id": "fc09"}, {"front": "Revolution of 1911 (Xinhai Revolution)", "back": "A military uprising at Wuchang in October 1911 that spread rapidly across China, leading province after province to declare independence from Qing authority. The last emperor, Pu Yi, abdicated on 12 February 1912, ending 267 years of Qing rule and more than two thousand years of imperial governance.", "id": "fc10"}, {"front": "Pu Yi", "back": "The last emperor of China's Qing Dynasty, who abdicated on 12 February 1912 as a child following the Wuchang Uprising. His abdication ended more than two thousand years of continuous imperial governance in China.", "id": "fc11"}, {"front": "Yuan Shikai", "back": "The military strongman who forced Pu Yi's abdication, seized the Chinese presidency from Sun Yat-sen, and attempted to restore the monarchy in 1915–1916 before dying. His failure left a political vacuum that produced the Warlord Era.", "id": "fc12"}, {"front": "Sun Yat-sen", "back": "The founder of the Republic of China proclaimed after the 1911 revolution. His government almost immediately fractured when Yuan Shikai seized power. Sun Yat-sen remained a symbolic figure of Chinese nationalism.", "id": "fc13"}, {"front": "Warlord Era (1916–1928)", "back": "A decade of fragmentation in China following Yuan Shikai's death in which regional military commanders (warlords) contested control of territories while the nominal republican government in Beijing exercised little real authority. The power vacuum would not be filled until 1949.", "id": "fc14"}, {"front": "Russo-Japanese War (1904–1905)", "back": "A conflict in which Japan defeated Russia — the first major victory of an Asian power over a European great power in the modern era. The defeat triggered the Russian Revolution of 1905, forcing Tsar Nicholas II to issue the October Manifesto promising a constitutional assembly (the Duma).", "id": "fc15"}, {"front": "October Manifesto (1905)", "back": "A document issued by Tsar Nicholas II following the Revolution of 1905, promising a constitutional assembly (the Duma). The concessions were partial and the Tsar quickly backtracked, but the episode revealed the Romanov dynasty's vulnerability to popular pressure.", "id": "fc16"}, {"front": "February Revolution of 1917", "back": "Spontaneous strikes and demonstrations in Petrograd triggered by bread shortages, leading soldiers to refuse orders to fire on protesters. Within days Nicholas II abdicated, ending the Romanov dynasty. A Provisional Government attempted to continue the war in World War I.", "id": "fc17"}, {"front": "Bolshevik Revolution (October 1917)", "back": "The seizure of power in Petrograd by Vladimir Lenin and the Bolshevik party, armed with the promise of 'Peace, Land, Bread.' The Provisional Government's refusal to exit WWI had alienated the population, creating conditions for the Bolshevik takeover and Russia's transformation into the world's first communist state.", "id": "fc18"}, {"front": "Vladimir Lenin", "back": "The leader of the Bolshevik party who led the October 1917 revolution, promised 'Peace, Land, Bread,' and began transforming Russia into the world's first communist state. He died in 1924.", "id": "fc19"}, {"front": "What is the KEY CONCEPT of 'Simultaneous Imperial Collapse'?", "back": "The near-simultaneous collapse of the Ottoman, Qing, and Romanov empires between 1911 and 1924 resulted from shared structural pressures: nationalist demands for self-determination, economic strain from industrial warfare, and the mismatch between multi-ethnic dynastic legitimacy and a world reorganized around nation-states. The collapse created border disputes, minority vulnerabilities, and ungoverned territories that fueled the conflicts of the 1930s and 1940s.", "id": "fc20"}, {"front": "How did nationalism challenge dynastic legitimacy in each of the three empires?", "back": "In the Ottoman Empire, Armenians, Arabs, and Macedonians challenged the sultan's authority. In the Qing Empire, Chinese republicans rejected dynastic rule. In the Romanov Empire, Polish, Finnish, Ukrainian, Caucasian, and Central Asian nationalists alongside socialist revolutionaries demanded change. When nationalism became the dominant framework for political legitimacy, dynastic multi-ethnic empires lost their justification.", "id": "fc21"}, {"front": "SPICE-T: How does the imperial collapse connect to the Political theme?", "back": "The replacement of multi-ethnic dynastic empires by nation-states was the defining political transformation of the early twentieth century. When nationalism became the dominant basis for political legitimacy, no multi-ethnic empire could maintain its justification. This political shift reshaped every subsequent development of the twentieth century.", "id": "fc22"}, {"front": "How did World War I accelerate Romanov collapse differently from how it accelerated Ottoman collapse?", "back": "For the Romanovs, WWI's economic strain — supplying 12 million soldiers with an inadequate industrial base — produced 5 million casualties and bread shortages that triggered revolution. For the Ottomans, WWI enabled the CUP to escalate minority persecution under wartime security pretexts and resulted in total military defeat and territorial dismemberment by the Treaty of Sèvres.", "id": "fc23"}, {"front": "Young Turk Revolution (1908)", "back": "A revolution by reformist officers within the Committee of Union and Progress (CUP) that deposed Sultan Abdülhamid II and attempted to modernize the Ottoman state along nationalist lines. The Young Turks' solution to multi-ethnic empire became increasingly coercive Turkification.", "id": "fc24"}, {"front": "Boxer Rebellion aftermath (1900–1901)", "back": "Following the failure of the anti-foreign Boxer Uprising, the Qing court was forced to sign the Boxer Protocol, imposing heavy indemnity payments on China and allowing foreign troops to be stationed in Beijing — further weakening the dynasty's legitimacy and adding to the grievances driving Chinese nationalism.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
