    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 8, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Nation-building", "back": "The process of constructing functioning state institutions, national identities, and legitimate governance structures in the aftermath of colonial rule. Made extraordinarily difficult by the colonial inheritance: misaligned borders, export-oriented economies, colonial civil services, and populations with loyalties to ethnic/religious/regional groups that colonial policies had deliberately antagonized against each other.", "id": "fc01"}, {"front": "Colonial inheritance (post-independence challenges)", "back": "The set of structural problems that newly independent states inherited from colonialism: (1) borders drawn for European administrative convenience, not African self-organization; (2) economies structured to export raw materials, not serve domestic development; (3) civil services and legal systems designed for colonial control; (4) populations with deeply rooted ethnic/religious loyalties that colonial policies had deliberately sharpened. The Cold War compounded every problem by overlaying superpower patronage on top of these structural weaknesses.", "id": "fc02"}, {"front": "Uti possidetis", "back": "Legal principle endorsed by the Organization of African Unity (OAU) at its 1964 Cairo summit: colonial-era borders would be maintained at independence, even though they had been drawn at the 1884–85 Berlin Conference with no regard for African self-organization. Prevented immediate territorial conflict between new states but produced multi-ethnic states without historical unity and split ethnic groups across borders.", "id": "fc03"}, {"front": "Organization of African Unity (OAU, 1963)", "back": "Pan-African organization founded in 1963 to coordinate African political cooperation and promote decolonization. At its 1964 Cairo summit, endorsed the principle of uti possidetis — maintaining colonial borders. Used as a vehicle by NAM solidarity to push the UN to condemn apartheid and racial discrimination in South Africa and Rhodesia.", "id": "fc04"}, {"front": "Apartheid", "back": "System of institutionalized racial segregation and white minority rule in South Africa from 1948 to 1994. Every South African was legally classified by race; classification determined where one could live, work, study, marry, and participate in politics. Pass laws restricted Black South Africans' movement. Bantustans confined Black South Africans to 13% of land for 80% of the population. Declared a crime against humanity by the UN in 1973.", "id": "fc05"}, {"front": "Bantustans", "back": "Nominally independent 'homelands' to which Black South Africans were confined under apartheid — fragmented rural territories representing 13% of the land for 80% of the population. Denied Black South Africans citizenship in 'their own' country and concentrated economic exploitation by restricting where they could live and work.", "id": "fc06"}, {"front": "Pass laws", "back": "Apartheid regulations requiring Black South Africans to carry identity documents at all times, restricting where they could live and work. A key mechanism of social control under apartheid — enforcing spatial separation and labor extraction while keeping Black South Africans legally subordinate within their own country.", "id": "fc07"}, {"front": "African National Congress (ANC)", "back": "Founded in 1912 — the primary organization resisting apartheid in South Africa. Declared illegal in 1960 following the Sharpeville Massacre. Organized both armed resistance through Umkhonto we Sizwe and sustained international lobbying for sanctions. Led by figures including Nelson Mandela, Walter Sisulu, and Oliver Tambo. Won the first democratic elections in 1994.", "id": "fc08"}, {"front": "Nelson Mandela (1918–2013)", "back": "Co-founder of the ANC Youth League (1944) and Umkhonto we Sizwe (ANC's armed wing). Convicted at the Rivonia Trial (1964) and imprisoned for 27 years, mostly on Robben Island. Became the international symbol of anti-apartheid resistance. Released February 1990 by F. W. de Klerk. Negotiated the transition to democracy. South Africa's first democratically elected president (1994–99). Championed the Truth and Reconciliation Commission.", "id": "fc09"}, {"front": "Sharpeville Massacre (1960)", "back": "South African police killing of sixty-nine peaceful demonstrators protesting pass laws in Sharpeville. The massacre triggered the banning of the ANC and PAC, Mandela's decision to help organize Umkhonto we Sizwe (armed resistance), and international condemnation of apartheid. A turning point: peaceful protest was outlawed, and the ANC shifted to combining armed resistance with international diplomacy.", "id": "fc10"}, {"front": "Umkhonto we Sizwe (MK)", "back": "Armed wing of the African National Congress ('Spear of the Nation' in Zulu), co-founded by Nelson Mandela after the Sharpeville Massacre (1960). Conducted sabotage campaigns against apartheid infrastructure. Its existence gave Western governments cause (or excuse) to characterize the ANC as a Soviet-aligned organization and delay imposing sanctions.", "id": "fc11"}, {"front": "Rivonia Trial (1964)", "back": "Trial in which Nelson Mandela and other ANC leaders were convicted of sabotage and conspiracy to overthrow the apartheid government. Mandela was sentenced to life imprisonment. His statement from the dock — 'I am prepared to die' for democratic ideals — became one of the most famous speeches in the history of anti-colonial resistance.", "id": "fc12"}, {"front": "Soweto Uprising (June 16, 1976)", "back": "Uprising by Black South African students protesting the imposition of Afrikaans as the language of instruction in Black schools. Police killed hundreds of students. The date (June 16) is now Youth Day in South Africa. The uprising brought a new generation into political activism, intensified international condemnation, and marked the beginning of escalating internal resistance to apartheid.", "id": "fc13"}, {"front": "Comprehensive Anti-Apartheid Act (U.S., 1986)", "back": "U.S. legislation imposing economic sanctions on South Africa, passed over President Reagan's veto by a remarkable bipartisan congressional override. Demonstrated the breadth of opposition to apartheid even within the apartheid government's Cold War patron. Part of the international economic pressure that accelerated apartheid's collapse.", "id": "fc14"}, {"front": "Global divestment movement", "back": "International campaign pressuring corporations and universities to withdraw investments from South Africa in opposition to apartheid. The movement combined moral pressure (apartheid as a crime against humanity) with economic leverage (threatening South Africa's access to international capital). Combined with the UN arms embargo (1977) and trade sanctions, it economically isolated the apartheid state.", "id": "fc15"}, {"front": "F. W. de Klerk", "back": "South African president who released Nelson Mandela unconditionally in February 1990, unbanned the ANC, and began negotiations toward a democratic transition. The source argues he acted because the Cold War's end had removed the apartheid government's most important argument (ANC as a Soviet-backed Communist organization) and because the system could not be sustained without Cold War patronage and economic investment.", "id": "fc16"}, {"front": "Truth and Reconciliation Commission (TRC)", "back": "Post-apartheid South African institution championed by Mandela as a model for post-conflict justice. Offered amnesty in exchange for full public disclosure of apartheid-era crimes, rather than criminal prosecution. Reflected the negotiated character of the transition: seeking to move toward democracy without triggering retributive violence that might destabilize the new state.", "id": "fc17"}, {"front": "Structural adjustment programs (SAPs)", "back": "Conditions attached by the International Monetary Fund (IMF) and World Bank to debt relief for developing nations, requiring governments to cut social spending, privatize state enterprises, and liberalize trade. Critics characterized these as 'neocolonialism in economic form': a mechanism for maintaining Global South economic subordination through debt conditionality rather than colonial administration.", "id": "fc18"}, {"front": "Patrice Lumumba", "back": "Elected prime minister of the Congo at independence from Belgium in 1960. Deposed and assassinated with CIA and Belgian involvement after Katanga province's Belgian-backed secession attempt. His assassination illustrates how Cold War superpower interference combined with post-colonial state weakness to prevent the Congo from stabilizing after independence.", "id": "fc19"}, {"front": "Biafran War (Nigeria, 1967–70)", "back": "Civil war arising from ethnic tensions between the Hausa-Fulani north, Yoruba southwest, and Igbo southeast of Nigeria — groups that had no historical political unity but were placed within a single colonial border. The attempted secession of the Igbo-dominated southeast (Biafra) resulted in a war killing an estimated one million people, illustrating the catastrophic consequences of colonial border decisions.", "id": "fc20"}, {"front": "How did the end of the Cold War enable South Africa's transition? (causation)", "back": "Three factors converged: (1) the Soviet collapse removed the apartheid government's key argument (ANC = Soviet threat to Africa); (2) Cuba's withdrawal from Angola removed the military context that had made the ANC seem like a Communist proxy; (3) without Cold War patronage, Western tolerance of apartheid evaporated. De Klerk recognized apartheid could not be sustained and released Mandela in February 1990.", "id": "fc21"}, {"front": "Why did post-colonial borders cause conflict? (causation + Social/Political themes)", "back": "The 1884–85 Berlin Conference drew African borders for European administrative and strategic convenience, not African political or cultural logic. Result: (1) many new states contained multiple ethnic/religious groups with no historical political relationship; (2) some ethnic groups were split across two or more states; (3) traditional political units bore no relationship to new territories. The OAU's acceptance of uti possidetis locked in these colonial distortions.", "id": "fc22"}, {"front": "What explains Western tolerance of apartheid during the Cold War? (causation)", "back": "Three reasons: (1) South Africa was strongly anti-Communist, valued by Western governments as a Cold War ally; (2) its Cape of Good Hope position gave it strategic naval importance; (3) its mineral wealth (gold, diamonds, platinum, uranium) made it economically important to Western corporations. The ANC's alliance with the South African Communist Party gave Western governments reason (or excuse) to treat it as Soviet-aligned.", "id": "fc23"}, {"front": "SPICE-T: How does apartheid illustrate the Economic and Political themes together?", "back": "Apartheid was simultaneously political (legal classification, disenfranchisement, banning of opposition) and economic (Bantustans confined Black South Africans geographically to limit where they could sell labor; pass laws controlled labor movement; mineral wealth benefited the white minority). The system's architecture connected political control directly to economic extraction — political rights and economic position were inseparably linked by law.", "id": "fc24"}, {"front": "SPICE-T: How does the post-Cold War period illustrate Economic and Political themes in the Global South?", "back": "After 1989–91, many developing nations faced structural adjustment programs that imposed economic liberalization conditions for debt relief — cutting social spending, privatizing state enterprises, opening markets to wealthy-country competition. This illustrates how political decolonization (formal sovereignty) did not translate into economic sovereignty when states remained embedded in debt relationships with wealthy-country institutions. Political and Economic themes remained linked through post-colonial dependency.", "id": "fc25"}, {"front": "Compare apartheid South Africa to colonial rule elsewhere in Africa (comparison)", "back": "Most African colonialism was dismantled between 1957 and 1975 through negotiation or armed struggle. South Africa was unique: formal colonialism was replaced not by independence but by an internal racial colonial system controlled by a white settler minority. Apartheid (1948–1994) made South Africa the last major formal system of racial domination in Africa — four decades after most of the continent had achieved at least nominal independence. This makes South Africa's anti-apartheid struggle simultaneously a decolonization struggle and a civil rights struggle.", "id": "fc26"}, {"front": "What was the lasting legacy of Cold War proxy conflicts for the twenty-first century? (significance)", "back": "Cold War proxy conflicts left permanent scars: Angola's civil war continued until 2002 — long after both superpowers withdrew. Afghanistan, devastated by Soviet invasion (1979–89) and subsequent civil war, became the breeding ground for the Taliban and Al-Qaeda, whose 2001 attacks triggered another generation of conflict. The borders drawn at Berlin in 1884, the governments installed and toppled by Cold War patrons, and the economic structures of colonialism shaped the political geography of the twenty-first century 'in ways that are still being reckoned with.'", "id": "fc27"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
