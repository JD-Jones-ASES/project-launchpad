<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 5, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Industrial Revolution", "back": "The shift from hand production to machine manufacturing, from organic to mineral energy sources, from rural to urban labor, beginning in Britain in the second half of the eighteenth century. Transformed the global economy more profoundly than any development since the Columbian Exchange.", "id": "fc01"}, {"front": "Why Britain industrialized first", "back": "Multiple structural advantages: abundant coal near navigable rivers, sophisticated financial system (Bank of England, capital markets), property rights and patents, political stability after the Glorious Revolution, enclosure-created labor force, and access to capital and raw materials from the Atlantic slave economy.", "id": "fc02"}, {"front": "enclosure movement", "back": "The privatization of common agricultural land in Britain through Acts of Parliament (accelerating 17th–early 19th centuries), consolidating it into larger farms. Increased agricultural productivity but displaced millions of peasants, creating the mobile urban workforce (proletariat) that factory production required.", "id": "fc03"}, {"front": "proletariat", "back": "The class of industrial wage laborers who own no productive property and must sell their labor to employers for wages. Created by the enclosure movement and migration to industrial cities. Term popularized by Marx and Engels as the exploited class in the capitalist system.", "id": "fc04"}, {"front": "spinning jenny (1764)", "back": "James Hargreaves' mechanical spinning machine that dramatically increased thread production speed and volume, a key early innovation in the British textile industry's mechanization.", "id": "fc05"}, {"front": "water frame (1769)", "back": "Richard Arkwright's water-powered spinning machine; moved textile production from cottage industry to factory scale by harnessing waterpower for continuous operation.", "id": "fc06"}, {"front": "power loom (1785)", "back": "Edmund Cartwright's mechanized weaving machine, completing the mechanization of textile production by automating the weaving process. Combined with the spinning jenny and water frame, it transformed Britain's textile industry.", "id": "fc07"}, {"front": "James Watt's steam engine (patented 1769)", "back": "Watt's rotary steam engine, commercialized through his partnership with Matthew Boulton in the 1770s–80s, converted reciprocal pump motion into rotary motion that could drive machinery. Made steam power applicable to textiles, iron foundries, and transportation — the central power source of the Industrial Revolution.", "id": "fc08"}, {"front": "Stockton to Darlington railway (1825); Liverpool to Manchester (1830)", "back": "The first commercial steam railways; demonstrated that steam power could transform transportation, shrinking distance, lowering transport costs, and accelerating movement of goods and people.", "id": "fc09"}, {"front": "Global origins of British industrialization", "back": "Britain's industrialization depended on: (1) Caribbean slave trade profits providing investment capital, (2) slave-grown American cotton supplying textile mills, (3) colonial markets absorbing manufactured goods, and (4) enclosure providing factory labor. 'British industrialization was a global phenomenon with local technology.'", "id": "fc10"}, {"front": "Eric Williams and Joseph Inikori", "back": "Historians who documented the direct financial links between the Atlantic slave economy and early British industrial investment — challenging the narrative that industrialization was purely a product of domestic British ingenuity and Protestant work ethic.", "id": "fc11"}, {"front": "slave-grown cotton and British textiles", "back": "By 1860, two-thirds of Britain's cotton imports came from the American South, grown by enslaved people. The mechanized cotton textile industry — the engine of British industrialization — was directly dependent on slave-produced raw materials.", "id": "fc12"}, {"front": "de-industrialization of India", "back": "British industrial capitalism destroyed India's textile industry: cheap machine-made British cloth undercut Indian hand-weavers, forcing India to serve as a market for British goods rather than producing textiles for its own consumption or export.", "id": "fc13"}, {"front": "Bank of England (founded 1694)", "back": "Britain's central financial institution, enabling sophisticated capital markets, government bonds, and investment channels. Part of Britain's advantage in financing industrial investment — capital could flow into productive enterprises at scale.", "id": "fc14"}, {"front": "Combination Acts (1799–1800)", "back": "British legislation outlawing labor organizing (trade unions). Despite these laws, workers organized, and the Luddite movement demonstrated resistance through machinery destruction. The Acts were repealed in 1824.", "id": "fc15"}, {"front": "Luddite movement (1811–1816)", "back": "British textile workers who destroyed machinery they blamed for destroying their livelihoods — an early form of resistance to industrialization. The government suppressed it with military force. Anticipated the broader labor movements of the mid-nineteenth century.", "id": "fc16"}, {"front": "trade unions", "back": "Associations of workers that bargained collectively over wages and conditions. Emerged despite the Combination Acts (1799–1800) outlawing them. Created by the concentration of workers in factories and cities that generated new forms of collective identity and organization.", "id": "fc17"}, {"front": "Manchester's growth", "back": "From roughly 25,000 in 1772 to over 300,000 by 1850 — without adequate sewage, clean water, or housing. Life expectancy in Manchester's industrial districts was lower than in rural areas. Emblem of the social costs of unplanned industrial urbanization.", "id": "fc18"}, {"front": "child labor in early factories", "back": "The first industrial mills employed mostly women and children, who could be paid less than men and whose smaller fingers suited certain machinery. Children as young as five or six worked in textile mills and coal mines, with 12–16 hour workdays standard.", "id": "fc19"}, {"front": "Communist Manifesto (1848)", "back": "Marx and Engels' pamphlet — the most systematic expression of the ideological responses to industrialization. Its publication coincided with the Revolutions of 1848 across Europe; it analyzed capitalism's class contradictions as the logical conclusion of industrialization's social upheaval.", "id": "fc20"}, {"front": "SPICE-T: Technology/Environment theme of British industrialization", "back": "The shift from organic to mineral energy (coal + steam) was a fundamental change in human relationship with the environment. Coal-powered steam engines fundamentally changed production, transportation, and urban geography, introducing a fossil-fuel-dependent energy regime with long-term environmental consequences.", "id": "fc21"}, {"front": "SPICE-T: Economic theme of British industrialization", "back": "Created industrial capitalism: factory production, wage labor (proletariat), bourgeoisie ownership of means of production. Destroyed traditional artisan and cottage industries. India was forcibly de-industrialized. Generated enormous wealth for Britain and severe poverty for industrial workers.", "id": "fc22"}, {"front": "Why was cotton the leading sector of British industrialization?", "back": "Cotton's raw material was increasingly supplied by slave-produced American cotton; it was amenable to mechanical spinning and weaving innovation (spinning jenny, water frame, power loom); and it served mass consumer markets. It combined global supply chains, technological innovation, and colonial markets.", "id": "fc23"}, {"front": "How did political stability after the Glorious Revolution support industrialization?", "back": "Parliamentary government after 1689 reduced the risk that the state would arbitrarily seize commercial wealth. Relatively secure property rights and patent protections encouraged inventors to profit from innovations. Institutional stability created conditions for long-term investment.", "id": "fc24"}, {"front": "Boulton and Watt partnership", "back": "James Watt's partnership with Birmingham manufacturer Matthew Boulton made the steam engine commercially viable at scale in the 1770s–80s. Demonstrates that technological innovation required both invention (Watt) and commercial entrepreneurship (Boulton) for industrial impact.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
