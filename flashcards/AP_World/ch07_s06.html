<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 7, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "The Holocaust", "back": "The systematic, state-organized murder of approximately 6 million Jews and 5–6 million others (Soviet civilians, Soviet POWs, Romani people, people with disabilities, political prisoners, homosexual men, Jehovah's Witnesses) by Nazi Germany and its collaborators. Not a product of irrational hatred alone, but of a modern bureaucratic state applying industrial methods to annihilation.", "id": "fc01"}, {"front": "Nuremberg Laws (1935)", "back": "Two laws enacted by the Reichstag on 15 September 1935: the Reich Citizenship Law (defining citizenship by blood, stripping Jews of full political rights) and the Law for the Protection of German Blood and German Honor. Together they provided the comprehensive legal architecture for racial exclusion and the administrative foundation for subsequent persecution.", "id": "fc02"}, {"front": "Subjects vs. Citizens (Nuremberg Laws)", "back": "The Nuremberg Laws created two legal categories: 'subjects of the state' (all persons under German authority) and 'citizens of the Reich' (only those of 'German or kindred blood'). Only citizens had full political rights. This distinction allowed the state to strip Jews of civil service positions, voting rights, marriage rights, professional licenses, and eventually property — step by step.", "id": "fc03"}, {"front": "Turkification vs. Nuremberg Laws — comparison", "back": "Both were state policies using legal/administrative mechanisms to enforce ethnic homogeneity and marginalize minorities. The Ottoman Turkification imposed cultural assimilation and identity; the Nuremberg Laws imposed racial exclusion and legal non-personhood. Both provided ideological and administrative frameworks that enabled subsequent mass violence (Armenian Genocide; the Holocaust).", "id": "fc04"}, {"front": "Kristallnacht ('Night of Broken Glass,' 9–10 November 1938)", "back": "A state-organized pogrom staged to appear as spontaneous popular anger. Destroyed over 7,500 Jewish businesses, burned 1,400 synagogues, killed at least 91 Jews, and sent 30,000 to concentration camps. It marked the transition from legal discrimination to organized violence, while maintaining deniability through its 'spontaneous' staging.", "id": "fc05"}, {"front": "Final Solution (Endlösung der Judenfrage)", "back": "The German bureaucratic term for the systematic murder of European Jews. The transition to systematic murder occurred in the context of the Soviet invasion (June 1941). The term was used at the Wannsee Conference (January 1942) to describe the coordinated logistics of murdering 11 million Jews across occupied Europe.", "id": "fc06"}, {"front": "Einsatzgruppen", "back": "Mobile killing units that followed the German army into the Soviet Union (from June 1941) and conducted mass shootings of Jewish populations. At Babi Yar (near Kyiv, September 1941), Einsatzgruppen killed 33,771 Jews in two days. Across occupied Soviet territories, they killed an estimated 500,000–800,000 Jews in 1941 alone — at ravines, forests, and prepared pits.", "id": "fc07"}, {"front": "Babi Yar (September 1941)", "back": "A ravine near Kyiv where Einsatzgruppen killed 33,771 Jews in two days — one of the largest single mass killing events of the Holocaust. It exemplifies the Einsatzgruppen phase of the Holocaust: systematic mass shooting operations conducted in occupied Soviet territory.", "id": "fc08"}, {"front": "Wannsee Conference (20 January 1942)", "back": "A meeting of senior Nazi officials convened to coordinate the logistics of the Final Solution across occupied Europe. The minutes document a bureaucratic planning session for the murder of 11 million Jews — organized by government department, coordinated across occupied territories, managed as an administrative problem. It did not decide to murder Jews (that decision had already been made) but systematized the process.", "id": "fc09"}, {"front": "Death camps (extermination camps)", "back": "Six facilities constructed in occupied Poland specifically for mass killing: Auschwitz-Birkenau, Treblinka, Sobibor, Belzec, Chelmno, and Majdanek. Unlike earlier concentration camps (labor/detention/terror), death camps were purpose-built for annihilation. Victims were transported by train from across Europe, selected for immediate gassing or slave labor, and murdered with Zyklon B or carbon monoxide.", "id": "fc10"}, {"front": "Auschwitz-Birkenau", "back": "The largest death camp, located in occupied Poland. Killed an estimated 1.1 million people, of whom roughly 90 percent were Jews. Operated as both a concentration camp (forced labor) and extermination camp (gas chambers with Zyklon B). Became the most widely recognized symbol of the Holocaust.", "id": "fc11"}, {"front": "Genocide (definition)", "back": "The deliberate and systematic destruction, in whole or in part, of a national, ethnic, racial, or religious group. Term coined by Raphael Lemkin in 1944. The UN Genocide Convention (1948) defines it as acts committed 'with intent to destroy, in whole or in part, a national, ethnical, racial or religious group.' Intent toward a defined group is the distinguishing legal criterion.", "id": "fc12"}, {"front": "Raphael Lemkin", "back": "Polish-Jewish lawyer who coined the term 'genocide' in 1944 to describe the Nazi program and earlier atrocities including the Armenian Genocide. His work directly shaped the UN Genocide Convention (1948) — the foundational document of international legal accountability for state-sponsored mass murder.", "id": "fc13"}, {"front": "Bureaucratic infrastructure of genocide", "back": "The Holocaust required: (1) legal frameworks (Nuremberg Laws defining who was Jewish); (2) administrative systems (census records, registration, yellow star marking); (3) economic expropriation (property seizure); (4) logistical infrastructure (railway networks transporting victims); (5) industrial killing facilities (death camps with gas chambers and crematoria). Each element was necessary; together they made industrial-scale genocide operational.", "id": "fc14"}, {"front": "Banality of evil (Hannah Arendt)", "back": "Philosopher Hannah Arendt's concept, developed in analyzing the Holocaust: atrocity was perpetuated not only by ideological fanatics but by ordinary government clerks, railway workers, local police, and soldiers following orders — 'not by monsters but by bureaucrats.' The concept challenges the idea that perpetrators of atrocity are psychologically abnormal, raising disturbing questions about ordinary human complicity.", "id": "fc15"}, {"front": "International Military Tribunal at Nuremberg (1945–1946)", "back": "Allied court that tried 24 senior Nazi officials for war crimes, crimes against peace, and crimes against humanity (a legal innovation). Twelve received death sentences. Established that 'following orders' was not a valid defense for crimes against humanity and that individuals could be held personally accountable under international law for actions carried out under state authority.", "id": "fc16"}, {"front": "Crimes against humanity (legal innovation)", "back": "A new legal category established at Nuremberg covering systematic and widespread attacks on civilian populations. It was a legal innovation because it created individual criminal accountability under international law for actions carried out under state authority — not merely accountability between states as in prior international law.", "id": "fc17"}, {"front": "UN Genocide Convention (1948)", "back": "International treaty defining and criminalizing genocide, obligating signatory states to prevent and punish it. Directly descended from the Nuremberg Trials and Raphael Lemkin's work. Defined genocide as acts committed with intent to destroy a national, ethnical, racial, or religious group — the intent requirement is the law's defining criterion.", "id": "fc18"}, {"front": "Escalation phases of the Holocaust", "back": "Not a straight line: (1) 1933: civil service exclusions; (2) 1935: Nuremberg Laws — legal racial exclusion; (3) 1938: Kristallnacht — organized violence; (4) 1941: Einsatzgruppen mass shootings in occupied Soviet territories; (5) 1942: Wannsee Conference systematizes the Final Solution; death camps begin systematic industrial genocide.", "id": "fc19"}, {"front": "20th-century genocides beyond the Holocaust", "back": "Armenian Genocide (1915–1923): 600K–1.5M Armenians killed by the Ottoman CUP. Holodomor (1932–1933): 3.5–5M Ukrainians killed by Soviet grain seizures. Cambodian genocide (1975–1979). Bosnian genocide (1992–1995). Rwandan genocide (1994): ~800K Tutsi killed in approximately 100 days. The Holocaust is the paradigmatic case; the century demonstrates it was not unique.", "id": "fc20"}, {"front": "SPICE-T: What political theme does the Holocaust illustrate?", "back": "The Holocaust illustrates the extreme capacity of the modern nation-state's bureaucratic and coercive apparatus. Unlike pre-modern persecutions, the Holocaust required the full machinery of a modern industrial state: legal systems, census bureaucracy, railway networks, military and police forces, and industrial manufacturing (of killing facilities). It reveals both the power of modern states and the danger when that power is deployed against defined groups.", "id": "fc21"}, {"front": "International Criminal Court (ICC, 2002)", "back": "A permanent international court established in 2002 to prosecute individuals for genocide, crimes against humanity, war crimes, and the crime of aggression. It traces its intellectual lineage to the Nuremberg Trials and represents an attempt to create a standing, non-'victors' justice' mechanism for international accountability.", "id": "fc22"}, {"front": "Why did the Holocaust occur in the context of WWII specifically?", "back": "The invasion of the Soviet Union in June 1941 brought German forces into territories with large Jewish populations (Poland, Baltic states, Ukraine, Belorussia) and provided the military-operational cover for mass killing. WWII also suspended normal constraints on state violence, normalized mass death, and removed the populations that were being murdered from the sight of German civilians.", "id": "fc23"}, {"front": "Comparison: Armenian Genocide vs. Holocaust", "back": "Both were state-organized campaigns to destroy a defined ethnic/national group. Both used bureaucratic and military apparatus. Both occurred in the context of total war (WWI and WWII respectively), which provided cover and opportunity. Key differences: the Ottomans used deportation marches and famine as primary killing methods; the Nazis developed industrial death camps. The Armenian case is considered a 'precedent' by the section for what followed.", "id": "fc24"}, {"front": "Nuremberg Laws — Article 3 delegation of power", "back": "Article 3 delegated the power to 'implement and supplement' the Nuremberg Laws to the Interior Ministry and the Deputy of the Führer. This built unlimited executive flexibility into the law: the state could escalate persecution through administrative supplements without requiring new legislation for each step — enabling the path from legal discrimination (1935) to deportation and genocide (1941).", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
