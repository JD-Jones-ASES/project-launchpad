<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Fascism", "back": "A political ideology characterized by extreme nationalism, authoritarian single-party rule, state control of the economy within a nominally private-property framework, glorification of violence, suppression of political opposition, and identification of a scapegoated internal 'enemy.' Emerged in Italy under Mussolini (1922) and Germany under Hitler (1933). Explicitly anti-communist and anti-liberal.", "id": "fc01"}, {"front": "Great Depression (1929–)", "back": "Began with the US stock market collapse in October 1929. By 1932: global industrial output fell 38%, international trade fell 65%, German unemployment reached 30%. The gold standard transmitted deflation internationally and prevented governments from stimulating recovery. It discredited liberal democracy and capitalism across the industrial world.", "id": "fc02"}, {"front": "Weimar Republic", "back": "Germany's democratic government established after WWI. Already burdened by the 'stab-in-the-back' myth and reparations, it proved unable to manage mass Depression-era unemployment politically. Voters turned to extremes: both the Communist Party and the Nazi Party gained massively at its expense.", "id": "fc03"}, {"front": "'Stab-in-the-back' myth (Dolchstoßlegende)", "back": "The false claim that Germany had been betrayed rather than militarily defeated in 1918. It delegitimized the Weimar Republic by associating its founders with national humiliation, and was exploited by nationalist politicians — especially Hitler — to channel resentment against democratic institutions.", "id": "fc04"}, {"front": "Adolf Hitler appointed Chancellor", "back": "30 January 1933. Hitler was appointed Chancellor of Germany by President Hindenburg, then within months converted the chancellorship into a dictatorship through the Enabling Act — a legal mechanism that gave him emergency powers to govern without the Reichstag.", "id": "fc05"}, {"front": "Enabling Act (1933)", "back": "Legislation passed by the Nazi-intimidated Reichstag granting Hitler emergency powers to govern by decree without parliamentary approval. It was the legal mechanism by which Hitler converted the chancellorship into a dictatorship within months of his appointment.", "id": "fc06"}, {"front": "Joseph Stalin (1878–1953)", "back": "Born Ioseb Jughashvili in Gori, Georgia. Rose within the Bolshevik party after Lenin's death (1924) to consolidate personal control by the late 1920s. His rule transformed the Soviet Union into an industrial power through forced collectivization and Five-Year Plans at a cost of 6–20 million lives. The Great Terror (1936–38) executed ~750,000 people.", "id": "fc07"}, {"front": "Collectivization", "back": "Stalin's forced consolidation of millions of individual peasant farms into collective farms (kolkhozy), beginning 1928. Grain was seized to feed urban workers and export for industrial equipment. Peasant resistance was met with deportation or execution as 'kulaks.' In Ukraine, deliberate grain seizure produced the Holodomor famine.", "id": "fc08"}, {"front": "Holodomor (1932–1933)", "back": "A famine in Ukraine caused by the deliberate seizure of grain by Soviet authorities during collectivization. Killed an estimated 3.5 to 5 million Ukrainians. Ukrainian scholars and many governments classify it as genocide; Soviet and Russian historiography historically denied both the scale and the intentionality.", "id": "fc09"}, {"front": "Kulaks", "back": "A Soviet category originally meaning 'rich peasants' that was applied to anyone who resisted collectivization, regardless of actual wealth. 'Dekulakization' meant deportation to labor camps or execution — a mechanism of political terror used to enforce grain seizures.", "id": "fc10"}, {"front": "Five-Year Plans", "back": "Soviet economic plans beginning 1928 that achieved genuine industrialization: Soviet steel, coal, and electricity production grew dramatically through the 1930s. This industrial capacity proved essential to Soviet survival in WWII. But the human cost was staggering: dangerous conditions, forced labor in gulag camps, and suppression of independent economic life.", "id": "fc11"}, {"front": "Gulag", "back": "The Soviet system of forced-labor camps where millions of political prisoners were sent during Stalin's rule. The forced labor of gulag prisoners subsidized the Five-Year Plans' industrial program. The gulag system was a central instrument of Stalinist terror.", "id": "fc12"}, {"front": "Great Terror (1936–1938)", "back": "Stalin's purge of the Soviet leadership in which show trials forced former Bolshevik leaders to confess to fabricated charges before being executed. The military was devastated: 3 of 5 marshals, 13 of 15 army commanders, and 50 of 57 corps commanders were shot — leaving the Red Army unprepared for the German invasion of 1941.", "id": "fc13"}, {"front": "Two paths to totalitarianism", "back": "Fascism (Germany, Italy) arrived at totalitarianism from the extreme nationalist right; Stalinism from the communist left. Yet both shared: single-party rule, cult of the leader, suppression of dissent through terror, propaganda mobilization, and identification of internal 'enemies.' Comparing them does not equate them — victims, ideologies, and methods differed — but their structural parallels explain why liberal democracy proved so fragile.", "id": "fc14"}, {"front": "Appeasement", "back": "Britain and France's policy of conceding Hitler's territorial demands to avoid conflict. At the Munich Conference (September 1938), they handed Hitler the Sudetenland in exchange for his promise of no further demands. Six months later, Hitler occupied the remainder of Czechoslovakia, demonstrating appeasement's failure.", "id": "fc15"}, {"front": "Munich Conference (September 1938)", "back": "The meeting at which Britain (Chamberlain) and France (Daladier) conceded the Sudetenland to Hitler in exchange for his pledge of no further territorial demands. The defining example of appeasement. Six months later Germany occupied the rest of Czechoslovakia.", "id": "fc16"}, {"front": "Anschluss (March 1938)", "back": "Germany's annexation of Austria in March 1938, part of Hitler's systematic dismantling of the Versailles settlement. Preceded the Munich Conference and the annexation of Czechoslovakia's Sudetenland.", "id": "fc17"}, {"front": "Remilitarization of the Rhineland (1936)", "back": "Germany's remilitarization of the demilitarized Rhineland zone in 1936, violating the Versailles Treaty. Britain and France failed to respond militarily — an early demonstration of appeasement that emboldened further German violations.", "id": "fc18"}, {"front": "Why did liberal democracy prove fragile in the 1930s?", "back": "Three connected factors: (1) The Great Depression discredited liberal democratic governments that had overseen the economic collapse and capitalism itself. (2) Fascism and Stalinism both offered alternative models that promised national regeneration through strong leadership. (3) In Germany specifically, the Weimar Republic's preexisting burdens (stab-in-the-back myth, reparations) made it especially vulnerable to Depression-era discrediting.", "id": "fc19"}, {"front": "SPICE-T: How does the interwar period illustrate the Political theme?", "back": "The interwar period saw the fragility of representative government under economic stress. Fascism and Stalinism replaced elected governments with single-party authoritarian systems, demonstrating that political institutions — no matter how established — can be dismantled when economic crises delegitimize the governments that operate within them.", "id": "fc20"}, {"front": "Gold standard and the Depression", "back": "The gold standard linked currencies to fixed gold reserves, preventing governments from expanding money supplies to stimulate economic recovery. Instead it transmitted deflation internationally. Countries that abandoned the gold standard earlier (Britain, 1931) recovered faster — illustrating how monetary policy constrained governmental responses to the Depression.", "id": "fc21"}, {"front": "Mussolini's Italy (1922)", "back": "Benito Mussolini brought fascism to power in Italy in 1922 — the first fascist government in Europe. Fascism subsequently spread in various forms to Spain, Hungary, Romania, and elsewhere in the 1930s, with Nazi Germany (1933) becoming its most extreme expression.", "id": "fc22"}, {"front": "Leon Trotsky", "back": "A leading Bolshevik intellectual and military figure who was one of Stalin's main rivals after Lenin's death (1924). Stalin outmaneuvered Trotsky, eventually exiling and then having him assassinated (1940). Trotsky's defeat illustrates how Stalin used organizational control, not ideological superiority, to consolidate power.", "id": "fc23"}, {"front": "Compare fascist and Stalinist economic policies.", "back": "Fascism maintained nominal private property while the state controlled economic direction — a rejection of both free-market capitalism and Marxist nationalization. Stalinism fully nationalized the economy through collectivization and Five-Year Plans, eliminating independent economic life entirely. Both subordinated economics to political goals; both used coercion; but Stalinism involved a far more complete elimination of market mechanisms.", "id": "fc24"}, {"front": "Why did appeasement fail despite rational motives?", "back": "Britain and France practiced appeasement for genuine reasons — military unpreparedness, public trauma from WWI, Soviet isolation by Western anti-communism. But appeasement assumed Hitler's demands were finite and could be satisfied. Hitler's occupation of Czechoslovakia six months after Munich proved his ambitions were expansionist and not limited to 'legitimate' Versailles grievances.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
