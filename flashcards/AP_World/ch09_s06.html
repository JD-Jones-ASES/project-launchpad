<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP World History: Modern &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP World History: Modern &mdash; Chapter 9, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/AP_World.html">&larr; Back to AP World History: Modern</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Cultural syncretism", "back": "The creative blending of elements from two or more distinct cultural traditions to produce new, hybrid forms. Does not imply the disappearance of either tradition. Historical examples: Swahili culture (Bantu + Arab Islamic), Latin American Catholicism (Catholic + indigenous), Jazz (African American + European). Accelerated in the contemporary era by global media.", "id": "fc01"}, {"front": "Contemporary examples of cultural syncretism", "back": "K-pop (borrowing from American hip-hop while projecting Korean identity); Brazilian funk (blending Miami bass with baile funk and Caribbean rhythms); Bollywood (incorporating Hollywood visual language while remaining distinctively South Asian in narrative and choreography).", "id": "fc02"}, {"front": "McDonaldization thesis", "back": "The argument that American entertainment, fast food, and consumer brands were displacing local cultures — making global culture uniformly 'American.' The text argues the evidence for this is 'real but partial' — cultural flows are not simply one-directional from West to rest, and the more accurate concept may be métissage (mixture).", "id": "fc03"}, {"front": "Métissage", "back": "French concept meaning 'mixture' — proposed as a more accurate description of contemporary global culture than 'McDonaldization.' The text argues global culture became 'increasingly hybrid rather than uniformly American,' with cultural production emerging from Nigeria, Korea, Mexico, Brazil, China, and many other non-Western sources.", "id": "fc04"}, {"front": "Non-Western global cultural exports", "back": "Nigerian Nollywood (world's second-largest film industry by output); Korean K-drama and K-pop (global audiences of hundreds of millions); Mexican and Brazilian telenovelas (broadcast across Africa and Southeast Asia); Chinese video games, TikTok, and animation. Evidence that cultural flows are multi-directional.", "id": "fc05"}, {"front": "Nollywood", "back": "Nigeria's film industry — by output, the world's second-largest film industry after Bollywood. Represents a non-Western cultural export that challenges the McDonaldization thesis by demonstrating Africa's capacity for global cultural production.", "id": "fc06"}, {"front": "Cultural homogenization: real but partial", "back": "The text acknowledges real evidence for homogenization: language extinction at ~one language per two weeks, French concerns about English advertising dominance. But counters with evidence of multi-directional flows (Nollywood, K-pop, telenovelas) showing partial rather than total homogenization.", "id": "fc07"}, {"front": "Language extinction", "back": "The disappearance of languages at approximately one every two weeks as younger generations shift to dominant national and international languages. Cited as evidence of real cultural homogenization pressure on indigenous communities in the Amazon, Andes, and Papua New Guinea.", "id": "fc08"}, {"front": "French cultural protection legislation", "back": "France introduced film quotas protecting French-language films and restrictions on English in advertising — an example of state-led cultural resistance to globalization. Illustrates that wealthy nations also adopted protectionist cultural policies, not only developing nations.", "id": "fc09"}, {"front": "Religious revivalism as counter-globalization", "back": "The most globally consequential form of resistance to Western-led cultural globalization was religious revivalism — not street protest. Islamic movements, evangelical Christianity in sub-Saharan Africa and Latin America, Hindutva in India, and Buddhist nationalism in Myanmar and Sri Lanka all grew dramatically from the 1970s through 2000s.", "id": "fc10"}, {"front": "What forms did Islamic revivalism take?", "back": "Democratic political Islam (Turkey's AKP, governing within parliamentary institutions); revolutionary theocratic model (Iran's 1979 Islamic Republic); violent jihadism (al-Qaeda, Islamic State). Despite differences, all shared rejection of the equation of modernity with Westernization.", "id": "fc11"}, {"front": "Iranian Revolution (1979)", "back": "Overthrew the U.S.-backed Pahlavi monarchy and established an Islamic Republic governed by clerics under velayat-e faqih (guardianship of the jurist). Provided 'the most dramatic demonstration that an alternative path to modernity was possible' — modernity without Westernization.", "id": "fc12"}, {"front": "Velayat-e faqih", "back": "Persian: 'guardianship of the jurist.' The doctrine governing the Iranian Islamic Republic, holding that political authority belongs to senior Islamic clergy. Articulated by Ayatollah Khomeini; the institutional principle that made Iran's theocratic structure distinctive among modern states.", "id": "fc13"}, {"front": "Hindutva", "back": "The ideology that India is essentially a Hindu civilization and that Muslims and Christians are cultural outsiders. Grew from a fringe 1920s ideology to a dominant political force by the 2010s. The Bharatiya Janata Party (BJP), rooted in Hindutva, won national majorities in 2014 and 2019 under Narendra Modi.", "id": "fc14"}, {"front": "Bharatiya Janata Party (BJP)", "back": "India's Hindu nationalist political party rooted in Hindutva ideology; won national majorities in 2014 and 2019 under Prime Minister Narendra Modi. Supporters view it as the legitimate assertion of India's civilizational identity against what they regard as culturally alien post-independence secularism.", "id": "fc15"}, {"front": "Economic populism and deindustrialization", "back": "China's WTO integration created manufacturing job losses in U.S. Midwest, England's North, and France's deindustrializing regions. Workers benefited as consumers (cheaper goods) but were devastated as workers (factory closures, wage stagnation). Political entrepreneurs channeled this into nationalist and populist movements in the 2010s.", "id": "fc16"}, {"front": "Brexit (2016/2020) as anti-globalization", "back": "The UK's 2016 referendum vote to leave the EU (formalized 2020) drew on critiques of globalization as hollowing out working-class communities and surrendering national sovereignty to unaccountable international institutions. One of several 2010s populist-nationalist movements.", "id": "fc17"}, {"front": "Trump's America First and the National Rally (France)", "back": "Examples of economic-nationalist and populist political movements in wealthy nations that channeled manufacturing-displacement discontent into critiques of globalization as a project of 'cosmopolitan elites.' Parallel to Brexit and Poland's Law and Justice Party.", "id": "fc18"}, {"front": "What do all critics of globalization share?", "back": "Despite radically different motivations (labor advocates, environmentalists, Islamic revivalists, Hindu nationalists, displaced Western workers, Global South farmers), all shared the conviction that 'the dominant form of globalization served the interests of a relatively small transnational elite at the expense of most people.'", "id": "fc19"}, {"front": "Globalization as contested process", "back": "The debates over globalization were not simply 'pro' vs. 'anti.' Critics came from the left (labor, environment), right (nationalism), religious movements (Islamic revivalism, Hindutva), and the Global South (farmers undercut by subsidized exports). The question was not whether global exchange existed but who it served and who paid its costs.", "id": "fc20"}, {"front": "SPICE-T: Cultural theme in syncretism and resistance", "back": "The Cultural (C) theme dominates this section: syncretism shows how cultures creatively combine under conditions of increased contact, while revivalism and nationalism show how cultures assert distinctiveness and resist absorption. Both are responses to the same force (intensified global contact) but represent opposite cultural strategies.", "id": "fc21"}, {"front": "SPICE-T: Political theme in anti-globalization movements", "back": "Economic nationalism, religious revivalism, and civilizational nationalism (Hindutva, Buddhist nationalism) all have a Political dimension: they challenge the authority of supranational institutions (WTO, IMF, Western cultural hegemony) and assert the primacy of national, religious, or civilizational identity over cosmopolitan frameworks.", "id": "fc22"}, {"front": "How does religious revivalism use modern tools to resist modernity?", "back": "Religious revivalist movements used satellite television, the Internet, social media, NGOs, and political parties — modern media and organizational techniques — to articulate a critique of secular modernity and Western cultural hegemony. They were not 'pre-modern' in their methods, only in some of their values.", "id": "fc23"}, {"front": "Compare Islamic revivalism to Hindu nationalism as forms of anti-globalization", "back": "Similarities: both rejected Western secularism as culturally alien; both used modern media and political institutions; both grew dramatically in the late 20th century. Differences: Islamic revivalism took forms ranging from democratic (Turkey's AKP) to violent (al-Qaeda); Hindutva operated primarily through democratic electoral politics (BJP).", "id": "fc24"}, {"front": "Continuity and Change: Cultural syncretism across AP World History", "back": "Syncretism is not new — Swahili culture (East Africa, medieval period), Latin American Catholic-indigenous blends (colonial period), and Jazz (early 20th century) all preceded contemporary K-pop and Brazilian funk. What changed is the speed and scale: global media dramatically accelerated the pace of cultural contact and hybrid production.", "id": "fc25"}, {"front": "Buddhist nationalism in Myanmar and Sri Lanka", "back": "Buddhist nationalist organizations in Myanmar and Sri Lanka represent another form of religious revivalism as counter-globalization — asserting Buddhist civilizational identity against what movements perceived as threats from religious minorities and Western secular influence.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
