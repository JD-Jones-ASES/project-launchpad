<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 11, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the synkrisis of Dion and Brutus in the architecture of the book?", "back": "The book's closing comparison. Plutarch is at his most morally serious — both men gave their lives to free their cities from one-man rule, both failed politically, both left philosophical reputations that have endured.", "id": "fc01"}, {"front": "Axis 1 (personal motivation) — who wins and why?", "back": "Brutus, decisively. 'The chief glory of both was their hatred of tyranny, and abhorrence of wickedness. This was unmixed and sincere in Brutus.' Dion had personal grievances; Brutus had been pardoned and elevated by Caesar.", "id": "fc02"}, {"front": "What is Plutarch's controversial claim about Caesar on Axis 2?", "back": "Caesar's supremacy 'had indeed the name and appearance, but fact that was cruel or tyrannical there was none.' Caesar was not actually a tyrant in substance, only in form — the killing answered a constitutional form, not current cruelty.", "id": "fc03"}, {"front": "Axis 2 (character of the tyranny) — who wins and why?", "back": "Dion. Dionysius II was 'a tyrant' who 'vexed Sicily with a thousand oppressions.' Dion's target was the substantively worse man.", "id": "fc04"}, {"front": "Axis 3 (resources for the project) — who wins and why?", "back": "Dion. He 'provided not only arms, ships, and soldiers, but likewise friends and partners for the enterprise,' laid out of his own substance. Brutus and Cassius, under sentence of death, took up arms partly to save themselves.", "id": "fc05"}, {"front": "Axis 4 (conduct of the war) — who wins and why?", "back": "Dion. He was 'a commander without fault.' Brutus showed 'little wisdom in engaging in the final battle' and after failing 'gave all up, and abandoned his hopes.'", "id": "fc06"}, {"front": "Axis 5 (choice of allies) — who wins and why?", "back": "Brutus. Dion 'trusted himself with ill men' — Callippus, whom he had brought from Athens, killed him. Brutus's conspiracy included 'a great many men, not one of whom deceived him.'", "id": "fc07"}, {"front": "Axis 6 (the aftermath) — who wins and how?", "back": "Brutus. He was buried with honor by Antony; Caesar Augustus, encountering Brutus's bronze statue in Cisalpine Gaul, stopped before it and praised the Gauls for not having moved it. Dion, when killed, had no avenger.", "id": "fc08"}, {"front": "What is Plutarch's overall verdict?", "back": "No clear single verdict. Dion is the more capable commander, the more financially generous, the more personally committed. Brutus has the purer motivation, the more controlled choice of allies, the longer afterlife. Each excels the other on different axes.", "id": "fc09"}, {"front": "What is the harder question Plutarch presses about tyrannicide itself?", "back": "Whether the act of killing a tyrant can be morally justified while remaining politically futile. Caesar's death did not restore the Republic — the Romans 'instantly regretted Caesar, and grew enraged and implacable against those that killed him.'", "id": "fc10"}, {"front": "What is Plutarch's most precise formulation of the moral-political gap?", "back": "Tyrannicide can be morally justified (Brutus's case is morally as clean as it gets) AND politically futile (the Republic did not return). Whether the act remains worth doing under such conditions is the question Plutarch leaves the reader.", "id": "fc11"}, {"front": "What are the two main historical readings of these tyrannicides?", "back": "The Christian (Dante's Brutus and Cassius in the lowest hell; Caesarian power as providential) and the republican (Plutarch in North's English — 'the noblest Roman of them all'; the American Founders' Brutus). Both draw on Plutarch.", "id": "fc12"}, {"front": "What is Plutarch's own posture toward these readings?", "back": "Neither matches him exactly. His verdict is more measured: Brutus is admirable and unsuccessful, the deed is principled and futile, the man is noble and flawed. The synkrisis form is at its most useful when the answer is mixed.", "id": "fc13"}, {"front": "What is the chapter's closing writing exercise?", "back": "Write a synkrisis of Dion and Brutus, 600–1,000 words. Choose one axis (or propose your own): justification of tyrannicide, principle vs motive, use of force, political failure. State the axis in the first sentence; cite two incidents from each Life; render judgment.", "id": "fc14"}, {"front": "Where does this exercise fit in the book's pedagogy?", "back": "It is the tenth and last synkrisis exercise. The reader is asked to place it next to the one written for Chapter 2 (Theseus and Romulus). The contrast in sharpness of axis, specificity of incidents, and confidence of judgment is what the spine exercise of the whole book was for.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
