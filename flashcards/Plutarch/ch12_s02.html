<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Plutarch as a Latin-school staple", "back": "In the eighteenth century, Plutarch was a fixed item of the educated reading list. Boys in Latin-school classrooms read him in translation (North's or the Langhornes' 1770 version) alongside Cicero and Tacitus. Plain prose suitable for the young; moral seriousness for forming public character.", "id": "fc01"}, {"front": "Adams's Plutarchan diary", "back": "John Adams's diary is full of paired comparisons in the Plutarchan mode: Washington with Caesar; Hamilton with Alcibiades; Adams himself, repeatedly, with Cicero. He wrote to John Quincy in 1781: \"You will find Plutarch in the hands of every American boy of sense.\"", "id": "fc02"}, {"front": "Hamilton's favorite Plutarchan figure", "back": "Caesar — the brilliant outsider rising to executive power. Hamilton's biographical fragments are full of imitations of Plutarchan character-sketches. Jefferson and others accused him of wanting to be Caesar; Hamilton thought the comparison flattering.", "id": "fc03"}, {"front": "Patrick Henry as Brutus", "back": "\"Give me liberty or give me death\" (1775) is a Brutus citation. The Plutarchan moral type behind the line is Cato the Younger at Utica or Brutus at Philippi — death rather than tyranny.", "id": "fc04"}, {"front": "Nathan Hale and Addison's Cato", "back": "\"I only regret that I have but one life to lose for my country\" paraphrases a line from Addison's tragedy Cato, whose central character is the Plutarchan Cato the Younger. The political rhetoric of the Revolution is, to a striking extent, Plutarchan rhetoric.", "id": "fc05"}, {"front": "Plutarchan legacy #1: the citizen-statesman", "back": "The man of private virtue who takes public office reluctantly, serves honorably, and retires to private life when his term is done. Examples: Camillus, Publicola, Cato, Brutus. Washington consciously imitated this — refusing a third term, returning to Mount Vernon, refusing to be made king.", "id": "fc06"}, {"front": "Plutarchan legacy #2: warning against the brilliant ambitious man", "back": "Plutarch's portraits of Alcibiades (Ch. 7) and Caesar (Ch. 8) were read by the Founders as cautionary examples. Adams worried about Hamilton; Jefferson worried about Hamilton; Hamilton's friends worried about Aaron Burr. The vocabulary they used was Plutarchan.", "id": "fc07"}, {"front": "Plutarchan legacy #3: the discipline of comparison", "back": "The synkrisis form shaped how the Founders thought. The Federalist Papers are Plutarchan in spirit: they weigh alternatives, compare political arrangements, judge by specific incidents. Madison's Federalist 10 compares ancient Sparta, ancient Rome, modern Britain.", "id": "fc08"}, {"front": "Plutarchan legacy #4: legitimation of revolutionary action", "back": "Brutus killing the tyrant Caesar (Ch. 11) was, for the founding generation, the clear precedent. Brutus's right to depose his former benefactor for the city's sake was the type case for the colonies' right to depose their former monarch.", "id": "fc09"}, {"front": "Emerson and Plutarch", "back": "Emerson read Plutarch constantly and wrote one of the great English essays on him in Representative Men (1850). Thoreau quoted him. The Plutarchan inheritance continued past the founding generation into the American Renaissance.", "id": "fc10"}, {"front": "Lincoln's three books", "back": "Abraham Lincoln read the Bible, Shakespeare, and Plutarch — the same three books, in roughly the same order of importance, that Adams and Jefferson had read. His understanding of the citizen-statesman in the Gettysburg Address and Second Inaugural is Plutarchan.", "id": "fc11"}, {"front": "The continuing American political vocabulary", "back": "Public virtue, republican simplicity, the citizen-soldier, the refusal of monarchy — much of this comes through Plutarch. The modern American republic does not consciously read him much anymore; much of its political imagination still does.", "id": "fc12"}, {"front": "Plutarch for a Christian Founder", "back": "Plutarch's appeal was morally serious in a way that worked for Christians and deists alike. The Founders did not see tension between Plutarchan political models and (varied) Christian commitments — they read Plutarch, Augustine, Bible, and Cicero as a single continuous moral inheritance.", "id": "fc13"}, {"front": "The Langhorne translation", "back": "The 1770 English translation by the Langhorne brothers — used alongside North's older 1579 version in eighteenth-century classrooms. It made Plutarch available in clearer modern English just as the Revolutionary generation was reading him.", "id": "fc14"}, {"front": "The American Republic as a Plutarchan project", "back": "The chapter's larger claim: the founding generation read Plutarch in childhood and quoted him to the end. The Parallel Lives were one of the small set of books that shaped the political imagination of the founding. The American Republic was, in many ways, a Plutarchan project.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
