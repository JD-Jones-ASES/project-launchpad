<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Plutarch open the Life of Lycurgus?", "back": "With one of his most candid admissions of doubt — he cannot say when Lycurgus lived, what family he came from, where he travelled, or how he died. He proceeds 'adhering to those statements which are least contradicted'.", "id": "fc01"}, {"front": "Why did Lycurgus refuse the throne after his brother Polydectes's death?", "back": "The queen was pregnant. She proposed to abort the child if Lycurgus would marry her; he played along to save the baby. When the child was born he presented him publicly as the new king and named him Charilaus — 'the joy of the people'.", "id": "fc02"}, {"front": "Why did Lycurgus leave Sparta after handing over the throne?", "back": "He drew suspicion from the queen-mother's family and sailed away — to Crete, Asia Minor, Egypt, and (some said) further — studying the constitutions of other peoples and designing the one he would propose for Sparta.", "id": "fc03"}, {"front": "What were the three foundational reforms of Lycurgus?", "back": "(1) The Senate (gerousia) of twenty-eight elders plus the two kings, (2) the redistribution of land into equal plots (30,000 in Laconia, 9,000 in Spartan territory proper), and (3) the iron money that replaced gold and silver.", "id": "fc04"}, {"front": "Term: gerousia", "back": "The Spartan Senate of twenty-eight elder citizens. Together with the two kings it formed a body of thirty. Plutarch called it 'a central weight, like ballast in a ship', balancing the kings and the assembly.", "id": "fc05"}, {"front": "How did the iron money eliminate luxury in Sparta?", "back": "It was so heavy and useless that twenty pounds needed a closet and a yoke of oxen to move. No one would rob, bribe, or hoard it. Foreign merchants stopped sailing in; jewelers, engravers, and rhetoric-masters all stayed away. Luxury, deprived of its food, wasted to nothing.", "id": "fc06"}, {"front": "Term: syssitia", "back": "The Spartan common tables — public messes of fifteen men each, where every Spartan ate his daily meal. Each member contributed monthly (meal, wine, cheese, figs, money for meat). The private dinner was abolished.", "id": "fc07"}, {"front": "What happened during the riot over the common tables?", "back": "Wealthier Spartans collected against Lycurgus, came to throwing stones, and chased him toward sanctuary. A young man named Alcander struck him in the face with a stick and put out one of his eyes.", "id": "fc08"}, {"front": "Who was Alcander and what became of him?", "back": "The young Spartan who blinded Lycurgus's eye. Lycurgus took him home, treated him kindly, made him wait at table, and let him observe the lawgiver's daily habits. In time Alcander became one of Lycurgus's most devoted disciples.", "id": "fc09"}, {"front": "Why does Plutarch call the Alcander story the 'moral center' of the Life?", "back": "Because it shows that Lycurgus's private virtue — the self-restraint that did not retaliate when wronged — recommended his public laws. The Spartan constitution would not have held without the Spartan lawgiver.", "id": "fc10"}, {"front": "Term: agoge", "back": "Spartan public education from age seven. Boys were taken from their families, enrolled in companies, close-cropped, made to go barefoot, made to sleep on rushes cut by hand from the Eurotas. They learned reading and writing 'just enough to serve their turn' — the main work was endurance, obedience, and skill at arms.", "id": "fc11"}, {"front": "What was an iren?", "back": "An older boy who led each company in the agoge and was authorized to punish failures with the cane. The agoge was a graded system: older boys supervised younger ones.", "id": "fc12"}, {"front": "What does the story of the stolen fox illustrate about the agoge?", "back": "A Spartan boy let a fox he had hidden under his coat tear out his bowels with teeth and claws rather than admit the theft. He was celebrated not for the theft but for the silence under agony — the agoge's signature achievement.", "id": "fc13"}, {"front": "How did Lycurgus ensure his laws would not be undone after he left Sparta?", "back": "He extracted an oath from the Spartans to keep his laws unchanged until his return. He then went to Delphi, where the oracle confirmed the laws, sent the response back in writing — and never returned. He starved himself to death in exile (Crete or Cirrha) so that the oath would bind Sparta forever.", "id": "fc14"}, {"front": "How long did Lycurgus's constitution last?", "back": "More than five hundred years. Plutarch says it persisted 'like some deep and thoroughly ingrained tincture, retaining their hold upon the nation'. Sparta as the rest of Greece knew it — Thermopylae, the Peloponnesian War — was Lycurgan Sparta.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
