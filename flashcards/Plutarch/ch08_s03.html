    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

        </div>

    <script>
    var CARDS = [{"front": "What were Caesar's birth year and family background?", "back": "Gaius Julius Caesar was born in 100 BC into a patrician family of modest political standing. The family was ancient — it claimed descent from the Trojan Aeneas and through him from Venus — but not, in the late Republic, wealthy or powerful. His career would change that.", "id": "fc01"}, {"front": "Summarize Plutarch's pirate story.", "back": "Cilician pirates captured the young Caesar and demanded a ransom of twenty talents. Caesar laughed and told them they should have asked for fifty; they did. While his retinue raised the money, he lived among the pirates as a sort of guest, sharing their food, reading them his poems and orations, and telling them with cheerful familiarity that as soon as he was free he would have them all crucified. They thought he was joking. He was not. After the ransom was paid he raised a small fleet, captured them, and crucified them — though, in a small mercy, he had their throats cut first so the crucifixion would be painless.", "id": "fc02"}, {"front": "What does the section say the pirate story reveals about Caesar?", "back": "At twenty-five he was already the man who would say a thing with a smile and then do it. Plutarch tells the story without comment, but its weight is unmistakable.", "id": "fc03"}, {"front": "How did Caesar's early political spending work?", "back": "He spent heavily on public games to build popular goodwill and borrowed heavily to fund the spending. By the time he reached the praetorship he was massively in debt and politically suspect — his debts were thought to make him desperate, and his desperation made him dangerous.", "id": "fc04"}, {"front": "What was the First Triumvirate, and when did it form?", "back": "In 60 BC, the private and informal arrangement of Caesar, Pompey (the most successful general of the previous generation), and Crassus (the richest man in Rome). The three men's combined clout could carry any vote in the assembly.", "id": "fc05"}, {"front": "What did Caesar accomplish as consul in 59 BC?", "back": "He pushed through laws giving Pompey's veterans land and confirming Crassus's tax-farming contracts, and he secured for himself a five-year proconsular command in Gaul.", "id": "fc06"}, {"front": "Describe the scale of the Gallic War.", "back": "58-50 BC. Caesar came to Gaul with four legions (perhaps twenty thousand men) and campaigned continuously for eight years against the Helvetii, the Germans, the Belgae; he crossed the Rhine twice and twice invaded Britain. By the end he had killed perhaps a million people and enslaved as many more (by the figures Plutarch gives), and had added a vast new province that would remain Roman for five hundred years.", "id": "fc07"}, {"front": "What were the political and personal payoffs of the Gallic War for Caesar?", "back": "He paid off all his debts, built up a private fortune, and acquired an army of veterans personally loyal to him.", "id": "fc08"}, {"front": "What forced Caesar's choice at the Rubicon, and what did he say?", "back": "By 50 BC his command was ending. The Senate, controlled by his enemies and by his estranged ally Pompey, demanded that he disband his army and return to Rome to face prosecution. The Senate declared him a public enemy. He had a choice — submit to legal destruction or march on the city. Plutarch's account preserves the moment of hesitation; he weighed the greatness of the enterprise, then said to his friends, \"The die is cast,\" and hurried to the passage.", "id": "fc09"}, {"front": "What was the Rubicon, legally and geographically?", "back": "A small stream marking the boundary between Caesar's province and Italy proper. By Roman law, no commander could bring an army across it. Crossing was an act of civil war.", "id": "fc10"}, {"front": "How did the civil war end?", "back": "It lasted four years. Caesar defeated Pompey at Pharsalus in Greece (48 BC); Pompey fled to Egypt and was murdered by Egyptian courtiers; Caesar pursued, established Cleopatra on the Egyptian throne, and then defeated Pompey's remaining supporters in Africa and Spain. By 45 BC he was sole master of the Roman world.", "id": "fc11"}, {"front": "What does dictator perpetuo mean?", "back": "\"Dictator for life.\" Under the old Roman constitution it made Caesar essentially a king without the title. It was the office that proved politically intolerable to the Roman senatorial class.", "id": "fc12"}, {"front": "Name three of Caesar's reforms under his dictatorship.", "back": "The Julian calendar (essentially still ours), reorganization of the courts, veterans' land grants, reduction of the grain dole, and the extension of Roman citizenship to provincials. (Any three of these are correct.)", "id": "fc13"}, {"front": "What is clementia Caesaris, and how did it shape the conspiracy?", "back": "Caesar's famous magnanimity — pardoning many of his civil-war enemies and readmitting them to the Senate. Several of his pardoned enemies, including Marcus Brutus, organized the conspiracy that killed him. The mercy he had practiced helped prepare his end.", "id": "fc14"}, {"front": "Who was Marcus Brutus, and why was his role weighted with ancestral meaning?", "back": "The chief plotter, a man Caesar himself had pardoned during the civil war and made consul. He was a descendant of the Brutus who had expelled the Tarquins (Chapter 4) — a man who took his ancestral mythology seriously.", "id": "fc15"}, {"front": "Describe the assassination scene as Plutarch tells it.", "back": "On March 15, 44 BC, Caesar attended a Senate meeting in the Theater of Pompey. The conspirators surrounded him, ostensibly to present a petition. Tillius Cimber grabbed his toga; the others drew daggers. He was struck twenty-three times. They had agreed that every one of them should give him one wound, and Brutus gave him one stab in the body. When Caesar saw Brutus's sword drawn, he covered his face with his robe and, without further resistance, fell — at the foot of the statue of Pompey, which was thus stained with the blood of his enemy.", "id": "fc16"}, {"front": "What were Caesar's last words according to Plutarch, and how does Shakespeare's version relate to them?", "back": "According to Plutarch's tradition, Caesar's last words were Greek, addressed to Brutus: \"kai su, teknon?\" — \"You too, my son?\" Suetonius reports the same line, and Shakespeare's \"Et tu, Brute?\" is the Latin version of the Greek.", "id": "fc17"}, {"front": "What was the political aftermath of the assassination?", "back": "The assassins had hoped that with Caesar dead the Republic would revive. It did not. The civil wars that followed (44-31 BC) were worse than those Caesar had won; they ended with the establishment of his great-nephew Octavian (later Augustus) as princeps — the de facto monarch under republican appearances. Brutus and Cassius died at Philippi in 42 BC; Antony and Cleopatra at Actium in 31 BC; the Republic, as a functioning institution, did not survive any of these.", "id": "fc18"}, {"front": "How does Plutarch's portrait of Caesar handle the moral question?", "back": "With characteristic restraint. Plutarch does not condemn Caesar; he does not exalt him. He shows you the man — brilliant, brave, magnanimous, politically indomitable, ruthlessly funny — and the deeds — a million Gauls killed, the Rubicon, the end prepared by his own clemency — and lets the weight of it press on the reader's own moral imagination.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
