<html lang="en">
<head>

    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the shared shape of the careers of Alcibiades and Coriolanus, in Plutarch's pairing?", "back": "Different in texture but identical in shape: gifted, prominent, exiled, traitor. Each was a brilliant man who served his city, was cast out, and then led a foreign army against the home that had exiled him.", "id": "fc01"}, {"front": "What is the central question of the chapter?", "back": "How does a brilliant man go wrong? And, as a closely related question, when does the city's mistreatment of the brilliant man justify his betrayal of the city?", "id": "fc02"}, {"front": "When did Alcibiades live, and what was his political pedigree?", "back": "Roughly 450 to 404 BC. He was a ward of Pericles, a student of Socrates, and a man of staggering beauty and wealth who became Athens's leading political and military figure after Pericles's death.", "id": "fc03"}, {"front": "What was the Sicilian Expedition, and what role did Alcibiades play in it?", "back": "A massive naval and land expedition launched by Athens in 415 BC against Syracuse — the largest Greek military undertaking ever attempted. Alcibiades proposed and helped lead it.", "id": "fc04"}, {"front": "What was the Herms incident, and what did it cost Alcibiades?", "back": "Just before the Sicilian Expedition sailed, an unknown vandal mutilated the statues of Hermes at Athenian doorways. Alcibiades's enemies accused him of the sacrilege, engineered a conviction in absentia, and sentenced him to death.", "id": "fc05"}, {"front": "What three pieces of strategic advice did Alcibiades give the Spartans after his defection?", "back": "1) Send Spartan generals to advise Syracuse. 2) Fortify Decelea inside Attica permanently. 3) Revolt the Athenian allies in Asia. All three strategies worked and helped destroy the Athenian empire.", "id": "fc06"}, {"front": "How does Plutarch's tone in narrating the betrayal function as a moral judgment?", "back": "Plutarch's biography handles the betrayal with 'a level of cool that is itself a moral comment' — the restraint of the prose registers the weight of the act without melodrama.", "id": "fc07"}, {"front": "Who was Coriolanus, and how did he earn that name?", "back": "A patrician general of the early Roman Republic (legendary date, fifth century BC). He earned the surname Coriolanus by his single-handed seizure of the Volscian city of Corioli.", "id": "fc08"}, {"front": "Why was Coriolanus defeated in his bid for consul?", "back": "The people would not vote for him because of his open disdain for them; he refused to lower himself to canvass them.", "id": "fc09"}, {"front": "What was Coriolanus's proposal during the Roman bread crisis?", "back": "That the imported Sicilian grain be sold only at the old high price, and only to plebs who would renounce the recently-won office of tribune of the people — he wanted to use the famine to roll back the plebeian political gains.", "id": "fc10"}, {"front": "What is the Plutarchan idea of the character-revealing childhood incident, and what examples does the chapter give?", "back": "The idea that small early moments predict the adult character. Examples: Alcibiades's wrestling-bite ('you bite like a woman' / 'no, like a lion') and his lying in front of the loaded cart show the same will-not-be-made-to-lose temperament. Coriolanus's devotion to his mother Volumnia is the formative bond of his life.", "id": "fc11"}, {"front": "Who served as the moral counterweight for each man?", "back": "Socrates for Alcibiades (saved his life at Potidaea, the only man Alcibiades respected) and Volumnia for Coriolanus (raised him after his father's death, stopped him at the gates of Rome).", "id": "fc12"}, {"front": "What are the two styles of contempt for the multitude that the chapter identifies?", "back": "Alcibiades flatters the people, manipulates them, and despises them privately. Coriolanus despises them openly and refuses to flatter. The synkrisis will weigh which is the more contemptible style.", "id": "fc13"}, {"front": "How is Shakespeare's Coriolanus related to Plutarch's, and why does it matter?", "back": "Shakespeare drew his tragedy almost verbatim from Plutarch through Sir Thomas North's 1579 English translation. Volumnia's great speech at the gates of Rome and Coriolanus's refusal to show his wounds are Plutarch's scenes Shakespeare turned into theater. The Christian moral tradition has read Plutarch's Coriolanus through Shakespeare's.", "id": "fc14"}, {"front": "Who is the Second Witness for this chapter, and on which side?", "back": "For the Greek side, Thucydides's account of the Sicilian Debate in Book VI of his History, where Alcibiades's case for the expedition is given alongside Nicias's against it. The Roman side has no separate Second Witness here; Plutarch's Life of Coriolanus is essentially the only narrative.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
