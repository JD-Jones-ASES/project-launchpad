<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 10, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is the synkrisis of ch10 unique within the Parallel Lives?", "back": "It is the only joint comparison Plutarch wrote — four men in a single synkrisis, weighed across two centuries and two cultures against one common project of redistributive reform.", "id": "fc01"}, {"front": "On Axis 1, natural endowment and education, who comes out slightly ahead?", "back": "The Spartans. The Gracchi had a Roman “genius to virtue” improved by a generous education; the Spartans had similar natural gifts and yet had to swim against the corruption of late-classical Sparta. The Spartan achievement on this axis is slightly more impressive.", "id": "fc02"}, {"front": "On Axis 2, personal integrity in money, who wins?", "back": "Agis decisively. He distributed his own private fortune; the Gracchi merely kept clean hands in office. Both pass the test, but Agis goes further.", "id": "fc03"}, {"front": "On Axis 3, the scale of the political project, how does Plutarch decide?", "back": "A draw. The Spartan project was deeper — a “thorough reformation” that restored the city to its ancient state — while the Roman was more surgical: settlement of cities, recovery of public lands, equestrian-juror reform.", "id": "fc04"}, {"front": "On Axis 4, opposition faced, who comes out ahead?", "back": "The Gracchi. They fought “men of the greatest influence” without any foundational precedent to lean on; the Spartans had Lycurgus's “great and glorious precedent” at their backs.", "id": "fc05"}, {"front": "Whose death does Plutarch consider the noblest?", "back": "Agis's. Plutarch says Agis “willingly submitted to his fate, rather than any citizen should be in danger of his life.” Cleomenes “generously fell by his own hand” after revenge failed; the Gracchi's flight is defended as an “honorable retreat from endangering of others.”", "id": "fc06"}, {"front": "On Axis 6, civil violence, who is condemned and who absolved?", "back": "Cleomenes is condemned for unjustly killing the ephors when he might have won them by superior arms; the Gracchi are absolved — “neither the one nor the other was the first to shed the blood of his fellow-citizens.”", "id": "fc07"}, {"front": "What is Plutarch's famous “knife” line?", "back": "“To use the knife, unless in the extremest necessity, is neither good surgery nor wise policy, but in both cases mere unskillfulness; and in the latter, unjust as well as unfeeling.”", "id": "fc08"}, {"front": "On Axis 7, procedural innovation, what is Plutarch's charge against Tiberius?", "back": "The deposition of his fellow tribune Marcus Octavius — “the greatest crime that can be laid to Tiberius's charge.” Cleomenes's coup is on the same axis but more violent. Round seven a draw.", "id": "fc09"}, {"front": "What is Plutarch's closing four-way ranking?", "back": "“I should affirm Tiberius to have excelled them all in virtue; that young Agis had been guilty of the fewest misdeeds; and that in action and boldness Caius came far short of Cleomenes.” Tiberius most virtuous, Agis least guilty, Cleomenes most effective, Gaius least effective.", "id": "fc10"}, {"front": "Why is this ranking unusually carefully discriminated?", "back": "Because Plutarch refuses to rank the four on a single scale. Each man wins a different axis — virtue, innocence, effectiveness, and (silently) the highest political stakes — and none is dismissed.", "id": "fc11"}, {"front": "What political question lies behind the personal evaluations?", "back": "Can redistributive reform be achieved peacefully? The four cases together suggest: probably not in societies where wealth has been long concentrated. Agis tried legal means and was killed before reforming anything; Cleomenes used violence and succeeded briefly; the Gracchi tried legal means and were killed.", "id": "fc12"}, {"front": "What does the pattern of all four cases suggest about the moneyed class?", "back": "Each project was opposed by the moneyed class with all available political instruments and eventually with murder. The chapter raises but does not resolve the question of whether a more skillful reformer — a Solon or a Publicola — might have done better in either Sparta or Rome.", "id": "fc13"}, {"front": "What axis does Plutarch invite the student to test on “persuasion or force”?", "back": "Two reformers (Agis, the Gracchi) tried persuasion; two (Cleomenes, and arguably Tiberius in deposing Octavius) used force. Plutarch generally finds against force. The student is asked: is the purely persuasive reformer doomed, or is the cost of force always too high?", "id": "fc14"}, {"front": "What is the writing-exercise prompt for this chapter?", "back": "Write a four-way synkrisis of Agis, Cleomenes, Tiberius, and Gaius Gracchus (600–1,000 words). Possible axes: persuasion vs. force; reform from above vs. from below; testing Plutarch's specific ranking; the cost of refusing reform on the political class's part.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
