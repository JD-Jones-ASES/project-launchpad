<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 12, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Plutarch's religion", "back": "Plutarch was a pagan. He died around 120 AD; he was a Greek priest of Apollo at Delphi; he almost certainly never read a Christian text and possibly never met a Christian. His religion was the Olympian polytheism of educated late-antique paganism.", "id": "fc01"}, {"front": "Eusebius of Caesarea", "back": "The first great Christian historian (c. 263-339). His Life of Constantine was the first sustained Christian biography of an emperor and a consciously Plutarchan biography in form — moral focus on character, attention to revealing small acts, honest weighing of virtues and vices.", "id": "fc02"}, {"front": "Praeparatio evangelica", "back": "Eusebius's framework: \"preparation for the Gospel.\" The great pagan philosophers and moralists — Plato, Aristotle, the Stoics, Plutarch — were not outside the divine economy. Their insights into virtue, justice, and the soul were partial truths that Christian revelation would complete.", "id": "fc03"}, {"front": "Medieval indirect access", "back": "In the Latin West, direct access to Plutarch was lost (Greek rarely read between roughly 600 and 1300 AD). The Plutarchan habit was preserved indirectly through Cicero (absorbed Greek philosophical biography), Boethius (Consolation echoes Plutarchan moralism), and the lives of the saints.", "id": "fc04"}, {"front": "Lives of the saints", "back": "The most direct medieval descendants of Plutarchan biography. The Life of Saint Augustine, the Life of Saint Francis, the Bollandist hagiographies (17th c.) all share Plutarch's intuition: a holy person's character is discerned through close attention to revealing acts, and the biographer serves the moral education of the reader.", "id": "fc05"}, {"front": "Renaissance recovery: Petrarch", "back": "Petrarch almost single-handedly invented the Renaissance project of recovering ancient texts and read what Plutarch he could find. By the late fifteenth century the Lives were in Greek manuscripts; by 1517 in print; by mid-sixteenth century in Latin and the major European vernaculars.", "id": "fc06"}, {"front": "Erasmus and Plutarch", "back": "Desiderius Erasmus (1466-1536), the great Dutch humanist, read Plutarch constantly and incorporated him into the new Christian humanist curriculum. His Apophthegmata (a collection of moral sayings) drew heavily on Plutarch's Sayings of Kings and Commanders from the Moralia.", "id": "fc07"}, {"front": "Montaigne's two pillars", "back": "Michel de Montaigne (1533-1592), the French essayist, made Plutarch one of the two pillars of his writing (with the Stoic Seneca). He quoted Plutarch on nearly every page; \"Of Cato the Younger\" and \"Of Glory\" are essentially extended meditations on Plutarchan themes. His habit of weighing rival lives is consciously Plutarchan.", "id": "fc08"}, {"front": "Sir Thomas North's Christian framing", "back": "North (1535-1604) made Plutarch into an English moral classic. His introduction explicitly framed Plutarch as suitable Christian reading: \"He maketh men virtuous, who would not else have been virtuous; he gathereth the good and refuseth the bad; in fine, he is so excellent a craftsman of life and manners that... ye need ask for no more.\"", "id": "fc09"}, {"front": "John Henry Newman", "back": "Lives of the English Saints (1844-45). Newman, an Anglican on his way to becoming a Catholic cardinal, brought the Plutarchan attention to character to the English saints of the medieval period.", "id": "fc10"}, {"front": "Boswell's Life of Samuel Johnson", "back": "Published 1791. The closest modern English equivalent of a Plutarchan biography: attentive to the small revealing detail, organized around character, sustained over many years of intimate observation.", "id": "fc11"}, {"front": "Metaxas's Bonhoeffer", "back": "Eric Metaxas, Bonhoeffer: Pastor, Martyr, Prophet, Spy (2010). Dietrich Bonhoeffer's life told as moral biography in the Plutarchan mode — attention to character, to formation, to decisive acts in moments of revelatory crisis.", "id": "fc12"}, {"front": "Three implications for the Christian reader", "back": "(1) The Christian tradition has always read Plutarch as a friend, a partial witness rather than a competitor. (2) The comparative moral biography form he invented became a Christian form (saints' lives, Boswell's Johnson). (3) The moral seriousness he modeled is the same the Christian tradition has tried to cultivate.", "id": "fc13"}, {"front": "The continuous line", "back": "Eusebius -> Augustine -> Erasmus -> North -> Newman -> Metaxas. The chapter insists this line is continuous: Plutarch read across two thousand years not as a competitor to Christian truth but as a preparatory voice for it.", "id": "fc14"}, {"front": "The chapter's final claim", "back": "The deeper reason Christians have read Plutarch for two thousand years is not anything peculiar to Christianity. It is something about the human soul. The kind of close moral attention Plutarch practiced is what the soul wants — for the Christian reader and the human reader alike.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
