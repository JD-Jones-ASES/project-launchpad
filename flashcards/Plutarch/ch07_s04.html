    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the surprising verdict of the synkrisis?", "back": "By the count of axes, Plutarch tilts toward Alcibiades — even though on most readings of personal character Coriolanus is the more admirable man. The genuine surprise is that the political flatterer is judged less destructive than the proud refuser.", "id": "fc01"}, {"front": "What does Plutarch say about military ability (Axis 1)?", "back": "'Their military ones, we may say, incline the balance very decidedly upon neither side.' Both displayed courage and generalship; Alcibiades won more victories in independent command, slightly favoring him.", "id": "fc02"}, {"front": "What is Plutarch's striking verdict on Axis 2 (style of seeking power)?", "back": "'A man who ingratiates himself by indulgence and flattery is hardly so censurable as one who, to avoid the appearance of flattering, insults.' Flattery seeks power by lowering oneself; pride seeks power by lowering others. Round to Alcibiades.", "id": "fc03"}, {"front": "How does the synkrisis weigh the provoking of war (Axis 3)?", "back": "Alcibiades treacherously broke the Athens-Sparta peace, but in doing so gained Athens the alliance of Argos and Mantinea — a real strategic asset. Coriolanus stirred up the Volscian war by spreading false rumors, 'simply to gratify anger.' Round to Alcibiades.", "id": "fc04"}, {"front": "How does the synkrisis weigh behavior in exile (Axis 4)?", "back": "Both turned on their cities and led foreign armies. But Alcibiades relented when Athens recalled him; he came back and served. Coriolanus refused all embassies and priests, was moved only by his mother, and acted not to reconcile but 'to destroy and overthrow.' Round to Alcibiades.", "id": "fc05"}, {"front": "What is Coriolanus's 'special problem' on Axis 5?", "back": "The contradiction in his attitude toward the people: he refused to court favor because he despised them, yet resented the people for not honoring him. Plutarch's epigram: 'He who least likes courting favor, ought also least to think of resenting neglect.'", "id": "fc06"}, {"front": "What is the central political claim of the synkrisis?", "back": "'He who least likes courting favor, ought also least to think of resenting neglect.' If you will not flatter the people, you have given up the right to be angry when they neglect you. The contradiction was in Coriolanus, not in Rome.", "id": "fc07"}, {"front": "How does the synkrisis weigh money and incorruptibility (Axis 6)?", "back": "Alcibiades was famously corrupt: bribes, extravagance, luxury. Coriolanus declined to receive money 'even when pressed upon him by his commanders as an honor.' Round decisively to Coriolanus.", "id": "fc08"}, {"front": "How does the synkrisis weigh temperance and personal life (Axis 7)?", "back": "Coriolanus was chaste, austere, devoted to his mother. Alcibiades was a famous debauch, drinker, libertine. Round decisively to Coriolanus.", "id": "fc09"}, {"front": "Why does Plutarch's overall verdict still favor Alcibiades despite Coriolanus's personal virtue?", "back": "The argument is essentially political. Coriolanus, despite his personal virtues, did more damage because his pride could not be appeased short of his city's destruction, while Alcibiades's vanity could always be re-flattered into service. The man who can be talked back is, politically, the safer figure.", "id": "fc10"}, {"front": "What deeper lesson does the chapter say the verdict cuts against?", "back": "The romantic Western admiration for the proud, austere, principled hero who refuses to compromise. Plutarch is saying political life requires suppleness, and that even bad suppleness (Alcibiades's) is politically less destructive than principled rigidity (Coriolanus's).", "id": "fc11"}, {"front": "What complication does the chapter note about actual political damage?", "back": "Alcibiades cost Athens her empire. Coriolanus cost Rome nothing in the end, because his mother turned him aside. The political damage was much less on the Roman side — a real fact the synkrisis does not weigh as heavily as it might.", "id": "fc12"}, {"front": "How does the Christian moral tradition read Coriolanus?", "back": "More sympathetically than Plutarch. It sees in Coriolanus a tragic figure whose virtues — loyalty to mother, contempt for corruption — became, in the wrong political environment, his destruction. Shakespeare's Coriolanus (1607) emphasizes a kind of inarticulate grandeur in the protagonist.", "id": "fc13"}, {"front": "How is Plutarch different from the Christian–Shakespearean reading?", "back": "Plutarch is less sentimental. He sees the same virtues but is more attentive to their political cost. The Christian-Shakespearean Coriolanus is more sympathetic than his ancient biographer would have allowed. Both readings are defensible.", "id": "fc14"}, {"front": "What does the writing prompt ask the student to do?", "back": "Write your own synkrisis of Alcibiades and Coriolanus (600-1,000 words). State the chosen axis in the first sentence, cite two specific incidents from each Life, render judgment, and stay under 1,000 words. Suggested axes: the political danger of each style of contempt; the role of the moral counterweight (Socrates, Volumnia); the exile that becomes a betrayal; and Plutarch's verdict itself.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
