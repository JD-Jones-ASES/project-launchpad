    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Publicola's family background", "back": "Publius Valerius came from one of the oldest patrician families of Rome. His ancestor — the original Valerius — had negotiated peace between Romulus's Romans and the Sabines after the abduction of the Sabine women. The family was distinguished for combining wealth with public-spirited generosity.", "id": "fc01"}, {"front": "Lucretia and the trigger of the revolt", "back": "Lucretia, raped by Tarquin the Proud's son Sextus, summoned her husband and father, made them swear vengeance, and stabbed herself with a knife she had hidden in her dress. Lucius Junius Brutus — pretending to be a half-wit to escape Tarquin's suspicion — drew the knife from her body and swore by her blood to abolish the monarchy.", "id": "fc02"}, {"front": "The founding oath of 509 BC", "back": "Two consuls were elected to share the former royal power. The Romans swore (as Livy records) 'that they would suffer no one to be king in Rome.' The oath was renewed every year at the consular inauguration and bound Roman politics for nearly five hundred years, until Augustus.", "id": "fc03"}, {"front": "Vindicius the slave-informer", "back": "A slave who overheard the royalist plotters — including Brutus's own two sons — conspiring to admit the exiled Tarquins back into Rome. He brought the information to Publicola, who handled the arrest, raided the conspirators' house, and seized incriminating letters.", "id": "fc04"}, {"front": "Brutus's execution of his sons (Plutarch's verdict)", "back": "Brutus called his sons Titus and Tiberius by name, asked them three times if they had any defense, and on hearing silence turned to the lictors with the words 'What remains is your duty.' The lictors stripped, bound, scourged, and beheaded them while Brutus watched without softening his face. Plutarch's verdict: 'either divine or brutish' — he refuses to decide which.", "id": "fc05"}, {"front": "Publicola's part in the conspiracy trial", "back": "When Collatinus (Brutus's softer-hearted colleague) tried to release the witness Vindicius and treat the Aquillian nobles leniently, Publicola publicly opposed him and prevented the escape. The Republic, in its first year, almost died of mercy; Publicola was the man who stopped that from happening.", "id": "fc06"}, {"front": "The death of Brutus at the Arsian wood", "back": "Brutus and Aruns (Tarquin's son) charged one another in single combat and killed each other. Publicola returned to Rome with the bodies, gave Brutus the first state funeral with a published eulogy, and became in effect the chief republican statesman.", "id": "fc07"}, {"front": "Provocatio — the right of appeal", "back": "A consul could no longer execute a Roman citizen on his own authority; the citizen had the right to appeal to the assembly. Plutarch calls this perhaps Publicola's most important law. It became foundational to Roman liberty.", "id": "fc08"}, {"front": "The lowering of the fasces", "back": "When a consul appeared before the people in the assembly, his lictors lowered the bundles of rods around the axe — a visible sign that, in the assembly, the consul was beneath the people, not above them. The custom continued for the rest of Roman history.", "id": "fc09"}, {"front": "The quaestorship", "back": "Publicola separated the treasury from the consulship by creating the office of quaestor to manage public funds. The new office made it more difficult for a consul to enrich himself in office or use money to bid for permanent power.", "id": "fc10"}, {"front": "Death penalty for would-be tyrants", "back": "Anyone who attempted to seize sovereign power was to be killed on the spot, without the protection of the appeal Publicola had just granted ordinary citizens. The asymmetry — great protection for ordinary Romans, none for would-be kings — was deliberate.", "id": "fc11"}, {"front": "The Valerian laws (lex libertatis)", "back": "The collective name for Publicola's republican reforms — provocatio, the lowering of the fasces, the quaestorship, and the death penalty for would-be tyrants. Later Romans called them simply 'the law of liberty'; Publicola was the principal architect of the republican constitution.", "id": "fc12"}, {"front": "Demolition of the house and the cognomen", "back": "When some Romans complained that Publicola's hilltop house on the Velia made him look like Tarquin, he sent for workmen at night, pulled the house down by morning, and went to lodge with friends — without a roof of his own. The gesture earned him the cognomen Publicola: 'friend of the people.'", "id": "fc13"}, {"front": "Livy as Second Witness", "back": "Livy treats Brutus the Liberator (not Publicola) as Rome's central political founder. 'Brutus was, with the consent of his colleague, first attended by the fasces, who had not been a more zealous assertor of liberty than he was afterwards its guardian.' Plutarch acknowledges Brutus but credits Publicola with the institutional engineering — Brutus did the founding deed, Publicola the durable scaffolding.", "id": "fc14"}, {"front": "Publicola's death and public funeral", "back": "Died in office in 503 BC after four consulships and six years of service. Mourned 'as that of a son, brother, or common father.' The matrons of Rome went into mourning as for a kinsman. Funeral paid from the public treasury — one of the first public funerals in Roman history — because Publicola had died comparatively poor, his fortune spent in service of the city.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
