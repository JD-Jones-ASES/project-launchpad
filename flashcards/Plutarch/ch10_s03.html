    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 10, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who were the Gracchi's parents?", "back": "Their father was twice consul and censor. Their mother Cornelia, widowed young, was the daughter of Scipio Africanus (the conqueror of Hannibal); she raised her sons with extraordinary care and refused remarriage even to a king of Egypt because she preferred the title “mother of the Gracchi.”", "id": "fc01"}, {"front": "What did Tiberius see on his journey through Etruria?", "back": "That all the farm work was being done by slaves; the small Italian peasantry had disappeared. The observation crystallized his sense of the demographic crisis.", "id": "fc02"}, {"front": "What was the demographic crisis of late-second-century Rome?", "back": "The wars of the previous century had bled the small farmer class. Wealthy senatorial families had moved in on the abandoned land — technically Roman public land — and worked it with slaves. The landless poor flowed into Rome as an urban proletariat, and the citizen militia was running out of qualified men.", "id": "fc03"}, {"front": "What was the lex Sempronia agraria?", "back": "Tiberius's law to enforce the existing legal limit of 500 iugera on any one citizen's occupation of public land. Excess land was to be recovered and redistributed in 30-iugerum plots to the landless, inheritable but not alienable.", "id": "fc04"}, {"front": "How did the law treat existing holders?", "back": "Generously by legal standards: they could keep their original 500 iugera plus 250 for each of their two oldest sons, and would be compensated for improvements on land taken back. The law was moderate; politically it was incendiary.", "id": "fc05"}, {"front": "How did Tiberius break Marcus Octavius's veto?", "back": "By the procedurally revolutionary step of calling for a vote to depose Octavius from the tribunate. The vote passed (with constitutional irregularity), Octavius was removed, and the agrarian law went through.", "id": "fc06"}, {"front": "Who served on the agrarian commission of three?", "back": "Tiberius himself, his brother Gaius, and his father-in-law Appius Claudius. The commission was set up to implement the redistribution.", "id": "fc07"}, {"front": "How did Tiberius die?", "back": "On the Capitol on election day in 133 BC. The pontifex maximus Publius Scipio Nasica led a mob of senators — armed with the broken legs of their own benches as clubs — and beat Tiberius and three hundred of his supporters to death. Their bodies were thrown into the Tiber. Tiberius was thirty.", "id": "fc08"}, {"front": "Why does the chapter call the killing of Tiberius politically momentous?", "back": "It was the first political killing in Rome in three centuries, carried out by senators against a sitting magistrate, however irregularly elected. It would echo through Roman politics for the next century.", "id": "fc09"}, {"front": "What was the breadth of Gaius Gracchus's program (123–122 BC)?", "back": "Restoration of the agrarian commission; monthly state-subsidized grain distribution; criminal-court reform adding equestrians to senatorial juries; Roman colonies including one at the destroyed site of Carthage; reform of state-revenue contracts to favor equestrian tax-farmers; and a proposal to extend Roman citizenship to the Italian allies.", "id": "fc10"}, {"front": "What does the chapter call the largest single political reform of Gaius's program?", "back": "The extension of Roman citizenship to the Italian allies. Together with the equestrian and grain-dole reforms, it built a political coalition the Senate alone could not break.", "id": "fc11"}, {"front": "How did the Senate counter Gaius's coalition?", "back": "By backing a rival popular tribune, Marcus Livius Drusus, who proposed even more generous legislation specifically designed to undercut Gaius's supporters. Gaius lost popular support and failed to win a third tribunate.", "id": "fc12"}, {"front": "What was the senatus consultum ultimum of 121 BC?", "back": "The Senate's first “final decree,” authorizing the consuls to do whatever was necessary to preserve the Republic. The consul Lucius Opimius raised an armed force against Gaius's supporters on the Aventine.", "id": "fc13"}, {"front": "How did Gaius Gracchus die?", "back": "After his supporters were defeated on the Aventine, Gaius escaped across the Tiber to the grove of Furrina with one loyal slave. There the slave killed Gaius at his master's instructions, then killed himself. Three thousand of Gaius's supporters were subsequently executed by Opimius without trial. Gaius was about thirty-three.", "id": "fc14"}, {"front": "What is the long political legacy of the two killings?", "back": "They opened a hundred years of political violence in Rome — Marius and Sulla, the rise of Caesar, the final destruction of the Republic. The senatorial class had learned that political disagreement could be settled by clubs; popular politicians had learned that the Senate could be defeated only by force.", "id": "fc15"}, {"front": "How does Plutarch position the moral responsibility for the violence?", "back": "On those who refused legal redress to a legal program. The Gracchi were killed, he argues, because they could not be defeated in the assembly — and that, in any republican imagination, is not the fault of the man whose program won the votes.", "id": "fc16"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
