    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 12, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Sir Thomas North", "back": "English scholar (1535-1604) whose 1579 translation made Plutarch's Parallel Lives available in English. He worked not from the Greek but from Jacques Amyot's French version of 1559. His vigorous, slightly old-fashioned English became one of the most-read books in Elizabethan England.", "id": "fc01"}, {"front": "Jacques Amyot", "back": "French scholar whose 1559 translation of Plutarch served as the source text for Sir Thomas North's English version. The line of transmission was therefore Greek -> French (Amyot) -> English (North) -> blank verse (Shakespeare).", "id": "fc02"}, {"front": "The three Roman plays", "back": "Julius Caesar (1599), Antony and Cleopatra (1606), and Coriolanus (1608) — Shakespeare's three plays drawn almost line-for-line from Plutarch. The poetry is Shakespeare's; the events, scenes, and moral architecture are Plutarch's.", "id": "fc03"}, {"front": "Julius Caesar's Plutarchan framework", "back": "The play follows Plutarch's Lives of Caesar and Brutus most closely: the soothsayer's warning, the Brutus-Cassius quarrel, the Senate scene, the funeral oration, Philippi, and Brutus's self-killing. Every major incident is Plutarch's.", "id": "fc04"}, {"front": "Shakespeare's theatrical additions to Julius Caesar", "back": "Calpurnia's dream, the supernatural omens in the storm, and the appearance of Caesar's ghost to Brutus before Philippi. The core moral arguments — Brutus's hesitation, his refusal to silence Antony — remain Plutarch's.", "id": "fc05"}, {"front": "Antony's funeral oration (III.ii.74-251)", "back": "The most striking single instance of Shakespearean borrowing. Plutarch gives the speech only a brief notice; Shakespeare expands it into a sustained masterpiece of political rhetoric. The expansion is creation; the seed is Plutarch.", "id": "fc06"}, {"front": "Enobarbus's \"The barge she sat in\"", "back": "Antony and Cleopatra II.ii.196-225. The famous description of Cleopatra is Plutarch's set piece transposed into iambic pentameter with hardly an alteration of fact — a closer translation than anything in Julius Caesar.", "id": "fc07"}, {"front": "Antony in Plutarch vs. Shakespeare", "back": "Plutarch's Antony is a man brought down by his weakness for a woman. Shakespeare's Antony is a man bringing his world down with him. The two readings are compatible but not identical; Shakespeare adds tragic interiority.", "id": "fc08"}, {"front": "Volumnia at the gates of Rome", "back": "Coriolanus V.iii, drawn from the scene read in section 7.3. Shakespeare's translation of Plutarch is here close to literal — the speeches he gives the characters paraphrase what Plutarch reports them as saying.", "id": "fc09"}, {"front": "Coriolanus's moral question", "back": "The play asks, in Plutarchan terms, what kind of man cannot live in his own city. The answer is more discomfiting than the answers in Caesar or Antony — Coriolanus's proud rigidity is harder to admire than Brutus's principle or Antony's passion.", "id": "fc10"}, {"front": "The Plutarchan habit in non-Roman plays", "back": "Comparing two historical figures across an entire play. Hamlet vs. Fortinbras; Henry V vs. the French king; the structural method of the histories. At root this is a Plutarchan habit — the same impulse behind the Parallel Lives.", "id": "fc11"}, {"front": "Other Plutarchan traces in Shakespeare", "back": "A Midsummer Night's Dream (Theseus is in the cast). Timon of Athens (drawing on a brief notice in Plutarch's Life of Antony). Plutarch is present beyond the three Roman plays.", "id": "fc12"}, {"front": "Hazlitt on Shakespeare and Plutarch", "back": "Hazlitt wrote that \"Shakespeare alone, among all writers, has left a portrait of human life as full and as various as the world itself.\" The Parallel Lives gave Shakespeare a similar sense of the variety of human types — they are partners, eighteen centuries apart.", "id": "fc13"}, {"front": "Plutarch + Shakespeare reading practice", "back": "After Ch. 7 (Coriolanus), Ch. 8 (Caesar), and Ch. 11 (Brutus), the natural next step is to read the plays alongside the Lives. Plutarch tells what people did; Shakespeare gives what they felt. Each completes the other.", "id": "fc14"}, {"front": "Writing your own synkrisis of Shakespeare's Brutus and Plutarch's Brutus", "back": "Identified as one of the most sophisticated exercises a high-school humanist can undertake. The form of the comparison is itself Plutarchan — the student becomes a synkrisis-writer about the synkrisis-source.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
