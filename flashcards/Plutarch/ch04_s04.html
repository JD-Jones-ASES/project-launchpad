<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Plutarch: Lives in Parallel &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plutarch.html">&larr; Back to Plutarch: Lives in Parallel</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Plutarch's overall verdict in the synkrisis", "back": "Publicola ranks above Solon on almost every measure — one of the most one-sided verdicts in the book. But the central credit for political invention goes to Solon: he was the greater inventor; Publicola the greater executor.", "id": "fc01"}, {"front": "Axis 1 — Happiness and the end of life", "back": "Plutarch turns Solon's own saying (no one happy until life ends well) back on Solon. Publicola died in office, mourned by all Rome; Solon died in exile, having watched Pisistratus overturn his constitution. Round to Publicola.", "id": "fc02"}, {"front": "Axis 2 — Wealth honestly used", "back": "Both men kept their wealth honestly; Plutarch notes that Publicola also spent his wealth nobly: 'Poplicola's riches were not only justly his, but he spent them nobly in doing good to the distressed.' Round to Publicola.", "id": "fc03"}, {"front": "Axis 3 — The refusal of tyranny", "back": "Solon refused absolute power when offered. Publicola accepted limited power (the consulship) and made it more limited, converting what Plutarch calls a 'despotic command' to a 'popular office.' Round to Publicola.", "id": "fc04"}, {"front": "Axis 4 — The cancellation of debts", "back": "Here Solon decisively wins. The seisachtheia was an original act of civic legislation without parallel in the early Mediterranean. 'A mere law to give all men equal rights is but useless if the poor must sacrifice those rights to their debts.' Publicola did not face the same problem. Round to Solon.", "id": "fc05"}, {"front": "Axis 5 — Originality and dependence", "back": "Solon 'was entirely original, and followed no man's example.' Publicola consciously imitated Solon — the elective offices, the right of appeal, the institution of treasurers. Round to Solon.", "id": "fc06"}, {"front": "Axis 6 — The endurance of the work", "back": "Solon left Athens; within a generation Pisistratus had become tyrant, and the Solonian constitution ran under a tyrant's permission. Publicola stayed in Rome and saw his constitution survive every challenge in his lifetime. Plutarch (writing centuries later): the constitution 'maintained the state in good order down to the civil wars.' Round to Publicola.", "id": "fc07"}, {"front": "Axis 7 — Military and political effectiveness", "back": "Solon's military exploits were small (Salamis was an ingenious stratagem more than a great victory); he failed to prevent Pisistratus's coup. Publicola won several major battles and 'utterly subverted and dissolved a potent monarchy.' Round to Publicola.", "id": "fc08"}, {"front": "Axis 8 — The use of yielding", "back": "Publicola made peace with Lars Porsenna by ceding some territory. Plutarch defends the move: 'judgment is to be made of actions according to the times' — 'by foregoing a part he saves the whole.' Round narrowly to Publicola.", "id": "fc09"}, {"front": "Plutarch's overall paraphrase (the chapter's formula)", "back": "Solon was the greater inventor; Publicola the greater executor. Solon designed the form; Publicola made it work in practice. Together they constitute the beginnings of republican government in the Western tradition.", "id": "fc10"}, {"front": "The reflexivity of the parallel", "back": "Plutarch opens the synkrisis: 'There is something singular in the present parallel, which has not occurred in any other of the lives; that the one should be the imitator of the other, and the other his best evidence.' This is one of the few cases where the pair are linked by actual historical influence — the late-sixth-century Roman read the early-sixth-century Greek and copied him deliberately.", "id": "fc11"}, {"front": "Plutarch's defense of Publicola's debt to Solon", "back": "'Poplicola contributed to [Solon's] glory by his choice of him as his model in the formation of republican institutions.' By imitating Solon, Publicola actually enlarges Solon's reputation rather than diminishing his own.", "id": "fc12"}, {"front": "Three themes that recur in later Lives", "back": "(1) The republican refusal of one-man rule, tested by Themistocles, Pericles, and Caesar; (2) Brutus the Liberator, returning as Marcus Brutus (Ch 11), consciously reenacting the founding deed in killing Caesar; (3) the Solonian distinction between property classes as the foundation of every subsequent Athenian reform.", "id": "fc13"}, {"front": "The synkrisis essay assignment — four axes", "back": "Students choose one: (1) the originator versus the executor; (2) reform from within as moral and political choice; (3) mercy and severity in the founding moment; (4) the lawgiver who left versus the one who stayed. Cite two specific incidents from each Life and render qualified judgment.", "id": "fc14"}, {"front": "Plutarch's warning to dissenters", "back": "Plutarch's verdict (decisively for Publicola) is the most one-sided in this book. The student is free to disagree, but disagreement requires showing where Plutarch's reasoning is wrong, not simply asserting an alternative.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
