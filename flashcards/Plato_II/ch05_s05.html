<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Death of Socrates (Plato II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When did Aristotle first arrive at Plato's Academy and how long did he stay?", "back": "Aristotle arrived in 367 BC at age seventeen and remained at the Academy for twenty years."}, {"front": "What was the historical significance of Plato's Academy?", "back": "Founded by Plato around 387 BC, it was a school that continued in various forms for nearly nine centuries until Roman Emperor Justinian closed it in 529 AD."}, {"front": "Describe Aristotle's family background and early connection to the Macedonian court.", "back": "Born in Stagira, northern Greece, Aristotle's father, Nicomachus, was the personal physician to King Amyntas III of Macedon. This connection likely influenced Aristotle's interest in biology and his later ties to Macedon."}, {"front": "Why did Aristotle leave Athens after Plato's death in 347 BC?", "back": "He possibly left because the leadership of the Academy passed to Plato's nephew Speusippus rather than to him."}, {"front": "What significant activity did Aristotle pursue during his years of travel after leaving Athens?", "back": "He spent several years traveling and conducting extensive biological research on the island of Lesbos."}, {"front": "Who invited Aristotle to tutor a young prince, and who was that prince?", "back": "King Philip II of Macedon invited Aristotle to tutor his son, Alexander, who would later become Alexander the Great."}, {"front": "What school did Aristotle found upon his return to Athens in 335 BC?", "back": "He founded the Lyceum."}, {"front": "How did Aristotle's students at the Lyceum earn the name 'Peripatetics'?", "back": "They were called Peripatetics because Aristotle and his students walked the covered walkways (peripatoi) while discussing philosophy."}, {"front": "Name at least five subjects covered by Aristotle's vast body of work.", "back": "Aristotle's work covered logic, physics, biology, ethics, politics, rhetoric, and poetics."}, {"front": "Why did Aristotle flee Athens after Alexander the Great's death?", "back": "After Alexander's death in 323 BC, anti-Macedonian feeling surged in Athens, and Aristotle, a resident alien with Macedonian connections, was charged with impiety. He chose to flee, reportedly to prevent Athens from 'sinning twice against philosophy' (referring to Socrates)."}, {"front": "What famous Renaissance artwork visually summarizes the philosophical differences between Plato and Aristotle?", "back": "Raphael's fresco, 'The School of Athens' (1509–1511)."}, {"front": "In 'The School of Athens,' what does Plato's gesture symbolize about his philosophy?", "back": "Plato points one finger straight up toward the heavens, holding his Timaeus, symbolizing his belief that the truest realities are eternal, unchanging Forms existing in an invisible world, grasped by the mind alone."}, {"front": "In 'The School of Athens,' what does Aristotle's gesture symbolize about his philosophy?", "back": "Aristotle extends his hand outward, palm down, holding his Nicomachean Ethics, symbolizing his belief that reality is right here, in the visible world of particular things, understood through careful observation and classification."}, {"front": "How did Plato's philosophical temperament and writing style differ from Aristotle's?", "back": "Plato was a poet-philosopher who wrote in dialogue form, using myths and images (like the allegory of the cave) to approach truths through intellectual vision. Aristotle was a biologist-philosopher who classified, categorized, and analyzed, writing systematic, precise, and often dry works resembling lecture notes."}, {"front": "What famous remark attributed to Aristotle captures his respect for Plato while asserting his own intellectual independence?", "back": "“Plato is dear to me, but dearer still is truth” (Amicus Plato, sed magis amica veritas)."}, {"front": "List at least three fundamental philosophical ideas on which Plato and Aristotle agreed.", "back": "They agreed that philosophy is the highest human activity, that virtue is essential to the good life, that knowledge is possible and worth pursuing, and that the soul is more important than the body."}, {"front": "Who was Alexander the Great's famous tutor?", "back": "Aristotle."}, {"front": "What was a significant item Alexander the Great was reported to carry that linked him to Aristotle's influence?", "back": "Ancient sources report he carried a copy of Homer's Iliad annotated by Aristotle on his campaigns."}, {"front": "What phrase is used to summarize the core difference in Plato and Aristotle's approach to knowledge and reality?", "back": "Plato 'soared,' while Aristotle 'sorted.'"}, {"front": "For how many years did Aristotle teach at his own school, the Lyceum?", "back": "He taught there for twelve years."}, {"front": "What was the cultural and geographical distinction of Aristotle's birthplace, Stagira?", "back": "Stagira was a small Greek colony in northern Greece, far from Athens, and culturally as well as geographically closer to the kingdom of Macedon."}, {"front": "What did Plato hope to achieve by writing in an often literary, dramatic, and deliberately ambiguous prose style?", "back": "He wanted his readers to think, not merely to memorize conclusions."}, {"front": "What emperor finally closed Plato's Academy?", "back": "Roman Emperor Justinian closed it in 529 AD."}, {"front": "At what age did Alexander the Great die, and how did his death impact Aristotle's situation in Athens?", "back": "Alexander died at age thirty-two, and his early death left Aristotle politically exposed in Athens due to the subsequent anti-Macedonian sentiment."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
