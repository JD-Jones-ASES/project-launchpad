<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Death of Socrates (Plato II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three main philosophical and literary aspects that make Plato's Phaedo significant?", "back": "The Phaedo is Plato's most sustained argument for the immortality of the soul, his most developed statement of the Theory of Forms, and one of the most moving death scenes in literature."}, {"front": "What is the immediate physical setting and timing of the Phaedo's main conversation?", "back": "The dialogue takes place on the last day of Socrates' life, in the prison at Athens."}, {"front": "Why was Socrates' execution delayed for several weeks?", "back": "His execution was delayed due to a religious festival honoring Apollo, during which Athenians sent a sacred ship to Delos. No executions could take place while the ship was at sea."}, {"front": "What philosophical observation does Socrates make casually on the morning of his death, setting a tone for the dialogue?", "back": "He observes how strange it is that pleasure and pain seem to be 'fastened together,' with one always following the other, demonstrating his continued philosophical thinking."}, {"front": "Describe the 'frame narrative' structure used by Plato in the Phaedo.", "back": "Plato was not present, so the story is told by Phaedo, who was present, to Echecrates, an absent philosopher, in the town of Phlius, creating two layers of narration."}, {"front": "What is the artistic or philosophical effect of Plato using a frame narrative in the Phaedo?", "back": "This structure creates a sense of distance and reflection, filtering the emotions and events through memory, making the account both more intimate and more controlled than a direct narration."}, {"front": "Who is Phaedo in the dialogue, and what is his role?", "back": "Phaedo is a young follower of Socrates and the narrator of the dialogue. He was present at Socrates' death and later recounts the entire story to Echecrates."}, {"front": "Who is Echecrates, and why is his presence as an audience important to the narrative?", "back": "Echecrates is a Pythagorean philosopher from Phlius who did not witness Socrates' death. He serves as the interested audience within the dialogue, whose questions and reactions guide Phaedo's telling, especially regarding arguments about the soul's immortality."}, {"front": "What is Simmias' significant objection to Socrates' arguments about the soul's immortality?", "back": "Simmias objects that the soul might be nothing more than a 'harmony' produced by the body, similar to how music is produced by a lyre, implying it ceases to exist when the body is destroyed."}, {"front": "What is Cebes' key objection regarding the soul's durability, even if it survives the body for a time?", "back": "Cebes grants the soul might be more durable than the body, surviving many deaths and rebirths, but argues it could still eventually 'wear out' like a weaver outlasts many cloaks but finally dies."}, {"front": "Who was Philolaus, and what was his connection to Simmias and Cebes?", "back": "Philolaus was an important Pythagorean thinker. Simmias and Cebes both studied with him in Thebes, which explains their interest in—and doubts about—Socrates' arguments concerning the soul."}, {"front": "How does the Phaedo develop Plato's Theory of Forms more extensively than earlier dialogues?", "back": "In the Phaedo, the Forms take center stage, described as perfect, eternal realities (like Beauty itself, Justice itself) that exist behind changing, imperfect things and can be known by the soul through reason alone."}, {"front": "How did earlier dialogues like the Euthyphro and Apology hint at the Theory of Forms?", "back": "In the Euthyphro, Socrates asked for the single 'form' of piety. In the Apology, he insisted that truth (an eternal reality) matters more than appearances."}, {"front": "How did Plato's view of the afterlife, presented in the Phaedo, contrast sharply with earlier Greek perspectives (e.g., Homer)?", "back": "Plato's Phaedo presented the soul as immortal, existing before birth and surviving after death, residing in a realm of eternal realities. This transformed the earlier bleak Greek view of the dead as mere shades in a dim underworld."}, {"front": "Name two 'familiar faces' from earlier dialogues who are present in the prison scene of the Phaedo.", "back": "Apollodorus (the emotional friend who wept in the Apology) and Crito (the loyal friend who tried to arrange Socrates' escape)."}, {"front": "What is the significance of the Phaedo beyond its philosophical arguments, in terms of its literary impact?", "back": "It is a work of extraordinary literary power, with Socrates' death scene moving readers for centuries, demonstrating philosophy as a way of life that shapes how one faces ultimate tests."}, {"front": "What was Phlius known for, and what kind of philosopher was Echecrates?", "back": "Phlius was a small city in the northeastern Peloponnese, home to a community of Pythagorean philosophers, and Echecrates was one such philosopher."}, {"front": "What is the significance of Socrates' initial casual observation about pleasure and pain ('fastened together') in the Phaedo?", "back": "It immediately establishes that even on the morning of his execution, Socrates remains deeply engaged in philosophical thought, setting a tone for the intellectual discussions to follow."}, {"front": "What specific event did the annual voyage to Delos commemorate, in addition to honoring Apollo?", "back": "It commemorated the mythical journey of Theseus, who sailed to Crete to slay the Minotaur."}, {"front": "What is the overarching theme or main argument that Plato presents in the Phaedo?", "back": "The Phaedo is Plato's most sustained argument for the immortality of the soul."}, {"front": "Who administers the hemlock to Socrates at the end of the dialogue?", "back": "An unnamed attendant of the Eleven, the Athenian magistrates responsible for the prison and executions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
