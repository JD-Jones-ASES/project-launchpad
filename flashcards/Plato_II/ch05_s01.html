    <style>
        .fc-container {
            max-width: 700px;

        .fc-breadcrumb {

        .fc-breadcrumb a {

        /* Card */

            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;

            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;

        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What was the significance of the encounter between Greek philosophy and the Christian tradition?", "back": "It was one of the most consequential events in the history of ideas, leading Plato and Aristotle to become key conversation partners for Christian theology and creating a lasting tension between their visions of reality within Christian thought."}, {"front": "Why did early Christian thinkers, the Church Fathers, find Plato's ideas 'remarkably congenial'?", "back": "Plato's ideas resonated with Christian convictions about God, the soul, and eternal life because he argued for an immortal soul, a reality beyond the physical world, a transcendent highest Good, and the philosopher's task of turning the soul toward higher reality."}, {"front": "How did the concept of 'Logos' bridge Greek philosophy and early Christian thought?", "back": "The author of John's Gospel described Christ as the Logos (the Word, the rational principle that orders all things), a term with deep roots in Greek philosophy, linking divine revelation to natural reason."}, {"front": "What was Justin Martyr's key argument regarding Greek philosophy and Christianity?", "back": "Justin Martyr claimed that Greek philosophy, especially Plato, contained 'seeds of truth' (logoi spermatikoi) planted by the divine Logos, and that all truth, wherever found, belongs to Christians by right."}, {"front": "What role did Neoplatonism play in Augustine of Hippo's intellectual and spiritual journey?", "back": "Augustine found in Neoplatonism (developed Platonic ideas) the doctrine of an immaterial reality and that the Word was with God, which helped him move beyond materialism. However, he noted it lacked the truth that 'the Word became flesh,' affirming that only Christ provides the way to salvation."}, {"front": "What lasting contribution did Augustine make to Western theology concerning Plato?", "back": "Augustine fused Platonic philosophy with Christian faith, emphasizing the immaterial, the soul's direct illumination by God, and the need for divine grace. His works dominated Western theology for a thousand years."}, {"front": "Who was Boethius, and how did his work extend Platonic themes into the Middle Ages?", "back": "Boethius was a Roman statesman and philosopher whose work 'The Consolation of Philosophy' drew heavily on Platonic themes like the soul's ascent to the Good and the distinction between fortune and true happiness, becoming widely read in medieval Europe."}, {"front": "How was Aristotle known in Western Europe for roughly the first thousand years of Christianity, compared to Plato?", "back": "For the first thousand years, Plato was 'the philosopher.' Aristotle was known mainly as a logician through Latin translations of his logical works, but his metaphysics, ethics, and natural philosophy were largely unavailable."}, {"front": "Describe the 'remarkable chain of transmission' that brought Aristotle's major works back to Western Europe.", "back": "After the fall of Rome, Greek learning migrated eastward. Syriac Christians translated Aristotle into Syriac, then his works passed into Arabic. Muslim philosophers in Baghdad, Cordoba, and Cairo preserved and developed them, eventually being translated from Arabic into Latin in the 12th-13th centuries."}, {"front": "Name two influential Islamic philosophers who were central to the medieval recovery of Aristotle.", "back": "Al-Farabi reconciled Plato and Aristotle. Avicenna (Ibn Sina) developed Aristotelian metaphysics. Averroes (Ibn Rushd) produced detailed commentaries on virtually every Aristotelian text, earning him the title 'the Commentator'."}, {"front": "What was the dual impact of the 'full Aristotle' arriving in Western Europe during the 12th and 13th centuries?", "back": "It was thrilling, offering a comprehensive system of philosophy based on observation and rigor. However, it was also deeply troubling because Aristotle's conclusions sometimes conflicted with Christian doctrine, such as the soul as the form of the body (and potentially mortal) or an eternal universe."}, {"front": "What was Thomas Aquinas's greatest achievement in Christian theology?", "back": "Aquinas achieved a monumental synthesis of Aristotelian philosophy with Christian faith, producing the 'Summa Theologica' and demonstrating how faith and reason are complementary paths to truth."}, {"front": "According to Aquinas, what is the relationship between faith and reason?", "back": "Faith and reason are not enemies but complementary paths to truth. Reason can demonstrate God's existence and natural law, while revelation (faith) discloses truths like the Trinity or Incarnation that reason alone cannot reach."}, {"front": "How did Aquinas reconcile Aristotle's concept of the soul (as the form of the body) with Christian belief in immortality and resurrection?", "back": "Aquinas argued that the human rational soul is a special kind of form that can subsist without the body after death, even though it naturally belongs with the body and will be reunited with it at the resurrection."}, {"front": "What are Aquinas's 'Five Ways,' and what philosophical tradition influenced them?", "back": "The 'Five Ways' are five arguments for the existence of God, each starting from observable features of the natural world (motion, causation, contingency, degrees of perfection, purpose) and reasoning to a First Cause. They are indebted to Aristotle's analysis of causes and motion."}, {"front": "How did Aquinas incorporate both Platonic and Aristotelian elements into his philosophical system?", "back": "In Aquinas, the soul is immortal (Plato) and the form of the body (Aristotle). Knowledge comes through the senses (Aristotle) and divine illumination (Plato/Augustine). The physical world is real and good (Aristotle) but ordered toward a transcendent Good (Plato)."}, {"front": "Describe the main tension between 'Augustinian' and 'Thomist' theologians in the late Middle Ages.", "back": "Augustinian theologians (often Franciscans), preferring Plato/Augustine, emphasized the soul's direct illumination by God, primacy of will over intellect, and suspicion of the body. Thomists (Dominicans), following Aquinas, defended the Aristotelian synthesis with its emphasis on intellect, natural reason, and the goodness of creation."}, {"front": "What was Martin Luther's view on Aristotle during the Protestant Reformation?", "back": "Martin Luther famously called Aristotle 'that buffoon who has misled the Church' and urged a return to Scripture and Augustine, which philosophically meant a return to Plato's influence, rejecting the scholastic method tied to Aristotle."}, {"front": "Why did the Protestant Reformers generally prefer Augustine's philosophical leaning over Aquinas's Aristotelian synthesis?", "back": "Their suspicion was partly theological (rejecting scholastic method) and partly temperamental, valuing Augustine's passionate, personal, God-centered vision over Aquinas's systematic, intellectual architecture."}, {"front": "How has Aristotle's influence persisted in Catholic theology despite challenges from the Reformation?", "back": "Catholic theology after the Council of Trent reaffirmed Thomism. In the 19th and 20th centuries, figures like Pope Leo XIII, Jacques Maritain, and Alasdair MacIntyre continued to advocate for Aquinas and Aristotelian thought."}, {"front": "What is a key distinction regarding how Christianity engaged with Greek philosophy, according to the text's 'teacher note'?", "back": "Christianity did not simply adopt Greek philosophy; it transformed it. For example, it agreed with Plato on an immortal soul but insisted it was created, not pre-existent, and with Aristotle that the body is good but insisted on bodily resurrection, not just survival of an abstract form."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
