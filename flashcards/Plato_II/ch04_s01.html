    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What are the main components of the third and final portion of Plato's Phaedo?", "back": "It includes Socrates' intellectual autobiography, his strongest argument for the soul's immortality, a mythological picture of the afterlife, and his famous death scene."}, {"front": "What was Cebes' powerful objection that prompted Socrates' philosophical autobiography?", "back": "Cebes argued that the soul might outlast many bodies but could eventually wear out, just like a weaver making many cloaks eventually dies himself."}, {"front": "What was Socrates' initial philosophical interest as a young man?", "back": "He was passionately interested in natural philosophy, the ancient equivalent of science, seeking to understand the physical causes of natural phenomena."}, {"front": "How did Socrates' early studies in natural philosophy affect him?", "back": "He found himself growing more confused rather than less, with things he once thought obvious becoming puzzling when examined closely."}, {"front": "Who was Anaxagoras, and why was Socrates initially excited by his ideas?", "back": "Anaxagoras was a pre-Socratic philosopher who proposed that Mind (nous) was the cause and ordering principle of all things. Socrates was thrilled, believing this meant everything was arranged for the best and could be explained by its purpose."}, {"front": "Why was Socrates ultimately disappointed with Anaxagoras' philosophy?", "back": "Anaxagoras invoked Mind to initiate the cosmos but then explained particular phenomena by purely physical causes, failing to provide explanations based on purpose or what was 'best'."}, {"front": "What important philosophical distinction did Socrates make regarding 'cause'?", "back": "He distinguished between a true cause (e.g., choosing to accept a verdict) and a necessary condition (e.g., having bones and muscles to sit), arguing that physical mechanisms are not always the true cause."}, {"front": "Explain the metaphor of Socrates' 'second sailing' (deuteros plous).", "back": "It's a nautical metaphor meaning 'Plan B.' When his 'first sailing' (studying reality directly through the senses) failed, he turned to examining reality indirectly through arguments, definitions, and hypotheses (logoi)."}, {"front": "What significant shift in philosophical method does the 'second sailing' represent?", "back": "It marks a decisive turn from relying on sensory perception to investigating reality through the mind, arguments, and rational inquiry, forming the foundation of Plato's method and the Theory of Forms."}, {"front": "What is the 'safest' hypothesis Socrates lays down as the starting point for his philosophical method?", "back": "The existence of the Forms—absolute, perfect, eternal realities such as Beauty itself, Goodness itself, and Greatness itself."}, {"front": "According to Socrates, what is the *aitia* (true cause/explanation) for why a physical object possesses a certain quality, like being beautiful?", "back": "The true cause is that the physical object 'participates in' or shares in the corresponding Form (e.g., a flower is beautiful because it participates in Beauty itself), rather than its physical properties."}, {"front": "How does Socrates describe the process of testing a philosophical hypothesis?", "back": "One should derive its consequences and check for consistency. If the hypothesis itself is challenged, one must 'go up' to a higher, more fundamental principle and test that one, continuing until a sufficient resting place is found."}, {"front": "What is the first step in Socrates' Final Argument for Immortality?", "back": "Forms exclude their opposites (e.g., the Form of Oddness can never be even; Absolute Greatness can never be small)."}, {"front": "What is the crucial 'new insight' introduced in the second step of the Final Argument?", "back": "Concrete things that *carry* a specific Form also exclude its opposite Form (e.g., the number three carries Oddness, so it cannot be even; fire carries Heat, so it cannot be cold)."}, {"front": "In the Final Argument, what does the Greek word *psyche* (soul) always bring with it?", "back": "The soul always brings life. Wherever the soul is present, the body is alive, making the soul the 'life principle'."}, {"front": "Based on the Final Argument, why is the soul considered *athanatos*?", "back": "Because the soul always carries life, it cannot admit its opposite, death. Therefore, the soul is deathless or immortal (*athanatos*)."}, {"front": "What is the fifth and final step of Socrates' Final Argument, which concludes the soul is *anolethros*?", "back": "Since the soul is immortal (*athanatos*), it must also be indestructible (*anolethros*). When death approaches, the soul departs intact to another realm rather than being destroyed."}, {"front": "What is considered the weakest point or 'leap' in Socrates' Final Argument for Immortality?", "back": "The leap from 'immortal' (not subject to death) to 'indestructible' (cannot perish). Critics question if 'not admitting death' necessarily means surviving forever, or if the soul could simply cease to exist, like snow melting in heat."}, {"front": "How does Socrates address the concern that something 'immortal' might still be 'destroyed'?", "back": "He argues that the immortal, by its very nature, must be imperishable, although this step is often seen as requiring significant faith in the argument's underlying logic."}, {"front": "Describe Plato's Theory of Forms, which is foundational to the Final Argument.", "back": "The Forms are perfect, eternal, unchanging realities (e.g., Beauty itself, Justice itself) that exist beyond the physical world. Physical objects are imperfect copies or reflections of these Forms."}, {"front": "What is the philosopher's role in relation to the Theory of Forms?", "back": "The philosopher's task is to ascend from the world of imperfect physical appearances and sensory experience to gain knowledge of the Forms themselves through rational inquiry and the mind."}, {"front": "Using Socrates' analogy, compare the soul's relationship to life with fire's relationship to heat.", "back": "Just as fire always brings heat and cannot admit cold, the soul always brings life and cannot admit death. However, critics note that fire can be extinguished, challenging the idea that the soul cannot be destroyed by death."}, {"front": "How did Socrates believe Anaxagoras' concept of *nous* could explain natural phenomena better than previous natural philosophy?", "back": "He believed *nous* could explain phenomena by their inherent purposes, revealing *why* things were optimally arranged, rather than just *how* they mechanistically occur."}, {"front": "What does the Greek word *athanatos* mean in the context of the soul in the Final Argument?", "back": "*Athanatos* means 'deathless' or 'immortal,' signifying the soul's intrinsic connection to life, meaning it cannot admit or become subject to death."}, {"front": "What does the Greek word *anolethros* mean in the context of the soul in the Final Argument?", "back": "*Anolethros* means 'indestructible' or 'imperishable.' Socrates argues that because the soul is immortal, it must also be indestructible, meaning it departs rather than perishes when death approaches."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
