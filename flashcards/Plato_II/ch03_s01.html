    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What limitation did Simmias and Cebes identify in Socrates' initial arguments (Opposites and Recollection) for the soul's immortality?", "back": "They proved the soul existed *before* birth, but not that it would survive *after* the body dies."}, {"front": "What is the core distinction Socrates makes at the beginning of the Argument from Affinity?", "back": "He distinguishes between two sorts of existence: the visible, changing, and mortal (physical world) and the invisible, unchanging, and divine (world of the Forms)."}, {"front": "According to the Argument from Affinity, what category does the human body belong to?", "back": "The body is visible, physical, and subject to change, belonging to the visible, changing, and mortal realm."}, {"front": "How does Socrates characterize the soul in relation to the two sorts of existence?", "back": "The soul is invisible, reasons, reflects, and contemplates the Forms, thus having a natural affinity with the invisible, unchanging, and divine realm."}, {"front": "Define 'Affinity' (suggeneia) as used in Socrates' argument.", "back": "Affinity means kinship or natural likeness. Socrates argues the soul is akin to the divine and unchanging realm, resembling it but not necessarily identical with it."}, {"front": "What is the main conclusion of Socrates' Argument from Affinity?", "back": "Since the soul resembles the simple and unchanging, it is not the kind of composite, changing thing that can be easily scattered or destroyed, suggesting it is more enduring."}, {"front": "What is the primary limitation of the Argument from Affinity, as identified in the text?", "back": "It is an argument from analogy, showing resemblance rather than strict proof of identity. Resemblance to the immortal does not equate to being immortal."}, {"front": "What is the purpose of the 'Ghost Passage' in the Phaedo?", "back": "It is an imaginative mode of discourse, partly myth and moral teaching, dramatizing the philosophical principle that how one lives shapes the destiny of their soul after death."}, {"front": "According to the Ghost Passage, what happens to souls 'purified by philosophy'?", "back": "They depart to the invisible world of the divine, dwelling in blessedness with the gods."}, {"front": "How does Socrates describe souls 'polluted by the body' in the Ghost Passage?", "back": "They are 'heavy and weighty and earthy,' dragged back toward the visible world, becoming ghosts that prowl tombs because they are still 'cloyed with sight' (attached to the physical)."}, {"front": "What does Socrates suggest about rebirth for souls based on their character?", "back": "Souls are reborn into bodies matching their character, e.g., gluttonous into donkeys, unjust into wolves, moderately virtuous into social creatures like bees or ants."}, {"front": "What key distinction does Plato make regarding virtue in the context of the afterlife?", "back": "Only philosophers who pursued genuine wisdom are admitted to the company of the gods; conventional virtue (temperance out of habit) is insufficient for this ultimate blessedness."}, {"front": "Summarize Simmias' 'Harmony Objection' to the soul's immortality.", "back": "Simmias argues the soul could be like the harmony of a lyre: invisible and beautiful but entirely dependent on the physical instrument. If the body (lyre) is destroyed, the soul (harmony) would cease to exist."}, {"front": "Why is Simmias' Harmony Objection considered the 'most powerful' in the Phaedo?", "back": "It directly challenges the soul's status as an independent substance, aligning with modern intuitions that consciousness is a product or 'harmony' of brain activity, ending with brain death."}, {"front": "Summarize Cebes' 'Weaver Objection' to the soul's immortality.", "back": "Cebes uses the analogy of a weaver who outlasts many coats but eventually dies. He argues that even if the soul is stronger than the body and outlasts many bodies, it doesn't prove the soul is immortal; it could still eventually wear out or dissolve."}, {"front": "What is the key philosophical difference between Simmias' and Cebes' objections?", "back": "Simmias denies the soul is an independent substance at all (it's a byproduct). Cebes grants the soul is an independent substance but denies that its power or longevity implies its absolute permanence/immortality."}, {"front": "How did the characters in the Phaedo (and the narrator) react to Simmias' and Cebes' objections?", "back": "They experienced a 'crisis of confidence,' feeling an unpleasant sensation and losing faith in the previous arguments, leading to questions about the trustworthiness of argument itself."}, {"front": "What is 'Misology,' and how does Socrates explain its origin?", "back": "Misology is the hatred of argument or reason. Socrates explains it arises like misanthropy: repeated disappointment in arguments, akin to repeated betrayals by friends, leading one to conclude no argument can be trusted."}, {"front": "What danger does Socrates identify for his friends after hearing the strong objections?", "back": "They are at risk of becoming misologoi (haters of argument), potentially abandoning the pursuit of truth through reason because they've seen arguments they trusted appear to be ruined."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
