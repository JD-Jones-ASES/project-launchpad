    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "What is the deepest disagreement between Plato and Aristotle concerning the nature of reality?", "back": "Their deepest disagreement concerns what is ultimately real and where genuine knowledge should be sought. Plato looked to separate, ideal Forms, while Aristotle focused on individual substances within the physical world."}, {"front": "According to Plato, what are the Forms (eide or ideai)?", "back": "The Forms are perfect, eternal, unchanging realities (e.g., Beauty, Justice, Equality) that exist independently of the physical world. Particular things in the physical world merely approximate or 'participate' in these Forms."}, {"front": "How did Plato view the relationship between the physical world and the Forms?", "back": "Plato saw the physical world as a 'shadow' or an imperfect copy of the Forms. Physical objects are less real than the ideal Forms, only possessing qualities by participating in the corresponding Form."}, {"front": "For Plato, what is the source of true knowledge?", "back": "True knowledge, for Plato, comes through pure reason and the mind's direct apprehension of the eternal Forms. Knowledge gained through the senses is considered mere opinion."}, {"front": "How does Plato's Cave Allegory illustrate his philosophy?", "back": "It shows people mistaking sensory appearances (shadows on a wall) for reality, while the philosopher is one who 'turns around' and ascends to see the true reality of the Forms, illuminated by the Form of the Good."}, {"front": "What was Aristotle's primary critique of Plato's Theory of Forms?", "back": "Aristotle argued that Plato put the 'form' in the wrong place. While agreeing that things have an essential nature (form), he rejected the idea that forms exist in a separate, heavenly realm apart from the things themselves."}, {"front": "Define Hylomorphism in Aristotle's philosophy.", "back": "Hylomorphism is Aristotle's doctrine stating that every physical substance is a composite of matter (the stuff it's made of) and form (the structure or essence that makes it the kind of thing it is). Neither exists independently in the physical world."}, {"front": "What is an Aristotelian 'Substance'?", "back": "A substance is a concrete, individual thing that exists in its own right (e.g., this horse, this person, this oak tree). It is the primary kind of being and the basic foundation of reality, upon which all other qualities depend."}, {"front": "Explain Aristotle's concept of 'Matter'.", "back": "Matter is the underlying stuff of which a thing is made (e.g., bronze of a statue, wood of a table). It is indeterminate by itself and possesses potentiality; it requires form to become a definite kind of thing."}, {"front": "Explain Aristotle's concept of 'Form' and how it differs from Plato's Forms.", "back": "For Aristotle, form is the structure, pattern, or essence that makes a thing the kind of thing it is. Unlike Plato's separate Forms, Aristotle's forms are always embodied in matter within the physical world, not in another realm."}, {"front": "In Aristotle's view, what is the 'form' in living things?", "back": "In living things, Aristotle identified the form with the soul (psyche), considering it the organizing principle that gives the body life and activity."}, {"front": "What is the 'Third Man' argument, and what problem does it pose for Plato's Forms?", "back": "The 'Third Man' argument points out an infinite regress: if individual beautiful things require a Form of Beauty, then the collection of those things plus the Form of Beauty would require a third Form to explain their commonality, and so on endlessly, making the explanation incomplete."}, {"front": "How did Aristotle's philosophy resolve the 'Third Man' problem?", "back": "Aristotle resolved it by positing that the form of a thing is in the thing itself. There's no need to explain a resemblance between separate entities (things and Forms); rather, individual things share an embedded nature, eliminating the regress."}, {"front": "What are the implications for scientific inquiry if Plato's view of reality is accepted?", "back": "If Plato is right, the physical world is a shadow, and observation/experiment only reveal appearances. True knowledge comes from pure reason, making science focused on the physical world a lesser pursuit, not dealing with ultimate reality."}, {"front": "What are the implications for scientific inquiry if Aristotle's view of reality is accepted?", "back": "If Aristotle is right, the physical world is the real world. Observation and careful study are the path to knowledge. Disciplines like biology and physics become genuine forms of knowledge, based on discovering the forms embedded in particular things."}, {"front": "What 'genuine insight' from Plato's philosophy does the text highlight regarding certain truths?", "back": "Plato correctly noted that we grasp truths (e.g., mathematical, moral, logical) that transcend particular observations and seem eternal and unchanging (e.g., the Pythagorean theorem), which his Forms were designed to explain."}, {"front": "What 'genuine insight' from Aristotle's philosophy does the text emphasize about learning?", "back": "Aristotle was correct that we cannot simply ignore the physical world. We learn by encountering particular things, and the forms are 'at work in the world around us,' waiting to be discovered through careful observation."}, {"front": "Compare Plato's and Aristotle's views on the *location* of a thing's form.", "back": "Plato believed forms (Forms) exist in a separate, ideal, unchanging realm. Aristotle believed the form of a thing is inherent within the physical thing itself, inseparable from its matter."}, {"front": "Contrast Plato's and Aristotle's primary sources of genuine knowledge.", "back": "Plato prioritized pure reason and the mind's apprehension of Forms. Aristotle emphasized careful observation, classification, and reasoning about patterns found in the physical world."}, {"front": "Using the example of 'beauty,' how would Plato explain why a flower is beautiful?", "back": "A flower is beautiful because it imperfectly 'participates' in the perfect, eternal, and unchanging Form of Beauty itself, which exists independently of any physical object."}, {"front": "Using the example of a 'bronze statue,' how would Aristotle explain its components?", "back": "A bronze statue is a substance composed of matter (the bronze) and form (the shape or figure of a human). The form is what makes it a statue, and it is in the bronze itself, not separate."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
