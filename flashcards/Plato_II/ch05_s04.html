    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

    <script>
    var CARDS = [{"front": "What is Plato's fundamental view on the relationship between the soul and the body, as described in the Phaedo?", "back": "Plato's view is radically dualist: the soul is immortal, immaterial, and divine, belonging to the realm of Forms, while the body is mortal, material, and a distraction or obstacle to the soul's highest activity."}, {"front": "Explain Plato's concept of dualism regarding the soul and body.", "back": "Plato's dualism separates the soul (immaterial, immortal, rational) from the body (material, mortal, driven by appetite), viewing the body as an obstacle to the soul's purity and return to its true home after death."}, {"front": "According to Plato in the Republic, what are the three parts of the soul?", "back": "The three parts of Plato's soul are reason (logistikon), spirit (thumoeides), and appetite (epithumetikon)."}, {"front": "How does Plato define justice in the individual, based on the three parts of the soul?", "back": "Justice in the individual consists of each part of the soul doing its proper work: reason ruling, spirit supporting reason's authority, and appetite obeying."}, {"front": "How does Aristotle's hylomorphism inform his view of the soul?", "back": "For Aristotle, the soul is the form of a living body, much like a shape is the form of a statue. It is the organizing principle that makes a lump of matter into a living being, not a separate entity imprisoned within the body."}, {"front": "What is the crucial difference between Plato's and Aristotle's views on the soul's existence apart from the body?", "back": "Plato believed the soul is immortal and can exist apart from the body. Aristotle, however, held that the soul (as the form of the body) cannot exist without the body; when the body dies, the soul ceases to exist, much like the shape of a statue when its material is destroyed."}, {"front": "List and briefly describe Aristotle's three levels of soul.", "back": "Aristotle's three levels are: 1. Nutritive soul (capacity for growth, nourishment, reproduction; plants), 2. Sensitive soul (capacity for sensation, desire, movement; animals), and 3. Rational soul (capacity for thought, reasoning, deliberation; humans, encompassing the lower levels)."}, {"front": "What is the 'active intellect' in Aristotle's philosophy, and why is it a point of contention?", "back": "The 'active intellect' (nous poietikos) is a cryptic passage in Aristotle's De Anima, described as 'separable, impassible, and unmixed,' and possibly immortal. Scholars debate whether it's a part of the individual soul, a divine intellect, or God himself."}, {"front": "What is Plato's fundamental view on the nature of virtue?", "back": "For Plato, virtue is fundamentally a matter of knowledge. If one truly understands what is good, one will do it, as no one does wrong willingly."}, {"front": "Explain the 'Socratic paradox' as it relates to Plato's view of wrongdoing.", "back": "The Socratic paradox states that all wrongdoing is a form of ignorance. A person who acts unjustly does so because they are confused about what is truly good for them, mistaking pleasure, wealth, or power for genuine well-being."}, {"front": "Why did Plato propose that philosopher-kings should govern the ideal city?", "back": "Plato believed philosopher-kings should govern because they have been educated in mathematics, dialectic, and the contemplation of the Forms (especially the Form of the Good), and thus possess the true knowledge required for justice."}, {"front": "According to Plato, what constitutes the 'good life'?", "back": "The good life for Plato is the philosophical life – a life of the mind devoted to the contemplation of eternal truths, with all other pursuits serving or preparing the soul for this highest activity."}, {"front": "How does Aristotle's definition of virtue differ from Plato's?", "back": "While Plato saw virtue as knowledge, Aristotle defined virtue as a habit (hexis) – a settled disposition to choose well, developed through repeated practice, rather than merely something one knows."}, {"front": "Define Aristotle's term 'hexis' in the context of virtue.", "back": "'Hexis' is a Greek term meaning 'habit,' 'disposition,' or 'state of character.' For Aristotle, virtues are hexeis, stable dispositions acquired through practice, making us become virtuous by performing virtuous acts."}, {"front": "How does one acquire virtue, according to Aristotle?", "back": "Virtue is acquired through practice and experience, guided by good examples. By repeatedly performing virtuous acts, one develops stable dispositions (hexeis) to choose well, making virtuous behavior second nature."}, {"front": "How would Aristotle explain courage, distinguishing his view from Plato's?", "back": "For Aristotle, courage is not just knowing what to fear (Plato's view), but a habit of facing danger appropriately – not recklessly or cowardly, but in the right way, at the right time, for the right reasons, developed through practice."}, {"front": "Explain Aristotle's doctrine of the 'Golden Mean'.", "back": "The Golden Mean states that every moral virtue is a balanced midpoint between two extremes (vices): one of deficiency and one of excess. It's not a mathematical average but the appropriate response for the right situation, determined by practical wisdom."}, {"front": "Provide an example of Aristotle's Golden Mean for a specific virtue.", "back": "Courage is the mean between cowardice (too little confidence) and recklessness (too much confidence). Generosity is the mean between stinginess and extravagance."}, {"front": "Define 'phronesis' and explain its importance in Aristotle's ethics.", "back": "'Phronesis' is practical wisdom – the intellectual virtue enabling a person to discern the right thing to do in any particular situation. It comes from experience and practice, not theoretical knowledge, and is crucial for finding the Golden Mean."}, {"front": "What is 'eudaimonia' for Aristotle, and how is it achieved?", "back": "'Eudaimonia' is often translated as 'flourishing' or 'living well and doing well.' It's the highest human good, achieved through the activity of the soul in accordance with virtue over a complete life, developing virtues, exercising practical wisdom, and living in a supportive community."}, {"front": "Summarize the key difference in how Plato and Aristotle define virtue.", "back": "Plato: Virtue is knowledge of the Good. Aristotle: Virtue is a habit (hexis) of choosing well."}, {"front": "How do Plato and Aristotle differ on how virtue is acquired?", "back": "Plato: Through education in mathematics and dialectic, culminating in contemplation of the Forms. Aristotle: Through practice and experience, guided by good examples and practical wisdom (phronesis)."}, {"front": "Describe the difference in what Plato and Aristotle consider 'the good life'.", "back": "Plato: The contemplative life of the philosopher, devoted to eternal truths. Aristotle: A life of activity in accordance with virtue, including friendship, civic engagement, and the pleasures of a well-ordered life."}, {"front": "According to Plato and Aristotle, who can achieve the good life?", "back": "Plato: Only the philosopher who has escaped the cave and contemplated the Forms. Aristotle: Any person of good character who lives in a decent community and develops practical wisdom through experience."}, {"front": "In what way are Plato and Aristotle's ethical views considered complementary rather than purely contradictory?", "back": "Plato was right that virtue requires understanding what is good, but Aristotle was right that understanding alone is insufficient; knowing what is right and doing what is right are distinct achievements, bridged by practice and habit."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
