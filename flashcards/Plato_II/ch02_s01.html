<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Death of Socrates (Plato II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What literary technique does Plato use in the Phaedo by starting in Phlius with Phaedo telling Echecrates the story?", "back": "Plato uses a frame narrative, which creates emotional distance from the death scene for the reader and signals the dialogue's connection to an older philosophical tradition."}, {"front": "Who are Echecrates and Phaedo in the frame narrative, and what role do they play?", "back": "Phaedo is a young man who was present at Socrates' death and retells the events. Echecrates is a Pythagorean philosopher who asks Phaedo for the details, establishing a link to Pythagorean ideas about the soul."}, {"front": "What specific philosophical ideas did the Pythagoreans hold that are relevant to the Phaedo?", "back": "The Pythagoreans believed in the immortality of the soul and its reincarnation, which are central themes that Socrates explores and attempts to prove through argument."}, {"front": "How does Socrates' ambition regarding the soul's immortality differ from the Pythagoreans' belief?", "back": "While Pythagoreans had long believed in the soul's immortality, Socrates attempts something more ambitious: not merely to assert it, but to prove it through argument."}, {"front": "What 'strange admixture' of emotions does Phaedo describe feeling on the day of Socrates' execution?", "back": "Phaedo describes feeling 'a strange admixture' of pleasure and pain, with friends 'laughing and weeping by turns,' reflecting the weight of the last day of a beloved teacher's life."}, {"front": "What seemingly casual observation does Socrates make about pleasure and pain when his chains are removed?", "back": "He notes how strange it is that pleasure and pain are 'fastened together,' one following the other as if 'two creatures sharing the same head,' with the relief of freedom inseparable from the ache that preceded it."}, {"front": "What deeper philosophical theme does Socrates' observation about pleasure and pain introduce?", "back": "It introduces the central theme of the dialogue: the relationship between the body (the realm of sensation, pleasure, pain) and the soul (belonging to a different realm entirely)."}, {"front": "What is the 'striking claim' Socrates makes about how a true philosopher lives?", "back": "Socrates claims that the true philosopher spends his entire life 'practicing dying' (melete thanatou)."}, {"front": "According to Socrates, how does the body hinder the soul's pursuit of truth?", "back": "The body is a constant obstacle, getting sick, demanding food and drink, overwhelming with pleasures and fears, and filling the mind with 'loves, and lusts, and fears, and fancies of all kinds,' which distract the soul from clear thought."}, {"front": "How does Socrates believe true knowledge is obtained?", "back": "True knowledge comes not through the unreliable senses, but through the soul thinking by itself, withdrawing from bodily sensations and distractions to grasp reality."}, {"front": "What is Socrates' definition of death in the Phaedo?", "back": "Socrates defines death as 'the separation of the soul from the body'."}, {"front": "Why does the true philosopher welcome death, according to Socrates?", "back": "If the body is the chief obstacle to the soul's goal of knowing truth, then death is not an evil but a liberation, allowing the soul to finally contemplate truth, beauty, and goodness without distraction."}, {"front": "What is Socrates NOT advocating when he says philosophers welcome death?", "back": "He is not saying that life is worthless or advocating suicide. He argues suicide is wrong because we are 'property of the gods' and must not desert our station."}, {"front": "How does Socrates redefine virtue in the Phaedo?", "back": "Socrates redefines true virtue as 'katharsis' (purification) – the discipline of the soul to act independently of the body, driven by a love for wisdom rather than by fear or desire."}, {"front": "What concern does Cebes raise about the soul after death, prompting Socrates' arguments?", "back": "Cebes expresses the common fear that when the body dies, the soul is 'dispersed like smoke or air' and ceases to exist, requiring Socrates to give reasons otherwise."}, {"front": "What general principle forms the basis of Socrates' Argument from Opposites?", "back": "The principle that opposites arise from each other through a process of change; for example, what is larger must have been smaller, and what is awake must have been asleep."}, {"front": "How does Socrates apply the Argument from Opposites to life and death?", "back": "He argues that the living come from the dead (birth). If the cycle only went one way (living to dead), everything would eventually be dead. Therefore, the dead must come back to life, implying the souls of the dead must continue to exist."}, {"front": "Identify one major criticism or weakness of Socrates' Argument from Opposites.", "back": "One criticism is that it relies on an analogy with physical qualities where the subject persists through change (e.g., a log persists whether hot or cold), but it assumes the soul persists through death, which is what it's trying to prove. Another is that it doesn't account for an endless supply of new souls/matter."}, {"front": "What everyday observation does Socrates use to introduce the Argument from Recollection?", "back": "We observe imperfect examples of equality in the physical world (e.g., two sticks that are roughly but not perfectly equal), yet we possess a concept of perfect Equality."}, {"front": "What is 'the Equal itself' (auto to ison) in Socrates' Argument from Recollection?", "back": "It refers to the Form or Idea of perfect Equality – Equality as such, existing perfectly and independently of any particular equal things we encounter with our senses."}, {"front": "According to Socrates, where do we acquire concepts like perfect Equality, Beauty, or Justice?", "back": "We must have acquired this knowledge before we were born, when our souls knew the Forms directly, as our senses never show us perfect examples in the physical world."}, {"front": "How does Socrates define 'learning' in the context of the Argument from Recollection (Anamnesis)?", "back": "Learning is not acquiring new knowledge, but rather 'recollecting' or recovering knowledge that the soul already possessed before birth, triggered by imperfect sensory experiences."}, {"front": "What famous philosophical theory makes its explicit appearance in the Phaedo through the Argument from Recollection?", "back": "Plato's Theory of Forms (or Theory of Ideas)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
