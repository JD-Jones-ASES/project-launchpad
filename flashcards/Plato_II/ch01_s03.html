<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Death of Socrates (Plato II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the general philosophical challenge posed by Plato's *Phaedo*?", "back": "It is longer and more philosophically demanding than earlier dialogues, featuring multiple arguments for the soul's immortality and serious objections from Socrates' friends."}, {"front": "What is Socrates' startling claim about the true philosopher's attitude toward death?", "back": "The true philosopher does not fear death but actually welcomes it."}, {"front": "Explain what Socrates *means* by a philosopher welcoming death, clarifying what he does *not* mean.", "back": "He does not mean life is worthless or that we should seek to die. Instead, he means a philosopher's whole life is a preparation for death—a gradual separation of the soul from the body's distractions."}, {"front": "What specific feature characterizes the arguments Socrates presents for the soul's immortality in the *Phaedo*?", "back": "He presents several distinct arguments, each approaching the question from a different angle with its own strengths and weaknesses, often building on one another."}, {"front": "Who are the two friends of Socrates who offer particularly powerful objections to his arguments for the soul's immortality?", "back": "Simmias and Cebes."}, {"front": "What is the intended approach for readers when encountering Socrates' arguments in the *Phaedo*?", "back": "The arguments are not meant to be accepted uncritically; they are meant to be weighed, questioned, and understood."}, {"front": "Describe Socrates' sharp distinction between the body and the soul.", "back": "The body belongs to the visible, changing, perishable world and is a source of confusion and desire, while the soul belongs to the invisible, unchanging, eternal world and is the seat of reason and understanding."}, {"front": "What analytical question does the text suggest readers consider regarding Socrates' sharp division between body and soul?", "back": "Whether this division is too sharp, if the body can truly be neatly separated from the mind, and what would be lost if Socrates' view were accepted completely."}, {"front": "What is the \"Theory of Forms\" as it becomes central to the argument in the *Phaedo*?", "back": "The idea that behind the imperfect things we experience, there exist perfect, eternal realities known as the Forms."}, {"front": "How did earlier dialogues, like the *Euthyphro*, hint at the concept of the Forms?", "back": "In the *Euthyphro*, Socrates' question about what makes all pious acts pious pointed toward a single Form of Piety."}, {"front": "How does Socrates connect the Theory of Forms to the arguments for the soul's immortality?", "back": "He argues that if the soul can know eternal things (the Forms) through direct acquaintance before birth, then perhaps the soul itself is eternal."}, {"front": "Besides philosophical arguments, what other narrative device does Socrates employ in the *Phaedo*?", "back": "He uses myths—stories about the afterlife, the geography of the underworld, and the fate of different kinds of souls."}, {"front": "What is Socrates' warning about the literal interpretation of the myths he tells in the *Phaedo*?", "back": "He warns that the details of the myths should not be taken literally."}, {"front": "What kinds of truths do the myths in the *Phaedo* aim to convey that argument alone might not capture?", "back": "They express that how we live matters, that the soul's destiny depends on the choices we make, and that the universe is ultimately ordered by something good."}, {"front": "What is the significance of Socrates' death scene at the end of the *Phaedo*?", "back": "It is one of the most famous scenes in ancient literature, depicting Socrates calmly drinking hemlock, comforting friends, and dying with composure and humor."}, {"front": "How does Plato intend for Socrates' death to be interpreted philosophically?", "back": "As the ultimate proof of Socrates' philosophy—that the man who spent his life caring for his soul meets death without fear."}, {"front": "What overarching question does the death scene of Socrates raise, beyond any single philosophical argument?", "back": "What kind of life produces the courage to die like this?"}, {"front": "What advice does the text provide for students finding the *Phaedo* challenging?", "back": "Do not be discouraged; read each section once for general flow, then go back and work through the arguments more carefully with explanations. Patience will be rewarded."}, {"front": "In Socrates' view, what is the soul's relationship to reason and understanding?", "back": "The soul is the seat of reason and understanding."}, {"front": "What is Socrates' perspective on the body's influence on the soul, specifically regarding knowledge?", "back": "The body is a source of confusion and desire, distracting the soul from pure understanding."}, {"front": "How do Socrates' friends, like Simmias and Cebes, contribute to the philosophical rigor of the *Phaedo*?", "back": "They are not passive listeners; they test each argument and raise powerful objections, forcing a deeper exploration of the concepts."}, {"front": "According to the text, what differentiates the *Phaedo* from the dialogues in Volume I in terms of philosophical depth?", "back": "The *Phaedo* is more philosophically demanding, presenting not just one but several arguments for the soul's immortality."}, {"front": "What is the core idea behind the philosopher's 'preparation for death' according to Socrates?", "back": "It is a gradual process of separating the soul from the distractions and influences of the body."}, {"front": "How is knowledge of the perfect Forms (e.g., Equality, Beauty) attained, according to Socrates in the *Phaedo*?", "back": "Not through our senses, but through the soul's direct acquaintance with the Forms before birth."}, {"front": "Why does Socrates shift from logical argument to myth in certain parts of the *Phaedo*?", "back": "To express truths (like the importance of how we live and the soul's destiny) that argument alone may not be able to capture."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
