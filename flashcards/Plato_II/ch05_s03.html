    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Death of Socrates (Plato II) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "What enduring image of living and dying by reason has Plato provided, according to the text?", "back": "Plato has given an unforgettable picture of what it means to live — and to die — by the light of reason, exemplified by Socrates."}, {"front": "How is Aristotle characterized in relation to his teacher, Plato?", "back": "Aristotle is characterized as 'the student who honored his teacher by thinking for himself.'"}, {"front": "What are the main topics covered in Aristotle's *Nicomachean Ethics*?", "back": "It covers Aristotle's account of the good life, the virtues, practical wisdom, friendship, and eudaimonia."}, {"front": "How does Aristotle's ethics, particularly in the *Nicomachean Ethics*, differ from ethics grounded in abstract ideals?", "back": "It is ethics grounded not in abstract ideals but in the realities of human character and community life, making it practically useful."}, {"front": "What does Aristotle analyze in *The Politics*?", "back": "*The Politics* analyzes different forms of government (monarchy, aristocracy, democracy and their corruptions) and argues that human beings are by nature 'political animals'."}, {"front": "What foundational role did Aristotle play in political science with his work *The Politics*?", "back": "His comparative study of over 150 Greek constitutions makes him the founder of political science."}, {"front": "What is the primary focus of Aristotle's *The Poetics*?", "back": "It is a treatise on storytelling, exploring what makes a good tragedy, what makes a good plot, and why stories of suffering and reversal move us."}, {"front": "What is the lasting influence of Aristotle's *The Poetics* on creative writing?", "back": "Every screenwriter, novelist, and playwright since has worked, knowingly or not, with categories Aristotle invented."}, {"front": "What logical system did Aristotle create 'virtually from scratch' that served as the foundation of clear thinking for over two millennia?", "back": "The system of syllogistic reasoning, which for over two thousand years was considered 'the' logic."}, {"front": "What did Kant famously say about Aristotle's logic?", "back": "Kant said that logic had not needed to take a single step forward since Aristotle."}, {"front": "What is the primary reason given for 'Why Aristotle Matters'?", "back": "Aristotle matters because he took the world seriously, looking outward at the extraordinary variety of the world rather than upward to the Forms."}, {"front": "How did Aristotle's philosophical approach fundamentally differ from Plato's?", "back": "Where Plato looked upward to the Forms, Aristotle looked outward at the world's variety, trying to understand each thing on its own terms."}, {"front": "Did Aristotle impose a single grand theory on all subjects? What was his approach to methodology?", "back": "No, he did not impose a single grand theory; he developed different methods for different subjects, insisting on appropriate precision for each."}, {"front": "Name three significant achievements of Aristotle that demonstrate his staggering range.", "back": "He invented formal logic; founded biology and zoology; wrote the first systematic treatise on literary criticism; developed the first comprehensive theory of ethics; analyzed political systems with empirical rigor."}, {"front": "What did Aristotle believe about the pursuit of knowledge?", "back": "He maintained that knowledge, properly pursued, is one of the greatest pleasures available to a human being."}, {"front": "For students, how is Aristotle's philosophy, especially his ethics, presented as being more accessible than Plato's?", "back": "Aristotle's philosophy 'meets you where you are'; you don't need to escape a cave or contemplate Forms, but rather develop good habits, practical wisdom, friendships, and community engagement."}, {"front": "How does Raphael's painting 'Plato pointing up, Aristotle reaching out' symbolize their philosophical differences?", "back": "Plato pointing up represents his focus on eternal Forms and ideals, while Aristotle reaching out symbolizes his focus on the empirical world and specific observations."}, {"front": "Why can Raphael's painting be misleading, according to the text?", "back": "It can be misleading if it suggests we must choose one philosopher over the other, when in fact, the Western philosophical tradition needs both."}, {"front": "What crucial conviction, championed by Plato, is necessary for philosophy to avoid collapsing into relativism?", "back": "Plato's insistence that there are eternal, unchanging truths (about justice, beauty, goodness) above us, not merely matters of opinion."}, {"front": "What crucial conviction, championed by Aristotle, prevents philosophy from becoming 'otherworldly and impractical'?", "back": "Aristotle's insistence that truth is also around us—in particular things, habits, communities, and the natural world."}, {"front": "What are the 'two great impulses of Western thought' represented by Plato and Aristotle?", "back": "Plato represents the pull toward the ideal, and Aristotle represents the pull toward the real."}, {"front": "According to the text, what constitutes a 'complete education' in philosophy?", "back": "A complete education needs both Plato's idealism (looking upward) and Aristotle's realism (looking outward)."}, {"front": "What key concept in Aristotle's *Nicomachean Ethics* refers to the good life or human flourishing?", "back": "Eudaimonia."}, {"front": "What famous phrase did Aristotle use to describe human beings' natural inclination towards community life?", "back": "Human beings are by nature 'political animals'."}, {"front": "According to the text, what would happen to philosophy without Plato's conviction about eternal truths?", "back": "Without that conviction, philosophy collapses into relativism, and the examined life loses its point."}, {"front": "According to the text, what would happen to philosophy without Aristotle's conviction about truth found in the observed world?", "back": "Without that conviction, philosophy becomes otherworldly and impractical, a flight from reality rather than an engagement with it."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
