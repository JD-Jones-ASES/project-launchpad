<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Fitzgerald describe the scale and preparation of Gatsby's parties?", "back": "Fitzgerald uses overwhelming detail, such as weekly deliveries of five crates of citrus, a machine to juice 200 oranges, caterers bringing hundreds of feet of canvas, a full orchestra, elaborate buffet tables, and a fully stocked bar, all maintained by eight servants and a Rolls-Royce serving as an omnibus."}, {"front": "Identify three specific details that convey the extravagance of Gatsby's parties.", "back": "Examples include: Weekly deliveries of five crates of oranges and lemons; a machine to extract juice from 200 oranges; a full orchestra with oboes, trombones, and saxophones; buffet tables laden with 'spiced baked hams' and 'turkeys bewitched to a dark gold'; and eight servants repairing daily damage."}, {"front": "Nick notes he was one of the few invited guests. How do most people come to attend Gatsby's parties?", "back": "Most guests are not formally invited; they simply arrive, often introduced by someone who knew Gatsby, and behave 'according to the rules of behavior associated with amusement parks.'"}, {"front": "What does the open-door policy for Gatsby's party guests suggest about the nature of his hospitality?", "back": "It suggests Gatsby's hospitality is impersonal and performative. The parties serve a purpose beyond genuine socializing, as the host has no real connection to most attendees."}, {"front": "What are two common rumors shared by guests about Gatsby at the party?", "back": "Guests speculate that Gatsby 'killed a man once,' that he was 'a German spy during the war,' or that he 'grew up in Germany' before serving in the American army."}, {"front": "What is significant about the fact that none of the guests actually know Gatsby, yet they share wild rumors about him?", "back": "This underscores the gap between Gatsby's public image and his actual identity. The rumors create a romantic, almost mythic aura around a figure who remains deliberately invisible at his own parties, highlighting the superficiality of the interactions."}, {"front": "Who is the 'owl-eyed man' and what does he discover in Gatsby's library?", "back": "The 'owl-eyed man' is a drunken guest wearing spectacles in Gatsby's library. He discovers that Gatsby's books are 'absolutely real' with 'pages and everything,' not just cardboard fakes."}, {"front": "To whom does the owl-eyed man compare Gatsby after discovering the real books, and what does this comparison reveal?", "back": "He compares Gatsby to 'a regular Belasco,' a famous theatrical producer known for elaborate, realistic stage sets. This reveals that the owl-eyed man views Gatsby's entire estate as a meticulously constructed performance or illusion, designed for realism."}, {"front": "What does the owl-eyed man mean when he observes that Gatsby 'knew when to stop' regarding the books?", "back": "The books are real but their pages are uncut, meaning they have not been read. This suggests that Gatsby's 'performance' of being a cultured owner is thorough enough to include real books, but not so thorough as to imply actual intellectual engagement, thereby avoiding an obvious deception."}, {"front": "How does Fitzgerald's narrative technique shift when describing the party atmosphere building through the evening?", "back": "Fitzgerald shifts from past tense to present tense, describing the party as if it's happening in real-time."}, {"front": "What effect does Fitzgerald's shift to present tense have on the reader?", "back": "This narrative technique creates a sense of immediacy and immersion, making the reader feel as though the party is unfolding in the present moment, experiencing the atmosphere firsthand."}, {"front": "Describe the contrast Fitzgerald highlights between the lavishness of Gatsby's party and the guests' ignorance about him.", "back": "The contrast is between the extreme spectacle and material abundance of the party and the complete lack of genuine knowledge or connection among the guests regarding their host, Gatsby."}, {"front": "What does the 'gap between spectacle and substance' at Gatsby's parties suggest about the world Fitzgerald is depicting?", "back": "It suggests a world characterized by superficiality, materialism, and a focus on outward appearances rather than genuine character or connection. People are drawn to the display, not the person behind it."}, {"front": "How do guests' behaviors at Gatsby's parties reflect their 'amusement park' rules of behavior?", "back": "Guests arrive uninvited, circulate freely without knowing the host, engage in wild speculation, and exhibit a general lack of decorum or genuine social interaction, treating the event as a casual, anonymous spectacle."}, {"front": "Beyond mere socializing, what underlying purpose might Gatsby's impersonal parties serve for him?", "back": "The parties likely serve as a grand display of wealth and success, primarily intended to attract a specific person (Daisy Buchanan) or to project a particular image that masks a deeper personal agenda or hidden past."}, {"front": "What broader societal criticism can be inferred from the depiction of Gatsby's parties?", "back": "Fitzgerald critiques the superficiality and moral decay of the wealthy Jazz Age society, where ostentatious display often overshadows genuine human connection, integrity, and meaningful relationships."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
