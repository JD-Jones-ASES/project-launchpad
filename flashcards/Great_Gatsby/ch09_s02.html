    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "After Gatsby's death, whom does Nick attempt to contact for the funeral arrangements?", "back": "Nick tries to contact Daisy and Tom Buchanan, Meyer Wolfsheim, and various acquaintances from Gatsby's parties."}, {"front": "How do Daisy and Tom Buchanan respond to Gatsby's death and Nick's attempts to reach them?", "back": "Daisy and Tom leave town abruptly, taking their baggage and leaving no forwarding address, thus avoiding any involvement."}, {"front": "What is Meyer Wolfsheim's reaction when Nick tries to persuade him to attend Gatsby's funeral?", "back": "Wolfsheim refuses to attend, stating he cannot 'get mixed up in it,' underscoring his desire to avoid any negative association."}, {"front": "What is the general response of Gatsby's party acquaintances when Nick calls them about the funeral?", "back": "They either decline to attend, offer excuses, or imply Gatsby deserved his fate, revealing their superficial connection to him."}, {"front": "What is the cumulative effect of these repeated refusals to attend Gatsby's funeral?", "back": "The cumulative effect emphasizes Gatsby's profound isolation and the hollowness of his social network, despite his wealth and popularity."}, {"front": "What argument does the pattern of refusals make about the relationship between wealth, popularity, and genuine loyalty?", "back": "The pattern argues that Gatsby's popularity was entirely transactional and that wealth alone does not buy genuine loyalty or affection."}, {"front": "What does Catherine, Myrtle's sister, tell the coroner at the inquest regarding Myrtle and Gatsby?", "back": "Catherine falsely testifies under oath that Myrtle had never seen Gatsby and was completely happy with her husband George Wilson."}, {"front": "Why is Catherine's false testimony significant for the public understanding of Wilson's act?", "back": "Her lie allows the official narrative to remain simple: Wilson was 'deranged by grief,' preventing public scrutiny into the complex chain of events and protecting reputations."}, {"front": "Besides simplifying the narrative, what else does Catherine's lie protect or erase?", "back": "It protects Myrtle's reputation and Tom Buchanan's secret affair, while erasing the truth about the events that led to three deaths."}, {"front": "Describe the physical appearance and emotional state of Henry C. Gatz upon his arrival.", "back": "He is described as 'a solemn old man, very helpless and dismayed,' wearing a 'long cheap ulster,' with eyes that 'leaked continuously with excitement' and trembling hands."}, {"front": "What do the physical details of Henry C. Gatz's arrival reveal about his circumstances and his son's background?", "back": "They emphasize his poverty, age, and emotional fragility, providing a stark contrast to Gatsby's opulent world and anchoring Gatsby to his humbler origins."}, {"front": "What name does Henry C. Gatz still use for his son, and what does this signify?", "back": "He still calls him 'Jimmy,' which anchors Gatsby to his humbler, original identity before he invented 'Jay Gatsby.'"}, {"front": "What does Klipspringer actually want when he calls Nick, ostensibly about Gatsby's funeral?", "back": "He calls only to ask Nick to have the butler send him a pair of tennis shoes he left at the mansion, avoiding any mention of condolences or attendance."}, {"front": "What does Klipspringer's request reveal about the nature of Gatsby's social world?", "back": "It epitomizes the parasitic relationships within Gatsby's world, where people used his hospitality and possessions without any reciprocal attachment or loyalty to him."}, {"front": "What two significant artifacts does Henry C. Gatz carry with him?", "back": "He carries a cracked photograph of Gatsby's house and a childhood copy of 'Hopalong Cassidy' containing young Jimmy Gatz's daily schedule and 'General Resolves'."}, {"front": "How do the artifacts carried by Henry C. Gatz develop the theme of self-invention?", "back": "They reveal the origins of Gatsby's ambition and his deliberate, disciplined effort to construct the persona of 'Jay Gatsby' from the humble 'Jimmy Gatz' through self-improvement."}, {"front": "What do young Jimmy Gatz's daily schedule and 'General Resolves' reveal about the origins of Jay Gatsby's ambition?", "back": "They show his early commitment to relentless self-improvement, discipline, and a clear vision for his future, which laid the foundation for his adult ambitions and drive."}, {"front": "Who is the only person willing to take responsibility for Gatsby's funeral arrangements?", "back": "Nick Carraway is the only person who takes responsibility for Gatsby's funeral arrangements."}, {"front": "In the end, what becomes of Tom and Daisy Buchanan?", "back": "They leave without a forwarding address, escaping the consequences of their actions and the fallout from Gatsby's death."}, {"front": "How does Gatsby's father react to seeing his son's mansion?", "back": "Henry C. Gatz is awed by the mansion, seeing it as a symbol of his son's incredible success and achievement."}, {"front": "What is the primary argument Fitzgerald makes about Gatsby's social network through the funeral sequence?", "back": "Fitzgerald argues that Gatsby's vast social network was purely transactional and superficial, based on material gain and spectacle rather than genuine human connection."}, {"front": "How does the author use the character of Henry C. Gatz to highlight Gatsby's transformation?", "back": "Henry C. Gatz, with his poverty and use of 'Jimmy,' serves as a poignant reminder of Gatsby's humble origins and the immense, deliberate self-invention that created 'Jay Gatsby.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
