<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the McKees and what is Mr. McKee's profession?", "back": "Chester McKee is a photographer, and Lucille McKee is his wife."}, {"front": "How does Myrtle Wilson react to Mrs. McKee's compliment about her dress?", "back": "She rejects it with disdain, calling it 'just a crazy old thing,' implying she wears it only when she doesn't care about her appearance."}, {"front": "What specific photographic works does Mr. McKee mention he has created?", "back": "'MONTAUK POINT—THE GULLS' and 'MONTAUK POINT—THE SEA.'"}, {"front": "What rumor does Catherine, Myrtle's sister, share about Jay Gatsby's wealth?", "back": "She claims he is a nephew or cousin of Kaiser Wilhelm, which is where all his money comes from."}, {"front": "According to Catherine, what is the supposed reason Tom and Myrtle cannot get married despite their unhappiness in their current marriages?", "back": "Catherine claims Daisy is Catholic and does not believe in divorce, a lie Nick immediately recognizes."}, {"front": "What does Nick's observation, 'Daisy was not a Catholic, and I was a little shocked at the elaborateness of the lie,' reveal?", "back": "It reveals Catherine's willingness to create elaborate falsehoods to justify her sister's affair and Nick's recognition of the deceit."}, {"front": "What prejudiced remark does Mrs. McKee make about a former suitor?", "back": "She calls him a 'little kyke' and states he was 'below' her, illustrating the casual bigotry prevalent in some circles."}, {"front": "What was Myrtle Wilson's primary reason for marrying George Wilson?", "back": "She married him because she believed he was a 'gentleman' and 'knew something about breeding.'"}, {"front": "What incident immediately after her wedding made Myrtle realize her mistake in marrying George?", "back": "She discovered George had borrowed his wedding suit and the owner came to reclaim it, revealing his lack of means and dishonesty."}, {"front": "According to Catherine, how long have Myrtle and George lived over the garage, and what is Tom's significance in Myrtle's life?", "back": "They have lived there for eleven years, and Tom is the first 'sweetie' Myrtle has ever had."}, {"front": "How does Nick describe his conflicted state of mind during the party at the apartment?", "back": "He feels 'within and without, simultaneously enchanted and repelled by the inexhaustible variety of life.'"}, {"front": "Briefly describe Myrtle Wilson's first encounter with Tom Buchanan.", "back": "They met on a train; she was instantly attracted to him, and her recurring thought was, 'You can't live forever.'"}, {"front": "What specific items does Myrtle plan to add to her shopping list for the next day?", "back": "A massage and a wave, a collar for the dog, a cute ash-tray, and a wreath with a black silk bow for her mother's grave."}, {"front": "What violent event abruptly ends the party, and what provoked it?", "back": "Tom Buchanan breaks Myrtle Wilson's nose with his open hand because she repeatedly shouted Daisy's name."}, {"front": "What is one of the last things Nick does before leaving the apartment party?", "back": "He wipes a spot of dried lather from the sleeping Mr. McKee's cheek."}, {"front": "What significant observation does Nick make about their 'line of yellow windows' high over the city?", "back": "He notes that it 'must have contributed their share of human secrecy to the casual watcher in the darkening streets.'"}, {"front": "How is Mr. McKee ironically portrayed while asleep?", "back": "He is described as having his fists clenched 'like a photograph of a man of action,' contrasting with his passive behavior during the party."}, {"front": "How does Tom Buchanan propose Mr. McKee photograph George Wilson, showcasing Tom's disdain?", "back": "He suggests a portrait titled 'GEORGE B. WILSON AT THE GASOLINE PUMP,' a cruel joke at George's expense."}, {"front": "Compare Mrs. McKee's and Myrtle's attitudes towards social mobility or marriage based on status.", "back": "Both are conscious of social class; Mrs. McKee avoided marrying someone she considered 'below' her, while Myrtle married George believing he was a gentleman, only to regret it and seek upward mobility through Tom."}, {"front": "What does Catherine's whispered comment, 'Neither of them can stand the person they're married to,' reveal about Tom and Myrtle's situation?", "back": "It highlights the profound unhappiness and disillusionment in their respective marriages, underscoring the transactional and pleasure-seeking nature of their affair."}, {"front": "Where is the primary location of the events described in this section?", "back": "The small apartment in New York City that Tom Buchanan keeps for his affair with Myrtle Wilson."}, {"front": "What pet does Myrtle Wilson own, and how is it sometimes described?", "back": "A little dog, which is sometimes described as looking with 'blind eyes through the smoke' or groaning faintly."}, {"front": "Nick's statement, 'I was within and without, simultaneously enchanted and repelled by the inexhaustible variety of life,' conveys what about his perspective?", "back": "It captures his unique position as both an immersed participant in the hedonistic party and a detached, critical observer of the characters' behavior and the decadent lifestyle."}, {"front": "Myrtle's thought, 'You can't live forever,' when she first meets Tom, reflects what larger theme in the novel?", "back": "It reflects a theme of reckless abandon and the pursuit of immediate gratification, driven by a desire to escape life's constraints, often leading to tragic consequences."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
