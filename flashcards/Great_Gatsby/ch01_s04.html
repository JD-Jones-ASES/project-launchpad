<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary definition of 'hulking' as provided in the text?", "back": "Large, heavy, and often clumsy in appearance or movement."}, {"front": "How does Daisy's opening remark about candles and the 'longest day' characterize her?", "back": "It reveals her whimsical, somewhat detached, and perhaps flighty nature, suggesting she often anticipates events but misses them."}, {"front": "Describe the conversational style of Daisy and Miss Baker at the dinner table.", "back": "They talk with 'bantering inconsequence' and an 'absence of all desire,' which is 'cool as their white dresses and their impersonal eyes,' never quite devolving into chatter."}, {"front": "What controversial book does Tom Buchanan enthusiastically promote?", "back": "He mentions 'The Rise of the Colored Empires' by 'Goddard,' a fictional title alluding to real white supremacist ideology."}, {"front": "What ideology does Tom Buchanan openly subscribe to during dinner?", "back": "He believes in white supremacy and eugenics, specifically that the 'Nordic' race is dominant and must prevent other 'races' from taking control."}, {"front": "How does Daisy react to Tom's racist rant about 'dominant races'?", "back": "She initially shows 'unthoughtful sadness,' then winks at Nick and parrots Tom's sentiment ('We've got to beat them down'), suggesting superficial engagement or cynical detachment."}, {"front": "What 'family secret' does Daisy share with Nick, and what might be its purpose?", "back": "She tells a bizarre story about their butler's nose, which likely serves as a distraction from the tense atmosphere or an expression of her capricious nature."}, {"front": "What significant event interrupts the dinner conversation multiple times?", "back": "The telephone rings repeatedly, causing Tom to leave and implying he is speaking to his mistress."}, {"front": "What secret about Tom is explicitly revealed to Nick by Miss Baker?", "back": "Miss Baker tells Nick that Tom 'has got some woman in New York,' confirming he is having an affair."}, {"front": "How does Daisy behave after Tom and she return to the table following the telephone calls?", "back": "She exhibits 'tense gaiety,' creating a romantic fantasy about a 'nightingale' outdoors, seemingly to cover the awkwardness and tension."}, {"front": "What is Daisy's cynical wish for her daughter, and what does it reveal about her worldview?", "back": "She hopes her daughter will be 'a fool—that's the best thing a girl can be in this world, a beautiful little fool.' This reveals her deep cynicism and her belief that ignorance is bliss for women in a painful world."}, {"front": "How does Nick perceive Daisy's assertion of being 'sophisticated'?", "back": "He immediately senses the 'basic insincerity' of her statement, feeling uneasy as if it were a performance designed to elicit an emotional response."}, {"front": "What is Jordan Baker's profession, and what is hinted about her past?", "back": "She is a professional golfer. Nick recalls hearing a 'critical, unpleasant story' about her, though he has forgotten the details."}, {"front": "How does Tom Buchanan's comment about Jordan Baker ('They oughtn't to let her run around the country this way') reflect his views?", "back": "It reveals his traditional, paternalistic, and controlling views on women, suggesting they should be confined and protected by their families."}, {"front": "How does Nick Carraway contrast an evening in the East (at the Buchanan's) with an evening in the West?", "back": "In the East, an evening is 'casually put away' with 'absence of all desire,' while in the West, it is 'hurried from phase to phase' with 'continually disappointed anticipation or else in sheer nervous dread.'"}, {"front": "What does Daisy's complaint 'I hurt it' regarding her finger, and Tom's reaction, reveal about their relationship?", "back": "It shows Tom's physical aggression (implied by the black-and-blue knuckle) and Daisy's theatricality, immediately blaming him and calling him a 'brute,' which Tom dislikes."}, {"front": "What is the general atmosphere or mood of the dinner party at the Buchanan's?", "back": "It is characterized by superficiality, underlying tension, emotional insincerity, and a sense of detached boredom covering deeper unhappiness and conflict."}, {"front": "What is Nick's internal reaction to the racial prejudice expressed by Tom?", "back": "He confesses to feeling 'uncivilized' and is 'rather surprised by his tone,' indicating his discomfort and disagreement with Tom's views."}, {"front": "What symbolic significance might the 'pointlessly' relit candles have at the end of the dinner scene?", "back": "They may symbolize the futile attempts to maintain a façade of normalcy or romance in a situation filled with hidden truths, tension, and impending collapse."}, {"front": "What does Daisy's sudden compliment to Nick ('You remind me of a—of a rose, an absolute rose') suggest about her?", "back": "It highlights her insincerity and attempts to charm or manipulate others, as Nick immediately recognizes the untruth of the statement."}, {"front": "During her private conversation with Nick, what does Daisy say about her overall emotional state?", "back": "She states, 'I've had a very bad time, Nick, and I'm pretty cynical about everything,' suggesting a deep-seated disillusionment."}, {"front": "How does Daisy attempt to 'arrange a marriage' between Nick and Jordan Baker?", "back": "She playfully suggests 'flinging them together,' locking them in linen closets, or pushing them out to sea in a boat, revealing her manipulative and light-hearted yet intrusive nature."}, {"front": "What does Tom's concern about the 'white race' being 'submerged' reflect about his anxieties?", "back": "It reflects his fear of losing social dominance and privilege, projecting his anxieties onto perceived threats from other races, a common theme in racist ideologies of the era."}, {"front": "Why does Nick feel 'uneasy' after Daisy declares herself 'sophisticated'?", "back": "He feels an 'absolute smirk' on her face and senses the 'basic insincerity' of her words, making him feel as though the entire evening was a 'trick' to exact an emotional response from him."}, {"front": "What is the implied cause of Daisy's 'utterly abandoned feeling' after her daughter's birth?", "back": "Her husband, Tom, was 'God knows where,' suggesting he was absent during a crucial and vulnerable moment for her."}, {"front": "What is the significance of the fading 'glow' and 'light deserting her' as Daisy finishes her butler story?", "back": "It could symbolize the fleeting nature of her charm and vitality, or the reality and sadness that quickly replace her playful façade."}, {"front": "How does Miss Baker react when she hears 'a subdued impassioned murmur' from the room beyond?", "back": "She sits up 'alertly' and says 'Sh!' to Nick, leaning forward 'unashamed' to try and listen, indicating her familiarity with and interest in the drama unfolding."}, {"front": "What is Nick's final, strong internal reaction to the situation at the Buchanan's dinner party?", "back": "His 'instinct was to telephone immediately for the police,' highlighting the severe tension and moral disquiet he feels amid their dysfunctional and deceitful lives."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
