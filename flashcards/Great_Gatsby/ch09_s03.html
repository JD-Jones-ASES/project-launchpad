    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did the public and press initially characterize the events surrounding Gatsby's death and Wilson's actions?", "back": "They characterized it as a 'madman's' act, reducing Wilson to a man 'deranged by grief,' driven by sensational and often untrue newspaper reports."}, {"front": "What surprising action did Catherine take during the inquest into Myrtle's death?", "back": "Catherine lied under oath, swearing her sister had never seen Gatsby, was completely happy with her husband, and had been into no mischief, thereby simplifying the case."}, {"front": "What was Nick Carraway's immediate reaction to Gatsby's death regarding responsibility?", "back": "Nick felt a profound sense of responsibility for Gatsby, realizing he was 'alone' on Gatsby's side because no one else showed 'intense personal interest'."}, {"front": "How did Daisy and Tom react in the immediate aftermath of Gatsby's death?", "back": "They left West Egg early that afternoon, taking their baggage and leaving no address or indication of when they would return, abandoning the situation completely."}, {"front": "What was Meyer Wolfshiem's initial response when Nick tried to contact him about Gatsby's death?", "back": "Wolfshiem sent a letter expressing shock but claimed he was 'tied up in some very important business' and 'cannot get mixed up in this thing now,' effectively refusing to come."}, {"front": "What specific detail did Wolfshiem include in his hasty addenda about Gatsby's funeral arrangements?", "back": "He added, 'do not know his family at all,' highlighting his superficial connection to Gatsby beyond business."}, {"front": "What unexpected call did Nick receive from 'Slagle' after Gatsby's death?", "back": "Slagle called from Chicago about Gatsby's ongoing criminal bond dealings, revealing that 'Young Parke's in trouble' and bonds had been traced, exposing Gatsby's hidden life."}, {"front": "Who was Henry C. Gatz, and how did he learn of Gatsby's death?", "back": "Henry C. Gatz was Gatsby's elderly father from Minnesota. He learned of his son's death from a Chicago newspaper."}, {"front": "Describe Mr. Gatz's initial reaction upon arriving at Gatsby's mansion.", "back": "He was solemn, helpless, and dismayed by his son's death, but also showed 'awed pride' at the splendor of Gatsby's home, which he believed Gatsby had earned legitimately."}, {"front": "How did Henry C. Gatz perceive his son's life and potential, despite the reality of Gatsby's criminal wealth?", "back": "He believed Gatsby was a 'great man' with 'brain power' who, if he had lived, would have been a successful figure like James J. Hill and helped 'build up the country'."}, {"front": "Who was Klipspringer, and why did he call Nick after Gatsby's death?", "back": "Klipspringer was 'the boarder' who frequently stayed at Gatsby's house. He called not to offer condolences or attend the funeral, but to ask for his tennis shoes to be sent to him."}, {"front": "What did Klipspringer's call reveal about Gatsby's 'friends'?", "back": "His call revealed the superficial and exploitative nature of many of Gatsby's supposed friends, who were only interested in his hospitality and possessions, not in Gatsby himself."}, {"front": "What was the name of Meyer Wolfshiem's company, as seen by Nick during his second visit?", "back": "The company was marked 'The Swastika Holding Company'."}, {"front": "How did Wolfshiem's assistant initially react to Nick's inquiries about him?", "back": "She was hostile and insisted Wolfshiem was 'gone to Chicago,' even as Nick heard his voice inside, revealing an attempt to deflect visitors."}, {"front": "What realization did Nick have about Gatsby's isolation as he tried to arrange the funeral?", "back": "Nick realized Gatsby's vast circle of acquaintances were not true friends; they abandoned him in death, leaving Nick to handle all arrangements alone."}, {"front": "What 'protest' did Nick hear in his brain from Gatsby's voice?", "back": "Nick imagined Gatsby saying, 'Look here, old sport, you've got to get somebody for me. You've got to try hard. I can't go through this alone.'"}, {"front": "What specific item did Nick find in Gatsby's desk that related to his past?", "back": "Only a picture of Dan Cody, described as 'a token of forgotten violence.'"}, {"front": "What was the general sentiment Nick encountered from society when trying to find people for Gatsby's funeral?", "back": "He encountered indifference, evasiveness, and even scorn, with one gentleman implying Gatsby 'had got what he deserved.'"}, {"front": "What symbolic significance do the 'rope stretched across the main gate' and the little boys entering suggest about the perception of Gatsby's house after his death?", "back": "It suggests Gatsby's former home, once a symbol of lavish parties and mystique, had become a public spectacle, attracting morbid curiosity rather than genuine respect or grief."}, {"front": "What does Catherine's testimony at the inquest, despite knowing the truth, reveal about her character or the societal pressure of the time?", "back": "It reveals a surprising act of loyalty or self-preservation, as she protected her sister's reputation and simplified the narrative, perhaps influenced by the perceived need to maintain social order or avoid scandal."}, {"front": "What is ironic about Meyer Wolfshiem's expressed sentiment ('Such a mad act as that man did should make us all think') in his letter to Nick?", "back": "It is ironic because Wolfshiem himself is deeply involved in illicit activities, yet he moralizes about Wilson's 'mad act' while simultaneously refusing any responsibility or involvement in Gatsby's death or funeral."}, {"front": "How does the", "back": "Mr. Gatz's pride is based on the visible signs of wealth and assumed legitimate success, reflecting the American Dream. Nick, however, knows the wealth was built on illicit means, creating a stark contrast between Gatsby's father's idealized image and the harsh reality."}, {"front": "Why does Nick feel 'a certain shame for Gatsby' after Klipspringer's call?", "back": "Nick feels shame because Klipspringer's call, motivated solely by a trivial possession (tennis shoes) and devoid of any genuine concern for Gatsby, exemplifies the shallow and self-serving nature of nearly all of Gatsby's supposed acquaintances."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
