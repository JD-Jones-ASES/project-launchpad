<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'prodigality' as described in Chapter 3?", "back": "Reckless extravagance or wastefulness. Nick uses it to describe laughter 'spilled with prodigality' at Gatsby's party, linking the emotional atmosphere to the material excess surrounding it."}, {"front": "Define 'innuendo' in the context of Gatsby's party.", "back": "An indirect or subtle suggestion, often with negative implications. The party atmosphere is marked by 'casual innuendo and introductions forgotten on the spot,' highlighting the superficiality and gossip."}, {"front": "How is the term 'harlequin' used in Chapter 3?", "back": "To describe the elaborate party salads, emphasizing a pattern of varied, bright colors and highlighting visual spectacle over substance, similar to a commedia dell'arte character's costume."}, {"front": "What does 'echolalia' refer to in Chapter 3?", "back": "The meaningless repetition of sounds or words. Fitzgerald uses it to describe the noise of the garden party, reducing the guests' speech to mere acoustic effect and suggesting a lack of genuine communication."}, {"front": "What does 'vacuous' mean, and how does it apply to the party guests?", "back": "Empty of meaning or substance; showing a lack of thought or intelligence. It's applied to the 'vacuous bursts of laughter' at the party, suggesting hollowness beneath the apparent joy."}, {"front": "Describe 'supercilious' behavior as seen in Chapter 3.", "back": "Behaving as though one is superior to others. Jordan's party from East Egg displays this quality, 'condescending to West Egg' with studied dignity."}, {"front": "What does Jordan Baker's 'wan smile' suggest in Chapter 3?", "back": "'Wan' means pale and giving the impression of illness or weariness. Jordan's 'wan smile' suggests both fatigue and evasion when Gatsby's background is mentioned, indicating she's withholding information or uncomfortable."}, {"front": "Define 'subterfuge' in relation to Jordan Baker.", "back": "Deceit used to achieve one's goal. Nick concludes that Jordan 'had begun dealing in subterfuges' from a young age to maintain her image and satisfy her competitive nature, highlighting her fundamental dishonesty."}, {"front": "How does Nick initially attend Gatsby's party in Chapter 3?", "back": "Nick receives a rare, formal invitation, setting him apart from the scores of uninvited guests who typically crash the event."}, {"front": "What is a key characteristic of Gatsby's parties as described by the narrator?", "back": "They are spectacles of music, food, alcohol, and dancing, attended by scores of uninvited guests who trade rumors about their mysterious host."}, {"front": "Who is the 'owl-eyed man' and what is his significant discovery in Gatsby's library?", "back": "A drunken guest who marvels that Gatsby's books are real, not just cardboard props, comparing Gatsby to the theatrical producer David Belasco."}, {"front": "How does Nick describe Gatsby's smile upon first meeting him?", "back": "An 'extraordinary smile' with 'a quality of eternal reassurance,' suggesting it understands the observer 'just so far as you wanted to be understood.'"}, {"front": "What unusual speech habit does Gatsby have?", "back": "He speaks with elaborate formality and frequently addresses everyone as 'old sport.'"}, {"front": "What major character flaw does Nick discover about Jordan Baker by the end of Chapter 3?", "back": "He discovers that she is 'incurably dishonest,' highlighting her deceptive nature in various aspects of her life."}, {"front": "What 'cardinal virtue' does Nick claim for himself at the end of Chapter 3?", "back": "Honesty, asserting that he is 'one of the few honest people that I have ever known.'"}, {"front": "What is the central theme around which Chapter 3 is organized?", "back": "Performance and Spectacle."}, {"front": "How does Fitzgerald present Gatsby's party as a 'theatrical production'?", "back": "By describing the preparations with the precision of a stage manager's checklist, involving caterers, orchestras, and an 'offstage' host invisible to his 'audience' of guests."}, {"front": "What is the significance of the owl-eyed man comparing Gatsby to David Belasco?", "back": "Belasco was known for obsessively realistic stage sets. This comparison highlights that Gatsby's world, including his library of real but unread books, is a carefully constructed set piece designed for verisimilitude (appearing real) without genuine substance or intellectual purpose."}, {"front": "How does Gatsby's self-presentation reveal him as a performer?", "back": "His extraordinary smile is designed to reassure and understand an observer precisely as they wish to be understood. His 'elaborate formality of speech' that 'just missed being absurd' and his careful word choice suggest a man deliberately constructing his persona in real time."}, {"front": "How does Jordan Baker's character extend the theme of performance beyond Gatsby?", "back": "Her dishonesty (e.g., moving a golf ball, leaving a borrowed car in the rain) and her 'cool, insolent smile' are forms of performance designed to maintain an image of careless superiority and avoid consequences."}, {"front": "What question does Nick's concluding claim of honesty invite the reader to consider?", "back": "Whether Nick himself is also performing a role—that of the reliable, moral observer—and whether authenticity is truly possible or desirable in the novel's world built on surfaces and self-invention."}, {"front": "In what way are Gatsby's books a symbol of his performance?", "back": "They are real, authentic books, but they are unread. This demonstrates verisimilitude (appearing real) without substance, serving as props for his cultivated image rather than for intellectual pursuit."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
