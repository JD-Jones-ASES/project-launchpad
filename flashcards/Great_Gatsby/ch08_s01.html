<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What crucial information does Gatsby finally reveal to Nick at dawn in Chapter 8?", "back": "Gatsby tells Nick the complete story of his romance with Daisy in Louisville in 1917—how he courted her under false pretenses, fell genuinely in love, and returned from war to find her married to Tom."}, {"front": "What is Nick's final, significant remark to Gatsby before departing for work?", "back": "Nick tells Gatsby he is “worth the whole damn bunch put together.”"}, {"front": "Describe George Wilson's state and actions in the second half of Chapter 8.", "back": "Grief-stricken and increasingly deranged, George Wilson traces the yellow car to Gatsby's estate, leading to his fatal confrontation with Gatsby."}, {"front": "What specific detail does the chapter's final image use to render the violence of Gatsby's death?", "back": "The final image describes “a thin red circle in the water” and “the laden mattress drifting,” using startling restraint to convey the violence."}, {"front": "Define 'Dejection' as used in Chapter 8.", "back": "A state of low spirits or depression. Gatsby leans against a table “heavy with dejection” after his fruitless vigil."}, {"front": "What does 'Redolent' mean, and how does Fitzgerald use it to describe Daisy's world?", "back": "Strongly suggestive or reminiscent of something. Daisy's world was 'redolent of orchids' and social activity, meaning it was fragrant with wealth."}, {"front": "In a literary context, what is 'Catastrophe'?", "back": "In classical tragic structure, the catastrophe is the final event in the falling action—the moment of the protagonist's destruction. It corresponds to the fifth act of Elizabethan tragedy."}, {"front": "Explain 'Anticlimax' as a narrative technique.", "back": "An anticlimax occurs when a moment of high drama resolves with unexpected flatness or understatement, forcing the reader to supply the emotional weight that the prose withholds."}, {"front": "What is the original meaning of 'Holocaust' as Fitzgerald uses it in Chapter 8?", "back": "Originally, a great destruction or devastation; a burnt offering or sacrifice. Fitzgerald uses it in this older sense to describe the complete destruction of Gatsby, Myrtle, and Wilson."}, {"front": "How does Fitzgerald generally narrate the deaths of Gatsby and Wilson in Chapter 8?", "back": "Fitzgerald narrates the deaths with remarkable restraint, presenting them indirectly through peripheral details and delayed discovery, rather than as witnessed events. The actual shootings are not witnessed."}, {"front": "How does Fitzgerald's 'narrative deflation' technique comment on the world of the novel?", "back": "It suggests that in a society obsessed with spectacle and surface, the most consequential events occur offstage and are noticed only after the fact, emphasizing the superficiality and moral decay."}, {"front": "What is the significance of George Wilson conflating the billboard eyes of Doctor T. J. Eckleburg with the eyes of God?", "back": "It reveals Wilson's derangement and the novel's spiritual vision: in the valley of ashes, the only deity watching is a commercial image, faded and indifferent, highlighting the absence of a true divine presence."}, {"front": "What is the dramatic exchange between Wilson and Michaelis regarding the Eckleburg billboard, and what does it 'compress'?", "back": "Wilson declares, “God sees everything,” staring at the billboard, and Michaelis corrects him, “That’s an advertisement.” This exchange compresses the novel’s spiritual vision into a single moment."}, {"front": "How does Fitzgerald structurally create a 'grim parallel' between Gatsby and Wilson in Chapter 8?", "back": "Fitzgerald intercuts Gatsby's final hours waiting by the pool for Daisy's call with Wilson's overnight vigil in the garage, creating a parallel between two men waiting, both fixated on a woman beyond their reach."}, {"front": "What is the key difference between Gatsby's and Wilson's obsessions, despite their parallel fates?", "back": "Gatsby's obsession produced beauty and aspiration (however illusory), while Wilson's obsession produced only the blunt instrument of revenge."}, {"front": "What does the convergence of Gatsby and Wilson at the pool signify?", "back": "It constitutes the novel's tragic climax, bringing together the dreamer and the avenger, both ultimately casualties of the Buchanans' carelessness."}, {"front": "How does Fitzgerald heighten the effect of the catastrophe in Chapter 8?", "back": "By narrating Gatsby's murder indirectly, with no character witnessing it, Fitzgerald converts spectacle into elegy, making the reader mourn rather than merely witness the event."}, {"front": "Give an example of anticlimax in Chapter 8 relating to Gatsby's death.", "back": "Gatsby's death, the culmination of the plot, is rendered not through dramatic confrontation but through ripples in a pool, a drifting mattress, and the understated notation that “the holocaust was complete.”"}, {"front": "How does Fitzgerald's use of anticlimax affect the reader?", "back": "This controlled deflation forces the reader to supply the emotional weight that the prose withholds, making the tragedy more powerful through its restraint."}, {"front": "Why is George Wilson's fury considered 'misdirected'?", "back": "His righteous fury falls on Gatsby, who was trying to recover something sacred from the past, rather than on the 'careless rich' (like Tom and Daisy Buchanan) who were ultimately responsible for Myrtle's death and his suffering."}, {"front": "Explain the concept of 'Stratum' and how Gatsby misled Daisy regarding it.", "back": "A 'stratum' is a level or class in society. Gatsby gave Daisy the false impression that he belonged to 'much the same stratum as herself,' concealing his penniless origins."}, {"front": "How is the word 'Benediction' used in Chapter 8, and what does it suggest about Louisville?", "back": "The sinking sun 'seemed to spread itself in benediction' over Louisville as Gatsby's train pulls away. This quasi-religious image implies the city was made sacred by Daisy’s presence for Gatsby."}, {"front": "What does the word 'Pneumatic' describe in relation to Gatsby's death?", "back": "'Pneumatic' means filled with or operated by compressed air. Gatsby takes a 'pneumatic mattress' (an inflatable raft) to the pool, which then becomes his deathbed."}, {"front": "What is the role of Gatsby's refusal to accept Daisy's past love for Tom in Chapter 8?", "back": "Gatsby still clings to the belief that the Plaza confrontation was merely a misunderstanding, highlighting his delusional attachment to his dream and inability to face reality."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
