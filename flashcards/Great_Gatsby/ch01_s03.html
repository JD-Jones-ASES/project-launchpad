<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core advice Nick Carraway's father gave him?", "back": "His father told him, 'Whenever you feel like criticizing any one... just remember that all the people in this world haven't had the advantages that you've had.'"}, {"front": "How does Nick interpret and apply his father's advice in his own life?", "back": "He interprets it as an inclination to 'reserve all judgments,' making it his personal philosophy."}, {"front": "What is a key consequence of Nick's habit of reserving judgments?", "back": "It has 'opened up many curious natures' to him but also made him the 'victim of not a few veteran bores.'"}, {"front": "How does Nick view the distribution of 'fundamental decencies' among people?", "back": "He believes that a 'sense of the fundamental decencies is parcelled out unequally at birth.'"}, {"front": "Despite his tolerance, what limit does Nick admit to having?", "back": "He states, 'after a certain point I don't care what it's founded on' regarding conduct, indicating his tolerance has a breaking point."}, {"front": "Who is the only character exempt from Nick's post-East cynicism and scorn?", "back": "Jay Gatsby, who represented everything Nick usually scorned but possessed an 'extraordinary gift for hope.'"}, {"front": "What 'extraordinary gift' did Gatsby possess, according to Nick?", "back": "An 'extraordinary gift for hope, a romantic readiness such as I have never found in any other person.'"}, {"front": "What 'preyed on Gatsby' and temporarily closed out Nick's interest in the 'sorrows and elations of men'?", "back": "The 'foul dust floated in the wake of his dreams.'"}, {"front": "Describe Nick Carraway's family background and geographical origin.", "back": "They are prominent, well-to-do people from a 'Middle Western city,' described as something of a 'clan,' the Carraways."}, {"front": "What major historical event did Nick participate in after graduating from New Haven, and what was its effect on him?", "back": "He participated in the 'Great War' (World War I), which made him restless upon his return."}, {"front": "Why did Nick decide to move East in the spring of 1922?", "back": "The Middle West seemed like the 'ragged edge of the universe' after the war, and he wanted to learn the bond business in New York."}, {"front": "What was Nick's initial living arrangement when he moved East?", "back": "He rented a 'weather-beaten cardboard bungalow' alone in West Egg for eighty dollars a month."}, {"front": "What feeling did Nick experience upon settling into his new life in West Egg?", "back": "He had a 'familiar conviction that life was beginning over again with the summer.'"}, {"front": "Describe the physical and social distinctions between West Egg and East Egg.", "back": "Both are 'enormous eggs' separated by a 'courtesy bay,' but West Egg is 'less fashionable' and represents new wealth, while East Egg features 'white palaces' and represents established, old money."}, {"front": "Who owns the colossal mansion located directly next to Nick's house in West Egg?", "back": "Gatsby."}, {"front": "What is Nick Carraway's relationship to Tom and Daisy Buchanan?", "back": "Daisy is his second cousin once removed, and Tom was a college acquaintance from New Haven."}, {"front": "How is Tom Buchanan described physically and by his athletic past?", "back": "He was 'one of the most powerful ends that ever played football at New Haven.' He is now a 'sturdy straw-haired man of thirty' with a 'supercilious manner' and a 'cruel body.'"}, {"front": "What does Nick's observation about Tom 'drifting on forever seeking... some irrecoverable football game' suggest about his character?", "back": "It suggests Tom is perpetually searching for the excitement and peak achievements of his past, struggling to find purpose or contentment in his present life."}, {"front": "How does Tom Buchanan's speaking voice contribute to his characterization?", "back": "His 'gruff husky tenor' adds to his 'fractiousness' and conveys a 'paternal contempt,' even toward people he likes."}, {"front": "What does 'privy' mean in the context of the text when Nick was 'privy to the secret griefs'?", "back": "Having secret or private knowledge of something; admitted to a confidence."}, {"front": "What does 'feigned' mean in the context of Nick having 'feigned sleep, preoccupation, or a hostile levity'?", "back": "Simulated or pretended; not genuine."}, {"front": "How does Nick react to Tom Buchanan's extravagant display of wealth, such as bringing polo ponies from Lake Forest?", "back": "He finds it breathtaking and notes that it was 'hard to realize that a man in my own generation was wealthy enough to do that.'"}, {"front": "What does Nick mean by saying 'life is much more successfully looked at from a single window'?", "back": "He implies that focusing on one area or perspective, rather than attempting to be a 'well-rounded man,' leads to a more successful or clearer understanding of life."}, {"front": "What architectural style describes Tom and Daisy Buchanan's mansion in East Egg?", "back": "A 'cheerful red-and-white Georgian Colonial mansion.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
