<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Gatsby's demeanor change immediately after the rain stops and he's alone with Daisy?", "back": "He 'literally glowed,' radiating a new well-being and exultation, as if a great burden had been lifted."}, {"front": "What does the narrator observe about Daisy's emotional state upon his re-entry into the house?", "back": "Her face was smeared with tears, and she quickly tried to wipe them away. Her throat conveyed 'aching, grieving beauty' but also 'unexpected joy.'"}, {"front": "What is Gatsby's immediate request to Daisy after the rain stops?", "back": "He asks her and Nick to come to his house so he can show her around."}, {"front": "How does Gatsby express his pride in his mansion during the tour?", "back": "He demands Nick's agreement that it looks well, points out how it catches the light, and boasts that it took him 'just three years to earn the money that bought it.'"}, {"front": "How does Gatsby's explanation of his wealth contradict itself?", "back": "He initially claims to have inherited money, then lost it in the 'panic of the war,' then corrects himself to say he was in the 'drug business and then the oil business.'"}, {"front": "What is Daisy's initial reaction upon seeing Gatsby's mansion from the outside?", "back": "She exclaims, 'That huge place THERE?' and then 'I love it, but I don't see how you live there all alone.'"}, {"front": "Who is Mr. Klipspringer, and where is he found during the house tour?", "back": "He is 'the boarder,' a man who seems to live at Gatsby's mansion, found dishevelled in pajamas doing liver exercises in one of the rooms."}, {"front": "How does Gatsby's perception of his possessions change in Daisy's presence?", "back": "He 'revalued everything in his house according to the measure of response it drew from her well-loved eyes' and sometimes his possessions seemed 'no longer real' in her 'astounding presence.'"}, {"front": "Describe Gatsby's emotional journey during his reunion with Daisy, as observed by Nick.", "back": "He passes from initial embarrassment, through 'unreasoning joy,' then is 'consumed with wonder,' finally 'running down like an overwound clock' from the intensity of the long-anticipated moment."}, {"front": "What is the significance of Gatsby showing Daisy his extravagant collection of shirts?", "back": "The shirts represent his immense wealth and the material grandeur he has accumulated for Daisy. They are a tangible display of his success and desire to impress her."}, {"front": "Why does Daisy cry when Gatsby throws his shirts before her?", "back": "She sobs, 'They're such beautiful shirts... It makes me sad because I've never seen such—such beautiful shirts before.' This suggests overwhelming emotion, perhaps regret for the life she didn't have with Gatsby, or the sheer opulence he now possesses."}, {"front": "What happens to the 'colossal significance' of the green light once Gatsby is reunited with Daisy?", "back": "Gatsby realizes its significance 'had now vanished forever.' It had represented his distant dream of Daisy, but now that she is present, it is 'again a green light on a dock,' diminishing its symbolic power."}, {"front": "Who is Dan Cody, and what does Nick learn about him from Gatsby?", "back": "Dan Cody was an elderly man in a yachting costume, Gatsby's 'best friend years ago,' who is now dead. Gatsby's past connection to him hints at the origins of his wealth and persona."}, {"front": "What do Gatsby's evasive phone calls about 'business' suggest about his activities?", "back": "They suggest his wealth comes from illicit or questionable dealings, particularly with his mention of 'Detroit' not being a 'small town,' hinting at bootlegging or organized crime."}, {"front": "How does Daisy express her romantic feelings for Gatsby while watching the sunset?", "back": "She whispers, 'I'd like to just get one of those pink clouds and put you in it and push you around,' expressing a desire to cradle and protect him in a dreamy, idealized way."}, {"front": "What song does Mr. Klipspringer play, and what is the ironic implication of its lyrics?", "back": "He plays 'Ain't We Got Fun,' a popular song from 1921 celebrating happiness despite poverty. This is ironic given Gatsby's extraordinary wealth, hinting at the potential emptiness or lack of true happiness beneath the glamour."}, {"front": "What do Gatsby's commands to Klipspringer ('Don't talk so much, old sport,' 'Play!') reveal about Gatsby's character or his state of mind?", "back": "They show Gatsby's desire to control the mood and environment, possibly to keep Daisy entertained and prevent any awkwardness, indicating a degree of anxiety or desperation to maintain the perfect reunion."}, {"front": "What 'expression of bewilderment' returns to Gatsby's face at the end of the section?", "back": "It's an expression suggesting 'a faint doubt... as to the quality of his present happiness.' This implies that the reality of his dream's fulfillment might not be as satisfying or complete as he had imagined."}, {"front": "What does Nick realize about his presence during Gatsby and Daisy's private moments?", "back": "He feels his presence makes them feel 'more satisfactorily alone,' implying he acts as a silent witness that legitimizes or frames their reunion."}, {"front": "How does the atmosphere change inside Gatsby's house after he flips a switch?", "back": "The 'gray windows disappeared as the house glowed full of light,' signaling a deliberate shift in mood, from private intimacy to a more illuminated (and perhaps performative) setting."}, {"front": "What particular architectural feature does Daisy admire about Gatsby's mansion, contributing to its 'feudal silhouette'?", "back": "She admires 'this aspect or that of the feudal silhouette,' suggesting its imposing, castle-like quality."}, {"front": "What specific odors does Nick mention when describing Gatsby's gardens?", "back": "He mentions 'the sparkling odor of jonquils and the frothy odor of hawthorn and plum blossoms and the pale gold odor of kiss-me-at-the-gate.'"}, {"front": "How do the 'Marie Antoinette music-rooms and Restoration salons' contribute to the overall impression of Gatsby's house?", "back": "They emphasize the extreme opulence, historical pastiche, and perhaps artificiality of Gatsby's wealth, showcasing his desire for a grand, established lifestyle he wasn't born into."}, {"front": "What item in Gatsby's bedroom does Daisy admire, and how does Gatsby react?", "back": "Daisy admires a 'toilet set of pure dull gold' on the dresser. She takes the brush and smooths her hair, whereupon Gatsby laughs hilariously, perhaps overwhelmed by her simple action finally happening in his space."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
