<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What detail from a previous conversation stimulates Nick's curiosity about Gatsby's background?", "back": "A girl's comment, 'I think he killed a man,' combined with the mystery of Gatsby's sudden wealth and unknown origins."}, {"front": "According to Jordan Baker, what is the paradoxical advantage of large parties over small ones?", "back": "She believes large parties are 'so intimate' because 'at small parties there isn't any privacy.'"}, {"front": "What is the title of Mr. Vladimir Tostoff's composition performed at Gatsby's party?", "back": "Vladimir Tostoff's 'JAZZ HISTORY OF THE WORLD'."}, {"front": "How does Gatsby's behavior at his own party notably differ from his guests?", "back": "He stands alone, does not drink, and appears more 'correct' as the 'fraternal hilarity' of his guests increases."}, {"front": "What unexpected request does Gatsby's butler convey to Jordan Baker?", "back": "Mr. Gatsby wishes to speak with Miss Baker alone."}, {"front": "How does Nick describe Jordan Baker's manner of dress and movement?", "back": "She wears all her dresses, even evening gowns, like sports clothes, moving with a 'jauntiness' as if she learned to walk on golf courses."}, {"front": "Describe the state of the red-haired chorus girl who attempts to sing and play piano at the party.", "back": "She is heavily intoxicated, weeping, and singing a sad song with gasping, broken sobs, her tears leaving black rivulets on her face."}, {"front": "What type of social interactions become common among couples in the large room as the party progresses?", "back": "Many women begin fighting with men they claim are their husbands, exhibiting both dignified indifference and sudden 'flank attacks' with accusations."}, {"front": "What is the nature of the dispute between the two 'deplorably sober men' and their 'highly indignant wives' in the hall?", "back": "The wives complain their husbands always want to leave when they are having a good time, asserting they are 'always the first ones to leave.'"}, {"front": "How does Gatsby's demeanor change when he emerges from his private conversation with Jordan Baker and is approached by departing guests?", "back": "His initial eagerness tightens abruptly into formality."}, {"front": "What tantalizing secret does Jordan Baker allude to after her private conversation with Gatsby?", "back": "She whispers to Nick that she 'just heard the most amazing thing' but had sworn not to tell."}, {"front": "What is Gatsby's characteristic form of address, and what does it convey about his constructed persona?", "back": "'Old sport.' It's meant to sound casually aristocratic and British, suggesting his carefully crafted image of old-money refinement."}, {"front": "What chaotic incident occurs as Nick leaves Gatsby's party?", "back": "A car accident where a new coupe, with one wheel violently shorn off, rests in a ditch beside the road."}, {"front": "Who is the first person Nick recognizes at the scene of the car accident?", "back": "Owl Eyes, the 'late patron of Gatsby's library,' who is perplexed by the incident."}, {"front": "What is Owl Eyes's initial, unhelpful explanation for the car accident?", "back": "He simply states, 'It went in the ditch,' and claims to know 'nothing whatever about mechanics' or 'very little about driving.'"}, {"front": "What surprising revelation about the car accident driver is made by Owl Eyes?", "back": "Owl Eyes was not driving; 'There's another man in the car,' who later emerges completely disoriented."}, {"front": "Describe the absurd behavior and comments of the actual driver who emerges from the wrecked car.", "back": "Blinded and confused, he asks 'Wha's matter? Did we run outa gas?' and then, after being told the wheel is off, suggests, 'Back out... Put her in reverse.'"}, {"front": "What final, solitary image does Nick observe of Gatsby as he departs from the party?", "back": "Gatsby stands alone on the porch, his hand raised in a formal gesture of farewell, surrounded by a sudden emptiness from his house."}, {"front": "How does Nick ultimately characterize the significance of Gatsby's parties in the broader context of his summer?", "back": "He views them as 'merely casual events in a crowded summer' that initially absorbed him 'infinitely less than my personal affairs.'"}, {"front": "What is Nick Carraway's profession and how does he spend his typical workday in New York?", "back": "He works as a bond salesman at Probity Trust, lunches with other clerks, and studies investments and securities at the Yale Club library in the evenings."}, {"front": "Briefly describe Nick's short affair during the summer and its conclusion.", "back": "He had an affair with a girl from Jersey City who worked in accounting, but it 'blew quietly away' when her brother started giving him mean looks and she went on vacation."}, {"front": "What does the chaotic and irresponsible scene of the car accident reveal about Gatsby's guests?", "back": "It highlights their recklessness, excessive indulgence, lack of awareness, and profound irresponsibility, contrasting with Gatsby's own sobriety."}, {"front": "In what way does the phrase 'echolalia of the garden' contribute to the atmosphere of Gatsby's party?", "back": "It suggests a cacophony of meaningless, repetitive chatter, symbolizing the superficial and inauthentic nature of many partygoers' interactions."}, {"front": "What does Gatsby's phone call from 'Philadelphia' at the end of the party imply about his activities?", "back": "It suggests his ongoing, possibly illicit or complex business dealings, reinforcing the mysterious and potentially shady nature of his wealth."}, {"front": "How does Gatsby's personal detachment contrast with the 'fraternal hilarity' of his guests?", "back": "While his guests engage in drunken, boisterous, and often intimate interactions, Gatsby remains an aloof observer, physically present but emotionally distant, highlighting his isolation despite hosting."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
