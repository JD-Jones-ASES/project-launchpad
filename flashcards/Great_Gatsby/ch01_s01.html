<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Nick Carraway initially describe himself in Chapter 1?", "back": "He presents himself as a tolerant, nonjudgmental observer who reserves judgment, taught tolerance by his father."}, {"front": "How does the narrative immediately complicate Nick's self-portrait as a nonjudgmental observer?", "back": "Within sentences of claiming tolerance, Nick renders judgments on Gatsby, Tom, and Daisy, demonstrating his subjectivity and contradicting his initial claim."}, {"front": "Why does Nick Carraway move from the Midwest to West Egg, Long Island?", "back": "He moves to West Egg to work in the bond business."}, {"front": "Who are Daisy and Tom Buchanan?", "back": "Daisy is Nick's cousin, and Tom is her wealthy, prejudiced husband. They live in fashionable East Egg."}, {"front": "What disruptive events occur during Nick's first dinner with the Buchanans?", "back": "Tom espouses racist pseudoscience, and a telephone call from his mistress in New York interrupts the evening."}, {"front": "Who is Jordan Baker, and what does she reveal to Nick?", "back": "She is a professional golfer who reveals that Tom has a woman in New York."}, {"front": "Describe Nick's first glimpse of Gatsby at the end of Chapter 1.", "back": "Nick sees Gatsby standing alone on his lawn, arms stretched toward a single green light across the bay."}, {"front": "What does the green light at the end of Daisy's dock symbolize from its first appearance?", "back": "It establishes the novel's central symbol of longing and unattainable desire."}, {"front": "Define 'supercilious' and describe who it applies to in Chapter 1.", "back": "Behaving as though one is superior to others; disdainfully proud. Used to describe Tom Buchanan's manner."}, {"front": "Define 'levity' as Nick uses it in the chapter.", "back": "Humor or lack of seriousness, especially during a serious occasion. Nick mentions 'hostile levity' as a way of discouraging unwanted confidences."}, {"front": "What does 'wan' mean, and who is described this way in Chapter 1?", "back": "Pale and giving the impression of illness or exhaustion. Used to describe Jordan Baker's face."}, {"front": "Define 'complacency' and how it's used in Chapter 1.", "back": "Smug self-satisfaction, especially when unaware of potential dangers. Applied to Tom's intellectual posturing."}, {"front": "Define 'peremptory' and give an example from the chapter.", "back": "Insisting on immediate attention or obedience, in a way that allows no refusal. Describes both Tom's manner and Daisy's call to Nick as he departs."}, {"front": "What is 'fractiousness'?", "back": "Irritability; a tendency toward unruliness. Nick uses this to characterize Tom's speaking voice."}, {"front": "Define 'contiguous' as it relates to East Egg and West Egg.", "back": "Sharing a common border; touching. Used in the geographic description of East Egg and West Egg."}, {"front": "What does 'feigned' mean in the context of Nick's narrative?", "back": "Simulated or pretended. Nick says he has 'feigned sleep' to avoid others' confessions."}, {"front": "What is 'rotogravure'?", "back": "A printing process used for magazines and newspaper supplements, especially for photographs. Nick recognizes Jordan from rotogravure pictures."}, {"front": "Define 'intimate revelation.'", "back": "A deeply personal disclosure. Nick describes himself as an unwilling recipient of such confessions."}, {"front": "According to the analysis, what is Fitzgerald's most consequential artistic decision in *The Great Gatsby*?", "back": "His choice of Nick Carraway as narrator."}, {"front": "Explain the concept of an 'unreliable narrator' as it applies to Nick Carraway.", "back": "An unreliable narrator's credibility is compromised by bias, limited knowledge, or personal involvement. Nick is unreliable not because he lies, but because he selects, interprets, and arranges events based on his own perspective."}, {"front": "Describe Nick Carraway's 'dual stance' as a narrator.", "back": "He is involved enough in the events to care, but also detached enough to observe and judge, mirroring his physical placement in scenes."}, {"front": "What does East Egg symbolize in *The Great Gatsby*?", "back": "Established social position, inherited privilege, and old wealth, often associated with 'white palaces'."}, {"front": "What does West Egg symbolize in *The Great Gatsby*?", "back": "The newly rich—those who have money but lack the social pedigree and established status that East Egg demands."}, {"front": "What is the social significance of the 'courtesy bay' separating East Egg and West Egg?", "back": "Though narrow, it represents an impassable social barrier, highlighting the rigid class divisions in America despite claims of meritocracy or equality."}, {"front": "How does Fitzgerald use setting, like the East Egg/West Egg division, throughout the novel?", "back": "Fitzgerald uses setting as a symbol to deepen central tensions, exploring questions of whether wealth alone can purchase acceptance or if class in America is as rigid as older aristocracies."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
