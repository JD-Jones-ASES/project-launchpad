<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When Nick tells Gatsby he will invite Daisy to tea, how does Gatsby initially respond?", "back": "He affects a casual tone, saying 'Oh, that's all right,' but his 'suppressed eagerness' and immediate correction of Nick's phrasing betray his true desire for the meeting."}, {"front": "List some of the specific steps Gatsby takes to prepare Nick's property for Daisy's visit.", "back": "He sends a man to cut Nick's lawn, delivers an entire greenhouse of flowers, and monitors the weather reports closely."}, {"front": "What do Gatsby's elaborate preparations for Daisy's visit suggest about his anxiety and desire for control?", "back": "They show he is trying to orchestrate the reunion like a theatrical production, attempting to control every element for a flawless performance, revealing his intense anxiety and desire for perfection."}, {"front": "Describe Gatsby's physical appearance and one specific nervous action in the moments before Daisy arrives.", "back": "He is 'pale' with 'dark signs of sleeplessness' and wears an overdressed 'white flannel suit.' A nervous action includes reading a book of economics upside down or startling at footsteps."}, {"front": "How does Fitzgerald convey Gatsby's extreme nervousness before Daisy's arrival through indirect characterization?", "back": "Through external, observable behaviors like being pale, having dark signs of sleeplessness, looking without seeing, reading upside down, and announcing he is leaving just minutes before she arrives."}, {"front": "What literal detail happens with the mantelpiece clock when Gatsby is waiting for Daisy, and what does it suggest about him?", "back": "Gatsby nearly knocks over the 'defunct' clock while leaning against it, suggesting his composure is as fragile as the object itself."}, {"front": "What does the 'defunct' mantelpiece clock symbolically represent in the context of Gatsby's five-year wait?", "back": "It symbolizes the stopped time of Gatsby's five-year vigil for Daisy, representing his belief that time could be suspended until he recaptured his moment with her, and foreshadowing the impossibility of reversing time."}, {"front": "How does the 'pouring rain' function as more than just setting throughout Part 1 of Chapter 5?", "back": "The rain mirrors the emotional state of the characters, reflecting Gatsby's initial nervousness, the awkwardness of the reunion, and a sense of melancholy or foreboding."}, {"front": "What kind of 'business opportunity' does Gatsby offer Nick just before Nick arranges the meeting with Daisy?", "back": "He offers Nick 'a rather confidential sort of thing' that would make him some money, hinting at a potentially illicit or questionable venture."}, {"front": "Why does Nick decline Gatsby's business offer?", "back": "Nick recognizes the offer as payment for his service in arranging the reunion with Daisy, and he refuses to be compensated for a personal favor."}, {"front": "What does Gatsby's business offer to Nick reveal about how he understands human relationships?", "back": "It reveals his transactional view of relationships, where he often attempts to buy services or affection, suggesting he struggles with genuine, non-monetary connections."}, {"front": "How does the exchange about the business offer complicate the reader's view of Gatsby's character?", "back": "It adds a layer of moral ambiguity, showing his pragmatic and potentially corrupt side beneath the romantic idealist, making him seem less purely noble in his pursuit of Daisy."}, {"front": "What does Gatsby's initial 'casual' response to Nick's offer to invite Daisy, coupled with his immediate correction of Nick's phrasing, reveal about his character?", "back": "It reveals his desperate eagerness for the meeting combined with an anxiety to appear indifferent, showing his internal conflict between desire and outward composure."}, {"front": "What does Gatsby's concern about having Nick's grass cut specifically suggest about his anxiety?", "back": "It suggests his anxiety extends to controlling every small detail of the environment, indicating he views the entire encounter as a performance that must be flawless to impress Daisy."}, {"front": "Describe the initial atmosphere and Gatsby's state immediately after Daisy arrives at Nick's cottage.", "back": "There is an 'agonizing initial awkwardness.' Gatsby is 'pale and rigid with anxiety,' and nearly knocks over the mantelpiece clock."}, {"front": "What does Nick do after Gatsby and Daisy's initial awkward and tense encounter?", "back": "Nick leaves them alone, retreating into the pouring rain for half an hour to allow them privacy."}, {"front": "What does the moment when 'we all believed for a moment that [the clock] had smashed in pieces on the floor' foreshadow?", "back": "It hints at the fragility of Gatsby's entire enterprise of trying to recapture the past with Daisy and the ultimate impossibility of successfully freezing or reversing time."}, {"front": "What does Gatsby's choice to wear an 'overdressed white flannel suit, silver shirt, and gold-colored tie' for tea with Daisy suggest?", "back": "It suggests his profound nervousness and his attempt to present himself as successful and impressive, treating the reunion as a highly formal and significant event."}, {"front": "Fitzgerald describes the mantelpiece clock as 'defunct.' What is the symbolic implication of this specific", "back": "The word 'defunct' suggests something that has ceased to exist or function, further emphasizing that for Gatsby, time (like the clock) has metaphorically stopped or become irrelevant during his long wait for Daisy."}, {"front": "What does Fitzgerald mean by Gatsby's 'strained counterfeit of perfect ease' when he leans against the clock?", "back": "It means Gatsby is desperately trying to appear relaxed and nonchalant, but his effort is visible and artificial, betraying his deep underlying nervousness and lack of genuine composure."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
