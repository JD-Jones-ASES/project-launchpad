<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary reason Gatsby dismisses all of his original servants?", "back": "Gatsby dismisses his servants to prevent gossip about Daisy's regular afternoon visits, as he wants to protect the secrecy of their affair."}, {"front": "What does Gatsby's decision to dismiss his old servants and replace them reveal about his priorities?", "back": "It reveals that Gatsby has abandoned his lavish party-giving enterprise; the parties were a means to attract Daisy, but now that she visits directly, the public performances are no longer necessary."}, {"front": "Identify at least two specific details Fitzgerald uses to convey the oppressive heat on the day of the lunch at the Buchanans'.", "back": "Details include the train's straw seats 'hover[ing] on the edge of combustion,' a woman's newspaper dampening under her fingers, and Nick's commutation ticket returning with 'a dark stain' from the conductor's sweating hand."}, {"front": "How does the oppressive weather function as more than mere setting in Chapter 7?", "back": "The stifling heat acts as an atmospheric pressure cooker, mirroring the intense emotional tension building among the characters—Tom's suspicion, Gatsby's anticipation, and Daisy's anxiety—that is about to explode."}, {"front": "How does Gatsby react when Daisy's daughter, Pammy, is brought into the room?", "back": "Gatsby reacts with 'surprise,' as Nick notes that 'I don't think he had ever really believed in its existence before.'"}, {"front": "Why is Gatsby's reaction to Pammy significant?", "back": "Pammy is living proof of Daisy's married life with Tom, a concrete reality that contradicts Gatsby's fantasy of erasing the past five years and underscores that Daisy's life did not simply pause while he was away."}, {"front": "What does Daisy communicate to Gatsby—and inadvertently to Tom—when she tells Gatsby that he 'always look[s] so cool'?", "back": "Daisy is expressing admiration and attraction, essentially making a public, if coded, declaration of her love for Gatsby in front of her husband."}, {"front": "How does Tom interpret Daisy's 'so cool' remark to Gatsby?", "back": "Tom is 'astounded' and realizes Daisy has just openly declared her love for Gatsby, shattering his complacency and triggering his decision to force a confrontation."}, {"front": "At Wilson's garage, what has George Wilson recently discovered about Myrtle?", "back": "George Wilson has discovered that Myrtle has 'some sort of life apart from him in another world,' meaning he has learned she is having an affair, though he doesn't know the identity of her lover."}, {"front": "How does George Wilson's discovery about Myrtle parallel Tom's situation?", "back": "Both men have just discovered (or are discovering) that the women they regard as their possessions are involved with other men, highlighting a shared experience of infidelity and betrayal."}, {"front": "When Nick observes that Daisy's 'voice is full of money,' what does this metaphor say about Daisy as indirect characterization?", "back": "It suggests that Daisy's allure, charm, and entire identity are inextricably tied to her inherited wealth, symbolizing her class, privilege, and the secure, luxurious world she inhabits."}, {"front": "How does the metaphor 'Daisy's voice is full of money' relate to Gatsby's attraction to her?", "back": "Gatsby is drawn not only to Daisy herself but also to the idealized wealthy world and social status she represents, making his desire for her deeply intertwined with his aspiration for wealth and acceptance into the upper class."}, {"front": "What does the car-swapping episode on the way to New York dramatize about the characters' power dynamics?", "back": "It dramatizes the shifting power dynamics: Tom attempts to assert control by driving Gatsby's car, while Daisy's choice to ride with Gatsby signals her allegiance, setting the stage for a dramatic confrontation."}, {"front": "What does Tom's insistence on driving Gatsby's car suggest about his need for control?", "back": "It suggests his deep-seated need to dominate and assert his authority over Gatsby and Daisy, attempting to symbolically reclaim his position and challenge Gatsby's wealth and influence."}, {"front": "Why does Gatsby replace his old servants with associates connected to Wolfsheim?", "back": "He replaces them with people from Wolfsheim's circle who 'wouldn't gossip,' ensuring discretion and secrecy regarding Daisy's visits and their affair."}, {"front": "What specific mistake does Myrtle make when she watches the group from her upstairs window at Wilson's garage?", "back": "Myrtle mistakes Jordan Baker for Tom's wife, Daisy."}, {"front": "What prompted Tom Buchanan to insist that the group drive into New York?", "back": "Tom's realization of Daisy's open admiration and coded declaration of love for Gatsby prompted him to demand they go to New York to force a confrontation."}, {"front": "What is the key difference between George Wilson's and Tom Buchanan's knowledge of their partners' affairs at this point?", "back": "Wilson knows Myrtle is having an affair but not with whom, while Tom has just discovered Daisy's affair and knows Gatsby is her lover."}, {"front": "Before Pammy's appearance, what was Gatsby's idealized view of his past with Daisy?", "back": "Gatsby's idealized view was that he could erase the past five years and return to a time before Daisy married Tom, as if her life had simply paused for him."}, {"front": "Briefly summarize the main events that lead the group to drive into New York.", "back": "Gatsby has dismissed his servants for Daisy's visits; at a tense lunch on the hottest day, Daisy's open admiration of Gatsby alerts Tom to their affair, prompting him to insist they drive to New York to confront the situation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
