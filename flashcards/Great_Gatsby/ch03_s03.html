<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Nick initially describe the constant activity and guests at Gatsby's parties?", "back": "He describes men and girls coming and going \"like moths\" among the champagne and stars, suggesting a transient, attracted, yet perhaps aimless nature of the guests."}, {"front": "What specific amenities and activities did Gatsby provide for his guests during the day?", "back": "Guests could swim, dive from a raft's tower, sunbathe on the beach, and ride in his motor-boats drawing aquaplanes over the Sound."}, {"front": "What did Gatsby's Rolls-Royce and station wagon do on weekends?", "back": "The Rolls-Royce became an 'omnibus' transporting parties to and from the city, while the station wagon met all trains, highlighting the sheer scale of guest transport."}, {"front": "What weekly effort was required to clean up after Gatsby's parties?", "back": "Eight servants, including an extra gardener, toiled all day Monday with mops, scrubbing-brushes, hammers, and garden-shears to repair the 'ravages' of the night before."}, {"front": "Describe the scale of food and drink preparations for Gatsby's parties.", "back": "Five crates of oranges and lemons arrived weekly (200 oranges could be juiced in half an hour), caterers brought canvas and colored lights, and buffet tables were laden with lavish hors d'oeuvres, hams, salads, and pastries."}, {"front": "What kind of musical entertainment was provided at Gatsby's parties?", "back": "A full orchestra, 'no thin five-piece affair,' played with oboes, trombones, saxophones, viols, cornets, piccolos, and drums, creating a grand, vibrant atmosphere."}, {"front": "How did most guests typically arrive at Gatsby's parties?", "back": "Most guests were not invited; they simply went, driving out to Long Island and ending up at Gatsby's door, often without knowing him personally."}, {"front": "How was Nick's invitation to Gatsby's party different from most guests' attendance?", "back": "Nick was one of the few who received a formal, personal invitation from Gatsby himself, delivered by a chauffeur."}, {"front": "What observation did Nick make about the young Englishmen at Gatsby's party?", "back": "He noticed many well-dressed young Englishmen talking earnestly to prosperous Americans, suspecting they were there to sell bonds, insurance, or automobiles."}, {"front": "How does Nick meet Jordan Baker at the party?", "back": "Nick, feeling awkward and embarrassed, encounters Jordan at the head of the marble steps; she remembers him from next door and eventually takes him under her wing."}, {"front": "What story does Lucille, one of the 'girls in yellow,' share about Gatsby's generosity?", "back": "Lucille tells how Gatsby sent her a new evening gown from Croirier's after she tore hers at a previous party, worth $265, suggesting his extravagant benevolence."}, {"front": "What were some of the rumors circulating about Gatsby among his guests?", "back": "Guests speculated that he had killed a man, or that he was a German spy during the war. Another claimed he was in the American army."}, {"front": "What does the abundance of contradictory rumors about Gatsby reveal about him and his guests?", "back": "It shows that Gatsby is a mysterious, enigmatic figure who inspires 'romantic speculation,' and that his guests know little about him, often fabricating stories based on his wealth and unconventional nature."}, {"front": "Describe the social dynamics Nick observes when he joins Jordan's party at supper.", "back": "He notes their 'dignified homogeneity' and how they represented the 'staid nobility of the country-side,' with East Egg condescending to West Egg, contrasting sharply with the party's general wildness."}, {"front": "Who is the 'owl-eyed man,' and where do Nick and Jordan find him?", "back": "He is a stout, middle-aged man with enormous spectacles, found sitting drunk in Gatsby's high Gothic library, staring at the books."}, {"front": "What surprising discovery does the 'owl-eyed man' make about Gatsby's library?", "back": "He discovers that all the books in Gatsby's elaborate library are 'absolutely real—have pages and everything,' not just cardboard fakes, which he initially suspected."}, {"front": "What is the significance of the 'owl-eyed man's' discovery about Gatsby's books?", "back": "It implies that while Gatsby carefully crafts his image of old money and sophistication (like Belasco's hyper-realistic sets), there's a layer of unexpected authenticity or a more complex ambition beneath the facade."}, {"front": "What does the phrase 'prodigality' mean, as used to describe the spilled laughter at Gatsby's party?", "back": "'Prodigality' means reckless extravagance or wastefulness, suggesting that laughter and joy were abundant and freely, even excessively, given out."}, {"front": "How does the atmosphere of the party evolve as the evening progresses?", "back": "Lights grow brighter, music changes, voices get higher, laughter becomes easier and more abundant, and groups shift and dissolve more swiftly, indicating a rising crescendo of revelry."}, {"front": "What does Nick's feeling of being 'ill at ease' and his difficulty finding Gatsby suggest about the party environment?", "back": "It suggests a chaotic, impersonal environment where the host is elusive and guests feel disconnected, making it hard for an outsider like Nick to navigate."}, {"front": "What detail about the cocktails suggests the era of the party?", "back": "The cordials were 'so long forgotten that most of his female guests were too young to know one from another,' implying that these liquors were from before Prohibition, making them rare and exotic in the 1920s."}, {"front": "How did the guests' behavior at Gatsby's house compare to other places?", "back": "They conducted themselves 'according to the rules of behavior associated with amusement parks,' suggesting a sense of uninhibited, sometimes boisterous, freedom and lack of formal etiquette."}, {"front": "What does the description of the 'sea-change of faces and voices and color' convey about the party experience?", "back": "It conveys a dynamic, immersive, and overwhelming sensory experience, where people and impressions merge and transform constantly, reflecting the transient and fluid nature of the interactions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
