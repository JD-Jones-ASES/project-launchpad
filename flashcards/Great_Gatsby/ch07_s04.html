<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Gatsby claim about his time at Oxford?", "back": "He claims he attended Oxford for five months after the Armistice, an opportunity given to some officers."}, {"front": "How does Daisy initially try to diffuse the rising tension between Tom and Gatsby?", "back": "She attempts to distract them by suggesting mint juleps and later by proposing that everyone go home."}, {"front": "Describe the underlying themes of Tom's 'impassioned gibberish' during his argument with Gatsby.", "back": "Tom expresses racist and classist views, criticizing Gatsby as 'Mr. Nobody from Nowhere' and warning against 'intermarriage between black and white,' seeing himself as defending 'family institutions.'"}, {"front": "What does Nick mean when he observes Tom's 'transition from libertine to prig'?", "back": "It highlights Tom's hypocrisy: he is known for his own affairs (libertine) but self-righteously condemns Gatsby for pursuing his wife, acting like a moralistic puritan (prig)."}, {"front": "What significant declaration does Gatsby make to Tom about Daisy's feelings?", "back": "Gatsby declares that Daisy doesn't love Tom, has never loved him, and loves Gatsby instead, claiming she only married Tom out of weariness and poverty."}, {"front": "According to Gatsby, what was the primary reason Daisy married Tom instead of waiting for him?", "back": "Gatsby claims Daisy married Tom because he was poor, and she grew tired of waiting for him after the war."}, {"front": "How does Tom counter Gatsby's assertion that Daisy has never loved him?", "back": "Tom insists Daisy loved him when they married and still loves him, dismissing her 'foolish ideas' and acknowledging his 'sprees' but stating his heart always belongs to her."}, {"front": "What does Daisy reveal about Tom's past by calling him 'revolting' and mentioning their move from Chicago?", "back": "She implies Tom has a history of infidelity ('little spree') that caused them to leave Chicago, highlighting his hypocrisy and her long-standing resentment."}, {"front": "What does Gatsby pressure Daisy to do during the hotel confrontation?", "back": "He pressures her to tell Tom directly that she never loved him, believing it will 'wipe out' the past and validate their love."}, {"front": "What is Daisy's ultimate, conflicted admission regarding her feelings for Tom and Gatsby?", "back": "After initial reluctance, she breaks down, admitting, 'I did love him once—but I loved you too.'"}, {"front": "How does Gatsby react to Daisy's admission that she 'loved him once—but loved you too'?", "back": "He is visibly shocked and repeats, 'You loved me TOO?', indicating his idealization of their past and inability to accept her divided affections."}, {"front": "What specific accusation does Tom make against Gatsby's business dealings?", "back": "Tom reveals Gatsby and Meyer Wolfshiem bought 'side-street drug-stores' to illegally sell grain alcohol over the counter, accusing him of bootlegging and abandoning Walter Chase."}, {"front": "What disturbing expression does Nick notice on Gatsby's face when Tom exposes his illicit business?", "back": "Gatsby's face takes on a terrifying look, 'as if he had \"killed a man,\"' suggesting a darker past or hidden desperation."}, {"front": "How does Daisy react as Tom exposes Gatsby's illegal activities?", "back": "She is terrified, drawing 'further and further into herself,' losing whatever courage or intention she had to leave Tom."}, {"front": "How does Tom assert his dominance and conclude the hotel confrontation?", "back": "He sends Daisy home with Gatsby in Gatsby's car, dismissing Gatsby's pursuit as a 'presumptuous little flirtation' that is 'over,' confident in his victory."}, {"front": "What significant personal realization does Nick have after the confrontation at the hotel?", "back": "He realizes it is his 30th birthday, seeing it as the beginning of a 'portentous, menacing road of a new decade' marked by loneliness and diminishing enthusiasm."}, {"front": "How does Nick implicitly contrast Jordan Baker with Daisy in his reflections on his birthday?", "back": "He notes Jordan is 'too wise ever to carry well-forgotten dreams from age to age,' implying she is more realistic and less emotionally entangled in the past than Daisy."}, {"front": "Who is Michaelis, and what does he discover about George Wilson?", "back": "Michaelis is the young Greek who runs the coffee joint near the ash-heaps. He finds George Wilson extremely sick, pale, and shaking from distress."}, {"front": "What shocking information does George Wilson reveal to Michaelis about Myrtle?", "back": "Wilson calmly states he has locked Myrtle upstairs and they are planning to move away, indicating his discovery of her infidelity and his intent to control her."}, {"front": "How does George Wilson's revelation about locking Myrtle upstairs show a departure from his usual character?", "back": "Michaelis, a neighbor for four years, is astonished because Wilson usually appears 'worn-out' and incapable of such a decisive, violent act, revealing a desperate change in his demeanor."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
