<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What impression does Nick's detailed list of Gatsby's party guests create?", "back": "It reveals a diverse, often morally questionable, and transient crowd who exploit Gatsby's hospitality without truly knowing or caring about him."}, {"front": "What are some of the bizarre rumors circulated about Jay Gatsby among his partygoers?", "back": "He is rumored to be a bootlegger, to have killed a man, to be nephew to Von Hindenburg, and second cousin to the devil."}, {"front": "Who is Klipspringer, and what is his role at Gatsby's house?", "back": "He is known as 'the boarder,' an opportunistic individual who lives at Gatsby's house so often and long that he seems to have no other home."}, {"front": "Describe Gatsby's characteristic physical mannerisms as observed by Nick during their drive to the city.", "back": "He exhibits a restless energy, balancing on his car's dashboard, tapping his foot, and impatiently opening and closing his hand, contrasting with his otherwise punctilious manner."}, {"front": "How does Nick initially describe Gatsby's car when Gatsby comes to pick him up?", "back": "It is a gorgeous, rich cream-colored car, bright with nickel, monstrously long, terraced with a labyrinth of windshields, and a green leather conservatory for a cabin."}, {"front": "What is Nick's initial opinion of Gatsby before their drive, and how does it change?", "back": "He initially viewed Gatsby as a person of 'undefined consequence,' but this impression faded, and Gatsby became 'simply the proprietor of an elaborate road-house next door.'"}, {"front": "Why does Gatsby decide to share his 'life story' with Nick during their drive?", "back": "He wants Nick to know 'something about me' before making a 'big request,' to prevent Nick from thinking he's 'just some nobody,' and to counter the strange rumors circulating about him."}, {"front": "What is the first major lie Gatsby tells Nick about his fabricated past?", "back": "He claims to be the son of wealthy people in the Middle West, all dead, and educated at Oxford as a family tradition."}, {"front": "What specific detail in Gatsby's fabricated story immediately raises Nick's suspicion about his Oxford claim?", "back": "Gatsby hurries, swallows, or chokes on the phrase 'educated at Oxford,' as if it bothers him."}, {"front": "What geographical error does Gatsby make when Nick asks what part of the Middle West he's from?", "back": "He states 'San Francisco,' which is on the Pacific coast, not in the Middle West, deepening Nick's suspicion."}, {"front": "How does Gatsby describe his life after his family's alleged death and inheritance?", "back": "He says he 'lived like a young rajah in all the capitals of Europe,' collecting jewels, hunting big game, and trying to forget 'something very sad that had happened to me long ago.'"}, {"front": "What role did World War I play in Gatsby's recounted history, according to him?", "back": "He claims it was a 'great relief,' and he 'tried very hard to die.' He accepted a commission as first lieutenant and performed a heroic act in the Argonne Forest, leading two machine-gun detachments."}, {"front": "What physical evidence does Gatsby produce to 'prove' his war heroism and Oxford days?", "back": "He shows Nick a medal from Montenegro ('Orderi di Danilo') for 'Valour Extraordinary' and a photograph from Oxford's Trinity Quad showing him with a cricket bat."}, {"front": "What is Nick's reaction to Gatsby producing these pieces of evidence (medal, photo)?", "back": "His initial incredulity is 'submerged in fascination,' and he becomes convinced that Gatsby's story, despite its exoticism, is true."}, {"front": "Define 'knickerbocker' as used in the context of the text (referring to Clarence Endive).", "back": "A member of the original Dutch settlers of New York; by extension, a person of established New York social standing."}, {"front": "What does the term 'rajah' evoke when Gatsby uses it to describe his life in Europe?", "back": "An Indian king or prince, used to evoke a life of exotic luxury and princely extravagance."}, {"front": "What 'big request' does Gatsby hint at that he needs Jordan Baker to convey to Nick?", "back": "Gatsby does not reveal the specific request to Nick, only that Jordan Baker has consented to speak to Nick about a 'matter' during their tea."}, {"front": "What is Nick's emotional response to Gatsby's indirect request involving Jordan Baker?", "back": "He is 'more annoyed than interested,' feeling that he hadn't asked Jordan to tea to discuss Mr. Jay Gatsby, and finds the request likely 'utterly fantastic.'"}, {"front": "How does the listing of Gatsby's party guests contribute to the novel's themes?", "back": "It highlights the superficiality and anonymity of the Jazz Age social scene, where people are drawn to Gatsby's wealth and spectacle but remain ignorant and indifferent to his true identity or personal life."}, {"front": "What is ironic about Gatsby's careful presentation of his fabricated past to Nick?", "back": "Despite his attempts to appear legitimate and important, his story contains inconsistencies and exaggerations (like San Francisco as the Middle West), yet Nick is momentarily convinced by the sheer spectacle and physical evidence Gatsby provides."}, {"front": "What does Gatsby's constant restlessness, despite his punctilious manner, suggest about his character?", "back": "It suggests an underlying anxiety or inability to be truly at peace, perhaps stemming from his efforts to maintain a fabricated identity or his fervent pursuit of a past dream."}, {"front": "Name two examples of guests who came from East Egg to Gatsby's parties.", "back": "The Chester Beckers and the Leeches; or the Hornbeams and the Willie Voltaires; or the Blackbucks and the Ismays, etc."}, {"front": "Name two examples of guests who came from West Egg to Gatsby's parties.", "back": "The Poles and the Mulreadys; or Gulick the state senator and Newton Orchid; or Da Fontano and James B. ('Rot-Gut.') Ferret, etc."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
