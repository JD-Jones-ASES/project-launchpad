<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What elaborate preparations did Gatsby make for his reunion with Daisy at Nick's cottage?", "back": "Gatsby arranged for a greenhouse of flowers, had Nick's lawn freshly mowed, and carefully chose his outfit."}, {"front": "Describe the initial atmosphere of Gatsby and Daisy's reunion.", "back": "It was painfully awkward; Gatsby was rigid and pale, conversation was stilted, and a mantelpiece clock nearly crashed."}, {"front": "How did the atmosphere change after Nick left and returned during Gatsby and Daisy's reunion?", "back": "When Nick returned, Gatsby was radiant, and Daisy's face was tear-streaked but joyful."}, {"front": "What are the two main emotional climaxes described in Chapter 5?", "back": "Daisy weeping over Gatsby's beautiful shirts, and Gatsby pointing out the green light only to realize its symbolic power had diminished."}, {"front": "What does Nick observe about Gatsby's face as he departs at the end of Chapter 5?", "back": "Nick observes a flicker of bewilderment, suggesting Gatsby's faint awareness that the real Daisy may not match his five-year-long dream."}, {"front": "Define 'Defunct' as used in Chapter 5.", "back": "No longer existing or functioning. The 'defunct' mantelpiece clock reinforces the theme of arrested time."}, {"front": "Define 'Counterfeit' as used to describe Gatsby's ease.", "back": "An imitation made to deceive; not genuine. Gatsby assumed 'a strained counterfeit of perfect ease,' highlighting the gap between his performance and his actual emotional state."}, {"front": "What does it mean to be 'Harrowed'?", "back": "Distressed or tormented. Nick felt 'a little harrowed' by the tension of Gatsby and Daisy's impending meeting."}, {"front": "What is 'Reproach'?", "back": "An expression of disapproval or disappointment. Gatsby looked at Nick 'with unforgettable reproach' when scolded for acting like a child."}, {"front": "What does it mean to do something 'Conscientiously'?", "back": "With painstaking care and thoroughness. Gatsby watched Nick and Daisy 'conscientiously,' suggesting both attentiveness and anxiety."}, {"front": "Define 'Exultation'.", "back": "A feeling of triumphant joy. Gatsby's transformation after the reunion was described as beyond 'a word or a gesture of exultation,' signifying his profound happiness."}, {"front": "What does 'Revalued' mean in the context of Gatsby's house?", "back": "Assessed again at a different worth. Gatsby 'revalued everything in his house according to the measure of response it drew from' Daisy's eyes, revealing her approval was his only standard."}, {"front": "What is a 'Pompadour'?", "back": "A hairstyle in which the hair is swept upward from the forehead. Daisy exclaims over Gatsby's youthful pompadour in an old photograph, connecting to the theme of the irretrievable past."}, {"front": "Define 'Nebulous'.", "back": "Vague, indistinct, or ill-defined. Klipspringer's trousers are of a 'nebulous hue,' a word that suits the indefinite, parasitic quality of his character."}, {"front": "What does 'Corrugated' mean, as applied to the Sound?", "back": "Formed into a series of ridges and grooves. The 'corrugated surface of the Sound' reflects the visual texture of the water as rain strikes it, contributing to the chapter's atmospheric density."}, {"front": "Before Chapter 5, what did the green light at the end of Daisy's dock symbolize for Gatsby?", "back": "It functioned as a beacon of longing—distant, luminous, and charged with all of Gatsby's accumulated desire."}, {"front": "How does the symbolic meaning of the green light change after Gatsby reunites with Daisy in Chapter 5?", "back": "Its 'colossal significance... vanished forever.' What was once an 'enchanted object' becomes 'again a green light on a dock,' its symbolic power diminished by Daisy's physical presence."}, {"front": "What central irony about dreams does the diminishing power of the green light reveal?", "back": "The achievement of a dream diminishes the dream itself, as the physical reality cannot live up to the imagined ideal."}, {"front": "According to the text, why couldn't Daisy, or any human being, fully sustain Gatsby's illusion?", "back": "Gatsby's illusion had 'gone beyond her, beyond everything,' possessing a 'colossal vitality' that no reality could match."}, {"front": "What does Daisy weeping over Gatsby's 'beautiful shirts' symbolize?", "back": "Her tears are ambiguous; she may be mourning the years she missed, the life she chose not to live, or simply responding to the sheer material extravagance that represents Gatsby's devotion."}, {"front": "How does Fitzgerald suggest both Gatsby and Daisy communicate emotion in the shirts scene?", "back": "They communicate through material objects rather than direct speech, highlighting that objects inevitably fall short of true emotional expression."}, {"front": "What 'tragic trajectory' for the novel does Chapter 5 establish?", "back": "Gatsby has achieved his prize (Daisy) only to discover that winning cannot restore the past or fully satisfy his idealized dream."}, {"front": "What 'gap' does Daisy's physical presence reveal for Gatsby?", "back": "The gap between the real woman and the mythic ideal he had created for her."}, {"front": "How does Gatsby's 'bewilderment' at the end of the chapter foreshadow the novel's outcome?", "back": "It hints at his nascent realization that Daisy 'tumbled short of his dreams,' suggesting an underlying disillusionment that will lead to tragedy."}, {"front": "What concept is highlighted by Gatsby 'revalu[ing] everything in his house according to the measure of response it drew from' Daisy's eyes?", "back": "It shows that Daisy's approval is the only standard of value that matters to Gatsby, underscoring his complete devotion and dependence on her perception."}, {"front": "In what way does the 'defunct' mantelpiece clock reinforce a theme in Chapter 5?", "back": "It suggests arrested or stopped time, reflecting Gatsby's five-year obsession with recreating the past with Daisy."}, {"front": "Describe the difference between Gatsby's performance and his actual emotional state during the initial reunion.", "back": "He assumed 'a strained counterfeit of perfect ease,' which masked his extreme anxiety, rigidity, and paleness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
