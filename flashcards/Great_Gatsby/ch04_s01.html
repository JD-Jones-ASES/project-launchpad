<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading a Modern Novel: The Great Gatsby &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Reading a Modern Novel: The Great Gatsby &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Great_Gatsby">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Nick's catalog of Gatsby's summer guests suggest about the nature of wealth in his circle?", "back": "It suggests that the guests embody wealth, corruption, and recklessness."}, {"front": "What key details does Gatsby include in his initial, rehearsed autobiography to Nick?", "back": "He claims to come from a wealthy Midwestern family, to have an Oxford education, extensive European wanderings, and war heroism."}, {"front": "How does Nick initially react to Gatsby's autobiography, and what causes his doubts to momentarily disappear?", "back": "Nick finds it implausible and rehearsed until Gatsby produces physical evidence: a war medal and a photograph."}, {"front": "Who is Meyer Wolfshiem, and what specific details reveal his connection to the criminal underworld?", "back": "Wolfshiem is a gambler and Gatsby's business associate. His sentimental nostalgia for Rosy Rosenthal's murder and his human-molar cuff buttons reveal his criminal ties."}, {"front": "Why does Gatsby vanish rather than confront Tom Buchanan when Tom unexpectedly appears at the restaurant?", "back": "Gatsby vanishes to avoid facing Tom Buchanan."}, {"front": "According to Jordan Baker, what was the history between Jay Gatsby and Daisy Fay in Louisville in 1917?", "back": "The young Lieutenant Jay Gatsby and Daisy Fay fell in love."}, {"front": "What dramatic event occurred on the eve of Daisy's wedding to Tom Buchanan, as told by Jordan?", "back": "Drunk, clutching a letter, Daisy nearly broke off her engagement and tried to return Tom's pearls, but ultimately married him and his wealth."}, {"front": "What is Gatsby's ultimate, obsessive purpose for accumulating wealth and buying his West Egg mansion?", "back": "His purpose is to recover the past, specifically to be across the bay from Daisy and attract her attention."}, {"front": "What modest request does Jordan Baker deliver from Gatsby to Nick?", "back": "Gatsby requests that Nick invite Daisy to tea so that Gatsby can 'casually' come over from next door."}, {"front": "Define 'Punctilious' as Nick uses it to describe Gatsby's manner.", "back": "Showing great attention to detail or correct behavior; excessively precise, often in a formal manner."}, {"front": "What does 'Somnambulatory' mean in the context of Wolfshiem's behavior?", "back": "Resembling or characteristic of sleepwalking; describing Wolfshiem's sudden lapse into abstraction as they enter the restaurant."}, {"front": "Explain 'Incredulity' in relation to Nick's reaction to Gatsby's life story.", "back": "It describes Nick's state of being unable or unwilling to believe Gatsby's formulaic and implausible autobiography."}, {"front": "What does 'Denizen' signify when Gatsby calls Wolfshiem 'a denizen of Broadway'?", "back": "A person who regularly frequents a particular place; here, a euphemistic way of referring to Wolfshiem's involvement in the New York underworld."}, {"front": "How is the word 'Dispensed' used when Nick reflects that Gatsby 'dispensed starlight to casual moths'?", "back": "It means Gatsby distributed or provided lavish parties for strangers solely to attract Daisy's attention."}, {"front": "What central theme of the novel does Fitzgerald illustrate through Nick's acceptance of Gatsby's physical evidence (medal, photograph)?", "back": "In a culture obsessed with surfaces and possessions, physical objects carry more persuasive power than narrative coherence."}, {"front": "What metaphor does Nick use to expose the constructed, artificial nature of Gatsby's self-presentation in his autobiography?", "back": "Nick compares the effect to a figure 'leaking sawdust'."}, {"front": "How does Meyer Wolfshiem's character complicate the question of identity, particularly regarding Gatsby?", "back": "Wolfshiem presents himself as genteel but is revealed to be a criminal who fixed the 1919 World Series, implying Gatsby's wealth likely comes from illicit sources and his polished identity is fabricated."}, {"front": "What significant criminal act is Meyer Wolfshiem famously associated with?", "back": "He fixed the 1919 World Series."}, {"front": "How does Jordan Baker's narrative about Gatsby and Daisy differ in purpose and content from Gatsby's own autobiography?", "back": "Jordan's account provides the emotional core and Gatsby's true, obsessive motivation (to recover the past with Daisy), which Gatsby's own autobiography strategically omitted in favor of a polished, legitimate image."}, {"front": "The chapter's literary analysis suggests identity in the novel is 'fundamentally performative.' How does this apply to Gatsby, Wolfshiem, and Daisy?", "back": "Gatsby performs the role of the wealthy gentleman, Wolfshiem performs the respectable businessman, and Daisy performs the dutiful bride (despite a drunken attempt to reject that role)."}, {"front": "What is the primary function of 'The Construction of Identity' as a theme explored in Chapter 4?", "back": "It explores how characters create and present their public personas, often to conceal deeper truths or achieve specific desires, highlighting the artificiality of self-presentation in society."}, {"front": "According to the analysis, what is the underlying purpose of Gatsby's 'lavish spectacle' (parties, mansion)?", "back": "It is an elaborate construction designed solely to recover a single moment from the past with Daisy, serving his obsessive purpose rather than being an end in itself."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
