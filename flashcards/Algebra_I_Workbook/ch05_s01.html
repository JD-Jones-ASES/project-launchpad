<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra_I_Workbook &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Workbook.html">&larr; Back to Algebra_I_Workbook</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

        </div>

    <script>
    var CARDS = [{"front": "What is the definition of a system of equations?", "back": "A set of two or more equations that are dealt with simultaneously.", "id": "fc01"}, {"front": "How is the solution to a system of linear equations identified on a graph?", "back": "It is the point where the lines representing the equations intersect.", "id": "fc02"}, {"front": "A system of equations is classified as _____ if it has at least one solution.", "back": "consistent", "id": "fc03"}, {"front": "What classification is given to a system of equations that has no solution?", "back": "Inconsistent", "id": "fc04"}, {"front": "A consistent system with exactly one solution occurs when the lines have different _____.", "back": "slopes", "id": "fc05"}, {"front": "Under what condition regarding slopes and intercepts does a system have no solution?", "back": "The lines have the same slope but different $y$-intercepts.", "id": "fc06"}, {"front": "What is the relationship between two lines in a consistent system with infinitely many solutions?", "back": "They have the same slope and the same $y$-intercept, representing the same line.", "id": "fc07"}, {"front": "In the substitution method, what is the first procedural step?", "back": "Solve one of the equations for one of the variables in terms of the other.", "id": "fc08"}, {"front": "When using the substitution method, what does it indicate if the variables cancel out and result in a true statement like $5 = 5$?", "back": "The system has infinitely many solutions.", "id": "fc09"}, {"front": "When using the substitution method, what does it indicate if the variables cancel out and result in a false statement like $0 = 12$?", "back": "The system has no solution.", "id": "fc10"}, {"front": "What is the primary goal of the elimination (addition/subtraction) method?", "back": "To add or subtract the equations so that one of the variables is cancelled out.", "id": "fc11"}, {"front": "Procedurally, what must be done in the elimination method if neither variable has the same or opposite coefficients in both equations?", "back": "Multiply one or both equations by a constant to create opposite coefficients for one variable.", "id": "fc12"}, {"front": "In a break-even analysis, what is the relationship between the Cost function ($C$) and the Revenue function ($R$)?", "back": "$C = R$", "id": "fc13"}, {"front": "For a school fundraiser selling adult tickets ($a$) for $\\$12$ and student tickets ($s$) for $\\$8$, what is the equation for a total revenue of $\\$1,800$?", "back": "$12a + 8s = 1800$", "id": "fc14"}, {"front": "If two cars are 180 miles apart and driving toward each other at speeds $r_1$ and $r_2$, what equation represents the time $t$ until they meet?", "back": "$r_1 t + r_2 t = 180$", "id": "fc15"}, {"front": "How is the rate of a boat traveling downstream calculated if $b$ is the boat's speed in still water and $c$ is the current's speed?", "back": "$b + c$", "id": "fc16"}, {"front": "How is the rate of a boat traveling upstream calculated if $b$ is the boat's speed in still water and $c$ is the current's speed?", "back": "$b - c$", "id": "fc17"}, {"front": "In a coin problem where $n$ represents nickels and $d$ represents dimes, what equation represents a total of 40 coins?", "back": "$n + d = 40$", "id": "fc18"}, {"front": "In a coin problem with $n$ nickels and $d$ dimes, what equation represents a total value of $\\$2.95$?", "back": "$0.05n + 0.10d = 2.95$", "id": "fc19"}, {"front": "Translate the sentence into an equation: 'Maria ($M$) is 5 years older than Tom ($T$).'", "back": "$M = T + 5$", "id": "fc20"}, {"front": "The perimeter of a rectangle is $56$ cm. If length is $L$ and width is $W$, what is the perimeter equation?", "back": "$2L + 2W = 56$", "id": "fc21"}, {"front": "In a mixture problem, if $x$ mL of a 20% acid solution is added to $y$ mL of a 50% acid solution to get 300 mL, what is the equation for the total volume?", "back": "$x + y = 300$", "id": "fc22"}, {"front": "In a mixture problem, what equation represents the amount of pure acid if $x$ mL of 20% solution and $y$ mL of 50% solution result in a 30% concentration of 300 mL?", "back": "$0.20x + 0.50y = 0.30(300)$", "id": "fc23"}, {"front": "How does a tailwind affect the speed of a plane relative to its airspeed ($p$) and the wind speed ($w$)?", "back": "The tailwind increases the ground speed to $p + w$.", "id": "fc24"}, {"front": "If $x$ dollars are invested at 4% interest and $y$ dollars at 6% interest, what is the equation for a total annual interest of $\\$248$?", "back": "$0.04x + 0.06y = 248$", "id": "fc25"}, {"front": "A point $(x, y)$ is a solution to a system of inequalities if it makes _____ of the inequalities in the system true.", "back": "all", "id": "fc26"}, {"front": "What type of boundary line is used to graph the inequality $y > 2x - 3$?", "back": "Dashed line", "id": "fc27"}, {"front": "What type of boundary line is used to graph the inequality $y \\le -x + 4$?", "back": "Solid line", "id": "fc28"}, {"front": "What term describes a solution region of an inequality system that is entirely enclosed by boundary lines?", "back": "Bounded region", "id": "fc29"}, {"front": "What term describes a solution region that extends infinitely in at least one direction?", "back": "Unbounded region", "id": "fc30"}, {"front": "In a system of inequalities, what are the 'vertices' of the solution region?", "back": "The points where the boundary lines of the system intersect.", "id": "fc31"}, {"front": "If a student can spend at most $\\$15$ on apples ($x$) at $\\$0.75$ each and granola bars ($y$) at $\\$1.50$ each, what is the resulting inequality?", "back": "$0.75x + 1.50y \\le 15$", "id": "fc32"}, {"front": "Translate the constraint 'at least 15 sandwiches total must be made' into an inequality using $x$ and $y$.", "back": "$x + y \\ge 15$", "id": "fc33"}, {"front": "In distance-rate-time problems, what is the formula relating distance ($d$), rate ($r$), and time ($t$)?", "back": "$d = rt$", "id": "fc34"}, {"front": "What is the relative speed of two objects moving in opposite directions at speeds $r_1$ and $r_2$?", "back": "$r_1 + r_2$", "id": "fc35"}, {"front": "A plumber charges $\\$80$ for the first hour and $\\$45$ for each additional hour ($h$). What expression represents the total charge?", "back": "$80 + 45h$", "id": "fc36"}, {"front": "In a system where $y = 3x - 5$ and $y = x + 3$, what is the first step to find the intersection using substitution?", "back": "Set the expressions equal to each other ($3x - 5 = x + 3$).", "id": "fc37"}, {"front": "If a system consists of the equations $x = 3$ and $y = -4$, what is the solution point?", "back": "$(3, -4)$", "id": "fc38"}, {"front": "A consistent system with infinitely many solutions is also known as a _____ system.", "back": "dependent", "id": "fc39"}, {"front": "What indicates that a system of two linear equations has no solution without looking at a graph?", "back": "The equations have the same slope but different $y$-intercepts.", "id": "fc40"}, {"front": "Which quadrant is the solution region restricted to by the constraints $x \\ge 0$ and $y \\ge 0$?", "back": "The first quadrant", "id": "fc41"}, {"front": "If a movie theater sells child tickets for $\\$6$ and adult tickets for $\\$9$, totaling 300 tickets for $\\$2,250$, what are the two equations?", "back": "$c + a = 300$ and $6c + 9a = 2250$", "id": "fc42"}, {"front": "A father ($F$) is three times as old as his daughter ($D$). In 10 years, he will be twice as old. What is the equation for his age in 10 years?", "back": "$F + 10 = 2(D + 10)$", "id": "fc43"}, {"front": "In an interest problem, if $\\$5,000$ is split between two accounts, $x$ and $y$, what is the principal equation?", "back": "$x + y = 5000$", "id": "fc44"}, {"front": "A speed boat ($40$ mph) leaves 2 hours after a canoe ($8$ mph). If $t$ is the time the boat travels, what is the distance equation for the canoe?", "back": "$d = 8(t + 2)$", "id": "fc45"}, {"front": "What is the solution to the system $y = 2x + 3$ and $y = 2x - 5$?", "back": "No solution", "id": "fc46"}, {"front": "What is the number of solutions for a system where both equations rewrite to $y = 2x - 5$?", "back": "Infinitely many solutions", "id": "fc47"}, {"front": "How is the 'break-even number of tickets' defined in the context of a band charging a fee plus a per-ticket cost?", "back": "The number of tickets sold where total costs equal total revenue.", "id": "fc48"}, {"front": "When solving $3x - y = 5$ and $6x - 2y = 8$ by elimination, what happens when you multiply the first equation by $-2$ and add them?", "back": "Both variables are eliminated and a false statement ($0 = -2$) remains, meaning no solution.", "id": "fc49"}, {"front": "To find the vertices of a bounded region in a system of inequalities, one must find the intersection points of the _____.", "back": "boundary lines", "id": "fc50"}, {"front": "If the sum of two numbers is 63 and one number ($x$) is three times the other ($y$), what is the system of equations?", "back": "$x + y = 63$ and $x = 3y$", "id": "fc51"}, {"front": "For the inequality $y < -x + 5$, the solution region consists of all points _____ the boundary line.", "back": "below", "id": "fc52"}, {"front": "For the inequality $y > 3x - 1$, the solution region consists of all points _____ the boundary line.", "back": "above", "id": "fc53"}, {"front": "In the system $x + y = 10$ and $2x - y = 5$, what is the most efficient first step using elimination?", "back": "Add the two equations together to eliminate $y$.", "id": "fc54"}, {"front": "When a system of equations is consistent and the lines are not identical, how many solutions does it have?", "back": "One solution", "id": "fc55"}, {"front": "Translate 'the difference of two numbers is 7' into an equation using $x$ (larger) and $y$ (smaller).", "back": "$x - y = 7$", "id": "fc56"}, {"front": "If a store sells 1 lb bags for $\\$5$ and 3 lb bags for $\\$12$, and sold 80 bags total for $\\$660$, what is the revenue equation?", "back": "$5x + 12y = 660$", "id": "fc57"}, {"front": "If a cyclist's speed ($c$) exceeds a jogger's speed ($j$) by 15 mph, what is the equation representing this?", "back": "$c = j + 15$", "id": "fc58"}, {"front": "In a mixture of two alloys (60% gold and 90% gold) to make 30 grams of 75% gold, what is the gold content equation?", "back": "$0.60x + 0.90y = 0.75(30)$", "id": "fc59"}, {"front": "What defines an 'independent' system of linear equations?", "back": "A system that has exactly one solution.", "id": "fc60"}, {"front": "In the system $x = -2$ and $y = 5$, what is the graphical appearance of the two lines?", "back": "One vertical line and one horizontal line.", "id": "fc61"}, {"front": "If the sum of two siblings' ages is 33, and the older ($x$) will be twice the younger ($y$) in 5 years, what is the age equation in 5 years?", "back": "$x + 5 = 2(y + 5)$", "id": "fc62"}, {"front": "When classifying $2x + y = 7$ and $2x + y = 3$, what is the conclusion based on the slopes and intercepts?", "back": "The system has no solution because the slopes are the same but the $y$-intercepts are different.", "id": "fc63"}, {"front": "What is the slope-intercept form of the equation $4x - 2y = 10$?", "back": "$y = 2x - 5$", "id": "fc64"}, {"front": "In a parking lot with motorcycles ($m$) and cars ($c$), if there are 18 vehicles total, what is the equation?", "back": "$m + c = 18$", "id": "fc65"}, {"front": "If motorcycles cost $\\$2$/hr and cars $\\$5$/hr, and total revenue was $\\$66$, what is the revenue equation?", "back": "$2m + 5c = 66$", "id": "fc66"}, {"front": "To determine if $(40, 40)$ satisfies the inventory cost $1.50x + 2.00y \\le 160$, what value is compared against 160?", "back": "$140$ ($1.50 \\times 40 + 2.00 \\times 40$)", "id": "fc67"}, {"front": "A gym instructor works at most 15 hours. If yoga ($x$) is 1 hour and spin ($y$) is 1.5 hours, what is the inequality?", "back": "$x + 1.5y \\le 15$", "id": "fc68"}, {"front": "The solution to a system of linear inequalities is the _____ of the solution sets of the individual inequalities.", "back": "intersection", "id": "fc69"}, {"front": "If two pricing plans are $A(x) = 3x + 10$ and $B(x) = 5x + 2$, which plan is cheaper for $x=5$ months?", "back": "Plan A", "id": "fc70"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
