    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Workbook.html">&larr; Back to Algebra_I_Workbook</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the procedure used to check if a numerical value is the correct solution to an equation?", "back": "Substitute the value back into the original equation to see if both sides are equal."}, {"front": "To solve the equation $x + 7 = 15$, which inverse operation must be applied to both sides?", "back": "Subtraction of $7$ from both sides."}, {"front": "In the equation $n - 11 = 7$, what action is required to isolate the variable $n$?", "back": "Addition of $11$ to both sides."}, {"front": "What operation is necessary to solve for $x$ in the equation $3x = 21$?", "back": "Division of both sides by $3$."}, {"front": "How is the variable $x$ isolated in the one-step equation $\\frac{x}{4} = 7$?", "back": "Multiplication of both sides by $4$."}, {"front": "In a two-step equation like $2x + 5 = 17$, which operation is typically performed first to isolate the variable term?", "back": "Subtraction of the constant $5$ from both sides."}, {"front": "When solving $3n - 7 = 14$, what is the first step in the process of isolation?", "back": "Addition of $7$ to both sides of the equation."}, {"front": "To solve $\\frac{x}{3} + 4 = 9$, what initial step must be taken before addressing the fraction?", "back": "Subtraction of $4$ from both sides."}, {"front": "Which mathematical property is used to simplify the expression $2(x + 4)$ in an equation?", "back": "The Distributive Property."}, {"front": "What is the result of applying the distributive property to the expression $-2(3x + 4)$?", "back": "$-6x - 8$."}, {"front": "In the equation $4x + 3x = 35$, what is the first step required to solve for $x$?", "back": "Combine the like terms on the left side to get $7x$."}, {"front": "What describes the relationship between 'consecutive integers' like $n$ and its successor?", "back": "They are integers that follow each other in order, represented as $n$ and $n + 1$."}, {"front": "How are two 'consecutive even integers' algebraically represented?", "back": "They are represented as $n$ and $n + 2$, where $n$ is an even number."}, {"front": "In the context of word problems, what formula is used to calculate the perimeter of a rectangle?", "back": "$P = 2l + 2w$."}, {"front": "When an equation like $2x + 3 = 2x + 7$ results in a false statement such as $3 = 7$, what is the solution?", "back": "No solution."}, {"front": "What is the solution status when an equation simplifies to an identity, such as $5 = 5$?", "back": "All real numbers."}, {"front": "In the distance formula $d = rt$, what does the variable $r$ represent?", "back": "The rate of speed."}, {"front": "To solve the literal equation $A = lw$ for $w$, what operation must be performed?", "back": "Division of both sides by $l$."}, {"front": "What is the formula for the area of a triangle solved for $h$?", "back": "$h = \\frac{2A}{b}$."}, {"front": "In the simple interest formula $I = Prt$, what does the variable $P$ represent?", "back": "The principal amount of the investment."}, {"front": "What is the literal equation $y = mx + b$ solved for $m$?", "back": "$m = \\frac{y - b}{x}$."}, {"front": "How is the variable $C$ isolated in the temperature formula $F = \\frac{9}{5}C + 32$?", "back": "$C = \\frac{5}{9}(F - 32)$."}, {"front": "What is the mathematical definition of a proportion?", "back": "An equation stating that two ratios are equal."}, {"front": "Which method is commonly used to solve the proportion $\\frac{a}{b} = \\frac{c}{d}$?", "back": "Cross-multiplication, resulting in $ad = bc$."}, {"front": "In the proportion $\\frac{x}{6} = \\frac{5}{3}$, what is the value of $x$?", "back": "$10$."}, {"front": "If a map scale is $2\\text{ cm} = 50\\text{ km}$, how many kilometers are represented by $7\\text{ cm}$?", "back": "$175\\text{ km}$."}, {"front": "To find $35\\%$ of $80$, what multiplication expression should be used?", "back": "$0.35 \\times 80$."}, {"front": "What is the standard algebraic equation used to find what percent $x$ is of $y$?", "back": "$p \\times y = x$, where $p$ is the percentage as a decimal."}, {"front": "How is a fraction like $\\frac{3}{8}$ converted into a percentage?", "back": "Divide the numerator by the denominator and multiply by $100$."}, {"front": "What is the formula for finding the percent increase between two values?", "back": "$\\frac{\\text{amount of increase}}{\\text{original amount}} \\times 100$."}, {"front": "When calculating a $7\\%$ sales tax on a price $P$, what is the expression for the total cost?", "back": "$P + 0.07P$ or $1.07P$."}, {"front": "How is the sale price calculated for an item with original price $X$ and a $20\\%$ discount?", "back": "$X - 0.20X$ or $0.80X$."}, {"front": "In financial mathematics, what is 'commission'?", "back": "A percentage of a total sale earned by a salesperson."}, {"front": "What is the formula for calculating 'markup' on an item purchased at cost $C$ with a markup rate $r$?", "back": "$C \\times r$."}, {"front": "In the context of the distance formula $d = rt$, how is time ($t$) calculated if distance and rate are known?", "back": "$t = \\frac{d}{r}$."}, {"front": "Solve the proportion $\\frac{x + 2}{5} = \\frac{4}{10}$ for $x$.", "back": "$x = 0$."}, {"front": "What percent of $50$ is $18$?", "back": "$36\\%$."}, {"front": "Determine the percent decrease from $80$ to $60$.", "back": "$25\\%$."}, {"front": "A town's population grew from $8,500$ to $9,690$. What was the percent increase?", "back": "$14\\%$."}, {"front": "If an investment of $1,200$ earned $72$ dollars in interest over $2$ years, what was the annual interest rate?", "back": "$3\\%$."}, {"front": "In the proportion $\\frac{n + 3}{n - 3} = \\frac{5}{3}$, what is the value of $n$?", "back": "$12$."}, {"front": "To solve $6m + 9 = 10m - 3$, what is a logical first step to group the variable terms?", "back": "Subtract $6m$ from both sides of the equation."}, {"front": "What is the result of converting $140\\%$ to a decimal?", "back": "$1.4$."}, {"front": "In the literal equation $V = lwh$, how do you isolate $h$?", "back": "Divide both sides by the product of $l$ and $w$."}, {"front": "What is the first step to solve the equation $4(2m + 3) = 3(m + 8)$?", "back": "Apply the distributive property to both sides of the equation."}, {"front": "If $21$ is $15\\%$ of a number, what is the number?", "back": "$140$."}, {"front": "Solve the proportion $\\frac{0.9}{1.5} = \\frac{x}{5}$ for $x$.", "back": "$3$."}, {"front": "A rectangle has a perimeter of $38\\text{ cm}$ and its length is $5$ more than its width. What is the width?", "back": "$7\\text{ cm}$."}, {"front": "If 5 items cost $8.75$ dollars, what is the cost of 8 items?", "back": "$14.00$ dollars."}, {"front": "What is the value of $x$ when $2x + 3y = 12$ and $y = 2$?", "back": "$3$."}, {"front": "The sum of three consecutive integers is $84$. What is the first integer in the sequence?", "back": "$27$."}, {"front": "In the equation $0.5x + 2 = 0.2x + 8$, what is the value of $x$?", "back": "$20$."}, {"front": "Find the value of $F$ (Fahrenheit) when the temperature is $37^{\\circ}$ Celsius.", "back": "$98.6^{\\circ}$ Fahrenheit."}, {"front": "If a board is $11.75$ feet long and a $3.5$ foot piece is removed, how long is the remaining piece?", "back": "$8.25$ feet."}, {"front": "A car travels $165$ miles in $3$ hours. At that rate, how far does it travel in $5$ hours?", "back": "$275$ miles."}, {"front": "What is $0.5\\%$ of $800$?", "back": "$4$."}, {"front": "Find the percent increase from $120$ to $150$.", "back": "$25\\%$."}, {"front": "An item is priced at $120$ dollars, discounted by $25\\%$, and then taxed at $8\\%$. What is the final price?", "back": "$97.20$ dollars."}, {"front": "Solve the formula $ax + by = c$ for $x$.", "back": "$x = \\frac{c - by}{a}$."}, {"front": "If $6$ is $0.3\\%$ of a number, what is that number?", "back": "$2,000$."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
