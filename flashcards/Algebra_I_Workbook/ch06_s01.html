<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra_I_Workbook &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Workbook.html">&larr; Back to Algebra_I_Workbook</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the Product of Powers property, how is the expression $x^a \\cdot x^b$ simplified?", "back": "$x^{a+b}$"}, {"front": "Simplify the expression $2^3 \\cdot 2^4$ using exponent rules.", "back": "$2^7$"}, {"front": "What is the result of the Power of a Power property applied to $(x^a)^b$?", "back": "$x^{ab}$"}, {"front": "Simplify the expression $(a^2)^5$.", "back": "$a^{10}$"}, {"front": "The Power of a Product property states that $(xy)^n$ is equivalent to _____.", "back": "$x^n y^n$"}, {"front": "Simplify the expression $(-2n)^4$.", "back": "$16n^4$"}, {"front": "What is the formula for the volume of a cube with side length $s$?", "back": "$V = s^3$"}, {"front": "Simplify the volume expression for a cube with side length $2x^2$.", "back": "$8x^6$"}, {"front": "What is the area of a square tile with side length $3a^2$?", "back": "$9a^4$"}, {"front": "Simplify the expression for the volume of a rectangular box with dimensions $2x$, $3x$, and $x^2$.", "back": "$6x^4$"}, {"front": "According to the Zero Exponent property, any non-zero number $a$ raised to the power of $0$ ($a^0$) equals _____.", "back": "$1$"}, {"front": "What is the value of the expression $-6^0$?", "back": "$-1$"}, {"front": "Rewrite the expression $x^{-n}$ using only positive exponents.", "back": "$\\frac{1}{x^n}$"}, {"front": "Simplify the expression $3^{-2}$ and write it as a fraction.", "back": "$\\frac{1}{9}$"}, {"front": "According to the Quotient of Powers property, how is the expression $\\frac{x^a}{x^b}$ simplified ($x \\neq 0$)?", "back": "$x^{a-b}$"}, {"front": "Simplify the quotient $\\frac{2^6}{2^2}$.", "back": "$2^4$"}, {"front": "Simplify the expression $\\frac{6x^5 y^{-3}}{3x^2 y^2}$ using only positive exponents.", "back": "$\\frac{2x^3}{y^5}$"}, {"front": "A number is written in scientific notation if it is in the form $a \\times 10^n$, where the absolute value of $a$ is _____.", "back": "Greater than or equal to $1$ and less than $10$."}, {"front": "Write $5,400,000$ in scientific notation.", "back": "$5.4 \\times 10^6$"}, {"front": "Write $0.00032$ in scientific notation.", "back": "$3.2 \\times 10^{-4}$"}, {"front": "Convert $8.1 \\times 10^{-3}$ from scientific notation to standard form.", "back": "$0.0081$"}, {"front": "Simplify the product $(3 \\times 10^4)(2 \\times 10^5)$ and write the result in scientific notation.", "back": "$6 \\times 10^9$"}, {"front": "Simplify the quotient $\\frac{8 \\times 10^6}{4 \\times 10^2}$ and write the result in scientific notation.", "back": "$2 \\times 10^4$"}, {"front": "When adding or subtracting numbers in scientific notation, such as $(3.5 \\times 10^4) + (1.2 \\times 10^4)$, the _____ must be the same.", "back": "Exponents of $10$"}, {"front": "Light travels at $3 \\times 10^8$ meters per second; how far does it travel in $5$ seconds?", "back": "$1.5 \\times 10^9$ meters"}, {"front": "What is the degree of a monomial?", "back": "The sum of the exponents of its variables."}, {"front": "State the degree of the monomial $6a^2b$.", "back": "$3$"}, {"front": "How is a polynomial classified if it has exactly three terms?", "back": "Trinomial"}, {"front": "What is the degree of the polynomial $3x^2 - 5x + 7$?", "back": "$2$"}, {"front": "A polynomial is in _____ form when its terms are written in descending order by degree.", "back": "Standard"}, {"front": "Write the polynomial $7 - n + 4n^3 - 2n^2$ in standard form.", "back": "$4n^3 - 2n^2 - n + 7$"}, {"front": "Simplify the sum $(3x^2 + 2x - 1) + (x^2 - 4x + 5)$.", "back": "$4x^2 - 2x + 4$"}, {"front": "Simplify the difference $(5x^2 - 3x + 2) - (2x^2 + x - 4)$.", "back": "$3x^2 - 4x + 6$"}, {"front": "What is the formula for the perimeter of a rectangle with length $L$ and width $W$?", "back": "$P = 2L + 2W$"}, {"front": "Simplify the expression $3x(2x^2 - 5x + 1)$.", "back": "$6x^3 - 15x^2 + 3x$"}, {"front": "Multiply the binomials $(x + 3)(x + 5)$.", "back": "$x^2 + 8x + 15$"}, {"front": "Simplify the product $(2x + 1)(3x - 4)$.", "back": "$6x^2 - 5x - 4$"}, {"front": "What is the result of multiplying $(x - 8)(x + 8)$?", "back": "$x^2 - 64$"}, {"front": "Simplify the product $(x + 1)(x^2 - 2x + 3)$.", "back": "$x^3 - x^2 + x + 3$"}, {"front": "What is the area of a room that is $(x + 5)$ feet long and $(x + 3)$ feet wide?", "back": "$x^2 + 8x + 15$ square feet"}, {"front": "The Square of a Sum pattern states that $(a + b)^2 = $ _____.", "back": "$a^2 + 2ab + b^2$"}, {"front": "Expand $(x + 5)^2$ using the perfect square trinomial pattern.", "back": "$x^2 + 10x + 25$"}, {"front": "The Square of a Difference pattern states that $(a - b)^2 = $ _____.", "back": "$a^2 - 2ab + b^2$"}, {"front": "Expand $(2x - 5)^2$ using the appropriate special product pattern.", "back": "$4x^2 - 20x + 25$"}, {"front": "The Difference of Squares pattern states that $(a + b)(a - b) = $ _____.", "back": "$a^2 - b^2$"}, {"front": "Simplify $(4n + 3)(4n - 3)$ using the difference of squares pattern.", "back": "$16n^2 - 9$"}, {"front": "Use the difference of squares pattern to compute the product of $53 \\cdot 47$.", "back": "$2491$"}, {"front": "Use the square of a difference pattern to calculate $48^2$ by rewriting it as $(50 - 2)^2$.", "back": "$2304$"}, {"front": "What is the area of a square garden with side length $(x + 8)$?", "back": "$x^2 + 16x + 64$"}, {"front": "A square has side length $n + 5$, and a smaller square of side $n$ is removed. What is the remaining area?", "back": "$10n + 25$"}, {"front": "Simplify: $(a^3 b^2)^2 a^5$.", "back": "$a^{11} b^4$"}, {"front": "Evaluate the expression $(2^3)^2$.", "back": "$64$"}, {"front": "Simplify $x^3 x^4 x^2$ using the Product of Powers rule.", "back": "$x^9$"}, {"front": "Rewrite $4 \\cdot 5^{-2}$ using only positive exponents.", "back": "$\\frac{4}{25}$"}, {"front": "Simplify the expression $(x^2 y^3)^{-2}$ using only positive exponents.", "back": "$\\frac{1}{x^4 y^6}$"}, {"front": "What is the standard form of $9.3 \\times 10^7$?", "back": "$93,000,000$"}, {"front": "Classify $4n^3$ by its number of terms.", "back": "Monomial"}, {"front": "Determine the degree of the polynomial $5a - 3 + a^4 - 2a^2$.", "back": "$4$"}, {"front": "Simplify: $(x^2 - 2) - (3x^2 - x + 4)$.", "back": "$-2x^2 + x - 6$"}, {"front": "Find the product: $(n - 6)(n - 8)$.", "back": "$n^2 - 14n + 48$"}, {"front": "Expand $(3a + 4)^2$ using a special product pattern.", "back": "$9a^2 + 24a + 16$"}, {"front": "Expand $(7 - x)(7 + x)$ using a special product pattern.", "back": "$49 - x^2$"}, {"front": "A rectangle has length $3x^2 + 2x$ and width $x^2 - 5$. What is the expression for its perimeter?", "back": "$8x^2 + 4x - 10$"}, {"front": "If revenue is $R$ and cost is $C$, what is the polynomial expression for profit $P$?", "back": "$P = R - C$"}, {"front": "Simplify the expression $(2x + 3)(x^2 - x + 1)$.", "back": "$2x^3 + x^2 - x + 3$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
