<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra_I_Workbook &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Workbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How is 'all real numbers greater than $7$' written as an inequality?", "back": "$x > 7$"}, {"front": "How is 'all real numbers at least $12$' expressed as an inequality?", "back": "$x \\ge 12$"}, {"front": "How is 'a number $n$ is no more than $25$' written as an inequality?", "back": "$n \\le 25$"}, {"front": "What inequality represents all real numbers strictly between $-4$ and $6$, including both endpoints?", "back": "$-4 \\le x \\le 6$"}, {"front": "What inequality is represented by an open circle at $5$ with an arrow pointing to the right on a number line?", "back": "$x > 5$"}, {"front": "What inequality is represented by a closed circle at $-2$ with an arrow pointing to the left on a number line?", "back": "$x \\le -2$"}, {"front": "What inequality is represented by a closed circle at $0$ and a closed circle at $8$ connected by a solid line?", "back": "$0 \\le x \\le 8$"}, {"front": "What inequality is represented by an open circle at $-6$ and a closed circle at $1$ connected by a solid line?", "back": "$-6 < x \\le 1$"}, {"front": "Describe the graph of $x > -3$ on a number line.", "back": "An open circle at $-3$ with an arrow pointing to the right."}, {"front": "Describe the graph of $-1 \\le x < 5$ on a number line.", "back": "A closed circle at $-1$ and an open circle at $5$ connected by a solid line."}, {"front": "Why is $x = 4$ not a solution to $2x - 3 > 5$?", "back": "Substituting $4$ results in $5$, and $5$ is not strictly greater than $5$."}, {"front": "Write $x < 7$ in set-builder notation.", "back": "$\\{x \\mid x < 7\\}$"}, {"front": "What is the interval notation for $x \\ge -5$?", "back": "$[-5, \\infty)$"}, {"front": "What is the interval notation for $-1 \\le x < 4$?", "back": "$[-1, 4)$"}, {"front": "Write the interval $(-\\infty, 3)$ as an inequality.", "back": "$x < 3$"}, {"front": "How is 'all real numbers no less than $12$' written as an inequality?", "back": "$x \\ge 12$"}, {"front": "Write an inequality representing a speed limit $s$ of $65$ mph.", "back": "$s \\le 65$"}, {"front": "If a student must score at least $70$ points to pass, what inequality represents a passing score $p$?", "back": "$p \\ge 70$"}, {"front": "An elevator has a weight limit of $2,500$ pounds. What inequality represents all safe weights $w$?", "back": "$w \\le 2500$"}, {"front": "What specific step is required when multiplying or dividing both sides of an inequality by a negative number?", "back": "Reverse the inequality sign."}, {"front": "Solve the inequality $x + 9 > 14$.", "back": "$x > 5$"}, {"front": "Solve the inequality $-3x \\le 18$.", "back": "$x \\ge -6$"}, {"front": "Solve the inequality $2x + 7 > 15$.", "back": "$x > 4$"}, {"front": "Solve the inequality $-2a + 9 \\le 3$.", "back": "$a \\ge 3$"}, {"front": "Solve the multi-step inequality $3(x + 2) > 18$.", "back": "$x > 4$"}, {"front": "Solve the inequality $5x - 3 > 3x + 7$.", "back": "$x > 5$"}, {"front": "Solve the inequality $-0.5x + 3 > 7$.", "back": "$x < -8$"}, {"front": "What is the maximum number of full gallons of gas at $\\$3.50$ each that can be bought with $\\$42$?", "back": "$12$ gallons"}, {"front": "Solve the compound inequality $-5 < x + 3 < 9$.", "back": "$-8 < x < 6$"}, {"front": "Solve the compound inequality $1 \\le 2x - 3 \\le 9$.", "back": "$2 \\le x \\le 6$"}, {"front": "Solve the compound inequality $x + 2 > 7$ or $x - 1 < -4$.", "back": "$x > 5$ or $x < -3$"}, {"front": "What is the interval notation for $x > 5$ or $x < -3$?", "back": "$(-\\infty, -3) \\cup (5, \\infty)$"}, {"front": "Solve the compound inequality $3n > 15$ or $2n < -8$.", "back": "$n > 5$ or $n < -4$"}, {"front": "Write the compound inequality represented by the interval $(-3, 8]$.", "back": "$-3 < x \\le 8$"}, {"front": "Write the compound inequality represented by the union $(-\\infty, -5) \\cup (2, \\infty)$.", "back": "$x < -5$ or $x > 2$"}, {"front": "Give the interval notation for body temperatures $T$ between $97.8$ \\degree F and $99.1$ \\degree F, inclusive.", "back": "$[97.8, 99.1]$"}, {"front": "Write the compound inequality for a grade of B, where an average $a$ is at least $80$ but less than $90$.", "back": "$80 \\le a < 90$"}, {"front": "Solve the absolute value equation $|x| = 9$.", "back": "$x = 9$ or $x = -9$"}, {"front": "What is the solution to the absolute value equation $|x| = -5$?", "back": "No solution"}, {"front": "Solve the absolute value equation $|x + 4| = 7$.", "back": "$x = 3$ or $x = -11$"}, {"front": "Solve the absolute value equation $|2n + 5| = 11$.", "back": "$n = 3$ or $n = -8$"}, {"front": "Solve the absolute value equation $|x + 2| + 5 = 13$.", "back": "$x = 6$ or $x = -10$"}, {"front": "Solve the absolute value equation $3|a + 1| - 6 = 9$.", "back": "$a = 4$ or $a = -6$"}, {"front": "What is the solution to $|x + 6| + 5 = 2$?", "back": "No solution"}, {"front": "Write an absolute value equation for a number $x$ that is $8$ units from $3$ on the number line.", "back": "$|x - 3| = 8$"}, {"front": "Solve the absolute value inequality $|x| < 7$.", "back": "$-7 < x < 7$"}, {"front": "What is the solution to the absolute value inequality $|x| > 4$?", "back": "$x > 4$ or $x < -4$"}, {"front": "Solve the absolute value inequality $|a + 3| \\le 8$.", "back": "$-11 \\le a \\le 5$"}, {"front": "Solve the absolute value inequality $|a - 2| > 6$.", "back": "$a > 8$ or $a < -4$"}, {"front": "Solve the inequality $|2x + 1| < 9$.", "back": "$-5 < x < 4$"}, {"front": "Solve the inequality $|3n - 6| > 9$.", "back": "$n > 5$ or $n < -1$"}, {"front": "What is the solution to the absolute value inequality $|x + 4| > -2$?", "back": "All real numbers"}, {"front": "What is the solution to the absolute value inequality $|2n - 3| < -5$?", "back": "No solution"}, {"front": "Write $|x - 1| \\le 6$ as a compound inequality.", "back": "$-5 \\le x \\le 7$"}, {"front": "Write an absolute value inequality for a thermostat set at $70$ \\degree F that must stay within $3$ \\degree F of the setting.", "back": "$|T - 70| \\le 3$"}, {"front": "A survey has $42\\%$ support with a margin of error of $4$ percentage points. Write this as an absolute value inequality for $p$.", "back": "$|p - 42| \\le 4$"}, {"front": "Solve the absolute value inequality $|x + 7| < 3$.", "back": "$-10 < x < -4$"}, {"front": "Solve the absolute value inequality $|x - 1| \\ge 4$.", "back": "$x \\ge 5$ or $x \\le -3$"}, {"front": "Solve the equation $|2x + 0.6| = 1.4$.", "back": "$x = 0.4$ or $x = -1$"}, {"front": "What inequality describes a refrigerator temperature $T$ that must be kept below $40$ \\degree F?", "back": "$T < 40$"}, {"front": "Solve the compound inequality $-6 \\le n - 2 \\le 4$.", "back": "$-4 \\le n \\le 6$"}, {"front": "Write the interval $[6, \\infty)$ as an inequality.", "back": "$x \\ge 6$"}, {"front": "Describe the graph of $-3 < x \\le 2$ on a number line.", "back": "An open circle at $-3$ and a closed circle at $2$ connected by a solid line."}, {"front": "Solve the inequality $4x < 28$.", "back": "$x < 7$"}, {"front": "Solve the inequality $\\frac{x}{5} \\le 7$.", "back": "$x \\le 35$"}, {"front": "Solve the absolute value equation $|2x - 3| + 7 = 7$.", "back": "$x = 1.5$"}, {"front": "Solve the compound inequality $2 \\le 3a \\le 12$.", "back": "$\\frac{2}{3} \\le a \\le 4$"}, {"front": "Solve the absolute value inequality $2|n - 5| + 1 \\le 9$.", "back": "$1 \\le n \\le 9$"}, {"front": "Write the inequality for: 'The sum of three consecutive integers is greater than $45$'.", "back": "$n + (n+1) + (n+2) > 45$"}, {"front": "Find the range for a Celsius temperature $C$ that corresponds to a Fahrenheit temperature $F$ above $20$ \\degree C.", "back": "$F > 68$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
