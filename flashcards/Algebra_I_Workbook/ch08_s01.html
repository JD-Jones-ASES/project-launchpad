<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra_I_Workbook &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Algebra_I_Workbook">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the standard form of a quadratic equation?", "back": "$ax^2 + bx + c = 0$"}, {"front": "According to the Zero Product Property, if the product of two factors is zero, what must be true of at least one factor?", "back": "At least one factor must equal zero."}, {"front": "To solve $x^2 + 6x + 8 = 0$ by factoring, which two numbers must multiply to 8 and add to 6?", "back": "2 and 4"}, {"front": "What is the first step in solving $x^2 + 5x = -6$ by factoring?", "back": "Add 6 to both sides to set the equation to zero."}, {"front": "Solve the equation $x^2 - 10x + 25 = 0$ by factoring.", "back": "$x = 5$"}, {"front": "How is the equation $3x^2 - 12x = 0$ solved using factoring?", "back": "Factor out the greatest common factor, $3x$."}, {"front": "In the context of rectangle area problems, if the length is 5 more than the width ($w$), what is the algebraic expression for area?", "back": "$w(w + 5)$"}, {"front": "What algebraic expression represents the product of two consecutive positive integers $n$ and $n + 1$?", "back": "$n(n + 1)$"}, {"front": "In the projectile motion equation $h = -16t^2 + 80t$, what does $h = 0$ represent?", "back": "The object is at ground level."}, {"front": "A right triangle has legs $x$ and $x + 7$ with a hypotenuse of 13. What equation represents this relationship?", "back": "$x^2 + (x + 7)^2 = 13^2$"}, {"front": "What algebraic expression represents the product of two consecutive positive even integers $n$ and $n + 2$?", "back": "$n(n + 2)$"}, {"front": "If $x^2 = k$ and $k > 0$, what are the two real solutions for $x$?", "back": "$x = \\pm \\sqrt{k}$"}, {"front": "Under what condition does the equation $x^2 = k$ have no real solution?", "back": "When $k$ is less than zero ($k < 0$)."}, {"front": "What is the solution to $x^2 = 0$?", "back": "$x = 0$"}, {"front": "Simplify the radical solution for $x^2 = 50$.", "back": "$x = \\pm 5\\sqrt{2}$"}, {"front": "Solve the equation $(x - 3)^2 = 16$ using square roots.", "back": "$x = 7$ and $x = -1$"}, {"front": "To solve $3x^2 = 75$ using square roots, what is the required first step?", "back": "Divide both sides by 3 to isolate $x^2$."}, {"front": "Solve $(x + 4)^2 = 0$ for $x$.", "back": "$x = -4$"}, {"front": "State the Quadratic Formula used to solve $ax^2 + bx + c = 0$.", "back": "$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$"}, {"front": "In the Quadratic Formula, what is the term $b^2 - 4ac$ called?", "back": "The discriminant"}, {"front": "If the discriminant $b^2 - 4ac$ is negative, how many real solutions exist?", "back": "Zero (no real solution)"}, {"front": "What does a discriminant of zero ($b^2 - 4ac = 0$) indicate about the solutions of a quadratic equation?", "back": "There is exactly one real (repeated) solution."}, {"front": "When the discriminant is a positive perfect square, what type of real solutions does the equation have?", "back": "Two rational solutions"}, {"front": "When the discriminant is positive but not a perfect square, what type of real solutions does the equation have?", "back": "Two irrational solutions"}, {"front": "In the equation $x^2 - 4x + 1 = 0$, identifying $a, b, c$ for the Quadratic Formula yields:", "back": "$a = 1, b = -4, c = 1$"}, {"front": "What is the formula for the axis of symmetry of the parabola $f(x) = ax^2 + bx + c$?", "back": "$x = -\\frac{b}{2a}$"}, {"front": "How do you find the $y$-intercept of a quadratic function $f(x)$?", "back": "Evaluate the function at $x = 0$ (find $f(0)$)."}, {"front": "If the lead coefficient $a$ in $f(x) = ax^2 + bx + c$ is positive, in which direction does the parabola open?", "back": "Upward"}, {"front": "If the lead coefficient $a$ in $f(x) = ax^2 + bx + c$ is negative, in which direction does the parabola open?", "back": "Downward"}, {"front": "For the quadratic function $f(x) = a(x - h)^2 + k$, what are the coordinates of the vertex?", "back": "$(h, k)$"}, {"front": "For the quadratic function $f(x) = a(x - h)^2 + k$, what is the equation for the axis of symmetry?", "back": "$x = h$"}, {"front": "What is the $y$-intercept of the function $f(x) = 3x^2 - 6x + 1$?", "back": "$(0, 1)$"}, {"front": "How are the $x$-intercepts of a quadratic function $f(x)$ determined?", "back": "By solving the equation $f(x) = 0$."}, {"front": "For a parabola opening upward with vertex $(h, k)$, what is the range of the function?", "back": "$y \\ge k$"}, {"front": "For a parabola opening downward with vertex $(h, k)$, what is the range of the function?", "back": "$y \\le k$"}, {"front": "What is the domain of any quadratic function $f(x) = ax^2 + bx + c$?", "back": "All real numbers ($-\\infty < x < \\infty$)"}, {"front": "In a height function $h(t) = -16t^2 + 96t$, at what point in the parabola does the maximum height occur?", "back": "At the vertex"}, {"front": "When a company's profit is modeled by a quadratic function $P(x)$, what do the $x$-intercepts ($P = 0$) represent?", "back": "Break-even quantities"}, {"front": "A farmer encloses a rectangular pen against a barn using 80 feet of fencing for three sides. If the width is $w$, what is the length?", "back": "$80 - 2w$"}, {"front": "To find the maximum area of a rectangle with a fixed perimeter, one should find the $x$-coordinate of the _____ of the area function.", "back": "vertex"}, {"front": "Calculate the discriminant for $x^2 - 6x + 9 = 0$.", "back": "0"}, {"front": "What is the vertex of the function $f(x) = (x + 2)^2 + 5$?", "back": "$(-2, 5)$"}, {"front": "If a ball is thrown upward, what does the 't' value of the vertex represent?", "back": "The time it takes to reach maximum height."}, {"front": "Given $h(x) = -14x^2 + 4$, where $x$ is horizontal distance from center, what is the maximum height of the arch?", "back": "4 feet"}, {"front": "Solve the applied problem: The product of two consecutive positive integers is 90. Find the integers.", "back": "9 and 10"}, {"front": "Find the side length of a square if its area is 196 square centimeters.", "back": "14 cm"}, {"front": "Identify $h$ and $k$ for the function $f(x) = (x - 5)^2 - 9$.", "back": "$h = 5, k = -9$"}, {"front": "What is the value of $k$ so that $x^2 + kx + 9 = 0$ has exactly one real solution?", "back": "$k = 6$ or $k = -6$"}, {"front": "Does revenue ever equal zero if the discriminant of the revenue function is negative?", "back": "No"}, {"front": "Identify the axis of symmetry for $f(x) = x^2 - 8x + 12$.", "back": "$x = 4$"}, {"front": "What is the $y$-intercept of $f(x) = -x^2 + 6x - 1$?", "back": "$(0, -1)$"}, {"front": "A ball returns to ground level when its height $h$ equals _____.", "back": "0"}, {"front": "Calculate the discriminant of $2x^2 + 3x - 2 = 0$.", "back": "25"}, {"front": "If the discriminant is 25, are the solutions rational or irrational?", "back": "Rational (because 25 is a perfect square)"}, {"front": "Determine the direction of opening for $f(x) = -3x^2 + 6x - 5$.", "back": "Downward"}, {"front": "Solve $x^2 = 144$ using square roots.", "back": "$x = \\pm 12$"}, {"front": "In the function $P(x) = -2x^2 + 40x - 50$, what $x$ value maximizes profit?", "back": "$x = 10$"}, {"front": "What are the $x$-intercepts of $f(x) = x^2 - 4x + 4$?", "back": "$(2, 0)$"}, {"front": "Find the vertex of $f(x) = x^2 + 4x - 5$.", "back": "$(-2, -9)$"}, {"front": "What is the side length of a square garden with an area of 98 square meters (exact value)?", "back": "$7\\sqrt{2}$ meters"}, {"front": "Solve $(x - 6)^2 = 36$.", "back": "$x = 12$ and $x = 0$"}, {"front": "Find the radius of a circular fountain with an area of 49$\\pi$ square meters.", "back": "7 meters"}, {"front": "A rectangle has area 45, and length $L = W + 4$. What is the resulting quadratic equation in standard form?", "back": "$W^2 + 4W - 45 = 0$"}, {"front": "Calculate the discriminant for $x^2 + x - 6 = 0$.", "back": "25"}, {"front": "If $b^2 - 4ac = 12$, are the solutions rational or irrational?", "back": "Irrational (12 is not a perfect square)"}, {"front": "Determine the number of real solutions for $3x^2 + x + 2 = 0$ using the discriminant.", "back": "Zero (Discriminant is -23)"}, {"front": "Identify the vertex for $f(x) = -2(x - 1)^2 + 8$.", "back": "$(1, 8)$"}, {"front": "Find the axis of symmetry for $f(x) = (x - 3)^2 - 4$.", "back": "$x = 3$"}, {"front": "What is the maximum height of the rocket $h(t) = -5t^2 + 30t + 2$?", "back": "47 meters"}, {"front": "The product of two consecutive positive odd integers is 99. Find the integers.", "back": "9 and 11"}, {"front": "A square is enlarged by adding 3 inches to both length and width, resulting in an area of 81. Find the original side length.", "back": "6 inches"}, {"front": "How long does it take for an object to hit the ground if dropped from 400 feet, using $h = -16t^2 + 400$?", "back": "5 seconds"}, {"front": "Find the dimensions of a rectangle with perimeter 44 feet that maximize area.", "back": "11 feet by 11 feet (a square)"}, {"front": "Solve the equation $x^24 = 9$ using square roots.", "back": "$x = \\pm 6$"}, {"front": "Identify the vertex of $f(x) = 2x^2 + 8x - 3$.", "back": "$(-2, -11)$"}, {"front": "Determine the range of $f(x) = -x^2 + 2x + 8$.", "back": "$y \\le 9$"}, {"front": "What is the $x$-coordinate of the vertex for $f(x) = -3x^2 + 6x - 3$?", "back": "$x = 1$"}, {"front": "What is the value of the discriminant for $4x^2 - 4x + 1 = 0$?", "back": "0"}, {"front": "How many $x$-intercepts does a parabola have if its discriminant is zero?", "back": "One"}, {"front": "If a parabola's axis of symmetry is $x = 5$ and it passes through $(3, 7)$, what other point must have a $y$-value of 7?", "back": "$(7, 7)$"}, {"front": "Solve $(2x - 1)^2 = 25$ for $x$.", "back": "$x = 3$ and $x = -2$"}, {"front": "What is the first step to find the width of an arch at ground level for $h(x) = -(x - 3)^2 + 9$?", "back": "Set $h(x) = 0$ and solve for $x$."}, {"front": "A marble rolls off a 9-foot shelf. Using $h = -16t^2 + 9$, how long until it hits the floor?", "back": "0.75 seconds (or 3/4 seconds)"}, {"front": "Find the vertex of $f(x) = x^2 - 8x + 12$.", "back": "$(4, -4)$"}, {"front": "Identify the direction of opening for $f(x) = 4x^2 - 8x + 3$.", "back": "Upward"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
