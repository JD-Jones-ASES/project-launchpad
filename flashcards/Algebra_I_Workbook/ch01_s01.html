<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra_I_Workbook &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Workbook.html">&larr; Back to Algebra_I_Workbook</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Evaluate the algebraic expression $2x + 5$ when $x = 3$.", "back": "$11$", "id": "fc01"}, {"front": "Evaluate the algebraic expression $x^2 - 3x$ when $x = 4$.", "back": "$4$", "id": "fc02"}, {"front": "Evaluate the expression $3a + 2b$ when $a = 4$ and $b = 1$.", "back": "$14$", "id": "fc03"}, {"front": "Evaluate the expression $2a^2 - b$ when $a = 3$ and $b = 5$.", "back": "$13$", "id": "fc04"}, {"front": "According to the order of operations, what is the simplified value of $3 + 4 \\cdot 2$?", "back": "$11$", "id": "fc05"}, {"front": "Simplify the expression $15 \\div 3 + 2^2$ using the order of operations.", "back": "$9$", "id": "fc06"}, {"front": "Translate the verbal phrase \"A number increased by 8\" into an algebraic expression.", "back": "$n + 8$", "id": "fc07"}, {"front": "Translate the verbal phrase \"Three less than four times a number\" into an algebraic expression.", "back": "$4n - 3$", "id": "fc08"}, {"front": "What is the algebraic expression for \"Twice a number decreased by 5\"?", "back": "$2n - 5$", "id": "fc09"}, {"front": "State the formula for the perimeter ($P$) of a rectangle with length ($l$) and width ($w$).", "back": "$P = 2l + 2w$", "id": "fc10"}, {"front": "State the formula for the area ($A$) of a triangle with base ($b$) and height ($h$).", "back": "$A = \\frac{1}{2}bh$", "id": "fc11"}, {"front": "State the formula for the distance ($d$) traveled by an object at a rate ($r$) over time ($t$).", "back": "$d = rt$", "id": "fc12"}, {"front": "What is the formula to convert Celsius temperature ($C$) to Fahrenheit ($F$)?", "back": "$F = \\frac{9}{5}C + 32$", "id": "fc13"}, {"front": "Evaluate the expression $34x - 2$ when $x = 8$.", "back": "$270$", "id": "fc14"}, {"front": "List the sets of numbers to which the number $7$ belongs.", "back": "Natural, whole, integer, rational, and real.", "id": "fc15"}, {"front": "List the sets of numbers to which the number $0$ belongs.", "back": "Whole, integer, rational, and real.", "id": "fc16"}, {"front": "To which number sets does $-3$ belong?", "back": "Integer, rational, and real.", "id": "fc17"}, {"front": "Classify $\\sqrt{2}$ by listing all sets to which it belongs.", "back": "Irrational and real.", "id": "fc18"}, {"front": "What is the absolute value of $-7$ (written as $|-7|$)?", "back": "$7$", "id": "fc19"}, {"front": "What is the opposite of the number $-8$?", "back": "$8$", "id": "fc20"}, {"front": "Compare $-5$ and $-3$ using the correct inequality symbol ($<$ or $>$).", "back": "$-5 < -3$", "id": "fc21"}, {"front": "Evaluate the expression $|x - 3|$ when $x = -1$.", "back": "$4$", "id": "fc22"}, {"front": "True or False: Every integer is a rational number.", "back": "True", "id": "fc23"}, {"front": "True or False: Every whole number is a natural number.", "back": "False", "id": "fc24"}, {"front": "How is the distance between two points on a number line determined?", "back": "Calculate the absolute value of the difference between the two numbers.", "id": "fc25"}, {"front": "What integer is located exactly halfway between $-6$ and $4$ on a number line?", "back": "$-1$", "id": "fc26"}, {"front": "Name the property illustrated by the equation $3 + 7 = 7 + 3$.", "back": "Commutative Property of Addition", "id": "fc27"}, {"front": "Name the property illustrated by the equation $5 \\cdot (2 \\cdot 4) = (5 \\cdot 2) \\cdot 4$.", "back": "Associative Property of Multiplication", "id": "fc28"}, {"front": "Name the property illustrated by the equation $4(x + 3) = 4x + 12$.", "back": "Distributive Property", "id": "fc29"}, {"front": "Name the property illustrated by the equation $a + 0 = a$.", "back": "Identity Property of Addition", "id": "fc30"}, {"front": "Name the property illustrated by the equation $7 \\cdot 1 = 7$.", "back": "Identity Property of Multiplication", "id": "fc31"}, {"front": "Name the property illustrated by the equation $x + (-x) = 0$.", "back": "Inverse Property of Addition", "id": "fc32"}, {"front": "Name the property illustrated by the equation $6 \\cdot \\frac{1}{6} = 1$.", "back": "Inverse Property of Multiplication", "id": "fc33"}, {"front": "Name the property illustrated by the equation $xy = yx$.", "back": "Commutative Property of Multiplication", "id": "fc34"}, {"front": "Apply the distributive property to expand $3(x + 5)$.", "back": "$3x + 15$", "id": "fc35"}, {"front": "Apply the distributive property to expand $-2(4y - 3)$.", "back": "$-8y + 6$", "id": "fc36"}, {"front": "Apply the distributive property to factor $6x + 15$.", "back": "$3(2x + 5)$", "id": "fc37"}, {"front": "Expand the expression $-(3x - 8)$ using the distributive property.", "back": "$-3x + 8$", "id": "fc38"}, {"front": "What is the sum of $-8 + 3$?", "back": "$-5$", "id": "fc39"}, {"front": "What is the sum of $-5 + (-9)$?", "back": "$-14$", "id": "fc40"}, {"front": "What is the result of $7 - (-4)$?", "back": "$11$", "id": "fc41"}, {"front": "Evaluate the subtraction $-6 - (-2)$.", "back": "$-4$", "id": "fc42"}, {"front": "Find the sum of $-2.3 + (-1.7)$.", "back": "$-4.0$", "id": "fc43"}, {"front": "Evaluate the expression $4.5 - 6.8$.", "back": "$-2.3$", "id": "fc44"}, {"front": "A hiker starts at $2,300$ ft and descends $1,500$ ft; what is the new elevation?", "back": "$800$ ft", "id": "fc45"}, {"front": "An elevator at floor $5$ goes down $8$ floors and then up $3$ floors; where does it stop?", "back": "Floor $0$ (Ground floor)", "id": "fc46"}, {"front": "Calculate the product of $(-3)(8)$.", "back": "$-24$", "id": "fc47"}, {"front": "Calculate the product of $(-5)(-7)$.", "back": "$35$", "id": "fc48"}, {"front": "Calculate the product of $(-2)(-6)(-3)$.", "back": "$-36$", "id": "fc49"}, {"front": "What is the result of the division $-36 \\div 4$?", "back": "$-9$", "id": "fc50"}, {"front": "What is the result of the division $-48 \\div (-6)$?", "back": "$8$", "id": "fc51"}, {"front": "Evaluate the expression $(-0.6)(5)$.", "back": "$-3$", "id": "fc52"}, {"front": "Evaluate the expression $(-2)^3$.", "back": "$-8$", "id": "fc53"}, {"front": "Evaluate the expression $-3^2$.", "back": "$-9$", "id": "fc54"}, {"front": "Evaluate the expression $(-1)^5$.", "back": "$-1$", "id": "fc55"}, {"front": "Evaluate the expression $(-1)^6$.", "back": "$1$", "id": "fc56"}, {"front": "Evaluate the expression $-3x^2$ when $x = -2$.", "back": "$-12$", "id": "fc57"}, {"front": "If a stock loses $\\$2.50$ per share and an investor owns $40$ shares, what is the total change in value?", "back": "A loss of $\\$100$", "id": "fc58"}, {"front": "What is the result of $0 \\div (-5)$?", "back": "$0$", "id": "fc59"}, {"front": "Simplify the expression $2(5 + 3) - 4$ using the order of operations.", "back": "$12$", "id": "fc60"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
