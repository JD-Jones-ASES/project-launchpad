<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Workbook.html">&larr; Back to Algebra_I_Workbook</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Greatest Common Factor (GCF) of the monomials $12x^3$ and $8x^2$?", "back": "$4x^2$"}, {"front": "What is the GCF of the monomials $15a^2b^3$ and $20ab^4$?", "back": "$5ab^3$"}, {"front": "Find the GCF of the monomials $18m^4$ and $24m^2$.", "back": "$6m^2$"}, {"front": "Find the GCF of the monomials $14p^3q^2$ and $21p^2q^3$.", "back": "$7p^2q^2$"}, {"front": "Factor the expression $6x + 15$ by extracting the GCF.", "back": "$3(2x + 5)$"}, {"front": "Factor the expression $8n^2 - 12n$ by extracting the GCF.", "back": "$4n(2n - 3)$"}, {"front": "Factor the expression $16k^4 - 24k^2$ by extracting the GCF.", "back": "$8k^2(2k^2 - 3)$"}, {"front": "Factor the trinomial $15x^2 + 10x - 5$ by extracting the GCF.", "back": "$5(3x^2 + 2x - 1)$"}, {"front": "Factor the trinomial $12a^3 - 8a^2 + 4a$ by extracting the GCF.", "back": "$4a(3a^2 - 2a + 1)$"}, {"front": "Factor the trinomial $-6x^2 + 9x - 3$ by extracting a negative GCF.", "back": "$-3(2x^2 - 3x + 1)$"}, {"front": "Factor the polynomial $3x + 3y + ax + ay$ using the grouping method.", "back": "$(3 + a)(x + y)$"}, {"front": "Factor $x^2 + 3x + 2x + 6$ by grouping.", "back": "$(x + 3)(x + 2)$"}, {"front": "Factor $6ab - 4b + 9a - 6$ by grouping.", "back": "$(2b + 3)(3a - 2)$"}, {"front": "A rectangle has area $12x^2 + 8x$. What are its possible factored dimensions?", "back": "$4x$ and $(3x + 2)$"}, {"front": "Factor the trinomial $x^2 + 7x + 12$.", "back": "$(x + 3)(x + 4)$"}, {"front": "Factor the trinomial $x^2 + 9x + 20$.", "back": "$(x + 4)(x + 5)$"}, {"front": "Factor the trinomial $x^2 - 8x + 15$.", "back": "$(x - 3)(x - 5)$"}, {"front": "Factor the trinomial $x^2 - 10x + 24$.", "back": "$(x - 4)(x - 6)$"}, {"front": "Factor the trinomial $x^2 + 2x - 15$.", "back": "$(x + 5)(x - 3)$"}, {"front": "Factor the trinomial $x^2 - 3x - 28$.", "back": "$(x - 7)(x + 4)$"}, {"front": "Factor the trinomial $x^2 + x - 20$.", "back": "$(x + 5)(x - 4)$"}, {"front": "Solve the equation $x^2 + 6x + 8 = 0$ by factoring.", "back": "$x = -2, -4$"}, {"front": "Solve the equation $x^2 - 5x + 6 = 0$ by factoring.", "back": "$x = 2, 3$"}, {"front": "Solve the equation $x^2 + 3x - 18 = 0$ by factoring.", "back": "$x = -6, 3$"}, {"front": "The product of two consecutive positive integers is 42. What is the quadratic equation used to find them?", "back": "$x(x + 1) = 42$"}, {"front": "The product of two consecutive odd integers is 63. What are the positive integers?", "back": "7 and 9"}, {"front": "Factor the trinomial $2x^2 + 7x + 3$.", "back": "$(2x + 1)(x + 3)$"}, {"front": "Factor the trinomial $2x^2 - 5x + 2$.", "back": "$(2x - 1)(x - 2)$"}, {"front": "Factor the trinomial $3x^2 + 10x + 3$.", "back": "$(3x + 1)(x + 3)$"}, {"front": "Factor the trinomial $3x^2 - 7x - 6$.", "back": "$(3x + 2)(x - 3)$"}, {"front": "Factor the trinomial $4x^2 + 8x + 3$.", "back": "$(2x + 1)(2x + 3)$"}, {"front": "Factor the trinomial $6x^2 + 7x + 2$.", "back": "$(2x + 1)(3x + 2)$"}, {"front": "What is the first step when factoring $6x^2 + 18x + 12$?", "back": "Extract the GCF of 6."}, {"front": "Factor the height expression $h = -16t^2 + 24t$ to find when $h = 0$.", "back": "$-8t(2t - 3)$"}, {"front": "Solve $2x^2 + 5x + 3 = 0$ by factoring.", "back": "$x = -1, -\\frac{3}{2}$"}, {"front": "Solve $3x^2 - 7x + 2 = 0$ by factoring.", "back": "$x = 2, \\frac{1}{3}$"}, {"front": "Factor the expression $x^2 - 49$ using the difference-of-squares pattern.", "back": "$(x - 7)(x + 7)$"}, {"front": "Factor the expression $4n^2 - 25$ using the difference-of-squares pattern.", "back": "$(2n - 5)(2n + 5)$"}, {"front": "Factor the expression $100 - x^2$ using the difference-of-squares pattern.", "back": "$(10 - x)(10 + x)$"}, {"front": "Determine if $x^2 + 9$ can be factored over the integers.", "back": "No, it is prime."}, {"front": "Factor the perfect square trinomial $x^2 + 10x + 25$.", "back": "$(x + 5)^2$"}, {"front": "Factor the perfect square trinomial $x^2 - 6x + 9$.", "back": "$(x - 3)^2$"}, {"front": "Factor the perfect square trinomial $4x^2 + 12x + 9$.", "back": "$(2x + 3)^2$"}, {"front": "Factor the perfect square trinomial $9n^2 - 24n + 16$.", "back": "$(3n - 4)^2$"}, {"front": "Factor $3x^2 - 27$ completely.", "back": "$3(x - 3)(x + 3)$"}, {"front": "How can the product $102 \\cdot 98$ be rewritten to use the difference-of-squares pattern?", "back": "$(100 + 2)(100 - 2)$"}, {"front": "Solve $(x + 2)^2 = 25$ by factoring.", "back": "$x = 3, -7$"}, {"front": "Solve $(x - 3)^2 = 16$ by factoring.", "back": "$x = 7, -1$"}, {"front": "Factor $2x^3 + 8x^2 + 6x$ completely.", "back": "$2x(x + 1)(x + 3)$"}, {"front": "Factor $3x^3 - 3x^2 - 36x$ completely.", "back": "$3x(x - 4)(x + 3)$"}, {"front": "Factor $3x^3 - 12x$ completely.", "back": "$3x(x - 2)(x + 2)$"}, {"front": "Factor $5x^2 - 30x + 45$ completely.", "back": "$5(x - 3)^2$"}, {"front": "Factor $x^3 + 2x^2 - 9x - 18$ completely by grouping and difference of squares.", "back": "$(x + 2)(x - 3)(x + 3)$"}, {"front": "Factor $x^3 + 3x^2 - 4x - 12$ completely.", "back": "$(x + 3)(x - 2)(x + 2)$"}, {"front": "Factor $x^3 - x^2 - 25x + 25$ completely.", "back": "$(x - 1)(x - 5)(x + 5)$"}, {"front": "Solve the equation $x^2 + 5x = 0$ by factoring.", "back": "$x = 0, -5$"}, {"front": "Solve the equation $x^2 - 9 = 0$ by factoring.", "back": "$x = 3, -3$"}, {"front": "Solve $4n^2 - 64 = 0$ by factoring.", "back": "$n = 4, -4$"}, {"front": "Solve $2x^2 - x - 3 = 0$ by factoring.", "back": "$x = \\frac{3}{2}, -1$"}, {"front": "Height formula $h = -16t^2 + 48t$ represents a ball thrown upward. At what time $t > 0$ does the ball hit the ground?", "back": "$t = 3$ seconds"}, {"front": "The sum of a positive number and its square is 30. What is the number?", "back": "5"}, {"front": "Solve $x^3 - 4x^2 - 9x + 36 = 0$ by factoring.", "back": "$x = 4, 3, -3$"}, {"front": "Solve the perfect square equation $4x^2 - 12x + 9 = 0$.", "back": "$x = \\frac{3}{2}$"}, {"front": "What is the result of factoring $n^2 - 121$?", "back": "$(n - 11)(n + 11)$"}, {"front": "Factor $9x^2 + 6x + 1$ completely.", "back": "$(3x + 1)^2$"}, {"front": "Factor $x^2 - 14x + 48 = 0$ to find the roots.", "back": "$x = 6, 8$"}, {"front": "Factor $x^2 - 17x + 72 = 0$ to find the roots.", "back": "$x = 8, 9$"}, {"front": "Factor $3x^2 - 10x + 8$.", "back": "$(3x - 4)(x - 2)$"}, {"front": "Factor $4x^2 - 13x + 3$.", "back": "$(4x - 1)(x - 3)$"}, {"front": "Factor $6x^2 - 13x + 6$.", "back": "$(2x - 3)(3x - 2)$"}, {"front": "Factor $12x^2 - 30x + 12$ completely.", "back": "$6(2x - 1)(x - 2)$"}, {"front": "Solve $6x^2 - 5x - 6 = 0$ by factoring.", "back": "$x = \\frac{3}{2}, -\\frac{2}{3}$"}, {"front": "Solve $6x^2 + x - 12 = 0$ by factoring.", "back": "$x = \\frac{4}{3}, -\\frac{3}{2}$"}, {"front": "Factor the expression $x^2 - \\frac{9}{16}$.", "back": "$(x - \\frac{3}{4})(x + \\frac{3}{4})$"}, {"front": "What is the factored form of $49x^2 - 14x + 1$?", "back": "$(7x - 1)^2$"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
