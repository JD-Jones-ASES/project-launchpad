<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra_I_Workbook &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Algebra_I_Workbook &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Algebra_I_Workbook.html">&larr; Back to Algebra_I_Workbook</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "In which quadrant are both the $x$-coordinate and $y$-coordinate positive?", "back": "Quadrant I", "id": "fc01"}, {"front": "A point with a negative $x$-coordinate and a positive $y$-coordinate is located in which quadrant?", "back": "Quadrant II", "id": "fc02"}, {"front": "If both the $x$ and $y$ coordinates of a point are negative, in which quadrant is the point located?", "back": "Quadrant III", "id": "fc03"}, {"front": "In which quadrant is a point located if its $x$-coordinate is positive and its $y$-coordinate is negative?", "back": "Quadrant IV", "id": "fc04"}, {"front": "On which axis is the point $(0, 5)$ located?", "back": "The $y$-axis", "id": "fc05"}, {"front": "On which axis is the point $(-3, 0)$ located?", "back": "The $x$-axis", "id": "fc06"}, {"front": "What is the name of the point located at $(0, 0)$ on a coordinate plane?", "back": "The origin", "id": "fc07"}, {"front": "How is the distance between two points $(x_1, y)$ and $(x_2, y)$ on a horizontal line calculated?", "back": "$|x_2 - x_1|$ (the absolute difference of the $x$-coordinates)", "id": "fc08"}, {"front": "How is the distance between two points $(x, y_1)$ and $(x, y_2)$ on a vertical line calculated?", "back": "$|y_2 - y_1|$ (the absolute difference of the $y$-coordinates)", "id": "fc09"}, {"front": "What is the formula to find the midpoint $M$ of a segment with endpoints $(x_1, y_1)$ and $(x_2, y_2)$?", "back": "$M = (\\frac{x_1 + x_2}{2}, \\frac{y_1 + y_2}{2})$", "id": "fc10"}, {"front": "To find a missing endpoint $(x_2, y_2)$ given endpoint $(x_1, y_1)$ and midpoint $(x_m, y_m)$, what equation is used for the $x$-coordinate?", "back": "$x_m = \\frac{x_1 + x_2}{2}$", "id": "fc11"}, {"front": "In the context of a relation, what term describes the set of all possible input values ($x$-values)?", "back": "Domain", "id": "fc12"}, {"front": "In the context of a relation, what term describes the set of all possible output values ($y$-values)?", "back": "Range", "id": "fc13"}, {"front": "What is the defining characteristic of a relation that is also a function?", "back": "Every input ($x$) is paired with exactly one output ($y$).", "id": "fc14"}, {"front": "If a relation contains the points $(1, 3)$ and $(1, 7)$, why is it not a function?", "back": "The input $1$ is associated with two different outputs ($3$ and $7$).", "id": "fc15"}, {"front": "A relation where multiple different $x$-values map to the same $y$-value (e.g., $(-3, 5)$ and $(0, 5)$) is still considered a _____.", "back": "Function", "id": "fc16"}, {"front": "Given the function $f(x) = 3x - 2$, what is the procedural step to find $f(4)$?", "back": "Substitute $4$ for $x$ in the expression $3(4) - 2$.", "id": "fc17"}, {"front": "In the function $C(t) = 0.10t + 25$, what does the constant $25$ typically represent in a real-world cell phone plan?", "back": "The fixed monthly fee", "id": "fc18"}, {"front": "Using the Celsius-to-Fahrenheit formula $F(C) = \\frac{9}{5}C + 32$, what is the value of $F(0)$?", "back": "$32$", "id": "fc19"}, {"front": "What is the formula for the slope ($m$) of a line passing through $(x_1, y_1)$ and $(x_2, y_2)$?", "back": "$m = \\frac{y_2 - y_1}{x_2 - x_1}$", "id": "fc20"}, {"front": "What is the slope of any horizontal line?", "back": "$0$", "id": "fc21"}, {"front": "What is the slope of any vertical line?", "back": "Undefined", "id": "fc22"}, {"front": "A line that rises from left to right has what type of slope?", "back": "Positive", "id": "fc23"}, {"front": "A line that falls from left to right has what type of slope?", "back": "Negative", "id": "fc24"}, {"front": "In the linear equation $y = mx + b$, what does $m$ represent?", "back": "Slope", "id": "fc25"}, {"front": "In the linear equation $y = mx + b$, what does $b$ represent?", "back": "The $y$-intercept", "id": "fc26"}, {"front": "How do you find the slope of a line from a table of $x$ and $y$ values?", "back": "Calculate the ratio of the change in $y$ to the change in $x$ ($\\frac{\\Delta y}{\\Delta x}$) between any two rows.", "id": "fc27"}, {"front": "What is the slope of the line represented by the equation $x = 4$?", "back": "Undefined", "id": "fc28"}, {"front": "What is the slope of the line represented by the equation $y = -6$?", "back": "$0$", "id": "fc29"}, {"front": "Concept: Rate of Change", "back": "Definition: A ratio that describes how much one quantity changes relative to the change in another quantity (equivalent to slope).", "id": "fc30"}, {"front": "If a ramp rises $2.4$ feet over a horizontal distance of $16$ feet, what is its slope?", "back": "$0.15$ (or $\\frac{3}{20}$)", "id": "fc31"}, {"front": "What is the point-slope form of a linear equation given slope $m$ and point $(x_1, y_1)$?", "back": "$y - y_1 = m(x - x_1)$", "id": "fc32"}, {"front": "What is the standard form of a linear equation?", "back": "$Ax + By = C$ (usually with $A > 0$ and integer coefficients)", "id": "fc33"}, {"front": "To convert the equation $y - 4 = 3(x - 1)$ to slope-intercept form, what is the first algebraic step?", "back": "Distribute the $3$ to $(x - 1)$.", "id": "fc34"}, {"front": "What is the slope of the line $2x + 3y = 12$?", "back": "$-\\frac{2}{3}$", "id": "fc35"}, {"front": "The equation of a horizontal line passing through $(3, -7)$ is _____.", "back": "$y = -7$", "id": "fc36"}, {"front": "The equation of a vertical line passing through $(4, 5)$ is _____.", "back": "$x = 4$", "id": "fc37"}, {"front": "If two non-vertical lines are parallel, what must be true about their slopes?", "back": "Their slopes are equal ($m_1 = m_2$).", "id": "fc38"}, {"front": "What is the relationship between the slopes of two perpendicular lines?", "back": "Their slopes are negative reciprocals ($m_1 \\cdot m_2 = -1$).", "id": "fc39"}, {"front": "If a line has a slope of $4$, what is the slope of a line perpendicular to it?", "back": "$-\\frac{1}{4}$", "id": "fc40"}, {"front": "If a line has a slope of $-\\frac{2}{3}$, what is the slope of a line parallel to it?", "back": "$-\\frac{2}{3}$", "id": "fc41"}, {"front": "What is the slope of a line perpendicular to a line with an undefined slope?", "back": "$0$ (a horizontal line)", "id": "fc42"}, {"front": "When determining if lines $2x + 3y = 6$ and $4x + 6y = 15$ are parallel, which property should you compare?", "back": "The slopes of both lines (both are $-\\frac{2}{3}$ in this case).", "id": "fc43"}, {"front": "In a scatter plot, what type of correlation exists if $y$ tends to increase as $x$ increases?", "back": "Positive correlation", "id": "fc44"}, {"front": "In a scatter plot, what type of correlation exists if $y$ tends to decrease as $x$ increases?", "back": "Negative correlation", "id": "fc45"}, {"front": "What type of correlation is indicated if the data points on a scatter plot show no visible trend or pattern?", "back": "No correlation", "id": "fc46"}, {"front": "What is a 'trend line' (or line of best fit) used for in data analysis?", "back": "To model the relationship between variables and make predictions.", "id": "fc47"}, {"front": "Concept: Interpolation", "back": "Definition: Predicting a value within the range of the existing data set.", "id": "fc48"}, {"front": "Concept: Extrapolation", "back": "Definition: Predicting a value outside the range of the existing data set.", "id": "fc49"}, {"front": "Between interpolation and extrapolation, which is generally considered more reliable for predictions?", "back": "Interpolation", "id": "fc50"}, {"front": "In a trend line equation $y = -1.5x + 60$ where $y$ is car value and $x$ is years owned, what does the $x$-intercept represent?", "back": "The number of years it takes for the car's value to reach zero.", "id": "fc51"}, {"front": "In the trend line equation $y = 0.3x + 0.5$ for GPA ($y$) and sleep hours ($x$), what does the slope $0.3$ represent?", "back": "The predicted increase in GPA for every additional hour of sleep.", "id": "fc52"}, {"front": "A candle is 12 inches tall and burns at $0.5$ inches per hour. What is the linear equation for height $h$ over time $t$?", "back": "$h = -0.5t + 12$", "id": "fc53"}, {"front": "How do you find the coordinates of the fourth vertex of a rectangle if three vertices are $(2, 1)$, $(8, 1)$, and $(8, 5)$?", "back": "Identify the missing $x$ and $y$ values from the existing pairs (result: $(2, 5)$).", "id": "fc54"}, {"front": "To find the perimeter of a rectangle with vertices $(1, 2)$, $(7, 2)$, $(7, 6)$, and $(1, 6)$, what lengths must be calculated first?", "back": "The length (distance between $x$-coordinates: $6$) and the width (distance between $y$-coordinates: $4$).", "id": "fc55"}, {"front": "What is the slope of a line perpendicular to $y = -5x + 7$?", "back": "$\\frac{1}{5}$", "id": "fc56"}, {"front": "If the slope of a line is $0$, what is the slope of a line parallel to it?", "back": "$0$", "id": "fc57"}, {"front": "A town's population is $y = 2.3x + 18$ ($x$ = years after 2005). What value of $x$ is used to predict the population in 2020?", "back": "$x = 15$ ($2020 - 2005$)", "id": "fc58"}, {"front": "Find the value of $k$ so that $y = kx + 3$ is parallel to $y = 5x - 1$.", "back": "$k = 5$", "id": "fc59"}, {"front": "Find the value of $k$ so that $y = kx - 2$ is perpendicular to $y = 4x + 3$.", "back": "$k = -\\frac{1}{4}$", "id": "fc60"}, {"front": "Given $h(x) = \\frac{2x+1}{x-3}$, what is the value of $h(4)$?", "back": "$9$ (since $\\frac{2(4)+1}{4-3} = \\frac{9}{1}$)", "id": "fc61"}, {"front": "A plumber charges $C(h) = 65h + 80$. What does the intercept $80$ represent?", "back": "The initial service-call fee or base charge.", "id": "fc62"}, {"front": "How do you find the $x$-value where two functions $f(x)$ and $g(x)$ are equal?", "back": "Set the two expressions equal to each other ($f(x) = g(x)$) and solve for $x$.", "id": "fc63"}, {"front": "Convert $y = 2x - 5$ to standard form.", "back": "$2x - y = 5$", "id": "fc64"}, {"front": "What is the equation of the line with slope $-34$ and $y$-intercept $0$ in slope-intercept form?", "back": "$y = -\\frac{3}{4}x$", "id": "fc65"}, {"front": "Find the distance between $(-5, 3)$ and $(4, 3)$.", "back": "$9$ units", "id": "fc66"}, {"front": "Find the midpoint of the segment with endpoints $(2, 6)$ and $(8, 2)$.", "back": "$(5, 4)$", "id": "fc67"}, {"front": "Determine the domain of the relation: $(1, 3), (2, 5), (3, 3), (4, 7)$.", "back": "$\\{1, 2, 3, 4\\}$", "id": "fc68"}, {"front": "Determine the range of the relation: $(1, 3), (2, 5), (3, 3), (4, 7)$.", "back": "$\\{3, 5, 7\\}$", "id": "fc69"}, {"front": "If $f(x) = 2x + 5$ and $f(x) = 13$, what is the value of $x$?", "back": "$x = 4$", "id": "fc70"}, {"front": "A car's fuel usage is $G(m) = \\frac{m}{28}$. How many gallons are used for $196$ miles?", "back": "$7$ gallons", "id": "fc71"}, {"front": "Find the slope of the line through $(2, 5)$ and $(6, 13)$.", "back": "$2$", "id": "fc72"}, {"front": "Find the slope of the line through $(3, -1)$ and $(3, 7)$.", "back": "Undefined", "id": "fc73"}, {"front": "What is the slope of the line $y = 5$?", "back": "$0$", "id": "fc74"}, {"front": "A company's profit increased from $\\$12,000$ to $\\$20,000$ over $4$ years. What is the annual rate of change?", "back": "$\\$2,000$ per year", "id": "fc75"}, {"front": "Find the equation of the line with slope $3$ through $(1, 4)$ in point-slope form.", "back": "$y - 4 = 3(x - 1)$ (using point-slope parameters)", "id": "fc76"}, {"front": "Write the equation of a line with $x$-intercept $(4, 0)$ and $y$-intercept $(0, -8)$ in slope-intercept form.", "back": "$y = 2x - 8$", "id": "fc77"}, {"front": "In a data table where $x$ increases by $2$ and $y$ increases by $6$, what is the slope of the trend line?", "back": "$3$ (since $\\frac{6}{2} = 3$)", "id": "fc78"}, {"front": "A trend line $y = 2.5x + 30$ predicts $y$ for $x=8$. What is the predicted $y$?", "back": "$50$", "id": "fc79"}, {"front": "If a road rises $160$ feet over a horizontal distance of $2,000$ feet, what is its slope as a decimal?", "back": "$0.08$", "id": "fc80"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
