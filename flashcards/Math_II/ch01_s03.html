<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "State the Zero Exponent Rule.", "back": "For any nonzero number $a$, $a^0 = 1$."}, {"front": "What is the condition on the base for the Zero Exponent Rule ($a^0=1$) to be valid?", "back": "The base $a$ must be a nonzero number."}, {"front": "Evaluate $7^0$.", "back": "$1$"}, {"front": "Evaluate $(-4)^0$.", "back": "$1$. The base is $-4$, which is nonzero."}, {"front": "Evaluate $-4^0$ and explain the order of operations.", "back": "$-4^0 = -(4^0) = -(1) = -1$. The exponent applies only to the base immediately preceding it, which is $4$, not $-4$."}, {"front": "Evaluate $(3x)^0$ given that $x \\neq 0$.", "back": "$1$. The entire product $3x$ is the base, and it is nonzero."}, {"front": "What does a negative exponent indicate about the base number?", "back": "A negative exponent indicates taking the reciprocal of the base raised to the positive equivalent of that exponent."}, {"front": "State the rule for a negative exponent $a^{-n}$.", "back": "For any nonzero number $a$ and positive integer $n$, $a^{-n} = \\frac{1}{a^n}$."}, {"front": "State the rule for a reciprocal with a negative exponent, $\\frac{1}{a^{-n}}$.", "back": "For any nonzero number $a$ and positive integer $n$, $\\frac{1}{a^{-n}} = a^n$."}, {"front": "What are the conditions on the base for negative exponent rules to be valid?", "back": "The base $a$ must be a nonzero number."}, {"front": "Rewrite $5^{-2}$ using a positive exponent and evaluate.", "back": "$5^{-2} = \\frac{1}{5^2} = \\frac{1}{25}$."}, {"front": "Rewrite $x^{-4}$ using a positive exponent.", "back": "$x^{-4} = \\frac{1}{x^4}$."}, {"front": "Rewrite $3y^{-2}$ using only positive exponents.", "back": "$3y^{-2} = 3 \\cdot \\frac{1}{y^2} = \\frac{3}{y^2}$. The exponent $-2$ only applies to $y$."}, {"front": "State the Power of a Quotient Rule.", "back": "For any nonzero numbers $a$ and $b$ and any integer $n$, $(\\frac{a}{b})^n = \\frac{a^n}{b^n}$."}, {"front": "Simplify $(\\frac{3}{4})^3$.", "back": "$(\\frac{3}{4})^3 = \\frac{3^3}{4^3} = \\frac{27}{64}$."}, {"front": "Simplify $(\\frac{x^2}{y})^4$.", "back": "$(\\frac{x^2}{y})^4 = \\frac{(x^2)^4}{y^4} = \\frac{x^8}{y^4}$."}, {"front": "Simplify $(\\frac{2}{a})^{-3}$ using positive exponents only.", "back": "$(\\frac{2}{a})^{-3} = (\\frac{a}{2})^3 = \\frac{a^3}{2^3} = \\frac{a^3}{8}$."}, {"front": "How does a negative exponent affect a fraction, e.g., $(\\frac{a}{b})^{-n}$?", "back": "A negative exponent on a fraction 'flips' the fraction and makes the exponent positive: $(\\frac{a}{b})^{-n} = (\\frac{b}{a})^n$."}, {"front": "Simplify $\\frac{6x^3 y^{-2}}{2x^{-1}y^4}$. Write the answer with positive exponents only.", "back": "$\\frac{6x^3 y^{-2}}{2x^{-1}y^4} = 3x^{3 - (-1)} y^{-2 - 4} = 3x^4 y^{-6} = \\frac{3x^4}{y^6}$."}, {"front": "Simplify $\\frac{a^5 b^{-3}}{a^2 b^{-1}}$. Write the answer with positive exponents only.", "back": "$\\frac{a^5 b^{-3}}{a^2 b^{-1}} = a^{5-2} b^{-3 - (-1)} = a^3 b^{-3+1} = a^3 b^{-2} = \\frac{a^3}{b^2}$."}, {"front": "Why is $0^0$ not defined in this course?", "back": "$0^0$ is an indeterminate form that leads to contradictions depending on which exponent rule is prioritized (e.g., $a^0=1$ vs. $0^n=0$). Thus, it's left undefined."}, {"front": "Based on the quotient rule, how can we intuitively derive $a^0=1$ for $a \\neq 0$?", "back": "Consider $a^m/a^m$. By definition, any nonzero quantity divided by itself is $1$. By the quotient rule, $a^m/a^m = a^{m-m} = a^0$. Therefore, $a^0=1$."}, {"front": "Based on the quotient rule, how can we intuitively derive $a^{-n} = 1/a^n$ for $a \\neq 0$?", "back": "Consider $a^m/a^{m+n}$. By expanding, this equals $1/a^n$. By the quotient rule, $a^m/a^{m+n} = a^{m-(m+n)} = a^{-n}$. Therefore, $a^{-n} = 1/a^n$."}, {"front": "Compare the evaluation of $-(X)^0$ vs. $(-X)^0$.", "back": "For $-(X)^0$, the exponent $0$ applies only to $X$, so it evaluates to $-(1) = -1$. For $(-X)^0$, the exponent $0$ applies to the entire base $-X$, so it evaluates to $1$ (assuming $X \\neq 0$)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
