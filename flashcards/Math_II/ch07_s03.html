<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary application of using proportions in similar figures?", "back": "To find unknown side lengths in similar figures, which is crucial for practical applications like indirect measurement.", "id": "fc01"}, {"front": "Define the 'Scale Factor' of two similar figures.", "back": "The scale factor is the ratio of any pair of corresponding side lengths between the two similar figures.", "id": "fc02"}, {"front": "If $\\triangle ABC \\sim \\triangle DEF$ with $AB=6$ and $DE=9$, what is the scale factor from $\\triangle ABC$ to $\\triangle DEF$?", "back": "The scale factor is $AB/DE = 6/9 = 2/3$.", "id": "fc03"}, {"front": "How does the order in which similar figures are listed affect their scale factor?", "back": "The scale factor depends on which figure is listed first. Reversing the order of the figures will result in the reciprocal of the original scale factor.", "id": "fc04"}, {"front": "What is the standard algebraic technique for solving a proportion like $a/b = c/d$?", "back": "Cross-multiplication, which transforms the proportion into $ad = bc$.", "id": "fc05"}, {"front": "When two figures are similar, how do you set up a proportion to find an unknown side length?", "back": "You use any two pairs of corresponding sides, ensuring that corresponding parts are in the same position within each ratio (e.g., numerators from one figure, denominators from the other).", "id": "fc06"}, {"front": "Given $\\triangle ABC \\sim \\triangle DEF$. If $AB=8$, $BC=12$, and $DE=10$, set up the proportion to find $EF$.", "back": "The proportion is $AB/DE = BC/EF$, which is $8/10 = 12/EF$.", "id": "fc07"}, {"front": "For $\\triangle ABC \\sim \\triangle DEF$, if $AB=8$, $BC=12$, and $DE=10$, what is the length of $EF$?", "back": "Using the proportion $8/10 = 12/EF$, cross-multiply: $8 \\cdot EF = 10 \\cdot 12 \\implies 8EF = 120 \\implies EF = 15$.", "id": "fc08"}, {"front": "What is 'indirect measurement' and how does it relate to similar figures?", "back": "Indirect measurement is the process of finding distances or lengths that are difficult or impossible to measure directly. It often utilizes similar figures (like those formed by shadows) to set up and solve proportions.", "id": "fc09"}, {"front": "In a 'shadow problem,' why are the triangles formed by an object, its shadow, and the sun's rays considered similar?", "back": "They are similar because the sun's rays hit all objects at the same angle, creating corresponding angles, and the objects typically stand perpendicular to the ground, forming right angles.", "id": "fc10"}, {"front": "A flagpole casts a 12-foot shadow. At the same time, a 5.5-foot-tall student casts a 3-foot shadow. Set up a proportion to find the height ($h$) of the flagpole.", "back": "The proportion is $h/12 = 5.5/3$ (flagpole height/shadow = student height/shadow).", "id": "fc11"}, {"front": "Calculate the height of the flagpole from the previous problem: a flagpole casts a 12-foot shadow, and a 5.5-foot student casts a 3-foot shadow.", "back": "Using $h/12 = 5.5/3$, cross-multiply: $3h = 5.5 \\cdot 12 \\implies 3h = 66 \\implies h = 22$ feet.", "id": "fc12"}, {"front": "How is a map scale used to determine actual distances?", "back": "A map scale provides a fixed ratio (e.g., 1 inch : 25 miles) that can be used to set up a proportion with a measured map distance to calculate the corresponding actual distance.", "id": "fc13"}, {"front": "On a map, 1 inch represents 25 miles. If two cities are 3.5 inches apart on the map, set up the proportion to find the actual distance ($d$).", "back": "The proportion is $1/25 = 3.5/d$ (map distance/actual distance = map distance/actual distance).", "id": "fc14"}, {"front": "Calculate the actual distance from the map problem: On a map, 1 inch represents 25 miles. Two cities are 3.5 inches apart on the map.", "back": "Using $1/25 = 3.5/d$, cross-multiply: $1 \\cdot d = 25 \\cdot 3.5 \\implies d = 87.5$ miles.", "id": "fc15"}, {"front": "Given $\\triangle JKL \\sim \\triangle MNP$. If $JK=4.8$, $KL=7.2$, and $MN=6$, set up the proportion to find $NP$.", "back": "The proportion is $JK/MN = KL/NP$, which is $4.8/6 = 7.2/NP$.", "id": "fc16"}, {"front": "For $\\triangle JKL \\sim \\triangle MNP$, if $JK=4.8$, $KL=7.2$, and $MN=6$, what is the length of $NP$?", "back": "Using $4.8/6 = 7.2/NP$, cross-multiply: $4.8 \\cdot NP = 6 \\cdot 7.2 \\implies 4.8NP = 43.2 \\implies NP = 9$.", "id": "fc17"}, {"front": "What is a critical rule to follow when writing proportions for similar figures to avoid incorrect answers?", "back": "Always ensure that corresponding parts are in the same position within the proportion. If numerators are both heights, then denominators must both be shadow lengths (or corresponding bases, etc.).", "id": "fc18"}, {"front": "A tree casts a shadow 15 feet long. A 4-foot fence post nearby casts a 2.5-foot shadow. How tall is the tree?", "back": "Set up the proportion: $h/15 = 4/2.5$. Cross-multiply: $2.5h = 4 \\cdot 15 \\implies 2.5h = 60 \\implies h = 24$ feet.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
