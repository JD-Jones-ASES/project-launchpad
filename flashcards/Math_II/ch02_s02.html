<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Math_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two primary strategies introduced for comparing and ordering rational numbers?", "back": "The two primary strategies are converting to common denominators and converting to decimals."}, {"front": "State the property for comparing two fractions that have the same positive denominator.", "back": "If two fractions have the same positive denominator ($d > 0$), the fraction with the larger numerator is greater. For example, if $a < b$, then $ad < bd$."}, {"front": "How do you compare two fractions with *different* denominators using the common denominator method?", "back": "Rewrite both fractions with their least common denominator (LCD), and then compare their numerators. The fraction with the larger numerator will be greater."}, {"front": "Compare $5/8$ and $7/12$ using the common denominator method.", "back": "The LCD of 8 and 12 is 24. $5/8 = 15/24$ and $7/12 = 14/24$. Since $15 > 14$, $5/8 > 7/12$."}, {"front": "Use the common denominator method to compare $3/5$ and $5/9$.", "back": "The LCD of 5 and 9 is 45. $3/5 = 27/45$ and $5/9 = 25/45$. Since $27 > 25$, $3/5 > 5/9$."}, {"front": "When is converting rational numbers to decimals often a faster method for comparison?", "back": "It is often faster when one or both of the numbers are already given as decimals."}, {"front": "How do you compare rational numbers by converting them to decimals?", "back": "Convert all rational numbers to their decimal form, ensuring they have the same number of decimal places (by adding trailing zeros if needed), then compare them digit by digit from left to right."}, {"front": "Order the following from least to greatest using decimals: $0.4$, $3/8$, $0.3$.", "back": "Convert to decimals: $0.4 = 0.400$, $3/8 = 0.375$, $0.3 = 0.333$. Ordering: $0.333 < 0.375 < 0.400$. So, $0.3, 3/8, 0.4$."}, {"front": "What is the most reliable approach for ordering a mixed set of rational numbers (e.g., fractions, decimals, integers)?", "back": "The most reliable approach is to convert all numbers to the same form, usually decimals, before ordering them."}, {"front": "Order the following from least to greatest: $-2/3$, $-0.5$, $1/4$, $-3/4$, $0.6$.", "back": "Convert to decimals: $-2/3 \\approx -0.667$, $-0.5 = -0.500$, $1/4 = 0.250$, $-3/4 = -0.750$, $0.6 = 0.600$. Order: $-0.750 < -0.667 < -0.500 < 0.250 < 0.600$. So, $-3/4, -2/3, -0.5, 1/4, 0.6$."}, {"front": "Explain how to compare negative numbers, specifically relating to their absolute values.", "back": "When comparing negative numbers, the one with the larger absolute value is actually the smaller number. For example, $-5 < -2$ because $|-5| > |-2|$."}, {"front": "Ali measured $12 \\\\frac{3}{8}$ m, Bea measured $12.4$ m, and Carlos measured $12 \\\\frac{1}{3}$ m. Order their measurements from shortest to longest.", "back": "Convert to decimals: $12 \\\\frac{3}{8} = 12.375$, $12.4 = 12.400$, $12 \\\\frac{1}{3} \\\\approx 12.333$. Order: $12.333 < 12.375 < 12.400$. So, $12 \\\\frac{1}{3}$ (Carlos), $12 \\\\frac{3}{8}$ (Ali), $12.4$ (Bea)."}, {"front": "Insert the correct inequality sign ($<$, $>$, or $=$) between $7/10$ and $0.6$.", "back": "Convert $7/10$ to a decimal: $0.7$. Compare $0.7$ and $0.6$. Since $0.7 > 0.6$, then $7/10 > 0.6$."}, {"front": "List the three main strategies for comparing rational numbers as summarized in the key concept.", "back": "1. Common denominator: Rewrite with the LCD and compare numerators. 2. Decimals: Convert all numbers to decimals and compare digit by digit. 3. Number line: Numbers to the right are greater."}, {"front": "Why is the \"number line\" strategy useful for comparing rational numbers?", "back": "On a number line, numbers to the right are always greater, and numbers to the left are smaller. This provides a clear visual representation of the order of rational numbers."}, {"front": "What is a \"rational number\"?", "back": "A rational number is any number that can be expressed as a fraction $p/q$, where $p$ and $q$ are integers and $q$ is not zero."}, {"front": "Why must the denominator be positive when using the \"common denominator\" property for comparing fractions ($If d > 0, then ad < bd \\\\implies a < b.$)?", "back": "If the denominator were negative, multiplying or dividing an inequality by it would reverse the inequality sign. The property as stated is specifically for positive denominators to maintain the direction of the inequality."}, {"front": "Convert the mixed number $12 \\\\frac{3}{8}$ to a decimal.", "back": "$12 \\\\frac{3}{8} = 12 + 3 \\\\div 8 = 12 + 0.375 = 12.375$."}, {"front": "Convert the fraction $-2/3$ to a decimal, rounded to three decimal places.", "back": "$-2/3 \\\\approx -0.667$."}, {"front": "What are the potential pitfalls of converting fractions to decimals for comparison?", "back": "Some fractions result in repeating decimals, which require rounding. If not rounded to a sufficient number of decimal places, slight inaccuracies in comparison can occur, especially when numbers are very close."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
