<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 6, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are composite figures?", "back": "Composite figures are real-world objects that are not simple geometric shapes (like rectangles, circles, or prisms), but rather combinations of these simpler shapes."}, {"front": "What is the first step in the strategy for finding the area, perimeter, surface area, or volume of a composite figure?", "back": "Identify the basic, simpler shapes that make up the composite figure."}, {"front": "What is the second step in calculating properties of composite figures?", "back": "Decide whether to add the areas/volumes of the parts (if the figure is made of combined pieces) or subtract them (if a piece is removed from a larger shape)."}, {"front": "What are the final two steps in the strategy for composite figures?", "back": "Calculate each part separately, and then combine the results (add or subtract) as determined in the previous step."}, {"front": "Describe how to find the total area of a 2-D composite figure like a rectangle topped with a semicircle.", "back": "Calculate the area of the rectangle and the area of the semicircle separately, then add these two areas together to find the total area."}, {"front": "How do you find the area of a composite figure where a smaller shape is cut out from a larger one (e.g., a circle from a square)?", "back": "Calculate the area of the larger shape and the area of the smaller shape that was removed. Then, subtract the smaller area from the larger area to find the remaining area."}, {"front": "How do you calculate the total volume of a 3-D composite figure like a cylinder topped with a hemisphere (a silo)?", "back": "Calculate the volume of the cylinder and the volume of the hemisphere separately, then add these two volumes together to find the total volume."}, {"front": "When finding the perimeter of a 2-D composite figure that combines shapes (like a rectangle with a semicircular extension), what must you be careful not to count?", "back": "Do not count the internal boundaries where the shapes are joined. The perimeter should only include the outer edges of the combined figure."}, {"front": "A window is shaped like a rectangle 4 ft wide and 6 ft tall, topped with a semicircle. What is the radius of the semicircle?", "back": "The semicircle's diameter is equal to the width of the rectangle, which is 4 ft. Therefore, its radius is half of that, or 2 ft."}, {"front": "What is the formula for the area of a semicircle with radius 'r'?", "back": "A = (1/2)πr²"}, {"front": "What is the formula for the volume of a hemisphere with radius 'r'?", "back": "V = (1/2)(4/3)πr³ = (2/3)πr³"}, {"front": "When finding the surface area of a composite solid, what crucial detail must be remembered about faces where two pieces are joined?", "back": "The faces where two pieces are joined are hidden and should NOT be included in the total surface area calculation."}, {"front": "A garden has a rectangular section (20 ft by 10 ft) with a semicircular extension on one short end. How would you calculate its perimeter?", "back": "The perimeter consists of two long sides of the rectangle, one short side of the rectangle, and the arc length of the semicircle (which replaces the other short side). So, P = 2(long side) + 1(short side) + (1/2)(2πr)."}, {"front": "A garden has a rectangular section (20 ft by 10 ft) with a semicircular extension on one short end. How would you calculate its area?", "back": "Calculate the area of the rectangular section and the area of the semicircular extension separately, then add these two areas together."}, {"front": "What is the volume formula for a cylinder with radius 'r' and height 'h'?", "back": "V = πr²h"}, {"front": "What is the volume formula for a cone with radius 'r' and height 'h'?", "back": "V = (1/3)πr²h"}, {"front": "If a solid is made by placing a cone on top of a cylinder, how would you find the total volume?", "back": "Calculate the volume of the cylinder and the volume of the cone separately, then add them together."}, {"front": "For a square piece of sheet metal with sides of 10 in. from which a circle with diameter 6 in. is cut, what is the area of the square?", "back": "Area of square = side² = 10² = 100 in.²"}, {"front": "For a square piece of sheet metal with sides of 10 in. from which a circle with diameter 6 in. is cut, what is the radius of the circle?", "back": "The diameter is 6 in., so the radius is half of that, which is 3 in."}, {"front": "Why is it important to break down composite figures into simpler parts?", "back": "Breaking them down allows you to apply known area, perimeter, surface area, or volume formulas for basic geometric shapes, which can then be combined to find the total for the complex figure."}, {"front": "Give an example of a real-world object that could be considered a 2-D composite figure.", "back": "A window shaped like a rectangle topped with a semicircle, or a floor plan consisting of multiple rectangular rooms."}, {"front": "Give an example of a real-world object that could be considered a 3-D composite figure.", "back": "A grain silo (cylinder with a hemisphere top), or a building resembling a rectangular prism topped with a triangular prism."}, {"front": "In the context of composite figures, what does it mean to 'combine the results'?", "back": "It means either adding the calculated areas/volumes/perimeters of the individual simpler parts together, or subtracting the area/volume of a removed part from the whole, as appropriate for the figure's construction."}, {"front": "When is it appropriate to use subtraction in calculating the area or volume of a composite figure?", "back": "Subtraction is appropriate when a smaller shape or region is removed or cut out from a larger, more basic shape (e.g., a hole drilled through a block, or a circle cut from a square)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
