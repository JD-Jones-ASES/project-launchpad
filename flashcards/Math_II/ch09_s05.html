<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 9, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three basic measures of center reviewed in this section?", "back": "Mean, median, and mode.", "id": "fc01"}, {"front": "Define the mean of a data set and provide its formula.", "back": "The sum of all data values divided by the number of values: $x = (x_1 + x_2 + ... + x_n) / n$.", "id": "fc02"}, {"front": "How is the median of a data set found, especially when there's an even number of data points?", "back": "The median is the middle value when the data are ordered. If there's an even number of data points, it's the average of the two middle values.", "id": "fc03"}, {"front": "What is the mode of a data set?", "back": "The value that appears most often in the data set.", "id": "fc04"}, {"front": "Define the range of a data set and provide its formula.", "back": "The difference between the greatest and least values in the data set: `range = maximum - minimum`.", "id": "fc05"}, {"front": "Calculate the mean, median, mode, and range for the data set: 12, 15, 18, 15, 22, 30, 15.", "back": "Ordered data: 12, 15, 15, 15, 18, 22, 30. Mean = 127/7 ≈ 18.1. Median = 15. Mode = 15. Range = 30 - 12 = 18.", "id": "fc06"}, {"front": "What is a histogram?", "back": "A histogram is a bar graph that shows how data are distributed across intervals (called bins). The bars touch because the intervals are consecutive, and their height shows the frequency for that interval.", "id": "fc07"}, {"front": "What is a key visual characteristic of a histogram that distinguishes it from a typical bar graph?", "back": "The bars in a histogram touch each other because they represent continuous data distributed across consecutive intervals (bins), unlike most bar graphs which typically separate bars for discrete categories.", "id": "fc08"}, {"front": "In a histogram, what does the height of each bar represent?", "back": "The frequency (count) of data values that fall within that specific interval or bin.", "id": "fc09"}, {"front": "List the five components of a data set's five-number summary.", "back": "Minimum (least value), First Quartile (Q1), Median (Q2), Third Quartile (Q3), Maximum (greatest value).", "id": "fc10"}, {"front": "What is the first quartile (Q1)?", "back": "The median of the lower half of an ordered data set.", "id": "fc11"}, {"front": "What is the third quartile (Q3)?", "back": "The median of the upper half of an ordered data set.", "id": "fc12"}, {"front": "What is the interquartile range (IQR) and how is it calculated?", "back": "The IQR is a measure of spread, representing the range of the middle 50% of the data. It is calculated as `IQR = Q3 - Q1`.", "id": "fc13"}, {"front": "What is a box plot (box-and-whisker plot) and what does it display?", "back": "A box plot is a graphical display that visually represents the five-number summary of a data set.", "id": "fc14"}, {"front": "How does a box plot visually represent the five-number summary?", "back": "The 'box' spans from Q1 to Q3, a line inside the box marks the median, and 'whiskers' extend from the box to the minimum and maximum values.", "id": "fc15"}, {"front": "Find the five-number summary and IQR for the data set: 3, 5, 7, 8, 10, 12, 14, 15, 18, 20, 22.", "back": "Minimum = 3, Q1 = 7, Median = 12, Q3 = 18, Maximum = 22. IQR = 18 - 7 = 11.", "id": "fc16"}, {"front": "If Class A has a median test score of 75 and Class B has a median of 80, what can be inferred about their 'typical' performance?", "back": "Class B has a higher median, suggesting its 'typical' or central score is higher than Class A's.", "id": "fc17"}, {"front": "If Class A has an IQR of 20 and Class B has an IQR of 12, what does this indicate about the spread of their test scores?", "back": "Class A has a larger IQR, indicating its scores are more spread out or have greater variability compared to Class B's scores.", "id": "fc18"}, {"front": "State the informal rule for identifying an outlier in a data set.", "back": "A data value is informally considered an outlier if it is more than `1.5 * IQR` below Q1 or above Q3.", "id": "fc19"}, {"front": "A data set has Q1 = 10 and Q3 = 22. Calculate the IQR and the upper threshold for outliers.", "back": "IQR = Q3 - Q1 = 22 - 10 = 12. Upper threshold = Q3 + (1.5 * IQR) = 22 + (1.5 * 12) = 22 + 18 = 40.", "id": "fc20"}, {"front": "Given Q1 = 10, Q3 = 22, and IQR = 12, is the value 42 considered an outlier?", "back": "Yes. The upper threshold for outliers is 40 (Q3 + 1.5*IQR = 22 + 18). Since 42 > 40, it is an outlier.", "id": "fc21"}, {"front": "Given Q1 = 20, Q3 = 36, and IQR = 16, is the value 5 considered an outlier?", "back": "No. The lower threshold for outliers is -4 (Q1 - 1.5*IQR = 20 - 24). Since 5 > -4, it is not an outlier.", "id": "fc22"}, {"front": "What do measures of spread, like range and IQR, tell us about a data set?", "back": "Measures of spread describe how data values are distributed and how much variability or dispersion exists within the data set, complementing measures of center.", "id": "fc23"}, {"front": "When comparing two classes' test scores using box plots, what would a longer box or longer whiskers indicate?", "back": "A longer box indicates a larger IQR, meaning the middle 50% of scores are more spread out. Longer whiskers indicate a larger overall range, meaning the entire data set has greater variability.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
