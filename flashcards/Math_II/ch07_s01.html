<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How is a scalene triangle classified by its sides?", "back": "A scalene triangle has no congruent sides.", "id": "fc01"}, {"front": "What defines an isosceles triangle?", "back": "An isosceles triangle has at least two congruent sides.", "id": "fc02"}, {"front": "Describe the side classification of an equilateral triangle.", "back": "An equilateral triangle has three congruent sides.", "id": "fc03"}, {"front": "How is an acute triangle classified by its angles?", "back": "An acute triangle has three angles, each measuring less than $90^$.", "id": "fc04"}, {"front": "What is a key characteristic of a right triangle?", "back": "A right triangle has exactly one $90^$ angle.", "id": "fc05"}, {"front": "Define an obtuse triangle.", "back": "An obtuse triangle has exactly one angle greater than $90^$.", "id": "fc06"}, {"front": "State the Triangle Angle-Sum Property.", "back": "The sum of the measures of the interior angles of any triangle is $180^$.", "id": "fc07"}, {"front": "What is the formula for the Triangle Angle-Sum Property, given interior angles A, B, and C?", "back": "$m A + m B + m C = 180^$", "id": "fc08"}, {"front": "A triangle has interior angles measuring $47^$ and $68^$. What is the measure of the third angle?", "back": "Using the Triangle Angle-Sum Property: $180^ - 47^ - 68^ = 65^$. The third angle measures $65^$.", "id": "fc09"}, {"front": "An isosceles triangle has a vertex angle of $40^$. What are the measures of its two base angles?", "back": "Let each base angle be $x$. Since base angles are equal: $x + x + 40^ = 180^ \\ 2x = 140^ \\ x = 70^$. Each base angle measures $70^$.", "id": "fc10"}, {"front": "A builder designs a roof truss in the shape of a triangle. The two base angles each measure $55^$. What is the measure of the peak angle?", "back": "Let the peak angle be $P$. $55^ + 55^ + P = 180^ \\ 110^ + P = 180^ \\ P = 70^$. The peak angle measures $70^$.", "id": "fc11"}, {"front": "How is an exterior angle of a triangle formed?", "back": "An exterior angle of a triangle is formed by one side of the triangle and the extension of an adjacent side.", "id": "fc12"}, {"front": "What are 'remote interior angles' in the context of an exterior angle?", "back": "The remote interior angles are the two interior angles of the triangle that are not adjacent to the exterior angle.", "id": "fc13"}, {"front": "State the Exterior Angle Theorem.", "back": "The measure of an exterior angle of a triangle equals the sum of the measures of its two remote interior angles.", "id": "fc14"}, {"front": "Given an exterior angle $D$ and its remote interior angles $A$ and $B$, write the formula for the Exterior Angle Theorem.", "back": "$m D = m A + m B$", "id": "fc15"}, {"front": "How does the Exterior Angle Theorem relate to the Triangle Angle-Sum Property?", "back": "The Exterior Angle Theorem follows directly from the Triangle Angle-Sum Property. The exterior angle and its adjacent interior angle form a linear pair ($180^$), and the sum of all three interior angles is also $180^$.", "id": "fc16"}, {"front": "In triangle $PQR$, side $QR$ is extended through $R$ to point $S$. If $m P = 50^$ and $m Q = 65^$, find $m PRS$.", "back": "By the Exterior Angle Theorem, $m PRS = m P + m Q = 50^ + 65^ = 115^$. The measure of angle $PRS$ is $115^$.", "id": "fc17"}, {"front": "An exterior angle of a triangle measures $130^$. One of the remote interior angles measures $75^$. Find the other remote interior angle.", "back": "Let the other remote interior angle be $x$. By the Exterior Angle Theorem: $130^ = 75^ + x \\ x = 130^ - 75^ = 55^$. The other remote interior angle measures $55^$.", "id": "fc18"}, {"front": "What is the relationship between an exterior angle and its adjacent interior angle?", "back": "An exterior angle and its adjacent interior angle together form a straight angle, meaning their sum is $180^$ (they are a linear pair).", "id": "fc19"}, {"front": "Can a triangle have two right angles? Explain why or why not.", "back": "No, a triangle cannot have two right angles. If it did, the sum of those two angles alone would be $90^ + 90^ = 180^$, leaving no measure for the third angle, which is impossible.", "id": "fc20"}, {"front": "Can an equilateral triangle also be a right triangle?", "back": "No. An equilateral triangle has three angles, each measuring $60^$. A right triangle must have exactly one $90^$ angle, making it impossible for an equilateral triangle to be a right triangle.", "id": "fc21"}, {"front": "What is the minimum number of acute angles a triangle must have?", "back": "A triangle must have at least two acute angles. If it had fewer than two acute angles (e.g., two right or two obtuse angles), the sum of its interior angles would exceed $180^$.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
