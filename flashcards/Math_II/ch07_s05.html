<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 7, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Math_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of the Pythagorean Theorem in real-world applications?", "back": "It is used to find a distance that forms part of a right triangle."}, {"front": "How can you apply the Pythagorean Theorem to find the diagonal of a rectangle?", "back": "A rectangle's diagonal forms a right triangle with its width and height as the legs. Use a² + b² = c² where a = width, b = height, and c = diagonal."}, {"front": "What geometric shape is formed when a ladder leans against a wall, and which part represents the hypotenuse?", "back": "A right triangle is formed. The ladder itself represents the hypotenuse, while the height on the wall and the distance from the wall to the ladder's base are the legs."}, {"front": "How can the Pythagorean Theorem be used to calculate the distance between two points on a coordinate grid?", "back": "By drawing a right triangle where the horizontal and vertical distances between the points form the legs, and the distance between the points is the hypotenuse."}, {"front": "Explain the '3-4-5 rule' used by builders to check if a corner is square.", "back": "If measurements of 3 units and 4 units are taken along two sides from a corner, the diagonal between those two points should be exactly 5 units to form a true right angle (since 3² + 4² = 5²)."}, {"front": "List four common applications of the Pythagorean Theorem mentioned in this section.", "back": "Finding diagonals of rectangles, solving ladder problems, calculating distances between two points, and checking if a corner is square."}, {"front": "What is a Pythagorean triple?", "back": "A set of three positive integers (a, b, c) such that a² + b² = c², which can represent the side lengths of a right triangle."}, {"front": "Name three common Pythagorean triples.", "back": "(3, 4, 5), (5, 12, 13), and (8, 15, 17)."}, {"front": "A rectangular TV screen is 40 inches wide and 30 inches tall. What is the length of its diagonal?", "back": "The diagonal is 50 inches. (40² + 30² = 1600 + 900 = 2500, √2500 = 50)"}, {"front": "A rectangular garden is 12 feet long and 5 feet wide. Find the length of its diagonal.", "back": "The diagonal is 13 feet. (12² + 5² = 144 + 25 = 169, √169 = 13)"}, {"front": "A 20-foot ladder leans against a wall. The base of the ladder is 6 feet from the wall. How high up the wall does the ladder reach? Round to the nearest tenth.", "back": "The ladder reaches approximately 19.1 feet up the wall. (6² + h² = 20², h² = 400 - 36 = 364, h = √364 ≈ 19.07, rounds to 19.1)"}, {"front": "Find the distance between the points (1, 2) and (4, 6) on a coordinate grid.", "back": "The distance is 5 units. (Horizontal leg = 4-1=3, Vertical leg = 6-2=4. Then 3² + 4² = 9 + 16 = 25, √25 = 5)"}, {"front": "A carpenter measures 3 feet along one wall from a corner and 4 feet along the other. She measures the diagonal as 5 feet 1/4 inch. Is the corner a true right angle?", "back": "No, the corner is slightly out of square. For a true right angle, the diagonal should be exactly 5 feet (3² + 4² = 5²)."}, {"front": "A mason measures 6 feet along one side of a foundation corner and 8 feet along the other. If the diagonal measures exactly 10 feet, is the corner square?", "back": "Yes, the corner is square. (6² + 8² = 36 + 64 = 100, and 10² = 100)."}, {"front": "A right triangle has legs of length 3/4 cm and 1 cm. Find the length of the hypotenuse.", "back": "The hypotenuse is 5/4 cm or 1.25 cm. ((3/4)² + 1² = 9/16 + 16/16 = 25/16, √(25/16) = 5/4)"}, {"front": "A rectangular box has a base that is 8.5 inches by 11 inches. Find the diagonal of the base, rounded to the nearest tenth.", "back": "The diagonal of the base is approximately 13.9 inches. (8.5² + 11² = 72.25 + 121 = 193.25, √193.25 ≈ 13.89, rounds to 13.9)"}, {"front": "What is the sum of the interior angles of any triangle?", "back": "The interior angles of any triangle sum to 180 degrees."}, {"front": "How is an exterior angle of a triangle related to its remote interior angles?", "back": "An exterior angle of a triangle is equal to the sum of the two remote interior angles."}, {"front": "What is the AA criterion for similar triangles?", "back": "The Angle-Angle (AA) criterion states that if two angles of one triangle are congruent to two angles of another triangle, then the triangles are similar."}, {"front": "State the Pythagorean Theorem.", "back": "For every right triangle, the square of the length of the hypotenuse (c) is equal to the sum of the squares of the lengths of the two legs (a and b): a² + b² = c²."}, {"front": "In what other mathematical contexts might the Pythagorean Theorem or related concepts be encountered?", "back": "It is used to derive the distance formula in coordinate geometry (e.g., Chapter 8) and connects to work on radical expressions (e.g., Chapter 1)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
