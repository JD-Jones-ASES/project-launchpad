<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math II &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_II.html">&larr; Back to Math II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a sequence in mathematics?", "back": "A sequence is an ordered list of numbers.", "id": "fc01"}, {"front": "What is each number in a sequence called?", "back": "Each number in a sequence is called a term.", "id": "fc02"}, {"front": "Define an 'arithmetic sequence'.", "back": "An arithmetic sequence is a sequence in which the difference between consecutive terms is constant.", "id": "fc03"}, {"front": "What is the 'common difference' in an arithmetic sequence?", "back": "The common difference, denoted by $d$, is the constant difference between consecutive terms in an arithmetic sequence.", "id": "fc04"}, {"front": "How do you calculate the common difference $d$ from two consecutive terms $a_n$ and $a_{n+1}$?", "back": "The common difference $d$ is calculated as $d = a_{n+1} - a_n$.", "id": "fc05"}, {"front": "How can you determine if a given sequence is arithmetic?", "back": "To determine if a sequence is arithmetic, calculate the difference between several consecutive terms. If this difference is always the same, the sequence is arithmetic.", "id": "fc06"}, {"front": "Is the sequence $3, 7, 11, 15, 19, \\dots$ arithmetic? If so, state its common difference.", "back": "Yes, it is an arithmetic sequence. The common difference $d = 4$ ($7-3=4$, $11-7=4$, etc.).", "id": "fc07"}, {"front": "Is the sequence $2, 6, 18, 54, \\dots$ arithmetic? Explain why or why not.", "back": "No, it is not an arithmetic sequence. The differences between consecutive terms are not constant ($6-2=4$, but $18-6=12$). This indicates a different type of pattern.", "id": "fc08"}, {"front": "State the explicit formula for the $n$th term of an arithmetic sequence.", "back": "The explicit formula for the $n$th term ($a_n$) of an arithmetic sequence with first term $a_1$ and common difference $d$ is $a_n = a_1 + (n - 1)d$.", "id": "fc09"}, {"front": "In the explicit formula $a_n = a_1 + (n - 1)d$, what does the variable $n$ represent?", "back": "$n$ represents the term number or the position of the term in the sequence.", "id": "fc10"}, {"front": "An arithmetic sequence has $a_1 = 5$ and $d = 3$. Find the 10th term ($a_{10}$).", "back": "Using the formula $a_n = a_1 + (n - 1)d$, $a_{10} = 5 + (10 - 1)(3) = 5 + 9(3) = 5 + 27 = 32$.", "id": "fc11"}, {"front": "The sequence $12, 8, 4, 0, -4, \\dots$ is arithmetic. Write its explicit formula for $a_n$.", "back": "First, find $a_1 = 12$ and $d = 8 - 12 = -4$. Then, substitute into $a_n = a_1 + (n - 1)d$: $a_n = 12 + (n - 1)(-4) = 12 - 4n + 4 = 16 - 4n$.", "id": "fc12"}, {"front": "For the arithmetic sequence $12, 8, 4, 0, -4, \\dots$, use its explicit formula to find $a_{20}$.", "back": "The explicit formula is $a_n = 16 - 4n$. So, $a_{20} = 16 - 4(20) = 16 - 80 = -64$.", "id": "fc13"}, {"front": "What is the fundamental connection between an arithmetic sequence and a linear function?", "back": "An arithmetic sequence is a linear function of the term number ($n$). The pattern of a constant difference directly relates to the constant slope of a linear function.", "id": "fc14"}, {"front": "When an arithmetic sequence is viewed as a linear function, which component of the sequence corresponds to the slope of the line?", "back": "The common difference $d$ of an arithmetic sequence corresponds to the slope of its related linear function.", "id": "fc15"}, {"front": "When an arithmetic sequence is viewed as a linear function, which element corresponds to the y-intercept?", "back": "The 'zeroth term' ($a_1 - d$) corresponds to the y-intercept of the related linear function.", "id": "fc16"}, {"front": "Write the arithmetic sequence $2, 5, 8, 11, \\dots$ as a linear function $f(n)$.", "back": "Here, $a_1 = 2$ and $d = 3$. The function is $f(n) = a_1 + (n - 1)d = 2 + (n - 1)(3) = 2 + 3n - 3 = 3n - 1$.", "id": "fc17"}, {"front": "Maria opens a savings account with $200 and deposits $25 each week. Write a formula for the total amount $A$ in her account after $n$ weeks.", "back": "The initial amount is $200 and the weekly deposit is $25. The formula is $A(n) = 200 + 25n$.", "id": "fc18"}, {"front": "Using the formula $A(n) = 200 + 25n$ for Maria's savings, find the total amount after 12 weeks.", "back": "Substitute $n=12$ into the formula: $A(12) = 200 + 25(12) = 200 + 300 = 500$. Maria will have $500.", "id": "fc19"}, {"front": "A theater has 20 seats in the first row. Each row behind it has 2 more seats than the row in front. How many seats are in row 15?", "back": "This is an arithmetic sequence with $a_1 = 20$ and $d = 2$. To find $a_{15}$: $a_{15} = a_1 + (15 - 1)d = 20 + (14)(2) = 20 + 28 = 48$ seats.", "id": "fc20"}, {"front": "What is the visual representation (graph) of an arithmetic sequence?", "back": "The graph of an arithmetic sequence is a straight line because it grows or shrinks at a constant rate.", "id": "fc21"}, {"front": "How do arithmetic sequences differ from geometric sequences (briefly mentioned in the text)?", "back": "Arithmetic sequences involve a constant *difference* between terms, while geometric sequences involve a constant *ratio* between terms.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
