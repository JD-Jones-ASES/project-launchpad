<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central paradox does Sonnet 48 explore regarding the speaker's beloved?", "back": "The beloved, being the most precious thing, cannot be secured by physical means like locks or chests; their very worth and freedom make them vulnerable, even to 'truth' turning 'thievish'."}, {"front": "In Sonnet 48, what does 'trifles' refer to, and how does it relate to the beloved?", "back": "'Trifles' refers to the speaker's worldly, material possessions, which he can easily lock away. They are called 'trifles' to emphasize their insignificance compared to the immeasurable value of the beloved, who cannot be secured."}, {"front": "What is the meaning of the phrase 'truth proves thievish for a prize so dear' in Sonnet 48?", "back": "This paradox suggests that the beloved's inherent worth and fidelity are so overwhelming that even virtue or honesty ('truth') itself might be irresistibly drawn to 'steal' the beloved away, implying that the beloved's goodness is the ultimate threat to their retention."}, {"front": "How does the 'gentle closure of my breast' in Sonnet 48 function as a 'vault' for the beloved?", "back": "It's a metaphorical 'vault' (the speaker's heart) that is entirely open and unprotected, unlike the locked chests for material possessions. This highlights the vulnerability of the beloved, who resides only in the speaker's emotional, open self."}, {"front": "How does Sonnet 48's 'chest and lock imagery' connect to Sonnet 52?", "back": "Sonnet 48 grieves that the most precious thing (the beloved) cannot be locked away. Sonnet 52, conversely, argues that rarity, achieved by *controlling* access with a 'blessed key,' is what preserves the intensity of pleasure, thus both use the conceit of a treasure chest but respond differently to the problem of value."}, {"front": "What is the speaker's pre-emptive defense strategy in Sonnet 49?", "back": "The speaker prepares for a future where the beloved will grow cold and leave him. His 'defense' is self-defeating: he argues the case against himself, acknowledging his own defects and unworthiness, thus giving the beloved 'lawful reasons' to depart before they even voice them."}, {"front": "Explain the legal term 'audit' as used in Sonnet 49.", "back": "In Sonnet 49, 'audit' refers to a formal accounting or reckoning of the relationship, as if the beloved is examining whether it still yields emotional 'profit' or has found 'reasons of settled gravity' to end it, implying a rational, calculated departure."}, {"front": "What does 'ensconce me here, within the knowledge of mine own desert' mean in Sonnet 49?", "back": "It means the speaker takes up a defensive position by sheltering or fortifying himself within the full awareness of his own unworthiness or lack of merit ('mine own desert'). He knows he deserves to be left, thus mentally preparing for rejection."}, {"front": "What 'paradox with quiet devastation' does Sonnet 49's couplet deliver?", "back": "The couplet, 'To leave poor me thou hast the strength of laws, / Since why to love I can allege no cause,' reveals the devastating paradox that the speaker has no justification or 'cause' to offer for why the beloved *should* love him, effectively giving up the argument before it begins."}, {"front": "How does Sonnet 49's 'pre-emptive self-condemnation' relate to other sonnets?", "back": "It anticipates the extended self-deprecation found in Sonnet 87 ('Farewell! thou art too dear for my possessing') and connects to Sonnets 88 and 89, where the speaker offers to assist the beloved in constructing a case against him."}, {"front": "How does the horse in Sonnet 50 reflect the speaker's emotional state?", "back": "The horse 'plods dully,' moving slowly and without spirit, as if it senses its rider's grief and reluctance to arrive at a destination away from the beloved. The speaker's 'heavy' woe literally and figuratively burdens the beast."}, {"front": "What is the significance of the horse's 'groan' in Sonnet 50?", "back": "The horse's groan, in response to the spur, cuts the speaker more sharply than the spur cuts the horse. It reminds the speaker that the horse groans not just from the spur but from the grief it has absorbed from its rider, reinforcing the painful truth that his 'grief lies onward, and my joy behind.'"}, {"front": "What does the couplet 'My grief lies onward, and my joy behind' in Sonnet 50 reveal?", "back": "It reveals the sonnet's governing reversal: the speaker is traveling away from his beloved, meaning the direction of his travel ('onward') is towards grief and away from joy, which has been left 'behind' with the beloved."}, {"front": "How do Sonnets 50 and 51 function together?", "back": "They form a paired 'diptych' on the journey away from and back toward the beloved, united by the horse conceit. Sonnet 50 grieves the sluggish outward journey, while 51 imagines the furious speed of the return journey, exploring speed, desire, and direction."}, {"front": "In Sonnet 51, how does the speaker 'excuse the slow offence' of his horse on the outward journey?", "back": "He argues that there's no need to hurry away from the one he loves ('From where thou art why should I haste me thence?'). The horse's slowness is 'wilful-slow' because the rider's desire wills it not to leave the beloved."}, {"front": "What does 'neigh no dull flesh in his fiery race' mean in Sonnet 51?", "back": "This phrase suggests that desire itself, being 'of perfect'st love,' will not call for or rely on any slow-footed animal ('dull flesh') for its swift return. Desire becomes an impatient, fiery horse on its own, outrunning any earthly steed."}, {"front": "In Sonnet 51, how is the concept of 'swift extremity' treated on the return journey?", "back": "On the return journey, even the 'utmost of swiftness' ('swift extremity') would seem 'but slow' to the speaker's eager desire. No physical speed can match the speed of his love to return to the beloved."}, {"front": "What is the final, 'generous verdict' of Sonnet 51's couplet?", "back": "The couplet delivers the verdict: 'Since from thee going, he went wilful-slow, / Towards thee I’ll run, and give him leave to go.' Love will excuse the slow horse on the outward journey precisely because love itself will run with immense speed in the opposite direction (back to the beloved), making the horse unnecessary."}, {"front": "What is the core argument of Sonnet 52 regarding pleasure and value?", "back": "Sonnet 52 argues that rarity preserves the intensity of pleasure. Comparing himself to a rich man with a 'blessed key' to treasure, the speaker asserts that not accessing a valued thing 'every hour' prevents 'blunting the fine point of seldom pleasure.' Constant access diminishes enjoyment."}, {"front": "What does the 'blessed key' symbolize in Sonnet 52?", "back": "The 'blessed key' symbolizes controlled access or the ability to choose when to experience something precious. It's the means by which one can keep pleasure rare and thus more intense, preventing it from becoming commonplace."}, {"front": "According to Sonnet 52, why are 'feasts so solemn and so rare'?", "back": "Feasts are solemn and rare for the same reason a rich man doesn't constantly survey his treasure: their infrequency makes them more special and intense. If they were common, they would lose their 'fine point of pleasure' and seem ordinary."}, {"front": "How does the idea of 'seldom pleasure' in Sonnet 52 relate to human desire?", "back": "'Seldom pleasure' suggests that human desire thrives on anticipation and scarcity. When access to a desired object or experience is limited, the pleasure derived from it is heightened and its value preserved, preventing satiation or boredom."}, {"front": "What is meant by 'posting' in Sonnet 51?", "back": "'Posting' refers to traveling at speed by using relay horses (post-horses), which was the fastest available means of land travel in Shakespeare's England. The speaker implies that even this speed is insufficient for his return journey."}, {"front": "How does the legal language in Sonnet 49 connect to other Shakespearean sonnets?", "back": "The legal language (e.g., 'audit,' 'lawful reasons,' 'cause') connects Sonnet 49 directly to the extended legal conceit found in Sonnet 46, which similarly uses legal metaphors to describe emotional conflicts."}, {"front": "What comparison does Sonnet 51 draw between desire and physical travel?", "back": "Sonnet 51 asserts that desire, fueled by 'perfect'st love,' is so swift and powerful that no physical horse, not even one 'mounted on the wind,' can keep pace. Desire transcends earthly limitations, suggesting love's speed is purely internal and spiritual."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
