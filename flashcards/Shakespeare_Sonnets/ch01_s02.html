<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How many plays, narrative poems, and sonnets did Shakespeare write or co-write during his career?", "back": "Shakespeare wrote or co-wrote 37 plays, composed two long narrative poems, and produced 154 sonnets over roughly twenty-five years."}, {"front": "What were the four traditional categories scholars used to group Shakespeare's plays?", "back": "The plays are traditionally grouped into Comedies, Histories, Tragedies, and Late Romances."}, {"front": "List three characteristic elements of Shakespeare's comedies.", "back": "Confused identities, crossed lovers, witty banter, and a final resolution in marriage and reconciliation are common elements."}, {"front": "What nuanced aspect distinguishes Shakespeare's comedies, even in their sunniest forms?", "back": "Even in the sunniest comedies, there is often a 'shadow at the edge of the frame,' including notes of melancholy, an excluded figure, or a moment of cruelty that the festive ending doesn't entirely dissolve."}, {"front": "What historical period and themes do Shakespeare's history plays typically cover?", "back": "They form a loose cycle covering English kingship from Richard II to Henry VIII (nearly two centuries), examining power, legitimacy, rebellion, and the human cost of political ambition."}, {"front": "Who is considered Shakespeare's greatest comic creation, dominating the *Henry IV* plays?", "back": "Falstaff is perhaps Shakespeare's greatest comic creation, a figure so alive he seems to overflow the plays that contain him."}, {"front": "Name the 'four great tragedies' of Shakespeare's middle period.", "back": "The four great tragedies are *Hamlet*, *Othello*, *King Lear*, and *Macbeth*, all written around the turn of the century within a half-dozen years."}, {"front": "What dark territories of human experience do Shakespeare's great tragedies explore?", "back": "They explore themes such as revenge and delay, jealousy and manipulation, filial ingratitude and madness, and ambition and its inevitable corruption."}, {"front": "How do Shakespeare's Roman tragedies, such as *Julius Caesar*, differ in approach from his middle-period tragedies?", "back": "The Roman tragedies bring a cooler, more political intelligence to bear on many of the same themes, compared to the emotionally devastating middle-period tragedies."}, {"front": "Identify four characteristics of Shakespeare's late romances.", "back": "These plays are stranger and more difficult, with deliberately archaic plots involving long separations, improbable reunions, death-and-resurrection patterns, and supernatural interventions. They are steeped in a hard-won wisdom about loss and forgiveness."}, {"front": "Which of Shakespeare's plays is almost certainly his last sole-authored work and is often read as a 'valediction'?", "back": "*The Tempest* is often read as a valediction, with Prospero's actions (drowning his books, renouncing magic) symbolizing the playwright laying down his pen."}, {"front": "How did Shakespeare first establish his literary reputation among his contemporaries?", "back": "He established his literary reputation through his two long narrative poems, *Venus and Adonis* and *The Rape of Lucrece*, which he published in the early 1590s."}, {"front": "What did Shakespeare call *Venus and Adonis* in its dedication, and what did this phrase imply?", "back": "He called it 'the first heir of my invention,' suggesting he did not yet consider his plays (then commercial products) as serious literary achievements."}, {"front": "Compare the tone and subject matter of *Venus and Adonis* and *The Rape of Lucrece*.", "back": "*Venus and Adonis* is comic and erotic, retelling Ovid's myth of Venus's pursuit of Adonis. *The Rape of Lucrece* is grave and tragic, recounting the Roman story of Tarquin's violation of Lucrecia and its political consequences."}, {"front": "What literary technique in *The Rape of Lucrece* anticipates Shakespeare's dramatic work?", "back": "Its long rhetorical set-pieces, like Tarquin's interior monologue or Lucrece's lament, read almost as 'soliloquy-exercises,' allowing the poet to work out dramatic techniques in lyric form."}, {"front": "Name two classical sources that heavily influenced Shakespeare's narrative poems.", "back": "Both poems draw heavily on Ovid's *Metamorphoses* and *Fasti*."}, {"front": "How does the boundary between Shakespeare's sonnets and plays appear?", "back": "The boundary between his sonnets and plays is porous, with the same obsessions circulating through both bodies of work."}, {"front": "Give an example of a play that explicitly integrates sonnets or sonnet-writing into its plot or dialogue.", "back": "*Love's Labour's Lost* is almost a play about sonnet-writing, and *Romeo and Juliet* opens with a shared sonnet between the lovers at their first meeting."}, {"front": "How do the themes of Shakespeare's great tragedies relate to his sonnets?", "back": "The great tragedies share the sonnets' darker emotional terrain; for example, Othello's jealousy mirrors the possessiveness in some Dark Lady sonnets, and Hamlet's meditations echo sonnets 66 and 73."}, {"front": "What is the broad consensus regarding the composition date of the bulk of Shakespeare's sonnets?", "back": "The broad consensus places the bulk of the sequence in the 1590s, with some poems possibly revised or newly composed as late as 1603–1609."}, {"front": "What evidence supports the circulation of Shakespeare's sonnets before their full publication in 1609?", "back": "Francis Meres referred to Shakespeare's 'sugared sonnets among his private friends' in *Palladis Tamia* (1598), and two sonnets (138 and 144) appeared in the pirated anthology *The Passionate Pilgrim* in 1599."}, {"front": "What does the text conclude about the overall nature and artistry of Shakespeare's sonnets?", "back": "The sonnets are a 'crafted sequence,' not a 'spontaneous outpouring,' shaped by a master of the form at the height of his powers, and are among the most accomplished lyric poems in the English language."}, {"front": "Which edition of Shakespeare's Sonnets was the only authorized one published in his lifetime?", "back": "*Shake-speares Sonnets* (1609), published by Thomas Thorpe."}, {"front": "What connection is drawn between the later 'Dark Lady' sonnets and Shakespeare's tragedies?", "back": "The rawness and impatience of some later Dark Lady poems feel closer in spirit to the great tragedies (1600–1608) than to the more courtly atmosphere of the early procreation sonnets."}, {"front": "How does Shakespeare's career span and lack of university education make his output particularly astonishing?", "back": "For a man who never attended university and wrote primarily for the commercial stage, his output in a 25-year career—including 37 plays, 2 narrative poems, and 154 sonnets, with their vast range and ambition—is astonishing."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
