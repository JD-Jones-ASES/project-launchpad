<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central argument Sonnet CXXVII makes about Elizabethan beauty standards?", "back": "Sonnet CXXVII argues that conventional Elizabethan beauty, which prized paleness, has been corrupted by cosmetics, allowing artificial 'fairness' to discredit natural beauty. The Dark Lady's natural darkness then redefines what beauty should look like."}, {"front": "How does Sonnet CXXVII portray 'black' beauty compared to the 'old age' standard?", "back": "In the 'old age,' 'black' (dark coloring) was not considered beautiful. Sonnet CXXVII, however, positions natural dark beauty as 'beauty's successive heir,' a legitimate successor to a throne usurped by artificial 'fairness'."}, {"front": "What double meaning does the word 'fair' carry in Sonnet CXXVII, and why is it significant?", "back": "'Fair' means both 'beautiful' and 'light-complexioned.' Shakespeare exploits this to highlight the collapse of the equation between light skin and loveliness, suggesting that true beauty has been profaned."}, {"front": "Explain the phrase 'fairing the foul with Art's false borrowed face' from Sonnet CXXVII.", "back": "This phrase refers to the practice of using cosmetics to make someone considered ugly (the 'foul') appear beautiful. 'Art' means skill or craft, and 'borrowed face' emphasizes that the beauty is artificial and not inherent to the wearer."}, {"front": "What role do cosmetics play in the cultural debate reflected in Sonnet CXXVII?", "back": "Cosmetics, like white lead and hair dyes, were a source of social anxiety and moral denunciation in Elizabethan London. Shakespeare's complaint about 'Art's false borrowed face' participates in this debate, positioning the Dark Lady's natural darkness as a form of honesty against cosmetic deception."}, {"front": "How do the 'raven black' eyes of the mistress function in Sonnet CXXVII?", "back": "Her 'raven black' eyes are presented as mourning the corruption of authentic beauty by artificial means. Paradoxically, their 'becoming' mourning makes 'every tongue' agree that beauty 'should look so,' establishing a new standard through her natural darkness."}, {"front": "What connection does Sonnet CXXVII have with Sonnet 130 and Sonnet 68?", "back": "Sonnet CXXVII sets the aesthetic and moral claim for the Dark Lady sequence, which is extended by Sonnet 130's anti-blazon. The theme of cosmetic deception, 'Art's false borrowed face,' also echoes Sonnet 68, linking concerns about authenticity across both the Dark Lady and Fair Youth sequences."}, {"front": "What is the primary subject and tone of Sonnet CXXVIII?", "back": "Sonnet CXXVIII is a playful poem where the speaker expresses jealousy, not of a rival lover, but of the keys of a virginal (a keyboard instrument) that the Dark Lady is playing. The tone is light, witty, and subtly erotic."}, {"front": "Who or what is the speaker jealous of in Sonnet CXXVIII, and why?", "back": "The speaker is jealous of the 'jacks' (the keys) of the virginal. He envies their ability to 'kiss the tender inward of thy hand' with every nimble leap, while his own lips stand blushing at a distance."}, {"front": "What is the double meaning of 'jacks' in Sonnet CXXVIII?", "back": "'Jacks' refers both to the keys of a virginal or harpsichord and, colloquially, to impudent or presumptuous fellows. Shakespeare uses this double meaning to personify the keys as 'saucy rivals' for the lady's touch."}, {"front": "How does the speaker resolve his jealousy at the end of Sonnet CXXVIII?", "back": "The speaker proposes a humorous trade in the couplet: 'Since saucy jacks so happy are in this, / Give them thy fingers, me thy lips to kiss.' He wants her lips, offering her fingers to the keys."}, {"front": "How does Sonnet CXXVIII's use of music differ from Sonnet 8?", "back": "In Sonnet 8, music serves as a metaphor to school the Fair Youth in the duties of love and procreation. In Sonnet CXXVIII, music is primarily a vehicle for the speaker's personal desire and witty erotic rivalry."}, {"front": "What is the central purpose or subject of Sonnet CXXIX?", "back": "Sonnet CXXIX is a unflinching diagnosis and analysis of lust, describing its nature, stages, and psychological effects, rather than being a traditional love poem."}, {"front": "Enumerate the three main stages of lust described in Sonnet CXXIX.", "back": "Lust is described as: 1. Reckless, murderous, savage 'till action' (before gratification). 2. 'A bliss in proof' (during the act). 3. 'A very woe' (immediately after gratification) and 'past reason hated'."}, {"front": "Explain 'expense of spirit in a waste of shame' from Sonnet CXXIX.", "back": "This refers to the squandering or exhausting of vital energy ('spirit,' the animating force) through sexual desire, which results in shame. 'Waste of shame' also suggests a ruined, shameful landscape produced by this expenditure."}, {"front": "What is meant by 'a bliss in proof, and proved, a very woe' in Sonnet CXXIX?", "back": "'In proof' means while being experienced or tested, so lust is a 'bliss' (pleasure) during the act. 'Proved' means once the experience is over, at which point the pleasure turns into 'a very woe' (deep sorrow or misery). The chiastic structure emphasizes this reversal."}, {"front": "What is the central conceit or metaphor used to describe lust in Sonnet CXXIX?", "back": "Lust is presented as a 'swallow'd bait' deliberately laid 'to make the taker mad.' It's a trap that ensnares its victim, driving them to madness in both pursuit and possession."}, {"front": "What profound psychological paradox is presented in the couplet of Sonnet CXXIX?", "back": "The couplet states, 'All this the world well knows; yet none knows well / To shun the heaven that leads men to this hell.' The paradox is that humanity is fully aware of lust's destructive nature and consequences, yet remains compelled and unable to resist its allure, willingly walking into its trap."}, {"front": "How does Shakespeare's treatment of lust in Sonnet CXXIX differ from traditional Elizabethan moral philosophy?", "back": "Unlike traditional moralists who often exhorted abstinence or offered remedies for sin, Shakespeare's Sonnet CXXIX offers no moral exhortation, advice, or remedy. It provides an almost clinical, detached observation of lust's irresistible mechanism, presenting it as a fundamental, inescapable fact of human nature."}, {"front": "In Sonnet CXXIX, what do 'heaven' and 'hell' represent in the final couplet?", "back": "'Heaven' represents the initial, deceptive promise or perceived pleasure of lust, while 'hell' signifies the inevitable suffering, shame, and madness that lust ultimately leads to. The terms highlight the trap's destructive cycle."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
