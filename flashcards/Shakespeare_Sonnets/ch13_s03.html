<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central metaphor for love in Sonnet 147?", "back": "Love is portrayed as a fever or clinical illness that the speaker knowingly prolongs by feeding it."}, {"front": "In Sonnet 147, what role does 'Reason' play, and what ultimately happens to it?", "back": "Reason is depicted as a 'physician' to the speaker's love. It abandons him because he refuses to follow its 'prescriptions' (counsel), leaving him 'past cure' and 'past care'."}, {"front": "Explain the meaning of 'longing still' as used in Sonnet 147.", "back": "It means 'always craving' or 'perpetually desirous,' emphasizing the continuous and self-destructive nature of the speaker's desire, not 'quietly.'"}, {"front": "What shocking reversal concerning the Dark Lady occurs in the couplet of Sonnet 147?", "back": "The speaker declares, 'For I have sworn thee fair, and thought thee bright, / Who art as black as hell, as dark as night,' completely contradicting his previous beliefs about her."}, {"front": "How did Elizabethan medicine classify obsessive love, and what term was used for it?", "back": "Obsessive love was classified as a genuine medical condition called lovesickness or 'amor hereos,' a form of melancholy produced by an excess of black bile."}, {"front": "According to Stoic moral philosophy, what was the ideal relationship between reason and passions?", "back": "Stoic philosophy held that passions must be governed by reason for a person to live well. In Sonnet 147, reason has not merely been overpowered but has given up entirely."}, {"front": "What central epistemological puzzle does the speaker grapple with in Sonnet 148?", "back": "The speaker interrogates the reliability of his own perception, questioning whether his 'Love's eyes' see falsely or if his judgment misreads what they see."}, {"front": "In Sonnet 148, what does the phrase 'vexed with watching' signify for the speaker's vision?", "back": "It refers to the lover's sleepless vigil and exhaustion, which physically distorts his vision and makes clear sight impossible, literally blurring his view with tears."}, {"front": "How does Sonnet 148 characterize 'Love's eye'?", "back": "Love's eye is described as distorted by weeping and watching, making it 'not so true as all men’s' because it is clouded by obsession and emotion."}, {"front": "What is 'cunning Love's' strategic deception in the couplet of Sonnet 148?", "back": "'Cunning Love' uses the speaker's own tears to blind him, strategically ensuring that his clear-sighted eyes can never find the Dark Lady's 'foul faults.'"}, {"front": "How does Shakespeare's portrayal of love's 'blindness' in Sonnet 148 invert Neoplatonic accounts?", "back": "Neoplatonism saw love's blindness as an elevation to perceive inner beauty. Shakespeare presents it as a degradation of perception caused by tears and exhaustion, leading to self-deception rather than spiritual insight."}, {"front": "Explain the meaning of 'I against myself with thee partake' in Sonnet 149.", "back": "It means the speaker takes sides with the Dark Lady against his own interests and well-being, abandoning his own identity for her sake."}, {"front": "How does the speaker demonstrate his extreme submission to the Dark Lady throughout Sonnet 149?", "back": "He lists actions such as abandoning friends she dislikes, punishing himself with misery when she is cruel, and 'worshipping' her very 'defect,' putting her will above all else."}, {"front": "What bitter self-knowledge does the speaker gain in the couplet of Sonnet 149?", "back": "He realizes his devotion proves nothing about love for her, but rather confirms his own willful delusion, stating, 'Those that can see thou lov'st, and I am blind.'"}, {"front": "What fundamental paradox concerning the Dark Lady's influence bewilders the speaker in Sonnet 150?", "back": "He is baffled by her 'powerful might' despite her 'insufficiency' and how her worst actions ('the very refuse of thy deeds') seem superior to everything else he might value."}, {"front": "What does the speaker mean by 'give the lie to my true sight' in Sonnet 150?", "back": "It means to directly contradict and bluntly deny what his own eyes plainly see, effectively swearing that daylight is dark despite the clear evidence."}, {"front": "In Sonnet 150, what does 'becoming of things ill' refer to regarding the Dark Lady's qualities?", "back": "It describes her strange ability to make bad things seem attractive, a 'strange grace that transforms vice into apparent virtue' in the speaker's perception."}, {"front": "What is the speaker's final, twisted argument for his own worthiness in the couplet of Sonnet 150?", "back": "He argues that because her very unworthiness inspired his love, and he can love such an unworthy person, he must therefore be more worthy of her love than she has ever acknowledged."}, {"front": "The medical metaphor of love as a fever in Sonnet 147 connects forward to which later sonnets?", "back": "It connects to Sonnets 153 and 154 (the Anacreontic coda), where the speaker seeks a 'sovereign cure' at a healing bath but finds none for his love's fever."}, {"front": "How does the depiction of the Dark Lady's 'darkness' in Sonnet 147 differ from its presentation in earlier sonnets like 127?", "back": "In Sonnet 127, her darkness is presented as unconventional beauty. In 147, it becomes outright condemnation, equated with 'black as hell, as dark as night,' signaling moral depravity."}, {"front": "Which other sonnet mentioned in the text describes desire's madness in a 'clinical register' similar to Sonnet 147?", "back": "Sonnet 129 from the previous chapter is mentioned as cataloguing desire's madness in a similar clinical register, highlighting its destructive nature."}, {"front": "Which sonnet from the previous chapter is explicitly compared to Sonnet 150 for its theme of the speaker's senses testifying against the Dark Lady while his heart continues to serve her?", "back": "Sonnet 141 is mentioned as a comparison, where the speaker's senses collectively testify against the Dark Lady's flaws, yet his heart persists in serving her."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
