<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How old is the sonnet form, and what does its survival signify?", "back": "The sonnet is over seven hundred years old. Its survival through various historical upheavals and literary movements indicates its flexibility and enduring appeal as a poetic frame."}, {"front": "Who is generally credited with inventing the sonnet?", "back": "Giacomo da Lentini, a notary and poet in the court of Holy Roman Emperor Frederick II in Sicily."}, {"front": "Where and approximately when was the sonnet invented?", "back": "The sonnet was invented in Sicily, around the 1230s, in the court of Holy Roman Emperor Frederick II."}, {"front": "What earlier poetic traditions influenced Giacomo da Lentini's invention of the sonnet?", "back": "The Sicilian strambotto (an eight-line folk lyric) for structural basis, and Provencal troubadour poetry for content (idealized beloved, suffering lover)."}, {"front": "Describe Giacomo da Lentini's key formal innovation for the sonnet.", "back": "He established the sonnet as fourteen hendecasyllabic (eleven-syllable) lines, arranged in an octave and a sestet, addressing a single topic with a structured argument."}, {"front": "What was Francesco Petrarch's significant contribution to the sonnet, even though he didn't invent it?", "back": "Petrarch defined the sonnet for the next four centuries through his 'Canzoniere,' establishing themes, conventions, and emotional registers that Renaissance poets would imitate."}, {"front": "What is Petrarch's 'Canzoniere' primarily about?", "back": "It's a collection of 366 poems, mostly sonnets, addressed to an idealized, unattainable woman named Laura, exploring themes of love, desire, suffering, and later, mortality."}, {"front": "Name and define two key 'Petrarchan conventions' found in love poetry.", "back": "1. **Blazon:** A catalogue of the beloved's physical perfections. 2. **Oxymoron:** The lover's contradictory emotional states, such as 'I freeze and burn'."}, {"front": "Beyond specific rhetorical devices, what was a defining characteristic of the Petrarchan mistress and the lover's tone?", "back": "The mistress was idealized and unattainable, simultaneously the poet's torment and inspiration. The tone was one of elevated, sustained devotion, treating the beloved as almost divine."}, {"front": "Who were the two key figures responsible for introducing the sonnet to England in the early sixteenth century?", "back": "Sir Thomas Wyatt and Henry Howard, Earl of Surrey."}, {"front": "What was Sir Thomas Wyatt's main role in bringing the sonnet to England?", "back": "Wyatt translated several of Petrarch's sonnets and wrote original sonnets in the Petrarchan style."}, {"front": "What significant formal innovations did Henry Howard, Earl of Surrey, introduce to the English sonnet?", "back": "Surrey adapted the Petrarchan form by abandoning the interlocked octave for looser alternating rhymes (abab cdcd efef gg) and introduced iambic pentameter as the dominant line length."}, {"front": "What was 'Tottel's Miscellany' and why was its publication in 1557 significant?", "back": "Officially 'Songes and Sonettes,' it was a celebrated anthology that posthumously published the works of Wyatt and Surrey, introducing the sonnet to a wide English readership and sparking its vogue."}, {"front": "What characterized the 'Elizabethan Sonnet Craze' of the 1580s and 1590s?", "back": "It was an explosion of sonnet writing in England, with many poets publishing sequences addressed to idealized beloveds, indicating the form's immense popularity."}, {"front": "Which work is credited with triggering the Elizabethan sonnet craze, and why was it a revelation?", "back": "Sir Philip Sidney's 'Astrophil and Stella' (1591). It was a revelation because its sonnets felt psychologically real, using Petrarchan conventions knowingly with irony and self-awareness."}, {"front": "How did Sidney's 'Astrophil and Stella' innovate within the Petrarchan tradition?", "back": "Sidney used and played with Petrarchan conventions from the inside, often with irony and self-awareness, making the speaker's desire more psychologically complex than earlier imitations."}, {"front": "How did Edmund Spenser's 'Amoretti' (1595) diverge from typical Petrarchan conventions?", "back": "Unlike the unrequited or frustrated love central to Petrarchan sequences, Spenser's 'Amoretti' traced a courtship that culminated, unusually, in a happy marriage."}, {"front": "What themes did Samuel Daniel and Michael Drayton contribute to the Elizabethan sonnet sequences?", "back": "Samuel Daniel's 'Delia' brought melancholy grandeur and meditations on time and poetic immortality. Michael Drayton's 'Idea' included powerful individual sonnets, known for their stunning volta."}, {"front": "What distinguished Shakespeare's entry into the sonnet sequence tradition from his contemporaries?", "back": "Shakespeare came to the form later, demonstrating mastery by absorbing and then remaking the tradition from within, rather than merely imitating it."}, {"front": "What was one of Shakespeare's most radical innovations regarding the sonnet's addressed recipient?", "back": "He addressed the first 126 sonnets not to a woman, but to a young man (the 'Fair Youth'), thereby upending the conventional heterosexual dynamic of the Petrarchan sequence."}, {"front": "How did Shakespeare's 'Dark Lady' (Sonnets 127-154) subvert the Petrarchan ideal?", "back": "The Dark Lady was the explicit anti-type: not fair, not unattainable, not worshiped, but dark, physically present, and the object of a desire the speaker described as degrading, diminishing rather than elevating."}, {"front": "How did Shakespeare distinctively use the closing couplet in his sonnets?", "back": "Shakespeare made the couplet a structural weapon, often reversing, undercutting, or paradoxically intensifying what the preceding three quatrains had built, adding complexity and ironic depth."}, {"front": "Who revived the sonnet for serious English poetry after Shakespeare, and what new themes did he introduce?", "back": "John Milton revived the form, expanding its subject matter beyond love lyric into public and devotional territory with sonnets on civic and personal themes like blindness and the English Civil War."}, {"front": "How did the Romantic poets like Wordsworth and Keats engage with Shakespeare's sonnets?", "back": "The Romantics rediscovered Shakespeare's sonnets with enthusiasm. Wordsworth called them a 'key' to Shakespeare's heart, influencing biographical readings, while Keats absorbed their compressed intensity into his own odes."}, {"front": "What was Elizabeth Barrett Browning's significant contribution to the sonnet form?", "back": "In 'Sonnets from the Portuguese' (1850), she brought a powerful feminine subjectivity to the form, exemplified by her famous 'How do I love thee? Let me count the ways.'"}, {"front": "Name two poets from the Victorian or Modern eras who innovated or continued to use the sonnet form.", "back": "Gerard Manley Hopkins (invented 'sprung rhythm' for sonnets) and Rilke (Sonnets to Orpheus). Other examples include Edna St. Vincent Millay, E.E. Cummings, Claude McKay, and Seamus Heaney."}, {"front": "According to the text, what fundamental problem does the sonnet solve that explains its enduring appeal?", "back": "The sonnet solves the problem of how to think carefully about something felt deeply, in a concise space too small for rambling, a perennial human need for structured expression."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
