<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the phrase \"want subject to invent\" mean in Sonnet 38?", "back": "It means to lack material for poetic invention, with \"invent\" referring to the act of finding or discovering subject matter, not creating it anew."}, {"front": "What is the central conceit of Sonnet 38 regarding the Youth?", "back": "The central conceit is that the Youth has replaced the traditional nine Muses, becoming the \"tenth Muse\" and the ultimate, transcendent source of the speaker's poetic inspiration."}, {"front": "How does Sonnet 38 reverse the credit for the poetry's praise?", "back": "The speaker attributes any praise the poetry earns entirely to the Youth, while claiming that only the \"pain\" of composition belongs to the poet."}, {"front": "What does the phrase \"eternal numbers\" signify in Sonnet 38?", "back": "It signifies verse that will outlive its time; poems of immortal quality. \"Numbers\" is an old word for verses or metrical composition."}, {"front": "To which other sonnets does Sonnet 38 connect due to its \"praise-of-the-patron\" mode and theme of immortal verse?", "back": "It connects to the devotional sonnets of Chapter 4, especially Sonnet 18, and further develops the theme of immortal verse in Sonnets 55 and 65."}, {"front": "What philosophical paradox does Sonnet 39 present about praise?", "back": "Sonnet 39 presents the paradox that if the Youth is \"the better part of me,\" the speaker questions how he can praise the Youth without effectively praising himself, due to their deep identification."}, {"front": "What solution does the speaker propose in Sonnet 39 to resolve the paradox of praise?", "back": "The speaker proposes physical separation; by living apart, they become distinct enough for genuine, individual praise to flow from one to the other."}, {"front": "How does Sonnet 39 reimagine the concept of absence?", "back": "Absence, initially seemingly painful, is reimagined as the very condition that makes genuine love and praise possible by creating the necessary distance for the speaker to honor the Youth appropriately."}, {"front": "Explain the meaning of \"the better part of me\" as used in Sonnet 39.", "back": "This phrase refers to the nobler, higher aspect of the speaker. In Platonic thought, it suggests the Youth is the speaker's superior, truer self—a formulation both complimentary and philosophically significant."}, {"front": "According to Sonnet 39, how does separation teach \"how to make one twain\"?", "back": "Separation allows the speaker to praise the absent beloved, making the beloved remain present in the act of writing, thereby creating two distinct entities for the purpose of genuine tribute."}, {"front": "What dramatic emotional shift occurs in Sonnet 40, and what does the speaker address?", "back": "The emotional register shifts sharply, addressing the Youth having taken \"all my loves\" (referring to the woman the speaker loves), which hints at a newly revealed triangular relationship."}, {"front": "What does the line \"it is a greater grief / To bear love's wrong, than hate's known injury\" from Sonnet 40 reveal?", "back": "It reveals the profound pain of betrayal by a loved one, suggesting that cruelty from someone cherished is far more unbearable than injury from a stranger or enemy."}, {"front": "Explain the oxymoron \"lascivious grace\" applied to the Youth in Sonnet 40.", "back": "This oxymoron combines \"lascivious\" (sexually wanton) with \"grace\" (beauty, elegance, divine favor), highlighting the Youth's peculiar power to make even transgression appear beautiful and morally ambiguous."}, {"front": "What is the \"Triangular Relationship\" often interpreted from Sonnets 40-42?", "back": "It suggests a dramatic situation where the Youth has become involved with a woman who was also involved with the speaker, forming a love triangle involving the poet, his beloved male friend, and a woman."}, {"front": "How does Sonnet 40 illustrate the theme of \"helpless, unconditional love\"?", "back": "Through the line \"Kill me with spites yet we must not be foes,\" which expresses the speaker's unwavering commitment to the Youth despite the pain and betrayal inflicted."}, {"front": "What is implied by \"wilful taste\" in Sonnet 40 when referring to the Youth's actions?", "back": "It implies a deliberate, chosen indulgence, suggesting the Youth acted with agency and therefore culpability, rather than being merely a victim of circumstance."}, {"front": "Is the forgiveness offered by the speaker in Sonnet 40 genuine? What evidence supports your reading?", "back": "While the speaker claims forgiveness (\"I do forgive thy robbery\"), the poem enacts a sustained argument about the injury received, culminating in \"a greater grief / To bear love's wrong,\" suggesting the forgiveness is complicated, perhaps more a statement of necessary reconciliation than a true absence of pain."}, {"front": "What do the opening lines of Sonnet 41 suggest about the \"pretty wrongs\" committed by the Youth?", "back": "They suggest that the Youth's physical attractiveness (\"beauty\") and his youth itself make him susceptible to temptation (\"temptation follows where thou art\") and cause him to commit \"pretty wrongs\" when the speaker is absent."}, {"front": "According to Sonnet 41, why is the Youth \"to be won\" and \"to be assail'd\"?", "back": "He is described as \"gentle\" (noble or tender) and \"beauteous,\" making him naturally attractive, desirable, and therefore susceptible to romantic pursuit or temptation."}, {"front": "What is the \"twofold truth\" mentioned in Sonnet 41 that the Youth is forced to break?", "back": "While the full context from the sonnet is cut off, it implies a double betrayal: a truth or fidelity owed to the speaker, and possibly a truth or commitment owed to the woman involved, or even to himself regarding loyalty."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
