<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central theme of submission explored in Sonnet 58?", "back": "Sonnet 58 deepens the posture of extreme submission, depicting the speaker as a 'slave' and 'vassal' to the beloved's will and freedom."}, {"front": "How does Sonnet 58 connect to Sonnet 57, according to the text?", "back": "Sonnet 58 is a companion to Sonnet 57, completing a 'darker diptych' in the sequence and further deepening the theme of submission."}, {"front": "What specific restraint does the speaker impose on himself regarding the beloved's time and pleasures?", "back": "The speaker explicitly states he would not 'control your times of pleasure' or 'demand an account of hours,' even invoking a deity as witness to his submission."}, {"front": "Explain the term 'vassal' as used in Sonnet 58.", "back": "A 'vassal' is a person bound in feudal service to a lord, implying a stronger, more formal legal bond of subjugation than a mere servant."}, {"front": "What does it mean to be 'at your beck' in the context of the sonnet?", "back": "To be 'at your beck' means to be ready to respond instantly to the slightest nod or gesture of command from the beloved, signifying complete readiness to serve."}, {"front": "Unpack the paradox of 'the imprison'd absence of your liberty.'", "back": "This phrase is a compressed paradox: the beloved's absolute freedom ('liberty') is precisely what creates the speaker's confinement and suffering ('imprison'd absence')."}, {"front": "Describe the speaker's state as implied by the phrase 'patience, tame to sufferance.'", "back": "This phrase suggests a patience that has been subdued and broken, reduced from active endurance to mere passive suffering, with its natural resistance eroded."}, {"front": "What is the meaning of 'bide each check' in Sonnet 58?", "back": "To 'bide each check' means to endure every reproof, setback, or rebuff from the beloved without responding, complaint, or resistance."}, {"front": "How is the beloved's freedom described using the term 'charter'?", "back": "The beloved is said to possess a 'charter'—a royal or legal grant of absolute rights and privileges—allowing them to do whatever they wish without consequence."}, {"front": "Explain the concept of 'self-doing crime' as it applies to the beloved in Sonnet 58.", "back": "'Self-doing crime' refers to a wrong committed by the beloved against themselves, for which they are paradoxically granted the right to pardon themselves, emphasizing their absolute autonomy."}, {"front": "What is the speaker's primary role or duty described in the sonnet?", "back": "The speaker's role is to wait, endure, and completely refrain from blaming the beloved, regardless of the beloved's actions."}, {"front": "What is the powerful implication of the phrase 'waiting so be hell' in the couplet?", "back": "'Waiting so be hell' indicates that the speaker's endured patience is agonizing, transforming the act of waiting into an intense form of suffering rather than peaceful submission."}, {"front": "What is the 'turn of the knife' implied by the final phrase 'be it ill or well'?", "back": "The phrase 'be it ill or well' signifies that the speaker is not permitted even to wish for the beloved to behave well; they must accept the beloved's pleasure unconditionally, whether good or bad."}, {"front": "How does Sonnet 58 escalate the emotional intensity compared to Sonnet 57?", "back": "Sonnet 58 escalates from Sonnet 57's ending with the speaker 'playing the fool' to 58's 'waiting as hell,' suggesting the submission is not at peace but barely held, revealing deeper torment."}, {"front": "What is the significance of the legal language ('charter,' 'privilege') used in Sonnet 58?", "back": "This language connects the sonnet to Elizabethan legal culture, where royal charters granted absolute rights, highlighting the beloved's perceived absolute power and freedom."}, {"front": "What is the central irony concerning the beloved's 'charter' in Sonnet 58?", "back": "The irony is that unlike royal charters granting monopolies on commerce, the beloved's 'charter' grants them a monopoly on causing pain and emotional suffering to the speaker without any consequence."}, {"front": "How does the sonnet challenge the idea of balanced reciprocal love?", "back": "The sonnet completely negates reciprocity, establishing an extreme imbalance where the beloved has absolute freedom and the speaker absolute submission, suffering without complaint."}, {"front": "What is the speaker's attitude towards controlling the beloved's actions or demanding accountability?", "back": "The speaker forbids the thought of controlling the beloved's actions or demanding accountability, framing it as an offense to the 'god' who made him a 'slave.'"}, {"front": "In what way does Sonnet 58 present the beloved's 'liberty' as a source of the speaker's suffering?", "back": "The beloved's 'liberty' is directly linked to the speaker's 'imprison'd absence,' indicating that the beloved's freedom of action is the very cause of the speaker's confinement and emotional pain."}, {"front": "How does the speaker vow to react to 'each check' or rebuff from the beloved?", "back": "The speaker vows to 'bide each check' and endure it with 'patience, tame to sufferance,' committing to passive acceptance without accusing the beloved of injury."}, {"front": "What broader theme in Shakespeare's sonnets might this sonnet contribute to, based on its comparison to 49, 88, and 89?", "back": "Sonnet 58 contributes to the theme of tortured self-abnegation and self-condemnation, where the speaker preemptively justifies their own suffering and the beloved's potentially hurtful actions, as seen in Sonnets 49, 88, and 89."}, {"front": "What does the sonnet ultimately reveal about the nature of the speaker's submission?", "back": "It reveals that the speaker's submission is not one of peace or acceptance, but one that is barely held, intensely painful ('waiting so be hell'), and devoid of any hope for reciprocal affection or even a wish for better treatment."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
