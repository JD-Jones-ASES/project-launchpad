<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 13, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does 'forsworn' mean, and what weight did it carry in Elizabethan England?", "back": "'Forsworn' means having broken a solemn oath, being perjured. In Elizabethan England, an oath was sworn before God, making its breach a spiritual failing (sin) as well as a social one."}, {"front": "Define 'bed-vow' as used in Sonnet 152.", "back": "'Bed-vow' refers to the marriage vow, specifically the oath of fidelity made in the context of the marriage bed. The Dark Lady broke this through her adulterous affair."}, {"front": "What is the meaning of 'perjured' and how does its repetition function in Sonnet 152?", "back": "'Perjured' means guilty of perjury, having given false testimony under oath. Its recurrence (three times) in Sonnet 152 builds a powerful self-indictment by the speaker."}, {"front": "In Sonnet 152, how does the speaker's accusation of the Dark Lady's 'two oaths' breach' turn back on him?", "back": "The speaker realizes he cannot accuse her effectively because he has broken 'twenty' oaths himself, making him 'perjur'd most' compared to her 'twice forsworn'."}, {"front": "What specific 'oaths' does the speaker admit to breaking in Sonnet 152 regarding the Dark Lady?", "back": "He swore 'deep oaths of thy deep kindness, / Oaths of thy love, thy truth, thy constancy,' all of which were false, instruments of his self-deception and flattery."}, {"front": "Explain the phrase 'gave eyes to blindness' in Sonnet 152.", "back": "It means the speaker willingly blinded himself, surrendering his capacity for clear sight. He swore against the evidence his eyes presented to maintain the fiction of the mistress's beauty and virtue."}, {"front": "What is the double meaning of 'sworn thee fair' at the end of Sonnet 152?", "back": "It means both declaring the Dark Lady beautiful (despite her actual 'darkness') and swearing an oath about her fairness. This confession reveals his systematic self-deception, contrasting with Sonnets 127 and 130."}, {"front": "Why is Sonnet 152 considered the 'moral nadir' of the Dark Lady sequence?", "back": "It marks the speaker's bitterest self-indictment, where he fully confronts his extensive moral failings and self-deception, realizing he is 'more perjured' than his mistress for calling her fair."}, {"front": "What was the significance of sworn oaths in Elizabethan England, both legally and spiritually?", "back": "Oaths carried genuine legal and spiritual force, sworn before God. Their violation was considered both a crime (punishable by law) and a sin (spiritual transgression), making 'perjury' a grave offense."}, {"front": "Compare the 'legal language' (forsworn, perjured) used in Sonnet 152 with the 'commercial language' (bonds, revenues, rents) found in earlier sonnets like 134 and 142.", "back": "Shakespeare uses legal language to frame love's failures as spiritual and criminal transgressions, while commercial language frames them as debts and obligations. Both emphasize a rigorous, objective 'accounting' of moral failure."}, {"front": "Briefly describe the mythological narrative in Sonnet 153.", "back": "Cupid falls asleep, leaving his torch ('brand') unattended. A maid of Diana plunges it into a fountain, quenching it and turning the fountain into a perpetually hot, healing spring."}, {"front": "What is the significance of the 'seething bath' in Sonnet 153?", "back": "The 'seething bath' is a hot spring, traditionally associated with healing properties for 'strange maladies'. It symbolizes a potential cure for love's fever, but the speaker ultimately finds it ineffective for his condition."}, {"front": "What is the speaker's emotional/physical state when he seeks the 'sovereign cure' in Sonnets 153 and 154?", "back": "He is 'sick withal' or 'diseased', described as a 'sad distemper'd guest', suffering from love's fever, which he hopes the hot spring can alleviate."}, {"front": "Why can the healing bath not cure the speaker's love-sickness in Sonnets 153 and 154?", "back": "The bath's heat originated from Cupid's brand, whose 'new fire' was re-ignited at the mistress's eye. The source of his cure (love's fire) is also the source of his incurable malady (his mistress's eyes)."}, {"front": "What is the 'Anacreontic Source' for Sonnets 153 and 154?", "back": "Sonnets 153 and 154 are adaptations of a late Greek epigram from the Anacreontea, a collection of poems imitating the ancient Greek poet Anacreon. This story was known in Renaissance Europe."}, {"front": "How does Sonnet 154 vary the story from Sonnet 153 in its retelling?", "back": "Instead of one maid, many 'nymphs' are present; 'the fairest votary' takes up the brand; Cupid is referred to as 'the general of hot desire' who is 'disarm'd' by a virgin hand."}, {"front": "Explain the phrase 'my mistress' thrall' in Sonnet 154.", "back": "'Thrall' means a slave or someone held in servitude, entirely subject to another's will. The speaker describes himself as enslaved to his mistress, highlighting his lack of freedom from her influence."}, {"front": "Quote and explain the final aphorism of the entire sonnet sequence from Sonnet 154.", "back": "'Love's fire heats water, water cools not love.' This chiasmic paradox means love has the power to transform its environment (heat water into a hot spring), but no external force or environment can transform or extinguish love itself."}, {"front": "Briefly outline one scholarly interpretation of the significance of the Anacreontic coda (Sonnets 153-154) to the entire sequence.", "back": "One view holds it's a formal bow, a return to impersonal classical myth after the intensity of the Dark Lady sequence. Another sees it as an editorial addition, not authorial design. A third suggests it's the speaker's attempt to universalize his personal, incurable fever."}, {"front": "What is the ultimate conclusion about love's nature presented at the end of the sonnet sequence through Sonnets 153 and 154?", "back": "The sequence concludes that love's 'fever' is intractable and incurable. Love can transform the world around it, but cannot itself be transformed or cooled by external means."}, {"front": "What is the effect of the speaker 'quantifying moral failure' in Sonnet 152 by counting his 'twenty oaths' against the Dark Lady's 'two'?", "back": "This arithmetic gives the accusation the character of an 'auditor's report,' emphasizing a precise moral accounting. It highlights the speaker's overwhelming debt and deepens his self-indictment, showing he is far more culpable than he initially tried to accuse his mistress of being."}, {"front": "What does the speaker's turn from accusing the Dark Lady to self-condemnation in Sonnet 152 suggest about his emotional and moral state?", "back": "This turn inward suggests a profound moment of honest reckoning and self-awareness. He moves beyond strategic generosity (as in the Fair Youth sequence) to a bitter, unsparing moral assessment of his own extensive guilt and self-deception, indicating a nadir of disillusionment."}, {"front": "Who is the 'Love-god' referred to in Sonnets 153 and 154?", "back": "The 'Love-god' is Cupid (Roman) or Eros (Greek), typically depicted as a winged infant armed with a torch and bow and arrows, symbolizing the power to inflame hearts with love."}, {"front": "What does 'votary' mean in the context of Sonnets 153 and 154?", "back": "A 'votary' is a devoted follower, one bound by a vow (often religious or quasi-religious). In these sonnets, the votaries of Diana are virgins sworn to chastity, making their interaction with Cupid's brand significant."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
