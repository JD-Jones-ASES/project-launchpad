<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Sonnet 59, what does 'beguil'd' mean in the context of the brain 'labouring for invention'?", "back": "To be deceived or led astray. The brain strains for original ideas but is tricked into producing what has already been made, often with a humorous implication that humans flatter themselves as original thinkers."}, {"front": "What philosophical question does Sonnet 59 open with, and from which ancient text is it drawn?", "back": "The sonnet opens with the question 'Is there anything new under the sun?', a philosophical provocation drawn from Ecclesiastes (1:9)."}, {"front": "How does Sonnet 59 interpret the poet's labor of praising the youth if 'nothing new' exists?", "back": "It suggests the poet's labor is merely the 'second burthen of a former child,' implying that his praise is a copy of what has already been composed centuries ago."}, {"front": "How does Sonnet 59's couplet ('O! sure I am the wits of former days, / To subjects worse have given admiring praise.') resolve the sonnet's initial philosophical dilemma?", "back": "The couplet delivers a wry, confident verdict: even if ancient wits praised beauty, they worked with inferior material. This declares the youth's beauty incomparable across all recorded time."}, {"front": "Which earlier sonnets, discussed in the connections, share the theme of 'verse as a lasting monument' with Sonnet 59's defiant couplet?", "back": "Sonnets 55 and 65, which also assert the power of the poet's verse to immortalize the beloved beyond the reach of time and destruction."}, {"front": "Describe the central metaphor Sonnet 60 uses to represent the relentless, sequential motion of time.", "back": "The sonnet uses the metaphor 'Like as the waves make towards the pebbled shore,' capturing how each moment simultaneously displaces its predecessor and is itself displaced in a continuous, forward movement."}, {"front": "In Sonnet 60, explain the dual meaning of 'parallels' as an instrument of Time's destruction.", "back": "'Parallels' refers both to lines of latitude and, grimly, to wrinkles on a face. Time 'delves' (digs) these lines into beauty's brow, like a farmer ploughing furrows in a field."}, {"front": "How does Sonnet 60 portray Time's role in a human life, from birth to decay?", "back": "Time is initially a giver ('nativity'), but then becomes a destroyer. It 'confounds' its own gift, annihilating youth and beauty through 'crooked eclipses,' 'transfixing' flourish, 'delving parallels,' and wielding its 'scythe'."}, {"front": "How does Sonnet 60's concluding claim—'my verse shall stand'—relate to Ovid's Metamorphoses?", "back": "It directly answers Ovid's meditation on the immortality of great poetry at the close of the Metamorphoses. Shakespeare picks up Ovid's defiance but makes the claim personal and specific to the poet's verse."}, {"front": "After describing Time's relentless destruction for twelve lines in Sonnet 60, what tone might the couplet's claim ('And yet to times in hope, my verse shall stand.') convey?", "back": "It can be interpreted as defiant, asserting art's power against overwhelming odds; hopeful for the future; or even desperately clinging to the only perceived lasting monument. The tone is often seen as a powerful, confident assertion."}, {"front": "Sonnet 60 is described as a 'central pivot' in the time sequence. What argument does it make in relation to Sonnet 59?", "back": "Sonnet 59 raises the question of whether anything is new; Sonnet 60 answers that time's destruction is eternal, but the poet's verse offers a unique, lasting resistance to it."}, {"front": "What is the emotional arc of Sonnet 61, and what ultimately causes the poet's sleeplessness?", "back": "The sonnet moves from half-hopeful questioning about the beloved's spirit haunting him to self-aware dejection. The poet concludes that his own love, not the beloved's will, keeps him awake as a 'watchman' for the beloved's sake."}, {"front": "What transformation occurs in the poet's self-perception when he calls himself a 'watchman' in Sonnet 61?", "back": "His insomnia transforms from passive suffering into an active, honorable duty. He sees himself as standing guard for love's sake, even as his beloved shows no such reciprocal loyalty."}, {"front": "What stinging revelation concludes Sonnet 61, and what does it imply about the beloved's activities?", "back": "The sonnet concludes: 'For thee watch I, whilst thou dost wake elsewhere, / From me far off, with others all too near.' This implies the beloved is awake and possibly engaged with other lovers, causing the poet jealous suspicion."}, {"front": "Which earlier sonnets, discussed in the connections, share the theme of sleepless longing due to an absent beloved, similar to Sonnet 61?", "back": "Sonnets 27 ('Weary with toil, I haste me to my bed') and 28 ('How can I then return in happy plight') also depict the poet unable to rest because of thoughts of the absent beloved."}, {"front": "What 'sin' does Sonnet 62 introduce, and how does the poet initially describe its effect on him?", "back": "Sonnet 62 introduces the 'Sin of self-love' (narcissism), which possesses 'all mine eye / And all my soul, and all my every part,' leading him to believe no face is as gracious or valuable as his own."}, {"front": "How does the poet's self-perception in the first quatrain of Sonnet 62 contrast with his realization in the third quatrain?", "back": "Initially, he believes himself to be unsurpassed in grace, shape, and worth. However, the mirror ('my glass') in the third quatrain reveals the harsh reality of his aged appearance: 'Beated and chopp’d with tan'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
