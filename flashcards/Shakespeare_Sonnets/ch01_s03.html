    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When were Shakespeare's Sonnets first published?", "back": "They were first published in 1609 by London stationer Thomas Thorpe."}, {"front": "What two main works were included in the 1609 Quarto, 'Shake-speares Sonnets'?", "back": "The volume contained 154 sonnets and a longer poem titled 'A Lover's Complaint'."}, {"front": "What was the immediate reception of the 1609 Quarto of Shakespeare's Sonnets?", "back": "It was not a prestige publication and appeared to sink from view fairly quickly, not being reprinted until 1640."}, {"front": "What is the 'first great controversy' surrounding the publication of Shakespeare's Sonnets?", "back": "Whether Shakespeare authorized the publication or if Thomas Thorpe obtained the manuscript without his blessing."}, {"front": "What arguments suggest Shakespeare authorized the publication of the 1609 Sonnets?", "back": "Scholars point to the careful arrangement, consistent thematic groupings, and evident design of the sequence as indications of the poet's own hand."}, {"front": "What arguments suggest the 1609 Sonnets were published without Shakespeare's authorization?", "back": "Evidence includes the absence of a dedication from Shakespeare himself, no supervised revised edition, and earlier unauthorized publication of two sonnets in an anthology."}, {"front": "Who is 'T.T.' in the dedication of the 1609 Quarto?", "back": "'T.T.' refers to Thomas Thorpe, the stationer who published the collection."}, {"front": "What is the main point of debate regarding 'Mr. W.H.' in the dedication of Shakespeare's Sonnets?", "back": "The crux is the meaning of 'begetter': whether 'Mr. W.H.' inspired the sonnets (the 'Fair Youth') or simply procured the manuscript for Thorpe (a literary middleman)."}, {"front": "Name two persistently advocated candidates for the identity of 'Mr. W.H.' in the Sonnets' dedication.", "back": "Henry Wriothesley, Earl of Southampton, and William Herbert, Earl of Pembroke."}, {"front": "Why is the identity of 'Mr. W.H.' considered less crucial by some scholars despite the debate?", "back": "The sonnets are great poems regardless of identifying their addressee, and biographical speculation can become a distraction from the poetry itself."}, {"front": "Who is the 'Fair Youth' in Shakespeare's Sonnets?", "back": "A beautiful young man, the subject of Sonnets 1-126, whom the poet addresses with intense admiration and affection, urging him to marry and celebrating his beauty."}, {"front": "Which group of Shakespeare's Sonnets primarily addresses the 'Fair Youth'?", "back": "Sonnets 1-126 (with some ambiguous exceptions)."}, {"front": "What evidence supports Henry Wriothesley (Earl of Southampton) as the Fair Youth?", "back": "Shakespeare dedicated other works to him, he was exceptionally beautiful and notoriously resistant to marriage in the 1590s, and his initials reversed (W.H.) align with the dedication."}, {"front": "What evidence supports William Herbert (Earl of Pembroke) as the Fair Youth?", "back": "His initials (W.H.) align directly with the dedication, he was resistant to marriage, and he was a notable patron of literature (the First Folio was dedicated to him)."}, {"front": "Who is the 'Dark Lady' in Shakespeare's Sonnets?", "back": "A woman, the subject of Sonnets 127-152, described as having dark features, desired with obsessive intensity, and depicted as unfaithful, inspiring self-lacerating and sometimes misogynistic poems."}, {"front": "Which group of Shakespeare's Sonnets concerns the 'Dark Lady'?", "back": "Sonnets 127-152."}, {"front": "Name one prominent candidate proposed for the identity of the Dark Lady.", "back": "Emilia Lanier, a poet and mistress of Lord Hunsdon, or Mary Fitton, a maid of honor, or Lucy Morgan, a brothel-keeper."}, {"front": "Why is the identity of the Dark Lady not essential to the power of her sonnet sequence?", "back": "The poems are powerful because they capture with terrifying honesty the experience of a desire one despises in oneself, regardless of identifying the specific person."}, {"front": "Who is the 'Rival Poet' in Shakespeare's Sonnets?", "back": "A competitor for the Fair Youth's patronage and affection, characterized by greater technical facility and a more learned manner, whose success seems to diminish the speaker's confidence."}, {"front": "Which group of Shakespeare's Sonnets references the 'Rival Poet'?", "back": "Roughly Sonnets 78-86."}, {"front": "Who is considered the 'most compelling candidate' for the Rival Poet?", "back": "Christopher Marlowe, Shakespeare's great contemporary rival, known for his high-flown rhetoric and university education."}, {"front": "What is the 'Great Debate' concerning the interpretation of Shakespeare's Sonnets?", "back": "Whether to read them as straight autobiography (a versified diary of Shakespeare's actual emotional life) or as thoroughly conventional literary art."}, {"front": "What argument supports reading the sonnets as autobiography?", "back": "The intensity of the poems and their direct, first-person emotional declarations seem to demand they come from Shakespeare's deep personal experience."}, {"front": "What argument supports reading the sonnets as artistic convention rather than autobiography?", "back": "The sonnet was a conventional literary form governed by established rules (Petrarchan tradition), and other poets like Sidney and Spenser also wrote in elaborate personae."}, {"front": "How does Sonnet 130 demonstrate Shakespeare's self-conscious artistry and subversion of convention?", "back": "It parodies the Petrarchan blazon by explicitly refusing to idealize his mistress's beauty ('My mistress' eyes are nothing like the sun'), only to affirm her rarity in the couplet, highlighting deliberate literary performance."}, {"front": "What is considered the 'most honest reading' of whether the sonnets are autobiography or art?", "back": "They are both: rooted in genuine emotional experience but shaped and transformed by a supremely skilled literary intelligence into something more crafted and enduring than autobiography."}, {"front": "When did Shakespeare's Sonnets begin their ascent to canonical status, after a period of obscurity?", "back": "During the Romantic period, when figures like Wordsworth and Keats began to champion them."}, {"front": "What are the main reasons for the enduring appeal of Shakespeare's Sonnets?", "back": "They directly address universal human questions about love, the fading of beauty, the destruction of time, the power of language, and redemption for betrayal or shame."}, {"front": "How do the Sonnets address universal human questions rather than resolving them?", "back": "They dramatize and enact feeling—with all its contradictions, self-deceptions, moments of transcendence, and descents into bitterness—precisely, rather than providing definitive answers or instructions on how to feel."}, {"front": "By whom was the 1609 Quarto of Shakespeare's Sonnets printed and sold?", "back": "It was printed by George Eld and sold from two booksellers' stalls in St Paul's Churchyard."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
