<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Shakespeare use the sonnet form beyond merely being a container for thoughts?", "back": "It functions as an active instrument of thinking, organizing arguments, testing propositions, and arriving at conclusions that feel both earned and surprising."}, {"front": "What is the basic structural pattern of a Shakespearean sonnet?", "back": "It consists of three quatrains (four-line stanzas) followed by a rhyming couplet (two-line stanza)."}, {"front": "Describe the \"Statement—elaboration—complication\" pattern in Shakespeare's quatrains.", "back": "The first quatrain states the poem's central idea, the second elaborates or extends it, and the third introduces a complication, counterexample, or qualification."}, {"front": "Explain the \"Thesis—antithesis—synthesis\" pattern of quatrain development.", "back": "The first quatrain asserts one position, the second complicates or challenges it, and the third attempts to resolve the tension, with the couplet delivering the resolution or recognizing its impossibility."}, {"front": "What type of quatrain pattern is exemplified by Sonnet 73 ('That time of year thou mayst in me behold')?", "back": "It exemplifies 'Three variations on a single theme,' where each quatrain explores a different metaphor (late autumn, fading dusk, dying fire) for the same central feeling."}, {"front": "What shared logic unites all the different quatrain patterns in Shakespeare's sonnets?", "back": "They all share a logic of accumulation and development, where each quatrain advances the argument or shifts the angle of vision, rather than simply repeating ideas."}, {"front": "What are the key structural characteristics of the closing couplet in a Shakespearean sonnet?", "back": "It consists of lines 13–14 and always rhymes 'gg'. It is often epigrammatic and a moment of maximum compression."}, {"front": "Describe the 'Resolution' function of a Shakespearean couplet.", "back": "The couplet concludes the argument with a definitive statement, providing a sense of finality, as seen in Sonnet XVIII's affirmation of poetry's power."}, {"front": "How does a couplet achieve 'Reversal' in a Shakespearean sonnet?", "back": "It pulls the rug out from under everything that preceded it, reframing the entire poem. Sonnet 130's ending declaration of genuine love after earlier anti-Petrarchan descriptions is an example."}, {"front": "Explain the 'Paradox' function of a Shakespearean couplet.", "back": "The couplet states something that is simultaneously true and self-contradicting, leaving the reader in productive tension (e.g., in Sonnet 98, absence becoming a kind of presence)."}, {"front": "What is 'Ironic undercutting' as a function of the couplet?", "back": "The couplet quietly undermines the speaker's stated position, introducing a note of self-awareness that complicates everything, often requiring careful attention to tone."}, {"front": "Define 'Anaphora' and its effect in Shakespeare's sonnets.", "back": "Anaphora is the repetition of a word or phrase at the beginning of successive lines or clauses, creating emphasis through accumulation (e.g., 'When I consider..., When I behold...' in Sonnet 15)."}, {"front": "How does Shakespeare typically use 'Personification' in his sonnets?", "back": "He gives abstract forces—like Time, Beauty, or Death—agency and presence, making them opponents or entities the speaker can address, challenge, or mourn. Time is a frequent antagonist."}, {"front": "What is 'Apostrophe' and what dramatic effect does it create?", "back": "Apostrophe is a direct address to an absent person, an abstract quality, or an inanimate object. It creates immediacy and dramatic presence, collapsing the distance between poet and subject."}, {"front": "Define 'Antithesis' and explain why it is considered characteristic of Shakespeare.", "back": "Antithesis places contrasting ideas in parallel grammatical structures (e.g., fair/foul, give/take). It's characteristic because it enacts the tensions at the heart of love itself."}, {"front": "Explain the rhetorical devices 'Oxymoron' and 'Synecdoche'.", "back": "Oxymoron combines contradictory terms to capture emotional paradox. Synecdoche uses a part to stand for the whole (e.g., 'eyes' for the beloved, 'pen' for the act of writing)."}, {"front": "Differentiate between 'end-stopped lines' and 'enjambment' in poetry.", "back": "End-stopped lines conclude with a natural pause (often marked by punctuation), creating deliberateness. Enjambment is when a sentence or phrase continues past the end of the line without pause."}, {"front": "What effect do 'end-stopped lines' create, and when might Shakespeare use them?", "back": "They create a sense of deliberateness, of thought advancing in measured steps, and are used in formal statements or authoritative moments, such as the epigrammatic couplet of Sonnet 18."}, {"front": "What is the effect of 'enjambment' in Shakespeare's sonnets, and what does it often mimic?", "back": "It creates momentum and urgency, carrying the reader forward without pause. It often mimics the movement of thought itself—an idea outstripping the line's capacity and spilling over."}, {"front": "What are 'imagery clusters' in Shakespeare's sonnets?", "back": "They are recurrent, interconnected sets of metaphors that appear repeatedly across the sonnets, building meaning through repetition and variation."}, {"front": "Describe the 'Seasons and nature' imagery cluster.", "back": "This cluster uses the natural cycle of growth and decay (spring, summer, autumn, winter) to model human life (youth, maturity, age, death), implying decay is natural and part of a larger rhythm including renewal."}, {"front": "What types of images belong to the 'Time and its instruments' cluster, and what is their purpose?", "back": "Images like clocks, hourglasses, the scythe, and the ploughshare. They serve to make time visible and to dramatize its destructive power against which the poet's art struggles."}, {"front": "Explain the 'Mirrors and reflection' imagery cluster.", "back": "Images of eyes that see, glass that reflects, or water showing an image, clustering around questions of self-knowledge, the gap between self-perception and external appearance, and the transient nature of physical beauty."}, {"front": "What does the 'Accounting and law' imagery cluster convey in Shakespeare's sonnets?", "back": "Drawing on terms like debts, bonds, legacies, and contracts, it gives abstract emotions a concrete, worldly solidity, often framing love as a transaction or contract."}, {"front": "How does Shakespeare utilize the 'Warfare and siege' imagery cluster?", "back": "It brings intensity and high stakes to emotional experience, depicting the lover's heart as a besieged city, beauty as a fortress under attack by time, or desire as an overwhelming army."}, {"front": "In which sonnets is the 'Agriculture' imagery cluster particularly prominent, and what broader connotations does it carry?", "back": "It is prominent in the procreation sonnets (1–17), where having children is a continuation of cultivation. It also carries connotations of care, patience, seasonal expectation, and the relationship between effort and reward."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
