<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 12, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central conceit in Sonnet CXXXII regarding the Dark Lady's eyes?", "back": "The central conceit is that the Dark Lady's dark eyes are a source of unexpected beauty because they 'put on black'—dressed themselves in mourning clothes—and look at the speaker with compassion, as if pitying his suffering."}, {"front": "In Sonnet CXXXII, what does 'ruth' mean?", "back": "Ruth means compassion, pity, or sorrow for the misfortune of another."}, {"front": "How does Shakespeare use astronomical imagery in Sonnet CXXXII to compliment the Dark Lady's eyes?", "back": "He compares them to the morning sun beautifying the grey eastern sky and the evening star adorning the western horizon at dusk, suggesting her eyes hold similar beauty."}, {"front": "What pun does Shakespeare exploit in Sonnet CXXXII regarding the Dark Lady's eyes and the time of day?", "back": "He uses the 'mourning/morning' pun, implying the eyes are both in grief ('mourning') and become her face as beautifully as the 'morning' sun becomes the eastern sky."}, {"front": "What is the speaker's ultimate plea to the Dark Lady's heart in Sonnet CXXXII?", "back": "His plea is that if mourning so becomes her eyes, then her heart should also mourn for him and suit her pity in every part, matching her internal emotion to her external expression."}, {"front": "How does Sonnet CXXXII transform the speaker's suffering?", "back": "Through sheer wit, the poem transforms his suffering from her disdain into an elaborate compliment, suggesting that if she shows pity, beauty itself must be black."}, {"front": "What new painful complication does Sonnet CXXXIII introduce into the Dark Lady sequence?", "back": "It introduces the complication that the mistress has enslaved not only the speaker but also his closest friend (traditionally identified as the Fair Youth)."}, {"front": "In Sonnet CXXXIII, what is the meaning of 'engross'd'?", "back": "Engross'd means taken over entirely or absorbed, often with a legal connotation implying binding possession or writing out a formal, binding document."}, {"front": "What kind of 'legal negotiation' does the speaker propose in Sonnet CXXXIII concerning his friend?", "back": "He proposes that the Dark Lady imprison his heart in her 'steel bosom's ward' (prison cell) but let his friend go free, offering his own heart as 'bail' or surety for his friend's release."}, {"front": "Define 'ward' as used in Sonnet CXXXIII.", "back": "'Ward' refers to a prison cell, but also carries the meaning of guardianship over a person under legal protection."}, {"front": "What is the bitter logic of the couplet in Sonnet CXXXIII?", "back": "The bitter logic is that even if his proposed arrangement held, the speaker is 'pent in thee' (imprisoned within her), meaning she controls everything he contains, including whatever he might offer on his friend's behalf, rendering him helpless."}, {"front": "What overall feeling or state does Sonnet CXXXIII convey?", "back": "It conveys the helplessness of a person whose will has been entirely absorbed by another's."}, {"front": "How does Sonnet CXXXIV continue the themes of Sonnet CXXXIII?", "back": "It directly continues the triangular predicament of the speaker, friend, and Dark Lady, but shifts the metaphor to the language of financial debt and legal bonds."}, {"front": "In Sonnet CXXXIV, what does it mean to be 'mortgag'd to thy will'?", "back": "It means to be pledged as security for a debt, but also to be entirely subjected to her desire, playing on 'will' as desire, a legal will, and possibly the name Will."}, {"front": "What role did the friend play, 'surety-like,' in Sonnet CXXXIV?", "back": "The friend acted as a guarantor, assuming legal responsibility for the speaker's debt to the mistress, signing a bond on his behalf."}, {"front": "To what unsavory figure does the speaker compare the Dark Lady in Sonnet CXXXIV, and why?", "back": "He compares her to a 'usurer,' a moneylender who charges excessive interest, because she ruthlessly exploits both the speaker and his friend for her own gain and pleasure."}, {"front": "Explain the 'statute of thy beauty' in Sonnet CXXXIV.", "back": "It refers to the legal authority her beauty confers, giving her the right, as a creditor, to enforce the full terms of the debt bond or contract, like a legal statute."}, {"front": "What is the 'bleak arithmetic' presented in the couplet of Sonnet CXXXIV?", "back": "The bleak arithmetic is that the friend is lost, the Lady possesses both the speaker and the friend, the friend pays everything, and yet the speaker is still not free."}, {"front": "What other Shakespearean character is echoed by the Dark Lady's role as a 'usurer' in Sonnet CXXXIV?", "back": "Her role as a usurer echoes Shylock from *The Merchant of Venice*, particularly in the ruthless enforcement of a bond."}, {"front": "What is the primary linguistic device that Sonnet CXXXV is built upon, and what are its three meanings?", "back": "It is built upon a triple pun on 'Will': the speaker's own name (William Shakespeare), sexual desire or appetite, and a legal will or testament."}, {"front": "How many times does the word 'Will' or 'will' appear in Sonnet CXXXV?", "back": "The word 'Will' or 'will' appears thirteen times in the fourteen lines of Sonnet CXXXV."}, {"front": "What is the speaker's main argument or plea to the Dark Lady in Sonnet CXXXV, concerning her 'Will'?", "back": "His argument is that since she already has an abundance of 'will' (desire, men named Will), she should graciously accept his 'will' as just one more addition to her store."}, {"front": "How does the speaker use the metaphor of the sea in Sonnet CXXXV to support his plea?", "back": "He argues that just as the sea, already full of water, still receives rain and adds to its store, so the Dark Lady, being rich in 'Will,' should add his 'will' to make her 'large will' even more."}, {"front": "Describe the tone and nature of Sonnet CXXXV.", "back": "The tone is audacious and ribald, presenting a plea from a position of acknowledged disadvantage through elaborate wordplay."}, {"front": "In Sonnet CXXXV, what does the word 'large' imply beyond its literal meaning when describing the Dark Lady's 'will'?", "back": "Beyond 'generous,' it also implies 'broad' or 'coarse,' subtly hinting at her extensive or perhaps indiscriminate sexual appetite."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
