<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary theme of Sonnet 64, often referred to as the 'ruins' sonnet?", "back": "It surveys the evidence of time's destruction in the world and concludes that Time will inevitably take away the poet's love."}, {"front": "What does 'Time's fell hand' signify in Sonnet 64?", "back": "It describes time's power not just as a destructive force, but as cruel, savage, and capable of erasing identity."}, {"front": "List some specific images of time's destruction presented in the first two quatrains of Sonnet 64.", "back": "Lofty towers razed, brass monuments worn away ('eternal slave to mortal rage'), the sea encroaching on the land, and the land reclaiming from the sea."}, {"front": "Explain the 'interchange' described in Sonnet 64 regarding the sea and land.", "back": "The sea gains on the land and the land reclaims from the sea, representing a ceaseless, purposeless exchange and an alternation of states that serves no end except change itself."}, {"front": "What is the 'single devastating conclusion' the poet draws from his survey of time's destruction in Sonnet 64?", "back": "'That Time will come and take my love away.'"}, {"front": "How does the couplet of Sonnet 64 differ from other 'time sonnets' by Shakespeare, particularly regarding poetic triumph?", "back": "Unlike many other time sonnets that offer a poetic triumph (e.g., verse enduring), Sonnet 64's couplet offers no such rescue; it simply 'weeps' and finds no consolation, making it one of the darkest."}, {"front": "What contemporary Elizabethan experience of ruins would have resonated with the imagery in Sonnet 64?", "back": "The dissolution of the monasteries under Henry VIII (1536–1541), which left hundreds of roofless abbeys and priories, representing thriving institutions destroyed within living memory."}, {"front": "Which classical and Anglo-Saxon literary tradition does Sonnet 64 engage with through its lament for what time has swept away?", "back": "The *ubi sunt* ('where are they now?') lament tradition, found in works by Horace, Virgil, and the Anglo-Saxon poem *The Wanderer*."}, {"front": "How does Sonnet 65 directly relate to Sonnet 64?", "back": "Sonnet 65 is a direct sequel, picking up where Sonnet 64 ended—in despair—and asking the same questions about time's destructive power with greater urgency."}, {"front": "How does Sonnet 65 contrast 'beauty' with the forces of time?", "back": "It contrasts the overwhelming force of time (brass, stone, sea, rocks, steel gates) with the extreme fragility of beauty, whose 'action is no stronger than a flower' or 'summer’s honey breath.'"}, {"front": "What does 'wrackful siege of battering days' mean in Sonnet 65?", "back": "It's a powerful compressed image where days become destructive battering-rams, time becomes a siege, and the target is everything beautiful."}, {"front": "What desperate questions does the sestet of Sonnet 65 pose about time's impact on beauty?", "back": "'Where, alack, / Shall Time’s best jewel from Time’s chest lie hid?' 'Or what strong hand can hold his swift foot back?' 'Or who his spoil of beauty can forbid?'"}, {"front": "What is the 'miracle' offered in the couplet of Sonnet 65 as a potential answer to time's destruction?", "back": "'That in black ink my love may still shine bright,' suggesting the preservation of beauty and the beloved through poetry."}, {"front": "Explain the 'paradox of black ink' as described in the context section for Sonnet 65.", "back": "It's the paradox that black ink on paper, a physically modest and fragile artifact (fades, crumbles, burns), is presented as the one thing time cannot overcome, preserving beauty."}, {"front": "How does Shakespeare's claim for poetic immortality in Sonnet 65 ('unless this miracle have might') differ from Horace's *Exegi monumentum* or Sonnet 55's ('this powerful rhyme')?", "back": "Shakespeare uses 'unless,' preserving the terror and doubt of the preceding lines, making his hope more tentative and fragile compared to Horace's triumphalism or Sonnet 55's confidence."}, {"front": "Why is the word 'miracle' so precise and carefully placed in Sonnet 65's couplet?", "back": "It signifies that the survival of beauty in black ink is not a natural process or a logical solution, but an event that defies the rules established by the preceding twelve lines, requiring something beyond natural explanation."}, {"front": "What is the primary emotion expressed by the poet in Sonnet 66?", "back": "Profound world-weariness and a longing for 'restful death.'"}, {"front": "Describe the structural device Shakespeare uses for the first twelve lines of Sonnet 66 to express his grievances.", "back": "A relentless, accumulative list of injustices, often linked by nine successive 'And' clauses, hammering home the poet's profound dissatisfaction with the world's condition."}, {"front": "List three specific injustices the poet complains about in Sonnet 66.", "back": "(Any three from) merit born into beggary, worthlessness dressed in joy, faith broken, honor misplaced, virtue dishonored, strength hobbled by incompetent authority, art silenced, foolishness ruling over skill, truth dismissed, good enslaved to evil."}, {"front": "What is the single, decisive exception that prevents the poet from seeking death, as revealed in the couplet of Sonnet 66?", "back": "'Save that, to die, I leave my love alone.' Love is the only reason he endures a world he finds intolerable."}, {"front": "Sonnet 66 has been compared to Hamlet's soliloquy. What shared characteristic makes this comparison apt?", "back": "Both express a profound weariness with the injustices and corruption of the world, leading to a longing for death, though both ultimately find a compelling reason to continue living (for Hamlet, the fear of the unknown; for the poet, love)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
