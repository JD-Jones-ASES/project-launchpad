<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 10, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the speaker confess to in the opening lines of Sonnet CX?", "back": "The speaker confesses to having wandered ('gone here and there'), made himself 'a motley to the view' (a public fool), 'gor'd' his own thoughts, 'sold cheap what is most dear,' and looked at truth 'askance and strangely.'"}, {"front": "How do the speaker's 'blenches' and 'worse essays' paradoxically affect his perception of the beloved in Sonnet CX?", "back": "These instances of wavering or infidelity ('blenches') and inferior trials ('worse essays') unexpectedly renewed his heart and, by contrast, proved the beloved to be his 'best of love,' confirming the beloved's original value."}, {"front": "What is the significance of the volta at line 13 ('Now all is done') in Sonnet CX?", "back": "The volta signals a genuine resolution, indicating that the speaker's period of wandering is over. He has returned to the beloved, whom he calls 'a god in love,' asking for welcome without needing to prove anything further."}, {"front": "Define 'motley' as used in Sonnet CX and its biographical significance.", "back": "'Motley' refers to a jester's multi-colored costume; a fool. To make oneself 'a motley to the view' means to play the fool publicly, often interpreted as a reference to Shakespeare's own theatrical career and its associated social stigma."}, {"front": "Explain the phrase 'gor'd mine own thoughts' from Sonnet CX.", "back": "'Gor'd' means wounded or stabbed. The metaphor suggests self-inflicted wounds, indicating that the speaker has torn and wounded his own thoughts by straying or acting foolishly."}, {"front": "How does Sonnet CX relate to Sonnet CIX and Sonnets 40-42?", "back": "Sonnet CX, with its full confession of wandering, forms a pair with Sonnet CIX (which offered reassurances of fidelity). Together, they form a complete apology. It also relates to earlier infidelity sonnets (40-42) which processed a different, but related, transgression."}, {"front": "Who does the speaker blame for his 'harmful deeds' and tainted reputation in Sonnet CXI?", "back": "The speaker blames Fortune, the goddess who determines men's social stations and professions, for providing him with 'public means which public manners breeds' – a public life, likely the theatre, that has stigmatized him."}, {"front": "Explain the metaphor of 'the dyer's hand' in Sonnet CXI.", "back": "The metaphor illustrates how one's profession can indelibly mark and corrupt one's nature, just as a dyer's hand is permanently stained by the dyes it works with. The speaker suggests his public life has similarly 'branded' his identity."}, {"front": "What is 'eisel' in Sonnet CXI, and what does the speaker's willingness to drink it signify?", "back": "'Eisel' is vinegar, a bitter liquid used as a remedy or penance. The speaker's willingness to drink it signifies his readiness to undergo drastic, unpleasant measures for self-correction to cure his 'strong infection.'"}, {"front": "How does the couplet of Sonnet CXI transform the speaker's proposed remedy?", "back": "Initially, the speaker proposes harsh remedies like bitter medicine and 'double penance.' However, the couplet reveals that the beloved's pity alone is enough to cure him, shifting the focus from self-punishment to external comfort and validation."}, {"front": "In Sonnet CXII, how does the beloved's love and pity affect the 'vulgar scandal' stamped upon the speaker's brow?", "back": "The beloved's love and pity 'doth the impression fill' and 'o'er-green my bad,' meaning they cover over the public disgrace and restore his reputation as smoothly as fresh green growth covers a wound or scar."}, {"front": "To whose opinion does the speaker declare he is indifferent in Sonnet CXII, and whose opinion matters above all?", "back": "The speaker declares he no longer cares for anyone else's opinion—neither 'critic' nor 'flatterer.' The beloved's judgment is his sole standard; they are his 'all-the-world.'"}, {"front": "Explain the 'adder's sense' image in Sonnet CXII.", "back": "The 'adder's sense' refers to the hearing of a deaf adder (from Psalm 58), which was believed to stop its ears against charmers. The speaker similarly 'stops' his ears to outside voices, making him deaf to the 'vulgar scandal,' critics, and flatterers."}, {"front": "What extreme statement of exclusive devotion concludes Sonnet CXII?", "back": "The sonnet concludes with the intense statement, 'That all the world besides methinks are dead,' signifying a total psychological reorientation where only the beloved truly exists and matters to him."}, {"front": "What unique phenomenon describes the speaker's vision 'Since I left you' in Sonnet CXIII?", "back": "His 'eye is in my mind': while the physical eye still receives images, the mind transforms every object perceived—bird, flower, mountain, crow, dove—into the beloved's face. The physical eye is 'effectually out' or 'untrue.'"}, {"front": "What is the 'beautiful paradox' presented in Sonnet CXIII regarding the speaker's mind and eye?", "back": "The paradox is that the speaker's 'most true mind' (absolute inner fidelity to the beloved) produces an 'untrue' eye (the outer eye that cannot see anything as it really is, transforming all objects into the beloved's image)."}, {"front": "Define 'favour' and 'feature' as used in Sonnet CXIII.", "back": "'Favour' refers to the face or expression. 'Feature' refers to the form, shape, appearance, or the overall lineaments of the face and figure."}, {"front": "How does the conceit of the mind's eye in Sonnet CXIII connect to the broader tradition of love?", "back": "It connects to the long tradition of love as a kind of blindness or a profound transformation of perception, where the lover's imagination overrides objective reality, as seen in works like A Midsummer Night's Dream."}, {"front": "How does Sonnet CXIV directly continue the philosophical inquiry begun in Sonnet CXIII?", "back": "Sonnet CXIV continues the questioning about the nature of the mind's transformation of reality: it asks whether the mind, 'being crown'd with you,' is merely indulging in 'flattery' or if the beloved's love has taught the eye a true 'alchemy' of perception."}, {"front": "What two contrasting possibilities does Sonnet CXIV offer for the mind's influence on perception?", "back": "It questions whether the mind 'Drink[s] up the monarch’s plague, this flattery' (implying self-deception or excessive praise) or if the eye 'saith true, / And that your love taught it this alchemy' (implying a transformative truth or deeper insight)."}, {"front": "What is the 'social anxiety' Shakespeare might have experienced, as suggested by the context for Sonnet CX?", "back": "As an actor and playwright, Shakespeare faced social stigma in Elizabethan England. For a man simultaneously trying to establish himself as a gentleman, the actor's life was a source of genuine social anxiety, conscious of the gap between his artistic ambitions and professional circumstances."}, {"front": "In Sonnet CXII, what might 'psychological dependency' refer to in modern interpretations?", "back": "While the speaker's devotion is presented as intense, modern readers might interpret the declaration that the beloved is his 'all-the-world' and that 'all the world besides methinks are dead' as a sign of extreme psychological dependency."}, {"front": "What is meant by 'alchemy' in the context of Sonnet CXIV?", "back": "'Alchemy' refers to a form of chemistry, suggesting a transformative process. Here, it implies that the beloved's love might have the power to genuinely transform the speaker's vision, allowing his eye to perceive a deeper truth or beauty."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
