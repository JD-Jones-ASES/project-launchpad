<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Sonnet 117, what is the primary rhetorical strategy the speaker employs when inviting the youth to catalogue his failures?", "back": "The speaker uses prolepsis, a classical rhetorical move of inviting accusation before disarming it with a counter-argument."}, {"front": "What does the word 'scanted' imply in Sonnet 117 when the poet says he has 'scanted' the youth?", "back": "It implies a measured shortfall, like underpaying a debt, rather than outright neglect, suggesting he failed to give enough."}, {"front": "Explain the double meaning of 'bonds' in Sonnet 117, as described in the Wordwatch section.", "back": "The word carries both emotional weight (ties of love) and a precise legal sense (a written agreement enforceable in court), activating the sonnet's running legal metaphor."}, {"front": "What does the speaker claim was the true purpose behind his 'wilfulness and errors' at the volta of Sonnet 117?", "back": "He claims all his actions were a deliberate trial to prove the constancy and virtue of the youth's love."}, {"front": "In Sonnet 117, what does the phrase 'level of your frown' metaphorically refer to?", "back": "It's an archery and gunnery term meaning to bring someone within range, to take aim at them with anger or disapproval."}, {"front": "How does Sonnet 117's couplet reframe the speaker's past recklessness?", "back": "The couplet reframes his recklessness as a deliberate experiment, where he 'strove to prove' the bond's constancy, not to betray it."}, {"front": "What is the 'accusation group' of sonnets (117-120) characterized by?", "back": "They form a cluster of apologies and self-justifications, marked by a shared legal vocabulary that turns intimate guilt into a courtroom argument."}, {"front": "How was Shakespeare likely familiar with the extensive legal language found in these sonnets?", "back": "Elizabethan daily life was saturated with courts, and the language of obligation, default, and remedy permeated ordinary speech."}, {"front": "What medical analogy does Sonnet 118 use to explain the speaker's actions?", "back": "It likens his actions to taking bitter purges to sharpen an appetite dulled by good food, or to prevent illness before it strikes."}, {"front": "What are 'eager compounds' in Sonnet 118?", "back": "They are sharp, bitter medicinal preparations, often mixed herbs, used to stimulate the palate or cleanse the body."}, {"front": "In Sonnet 118, what does the speaker mean by being 'sick of welfare' and seeking 'bitter sauces'?", "back": "He means that being sated with the youth's 'ne'er-cloying sweetness' led him to seek out unpleasant company and experiences as a 'preventive medicine'."}, {"front": "What is the ironic conclusion of Sonnet 118 regarding the speaker's 'policy' in love?", "back": "The ironic conclusion is that his 'policy' of preventive medicine (seeking out 'bitter sauces') was itself the disease, proving more poisonous than the condition it was meant to treat."}, {"front": "What did the word 'policy' often imply in Shakespeare's era, as seen in Sonnet 118?", "back": "It often carried a slightly sinister flavor, suggesting worldly cunning, calculated strategy, or even Machiavellian manipulation rather than mere prudence."}, {"front": "What are 'Siren tears' a metaphor for in Sonnet 119?", "back": "They are a metaphor for deceptive, enchanting weeping, representing the treacherous seduction that lures the speaker into a destructive attachment, much like the Sirens of classical myth."}, {"front": "In Sonnet 119, what does the image of 'limbecks foul within' suggest about the origin of these 'Siren tears'?", "back": "It suggests something vile or corrupt being refined or distilled into its essence, implying the Siren's corrupt inner nature is distilled into her deceptive tears."}, {"front": "What does the phrase 'eyes out of their spheres' signify in Sonnet 119?", "back": "Referring to Ptolemaic cosmology, it signifies eyes so overcome with astonishment or madness that they have, metaphorically, been jolted from their proper orbits."}, {"front": "Explain the paradox presented by the phrase 'O benefit of ill!' in Sonnet 119.", "back": "It recognizes that suffering inflicted by a destructive infatuation, by purging illusion, ultimately strengthens and improves true love."}, {"front": "According to Sonnet 119, how does 'ruin'd love, when it is built anew,' compare to its original state?", "back": "It 'Grows fairer than at first, more strong, far greater,' suggesting growth through adversity."}, {"front": "What surprising conclusion does the speaker reach about the youth's past unkindness in Sonnet 120?", "back": "He concludes that the youth's past unkindness 'befriends him now' because it taught him what it feels like to be wounded, though he failed to apply this knowledge quickly enough when roles reversed."}, {"front": "How does the couplet of Sonnet 120 resolve the 'mutual accounting' of guilt and pardon?", "back": "It resolves that each party's 'trespass now becomes a fee,' making one's fault the 'ransom' for the other's, thus canceling debts and restoring equilibrium."}, {"front": "In Sonnet 120, what does 'ransom' represent in the context of the relationship between the speaker and the youth?", "back": "It represents a sum paid for release, where each lover's transgression or suffering serves to free the other from their own guilt or captivity, balancing the scales of their bond."}, {"front": "Which earlier sonnets does the rhetorical device of inviting accusation in Sonnet 117 echo?", "back": "It echoes Sonnet 49, where the poet imagines the youth justifying desertion, and Sonnet 88, where he volunteers to argue against himself."}, {"front": "How does Sonnet 118's logic (that an excess of good can drive one to seek out bad) relate to the 'procreation sonnets' (1-17)?", "back": "It is a darkly comic inversion of the procreation sonnets' temperance arguments, where beauty hoarded (rather than shared) was itself considered a kind of sickness."}, {"front": "To which later sonnet, especially from the Dark Lady sequence, does Sonnet 118's self-condemnation ('Drugs poison him...') anticipate?", "back": "It anticipates the frank self-disgust of Sonnet 129, where lust is described as a poison."}, {"front": "The Siren figure in Sonnet 119 recalls which later Dark Lady sonnets?", "back": "It recalls Sonnets 133 and 137, which feature destructive female enchantresses and themes of entrapment ('prison'd will', 'bay where all men ride')."}, {"front": "How does the legal framing of guilt and pardon in Sonnet 117 anticipate Sonnet 120?", "back": "It anticipates the 'exchange-economy of reconciliation' in Sonnet 120, where concepts like trespass and ransom are explicitly balanced against each other."}, {"front": "What does the speaker's appeal in Sonnet 117 mean when he says it 'says I did strive to prove The constancy and virtue of your love'?", "back": "It means his formal defense is not an excuse but a declaration that his actions were a test or demonstration, aiming to affirm the strength and goodness of the youth's love, rather than betray it."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
