<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does 'increase' signify in Sonnet I, beyond just progeny?", "back": "It signifies offspring or progeny, but also the broader principle of natural multiplication, carrying the weight of nature's imperative that plants, animals, and humans were expected to increase."}, {"front": "What is the central accusation made against the Fair Youth in Sonnet I?", "back": "He is beautiful but squanders that beauty on himself alone, like a miser hoarding treasure, failing to reproduce and pass it on, thereby destroying it."}, {"front": "Where does the volta (turn) occur in Sonnet I, and how does the accusation change?", "back": "The volta occurs at line 9. The accusation sharpens from the Youth being merely foolish to being actively cruel—to himself and the world that delights in him."}, {"front": "How does Sonnet I use the image of a 'glutton' to describe the Youth's self-love?", "back": "He is described as a 'glutton' who consumes what belongs to others, burying beauty in the grave rather than entrusting it to a child, using the language of appetite and consumption to highlight his selfishness."}, {"front": "In Sonnet I, what are the two meanings of 'contracted' as applied to the Youth?", "back": "It means both 'betrothed' (contracted to be married) and 'narrowed' or 'shrunk,' implying he is wed only to his own reflection and has drawn himself small or turned inward."}, {"front": "How does Shakespeare's Sonnet I invert conventional sonnet sequence openings?", "back": "Instead of a lovelorn poet addressing an indifferent beloved (as in Petrarchan convention), it features a counsellor addressing a self-indulgent youth, signaling a departure from traditional adoration."}, {"front": "How does the 'beauty's rose' imagery from Sonnet I connect to other sonnets in the sequence?", "back": "It echoes throughout the sequence, returning explicitly in Sonnets 35 and 54, and serving as an emblem of transient beauty that underlies much of the Fair Youth material."}, {"front": "What future scenario does Sonnet II ask the Youth to imagine, and what would be the consequence of his current actions?", "back": "He is asked to imagine himself at old age ('forty winters') where, if asked where his beauty has gone, he can only point to his own sunken eyes, which would result in an 'all-eating shame' and 'thriftless praise.'"}, {"front": "How does Sonnet II use the metaphor of 'livery' to describe the Youth's beauty?", "back": "His youthful appearance is compared to a 'proud livery' (a fine uniform or garment) that he wears now but which will become a 'tatter’d weed' (a worn-out garment) in old age, emphasizing beauty as something transiently worn rather than absolutely possessed."}, {"front": "In Sonnet II, what does 'sum my count' mean in the context of the Youth's life?", "back": "It means to settle a financial account or provide the final balance. The child is presented as the Youth's answer when asked to account for his life—the 'profit' on the 'investment' of his beauty."}, {"front": "What is the 'positive vision' offered in Sonnet II as an alternative to the 'all-eating shame' of a wasted life?", "back": "The positive vision is to point to a beautiful child and say, 'This fair child of mine / Shall sum my count, and make my old excuse,' proving the parent's beauty by succession."}, {"front": "What ultimate benefit of procreation is described in the closing couplet of Sonnet II?", "back": "Procreation is presented as a kind of resurrection or renewal: to be 'new made' and to 'see thy blood warm when thou feel’st it cold' in a child, even at the moment of greatest vulnerability in old age."}, {"front": "What military metaphor is introduced in Sonnet II and sustained in later sonnets?", "back": "The line 'When forty winters shall besiege thy brow' introduces the military metaphor of time as an attacker, which runs through Sonnets 63 and 65."}, {"front": "How does Sonnet III use the device of a 'mirror' ('glass') to advance the procreation argument?", "back": "The speaker tells the Youth to look at his own face in a literal mirror, recognizing it as something that should be reproduced, and also states the Youth is his mother's metaphorical 'glass,' reflecting her own youth back to her."}, {"front": "What two accusations follow if the Youth remains single, according to Sonnet III?", "back": "By staying single, the Youth cheats the world of a beautiful person and 'unbless[es] some mother,' meaning he leaves a woman childless who would have been glad to bear his child."}, {"front": "What is meant by 'fresh repair' in Sonnet III?", "back": "It refers to renewal, restoration, or good condition. It specifically means the Youth's beauty should be renewed or maintained through offspring."}, {"front": "What is the blunt logical consequence delivered in the closing couplet of Sonnet III?", "back": "'But if thou live, remember’d not to be, / Die single and thine image dies with thee,' meaning if he dies without offspring, his unique image and legacy will vanish completely."}, {"front": "What is the underlying assumption about beauty and social duty in Sonnet I's moral framing of obligation?", "back": "The assumption is that beauty is not personal property but a gift from nature that carries an obligation to be reproduced and passed on for the world's benefit, rather than being selfishly hoarded and destroyed."}, {"front": "In Sonnet III, what does 'tillage of thy husbandry' refer to?", "back": "It literally means the cultivation of land by plowing, but metaphorically, it refers to the act of procreation and the management of a household or marriage."}, {"front": "What classical precedent is often cited for the procreation argument found in Shakespeare's early sonnets?", "back": "Erasmus's *Encomium matrimonii* ('In Praise of Marriage,' c. 1498), which urged young men of good family to marry and procreate rather than remain celibate."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
