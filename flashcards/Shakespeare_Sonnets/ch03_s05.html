    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 3, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What \"mightier way\" does the speaker urge the Youth to take against Time in Sonnet XVI?", "back": "Procreation, specifically having children, which he views as a more potent means of immortality than his verse."}, {"front": "How does the speaker initially characterize his own poetry in Sonnet XVI compared to procreation?", "back": "He calls his own poetry \"barren rhyme,\" suggesting it is less powerful and effective than biological means of perpetuating life through children."}, {"front": "In Sonnet XVI, what does the phrase \"maiden gardens, yet unset\" metaphorically refer to?", "back": "It refers to young women's bodies, figured as gardens of potential life waiting to be 'planted' or impregnated."}, {"front": "According to Sonnet XVI, why are children (\"living flowers\") initially presented as superior to a \"painted counterfeit\"?", "back": "Children are actual, living perpetuations of the Youth, possessing life, whereas a \"painted counterfeit\" (a portrait or poem) is merely an inanimate imitation without life."}, {"front": "Explain the double meaning of \"lines of life\" in Sonnet XVI.", "back": "It refers both to lines of verse (poetry) and the line of descent (genealogy). The child carries the Youth's 'lines' genetically, and the poem carries them literarily, both 'repairing' the original life."}, {"front": "What is the \"elegant paradox\" presented in the couplet of Sonnet XVI?", "back": "The paradox is: 'To give away yourself, keeps yourself still.' It means that by spending oneself in having children, one does not diminish but perpetuates oneself."}, {"front": "What rhetorical purpose does the speaker's self-deprecation of his \"barren rhyme\" serve in Sonnet XVI?", "back": "It sets up the argument in Sonnet XVII, where the speaker extends the idea that even good poetry, if accurately describing the Youth's beauty, might be dismissed as exaggeration."}, {"front": "What central problem does Sonnet XVII address regarding the speaker's verse?", "back": "It stages a crisis of poetic credibility: if the speaker were to accurately describe the Youth's beauty, future readers would disbelieve him, considering it exaggeration or flattery."}, {"front": "In Sonnet XVII, what does \"deserts\" mean when the speaker refers to the Youth's \"most high deserts\"?", "back": "\"Deserts\" means merits or what one deserves by right, referring to the Youth's beauty, virtue, and excellence."}, {"front": "According to Sonnet XVII, what would future ages say if the poet accurately described the Youth's beauty?", "back": "They would say 'This poet lies' and that 'heavenly touches ne'er touch'd earthly faces,' dismissing the praise as a poet's exaggeration."}, {"front": "How is a poet's \"rage\" used dismissively in Sonnet XVII?", "back": "It refers to poetic frenzy or inspiration, but here it's used to suggest future ages would dismiss the praise of the Youth's beauty as mere enthusiasm, not sober truth."}, {"front": "What is implied by the phrase \"stretched metre of an antique song\" in Sonnet XVII?", "back": "\"Stretched metre\" implies exaggerated, overwrought verse, possibly a quiet self-criticism of the poet's own work. \"Antique song\" suggests old-fashioned, less reliable poetry."}, {"front": "How does Sonnet XVII resolve the perceived rivalry between procreation and poetry for achieving immortality?", "back": "It resolves them as partners: a child's living beauty would confirm the poem's truth in the future, allowing the Youth to 'live twice' – in the child and in the rhyme."}, {"front": "What was a \"genuine Renaissance concern\" reflected in Sonnet XVII regarding poetic credibility?", "back": "The complaint that extravagant praise sounds incredible, leading accurate"}, {"front": "Which later Sonnet's conclusion is directly anticipated by Sonnet XVII's couplet ('You should live twice,—in it, and in my rhyme')?", "back": "Sonnet 18's conclusion: 'So long as men can breathe, or eyes can see, / So long lives this, and this gives life to thee'."}, {"front": "Why is Sonnet 17 described as \"the hinge on which they turn from rivals to partners\"?", "back": "It's the point where the arguments for immortality through children and through poetry, initially presented as competing 'mightier ways,' become complementary strategies for the Youth's survival."}, {"front": "What earlier Sonnet's imagery is recalled by the \"maiden gardens\" metaphor in Sonnet XVI?", "back": "Sonnet 3's 'unear'd womb,' both using agricultural/horticultural metaphors for unplanted fertility."}, {"front": "How does Shakespeare treat the Petrarchan commonplace of incredible praise in Sonnet XVII?", "back": "He treats it with unusual seriousness and uses it as an argument for procreation rather than just a conceit about the limits of language."}, {"front": "What is the difference between \"living flowers\" (children) and a \"painted counterfeit\" (portrait/poem) as initially presented in Sonnet XVI regarding posterity?", "back": "\"Living flowers\" are actual, breathing perpetuations of life, while a \"painted counterfeit\" is an inanimate imitation that only resembles the original without possessing its vitality."}, {"front": "Why does the speaker call his own poetry \"barren rhyme\" in Sonnet XVI?", "back": "It's a rhetorical strategy to highlight the supposed superiority of procreation as a 'mightier way' to fight Time, setting up the paradox and the later partnership with verse."}, {"front": "How would the existence of a child confirm the truth of the poem's praise in Sonnet XVII?", "back": "The child's living beauty in the future would provide tangible, undeniable evidence that the poet's"}, {"front": "To what literary tradition does the concern about extravagant praise belong, as noted in the text for Sonnet XVII?", "back": "The Petrarchan tradition, where the beloved is often described so perfectly that accurate"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
