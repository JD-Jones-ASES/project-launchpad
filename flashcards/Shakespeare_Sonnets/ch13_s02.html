<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 13, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central argument the speaker makes in Sonnet 142 against the Dark Lady's moral condemnation?", "back": "The speaker argues that his love is sinful, but so is hers, implying she has forfeited the right to judge him due to her own hypocrisy and transgressions."}, {"front": "Explain the legal metaphor used in the couplet of Sonnet 142.", "back": "The couplet suggests that if the Dark Lady denies the speaker pity, she sets a precedent by which she herself may be denied the pity she demands from others ('By self-example mayst thou be denied!')."}, {"front": "What does the phrase 'scarlet ornaments' refer to in Sonnet 142, and what is its dual connotation?", "back": "It refers to the Dark Lady's red lips. 'Scarlet' also connotes sin and prostitution in Elizabethan usage, referencing the 'scarlet woman' of Revelation."}, {"front": "Define 'Tu Quoque' and explain its application in Sonnet 142.", "back": "'Tu Quoque' (Latin for 'you also') is a rhetorical counter-charge of equal guilt. The speaker uses it not to claim innocence, but to disqualify the Dark Lady as a judge due to her own hypocrisy."}, {"front": "What does 'seal'd false bonds' signify in Sonnet 142?", "back": "It signifies the execution of fraudulent contracts. In the sonnet, it metaphorically turns love-vows into broken, binding legal agreements."}, {"front": "Describe the central conceit or metaphor used in Sonnet 143.", "back": "The speaker casts himself as a neglected infant crying for attention, while the Dark Lady is depicted as a busy housewife who has put her baby down to chase a wayward 'feather'd creature' (another man)."}, {"front": "How does Sonnet 143's conceit impact the speaker's portrayal of himself?", "back": "The speaker portrays himself in a deliberately comic and undignified manner, diminishing his role to that of a helpless, wailing child trailing behind the Dark Lady."}, {"front": "Explain the multiple puns on the word 'Will' in Sonnet 143.", "back": "'Will' can refer to desire or lust, the name William (Shakespeare's own first name), and possibly a proper noun referring to a specific rival."}, {"front": "What 'bargain' does the speaker propose to the Dark Lady in Sonnet 143?", "back": "He promises that if she catches her quarry (her 'hope') and turns back to him with kindness, he will pray that her pursuit of 'Will' (her desire or the rival) succeeds."}, {"front": "Who are the 'two loves' or 'two spirits' described in Sonnet 144?", "back": "The 'better angel' is the Fair Youth, offering comfort. The 'worser spirit' is the Dark Lady, threatening despair."}, {"front": "What is the central drama of Sonnet 144, beyond the speaker's own inner conflict?", "back": "The central drama is the speaker's mounting suspicion that the Dark Lady is seducing the Fair Youth, drawing his 'good angel' away from him and into her own corrupting influence."}, {"front": "Explain the double meaning of 'colour'd ill' as applied to the Dark Lady in Sonnet 144.", "back": "It refers to her dark complexion, but also signifies that she is morally tainted or evil in character, combining physical and moral darkness."}, {"front": "How does Sonnet 144 use the Elizabethan slang term 'hell'?", "back": "'Hell' simultaneously carries its theological meaning of damnation and an Elizabethan slang sense referring to the female body."}, {"front": "What is the 'Good and Bad Angel Tradition' and how does it relate to Sonnet 144?", "back": "It's an image from Elizabethan morality plays (like Marlowe's *Doctor Faustus*) where good and bad angels contend for a human soul. The speaker casts the Fair Youth and Dark Lady in these roles, elevating his personal drama."}, {"front": "What effect does the ending of Sonnet 144 have, regarding the speaker's knowledge?", "back": "The sonnet ends in suspension and uncertainty; the speaker 'shall I ne'er know, but live in doubt' whether his good angel has been corrupted by the bad."}, {"front": "How does Sonnet 144 function as a 'hinge' sonnet within the collection?", "back": "It explicitly brings together the Fair Youth (subject of sonnets 1-126) and the Dark Lady (subject of sonnets 127 onwards) for the only time, making their relationship to each other explicit."}, {"front": "What makes Sonnet 145 structurally different from most other sonnets in the collection?", "back": "It is written in iambic tetrameter (eight syllables per line) rather than the usual iambic pentameter (ten syllables), giving it a lighter, more song-like quality."}, {"front": "How is the speaker's 'woeful state' reversed in Sonnet 145?", "back": "The woman's initial words 'I hate' are altered by an appended 'not you', transforming near-rejection into an expression of mercy and saving the speaker's life (or emotional state)."}, {"front": "Explain the pun embedded in the couplet of Sonnet 145.", "back": "The phrase 'hate away,' when heard aloud, sounds unmistakably like 'Hathaway,' Shakespeare's wife's surname, suggesting it may be an earlier composition for her."}, {"front": "What does 'doom' signify in Sonnet 145?", "back": "It refers to a judgment or sentence, but in Elizabethan English, it could also mean death or ultimate fate."}, {"front": "Across these sonnets (142-146), what recurring theme or device is evident in the speaker's relationship with the Dark Lady?", "back": "A recurring theme is moral judgment and hypocrisy, often involving the speaker turning the tables on the Dark Lady's accusations. Linguistic play, especially puns and metaphors, is also a prominent device."}, {"front": "How do these sonnets reflect the chapter title 'The Dark Lady: Reckoning'?", "back": "They demonstrate a 'reckoning' through moral equivalence, challenging the Dark Lady's right to judge, and exploring the consequences of their intertwined, often transgressive, relationships."}, {"front": "Give an example of how a mundane domestic image is used to deflate a romantic register in these sonnets.", "back": "In Sonnet 143, the image of a 'careful housewife' chasing a 'feather'd creature broke away' (a chicken) while her 'neglected child' cries is a mundane domestic image that makes the speaker's romantic longing seem undignified and even comic."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
