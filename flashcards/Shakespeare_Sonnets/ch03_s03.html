<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the word \"vial\" metaphorically represent in Sonnet VI?", "back": "It is a metaphor for the womb, acting as a vessel for new life and preserving beauty's distilled essence."}, {"front": "How does Sonnet VI redefine \"usury\" in the context of procreation?", "back": "It argues that lending beauty to produce more beauty (through children) is not exploitative lending, but a beneficial transaction that makes all parties happy."}, {"front": "What is the core instruction given to the Youth in Sonnet VI's opening lines?", "back": "To act on the distillation argument: \"let not winter's ragged hand deface, / In thee thy summer, ere thou be distill'd.\""}, {"front": "According to Sonnet VI, what is the grim alternative to reproduction for the Youth?", "back": "To be death's conquest, making worms the beneficiaries of his beauty's estate."}, {"front": "What does Sonnet VII use as its central extended metaphor to persuade the Youth?", "back": "The sun's daily journey from dawn (youth) to dusk (old age), symbolizing the rise and decline of beauty and the world's attention."}, {"front": "In Sonnet VII, what is the significance of the sun's 'pilgrimage'?", "back": "It figures the sun's daily arc as a sacred journey, lending the Youth's beauty a quasi-religious significance in its ascent."}, {"front": "How does Sonnet VII apply the sun metaphor to the Youth's future?", "back": "It warns that once the Youth passes his 'noon,' he will be 'unlook'd on' (ignored) unless he has produced a son to maintain the world's attention."}, {"front": "What poetic device is at play when Sonnet VII describes the setting sun as it 'reeleth'?", "back": "Personification and vivid verb choice, which captures the sun's apparent loss of control and enacts the metaphor of vigorous youth giving way to feeble age."}, {"front": "What is the primary puzzle the speaker poses to the Youth at the beginning of Sonnet VIII?", "back": "Why the Youth, who is himself like music to hear, listens to music sadly."}, {"front": "Explain the double meaning of 'singleness' as a pun in Sonnet VIII.", "back": "It refers both to the state of being unmarried and to a single musical note sounding alone, rather than in a harmonious chord."}, {"front": "How does Sonnet VIII use the metaphor of musical harmony to advocate for procreation?", "back": "It compares the harmonious 'unions' of well-tuned sounds (like a husband and wife) that produce a beautiful whole to the creation of a child, which is more than the sum of its parts."}, {"front": "What is the blunt message conveyed by the 'speechless song' in Sonnet VIII's couplet?", "back": "'Thou single wilt prove none' – meaning the man who remains alone (unmarried, childless) will amount to nothing or cease to exist in posterity."}, {"front": "How does Sonnet IX challenge the Youth's potential excuse for not marrying (fearing a widow's grief)?", "back": "It argues that if he dies childless, the world itself will be his widow, and unlike a private widow, it will have no children to keep his image alive."}, {"front": "What is the meaning and legal connotation of 'issueless' in Sonnet IX?", "back": "It means without children or offspring. The legal term 'issue' makes dying childless sound like dying without a properly executed will or heir."}, {"front": "According to Sonnet IX, what is the crucial difference between the waste of ordinary wealth and the waste of beauty?", "back": "Ordinary wealth wasted by an 'unthrift' merely shifts to others and the world still enjoys it, but beauty wasted is beauty permanently destroyed because it is not reproduced."}, {"front": "What severe accusation does the speaker make against the Youth in Sonnet IX's couplet?", "back": "That refusing to have children out of misplaced self-restraint is not virtue but 'murd'rous shame'—a form of violence against the self and the world."}, {"front": "What is the most direct accusation the speaker levels against the Youth in Sonnet X?", "back": "That he loves no one, despite being beloved by many, because he is 'possess'd with murderous hate' against himself through his refusal to reproduce."}, {"front": "What does 'unprovident' signify in Sonnet X?", "back": "Lacking forethought; not making provision for the future, particularly regarding heirs and the continuation of his lineage."}, {"front": "How does Sonnet X shift its argument in the couplet, introducing a new emotional appeal?", "back": "It becomes explicitly personal, asking the Youth to 'Make thee another self for love of me,' framing procreation as an act of love for the speaker, not merely a duty."}, {"front": "Identify two distinct types of imagery or metaphors frequently employed across Sonnets 6-10 to persuade the Youth.", "back": "Financial/economic imagery (usury, waste, unprovident), nature/seasonal imagery (winter, summer, sun's journey), and musical harmony imagery."}, {"front": "What is the overarching theme that unifies Sonnets 6-10?", "back": "The urgent imperative for the Youth to procreate, to preserve his beauty, overcome mortality, and ensure his legacy through posterity."}, {"front": "How does Sonnet VI's couplet deliver its message with particular directness?", "back": "It uses plain language to issue a stark warning: 'Be not self-will'd, for thou art much too fair / To be death's conquest and make worms thine heir.'"}, {"front": "What key concept is central to the speaker's argument in Sonnets 6-10 regarding the Youth's legacy?", "back": "Posterity, referring to future generations or descendants, which is presented as the only way for the Youth's beauty to endure beyond his own lifespan."}, {"front": "How do Sonnets 6 and 9 both utilize financial metaphors but with different points?", "back": "Sonnet 6 redefines 'usury' as beneficial lending (of beauty); Sonnet 9 contrasts the 'waste' of circulating ordinary wealth with the irreversible 'waste' of beauty if not reproduced."}, {"front": "What is the primary purpose of the speaker's passionate arguments in Sonnets 6-10?", "back": "To convince the Youth to marry and have children, thereby ensuring his extraordinary beauty and presence live on beyond his own mortality."}, {"front": "In what way does the 'connections' section link Sonnet VII to Sonnet 33 and Sonnet 73?", "back": "It highlights the recurring motif of the sun as an image of beauty at its height and in decline (Sonnet 33) and the world withdrawing its gaze from the ageing (Sonnet 73)."}, {"front": "Describe the general progression of the speaker's tone towards the Youth from Sonnet VI to Sonnet X.", "back": "It evolves from direct instruction and playful persuasion (VI) to metaphorical reasoning (VII, VIII), then to stark warnings of 'murd'rous shame' (IX), and finally to direct accusation and a personal, tender appeal (X)."}, {"front": "What central conflict or stubbornness of the Youth does the speaker consistently address in these sonnets?", "back": "The Youth's reluctance or refusal to procreate, which the speaker interprets as self-will, self-destruction, and a failure of duty and love."}, {"front": "In Sonnet VIII, what is meant by the Youth 'confounding in singleness the parts that thou shouldst bear'?", "back": "The Youth, by remaining single, is ruining or failing to fulfill the roles (parts) he should combine (as husband and father), just as a single note fails to create harmony."}, {"front": "What does Sonnet X suggest is the real reason for the Youth's 'unprovident' behavior regarding his beauty?", "back": "It attributes his refusal to reproduce to a 'murderous hate' against himself, viewing it as an act of self-destruction that seeks to 'ruinate' his own beauteous 'roof'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
