    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 12, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Shakespeare introduce the Dark Lady in contrast to the Fair Youth?", "back": "The Fair Youth was praised as an ideal, celebrated for beauty, while the Dark Lady is introduced through negation, obsession, and a frank reckoning with desire that has no comfortable precedent in the sonnet tradition."}, {"front": "What was the 'Elizabethan equation of beauty,' and how does Shakespeare's portrayal of the Dark Lady challenge it?", "back": "The Elizabethan equation of beauty linked beauty with 'fairness' (light complexion). Shakespeare challenges this by portraying the Dark Lady with dark features and arguing that her natural darkness is more honest than artificial 'fairing.'"}, {"front": "What is the central argument Shakespeare makes in Sonnet 127 regarding beauty and his mistress's darkness?", "back": "In Sonnet 127, Shakespeare argues that artificial 'fairing' has debased the currency of conventional beauty, making his mistress's natural darkness more honest and authentic than the painted faces around her."}, {"front": "What are the three key themes established early in the Dark Lady sonnet sequence?", "back": "The key themes are authenticity, obsession, and the disturbing gap between what the mind knows and what the body craves."}, {"front": "Who is considered a compelling candidate for the Dark Lady's identity, and what are her key attributes?", "back": "Emilia Lanier is a compelling candidate: a musician of Italian origin with dark coloring, connected to the court, and the first professional woman poet in English."}, {"front": "Why is Mary Fitton generally considered an unlikely candidate for the Dark Lady, despite past popularity?", "back": "Mary Fitton is unlikely because portraits show her to be fair, contradicting the 'dark'"}, {"front": "What is the honest scholarly position regarding the identity of the Dark Lady?", "back": "The identity is considered irresolvable; the sonnets don't name her, and no document definitively connects a woman to them. She could be a real person, a composite, or a fully fictional construction."}, {"front": "How does the relationship depicted in the Dark Lady sonnets contrast with the 'idealized love' of the Fair Youth sequence?", "back": "The Dark Lady sequence describes a relationship far from idealized love, where the speaker sees the mistress's faults (lies, inconstancy, moral darkness) with clarity, yet confesses himself enslaved by desire."}, {"front": "What is Sonnet 129 primarily about, and what is its key insight regarding desire?", "back": "Sonnet 129 is described as a clinical dissection of lust—shame before, bliss during, self-loathing after. Its key insight is that understanding this process does nothing to prevent it."}, {"front": "For what literary device or concept is Sonnet 130 famous, and what is its ultimate message about love?", "back": "Sonnet 130 is famous as an 'anti-blazon,' which deflates conventional Petrarchan comparisons of beauty. However, in its final two lines, it affirms genuine love despite (or because of) the mistress's imperfections."}, {"front": "What 'dark wisdom' is conveyed in Sonnet 138 concerning honesty and relationships?", "back": "Sonnet 138 conveys the dark wisdom that two people can knowingly lie to each other, tacitly agreeing to sustain the fiction because honesty would destroy what little comfort remains in their relationship."}, {"front": "What is a defining characteristic of the Dark Lady sonnets, making them particularly significant in English literature?", "back": "The Dark Lady sonnets are among the most psychologically acute poems in the English language, delving into complex, often uncomfortable aspects of human desire and relationships."}, {"front": "How many sonnets in Shakespeare's collection are traditionally assigned to the 'Dark Lady' sequence?", "back": "The final twenty-eight sonnets (127-154) are traditionally assigned to the Dark Lady sequence."}, {"front": "According to Sonnet 127, what negative effect does artificial 'fairing' have on the 'currency' of conventional beauty?", "back": "Artificial 'fairing' debases the currency of conventional beauty, making it less honest and authentic."}, {"front": "Besides her dark features and Italian heritage, what makes Emilia Lanier a particularly significant candidate for the Dark Lady?", "back": "Emilia Lanier was a musician connected to the court and the world of patronage, and is recognized as the first professional woman poet in English."}, {"front": "Who was Lucy Morgan (also known as Lucy Negro), and what makes her a speculative candidate for the Dark Lady?", "back": "Lucy Morgan was a former royal servant who became a brothel-keeper and appeared in contemporary satirical writings. Scholars find circumstantial evidence linking her to the sonnets intriguing."}, {"front": "What is paradoxical about the speaker's perception of the Dark Lady, despite his continued involvement with her?", "back": "The speaker sees the Dark Lady's faults (lies, inconstancy, moral darkness) with painful clarity, yet he confesses himself enslaved by his desire for her, defying traditional romantic idealization."}, {"front": "What is the ultimate, frustrating conclusion about understanding the cycle of lust presented in Sonnet 129?", "back": "The sonnet concludes that understanding the destructive cycle of lust (shame before, bliss during, self-loathing after) does nothing to prevent it."}, {"front": "How does Sonnet 130's 'anti-blazon' function as both a 'joke' and a 'declaration' of love?", "back": "It's a 'joke' because it humorously debunks every traditional Petrarchan comparison for beauty. It's a 'declaration' because, despite the deflation, the final lines affirm genuine love for his mistress as she is, not as an idealized construct."}, {"front": "Why are the Dark Lady sonnets described as 'not comfortable' but among the 'most psychologically acute poems'?", "back": "They are 'not comfortable' because they frankly explore raw, often negative emotions like lust, deceit, and obsession. They are 'psychologically acute' because they delve deeply and realistically into the complex, often contradictory inner workings of human desire and relationships."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
