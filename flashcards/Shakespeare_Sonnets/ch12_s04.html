<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 12, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central complaint of the speaker in Sonnet CXXXVII?", "back": "The speaker complains of an 'epistemological failure': his eyes see, but cannot correctly judge beauty, taking 'the worst to be the best' despite knowing what true beauty is."}, {"front": "In Sonnet CXXXVII, what does 'Thou blind fool, Love' imply about the speaker's view of Cupid?", "back": "It implies that Love (Cupid) is directly responsible for corrupting the speaker's eyesight and judgment, making him see incorrectly and be deluded."}, {"front": "Explain the double meaning of the metaphor 'anchor'd in the bay where all men ride' in Sonnet CXXXVII.", "back": "It literally refers to the speaker's gaze being fixed on a harbor/anchorage. Figuratively and bawdily, it implies the Dark Lady is a woman of easy virtue, visited by many men, a 'common place.'"}, {"front": "What do 'a several plot' and 'the wide world's common place' refer to in Sonnet CXXXVII?", "back": "'A several plot' refers to a privately owned parcel of land, meaning the speaker foolishly thinks the mistress is exclusively his. 'The wide world's common place' refers to common land available to all, implying she is publicly shared or promiscuous."}, {"front": "How does Sonnet CXXXVII connect to the broader theme of 'love's blindness' in lyric poetry and Shakespeare's plays?", "back": "It expands the traditional theme of Cupid's random blindness by making it a moral failure ('corrupt by over-partial looks'), linking it to the destructive gap between perception and judgment seen in characters like Othello or Leontes."}, {"front": "What does 'false plague' signify at the end of Sonnet CXXXVII?", "back": "It refers to a deadly epidemic of falsehood or a deceptive affliction. The word 'plague' carries its full weight of contagion and mortal threat, indicating his infatuation is a serious, destructive illness."}, {"front": "What is the primary dynamic between the speaker and the mistress in Sonnet CXXXVIII?", "back": "They engage in mutual deception: she swears faithfulness though he knows she lies, and he pretends to be a credulous youth though she knows he is aging. Both suppress the plain truth to flatter each other."}, {"front": "How does the phrase 'love's best habit is in seeming trust' function in Sonnet CXXXVIII?", "back": "'Habit' refers to both a costume (suggesting deceptive appearance) and a habitual practice. It means love's best performance or practice is the pretense of trust, even when it's absent."}, {"front": "Explain the pivotal pun in the couplet of Sonnet CXXXVIII: 'I lie with her, and she with me.'", "back": "'Lie' means both 'to tell a falsehood' and 'to recline with / have sex with.' The couplet crystallizes their arrangement of mutual deception and physical intimacy, which cannot be separated."}, {"front": "How does the 1609 version of Sonnet CXXXVIII ('Simply I credit') differ in tone from the 1599 version ('I smiling credit')?", "back": "The 1599 version suggests the speaker is 'self-consciously amused' by his complicity, while the 1609 version implies he is more 'resigned' or merely accepting, rather than amused, showing Shakespeare's revision process."}, {"front": "Compare the vision of love in Sonnet CXXXVIII to that presented in Sonnet 116.", "back": "Sonnet 116 presents an ideal of steadfast, unaltered love. Sonnet CXXXVIII offers a contrasting, realistic vision of love as an accommodation with imperfection, where deception and compromise are accepted as a form of constancy."}, {"front": "What is the speaker's paradoxical pleading in Sonnet CXXXIX regarding the Dark Lady's cruelty?", "back": "He asks her not to wound him with subtle cruelty (glancing at other men) but instead to use direct, open power. Then, he reverses, asking her to kill him outright with looks as an act of mercy, since he's already near death."}, {"front": "In Sonnet CXXXIX, what is the difference between 'slay me not by art' and 'use power with power'?", "back": "'Slay me not by art' means don't kill him through cunning or subtle manipulation (like glancing at others). 'Use power with power' means apply your strength openly and directly, preferring honest assault over covert wounding."}, {"front": "How does the Dark Lady's cruelty in Sonnet CXXXIX invert the Petrarchan tradition?", "back": "Traditionally, Petrarch's Laura is cruel through chastity (refusing advances). The Dark Lady is cruel through excess – her eyes wound by looking elsewhere, demonstrating unfaithfulness and making love 'torture.'"}, {"front": "What pragmatic advice does the speaker give the Dark Lady in Sonnet CXL?", "back": "'Be wise as thou art cruel.' He advises her not to push his patience too far, lest his despair lead him to speak ill of her publicly, which could damage her reputation in an 'ill-wresting world.'"}, {"front": "What is the speaker's main fear if the Dark Lady continues to show too much disdain in Sonnet CXL?", "back": "He fears he will 'despair' and 'grow mad,' leading him to 'speak ill of thee' (slander her). In a corrupt world, 'mad slanderers by mad ears believed be,' threatening her reputation and potentially his own sanity."}, {"front": "In Sonnet CXL, what is the speaker's ultimate request of the Dark Lady concerning her fidelity?", "back": "He asks her to 'Bear thine eyes straight, though thy proud heart go wide.' He doesn't expect true faithfulness but requests public discretion and the appearance of loyalty to avoid scandal, even if her heart strays."}, {"front": "What is the significance of the 'testy sick men' analogy in Sonnet CXL?", "back": "It implies that just as dying men are told 'no news but health' by physicians to keep them calm, the Dark Lady should offer reassuring words of 'love' to the speaker, even if untrue, to prevent his despair and madness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
