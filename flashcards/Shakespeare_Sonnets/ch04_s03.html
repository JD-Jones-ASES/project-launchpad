<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central analogy does Sonnet XXIII use to describe the poet's inability to express his love?", "back": "The sonnet compares the tongue-tied lover to an 'unperfect actor' overwhelmed by stage fright and a 'fierce thing' weakened by its own strength."}, {"front": "In Sonnet XXIII, what does 'unperfect actor' mean in Elizabethan usage?", "back": "It refers to an actor who has not fully learned his role, or one who loses it under pressure, implying incomplete preparation or performance failure."}, {"front": "According to Sonnet XXIII, why is the poet, like the 'unperfect actor,' unable to speak his love adequately?", "back": "He is 'o'ercharg'd with burthen of mine own love's might,' meaning he is overwhelmed by an excess of feeling that defeats verbal expression."}, {"front": "What unexpected solution does the sestet of Sonnet XXIII propose for the poet's speechlessness?", "back": "It suggests that his writings, the poem itself, should speak for him, serving as the eloquence his tongue cannot achieve."}, {"front": "What does the closing couplet of Sonnet XXIII, 'To hear with eyes belongs to love's fine wit,' suggest about the beloved's role?", "back": "It suggests the beloved must learn a new kind of 'listening' – reading the written page carefully, as if hearing a spoken declaration."}, {"front": "How does Sonnet XXIII engage with the Renaissance debate about spoken versus written language?", "back": "It asserts that writing can surpass speech in conveying profound emotion, presenting the poem itself as proof that the written word can 'speak' effectively."}, {"front": "What is the main visual conceit developed in Sonnet XXIV?", "back": "The poet's eye acts as a painter, engraving or fixing the youth's image ('stell'd') in the 'table of my heart,' with the poet's body serving as a gallery."}, {"front": "In Sonnet XXIV, what does 'stell'd' mean?", "back": "It means engraved or fixed, suggesting permanence and luminosity, like a star fixed in the sky."}, {"front": "How does the poet's body function within the visual conceit of Sonnet XXIV?", "back": "It is described as the frame for the portrait, a 'bosom's shop' where the image hangs, and its eyes are windows through which light enters to gaze upon the beloved's image."}, {"front": "What crucial limitation do the eyes have, according to the couplet of Sonnet XXIV, despite their skill?", "back": "The couplet states that eyes 'draw but what they see, know not the heart,' emphasizing the limits of visual representation in capturing interior life or true emotion."}, {"front": "How does Sonnet XXIV connect to the broader chapter theme of preserving beauty, especially in contrast to Sonnet 18?", "back": "While Sonnet 18 uses the poem itself as the preserving medium, Sonnet XXIV explores the eye as a painter and the heart as a canvas for preserving beauty, though with acknowledged limitations."}, {"front": "What dual meaning does 'cunning' carry in Sonnet XXIV's couplet?", "back": "It refers to both skill or expertise (in drawing) and craftiness or guile, suggesting that even skilled sight can be deceptive or limited."}, {"front": "What social disadvantage does the poet explicitly acknowledge in Sonnet XXV?", "back": "He acknowledges lacking 'public honour and proud titles,' indicating his lower social standing compared to the Fair Youth."}, {"front": "To what natural phenomenon does Sonnet XXV compare 'princes' favourites' to illustrate their instability?", "back": "They are compared to 'marigolds' that depend entirely on the sun's gaze, opening in sunlight and wilting at a frown, symbolizing dependence on fickle favour."}, {"front": "What does it mean to be 'in favour with their stars' in Sonnet XXV?", "back": "It signifies having luck or fortune on one's side, often implying that public success is due to arbitrary celestial luck rather than merit."}, {"front": "How can a 'painful warrior' lose all his fame, according to Sonnet XXV?", "back": "After 'a thousand victories once foil'd,' his name can be 'razed quite' from the 'book of honour,' meaning a single defeat can erase a lifetime of achievements."}, {"front": "What does the poet set against the precariousness of public fortune in Sonnet XXV, and what is its nature?", "back": "He sets his own condition of 'love and am belov'd,' a mutual bond that is genuinely stable and 'may not remove nor be remov'd' by caprice or public opinion."}, {"front": "How does Sonnet XXV turn the poet's lower social status into a form of superiority?", "back": "The poet argues that while he lacks public honors, these are fragile and meaningless. His mutual love, though private, is truly stable and thus superior to fickle public fame."}, {"front": "What is the formal purpose of Sonnet XXVI, and what does the poet send?", "back": "It is a dedication, where the poet sends his poem as a 'written embassage' or a message from an ambassador."}, {"front": "What is 'vassalage' in the context of Sonnet XXVI?", "back": "It refers to a state of feudal submission or servitude, indicating the poet's duty and dependence on the youth's 'merit' or worthiness."}, {"front": "What does the poet state is the primary purpose of his 'embassage' in Sonnet XXVI?", "back": "Its purpose is 'To witness duty, not to show my wit,' emphasizing his sincere devotion rather than his poetic skill."}, {"front": "What does the poet hope for from the beloved's 'good conceit' in Sonnet XXVI?", "back": "He hopes that the beloved's own good interpretation or intelligence ('good conceit') will understand and 'bestow' his 'naked' (unadorned) love, despite his poor words."}, {"front": "What does the phrase 'puts apparel on my tatter'd loving' signify in Sonnet XXVI?", "back": "It signifies the poet's hope that favorable fortune ('whatsoever star that guides my moving') will dignify or improve his humble love, making it worthy of the beloved's respect."}, {"front": "Under what condition does the poet say he will dare to boast his love in Sonnet XXVI?", "back": "He will only dare to boast 'Till whatsoever star that guides my moving, / Points on me graciously with fair aspect,' meaning until fortune smiles upon him and makes his love seem worthy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
