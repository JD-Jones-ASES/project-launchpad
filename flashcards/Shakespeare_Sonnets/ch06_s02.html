<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central paradox explored in Sonnet 43 regarding sight?", "back": "The speaker sees his beloved most vividly in dreams (when his eyes are closed or 'wink'), rather than in waking hours. His 'sightless' mind sees more truly."}, {"front": "In Sonnet 43, what does 'darkly bright' mean?", "back": "It's Shakespeare's compressed paradox meaning the mind is bright in darkness, seeing luminously in dreams even though the eyes are closed. It epitomizes the sonnet's central inversion."}, {"front": "How does Sonnet 43 resolve the speaker's longing for his beloved's presence?", "back": "The couplet redefines night and day: all days are 'nights' until he sees his beloved, and only 'nights' that bring the beloved's vision in dreams are truly bright days."}, {"front": "What Renaissance literary tradition does Sonnet 43 draw upon to justify the paradox of seeing in dreams?", "back": "The rich tradition of dream-vision literature, where sleep acts as a gateway to truth, and the Neoplatonic idea that the lover carries the beloved's image imprinted on the soul."}, {"front": "How does Sonnet 43's theme of the imagination substituting for physical presence connect to other sonnets?", "back": "It anticipates the 'painted banquet' of Sonnet 47, where the imagination creates an inward portrait when the eye is starved of the beloved's sight."}, {"front": "What does 'unrespected' mean in Sonnet 43?", "back": "Unnoticed, disregarded; the eyes pass over ordinary things during the day without true seeing."}, {"front": "What is the speaker's central wish in Sonnet 44, and why?", "back": "The speaker wishes his body were made of 'thought' rather than 'flesh' so he could instantly overcome 'injurious distance' and be with his beloved, as 'nimble thought' can leap across space."}, {"front": "According to Sonnet 44, what prevents the speaker from instantly reaching his beloved, and what is the consequence?", "back": "He is made of 'earth and water,' the two heavy, sluggish classical elements, which trap him by geography. The consequence is being forced to 'attend time's leisure' and receiving 'heavy tears' as 'badges of woe.'"}, {"front": "In the context of Sonnet 44, what do 'earth and water' represent?", "back": "They are two of the four classical elements, considered cold, heavy, and slow. The human body, particularly flesh, was seen as primarily composed of these elements, contrasting with the lightness of air and fire."}, {"front": "How does Sonnet 44 illustrate that absence is a 'bodily condition'?", "back": "By emphasizing that the speaker's physical body, made of heavy elements, is literally weighed down and prevented from swift travel, making absence a physical suffering, not just an emotional one."}, {"front": "Why are Sonnets 44 and 45 often read together?", "back": "They form a unique, sustained philosophical meditation on the four elements, making them the only such paired argument in the sequence."}, {"front": "What does 'injurious distance' signify in Sonnet 44?", "back": "It personifies the gap between the lovers as an agent of harm, suggesting distance is not neutral but actively cruel and detrimental."}, {"front": "How does Sonnet 45 expand on the four elements theme introduced in Sonnet 44?", "back": "It describes the 'other two' elements, 'slight air' (thought) and 'purging fire' (desire), as 'swift messengers' or ambassadors that constantly travel to the beloved, completing the elemental cycle."}, {"front": "What happens to the speaker when his 'quicker elements' (thought and desire) depart for his beloved in Sonnet 45?", "back": "His 'life's composition' (the balance of the four elements) is disrupted, and he sinks down to melancholy and near-death, being reduced to only his heavy 'earth and water.'"}, {"front": "In Sonnet 45, what is the meaning of 'present-absent'?", "back": "It's a Shakespearean paradox indicating that the light elements (thought and desire) are simultaneously present with the beloved and absent from the speaker, highlighting the speaker's diminished state."}, {"front": "Describe the cyclical nature of grief and consolation depicted in the couplet of Sonnet 45.", "back": "When the messengers (thought and desire) return with news of the beloved's health, the speaker rejoices, but this joy immediately sends them back to the beloved, causing him to grow sad again, in an endless cycle."}, {"front": "How did Elizabethan thought identify elements with aspects of the mind and soul, as reflected in Sonnet 45?", "back": "Air was associated with intellect, reason, and thought, while fire was linked to passion, desire, and the vital spirit. This allowed poets to give inner life a quasi-physical reality."}, {"front": "How do the 'tender embassy' of elements in Sonnet 45 compare to other expressions of love's service?", "back": "The idea of elements acting as ambassadors echoes the language of love's service, reappearing in the slavish devotion described in Sonnets 57 and 58."}, {"front": "What does 'purging fire' refer to in Sonnet 45?", "back": "It refers to cleansing, refining fire, carrying associations of physical purification and the burning energy of desire, one of the four classical elements."}, {"front": "What are the three main thematic concerns or situations explored across Sonnets 43-45?", "back": "The paradox of perception in dreams (43), the physical burden of separation (44), and the emotional cycle of absence and brief consolation facilitated by thought and desire (45)."}, {"front": "Shakespeare frequently uses 'compressed paradox' in these sonnets. Give an example from Sonnets 43 or 45.", "back": "In 43, 'darkly bright' describes seeing luminously in darkness. In 45, 'present-absent' describes elements simultaneously with the beloved and away from the speaker."}, {"front": "How does the 'wordwatch' section enhance understanding of Shakespeare's language in these sonnets?", "back": "It clarifies archaic meanings, explains Shakespeare's unique compressed paradoxes, and highlights how he plays on multiple meanings of words (e.g., 'shadow') to enrich the text."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
