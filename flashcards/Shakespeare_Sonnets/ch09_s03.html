<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the speaker's initial argument in Sonnet 92 regarding the youth's potential abandonment?", "back": "The speaker argues that if the youth's love ceases, he will simply die, thus never experiencing the suffering of abandonment."}, {"front": "What phrase describes the initial comfort found in Sonnet 92's logic?", "back": "A 'perverse sort of comfort,' as it is 'secured' by the very fragility of its foundation (the speaker's life depending on the youth's love)."}, {"front": "How does the couplet of Sonnet 92 ('But what's so blessed-fair that fears no blot? / Thou mayst be false, and yet I know it not.') shatter the preceding logic?", "back": "It reveals the 'fatal flaw' that the speaker might not die if love changes, but rather live on deceived, believing himself still loved while the youth is unfaithful."}, {"front": "What new, more 'insidious danger' does the speaker realize in Sonnet 92's couplet?", "back": "The danger of living in ignorance of the youth's falseness, which is a more subtle and troubling threat than simply dying from abandonment."}, {"front": "In Sonnet 92, what does 'title' refer to in the phrase 'O! what a happy title do I find'?", "back": "A legal right of possession or claim. The speaker uses it to describe a situation so constructed that loss itself is deemed impossible."}, {"front": "What does the phrase 'term of life' mean in Sonnet 92?", "back": "For the duration of one's life; a legal phrase denoting a period bounded by death."}, {"front": "How does Sonnet 93 connect directly to the end of Sonnet 92?", "back": "It picks up on the fear expressed in 92's couplet, exploring what it would mean to live as a 'deceived husband,' loving a face that no longer reflects the true heart behind it."}, {"front": "According to Sonnet 93, how do most people betray inner unfaithfulness, and how is the youth different?", "back": "Most people show unfaithfulness through 'moods, and frowns, and wrinkles strange' in their face. The youth is different because 'heaven has decreed' his face must always show sweetness, regardless of his inner state."}, {"front": "What is the 'terrible predicament' described in Sonnet 93?", "back": "The speaker has no way to detect the youth's change or read the truth of his heart, because his face always appears sweet and cannot carry the 'vocabulary of betrayal'."}, {"front": "Explain the allusion to 'Eve's apple' in Sonnet 93's couplet.", "back": "It compares the youth's beauty to the fruit in the Garden of Eden: beautiful and appealing on the outside, but containing the seed of ruin or deception within, suggesting spiritual danger."}, {"front": "In Sonnet 93, what does 'alter'd new' imply about the beloved's state?", "back": "It implies a fundamental alteration or transformation due to infidelity, rather than merely a surface change."}, {"front": "Why is Sonnet 94 considered 'the most debated poem in the entire sequence'?", "back": "Its tone is 'impossible to pin down,' leading to centuries of critical debate over whether it offers admiration, a veiled warning, or an accusation toward the youth."}, {"front": "In the first eight lines of Sonnet 94, what qualities are attributed to those who 'do not do the thing they most do show'?", "back": "They have power to hurt but choose not to, can stir emotion in others while remaining 'unmoved, cold, and to temptation slow,' and 'inherit heaven's graces,' being 'lords and owners of their faces.'"}, {"front": "What is the significance of the contrast between 'lords and owners' and 'stewards' in Sonnet 94?", "back": "'Lords and owners' possess and manage their gifts wisely and legitimately, while 'stewards' merely administer resources on behalf of another, implying a delegated or less authentic power."}, {"front": "Quote the most famous line from Sonnet 94's couplet and explain its general meaning.", "back": "'Lilies that fester, smell far worse than weeds.' It means that things of great beauty or apparent virtue, when corrupted, become far more repulsive and damaging than things that were humble or base from the start."}, {"front": "What does 'fester' mean in Sonnet 94's couplet, and what effect does it have on the imagery?", "back": "'Fester' means to suppurate, rot inwardly, or become infected and putrid. It introduces violent, physical imagery that sharply contrasts with the delicate beauty of lilies."}, {"front": "How do critics interpret the 'unresolvable ambiguity' of Sonnet 94?", "back": "Some see it as straightforward admiration for Stoic self-command, others as ironic or a direct accusation. Many believe Shakespeare intentionally left it ambiguous to reflect the complexity of a person whose beauty and power defied clear moral judgment."}, {"front": "What does 'husband nature's riches from expense' mean in Sonnet 94?", "back": "To manage one's natural gifts frugally and wisely; to conserve them rather than squandering them, reflecting an Elizabethan value of virtue and self-control."}, {"front": "According to Sonnet 94, what happens 'if that flower with base infection meet'?", "back": "'The basest weed outbraves his dignity,' meaning a beautiful thing corrupted becomes worse and less dignified than something inherently humble or common."}, {"front": "Which structural device, used in Sonnet 92, is characteristic of Shakespeare's sonnets and also found in Sonnets 73 and 116?", "back": "The 'argument-that-collapses-in-the-couplet,' where the initial logic or premise is dramatically undercut or shattered by the final two lines."}, {"front": "How does Sonnet 95 (as partially described in the text) relate to Sonnets 93 and 94?", "back": "It continues the theme of the youth's beauty concealing flaws. It uses the 'canker in the fragrant rose' image, similar to 94's 'base infection' and 93's 'Eve's apple,' showing how his charm makes 'shame' and 'sins' appear lovely."}, {"front": "The image of the 'canker in the fragrant rose' from Sonnet 95 connects to which other sonnet in this section?", "back": "Sonnet 94, which talks about a 'base infection' in a flower and how 'sweetest things turn sourest by their deeds,' both illustrating the corruption of beauty."}, {"front": "What broader theme links Sonnets 92-94?", "back": "The deceptive nature of the beloved, the speaker's vulnerability to that deception, and the conflict between outward appearance (beauty) and inner reality (potential falseness or corruption)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
