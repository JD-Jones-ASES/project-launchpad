<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When and where was William Shakespeare born?", "back": "April 1564 (traditionally April 23rd, St. George's Day) in the market town of Stratford-upon-Avon, Warwickshire."}, {"front": "Who were William Shakespeare's parents and what were their backgrounds?", "back": "His father was John Shakespeare, a glover and sometime alderman who became high bailiff. His mother was Mary Arden, daughter of a prosperous local farmer."}, {"front": "What was the name of the school Shakespeare likely attended in Stratford?", "back": "Stratford's King's New School."}, {"front": "Describe the education Shakespeare received at grammar school.", "back": "It was intensely classical, focusing on Latin authors like Ovid, Virgil, and Cicero, learning rhetoric, and studying moral philosophy through the Stoics."}, {"front": "Did William Shakespeare attend university?", "back": "No, there is no evidence he attended Oxford or Cambridge; his rigorous grammar school training provided his literary foundation."}, {"front": "How did Shakespeare's classical grammar school education influence his later works?", "back": "It gave him an inexhaustible literary foundation, with the cadences of Roman poets becoming second nature and the influence of Ovid's Metamorphoses appearing throughout his plays and sonnets."}, {"front": "When and to whom did Shakespeare get married?", "back": "In November 1582, at age eighteen, to Anne Hathaway of Shottery, who was twenty-six and already three months pregnant."}, {"front": "Name Shakespeare's children.", "back": "His first child, Susanna (baptized May 1583), and twins Hamnet and Judith (baptized February 1585)."}, {"front": "What is the significance of Shakespeare's 'second-best bed' bequest to his wife, Anne Hathaway?", "back": "It's a long-debated biographical puzzle. Some scholars interpret it as cold, while others suggest the 'second-best bed' was the marital bed and held deep personal significance."}, {"front": "What period of Shakespeare's life is referred to as the 'Lost Years'?", "back": "The period between the baptism of his twins in 1585 and the first solid evidence of his presence in London in 1592, for which almost no biographical information exists."}, {"front": "What is the most likely explanation for Shakespeare's 'Lost Years'?", "back": "That a young man of ability and ambition made his way to London, the one city in England where theatre was a commercial enterprise capable of supporting professional writers."}, {"front": "What was the first solid evidence of Shakespeare's success as a playwright in London?", "back": "Robert Greene's 1592 pamphlet warning fellow university graduates to beware 'an upstart crow, beautified with our feathers,' an unmistakable reference to Shakespeare already being successful."}, {"front": "Where were professional theatres typically located in London during Shakespeare's time and why?", "back": "Outside the city walls, on Bankside in Southwark, to be beyond the jurisdiction of the Lord Mayor and aldermen who regarded playhouses with deep suspicion."}, {"front": "Name Shakespeare's acting company, including its later name.", "back": "He joined the Lord Chamberlain's Men around 1594, which was renamed the King's Men in 1603 after James I took them under royal patronage."}, {"front": "What made Shakespeare's role in his acting company unusual among playwrights of the period?", "back": "He was both a shareholder in the company and a working actor, giving him a financial stake in its success that shaped his entire career."}, {"front": "How did Shakespeare's dual role as actor and shareholder influence his playwriting?", "back": "He wrote not for posterity or the page, but for his colleagues and their audiences, ensuring his plays were perfectly suited for performance and commercial success."}, {"front": "What were the two main types of performance venues for Shakespeare's plays?", "back": "Large open-air amphitheatres like the Globe (holding 3,000 spectators) and smaller, roofed indoor theatres such as Blackfriars."}, {"front": "Describe the diversity of audience members at Elizabethan theatres.", "back": "Elizabethan theatre was a genuinely popular art form, drawing people from every rank of society, including apprentices, merchants, lawyers, nobles, and gentry."}, {"front": "How did the diverse Elizabethan audience impact Shakespeare's dramaturgy?", "back": "It shaped his work's extraordinary tonal breadth, allowing him to hold comedy and tragedy in the same breath and address philosophical questions through the mouths of clowns."}, {"front": "Explain the patronage system in Elizabethan England's literary world.", "back": "Playwrights and poets dedicated works to wealthy nobles hoping for financial reward, commissions, or at least social protection."}, {"front": "Which noble was a significant patron for Shakespeare early in his career?", "back": "Henry Wriothesley, the Earl of Southampton, to whom Shakespeare dedicated poems like *Venus and Adonis* and *The Rape of Lucrece*."}, {"front": "What major property did Shakespeare purchase in Stratford in 1597, signaling his prosperity?", "back": "New Place, one of the grandest houses in Stratford."}, {"front": "When did Shakespeare begin to gradually withdraw from London life and spend more time in Stratford?", "back": "Around 1610 or 1611."}, {"front": "Name a playwright with whom Shakespeare collaborated on plays in his later years.", "back": "John Fletcher, with whom he co-wrote plays such as *The Two Noble Kinsmen* and *Henry VIII*."}, {"front": "What are some key characteristics and themes of Shakespeare's 'late romances'?", "back": "These plays (e.g., *The Tempest*, *The Winter's Tale*) mark a conscious rounding off of his career, returning to themes of reconciliation, loss, and recovery with a mellowness different from his tragedies."}, {"front": "When and where did William Shakespeare die?", "back": "On 23 April 1616, aged fifty-two, in Stratford-upon-Avon, perhaps fittingly on his birthday."}, {"front": "What famous inscription is on Shakespeare's gravestone?", "back": "A curse warning against disturbing his bones: 'Good friend for Jesus sake forbeare, To dig the dust encloased heare; Blest be the man that spares thes stones, And curst be he that moves my bones.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
