<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary argument of Sonnet XI regarding procreation?", "back": "Sonnet XI broadens the argument for procreation from personal duty to a social imperative, stating that if everyone thought as the Youth, 'the times should cease' and the world would end."}, {"front": "According to Sonnet XI, what distinguishes the Youth's obligation to reproduce from others?", "back": "The poem argues that the obligation to reproduce is proportional to one's natural gifts. Those 'whom nature hath not made for store' may perish, but the Youth, being 'best endow'd,' has a greater duty."}, {"front": "Explain the 'printer's seal' metaphor in Sonnet XI's couplet.", "back": "Nature carved the Youth like a seal, intending him to 'print more' (reproduce impressions of himself) and multiply his image, rather than letting the seal (his beauty/potential) remain unused and eventually die."}, {"front": "In Sonnet XI, what does 'made for store' mean in the context of the Youth?", "back": "'Made for store' means made for reproduction or breeding, intended to increase the world's supply of beauty and virtue. The Youth is presented as someone nature intended for this purpose."}, {"front": "What is the consequence if the Youth fails to fulfill his duty as described in Sonnet XI?", "back": "If the Youth fails to reproduce, he lets the 'copy die,' meaning his unique beauty and qualities will perish without being multiplied into the next generation."}, {"front": "What poetic device does Sonnet XII primarily use to convey the inevitability of decay?", "back": "Sonnet XII uses a 'catalogue' device, listing numerous signs of time's passage and decay, such as the clock ticking, day turning to night, fading violets, and barren trees, to build a sense of inevitability."}, {"front": "What is the 'sharpest formulation' delivered in the couplet of Sonnet XII regarding Time?", "back": "The couplet states that 'nothing 'gainst Time's scythe can make defence / Save breed,' meaning only children can stand against the destructive power of time."}, {"front": "How does Sonnet XII use military language to describe the struggle against Time?", "back": "It portrays Time as an 'armed enemy' with a 'scythe,' and procreation ('breed') as the only 'weapon' or 'defence' against it, making the struggle concrete."}, {"front": "In Sonnet XII, what does 'brave day sunk in hideous night' signify?", "back": "It sets the poem's tonal register, illustrating the destruction of grandeur by ugliness and the extinguishing of light by darkness, mirroring the decay of beauty."}, {"front": "Explain the significance of 'Time's scythe' as an image in Sonnet XII and beyond.", "back": "'Time's scythe' is the traditional implement of the Grim Reaper, symbolizing Time's destructive power. It is one of the sequence's most resonant images, reappearing in Sonnets 60 and 65."}, {"front": "How does Shakespeare's use of the 'ubi sunt' tradition in Sonnet XII differ from its conventional use?", "back": "Instead of listing past greats who have vanished (the conventional 'where are they?'), Shakespeare lists present signs of decay and projects them onto the Youth's future, personalizing the lament into 'where will your beauty be?'"}, {"front": "What is the 'bier' in Sonnet XII's description of summer's end?", "back": "The 'bier' is a frame for carrying a coffin. By describing summer's grain 'borne on the bier,' the poem makes the harvest explicitly funerary, implying summer itself is being carried to burial."}, {"front": "What philosophical idea about self-ownership does Sonnet XIII introduce?", "back": "It argues that the Youth is 'no longer yours, than you yourself here live,' meaning the self is a temporary steward of its own beauty and not its permanent owner."}, {"front": "In Sonnet XIII, what does it mean for beauty to be held 'in lease'?", "back": "'In lease' is a legal term meaning the right to use property for a fixed period. The Youth's beauty is not owned outright but held on a temporary lease from Nature, which expires at death."}, {"front": "How does Sonnet XIII use the 'house metaphor' to advocate for procreation?", "back": "It compares the Youth's body and beauty to a 'fair house.' It questions who would let such a house fall to ruin when careful 'husbandry' (management) could maintain it against the ravages of time and death (by having a child)."}, {"front": "What is the double meaning of 'husbandry' in Sonnet XIII?", "back": "'Husbandry' refers both to the careful management of an estate (preserving one's beauty) and, implicitly, to the duties of a husband, suggesting the Youth should marry and procreate."}, {"front": "What 'touching personal appeal' closes Sonnet XIII?", "back": "The couplet closes with, 'You had a father: let your son say so,' appealing to the Youth's sense of filial gratitude and the logical and emotional duty to continue the generational line."}, {"front": "What does 'determination' mean in the context of Sonnet XIII's discussion of beauty?", "back": "'Determination' refers to the legal expiry or termination of a lease. A child would prevent beauty's 'determination' by extending it beyond one lifetime."}, {"front": "What unconventional form of 'astronomy' does the speaker claim to possess in Sonnet XIV?", "back": "The speaker claims to derive his 'knowledge' not from celestial stars, but from the Youth's eyes, which he calls 'constant stars,' using them to read the Youth's destiny."}, {"front": "How does the speaker's 'astronomy' in Sonnet XIV differ from conventional astrology?", "back": "Unlike conventional astrologers who predict plagues, famines, or political fortunes, the speaker's 'astronomy' reads the moral implications of the Youth's choice regarding procreation."}, {"front": "What is the speaker's main 'prognostication' for the Youth in Sonnet XIV?", "back": "The speaker predicts that 'Truth and beauty shall together thrive' if the Youth reproduces, but if he doesn't, 'Thy end is truth's and beauty's doom and date.'"}, {"front": "In Sonnet XIV, what does it mean for the Youth to 'convert to store'?", "back": "To 'convert to store' means to turn away from self-absorption and direct one's gifts and beauty toward reproduction, investing them in the next generation rather than hoarding them."}, {"front": "Explain the phrase 'truth's and beauty's doom and date' from Sonnet XIV.", "back": "'Doom' signifies judgment, and 'date' is an appointed end. Together, they mean the final, irreversible conclusion for truth and beauty if the Youth fails to reproduce, implying their utter destruction with his death."}, {"front": "What observation about 'everything that grows' does Sonnet XV begin with?", "back": "Sonnet XV opens with the observation that 'everything that grows / Holds in perfection but a little moment,' highlighting the transient nature of all living things."}, {"front": "How does Sonnet XV characterize human life in relation to the 'huge stage'?", "back": "It portrays human life as 'nought but shows' on a 'huge stage,' where 'the stars in secret influence comment,' suggesting human existence is fleeting and subject to unseen celestial forces."}, {"front": "What metaphor does Sonnet XV use to describe men's growth and life force?", "back": "Men are compared to 'plants,' increasing and being 'Cheered... and checked even by the self-same sky,' boasting 'in their youthful sap,' equating their vitality with the essential fluid of plants."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
