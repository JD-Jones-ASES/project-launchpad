<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 10, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What charge does the speaker defend against in Sonnet 105 regarding his love?", "back": "The charge of idolatry, meaning excessive devotion to one person or a false religion of praise."}, {"front": "How does the speaker in Sonnet 105 justify his seemingly repetitive praise of the beloved?", "back": "He argues that his love is constant and the beloved truly embodies 'fair, kind, and true,' making his praise a celebration of a living truth, not an idol."}, {"front": "What three qualities form the 'structural and thematic spine' of Sonnet 105, often repeated as a refrain?", "back": "'Fair, kind, and true.'"}, {"front": "What is the ultimate compliment given in the couplet of Sonnet 105?", "back": "That the three qualities ('fair, kind, and true') have often existed separately in others, but in the beloved, they converge for the first time in a single person."}, {"front": "Define 'idolatry' as used in Sonnet 105's context.", "back": "The worship of idols; excessive devotion to something that does not deserve it, implying the charge that repeated praise is a kind of false religion."}, {"front": "How does Sonnet 105 connect to broader Renaissance theological debates?", "back": "It connects to debates about whether praise of human beauty was a form of blasphemy or, alternatively, a recognition of divine beauty reflected in a human face, similar to Petrarch's Canzoniere."}, {"front": "How does the speaker interpret", "back": "He sees them not as"}, {"front": "What is the significance of the volta (turn) in Sonnet 106, specifically with the line 'For we, which now behold these present days'?", "back": "It is a surprising admission that even the speaker, who sees the beloved directly, lacks adequate words ('lack tongues to praise') to capture their beauty, placing the beloved beyond all past or present poetry."}, {"front": "Define 'blazon' in the context of Renaissance love poetry, as explained in Sonnet 106's commentary.", "back": "A detailed,"}, {"front": "How does Sonnet 106 relate to the traditional blazon in Renaissance poetry?", "back": "It recalls the convention by having past poets write blazons, but transcends it by suggesting those blazons were mere prophecies, unable to capture the beloved's unique and ultimate beauty."}, {"front": "Explain the concept of 'prefiguring' as applied to past poets in Sonnet 106.", "back": "'Prefiguring' means foreshadowing or representing in advance; past poets were sketching in advance the beloved who would eventually exist, without consciously knowing it."}, {"front": "Which other Shakespearean sonnets does Sonnet 106 connect to regarding the beloved surpassing all past literary beauty?", "back": "Sonnet 53 ('Describe Adonis, and the counterfeit / Is poorly imitated after you') and Sonnet 21 ('So is it not with me as with that Muse / Stirr'd by a painted beauty to his verse')."}, {"front": "What does the speaker dismiss at the opening of Sonnet 107?", "back": "His own fears and the world's gloomy prophecies of doom, stating they have failed to control or limit his love's 'lease' (limited duration)."}, {"front": "What specific historical event is the 'mortal moon' in Sonnet 107 most likely an allusion to, according to scholarly consensus?", "back": "The death of Queen Elizabeth I in March 1603, whose symbol was the moon."}, {"front": "How is the 'eclipse' of the 'mortal moon' interpreted in the context of Sonnet 107?", "back": "It refers to Elizabeth I's death, which many feared would lead to chaos, but instead ushered in an era of peace and stability (the accession of James I)."}, {"front": "Define 'balmy time' as used in Sonnet 107.", "back": "A mild, healing, pleasant time, suggesting both physical gentleness and medicinal properties, symbolizing a new era of political peace and recovery."}, {"front": "How does Sonnet 107 portray the relationship between love, poetry, and Death?", "back": "It asserts that in this transformed world, the speaker's love looks fresh, Death 'subscribes' (yields) to him, and poetry promises immortality while physical monuments of tyrants crumble."}, {"front": "What political significance does the 'peace that proclaims olives of endless age' hold in Sonnet 107?", "back": "It refers to King James I's peace overtures, including his treaty with Spain in 1604, signaling a new era of stability after Elizabeth's reign."}, {"front": "Which other sonnets are connected to Sonnet 107's theme of poetry enduring while monuments crumble?", "back": "Sonnet 55 ('Not marble, nor the gilded monuments'), Sonnet 65 ('O! how shall summer's honey breath hold out'), and Sonnet 81 ('Your monument shall be my gentle verse')."}, {"front": "What is the central rhetorical question the speaker poses in the opening of Sonnet 108?", "back": "He asks, 'What’s new to speak... That may express my love, or thy dear merit?' essentially questioning if there's anything novel left to say about his love or the beloved's worth."}, {"front": "How does the speaker in Sonnet 108 justify repeating the 'very same' words about his love, despite the lack of novelty?", "back": "He compares it to 'prayers divine,' which are repeated daily, implying that true devotion requires constant, fresh affirmation regardless of whether the words themselves are new."}, {"front": "In Sonnet 108, what does 'eternal love' do with 'antiquity' according to the line 'But makes antiquity for aye his page'?", "back": "Eternal love does not give way to age or 'necessary wrinkles,' but instead uses 'antiquity' (old themes, past expressions, or time itself) as its enduring 'page' or record 'for aye' (always/ever)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
