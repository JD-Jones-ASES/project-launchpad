<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the speaker defend his silence regarding the youth's praise in Sonnet 83?", "back": "He argues that the youth's beauty so obviously transcended all possible poetic tribute that to write would have been to insult it or be inadequate."}, {"front": "What is the 'bitter irony' acknowledged by the speaker in Sonnet 83, according to the connections section?", "back": "His restraint (silence) has been read by the youth as a 'sin,' adding a layer of social anxiety."}, {"front": "What does 'painting need' refer to in Sonnet 83?", "back": "Cosmetic enhancement; the need for artificial improvement. The speaker says he 'never saw' the youth needing embellishment."}, {"front": "Explain 'barren tender of a poet’s debt' from Sonnet 83.", "back": "A meager, unfruitful fulfillment of a poet's obligation, implying a worthless offering producing nothing."}, {"front": "In Sonnet 83, what does 'slept in your report' mean for the speaker?", "back": "Remained silent about the youth's qualities; failed to record his praises. It suggests the speaker's silence was peaceful and deliberate, not negligent."}, {"front": "What does the speaker claim is the highest praise a poet can offer in Sonnet 84?", "back": "Simply stating 'you alone are you'—acknowledging that the youth is a unique original for which no equal example exists anywhere."}, {"front": "According to Sonnet 84, what earns a poet genuine fame regarding the youth?", "back": "Fidelity to the subject—accurately copying the youth's actual qualities, without distortion or embellishment."}, {"front": "What stinging rebuke does the couplet of Sonnet 84 deliver to the youth?", "back": "The youth's 'fondness for flattery' (his appetite for elaborate praise) actually degrades the quality of the tributes he receives, resulting in poor verse."}, {"front": "What does 'immured' mean in Sonnet 84?", "back": "Walled in; enclosed; confined within walls. It suggests that the full 'store' of the youth's qualities is locked away inside him."}, {"front": "In Sonnet 84, what does 'fond' imply about the youth's appreciation for praise?", "back": "Foolish; also affectionate. It carries a gentle but clear rebuke that the youth's delight in excessive praise is a kind of folly."}, {"front": "How does the speaker in Sonnet 85 contrast his 'tongue-tied Muse' with other poets?", "back": "While other poets fill pages with 'polished, gilded praise' using a 'golden quill,' his Muse holds back, 'tongue-tied' as if by decorum. He thinks good thoughts while others write good words."}, {"front": "In Sonnet 85, what deeper claim does the speaker make about his 'dumb thoughts' and 'wordless love'?", "back": "He insists his unspoken love and thoughts about the youth are constant, rich, and 'holds his rank before' any verbal tribute, making it a more genuine, intimate devotion."}, {"front": "What are 'comments richly compiled' in Sonnet 85?", "back": "Elaborate, collected annotations or praises. It suggests detailed explanatory writing and emphasizes the costly, ornate labor of the rival poets."}, {"front": "Who is the 'unlettered clerk' the speaker compares himself to in Sonnet 85?", "back": "A church official or scribe who cannot read and must rely on rote responses. This image is deliberately self-diminishing, positioning the speaker as an ignorant bystander."}, {"front": "What is the primary question the speaker poses at the beginning of Sonnet 86?", "back": "Was it the rival's magnificent verse ('proud full sail') or his claimed supernatural inspiration ('by spirits taught to write') that silenced the speaker?"}, {"front": "What is the speaker's initial response to the rival poet's abilities and alleged supernatural aid in Sonnet 86?", "back": "He dismisses each possibility, stating neither the rival's style, his 'compeers by night,' nor his 'affable familiar ghost' were powerful enough to defeat him."}, {"front": "What is the true reason for the speaker's silence, revealed in the couplet of Sonnet 86?", "back": "When the youth's 'countenance fill’d up his line' (the youth gave himself elsewhere), the speaker lost his subject and thus 'lacked matter.'"}, {"front": "What does 'inhearse' mean in Sonnet 86?", "back": "To enclose as in a hearse or coffin; to bury alive. It's a vivid and unusual word suggesting the rival's verse entombed the speaker's ripe thoughts."}, {"front": "Describe the 'affable familiar ghost' mentioned in Sonnet 86.", "back": "An easy to speak with, courteous, pleasant spirit or demon, possibly implying a claim of supernatural inspiration or a muse used by the rival poet."}, {"front": "How do Sonnets 83 and 84 both emphasize the idea of the youth as 'his own best text'?", "back": "Sonnet 83 argues the youth's living presence outpaces any praise, and Sonnet 84 states the highest praise is 'you alone are you,' both insisting that faithful representation is key."}, {"front": "According to the 'connections' section, how does the theme of 'silence' evolve for the speaker across the Rival Poet sequence (Sonnets 80, 83, 85, 86)?", "back": "It grows from an embarrassment (80) into an argument for reverent restraint (83), then a claim of deeper, wordless love (85), and finally into a"}, {"front": "What Renaissance concept is connected to the idea in Sonnet 84 that a poet's greatest skill is accurate reproduction of what nature has made perfect?", "back": "Mimesis, the imitation or representation of reality. Aristotle argued art was fundamentally imitative, and here the speaker suggests pure imitation is the highest achievement for the youth."}, {"front": "What does a 'modern quill' signify in Sonnet 83?", "back": "A contemporary writer's pen. 'Modern' in Shakespeare's usage often carries a slight tone of dismissal, implying 'ordinary' or 'of the current fashion,' suggesting even the best current poet falls short."}, {"front": "Explain 'lean penury' as used in Sonnet 84.", "back": "Extreme poverty; thin, meager want. A pen that fails to find some praise for its subject is 'lean' or intellectually bankrupt."}, {"front": "What does the 'golden quill' signify in Sonnet 85?", "back": "A precious, excellent writer's pen. The phrase combines a literal image of wealth with a figurative one of superior poetic craft."}, {"front": "How does the 'proud full sail' metaphor in Sonnet 86 relate to earlier sonnets?", "back": "It returns with greater force and grandeur, echoing the nautical metaphor of Sonnet 80, where the rival's poetry is depicted as a magnificent ship in full canvas, making for its prize."}, {"front": "What does 'astonished' mean in Sonnet 86?", "back": "Struck with wonder and awe (stronger than modern usage), indicating being profoundly affected or overwhelmed, though the speaker dismisses its power to silence him."}, {"front": "According to Sonnet 85, what is the significance of the speaker's love holding 'his rank before' words?", "back": "It claims that his unspoken love and thoughts are prior to and more significant than any rival's verbal tribute, placing it higher in the hierarchy of true devotion."}, {"front": "What is the overall tone modulation discussed in the connections for Sonnet 85 regarding the speaker's poetic powers?", "back": "The sequence moves between confidence (as in Sonnets 81 and 55) and self-deprecation (as with the 'unlettered clerk' metaphor), which is noted as one of the most human qualities of the Rival Poet group."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
