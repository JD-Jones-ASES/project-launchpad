<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare&#x27;s Sonnets: A Reading Companion &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Shakespeare_Sonnets">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary focus of Sonnets 100-104, as indicated by the section title 'Constancy and the Muse'?", "back": "The speaker's sustained love for the beloved and the role of poetic inspiration (the Muse) in immortalizing that love and beauty."}, {"front": "In Sonnet C (100), what does 'fury' signify in the context of the Muse?", "back": "Poetic frenzy, or the divine inspiration of the Muses in classical tradition. It implies the Muse's sacred fire has been misspent."}, {"front": "Why does the speaker of Sonnet C (100) reproach his Muse?", "back": "For her long silence and for wasting her poetic powers on 'worthless' subjects, neglecting the beloved who gives her 'all her might'."}, {"front": "What urgent command does the speaker give his Muse in Sonnet C (100) and what is its purpose?", "back": "He commands her to 'Rise' and 'my love’s sweet face survey' to identify any signs of age, so poetry can rescue his beauty from oblivion before Time destroys it."}, {"front": "How does Shakespeare's portrayal of the Muse in Sonnet C (100) deviate from traditional epic invocations?", "back": "Instead of a lofty figure, Shakespeare's Muse is depicted as a 'delinquent' or 'truant,' who is playfully but urgently scolded for her neglect."}, {"front": "Which earlier sonnets does the image of Time's 'scythe and crooked knife' in Sonnet C (100) echo?", "back": "Sonnet 60 ('And nothing stands but for his scythe to mow') and Sonnet 73."}, {"front": "In Sonnet CI (101), explain the phrase 'truth in beauty dy’d'.", "back": "It means truth dyed (colored) in beauty, signifying truth embodied in a beautiful form. The beloved is a living fusion of truth and beauty."}, {"front": "What 'excuse' does the speaker imagine the Muse offering for her silence in Sonnet CI (101)?", "back": "That the beloved is so perfectly beautiful that truth and beauty are already fixed in him, requiring no poetic 'colour' or 'pencil' to display them."}, {"front": "How does the speaker refute the Muse's imagined excuse in Sonnet CI (101)?", "back": "He argues that even if the beloved needs no praise for himself, the Muse still has a duty to immortalize him and preserve his beauty for future ages, not just to flatter."}, {"front": "How does Sonnet CI's (101) idea that poetry outlasts 'gilded tombs' connect to an earlier sonnet?", "back": "It connects to Sonnet 55 ('Not marble, nor the gilded monuments / Of princes, shall outlive this powerful rime'), emphasizing poetry's superior power of preservation."}, {"front": "In Sonnet CII (102), what does it mean for love to be 'merchandiz'd'?", "back": "It means love is turned into merchandise or made commercial, implying it is cheapened, public, and ultimately less valuable when constantly proclaimed."}, {"front": "What new, gentler explanation does the speaker offer for his poetic silence in Sonnet CII (102)?", "back": "That love constantly proclaimed cheapens itself, and silence can paradoxically be the highest compliment, preserving the rarity and sweetness of his praise."}, {"front": "To whom does the speaker compare himself in Sonnet CII (102) to explain his silence?", "back": "Philomel, the nightingale, who sings freely in spring but falls quiet as summer matures, not because she loves the season less, but because her song would be lost among the abundance of other sounds."}, {"front": "According to Sonnet CII (102), why does the speaker 'hold his tongue' like Philomel?", "back": "He does so not from indifference, but because 'sweets grown common lose their dear delight.' He wishes not to 'dull' the beloved with incessant praise, thereby preserving its special value."}, {"front": "In Sonnet CIII (103), what does 'poverty' refer to regarding the Muse?", "back": "Artistic insufficiency or poor quality of verse. The Muse is said to produce thin, inadequate poetry compared to the subject."}, {"front": "What surprising conclusion does the speaker reach in Sonnet CIII (103) regarding his verse and the beloved?", "back": "His verse is simply unequal to the subject. The beloved's face, seen in a mirror, shows more than any poem could capture, making his 'blunt invention' seem insufficient."}, {"front": "How does the speaker use the mirror conceit in Sonnet CIII (103) to deliver a high compliment to the beloved?", "back": "He implies that to keep writing praise would 'mar' what is already perfect, suggesting the beloved transcends art, and his own mirror reflects more beauty than the poet's words can convey."}, {"front": "Name two other sonnets that use the mirror conceit similar to Sonnet CIII (103).", "back": "Sonnet 3 ('Look in thy glass and tell the face thou viewest') and Sonnet 77 ('Thy glass will show thee how thy beauties wear')."}, {"front": "Despite the passage of time, what does the speaker assert about the beloved in Sonnet CIV (104)?", "back": "He declares, 'To me, fair friend, you never can be old,' claiming the beloved's beauty still seems the same as when he first saw it, despite three years passing."}, {"front": "How many years have passed between the speaker's first seeing the beloved and the writing of Sonnet CIV (104)?", "back": "Three years, explicitly marked by 'Three winters cold,' 'three summers’ pride,' 'Three beauteous springs,' and 'Three April perfumes in three hot Junes burn’d'."}, {"front": "In Sonnet CIV (104), how does the speaker acknowledge the subtle, imperceptible passage of time on beauty?", "back": "He notes that 'beauty like a dial-hand, / Steals from his figure, and no pace perceiv’d,' suggesting that beauty's decline is gradual, silent, and hard to detect by the eye, yet it is happening."}, {"front": "What is the speaker's final message to 'age unbred' (future generations) in Sonnet CIV (104)?", "back": "'Ere you were born was beauty’s summer dead,' implying that the beloved's beauty represented the pinnacle of loveliness, and future generations will only know a lesser, post-prime beauty."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
