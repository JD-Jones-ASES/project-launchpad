    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 11, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "What is a 'word family' in linguistics?", "back": "A word family is a group of words that share a common root or base word, and often related meanings. They are formed by adding prefixes, suffixes, or inflections to the base word."}, {"front": "What do words within a family typically share to show their relationship?", "back": "Words within a family typically share a common root or base word, which carries the core meaning, and often display morphological similarities through shared affixes."}, {"front": "How are new words typically formed within a word family?", "back": "New words within a family are typically formed by adding prefixes (beginnings) or suffixes (endings) to the base or root word, a process known as affixation."}, {"front": "Provide an example of a word family centered around the base word 'play'.", "back": "The word family for 'play' includes words like: play, player, playing, plays, playful, playfully, replay, unplayed."}, {"front": "What are two key benefits of understanding word families for vocabulary development?", "back": "Understanding word families helps expand vocabulary efficiently by recognizing patterns and related meanings, and it aids in inferring the meaning of unfamiliar words once the base word is known."}, {"front": "How can knowledge of word families improve reading comprehension?", "back": "Knowledge of word families improves reading comprehension by allowing readers to quickly recognize connections between words, decode new words, and grasp the nuances of meaning within a text."}, {"front": "Explain the role of 'prefixes' in forming words within a family, and give an example.", "back": "Prefixes are morphemes added to the beginning of a base word to create a new word, often changing its meaning. For example, 're-' in 'rewrite' changes the meaning of 'write' to 'write again'."}, {"front": "Explain the role of 'suffixes' in forming words within a family, and give an example.", "back": "Suffixes are morphemes added to the end of a base word to create a new word, often changing its grammatical function or part of speech. For example, '-er' in 'teacher' changes the verb 'teach' to a noun (the person who teaches)."}, {"front": "What is the distinction between a 'root word' and a 'base word' in the context of word families?", "back": "A root word is a fundamental linguistic unit that cannot be broken down further (e.g., 'ject' in 'project'). A base word is a standalone word to which affixes can be added (e.g., 'happy' in 'unhappy'). All base words are roots, but not all roots are base words."}, {"front": "Which branch of linguistics specifically studies word formation, including the creation of word families?", "back": "Morphology is the branch of linguistics that studies the internal structure of words and how words are formed, including the processes of derivation and inflection that build word families."}, {"front": "What is 'derivational morphology' and how does it contribute to word families?", "back": "Derivational morphology involves adding affixes to create new words with different meanings or grammatical categories (e.g., verb 'read' + '-able' = adjective 'readable'). It is a primary way word families expand."}, {"front": "How can identifying the base word help in decoding an unfamiliar word from a known word family?", "back": "Identifying the base word allows a reader to leverage their existing knowledge of that base word's meaning and pronunciation, helping them infer the meaning and sound of the unfamiliar word, even with added affixes."}, {"front": "Do all words in a word family always share the exact same core meaning? Explain.", "back": "While words in a family share a common root and related meanings, their specific meanings can diverge due to the added affixes. For example, 'act' (verb), 'action' (noun), and 'inactive' (adjective) all derive from 'act' but have distinct meanings."}, {"front": "Why is it often more efficient to learn words in families rather than as isolated vocabulary items?", "back": "Learning words in families is efficient because it leverages existing knowledge. By understanding one word and common affixes, a learner can unlock the meaning and spelling of multiple related words, accelerating vocabulary acquisition."}, {"front": "How do word families differ from synonyms?", "back": "Word families are groups of words sharing a common morphological root or base, demonstrating how words are built. Synonyms are different words that have similar or identical meanings, regardless of their morphological origins."}, {"front": "Give an example of a word family built around a common Latin root, 'port' (to carry).", "back": "A word family for 'port' includes words like: port (harbor), portable, transport, reporter, export, import, portfolio, porter, support."}, {"front": "How can understanding word families contribute to improved spelling?", "back": "Understanding word families can improve spelling by highlighting consistent patterns in base words and affixes. Recognizing common prefixes and suffixes and how they attach to base words can make spelling many related words more predictable."}, {"front": "What is the benefit of teaching word families to younger learners?", "back": "For younger learners, teaching word families reinforces phonics skills, helps them recognize patterns in written language, and provides a systematic way to build vocabulary and improve both reading fluency and comprehension."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
