    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "What is a root profile in a computing context?", "back": "A root profile refers to the configuration and environment settings associated with the superuser account (often named 'root') on a Unix-like operating system."}, {"front": "What is the primary purpose of a root profile?", "back": "Its primary purpose is to define the default shell, environment variables (like PATH), aliases, and other settings for the root user, ensuring consistent behavior and access to critical system utilities."}, {"front": "How does a root profile differ from a standard user profile?", "back": "A root profile grants unparalleled system-wide permissions, access to all files and processes, and the ability to modify core system configurations, unlike standard user profiles which have restricted access."}, {"front": "What are common elements found within a root profile?", "back": "Common elements include shell configuration files (e.g., .bashrc, .profile), environment variables (e.g., PATH, HOME), aliases, functions, and potentially custom scripts that dictate the root user's operating environment."}, {"front": "Why is managing the root profile critical for system security?", "back": "Because the root user has ultimate control over the system, any compromise or misconfiguration of the root profile can lead to complete system takeover, data loss, or malicious activity."}, {"front": "What might 'temporary root profile' imply in system administration, as suggested by 'tempor'?", "back": "A 'temporary root profile' could imply a temporary elevation of privileges to root for a specific task, a disposable root environment, or a system where the root user's settings are not persistently stored."}, {"front": "When might a system administrator use temporary root privileges?", "back": "Administrators might use temporary root privileges for performing specific maintenance tasks, system recovery, installing critical updates, or troubleshooting, where full root access is needed for a limited duration."}, {"front": "What are the security risks associated with temporary root access?", "back": "If not properly managed, temporary root access can still be exploited if the session is hijacked, if the user makes errors while operating with elevated privileges, or if the temporary access is not revoked promptly."}, {"front": "What is a best practice for interacting with the root profile?", "back": "A best practice is to avoid direct login as root. Instead, use tools like 'sudo' to gain temporary root privileges for specific commands or switch to the root user only when absolutely necessary and for limited periods."}, {"front": "Explain the principle of least privilege in relation to root profiles.", "back": "The principle of least privilege dictates that users (including administrators) should only be granted the minimum necessary permissions to perform their tasks, minimizing the use and exposure of the powerful root profile."}, {"front": "How does system auditing relate to root profile activity?", "back": "System auditing tracks all actions performed by the root user or with root privileges, providing a comprehensive forensic trail for security investigations, compliance, and identifying unauthorized activities."}, {"front": "Why are environment variables crucial in a root profile?", "back": "Environment variables define the operating environment for root, influencing how commands are executed, where system binaries are located (e.g., via the PATH variable), and other critical system behaviors."}, {"front": "How can the shell specified in a root profile impact system administration?", "back": "The chosen shell (e.g., bash, zsh) determines the command-line interface, scripting capabilities, and available features for the root user, directly affecting administrative efficiency and functionality."}, {"front": "Can a root profile be customized, and why might an administrator do so?", "back": "Yes, administrators can customize it to include specific aliases, functions, or environmental settings for efficiency, but this should be done cautiously to avoid introducing security vulnerabilities or system instability."}, {"front": "Why is it important to back up root profile configurations?", "back": "Backing up ensures that critical root settings can be restored in case of accidental deletion, corruption, or system migration, preventing potential system downtime or misconfiguration."}, {"front": "What mechanisms primarily control access to the root profile?", "back": "Access is controlled primarily through strong password authentication, robust 'sudo' configuration, and appropriate file permissions on the root user's home directory and shell configuration files."}, {"front": "What are the network-related security considerations for root profiles in a networked environment?", "back": "In a networked environment, compromised root credentials can grant attackers control over critical network services, sensitive data, and other networked systems, making root profile security paramount."}, {"front": "How might a corrupted root profile be recovered?", "back": "Recovery typically involves booting into a rescue mode or using an alternate user with 'sudo' access to edit or restore the root user's configuration files from a backup or a default system template."}, {"front": "What is an 'immutable root' system, and how does it relate to root profiles?", "back": "An immutable root system's core filesystem is read-only, which makes it inherently harder to alter the root profile's base configuration directly, thereby enhancing security and system stability against tampering."}, {"front": "How might root profiles be involved in system automation?", "back": "While direct automation as root is generally discouraged, scripts executed with elevated privileges (via 'sudo' or similar) effectively operate under a temporary root profile to perform automated system management tasks."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
