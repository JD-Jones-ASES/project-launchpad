    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is generally understood by a 'root profile' in system administration or security contexts?", "back": "A 'root profile' typically refers to the highest level of administrative privileges on a computer system, granting full control over the operating system, its configurations, and all files."}, {"front": "What kind of access does a root profile usually grant?", "back": "A root profile grants unrestricted access, allowing for creation, deletion, and modification of any file or process, installation of software, and management of user accounts."}, {"front": "Why is the secure management of a root profile critical?", "back": "Secure management is critical because a compromised root profile can lead to complete system takeover, data breaches, service disruptions, and other severe security incidents."}, {"front": "How does a root profile differ from a standard user profile?", "back": "A root profile possesses omnipotent system-wide privileges, whereas a standard user profile has limited permissions, usually restricted to their own home directory and specific applications."}, {"front": "List some common security best practices for managing root profiles.", "back": "Best practices include strong, unique passwords; multi-factor authentication; restricting direct root login; using 'sudo' for elevated privileges; and logging/monitoring root activity."}, {"front": "In what way might 'tempor' relate to a root profile?", "back": "'Tempor' might imply 'temporal' or 'temporary,' suggesting the use of temporary or time-bound root access, often granted for specific tasks and then revoked to minimize exposure."}, {"front": "What are the primary risks associated with an unmanaged or poorly secured root profile?", "back": "Risks include unauthorized system access, data corruption or exfiltration, installation of malicious software, and the ability to cover tracks after an attack."}, {"front": "Explain the concept of 'least privilege' in the context of root profiles.", "back": "Least privilege dictates that users and processes should only be granted the minimum necessary permissions to perform their required tasks, meaning root access should be avoided unless absolutely essential."}, {"front": "Describe a scenario where 'temporal root access' would be appropriate.", "back": "Temporal root access would be appropriate for a system administrator performing a critical system upgrade or troubleshooting an outage, where full control is needed for a limited, defined period."}, {"front": "What tools or mechanisms are often used to manage elevated privileges, avoiding direct root login?", "back": "Tools like 'sudo' on Unix-like systems, or Privileged Access Management (PAM) solutions, are used to grant temporary, auditable elevated privileges without sharing the root password directly."}, {"front": "Why is auditing and logging of root profile activity essential?", "back": "Auditing and logging help detect suspicious activity, investigate security incidents, provide accountability, and ensure compliance with security policies and regulations."}, {"front": "How does Multi-Factor Authentication (MFA) enhance the security of root profiles?", "back": "MFA adds an extra layer of security by requiring more than one form of verification (e.g., password + code from a device), significantly reducing the risk of unauthorized access even if the password is stolen."}, {"front": "What is a 'break-glass' root account, and when is it typically used?", "back": "A 'break-glass' account is a highly privileged emergency account, separate from regular admin accounts, used only in extreme situations (e.g., all other admin access is lost) and subject to strict controls and monitoring."}, {"front": "What are the immediate implications of a compromised root profile for an organization?", "back": "Immediate implications include potential loss of control over the affected system(s), exposure of sensitive data, disruption of services, and a severe breach of trust and security."}, {"front": "How can system administrators restrict root access effectively?", "back": "Administrators can restrict root access by disabling direct root logins, implementing 'sudo' with fine-grained controls, enforcing strong password policies, and using PAM solutions."}, {"front": "What are 'sudo' privileges and their relation to root profiles?", "back": "'sudo' (superuser do) privileges allow authorized users to execute commands with root-level permissions, enabling granular control over which commands can be run as root by whom, without needing the actual root password."}, {"front": "Why is a robust password policy particularly important for root profiles?", "back": "A robust password policy for root profiles is vital because these accounts are high-value targets; strong, complex, and regularly changed passwords make brute-force attacks and credential theft more difficult."}, {"front": "What are the security benefits of discouraging direct root login?", "back": "Discouraging direct root login (e.g., via SSH) prevents attackers from directly targeting the 'root' username, forcing them to compromise a less privileged account first, which offers more time for detection."}, {"front": "How do cloud environments (e.g., AWS, Azure) typically manage 'root' equivalent access?", "back": "Cloud environments often use a 'root user' account during initial setup but strongly recommend creating separate Identity and Access Management (IAM) users with specific roles and least privilege, and rarely using the root user for daily tasks."}, {"front": "What is a Privileged Access Management (PAM) solution and its role in root profile security?", "back": "A PAM solution is a technology that helps organizations manage, monitor, and audit privileged accounts (like root), enforcing policies, rotating passwords, and providing secure access without direct credential exposure."}, {"front": "How can comprehensive logging assist in monitoring root profile activities?", "back": "Comprehensive logging records every action taken by the root profile, including commands executed, files accessed, and changes made, enabling security teams to monitor for anomalous behavior and conduct forensics."}, {"front": "Distinguish between an OS root profile and an application root profile.", "back": "An OS root profile controls the entire operating system, while an application root profile (e.g., 'sa' in a database) has ultimate control only within the scope of a specific application or database."}, {"front": "Identify common attack vectors targeting root profiles.", "back": "Common attack vectors include brute-force attacks, phishing for credentials, exploiting unpatched vulnerabilities, social engineering, and malware designed to escalate privileges."}, {"front": "How does Role-Based Access Control (RBAC) influence root profile management?", "back": "RBAC defines permissions based on a user's role within an organization, allowing administrators to assign specific, limited privileges for certain tasks, reducing the need for direct root access."}, {"front": "What considerations are important when revoking root access from an individual?", "back": "Considerations include ensuring continuity of operations, reviewing completed tasks for proper documentation, securing any remaining credentials, and auditing for any lingering access or unauthorized activity."}, {"front": "Describe the general lifecycle of a secure root profile.", "back": "The lifecycle includes secure creation, restricted access and usage, continuous monitoring, regular auditing, and secure deprecation or rotation of credentials when necessary."}, {"front": "What regulatory compliance issues might arise from inadequate root profile management?", "back": "Inadequate management can lead to violations of regulations like GDPR, HIPAA, PCI DSS, or internal company policies, resulting in fines, legal action, and reputational damage due to data breaches."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
