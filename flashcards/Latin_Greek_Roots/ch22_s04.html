<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 22, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary meaning of the Greek root 'geo-'?", "back": "The primary meaning of the Greek root 'geo-' is 'earth' or 'land'."}, {"front": "Define 'word family' in the context of a linguistic root like 'geo-'.", "back": "A word family is a group of words that share a common root or base word, with related meanings often formed by adding prefixes or suffixes. For 'geo-', it includes words related to 'earth' or 'land'."}, {"front": "Which field of study literally means 'earth-description' or 'earth-writing'?", "back": "Geography (from Greek 'geo-' meaning earth + 'graphein' meaning to write/describe)."}, {"front": "What does a 'geologist' study?", "back": "A geologist studies the Earth's physical structure, substance, history, and the processes that act upon it (from 'geo-' + 'logos' meaning study)."}, {"front": "Explain the role of 'geo-' in the word 'geometry'.", "back": "In 'geometry' ('geo-' + 'metron' meaning measure), 'geo-' refers to 'earth' or 'land'. Historically, geometry originated from the practical need to measure land and areas, especially in ancient Egypt after Nile floods."}, {"front": "What is 'geothermal' energy?", "back": "Geothermal energy is heat energy generated and stored in the Earth (from 'geo-' + 'therme' meaning heat)."}, {"front": "Describe a 'geodesic' dome.", "back": "A geodesic dome is a spherical or hemispherical shell structure, often made of triangular elements, designed to be lightweight and extremely stable (from 'geo-' + 'daiein' meaning to divide, implying Earth-dividing lines)."}, {"front": "What is the meaning of 'geocentric'?", "back": "Geocentric describes a model or view that places the Earth at the center of the universe or system (from 'geo-' + 'kentron' meaning center)."}, {"front": "How does 'geophysics' combine the study of earth and physics?", "back": "Geophysics applies the principles of physics to study the Earth, including its internal structure, magnetic and gravitational fields, seismic activity, and surface phenomena (from 'geo-' + 'physikos' meaning natural)."}, {"front": "What does the name 'George' mean, and how does it relate to 'geo-'?", "back": "The name 'George' means 'earth-worker' or 'farmer' (from Greek 'georgos', combining 'geo-' with 'ergon' meaning work). It relates to tilling the land."}, {"front": "Differentiate between 'geography' and 'geology'.", "back": "Geography is the study of the Earth's physical features, atmosphere, population, and phenomena, focusing on *description* and *spatial distribution*. Geology is the study of the Earth's physical structure, substance, history, and processes, focusing on *composition* and *formation*."}, {"front": "What is an 'apogee'? How does 'geo-' apply here?", "back": "Apogee is the point in the orbit of an object (like the Moon or a satellite) where it is farthest from the Earth (from 'apo-' meaning away from + 'geo-' meaning Earth)."}, {"front": "What is a 'perigee'?", "back": "Perigee is the point in the orbit of an object (like the Moon or a satellite) where it is closest to the Earth (from 'peri-' meaning near + 'geo-' meaning Earth)."}, {"front": "Give an example of a 'geode'.", "back": "A geode is a hollow, globular rock formation with a cavity lined with crystals, such as quartz or amethyst (from Greek 'geoides' meaning Earth-like, referring to its rounded shape)."}, {"front": "What does 'geopolitical' refer to?", "back": "Geopolitical refers to the influence of geographical factors (like location, resources, climate) on the politics and foreign policy of a state or region (from 'geo-' + 'politikos' meaning relating to citizens/state)."}, {"front": "How does the concept of a 'word family' help in understanding new vocabulary?", "back": "Understanding a word family allows you to recognize common roots and affixes, which provides clues to the meaning of new, unfamiliar words. If you know 'geo-' means 'earth', you can infer the meaning of many related terms."}, {"front": "Identify two words derived from 'geo-' that relate to the Earth's internal structure.", "back": "Geology and Geophysics are two words related to the Earth's internal structure."}, {"front": "Identify two words derived from 'geo-' that relate to the Earth's surface or features.", "back": "Geography and Geodesy are two words related to the Earth's surface or features."}, {"front": "What is 'geodesy'?", "back": "Geodesy is the scientific discipline that deals with the measurement and representation of the Earth, including its gravitational field, its three-dimensional time-varying shape in space, and its variations (from 'geo-' + 'daiein' meaning to divide)."}, {"front": "In what context might you encounter 'geosynchronous' orbit?", "back": "You might encounter 'geosynchronous' orbit when discussing satellites that orbit the Earth at the same rate as the Earth's rotation, remaining above the same longitude (from 'geo-' + 'syn-' meaning together + 'chronos' meaning time)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
