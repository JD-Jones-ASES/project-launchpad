<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is generally meant by a 'root profile' in a botanical context?", "back": "A root profile refers to the overall spatial arrangement, depth, density, and branching pattern of a plant's root system within the soil."}, {"front": "Identify the primary functions of a plant's root system.", "back": "Anchorage of the plant, absorption of water and mineral nutrients from the soil, storage of food reserves, and synthesis of certain hormones."}, {"front": "Distinguish between a taproot system and a fibrous root system, providing an example of a plant for each.", "back": "A taproot system has a single, large, central root (e.g., carrot, dandelion) from which smaller lateral roots branch. A fibrous root system consists of many thin, branching roots of similar size (e.g., grasses, corn) that form a dense network."}, {"front": "What environmental factors most significantly influence the development and architecture of a root profile?", "back": "Key factors include soil type (texture, structure), water availability, nutrient content, soil pH, aeration, and temperature."}, {"front": "Explain the role of root hairs in the efficiency of a root profile.", "back": "Root hairs are tiny, epidermal outgrowths that dramatically increase the surface area of roots, enhancing the absorption of water and mineral nutrients from the soil."}, {"front": "How does soil compaction affect root growth and the overall root profile?", "back": "Soil compaction reduces pore space, increasing mechanical resistance to root penetration and decreasing oxygen availability, thereby inhibiting root growth, reducing depth, and leading to shallower, less branched root systems."}, {"front": "Define 'adventitious roots' and provide an example of their function.", "back": "Adventitious roots are roots that develop from parts of the plant other than the radicle or existing roots, such as stems or leaves. Examples include prop roots of corn for structural support or adventitious roots on cuttings for propagation."}, {"front": "Discuss the symbiotic relationship of mycorrhizae and its impact on a plant's root profile.", "back": "Mycorrhizae are symbiotic associations between plant roots and fungi. The fungi extend the root's absorptive surface area, improving the uptake of water and nutrients (especially phosphorus), while the plant provides sugars to the fungus."}, {"front": "How does water availability influence the typical depth of a plant's root profile?", "back": "In environments with limited surface water, plants often develop deeper root systems to access water tables or moisture reserves at greater depths. Conversely, in consistently moist soils, roots may remain shallower."}, {"front": "What is the significance of root exudates in the rhizosphere, and how do they influence the root profile's environment?", "back": "Root exudates are organic compounds (sugars, amino acids, organic acids) released by roots into the soil. They play a crucial role in shaping the rhizosphere microbial community, altering nutrient availability, and influencing soil chemical properties."}, {"front": "Why is studying root profiles important for sustainable agriculture?", "back": "Understanding root profiles helps optimize irrigation and fertilization strategies, select drought-tolerant crop varieties, improve nutrient use efficiency, and minimize soil erosion, leading to more sustainable agricultural practices."}, {"front": "Describe the concept of 'root architecture plasticity'.", "back": "Root architecture plasticity refers to the ability of a plant's root system to modify its growth, branching patterns, and depth in response to varying environmental conditions, such as localized nutrient patches or water stress."}, {"front": "How does soil texture (e.g., clay vs. sand) typically influence root penetration and branching?", "back": "Sandy soils generally allow for deeper root penetration due to larger pore spaces, but may offer fewer nutrients. Clay soils can restrict root growth due to fine texture, compaction, and high mechanical resistance, but often hold more nutrients and water."}, {"front": "What is the ecological importance of extensive root profiles in preventing soil erosion?", "back": "Extensive root profiles bind soil particles together, forming a stable network that significantly increases soil aggregation and resistance to wind and water erosion, particularly on slopes or disturbed lands."}, {"front": "In what ways do root profiles contribute to ecosystem services beyond direct plant growth?", "back": "Root profiles contribute to carbon sequestration by adding organic matter to the soil, facilitate nutrient cycling, regulate water infiltration and drainage, and provide habitat for a diverse array of soil organisms."}, {"front": "Briefly explain one common method used by scientists to investigate root profiles in the field.", "back": "One common method is the 'soil core sampling' technique, where soil cylinders are extracted from different depths, and roots are washed out, separated, and then measured for biomass, length, or diameter."}, {"front": "How do plants typically adjust their root growth in response to localized nutrient-rich patches in the soil?", "back": "Plants exhibit 'root foraging' behavior, where they tend to proliferate and increase the density of lateral roots specifically within nutrient-rich patches, optimizing nutrient uptake from those specific areas."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
