    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 17, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is generally meant by a 'root profile' in an operating system context?", "back": "A 'root profile' typically refers to a collection of configurations, permissions, and security policies specifically applied to the root user or the root filesystem. It dictates how the most privileged user or system environment behaves and is secured."}, {"front": "What is the primary purpose of meticulously defining and managing a root profile?", "back": "The primary purpose is to enhance system security, manage the behavior of the root user or processes running with root privileges, and ensure overall system integrity and stability."}, {"front": "Name three types of information commonly included or controlled by a root profile.", "back": "Commonly included information types are: filesystem permissions (e.g., for root-owned directories), environment variables (like PATH), security policies (e.g., password complexity, login restrictions), and resource limits (ulimits)."}, {"front": "Why is the management of the root profile considered critical for system security?", "back": "The root user possesses ultimate control over the system. A misconfigured, compromised, or poorly managed root profile can lead to severe security vulnerabilities, including full system takeover, data breaches, and service disruption."}, {"front": "What is a key best practice for managing root access, often associated with root profile settings, to reduce risk?", "back": "A key best practice is to disable direct root login via SSH or console and instead use utilities like 'sudo' for administrative tasks. This provides an audit trail and requires explicit action for privilege escalation."}, {"front": "How can a misconfigured root profile contribute to privilege escalation vulnerabilities?", "back": "A misconfigured root profile might allow privilege escalation if it grants overly broad permissions to non-root users on root-owned files/scripts, or if it sets insecure environment variables that can be exploited by malicious processes."}, {"front": "In the context of a root profile, how can resource limits be enforced?", "back": "Resource limits (ulimits) can be enforced within the root profile to restrict the CPU time, memory, open files, or processes that the root user or root-spawned processes can consume, preventing denial-of-service attacks."}, {"front": "Explain the importance of audit trails in conjunction with root profile management.", "back": "Audit trails are crucial for logging all actions performed by the root user or processes escalated to root privileges. They provide a forensic record for security investigations, compliance, and identifying unauthorized activities or misconfigurations."}, {"front": "How does a root profile fundamentally differ from a standard user profile?", "back": "A root profile governs the highest-privileged user/environment with system-wide impact, affecting all users and processes. A standard user profile, in contrast, applies only to a specific non-privileged user and has limited scope."}, {"front": "Name an operating system security module that often interacts with or enforces aspects of a root profile.", "back": "SELinux (Security-Enhanced Linux) or AppArmor are examples of OS security modules that define and enforce mandatory access controls, which significantly influence and are part of the effective root profile by dictating what even root can do."}, {"front": "What are the potential consequences of making incorrect modifications to a critical root profile configuration?", "back": "Incorrect modifications can lead to severe consequences such as system instability, critical service failures, denial of service, security vulnerabilities, or even rendering the system unbootable."}, {"front": "How does the principle of least privilege apply to root profile management?", "back": "The principle of least privilege dictates that the root profile should be configured to grant only the absolute minimum permissions and capabilities necessary for the root user or root-privileged processes to perform their intended functions, thereby reducing the attack surface."}, {"front": "In a containerized environment, how might 'root profile' be interpreted differently from a host OS 'root profile'?", "back": "In containerization, the 'root profile' typically refers to the profile of the root user *within* the container. This is isolated and distinct from the host OS's root profile, operating with its own set of privileges and limitations, often restricted by the container runtime."}, {"front": "What role does the root profile play during software installation, especially for system-wide applications?", "back": "During software installation, the root profile dictates the permissions and locations where root-privileged installers can write files, create directories, or modify system configurations. It ensures that critical system areas are protected while allowing necessary changes."}, {"front": "Why is it crucial to back up critical root profile configurations regularly?", "back": "Backing up root profile configurations is crucial for disaster recovery. It allows administrators to quickly restore system security, functionality, and compliance in the event of accidental misconfiguration, system failure, or a security incident."}, {"front": "How do industry compliance standards (e.g., PCI DSS, HIPAA) often influence root profile management?", "back": "Compliance standards often mandate strict controls over privileged access, strong authentication for root accounts, comprehensive logging of root activities, and regular review of root configuration settings, all directly impacting root profile management."}, {"front": "What aspects of the shell environment are typically part of a root profile?", "back": "Key shell environment aspects include the PATH variable (defining where executables are searched), environment variables, shell aliases, history file settings, and default umask, all impacting the root user's interactive shell sessions and scripts."}, {"front": "What is the concept of an 'immutable root' and how does it relate to root profiles?", "back": "An 'immutable root' refers to a root filesystem that is read-only, making it extremely difficult to modify. It relates to root profiles by effectively making the core root configuration fixed and highly secure, preventing accidental or malicious changes to critical system files."}, {"front": "How does defining a robust root profile contribute to overall system hardening?", "back": "A robust root profile is a cornerstone of system hardening by reducing the attack surface, limiting the capabilities of a compromised root account, enforcing secure defaults, and ensuring that privileged actions are tightly controlled and auditable."}, {"front": "What types of tools might an administrator use to manage various aspects of a root profile?", "back": "Administrators might use tools like `visudo` (for sudoers file), `chmod` and `chown` (for permissions), `ulimit` (for resource limits), PAM configuration tools (`pam-config`), and configuration management systems (e.g., Ansible, Puppet, Chef) to manage a root profile."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
