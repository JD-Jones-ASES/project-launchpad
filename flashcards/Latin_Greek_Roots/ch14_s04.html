    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;

        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

        </div>

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;

        </div>

    <script>
    var CARDS = [{"front": "What is a 'word family' in the context of language studies?", "back": "A word family is a group of words that share a common root or base word, along with various prefixes and suffixes, leading to related meanings."}, {"front": "What is a 'root word'?", "back": "A root word is the most basic part of a word, carrying its core meaning, to which prefixes and suffixes can be added."}, {"front": "What is the origin and meaning of the Latin root word 'aqua'?", "back": "The root 'aqua' comes from Latin and means 'water'."}, {"front": "Define 'aquarium' and explain how its meaning relates to the root 'aqua'.", "back": "An aquarium is a transparent tank of water in which fish and other aquatic animals or plants are kept. The 'aqua' root directly indicates its primary function as a water-holding environment."}, {"front": "What does 'aquatic' mean? Provide an example of its use.", "back": "'Aquatic' refers to something relating to water, living in or near water, or taking place in water. Example: Aquatic plants or aquatic sports."}, {"front": "Describe the primary function of an 'aqueduct' and how its name reflects this.", "back": "An aqueduct is a channel or bridge-like structure designed to carry water over a long distance. Its name combines 'aqua' (water) and 'ducere' (to lead), meaning 'to lead water'."}, {"front": "Explain the meaning of 'aquamarine' and its connection to the root 'aqua'.", "back": "'Aquamarine' refers to a blue-green color, similar to the color of the sea. It also names a gemstone of this color. The 'aqua' part highlights its water-like hue."}, {"front": "In what context might 'aqueous' be used, and what does it signify?", "back": "'Aqueous' is often used in chemistry to describe a solution in which water is the solvent. It signifies 'containing water' or 'dissolved in water'."}, {"front": "What is an 'aquifer'?", "back": "An aquifer is an underground layer of permeable rock, sand, or gravel that contains or transmits groundwater."}, {"front": "How does knowing the root 'aqua' help in understanding new vocabulary?", "back": "By knowing the root 'aqua', one can infer that any unfamiliar word containing it likely has a connection to water, helping to decode its meaning."}, {"front": "What is an 'aquanaut', and how does the word structure relate to 'astronaut'?", "back": "An aquanaut is an explorer or scientist who lives and works underwater. The structure is similar to 'astronaut' (star sailor), with 'aqua' replacing 'astro' (star) to denote water exploration."}, {"front": "What does the term 'subaquatic' mean? Identify the prefix and its meaning.", "back": "'Subaquatic' means existing or occurring underwater. The prefix 'sub-' means 'under' or 'below'."}, {"front": "Historically, what did the Latin phrase 'aqua vitae' refer to?", "back": "'Aqua vitae' literally means 'water of life' and historically referred to alcoholic spirits, particularly distilled liquors, believed to have medicinal properties."}, {"front": "How is 'aqualung' an example of a modern compound word using 'aqua'?", "back": "'Aqualung' is a modern compound word for SCUBA gear, combining 'aqua' (water) with 'lung' to describe a device allowing underwater breathing."}, {"front": "Compare and contrast 'marine' and 'aquatic' in terms of scope.", "back": "'Aquatic' is a broader term for anything related to water (freshwater or saltwater). 'Marine' specifically refers to things related to the sea or ocean (saltwater)."}, {"front": "Give an example of how 'aqua' might be used as a standalone word in English.", "back": "'Aqua' can be used as a standalone word, especially when referring to the color, as in 'The room was painted in a bright aqua'."}, {"front": "What is 'aqua regia' and why is its name ('royal water') significant?", "back": "'Aqua regia' is a highly corrosive mixture of nitric acid and hydrochloric acid, notable for its ability to dissolve noble metals like gold. Its name signifies its power over 'royal' metals."}, {"front": "Why are aquifers important, and what is a major environmental concern related to them?", "back": "Aquifers are vital natural reservoirs of groundwater. A major concern is their depletion due to overuse and the risk of pollution, which can contaminate a primary source of drinking water."}, {"front": "List two words related to water that do *not* contain the 'aqua' root.", "back": "Examples include: hydraulic, hydration, hydro-electric, deluge, flood, river, lake."}, {"front": "How can the study of word families, like that of 'aqua', aid in vocabulary building?", "back": "Studying word families helps students understand how words are formed, recognize common roots, prefixes, and suffixes, and infer the meanings of new, unfamiliar words."}, {"front": "What biological adaptation might an aquatic animal have that distinguishes it from a terrestrial one?", "back": "Aquatic animals often have gills for breathing underwater, fins or webbed feet for propulsion, or streamlined bodies for efficient movement through water."}, {"front": "Can the root 'aqua' be combined with prefixes other than 'sub-'? Provide an example if possible.", "back": "While 'aqua' often acts as a root or part of a compound, prefixes can combine with words derived from 'aqua' (e.g., 'non-aquatic'). 'Subaquatic' is a direct combination of a prefix and 'aqua'."}, {"front": "In art or design, how might the concept of 'aqua' or water be represented?", "back": "In art or design, 'aqua' might be represented through blue-green color palettes, flowing lines, wave patterns, reflective surfaces, or imagery of aquatic life."}, {"front": "What is the primary characteristic of an 'aquafarm'?", "back": "An aquafarm is a facility where aquatic animals (like fish or shellfish) or plants are cultivated and harvested, essentially a 'water farm'."}, {"front": "If a scientist refers to a substance as having 'aquaphobic' properties, what would that imply about the substance?", "back": "If a substance is 'aquaphobic,' it would imply that it 'fears' water, meaning it repels water and does not mix with it."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
