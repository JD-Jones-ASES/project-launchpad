    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 16, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary meaning of the Latin root 'tempor'?", "back": "The primary meaning of the Latin root 'tempor' is 'time'."}, {"front": "Define 'temporal'.", "back": "Relating to worldly as opposed to spiritual affairs; relating to time."}, {"front": "Give an example of 'temporal' used in a scientific context.", "back": "The 'temporal lobe' of the brain is associated with processing auditory information and memory, among other functions, indicating a relationship to time-based processing."}, {"front": "What does 'temporary' mean?", "back": "Lasting for only a limited period of time; not permanent."}, {"front": "Provide an antonym for 'temporary'.", "back": "Permanent or lasting."}, {"front": "Define 'contemporary' as an adjective.", "back": "Living or occurring at the same time; belonging to or occurring in the present."}, {"front": "Define 'contemporary' as a noun.", "back": "A person or thing living or existing at the same time as another."}, {"front": "How might you describe modern art using 'contemporary'?", "back": "You might refer to 'contemporary art' as art produced in the present time or recent past, reflecting current trends and ideas."}, {"front": "What does it mean to 'temporize'?", "back": "To avoid making a decision or committing oneself in order to gain time; to delay or prevaricate."}, {"front": "What is the typical motivation behind someone choosing to 'temporize'?", "back": "The motivation is usually to gain time, often to buy time for strategic advantage, to avoid an immediate unpleasant decision, or to wait for a more favorable situation."}, {"front": "Define 'extempore'.", "back": "Spoken or done without preparation; impromptu."}, {"front": "Name a synonym for 'extempore'.", "back": "Impromptu, spontaneous, unprepared."}, {"front": "What is 'temporality'?", "back": "The state of existing within or having some relationship with time; the quality of being finite or limited by time."}, {"front": "What does 'tempo' refer to, particularly in music?", "back": "In music, 'tempo' refers to the speed at which a passage is or should be played. More generally, it means the rate or pace of any activity."}, {"front": "Where is the term 'tempo' commonly used outside of music?", "back": "'Tempo' is often used to describe the pace or speed of an event, an activity, a conversation, or even a game (e.g., 'the tempo of the debate was fast')."}, {"front": "What is the meaning of the Latin phrase 'pro tempore' (often shortened to 'pro tem')?", "back": "'For the time being' or 'for a limited time'."}, {"front": "Differentiate between 'temporal' and 'temporary'.", "back": "'Temporal' relates broadly to time itself or worldly matters, while 'temporary' specifically refers to something lasting for only a limited duration, implying impermanence."}, {"front": "What is a 'word family'?", "back": "A group of words that share a common root or base word, along with various prefixes and suffixes that modify their meaning and/or part of speech."}, {"front": "How does the root 'tempor' contribute to the meaning of 'extempore'?", "back": "'Extempore' comes from Latin 'ex tempore', meaning 'out of time' or 'without allowing time for preparation', directly linking to the root's meaning of time."}, {"front": "If a word contains the root 'tempor', what general concept can you infer it relates to?", "back": "You can infer that the word is likely related to the concept of 'time', its duration, or its passage."}, {"front": "Use 'temporary' in a sentence.", "back": "The construction project caused a temporary detour on the main road."}, {"front": "Use 'contemporary' as an adjective in a sentence.", "back": "The museum featured a fascinating exhibition of contemporary sculpture."}, {"front": "Use 'temporize' in a sentence.", "back": "Rather than making a hasty decision, the committee decided to temporize until all the data was collected."}, {"front": "Use 'extempore' in a sentence.", "back": "The speaker delivered an impressive extempore speech that captivated the audience."}, {"front": "Use 'temporal' in a sentence related to worldly matters.", "back": "Many philosophers debate the relationship between spiritual existence and our temporal lives."}, {"front": "How do prefixes or suffixes typically interact with a root like 'tempor' to form new words?", "back": "Prefixes (like 'ex-' in extempore) can specify a relationship to the root (e.g., 'out of time'), while suffixes (like '-ary', '-al', '-ize') often indicate a part of speech (adjective, verb) or a state/quality related to the root."}, {"front": "Give an example of a word family, not using 'tempor'.", "back": "The word family for 'act' includes: action, active, actor, react, enact, activate, activity."}, {"front": "What is the central idea conveyed by words stemming from the root 'tempor'?", "back": "The central idea is anything related to time—its passage, duration, limits, or specific points."}, {"front": "Which word from the 'tempor' family describes something that is relevant to the present moment?", "back": "Contemporary."}, {"front": "If you are trying to make a decision but keep delaying it to gather more information, what are you doing?", "back": "You are temporizing."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
