    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 14, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "What was the overall significance of water to ancient Rome?", "back": "Water was considered the lifeblood of Rome, representing an engineering challenge, a public service, and a source of civic pride."}, {"front": "What does the Latin word 'aqua' literally mean?", "back": "The Latin word 'aqua' simply means 'water'."}, {"front": "At the height of the Roman Empire, how many major aqueducts supplied the city of Rome?", "back": "Eleven great aqueducts carried fresh water into the city of Rome."}, {"front": "What was the primary purpose of the Roman aqueducts?", "back": "Aqueducts carried fresh water across miles of countryside into the city, supplying public fountains, bathhouses, and private homes."}, {"front": "Break down the word 'aqueduct' into its Latin roots and explain its combined meaning.", "back": "'Aqueduct' combines 'aqua' (water) and 'duct' (to lead), meaning a structure that 'leads water'."}, {"front": "What is an aquifer?", "back": "An aquifer is an underground layer of rock and sand that holds water, feeding wells and springs."}, {"front": "What Latin roots form the word 'aquifer' and what do they mean?", "back": "'Aquifer' comes from 'aqua' (water) and 'ferre' (to carry), meaning it 'carries water'."}, {"front": "What was the original meaning of the word 'aquarium,' and how has its meaning evolved?", "back": "Originally, an 'aquarium' was any container 'for water.' It later evolved to specifically mean a place where fish and sea creatures are displayed."}, {"front": "In what ways were the Romans considered an 'aquatic people'?", "back": "They were an 'aquatic people' due to their extensive use of water in their famous baths (thermae), courtyard fountains for the wealthy, and constantly flowing public latrines."}, {"front": "What were the Roman 'thermae,' and what characterized their water usage?", "back": "The Roman 'thermae' were famous baths that used millions of gallons of water daily."}, {"front": "From what Latin phrase does the gemstone 'aquamarine' derive its name, and why?", "back": "'Aquamarine' comes from 'aqua marina,' meaning 'sea water,' because its blue-green color resembles the sunlit sea."}, {"front": "What does the word 'subaqueous' mean, and what is its etymological structure?", "back": "'Subaqueous' means 'under water.' It combines the prefix 'sub-' (under) with the root 'aqua' (water)."}, {"front": "How is the word 'subaqueous' similar in structure to 'subterranean'?", "back": "Both words use the prefix 'sub-' (under) attached to a root describing a natural element ('aqua' for water, 'terra' for earth)."}, {"front": "Beyond its chemical symbol (H2O), how does the Latin root 'aqua' appear in everyday English today?", "back": "'Aqua' is used as the name of a blue-green color and appears in terms related to modern recreation, such as 'aqua park' and 'aqua jogging'."}, {"front": "Describe three different applications or uses of water in ancient Rome that highlight its importance.", "back": "Water was crucial for public services like fountains and bathhouses, for private luxury in homes and courtyards, and for sanitation in public latrines, all made possible by aqueducts."}, {"front": "What is the meaning of the Latin root 'duct,' as seen in 'aqueduct'?", "back": "The Latin root 'duct' means 'to lead'."}, {"front": "What is the meaning of the Latin root 'ferre,' as seen in 'aquifer'?", "back": "The Latin root 'ferre' means 'to carry'."}, {"front": "What does the Latin prefix 'sub-' mean, as seen in 'subaqueous'?", "back": "The Latin prefix 'sub-' means 'under'."}, {"front": "How does the word 'aqueduct' serve as a 'perfect example' of how roots combine?", "back": "It shows how two distinct roots, 'aqua' (water) and 'duct' (to lead), combine to create a single, precise meaning: a structure that 'leads water'."}, {"front": "Name specific public and private places that aqueducts supplied within Roman cities.", "back": "Aqueducts supplied public fountains, large public bathhouses (thermae), and private homes for wealthy citizens."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
