    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is a root profile?", "back": "A root profile describes the spatial distribution and characteristics of a plant's root system within the soil, including its depth, lateral spread, and density."}, {"front": "What key aspects are included in a typical root profile analysis?", "back": "Key aspects include root depth, lateral spread, biomass density, branching patterns, root diameter distribution, and the presence of root hairs or mycorrhizae."}, {"front": "Describe the main features of a taproot system.", "back": "A taproot system consists of a single, dominant main root that grows vertically downwards, with smaller lateral roots branching off it. It is common in dicots like carrots and dandelions."}, {"front": "What characterizes a fibrous root system?", "back": "A fibrous root system is characterized by a dense network of fine, branching roots that arise from the base of the stem, typically forming a mat close to the soil surface. It is common in monocots like grasses."}, {"front": "How does a plant's root profile contribute to its stability?", "back": "Deep and widespread root systems provide strong physical anchorage, preventing the plant from being toppled by external forces such as wind or heavy rainfall."}, {"front": "Explain the role of root profiles in water uptake.", "back": "Root hairs significantly increase the surface area for efficient water absorption, and the depth and spread of roots determine a plant's access to water reserves at various soil depths and lateral distances."}, {"front": "How does root architecture impact nutrient acquisition?", "back": "An extensive root profile with fine roots and symbiotic associations (e.g., mycorrhizae) increases the surface area and reach for absorbing essential mineral nutrients from the soil, especially those with low mobility."}, {"front": "How does soil texture influence a plant's root profile?", "back": "Looser, sandy soils allow for deeper and wider root penetration, while dense, clayey soils may restrict depth and encourage more lateral or shallow root growth due to compaction or poor aeration."}, {"front": "What effect does water scarcity have on root profiles?", "back": "Plants in arid environments often develop deeper root systems to access groundwater or more widespread lateral roots to capture surface moisture quickly after rainfall."}, {"front": "How might a nutrient-poor soil affect root development?", "back": "In nutrient-poor soils, plants may develop more extensive and finer root systems, or enhance symbiotic relationships with fungi, to forage for scarce nutrients more effectively over a larger volume of soil."}, {"front": "Give an example of how a root profile is an adaptation to a specific environment.", "back": "Desert plants (xerophytes) often have either extremely deep taproots to reach distant water tables or extensive shallow fibrous root systems to quickly absorb surface moisture from infrequent rains."}, {"front": "How do root profiles help prevent soil erosion?", "back": "Dense networks of roots bind soil particles together, increasing soil stability and cohesion, which significantly reduces the likelihood of soil erosion by wind or water runoff."}, {"front": "What is the impact of roots on soil structure?", "back": "Roots create macropores and channels as they grow and decompose, improving soil aeration, water infiltration, and drainage. They also contribute organic matter, enhancing soil aggregation and overall health."}, {"front": "Describe the root excavation method for studying root profiles.", "back": "The root excavation method involves carefully digging out the entire root system of a plant from the soil, allowing for direct observation and measurement of its depth, lateral spread, and branching patterns."}, {"front": "What are minirhizotrons and how are they used in root profile studies?", "back": "Minirhizotrons are transparent tubes inserted into the soil, allowing researchers to observe root growth, turnover, and dynamics non-destructively over time using a specialized camera or scanner."}, {"front": "How is core sampling used to assess root biomass?", "back": "Soil cores are taken at different depths and locations, and the roots are carefully washed out from the soil, dried, and weighed to estimate root biomass density and distribution within the soil profile."}, {"front": "What is the significance of mycorrhizae in a root profile?", "back": "Mycorrhizal fungi form symbiotic relationships with plant roots, effectively extending the root system's absorption area and significantly improving the plant's uptake of water and nutrients, particularly phosphorus."}, {"front": "What are root exudates and why are they important?", "back": "Root exudates are organic compounds (sugars, amino acids, organic acids) released by roots into the surrounding soil. They influence soil microbial communities, nutrient availability, and plant-plant interactions in the rhizosphere."}, {"front": "How can agricultural practices affect root profiles?", "back": "Agricultural practices such as tillage can damage roots and alter soil structure, while fertilization and irrigation can influence root depth, density, and overall architecture. Crop rotation also impacts the soil's root profile over time."}, {"front": "Do genetics play a role in determining a plant's root profile?", "back": "Yes, different plant species and even varieties within a species have genetically determined tendencies for specific root architectures and growth patterns, though these are strongly modified by environmental factors."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
