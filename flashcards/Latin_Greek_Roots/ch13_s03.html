    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define the term \"root profile.\"", "back": "A root profile refers to the three-dimensional spatial arrangement and architecture of a plant's root system within the soil, including its depth, density, distribution, and branching patterns."}, {"front": "What are the key components typically observed when analyzing a root profile?", "back": "Key components include root depth, lateral spread, root density, root biomass, branching patterns, and the distribution of different root orders within the soil."}, {"front": "Explain the significance of root profiles for plant water acquisition.", "back": "A deep and extensive root profile allows plants to access water from deeper soil layers, especially during dry periods, improving drought tolerance and overall water uptake efficiency."}, {"front": "How do root profiles impact nutrient uptake by plants?", "back": "Root profiles influence nutrient uptake by determining the volume of soil explored. A well-distributed and dense root system can efficiently scavenge essential nutrients, particularly those with low mobility in the soil."}, {"front": "List three environmental factors that significantly influence a plant's root profile development.", "back": "Significant environmental factors include soil type and structure (e.g., compaction, texture), water availability (e.g., rainfall, irrigation), and nutrient levels in the soil."}, {"front": "How do root profiles vary across different plant species?", "back": "Plant species exhibit diverse root profiles adapted to their specific ecological niches. Some develop deep taproot systems (e.g., carrots), while others have shallow, fibrous root systems (e.g., grasses)."}, {"front": "Name two common methods used to study root profiles in the field.", "back": "Common methods include destructive sampling (e.g., monolith or core sampling followed by root washing) and non-destructive methods like minirhizotrons (observing roots through transparent tubes) or ground-penetrating radar."}, {"front": "Describe the reciprocal relationship between root profiles and soil structure.", "back": "Roots penetrate and modify soil, creating pores and releasing organic matter that improves soil structure. In turn, good soil structure (e.g., friability, aeration) facilitates root growth and exploration."}, {"front": "Compare and contrast taproot and fibrous root systems in terms of their typical root profiles.", "back": "A taproot system typically has a single, dominant main root growing vertically downwards with smaller lateral roots, forming a deep profile. A fibrous root system consists of numerous slender roots of similar size originating from the stem, creating a shallower, more widespread profile."}, {"front": "What is the rhizosphere, and how is it related to the root profile?", "back": "The rhizosphere is the narrow region of soil directly influenced by root secretions and activity. It is an integral part of the root profile, representing the zone of most intense nutrient and water exchange, and microbial interaction."}, {"front": "How can a plant's root profile indicate its adaptation to drought conditions?", "back": "Plants adapted to drought often develop deep root profiles to access water from deeper soil layers, or highly plastic root systems that can rapidly proliferate in moist soil patches when available."}, {"front": "Explain how soil compaction affects a plant's root profile.", "back": "Soil compaction restricts root penetration and growth, often leading to shallower, more horizontally spread root profiles, reduced root biomass, and impaired water and nutrient uptake due to physical impedance and reduced oxygen."}, {"front": "Why is the modeling of root profiles important in agricultural and ecological research?", "back": "Modeling root profiles helps predict plant performance under different conditions, optimize irrigation and fertilization strategies, understand carbon cycling, and assess ecosystem stability and resilience."}, {"front": "What role do root profiles play in soil carbon sequestration?", "back": "Roots contribute significantly to soil organic carbon through their biomass, exudates, and turnover. Extensive and deep root profiles can sequester more carbon by adding organic matter to deeper soil layers and stabilizing soil aggregates."}, {"front": "How might a plant adjust its root profile in response to the availability of mobile vs. immobile nutrients?", "back": "For mobile nutrients (e.g., nitrate), roots may be less dense but explore a larger volume. For immobile nutrients (e.g., phosphorus), roots may increase density and branching in nutrient-rich patches, or grow deeper if the nutrient is found there."}, {"front": "Discuss the relationship between soil aeration and root profile development.", "back": "Good soil aeration is crucial for root respiration and growth. Poor aeration (e.g., waterlogging) can severely restrict root growth, often leading to shallower profiles and specialized root structures like aerenchyma in some species to cope with low oxygen."}, {"front": "How can root profiles influence inter-plant competition for resources?", "back": "Plants with more aggressive or efficient root profiles (e.g., deeper, denser, faster-growing) can outcompete neighboring plants for water and nutrients, influencing community structure and succession within an ecosystem."}, {"front": "How can agricultural practices influence desired root profiles for specific crops?", "back": "Practices like tillage (to reduce compaction), irrigation (to encourage deep rooting), fertilization placement, and cover cropping can be managed to encourage root profiles that optimize water and nutrient use efficiency and improve crop yield."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
