    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

                <div class="fc-keys">

    <script>
    var CARDS = [{"front": "What is generally understood as a 'root profile' in a technical computing context?", "back": "A root profile refers to the set of configurations, environment variables, and settings that define the operating environment for the 'root' superuser account on a system."}, {"front": "What is the primary purpose of a root profile?", "back": "Its primary purpose is to customize and define the root user's shell environment, including search paths for commands, aliases, functions, and other environment variables, for efficient and secure system administration."}, {"front": "List some common configuration files that contribute to a root user's profile on a Linux/Unix system.", "back": "Common files include ~/.bashrc, ~/.profile, ~/.cshrc, ~/.login, and system-wide files like /etc/profile, /etc/bash.bashrc, or /etc/csh.login."}, {"front": "Why is the `PATH` environment variable particularly critical within a root profile?", "back": "The `PATH` variable determines the directories where the shell searches for executable commands. An incorrectly configured or malicious `PATH` can lead to command hijacking and security vulnerabilities for the root user."}, {"front": "What are the key security implications of managing a root profile?", "back": "Misconfigurations can create security holes, allowing for privilege escalation, execution of malicious scripts, or unintended system changes. A secure root profile minimizes these risks."}, {"front": "How do shell aliases enhance a root profile, and what is a security concern regarding them?", "back": "Aliases provide shortcuts for frequently used commands, improving efficiency. A security concern is that malicious aliases could be used to execute unintended or harmful commands."}, {"front": "Give examples of essential environment variables commonly found in a root profile, besides `PATH`.", "back": "Examples include `HOME` (root's home directory), `SHELL` (default shell), `TERM` (terminal type), and `PS1` (shell prompt)."}, {"front": "Explain the difference between user-specific and system-wide profile settings that affect the root user.", "back": "User-specific settings (e.g., in ~/.bashrc) override or extend system-wide settings (e.g., in /etc/profile) which apply to all users, including root, by default."}, {"front": "What is a security best practice for customizing the root profile?", "back": "Minimize customizations, avoid adding untrusted directories to `PATH`, use absolute paths for critical commands, and regularly review profile files for unauthorized changes."}, {"front": "What does it mean to 'source' a profile file, and why is this important?", "back": "Sourcing a file means executing its commands within the current shell's context, rather than in a subshell. This allows changes (like new aliases or environment variables) to take effect immediately in the active session."}, {"front": "Compare a root user's profile with a regular user's profile in terms of impact and scrutiny.", "back": "A root profile has system-wide impact, making its security and integrity paramount. A regular user's profile typically only affects that user's environment. Root profiles receive much higher security scrutiny."}, {"front": "How does the `sudo` command interact with the root profile or environment variables?", "back": "`sudo` can be configured to preserve or reset environment variables when executing commands as another user (including root), depending on settings in the `/etc/sudoers` file (e.g., `env_reset` option)."}, {"front": "Distinguish how profile files are loaded for login shells versus non-login shells.", "back": "Login shells typically read /etc/profile, ~/.profile, ~/.bash_login, or ~/.cshrc. Non-login shells (e.g., a new terminal window) usually read ~/.bashrc or similar, but not the login-specific files."}, {"front": "What dangers can arise from malicious modifications to a root profile?", "back": "Malicious modifications can create backdoors, hijack commands (e.g., by placing a malicious executable earlier in the `PATH`), set up persistent attack vectors, or leak sensitive information."}, {"front": "How can one audit a root profile for potential security vulnerabilities?", "back": "Audit by carefully reviewing all profile-related files (e.g., ~/.bashrc, /etc/profile) for suspicious commands, unexpected `PATH` entries, unusual aliases, or references to untrusted scripts."}, {"front": "What is the purpose of `umask` in a root profile?", "back": "The `umask` command sets the default file mode creation mask, determining the default permissions for new files and directories created by the root user, which is crucial for system security."}, {"front": "Are there special considerations for root profiles during remote logins (e.g., via SSH)?", "back": "Yes, SSH daemon configuration (e.g., `PermitRootLogin`) and specific SSH environment settings (e.g., from `/etc/ssh/sshd_config`) can influence or restrict how the root profile is loaded or what environment variables are passed."}, {"front": "How might a well-designed root profile contribute to the principle of least privilege?", "back": "By keeping the default root environment minimal, only including necessary tools and paths, and encouraging the use of `sudo` for specific, controlled actions rather than direct root logins for every task."}, {"front": "What is a 'safe PATH' for the root user, and why is it important?", "back": "A 'safe PATH' for root should typically include only absolute paths to trusted system binary directories (e.g., /sbin, /usr/sbin, /bin, /usr/bin) and *never* include '.' (the current directory) to prevent arbitrary command execution."}, {"front": "Why is it a good practice to put root profile files under version control?", "back": "Version control allows for tracking all changes, easy rollback to previous configurations, and provides a clear audit trail, which is vital for security and maintainability of the root environment."}, {"front": "Can resource limits (`ulimit`) be set within a root profile, and why would this be done?", "back": "Yes, `ulimit` can be set to control resource usage (e.g., file descriptors, CPU time, memory) for processes started by the root user, helping to prevent resource exhaustion or runaway processes."}, {"front": "What role does `/etc/skel` play regarding user profiles, and how does it relate (or not) to the root profile?", "back": "/etc/skel contains template files copied to new user home directories. While not directly for root, it demonstrates the concept of a default profile, and administrators might maintain similar custom templates for root if needed."}, {"front": "What is the primary difference in profile loading mechanisms between Bash and Zsh for the root user?", "back": "While both use `~/.profile` or `~/.bash_profile` for login shells, Bash uses `~/.bashrc` for non-login shells, whereas Zsh uses `~/.zshrc` for interactive shells (both login and non-login)."}, {"front": "How can functions be used in a root profile, compared to aliases?", "back": "Functions offer more power and flexibility than aliases, allowing for multi-line commands, positional parameters, and conditional logic, useful for encapsulating complex administrative tasks."}, {"front": "What is the potential danger of setting `LD_LIBRARY_PATH` in a root profile?", "back": "Setting `LD_LIBRARY_PATH` can lead to dynamic linker hijacking, where malicious libraries could be loaded instead of legitimate ones, leading to privilege escalation or system compromise. It should generally be avoided for root."}, {"front": "How might `chattr +i` (immutable attribute) be used to protect critical root profile files?", "back": "Applying `chattr +i` to files like ~/.bashrc prevents them from being modified, deleted, or renamed even by the root user until the attribute is removed, adding an extra layer of protection against accidental or malicious changes."}, {"front": "What information might a 'login banner' provide, and how does it relate to the root login process?", "back": "A login banner (e.g., from `/etc/issue.net` or `/etc/motd`) displays messages before the shell prompt, often providing security warnings, legal disclaimers, or system information, related to the login experience rather than the profile's environment."}, {"front": "How do security frameworks like SELinux or AppArmor impact or interact with a root profile?", "back": "These frameworks impose mandatory access controls and define security contexts that override or augment traditional discretionary access controls, enforcing policies on what the root user and processes can do, regardless of their shell environment."}, {"front": "What are the first steps to debug issues related to the root profile (e.g., commands not found)?", "back": "First steps include checking the `PATH` variable (`echo $PATH`), inspecting relevant profile files for syntax errors or incorrect paths, and using `set -x` in the shell to trace command execution."}, {"front": "In containerized environments (like Docker), how might a root profile be handled differently?", "back": "In containers, the root profile is often minimal, managed by the container image, or explicitly set through environment variables in the container definition (e.g., Dockerfile `ENV` instructions), with less emphasis on traditional user dotfiles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
