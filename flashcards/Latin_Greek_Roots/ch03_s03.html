    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What is a 'root profile' in the context of plant science?", "back": "A root profile refers to the spatial distribution and characteristics of a plant's root system within the soil, including its depth, lateral spread, density, and biomass."}, {"front": "What are the primary functions of a plant's root system?", "back": "Primary functions include anchoring the plant, absorbing water and nutrients from the soil, storing food reserves, and synthesizing certain hormones."}, {"front": "Name three key characteristics used to describe a root profile.", "back": "Key characteristics include rooting depth, lateral spread, root density (number or mass of roots per unit soil volume), and root diameter distribution."}, {"front": "How does soil texture influence root profile development?", "back": "Soils with finer textures (clays) can restrict root penetration and aeration, while coarser soils (sands) allow deeper but less dense rooting if water/nutrients are scarce. Loamy soils often promote optimal development."}, {"front": "What role does water availability play in shaping a root profile?", "back": "Plants often develop deeper root systems in response to limited surface water, seeking water tables or deeper soil moisture. Abundant surface water may lead to shallower, more widespread roots."}, {"front": "How do nutrient availability gradients affect root distribution within the soil?", "back": "Roots tend to proliferate in zones of higher nutrient concentration. If nutrients are concentrated near the surface, roots will be shallower; if they are deeper, roots will grow towards those zones."}, {"front": "Describe the typical root profile of a plant with a taproot system.", "back": "A taproot system typically features a single, dominant main root that grows vertically downwards, with smaller lateral roots branching off. This profile allows access to deeper water and provides strong anchorage."}, {"front": "Describe the typical root profile of a plant with a fibrous root system.", "back": "A fibrous root system consists of a dense network of many fine, branching roots originating from the stem, often forming a dense mat near the soil surface. This profile is effective for surface water and nutrient uptake and erosion control."}, {"front": "Why is an extensive root profile crucial for efficient water uptake?", "back": "An extensive root profile increases the total surface area available for water absorption and allows the plant to access water from a larger volume of soil, including deeper reserves during dry periods."}, {"front": "How does root profile influence a plant's nutrient acquisition?", "back": "A widespread and dense root profile enhances nutrient acquisition by maximizing contact with soil particles and increasing the volume of soil from which nutrients can be extracted, especially for immobile nutrients like phosphorus."}, {"front": "What role does the root profile play in plant stability and anchorage?", "back": "A well-developed and deep root profile firmly anchors the plant in the soil, preventing it from being dislodged by wind, water, or other physical forces."}, {"front": "Briefly explain how root profiles contribute to soil structure and stability.", "back": "Roots bind soil particles together, creating stable aggregates and improving soil structure. Their growth creates channels for water and air, and their decay adds organic matter, all contributing to soil stability and reducing erosion."}, {"front": "Name two common methods used to study root profiles in the field.", "back": "Common methods include destructive sampling (excavation and washing of roots), minirhizotrons (transparent tubes inserted into the soil for non-destructive observation), and ground-penetrating radar."}, {"front": "How might prolonged drought impact a plant's root profile?", "back": "Prolonged drought often stimulates plants to develop deeper root systems to access deeper water sources, while surface roots may become less active or die back."}, {"front": "Briefly explain how root profiles contribute to carbon sequestration.", "back": "Roots release organic compounds into the soil and contribute biomass when they die. This organic matter stabilizes carbon in the soil, making root profiles significant for long-term carbon sequestration and mitigating climate change."}, {"front": "How do mycorrhizal associations affect a plant's effective root profile?", "back": "Mycorrhizal fungi extend the effective absorption surface area of roots significantly, allowing plants to access water and nutrients from a much larger soil volume than their roots alone could reach, thus enhancing the functional root profile."}, {"front": "How does a plant's age generally influence its root profile?", "back": "Young plants typically have shallower and less extensive root profiles. As plants mature, their root systems generally grow deeper and become more widespread and branched to support the increasing demands of the above-ground biomass."}, {"front": "To what extent is root profile development determined by genetics versus environmental factors?", "back": "Root profile development is a complex interaction of both genetics (e.g., inherent root architecture, growth potential) and environmental factors (e.g., soil type, water, nutrient availability, temperature, pH)."}, {"front": "What impact does soil compaction typically have on root profile development?", "back": "Soil compaction creates physical barriers and reduces pore space, which can severely inhibit root penetration, lead to shallower and more horizontally oriented root profiles, and impair water and nutrient uptake."}, {"front": "Provide an example of a root profile adaptation to a specific environmental challenge.", "back": "In waterlogged conditions, some plants develop shallow root systems and aerenchyma (air channels) to cope with low oxygen, while desert plants often develop deep taproots or extensive lateral roots to maximize water capture."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
