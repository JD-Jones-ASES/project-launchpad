    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;

        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }

<body>

        <div class="container">
            <div class="hero-content">

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>

                <div class="fc-progress">

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">

    <script>
    var CARDS = [{"front": "Who authored the quote presented as the chapter epigraph?", "back": "Virgil"}, {"front": "From which epic poem by Virgil is the chapter epigraph drawn?", "back": "The Aeneid"}, {"front": "Provide the specific book and line numbers from The Aeneid for the epigraph.", "back": "Aeneid, VI.143–144"}, {"front": "State the original Latin text of the epigraph.", "back": "Primo avulso non deficit alter aureus, et simili frondescit virga metallo."}, {"front": "Translate the epigraph into English.", "back": "\"When the first is torn away, a second golden branch grows forth, and its stem sprouts with the same ore.\""}, {"front": "What is the primary visual image conveyed in the epigraph?", "back": "A golden branch, which upon being torn away, is replaced by another golden branch."}, {"front": "In the epigraph, what does the descriptor \"golden\" suggest about the branch?", "back": "It signifies value, preciousness, importance, or perhaps a divine connection."}, {"front": "The epigraph mentions \"When the first is torn away.\" What does \"torn away\" suggest beyond a literal act?", "back": "It implies loss, destruction, sacrifice, or a significant, perhaps forceful, removal."}, {"front": "What is the immediate consequence after the first golden branch is torn away, according to the epigraph? What does this signify?", "back": "A second golden branch \"grows forth,\" signifying renewal, regeneration, resilience, or continuity."}, {"front": "The epigraph states the new stem sprouts with the \"same ore.\" What does this emphasize about the replacement?", "back": "It emphasizes the continuity of nature, essence, inherent quality, or enduring value, suggesting the replacement is equivalent, not diminished."}, {"front": "Synthesize a primary theme regarding succession or replacement that the epigraph suggests.", "back": "The theme of cyclical renewal, enduring value, or the inevitable continuation of something precious despite loss."}, {"front": "How does the imagery in the epigraph relate to the concept of resilience?", "back": "It illustrates resilience by showing that despite a loss or removal, something valuable regenerates and continues, maintaining its essence."}, {"front": "In a textbook, what is the typical purpose of an epigraph at the beginning of a chapter?", "back": "To introduce a central theme, set the tone, provoke thought, or provide a literary or historical context for the upcoming content."}, {"front": "Considering its themes, why might this particular quote from Virgil be chosen as an epigraph for a textbook chapter?", "back": "To foreshadow themes of succession, transformation, enduring legacy, the replacement of old with new, or the resilience of certain principles or entities."}, {"front": "What literary device is at play when the epigraph speaks of a \"golden branch\" being replaced by another with the \"same ore,\" emphasizing continuity?", "back": "Symbolism, foreshadowing, or an archetypal image of regeneration."}, {"front": "What is the literal translation of the Latin phrase \"non deficit alter\" from the epigraph?", "back": "\"another does not fail\" or \"a second is not lacking.\""}, {"front": "Break down the meaning of \"virga metallo\" in the epigraph.", "back": "\"virga\" means branch or rod, and \"metallo\" means metal or ore; together, it reinforces the physical nature and valuable composition of the new growth."}, {"front": "If a chapter discusses the fall of an empire, how might the epigraph's message of a \"second golden branch\" relate?", "back": "It could suggest that even after the collapse of one entity, its valuable essence, ideals, or a successor power might emerge, maintaining a continuity of importance or influence."}, {"front": "What contrasting actions or states are presented in the epigraph?", "back": "The destructive act of \"torn away\" is contrasted with the regenerative act of \"grows forth.\""}, {"front": "Does the epigraph imply a linear progression or a cyclical process of change and renewal?", "back": "It suggests a cyclical process where loss is followed by regeneration, implying an ongoing pattern rather than a final end."}, {"front": "Why is Virgil, as the author of The Aeneid, a particularly fitting source for a quote about legacy and renewal?", "back": "Virgil is a foundational poet of Western literature, often exploring themes of destiny, national identity, and the founding of civilizations, making his words carry significant weight regarding continuity and purpose."}, {"front": "Without delving deep into the epic, what broader theme often found in The Aeneid might resonate with the epigraph's message?", "back": "The Aeneid explores themes of founding new civilizations, overcoming adversity, and divine will guiding destiny, all of which align with renewal and continuity."}, {"front": "What specific action does the Latin verb \"frondescit\" describe in the epigraph?", "back": "It means \"it sprouts leaves\" or \"it grows foliage,\" emphasizing organic growth and vitality."}, {"front": "While \"same ore\" emphasizes continuity, could it also be interpreted to suggest a lack of newness or progress in the successor?", "back": "Potentially, as it signifies a return to the original essence rather than a radical departure or improvement, focusing on sameness over innovation rather than progress."}, {"front": "As a student, what analytical approach should you take when encountering an epigraph like this before reading a chapter?", "back": "Consider its imagery, keywords, and potential symbolic meanings, and try to predict how these themes might connect to the chapter's content, forming an interpretive lens."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
