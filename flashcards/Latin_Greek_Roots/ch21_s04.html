    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 21, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary meaning of the Greek root 'bio'?", "back": "The root 'bio' primarily means 'life' or 'living things'."}, {"front": "Define 'biology'.", "back": "Biology is the scientific study of life, including living organisms, their physical structure, chemical processes, molecular interactions, physiological mechanisms, development, and evolution."}, {"front": "What are some major branches of biology?", "back": "Major branches include zoology (animals), botany (plants), microbiology (microorganisms), ecology (interrelationships), genetics (heredity), and anatomy (structure)."}, {"front": "Explain the term 'biography'.", "back": "A biography is a written account of another person's life, detailing their experiences, achievements, and impact."}, {"front": "What is the difference between a 'biography' and an 'autobiography'?", "back": "A biography is written by someone else about a person's life, while an autobiography is written by the person themselves about their own life."}, {"front": "What does it mean for something to be 'biodegradable'?", "back": "Biodegradable means capable of being decomposed by bacteria or other living organisms, thus preventing pollution."}, {"front": "Give an example of a biodegradable material.", "back": "Examples include food waste, paper products, cotton, and many plant-based plastics."}, {"front": "Define 'biosphere'.", "back": "The biosphere is the global sum of all ecosystems; it is the zone of life on Earth, encompassing all living organisms and their interactions with the lithosphere (earth), hydrosphere (water), and atmosphere (air)."}, {"front": "What are the three main components of the biosphere?", "back": "The biosphere includes the Earth's land (lithosphere), water (hydrosphere), and air (atmosphere) where life exists."}, {"front": "What is 'bioluminescence'?", "back": "Bioluminescence is the production and emission of light by a living organism as a result of a chemical reaction, often used for defense, communication, or attracting prey."}, {"front": "Name two types of organisms that exhibit bioluminescence.", "back": "Examples include fireflies, certain deep-sea fish, jellyfish, and some fungi."}, {"front": "Explain 'biotechnology'.", "back": "Biotechnology is the use of living systems and organisms to develop or make products, or 'any technological application that uses biological systems, living organisms, or derivatives thereof, to make or modify products or processes for specific use'."}, {"front": "Provide an example of a common application of biotechnology.", "back": "Examples include genetic engineering (e.g., creating disease-resistant crops), development of vaccines, fermentation in food production (e.g., bread, beer), and gene therapy."}, {"front": "What is an 'antibiotic'?", "back": "An antibiotic is a type of antimicrobial substance active against bacteria; it is the most important type of antibacterial agent for fighting bacterial infections."}, {"front": "How do antibiotics typically work?", "back": "Antibiotics either kill bacteria directly (bactericidal) or stop them from growing and reproducing (bacteriostatic), allowing the body's immune system to clear the infection."}, {"front": "Define 'symbiosis'.", "back": "Symbiosis is a close and long-term biological interaction between two different biological organisms, which may be mutualistic, commensalistic, or parasitic."}, {"front": "Give an example of a symbiotic relationship in nature.", "back": "Examples include clownfish and sea anemones (mutualism), nitrogen-fixing bacteria in plant roots (mutualism), or tapeworms in the human gut (parasitism)."}, {"front": "What is a 'microbe'?", "back": "A microbe, short for microorganism, is a microscopic organism that comprises either a single cell (unicellular), cell clusters, or multicellular organisms visible only through a microscope. This includes bacteria, fungi, viruses, and protozoa."}, {"front": "What is a 'biome'?", "back": "A biome is a large naturally occurring community of flora and fauna occupying a major habitat, e.g., forest or tundra. It is characterized by its distinct climate and predominant vegetation."}, {"front": "Name two different types of biomes.", "back": "Examples include tropical rainforests, deserts, grasslands, tundra, boreal forests (taiga), and aquatic biomes (freshwater, marine)."}, {"front": "Define 'biochemistry'.", "back": "Biochemistry is the study of the chemical processes within and relating to living organisms. It deals with the structure, function, and interactions of biological macromolecules like proteins, nucleic acids, and carbohydrates."}, {"front": "What kind of questions does a biochemist try to answer?", "back": "Biochemists explore how life processes work at the molecular level, investigating topics like metabolism, disease mechanisms, and the chemistry of heredity."}, {"front": "What is a 'biohazard'?", "back": "A biohazard is a biological substance that poses a threat to the health of living organisms, primarily humans. This includes medical waste, samples of a microorganism, virus or toxin (from a biological source) that can affect human health."}, {"front": "Provide an example of a common biohazard.", "back": "Examples include infectious bacteria or viruses (e.g., E. coli, HIV), contaminated blood or body fluids, and mold spores."}, {"front": "What does the term 'bionic' refer to?", "back": "Bionic refers to artificially produced parts of the human body, especially electromechanical ones, that enhance or replace natural physiological functions. It often implies a combination of biological and electronic components."}, {"front": "What is a 'biomarker' in a medical context?", "back": "A biomarker is a measurable indicator of some biological state or condition. It can be a molecule, gene, or characteristic that indicates the presence of a disease, the severity of a condition, or the effectiveness of a treatment."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
