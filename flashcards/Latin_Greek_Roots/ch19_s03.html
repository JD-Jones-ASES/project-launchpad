    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Words from the Ancients: Latin &amp;amp; Greek Roots &mdash; Chapter 19, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Latin_Greek_Roots">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'root profile' in the context of Linux/Unix systems?", "back": "The 'root profile' refers to the configuration and environment settings for the superuser (root) account. It dictates the shell, environment variables, aliases, functions, and command search paths used when the root user logs in or executes commands."}, {"front": "Why is the root profile particularly important compared to a regular user's profile?", "back": "It's critical because the root user has unrestricted access to the entire system. A misconfigured root profile could lead to security vulnerabilities, system instability, or make it difficult to perform administrative tasks."}, {"front": "What is the primary purpose of root's profile configuration files?", "back": "To establish the root user's execution environment, including setting the command search path (PATH), defining useful aliases for administrative commands, and configuring the shell prompt (PS1)."}, {"front": "What are the primary configuration files sourced when the root user logs in as a *login shell* (e.g., via SSH or console)?", "back": "Typically, `~/.bash_profile`, `~/.profile`, or `~/.login` (depending on the shell). If `~/.bash_profile` exists, `.bashrc` is often sourced from it."}, {"front": "Which configuration file is usually sourced for an *interactive non-login shell* started by root (e.g., opening a new terminal window)?", "back": "`~/.bashrc` is typically sourced for interactive non-login shells when using Bash."}, {"front": "Distinguish between global and user-specific root profile configurations.", "back": "Global configurations (e.g., `/etc/profile`, `/etc/bashrc`) apply to all users, including root, but can be overridden by root's specific profile files in `~/`. User-specific files (`~/.bash_profile`, `~/.bashrc`) are paramount for customizing the root user's environment."}, {"front": "What is the significance of the `PATH` environment variable in the root profile?", "back": "The `PATH` variable defines the directories the shell searches for executable commands. For root, it's crucial to include directories containing administrative tools (e.g., `/sbin`, `/usr/sbin`) and to ensure custom paths are secure."}, {"front": "What is a critical security best practice regarding the `PATH` variable in the root profile?", "back": "Never include the current directory (`.`) in the root's `PATH` to prevent accidental execution of malicious scripts located in common directories."}, {"front": "What is the `PS1` variable commonly used for in the root profile?", "back": "`PS1` defines the primary shell prompt. For root, it's often configured to display a distinct color or symbol (like `#`) to clearly indicate superuser privileges, reducing the risk of accidental critical operations."}, {"front": "Where is the default home directory for the root user on most Linux/Unix systems?", "back": "`/root`. This is where root's personal configuration files (like `.bashrc`, `.profile`) are stored."}, {"front": "How does the `sudo` command interact with the root profile?", "back": "When `sudo` is used, it typically runs commands as root without sourcing the root user's login shell profile. It often sources a minimal secure environment, though some `sudoers` configurations can be set to preserve the invoking user's environment or specifically source parts of the root profile."}, {"front": "Give an example of a common alias you might find or add to a root profile for convenience and safety.", "back": "`alias rm='rm -i'` or `alias cp='cp -i'` to prompt for confirmation before deleting or overwriting files, mitigating common administrative errors."}, {"front": "What is the default shell for the root user on most modern Linux distributions?", "back": "`bash` (Bourne-Again SHell) is the most common default shell for root."}, {"front": "What is the recommended way to make persistent changes to the root user's environment?", "back": "Edit the appropriate dotfiles in the `/root` directory (e.g., `~/.bashrc` for interactive non-login shells, `~/.bash_profile` for login shells)."}, {"front": "Where do the initial configuration files for new user accounts (and often for root) typically come from?", "back": "They are copied from the `/etc/skel` directory when a new user's home directory is created."}, {"front": "Why is it a security risk to have multiple administrators directly logging in as root and sharing the same `/root` home directory configuration?", "back": "It makes accountability difficult, as all actions are attributed to 'root.' It's better to use `sudo` with individual user accounts for auditing and traceability."}, {"front": "What is one key functional difference between the root profile and a normal user's profile regarding system-wide impact?", "back": "Changes in the root profile can affect system-wide behavior and security settings, whereas a normal user's profile typically only affects that user's environment."}, {"front": "What is the purpose of `umask` in the root profile?", "back": "`umask` sets the default file and directory permission masks for files and directories created by the root user, ensuring appropriate default permissions for security."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
