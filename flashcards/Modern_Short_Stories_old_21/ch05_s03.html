    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Modern_Short_Stories_old_21.html">&larr; Back to Modern_Short_Stories_old_21</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>

    <script>
    var CARDS = [{"front": "What is the central argument between the couple in \"Hills Like White Elephants\"?", "back": "The couple is arguing about whether the girl should have an abortion. The man wants her to have it, viewing it as a simple 'operation' to restore their previous lifestyle, while the girl is deeply conflicted and potentially wants to keep the child, or at least is struggling with the implications of the procedure."}, {"front": "What does the man, Jig's companion, primarily want in \"Hills Like White Elephants\"?", "back": "He primarily wants the girl to have the abortion so they can return to their carefree, traveling lifestyle, free from the perceived complication of a child. He frames it as a solution to their current unhappiness."}, {"front": "Describe the internal conflict the girl, Jig, faces in \"Hills Like White Elephants.\"", "back": "Jig is torn between her desire to please the man and maintain their relationship by having the abortion, and a deeper, unspoken longing for a different life, possibly with the child, and a sense of dissatisfaction with their current, transient existence."}, {"front": "Does either character demonstrate significant change during the course of \"Hills Like White Elephants\"?", "back": "No, neither character undergoes a significant, overt change. The argument leaves them in a similar stalemate of unspoken desires and misunderstandings, though Jig's internal resolve might be strengthening by the end."}, {"front": "Analyze the girl's final line, “I feel fine. There's nothing wrong with me.”", "back": "This line is deeply ironic. It does not mean she literally feels fine, but rather suggests a resignation or a hardening of her resolve. It could be a decision to suppress her true feelings for the sake of ending the discussion, or an assertion of her inherent worth despite the man's pressure."}, {"front": "Is the man's statement, “I don't want you to do it if you don't want to,” truthful? Explain.", "back": "No, his statement is disingenuous. While he says he won't force her, his subsequent actions, persistent coaxing, and emotional manipulation clearly indicate he strongly desires her to have the abortion, regardless of her true feelings."}, {"front": "What is the difference between what the man says and what he does in \"Hills Like White Elephants\"?", "back": "He verbally expresses a desire for her happiness and agency ('I don't want you to do it if you don't want to,' 'I don't want anybody but you'), but his actions and repeated persuasive arguments contradict these claims, revealing his true agenda to get her to agree to the abortion."}, {"front": "What does the girl mean when she says the hills look like white elephants?", "back": "\"White elephants\" is an idiom for something valuable but burdensome, or an expensive possession that is useless or troublesome. The hills' resemblance to \"white elephants\" suggests her perception of the pregnancy: potentially precious but also a significant burden in their current lifestyle."}, {"front": "What does the exchange about the \"white elephants\" reveal about the couple's relationship?", "back": "It reveals a fundamental disconnect in their perceptions and communication. The girl sees symbolic meaning and potential burden/value, while the man sees only literal hills, highlighting his inability or unwillingness to engage with the deeper emotional and symbolic implications of their situation."}, {"front": "Describe a key characteristic of Hemingway's dialogue style as demonstrated in \"Hills Like White Elephants.\"", "back": "Hemingway's dialogue is characterized by its realism, conciseness, and omission of explicit emotional statements or interior monologues. Readers must infer characters' true feelings and meanings from what is said, and especially from what is not said (subtext)."}, {"front": "How does Hemingway use \"subtext\" in \"Hills Like White Elephants\"?", "back": "Subtext is crucial in \"Hills Like White Elephants.\" The real argument and emotional conflict are often hidden beneath seemingly mundane or indirect conversation, requiring the reader to interpret the unstated thoughts, feelings, and intentions driving the characters' words."}, {"front": "In what way might \"Hills Like White Elephants\" be considered \"honest\" about how people talk?", "back": "It's honest because people often avoid direct confrontation, use euphemisms, and talk around difficult subjects, especially when emotions are high or there's an imbalance of power. The story captures the evasion and hidden meanings typical of real-life difficult conversations."}, {"front": "What is the difference between a \"hopeful ending\" and a \"resolved ending\" in literature?", "back": "A hopeful ending suggests a positive future or the possibility of improvement, even if problems remain. A resolved ending provides a clear conclusion to the central conflict, whether positive or negative, leaving no major questions unanswered."}, {"front": "Characterize the ending of \"Hills Like White Elephants\" in terms of hope and resolution.", "back": "The ending is neither clearly hopeful nor fully resolved. While the immediate conversation ends, the core conflict remains, and the characters' future is uncertain. It might be seen as resolved in the sense that the discussion is temporarily over, but without a true resolution to their underlying issues."}, {"front": "What might be gained by rewriting a scene from \"Hills Like White Elephants\" with \"pure narration\" instead of dialogue?", "back": "Adding pure narration would allow direct access to characters' thoughts and feelings, detailed descriptions of the setting, and explicit emotional context, clarifying motivations and internal struggles that are only implied in Hemingway's original."}, {"front": "What might be lost by rewriting a scene from \"Hills Like White Elephants\" with \"pure narration\" instead of dialogue?", "back": "Lost would be the sense of realism in conversation, the subtlety of unspoken emotion, the reader's active role in interpreting subtext, and the distinctive \"iceberg theory\" style that is central to Hemingway's art."}, {"front": "How does \"Hills Like White Elephants\" exemplify Hemingway's \"iceberg theory\" of writing?", "back": "The \"iceberg theory\" suggests that only a small portion of the story's meaning is explicit on the surface (the dialogue). The vast majority of its emotional depth, symbolism, and character motivations are submerged, left for the reader to infer, much like the bulk of an iceberg lies beneath the water."}, {"front": "If trying to write in Hemingway's style, what are key elements to focus on?", "back": "Focus on concise, realistic dialogue; minimal or absent narration; no direct interior monologue; and allowing the reader to infer characters' feelings and the plot's development from what characters say and don't say."}, {"front": "In the context of the story, is \"saying exactly what they mean\" the same as being \"more honest\"?", "back": "Not necessarily. While explicit conversation might reveal more facts, honesty also involves vulnerability, which directness doesn't always convey. In Hemingway's style, the unspoken can be more emotionally honest than a blunt, but possibly defensive, statement."}, {"front": "How does the setting of the train station contribute to the story's mood and themes?", "back": "The setting of a train station, a place of transience and waiting, mirrors the couple's nomadic lifestyle and their state of limbo regarding a life-altering decision. The 'Ebro valley' and 'white hills' also offer a stark contrast to their internal turmoil."}, {"front": "What is the significance of the Anis del Toro liquor they drink?", "back": "Anis del Toro is a strong, licorice-flavored Spanish liqueur. Its sweetness initially appeals to Jig, but then she finds it like 'licorice water,' possibly symbolizing the initial attraction to their lifestyle that has turned bitter, or the artificial sweetness of the man's reassurances."}, {"front": "How does the man's tone toward Jig often manifest as patronizing?", "back": "He frequently dismisses her feelings or artistic observations (like the white elephants), simplifies complex emotional issues ('a perfectly simple operation'), and speaks to her as if she needs to be managed or persuaded rather than understood as an equal."}, {"front": "What future for the couple does the story implicitly suggest, given their current conflict and communication style?", "back": "The story suggests a bleak future for the couple, marked by continued emotional distance, unresolved conflicts, and a potential breakdown of their relationship, regardless of the abortion outcome, due to their fundamental inability to truly communicate and understand each other's needs."}, {"front": "What euphemism is used for the abortion in the story, and what does this euphemism reveal?", "back": "The procedure is referred to as 'the operation.' This euphemism reveals the man's desire to simplify and depersonalize the serious choice, making it seem clinical and minor, thereby minimizing its emotional weight for Jig and for himself."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
