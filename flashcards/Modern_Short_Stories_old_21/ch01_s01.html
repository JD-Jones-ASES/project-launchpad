    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Modern_Short_Stories_old_21 &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Modern_Short_Stories_old_21.html">&larr; Back to Modern_Short_Stories_old_21</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What characterized short stories written by Edgar Allan Poe?", "back": "Poe's stories were \"tightly wound machines\" where every sentence drove toward a climax, with an ending that snapped shut and clearly resolved what happened and why."}, {"front": "What was the typical outcome for a reader finishing a traditional short story like Poe's?", "back": "The reader would know \"exactly what happened and why,\" with mysteries solved, villains defeated, or secrets revealed."}, {"front": "How does a Chekhov story often differ from a traditional story in terms of resolution?", "back": "A Chekhov story often ends without resolution, where characters learn no lesson, are neither punished nor rewarded, and their most difficult part of life might just be beginning."}, {"front": "According to the text, what significant change did Chekhov's stories bring to fiction?", "back": "Chekhov's stories \"changed what fiction could do\" by demonstrating a shift away from plot machinery towards the interior lives of characters."}, {"front": "When did the shift towards the modern short story begin to occur?", "back": "Something shifted in the late nineteenth century, specifically \"Beginning around 1890.\""}, {"front": "What did writers begin to lose interest in during the late nineteenth century regarding plot?", "back": "Writers began to lose interest in \"the machinery of plot\" – dramatic elements like murders, revelations, and last-minute rescues."}, {"front": "What new focus did writers develop in the late nineteenth century that defines the modern short story?", "back": "They started paying attention to \"something quieter: the way people actually experience their own lives,\" focusing on ordinary moments and interior experiences."}, {"front": "What specific types of 'ordinary moments' did modern writers begin to explore?", "back": "They explored moments like \"the pause before someone speaks,\" \"the thing a person notices but cannot explain,\" and \"the slow realization that arrives not with a thunderclap but with a kind of sinking feeling.\""}, {"front": "What is the defining characteristic of the modern short story in terms of its core concern?", "back": "It is \"fiction that cares less about what happens and more about what it feels like to be alive while it is happening.\""}, {"front": "Who are some of the earliest and finest examples of modern short story writers mentioned in the text?", "back": "Chekhov, Joyce, and Hemingway."}, {"front": "What common conviction do modern short stories by writers like Chekhov, Joyce, and Hemingway share?", "back": "They share the conviction \"that the interior life of a single person, rendered honestly, is enough to build a story around.\""}, {"front": "Define 'The Modern Turn' in short fiction.", "back": "'The Modern Turn' refers to a fundamental change in short fiction beginning around 1890, shifting its focus from plot mechanics to the texture of consciousness and interior life."}, {"front": "What question did earlier short stories typically ask?", "back": "Earlier stories asked: \"What happens next?\""}, {"front": "What different question do modern short stories ask?", "back": "Modern stories ask: \"What does it feel like to be this person, in this moment?\""}, {"front": "How did the focus of short fiction shift during 'The Modern Turn'?", "back": "The focus moved \"from the mechanics of plot to the texture of consciousness—how people think, what they notice, what they fail to understand about themselves.\""}, {"front": "Why might modern short fiction often feel unfinished?", "back": "It often feels unfinished \"because life itself is unfinished,\" and this is considered \"not a flaw. It is the point.\""}, {"front": "What would a story about two people meeting, having an affair, realizing they are in love, and ending without resolution typically represent?", "back": "This scenario represents a modern short story, as exemplified by Chekhov, focusing on internal experience rather than external plot resolution."}, {"front": "If a story's primary goal is to make the reader understand 'what it feels like to be alive while it is happening,' what type of story is it?", "back": "It is a modern short story."}, {"front": "How does the approach to character development differ between traditional and modern short stories?", "back": "Traditional stories focus on characters within a dramatic plot, while modern stories delve into the \"interior life of a single person, rendered honestly,\" even in ordinary moments."}, {"front": "What is the significance of 'the texture of consciousness' in modern short stories?", "back": "\"The texture of consciousness\" is the primary focus of modern stories, exploring how characters think, perceive, and understand (or misunderstand) themselves and the world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
