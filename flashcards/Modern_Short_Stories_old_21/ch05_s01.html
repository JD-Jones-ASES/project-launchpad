    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Modern_Short_Stories_old_21 &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Modern_Short_Stories_old_21.html">&larr; Back to Modern_Short_Stories_old_21</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is a defining characteristic of Ernest Hemingway's writing style, as described in the story's preface?", "back": "His stories often feature almost no narration, relying almost entirely on dialogue, suggesting the 'real' story is exactly what the reader is presented with."}, {"front": "Describe the physical setting of 'Hills Like White Elephants.'", "back": "A train station in the Ebro valley, Spain, between two lines of rails in the hot sun, with a bar shaded by a bamboo bead curtain."}, {"front": "What is the primary symbolic meaning of the 'hills like white elephants' observation made by Jig?", "back": "It refers to something costly, useless, or an unwanted gift, implicitly symbolizing the unborn child or the unwanted pregnancy."}, {"front": "What highly sensitive topic is the American man trying to convince Jig about, without directly naming it?", "back": "He is trying to convince her to have an abortion, which he refers to as an 'awfully simple operation.'"}, {"front": "How does the American man describe the 'operation' to Jig, to reassure her?", "back": "He calls it 'awfully simple,' 'not really an operation at all,' 'just to let the air in,' and 'perfectly natural' and 'perfectly simple.'"}, {"front": "What is Jig's main concern or question about their life 'afterward' if she undergoes the 'operation'?", "back": "She questions whether they will truly 'be fine afterward,' 'be all right and be happy,' and if things will return to 'like they were before.'"}, {"front": "How does the description of the two sides of the Ebro valley—one dry and barren, the other with fields of grain and trees—symbolize Jig's internal conflict?", "back": "The dry, barren side reflects the sterility and loss associated with the proposed abortion, while the fertile side represents the potential for life and family she might lose."}, {"front": "What symbolic significance might the Anis del Toro drink and its licorice taste hold for Jig, particularly when she says 'Everything tastes of licorice. Especially all the things you’ve waited so long for'?", "back": "It suggests disillusionment or bitterness; things she has long anticipated or desired, like their relationship or a happy future, have turned out to be unsatisfying or have a bitter aftertaste."}, {"front": "When Jig says 'I don’t care about me,' what does this reveal about her state of mind regarding the 'operation'?", "back": "It implies a deep resignation and self-sacrifice, suggesting she is willing to undergo the procedure not for herself, but to appease the man and restore their relationship, even if it harms her own well-being."}, {"front": "What does the setting of a train station, with the characters waiting for an express train, symbolize in the context of the story?", "back": "It symbolizes a crossroads or a transition point, representing the couple's current state of being 'between destinations in every sense'—both geographically and in their relationship."}, {"front": "What might the bamboo bead curtain separating the bar from the outside seating area symbolize in the story?", "back": "It can symbolize a thin barrier between reality and avoidance, or between different perspectives, as both characters look at or through it. It also creates a sense of superficial privacy."}, {"front": "Despite claiming he doesn't want Jig to do anything she doesn't want to, how does the man subtly pressure her?", "back": "He repeatedly minimizes the 'operation,' emphasizes its simplicity, promises a return to happiness, and dismisses her emotional concerns as 'worry,' creating a subtle but persistent pressure."}, {"front": "How does Jig use sarcasm when she says, 'So have I... And afterward they were all so happy,' after the man mentions 'lots of people that have done it'?", "back": "She is sarcastically refuting the man's claim that everyone is happy afterward, implying she knows people who were not, or that the happiness is fleeting and superficial."}, {"front": "Compare the man and Jig's contrasting views on 'having everything' toward the end of their discussion.", "back": "The man insists 'We can have everything' and 'the whole world,' while Jig sadly counters 'No, we can’t,' asserting 'It isn’t ours any more' and that 'once they take it away, you never get it back,' implying an irreversible loss."}, {"front": "What does Jig likely mean when she says, 'It isn’t ours any more,' in response to the man's claim they can have 'the whole world'?", "back": "She implies that their shared life, freedom, potential for a family, or perhaps their innocence has been irrevocably damaged or lost due to their current predicament and the decision they face."}, {"front": "What does Jig's repeated plea, 'Would you please please please please please please please stop talking?' signify?", "back": "It signifies her emotional exhaustion, her feeling unheard, and her desire for the man to stop pressuring her with his arguments and false reassurances."}, {"front": "What does the man do immediately after Jig asks him to stop talking, and what does this action suggest?", "back": "He looks at their travel bags with labels from many hotels, suggesting their transient lifestyle and perhaps a reluctance to settle down or face the permanent consequences of their choices."}, {"front": "What is the likely interpretation of Jig's final statement, 'I feel fine,' especially given the preceding conversation?", "back": "It is likely a sarcastic or resigned statement, indicating she has given up fighting, chosen to suppress her true feelings, or that she has internally made a difficult decision, rather than genuinely feeling well."}, {"front": "Does the story explicitly state whether Jig will undergo the 'operation' or not?", "back": "No, the story leaves the ending ambiguous, focusing on Jig's internal conflict and the tension in their relationship rather than a definitive resolution to the physical act."}, {"front": "How does Hemingway's choice to rely almost entirely on dialogue contribute to the story's impact on the reader?", "back": "It forces the reader to actively interpret the unspoken emotions, subtext, and underlying conflict, immersing them directly into the characters' immediate experience without authorial guidance."}, {"front": "What do the 'heavy bags' with 'labels on them from all the hotels where they had spent nights' symbolize for the couple?", "back": "They symbolize their rootless, nomadic lifestyle, perhaps indicating a lack of permanence, commitment, or a home, which ties into the theme of avoiding settled responsibility."}, {"front": "Why does the man go into the bar alone to drink an Anis and observe other people at the end of the story?", "back": "It suggests he is seeking a temporary escape from the tension with Jig, reasserting his independence, and observing others who are 'waiting reasonably for the train,' perhaps contrasting them with Jig's emotional state."}, {"front": "Why does Jig contradict herself, first comparing the hills to 'white elephants' and then later calling them 'lovely hills'?", "back": "This shift highlights her internal conflict; initially, the 'white elephants' metaphor expresses her underlying anxieties, but then she tries to retreat from the painful topic, attempting to find simple beauty or avoid direct confrontation."}, {"front": "When the man says 'I love you now. You know I love you,' how does Jig's subsequent question challenge the sincerity or nature of his love?", "back": "Jig questions, 'But if I do it, then it will be nice again if I say things are like white elephants, and you’ll like it?', implying his love is conditional on her compliance and the absence of difficult conversations."}, {"front": "How does the man's statement, 'I love it now but I just can’t think about it. You know how I get when I worry,' reveal his character?", "back": "It shows his emotional immaturity and avoidance of difficult truths, implying he expects Jig to bear the emotional burden of their shared problem so he doesn't have to 'worry.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
