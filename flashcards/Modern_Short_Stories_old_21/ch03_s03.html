    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Modern_Short_Stories_old_21 &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Modern_Short_Stories_old_21.html">&larr; Back to Modern_Short_Stories_old_21</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How does Joyce characterize the Morkan household in 'The Dead'?", "back": "The Morkan household is depicted as a 'world preserved in amber,' representing a part of Dublin that resists change, where traditions have calcified into compulsion."}, {"front": "What is Joyce's primary method in *Dubliners* for revealing the spiritual condition of a culture?", "back": "Joyce uses domestic ceremony, like the Morkan's annual party, to reveal the spiritual condition of an entire culture."}, {"front": "What does Joyce's metaphor of the party as a 'music box' imply?", "back": "It implies that the party is beautiful and intricate but incapable of playing a different tune, highlighting its unchanging, repetitive, and ultimately stagnant nature."}, {"front": "What cultural decision does the Morkan household and its party represent, according to Joyce?", "back": "It represents a culture that has collectively, and often subconsciously, decided that the past is preferable to the future."}, {"front": "How does Joyce complicate his portrait of the Morkan household, preventing it from being merely cruel?", "back": "Joyce shows genuine affection, generosity, and life within the household. The tragedy is not emptiness, but life that has nowhere to go or grow."}, {"front": "What are Gabriel Conroy's initial anxieties upon arriving at the party?", "back": "He is nervous about his after-dinner speech, whether his literary references will be understood, and how he is perceived by others."}, {"front": "How does Joyce introduce Gabriel Conroy to the reader?", "back": "Joyce introduces Gabriel through a series of 'small failures' and interactions that go slightly wrong, accumulating to reveal his character."}, {"front": "Describe Gabriel's initial exchange with Lily, the caretaker's daughter.", "back": "Gabriel offers a pleasantry about Lily's love life, to which she replies with unexpected bitterness. Gabriel recovers by giving her a coin, a gesture both kind and desperate."}, {"front": "What does Gabriel's act of giving Lily money reveal about his way of handling social discomfort?", "back": "It shows his instinct to paper over confusion or when a social script breaks down with a tangible, material gesture, rather than confronting the underlying issue."}, {"front": "How is Gabriel's intelligence characterized by Joyce?", "back": "His intelligence is real, well-read, and thoughtful, but it is primarily turned inward, used to manage his own anxiety rather than to understand other people."}, {"front": "What makes the encounter with Miss Ivors particularly challenging for Gabriel?", "back": "Miss Ivors is his intellectual equal and politically committed, pressing him on questions he has avoided asking himself, leading to a profound discomfort beyond mere social embarrassment."}, {"front": "Briefly explain the historical context of the 'Irish Question' in 1914.", "back": "Ireland was under British rule, and public life was dominated by the debate over Irish independence—political, cultural, and linguistic—pitting nationalists against those more aligned with British culture."}, {"front": "What does the term 'West Briton' mean in the context of early 20th-century Ireland?", "back": "A 'West Briton' was an insult for an Irish person perceived as being too sympathetic to British culture, implying they chose the colonizer's world over their own Irish identity."}, {"front": "Why does Miss Ivors call Gabriel a 'West Briton'?", "back": "She calls him a 'West Briton' because he writes for an English newspaper, holidays on the Continent, and declines her invitation to visit the traditional Aran Islands, suggesting a preference for British/European culture over Irish nationalism."}, {"front": "How does Gabriel's relationship with Ireland complicate his identity?", "back": "He loves Ireland but resents being defined by it or having specific commitments demanded of that love, reflecting the tension between affection for home and a desire for individual expression."}, {"front": "Define 'Paralysis' as a key concept in Joyce's *Dubliners*.", "back": "'Paralysis' is Joyce's term for the spiritual condition of characters who are unable to act, change, or leave. It's not laziness, but a deeper stagnation where staying still feels like the only safe option imposed by their culture."}, {"front": "Give two examples of 'Paralysis' demonstrated in 'Reading Part One' of 'The Dead'.", "back": "Examples include the unchanging, repetitive nature of the Morkan party itself, and Gabriel's refusal to visit the authentically Irish west of Ireland or honestly answer Miss Ivors's challenge."}, {"front": "How does Joyce approach the conflict between Gabriel and Miss Ivors?", "back": "Joyce does not take sides, presenting both characters as intelligent and their arguments as deeply felt. He allows the reader to sit with the discomfort of the situation's complexity rather than offering a definitive judgment."}, {"front": "What is the significance of Gabriel's observation of Aunt Julia's 'haggard look' during her song?", "back": "It's a carefully planted detail that foreshadows Gabriel's later reflections on Aunt Julia's age and frailty, and the inevitability of death, despite her strong performance."}, {"front": "What is the unspoken irony in Aunt Julia singing 'Arrayed for the Bridal'?", "back": "The irony lies in an elderly woman, whose life has narrowed to this annual party, singing a bride's song, highlighting her past and the narrowness of her present life."}, {"front": "What does the guests' conversation about 'The Old Singers' reveal about the party's underlying themes?", "back": "It reveals a collective belief that the best music and singers belong to the past and cannot be matched in the present, embodying a form of 'paralysis made audible'—a preference for a 'better' past over any future."}, {"front": "Why does Joyce provide such a detailed catalogue of the supper table dishes?", "back": "It's not just describing a meal, but the Morkan household itself. The abundance signifies both genuine warmth and an anxious, compulsive performance to prove that old standards hold and nothing has been lost."}, {"front": "Describe the moment Gabriel notices Gretta on the stairs.", "back": "Late in the party, Gabriel sees Gretta listening to a song, still and unaware of being watched. He feels a sudden, urgent rush of tenderness and desire, as if seeing her for the first time, distinct from their comfortable married familiarity."}, {"front": "What is the significance of Gabriel noticing Gretta on the stairs?", "back": "It's the first time in the story that Gabriel responds genuinely to another person, contrasting with his earlier anxiety and self-consciousness, and marks a turning point in his perception and emotional engagement."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
