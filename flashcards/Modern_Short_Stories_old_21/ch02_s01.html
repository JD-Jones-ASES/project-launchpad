    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>

        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Modern_Short_Stories_old_21.html">&larr; Back to Modern_Short_Stories_old_21</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle

    <script>
    var CARDS = [{"front": "Who is Dmitri Dmitritch Gurov and what is his initial marital situation in 'The Lady with the Dog'?", "back": "Gurov is a man under forty, with a 12-year-old daughter and two sons. He is married to a woman he secretly dislikes and fears, finding her unintelligent, narrow, and inelegant despite her self-proclaimed intellect."}, {"front": "How does Gurov typically view women, and what is the contradiction in his perspective?", "back": "He often refers to women as 'the lower race' due to repeated bitter experiences with infidelity. However, he also admits he cannot live without them, feeling bored and uncommunicative with men but free and at ease in the company of women."}, {"front": "What is Gurov's usual experience with romantic affairs, according to his own reflection?", "back": "He knows that initial charming adventures with 'decent people' inevitably grow into complex, unbearable problems. Yet, he repeatedly forgets this experience with each new 'interesting woman.'"}, {"front": "Describe the initial appearance and common moniker of Anna Sergeyevna when she first appears in Yalta.", "back": "She is a fair-haired young lady of medium height, always wearing a béret, accompanied by a white Pomeranian dog. She is simply known as 'the lady with the dog.'"}, {"front": "What does Gurov initially surmise about Anna Sergeyevna based on his observations in Yalta?", "back": "He deduces she is a lady, married, in Yalta for the first time and alone, and that she is feeling dull."}, {"front": "How does Gurov initiate conversation with Anna Sergeyevna?", "back": "He beckons coaxingly to her Pomeranian, then asks her if he can give the dog a bone, leading to a direct question about her stay in Yalta."}, {"front": "What personal details does Gurov share with Anna Sergeyevna during their first extended conversation?", "back": "He shares that he is from Moscow, has an Arts degree, works in a bank, trained as an opera singer but gave it up, and owns two houses in Moscow."}, {"front": "What does Gurov learn about Anna Sergeyevna during their first conversation?", "back": "He learns she grew up in Petersburg, has lived in S—- since her marriage two years prior, plans to stay another month in Yalta, and her husband might come to fetch her. Her full name is Anna Sergeyevna von Dideritz."}, {"front": "What is Gurov's initial impression of Anna Sergeyevna's character after their first meeting?", "back": "He perceives her as young, diffident, and somewhat angular, like his own daughter, and senses 'something pathetic about her.' He believes this is likely her first time being alone and observed with secret motives."}, {"front": "Describe the setting and atmosphere leading up to Gurov and Anna Sergeyevna's physical intimacy.", "back": "A week after their acquaintance, on a sultry, windy day, they go to the groyne to watch a steamer. The crowd disperses as darkness falls, leaving them alone as the wind drops."}, {"front": "What is Gurov's immediate reaction after kissing Anna Sergeyevna?", "back": "He immediately looks around anxiously, wondering if anyone had seen them, suggesting a concern for reputation or discovery rather than deep emotional connection."}, {"front": "How does Gurov mentally categorize women he has known in the past, after his encounter with Anna Sergeyevna?", "back": "He recalls 'careless, good-natured women' grateful for brief happiness, 'women like his wife' who loved affectedly and without genuine feeling, and 'beautiful, cold women' with a rapacious, domineering desire for more from life."}, {"front": "How does Anna Sergeyevna react immediately after her intimacy with Gurov?", "back": "She exhibits diffidence, awkwardness, and a profound sense of consternation. Her face drops, and she appears dejected, feeling it was 'wrong' and believing Gurov would despise her as 'the woman who was a sinner.'"}, {"front": "What is Anna Sergeyevna's justification for her feelings of guilt and self-condemnation?", "back": "She states she has deceived herself, not her husband, for a long time. Tormented by curiosity, she sought 'something better' and wanted 'to live,' feeling that her husband was a 'flunkey' and that she had become a 'vulgar, contemptible woman.'"}, {"front": "How does Gurov respond to Anna Sergeyevna's deep remorse and tears?", "back": "He feels bored and irritated by her 'naïve tone,' finding her remorse unexpected and 'inopportune.' He wonders if she is jesting, but her tears convince him otherwise."}, {"front": "What specific details about the Yalta crowd does Chekhov highlight when Gurov and Anna Sergeyevna are at the harbor?", "back": "He notes two peculiarities: elderly ladies dressed like young ones, and a great number of generals."}, {"front": "What literary device might Chekhov be using by contrasting Gurov's cynical view of women with Anna Sergeyevna's profound emotional distress after their encounter?", "back": "This contrast highlights their differing experiences and expectations of love and infidelity, emphasizing Gurov's jadedness and Anna's relative innocence and moral struggle, thus contributing to character development and thematic depth."}, {"front": "What is the significance of the Pomeranian dog in the initial interaction between Gurov and Anna Sergeyevna?", "back": "The dog serves as the icebreaker, providing a natural and indirect way for Gurov to initiate conversation with Anna, making their first verbal exchange seem casual and innocent."}, {"front": "How does Anna Sergeyevna describe her husband, and what does this reveal about her marriage?", "back": "She calls him a 'good, honest man,' but also a 'flunkey.' This suggests a lack of intellectual or emotional connection, a sense of superiority on her part, and profound dissatisfaction with her marriage, leading to her search for something more."}, {"front": "What is implied by Gurov's repeated forgetfulness of his 'bitter experience' with affairs?", "back": "It suggests a strong, perhaps compulsive, attraction to new women and the thrill of new conquests, overriding his learned caution. It also highlights his superficiality and inability to truly learn from his mistakes regarding emotional entanglements."}, {"front": "What does Gurov's concern about being seen after kissing Anna Sergeyevna reveal about his perception of their affair?", "back": "It reveals his immediate concern for social decorum and avoidance of scandal, rather than a deep emotional investment. It implies a desire to keep the affair discreet, treating it as a fleeting indulgence rather than a significant personal bond."}, {"front": "How does Chekhov use the setting of Yalta to underscore the characters' motivations and actions?", "back": "Yalta is presented as a resort town where the Russian upper class goes for recreation and mild climate, a place where social norms can be more relaxed, enabling 'easy conquests' and fleeting affairs. This provides a conducive backdrop for Gurov's pursuit of Anna and her own escape from a dissatisfying marriage."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
