<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a covalent bond?", "back": "A bond formed when two atoms share one or more pairs of electrons, typically between two nonmetals with similar electronegativities.", "id": "fc01"}, {"front": "Under what conditions do covalent bonds typically form?", "back": "Between two nonmetal atoms with similar electronegativities, where neither can effectively pull electrons away from the other.", "id": "fc02"}, {"front": "How do shared electrons in a covalent bond hold atoms together?", "back": "The shared electrons are simultaneously attracted to both nuclei, creating a force that binds the atoms.", "id": "fc03"}, {"front": "What is the 'duet rule' for hydrogen?", "back": "Hydrogen atoms need two electrons to fill their first energy level and achieve a stable electron configuration.", "id": "fc04"}, {"front": "How many electrons are involved in a single covalent bond, and how is it represented?", "back": "One shared pair (2 electrons), represented by a single line between atoms (e.g., H-H).", "id": "fc05"}, {"front": "How many electrons are involved in a double covalent bond, and how is it represented?", "back": "Two shared pairs (4 electrons), represented by a double line between atoms (e.g., O=O).", "id": "fc06"}, {"front": "How many electrons are involved in a triple covalent bond, and how is it represented?", "back": "Three shared pairs (6 electrons), represented by a triple line between atoms (e.g., N#N).", "id": "fc07"}, {"front": "How does the number of shared electron pairs affect bond length and strength?", "back": "More shared electron pairs lead to shorter and stronger bonds. (Triple > Double > Single).", "id": "fc08"}, {"front": "Why is nitrogen gas (N2) extremely stable?", "back": "Nitrogen gas contains a triple covalent bond, which is very short and strong, making it difficult to break.", "id": "fc09"}, {"front": "What is a Lewis structure (or electron dot structure)?", "back": "A diagram that shows all valence electrons in a molecule, using dots for lone pairs and lines for bonding pairs.", "id": "fc10"}, {"front": "What is the primary purpose of drawing Lewis structures?", "back": "They help predict how atoms bond and where electrons are located in a molecule.", "id": "fc11"}, {"front": "In a Lewis structure, how are non-bonding electrons represented?", "back": "As dots, called lone pairs, placed around the atom.", "id": "fc12"}, {"front": "In a Lewis structure, how are bonding pairs of electrons represented?", "back": "As lines drawn between the bonded atoms.", "id": "fc13"}, {"front": "What is the first step when drawing a Lewis structure for a molecule?", "back": "Count the total number of valence electrons from all atoms in the molecule.", "id": "fc14"}, {"front": "How do you determine the central atom when drawing a Lewis structure?", "back": "The least electronegative atom is placed in the center (hydrogen is always on the outside).", "id": "fc15"}, {"front": "What is electronegativity?", "back": "A measure of how strongly an atom in a bond attracts the shared electrons toward itself.", "id": "fc16"}, {"front": "Describe the general trend of electronegativity across the periodic table.", "back": "Electronegativity increases from left to right across a period and from bottom to top within a group. Fluorine is the most electronegative element.", "id": "fc17"}, {"front": "What is a nonpolar covalent bond?", "back": "A covalent bond in which electrons are shared equally or nearly equally because the atoms have similar electronegativities (e.g., H-H, Cl-Cl).", "id": "fc18"}, {"front": "What is a polar covalent bond?", "back": "A covalent bond in which electrons are shared unequally because the atoms have different electronegativities, leading to partial charges.", "id": "fc19"}, {"front": "In a polar covalent bond, which atom carries a partial negative charge?", "back": "The more electronegative atom attracts the shared electrons more strongly and carries a partial negative charge (δ-).", "id": "fc20"}, {"front": "Why is molecular shape important?", "back": "Molecular shape determines a molecule's polarity, biological activity, and how it interacts with other molecules.", "id": "fc21"}, {"front": "What is the core principle of the VSEPR (Valence Shell Electron Pair Repulsion) model?", "back": "Electron pairs around a central atom repel each other and arrange themselves as far apart as possible to minimize repulsion.", "id": "fc22"}, {"front": "How do lone pairs of electrons influence the molecular shape according to VSEPR theory?", "back": "Lone pairs count as electron groups and exert repulsive forces, affecting the arrangement of bonding pairs and the overall molecular geometry.", "id": "fc23"}, {"front": "Explain why the water molecule (H2O) has a bent shape.", "back": "Water has four electron groups around the central oxygen atom (two bonding pairs with hydrogen and two lone pairs), which repel each other into a bent arrangement, not a straight line.", "id": "fc24"}, {"front": "Carbon dioxide (CO2) has polar bonds but is a nonpolar molecule. Water (H2O) has polar bonds and is a polar molecule. Explain this difference.", "back": "CO2 is linear, so its two polar C=O bond dipoles cancel out. H2O is bent, so its two polar O-H bond dipoles do not cancel, resulting in a net molecular dipole moment.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
