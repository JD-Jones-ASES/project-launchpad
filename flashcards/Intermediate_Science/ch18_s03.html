<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 18, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental law of chemistry did Antoine Lavoisier establish?", "back": "Antoine Lavoisier established the Law of Conservation of Mass."}, {"front": "What does the Law of Conservation of Mass state regarding chemical reactions?", "back": "In a chemical reaction, atoms are neither created nor destroyed; they are simply rearranged. Every atom entering as a reactant must exit as part of a product."}, {"front": "Why must a chemical equation be balanced?", "back": "A chemical equation must be balanced to satisfy the Law of Conservation of Mass, meaning the number of atoms of each element must be the same on both sides of the arrow."}, {"front": "Define a subscript in a chemical formula and explain its purpose.", "back": "A subscript is a small number within a chemical formula (e.g., the '2' in H2O) that tells you how many atoms of each element are in one molecule or formula unit."}, {"front": "Can you change a subscript when balancing a chemical equation? Why or why not?", "back": "No, you must never change a subscript. Doing so changes the substance itself (e.g., H2O is water, H2O2 is hydrogen peroxide)."}, {"front": "Define a coefficient in a chemical equation and explain its purpose.", "back": "A coefficient is a full-sized number placed before a chemical formula (e.g., '2' in 2H2O) that tells you how many molecules or formula units of that substance are involved."}, {"front": "Which can be adjusted to balance a chemical equation: subscripts or coefficients?", "back": "Only coefficients can be adjusted to balance a chemical equation. Subscripts define the substance and cannot be changed."}, {"front": "What is the meaning of 'balancing by inspection'?", "back": "'Balancing by inspection' means systematically adjusting coefficients until all atoms of each element are balanced on both sides of the equation."}, {"front": "What is the first step when balancing an equation by inspection?", "back": "The first step is to write the unbalanced equation with correct chemical formulas."}, {"front": "After writing the unbalanced equation, what's the next step in balancing by inspection?", "back": "Count the atoms of each element on both the reactant and product sides of the equation."}, {"front": "When balancing by inspection, which molecule should you typically start with?", "back": "Start with the most complex molecule—the one with the most different elements."}, {"front": "Which types of substances should generally be balanced last when using the inspection method?", "back": "Save single-element substances (like O2 or Fe) for last, as their coefficients can be adjusted without affecting other elements."}, {"front": "How do you verify your work after adjusting coefficients in a balanced equation?", "back": "Check your work by counting all atoms of each element on both sides of the equation to ensure they match."}, {"front": "What is the final step for coefficients after balancing and checking an equation?", "back": "Simplify coefficients by reducing them to the smallest whole-number ratio if possible."}, {"front": "In the unbalanced equation C3H8(g) + O2(g) -> CO2(g) + H2O(g), how many carbon atoms are on the left side?", "back": "There are 3 carbon atoms (from C3H8) on the left side."}, {"front": "To balance the carbon atoms in C3H8(g) + O2(g) -> CO2(g) + H2O(g), what coefficient should be placed before CO2?", "back": "A coefficient of 3 should be placed before CO2, making it 3CO2, to match the 3 carbons from C3H8."}, {"front": "After balancing carbon (3CO2) and hydrogen (4H2O) in the propane combustion equation, how many oxygen atoms are on the product side?", "back": "On the product side, there are (3 × 2) from CO2 + (4 × 1) from H2O = 6 + 4 = 10 oxygen atoms."}, {"front": "What is the balanced equation for the combustion of propane (C3H8 + O2 -> CO2 + H2O)?", "back": "C3H8(g) + 5O2(g) -> 3CO2(g) + 4H2O(g)"}, {"front": "What do the coefficients in a balanced chemical equation represent?", "back": "The coefficients represent the stoichiometric ratio, or the fixed proportions/ratio in which substances react and are formed."}, {"front": "In the balanced equation C3H8(g) + 5O2(g) -> 3CO2(g) + 4H2O(g), what is the stoichiometric ratio of propane to oxygen?", "back": "The stoichiometric ratio of propane to oxygen is 1 C3H8 : 5 O2."}, {"front": "According to the balanced equation C3H8(g) + 5O2(g) -> 3CO2(g) + 4H2O(g), if 2 molecules of propane burn, how many molecules of CO2 are produced?", "back": "If 2 molecules of propane burn, 6 molecules of CO2 are produced (since the ratio is 1 C3H8 : 3 CO2)."}, {"front": "A student claims H2 + O2 -> H2O2 is a balanced equation for water formation. Is this correct? What is the fundamental error?", "back": "No, it is incorrect. While the atom count is balanced, the student changed the subscript for oxygen (from H2O to H2O2), which changes the identity of the product from water to hydrogen peroxide. This is not balancing; it's changing the reaction."}, {"front": "What is the correct balanced equation for the formation of water from hydrogen (H2) and oxygen (O2)?", "back": "The correct balanced equation is 2H2 + O2 -> 2H2O."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
