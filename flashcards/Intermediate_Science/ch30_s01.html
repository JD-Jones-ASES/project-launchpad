<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 30, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overarching theme presented in understanding any natural system?", "back": "To truly understand any natural system, all four branches of science (Life, Earth, Chemistry, Physics) need to work together interdisciplinarily."}, {"front": "What fundamental concepts were revisited in Cycle 1 of the Life Science journey?", "back": "Cell theory, detailed structure of prokaryotic and eukaryotic cells, the cell membrane as a selectively permeable barrier, and mitosis."}, {"front": "Explain the concept of homeostasis as learned in Life Science Cycle 2.", "back": "Homeostasis is the maintenance of stable internal conditions within an organism, often achieved through feedback loops, ensuring survival."}, {"front": "How are photosynthesis and cellular respiration complementary processes?", "back": "The products of photosynthesis (glucose and oxygen) are the reactants of cellular respiration, and vice versa (carbon dioxide, water, and ATP), creating a continuous cycle of energy transformation."}, {"front": "Beyond Mendelian genetics, what are some advanced inheritance patterns covered in Life Science Cycle 4?", "back": "Incomplete dominance, codominance, sex-linked traits, and polygenic inheritance."}, {"front": "According to Life Science Cycle 5, what drives the 'grand narrative of life's history'?", "back": "Natural selection acting on genetic variation within populations, favoring traits that improve survival and reproduction, leading to the evolution of new species and diversity."}, {"front": "In ecology (Life Science Cycle 6), what is the approximate energy transfer efficiency between trophic levels?", "back": "Only about 10% of energy is transferred from one trophic level to the next; the remaining 90% is lost, primarily as heat, at each step."}, {"front": "How does Earth Science Cycle 1 explain Earth's magnetic field?", "back": "Earth's magnetic field is generated by the dynamo effect in the liquid outer core, which shields the planet from harmful solar wind."}, {"front": "What evidence vindicated the hypothesis of continental drift in Earth Science Cycle 2?", "back": "Evidence of seafloor spreading and magnetic striping on the ocean floor provided strong support for plate tectonics and continental drift."}, {"front": "Differentiate between climate and weather, as learned in Earth Science Cycle 6.", "back": "Weather refers to short-term atmospheric conditions at a specific time and place, while climate describes long-term average weather patterns and variations in a region."}, {"front": "Name three periodic trends of elements discussed in Chemistry Cycle 2.", "back": "Atomic radius, ionization energy, and electronegativity."}, {"front": "What is the primary difference in electron behavior between ionic and covalent bonds?", "back": "Ionic bonds involve the transfer of electrons, typically between a metal and a nonmetal, while covalent bonds involve the sharing of electrons, typically between nonmetals."}, {"front": "What unique property of carbon, highlighted in Chemistry Cycle 6, allows for the vast diversity of organic molecules?", "back": "Carbon's ability to form four stable bonds and create long chains and rings, leading to an enormous diversity of complex organic structures."}, {"front": "List the four major classes of biological macromolecules.", "back": "Carbohydrates, lipids, proteins, and nucleic acids."}, {"front": "In Physics Cycle 2, state Newton's Three Laws of Motion.", "back": "1) Law of Inertia; 2) F_net = ma; 3) Action-Reaction."}, {"front": "How is power defined and calculated in Physics Cycle 3?", "back": "Power (P) is the rate at which work (W) is done or energy is transformed. It is calculated as P = W/t (work divided by time)."}, {"front": "What is the general wave equation that applies to all waves, including sound and light?", "back": "v = fλ, where 'v' is the wave speed, 'f' is the frequency, and 'λ' (lambda) is the wavelength."}, {"front": "According to Earth Science Cycle 4, what drives deep ocean currents?", "back": "Deep ocean currents, known as thermohaline circulation, are driven by density differences in seawater, which are influenced by temperature and salinity."}, {"front": "What is the significance of valence electrons in an atom's chemical behavior (Chemistry Cycle 1)?", "back": "Valence electrons are the electrons in the outermost shell and are primarily responsible for an atom's chemical reactivity and how it forms bonds with other atoms."}, {"front": "Describe the hierarchical organization of life from cells to a functioning organism.", "back": "Cells form tissues, tissues form organs, organs form organ systems, and organ systems work together to create a complete and functioning organism."}, {"front": "What is the purpose of balancing chemical equations?", "back": "To ensure that the law of conservation of mass is upheld, meaning that the number of atoms for each element is equal on both the reactant and product sides of the equation."}, {"front": "Name the four main layers of Earth's interior structure, from the surface inward.", "back": "Crust, mantle, outer core, and inner core."}, {"front": "What are some significant human impacts on ecosystems and the environment discussed in Life Science Cycle 6?", "back": "Habitat destruction, pollution, and climate change are major human impacts, leading to discussions on conservation and sustainability."}, {"front": "How does Earth's axial tilt influence phenomena studied in Earth Science Cycle 5?", "back": "Earth's axial tilt causes the seasons by affecting the angle at which sunlight strikes different parts of Earth throughout its revolution around the Sun."}, {"front": "What analytical tool became primary for analyzing forces in Physics Cycle 2?", "back": "Free-body diagrams, which are used to represent all the forces acting on an object."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
