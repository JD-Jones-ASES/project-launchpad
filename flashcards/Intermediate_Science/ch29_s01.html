<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 29, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Where does the word \"magnet\" originate from, according to ancient observations?", "back": "The word \"magnet\" comes from a region called Magnesia, where people found a type of rock called lodestone that attracted iron.", "id": "fc01"}, {"front": "What is the fundamental understanding of magnetism today?", "back": "Magnetism is a fundamental force of nature intimately connected to electricity.", "id": "fc02"}, {"front": "What are magnetic poles, and where is the magnetic force strongest?", "back": "Magnetic poles are the regions of a magnet (north and south) where the magnetic force is strongest.", "id": "fc03"}, {"front": "State the fundamental rule of magnetic interaction.", "back": "Like poles repel (north repels north, south repels south), and opposite poles attract (north attracts south).", "id": "fc04"}, {"front": "What is a critical difference between magnetic poles and electric charges?", "back": "You cannot isolate a single magnetic pole (a magnetic monopole), whereas you can isolate single positive or negative electric charges.", "id": "fc05"}, {"front": "What happens if you break a bar magnet in half?", "back": "Breaking a bar magnet in half results in two smaller magnets, each with its own north and south poles; you do not get separate north and south poles.", "id": "fc06"}, {"front": "Define a magnetic field.", "back": "A magnetic field is the region of space around a magnet (or a moving electric charge) in which a magnetic force can be detected.", "id": "fc07"}, {"front": "How is the direction of a magnetic field at any point defined?", "back": "The direction of a magnetic field at any point is defined as the direction a north compass pole would point if placed there.", "id": "fc08"}, {"front": "Describe the path of magnetic field lines outside and inside a magnet.", "back": "Outside the magnet, field lines emerge from the north pole and curve around to enter the south pole. Inside the magnet, field lines run from south to north, forming continuous closed loops.", "id": "fc09"}, {"front": "What do magnetic field lines never do, and how do they indicate field strength?", "back": "Magnetic field lines never cross. Where lines are close together, the field is strong; where lines are far apart, the field is weak.", "id": "fc10"}, {"front": "What are ferromagnetic materials?", "back": "Ferromagnetic materials are materials that are strongly attracted to magnets and can be permanently magnetized themselves.", "id": "fc11"}, {"front": "Name three common ferromagnetic elements.", "back": "The most common ferromagnetic elements are iron (Fe), cobalt (Co), and nickel (Ni).", "id": "fc12"}, {"front": "Explain the underlying reason why some materials are ferromagnetic.", "back": "Ferromagnetic materials have large groups of atoms that align their electron spins in the same direction, creating microscopic regions of strong magnetism called magnetic domains.", "id": "fc13"}, {"front": "What is a magnetic domain?", "back": "A magnetic domain is a microscopic region within a ferromagnetic material where the magnetic fields of all atoms are aligned in the same direction.", "id": "fc14"}, {"front": "How does an unmagnetized piece of iron become magnetized when exposed to an external magnetic field?", "back": "In an unmagnetized piece of iron, domains point randomly. When near a strong magnet, domains aligned with the external field grow at the expense of misaligned ones, causing the iron to become magnetized.", "id": "fc15"}, {"front": "List three ways to demagnetize a magnet.", "back": "A magnet can be demagnetized by heating it above its Curie temperature, striking it sharply, or exposing it to a rapidly alternating magnetic field.", "id": "fc16"}, {"front": "How is Earth's magnetic field generated?", "back": "Earth's magnetic field is generated by convection currents in the liquid iron outer core, a process known as the geodynamo.", "id": "fc17"}, {"front": "How does Earth's magnetic field resemble a familiar object?", "back": "Earth's magnetic field resembles the field of a giant bar magnet tilted about 11 degrees from the rotation axis.", "id": "fc18"}, {"front": "Define magnetic declination.", "back": "Magnetic declination is the angle between geographic north (toward the North Pole) and magnetic north (the direction a compass needle points) at a given location.", "id": "fc19"}, {"front": "Explain why a compass's 'north-seeking' pole points toward Earth's magnetic north, which is actually a geographic south magnetic pole.", "back": "The compass's 'north-seeking' pole was named 'north' before it was understood that it's attracted to the actual south magnetic pole located near Earth's geographic North Pole.", "id": "fc20"}, {"front": "What is the magnetosphere, and what is its primary function?", "back": "The magnetosphere is Earth's magnetic field extending far into space. It deflects the solar wind, protecting Earth's atmosphere and surface from harmful radiation.", "id": "fc21"}, {"front": "What evidence supports the idea that Earth's magnetic field periodically reverses?", "back": "The magnetic orientation of minerals in volcanic rocks on the ocean floor, forming magnetic stripes on either side of mid-ocean ridges, provides evidence of past magnetic reversals.", "id": "fc22"}, {"front": "What happens to the magnetosphere during a magnetic reversal, and what are the implications?", "back": "During a magnetic reversal, the field weakens, temporarily reducing the magnetosphere's protection. This could increase exposure to solar radiation, but reversals take thousands of years, allowing for adaptation.", "id": "fc23"}, {"front": "How do some animals, like homing pigeons, use Earth's magnetic field for navigation?", "back": "These animals have tiny crystals of magnetite (Fe3O4) in their brains and beaks that can align with Earth's magnetic field, acting as a biological compass that nerve cells detect.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
