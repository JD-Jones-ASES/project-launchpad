<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three main layers of Earth's interior?", "back": "A thin crust, a thick mantle of hot rock, and a core of iron and nickel."}, {"front": "What drives convection currents in Earth's mantle?", "back": "Heat from radioactive decay and residual heat from Earth's formation."}, {"front": "How does magma form beneath Earth's surface?", "back": "In certain regions (near plate boundaries and hotspots), temperature and pressure conditions allow small pockets of mantle rock to melt."}, {"front": "Explain why magma rises towards Earth's surface.", "back": "Magma is less dense than the surrounding solid rock because heating causes it to expand, providing a buoyant force that drives it upward."}, {"front": "What is the difference between magma and lava?", "back": "Magma is molten rock beneath Earth's surface; lava is molten rock once it reaches the surface during an eruption."}, {"front": "List some of the primary elements found in lava.", "back": "Primarily silicon, oxygen, aluminum, iron, magnesium, calcium, sodium, and potassium."}, {"front": "What chemical structure forms the backbone of most volcanic minerals?", "back": "The silicate unit, where a single silicon atom bonds to four oxygen atoms in a tetrahedral arrangement."}, {"front": "How does the silica content of lava influence the type of volcanic eruption?", "back": "High-silica lava is thick and sticky, trapping gas and producing explosive eruptions. Low-silica lava flows more freely, resulting in gentle eruptions (e.g., shield volcanoes)."}, {"front": "Name three common volcanic gases.", "back": "Water vapor (H2O), carbon dioxide (CO2), and sulfur dioxide (SO2)."}, {"front": "Which physical principles govern the trajectory of a volcanic bomb hurled into the air?", "back": "Kinematics and gravity, following the same projectile path equations as any object in motion."}, {"front": "How can the average speed of seismic waves from an eruption be calculated?", "back": "Using the formula $v = d/t$, where $d$ is the distance to the seismometer and $t$ is the time taken for the waves to arrive."}, {"front": "What happens to proteins in living cells exposed to the extreme heat of a volcanic eruption?", "back": "Extreme heat causes proteins to denature, losing their carefully folded structure and ability to perform essential cellular functions."}, {"front": "How do cell membranes respond to extreme heat, and what is the consequence for the cell?", "back": "Cell membranes, made of phospholipids, lose their structure and become leaky, preventing the cell from maintaining homeostasis and leading to cell death."}, {"front": "After a volcanic eruption, what makes the cooled volcanic ash beneficial for the return of life?", "back": "Volcanic ash weathers into nutrient-rich soil, providing essential resources for pioneer organisms."}, {"front": "Identify some of the pioneer organisms that colonize cooled volcanic rock.", "back": "Bacteria, lichens, and mosses."}, {"front": "How do pioneer organisms utilize diffusion and osmosis to survive on new volcanic surfaces?", "back": "Diffusion and osmosis move water and nutrients across their cell membranes, allowing them to take in necessary resources from the environment without expending energy."}, {"front": "What cellular process allows pioneer organisms to grow and repair tissue on volcanic landscapes?", "back": "Cell division (mitosis in eukaryotes, or binary fission in bacteria) allows for the production of new cells and population growth."}, {"front": "Why is a cross-branch analysis, involving Earth Science, Chemistry, Physics, and Life Science, necessary to fully understand a volcanic eruption?", "back": "No single scientific branch tells the whole story; understanding the event comprehensively requires integrating knowledge from all four scientific lenses."}, {"front": "Connect the Earth Science concept of magma rising to the Chemistry concept of atomic composition.", "back": "Magma rises due to lower density (Earth Science). Density ($ = m/V$) depends on the atomic composition and how tightly atoms are packed (Chemistry). When rock melts, its volume increases, decreasing density, influenced by the types of atoms present (e.g., lighter silicates vs. heavier iron)."}, {"front": "What happens to a cell's ability to maintain homeostasis when its membrane is damaged by volcanic heat?", "back": "A damaged, leaky membrane prevents the cell from controlling what enters and leaves, thus losing its ability to maintain homeostasis, leading to cell death."}, {"front": "What role do valence electrons play in the formation of volcanic gases?", "back": "Valence electrons are responsible for forming the chemical bonds that hold atoms together in specific arrangements, creating gas molecules like H2O, CO2, and SO2."}, {"front": "Besides density, what other factor related to molten rock causes it to rise?", "back": "The buoyant force created by the density difference between the less dense molten rock and the denser surrounding solid rock drives it upward."}, {"front": "How did the 1980 Mount St. Helens eruption demonstrate the return of life to a devastated volcanic area?", "back": "The blast zone, initially stripped of all visible life, eventually became home to hundreds of plant and animal species, illustrating ecological recovery over decades and centuries."}, {"front": "What are the two primary sources of heat that drive convection currents in the Earth's mantle?", "back": "Heat from radioactive decay within the Earth and residual heat from Earth's formation."}, {"front": "Why does lava rich in silica (SiO2) typically lead to explosive eruptions?", "back": "High-silica lava is thick and sticky (high viscosity), which causes it to trap gas bubbles more effectively, leading to a buildup of pressure and eventual explosive release."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
