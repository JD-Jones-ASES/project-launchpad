<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 21, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is evolution at its most fundamental level?", "back": "Evolution is a change in allele frequencies in a population over time."}, {"front": "How does evolution differ between individuals and populations?", "back": "Evolution does not happen to individuals during their lifetime; it is a change in the genetic composition of a population (a group of interbreeding organisms) over generations."}, {"front": "Define 'gene pool.'", "back": "The total collection of all the alleles (versions of genes) present in a population. It represents the total genetic diversity available for evolutionary forces to act upon."}, {"front": "What is 'allele frequency,' and why is it important for tracking evolution?", "back": "Allele frequency is the relative proportion of a specific allele compared to all alleles for that gene in a population. When allele frequencies change over time, evolution is occurring."}, {"front": "How does natural selection change allele frequencies in a population?", "back": "Natural selection changes allele frequencies by favoring individuals with certain traits, causing them to survive and reproduce at higher rates. This increases the frequency of the advantageous alleles in the gene pool over generations."}, {"front": "Describe directional selection and provide an example.", "back": "Directional selection shifts the population toward one extreme phenotype, favoring individuals at one end of the phenotypic range. Example: Larger beak size is favored during a drought."}, {"front": "Describe stabilizing selection and provide an example.", "back": "Stabilizing selection favors the average phenotype and reduces variation in the population. Example: Human birth weight, where very small and very large babies have lower survival rates."}, {"front": "Describe disruptive selection and provide an example.", "back": "Disruptive selection favors individuals at both extremes of the phenotypic range and selects against the intermediate phenotypes. Example: A population of finches where both very large and very small beaks are favored because they exploit different food sources."}, {"front": "Define 'genetic drift.' How does it differ from natural selection?", "back": "Genetic drift is a random change in allele frequencies that occurs by chance, especially in small populations. Unlike natural selection, it is not driven by an allele's effect on survival or reproduction."}, {"front": "In what type of population does genetic drift have the greatest effect?", "back": "Genetic drift has the greatest effect in small populations."}, {"front": "Explain the bottleneck effect, including an example.", "back": "The bottleneck effect occurs when a disaster (e.g., fire, flood, disease) kills a large portion of a population. The survivors are a random sample whose allele frequencies may differ significantly from the original population, leading to reduced genetic diversity. Example: The northern elephant seal population recovery from very few individuals."}, {"front": "Explain the founder effect.", "back": "The founder effect occurs when a small group colonizes a new area. The founders carry only a fraction of the original population's allele diversity, meaning any rare alleles in the founders may become common in the new population simply by chance due to the small starting group."}, {"front": "Define 'gene flow.'", "back": "Gene flow is the movement of alleles between populations, usually through migration of individuals or the dispersal of reproductive cells (e.g., seeds, pollen, spores)."}, {"front": "What are the evolutionary consequences of gene flow?", "back": "Gene flow can introduce beneficial alleles (increasing variation), counteract the effects of genetic drift, and prevent populations from diverging too much. If blocked, populations may evolve independently."}, {"front": "What is the ultimate source of all new genetic variation in a population?", "back": "Mutation is the ultimate source of all new genetic variation. Without it, there would be no new alleles for natural selection to act upon."}, {"front": "Define 'mutation' in the context of evolution.", "back": "Mutations are random changes in DNA that create new alleles. Most are neutral or harmful, but occasionally a mutation produces an allele that provides an advantage."}, {"front": "Define 'sexual selection' and provide an example.", "back": "Sexual selection is a special form of natural selection in which individuals with certain traits are more successful at attracting mates. Example: A peacock's extravagant tail makes it more attractive to peahens, despite making it more vulnerable to predators."}, {"front": "What is the purpose of the Hardy-Weinberg principle?", "back": "The Hardy-Weinberg principle describes the conditions under which allele frequencies in a population would *not* change from generation to generation (Hardy-Weinberg equilibrium). It serves as a null model, a baseline to detect when evolution *is* occurring."}, {"front": "List the five conditions required for a population to be in Hardy-Weinberg equilibrium (i.e., not evolving).", "back": "The five conditions are: 1) No natural selection, 2) No genetic drift (infinitely large population), 3) No gene flow, 4) No mutation, and 5) Random mating (no sexual selection or mate preference)."}, {"front": "Why is the Hardy-Weinberg principle considered a 'null model' in evolutionary biology?", "back": "No natural population perfectly meets all five conditions for Hardy-Weinberg equilibrium. It acts as a baseline; if observed allele frequencies are changing, scientists know evolution is occurring and can investigate which mechanism is responsible."}, {"front": "Compare and contrast natural selection and genetic drift.", "back": "Both natural selection and genetic drift change allele frequencies. Natural selection is *adaptive* and non-random, favoring alleles that improve survival or reproduction. Genetic drift is *non-adaptive* and random, occurring by chance, especially in small populations."}, {"front": "A hurricane reduces a lizard population from 500 to 15 survivors. What mechanism of evolution does this illustrate, and how might genetic diversity be affected?", "back": "This illustrates the bottleneck effect, a form of genetic drift. Genetic diversity would likely decrease significantly because the 15 survivors represent a small, random sample of the original population's gene pool, leading to the loss of many alleles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
