<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 25, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When and where were deep-sea hydrothermal vents first discovered?", "back": "Deep-sea hydrothermal vents were discovered in 1977 by scientists aboard the research submarine Alvin near the Galapagos Islands in the Pacific Ocean."}, {"front": "What fundamental understanding did the discovery of hydrothermal vents revolutionize?", "back": "It revolutionized our understanding of where life can exist, demonstrating that life does not ultimately depend on sunlight."}, {"front": "Where do hydrothermal vents typically form geologically?", "back": "Hydrothermal vents form at divergent plate boundaries, commonly along mid-ocean ridges."}, {"front": "Describe the geological process by which deep-sea hydrothermal vents form.", "back": "Cold seawater seeps into cracks in the young, fractured oceanic crust, is heated by underlying magma to over 400°C, dissolves minerals, and then shoots back up through the seafloor."}, {"front": "What are \"black smokers\" and \"white smokers\" and how do they form?", "back": "They are towering chimney structures formed when hot, mineral-rich vent fluid meets cold deep-ocean water, causing dissolved minerals to precipitate out. Black smokers form from dark metal sulfides, while white smokers form from lighter-colored minerals like barium sulfate."}, {"front": "What are the different timescales involved in the geological processes of hydrothermal vents?", "back": "The geological process of vent formation (plate motion) operates on thousands to millions of years, while individual chimneys grow, collapse, and reform over periods of years to decades."}, {"front": "How does the chemical composition of hydrothermal vent fluid differ from normal seawater?", "back": "Vent fluid is highly acidic (pH as low as 2–3) and rich in dissolved hydrogen sulfide (H2S), methane (CH4), and metal ions, whereas normal seawater is cold, oxygen-rich, and slightly basic (pH ~8)."}, {"front": "Identify two key chemical reactions that occur when vent fluid mixes with cold seawater.", "back": "Metal sulfides precipitate (e.g., Fe²⁺ + H₂S → FeS) and hydrogen sulfide is oxidized (H₂S + 2O₂ → H₂SO₄)."}, {"front": "What is the significance of the chemical reactions occurring at hydrothermal vents for the vent ecosystem?", "back": "These exothermic reactions release energy, which powers chemosynthesis: the production of organic molecules using chemical energy rather than sunlight."}, {"front": "What are the timescales involved in the chemical processes at hydrothermal vents?", "back": "Rapid chemical reactions occur in seconds to minutes as hot fluid meets cold water, but the geochemical cycling of elements through the vent system operates over thousands of years."}, {"front": "What forms the base of the food web in deep-sea hydrothermal vent ecosystems?", "back": "Chemosynthetic bacteria that oxidize hydrogen sulfide to obtain energy are the primary producers, forming the base of the food web."}, {"front": "Write the simplified chemical equation for chemosynthesis performed by vent bacteria.", "back": "CO₂ + 4H₂S + O₂ → CH₂O + 4S + 3H₂O"}, {"front": "Describe the symbiotic relationship between giant tube worms (Riftia pachyptila) and bacteria.", "back": "Giant tube worms have no mouth or digestive system; instead, they harbor billions of chemosynthetic bacteria in a specialized organ called the trophosome. The worm absorbs H₂S and O₂ and delivers them to the bacteria, which produce organic molecules that nourish the worm."}, {"front": "What is a significant implication of the discovery of life at hydrothermal vents for astrobiology?", "back": "It suggests that life could exist in similar extreme environments elsewhere in the solar system, such as beneath the icy crusts of Jupiter's moon Europa or Saturn's moon Enceladus, where no sunlight penetrates."}, {"front": "What physical processes drive energy transfer at hydrothermal vents?", "back": "The dramatic temperature gradient between the superheated vent fluid (>400°C) and the cold surrounding seawater (2°C) drives rapid heat transfer by convection and conduction."}, {"front": "How do hydrothermal vents generate natural electrical currents?", "back": "The chemical reactions between the hot, mineral-rich vent fluid and the cold, oxidizing seawater create an electrochemical gradient, causing electrons to flow through the conductive metal sulfide chimney walls, essentially acting as a 'natural battery'."}, {"front": "What is a proposed significance of natural electrical gradients at hydrothermal vents?", "back": "Some researchers propose that these chemical and electrical energy gradients may have played a role in the origin of life itself, driving the first organic reactions that led to living cells."}, {"front": "Why are hydrothermal vents considered a 'perfect example' of a system requiring all four branches of science to understand?", "back": "Their formation (Earth Science), fluid chemistry (Chemistry), unique life forms (Life Science), and energy dynamics (Physics) are all interconnected and essential for a complete, interdisciplinary understanding."}, {"front": "If scientists discover hydrothermal vent activity on Europa, what Earth science measurement could provide evidence for or against life?", "back": "Map the ocean floor to locate vent structures; measure tidal heating from Jupiter's gravity as the energy source."}, {"front": "If scientists discover hydrothermal vent activity on Europa, what chemistry measurement could provide evidence for or against life?", "back": "Analyze the composition of vent fluid for H₂S, CH₄, dissolved minerals, and pH — conditions that could support chemosynthesis."}, {"front": "If scientists discover hydrothermal vent activity on Europa, what life science measurement could provide evidence for or against life?", "back": "Look for organic molecules, cell-like structures, or metabolic byproducts (e.g., methane produced in ratios inconsistent with non-biological sources)."}, {"front": "If scientists discover hydrothermal vent activity on Europa, what physics measurement could provide evidence for or against life?", "back": "Measure temperature gradients, electrical currents through mineral structures, and the energy available to drive chemical reactions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
