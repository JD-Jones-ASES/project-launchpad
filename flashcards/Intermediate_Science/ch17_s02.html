<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 17, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are ocean currents?", "back": "Massive rivers of water that flow through ocean basins, carrying heat, nutrients, and dissolved gases around the globe."}, {"front": "What are the primary drivers of surface ocean currents?", "back": "Global wind patterns (trade winds, westerlies, and polar easterlies)."}, {"front": "Approximately how deep do surface currents affect the ocean?", "back": "Roughly the top 400 meters."}, {"front": "How does the Coriolis effect influence the direction of moving ocean water?", "back": "It deflects moving water to the right in the Northern Hemisphere and to the left in the Southern Hemisphere."}, {"front": "Define a 'gyre' and identify the main factors that form these large ocean patterns.", "back": "A large, circular system of surface currents driven by wind and deflected by the Coriolis effect and continental boundaries."}, {"front": "Name the five major ocean gyres.", "back": "North Atlantic, South Atlantic, North Pacific, South Pacific, and Indian Ocean."}, {"front": "How do the rotation directions of gyres differ between the Northern and Southern Hemispheres?", "back": "In the Northern Hemisphere, gyres rotate clockwise; in the Southern Hemisphere, they rotate counterclockwise."}, {"front": "Compare the typical characteristics (width, depth, speed) of western boundary currents versus eastern boundary currents.", "back": "Western boundary currents (e.g., Gulf Stream) are narrow, deep, and fast. Eastern boundary currents are broad, shallow, and slow."}, {"front": "Provide an example of how the Gulf Stream influences climate.", "back": "The Gulf Stream carries warm water northward from the Gulf of Mexico, making western Europe's climate milder than regions at the same latitude in North America."}, {"front": "What is thermohaline circulation, and what two main factors drive it?", "back": "The global pattern of deep ocean currents driven by differences in water density, which depends on temperature ('thermo') and salinity ('haline')."}, {"front": "Why does cold, salty water sink to form deep water masses?", "back": "Cold, salty water is denser than warmer, less salty water."}, {"front": "Approximately how long does it take for a complete circuit of the global thermohaline 'conveyor belt'?", "back": "About 1000 years."}, {"front": "Describe the main steps of how thermohaline circulation begins in the North Atlantic.", "back": "Cold polar winds cool surface water, and sea ice formation increases salinity, making the water dense enough to sink to the ocean floor. It then spreads globally."}, {"front": "What is upwelling, and what key nutrients does it bring to the surface?", "back": "The rising of cold, nutrient-rich water from the deep ocean to the surface. It brings dissolved nutrients like nitrates and phosphates."}, {"front": "Why are upwelling zones considered among the most biologically productive areas in the ocean?", "back": "The nutrients brought to the surface fuel the growth of phytoplankton, which form the base of marine food webs."}, {"front": "What is downwelling, and what vital atmospheric gas does it transport into the deep ocean?", "back": "The sinking of surface water, carrying dissolved oxygen from the atmosphere into the deep ocean."}, {"front": "Define El Niño and its primary effect on warm surface water in the tropical Pacific.", "back": "A climate pattern where trade winds weaken or reverse in the tropical Pacific, allowing warm surface water to spread eastward toward South America."}, {"front": "During an El Niño event, what happens to upwelling along the South American coast and what is a key consequence for marine life?", "back": "Upwelling is suppressed, leading to a decline in fish populations due to the lack of nutrient-rich water."}, {"front": "What is La Niña, and how does it differ from El Niño in terms of trade winds and upwelling?", "back": "La Niña is the opposite pattern: trade winds strengthen, pushing even more warm water westward and intensifying upwelling along South America."}, {"front": "What does ENSO stand for, and what does it represent?", "back": "El Niño-Southern Oscillation; it represents a recurring climate cycle that includes both El Niño and La Niña events."}, {"front": "Who was Marie Tharp, and what was her major contribution to oceanography?", "back": "An American geologist and oceanographic cartographer who created the first comprehensive map of the entire ocean floor."}, {"front": "What crucial discovery did Marie Tharp make in 1952 that provided evidence for plate tectonics?", "back": "She identified a rift valley running down the center of the Mid-Atlantic Ridge."}, {"front": "How did Marie Tharp's maps transform scientific understanding of the ocean floor?", "back": "Her maps proved that the ocean floor was a dynamic landscape, not a flat, featureless plain, providing compelling visual evidence for the theory of plate tectonics."}, {"front": "What critical role do ocean currents play in the global climate system?", "back": "They distribute heat around the planet, significantly influencing regional climates."}, {"front": "How might a weakening of the North Atlantic thermohaline circulation, potentially caused by global warming, affect Europe's climate?", "back": "If melting ice reduces salinity, the circulation could weaken, potentially causing Europe to experience cooling even as global average temperatures rise."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
