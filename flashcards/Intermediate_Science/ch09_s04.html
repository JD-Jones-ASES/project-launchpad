<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "State Newton's Third Law of Motion.", "back": "For every action, there is an equal and opposite reaction. More precisely: whenever one object exerts a force on a second object, the second object exerts a force of equal magnitude but opposite direction on the first object."}, {"front": "What are action-reaction pairs?", "back": "Action-reaction pairs are two forces that are equal in magnitude, opposite in direction, act on two different objects, and exist simultaneously."}, {"front": "List the three important characteristics of action-reaction pairs.", "back": "1. Always equal in magnitude and opposite in direction.\n2. Always act on two different objects.\n3. Always exist simultaneously (you cannot have one without the other)."}, {"front": "Why don't action-reaction forces cancel each other out, even though they are equal and opposite?", "back": "They act on different objects. Forces can only cancel when they act on the same object."}, {"front": "When a book rests on a table, identify the action-reaction pair involving Earth's gravity.", "back": "Action: Earth pulls the book downward (gravity).\nReaction: The book pulls Earth upward with an equal force."}, {"front": "Is the normal force from a table on a book the reaction force to Earth's gravity on the book?", "back": "No. The normal force is a separate force. The reaction force to Earth's gravity on the book is the book's gravitational pull upward on the Earth."}, {"front": "Explain how Newton's Third Law applies when you walk.", "back": "When you walk, your foot pushes backward against the ground (action). By Newton's Third Law, the ground pushes your foot forward with an equal and opposite force (reaction), which propels you forward."}, {"front": "Why is it difficult to walk on ice?", "back": "Ice provides very little friction. When your foot pushes backward, the ice cannot push back with enough forward force (reaction) to move you, causing your foot to slip."}, {"front": "How do car tires propel a car forward, according to Newton's Third Law?", "back": "The car tires push backward on the road (action). The road pushes forward on the tires with an equal and opposite force (reaction), moving the car forward."}, {"front": "Describe how Newton's Third Law explains the propulsion of a rocket.", "back": "A rocket expels hot exhaust gases backward (action: rocket pushes gases backward). The gases push the rocket forward with an equal and opposite force (reaction: gases push rocket forward). This works even in a vacuum because the rocket pushes on its own exhaust."}, {"front": "Define momentum and state its formula and standard units.", "back": "Momentum (p) is a measure of how difficult it is to stop a moving object. Formula: p = mv, where m is mass (kg) and v is velocity (m/s). Standard units: kilogram-meters per second (kg m/s)."}, {"front": "Is momentum a scalar or vector quantity?", "back": "Momentum is a vector quantity; it has both magnitude and direction, and its direction is the same as the object's velocity."}, {"front": "Compare the momentum of a bowling ball and a tennis ball, both moving at the same speed.", "back": "A bowling ball has more momentum than a tennis ball at the same speed because it has more mass."}, {"front": "How is Newton's Third Law related to the concept of momentum?", "back": "Newton's Third Law guarantees that when two objects interact, the total momentum of the system is conserved (does not change). This is known as the law of conservation of momentum."}, {"front": "Who was Isaac Newton, and when did he live?", "back": "Sir Isaac Newton (1643–1727) was an English scientist widely regarded as one of the most influential scientists in history."}, {"front": "Name at least three major contributions made by Isaac Newton.", "back": "He developed the three laws of motion, the law of universal gravitation, co-invented calculus, made foundational contributions to optics (showing white light is a mixture of colors), and built the first reflecting telescope."}, {"front": "What was the title of Newton's masterwork, published in 1687, which laid the groundwork for classical mechanics?", "back": "Philosophi Naturalis Principia Mathematica (Mathematical Principles of Natural Philosophy)."}, {"front": "How relevant are Newton's laws of motion today, given Einstein's theory of relativity?", "back": "Newton's laws remain the foundation of engineering and are perfectly accurate for everyday speeds and scales. Einstein's theory refines them for objects moving at very high speeds, but they are still widely used."}, {"front": "A horse pulls a cart forward, and the cart pulls the horse backward with an equal force. How can the horse-cart system accelerate?", "back": "The action-reaction pair between the horse and cart acts on different objects (horse and cart), so they don't cancel each other out. The system accelerates because the horse pushes backward on the *ground*, and the *ground* pushes the horse forward. If this forward force from the ground on the horse is greater than the backward pull from the cart on the horse (and friction at the wheels), the system accelerates."}, {"front": "When a swimmer pushes off the wall of a pool, what is the action-reaction pair?", "back": "Action: The swimmer pushes backward on the pool wall. Reaction: The pool wall pushes the swimmer forward with an equal and opposite force, propelling the swimmer through the water."}, {"front": "Provide an example of Newton's Third Law in nature involving animals.", "back": "A bird pushes air downward with its wings (action), and in return, the air pushes the bird upward with an equal and opposite force (reaction), allowing the bird to fly."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
