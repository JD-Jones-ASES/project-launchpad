<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 25, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central connecting concept across all four branches of science (Biology, Astronomy, Chemistry, Physics) discussed in Cycle 5?", "back": "The concept of change, which occurs across vastly different timescales."}, {"front": "How does the 'speed' of change vary depending on what is being observed?", "back": "Change can range from a few thousandths of a second (lightning) to minutes (chemical reactions), millions of years (mountain ranges, species evolution), or billions of years (star cycles, universe expansion)."}, {"front": "What mechanism drives the diversity of life on Earth, as learned in Unit 21?", "back": "Evolution by natural selection."}, {"front": "Why is evolution by natural selection often difficult to observe in real-time for most organisms?", "back": "The changes are usually too slow and gradual for any single generation to observe directly."}, {"front": "Describe an example of slow, gradual biological change provided in the text.", "back": "The evolution of whales from four-legged land mammals over 50 million years, through accumulated changes like streamlined bodies, powerful tail flukes, and nostrils migrating to a blowhole."}, {"front": "Provide an example of rapid evolutionary change and explain why it occurs quickly.", "back": "The rapid evolution of antibiotic-resistant bacteria, which occurs in days or weeks due to their short generation time, large population size, and strong selection pressure."}, {"front": "What three factors influence the speed of evolutionary change?", "back": "Generation time, population size, and the strength of selection pressure."}, {"front": "What are the typical timescales for astronomical change?", "back": "Billions of years, representing the longest timescales in science."}, {"front": "How long ago did our solar system form, and from what?", "back": "Approximately 4.6 billion years ago, from a collapsing cloud of gas and dust known as the solar nebula."}, {"front": "How long did it take for the solar system to coalesce into its current form after the initial collapse of the solar nebula?", "back": "Roughly 100 million years."}, {"front": "Compare the lifespan of the Sun to that of a more massive star (e.g., ten times the Sun's mass).", "back": "The Sun will fuse hydrogen for about 9.6 billion years total (4.6 billion already passed, 5 billion remaining), while a star ten times its mass may live only 20 million years before ending in a spectacular supernova."}, {"front": "What is the approximate age of the universe, and what has been its primary change since then?", "back": "The universe is approximately 13.8 billion years old and has been expanding and cooling ever since the Big Bang."}, {"front": "What are the typical timescales for chemical change, making them generally 'familiar' to human observation?", "back": "Seconds, minutes, or hours, although some can be nearly instantaneous or geological."}, {"front": "Give an example of a chemical reaction observable in real-time and its visible evidence.", "back": "Dropping an antacid tablet into water; the fizzing (CO2 gas escaping) is visible evidence of the base neutralizing the acid."}, {"front": "Are all chemical reactions rapid? Provide an example of a slow chemical change mentioned in the text.", "back": "No, chemical reactions span a wide range of timescales. Examples of slow changes include iron rusting (days to weeks) or the formation of a stalactite (thousands of years)."}, {"front": "What are the typical timescales for electrical change, relative to other scientific phenomena?", "back": "Electrical change operates at the fastest timescales, often approaching the speed of light or occurring in nanoseconds."}, {"front": "When you flip a light switch, how fast does the electrical signal travel through the wire?", "back": "The electric signal (change in electric field) travels at close to the speed of light, approximately 3 x 10^8 m/s."}, {"front": "If the electrical signal travels so fast, why do individual electrons drift very slowly?", "back": "The signal propagates rapidly because the change in electric field causes each electron to push the next, like a chain of dominoes, transferring energy quickly, even though the physical movement of individual electrons is slow (millimeters per second)."}, {"front": "What is a nanosecond, and what common technology operates at these speeds?", "back": "A nanosecond (1 ns = 10^-9 s) is one billionth of a second. Computer processors operate at these speeds, with billions of transistors switching on and off billions of times per second (gigahertz frequencies)."}, {"front": "What is the first universal principle of change identified in the text, common across all branches of science?", "back": "Change requires energy (e.g., solar energy for ecosystems, nuclear fusion for stars, chemical energy for reactions, voltage for circuits)."}, {"front": "What is the second universal principle of change, common across all branches of science?", "back": "Change follows natural laws (e.g., natural selection, laws of gravity/nuclear physics, conservation of mass and energy, Ohm's/Kirchhoff's laws)."}, {"front": "What is the third universal principle of change, common across all branches of science, relating to scientific methodology?", "back": "Change can be modeled and predicted (e.g., cladograms, H-R diagrams, balanced chemical equations, circuit diagrams)."}, {"front": "Explain the phrase 'You are, quite literally, made of stardust,' connecting it to the concept of change across scales.", "back": "The atoms in our bodies were forged in the cores of massive stars that exploded as supernovae billions of years ago (astronomical change) before our solar system existed, demonstrating cosmic change across deep time."}, {"front": "How does the 'Think Deeper' example of a copper wire illustrate the concept of 'Change Across Scales' involving multiple branches of science?", "back": "Copper atoms originate from stars (astronomy), were concentrated in Earth's crust by geological processes over millions of years (geology/chemistry), are refined using chemical processes (chemistry), carry current in circuits at high speeds (physics), and copper is an essential trace element in some enzymes (biology)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
