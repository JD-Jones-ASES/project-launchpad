<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental force holds the protons and neutrons together in atomic nuclei?", "back": "The strong nuclear force."}, {"front": "What makes some atomic nuclei unstable?", "back": "An imbalance in the ratio of protons and neutrons, causing the nucleus to eventually break apart or reorganize itself."}, {"front": "Define radioactivity.", "back": "The spontaneous emission of particles or energy from an unstable atomic nucleus as it transforms into a more stable configuration."}, {"front": "Who discovered radioactivity, and who further investigated it?", "back": "Henri Becquerel discovered it in 1896, and Marie and Pierre Curie further investigated it."}, {"front": "What keeps the positively charged protons in a nucleus from repelling each other and flying apart?", "back": "The strong nuclear force, which attracts protons to protons, protons to neutrons, and neutrons to neutrons at extremely short ranges, overcoming electrical repulsion."}, {"front": "What critical role do neutrons play in nuclear stability?", "back": "Neutrons contribute to the strong nuclear force without adding electrical repulsion, helping to counterbalance the growing repulsion among protons, especially in heavier elements."}, {"front": "What general proton:neutron ratio is sufficient for stability in lighter elements compared to heavier elements?", "back": "Lighter elements generally need a roughly 1:1 ratio. Heavier elements require more neutrons (e.g., 1:1.5 for Lead-208) to maintain stability."}, {"front": "What happens when the ratio of protons to neutrons falls outside the stable range?", "back": "The nucleus becomes unstable and will undergo radioactive decay, spontaneously emitting particles or energy to reach a more stable arrangement, transforming the original atom."}, {"front": "Describe an alpha particle, including its composition, charge, and penetrating power.", "back": "An alpha particle consists of 2 protons and 2 neutrons (a helium-4 nucleus), carries a +2 charge, is relatively heavy, and has low penetrating power, stoppable by paper or a few cm of air."}, {"front": "Describe a beta particle, including its composition, charge, origin, and penetrating power.", "back": "A beta particle is a high-speed electron (e-) emitted from the nucleus when a neutron transforms into a proton. It carries a -1 charge, is much lighter than an alpha particle, and has moderate penetrating power, stoppable by thin aluminum or a few mm of plastic."}, {"front": "Describe a gamma ray, including its composition, charge, mass, and penetrating power.", "back": "A gamma ray is a high-energy electromagnetic wave (photon). It carries no charge, has no mass, and has very high penetrating power, requiring thick lead or several cm of concrete to block effectively."}, {"front": "How does alpha decay affect an atom's atomic number and mass number?", "back": "The atomic number decreases by 2, and the mass number decreases by 4. The atom transforms into a different element."}, {"front": "How does beta decay affect an atom's atomic number and mass number?", "back": "The atomic number increases by 1 (due to a neutron turning into a proton), but the mass number stays the same. The atom transforms into a different element."}, {"front": "How does gamma emission affect an atom's atomic number and mass number?", "back": "Gamma emission does not change the atomic number or mass number; it is pure energy released as the nucleus rearranges into a lower-energy state."}, {"front": "Define \"half-life\" in the context of radioactive isotopes.", "back": "Half-life is the time required for half of the atoms in a sample of a radioactive isotope to decay."}, {"front": "What are two key characteristics of an isotope's half-life?", "back": "It is constant for each radioactive isotope and is unaffected by temperature, pressure, or chemical reactions."}, {"front": "A sample of a radioactive isotope has a half-life of 5 days. If you start with 100 grams, how much will remain after 15 days?", "back": "After 5 days (1 half-life): 50g. After 10 days (2 half-lives): 25g. After 15 days (3 half-lives): 12.5g."}, {"front": "Name two specific medical applications of radioisotopes mentioned in the text.", "back": "Iodine-131 for thyroid cancer treatment, Technetium-99m for imaging bones/organs, or Cobalt-60 gamma rays for radiation therapy."}, {"front": "Explain the principle of radiocarbon dating, including the isotope used and its effective dating range.", "back": "Living organisms absorb Carbon-14. Upon death, C-14 intake stops, and existing C-14 decays with a half-life of 5,730 years. By measuring remaining C-14, scientists estimate when the organism lived, effective for up to ~50,000 years."}, {"front": "How do nuclear power plants utilize radioactivity to generate electricity?", "back": "They use the energy released when uranium-235 or plutonium-239 nuclei undergo nuclear fission to heat water, produce steam, and drive turbines."}, {"front": "What radioactive isotope is typically used in household smoke detectors, and what type of radiation does it emit?", "back": "Americium-241, which is an alpha emitter."}, {"front": "What are the potential dangers of high radiation doses to living cells?", "back": "Radiation can damage living cells by breaking chemical bonds in DNA and other molecules, leading to radiation sickness and increased cancer risk."}, {"front": "What are the three main principles (TDS) for radiation safety?", "back": "Time (minimize exposure time), Distance (stay far from the source), and Shielding (use appropriate barriers)."}, {"front": "Identify three natural sources of background radiation.", "back": "Radioactive elements in rocks and soil, cosmic rays from space, and radioactive potassium-40 in food."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
