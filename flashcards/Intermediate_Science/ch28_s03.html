<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 28, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is biochemistry?", "back": "The branch of chemistry that studies the structure, function, and interactions of the molecules found in living organisms, bridging chemistry and biology.", "id": "fc01"}, {"front": "What are the four great classes of carbon-based molecules central to biochemistry?", "back": "Carbohydrates, lipids, proteins, and nucleic acids.", "id": "fc02"}, {"front": "Define dehydration synthesis.", "back": "A chemical reaction that joins two monomers by removing a water molecule (H2O), forming a new covalent bond. Also called a condensation reaction.", "id": "fc03"}, {"front": "Define hydrolysis.", "back": "A chemical reaction that breaks a covalent bond between two monomers by adding a water molecule, restoring the original functional groups on each monomer. It is the reverse of dehydration synthesis.", "id": "fc04"}, {"front": "How do human cells and the digestive system utilize dehydration synthesis and hydrolysis, respectively?", "back": "The digestive system uses hydrolysis to break down food polymers into monomers for absorption. Cells then use dehydration synthesis to reassemble those monomers into specific body polymers.", "id": "fc05"}, {"front": "What is the general chemical composition of most carbohydrates, and what are their main functions?", "back": "Composed of carbon, hydrogen, and oxygen, typically in a 1:2:1 ratio (C_n(H2O)_n). They serve as primary energy sources and structural materials.", "id": "fc06"}, {"front": "Distinguish between monosaccharides, disaccharides, and polysaccharides, providing one example for each.", "back": "Monosaccharides are simple sugar monomers (e.g., glucose). Disaccharides are two monosaccharides joined (e.g., sucrose). Polysaccharides are long chains of monosaccharides (e.g., starch, glycogen, cellulose).", "id": "fc07"}, {"front": "Name three important polysaccharides found in living organisms and state their primary functions.", "back": "Starch (energy storage in plants), Glycogen (energy storage in animals), and Cellulose (structural component of plant cell walls).", "id": "fc08"}, {"front": "Why do starch, glycogen, and cellulose have different properties despite being made solely of glucose monomers?", "back": "The glucose units are linked in different geometric arrangements, demonstrating that a molecule's structure determines its function.", "id": "fc09"}, {"front": "What is the defining characteristic that groups lipids together, and are they considered true polymers?", "back": "They are largely nonpolar, hydrophobic, and insoluble in water. No, they are not true polymers as they are not built from identical monomer subunits.", "id": "fc10"}, {"front": "Describe the basic structure of a fat or oil molecule.", "back": "It consists of one glycerol molecule bonded to three fatty acid chains.", "id": "fc11"}, {"front": "How do saturated and unsaturated fats differ in structure and physical state at room temperature?", "back": "Saturated fats have only single bonds in their fatty acid chains (solid at room temperature). Unsaturated fats have one or more double bonds, creating kinks (liquid at room temperature).", "id": "fc12"}, {"front": "What is the structure and primary function of phospholipids?", "back": "Each has a hydrophilic 'head' (with a phosphate group) and two hydrophobic fatty acid 'tails.' They are the primary structural component of cell membranes, forming a phospholipid bilayer.", "id": "fc13"}, {"front": "Why are lipids preferred for long-term energy storage over carbohydrates in the body?", "back": "Lipids store approximately twice as much energy per gram (9 calories) compared to carbohydrates (4 calories).", "id": "fc14"}, {"front": "What are the monomers of proteins, and how many different types are commonly used by living cells?", "back": "Amino acids. There are 20 different types used by living cells.", "id": "fc15"}, {"front": "What are the four main components of a general amino acid structure?", "back": "A central carbon bonded to an amino group (-NH2), a carboxyl group (-COOH), a hydrogen atom, and a variable R group (side chain).", "id": "fc16"}, {"front": "How are amino acids linked together to form a polypeptide chain?", "back": "By peptide bonds, which are covalent bonds formed via dehydration synthesis between the amino group of one amino acid and the carboxyl group of the next.", "id": "fc17"}, {"front": "Explain the relationship between a protein's amino acid sequence, its 3D shape, and its function.", "back": "The specific sequence of amino acids dictates how the polypeptide folds into a unique three-dimensional shape, which in turn determines the protein's specific function.", "id": "fc18"}, {"front": "What is protein denaturation, and what is its consequence?", "back": "Denaturation is the process where a protein loses its specific three-dimensional shape, leading to a loss of its function.", "id": "fc19"}, {"front": "Name two functional categories of proteins and give an example for each.", "back": "Examples include Enzymes (e.g., pepsin), Structural proteins (e.g., collagen), Transport proteins (e.g., hemoglobin), and Antibodies (immune defense).", "id": "fc20"}, {"front": "What are nucleic acids, and what are their two main types?", "back": "Polymers of nucleotide monomers that store and transmit genetic information. The two main types are DNA (deoxyribonucleic acid) and RNA (ribonucleic acid).", "id": "fc21"}, {"front": "What are the three main components of a nucleotide monomer?", "back": "A five-carbon sugar, a phosphate group, and a nitrogen-containing base.", "id": "fc22"}, {"front": "How do nucleotides link together to form the backbone of a nucleic acid strand?", "back": "They link by dehydration synthesis between the sugar of one nucleotide and the phosphate group of the next, forming a sugar-phosphate backbone.", "id": "fc23"}, {"front": "Describe the expected positive results for the following biomolecule tests: starch, simple sugars, proteins, and lipids.", "back": "Starch: Iodine solution turns dark blue-black. Simple sugars: Benedict's solution (with heat) turns blue to green/yellow/orange/red. Proteins: Biuret reagent turns purple/violet. Lipids: Creates a translucent spot on brown paper.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
