<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental problem does cell specialization solve in multicellular organisms?", "back": "Cell specialization solves the problem of how a single fertilized egg can develop into an organism with diverse tissues and organs, rather than a shapeless mass of identical cells."}, {"front": "Define differentiation in the context of cells.", "back": "Differentiation is the process by which an unspecialized cell develops into a cell with a distinct structure and function."}, {"front": "How does differentiation occur at the genetic level?", "back": "During differentiation, specific genes within a cell are switched on (activated) while others are switched off (silenced). This pattern determines the specific proteins a cell produces, which in turn define its shape, internal structures, and function."}, {"front": "Explain the 'recipe book' analogy used to describe cell differentiation.", "back": "Every cell in your body contains the same complete set of DNA (the 'recipe book'). However, each cell 'reads' only a few selected 'recipes' (genes) to produce the specific proteins needed for its particular role, rather than using all recipes."}, {"front": "What is another term for a specialized cell?", "back": "A differentiated cell."}, {"front": "What is the recurring theme in biology related to the structure of specialized cells?", "back": "The connection between structure and function. A specialized cell's shape and internal structure are precisely suited to its job."}, {"front": "Why are stem cells essential in an adult body?", "back": "Stem cells serve as a repair and replacement system, producing new specialized cells when old cells wear out or tissues are damaged, as most adult cells are already specialized and cannot replenish themselves in the same way."}, {"front": "Define stem cell.", "back": "A stem cell is an undifferentiated cell capable of dividing to produce more stem cells (self-renewal) and of differentiating into one or more specialized cell types."}, {"front": "What are the two remarkable abilities that distinguish stem cells?", "back": "1. Self-renewal (the ability to divide and produce more stem cells). 2. The ability to differentiate into specialized cell types."}, {"front": "Which category of stem cell can give rise to every cell type in the body, plus the cells that form the placenta?", "back": "Totipotent stem cells."}, {"front": "Give an example of a totipotent stem cell.", "back": "The fertilized egg and the cells produced by its first few divisions."}, {"front": "Which category of stem cell can become almost any cell type in the body but cannot form placental tissue?", "back": "Pluripotent stem cells."}, {"front": "What is an example of a pluripotent stem cell?", "back": "Embryonic stem cells."}, {"front": "Which category of stem cell can differentiate into several related cell types within a particular tissue?", "back": "Multipotent stem cells."}, {"front": "Give an example of multipotent stem cells and the types of cells they can produce.", "back": "Blood stem cells in bone marrow can produce red blood cells, white blood cells, and platelets, but not nerve cells or muscle cells."}, {"front": "Where are adult stem cells found, and what is their general role?", "back": "Adult stem cells are found in many tissues (e.g., bone marrow, skin, intestine, brain) and quietly divide throughout life, replacing cells that are damaged, worn out, or dead."}, {"front": "What are the scientific advantages of using embryonic stem cells compared to adult stem cells in research?", "back": "Embryonic stem cells are pluripotent, meaning they can differentiate into nearly any cell type, making them more versatile for medical research and potential tissue/organ replacement than multipotent adult stem cells."}, {"front": "What are the main ethical concerns surrounding embryonic stem cell research, and how might scientists address some of these?", "back": "Ethical concerns center on the source of embryonic stem cells (typically from embryos). Scientists are addressing this by developing induced pluripotent stem cells (iPSCs), which reprogram adult cells back to a pluripotent state, avoiding the use of embryos."}, {"front": "Describe the primary function and key structural adaptations of a nerve cell (neuron).", "back": "Neurons are communication specialists. Their elongated shape, with a long axon and branching dendrites, allows them to carry electrical impulses over great distances and receive signals from other neurons efficiently."}, {"front": "Describe the primary function and key structural adaptations of a red blood cell (erythrocyte).", "back": "Red blood cells are oxygen delivery trucks. Their biconcave disk shape maximizes surface area for gas exchange. In mammals, they lack a nucleus and most organelles, providing more interior space for hemoglobin to bind oxygen."}, {"front": "Describe the primary function and key structural adaptations of a muscle cell (muscle fiber).", "back": "Muscle cells are responsible for contraction. They are long, cylindrical fibers packed with protein filaments (actin and myosin) that slide past each other. They are multinucleated and contain many mitochondria to supply the ATP needed for repeated contractions."}, {"front": "Describe the primary functions and key structural adaptations of epithelial cells.", "back": "Epithelial cells form protective barriers, controlling what enters and leaves the body. They are tightly packed together in flat sheets. In areas like the small intestine, they have microvilli, which are finger-like projections that increase the surface area for nutrient absorption."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
