<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 30, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why are major global challenges like climate change, disease, and energy considered \"cross-branch\" problems?", "back": "They do not fit neatly into a single scientific discipline and require collaboration, sharing tools, data, and ideas across traditional boundaries to solve.", "id": "fc01"}, {"front": "What is the \"enhanced greenhouse effect\" and which Earth Science unit covered it?", "back": "It is the increase in atmospheric CO2 and other greenhouse gases due to human activity, leading to global warming; covered in Unit 27.", "id": "fc02"}, {"front": "How do paleoclimatologists reconstruct Earth's past climates?", "back": "By analyzing natural records such as ice cores, tree rings, and sediment records.", "id": "fc03"}, {"front": "How does the molecular structure of greenhouse gases relate to the greenhouse effect?", "back": "Specific molecular structures (e.g., covalent bonds and molecular geometry, Unit 13) allow molecules like CO2, CH4, N2O, and H2O to absorb infrared radiation.", "id": "fc04"}, {"front": "Describe the chemical process of ocean acidification.", "back": "CO2 dissolves in seawater to form carbonic acid (CO2 + H2O -> H2CO3), which lowers the pH of the ocean (Unit 23).", "id": "fc05"}, {"front": "Explain the role of electromagnetic radiation in climate science.", "back": "The sun emits visible light, Earth's surface re-radiates infrared light, and greenhouse gases absorb and re-emit this infrared energy (Unit 19), contributing to the greenhouse effect.", "id": "fc06"}, {"front": "Which physics concept is key to calculating the energy output of renewable sources like solar panels and wind turbines?", "back": "Energy and power calculations ($P = W/t$, Unit 14) are used to determine their output.", "id": "fc07"}, {"front": "What is the primary biological carbon sink, and how does deforestation impact it?", "back": "Photosynthesis (Unit 11), performed by plants, removes CO2 from the atmosphere. Deforestation (Unit 26) reduces this sink, accelerating climate change.", "id": "fc08"}, {"front": "How does the concept of evolution apply to the effects of climate change on ecosystems?", "back": "Evolution (Unit 21) predicts that some species will adapt to changing conditions while others may go extinct, depending on the speed of environmental change and genetic variation.", "id": "fc09"}, {"front": "How does genetics contribute to modern medicine?", "back": "Genetics (Unit 16) explains inherited diseases, enables genetic testing, and underpins DNA technology like gene therapy, which replaces defective genes.", "id": "fc10"}, {"front": "How do functional groups and acid-base chemistry play a role in drug design and absorption?", "back": "Functional groups (Unit 28) determine how a drug binds to a receptor, while acid-base chemistry (Unit 23) affects drug absorption based on pH in the body.", "id": "fc11"}, {"front": "Briefly explain the physics behind MRI scanners.", "back": "MRI scanners use powerful electromagnets (Unit 29) and radio waves (Unit 19) to create detailed images of soft tissue without using ionizing radiation.", "id": "fc12"}, {"front": "What is the principle behind ultrasound imaging?", "back": "Ultrasound uses high-frequency sound waves (Unit 19) and the principle of reflection to create images of internal organs and fetuses.", "id": "fc13"}, {"front": "How does Earth Science contribute to public health regarding disease?", "back": "Understanding water quality (Unit 17) helps prevent waterborne diseases, atmospheric science (Unit 12) tracks air pollution, and climate change (Unit 27) can expand disease vector ranges.", "id": "fc14"}, {"front": "How is the law of conservation of energy fundamental to sustainable energy?", "back": "It dictates that energy can be transformed from one form to another (e.g., solar to electrical, wind to electrical) but cannot be created or destroyed, guiding efficient energy conversion (Unit 14).", "id": "fc15"}, {"front": "Describe the energy conversions in a hydroelectric dam.", "back": "Hydroelectric dams convert the gravitational potential energy ($PE = mgh$, Unit 14) of elevated water into kinetic energy, which then drives turbines to generate electricity via electromagnetic induction.", "id": "fc16"}, {"front": "What role does chemistry play in battery technology for energy storage?", "back": "Batteries store energy in chemical bonds (Unit 13) and release it through oxidation-reduction reactions (Unit 18), requiring chemical understanding for design and improvement.", "id": "fc17"}, {"front": "What is a hydrogen fuel cell and its primary chemical reaction?", "back": "A hydrogen fuel cell generates electricity without combustion using the reaction 2H2 + O2 -> 2H2O + energy.", "id": "fc18"}, {"front": "How does Earth Science determine the viability and placement of renewable energy sources?", "back": "It informs on solar radiation (latitude, cloud cover), wind patterns, geothermal heat sources, tidal forces, ocean currents, and the geological locations of rare-earth elements needed for technologies (Units 2, 12, 17, 22).", "id": "fc19"}, {"front": "How do biofuels differ from fossil fuels in terms of their biological origin?", "back": "Biofuels derive energy from recently grown plant material via processes like photosynthesis (Unit 11) and fermentation, while fossil fuels are formed from ancient organic matter over geological time.", "id": "fc20"}, {"front": "What role does ecology play in evaluating sustainable energy projects?", "back": "Ecology (Unit 26) helps assess environmental impacts, such as a wind farm's effect on bird populations, a dam's disruption of fish migration, or land use changes from solar installations.", "id": "fc21"}, {"front": "Why is it inaccurate to claim climate change is \"just an Earth Science problem\"? Provide specific examples.", "back": "Climate change involves physics (EM radiation, energy balance), chemistry (greenhouse gas molecular structure, ocean acidification, combustion), and life science (photosynthesis, deforestation, ecosystem response, evolution) in addition to Earth science (atmosphere, paleoclimatology).", "id": "fc22"}, {"front": "Give two examples of how physics principles are applied in a hospital setting, beyond major imaging technologies.", "back": "An electrocardiogram (ECG) measures electrical signals (Unit 24) of the heart, and a pulse oximeter uses light absorption (Unit 19) to measure blood oxygen levels.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
