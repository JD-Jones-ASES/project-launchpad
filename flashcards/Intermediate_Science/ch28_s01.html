<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 28, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental element forms the backbone of life's molecules and is found in substances like diamonds, gasoline, and DNA?", "back": "Carbon."}, {"front": "Explain why carbon is considered the most versatile bonding element on the periodic table.", "back": "Carbon has four valence electrons, enabling it to form four strong covalent bonds to complete its octet with remarkable ease. This allows for diverse structures and bonding partners."}, {"front": "Define 'organic compound' and provide its key characteristic.", "back": "An organic compound is a compound that contains carbon atoms bonded to other carbon atoms and usually to hydrogen, oxygen, nitrogen, or other elements."}, {"front": "List three common carbon-containing compounds that are classified as inorganic.", "back": "Carbon dioxide (CO2), carbon monoxide (CO), carbonates (CO3^2-), and cyanides (CN^-)."}, {"front": "Describe three key aspects of carbon's bonding flexibility that contribute to the vast diversity of organic chemistry.", "back": "1) Carbon can form single, double, and triple bonds (C-C, C=C, C#C). 2) Carbon atoms can bond to other carbon atoms, creating chains, branches, and rings of virtually unlimited length. 3) Carbon bonds readily to hydrogen, oxygen, nitrogen, sulfur, phosphorus, and halogens."}, {"front": "Compare carbon's bonding stability and double/triple bond formation with that of silicon, its Group 14 neighbor.", "back": "Carbon-carbon (C-C) bonds are significantly stronger and more stable than silicon-silicon (Si-Si) bonds. Also, carbon readily forms strong double and triple bonds, whereas silicon forms very weak and unstable double or triple bonds under normal conditions."}, {"front": "Define 'inorganic compound.'", "back": "An inorganic compound is a compound that does not contain carbon-carbon bonds or carbon-hydrogen bonds. A few carbon-containing compounds are exceptions due to their properties."}, {"front": "What are hydrocarbons?", "back": "Hydrocarbons are organic compounds composed entirely of carbon and hydrogen atoms."}, {"front": "How are hydrocarbons classified based on the types of bonds between their carbon atoms?", "back": "Hydrocarbons are classified as alkanes (only single bonds), alkenes (at least one double bond), or alkynes (at least one triple bond)."}, {"front": "What is the general molecular formula for a straight-chain alkane with 'n' carbon atoms?", "back": "CnH2n+2."}, {"front": "Explain the difference between a molecular formula and a structural formula.", "back": "A molecular formula tells you the types and number of atoms in a molecule (e.g., C2H6O), while a structural formula shows the specific arrangement of atoms and every covalent bond as a line between them."}, {"front": "Define 'isomer.'", "back": "An isomer is one of two or more compounds that have the same molecular formula but different structural arrangements of atoms."}, {"front": "Why do isomers, despite having identical molecular formulas, often exhibit different physical and chemical properties?", "back": "Isomers have different structural arrangements, meaning their atoms are connected in different ways. This leads to different molecular shapes, bond angles, and intermolecular forces, which in turn dictate their physical and chemical properties."}, {"front": "Give an example of two isomers with the molecular formula C2H6O and briefly state a key difference in their properties.", "back": "Ethanol (CH3CH2OH) is a liquid with a boiling point of 78°C that can form hydrogen bonds. Dimethyl ether (CH3OCH3) is a gas with a boiling point of -24°C that cannot form hydrogen bonds."}, {"front": "How does the number of possible isomers change as the carbon chain length of a molecule increases?", "back": "The number of possible isomers increases dramatically as carbon chains grow longer (e.g., C4H10 has 2 isomers, C30H62 has over four billion)."}, {"front": "Explain the connection between fossil fuels, the carbon cycle, and atmospheric CO2.", "back": "Fossil fuels (coal, petroleum, natural gas) are hydrocarbons formed from ancient organisms. The carbon in these fuels was originally captured from atmospheric CO2 by photosynthesis. Burning fossil fuels releases this ancient carbon back into the atmosphere as CO2, contributing to the greenhouse effect."}, {"front": "Who was Dorothy Hodgkin, and what was her groundbreaking contribution to chemistry?", "back": "Dorothy Hodgkin was a British chemist who pioneered X-ray crystallography to determine the complex three-dimensional structures of organic molecules, most notably penicillin, vitamin B12, and insulin."}, {"front": "Why is understanding the exact arrangement of atoms in a molecule, as Hodgkin demonstrated, so important?", "back": "Knowing the exact arrangement of atoms is crucial because it directly dictates a molecule's function, reactivity, and physical properties."}, {"front": "Name the smallest hydrocarbon and provide its molecular formula.", "back": "Methane (CH4)."}, {"front": "List the first four straight-chain alkanes in order of increasing carbon atoms.", "back": "Methane (1 carbon), Ethane (2 carbons), Propane (3 carbons), and Butane (4 carbons)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
