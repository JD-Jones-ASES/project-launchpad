<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 27, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the average surface temperature of Earth *without* its atmosphere, and what causes the difference from the actual average?", "back": "Without an atmosphere, Earth's average temperature would be about -18°C. The natural greenhouse effect warms the planet by 33°C, bringing the actual average to about 15°C.", "id": "fc01"}, {"front": "Define the \"greenhouse effect.\"", "back": "The greenhouse effect is the process by which certain gases in Earth's atmosphere absorb and re-emit infrared radiation (heat energy) radiated by Earth's surface, trapping thermal energy and warming the planet.", "id": "fc02"}, {"front": "What is albedo, and how does it relate to incoming solar radiation?", "back": "Albedo is the fraction of incoming solar radiation that is reflected by a surface. About 30% of incoming solar energy is reflected back to space by clouds, ice, and bright surfaces (high albedo).", "id": "fc03"}, {"front": "Describe the four main steps of how the natural greenhouse effect works.", "back": "1. Incoming solar radiation (visible/UV) warms Earth. 2. Earth's warmed surface emits infrared (IR) radiation. 3. Greenhouse gases absorb much of this outgoing IR. 4. Gases re-emit IR in all directions, including back to Earth, warming it further.", "id": "fc04"}, {"front": "Explain why the analogy between Earth's atmosphere and a glass greenhouse is imperfect.", "back": "A glass greenhouse primarily traps heat by preventing warm air from rising and escaping. The atmospheric greenhouse effect works by absorbing and re-radiating infrared radiation, a different mechanism.", "id": "fc05"}, {"front": "Which two atmospheric gases make up 99% of the atmosphere but are *not* greenhouse gases? Why not?", "back": "Nitrogen (N2) and Oxygen (O2) are not greenhouse gases. They are symmetric diatomic molecules with no dipole change during vibration, so they cannot absorb infrared radiation significantly.", "id": "fc06"}, {"front": "What molecular characteristic allows greenhouse gases like CO2 and CH4 to absorb infrared radiation?", "back": "Greenhouse gas molecules have asymmetric bonds that create a changing electric dipole when they vibrate, which allows them to interact with and absorb infrared photons.", "id": "fc07"}, {"front": "Identify the most abundant natural greenhouse gas and explain its role as a feedback mechanism.", "back": "Water vapor (H2O) is the most abundant natural greenhouse gas. It acts as a feedback: as other GHGs warm the atmosphere, more water evaporates, which traps more heat, causing more evaporation. Its concentration is primarily temperature-controlled.", "id": "fc08"}, {"front": "What is the most important greenhouse gas that humans can influence, and what are its primary human sources?", "back": "Carbon dioxide (CO2). Primary human sources are burning fossil fuels (coal, oil, natural gas) and deforestation.", "id": "fc09"}, {"front": "How much has atmospheric CO2 concentration increased since the pre-industrial era (around 280 ppm)?", "back": "Atmospheric CO2 has increased by about 50%, from approximately 280 ppm pre-industrially to over 420 ppm today.", "id": "fc10"}, {"front": "Identify three significant sources of methane (CH4) emissions.", "back": "Significant sources include livestock (enteric fermentation), rice paddies, landfills, natural gas leaks, wetlands, and thawing permafrost.", "id": "fc11"}, {"front": "Compare the heat-trapping potency of methane (CH4) and nitrous oxide (N2O) relative to carbon dioxide (CO2).", "back": "Methane (CH4) is about 80 times more effective at trapping heat than CO2 over a 20-year period. Nitrous oxide (N2O) is about 270 times more potent than CO2 per molecule over 100 years.", "id": "fc12"}, {"front": "Define the \"enhanced greenhouse effect\" and explain how it differs from the natural greenhouse effect.", "back": "The enhanced greenhouse effect is the additional warming caused by the increase in greenhouse gas concentrations due to human activities. It intensifies the natural greenhouse effect beyond its equilibrium level, leading to global warming. The natural effect is essential for life, while the enhanced effect causes problems.", "id": "fc13"}, {"front": "List three major human activities that contribute to the enhanced greenhouse effect.", "back": "Major contributors include burning fossil fuels for energy and transportation, deforestation, agriculture (livestock, fertilizers, rice paddies), and industrial processes (cement manufacturing).", "id": "fc14"}, {"front": "Distinguish between a \"carbon source\" and a \"carbon sink.\"", "back": "A carbon source is any process or reservoir that releases more carbon into the atmosphere than it absorbs (e.g., fossil fuel combustion, deforestation). A carbon sink is any process or reservoir that absorbs more carbon from the atmosphere than it releases (e.g., forests, oceans, soil).", "id": "fc15"}, {"front": "Name Earth's three major natural carbon sinks and the approximate percentage of human CO2 emissions each absorbs.", "back": "Earth's major natural carbon sinks are the ocean (absorbs roughly 25% of human emissions), terrestrial vegetation (absorbs about 25% through photosynthesis), and soil.", "id": "fc16"}, {"front": "What is the \"cost\" of the ocean absorbing a significant portion of human CO2 emissions?", "back": "Dissolved CO2 reacts with seawater to form carbonic acid (H2CO3), lowering the ocean's pH. This process is called ocean acidification.", "id": "fc17"}, {"front": "What happens to the approximately 50% of human CO2 emissions not absorbed by natural carbon sinks?", "back": "It accumulates in the atmosphere, increasing the concentration year by year.", "id": "fc18"}, {"front": "What is the \"Keeling Curve,\" and where are its measurements taken?", "back": "The Keeling Curve is the continuous record of atmospheric CO2 concentration measured at the Mauna Loa Observatory in Hawaii since 1958.", "id": "fc19"}, {"front": "Describe the two main patterns observed in the Keeling Curve.", "back": "1. A steady upward trend: CO2 has risen from ~315 ppm in 1958 to over 420 ppm today. 2. Seasonal oscillations: CO2 drops slightly each Northern Hemisphere summer (due to increased photosynthesis) and rises in winter (as photosynthesis slows).", "id": "fc20"}, {"front": "Who was Charles David Keeling, and what is the significance of his contribution to climate science?", "back": "Charles David Keeling was an American geochemist who established continuous, high-precision measurements of atmospheric CO2 at Mauna Loa, creating the Keeling Curve. This data set provided the first clear evidence of rising CO2 levels and became an iconic symbol of climate change, essential for the scientific case for human-caused global warming.", "id": "fc21"}, {"front": "How can one interpret the seasonal oscillations shown on the Keeling Curve?", "back": "The seasonal drops in CO2 during Northern Hemisphere summer reflect increased photosynthesis by land plants in the large northern landmasses. The rises in winter occur as photosynthesis slows and decomposition continues, releasing CO2. This represents the \"breathing\" of the biosphere.", "id": "fc22"}, {"front": "If atmospheric CO2 was 315 ppm in 1958 and 420 ppm in 2023, what was the average rate of change over this period?", "back": "Rate = (420 ppm - 315 ppm) / (2023 - 1958) = 105 ppm / 65 years = approximately 1.6 ppm/year.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
