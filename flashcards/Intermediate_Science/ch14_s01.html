<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 14, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How is 'work' defined in physics?", "back": "Work is the product of the force applied to an object and the displacement of the object in the direction of the force. Work is done only when a force causes an object to move."}, {"front": "What is the SI unit of work?", "back": "The SI unit of work is the joule (J)."}, {"front": "Define one joule (J) in terms of newtons and meters.", "back": "One joule (J) equals one newton-meter (N·m). It is the work done when a force of one newton moves an object one meter in the direction of the force."}, {"front": "How can one joule (J) be expressed in base SI units (kg, m, s)?", "back": "$1 J = 1 N \\cdot m = 1 kg \\cdot m^2/s^2$."}, {"front": "What two conditions must be met for 'work' to be done on an object in physics?", "back": "1) A force must be applied to the object. 2) The object must move (be displaced) in the direction of (or have a component in the direction of) the applied force."}, {"front": "Give an example of an everyday activity considered 'work' that does NOT qualify as physics work. Explain why.", "back": "Holding a heavy backpack, or pushing against a wall that does not move. These do not qualify as physics work because there is no displacement (motion) of the object."}, {"front": "What is the basic equation for work ($W$) when a constant force ($F$) acts on an object and moves a distance ($d$) in the direction of the force?", "back": "$W = Fd$"}, {"front": "What is the general work equation ($W$) when the force ($F$) is not in the same direction as the displacement ($d$)? What does the extra term represent?", "back": "$W = Fd \\cos\\theta$, where $\\theta$ is the angle between the force and the direction of displacement. The $\\cos\\theta$ term gives the fraction of the force that acts in the direction of motion."}, {"front": "Why is a trigonometric function (specifically cosine) necessary for the general work equation?", "back": "Only the component of the force that acts parallel to the direction of motion does work. The cosine function helps find this effective component when the force is applied at an angle."}, {"front": "In a right triangle, identify the three sides relative to an angle $\\theta$.", "back": "Hypotenuse (the longest side, opposite the right angle), Adjacent (the side next to angle $\\theta$, not the hypotenuse), Opposite (the side across from angle $\\theta$)."}, {"front": "How is the cosine function defined in terms of the sides of a right triangle relative to angle $\\theta$?", "back": "$\\cos\\theta = \\frac{\\text{adjacent}}{\\text{hypotenuse}}$"}, {"front": "In the context of the work formula ($W = Fd \\cos\\theta$), which side of the right triangle analogy represents the force ($F$) and which represents the component of force along the direction of motion?", "back": "The force ($F$) represents the hypotenuse, and the component of force along the direction of motion represents the adjacent side."}, {"front": "What does 'positive work' ($W > 0$) signify? Provide an example.", "back": "Positive work means the force has a component in the direction of motion. Energy is transferred to the object, increasing its kinetic energy. Example: Pushing a box across the floor in the direction it moves ($\\theta = 0^\\circ$)."}, {"front": "What does 'negative work' ($W < 0$) signify? Provide an example.", "back": "Negative work means the force has a component opposite to the direction of motion. Energy is transferred from the object, decreasing its kinetic energy. Example: Friction acting on a sliding box ($\\theta = 180^\\circ$)."}, {"front": "What does 'zero work' ($W = 0$) signify when a force is present?", "back": "Zero work can signify either that the force is perpendicular to the direction of motion (e.g., normal force on a sliding box, $\\theta = 90^\\circ$), or that there is no displacement despite a force being applied (e.g., holding a heavy box motionless)."}, {"front": "What is the value of $\\cos(0^\\circ)$?", "back": "$\\cos(0^\\circ) = 1$"}, {"front": "What is the value of $\\cos(90^\\circ)$?", "back": "$\\cos(90^\\circ) = 0$"}, {"front": "What is the value of $\\cos(180^\\circ)$?", "back": "$\\cos(180^\\circ) = -1$"}, {"front": "A student pulls a sled with a force of $50 N$ along a rope that makes a $60^\\circ$ angle with the horizontal ground. The sled moves $10 m$ along the ground. How much work does the student do?", "back": "$W = Fd \\cos\\theta = (50 N)(10 m)(\\cos 60^\\circ) = (50 N)(10 m)(0.5) = 250 J$. The student does $250 J$ of work."}, {"front": "A waiter carries a tray of food horizontally across a restaurant at a constant speed, exerting an upward force on the tray. How much physics work does the waiter do *on the tray*? Explain.", "back": "Zero work. The upward force exerted by the waiter is perpendicular to the horizontal displacement of the tray ($\\theta = 90^\\circ$). Since $\\cos(90^\\circ) = 0$, $W = Fd \\cos(90^\\circ) = 0$."}, {"front": "In the waiter example (carrying a tray horizontally), the waiter expends metabolic energy. Why is this not considered physics work done *on the tray*?", "back": "The waiter's muscles are doing metabolic work to maintain the force (chemical energy conversion), but no physics work is done on the tray because the force applied by the waiter is perpendicular to the tray's displacement, and the tray's kinetic energy does not change in the vertical direction."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
