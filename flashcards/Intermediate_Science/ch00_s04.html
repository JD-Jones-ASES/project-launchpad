<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 0, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a scientific model?", "back": "A simplified representation of something complex that helps us understand, explain, and make predictions about the real world.", "id": "fc01"}, {"front": "Why do scientists use models to study things they cannot directly observe?", "back": "Models allow scientists to understand, explain, and make predictions about complex or unobservable phenomena (like atoms, Earth's center, or star formation processes).", "id": "fc02"}, {"front": "Define 'physical model' and give an example.", "back": "A three-dimensional representation of an object or system that you can see and touch, often built to scale and simplified. Example: A globe of Earth.", "id": "fc03"}, {"front": "What is a key strength of a physical model like a globe?", "back": "It provides a tangible, visual representation of spatial relationships, simplifying complexity to highlight essential features, making it easier to study than the real object.", "id": "fc04"}, {"front": "What is a 'conceptual model'?", "back": "A description, diagram, or analogy that helps explain how something works, often using familiar ideas to represent unfamiliar processes.", "id": "fc05"}, {"front": "Provide two examples of a conceptual model.", "back": "A food web diagram showing energy flow through an ecosystem, or comparing the flow of electrical current to water through a pipe.", "id": "fc06"}, {"front": "Define 'mathematical model'.", "back": "An equation or set of equations that describes the quantitative relationships between variables in a system, allowing scientists to make precise, numerical predictions.", "id": "fc07"}, {"front": "Provide an example of a mathematical model from physics.", "back": "Newton's second law, $F = ma$, which describes the relationship between force, mass, and acceleration.", "id": "fc08"}, {"front": "How do scientific models aid in 'understanding' complex systems?", "back": "Models help understanding by focusing on the most important parts and ignoring less relevant details, making complex systems (like a circuit diagram) easier to grasp.", "id": "fc09"}, {"front": "Explain how models facilitate 'communication' in science.", "back": "Models provide a shared language and visual representation, making complex scientific ideas portable and understandable to other scientists globally (e.g., a geological cross-section).", "id": "fc10"}, {"front": "What is a critical role of models in making 'predictions'?", "back": "Good models allow scientists to forecast what will happen in unobserved situations, such as predicting climate change impacts or the spread of a disease.", "id": "fc11"}, {"front": "How do models help in 'testing ideas' or hypotheses before experiments?", "back": "They allow scientists to test hypotheses and potential outcomes before running expensive or time-consuming experiments, such as modeling bridges on computers or population dynamics.", "id": "fc12"}, {"front": "What is a fundamental limitation inherent in every scientific model?", "back": "Every model is a simplification, meaning it leaves something out and therefore has boundaries beyond which it stops being accurate.", "id": "fc13"}, {"front": "Why is it crucial for scientists to be aware of and communicate a model's limitations?", "back": "Knowing where a model breaks down is as important as knowing where it works; this prevents misapplication and ensures clear communication of its accuracy range (e.g., a weather forecast).", "id": "fc14"}, {"front": "What typically happens to scientific models when new evidence emerges that they cannot explain?", "back": "Scientists modify, extend, or sometimes replace the model with a better one that accounts for the new evidence while still explaining everything the old model got right.", "id": "fc15"}, {"front": "Describe John Dalton's early 19th-century atomic model.", "back": "Dalton proposed that atoms were tiny, indivisible spheres, like miniature billiard balls. This model explained why elements combine in fixed ratios.", "id": "fc16"}, {"front": "How did J. J. Thomson's discovery of the electron (1897) change the atomic model?", "back": "Dalton's model could not account for charged particles. Thomson proposed the 'plum pudding' model, with negative electrons embedded in a positively charged sphere.", "id": "fc17"}, {"front": "What discovery led Ernest Rutherford to propose his nuclear model of the atom in 1911?", "back": "His gold foil experiment showed that most of an atom's mass is concentrated in a tiny, dense nucleus, which contradicted the plum pudding model.", "id": "fc18"}, {"front": "How did Niels Bohr refine Rutherford's nuclear model of the atom?", "back": "Bohr proposed that electrons orbit the nucleus at specific, fixed distances corresponding to discrete energy levels, which explained why atoms emit light at particular wavelengths (line spectra).", "id": "fc19"}, {"front": "What is the current scientific model for the atom, and how does it describe electrons?", "back": "The quantum mechanical model describes electrons not as particles in fixed orbits, but as probability clouds – regions where an electron is likely to be found.", "id": "fc20"}, {"front": "According to Niels Bohr, what is the primary purpose of a scientific model?", "back": "Bohr believed a model's purpose is not to describe what nature *is*, but to help us understand what we *can say* about nature; they are tools for understanding, not photographs of reality.", "id": "fc21"}, {"front": "Why is it more accurate to say that past atomic models were 'incomplete' rather than 'wrong'?", "back": "Each successive model explained everything the previous one did, plus the new evidence that the older model could not handle, demonstrating an evolution of understanding rather than outright error.", "id": "fc22"}, {"front": "In a controlled experiment, why is it important to have multiple samples or trials per group (e.g., five pots instead of one)?", "back": "Using multiple samples (replication) helps to reduce the impact of individual variations or random errors, increasing the reliability and statistical validity of the results by allowing for calculations like mean and range.", "id": "fc23"}, {"front": "Identify two controlled variables from the Plant Growth Experiment and explain why they must be kept constant.", "back": "Examples: type of seed, amount of soil, amount of water, temperature, type of pot. These must be kept constant to ensure that only the independent variable (hours of light) affects the dependent variable (plant height), allowing for a clear cause-and-effect relationship.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
