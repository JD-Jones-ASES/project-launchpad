<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "From where does the bulk of a tree's dry weight originate?", "back": "The bulk of a tree's dry weight comes from carbon dioxide pulled from the air, through the process of photosynthesis.", "id": "fc01"}, {"front": "Define photosynthesis.", "back": "Photosynthesis is the process by which autotrophs use light energy to convert carbon dioxide and water into glucose and oxygen. It occurs in the chloroplasts of plant and algae cells.", "id": "fc02"}, {"front": "Write the overall balanced chemical equation for photosynthesis.", "back": "6CO2 + 6H2O →[light] C6H12O6 + 6O2", "id": "fc03"}, {"front": "What are the main inputs (reactants) and outputs (products) of photosynthesis?", "back": "Inputs: Carbon dioxide (CO2) and water (H2O). Outputs: Glucose (C6H12O6) and oxygen (O2). Light energy is converted into chemical energy stored in glucose.", "id": "fc04"}, {"front": "What are the two major stages of photosynthesis, and in which organelle do they occur?", "back": "The two major stages are the light reactions and the Calvin cycle. Both occur inside the specialized organelle called the chloroplast.", "id": "fc05"}, {"front": "Describe the key internal structures of a chloroplast.", "back": "A chloroplast has a double outer membrane enclosing a fluid-filled interior called the stroma. Suspended within the stroma are flattened membrane sacs called thylakoids, which are often stacked in columns called grana.", "id": "fc06"}, {"front": "What is a thylakoid, and what important pigment is found within its membranes?", "back": "A thylakoid is a flattened, membrane-bound sac inside the chloroplast where the light reactions of photosynthesis occur. Its membranes contain the pigment chlorophyll.", "id": "fc07"}, {"front": "What is chlorophyll, and what is its role in photosynthesis?", "back": "Chlorophyll is the primary photosynthetic pigment in plants and algae. It absorbs light energy (especially red and blue wavelengths) to drive the light reactions of photosynthesis.", "id": "fc08"}, {"front": "Where do the light reactions take place, and what is their primary energy requirement?", "back": "The light reactions take place in the thylakoid membranes and require direct light energy.", "id": "fc09"}, {"front": "Briefly summarize the three main events of the light reactions.", "back": "1. Light absorption: Chlorophyll absorbs photons, energizing electrons. 2. Water splitting: Water molecules are split, releasing oxygen gas (O2), protons (H+), and electrons. 3. Energy carriers produced: Energized electrons move along an electron transport chain, producing ATP and NADPH.", "id": "fc10"}, {"front": "What is the source of the oxygen gas released during photosynthesis?", "back": "The oxygen gas released during photosynthesis comes from the splitting of water molecules (2H2O → 4H+ + 4e- + O2) during the light reactions.", "id": "fc11"}, {"front": "What is the purpose of ATP and NADPH produced during the light reactions?", "back": "ATP and NADPH are energy carriers that transport the chemical energy captured from light to the Calvin cycle, where it is used to convert carbon dioxide into glucose.", "id": "fc12"}, {"front": "What is the Calvin cycle, and where does it take place?", "back": "The Calvin cycle is the second stage of photosynthesis, occurring in the stroma of the chloroplast, in which carbon dioxide is converted into glucose using the ATP and NADPH produced by the light reactions.", "id": "fc13"}, {"front": "Does the Calvin cycle directly require light? Explain.", "back": "No, the Calvin cycle does not directly require light. However, it depends on the ATP and NADPH produced by the light reactions, which do require light.", "id": "fc14"}, {"front": "Why is the Calvin cycle sometimes called 'carbon fixation'?", "back": "It is called 'carbon fixation' because it fixes (attaches) carbon from inorganic CO2 into organic molecules, initiating the synthesis of sugars.", "id": "fc15"}, {"front": "Briefly describe the three main phases of the Calvin cycle.", "back": "1. Carbon fixation: CO2 attaches to a 5-carbon molecule by RuBisCO. 2. Reduction: ATP and NADPH provide energy and electrons to convert molecules into G3P. 3. Regeneration: Some G3P regenerates the starting 5-carbon molecule, while others build glucose.", "id": "fc16"}, {"front": "How many turns of the Calvin cycle are required to produce enough G3P to assemble one molecule of glucose?", "back": "It takes six turns of the Calvin cycle (fixing six CO2 molecules) to produce enough G3P to assemble one molecule of glucose (C6H12O6).", "id": "fc17"}, {"front": "List four environmental factors that affect the rate of photosynthesis.", "back": "Light intensity, carbon dioxide concentration, temperature, and water availability.", "id": "fc18"}, {"front": "How does increasing light intensity affect the rate of photosynthesis?", "back": "As light intensity increases, the rate of photosynthesis increases up to a point. Beyond a certain intensity, the rate levels off because other factors become limiting.", "id": "fc19"}, {"front": "Explain how temperature affects the rate of photosynthesis.", "back": "Photosynthesis relies on enzymes, which work best within an optimal temperature range (typically 25–35°C). Too cold slows enzymes; too hot can denature them, causing them to stop working.", "id": "fc20"}, {"front": "Why does insufficient water availability slow down photosynthesis?", "back": "Water is a direct reactant. Additionally, plants close their stomata (leaf pores) to reduce water loss, which also limits CO2 intake and slows photosynthesis.", "id": "fc21"}, {"front": "What is a 'limiting factor' in the context of photosynthesis rate?", "back": "A limiting factor is an environmental condition (e.g., light, CO2, temperature, water) that restricts the rate of photosynthesis, even if other factors are optimal. The rate cannot increase until that limiting factor is addressed.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
