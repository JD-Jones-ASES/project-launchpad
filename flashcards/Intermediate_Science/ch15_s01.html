<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overarching concept that connects all branches of science regarding energy?", "back": "Energy is the great connector, involved in how it is captured, stored, transferred, transformed, and conserved across all systems, governed by the same fundamental principles.", "id": "fc01"}, {"front": "What is the primary process by which life on Earth captures energy from the sun?", "back": "Photosynthesis captures light energy and converts it into chemical energy stored in glucose (C6H12O6).", "id": "fc02"}, {"front": "Provide the overall equation for photosynthesis and explain what it achieves.", "back": "6CO2 + 6H2O ->[light] C6H12O6 + 6O2. It captures light energy and converts it into chemical energy stored in glucose.", "id": "fc03"}, {"front": "How is energy stored within a glucose molecule?", "back": "Energy is stored in the chemical bonds between atoms within the glucose molecule.", "id": "fc04"}, {"front": "Provide the overall equation for cellular respiration and explain what it achieves.", "back": "C6H12O6 + 6O2 -> 6CO2 + 6H2O + energy (ATP + heat). It breaks the bonds in glucose to release stored chemical energy to produce ATP and heat.", "id": "fc05"}, {"front": "How do photosynthesis and cellular respiration relate to each other in terms of energy flow?", "back": "They are essentially reverse reactions: photosynthesis stores energy from the sun in glucose, while cellular respiration releases that stored energy.", "id": "fc06"}, {"front": "How does the law of conservation of energy apply to living systems?", "back": "Energy is transformed from light energy to chemical energy to the kinetic and thermal energy of living processes, but it is never created or destroyed.", "id": "fc07"}, {"front": "Explain how the sun's energy drives Earth's weather and climate.", "back": "Solar radiation heats Earth's surface unevenly (equator vs. poles). This unequal heating creates temperature differences, which create pressure differences, driving wind and producing weather systems.", "id": "fc08"}, {"front": "Describe the greenhouse effect in terms of energy flow.", "back": "Incoming solar radiation is absorbed by Earth's surface and re-emitted as infrared radiation. Greenhouse gases in the atmosphere absorb some of this outgoing energy and re-radiate it back to the surface, keeping the planet warm.", "id": "fc09"}, {"front": "What determines Earth's average temperature on a global scale?", "back": "The global energy balance, which is the balance between incoming solar radiation from the sun and energy radiated back to space.", "id": "fc10"}, {"front": "How does water play a critical role in atmospheric energy transfer?", "back": "When water evaporates, it absorbs energy (latent heat). When water vapor condenses, it releases that latent heat back into the atmosphere, powering storms and transferring energy.", "id": "fc11"}, {"front": "In chemistry, why do atoms form bonds, and what happens to energy when a bond forms?", "back": "Atoms bond because the bonded state is lower in energy (more stable) than the separated atoms. Bond formation releases energy.", "id": "fc12"}, {"front": "What is required to break a chemical bond?", "back": "Bond breaking requires energy.", "id": "fc13"}, {"front": "How is energy involved in the formation of glucose during photosynthesis at the chemical bond level?", "back": "Light energy breaks bonds in H2O and CO2, and new, higher-energy bonds are formed in glucose and O2, effectively storing energy in the glucose bonds.", "id": "fc14"}, {"front": "How is energy released during cellular respiration at the chemical bond level?", "back": "The bonds in glucose are broken and new, stronger bonds form in CO2 and H2O, which releases energy.", "id": "fc15"}, {"front": "What is gravitational potential energy and its equation?", "back": "Gravitational potential energy (PE) is the energy an object possesses due to its position in a gravitational field, calculated as PE = mgh.", "id": "fc16"}, {"front": "What is kinetic energy and its equation?", "back": "Kinetic energy (KE) is the energy an object possesses due to its motion, calculated as KE = 1/2mv^2.", "id": "fc17"}, {"front": "Define work in terms of energy transfer and its equation.", "back": "Work (W) is the mechanism by which energy is transferred, calculated as W = Fd (force times distance).", "id": "fc18"}, {"front": "Define power and provide its equation.", "back": "Power (P) measures the rate of energy transfer, calculated as P = W/t (work divided by time).", "id": "fc19"}, {"front": "State the law of conservation of mechanical energy and when it applies.", "back": "KEi + PEi = KEf + PEf. It applies when no friction or other non-conservative forces are present.", "id": "fc20"}, {"front": "How does friction affect mechanical energy, and how does this relate to the broader law of conservation of energy?", "back": "When friction is present, mechanical energy decreases, but the 'lost' energy is converted into thermal energy. The total energy (mechanical + thermal) remains constant, upholding the broader law of conservation of energy.", "id": "fc21"}, {"front": "Summarize the flow of energy in Life Science.", "back": "The sun's radiant energy is captured by photosynthesis and stored in chemical bonds, then released by respiration to power living processes.", "id": "fc22"}, {"front": "Summarize the flow of energy in Earth Science.", "back": "The sun's energy drives atmospheric circulation, the water cycle, and weather systems through unequal heating and phase changes of water.", "id": "fc23"}, {"front": "Summarize the flow of energy in Chemistry.", "back": "Energy is stored in chemical bonds and released or absorbed when bonds break and form. Bond type determines the amount of energy involved.", "id": "fc24"}, {"front": "Summarize the flow of energy in Physics.", "back": "Energy takes quantifiable forms (KE, PE, work, power) and is conserved in every transformation. Friction converts mechanical energy to thermal energy but does not destroy it.", "id": "fc25"}, {"front": "Trace the flow of energy from the sun to the motion of your legs as you walk, identifying at least four energy transformations and the relevant science branch.", "back": "1. Radiant energy from the sun strikes a plant (Earth Science). 2. Plant performs photosynthesis, converting light energy into chemical energy in glucose (Life Science). 3. Glucose bonds are broken during cellular respiration, releasing chemical energy to produce ATP (Chemistry/Life Science). 4. ATP provides energy for muscle cells, converting chemical energy into kinetic energy for leg movement (Physics).", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
