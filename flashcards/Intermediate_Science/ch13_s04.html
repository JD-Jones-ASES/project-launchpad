<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 13, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a metallic bond?", "back": "A bond formed when metal atoms share their valence electrons collectively, creating a “sea” of delocalized electrons that surrounds a lattice of positive metal ions. The attraction between the positive ions and the electron sea holds the metal together."}, {"front": "Describe the electron sea model of metallic bonding.", "back": "Valence electrons detach from individual atoms and flow freely throughout the entire piece of metal, forming a 'sea' of delocalized electrons that surrounds and holds together the positive metal ions (the metal atom cores) in a lattice."}, {"front": "How does the electron sea model explain the ductility and malleability of metals?", "back": "When a force is applied, layers of metal ions can slide past each other without breaking the bond, because the electron sea flows with them and continues to provide attraction."}, {"front": "Why are metals good electrical conductors according to the electron sea model?", "back": "The delocalized electrons in the electron sea are free to move through the metal when a voltage is applied, allowing charge to flow easily."}, {"front": "How does metallic bonding account for metals' high thermal conductivity?", "back": "Free, delocalized electrons rapidly transfer kinetic energy from hot regions to cold regions within the metal."}, {"front": "Explain why metals have a characteristic luster (shine).", "back": "When light strikes a metal surface, the free, delocalized electrons absorb and then re-emit the light energy, producing the characteristic metallic shine."}, {"front": "What is the fundamental difference between intramolecular and intermolecular forces?", "back": "Intramolecular forces are the strong chemical bonds *within* a molecule that hold its atoms together (e.g., ionic, covalent, metallic). Intermolecular forces (IMFs) are weaker attractions *between* molecules."}, {"front": "Define an intermolecular force (IMF).", "back": "A force of attraction between molecules (not within a molecule). IMFs are generally much weaker than chemical bonds but determine many physical properties, such as boiling point, melting point, and state of matter."}, {"front": "What physical properties are primarily determined by intermolecular forces?", "back": "Boiling point, melting point, and the state of matter (solid, liquid, or gas) at a given temperature."}, {"front": "What is a hydrogen bond?", "back": "A strong intermolecular force that occurs when a hydrogen atom bonded to a highly electronegative atom (N, O, or F) is attracted to a lone pair on a nearby N, O, or F atom."}, {"front": "What specific conditions are required for hydrogen bonding to occur between molecules?", "back": "A hydrogen atom must be covalently bonded to a highly electronegative atom (Nitrogen, Oxygen, or Fluorine), and there must be a lone pair on a nearby N, O, or F atom on a different molecule to attract it."}, {"front": "Why does water have a significantly higher boiling point (100°C) than similarly sized molecules like H2S (-60°C)?", "back": "Water molecules form an extensive network of strong hydrogen bonds (up to four per molecule), which require much more energy to overcome for boiling compared to the weaker intermolecular forces in H2S."}, {"front": "Explain why ice floats on liquid water.", "back": "When water freezes, its hydrogen bonds lock molecules into a crystal lattice that is less dense than liquid water. This expansion causes ice to float, which is crucial for aquatic life."}, {"front": "How do hydrogen bonds contribute to water's high specific heat?", "back": "Water absorbs a lot of heat energy before its temperature rises significantly because a considerable portion of that energy is used to break the numerous hydrogen bonds between molecules."}, {"front": "What are Van der Waals forces, also known as London dispersion forces?", "back": "The weakest type of intermolecular force, existing between all molecules. They arise from temporary partial charges caused by uneven electron distribution at any instant, which then induce partial charges in neighboring molecules."}, {"front": "What factors make Van der Waals forces more significant between molecules?", "back": "Van der Waals forces become stronger when molecules are larger (more electrons for stronger temporary charges) or when molecules can pack closely together, increasing the contact area for attractions."}, {"front": "Explain why larger hydrocarbons (e.g., octane, C8H18) are liquids at room temperature, while smaller ones (e.g., methane, CH4) are gases.", "back": "Larger hydrocarbons have more electrons and a greater surface area, leading to stronger cumulative Van der Waals forces that are sufficient to hold the molecules together in a liquid state, unlike smaller hydrocarbons."}, {"front": "Rank the following types of attractions from strongest to weakest: hydrogen bonds, covalent bonds, metallic bonds, ionic bonds, Van der Waals forces.", "back": "Ionic bonds, Covalent bonds, Metallic bonds (these three are generally considered 'chemical bonds' and stronger), Hydrogen bonds (strongest IMF), Van der Waals forces (weakest IMF)."}, {"front": "In the solubility test, why did table salt (NaCl) dissolve in water but paraffin wax did not?", "back": "Salt is an ionic compound, which dissolves well in polar water due to strong ion-dipole interactions. Paraffin wax is a nonpolar molecular covalent compound, which does not dissolve in polar water ('like dissolves like')."}, {"front": "Why did a salt solution conduct electricity, but a sugar solution did not, even though both dissolved in water?", "back": "Salt (an ionic compound) dissociates into free, mobile ions (Na+, Cl-) in water, which can carry an electric charge. Sugar (a molecular covalent compound) dissolves but remains as neutral molecules, providing no free charge carriers."}, {"front": "Based on melting behavior, how do the intermolecular or interionic forces compare between wax, sugar, and salt?", "back": "Wax has the weakest IMFs (lowest melting point), sugar has stronger IMFs (decomposes at moderate temperature before melting like salt), and salt has the strongest interionic forces (highest melting point, doesn't melt on a hot plate)."}, {"front": "Rubbing alcohol (isopropanol, C3H7OH) evaporates much faster than water at room temperature. Explain this using intermolecular forces.", "back": "Water has extensive hydrogen bonding (each molecule can form up to four H-bonds), resulting in very strong IMFs. Isopropanol has weaker hydrogen bonding (only one O-H group) and van der Waals forces. Less energy is needed to overcome isopropanol's weaker IMFs, so it evaporates faster."}, {"front": "What are the components of the 'positive metal ions' in the electron sea model?", "back": "The positive metal ions are the metal atom cores, which consist of the nucleus and inner-shell electrons of the metal atoms, after the valence electrons have delocalized into the electron sea."}, {"front": "How do metallic bonds allow metals to conduct electricity in the solid state, unlike ionic compounds?", "back": "In metals, the delocalized valence electrons are free to move and carry charge throughout the solid structure. In solid ionic compounds, the ions are held in a rigid crystal lattice and are not free to move, so they do not conduct electricity."}, {"front": "Why is the fact that ice floats on water critical for aquatic life?", "back": "Floating ice acts as an insulating layer for the water below, preventing entire bodies of water from freezing solid and allowing aquatic organisms to survive through cold periods."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
