<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 23, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a solution?", "back": "A homogeneous mixture in which one or more substances (solutes) are uniformly distributed within another substance (solvent). Solutions appear uniform at the molecular level and do not separate on standing."}, {"front": "Define 'solute' and give an example.", "back": "The substance that is dissolved in a solution, usually present in a smaller amount than the solvent. Example: Salt (NaCl) in a saltwater solution."}, {"front": "Define 'solvent' and give an example.", "back": "The substance that does the dissolving in a solution. Example: Water in a saltwater solution."}, {"front": "Why is water often called the 'universal solvent'?", "back": "Water dissolves more substances than any other common liquid."}, {"front": "Can solutions only involve solids dissolved in liquids? Explain.", "back": "No, solutions can involve any combination of states, such as gases in gases (air), liquids in liquids (like antifreeze), or solids in solids (like alloys)."}, {"front": "What is the 'like dissolves like' rule for dissolving?", "back": "Polar solvents (like water) dissolve polar solutes and ionic compounds, while nonpolar solvents (like oil) dissolve nonpolar solutes."}, {"front": "What type of solutes do polar solvents dissolve?", "back": "Polar solvents dissolve polar solutes and ionic compounds."}, {"front": "What is 'hydration' in the context of dissolving?", "back": "When water molecules surround each ion or polar molecule of the solute, pulling it away from the solid and dispersing it throughout the solution."}, {"front": "What type of solutes do nonpolar solvents dissolve?", "back": "Nonpolar solvents dissolve nonpolar solutes."}, {"front": "How does increasing temperature generally affect the rate at which most solid solutes dissolve?", "back": "Increasing the temperature speeds up dissolving for most solid solutes because higher molecular motion helps solvent molecules pull solute particles apart."}, {"front": "How does increasing temperature affect the solubility of gases in liquids? Provide an example.", "back": "Gases are less soluble in hot liquids. For example, warm soda goes flat faster because dissolved gases escape more readily."}, {"front": "How does stirring affect the rate of dissolving?", "back": "Stirring brings fresh solvent molecules into contact with the solute surface, speeding up dissolution."}, {"front": "How does particle size affect the rate of dissolving? Give an example.", "back": "Crushing a solid into smaller pieces increases its surface area, allowing more solvent molecules to contact it simultaneously, speeding up dissolution. (e.g., powdered sugar dissolves faster than sugar cubes)."}, {"front": "How does pressure affect the solubility of gases in liquids?", "back": "Higher pressure forces more gas molecules into solution. This is why carbonated drinks are bottled under pressure."}, {"front": "What is 'solubility'?", "back": "The maximum amount of solute that can dissolve in a given amount of solvent at a specific temperature."}, {"front": "Describe an 'unsaturated solution'.", "back": "An unsaturated solution can dissolve more solute. If additional solute is added, it will dissolve."}, {"front": "Describe a 'saturated solution'.", "back": "A saturated solution has dissolved the maximum amount of solute at that temperature. Any additional solute added will settle to the bottom as undissolved solid."}, {"front": "What is a 'supersaturated solution' and how is it typically formed?", "back": "An unstable condition where more solute is dissolved than the normal maximum, usually achieved by dissolving solute at a high temperature and then cooling carefully."}, {"front": "What can cause the excess solute in a supersaturated solution to crystallize rapidly?", "back": "Adding a 'seed' crystal or disturbing the solution can cause the excess solute to crystallize rapidly."}, {"front": "What does 'concentration' measure in a solution?", "back": "Concentration is a measure of how much solute is dissolved in a given amount of solvent or solution."}, {"front": "What are two common units for expressing concentration mentioned in the text?", "back": "Grams per liter (g/L) and molarity (M or mol/L)."}, {"front": "If 20g of salt is dissolved in enough water to make 500 mL of solution, what is the concentration in g/L?", "back": "Concentration = mass of solute (g) / volume of solution (L) = 20 g / 0.500 L = 40 g/L."}, {"front": "Define 'molarity' and provide its formula.", "back": "Molarity (M) is a unit of concentration equal to the number of moles of solute (n) per liter of solution (V). Formula: M = n/V."}, {"front": "Why is maintaining precise concentrations of dissolved substances crucial in human blood, and what organ helps regulate this?", "back": "Precise concentrations of dissolved substances (oxygen, glucose, ions, proteins) are vital for the body to function and maintain homeostasis. The kidneys act as the body's 'concentration regulators'."}, {"front": "A student dissolves 10g of sugar in 100mL of hot water and cools it slowly to room temperature. The solubility of sugar at room temperature is 200g per 100mL. Is the cooled solution unsaturated, saturated, or supersaturated? Explain.", "back": "The solution is unsaturated. Only 10g of sugar is dissolved, which is far less than the 200g/100mL solubility limit at room temperature. It can still dissolve much more sugar."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
