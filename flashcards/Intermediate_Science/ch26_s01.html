<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 26, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an ecosystem?", "back": "A community of living organisms interacting with their nonliving environment (soil, water, air, sunlight, temperature), made up of both biotic and abiotic components.", "id": "fc01"}, {"front": "What is a community in an ecological context?", "back": "All the populations of different species living and interacting in the same area at the same time.", "id": "fc02"}, {"front": "How is a population defined in an ecosystem?", "back": "All the individuals of one species living in a defined area at a given time.", "id": "fc03"}, {"front": "What is a habitat?", "back": "The physical environment in which a species lives, including its climate, soil type, water availability, and shelter.", "id": "fc04"}, {"front": "What is an ecological niche?", "back": "The role a species plays in its ecosystem, including what it eats, what eats it, how it reproduces, and how it interacts with other species and its physical environment.", "id": "fc05"}, {"front": "What is the difference between biotic and abiotic components of an ecosystem?", "back": "Biotic components are the living organisms, while abiotic components are the nonliving physical and chemical parts (e.g., soil, water, air, sunlight, dissolved minerals like O2, CO2, nitrates, phosphates).", "id": "fc06"}, {"front": "What are producers (or autotrophs) in an ecosystem?", "back": "Organisms, such as plants, algae, and cyanobacteria, that convert light energy into chemical energy through photosynthesis. They form the first trophic level.", "id": "fc07"}, {"front": "What defines a trophic level?", "back": "A step in the transfer of energy through an ecosystem, defined by an organism's feeding relationship (e.g., producers are the first level, primary consumers the second).", "id": "fc08"}, {"front": "Distinguish between primary, secondary, and tertiary consumers.", "back": "Primary consumers (herbivores) feed directly on producers; secondary consumers (carnivores or omnivores) feed on primary consumers; tertiary consumers feed on secondary consumers.", "id": "fc09"}, {"front": "What is the role of decomposers in an ecosystem?", "back": "Organisms (bacteria, fungi) that break down dead organic matter and waste, returning essential inorganic nutrients to the soil, water, and atmosphere for producers to reuse.", "id": "fc10"}, {"front": "Explain the 10% rule in energy transfer.", "back": "On average, only about 10% of the energy available at one trophic level is transferred to the next; the remaining 90% is used for the organism's life processes (like cellular respiration, movement) or lost as heat.", "id": "fc11"}, {"front": "Why are apex predators typically rare compared to lower trophic level organisms?", "back": "Due to the 10% rule, a significant amount of energy is lost at each trophic level. There is simply not enough energy to support large populations at the top of the food chain, making apex predators naturally rare.", "id": "fc12"}, {"front": "What is the difference between a food chain and a food web?", "back": "A food chain is a simplified, linear sequence showing how energy passes from one organism to the next. A food web is a network of interconnected food chains that captures the complex, realistic feeding relationships within an ecosystem.", "id": "fc13"}, {"front": "Define a keystone species and provide an example.", "back": "A keystone species is a species whose impact on its ecosystem is disproportionately large relative to its abundance; its removal causes significant changes in community structure. Example: Sea otters, which keep sea urchin populations in check, preventing the collapse of kelp forests.", "id": "fc14"}, {"front": "How does biomass typically change at higher trophic levels?", "back": "Biomass (the total mass of living organic matter) generally decreases significantly at higher trophic levels, creating a biomass pyramid that mirrors the energy pyramid.", "id": "fc15"}, {"front": "Distinguish between Gross Primary Productivity (GPP) and Net Primary Productivity (NPP).", "back": "GPP is the total amount of energy or biomass produced by all producers in an ecosystem through photosynthesis over a given time. NPP is the energy or biomass remaining after producers have used some GPP for their own cellular respiration (NPP = GPP - Respiration), making it available to consumers.", "id": "fc16"}, {"front": "What is the fundamental difference between how energy and matter move through an ecosystem?", "back": "Energy flows one way through an ecosystem (from the sun through producers and consumers, eventually dissipating as heat). Matter cycles (the same atoms are used again and again), changing form and location but not being created or destroyed.", "id": "fc17"}, {"front": "Name two key processes that remove carbon from the atmosphere and two that return it.", "back": "Removed by: Photosynthesis and Ocean absorption. Returned by: Cellular respiration, decomposition, and combustion of fossil fuels/biomass.", "id": "fc18"}, {"front": "Why can't most organisms directly use the nitrogen gas (N2) that makes up 78% of the atmosphere?", "back": "The triple bond in N2 is extremely strong, making it chemically inert and difficult for most organisms to break down and incorporate into biological molecules.", "id": "fc19"}, {"front": "What is nitrogen fixation and why is it crucial?", "back": "Nitrogen fixation is the process by which specialized bacteria (e.g., in legume root nodules) convert atmospheric N2 into usable forms like ammonia (NH3) or ammonium (NH4^+). It's crucial because it makes nitrogen available to plants, allowing it to enter food webs.", "id": "fc20"}, {"front": "Explain nitrification and denitrification in the nitrogen cycle.", "back": "Nitrification: Soil bacteria convert ammonium (NH4^+) to nitrites (NO2^-) and then to nitrates (NO3^-), which plants absorb. Denitrification: Certain bacteria convert nitrates back into N2 gas, returning nitrogen to the atmosphere.", "id": "fc21"}, {"front": "What is a key distinguishing feature of the phosphorus cycle compared to the carbon and nitrogen cycles?", "back": "The phosphorus cycle does not have a significant atmospheric phase; phosphorus primarily moves between rocks, soil, water, and living organisms.", "id": "fc22"}, {"front": "Why is phosphorus essential for life?", "back": "It is a critical component of fundamental biological molecules such as DNA, RNA, ATP (the energy currency of cells), and phospholipids (which form cell membranes).", "id": "fc23"}, {"front": "What is a limiting nutrient, and why is phosphorus often one in freshwater ecosystems?", "back": "A limiting nutrient is a nutrient whose scarcity restricts the growth of producers. Phosphorus cycles slowly and can be scarce in freshwater, thus limiting the growth of aquatic producers.", "id": "fc24"}, {"front": "How does cellular respiration contribute to energy loss between trophic levels?", "back": "Organisms use a large portion of the energy they consume for their own metabolic processes, including cellular respiration. This energy is released as heat and dissipates into the environment, making it unavailable for transfer to the next trophic level.", "id": "fc25"}, {"front": "Why are decomposers vital for nutrient cycling?", "back": "Without decomposers, nutrients would remain locked in dead organic matter and waste. Decomposers break down these materials, releasing essential inorganic nutrients back into the soil and water for producers to reuse, effectively closing the nutrient cycles.", "id": "fc26"}, {"front": "Which types of ecosystems typically have the highest Net Primary Productivity (NPP)?", "back": "Tropical rainforests and coral reefs generally have the highest NPP per unit area on Earth.", "id": "fc27"}, {"front": "How do geological processes contribute to the carbon cycle?", "back": "Over millions of years, carbon is stored in limestone, fossil fuels, and sedimentary rock. Volcanic eruptions can return some of this stored carbon to the atmosphere as CO2.", "id": "fc28"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
