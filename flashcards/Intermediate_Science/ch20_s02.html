<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 20, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What overarching theme is shared by all medical imaging technologies described in the text?", "back": "All medical imaging technologies depend on information transfer, specifically the processes of encoding, transmission, and decoding.", "id": "fc01"}, {"front": "What type of wave is used in X-ray imaging, and what are its key characteristics?", "back": "X-ray imaging uses high-frequency, short-wavelength electromagnetic waves.", "id": "fc02"}, {"front": "How do X-rays produce an image that distinguishes between bone and soft tissue?", "back": "Dense materials like bone absorb more X-rays than soft tissue does. This is due to bone's higher density and atomic number (calcium). A detector records the X-rays that pass through, creating a shadow image.", "id": "fc03"}, {"front": "In an X-ray image, how do bones, soft tissue, and air-filled spaces typically appear?", "back": "Bones appear white, soft tissue appears gray, and air-filled spaces appear dark.", "id": "fc04"}, {"front": "Describe the information flow in X-ray imaging using the terms encoding, modulation, and decoding.", "back": "The X-ray machine encodes information by sending EM waves. The body's tissues modulate the beam (some waves are absorbed, others pass through). A detector then decodes this pattern into an image.", "id": "fc05"}, {"front": "What type of waves does ultrasound imaging use, and how do their frequencies compare to human hearing?", "back": "Ultrasound imaging uses high-frequency sound waves (typically 2MHz to 18MHz), which are far above the range of human hearing (20Hz to 20,000Hz).", "id": "fc06"}, {"front": "How does ultrasound create an image of internal body structures?", "back": "A probe sends pulses of sound waves into the body. When these waves encounter a boundary between different tissues, some energy reflects back as echoes. A computer uses the time delay and intensity of these echoes to construct a real-time image.", "id": "fc07"}, {"front": "What common principle links ultrasound imaging to the mapping of the seafloor?", "back": "Both use the principle of sending a wave, measuring the echo, and calculating the distance based on the time delay (d = vt/2).", "id": "fc08"}, {"front": "Name a key advantage of ultrasound imaging, especially for monitoring pregnancy.", "back": "Ultrasound does not use ionizing radiation (unlike X-rays), making it safe for monitoring developing fetuses in real time.", "id": "fc09"}, {"front": "What fundamental property of atoms does Magnetic Resonance Imaging (MRI) exploit to create images?", "back": "MRI exploits the fact that hydrogen atoms (found in water and fat molecules) behave like tiny magnets.", "id": "fc10"}, {"front": "What happens to hydrogen nuclei in the body when placed in a strong MRI magnetic field?", "back": "When placed in a strong magnetic field, the hydrogen nuclei align with the field.", "id": "fc11"}, {"front": "After alignment, what causes hydrogen nuclei to momentarily change their orientation in an MRI?", "back": "A brief pulse of radio waves (electromagnetic waves) knocks the hydrogen nuclei out of their alignment.", "id": "fc12"}, {"front": "How do the hydrogen nuclei generate a signal that forms an MRI image?", "back": "As the hydrogen nuclei return to their aligned state, they emit radio waves of their own. A computer uses the frequency and timing of these emitted signals, which depend on the tissue type, to build a detailed cross-sectional image.", "id": "fc13"}, {"front": "Name two physics principles fundamental to MRI technology.", "back": "MRI relies on principles of magnetic fields, electromagnetic waves, and resonance.", "id": "fc14"}, {"front": "How does chemistry play a role in MRI's ability to differentiate tissues?", "back": "MRI detects hydrogen atoms, the most abundant element in the body. Different chemical environments (e.g., water, fat, protein) cause these hydrogen atoms to produce different signals, allowing tissue differentiation.", "id": "fc15"}, {"front": "What kind of biological information does an MRI image typically provide?", "back": "MRI images reveal detailed anatomical structures such as brain tissue, muscles, organs, and tumors, providing critical biological information for diagnosis.", "id": "fc16"}, {"front": "What is the primary purpose of genetic testing?", "back": "The primary purpose of genetic testing is to analyze a patient's DNA to detect mutations associated with diseases like sickle cell anemia, cystic fibrosis, or hereditary cancers.", "id": "fc17"}, {"front": "What key chemical reaction is used to copy specific DNA segments millions of times during genetic testing?", "back": "The process called PCR (polymerase chain reaction) is used to copy specific DNA segments millions of times.", "id": "fc18"}, {"front": "How is genetic testing an example of information science applied to biology?", "back": "Genetic testing involves decoding the DNA sequence, comparing it to a reference sequence, and interpreting the results in the context of heredity and probability to predict health outcomes.", "id": "fc19"}, {"front": "Why is an MRI generally preferred over an X-ray for imaging soft tissues like the brain?", "back": "X-rays pass through soft tissue without sufficient absorption to create good contrast, making them ineffective for brain imaging. MRI excels at imaging soft tissue, providing detailed cross-sections that can reveal tumors, blood clots, or inflammation in the brain.", "id": "fc20"}, {"front": "Why is medical imaging considered a triumph of interdisciplinary science?", "back": "Medical imaging is a triumph of interdisciplinary science because no single branch of science (physics, chemistry, biology, computer science) could have created these technologies alone. They combine principles from multiple fields to solve complex problems like seeing inside the human body.", "id": "fc21"}, {"front": "A patient presents with a severe headache and confusion. Which imaging technology would a doctor most likely order first to investigate a potential brain issue, and why?", "back": "A doctor would most likely order an MRI (or CT scan, an advanced X-ray technique). MRI is excellent for imaging soft tissues like the brain, providing detailed views of potential strokes, tumors, or bleeding that a standard X-ray cannot effectively show due to poor soft tissue contrast.", "id": "fc22"}, {"front": "What three-step information transfer cycle is common to all medical imaging technologies?", "back": "The common information transfer cycle is encoding, transmission, and decoding.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
