<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 20, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary problem medical imaging technologies aim to solve?", "back": "To see inside the human body without cutting it open, combining principles from physics, chemistry, and biology."}, {"front": "What common theme, related to Cycle 4, do all medical imaging technologies share?", "back": "They all depend on information transfer, specifically encoding, transmission, and decoding of information about the body."}, {"front": "What type of wave are X-rays?", "back": "High-frequency, short-wavelength electromagnetic waves."}, {"front": "How do X-rays create an image when passing through the body?", "back": "Dense materials (like bone) absorb more X-rays, while soft tissue absorbs less. A detector records the transmitted X-rays, creating a shadow image based on absorption levels."}, {"front": "On an X-ray image, what appears white, gray, and dark, and why?", "back": "Bones appear white (absorb most X-rays), soft tissue appears gray, and air-filled spaces appear dark (transmit most X-rays)."}, {"front": "Explain the physics and chemistry behind why bones appear dense on an X-ray.", "back": "Physics: X-rays interact with matter based on density and atomic number. Chemistry: Calcium in bones (ionic compounds of calcium and phosphate) has a higher atomic number than elements in soft tissue, causing greater X-ray absorption."}, {"front": "Describe the information flow in X-ray imaging in terms of encoding, modulation, and decoding.", "back": "The X-ray machine encodes information by sending EM waves. The body's tissues modulate the beam (absorbing some). The detector decodes the pattern into an image."}, {"front": "What type of wave does ultrasound imaging use, and what is its typical frequency range?", "back": "High-frequency sound waves, typically 2MHz to 18MHz, far above human hearing."}, {"front": "How does an ultrasound probe create an image?", "back": "The probe sends pulses of ultrasound into the body. When waves encounter a boundary between different tissues, some energy reflects back as echoes. The probe detects these echoes, and a computer uses time delay and intensity to build a real-time image."}, {"front": "What fundamental physics principle is shared between ultrasound imaging and mapping the seafloor?", "back": "Both use the principle of sending a wave, measuring the echo's time delay, and calculating distance (d = vt/2) to create an image or map."}, {"front": "What is a key advantage of ultrasound imaging, especially for monitoring pregnancy, compared to X-rays?", "back": "Ultrasound does not use ionizing radiation, making it safe for monitoring developing fetuses in real time, revealing heartbeat, movement, and growth."}, {"front": "What does MRI stand for, and what primary tools does it use to create images?", "back": "Magnetic Resonance Imaging. It uses powerful magnets and radio waves."}, {"front": "Briefly explain the fundamental principle behind how MRI creates images.", "back": "MRI exploits hydrogen atoms (in water/fat) behaving like tiny magnets. A strong magnetic field aligns them. A radio pulse knocks them out, and as they realign, they emit radio waves, which are detected and used to form an image based on tissue type."}, {"front": "Which abundant element in the human body is primarily detected by MRI?", "back": "Hydrogen atoms, present in water (H2O) and organic molecules, allowing MRI to differentiate between various soft tissues."}, {"front": "How does MRI demonstrate the interdisciplinary nature of science, specifically linking physics, chemistry, and life science?", "back": "Physics: Uses magnetic fields, EM waves, resonance. Chemistry: Detects hydrogen in different chemical environments (water, fat, protein) producing different signals. Life Science: Images reveal anatomical structures like brain tissue, organs, and tumors."}, {"front": "What is the main purpose of genetic testing?", "back": "To analyze a patient's DNA to detect mutations associated with diseases like sickle cell anemia, cystic fibrosis, or hereditary cancers."}, {"front": "Name one key chemical reaction process used in genetic testing to prepare DNA samples.", "back": "Polymerase Chain Reaction (PCR), which copies specific DNA segments millions of times."}, {"front": "How is genetic testing described as 'pure information science applied to biology'?", "back": "It decodes the DNA sequence (information), compares it to a reference, and interprets it to predict health outcomes, functioning as an information transfer system."}, {"front": "If a patient has symptoms suggesting a problem in the brain (soft tissue), which imaging technology would a doctor likely order, and why would an X-ray be less effective?", "back": "An MRI (or CT scan) would be ordered because MRI excels at imaging soft tissues like the brain. A standard X-ray passes through soft tissue without enough absorption or contrast to provide useful detail for brain issues."}, {"front": "Despite using different principles, what common underlying pattern do all medical imaging technologies share?", "back": "They all follow the pattern of encoding information about the body, transmitting it via a carrier (EM waves, sound waves), and then decoding it to create an interpretable output."}, {"front": "Why is medical imaging considered a 'triumph of interdisciplinary science'?", "back": "Because no single branch of science (physics, chemistry, or biology) could have created any of these complex technologies alone; their development required the combination of multiple fields."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
