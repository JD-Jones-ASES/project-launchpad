<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 12, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an air mass?", "back": "An air mass is a large body of air (often covering thousands of square kilometers) that has relatively uniform temperature and humidity throughout."}, {"front": "How do air masses form?", "back": "Air masses form when air sits over a large, uniform surface (such as an ocean or a continent) for an extended time, taking on the temperature and moisture characteristics of that surface."}, {"front": "What two properties are used to classify air masses?", "back": "Air masses are classified by their temperature source region (polar for cold, tropical for warm) and their moisture source (continental for dry, maritime for moist)."}, {"front": "Name the four main types of air masses and their characteristics.", "back": "The four main types are cP (continental polar - cold and dry), mP (maritime polar - cold and moist), cT (continental tropical - hot and dry), and mT (maritime tropical - warm and moist)."}, {"front": "In North America, what type of air mass brings bitterly cold winter weather from Canada?", "back": "cP (continental polar) air masses bring bitterly cold winter weather from Canada."}, {"front": "What is a weather front?", "back": "A weather front is the boundary between two air masses with different temperatures and moisture levels where they meet and do not mix easily."}, {"front": "Describe the characteristics and weather associated with a cold front.", "back": "A cold front occurs when a cold air mass advances and pushes under a warmer air mass, forcing the warm air to rise rapidly. This produces tall cumulonimbus clouds, heavy rain or snow, gusty winds, and sometimes thunderstorms. Weather changes are usually abrupt, followed by clear skies and temperature drops."}, {"front": "Describe the characteristics and weather associated with a warm front.", "back": "A warm front occurs when a warm air mass advances and rides up over a retreating cold air mass. The warm air rises gradually, resulting in a broad area of steady, lighter precipitation (drizzle or light rain) that may last for a day or more. Cirrus and stratus clouds appear ahead of the front, followed by rising temperatures and increased humidity."}, {"front": "What is a stationary front, and what kind of weather does it produce?", "back": "A stationary front occurs when neither air mass is strong enough to push the other, causing the front to stall. It can produce days of cloudy, rainy weather as the boundary lingers over an area."}, {"front": "What is an occluded front, and what kind of weather does it typically produce?", "back": "An occluded front forms when a fast-moving cold front catches up to a slower warm front, lifting the warm air mass entirely off the ground between two cooler air masses. They often produce complex weather with a mixture of precipitation types."}, {"front": "What is a cyclone, and what type of weather is associated with it?", "back": "A cyclone is a large-scale low-pressure system in which air spirals inward and upward. Rising air cools and condenses, producing clouds and precipitation, making cyclones associated with unsettled, stormy weather."}, {"front": "How do cyclonic winds differ from anticyclonic winds in the Northern Hemisphere?", "back": "In the Northern Hemisphere, cyclonic winds spiral counterclockwise and inward, while anticyclonic winds spiral clockwise and outward."}, {"front": "How does a thunderstorm form?", "back": "A thunderstorm forms when warm, moist air rises rapidly (often along a cold front or due to intense afternoon heating). As the air cools, water vapor condenses into towering cumulonimbus clouds, and the release of latent heat fuels further uplift."}, {"front": "What atmospheric conditions are necessary for a tornado to form?", "back": "Tornadoes form when wind shear (a change in wind speed or direction with altitude) creates a horizontal tube of spinning air that is then tilted vertical by a powerful updraft within a thunderstorm."}, {"front": "Why is the central United States known as 'Tornado Alley'?", "back": "The central United States experiences the most tornadoes in the world because cold cP air from Canada frequently collides with warm mT air from the Gulf of Mexico, creating ideal conditions for tornado formation."}, {"front": "What is a hurricane, and over what conditions does it form?", "back": "A hurricane (or typhoon) is a large, rotating storm system that forms over warm tropical ocean water, requiring a temperature of at least 26°C."}, {"front": "Describe the 'eye' and 'eyewall' of a hurricane.", "back": "The 'eye' is the intense low-pressure center of a hurricane, typically calm and clear. Surrounding the eye, the 'eyewall' contains the most violent winds and heaviest rain."}, {"front": "Why do hurricanes weaken rapidly when they move over land or cool water?", "back": "Hurricanes weaken rapidly when they move over land or cool water because they are cut off from the warm ocean moisture and latent heat supply that fuels them."}, {"front": "Who invented the barometer, and what significant discovery did it lead to?", "back": "Evangelista Torricelli invented the barometer, an instrument that measures atmospheric pressure. His discovery demonstrated that the atmosphere has weight and that 'we live submerged at the bottom of an ocean of air,' laying the foundation for meteorology."}, {"front": "What is the physical meaning behind the phrase that a hurricane 'feeds on warm ocean water'?", "back": "This means warm ocean water provides the necessary moisture that evaporates and rises, carrying latent heat. As this moist air condenses into clouds, it releases latent heat, which fuels the powerful updrafts and low-pressure system that drive the hurricane's intensity and rotation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
