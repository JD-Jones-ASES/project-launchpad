<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 23, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a solubility curve?", "back": "A graph that shows the relationship between temperature and the maximum amount of solute that can dissolve in a given amount of solvent (typically 100 g of water)."}, {"front": "Define solubility.", "back": "The maximum amount of a solute that can dissolve in a given amount of solvent at a specific temperature, typically expressed in grams of solute per 100 g of water."}, {"front": "What information is typically represented on the horizontal and vertical axes of a solubility curve?", "back": "Temperature (typically in degrees Celsius) on the horizontal axis and solubility (g of solute per 100 g H2O) on the vertical axis."}, {"front": "What does each distinct line on a solubility curve represent?", "back": "Each line represents the solubility of a different substance."}, {"front": "How do you determine the solubility of a substance at a specific temperature using its solubility curve?", "back": "Locate the temperature on the horizontal axis, draw a vertical line up to the curve, then read across to the vertical axis to find the solubility."}, {"front": "What does a point *on* the solubility curve indicate about a solution?", "back": "It represents a saturated solution, meaning the maximum amount of solute is dissolved at that temperature."}, {"front": "What does a point *below* the solubility curve signify about a solution?", "back": "It represents an unsaturated solution, meaning more solute could still dissolve at that temperature."}, {"front": "What does a point *above* the solubility curve signify about a solution?", "back": "It represents a supersaturated solution, meaning more solute is dissolved than the curve predicts, an unstable condition."}, {"front": "Define a saturated solution.", "back": "A solution that contains the maximum amount of dissolved solute at a given temperature; no more solute can dissolve unless the temperature changes."}, {"front": "Define a supersaturated solution.", "back": "A solution that contains more dissolved solute than a saturated solution at the same temperature. These solutions are unstable."}, {"front": "Why are supersaturated solutions considered unstable?", "back": "Adding a seed crystal or disturbing the solution can cause the excess solute to crystallize rapidly."}, {"front": "What does a steep slope on a solubility curve (like KNO3) indicate about a substance's solubility?", "back": "It indicates that the substance's solubility becomes dramatically more soluble as temperature increases."}, {"front": "What does a nearly flat slope on a solubility curve (like NaCl) indicate?", "back": "It indicates that the substance's solubility shows little change with temperature."}, {"front": "Describe the general process by which excess solute crystallizes out of a solution when it's cooled.", "back": "As a solution is cooled, the solubility of the solute decreases. If the amount of dissolved solute exceeds the new (lower) solubility, the excess solute crystallizes out, forming solid crystals."}, {"front": "What is the formula for calculating the mass of solute that crystallizes out upon cooling?", "back": "Mass crystallized = Mass dissolved at T_high - Solubility at T_low"}, {"front": "A student dissolves 90 g of KNO3 in 100 g of water at 60°C. If the solution is cooled to 20°C (where KNO3 solubility is 32 g/100 g H2O), how much KNO3 would crystallize out?", "back": "Mass crystallized = 90 g - 32 g = 58 g of KNO3."}, {"front": "How does increasing temperature generally affect the solubility of *gases* in liquids?", "back": "Gases become less soluble as temperature increases."}, {"front": "Provide a real-world example illustrating how temperature affects gas solubility.", "back": "A warm can of soda is fizzier when opened because the CO2 escapes more readily as its solubility decreases at higher temperatures. Warm lakes also hold less dissolved oxygen than cold lakes."}, {"front": "How does increasing pressure affect the solubility of *gases* in liquids? What law describes this?", "back": "Gas solubility increases with pressure. This relationship is described by Henry's Law."}, {"front": "Why are carbonated beverages bottled under high pressure?", "back": "High pressure forces more CO2 gas into solution, making the beverage carbonated. When opened, the pressure drops, and gas escapes."}, {"front": "(Earth Science Connection) How does ocean warming impact its ability to absorb CO2 from the atmosphere?", "back": "As the ocean warms, the solubility of CO2 in ocean water decreases, meaning warmer oceans absorb less CO2 from the atmosphere."}, {"front": "(Earth Science Connection) What are the two main consequences of increased CO2 dissolving in ocean water, as mentioned in the text?", "back": "1. Potentially accelerating the greenhouse effect by reducing oceanic CO2 uptake. 2. Forming carbonic acid (H2CO3) and lowering the ocean's pH, a process called ocean acidification, which harms marine ecosystems."}, {"front": "A student dissolves 170 g of KNO3 in 100 g of water at 80°C. The solution is then carefully cooled to 40°C (where KNO3 solubility is 65 g/100 g H2O) without disturbance. Is the cooled solution unsaturated, saturated, or supersaturated?", "back": "Supersaturated, because it contains 170 g of dissolved KNO3, which is more than the maximum solubility of 65 g at 40°C."}, {"front": "For the supersaturated KNO3 solution described above (170g KNO3 in 100g H2O at 40°C), what would happen if the student dropped a single crystal of KNO3 into it?", "back": "The seed crystal would trigger rapid crystallization of the excess solute."}, {"front": "For the supersaturated KNO3 solution described above (170g KNO3 in 100g H2O at 40°C, solubility is 65g/100g H2O), how much solid KNO3 would form if crystallization were triggered?", "back": "Mass crystallized = 170 g - 65 g = 105 g of KNO3 would form as solid crystals."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
