<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of the periodic table?", "back": "A chart that organizes all known elements by increasing atomic number, arranging them in rows (periods) and columns (groups) so that elements with similar properties fall in the same column."}, {"front": "Before the modern periodic table, what challenge did chemists face regarding elements?", "back": "By the 1860s, over sixty elements were discovered, and their varied properties seemed chaotic, leading scientists to seek an underlying order."}, {"front": "Who proposed the concept of 'triads' for organizing elements, and what was the basis of this idea?", "back": "Johann D¨obereiner (1829) grouped elements in sets of three where the middle element's atomic mass was roughly the average of the other two, and all three shared similar properties."}, {"front": "Give an example of a 'triad' proposed by Johann D¨obereiner.", "back": "Lithium, sodium, and potassium formed a triad, all reacting vigorously with water."}, {"front": "What was John Newlands' contribution to organizing elements, and what was its core insight?", "back": "Newlands proposed the 'Law of Octaves' (1864), noting that every eighth element shared similar properties, recognizing that properties repeat at regular intervals."}, {"front": "Who is credited with creating the first widely accepted periodic table?", "back": "Dmitri Mendeleev, a Russian chemist, in 1869."}, {"front": "How did Mendeleev initially organize the elements in his periodic table?", "back": "He arranged all sixty-three known elements in order of increasing atomic mass and grouped them into columns with similar chemical properties."}, {"front": "What was a key aspect of Mendeleev's genius that convinced the scientific community of his table's validity?", "back": "He left gaps in his table for undiscovered elements and accurately predicted their properties (e.g., atomic masses, densities, melting points, chemical behaviors)."}, {"front": "What hypothetical element did Mendeleev predict, which was later discovered as gallium?", "back": "Eka-aluminum."}, {"front": "What element did Mendeleev call 'eka-silicon,' and what was its later discovered name?", "back": "Germanium."}, {"front": "How accurate were Mendeleev's predictions for eka-silicon compared to the actual properties of germanium?", "back": "Mendeleev predicted eka-silicon's atomic mass as ~72 and density as ~5.5 g/cm³. Germanium was found with an atomic mass of 72.6 and density of 5.32 g/cm³, showing remarkable agreement."}, {"front": "What problem did Mendeleev encounter when trying to organize elements strictly by atomic mass?", "back": "Elements like tellurium (127.6 amu) and iodine (126.9 amu) would be out of order if based purely on mass, contradicting their chemical properties. Mendeleev prioritized properties, forcing a swap he couldn't explain."}, {"front": "Who identified the true organizing principle of the periodic table, resolving issues with Mendeleev's mass-based arrangement?", "back": "Henry Moseley, a young English physicist, in 1913."}, {"front": "What experimental discovery did Moseley make about elements that led to the modern periodic table's organizing principle?", "back": "He found that the frequency of X-rays emitted by elements, when bombarded with high-energy electrons, correlated directly with the number of protons in the nucleus—the atomic number."}, {"front": "What is the fundamental principle by which the modern periodic table is organized?", "back": "Increasing atomic number (the number of protons in an element's nucleus)."}, {"front": "In the periodic table, what is a 'period'?", "back": "A horizontal row. Elements in the same period have the same number of electron energy levels."}, {"front": "In the periodic table, what is a 'group' (or 'family')?", "back": "A vertical column. Elements in the same group have the same number of valence electrons and similar chemical properties."}, {"front": "Why do elements in the same group of the periodic table share similar chemical properties?", "back": "They have the same number of valence electrons."}, {"front": "How many periods and groups does the modern periodic table have?", "back": "It has seven periods (horizontal rows) and eighteen groups (vertical columns)."}, {"front": "What are the two series of elements typically displayed separately at the bottom of the periodic table, and why are they placed there?", "back": "The lanthanides and actinides; they are placed separately to avoid making the main table too wide."}, {"front": "Describe the general location and characteristic properties of 'metals' on the periodic table.", "back": "Metals occupy the left side and center; they are typically shiny, conduct heat and electricity, and are malleable and ductile. Most elements are metals."}, {"front": "Describe the general location and characteristic properties of 'nonmetals' on the periodic table.", "back": "Nonmetals occupy the upper right portion; they are generally poor conductors, brittle as solids, and diverse in appearance (gases, solids, liquid at room temperature)."}, {"front": "Where are 'metalloids' (or 'semimetals') located on the periodic table, and what are their typical properties?", "back": "They sit along the staircase-shaped boundary between metals and nonmetals, exhibiting properties intermediate between the two (e.g., silicon is a semiconductor)."}, {"front": "Why is ordering the periodic table by atomic number (protons) more accurate and reliable than ordering by atomic mass (protons + neutrons)?", "back": "Atomic number (protons) always increases by one from element to element, providing a consistent ordering. Atomic mass is an average that can be influenced by varying numbers of isotopes (neutrons), which can sometimes lead to slight inversions (like tellurium and iodine) where a lighter element, due to its isotopic composition, has a slightly higher average atomic mass than a subsequent heavier element."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
