<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of inertia?", "back": "Inertia is the tendency of an object to resist changes in its state of motion. An object at rest tends to stay at rest, and an object in motion tends to stay in motion at the same speed and in the same direction, unless acted upon by a net external force."}, {"front": "State Newton's First Law of Motion.", "back": "Newton's First Law states: An object at rest stays at rest, and an object in motion stays in motion at constant velocity, unless acted upon by a net external force."}, {"front": "What is another common name for Newton's First Law?", "back": "The Law of Inertia."}, {"front": "How did the ancient Greek philosopher Aristotle's view of motion differ from Newton's First Law?", "back": "Aristotle believed that objects naturally come to rest and that motion requires a constant force to maintain, whereas Newton's First Law states that force is only needed to *change* motion, not maintain it."}, {"front": "What causes a ball to eventually stop rolling on a flat table, according to Newton's First Law?", "back": "The ball stops due to an unbalanced external force: friction between the ball and the table, and potentially air resistance. Without these forces, it would continue rolling indefinitely."}, {"front": "Is force required to maintain an object's motion at a constant velocity? Explain.", "back": "No, according to Newton's First Law, force is not required to maintain motion at a constant velocity. Force is only needed to *change* an object's state of motion (i.e., to accelerate it)."}, {"front": "How does an object's mass relate to its inertia?", "back": "Inertia depends directly on mass: more massive objects have greater inertia, meaning they resist changes in their state of motion more strongly."}, {"front": "Why is it much harder to get a loaded shopping cart moving and to stop it once it's rolling, compared to an empty cart?", "back": "The loaded cart has more mass, and therefore more inertia. This greater inertia means it has a stronger tendency to resist changes in its state of motion, making it harder to start and stop."}, {"front": "How does Newton's First Law explain the purpose and effectiveness of wearing a seatbelt in a car?", "back": "When a car stops suddenly, your body's inertia keeps it moving forward at the car's original speed. The seatbelt provides the necessary unbalanced force to decelerate your body along with the car, preventing you from colliding with the dashboard or windshield."}, {"front": "Explain the 'tablecloth trick' using the concept of inertia.", "back": "When the tablecloth is pulled quickly, the dishes remain nearly stationary because their inertia resists the brief, horizontal force of the cloth sliding beneath them. The pull is fast enough that friction doesn't have time to significantly accelerate the dishes."}, {"front": "Why do passengers in a bus feel pushed to the side (e.g., to the right when the bus turns left)?", "back": "Passengers feel pushed to the side because their bodies, due to inertia, attempt to continue moving in a straight line while the bus turns underneath them. They are not actually pushed by a force to the side, but resisting the change in direction."}, {"front": "In what scenario can Newton's First Law be observed in its 'purest form'?", "back": "A spacecraft in deep space, far from any planets or stars and with its engines off, continues at constant velocity indefinitely. In the vacuum of space, there is virtually no friction or air resistance, so no unbalanced force acts to slow it down."}, {"front": "What happens to an object's velocity if the net force acting on it is zero?", "back": "If the net force on an object is zero (forces are balanced), its velocity does not change. It will either remain at rest or continue moving at a constant velocity (constant speed in a straight line)."}, {"front": "What happens to an object's velocity if the net force acting on it is *not* zero?", "back": "If the net force on an object is not zero (forces are unbalanced), its velocity *will* change. This means the object will accelerate (speed up, slow down, or change direction)."}, {"front": "Does 'no acceleration' imply 'no motion'? Explain.", "back": "No, 'no acceleration' means that an object's velocity (both speed and direction) is constant. An object moving at a constant speed in a straight line has zero acceleration, but it is definitely in motion."}, {"front": "Who was Galileo Galilei's contribution to the understanding of inertia?", "back": "Galileo, through thought experiments with inclined planes, proposed the idea that a ball on a perfectly flat, frictionless surface would roll forever without speeding up or slowing down. He called this tendency inertia, a concept Newton later incorporated."}, {"front": "A student claims: 'If I stop pushing a box, it stops moving. This proves that a force is needed to keep an object moving.' How is this reasoning incorrect according to Newton's First Law?", "back": "The student is confusing the absence of an applied force with the absence of all forces. When the student stops pushing, friction continues to act as an unbalanced opposing force, decelerating the box until it stops. Newton's First Law states that *if all forces were removed* (including friction), the box would continue at constant velocity forever."}, {"front": "What is meant by 'constant velocity' in the context of Newton's First Law?", "back": "Constant velocity means that an object is moving at both a constant speed and in a constant direction (a straight line). Both aspects must be unchanging."}, {"front": "Why does a hockey puck slide a much longer distance on ice compared to a rougher surface after being hit with the same force?", "back": "Ice provides very little friction, meaning there is only a small unbalanced force opposing the puck's motion. This small force takes a long time to bring the puck to rest, demonstrating inertia. On a rougher surface, friction is greater, so the puck stops sooner."}, {"front": "Newton's First Law tells us that force is needed for what specific action regarding motion?", "back": "Newton's First Law tells us that force is needed to *change* motion (i.e., to cause acceleration, which includes speeding up, slowing down, or changing direction), not to maintain it."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
