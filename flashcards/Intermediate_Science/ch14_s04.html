<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 14, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the key difference between work and power, using the example of two students climbing stairs?", "back": "Work is the total energy transferred, while power is the rate at which that work is done or energy is transferred. In the example, both students do the same work, but the student who sprints has higher power because they do the work faster.", "id": "fc01"}, {"front": "Define power in physics.", "back": "Power is the rate at which work is done or energy is transferred. It measures how quickly energy is used or delivered.", "id": "fc02"}, {"front": "What is the SI unit of power, and how is it defined?", "back": "The SI unit of power is the watt (W), defined as one joule of work done per second (1W = 1J/s).", "id": "fc03"}, {"front": "Who was James Watt, after whom the SI unit of power is named?", "back": "James Watt was a Scottish engineer who significantly improved the steam engine.", "id": "fc04"}, {"front": "Write the primary formula for calculating power, including the units for each variable.", "back": "The primary formula is P = W/t, where P is power in watts (W), W is work in joules (J), and t is time in seconds (s).", "id": "fc05"}, {"front": "Derive an alternative formula for power when the force applied and the speed of the object are known.", "back": "Since work (W) equals force times distance (Fd), substituting into P = W/t gives P = (Fd)/t. Because speed (v) is distance over time (d/t), this simplifies to P = Fv.", "id": "fc06"}, {"front": "When is the formula P = Fv particularly useful?", "back": "This formula is useful when you know the force applied and the speed of the object in the direction of the force, but not the time taken.", "id": "fc07"}, {"front": "What is a kilowatt (kW), and what is it commonly used for?", "back": "A kilowatt is 1000W. It is commonly used for rating appliances, engines, and electric motors.", "id": "fc08"}, {"front": "What is horsepower (hp), and approximately how many watts is it equivalent to?", "back": "Horsepower (hp) is an older unit still used for engines. 1hp is approximately 746W.", "id": "fc09"}, {"front": "Is a kilowatt-hour (kWh) a unit of power or energy? Explain its common use.", "back": "A kilowatt-hour (kWh) is a unit of energy, not power. It is commonly used on electricity bills to measure the total electrical energy consumed.", "id": "fc10"}, {"front": "Convert 1 kilowatt-hour (kWh) into joules (J).", "back": "1kWh = (1000W)(3600s) = 3,600,000J = 3.6MJ.", "id": "fc11"}, {"front": "If you run a 1000W microwave for one hour, how much energy do you use in kWh, and what might it cost at a typical rate of $0.12 per kWh?", "back": "You use 1kWh of energy (1000W × 1h). At $0.12/kWh, it would cost about $0.12.", "id": "fc12"}, {"front": "Who was Emmy Noether, and what was her major contribution to physics and mathematics?", "back": "Emmy Noether was a German mathematician whose work, particularly Noether's theorem, established a profound connection between symmetry and conservation laws in physics.", "id": "fc13"}, {"front": "Briefly explain Noether's theorem.", "back": "Noether's theorem states that every continuous symmetry in the laws of physics corresponds to a conserved quantity.", "id": "fc14"}, {"front": "According to Noether's theorem, what conserved quantities correspond to the following symmetries: (a) laws of physics are the same at every point in time, (b) laws of physics are the same at every location in space, (c) laws of physics are the same regardless of orientation?", "back": "(a) Conservation of energy, (b) Conservation of momentum, (c) Conservation of angular momentum.", "id": "fc15"}, {"front": "What does Noether's theorem imply about the law of conservation of energy?", "back": "It implies that the law of conservation of energy is a mathematical consequence of the fact that the laws of physics do not change over time.", "id": "fc16"}, {"front": "What significant discrimination did Emmy Noether face during her career?", "back": "She was denied paid faculty positions for years as a woman, had to lecture under a male colleague's name, and was dismissed by the Nazis because she was Jewish.", "id": "fc17"}, {"front": "In the 'Roller Coaster Energy' investigation, why does the marble never reach the full starting height on the second hill?", "back": "Some energy is 'lost' to friction (converted into thermal energy/heat) during the marble's movement, preventing it from converting all its kinetic energy back into potential energy.", "id": "fc18"}, {"front": "How is 'efficiency' calculated in the context of the roller coaster track investigation?", "back": "Efficiency = (h_max reached / h_start) * 100%.", "id": "fc19"}, {"front": "How might increasing the starting height of the marble affect the efficiency of the roller coaster track, and why?", "back": "Higher starting heights may result in slightly lower efficiency because the marble reaches higher speeds, which generally increases friction losses.", "id": "fc20"}, {"front": "How does regenerative braking in electric cars relate to the law of conservation of energy?", "back": "Regenerative braking is a direct application of conservation of energy, transforming the car's kinetic energy back into electrical energy stored in the battery (instead of being entirely lost as heat by friction brakes).", "id": "fc21"}, {"front": "Why can't regenerative braking recover 100% of a car's kinetic energy?", "back": "The conversion is not 100% efficient due to inevitable energy losses as heat in the motor's wires (electrical resistance), mechanical friction in the drive train, and sound. The second law of thermodynamics also dictates perfect efficiency is impossible.", "id": "fc22"}, {"front": "What is a typical recovery efficiency for regenerative braking systems?", "back": "Typical regenerative braking systems recover about 60-70% of the kinetic energy.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
