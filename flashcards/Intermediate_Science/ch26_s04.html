<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 26, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is deforestation?", "back": "The large-scale removal of forests, usually to make way for agriculture, ranching, logging, or urban development.", "id": "fc01"}, {"front": "Name two major environmental consequences of deforestation.", "back": "Habitat destruction, carbon release (contributing to climate change), soil erosion, disrupted water cycles, or loss of ecosystem services.", "id": "fc02"}, {"front": "How does deforestation contribute to climate change?", "back": "Trees store carbon; when forests are burned or decompose after clearing, that carbon is released into the atmosphere as CO2, contributing to climate change.", "id": "fc03"}, {"front": "Define urbanization.", "back": "The growth of cities and the conversion of natural or agricultural land into built environments.", "id": "fc04"}, {"front": "What are 'urban heat islands' and what causes them?", "back": "Urban areas that are significantly warmer than surrounding rural areas. They are caused by dark pavement/buildings absorbing solar energy, waste heat from vehicles/AC, and fewer trees for shade/evapotranspiration.", "id": "fc05"}, {"front": "How can cities, despite their environmental impacts, offer some environmental advantages?", "back": "Dense urban living can mean shorter commutes, shared infrastructure, smaller per-person land footprints, and potentially lower per-capita carbon emissions in well-designed cities.", "id": "fc06"}, {"front": "What is pollution?", "back": "The introduction of harmful substances or energy into the environment at rates that exceed the environment's capacity to absorb, dilute, or decompose them.", "id": "fc07"}, {"front": "What is acid rain, and what are its primary atmospheric causes?", "back": "Precipitation (rain, snow, or fog) that has become acidic due to atmospheric pollutants, primarily sulfur dioxide (SO2) and nitrogen oxides (NOx), which react with water to form strong acids.", "id": "fc08"}, {"front": "Name two specific harmful effects of acid rain.", "back": "It damages forests, acidifies lakes, and corrodes stone buildings and monuments.", "id": "fc09"}, {"front": "Which air pollutant is a colorless, odorless gas produced by incomplete combustion of fossil fuels and reduces the blood's ability to carry oxygen?", "back": "Carbon monoxide (CO).", "id": "fc10"}, {"front": "Distinguish between point source and nonpoint source water pollution.", "back": "Point sources are identifiable, specific locations (e.g., a factory pipe); nonpoint sources have diffuse origins across a large area (e.g., agricultural runoff).", "id": "fc11"}, {"front": "Define bioaccumulation.", "back": "The process by which a substance increases in concentration in an organism's tissues over time because the organism absorbs it faster than it can eliminate it.", "id": "fc12"}, {"front": "Define biomagnification.", "back": "The increasing concentration of a persistent substance in organisms at each successive trophic level of a food chain, because predators consume many contaminated prey organisms.", "id": "fc13"}, {"front": "What are common causes of soil pollution, and what are its potential impacts?", "back": "Causes include improper disposal of industrial waste, pesticide overuse, mining, and leaking underground storage tanks. Impacts include leaching into groundwater, absorption by crops, and persistence for decades.", "id": "fc14"}, {"front": "What is eutrophication?", "back": "The excessive enrichment of a body of water with nutrients, especially nitrogen and phosphorus, leading to dense algal growth (algal bloom).", "id": "fc15"}, {"front": "List the key steps in the destructive chain of eutrophication.", "back": "Nutrient input -> Algal bloom -> Light blockage (submerged plants die) -> Decomposition (bacteria consume dissolved oxygen) -> Oxygen depletion (creating dead zones).", "id": "fc16"}, {"front": "What is a 'dead zone' in the context of aquatic ecosystems?", "back": "A region of water with dissolved oxygen levels so low that most marine life cannot survive, typically caused by eutrophication from agricultural or sewage runoff.", "id": "fc17"}, {"front": "What is the primary function of the ozone layer in the stratosphere?", "back": "It shields Earth's surface from harmful ultraviolet (UV-B and UV-C) radiation.", "id": "fc18"}, {"front": "What synthetic chemicals were identified as the primary cause of ozone depletion?", "back": "Chlorofluorocarbons (CFCs).", "id": "fc19"}, {"front": "Briefly explain how CFCs destroy ozone molecules.", "back": "When CFCs reach the stratosphere, UV radiation breaks them apart, releasing chlorine atoms. A single chlorine atom can catalytically destroy thousands of ozone molecules in a chain reaction, regenerating itself.", "id": "fc20"}, {"front": "What international agreement successfully addressed ozone depletion, and why is it considered successful?", "back": "The Montreal Protocol (1987). It successfully phased out CFCs, leading to declining atmospheric CFC levels and a slow recovery of the ozone layer.", "id": "fc21"}, {"front": "Why was addressing ozone depletion (via the Montreal Protocol) arguably easier than addressing climate change?", "back": "Addressing ozone depletion involved fewer sources of the problematic chemicals (CFCs), readily available substitutes, and lower economic costs compared to the pervasive nature and economic integration of fossil fuels causing climate change.", "id": "fc22"}, {"front": "Define sustainability.", "back": "Meeting the needs of the present without compromising the ability of future generations to meet their own needs, requiring a balance of economic development, social well-being, and environmental protection.", "id": "fc23"}, {"front": "Give an example of a sustainability practice at the individual level.", "back": "Reducing consumption, reusing materials, recycling, conserving water and energy, choosing sustainable products, or reducing food waste.", "id": "fc24"}, {"front": "Give an example of a sustainability practice at the national or global level.", "back": "Enacting and enforcing environmental regulations, investing in renewable energy, protecting biodiversity hotspots, or supporting international conservation agreements.", "id": "fc25"}, {"front": "How do scientists contribute to effective environmental policy?", "back": "By monitoring pollution levels and species populations, modeling consequences of policy choices, communicating research to policymakers and the public, and evaluating policy effectiveness.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
