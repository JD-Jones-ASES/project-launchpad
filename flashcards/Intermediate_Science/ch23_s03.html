<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 23, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two fundamental classes of chemical compounds involved in phenomena like lemon juice stinging and soap feeling slippery?", "back": "Acids and Bases.", "id": "fc01"}, {"front": "According to the Arrhenius definition, what is an acid?", "back": "A substance that produces hydrogen ions (H+) when dissolved in water, increasing the concentration of H+ ions in solution.", "id": "fc02"}, {"front": "List three common properties of acids.", "back": "Acids have a sour taste, react with metals to produce hydrogen gas, turn blue litmus paper red, and react with bases in neutralization reactions.", "id": "fc03"}, {"front": "Name two common strong acids mentioned in the text.", "back": "HCl (hydrochloric acid), HNO3 (nitric acid), and H2SO4 (sulfuric acid).", "id": "fc04"}, {"front": "According to the Arrhenius definition, what is a base?", "back": "A substance that produces hydroxide ions (OH-) when dissolved in water, increasing the concentration of OH- ions in solution.", "id": "fc05"}, {"front": "List three common properties of bases.", "back": "Bases have a bitter taste, feel slippery, turn red litmus paper blue, and react with acids in neutralization reactions.", "id": "fc06"}, {"front": "Name two common bases mentioned in the text.", "back": "NaOH (sodium hydroxide) and NH3 (ammonia), also CaCO3 and Mg(OH)2 in antacids.", "id": "fc07"}, {"front": "What does the pH scale measure?", "back": "The pH scale measures the acidity or basicity of a solution.", "id": "fc08"}, {"front": "On the pH scale, what pH value is neutral, and what ranges are acidic and basic?", "back": "A pH of 7 is neutral, values below 7 are acidic, and values above 7 are basic (alkaline).", "id": "fc09"}, {"front": "What does each whole number change on the pH scale represent in terms of hydrogen ion concentration?", "back": "Each whole number on the pH scale represents a tenfold change in hydrogen ion (H+) concentration.", "id": "fc10"}, {"front": "Define a strong acid and provide an example.", "back": "A strong acid completely dissociates (breaks apart into ions) in water. Example: HCl.", "id": "fc11"}, {"front": "Define a weak acid and provide an example.", "back": "A weak acid only partially dissociates in water. Example: CH3COOH (acetic acid).", "id": "fc12"}, {"front": "Define a strong base and provide an example.", "back": "A strong base completely dissociates in water. Example: NaOH.", "id": "fc13"}, {"front": "Define a weak base and provide an example.", "back": "A weak base only partially reacts with water. Example: NH3 (ammonia).", "id": "fc14"}, {"front": "What is an indicator in chemistry?", "back": "A substance that changes color depending on the pH of the solution it is in, used to determine if a solution is acidic, basic, or neutral.", "id": "fc15"}, {"front": "How does litmus paper indicate acidity or basicity?", "back": "Red litmus turns blue in a base; blue litmus turns red in an acid.", "id": "fc16"}, {"front": "Describe the color change of phenolphthalein in acidic vs. basic solutions.", "back": "Phenolphthalein is colorless in acidic solutions and turns pink/magenta in basic solutions (pH > 8.2).", "id": "fc17"}, {"front": "What is the general color range displayed by a universal indicator?", "back": "It changes through a range of colors from red (acidic) to purple (basic), corresponding to pH 1–14.", "id": "fc18"}, {"front": "What is a neutralization reaction?", "back": "A chemical reaction between an acid and a base that produces a salt and water.", "id": "fc19"}, {"front": "What is the general equation for a neutralization reaction?", "back": "acid + base -> salt + water.", "id": "fc20"}, {"front": "What is the typical pH of the resulting solution in a complete neutralization reaction?", "back": "The resulting solution has a pH near 7 (neutral).", "id": "fc21"}, {"front": "In a neutralization reaction, what ions combine to form water?", "back": "The H+ ions from the acid combine with the OH- ions from the base to form H2O.", "id": "fc22"}, {"front": "Write the balanced equation for the neutralization of hydrochloric acid (HCl) with sodium hydroxide (NaOH) and identify the salt produced.", "back": "HCl(aq) + NaOH(aq) -> NaCl(aq) + H2O(l). The salt produced is sodium chloride (NaCl).", "id": "fc23"}, {"front": "How do antacid tablets help relieve heartburn?", "back": "Antacid tablets contain a base (such as CaCO3 or Mg(OH)2) that neutralizes excess stomach acid (HCl), relieving discomfort.", "id": "fc24"}, {"front": "What is the approximate pH of hydrochloric acid in the human stomach?", "back": "The stomach produces HCl at a pH of about 1–2.", "id": "fc25"}, {"front": "How is the stomach lining protected from its own strong acid?", "back": "The stomach lining is protected by a thick layer of mucus.", "id": "fc26"}, {"front": "What is the remarkably stable pH that human blood maintains?", "back": "Human blood maintains a stable pH of about 7.4.", "id": "fc27"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
