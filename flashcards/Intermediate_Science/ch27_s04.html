<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 27, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two complementary approaches to addressing climate change?", "back": "Mitigation (reducing the causes of climate change) and Adaptation (preparing for the effects of climate change)."}, {"front": "Define 'mitigation' in the context of climate change.", "back": "Actions taken to reduce or prevent greenhouse gas emissions in order to limit the magnitude of future climate change."}, {"front": "Why are both mitigation and adaptation necessary to address climate change?", "back": "Some warming is already 'locked in' due to past emissions, making adaptation essential, but limiting further warming through mitigation makes adaptation far more manageable."}, {"front": "What is considered the single most important step for reducing global greenhouse gas emissions?", "back": "Replacing fossil fuels with renewable energy sources."}, {"front": "Define 'renewable energy' and list three examples.", "back": "Energy derived from sources that are naturally replenished on human timescales. Examples include solar, wind, hydroelectric, geothermal, and biomass energy."}, {"front": "What are the main advantages and limitations of solar energy?", "back": "Advantages: Has become dramatically cheaper, often the cheapest source of new electricity. Limitations: Intermittency (sun does not shine at night or on cloudy days), requires energy storage."}, {"front": "What are the main advantages and limitations of wind energy?", "back": "Advantages: Costs have dropped substantially, offshore wind farms can generate large amounts of power. Limitations: Intermittency, visual and noise impacts of turbines, minor effects on birds and bats."}, {"front": "How does hydroelectric energy complement other renewable sources like solar and wind?", "back": "It is reliable and can be dispatched on demand (by opening dam gates), making it an excellent complement to intermittent solar and wind."}, {"front": "What are the primary environmental concerns associated with hydroelectric energy?", "back": "The environmental impact of dams on river ecosystems, fish migration, and downstream water flow."}, {"front": "How does geothermal energy work, and where is it most effective?", "back": "It taps heat from Earth's interior. It is most effective in regions with volcanic or tectonic activity, providing reliable baseload electricity."}, {"front": "Is nuclear energy considered renewable? What role does it play in climate change mitigation?", "back": "No, it is not renewable as it uses uranium fuel. However, it produces electricity with very low greenhouse gas emissions during operation, and many scientists argue it has a role in reducing emissions."}, {"front": "Define 'energy efficiency' and provide two examples.", "back": "Using less energy to accomplish the same task. Examples: LED lighting, building insulation, efficient appliances, fuel-efficient vehicles."}, {"front": "What is Carbon Capture and Storage (CCS)?", "back": "Technologies that capture CO2 emissions from industrial sources or directly from the atmosphere, then store the captured CO2 underground in geological formations to prevent it from entering the atmosphere."}, {"front": "Describe the two main approaches to carbon capture mentioned in the text.", "back": "Point-source capture (from industrial exhaust before it enters the atmosphere) and Direct Air Capture (extracting CO2 directly from ambient air)."}, {"front": "Name two nature-based strategies for enhancing carbon sinks.", "back": "Reforestation (planting new forests), afforestation (establishing forests where none existed), protecting existing forests, wetland and mangrove restoration."}, {"front": "Beyond energy and carbon capture, list two other mitigation strategies.", "back": "Reducing methane emissions (landfills, livestock, natural gas infrastructure), sustainable agriculture, reducing deforestation, and electrification (switching to clean electricity for heating, cooking, transport)."}, {"front": "Define 'adaptation' in the context of climate change.", "back": "Actions taken to prepare for and adjust to the current and future effects of climate change in order to reduce harm and take advantage of new opportunities."}, {"front": "Provide two examples of coastal defense strategies for climate adaptation.", "back": "Sea walls, levees, storm surge barriers, restored coastal wetlands, and managed retreat from vulnerable coastlines."}, {"front": "How can agricultural practices adapt to climate change impacts?", "back": "Developing heat-tolerant and drought-resistant crop varieties, adjusting planting schedules, and diversifying crops."}, {"front": "What is the purpose of 'heat action plans' in urban areas?", "back": "City governments creating cooling centers, expanding urban tree canopy, and redesigning buildings for passive cooling to reduce the heat island effect and protect against extreme heat."}, {"front": "Why is international cooperation crucial for addressing climate change?", "back": "Climate change is a global problem because greenhouse gases mix throughout the atmosphere regardless of their emission source, meaning no single nation can solve it alone."}, {"front": "What was the primary goal of the Paris Agreement (2015)?", "back": "To limit global warming to well below 2°C above pre-industrial levels, with an aspirational target of 1.5°C."}, {"front": "How does the Paris Agreement expect countries to contribute to its goals?", "back": "Each country sets its own emission reduction targets, called Nationally Determined Contributions (NDCs), and reports on its progress."}, {"front": "What is the role of the Intergovernmental Panel on Climate Change (IPCC)?", "back": "The IPCC reviews and synthesizes global scientific literature on climate change, producing comprehensive assessment reports that inform policy and international negotiations."}, {"front": "What was a key limitation of the Kyoto Protocol?", "back": "It had limited success because major emitters either did not ratify it or withdrew, weakening its global impact on emission reduction targets."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
