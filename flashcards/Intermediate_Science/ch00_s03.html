<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 0, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of data analysis in an experiment?", "back": "To figure out what the collected raw data mean, find patterns, draw conclusions, and communicate results.", "id": "fc01"}, {"front": "List three essential features of a well-constructed data table.", "back": "A descriptive title; clearly labeled columns with variable name and unit; the independent variable in the leftmost column; consistent precision. (Any three are valid.)", "id": "fc02"}, {"front": "Why is running multiple trials essential when collecting data in an experiment?", "back": "Individual measurements always contain some variability, so taking the average of several trials gives a more reliable estimate of the true value.", "id": "fc03"}, {"front": "When is a line graph the appropriate type of graph to use?", "back": "When both the independent and dependent variables are continuous (numerical) and you want to show how one changes as the other increases or decreases.", "id": "fc04"}, {"front": "When is a bar graph the appropriate type of graph to use?", "back": "When the independent variable is categorical, meaning it falls into distinct groups rather than a continuous range.", "id": "fc05"}, {"front": "What information can a scatter plot reveal about the relationship between two variables?", "back": "It shows whether a correlation exists: positive (points cluster around an upward-sloping line), negative (downward-sloping line), or no correlation (random scatter).", "id": "fc06"}, {"front": "List three essential features every graph should include.", "back": "A descriptive title; labeled axes with variable names and units; an appropriate, evenly spaced scale on each axis; clearly plotted data points; a best-fit line or curve (if appropriate). (Any three are valid.)", "id": "fc07"}, {"front": "Define 'slope' in the context of a graph and explain what it represents in science.", "back": "Slope tells you how steeply a line rises or falls, representing the rate of change of the dependent variable with respect to the independent variable. In science, it reveals physical quantities like velocity or acceleration.", "id": "fc08"}, {"front": "How do you calculate the slope of a line given two points $(x_1, y_1)$ and $(x_2, y_2)$?", "back": "Slope = $(y_2 - y_1) / (x_2 - x_1)$ (rise over run).", "id": "fc09"}, {"front": "What does a negative slope indicate about the relationship between independent and dependent variables?", "back": "A negative slope means the dependent variable decreases as the independent variable increases.", "id": "fc10"}, {"front": "Define 'mean' and state its formula.", "back": "The arithmetic average of a data set, calculated by adding all values together and dividing by the number of values. Formula: $\\bar{x} = \\Sigma x_i / n$.", "id": "fc11"}, {"front": "Define 'median' and explain its advantage over the mean in certain situations.", "back": "The middle value of a data set when values are arranged in order. It is less affected by extreme values (outliers) than the mean, making it a better choice for skewed data.", "id": "fc12"}, {"front": "Define 'range' and state its formula.", "back": "The difference between the largest and smallest values in a data set. Formula: Range = $x_{max} - x_{min}$.", "id": "fc13"}, {"front": "What is a 'trend' in a data set?", "back": "A general pattern or direction in a data set. Trends can be increasing, decreasing, cyclical, or show no clear pattern.", "id": "fc14"}, {"front": "What is the purpose of drawing a 'best-fit line' or curve on a graph?", "back": "It helps to see the overall trend more clearly than connecting individual data points, following the general direction of the data with roughly equal numbers of points above and below the line.", "id": "fc15"}, {"front": "Define 'significant figures' and explain their importance.", "back": "The digits in a measurement that are known with certainty plus one estimated digit. They communicate the precision of a measurement, indicating how finely an instrument can distinguish values.", "id": "fc16"}, {"front": "List the four key rules for identifying significant figures.", "back": "1. All nonzero digits are significant. 2. Zeros between nonzero digits are significant. 3. Leading zeros are not significant. 4. Trailing zeros after a decimal point are significant.", "id": "fc17"}, {"front": "How do the rules for significant figures differ between multiplication/division and addition/subtraction?", "back": "For multiplication and division, round the answer to the fewest significant figures of any factor. For addition and subtraction, round to the fewest decimal places.", "id": "fc18"}, {"front": "In science, what does the word 'error' refer to?", "back": "In science, 'error' refers to the unavoidable uncertainty in every measurement, not a mistake.", "id": "fc19"}, {"front": "Describe 'random error' and how it can be reduced.", "back": "Random error causes measurements to scatter unpredictably above and below the true value. It arises from small, uncontrollable fluctuations and can be reduced by taking more measurements and averaging them.", "id": "fc20"}, {"front": "Describe 'systematic error' and how it differs from random error.", "back": "Systematic error consistently pushes all measurements in one direction (e.g., always too high). Unlike random error, it cannot be reduced by averaging; its source must be identified and corrected.", "id": "fc21"}, {"front": "How can the range of measurements be used to express uncertainty simply?", "back": "By reporting the mean measurement followed by '$\\pm$ half the range' (e.g., $14.3s \\pm 0.2s$).", "id": "fc22"}, {"front": "What is 'percent error' and what does a small percent error suggest?", "back": "Percent error compares an experimental result to a known or accepted value. A small percent error suggests the experiment was well conducted.", "id": "fc23"}, {"front": "What is the formula for calculating percent error?", "back": "Percent error = $|experimental - accepted| / accepted \\times 100\\%$.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
