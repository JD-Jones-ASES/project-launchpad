<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 12, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental force drives wind?", "back": "Differences in atmospheric pressure.", "id": "fc01"}, {"front": "What is the primary cause of these atmospheric pressure differences?", "back": "The unequal heating of Earth's surface by the Sun.", "id": "fc02"}, {"front": "How does the Sun's heating vary between the equatorial regions and the poles?", "back": "The equator receives more direct, concentrated sunlight, while the poles receive sunlight at a low angle, spreading energy over a larger area.", "id": "fc03"}, {"front": "Explain how warm air affects atmospheric pressure at the surface.", "back": "Warm air is less dense, so it rises, creating a region of low pressure at the surface.", "id": "fc04"}, {"front": "Explain how cool air affects atmospheric pressure at the surface.", "back": "Cool air is denser, so it sinks, creating a region of high pressure at the surface.", "id": "fc05"}, {"front": "In what general direction does air always move?", "back": "Air always moves from areas of high pressure to areas of low pressure.", "id": "fc06"}, {"front": "Define the Coriolis effect.", "back": "The apparent deflection of moving objects (including wind and ocean currents) caused by Earth's rotation.", "id": "fc07"}, {"front": "How does the Coriolis effect influence the path of wind in the Northern Hemisphere?", "back": "Winds are deflected to the right of their direction of travel.", "id": "fc08"}, {"front": "How does the Coriolis effect influence the path of wind in the Southern Hemisphere?", "back": "Winds are deflected to the left of their direction of travel.", "id": "fc09"}, {"front": "Where is the Coriolis effect strongest and weakest?", "back": "It is strongest at the poles and weakest at the equator.", "id": "fc10"}, {"front": "Does the Coriolis effect create wind?", "back": "No, pressure differences create wind; the Coriolis effect only deflects its path.", "id": "fc11"}, {"front": "What three major factors combine to produce global wind patterns?", "back": "Unequal heating, rising and sinking air, and the Coriolis effect.", "id": "fc12"}, {"front": "Describe the 'Trade Winds,' including their location and typical direction in each hemisphere.", "back": "Steady easterly winds that blow from approximately 30° latitude toward the equator (0-30°). They are northeast in the Northern Hemisphere and southeast in the Southern Hemisphere.", "id": "fc13"}, {"front": "Why were the Trade Winds historically important?", "back": "European sailors relied on these reliable winds during the Age of Exploration.", "id": "fc14"}, {"front": "Describe the 'Westerlies,' including their location and typical direction in the Northern Hemisphere.", "back": "Prevailing winds blowing from approximately 30° to 60° latitude. In the Northern Hemisphere, they blow predominantly from the southwest.", "id": "fc15"}, {"front": "How do the Westerlies affect weather patterns in the continental United States?", "back": "Most of the U.S. lies within the westerly wind belt, causing weather systems to generally move from west to east.", "id": "fc16"}, {"front": "Describe the 'Polar Easterlies,' including their location and typical direction.", "back": "Cold, dense winds blowing from approximately 60° to 90° latitude (the poles). They are deflected into easterlies, blowing from the east.", "id": "fc17"}, {"front": "What is the 'polar front' and where does it typically form?", "back": "A boundary of frequent storm activity that forms where the cold polar easterlies meet the warmer westerlies, typically around 60° latitude.", "id": "fc18"}, {"front": "Define 'jet stream.'", "back": "A narrow band of very fast-moving wind (160–400 km/h) in the upper troposphere, typically found near the boundaries between global wind belts.", "id": "fc19"}, {"front": "Name the two primary types of jet streams and their approximate latitudes.", "back": "The polar jet stream (near 60° latitude) and the subtropical jet stream (near 30° latitude).", "id": "fc20"}, {"front": "List two significant impacts of jet streams.", "back": "They steer large-scale weather systems (storms and fronts) and affect air travel (faster flights with the stream, slower against it).", "id": "fc21"}, {"front": "What fundamental principle causes local winds like sea and land breezes?", "back": "Differential heating of Earth's surface on a smaller scale, creating convection cells.", "id": "fc22"}, {"front": "Explain the formation of a sea breeze.", "back": "During the day, land heats faster than the ocean. Warm air rises over the land (low pressure), and cooler air from over the ocean flows inland to replace it.", "id": "fc23"}, {"front": "Explain the formation of a land breeze.", "back": "At night, land cools faster than the ocean. Warmer air over the water rises (low pressure), and cooler air from the land flows out to sea.", "id": "fc24"}, {"front": "What other local winds are created by a similar differential heating mechanism?", "back": "Mountain and valley breezes.", "id": "fc25"}, {"front": "Why is the Coriolis effect not a factor in the direction water drains from a bathtub?", "back": "The Coriolis effect is far too weak to influence small-scale phenomena like bathtub drains; their swirl direction is determined by factors like the tub's shape and initial water movement.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
