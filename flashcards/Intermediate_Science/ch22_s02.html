<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 22, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the average distance of the Moon from Earth?", "back": "Approximately 384,400 kilometers.", "id": "fc01"}, {"front": "List three significant ways the Moon influences Earth.", "back": "The Moon's gravitational pull raises ocean tides, its phases have guided calendars for millennia, and its eclipses have inspired awe and scientific discovery.", "id": "fc02"}, {"front": "What causes the Moon to appear to change shape throughout the month?", "back": "The Moon does not produce its own light; it reflects sunlight. As it orbits Earth, the angle between the Sun, Moon, and Earth changes, causing different amounts of the Moon's sunlit side to face us.", "id": "fc03"}, {"front": "Define 'lunar phase.'", "back": "The changing appearance of the Moon as seen from Earth, caused by the varying angle of sunlight illuminating the Moon's surface during its orbit.", "id": "fc04"}, {"front": "How long does one complete cycle of lunar phases take?", "back": "Approximately 29.5 days.", "id": "fc05"}, {"front": "List the eight major lunar phases in order, starting from New Moon.", "back": "New Moon, Waxing Crescent, First Quarter, Waxing Gibbous, Full Moon, Waning Gibbous, Third Quarter, Waning Crescent.", "id": "fc06"}, {"front": "Which lunar phase is characterized by the Moon being between the Sun and Earth, making it invisible or nearly so?", "back": "New Moon.", "id": "fc07"}, {"front": "What is the difference between 'waxing' and 'waning' in the context of lunar phases?", "back": "'Waxing' means the illuminated portion of the Moon is growing, while 'waning' means it is decreasing.", "id": "fc08"}, {"front": "What is an 'eclipse'?", "back": "An event in which one celestial body passes into the shadow of another, temporarily blocking sunlight.", "id": "fc09"}, {"front": "Differentiate between a solar eclipse and a lunar eclipse.", "back": "A solar eclipse occurs when the Moon passes between the Sun and Earth. A lunar eclipse occurs when Earth passes between the Sun and Moon.", "id": "fc10"}, {"front": "During which lunar phase do solar eclipses occur, and why are total solar eclipses rare at any given location?", "back": "Solar eclipses occur during a New Moon. Total solar eclipses are rare because the Moon's shadow (umbra) is only about 270 kilometers wide.", "id": "fc11"}, {"front": "During which lunar phase do lunar eclipses occur, and why does the Moon often turn a reddish color during a total lunar eclipse?", "back": "Lunar eclipses occur during a Full Moon. The Moon turns reddish because Earth's atmosphere bends (refracts) red light into the shadow zone.", "id": "fc12"}, {"front": "Why do eclipses not occur every month?", "back": "Eclipses do not occur every month because the Moon's orbit is tilted about 5 degrees relative to Earth's orbit around the Sun, meaning the Sun, Moon, and Earth are not precisely aligned every month.", "id": "fc13"}, {"front": "Define 'tidal force.'", "back": "The gravitational force exerted by one body on another that varies across the second body's diameter, causing it to stretch.", "id": "fc14"}, {"front": "Explain how the Moon's gravity creates two tidal bulges on Earth, resulting in two high tides daily.", "back": "The Moon's gravity pulls on the ocean water nearest to it, creating one tidal bulge. A second bulge forms on the opposite side because the Moon's gravity pulls Earth's solid body away from the water on the far side.", "id": "fc15"}, {"front": "What are 'spring tides' and when do they occur?", "back": "Spring tides are extra-high tides that occur when the Sun, Moon, and Earth are aligned (during New Moon and Full Moon), causing their tidal forces to combine.", "id": "fc16"}, {"front": "What are 'neap tides' and when do they occur?", "back": "Neap tides are smaller tides that occur when the Sun and Moon are at right angles relative to Earth (during First and Third Quarter), causing their tidal forces to work against each other.", "id": "fc17"}, {"front": "What is the leading scientific hypothesis for the Moon's origin?", "back": "The giant impact hypothesis.", "id": "fc18"}, {"front": "Briefly describe the key event of the giant impact hypothesis.", "back": "About 4.5 billion years ago, a Mars-sized body (Theia) collided with the young Earth. The impact ejected molten rock and debris into orbit, which gradually coalesced to form the Moon.", "id": "fc19"}, {"front": "What evidence supports the giant impact hypothesis for the Moon's formation?", "back": "Evidence includes the Moon's composition (similar to Earth's mantle), its relatively small iron core (Theia's and Earth's cores merged), and its lack of volatile elements (boiled away by the collision's heat).", "id": "fc20"}, {"front": "The Moon is slowly moving away from Earth. How would Earth's tides be different if the Moon were twice as far away?", "back": "Earth's tidal forces would be much weaker (roughly 1/8th of current strength), resulting in significantly smaller tides, because tidal force drops as the cube of distance.", "id": "fc21"}, {"front": "How would Earth's tides be different if the Moon were half as far away?", "back": "Earth's tidal forces would be much stronger, producing dramatically larger tides, because tidal force increases significantly as distance decreases (cubed relationship).", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
