<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 22, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the average distance of the Moon from Earth?", "back": "Approximately 384,400 kilometers."}, {"front": "Besides being a light in the night sky, what are two significant ways the Moon influences Earth?", "back": "Its gravitational pull raises ocean tides, and its phases have guided calendars for millennia."}, {"front": "What causes the Moon to appear to change shape throughout the month?", "back": "The Moon reflects sunlight, and as it orbits Earth, the angle between the Sun, Moon, and Earth changes, causing different amounts of the Moon's sunlit side to face us."}, {"front": "Define \"lunar phase.\"", "back": "A lunar phase is the changing appearance of the Moon as seen from Earth, caused by the varying angle of sunlight illuminating the Moon's surface during its orbit. The cycle repeats approximately every 29.5 days."}, {"front": "How long does a complete cycle of lunar phases take?", "back": "Approximately 29.5 days."}, {"front": "During which lunar phase is the Moon invisible (or nearly so) from Earth?", "back": "New Moon, when the Moon is between the Sun and Earth, and its sunlit side faces away from us."}, {"front": "Describe the \"First Quarter\" moon phase.", "back": "Half of the Moon's face is illuminated (the right half in the Northern Hemisphere), having completed one quarter of its orbit."}, {"front": "What distinguishes a \"waxing\" Moon from a \"waning\" Moon?", "back": "A \"waxing\" Moon means the illuminated portion seen from Earth is growing larger, while a \"waning\" Moon means the illuminated portion is decreasing."}, {"front": "What is a common misconception about the cause of lunar phases?", "back": "Lunar phases are NOT caused by Earth's shadow falling on the Moon; they result from the changing geometry of the Sun, Moon, and Earth."}, {"front": "Define \"eclipse.\"", "back": "An eclipse is an event in which one celestial body passes into the shadow of another, temporarily blocking sunlight."}, {"front": "When does a solar eclipse occur, and what celestial bodies are aligned?", "back": "A solar eclipse occurs during a New Moon, when the Moon passes directly between the Sun and Earth, casting a shadow on Earth's surface."}, {"front": "What is revealed during a total solar eclipse?", "back": "The Sun's outer atmosphere, called the corona."}, {"front": "Why are total solar eclipses considered rare at any given location?", "back": "Because the Moon's shadow (umbra) is only about 270 kilometers wide, covering a very small area on Earth."}, {"front": "When does a lunar eclipse occur, and what celestial bodies are aligned?", "back": "A lunar eclipse occurs during a Full Moon, when Earth passes between the Sun and Moon, and Earth's shadow falls on the Moon."}, {"front": "Why are lunar eclipses more commonly observed than solar eclipses?", "back": "Lunar eclipses are visible from the entire night side of Earth, whereas solar eclipses are visible only from a very narrow path."}, {"front": "Why does the Moon appear reddish during a total lunar eclipse?", "back": "Earth's atmosphere bends (refracts) red light into the shadow zone, illuminating the Moon with reddish hues."}, {"front": "Why don't eclipses occur every month?", "back": "The Moon's orbit is tilted about 5 degrees relative to Earth's orbit around the Sun. Eclipses occur only when the Sun, Moon, and Earth are precisely aligned."}, {"front": "Define \"tidal force.\"", "back": "A tidal force is the gravitational force exerted by one body on another that varies across the second body's diameter, causing it to stretch."}, {"front": "How does the Moon's gravity create two tidal bulges on Earth?", "back": "The Moon's gravity pulls on the ocean water nearest to it (near-side bulge). A second bulge forms on the opposite side because the Moon's gravity pulls Earth's solid body away from the water on the far side."}, {"front": "What are \"spring tides\" and when do they occur?", "back": "Spring tides are extra-high tides that occur when the Sun, Moon, and Earth are aligned (during New Moon and Full Moon), causing their tidal forces to combine."}, {"front": "What are \"neap tides\" and when do they occur?", "back": "Neap tides are smaller tides that occur when the Sun and Moon are at right angles relative to Earth (during First and Third Quarter), causing their tidal forces to partially cancel each other out."}, {"front": "What is the leading scientific hypothesis for the Moon's origin?", "back": "The Giant Impact Hypothesis."}, {"front": "Briefly describe the Giant Impact Hypothesis.", "back": "About 4.5 billion years ago, a Mars-sized body (Theia) collided with the young Earth, ejecting molten rock and debris into orbit, which then gradually coalesced to form the Moon."}, {"front": "Name two pieces of evidence supporting the Giant Impact Hypothesis.", "back": "Evidence includes the Moon's composition (similar to Earth's mantle), its relatively small iron core, and its lack of volatile elements."}, {"front": "If the Moon were twice as far from Earth, how would its tidal force on Earth change?", "back": "The tidal force would be significantly weaker (roughly 1/8th of its current strength) because tidal force drops as the cube of the distance ($1/d^3$)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
