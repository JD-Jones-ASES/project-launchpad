<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 10, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the powerful overarching scientific principle discussed in this section?", "back": "The principle is: Structure determines function. The way something is built — its shape, composition, and internal arrangement — dictates what it can do.", "id": "fc01"}, {"front": "How is the human body organized, and how does 'structure determines function' apply at each level?", "back": "The human body is organized in a hierarchy: cells form tissues, tissues form organs, organs form organ systems, which form an organism. At every level, structure determines function.", "id": "fc02"}, {"front": "Describe how the biconcave disc shape and absence of a nucleus in a red blood cell are adaptations for its function.", "back": "The biconcave disc shape maximizes surface area for oxygen diffusion, and the absence of a nucleus leaves more room for hemoglobin, the oxygen-carrying protein.", "id": "fc03"}, {"front": "What structural feature of a nerve cell enables its function of rapid signal transmission?", "back": "A nerve cell has a long, thin extension called an axon, designed to transmit electrical signals rapidly from one part of the body to another.", "id": "fc04"}, {"front": "How does the structure of a muscle cell relate to its primary function?", "back": "Muscle cells are packed with protein filaments that slide past each other to generate the force of contraction.", "id": "fc05"}, {"front": "What does 'cell specialization' mean in the context of living systems?", "back": "Cell specialization means that different cells have unique structures that are precisely matched to their specific functions.", "id": "fc06"}, {"front": "Give an example of how an organ's structure determines its function (e.g., stomach or lungs).", "back": "The stomach has thick muscular walls (structure) to churn food (function). The lungs have millions of tiny air sacs called alveoli (structure) to maximize gas exchange (function).", "id": "fc07"}, {"front": "In the context of homeostasis, how do the structures of feedback loops relate to their function?", "back": "The structures of feedback loops — receptors, control centers, and effectors — are precisely matched to their regulatory functions in maintaining the body's stable internal environment.", "id": "fc08"}, {"front": "How does the principle 'structure determines function' apply to Earth's surface and plate tectonics?", "back": "The structure of a plate boundary (how plates move relative to each other) determines the geological features and events (function) that form there.", "id": "fc09"}, {"front": "What are the characteristic landforms and processes found at a divergent plate boundary?", "back": "At a divergent boundary, plates pull apart, forming rift valleys on land or mid-ocean ridges underwater, where new crust is created as magma rises.", "id": "fc10"}, {"front": "Describe the structural arrangement and geological outcomes of a convergent boundary where oceanic crust meets continental crust.", "back": "The denser oceanic plate subducts beneath the continental plate, leading to the formation of an oceanic trench, a volcanic arc, and eventually a mountain range (e.g., the Andes).", "id": "fc11"}, {"front": "How do transform plate boundaries differ from divergent and convergent boundaries in terms of crustal changes and geological events?", "back": "At transform boundaries, plates slide horizontally past each other, producing faults and earthquakes but no new crust, crust destruction, or volcanoes.", "id": "fc12"}, {"front": "What structural feature primarily organizes elements on the periodic table?", "back": "The number of protons in the nucleus, also known as the atomic number.", "id": "fc13"}, {"front": "What specific structural feature of an atom determines its chemical behavior, such as reactivity and bonding preferences?", "back": "Its electron configuration, specifically the number of valence electrons.", "id": "fc14"}, {"front": "How does sodium's electron configuration (structure) determine its chemical reactivity (function)?", "back": "Sodium has one valence electron, which it readily loses to become a +1 ion, making it one of the most reactive metals.", "id": "fc15"}, {"front": "Explain how the structural complementarity of sodium and chlorine electron configurations drives the formation of NaCl.", "back": "Sodium readily loses its single valence electron, while chlorine readily gains one to complete its outer shell. This structural complementarity drives their reaction to form ionic NaCl.", "id": "fc16"}, {"front": "How are periodic trends like atomic radius, ionization energy, and electronegativity consequences of atomic structure?", "back": "These trends are determined by structural features such as the atom's size and how strongly its nucleus holds onto its electrons.", "id": "fc17"}, {"front": "How do atoms in the upper right of the periodic table exemplify 'structure determines function' regarding chemical properties?", "back": "They are small and hold their electrons tightly (structure), resulting in high ionization energies and high electronegativities (function).", "id": "fc18"}, {"front": "In physics, what constitutes the 'structure' of a situation that determines its 'function' (motion)?", "back": "The 'structure' refers to the specific arrangement and magnitudes of forces acting on an object, which determines its 'function' (the resulting motion).", "id": "fc19"}, {"front": "How does a free-body diagram illustrate the principle of 'structure determines function'?", "back": "A free-body diagram is a literal picture of the 'force structure' (directions and magnitudes of forces), which directly determines how the object will move (its function).", "id": "fc20"}, {"front": "How does Newton's second law ($F_{net} = ma$) formalize the 'structure determines function' principle?", "back": "Newton's second law states that the 'structure' of the force environment (net force and mass) directly determines the 'function' (acceleration) of an object.", "id": "fc21"}, {"front": "Give an example of how engineers apply the structure-function principle in designing real-world objects.", "back": "A bridge engineer analyzes the structure of forces on a beam to ensure it functions without collapsing. A car designer arranges crumple zones so that forces in a collision function to protect passengers.", "id": "fc22"}, {"front": "Summarize the application of the 'structure determines function' principle in Life Science.", "back": "The shape and composition of a cell (structure) determine what the cell can do (function).", "id": "fc23"}, {"front": "Summarize the application of the 'structure determines function' principle in Earth Science.", "back": "The type of plate boundary (structure) determines the landforms and geological events that occur there (function).", "id": "fc24"}, {"front": "Summarize the application of the 'structure determines function' principle in Chemistry.", "back": "The electron configuration of an atom (structure) determines how it bonds and reacts (function).", "id": "fc25"}, {"front": "Summarize the application of the 'structure determines function' principle in Physics.", "back": "The arrangement and magnitudes of forces on an object (structure) determine how it moves (function).", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
