<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 22, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a star?", "back": "A star is a massive, luminous sphere of plasma (hot, ionized gas) held together by gravity, producing energy through nuclear fusion in its core."}, {"front": "Describe the first stage in the life cycle of a star.", "back": "A star is born inside a nebula, a cloud of gas (mostly hydrogen) and dust. Gravity causes a region of the cloud to collapse and heat up, forming a dense, hot core called a protostar."}, {"front": "What is the main sequence phase of a star's life, and what energy process powers it?", "back": "The main sequence phase is when a star spends most of its life fusing hydrogen nuclei into helium nuclei in its core, releasing enormous amounts of energy through nuclear fusion (E=mc²)."}, {"front": "What event signals a star's transition from the main sequence to a red giant or supergiant phase?", "back": "A star transitions to a red giant or supergiant when it exhausts its core hydrogen. The core contracts and heats, while the outer layers expand and cool, turning the star red."}, {"front": "How do the final stages of a low-to-medium mass star (like our Sun) differ from a high-mass star?", "back": "Low-to-medium mass stars shed their outer layers as a planetary nebula, leaving a white dwarf. High-mass stars undergo a supernova explosion, leaving behind a neutron star or a black hole."}, {"front": "What is a white dwarf?", "back": "A white dwarf is a dense, Earth-sized remnant of a low-to-medium mass star, formed after its outer layers drift away as a planetary nebula. It slowly cools and fades over billions of years."}, {"front": "What is a supernova, and what elements are created during this event?", "back": "A supernova is a spectacular explosion triggered by the violent collapse of a high-mass star's core. It creates elements heavier than iron."}, {"front": "In what sense are stars considered the 'universe's element factories'?", "back": "Stars fuse hydrogen into helium during their main sequence lives, and more massive stars fuse helium into heavier elements up to iron in their later stages. Elements heavier than iron are created during supernovae."}, {"front": "What is the Hertzsprung-Russell (H-R) diagram, and what two stellar properties does it plot?", "back": "The H-R diagram is a graph that plots a star's luminosity (brightness, vertical axis) against its surface temperature (horizontal axis, hotter stars on the left)."}, {"front": "Where are main sequence stars located on the H-R diagram, and what percentage of stars fall into this category?", "back": "Main sequence stars run diagonally from hot, luminous blue stars (upper left) to cool, dim red stars (lower right). About 90% of all stars lie on the main sequence."}, {"front": "Where would you find red giants/supergiants and white dwarfs on the H-R diagram?", "back": "Red giants and supergiants occupy the upper right (cool but very luminous due to enormous size). White dwarfs occupy the lower left (hot but dim due to tiny size)."}, {"front": "What is a light-year, and approximately how many kilometers does it represent?", "back": "A light-year is the distance that light travels in one year, approximately 9.46 x 10^12 kilometers (about 9.46 trillion kilometers)."}, {"front": "Explain why looking at distant objects in space is like 'looking back in time.'", "back": "Because light travels at a finite speed, the light we observe from distant celestial objects took a significant amount of time to reach Earth. Therefore, we see these objects as they were when the light originally left them, rather than as they are in the present moment."}, {"front": "Using scientific notation, if the Sun is 1.50 x 10^8 km from Earth, and light travels at 3.00 x 10^5 km/s, how long does sunlight take to reach Earth?", "back": "Time = Distance / Speed = (1.50 x 10^8 km) / (3.00 x 10^5 km/s) = 0.50 x 10^3 s = 500 s, which is about 8.3 minutes."}, {"front": "What is a galaxy, and what is our home galaxy called?", "back": "A galaxy is a massive collection of stars, gas, dust, and dark matter bound together by gravity. Our home galaxy is the Milky Way."}, {"front": "Name and briefly describe the three main classifications of galaxies by shape.", "back": "1. Spiral galaxies: Have a central bulge and sweeping spiral arms where new stars form (e.g., Milky Way).\n2. Elliptical galaxies: Range from nearly spherical to elongated ovals and contain mostly older stars.\n3. Irregular galaxies: Have no definite shape and are often rich in gas and young stars."}, {"front": "What is the Big Bang theory?", "back": "The Big Bang is the scientific theory that the universe began as an extremely hot, dense point approximately 13.8 billion years ago and has been expanding and cooling ever since."}, {"front": "What key observation, known as Hubble's Law, supports the idea of an expanding universe?", "back": "Edwin Hubble discovered that distant galaxies are moving away from us in every direction, and the farther away a galaxy is, the faster it is receding. This observation implies the universe is expanding."}, {"front": "What is an exoplanet, and what is a 'habitable zone' in this context?", "back": "An exoplanet is a planet orbiting a star other than the Sun. A habitable zone is the range of distances from a star where liquid water could exist on a planet's surface, a key condition for life."}, {"front": "What groundbreaking discovery did astronomer Vera Rubin make about galaxies?", "back": "Vera Rubin discovered that stars at the edges of spiral galaxies orbit just as fast as stars near the center. This observation provided strong evidence for the existence of dark matter."}, {"front": "What is dark matter, and what role does it play in the universe?", "back": "Dark matter is a mysterious, invisible substance that exerts gravitational pull but does not emit or absorb light. It is estimated to make up roughly 85% of the matter in the universe and influences the rotation of galaxies."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
