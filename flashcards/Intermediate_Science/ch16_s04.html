<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 16, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does 'Beyond Mendel' refer to in genetics?", "back": "It refers to inheritance patterns that do not follow simple dominant/recessive rules, revealing the greater complexity of genetics.", "id": "fc01"}, {"front": "Define incomplete dominance.", "back": "In incomplete dominance, neither allele is fully dominant over the other, resulting in a heterozygous organism showing a blended phenotype intermediate between the two homozygous phenotypes.", "id": "fc02"}, {"front": "Give a classic example of incomplete dominance.", "back": "Flower color in snapdragons, where a cross between red (RR) and white (R'R') produces pink (RR') F1 offspring.", "id": "fc03"}, {"front": "What F2 generation phenotypic ratio is observed in an incomplete dominance cross between two heterozygotes?", "back": "A 1:2:1 ratio: 1 homozygous dominant : 2 heterozygous (blended) : 1 homozygous recessive (e.g., 1 red : 2 pink : 1 white).", "id": "fc04"}, {"front": "Define codominance.", "back": "In codominance, both alleles are fully expressed at the same time in the heterozygous organism; neither is dominant, and they do not blend.", "id": "fc05"}, {"front": "Provide a common example of codominance in humans.", "back": "The ABO blood group system, where alleles I^A and I^B are codominant, resulting in AB blood type when both are present.", "id": "fc06"}, {"front": "What are 'multiple alleles'?", "back": "Multiple alleles refer to a gene having more than two allele forms existing in the population, though each individual still carries only two alleles for that gene.", "id": "fc07"}, {"front": "How do codominance and multiple alleles relate to the ABO blood group system?", "back": "The ABO system demonstrates both: alleles I^A and I^B are codominant, and there are three alleles (I^A, I^B, and i) in the population, illustrating multiple alleles.", "id": "fc08"}, {"front": "What are sex-linked traits?", "back": "Sex-linked traits are those determined by genes located on the sex chromosomes, specifically the X chromosome in humans (also called X-linked genes).", "id": "fc09"}, {"front": "How do autosomes differ from sex chromosomes?", "back": "Autosomes are non-sex chromosomes (22 pairs in humans), while sex chromosomes (1 pair, XX or XY) determine biological sex.", "id": "fc10"}, {"front": "Why are males more commonly affected by X-linked recessive disorders?", "back": "Because males have only one X chromosome (XY), a single recessive allele on that X chromosome will be expressed, as there is no second X to carry a dominant allele that could mask it.", "id": "fc11"}, {"front": "Name two common human sex-linked recessive disorders.", "back": "Red-green color blindness and hemophilia.", "id": "fc12"}, {"front": "Explain the role of a 'carrier' in sex-linked inheritance.", "back": "A female can be a carrier; she has one copy of the recessive allele on one X chromosome but shows the normal phenotype due to a dominant allele on her other X. She can pass the recessive allele to her sons.", "id": "fc13"}, {"front": "Define polygenic inheritance.", "back": "Polygenic inheritance is when a trait is controlled by many genes working together, each contributing a small amount to the final phenotype.", "id": "fc14"}, {"front": "What is a characteristic result of polygenic inheritance?", "back": "A continuous range of phenotypes rather than distinct categories, such as human height or skin color.", "id": "fc15"}, {"front": "Name three human traits that are examples of polygenic inheritance.", "back": "Human skin color, height, and eye color.", "id": "fc16"}, {"front": "Besides multiple genes, what other factors can influence polygenic traits like height?", "back": "Environmental factors such as nutrition and overall health also play a significant role.", "id": "fc17"}, {"front": "What is a pedigree in genetics?", "back": "A pedigree is a diagram that traces a trait through several generations of a family, using standard symbols to represent individuals and their relationships.", "id": "fc18"}, {"front": "In a pedigree, what do circles, squares, and shaded symbols represent?", "back": "Circles represent females, squares represent males, and filled (shaded) symbols indicate individuals who express the trait.", "id": "fc19"}, {"front": "How can geneticists determine if a trait is recessive using a pedigree?", "back": "If two unaffected parents have an affected child, the trait must be recessive, meaning both parents are carriers of the hidden recessive allele.", "id": "fc20"}, {"front": "What is a genetic disorder?", "back": "A genetic disorder is a condition inherited through DNA, caused by mutations in specific genes.", "id": "fc21"}, {"front": "Describe the cause and effect of Sickle Cell Disease.", "back": "It is an autosomal recessive disorder caused by a substitution mutation in the hemoglobin gene, leading to rigid, sickle-shaped red blood cells that impair oxygen delivery.", "id": "fc22"}, {"front": "What is an interesting advantage for carriers of the sickle cell allele?", "back": "Heterozygous carriers of the sickle cell allele have some resistance to malaria, which explains its prevalence in certain populations.", "id": "fc23"}, {"front": "Describe the cause and effect of Cystic Fibrosis.", "back": "It is an autosomal recessive disorder caused by a deletion mutation in the CFTR gene, leading to the buildup of thick, sticky mucus in the lungs and digestive system.", "id": "fc24"}, {"front": "What was Rosalind Franklin's key contribution to genetics?", "back": "She was a British chemist who produced remarkably clear X-ray diffraction images of DNA fibers, including 'Photo 51,' which was essential in showing DNA's helical structure.", "id": "fc25"}, {"front": "In the coin-flip simulation, why are class results often closer to predicted ratios than individual group results?", "back": "Larger sample sizes (pooled class data) minimize the effects of random chance (sampling error) and thus yield results that more closely approximate the theoretical probabilities predicted by Punnett squares.", "id": "fc26"}, {"front": "How does the coin-flip simulation model allele segregation during meiosis?", "back": "Each coin flip represents the random selection of one allele from a parent to be passed on to offspring, mirroring how homologous chromosomes (and thus alleles) segregate into gametes during meiosis.", "id": "fc27"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
