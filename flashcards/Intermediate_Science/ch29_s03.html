<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 29, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is electromagnetic induction?", "back": "The production of a voltage (and, if the circuit is closed, a current) in a conductor exposed to a changing magnetic field.", "id": "fc01"}, {"front": "Who independently discovered electromagnetic induction and when?", "back": "English physicist Michael Faraday and American physicist Joseph Henry, in 1831.", "id": "fc02"}, {"front": "What is the crucial condition for electromagnetic induction to occur?", "back": "The magnetic field through the conductor must be changing. A steady magnetic field produces no voltage.", "id": "fc03"}, {"front": "According to Faraday's observations, what specific actions can induce a current in a coil of wire?", "back": "Moving a magnet into or out of a coil; moving a coil toward or away from a stationary magnet; or changing the current in a nearby coil.", "id": "fc04"}, {"front": "State Faraday's law of induction.", "back": "The induced voltage in a coil is proportional to the rate at which the magnetic field through the coil changes. More turns of wire and faster changes produce greater voltage.", "id": "fc05"}, {"front": "What three factors determine the magnitude of the induced voltage according to Faraday's law?", "back": "1. Strength of the magnetic field. 2. Number of turns in the coil. 3. Speed of change of the magnetic field.", "id": "fc06"}, {"front": "State Lenz's Law.", "back": "The direction of an induced current is always such that it opposes the change in magnetic field that produced it.", "id": "fc07"}, {"front": "How does Lenz's Law relate to the conservation of energy?", "back": "Lenz's Law ensures that work must be done to induce a current. If the induced current aided the change, energy would be generated from nothing, violating the conservation of energy.", "id": "fc08"}, {"front": "According to Lenz's Law, what happens when you push a north pole into a coil?", "back": "The induced current flows in a direction that makes the coil's near end act as a north pole, opposing the incoming magnet by repelling it.", "id": "fc09"}, {"front": "What is a generator, and what energy conversion does it perform?", "back": "A generator is a device that converts mechanical energy into electrical energy by rotating a coil of wire inside a magnetic field.", "id": "fc10"}, {"front": "How does a generator produce electricity based on Faraday's law?", "back": "As a coil of wire rotates within a magnetic field, the magnetic field through it continuously changes (increasing, decreasing, reversing), inducing an alternating voltage and thus alternating current (AC).", "id": "fc11"}, {"front": "What type of current do typical power plant generators produce?", "back": "Alternating current (AC).", "id": "fc12"}, {"front": "What is a transformer, and what is its primary function?", "back": "A transformer is a device that uses electromagnetic induction to change the voltage of an alternating current.", "id": "fc13"}, {"front": "Describe the basic components of a transformer.", "back": "A transformer consists of two coils of wire—a primary coil and a secondary coil—wound around a shared iron core.", "id": "fc14"}, {"front": "Why must transformers operate with alternating current (AC) and not direct current (DC)?", "back": "Transformers require a *changing* magnetic field to induce voltage. AC produces a continuously changing magnetic field in the core, while DC produces a steady magnetic field, which induces no voltage.", "id": "fc15"}, {"front": "What is the transformer equation, relating voltages and turns?", "back": "V_p/V_s = N_p/N_s, where V_p is primary voltage, V_s is secondary voltage, N_p is primary turns, and N_s is secondary turns.", "id": "fc16"}, {"front": "Distinguish between a step-up transformer and a step-down transformer.", "back": "A step-up transformer has more turns in the secondary coil (N_s > N_p), increasing voltage (V_s > V_p). A step-down transformer has fewer turns in the secondary coil (N_s < N_p), decreasing voltage (V_s < V_p).", "id": "fc17"}, {"front": "In an ideal transformer, if voltage is stepped up, what happens to the current? Why?", "back": "The current is stepped down proportionally. This is because power (P = IV) is conserved: V_p I_p = V_s I_s.", "id": "fc18"}, {"front": "Why do power companies use step-up transformers at power plants for long-distance transmission?", "back": "To increase voltage and proportionally decrease current, because power loss due to resistance (P_lost = I^2R) depends on the square of the current, minimizing losses.", "id": "fc19"}, {"front": "What happens to the electrical power near homes and businesses after high-voltage transmission?", "back": "Step-down transformers are used to reduce the voltage to safe, usable levels (e.g., 120 V or 240 V in the United States).", "id": "fc20"}, {"front": "What is the formula for power lost as heat in a transmission line with current I and resistance R?", "back": "P_lost = I^2 R.", "id": "fc21"}, {"front": "How does power loss in transmission lines relate to the current flowing through them?", "back": "Power loss is proportional to the square of the current (I^2). Doubling the current quadruples the power loss.", "id": "fc22"}, {"front": "Give an example of a common device that uses a step-down transformer.", "back": "A phone charger, which reduces the high wall outlet voltage to a lower, safe voltage suitable for charging.", "id": "fc23"}, {"front": "What fundamental principle does the operation of every electrical generator, transformer, and wireless charger rely on?", "back": "Electromagnetic induction.", "id": "fc24"}, {"front": "Why is direct current (DC) generally not used for long-distance power transmission?", "back": "DC cannot be easily stepped up or down in voltage using transformers, which are essential for minimizing I^2R power losses over long distances by reducing current.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
