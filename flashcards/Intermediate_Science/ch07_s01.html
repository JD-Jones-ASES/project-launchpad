<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What striking observation about Earth's continents was made by mapmakers as early as the 1600s?", "back": "The eastern edge of South America and the western edge of Africa fit together like pieces of a jigsaw puzzle."}, {"front": "Who proposed the hypothesis of continental drift, and in what year?", "back": "Alfred Wegener, a German scientist, proposed the hypothesis in 1912."}, {"front": "Define continental drift.", "back": "Continental drift is the hypothesis that Earth's continents are not fixed in place but have moved slowly across the planet's surface over hundreds of millions of years."}, {"front": "What supercontinent did Wegener propose existed, and what does its name mean?", "back": "Wegener proposed the supercontinent Pangaea, which means 'all lands' in Greek."}, {"front": "According to Wegener's hypothesis, approximately when did Pangaea begin to break apart?", "back": "Pangaea began to break apart roughly 200 million years ago."}, {"front": "List the four main categories of evidence Alfred Wegener used to support his continental drift hypothesis.", "back": "The four main categories were: 1. Continental Fit, 2. Fossil Distribution, 3. Rock and Mountain Matches, and 4. Glacial Evidence."}, {"front": "How does the 'Continental Fit' evidence support continental drift?", "back": "The coastlines of continents (especially South America and Africa) show a remarkable fit, suggesting they were once joined. Modern analyses using continental shelves show an even better fit."}, {"front": "Explain the 'Fossil Distribution' evidence for continental drift.", "back": "Identical fossils of ancient plants and animals have been found on continents now separated by vast oceans, indicating these landmasses were once connected."}, {"front": "Name a specific freshwater reptile fossil found on multiple continents that supported continental drift.", "back": "Fossils of Mesosaurus, a small freshwater reptile, have been found in both southern Africa and eastern South America."}, {"front": "Name a specific land-dwelling plant fossil found on multiple continents that supported continental drift.", "back": "Fossils of the fern Glossopteris have been found in South America, Africa, India, Antarctica, and Australia."}, {"front": "Describe the 'Rock and Mountain Matches' evidence for continental drift.", "back": "When continents are reassembled into Pangaea, mountain ranges and rock formations on opposite sides of oceans align with remarkable precision, sharing similar rock types, ages, and structural features."}, {"front": "Which modern mountain ranges are examples of 'Rock and Mountain Matches' that support continental drift?", "back": "The Appalachian Mountains of eastern North America align with the Caledonian Mountains of Scotland and Scandinavia."}, {"front": "How does 'Glacial Evidence' support the idea of continental drift?", "back": "Evidence of ancient glaciation (scratches, till, polished bedrock) is found in regions now tropical or subtropical. This makes sense if these continents were once assembled near the South Pole as part of Pangaea."}, {"front": "Why did the scientific community largely reject Wegener's continental drift hypothesis despite his compelling evidence?", "back": "Scientists rejected the hypothesis primarily because Wegener could not provide a plausible mechanism to explain how continents moved through the solid rock of the ocean floor."}, {"front": "What mechanisms did Wegener suggest for continental movement, and why were they considered inadequate?", "back": "Wegener suggested continents plowed through oceanic crust, driven by tidal forces and Earth's centrifugal effect. Physicists quickly showed these forces were far too weak to move continents."}, {"front": "What important principle in the nature of science does the initial rejection of Wegener's hypothesis illustrate?", "back": "It illustrates that a hypothesis can have strong observational evidence but still be rejected if it lacks a credible, testable, and physically plausible mechanism."}, {"front": "What was Alfred Wegener's primary profession(s)?", "back": "Alfred Wegener was a German meteorologist, geophysicist, and polar explorer."}, {"front": "In what book did Wegener publish his ideas on continental drift?", "back": "He published his ideas in the 1915 book, 'The Origin of Continents and Oceans'."}, {"front": "When was Wegener's core idea that continents move ultimately vindicated, and what scientific discovery provided the missing mechanism?", "back": "Wegener's idea was vindicated in the 1960s with the discovery of seafloor spreading, which provided the mechanism for plate tectonics."}, {"front": "Was the scientific community 'right' to reject Wegener's hypothesis at the time, given the lack of a mechanism?", "back": "From a scientific methodology perspective, demanding a plausible mechanism is reasonable to prevent unfounded speculation. However, the strong evidence suggests that initial dismissiveness by some scientists may have been influenced by biases, highlighting that scientific progress isn't always linear or immediate."}, {"front": "What does Alfred Wegener's story remind us about the nature of scientific progress?", "back": "It reminds us that scientific progress often requires persistence in the face of rejection, and that the scientific community's initial response to a new idea is not always the final word. Science is self-correcting."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
