<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 0, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an independent variable?", "back": "The factor that the experimenter deliberately changes or manipulates. It is sometimes called the 'manipulated variable.'"}, {"front": "What is a dependent variable?", "back": "The factor that the experimenter observes or measures to see if it was affected by changes to the independent variable. It is sometimes called the 'responding variable.'"}, {"front": "What is a controlled variable?", "back": "Any factor that is kept the same throughout the experiment so that it does not influence the results. Controlled variables are sometimes called 'constants.'"}, {"front": "In an experiment testing whether water temperature affects how fast sugar dissolves, what is the independent variable?", "back": "The temperature of the water (because it is deliberately changed)."}, {"front": "In an experiment testing whether water temperature affects how fast sugar dissolves, what is the dependent variable?", "back": "The time it takes for the sugar to dissolve (because it is measured in response to temperature changes)."}, {"front": "List three examples of controlled variables for an experiment on sugar dissolving speed based on water temperature.", "back": "Amount of water, amount of sugar, type of sugar, stirring speed (or no stirring), type of container. (Any three from this list are valid)."}, {"front": "Why are controlled variables so important in an experiment?", "back": "They eliminate alternative explanations, ensuring that any observed changes are due solely to the independent variable, allowing for clear conclusions."}, {"front": "What is a control group in an experiment?", "back": "The group that does not receive the treatment or change being tested. It serves as a baseline for comparison, showing what happens under normal conditions."}, {"front": "What is an experimental group in an experiment?", "back": "The group that receives the treatment or change being tested. Its results are compared to the control group to determine the effect of the independent variable."}, {"front": "Why is it essential to include a control group in many experiments?", "back": "Without a control group, there's no way to know what would have happened under normal conditions, making it impossible to determine if the independent variable actually caused any observed effects."}, {"front": "What is sample size in an experiment?", "back": "The number of individual trials, subjects, or observations included in an experiment."}, {"front": "Explain why larger sample sizes lead to more reliable experimental results.", "back": "Larger sample sizes reduce the influence of random variation and individual differences among subjects, making the overall results and averages more reliable and representative of the true behavior."}, {"front": "What is bias in the context of experimental design?", "back": "Any factor in the design, execution, or interpretation of an experiment that systematically favors one outcome over another, compromising the reliability of results."}, {"front": "Define selection bias and provide an example.", "back": "Selection bias occurs when the groups in an experiment are not comparable from the start. Example: Assigning only the healthiest plants to the fertilizer group and the weakest to the control group."}, {"front": "Define observer bias and provide an example.", "back": "Observer bias occurs when the person collecting data unconsciously favors one outcome. Example: A researcher expecting a new drug to work might measure the experimental group's recovery more favorably."}, {"front": "What is confirmation bias?", "back": "Confirmation bias occurs when you pay more attention to data that supports your hypothesis and ignore or downplay data that contradicts it."}, {"front": "How can scientists reduce selection bias in an experiment?", "back": "By using random assignment of subjects to groups."}, {"front": "How can observer bias be reduced in an experiment, especially in medical trials?", "back": "Through blinding, where the person measuring the outcome does not know which group each subject belongs to."}, {"front": "What strategy helps guard against confirmation bias?", "back": "Keeping detailed records of all data, including unexpected results, to ensure objectivity."}, {"front": "What is quantitative data? Give two examples.", "back": "Data that can be expressed as numbers and measured. Examples: temperature in degrees, mass in grams, length in centimeters, time in seconds."}, {"front": "What is qualitative data? Give two examples.", "back": "Data that describe characteristics or qualities and cannot be easily reduced to numbers. Examples: color, texture, smell, taste, sound."}, {"front": "What is the primary advantage of quantitative data over qualitative data for drawing conclusions in an experiment?", "back": "Quantitative data allows for precise comparisons and mathematical analysis (like averages, graphs, and statistical tests), making conclusions more objective, comparable, and useful for building predictive models."}, {"front": "What does RCT stand for in medical research, and what type of experiment is it?", "back": "RCT stands for Randomized Controlled Trial, which is a type of experiment used to test new drugs or treatments."}, {"front": "In a medical trial, what is a placebo?", "back": "A harmless, inactive substance given to the control group to simulate the treatment, helping to account for the 'placebo effect' (patients feeling better simply because they believe they are receiving treatment)."}, {"front": "What is a 'double-blind' design in an experiment, and what two types of bias does it help minimize?", "back": "A double-blind design means neither the subjects (patients) nor the researchers measuring the outcomes know which group each subject belongs to. It minimizes observer bias and the placebo effect."}, {"front": "Identify three core principles of experimental design that are critical to the success of clinical trials.", "back": "Control groups, random assignment, blinding (double-blind design), and large sample sizes. (Any three are acceptable)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
