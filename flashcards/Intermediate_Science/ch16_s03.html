<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Gregor Mendel and what was his primary contribution to science?", "back": "Gregor Mendel was a monk who, in the 1850s and 1860s, figured out the basic rules of inheritance by crossing pea plants, laying the foundation for the science of genetics."}, {"front": "List three advantages of using garden peas (Pisum sativum) for genetic experiments.", "back": "Pea plants grow quickly, produce many offspring, and have traits that come in clearly distinct forms (e.g., purple/white flowers, tall/short stems, round/wrinkled seeds)."}, {"front": "Describe Mendel's general experimental method for studying inheritance.", "back": "He started with true-breeding plants, then crossed two true-breeding plants with different traits, and carefully counted the offspring in the first (F1) and second (F2) generations."}, {"front": "What is a 'true-breeding' plant?", "back": "A plant that always produces offspring identical to itself when self-pollinated."}, {"front": "What was Mendel's key observation in the first generation ($F_1$) when crossing two true-breeding plants with different traits (e.g., purple flowers x white flowers)?", "back": "All offspring ($F_1$) showed one parent's trait (e.g., all purple flowers), while the other trait (white) seemed to disappear."}, {"front": "What was Mendel's key observation in the second generation ($F_2$) when $F_1$ plants were crossed with each other?", "back": "The 'missing' trait reappeared in the $F_2$ generation in a ratio of approximately 3:1 (e.g., three purple to one white)."}, {"front": "Define 'dominant allele' and explain its representation.", "back": "An allele that expresses its trait whenever it is present, even if only one copy is inherited. It is represented by uppercase letters (e.g., P for purple flowers)."}, {"front": "Define 'recessive allele' and explain its representation.", "back": "An allele that expresses its trait only when two copies are present (one from each parent) and no dominant allele is present. It is represented by lowercase letters (e.g., p for white flowers)."}, {"front": "According to Mendel's proposal, how many copies of each gene does an organism carry, and where do they come from?", "back": "Each organism carries two copies of each gene, one inherited from each parent."}, {"front": "Define 'genotype' and provide three examples for a single trait.", "back": "The genetic makeup of an organism – the specific alleles it carries for a given trait. Examples: PP, Pp, or pp."}, {"front": "Define 'phenotype' and provide two examples for a specific trait.", "back": "The observable physical characteristic of an organism that results from its genotype and environment. Examples: 'purple flowers' or 'white flowers'."}, {"front": "Explain what it means for an organism to be 'homozygous' for a trait, providing both dominant and recessive examples.", "back": "Having two identical alleles for a given gene. An organism can be homozygous dominant (PP) or homozygous recessive (pp)."}, {"front": "Explain what it means for an organism to be 'heterozygous' for a trait, providing an example.", "back": "Having two different alleles for a given gene (e.g., Pp). A heterozygous organism shows the dominant phenotype but carries one copy of the recessive allele."}, {"front": "Why do the genotypes PP and Pp both result in the phenotype of purple flowers?", "back": "Both PP and Pp produce purple flowers because the dominant allele (P) expresses its trait and masks the presence of the recessive allele (p)."}, {"front": "What is a Punnett square and what is its main purpose?", "back": "A diagram used to predict the possible genotypes and phenotypes of offspring from a genetic cross. It shows the probability of each potential outcome."}, {"front": "Describe the basic setup of a Punnett square for a monohybrid cross.", "back": "One parent's alleles are written across the top, the other parent's alleles are written along the side, and the boxes are filled in by combining alleles from each parent."}, {"front": "If two pea plants that are both heterozygous for flower color (Pp) are crossed, what is the expected genotype ratio of their offspring?", "back": "1 PP : 2 Pp : 1 pp."}, {"front": "If two pea plants that are both heterozygous for flower color (Pp) are crossed, what is the expected phenotype ratio of their offspring?", "back": "3 purple : 1 white."}, {"front": "What is the probability of an offspring having white flowers from a cross between two heterozygous (Pp) pea plants?", "back": "1/4 or 25%."}, {"front": "What does each individual box within a Punnett square represent?", "back": "Each box represents one equally likely outcome or possible genotype for an offspring."}, {"front": "How is probability applied in genetics, especially concerning offspring from the same parents?", "back": "Genetics is fundamentally about probability; the likelihood of a particular genetic event. Each time two parents produce an offspring, the probability of each genotype is independent of previous offspring."}, {"front": "How do you calculate the probability of a single genetic outcome from a Punnett square?", "back": "The probability of a single outcome = (number of favorable boxes) / (total boxes in the Punnett square)."}, {"front": "How do you calculate the probability of two independent genetic events both occurring (e.g., two children having a specific trait)?", "back": "Multiply their individual probabilities: P(A and B) = P(A) * P(B)."}, {"front": "If two heterozygous parents (Pp x Pp) have two children, what is the probability that both children will have white flowers?", "back": "The probability of one child having white flowers is 1/4. So, P(both white) = (1/4) * (1/4) = 1/16 or 6.25%."}, {"front": "A plant breeder crosses a purple-flowered pea plant with a white-flowered pea plant. All offspring are purple. What are the genotypes of the parent plants?", "back": "The white-flowered parent must be homozygous recessive (pp). Since all offspring are purple, they must have received a dominant P allele from the purple parent, meaning the purple parent must be homozygous dominant (PP)."}, {"front": "In the scenario above (purple x white parents, all purple offspring), why couldn't the purple-flowered parent be heterozygous (Pp)?", "back": "If the purple parent were Pp, a cross with the white parent (pp) would produce approximately half Pp (purple) and half pp (white) offspring, which contradicts the observation that all offspring were purple."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
