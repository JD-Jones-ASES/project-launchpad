<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three fundamental subatomic particles that make up every atom?", "back": "Protons, neutrons, and electrons.", "id": "fc01"}, {"front": "Where are protons located within an atom?", "back": "In the nucleus.", "id": "fc02"}, {"front": "What is the electric charge of a proton?", "back": "Positive (+1).", "id": "fc03"}, {"front": "What is the approximate relative mass of a proton?", "back": "Approximately 1 atomic mass unit (amu).", "id": "fc04"}, {"front": "What defines the identity of an element?", "back": "The number of protons in its nucleus.", "id": "fc05"}, {"front": "Where are neutrons located within an atom?", "back": "In the nucleus.", "id": "fc06"}, {"front": "What is the electric charge of a neutron?", "back": "No electric charge (they are electrically neutral).", "id": "fc07"}, {"front": "What is the approximate relative mass of a neutron?", "back": "Approximately 1 amu, nearly the same as a proton.", "id": "fc08"}, {"front": "Where are electrons located within an atom?", "back": "In energy levels (shells) outside the nucleus.", "id": "fc09"}, {"front": "What is the electric charge of an electron?", "back": "Negative (-1).", "id": "fc10"}, {"front": "What is the approximate relative mass of an electron?", "back": "Extremely small, about 1/1,836 amu.", "id": "fc11"}, {"front": "Which subatomic particles are collectively called nucleons?", "back": "Protons and neutrons.", "id": "fc12"}, {"front": "Why is virtually all of an atom's mass concentrated in its nucleus?", "back": "Because protons and neutrons (found in the nucleus) have nearly 2,000 times more mass than electrons, which are located outside the nucleus.", "id": "fc13"}, {"front": "In a neutral atom, how does the number of protons compare to the number of electrons?", "back": "In a neutral atom, the number of protons equals the number of electrons, resulting in no overall charge.", "id": "fc14"}, {"front": "Define atomic number and state its symbol.", "back": "The atomic number (Z) is the number of protons in the nucleus of an atom. It uniquely identifies an element.", "id": "fc15"}, {"front": "How are elements arranged on the periodic table?", "back": "In order of increasing atomic number (Z).", "id": "fc16"}, {"front": "Define mass number and state its symbol and formula.", "back": "The mass number (A) is the total number of protons and neutrons in the nucleus of an atom. Formula: A = Z + N (where Z is protons and N is neutrons).", "id": "fc17"}, {"front": "An atom is written as $^35_{17}Cl$. How many neutrons does it contain?", "back": "The atomic number (Z) is 17 and the mass number (A) is 35. Number of neutrons (N) = A - Z = 35 - 17 = 18 neutrons.", "id": "fc18"}, {"front": "What is the standard notation ($^A_ZX$) for an atom with 13 protons and 14 neutrons?", "back": "Aluminum (Al) has 13 protons (Z=13). The mass number (A) = protons + neutrons = 13 + 14 = 27. So, $^27_{13}Al$.", "id": "fc19"}, {"front": "Define isotope.", "back": "Isotopes are atoms of the same element (same number of protons) that have different numbers of neutrons, resulting in different mass numbers.", "id": "fc20"}, {"front": "Do isotopes of the same element behave similarly or differently in chemical reactions, and why?", "back": "Isotopes behave almost identically in chemical reactions because chemical behavior primarily depends on the number of electrons, and isotopes of an element have the same number of electrons (in a neutral atom).", "id": "fc21"}, {"front": "Why are atomic masses listed on the periodic table usually not whole numbers?", "back": "Atomic masses on the periodic table are weighted averages of the masses of all naturally occurring isotopes of an element, taking into account their relative abundances.", "id": "fc22"}, {"front": "Define ion.", "back": "An ion is an atom that has gained or lost one or more electrons and therefore carries a net electric charge.", "id": "fc23"}, {"front": "What is a cation, and how does it form?", "back": "A cation is a positively charged ion formed when an atom loses one or more electrons, resulting in more protons than electrons.", "id": "fc24"}, {"front": "What is an anion, and how does it form?", "back": "An anion is a negatively charged ion formed when an atom gains one or more electrons, resulting in more electrons than protons.", "id": "fc25"}, {"front": "When an atom forms an ion, does its element identity change? Explain why.", "back": "No, its element identity does not change because the number of protons (which defines the element) remains the same. Only the number of electrons changes.", "id": "fc26"}, {"front": "How many protons, neutrons, and electrons are in a $^56_{26}Fe^{3+}$ ion?", "back": "Protons = 26 (from Z=26). Neutrons = A - Z = 56 - 26 = 30. Electrons = 26 (for a neutral atom) - 3 (due to 3+ charge) = 23 electrons.", "id": "fc27"}, {"front": "An atom is mostly 'empty space.' If atoms are mostly empty, why do solid objects feel solid?", "back": "Solid objects feel solid because the electron clouds of neighboring atoms repel each other through electromagnetic forces, creating the sensation of solidity rather than allowing objects to pass through each other.", "id": "fc28"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
