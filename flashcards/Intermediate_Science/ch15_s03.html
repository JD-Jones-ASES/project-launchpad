<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 15, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of photosynthesis?", "back": "To convert light energy into chemical energy (glucose) for the plant, essentially creating its own food."}, {"front": "Briefly describe the overall chemical reaction for photosynthesis.", "back": "6CO₂ + 6H₂O + Light Energy → C₆H₁₂O₆ + 6O₂ (Carbon dioxide + Water + Light energy yields Glucose + Oxygen)"}, {"front": "What is the main product of cellular respiration used by cells for energy?", "back": "ATP (Adenosine Triphosphate), which is the direct energy currency of the cell."}, {"front": "Compare the reactants and products of photosynthesis and cellular respiration.", "back": "The reactants of photosynthesis (CO₂ and H₂O) are the products of cellular respiration, and vice-versa (O₂ and C₆H₁₂O₆). They are complementary processes."}, {"front": "Where in the cell does cellular respiration primarily occur?", "back": "Mainly in the mitochondria, though glycolysis (the first stage) occurs in the cytoplasm."}, {"front": "What is the difference between aerobic and anaerobic respiration?", "back": "Aerobic respiration requires oxygen and produces a large amount of ATP. Anaerobic respiration occurs without oxygen and produces much less ATP."}, {"front": "Define \"atmosphere.\"", "back": "The layer of gases surrounding a planet or other celestial body, held in place by gravity."}, {"front": "What is the \"greenhouse effect\" and why is it important for Earth?", "back": "The natural process by which certain gases in Earth's atmosphere trap heat, warming the planet. It's crucial for maintaining temperatures suitable for life."}, {"front": "Name the two lowest layers of Earth's atmosphere and one key characteristic of each.", "back": "Troposphere (where most weather occurs, closest to Earth's surface) and Stratosphere (contains the ozone layer, temperature increases with altitude)."}, {"front": "How does convection contribute to weather patterns?", "back": "Convection involves the transfer of heat by the movement of fluids (like air). Warm, less dense air rises, and cool, dense air sinks, creating circulation patterns that drive winds and weather systems."}, {"front": "Explain the difference between weather and climate.", "back": "Weather refers to the short-term, day-to-day atmospheric conditions of a specific location, while climate describes the long-term average weather patterns of a region."}, {"front": "What is a chemical bond?", "back": "A lasting attraction between atoms, ions, or molecules that enables the formation of chemical compounds."}, {"front": "Differentiate between ionic and covalent bonds.", "back": "Ionic bonds form when electrons are transferred between atoms (typically a metal and a nonmetal). Covalent bonds form when electrons are shared between atoms (typically two nonmetals)."}, {"front": "What is a hydrogen bond and why is it important in biological systems?", "back": "A weak intermolecular force between a hydrogen atom covalently bonded to a highly electronegative atom and another electronegative atom. It's crucial for properties of water, protein structure, and DNA stability."}, {"front": "What is the \"octet rule\"?", "back": "The tendency of atoms to prefer to have eight electrons in their valence shell, achieving a stable electron configuration similar to noble gases."}, {"front": "How do valence electrons determine an atom's bonding behavior?", "back": "Valence electrons are the outermost electrons and are involved in chemical bonding. The number of valence electrons dictates how an atom will gain, lose, or share electrons to achieve stability."}, {"front": "Define \"work\" in a physics context and state its SI unit.", "back": "Work is done when a force causes a displacement of an object in the direction of the force. Its SI unit is the Joule (J)."}, {"front": "What is the formula for calculating work?", "back": "Work (W) = Force (F) × Displacement (d) × cos(θ), where θ is the angle between the force and displacement (often simplified to W = Fd if force and displacement are in the same direction)."}, {"front": "Distinguish between kinetic energy and potential energy.", "back": "Kinetic energy is the energy of motion (e.g., a moving car), while potential energy is stored energy due to an object's position or state (e.g., a ball held above the ground, a stretched spring)."}, {"front": "What is \"power\" and how is it related to work and energy?", "back": "Power is the rate at which work is done or energy is transferred. It is calculated as Work/Time or Energy/Time, and its SI unit is the Watt (W)."}, {"front": "Define \"efficiency\" in the context of energy transfer.", "back": "Efficiency is the ratio of useful energy output to the total energy input, often expressed as a percentage. It indicates how much input energy is converted into desired output energy without being lost as unusable forms (e.g., heat)."}, {"front": "What is the overarching theme suggested for connecting terms from different science branches in this review?", "back": "The theme is \"energy flow through systems,\" encouraging students to connect concepts like photosynthesis (energy capture) with work/energy (physics) or atmospheric energy transfer (Earth science)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
