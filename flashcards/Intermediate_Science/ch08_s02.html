<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What defines an 'element family' in the periodic table?", "back": "An element family is a group of elements in the same column of the periodic table, whose members share characteristic chemical behaviors due to having the same number of valence electrons."}, {"front": "Which elements are classified as alkali metals?", "back": "Alkali metals are any element in Group 1 of the periodic table (except hydrogen): lithium, sodium, potassium, rubidium, cesium, and francium."}, {"front": "What are the key properties of alkali metals?", "back": "They are soft, shiny, highly reactive metals (most reactive metals), with one valence electron, readily forming +1 ions. They react vigorously with water, have low densities, and low melting points that decrease down the group."}, {"front": "Why do alkali metals become more reactive as you move down Group 1?", "back": "As you move down Group 1, each successive element has more electron energy levels, placing the single valence electron farther from the nucleus. A more distant electron is easier to remove, so the atom reacts more readily."}, {"front": "What critical safety precaution must be taken when storing alkali metals?", "back": "Alkali metals must be stored under mineral oil or in sealed containers because they react dangerously with air and water."}, {"front": "Which elements are classified as alkaline earth metals?", "back": "Alkaline earth metals are elements in Group 2: beryllium, magnesium, calcium, strontium, barium, and radium."}, {"front": "How do alkaline earth metals compare to alkali metals in terms of properties?", "back": "Alkaline earth metals are harder, denser, and have higher melting points than alkali metals. They are still reactive but less so, typically forming +2 ions by losing two valence electrons."}, {"front": "Give an example of the importance of an alkaline earth metal in biological systems.", "back": "Calcium compounds are essential for life, with bones and teeth largely built from calcium phosphate."}, {"front": "What defines a transition metal?", "back": "Transition metals are elements found in Groups 3–12 of the periodic table. They are typically hard, strong, dense, good conductors of heat and electricity, and many form colorful compounds."}, {"front": "What is a distinctive characteristic of transition metals regarding ion formation?", "back": "Unlike main-group metals, transition metals can form ions with different charges (e.g., Fe^2+ and Fe^3+). This variability arises from their partially filled d orbitals."}, {"front": "Which elements are classified as halogens?", "back": "Halogens are any element in Group 17 of the periodic table: fluorine, chlorine, bromine, iodine, and astatine."}, {"front": "What makes halogens the most reactive nonmetals?", "back": "Each halogen atom has seven valence electrons and needs only one more to achieve a full outer shell, making them highly prone to gaining an electron."}, {"front": "Describe the physical states of halogens at room temperature.", "back": "Halogens exist in all three common states of matter: fluorine and chlorine are gases, bromine is a liquid, and iodine is a solid."}, {"front": "How does reactivity change for halogens as you move down Group 17, and why?", "back": "Reactivity decreases down the group. As atoms become larger, the nucleus has less pull on incoming electrons, so the tendency to gain an electron weakens."}, {"front": "What type of ions do halogens typically form, and what is an example of their reaction with alkali metals?", "back": "Halogens typically gain one electron to form -1 ions called halide ions. For example, sodium and chlorine combine to form stable sodium chloride (table salt)."}, {"front": "Which elements are classified as noble gases?", "back": "Noble gases are any element in Group 18 of the periodic table: helium, neon, argon, krypton, xenon, and radon."}, {"front": "Why are noble gases considered 'inert' or extremely unreactive?", "back": "Their outer electron shells are completely full (helium has 2 electrons, others have 8 valence electrons). This stable electron configuration means they have no tendency to gain, lose, or share electrons."}, {"front": "Name two practical applications of noble gases.", "back": "Helium is used in balloons and cooling superconducting magnets. Neon produces the bright red-orange glow in advertising signs. Argon fills incandescent light bulbs to prevent oxidation. Krypton and xenon are used in high-performance lighting."}, {"front": "What is a metalloid, and where are they found on the periodic table?", "back": "A metalloid is an element with properties intermediate between metals and nonmetals. They are found along the staircase-shaped boundary separating metals from nonmetals, with examples like boron, silicon, and germanium."}, {"front": "What is silicon's most important commercial property, and how is it used in technology?", "back": "Silicon is a semiconductor, meaning it conducts electricity only under certain conditions. This property, enhanced by doping, makes it the foundation of computer chips, smartphones, solar cells, and virtually all modern electronics."}, {"front": "Explain the opposing reactivity trends in alkali metals (Group 1) and halogens (Group 17) based on atomic size.", "back": "Alkali metals react by losing electrons; as atomic size increases down Group 1, outer electrons are farther from the nucleus and easier to remove, increasing reactivity. Halogens react by gaining electrons; as atomic size increases down Group 17, the nucleus has a weaker pull on incoming electrons, making them harder to gain, decreasing reactivity."}, {"front": "Which specific element is known as the most reactive element in the entire periodic table?", "back": "Fluorine."}, {"front": "Which element in Group 1 is NOT considered an alkali metal?", "back": "Hydrogen, because it is a nonmetal with unique properties."}, {"front": "Name one transition metal known for forming colorful compounds and give an example of a color.", "back": "Copper compounds are often blue or green. Iron compounds can be yellow, red, or black. Cobalt compounds are deep blue."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
