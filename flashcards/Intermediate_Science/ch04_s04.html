<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are kinematic equations?", "back": "A set of mathematical equations that relate position, velocity, acceleration, and time for an object undergoing uniform (constant) acceleration."}, {"front": "Why are kinematic equations necessary beyond simple constant-speed and constant-acceleration formulas?", "back": "They allow us to find how far an accelerating object travels or its final velocity after accelerating for a certain time, addressing scenarios beyond basic constant motion."}, {"front": "State the first key kinematic equation relating final velocity, initial velocity, acceleration, and time.", "back": "v_f = v_i + at (Final velocity equals initial velocity plus the change in velocity caused by acceleration over time)."}, {"front": "What does each term represent in the kinematic equation v_f = v_i + at?", "back": "v_f is final velocity, v_i is initial velocity, a is constant acceleration, and t is the time interval."}, {"front": "State the second key kinematic equation for displacement with constant acceleration.", "back": "d = v_i t + 1/2 at^2 (Displacement equals initial velocity times time plus one-half acceleration times time squared)."}, {"front": "What does each term represent in the kinematic equation d = v_i t + 1/2 at^2?", "back": "d is displacement, v_i t is the distance covered at initial velocity alone, and 1/2 at^2 is the extra distance gained (or lost) due to changing velocity."}, {"front": "How does the displacement equation d = v_i t + 1/2 at^2 simplify if an object starts from rest?", "back": "If an object starts from rest (v_i = 0), the equation simplifies to d = 1/2 at^2."}, {"front": "How does the displacement equation d = v_i t + 1/2 at^2 simplify for constant velocity motion?", "back": "For constant velocity (a = 0), the equation simplifies to the familiar d = v_i t (or d = vt)."}, {"front": "Define 'free fall.'", "back": "The motion of an object under the influence of gravity alone, with no air resistance or other forces acting."}, {"front": "What is the approximate value of the acceleration due to gravity (g) near Earth's surface?", "back": "Approximately 9.8 m/s^2, directed downward."}, {"front": "How does an object's mass affect its acceleration during free fall near Earth's surface (ignoring air resistance)?", "back": "All objects in free fall near Earth's surface experience the same acceleration (g), regardless of their mass."}, {"front": "If an object is in free fall, how much does its downward velocity increase every second?", "back": "Its downward velocity increases by 9.8 m/s every second."}, {"front": "How are the two key kinematic equations modified for free fall?", "back": "The acceleration 'a' is replaced by 'g' (acceleration due to gravity): v_f = v_i + gt and d = v_i t + 1/2 gt^2."}, {"front": "When using kinematic equations for free fall, what is an important consideration regarding the sign of 'g'?", "back": "The sign of 'g' depends on the chosen positive direction. If downward is positive, 'g' is positive. If upward is positive, 'g' is negative. Consistency is crucial."}, {"front": "What long-held belief about falling objects did Galileo Galilei challenge?", "back": "The ancient Greek philosopher Aristotle's belief that heavier objects fall faster than lighter ones."}, {"front": "How did Galileo's approach to studying physics differ from earlier philosophers?", "back": "Galileo insisted on testing ideas through careful, controlled experiments (e.g., inclined planes) rather than accepting authority or pure reasoning."}, {"front": "What were Galileo's revolutionary findings regarding falling objects?", "back": "He found that all objects accelerate at the same rate regardless of mass, and that the distance traveled increases with the square of the time (d = 1/2 at^2)."}, {"front": "What modern experiment famously demonstrated Galileo's principle in the absence of air resistance?", "back": "In 1971, Apollo 15 astronaut David Scott dropped a hammer and a feather simultaneously on the Moon, and they hit the surface at the same instant."}, {"front": "A stone is dropped from rest. What are its initial velocity and acceleration?", "back": "Initial velocity (v_i) = 0 m/s. Acceleration (a) = g = 9.8 m/s^2 (downward)."}, {"front": "A stone is dropped from rest. How far does it fall in 3.0 seconds? (Assume g = 9.8 m/s^2, downward is positive)", "back": "d = 1/2 gt^2 = 1/2 (9.8 m/s^2)(3.0 s)^2 = 44.1 m."}, {"front": "A stone is dropped from rest. What is its velocity after 3.0 seconds? (Assume g = 9.8 m/s^2, downward is positive)", "back": "v_f = v_i + gt = 0 + (9.8 m/s^2)(3.0 s) = 29.4 m/s downward."}, {"front": "How does the distance an object falls change if the fall time doubles, assuming it starts from rest?", "back": "Since d is proportional to t^2, if the time doubles, the distance fallen quadruples (increases by a factor of 2^2 = 4)."}, {"front": "How do kinematic equations contribute to car safety engineering?", "back": "Engineers use them to calculate stopping distances for cars at various speeds, which is crucial for determining speed limits, highway off-ramp lengths, and the design of safety features like crumple zones and airbags."}, {"front": "On a position-time graph, what does a straight line indicate about the object's motion?", "back": "A straight line indicates constant speed (or constant velocity). The slope of the line represents the speed/velocity."}, {"front": "On a position-time graph, what does a curve that starts shallow and becomes steeper (concave up) indicate about the object's motion?", "back": "The object is speeding up, meaning it has positive acceleration."}, {"front": "On a position-time graph, what does a curve that starts steep and becomes shallower (concave down) indicate about the object's motion?", "back": "The object is slowing down, indicating negative acceleration or deceleration."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
