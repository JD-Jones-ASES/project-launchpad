<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 27, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overarching scientific consensus regarding the evidence for human-caused climate change?", "back": "The evidence comes from thousands of independent observations by scientists worldwide over many decades, forming a strong scientific case pointing to a consistent warming trend."}, {"front": "By how much has Earth's average surface temperature risen since the pre-industrial era (1850–1900 average)?", "back": "Approximately 1.1 °C."}, {"front": "What key observation about the warmest years on record supports the conclusion of global warming?", "back": "The ten warmest years on record have all occurred since 2010."}, {"front": "What is 'Arctic amplification' and what positive feedback loop primarily drives it?", "back": "Arctic amplification is the phenomenon where the Arctic region warms two to three times faster than the global average, driven primarily by the ice-albedo feedback. As ice melts, darker ocean water absorbs more solar radiation, causing more warming and more ice melt."}, {"front": "Define 'temperature anomaly' and explain why scientists use it.", "back": "Temperature anomaly is the difference between a measured temperature and a reference average (baseline). Using anomalies makes it easier to compare data from different locations and identify global trends, rather than absolute temperatures."}, {"front": "Calculate the average rate of warming per year if the global temperature anomaly was +0.2 °C in 1970 and +1.1 °C in 2020.", "back": "The average rate of warming was 0.018 °C per year, or 0.18 °C per decade. (Calculation: (1.1 °C - 0.2 °C) / 50 years = 0.9 °C / 50 years = 0.018 °C/year)."}, {"front": "How much ice mass have the Greenland and Antarctic ice sheets been losing annually, and what is the potential global sea level rise if they melted completely?", "back": "Greenland lost approximately 280 Gt/year and Antarctica lost about 150 Gt/year between 2002 and 2020. If they melted completely, they could raise global sea level by about 65 meters."}, {"front": "Why is the accelerating retreat of mountain glaciers a critical concern for human populations?", "back": "Mountain glaciers serve as critical freshwater reservoirs for billions of people; their loss threatens water supplies for agriculture, drinking, and hydroelectric power."}, {"front": "Define 'sea level rise' and identify its two primary contributing processes.", "back": "Sea level rise is the increase in the average level of the ocean surface. It is caused primarily by thermal expansion of warming seawater (the largest contributor) and the addition of water from melting land ice."}, {"front": "Explain why melting sea ice (like Arctic ice) does not significantly raise global sea level, while melting land ice does.", "back": "Melting sea ice does not significantly raise sea level because it is already floating in the ocean and displaces its own mass. Melting land ice, however, adds new water volume to the ocean from reservoirs previously on land."}, {"front": "What chemical reaction occurs when excess atmospheric CO2 dissolves in seawater, and what is the resulting process called?", "back": "CO2 + H2O → H2CO3 (carbonic acid), which then dissociates to H⁺ + HCO₃⁻. The released hydrogen ions lower the ocean's pH, a process called ocean acidification."}, {"front": "How much has the ocean's pH dropped since the Industrial Revolution, and what does this change signify in terms of acidity?", "back": "The ocean's pH has dropped from about 8.2 to 8.1. Due to the logarithmic nature of the pH scale, this represents a 26% increase in acidity (hydrogen ion concentration)."}, {"front": "List three types of marine organisms particularly vulnerable to ocean acidification.", "back": "Corals, shellfish (oysters, mussels, clams, sea snails), and some species of plankton (coccolithophores, foraminifera, pteropods) that build shells or skeletons from calcium carbonate."}, {"front": "How does climate change influence the characteristics of extreme weather events?", "back": "Climate change does not create extreme weather events from nothing, but it can make them more frequent, more intense, or longer-lasting (e.g., heat waves, heavy precipitation, droughts, tropical cyclones, wildfires)."}, {"front": "Why are heavy precipitation events increasing in intensity with climate change?", "back": "A warmer atmosphere holds more water vapor (roughly 7% more per degree Celsius of warming), leading to more intense rainfall events and flooding."}, {"front": "Describe 'phenological mismatch' as an ecosystem impact of climate change.", "back": "Phenological mismatch occurs when the timing of natural events, such as flowering, bird migration, or insect emergence, becomes disrupted because different species respond to climate change at different rates, affecting ecological interactions."}, {"front": "What is coral bleaching and what are its potential consequences for coral reefs?", "back": "Coral bleaching happens when rising water temperatures cause corals to expel their symbiotic algae (zooxanthellae). While corals can recover if temperatures return to normal, prolonged bleaching leads to their death, threatening entire reef ecosystems."}, {"front": "Explain the positive feedback loop associated with permafrost thaw in the Arctic.", "back": "Warming temperatures cause permafrost to thaw, releasing stored CO2 and CH4 (greenhouse gases). These released gases then cause further atmospheric warming, which in turn accelerates more permafrost melting, amplifying the initial warming."}, {"front": "How does climate change pose a threat to global agriculture and food production?", "back": "Climate change threatens crop yields through changing precipitation patterns, increased heat stress, and more frequent droughts and floods, despite some regions potentially experiencing longer growing seasons."}, {"front": "Identify two distinct ways climate change impacts human health.", "back": "Heat waves cause heat-related illness and death. Changing disease vector ranges expand the territories of mosquito-borne diseases like malaria and dengue. Additionally, air quality worsens due to increased wildfire smoke and ground-level ozone."}, {"front": "What is meant by 'environmental justice' in the context of climate change impacts?", "back": "Environmental justice refers to the fair distribution of environmental benefits and burdens. Climate change impacts are often unequally distributed, with developing nations, indigenous populations, and low-income communities facing the greatest risks due to fewer resources for adaptation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
