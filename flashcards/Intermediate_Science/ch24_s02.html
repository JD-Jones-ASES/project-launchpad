<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 24, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the electrical equivalent of water pressure in a pipe?", "back": "Voltage."}, {"front": "Define voltage in an electrical circuit.", "back": "Voltage is the potential difference between two points in a circuit. It measures how much energy is available to move each coulomb of charge from one point to another."}, {"front": "What letter represents voltage, and what are its units?", "back": "Voltage is represented by the letter $V$ and measured in volts (V)."}, {"front": "How is 1 volt defined in terms of energy and charge?", "back": "$1V = 1J/C$ (one joule of energy per coulomb of charge)."}, {"front": "How does a battery create voltage?", "back": "A battery converts chemical energy into electrical energy. Chemical reactions inside separate positive and negative charges, creating a potential difference between the two terminals."}, {"front": "What are typical voltages for a standard D-cell battery, a car battery, and a household outlet in the United States?", "back": "A standard D-cell battery maintains $1.5V$; a car battery provides $12V$; and a household outlet in the United States supplies $120V$."}, {"front": "Define electrical resistance.", "back": "Resistance is a measure of how strongly a material opposes the flow of electric current."}, {"front": "What letter represents resistance, and what are its units?", "back": "Resistance is represented by the letter $R$ and measured in ohms ($\\Omega$)."}, {"front": "How is 1 ohm defined in terms of voltage and current?", "back": "$1 \\Omega = 1V/A$."}, {"front": "Explain the physical reason why materials offer resistance to current flow.", "back": "As electrons move through a conductor, they collide with atoms in the material, transferring kinetic energy to those atoms. These collisions convert electrical energy into thermal energy and slow the overall flow of charge."}, {"front": "List the four factors that determine the resistance of a wire or other conductor.", "back": "Material, Length, Cross-sectional area, and Temperature."}, {"front": "How does the material of a wire affect its resistance?", "back": "Different materials have different resistivities. For example, silver and copper have low resistivity, while Nichrome has high resistivity (used in heating elements)."}, {"front": "How does the length of a wire affect its resistance?", "back": "Longer wires have more resistance because electrons must pass through more material and encounter more collisions. Doubling the length doubles the resistance."}, {"front": "How does the cross-sectional area (thickness) of a wire affect its resistance?", "back": "Thicker wires have less resistance because electrons have more 'lanes' to travel through. Doubling the cross-sectional area halves the resistance."}, {"front": "How does temperature affect the resistance of most metals?", "back": "For most metals, resistance increases with temperature because atoms vibrate more vigorously and cause more collisions with electrons."}, {"front": "State Ohm's law in words.", "back": "Ohm's law states that the voltage across a conductor equals the current through it multiplied by its resistance."}, {"front": "Write the mathematical formula for Ohm's law.", "back": "$V = IR$"}, {"front": "What does Ohm's law imply about the relationship between voltage and current (for a fixed resistance)?", "back": "Voltage and current are directly proportional: If you increase the voltage, more current flows."}, {"front": "What does Ohm's law imply about the relationship between resistance and current (for a fixed voltage)?", "back": "Resistance and current are inversely proportional: If you increase the resistance, less current flows."}, {"front": "How can Ohm's law ($V=IR$) be rearranged to solve for current ($I$)?", "back": "$I = V/R$"}, {"front": "How can Ohm's law ($V=IR$) be rearranged to solve for resistance ($R$)?", "back": "$R = V/I$"}, {"front": "A $9.0V$ battery is connected to a resistor. The current through the resistor is $0.30A$. Calculate the resistance.", "back": "Using $R = V/I$, $R = 9.0V / 0.30A = 30 \\Omega$."}, {"front": "Who was Georg Simon Ohm, and what was his key contribution to electrical science?", "back": "Georg Simon Ohm (1789–1854) was a German physicist who discovered and published Ohm's law, which describes the relationship between voltage, current, and resistance. The unit of resistance, the ohm, is named in his honor."}, {"front": "Two light bulbs are connected one at a time to the same $6V$ battery. Bulb A has a resistance of $10 \\Omega$ and bulb B has a resistance of $30 \\Omega$. Which bulb draws more current?", "back": "Bulb A draws more current. Using $I = V/R$: Bulb A: $I = 6V / 10 \\Omega = 0.60A$. Bulb B: $I = 6V / 30 \\Omega = 0.20A$."}, {"front": "Referencing the previous question (Bulb A: $10 \\Omega$, Bulb B: $30 \\Omega$, $6V$ battery), which bulb glows brighter and why?", "back": "Bulb A glows brighter. It draws more current ($0.60A$ vs $0.20A$). For a fixed voltage, more current means more electrical power is dissipated as light and heat, making it brighter."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
