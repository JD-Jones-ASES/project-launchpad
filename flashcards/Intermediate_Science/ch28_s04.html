<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 28, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overarching role of organic chemistry in the modern world?", "back": "Organic chemistry, rooted in the versatile bonding of carbon, is fundamental to creating plastics, medicines, fuels, synthetic fibers, and is central to the emerging field of green chemistry."}, {"front": "How do pharmaceuticals exemplify the application of organic chemistry?", "back": "Every medicine is an organic molecule designed to interact with specific biological targets in the body, using principles of functional groups and molecular structure."}, {"front": "How does Aspirin work to relieve pain?", "back": "Aspirin relieves pain by blocking the cyclooxygenase (COX) enzyme, which is responsible for producing inflammation-causing chemicals."}, {"front": "What is the mechanism by which penicillin kills bacteria?", "back": "Penicillin kills bacteria by disrupting the construction of their cell walls, a crucial process for bacterial survival."}, {"front": "How do pharmaceutical chemists design drugs to interact with specific biological targets?", "back": "Chemists use their knowledge of functional groups to design molecules that fit precisely into the active sites of target enzymes or receptors, much like a key fitting a lock."}, {"front": "What impact can small structural changes have on a drug molecule?", "back": "Even small changes, such as adding or removing a single hydroxyl group, can dramatically alter a drug's effectiveness, its absorption, or its ability to reach specific tissues like the brain."}, {"front": "What role has computer modeling played in modern drug design?", "back": "Computer modeling predicts how new molecules will interact with biological targets before synthesis, speeding up development and reducing the need for animal testing."}, {"front": "Define \"plastic\" and distinguish between thermoplastics and thermosets.", "back": "A plastic is a synthetic polymer that can be molded into shape when heated and retains that shape when cooled. Thermoplastics can be remelted and reshaped, while thermosets become permanently rigid once formed."}, {"front": "What is polyethylene, and what is its basic monomer unit?", "back": "Polyethylene (PE) is the simplest synthetic polymer, formed by linking thousands of ethylene (C2H4) monomers into a long chain. It's used in bags, bottles, and food wrap."}, {"front": "How does polymer chain length affect the properties of a plastic?", "back": "Longer polymer chains generally produce stronger, more rigid plastic materials."}, {"front": "Explain the difference in structure and properties between low-density polyethylene (LDPE) and high-density polyethylene (HDPE).", "back": "LDPE has branched chains that cannot pack tightly, resulting in softer, more flexible plastics. HDPE has unbranched chains that pack efficiently, producing harder, stiffer plastics."}, {"front": "What is cross-linking in polymers, and what effect does it have on plastic properties?", "back": "Cross-linking involves covalent bonds forming between polymer chains, creating a rigid network. This makes the plastic (thermoset) permanently rigid and unable to be remelted or reshaped."}, {"front": "What are the major environmental challenges associated with synthetic plastics?", "back": "Most synthetic polymers do not biodegrade, leading to accumulation in landfills and oceans. They fragment into microplastics that enter food chains and harm wildlife."}, {"front": "What are fossil fuels, and how are they formed?", "back": "Fossil fuels (coal, petroleum, natural gas) are mixtures of hydrocarbons formed over millions of years from the remains of ancient organisms subjected to heat and pressure."}, {"front": "What is the chemical reaction principle behind energy release from fossil fuels?", "back": "Fossil fuels undergo combustion (e.g., CH4 + 2O2 -> CO2 + 2H2O + energy), a chemical reaction that releases the energy stored in their carbon-hydrogen and carbon-carbon bonds."}, {"front": "What are the primary environmental impacts of burning fossil fuels?", "back": "Burning fossil fuels releases CO2, intensifying the greenhouse effect and contributing to climate change. Burning coal also releases SO2, which causes acid rain."}, {"front": "Define \"green chemistry.\"", "back": "Green chemistry is the design of chemical products and processes that reduce or eliminate the use and generation of hazardous substances, aiming for safety and sustainability while maintaining economic viability."}, {"front": "List three guiding principles of green chemistry.", "back": "Three principles include: 1) Prevention of waste, 2) Atom economy (maximizing incorporation of starting materials into the product), and 3) Less hazardous chemical syntheses."}, {"front": "What is the principle of \"atom economy\" in green chemistry?", "back": "Atom economy focuses on designing reactions so that the maximum proportion of starting materials ends up in the final product, minimizing waste by-products."}, {"front": "How does the principle of \"design for degradation\" apply to products like polylactic acid (PLA)?", "back": "Design for degradation means creating products that break down into harmless substances after use. PLA, derived from corn starch, is designed to compost into CO2 and water in industrial facilities, addressing end-of-life concerns."}, {"front": "What are some advantages and limitations of polylactic acid (PLA) as a biodegradable plastic?", "back": "PLA is advantageous because it's derived from renewable resources and can biodegrade in industrial composting facilities. However, it requires specific composting conditions and its production can be energy and land-intensive compared to traditional plastics."}, {"front": "What is biochemical engineering, and give an example of its application.", "back": "Biochemical engineering applies organic chemistry and biochemistry to industrial processes. An example is using fermentation to produce ethanol for fuel, antibiotics, or vitamins."}, {"front": "How is genetic engineering utilized in biochemical engineering?", "back": "Genetic engineering allows scientists to insert genes into microorganisms like bacteria or yeast, turning them into 'tiny factories' that produce therapeutic proteins such as insulin or growth hormones."}, {"front": "What is the Maillard reaction, and what common culinary effects does it produce?", "back": "The Maillard reaction is a chemical reaction between amino acids and sugars that occurs when food is heated. It produces the brown crust and complex flavors found in toasted bread, grilled meat, and roasted coffee."}, {"front": "How do common food preservatives like citric acid and sodium benzoate prevent spoilage?", "back": "These preservatives work by creating conditions, such as low pH or inhibition of microbial enzymes, that prevent spoilage organisms from growing in food."}, {"front": "How is organic chemistry central to the carbon cycle in ecosystems?", "back": "Every step in the carbon cycle—from photosynthesis fixing CO2 into glucose, to organisms transforming glucose into other organic molecules, and carbon returning as CO2 through respiration, decomposition, or burning—involves organic chemistry reactions."}, {"front": "What role do enzymatic reactions play in the transformations within the carbon cycle?", "back": "Enzymatic reactions are crucial for transforming glucose into all other organic molecules (lipids, proteins, nucleic acids) within organisms, facilitating the movement of carbon through the ecosystem."}, {"front": "Briefly discuss the environmental trade-offs between using polyethylene and PLA for grocery bags, considering energy, land use, and end-of-life.", "back": "PLA reduces ocean pollution and landfill persistence but requires more energy and farmland (potentially for food) to produce. Polyethylene has lower production impacts but is non-biodegradable. The 'best' choice depends on prioritized environmental impacts and proper disposal infrastructure."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
