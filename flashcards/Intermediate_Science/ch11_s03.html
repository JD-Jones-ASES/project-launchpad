<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 11, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is cellular respiration?", "back": "A series of chemical reactions that break down glucose and other organic molecules in the presence of oxygen to produce ATP, carbon dioxide, and water."}, {"front": "How does cellular respiration differ from breathing?", "back": "Breathing is the mechanical process of moving air in and out of the lungs. Cellular respiration is a chemical process that happens inside individual cells to produce ATP."}, {"front": "What is the overall balanced chemical equation for cellular respiration?", "back": "C6H12O6 + 6O2 → 6CO2 + 6H2O + energy (ATP)"}, {"front": "What are the three main stages of aerobic cellular respiration?", "back": "Glycolysis, the Krebs cycle, and the electron transport chain."}, {"front": "What is glycolysis?", "back": "The first stage of cellular respiration, where one molecule of glucose (6 carbons) is split into two molecules of pyruvate (3 carbons each)."}, {"front": "Where does glycolysis occur in the cell?", "back": "In the cytoplasm."}, {"front": "Does glycolysis require oxygen?", "back": "No, glycolysis is an anaerobic process."}, {"front": "What are the key inputs and outputs of glycolysis per glucose molecule?", "back": "Inputs: 1 glucose, 2 ATP (investment). Outputs: 2 pyruvate, net 2 ATP, 2 NADH."}, {"front": "What happens to pyruvate after glycolysis if oxygen is available?", "back": "The two pyruvate molecules move into the mitochondria and are converted to acetyl-CoA before entering the Krebs cycle."}, {"front": "What is the Krebs cycle, also known as the citric acid cycle?", "back": "The second stage of aerobic cellular respiration, occurring in the mitochondrial matrix, that completes the breakdown of pyruvate and produces CO2, ATP, NADH, and FADH2."}, {"front": "Where does the Krebs cycle take place in the cell?", "back": "In the matrix (inner fluid) of the mitochondrion."}, {"front": "Before entering the Krebs cycle, what intermediate molecule is formed from pyruvate, and what is released?", "back": "Each pyruvate molecule is converted into acetyl-CoA, releasing one CO2 and one NADH in the process."}, {"front": "For each glucose molecule, what are the overall outputs directly from the Krebs cycle (not including pre-Krebs conversion)?", "back": "4 CO2, 6 NADH, 2 FADH2, and 2 ATP (since the cycle turns twice per glucose)."}, {"front": "What is the Electron Transport Chain (ETC) in cellular respiration?", "back": "The third and final stage of aerobic cellular respiration, located in the inner membrane of the mitochondria, where NADH and FADH2 donate electrons to produce the majority of ATP."}, {"front": "Where is the electron transport chain located in the cell?", "back": "In the inner membrane of the mitochondria."}, {"front": "What is the primary role of NADH and FADH2 in the electron transport chain?", "back": "They deliver high-energy electrons to a series of proteins in the inner mitochondrial membrane."}, {"front": "How is the majority of ATP produced in the electron transport chain?", "back": "As electrons pass through proteins, energy is released to pump H+ ions, creating a gradient. H+ ions then flow through ATP synthase, which generates ATP."}, {"front": "Why is oxygen essential for the electron transport chain to function?", "back": "Oxygen acts as the final electron acceptor, combining with electrons and hydrogen ions to form water. Without oxygen, the ETC backs up and stops."}, {"front": "Approximately how many ATP molecules are produced per glucose molecule during complete aerobic cellular respiration?", "back": "36–38 ATP molecules."}, {"front": "Which stage of cellular respiration produces the vast majority of ATP?", "back": "The electron transport chain, producing about 32–34 ATP (roughly 90% of the total)."}, {"front": "What is fermentation?", "back": "An anaerobic pathway that allows glycolysis to continue when oxygen is not available. It recycles electron carriers but produces far less ATP than aerobic respiration."}, {"front": "Under what conditions does a cell use fermentation instead of aerobic respiration?", "back": "When oxygen is absent or in short supply, which prevents the electron transport chain and Krebs cycle from operating."}, {"front": "What is the main purpose of fermentation in relation to glycolysis?", "back": "To recycle NADH back into NAD+ so that glycolysis can continue to produce a small amount of ATP."}, {"front": "What are the two common types of fermentation mentioned?", "back": "Lactic acid fermentation and alcoholic fermentation."}, {"front": "Where does lactic acid fermentation occur, and what is its product?", "back": "It occurs in muscle cells during intense exercise and in some bacteria. Pyruvate is converted into lactic acid."}, {"front": "Where does alcoholic fermentation occur, and what are its products?", "back": "It occurs in yeast cells. Pyruvate is converted into ethanol (ethyl alcohol) and CO2."}, {"front": "How does the ATP yield from fermentation compare to that of aerobic respiration per glucose molecule?", "back": "Fermentation yields only 2 ATP per glucose (from glycolysis), while aerobic respiration yields 36–38 ATP."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
