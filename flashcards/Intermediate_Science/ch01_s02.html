<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two fundamental categories of cells based on their internal organization?", "back": "Prokaryotic cells and eukaryotic cells.", "id": "fc01"}, {"front": "Define a prokaryotic cell and provide examples.", "back": "A cell that lacks a membrane-bound nucleus and other membrane-bound organelles. Examples include bacteria and archaea.", "id": "fc02"}, {"front": "Define a eukaryotic cell and provide examples.", "back": "A cell that contains a membrane-bound nucleus and other membrane-bound organelles. All plants, animals, fungi, and protists are eukaryotes.", "id": "fc03"}, {"front": "How do prokaryotic and eukaryotic cells differ in terms of complexity and internal structures?", "back": "Prokaryotic cells are generally smaller and simpler, lacking a nucleus and elaborate internal membranes. Eukaryotic cells are larger and more complex, featuring a true nucleus and various membrane-bound organelles.", "id": "fc04"}, {"front": "Where is the DNA located in a prokaryotic cell?", "back": "It floats freely in the cytoplasm in a region called the nucleoid, as prokaryotic cells do not have a membrane-bound nucleus.", "id": "fc05"}, {"front": "Identify three key differences between typical plant and animal cells.", "back": "Plant cells have a rigid cell wall, chloroplasts, and a large central vacuole. Animal cells lack these but typically possess centrioles.", "id": "fc06"}, {"front": "What is the primary function of the cell wall in plant cells?", "back": "Made of cellulose, the cell wall provides structural support, protection, and gives plant cells a fixed, boxy shape.", "id": "fc07"}, {"front": "Which organelle is responsible for photosynthesis in plant cells?", "back": "Chloroplasts.", "id": "fc08"}, {"front": "Why do animal cells not have chloroplasts?", "back": "Animal cells obtain energy by consuming food, whereas chloroplasts are specialized to capture light energy for photosynthesis.", "id": "fc09"}, {"front": "What is the role of the large central vacuole in plant cells?", "back": "It stores water, salts, and waste products. When full, it pushes against the cell wall, maintaining turgor pressure and cell rigidity.", "id": "fc10"}, {"front": "Do plant cells have mitochondria? Explain.", "back": "Yes. Plant cells have both chloroplasts (for sugar production from light) and mitochondria (to break down sugar for usable energy, ATP), just like animal cells.", "id": "fc11"}, {"front": "What is the nucleus often called and what is its main function?", "back": "Often called the 'control center' or 'command center' of the cell, its main function is to contain the cell's DNA and control cell activities.", "id": "fc12"}, {"front": "Describe the nuclear envelope and nuclear pores.", "back": "The nuclear envelope is a double membrane surrounding the nucleus, containing nuclear pores that act as gates for specific molecules (like mRNA) to pass between the nucleus and the cytoplasm.", "id": "fc13"}, {"front": "What are ribosomes and what is their primary function?", "back": "Ribosomes are tiny, non-membrane-bound structures that read genetic messages (from DNA) and assemble amino acids into proteins.", "id": "fc14"}, {"front": "What is the endoplasmic reticulum (ER) and what are its two main types?", "back": "The ER is an extensive network of folded membranes extending through the cytoplasm. Its two types are rough ER (studded with ribosomes) and smooth ER (lacks ribosomes).", "id": "fc15"}, {"front": "What are the specific functions of the rough ER?", "back": "The rough ER, covered with ribosomes, processes proteins (folding, modification with sugars) that are often destined for export out of the cell.", "id": "fc16"}, {"front": "What are the specific functions of the smooth ER?", "back": "The smooth ER synthesizes lipids, detoxifies chemicals, and stores calcium ions.", "id": "fc17"}, {"front": "What is the primary role of the Golgi apparatus?", "back": "The Golgi apparatus modifies, sorts, and packages proteins and lipids (received from the ER via vesicles) for transport to their final destinations inside or outside the cell.", "id": "fc18"}, {"front": "Why are mitochondria often called the 'powerhouses' of the cell?", "back": "Mitochondria convert chemical energy from food molecules (like glucose) into ATP, the cell's primary energy currency, through cellular respiration.", "id": "fc19"}, {"front": "Describe the distinctive inner membrane structure of mitochondria and its importance.", "back": "The inner membrane is deeply folded into structures called cristae, which greatly increase the surface area available for the chemical reactions of cellular respiration.", "id": "fc20"}, {"front": "What evidence supports the endosymbiotic theory for mitochondria and chloroplasts?", "back": "Both mitochondria and chloroplasts have their own small circle of DNA and ribosomes, similar to those found in bacteria, suggesting they were once free-living organisms engulfed by larger cells.", "id": "fc21"}, {"front": "Where are chloroplasts found and what are their key internal structures related to function?", "back": "Chloroplasts are found in plant cells and some protists. Internally, stacks of flattened membrane discs called thylakoids contain the green pigment chlorophyll, which absorbs light energy for photosynthesis.", "id": "fc22"}, {"front": "What are lysosomes and what do they do?", "back": "Lysosomes are small, spherical, membrane-bound organelles containing powerful digestive enzymes. They break down worn-out organelles, food particles, and foreign invaders like bacteria and viruses.", "id": "fc23"}, {"front": "Why is the membrane surrounding a lysosome critical for the cell's survival?", "back": "The membrane is critical because if the powerful digestive enzymes inside were to leak into the cytoplasm, they could digest and destroy the cell itself.", "id": "fc24"}, {"front": "What is the cytoskeleton and what are its main functions?", "back": "The cytoskeleton is a dynamic network of protein fibers that provides structural support, maintains cell shape, enables cell movement, and facilitates the transport of materials within the cell.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
