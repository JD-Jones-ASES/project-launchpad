<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 31, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a fundamental feature of how modern science works, particularly concerning major global challenges?", "back": "Modern science is inherently interdisciplinary, meaning that the biggest challenges facing humanity require collaboration across multiple branches of science, not just one."}, {"front": "Why are problems like pandemics, climate change, and energy sustainability considered \"inherently interdisciplinary\"?", "back": "These problems are complex systems challenges that cannot be solved by scientists from a single field working alone; they require teams combining expertise from biology, chemistry, physics, Earth science, and data science."}, {"front": "In the context of pandemic response, what specific contributions does biology and genetics make?", "back": "Biology and genetics are crucial for understanding how viruses enter/hijack cells, sequencing viral genomes, tracking mutations, and comprehending the immune system's response (molecular biology, antibodies)."}, {"front": "How does chemistry and biochemistry contribute to the development of mRNA vaccines?", "back": "Chemistry is vital for designing the mRNA molecule, encapsulating it in lipid nanoparticles (using phospholipid chemistry and intermolecular forces), and stabilizing it for storage and transport."}, {"front": "What role did decades of foundational research play in the rapid development of mRNA vaccines during a pandemic?", "back": "The rapid development was possible because scientists built on over 30 years of foundational research in molecular biology and chemistry, demonstrating the power of prior knowledge when applied to an urgent problem."}, {"front": "Beyond biology and chemistry, what other scientific fields are critical to a comprehensive pandemic response, and what do they contribute?", "back": "Physics and engineering contribute to manufacturing processes (temperature control, cold-chain logistics, electrical systems) and diagnostic tools (PCR thermal cycling, fluorescence detection). Data science is essential for epidemiological modeling and predicting disease spread."}, {"front": "Explain the interdisciplinary nature of renewable energy systems, emphasizing its complexity.", "back": "The global transition to renewable energy is a complex systems problem requiring integration of knowledge from physics (energy conversion), chemistry (energy storage), Earth science (resource location), and ecology (environmental impacts)."}, {"front": "How does physics contribute to the efficiency and power output of various renewable energy sources?", "back": "Physics governs the conversion of energy: electromagnetic radiation to electrical (solar), kinetic to electrical (wind), gravitational potential to electrical (hydroelectric). Thermodynamics also dictates conversion efficiency."}, {"front": "What is the primary chemistry challenge associated with renewable energy sources like solar and wind, and what chemical solutions are being explored?", "back": "The primary chemistry challenge is storing intermittent energy. Solutions include lithium-ion batteries (reversible redox reactions), hydrogen fuel cells, and next-generation battery designs using elements like sodium or zinc."}, {"front": "How does Earth science inform the strategic placement and development of renewable energy infrastructure?", "back": "Earth science guides where to build based on geography, climate, and geology: solar farms need high insolation, wind farms need consistent wind patterns, and geothermal plants need proximity to volcanic activity or hot rocks. It also informs mining for raw materials."}, {"front": "Describe the ecological considerations necessary for building and operating renewable energy installations.", "back": "Ecological science is needed to assess environmental impacts, such as wind turbines affecting bird/bat populations, hydroelectric dams altering river ecosystems, and large-scale solar changing land use and wildlife habitats. Balancing energy production with ecosystem preservation is key."}, {"front": "Why is understanding the human brain considered \"the ultimate interdisciplinary challenge\"?", "back": "The human brain is arguably the most complex object in the known universe, requiring every scientific tool to understand its structure and function, from thoughts to memories and body control."}, {"front": "How do life science and genetics contribute to our understanding of the brain?", "back": "Life science studies specialized cells (neurons, glial cells) and their electrochemical communication (action potentials, neurotransmitters). Genetics explores how genes influence brain development and evolution traces how the brain evolved from simpler nervous systems."}, {"front": "Explain the role of chemistry in brain function and the development of psychiatric medications.", "back": "Chemistry defines neurotransmitters as organic molecules with specific functional groups that bind to receptors. Psychiatric medications work by altering the chemistry of these neurotransmitter systems (e.g., serotonin, dopamine) by blocking receptors or enhancing release."}, {"front": "What contributions does physics make to studying the brain, from neural signals to imaging techniques?", "back": "Physics explains electrical signals in neurons (ion flow, voltage differences), powers EEG (measuring electrical activity), and underlies MRI scanners (electromagnets, radio waves for imaging). Computational neuroscience uses physics-based models for brain simulation."}, {"front": "Give an example of how Earth science, though seemingly less direct, connects to brain science.", "back": "Earth science contributes through paleontology (studying fossil brains for evolutionary changes) and environmental toxicology, which examines how pollutants in air, water, and soil affect brain development and health."}, {"front": "What is the common lesson learned from studying pandemic response, renewable energy, and brain science?", "back": "The most important problems in science today cannot be solved by any single branch working in isolation; boundaries between disciplines are blurring, and breakthroughs often come from working across these boundaries."}, {"front": "How does an integrated approach to science prepare students for real-world scientific work?", "back": "Studying all four branches together, looking for connections, and solving problems that combine multiple concepts prepares students for how science actually works in the real world, where interdisciplinary collaboration is key."}, {"front": "Why is the ability to see connections between one's specialty and other fields a valuable skill for scientists?", "back": "This skill enhances a scientist's power and effectiveness: a biologist understanding chemistry designs better experiments, a physicist understanding ecology builds environmentally conscious technology, and a chemist understanding genetics develops better medicines."}, {"front": "Give three examples of global challenges that inherently require an interdisciplinary scientific approach.", "back": "Pandemics, climate change, energy sustainability, food security, and environmental degradation are all examples that require interdisciplinary science."}, {"front": "What specific chemical knowledge is essential for designing the lipid nanoparticles used in mRNA vaccines?", "back": "Knowledge of phospholipid chemistry and intermolecular forces is essential for designing lipid nanoparticles to encapsulate and deliver mRNA effectively."}, {"front": "How do physicists and engineers ensure the safe and effective distribution of certain vaccines that require extreme cold storage?", "back": "They apply principles of heat transfer for precision temperature control and develop cold-chain logistics using advanced manufacturing equipment and electrical systems to maintain required temperatures, sometimes as low as -70°C."}, {"front": "Name three forms of energy conversion studied in physics that are crucial for renewable energy systems.", "back": "Conversion of electromagnetic radiation to electrical energy (solar), kinetic energy to electrical energy (wind), and gravitational potential energy to electrical energy (hydroelectric) are crucial examples."}, {"front": "What kind of chemical reactions are at the core of lithium-ion battery function?", "back": "Reversible oxidation-reduction (redox) reactions are at the core of how lithium-ion batteries store and release energy in chemical bonds."}, {"front": "How do neurons communicate, illustrating a blend of electrical and chemical principles?", "back": "Neurons communicate via electrochemical signals: an electrical impulse (action potential) travels along the axon, triggering the release of chemical neurotransmitters at the synapse, which then bind to receptors on another neuron."}, {"front": "Describe the \"cold-chain logistics\" challenge in vaccine distribution and which scientific discipline primarily addresses it.", "back": "Cold-chain logistics refers to the challenge of maintaining specific, often extremely low, temperatures for sensitive products like vaccines during storage and transport. Physics and engineering are the primary disciplines addressing this through temperature control and specialized equipment."}, {"front": "How does \"computational neuroscience\" bridge physics and computer science to understand brain function?", "back": "Computational neuroscience uses physics-based models of neural networks, often implemented with computer science techniques, to simulate how the brain processes information and generates complex behaviors."}, {"front": "Why might a biologist who understands chemistry be more effective in their research?", "back": "A biologist who understands chemistry can design better experiments because they grasp the molecular interactions and biochemical processes underpinning biological phenomena, leading to more robust and insightful research."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
