<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 11</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the ultimate source of energy for nearly all life on Earth?", "back": "The Sun.", "id": "fc01"}, {"front": "Define 'autotroph' and explain its etymology.", "back": "An autotroph is an organism that produces its own food from inorganic molecules, using energy from sunlight or chemical reactions. 'Auto' means self, and 'trophe' means nourishment.", "id": "fc02"}, {"front": "Give three examples of autotrophs.", "back": "Plants, algae, and certain bacteria.", "id": "fc03"}, {"front": "What is the primary role of autotrophs in the living world?", "back": "They are the 'producers' that capture energy from the environment and convert it into organic molecules (food) for themselves and, indirectly, for other organisms.", "id": "fc04"}, {"front": "What is photosynthesis?", "back": "Photosynthesis is the process used by most autotrophs, like green plants, to convert light energy into chemical energy (food).", "id": "fc05"}, {"front": "How do chemotrophs, such as some bacteria found in deep-ocean vents, obtain energy?", "back": "Chemotrophs obtain energy from chemical reactions involving inorganic substances (like hydrogen sulfide or iron) rather than from light.", "id": "fc06"}, {"front": "Define 'heterotroph' and explain its etymology.", "back": "A heterotroph is an organism that cannot produce its own food and must obtain energy by consuming other organisms. 'Hetero' means other, and 'trophe' means nourishment.", "id": "fc07"}, {"front": "Give three examples of heterotrophs.", "back": "Animals, fungi, and most bacteria.", "id": "fc08"}, {"front": "What is the primary role of heterotrophs in the living world?", "back": "They are the 'consumers' that obtain energy-rich molecules by eating plants, other animals, or decomposing organic matter.", "id": "fc09"}, {"front": "How do autotrophs and heterotrophs fundamentally differ in how they obtain energy?", "back": "Autotrophs produce their own food from inorganic sources (e.g., sunlight, chemicals), while heterotrophs obtain energy by consuming other organisms or organic matter.", "id": "fc10"}, {"front": "Trace the flow of energy from the Sun to a person eating a hamburger.", "back": "Sunlight provides energy for grass to perform photosynthesis. A cow eats the grass, converting the chemical energy. A person eats the beef from the cow, consuming that chemical energy, which ultimately originated from the Sun.", "id": "fc11"}, {"front": "Why can't cells directly use energy from sunlight or the chemical energy in food?", "back": "Cells must convert this energy into a specific molecule, adenosine triphosphate (ATP), which acts as a universal, immediate energy carrier.", "id": "fc12"}, {"front": "What does ATP stand for, and what is its primary role in the cell?", "back": "ATP stands for adenosine triphosphate. It is the 'energy currency' of the cell, storing and transferring immediate energy for cellular work.", "id": "fc13"}, {"front": "What are the three main components that make up an ATP molecule?", "back": "Adenine (a nitrogen-containing base), ribose (a five-carbon sugar), and three phosphate groups.", "id": "fc14"}, {"front": "How is energy released from an ATP molecule?", "back": "Energy is released when the bond between the second and third phosphate group is broken, converting ATP into ADP (adenosine diphosphate) and a free phosphate group.", "id": "fc15"}, {"front": "Name three cellular activities powered by the energy released from ATP.", "back": "Muscle contraction, protein synthesis, and nerve impulse transmission (among others).", "id": "fc16"}, {"front": "How do cells regenerate ATP from ADP?", "back": "Cells recycle ADP back into ATP by reattaching a phosphate group, using energy obtained from the breakdown of food molecules or from sunlight.", "id": "fc17"}, {"front": "Explain the analogy: 'Food is like a large-denomination bill, and ATP is like coins' in a cellular economy.", "back": "Food contains a lot of energy (like a large bill) that cells cannot use directly for small tasks. Cells 'make change' by breaking down food to produce many smaller, precise ATP molecules (like coins) that can deliver specific amounts of energy exactly where needed.", "id": "fc18"}, {"front": "What are the two great processes that summarize energy flow in living systems?", "back": "Photosynthesis and Cellular Respiration.", "id": "fc19"}, {"front": "Briefly describe photosynthesis, including its reactants, products, and who performs it.", "back": "Autotrophs (mainly plants) capture light energy to build glucose (C6H12O6) from carbon dioxide (CO2) and water (H2O). Oxygen (O2) is released as a byproduct.", "id": "fc20"}, {"front": "Briefly describe cellular respiration, including its reactants, products, and who performs it.", "back": "Both autotrophs and heterotrophs break down glucose to release energy, which is stored in ATP. Carbon dioxide (CO2) and water (H2O) are produced as byproducts.", "id": "fc21"}, {"front": "What is the 'remarkable relationship' between photosynthesis and cellular respiration?", "back": "The products of photosynthesis (glucose and oxygen) are the reactants of cellular respiration, and the products of cellular respiration (carbon dioxide and water) are the reactants of photosynthesis, forming a continuous cycle that sustains nearly all life on Earth.", "id": "fc22"}, {"front": "If all green plants on Earth suddenly disappeared, what would happen to atmospheric oxygen levels over time?", "back": "Oxygen levels would decrease significantly because photosynthesis, performed by plants, is the primary source of atmospheric oxygen.", "id": "fc23"}, {"front": "If all green plants on Earth suddenly disappeared, what would happen to atmospheric carbon dioxide levels over time?", "back": "Carbon dioxide levels would increase because plants consume CO2 during photosynthesis, and without them, only CO2-producing processes like cellular respiration would continue.", "id": "fc24"}, {"front": "How would the disappearance of all green plants affect heterotrophs, and why?", "back": "Heterotrophs would eventually die out because they rely directly or indirectly on autotrophs (plants) for their food (energy-rich organic molecules) and for the oxygen needed for cellular respiration. The entire food web would collapse.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
