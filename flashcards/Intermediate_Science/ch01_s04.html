<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is cell division and why is it essential for living organisms?", "back": "Cell division is the process by which one cell splits into two. It is essential for growth (e.g., embryo to adult), repair (e.g., healing cuts), and replacement of worn-out cells (e.g., blood cells).", "id": "fc01"}, {"front": "Why don't cells simply grow larger instead of dividing?", "back": "As a cell grows, its volume increases much faster than its surface area. The cell membrane (surface area) becomes insufficient to transport enough nutrients into the increased volume and remove waste quickly enough, leading to an unfavorable surface-area-to-volume ratio.", "id": "fc02"}, {"front": "What two critical tasks must every cell division accomplish?", "back": "1. Copy all of the cell's DNA so that each new cell receives a complete set of genetic instructions. 2. Divide the cytoplasm and organelles so that each new cell has the materials it needs to function.", "id": "fc03"}, {"front": "Define the cell cycle.", "back": "The ordered sequence of events that a cell goes through from the time it is formed until it divides into two new daughter cells.", "id": "fc04"}, {"front": "What are the two main stages of the cell cycle?", "back": "Interphase (when the cell grows and prepares for division) and the mitotic phase (when the cell actually divides).", "id": "fc05"}, {"front": "Describe Interphase and its general activities.", "back": "Interphase is the longest phase of the cell cycle (about 90% of the time). During this stage, the cell is extremely active, performing its specialized functions, growing, and copying its DNA in preparation for division.", "id": "fc06"}, {"front": "Name and briefly describe the three sub-phases of Interphase.", "back": "1. G1 phase (first gap): Cell grows, produces proteins and organelles, carries out normal functions. 2. S phase (synthesis): Cell replicates all of its DNA. 3. G2 phase (second gap): Cell continues to grow and produces proteins needed for division; DNA replication is checked.", "id": "fc07"}, {"front": "What key event occurs during the S phase of interphase?", "back": "The cell copies or replicates all of its DNA. After S phase, each chromosome consists of two identical copies called sister chromatids, joined at a centromere.", "id": "fc08"}, {"front": "Define 'chromosome' and explain its structure.", "back": "A chromosome is a structure made of DNA tightly coiled around proteins called histones. It carries the genetic information needed to build and maintain an organism.", "id": "fc09"}, {"front": "When does DNA exist as chromatin, and when does it condense into chromosomes?", "back": "During most of interphase, DNA exists as loosely coiled chromatin. Before division, the chromatin coils tightly around histones, condensing into visible, rod-shaped chromosomes.", "id": "fc10"}, {"front": "How many chromosomes do human body cells typically contain?", "back": "Human body cells contain 46 chromosomes (23 pairs).", "id": "fc11"}, {"front": "Define mitosis and state its primary purpose.", "back": "Mitosis is the process by which a cell's nucleus divides into two genetically identical daughter nuclei. Its primary purpose is to ensure that each new cell receives an exact copy of the parent cell's DNA.", "id": "fc12"}, {"front": "What are the four phases of mitosis, in order?", "back": "Prophase, Metaphase, Anaphase, and Telophase (PMAT).", "id": "fc13"}, {"front": "List the major events that occur during Prophase.", "back": "Chromatin condenses into visible chromosomes (each with two sister chromatids). The mitotic spindle begins to form. The nuclear envelope begins to break down, and the nucleolus disappears.", "id": "fc14"}, {"front": "What is the critical event that occurs during Metaphase, and what is its significance?", "back": "The chromosomes line up along the middle of the cell, forming the metaphase plate. Spindle fibers attach to the centromere of each chromosome. This ensures that each new cell will receive exactly one copy of every chromosome.", "id": "fc15"}, {"front": "Describe the key events of Anaphase, including what happens to sister chromatids.", "back": "The centromeres split, and spindle fibers pull the sister chromatids apart, dragging them toward opposite poles of the cell. The separated chromatids are now considered individual chromosomes. Anaphase is the shortest phase of mitosis.", "id": "fc16"}, {"front": "How is Telophase often described in relation to Prophase?", "back": "Telophase is essentially the reverse of prophase. Chromosomes uncoil, new nuclear envelopes form around each set of chromosomes, nucleoli reappear, and the mitotic spindle disassembles.", "id": "fc17"}, {"front": "Define cytokinesis and explain when it typically occurs.", "back": "Cytokinesis is the division of the cytoplasm following mitosis, resulting in two separate daughter cells. It usually begins during telophase.", "id": "fc18"}, {"front": "How does cytokinesis differ between animal cells and plant cells?", "back": "In animal cells, a cleavage furrow (an inward pinch caused by microfilaments) divides the cell. In plant cells, a cell plate forms from vesicles in the middle of the cell, growing outward to become a new cell wall separating the daughter cells.", "id": "fc19"}, {"front": "What is the final outcome of mitosis followed by cytokinesis?", "back": "Two daughter cells that are genetically identical to each other and to the original parent cell, each with the same number of chromosomes, DNA sequences, and a share of organelles and cytoplasm.", "id": "fc20"}, {"front": "What is cancer, and how is it related to the cell cycle?", "back": "Cancer is a group of diseases characterized by the uncontrolled growth and division of abnormal cells. It occurs when the regulatory mechanisms of the cell cycle (checkpoints) fail, often due to mutations in genes that control the cycle.", "id": "fc21"}, {"front": "Distinguish between a benign tumor and a malignant tumor.", "back": "A benign tumor stays in one place and does not invade surrounding tissues. A malignant tumor can invade nearby tissues and spread to other parts of the body (metastasis), making it life-threatening.", "id": "fc22"}, {"front": "What are carcinogens, and provide examples.", "back": "Carcinogens are environmental factors, substances, or agents that damage DNA and can lead to cancer. Examples include tobacco smoke, ultraviolet radiation from the sun, certain chemicals, and some viruses.", "id": "fc23"}, {"front": "Explain why rapidly dividing cancer cells are often more vulnerable to radiation damage than normal cells.", "back": "Rapidly dividing cancer cells spend a larger fraction of their time in the S (DNA replication) and M (mitosis) phases. During S phase, DNA is unwound and actively being copied, making it more exposed and vulnerable to damage from radiation. During mitosis, the cell is focused on chromosome separation and less capable of repairing damaged DNA. Normal cells, which divide slowly, spend less time in these vulnerable phases, allowing more time for DNA repair.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
