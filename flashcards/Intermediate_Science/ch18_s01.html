<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 18, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What defines a chemical reaction?", "back": "A process where one or more substances (reactants) are transformed into one or more new substances (products) with different chemical properties, involving the breaking and forming of bonds between atoms.", "id": "fc01"}, {"front": "List the four main types of evidence scientists look for to confirm a chemical reaction has occurred.", "back": "Color change, gas production (bubbles/fizzing), temperature change (surroundings become warmer or cooler), and precipitate formation (a solid forms).", "id": "fc02"}, {"front": "How can a color change indicate a chemical reaction?", "back": "A new color appears that was not present in the original substances, such as shiny gray iron turning reddish-brown as rust (iron oxide) forms.", "id": "fc03"}, {"front": "Is every color change evidence of a chemical reaction? Give an example.", "back": "No. Dissolving food coloring in water causes a color change but is a physical change, not a chemical reaction. An *unexpected* color change is a strong clue.", "id": "fc04"}, {"front": "What visible sign indicates gas production during a chemical reaction?", "back": "The appearance of bubbles or fizzing, indicating that a gas is being released.", "id": "fc05"}, {"front": "Provide an example of gas production as a sign of a chemical reaction.", "back": "When baking soda reacts with vinegar, carbon dioxide gas (CO2) is released, creating visible fizzing.", "id": "fc06"}, {"front": "How does a temperature change signal a chemical reaction?", "back": "The surroundings become warmer or cooler, indicating that the chemical process is either releasing heat (exothermic) or absorbing heat (endothermic).", "id": "fc07"}, {"front": "Give an example of a chemical reaction that causes the surroundings to get warmer.", "back": "A hand warmer gets hot because iron inside reacts with oxygen in an exothermic reaction.", "id": "fc08"}, {"front": "What is a precipitate, and how does its formation indicate a chemical reaction?", "back": "A precipitate is an insoluble solid that forms and settles out when two solutions are mixed, meaning new solid substances have been created.", "id": "fc09"}, {"front": "Describe an example of precipitate formation.", "back": "When silver nitrate solution is mixed with sodium chloride solution, a white solid called silver chloride (a precipitate) appears.", "id": "fc10"}, {"front": "Define an exothermic reaction.", "back": "A reaction that releases energy (usually as heat, light, or sound) to its surroundings. The products have less chemical energy than the reactants, and the surroundings get warmer.", "id": "fc11"}, {"front": "Define an endothermic reaction.", "back": "A reaction that absorbs energy (usually as heat) from its surroundings. The products have more chemical energy than the reactants, and the surroundings get cooler.", "id": "fc12"}, {"front": "How do exothermic and endothermic reactions affect the temperature of their surroundings?", "back": "Exothermic reactions release energy, making the surroundings warmer. Endothermic reactions absorb energy, making the surroundings cooler.", "id": "fc13"}, {"front": "Identify two common examples of exothermic reactions.", "back": "Combustion (e.g., burning wood, gasoline), rusting, hand warmers, cellular respiration.", "id": "fc14"}, {"front": "Identify two common examples of endothermic reactions.", "back": "Photosynthesis, cooking an egg, dissolving ammonium nitrate in water (cold packs), decomposing water by electrolysis.", "id": "fc15"}, {"front": "Is photosynthesis an exothermic or endothermic reaction, and why?", "back": "Photosynthesis is an endothermic reaction because it absorbs light energy to convert CO2 and H2O into glucose and O2.", "id": "fc16"}, {"front": "Is cellular respiration an exothermic or endothermic reaction, and why?", "back": "Cellular respiration is an exothermic reaction because it converts glucose and O2 into CO2 and H2O, releasing energy for life processes.", "id": "fc17"}, {"front": "What is activation energy?", "back": "The minimum amount of energy required to start a chemical reaction.", "id": "fc18"}, {"front": "Explain activation energy using an analogy.", "back": "It's like pushing a boulder to the top of a hill; it takes effort (activation energy) to get it started, but once it reaches the top, it can roll down on its own (energy released).", "id": "fc19"}, {"front": "What is the role of catalysts and enzymes in chemical reactions?", "back": "Catalysts (including biological catalysts like enzymes) lower the activation energy required to start a chemical reaction, making it easier to initiate without being consumed in the process.", "id": "fc20"}, {"front": "Even though burning leaves is an exothermic reaction, why don't leaves spontaneously combust on a warm day?", "back": "They require activation energy to start the combustion reaction. Normal air temperature doesn't provide enough energy to overcome this barrier and break the initial bonds.", "id": "fc21"}, {"front": "Once activation energy is provided (e.g., a spark), what happens in an exothermic reaction?", "back": "Once the activation energy barrier is overcome, the reaction proceeds, releasing much more energy than was needed to start it, and often sustaining itself by providing activation energy to neighboring molecules.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
