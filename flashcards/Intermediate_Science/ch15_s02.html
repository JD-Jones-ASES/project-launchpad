<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a hydroelectric dam a prime real-world example of in scientific systems?", "back": "It's an excellent example of energy flowing through multiple scientific systems, converting the gravitational potential energy of water into electrical energy."}, {"front": "What is the initial energy source that drives the water cycle, which is fundamental to hydroelectric power?", "back": "Solar energy, which heats ocean water, causing evaporation and ultimately lifting water to high elevations."}, {"front": "How does the sun-driven water cycle create the gravitational potential energy needed for a hydroelectric dam?", "back": "Solar energy causes water to evaporate, rise, cool, condense into clouds, and fall as precipitation over mountains/high ground, giving it gravitational potential energy (PE = mgh)."}, {"front": "Explain the role of water's chemical bonds (specifically hydrogen bonds and polarity) in the water cycle and climate moderation.", "back": "Hydrogen bonds give water its high heat capacity, allowing oceans to absorb and slowly release solar energy, moderating climate. Water's polar nature enables evaporation, cloud formation, and rain."}, {"front": "What is the primary energy transformation when water stored behind a dam is released and flows downward through penstocks?", "back": "The gravitational potential energy (PE) of the water is converted into kinetic energy (KE)."}, {"front": "What equipment in a hydroelectric dam converts the kinetic energy of moving water into mechanical energy?", "back": "Turbine blades, which spin when struck by the fast-moving water, transferring its kinetic energy."}, {"front": "What is the final energy conversion in a hydroelectric dam that makes the energy usable for consumers?", "back": "A generator converts the mechanical energy from the spinning turbine into electrical energy, which is then transmitted via power lines."}, {"front": "List some negative impacts a hydroelectric dam can have on surrounding biological systems and aquatic ecosystems.", "back": "Dams disrupt fish migration, change water flow, temperature, and oxygen levels, trap sediment, and can starve downstream ecosystems of nutrients."}, {"front": "What is the formula for calculating gravitational potential energy?", "back": "PE = mgh, where 'm' is mass, 'g' is the acceleration due to gravity, and 'h' is height."}, {"front": "If a dam holds water at a height of 80m and 500kg of water flows through per second, what is the maximum power (gravitational PE per second) available?", "back": "Power = mgh = (500kg)(9.8m/s^2)(80m) = 392,000 J/s = 392 kW."}, {"front": "If a hydroelectric dam operates with 85% efficiency, what happens to the remaining 15% of the energy?", "back": "The remaining 15% is converted to thermal energy (heat) due to friction in the pipes, turbine, and generator, consistent with the conservation of energy."}, {"front": "How does Earth Science contribute to the overall functioning and understanding of a hydroelectric dam?", "back": "Atmospheric processes, driven by solar energy, are essential for the water cycle to lift water to high elevations, providing the initial potential energy."}, {"front": "How does Chemistry play a supporting role in the energy chain of a hydroelectric dam?", "back": "The unique bonding properties of water (hydrogen bonds, polar nature) are essential for the water cycle to function, enabling evaporation, cloud formation, and heat absorption."}, {"front": "What is Physics' central contribution to harnessing energy from a hydroelectric dam?", "back": "Principles of gravitational potential energy, kinetic energy, mechanical energy, and the conversion to electrical energy are all applications of physics to extract useful energy from falling water."}, {"front": "Why is knowledge from Life Science crucial when considering hydroelectric dam projects?", "back": "Understanding ecosystem impacts is vital because dam construction can significantly disrupt biological systems, affecting water quality, habitats, and biodiversity."}, {"front": "What fundamental principle of energy is perfectly illustrated by the entire hydroelectric dam process, from sunlight to electricity?", "back": "The conservation of energy: energy is transformed at every step (e.g., solar to PE, PE to KE, mechanical to electrical) but is never created or destroyed."}, {"front": "What are some key environmental costs related to carbon emissions that might arise from flooding a valley for a new dam, even if the dam produces clean electricity?", "back": "Loss of forest means less CO2 absorption through photosynthesis. Flooding causes decomposition of organic matter, which can release CO2 and methane (CH4)."}, {"front": "What is a major energy benefit of building a hydroelectric dam compared to traditional fossil fuel power plants?", "back": "It produces clean, renewable electricity without direct combustion, thereby reducing CO2 emissions associated with fossil fuel use."}, {"front": "Besides carbon absorption and biodiversity, what additional information would be crucial for a well-reasoned decision on building a proposed dam?", "back": "How much CO2 the dam's electricity would prevent (compared to fossil fuel alternatives), what specific species live in the valley, and if there are alternative sites with less ecological impact."}, {"front": "Why does the textbook emphasize that 'Every real-world problem requires knowledge from multiple branches of science'?", "back": "Complex systems like hydroelectric dams involve interconnected processes from Earth Science, Chemistry, Physics, and Life Science, demonstrating that no single branch operates in isolation when addressing real-world challenges."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
