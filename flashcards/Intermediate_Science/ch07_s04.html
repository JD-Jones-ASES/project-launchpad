<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What striking pattern do earthquakes and volcanic eruptions show on a world map?", "back": "They cluster along narrow belts that trace the edges of tectonic plates.", "id": "fc01"}, {"front": "What causes an earthquake?", "back": "An earthquake occurs when stress that has built up along a fault is suddenly released, causing the rock to fracture and snap to a new position, releasing energy in the form of seismic waves.", "id": "fc02"}, {"front": "Define the 'focus' (or hypocenter) of an earthquake.", "back": "The focus is the point inside the Earth where the rock first breaks and the seismic energy is released.", "id": "fc03"}, {"front": "Define the 'epicenter' of an earthquake.", "back": "The epicenter is the point on Earth's surface directly above the earthquake's focus.", "id": "fc04"}, {"front": "Describe P-waves (Primary waves) in terms of motion, speed, and materials they can travel through.", "back": "P-waves are compressional (longitudinal) waves that alternately compress and stretch material. They are the fastest seismic waves (6–7 km/s in crustal rock) and can travel through solids, liquids, and gases.", "id": "fc05"}, {"front": "Describe S-waves (Secondary waves) in terms of motion, speed, and materials they can travel through.", "back": "S-waves are shear (transverse) waves that move rock side to side or up and down, perpendicular to the direction of travel. They are slower than P-waves (3.5–4 km/s) and can only travel through solids—they cannot pass through liquids.", "id": "fc06"}, {"front": "How do surface waves differ from P-waves and S-waves in terms of travel path and typical impact?", "back": "Surface waves travel along Earth's surface rather than through the interior. They are slower than both P-waves and S-waves but typically produce the largest ground motions and cause the most damage.", "id": "fc07"}, {"front": "Name the two main types of surface waves and describe their characteristic motions.", "back": "Love waves cause side-to-side horizontal shaking, and Rayleigh waves produce a rolling motion like ocean waves.", "id": "fc08"}, {"front": "What instrument is used to detect and record seismic waves, and what is the recording called?", "back": "A seismograph (or seismometer) is used to detect and record seismic waves, producing a recording called a seismogram.", "id": "fc09"}, {"front": "What does the Moment Magnitude Scale measure, and what does its logarithmic nature mean for earthquake energy?", "back": "It measures the total energy released by an earthquake. Each whole-number increase on the scale represents roughly 32 times more energy released.", "id": "fc10"}, {"front": "Why has the Moment Magnitude Scale largely replaced the Richter Scale in scientific use?", "back": "The Richter Scale, which measures seismic wave amplitude, is less accurate for very large or distant earthquakes compared to the Moment Magnitude Scale, which measures total energy released.", "id": "fc11"}, {"front": "Explain the general principle scientists use to locate an earthquake's epicenter.", "back": "Scientists compare the arrival times of P-waves and S-waves at multiple seismograph stations to determine the distance from each station (using the S–P time interval). The epicenter is then found by triangulation, where circles from at least three stations intersect.", "id": "fc12"}, {"front": "How many seismograph stations are required to pinpoint an earthquake's epicenter using triangulation?", "back": "At least three stations are needed.", "id": "fc13"}, {"front": "Besides plate boundaries, what other geological feature can cause volcanoes to form?", "back": "Hot spots—plumes of unusually hot mantle material that rise independently of plate boundaries (e.g., the Hawaiian Islands).", "id": "fc14"}, {"front": "Describe the characteristics of a shield volcano, including its lava type and eruption style.", "back": "Shield volcanoes are broad, gently sloping structures built from many thin layers of low-viscosity basaltic lava. The lava flows easily, producing relatively gentle eruptions (e.g., Mauna Loa).", "id": "fc15"}, {"front": "Describe the characteristics of a cinder cone volcano.", "back": "Cinder cone volcanoes are small, steep, cone-shaped hills built from fragments of lava (cinders, ash, and bombs) ejected during explosive eruptions. They are the simplest and smallest type (e.g., Parícutin).", "id": "fc16"}, {"front": "What are composite volcanoes (stratovolcanoes), and why are their eruptions typically dangerous?", "back": "Composite volcanoes are tall, steep, symmetrical mountains built from alternating layers of lava flows and explosive debris. Their high-viscosity magma traps gases under enormous pressure, leading to violent, dangerous explosions.", "id": "fc17"}, {"front": "Name three famous examples of composite volcanoes.", "back": "Mount St. Helens, Mount Fuji, and Mount Vesuvius.", "id": "fc18"}, {"front": "What is the 'Ring of Fire,' and what geological activities are concentrated there?", "back": "The Ring of Fire is a horseshoe-shaped belt around the Pacific Ocean where about 75% of the world's active volcanoes and 90% of its earthquakes occur, mainly due to subduction zones.", "id": "fc19"}, {"front": "Why does the San Andreas Fault experience many earthquakes but very few volcanoes?", "back": "The San Andreas Fault is a transform plate boundary where plates slide horizontally past each other. This motion causes tremendous stress and friction leading to earthquakes, but typically does not involve the magma generation or subduction required for widespread volcanism.", "id": "fc20"}, {"front": "What are some strategies for earthquake preparedness?", "back": "Strategies include building earthquake-resistant structures, preparing emergency kits, and practicing 'drop, cover, and hold on' drills.", "id": "fc21"}, {"front": "What signs do scientists monitor to provide early warnings for volcanic eruptions?", "back": "Scientists monitor ground deformation (swelling), changes in gas emissions, and small earthquakes (seismic swarms) that often precede eruptions.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
