    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 29, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an electric motor?", "back": "A device that converts electrical energy into mechanical energy (rotational motion).", "id": "fc01"}, {"front": "How does an electric motor differ from an electric generator in terms of energy conversion?", "back": "An electric motor converts electrical energy into mechanical energy, while an electric generator converts mechanical energy into electrical energy.", "id": "fc02"}, {"front": "Explain the fundamental principle by which an electric motor works.", "back": "Current passes through a coil placed in a magnetic field; the magnetic force on the current-carrying wire causes the coil to rotate.", "id": "fc03"}, {"front": "What is the purpose of a commutator in an electric motor?", "back": "It reverses the current direction in the coil every half-turn, ensuring that the torque always pushes the coil in the same rotational direction.", "id": "fc04"}, {"front": "Give two examples of common devices that use electric motors.", "back": "Fans, washing machines, electric cars, power tools, hard drives, or cell phone vibration mechanisms.", "id": "fc05"}, {"front": "Define Alternating Current (AC).", "back": "Electric current that periodically reverses direction, typically at 50 or 60 cycles per second (hertz).", "id": "fc06"}, {"front": "Define Direct Current (DC).", "back": "Electric current that flows in one direction only.", "id": "fc07"}, {"front": "Name one primary source for AC and one for DC.", "back": "AC: Generators, wall outlets. DC: Batteries, solar cells, or electronic power supplies.", "id": "fc08"}, {"front": "Why did Alternating Current (AC) become the standard for large-scale power distribution over Direct Current (DC)?", "back": "AC can be easily transformed to different voltages using transformers, which are essential for efficient long-distance transmission and safe household use. Transformers only work with AC.", "id": "fc09"}, {"front": "What two key components are typically found in a power adapter that converts wall outlet power for electronic devices like laptops?", "back": "A transformer (to step down the voltage) and a rectifier (to convert AC to DC).", "id": "fc10"}, {"front": "How are electromagnetic waves produced?", "back": "They are produced when an electric charge accelerates (vibrates, oscillates, or changes direction), creating a self-sustaining wave of oscillating electric and magnetic fields.", "id": "fc11"}, {"front": "What is the speed of electromagnetic waves in a vacuum?", "back": "Approximately 3.0 x 10^8 m/s (the speed of light, 'c').", "id": "fc12"}, {"front": "Does an electromagnetic wave require a medium to travel? Explain.", "back": "No, it does not. It is a self-sustaining wave of electric and magnetic fields and can travel through the vacuum of space.", "id": "fc13"}, {"front": "Who was James Clerk Maxwell, and what was his greatest intellectual triumph?", "back": "A Scottish physicist who unified electricity, magnetism, and light into a single theoretical framework, expressed in Maxwell's equations.", "id": "fc14"}, {"front": "What was Maxwell's stunning conclusion after calculating the speed of his predicted electromagnetic waves?", "back": "He concluded that light itself is an electromagnetic wave, as its calculated speed matched the measured speed of light.", "id": "fc15"}, {"front": "List at least three different phenomena that Maxwell's unification showed to be fundamentally the same, differing only in wavelength and frequency.", "back": "Visible light, radio waves, microwaves, infrared, ultraviolet, X-rays, and gamma rays.", "id": "fc16"}, {"front": "How did Maxwell's work influence Einstein's theory of special relativity?", "back": "The constant speed of light appearing in Maxwell's equations (the same for all observers) was a crucial clue that led Einstein to rethink the nature of space and time.", "id": "fc17"}, {"front": "Give one example of how electromagnetic waves play a crucial role in biology.", "back": "Visible light drives photosynthesis, infrared radiation warms organisms, or ultraviolet radiation causes mutations in DNA/sunburn.", "id": "fc18"}, {"front": "In an electric vehicle, describe the energy conversion during acceleration versus during regenerative braking.", "back": "During acceleration, the motor converts electrical energy to mechanical energy. During regenerative braking, the motor acts as a generator, converting kinetic energy back into electrical energy to recharge the battery.", "id": "fc19"}, {"front": "Why is regenerative braking considered more energy-efficient than traditional friction brakes?", "back": "Regenerative braking converts kinetic energy back into storable electrical energy, while traditional friction brakes convert kinetic energy into thermal energy (heat) that is lost to the environment.", "id": "fc20"}, {"front": "Why can regenerative braking never recover 100% of the kinetic energy? Provide two reasons.", "back": "Energy is lost as heat in the generator's coil wires ($I^2R$ losses), the battery charging process is not 100% efficient, and mechanical friction in the drivetrain dissipates some energy.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
