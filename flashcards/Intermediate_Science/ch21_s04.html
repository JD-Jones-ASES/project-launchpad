<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 21, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the biological species concept?", "back": "A species is a group of organisms that can interbreed and produce fertile offspring under natural conditions."}, {"front": "Give an example that illustrates the biological species concept, specifically regarding fertile offspring.", "back": "Horses and donkeys can mate, but their offspring (mules) are sterile, meaning horses and donkeys are separate species."}, {"front": "Define speciation.", "back": "The process by which one species splits into two or more distinct species."}, {"front": "What must happen for speciation to occur, related to interbreeding?", "back": "Populations of a species must become reproductively isolated—they can no longer interbreed—and then evolve independently."}, {"front": "What is geographic isolation?", "back": "When a physical barrier (like a mountain range, river, ocean, or even a highway) divides a population into two or more groups, preventing gene flow."}, {"front": "Describe the process of allopatric speciation.", "back": "Geographic isolation stops gene flow, leading to different environmental conditions, selection pressures, and genetic drift in separated groups. Over time, they accumulate enough genetic differences to become reproductively isolated and form new species even if the barrier is removed."}, {"front": "What does 'allopatric' mean in allopatric speciation?", "back": "From Greek, 'allo-' meaning other, and 'patris' meaning homeland, referring to the separation of populations into different geographic areas."}, {"front": "Provide a classic example of allopatric speciation.", "back": "The Galápagos finches, where an ancestral finch species diversified into 13 or more distinct species on different islands due to adaptation to various food sources."}, {"front": "Define adaptive radiation.", "back": "The rapid diversification of a single ancestral species into many new species, each adapted to a different ecological niche."}, {"front": "What events often trigger adaptive radiation?", "back": "The colonization of a new environment (such as an island chain) or a mass extinction event that opens up many ecological opportunities."}, {"front": "Name two examples of adaptive radiation besides the Galápagos finches.", "back": "Hawaiian honeycreepers, and the diversification of mammals after the extinction of non-avian dinosaurs 66 million years ago."}, {"front": "When does extinction occur, and what percentage of species have gone extinct?", "back": "Extinction occurs when the last individual of a species dies. Over 99% of all species that have ever existed are now extinct."}, {"front": "Differentiate between background extinction and mass extinction.", "back": "Background extinction is the normal, ongoing loss of species due to factors like environmental change and competition. Mass extinction events are episodes where a large percentage of species disappear in a geologically short time."}, {"front": "How many major mass extinctions are documented in the fossil record, and what caused the most recent one?", "back": "Five major mass extinctions are documented. The most recent was 66 million years ago, caused by an asteroid impact that wiped out non-avian dinosaurs."}, {"front": "What pattern often follows a mass extinction event?", "back": "Adaptive radiation, where surviving species diversify to fill the newly empty ecological niches."}, {"front": "What is a cladogram, and what does each branching point represent?", "back": "A branching diagram that shows the evolutionary relationships among a group of organisms based on shared derived characteristics. Each branching point (node) represents a common ancestor."}, {"front": "In a cladogram, what does a tip of a branch represent, and how can you tell which species are more closely related?", "back": "Each tip represents a living species or group. Species that share a more recent common ancestor (a closer branching point) are more closely related."}, {"front": "What are shared derived characters, and why are they important for cladograms?", "back": "Traits that evolved in an ancestor and are present in its descendants but absent in more distantly related groups. They are used to build cladograms because they indicate common ancestry."}, {"front": "Give an example of a shared derived character mentioned in the text.", "back": "The amniotic egg is a shared derived character of reptiles, birds, and mammals, distinguishing them from amphibians."}, {"front": "List the levels of biological classification from broadest to most specific.", "back": "Domain, Kingdom, Phylum, Class, Order, Family, Genus, Species. (Mnemonic: Dear King Philip Came Over For Good Spaghetti.)"}, {"front": "What is the basis for modern biological classification, and why can organisms that look similar sometimes be classified far apart?", "back": "Modern classification is based on evolutionary relationships revealed by DNA analysis and cladistics. Organisms that look similar (like sharks and dolphins) may be classified far apart if their molecular evidence and shared derived characters reveal distant ancestry."}, {"front": "In the natural selection simulation with colored paper squares on a green background, which color(s) would likely have the highest survival rate?", "back": "Green and brown paper squares, because they blend in with the green background (camouflage) and are harder for 'predators' to find."}, {"front": "Explain why certain colors decreased the most or went extinct in the simulation, in terms of natural selection.", "back": "Colors that did not blend in (e.g., red, blue, yellow on a green background) were more easily spotted and 'eaten' by predators. This differential survival means fewer of them 'reproduced,' leading to a decline or extinction over generations."}, {"front": "How does the simulation model the key steps of natural selection (variation, competition, differential survival, reproduction)?", "back": "It shows variation (different prey colors), competition (predators hunting prey), differential survival (camouflaged prey survive better), and reproduction (surviving prey double their numbers)."}, {"front": "What are two limitations of the paper square simulation compared to real natural selection?", "back": "Two limitations include: prey don't physically reproduce or develop new mutations, the environment is static, and predators are not real, evolving organisms with complex hunting strategies."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
