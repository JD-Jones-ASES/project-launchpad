<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary function of the cell membrane?", "back": "To maintain a specific internal environment within the cell, controlling the concentrations of water, ions, nutrients, and waste products."}, {"front": "Describe the basic structure of a phospholipid molecule.", "back": "It has a round hydrophilic (water-loving) \"head\" and two long hydrophobic (water-fearing) fatty acid \"tails.\""}, {"front": "How do phospholipids spontaneously arrange themselves in a watery environment to form a cell membrane?", "back": "They form a double layer (bilayer) where the hydrophilic heads face outward towards the watery fluids, and the hydrophobic tails face inward, shielded from water."}, {"front": "Define \"phospholipid bilayer.\"", "back": "The double-layered sheet of phospholipid molecules that forms the core structure of the cell membrane, with hydrophilic heads facing outward and hydrophobic tails facing inward."}, {"front": "What are the two main types of proteins found in the cell membrane based on their location, and what are their general functions?", "back": "Integral (or transmembrane) proteins span the entire membrane, acting as channels, pores, or receptors. Peripheral proteins sit on one surface, often functioning as enzymes or receptors."}, {"front": "Explain the \"fluid mosaic model\" of the cell membrane.", "back": "It describes the membrane as \"fluid\" because the lipids and proteins can drift and flow past one another, and \"mosaic\" because the scattered proteins form a patchwork pattern within the lipid bilayer."}, {"front": "What does it mean for the cell membrane to be \"selectively permeable\"?", "back": "It means the membrane allows some substances to pass through while preventing others from crossing, enabling the cell to maintain a controlled internal environment."}, {"front": "Which types of molecules can typically pass directly through the phospholipid bilayer without assistance?", "back": "Small, nonpolar molecules like oxygen (O2) and carbon dioxide (CO2), and small polar molecules like water (though slowly on their own)."}, {"front": "What is passive transport?", "back": "Movement of substances across the cell membrane that does not require the cell to expend energy, driven by natural molecular motion down a concentration gradient."}, {"front": "Define \"diffusion\" and give a common example.", "back": "The net movement of molecules or ions from a region of higher concentration to a region of lower concentration, driven by random thermal motion. Example: The scent of perfume spreading across a room."}, {"front": "What is a \"concentration gradient\"?", "back": "A difference in the concentration of a substance across a space or membrane, which drives passive movement such as diffusion."}, {"front": "Define \"osmosis.\"", "back": "The diffusion of water across a selectively permeable membrane from a region of higher water concentration (lower solute concentration) to a region of lower water concentration (higher solute concentration)."}, {"front": "Describe what happens to an animal cell when placed in a hypotonic solution.", "back": "Water moves into the cell, causing it to swell and potentially burst (a process called lysis)."}, {"front": "Describe what happens to a plant cell when placed in a hypertonic solution.", "back": "Water moves out of the cell, causing the central vacuole to shrink and the cell membrane to pull away from the cell wall (a process called plasmolysis)."}, {"front": "Why are hospital IV fluids typically made to be isotonic?", "back": "To prevent the patient's red blood cells from either swelling and bursting (lysis) in a hypotonic solution or shrinking (crenation) in a hypertonic solution."}, {"front": "What is facilitated diffusion? How is it similar to and different from simple diffusion?", "back": "Facilitated diffusion is passive transport where large or charged molecules are helped across the membrane by transport proteins (channels or carriers). It's similar to simple diffusion because both are passive and move down a concentration gradient, but different because facilitated diffusion requires proteins."}, {"front": "What is active transport? What is its primary energy source?", "back": "The movement of molecules or ions across a cell membrane from a region of lower concentration to a region of higher concentration (against the gradient), requiring the cell to expend energy, usually in the form of ATP."}, {"front": "Give an example of an important active transport pump and briefly explain its function.", "back": "The sodium-potassium pump moves sodium ions (Na+) out of the cell and potassium ions (K+) into the cell, both against their concentration gradients, which is essential for nerve function, muscle contraction, and water balance."}, {"front": "Differentiate between endocytosis and exocytosis.", "back": "Endocytosis is when the cell membrane folds inward to engulf material from outside, forming a vesicle to bring it into the cell. Exocytosis is when a vesicle inside the cell fuses with the cell membrane and releases its contents to the outside."}, {"front": "Why is selective permeability essential for cell survival?", "back": "It prevents the cell's carefully regulated internal chemistry from collapsing by controlling what enters and leaves, allowing the cell to maintain its specific internal environment."}, {"front": "Predict what would happen to a potato strip placed in a beaker of pure distilled water, and explain why.", "back": "The potato cells would be in a hypotonic solution relative to pure water. Water would move into the potato cells by osmosis, making the strip firmer and potentially increasing its mass and length as cells become turgid."}, {"front": "What role do aquaporins play in water movement across the cell membrane?", "back": "Aquaporins are special channel proteins that allow water molecules to pass more rapidly across the membrane than they would on their own, significantly speeding up osmosis."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
