<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 13, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Intermediate_Science">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an ionic bond?", "back": "An ionic bond is a bond formed by the electrostatic attraction between a positively charged ion (cation) and a negatively charged ion (anion)."}, {"front": "Between what types of elements do ionic bonds typically form?", "back": "Ionic bonds typically form between a metal (low electronegativity) and a nonmetal (high electronegativity)."}, {"front": "Describe the process of electron transfer in the formation of an ionic bond.", "back": "One or more electrons are transferred from the metal atom to the nonmetal atom. The metal loses electrons to become a cation, and the nonmetal gains electrons to become an anion."}, {"front": "What happens to a metal atom when it forms an ionic bond?", "back": "A metal atom loses one or more valence electrons to become a positively charged ion (cation)."}, {"front": "What happens to a nonmetal atom when it forms an ionic bond?", "back": "A nonmetal atom gains one or more electrons to become a negatively charged ion (anion)."}, {"front": "In the formation of sodium chloride, what is the electron configuration of a sodium ion (Na+)?", "back": "The electron configuration of a sodium ion (Na+) is 2, 8 (like neon)."}, {"front": "In the formation of sodium chloride, what is the electron configuration of a chloride ion (Cl-)?", "back": "The electron configuration of a chloride ion (Cl-) is 2, 8, 8 (like argon)."}, {"front": "Write the chemical equation for a sodium atom losing an electron to become an ion.", "back": "Na -> Na+ + e-"}, {"front": "Write the chemical equation for a chlorine atom gaining an electron to become an ion.", "back": "Cl + e- -> Cl-"}, {"front": "Write the overall chemical equation representing the formation of sodium chloride from its ions.", "back": "Na+ + Cl- -> NaCl"}, {"front": "How many electrons does a magnesium atom (Group 2) typically lose to form an ion in an ionic compound?", "back": "A magnesium atom loses two electrons to form a Mg^2+ ion."}, {"front": "How many electrons does an oxygen atom (Group 16) typically gain to form an ion in an ionic compound?", "back": "An oxygen atom gains two electrons to form an O^2- ion."}, {"front": "What is a formula unit in the context of ionic compounds?", "back": "A formula unit is the simplest ratio of ions in an ionic compound (e.g., NaCl for sodium chloride). It does not represent an individual molecule."}, {"front": "How do formula units differ from individual molecules?", "back": "Unlike molecules, formula units do not represent individual particles. They simply indicate the simplest whole-number ratio of ions within a larger crystal lattice structure."}, {"front": "What is a crystal lattice?", "back": "A crystal lattice is a regular, repeating three-dimensional arrangement of ions in an ionic compound."}, {"front": "What is the primary purpose of the arrangement of ions in a crystal lattice?", "back": "The arrangement of ions in a crystal lattice maximizes attractive forces between opposite charges and minimizes repulsive forces between like charges."}, {"front": "Do ionic compounds exist as individual molecules? Explain.", "back": "No, ionic compounds do not exist as individual molecules. They form vast, three-dimensional crystal lattices where billions of ions are arranged in a perfectly regular pattern."}, {"front": "Why do ionic compounds generally have high melting and boiling points?", "back": "Ionic compounds have high melting and boiling points because breaking the crystal lattice requires overcoming many strong electrostatic attractions between the ions, which demands a significant amount of energy."}, {"front": "Describe the typical hardness and brittleness of ionic compounds.", "back": "Ionic compounds are typically hard due to their rigid lattice structure. However, they are brittle because if a force shifts one layer of ions, like-charged ions align and repel each other, causing the crystal to shatter along clean planes."}, {"front": "Under what conditions do ionic compounds conduct electricity, and why?", "back": "Ionic compounds conduct electricity when dissolved in water or melted, because their ions are then free to move and carry charge. They do not conduct electricity as solids because the ions are locked in place within the lattice."}, {"front": "Why are many ionic compounds soluble in water?", "back": "Many ionic compounds are soluble in water because polar water molecules can surround and separate the ions from the crystal lattice, effectively dissolving the compound."}, {"front": "How does ionic bonding relate to the properties of minerals in Earth's crust?", "back": "Many minerals, such as halite (NaCl) and calcite (CaCO3), are ionic compounds. Their unique properties like hardness, luster, and crystal shape originate from their specific ionic bonding and crystal lattice structures."}, {"front": "Why does a sodium atom readily give up its valence electron to form an ionic bond?", "back": "Sodium has one lonely valence electron that it holds weakly (low ionization energy), making it energetically favorable to lose this electron to achieve a stable, full outer shell like neon."}, {"front": "Why does a chlorine atom readily gain an electron to form an ionic bond?", "back": "Chlorine has seven valence electrons and a high electronegativity, so it strongly 'wants' one more electron to complete its octet and achieve a stable, full outer shell like argon."}, {"front": "What property of water allows it to dissolve many ionic compounds?", "back": "Water molecules are polar, meaning they have a slight positive end and a slight negative end. This polarity allows them to attract and surround individual ions, pulling them away from the crystal lattice."}, {"front": "When an ionic crystal shatters, what causes it to cleave along clean planes?", "back": "If an external force shifts one layer of ions relative to another, ions of like charge can line up, leading to strong repulsive forces that cause the crystal to shatter along flat, clean planes."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
