<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Intermediate Science &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Intermediate_Science.html">&larr; Back to Intermediate Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is an electron configuration?", "back": "An electron configuration is a description of how electrons are distributed among the energy levels (shells) of an atom.", "id": "fc01"}, {"front": "Define an energy level (or shell) in an atom.", "back": "An energy level (or shell) is a specific region around the nucleus where electrons are found. Each energy level can hold a limited number of electrons.", "id": "fc02"}, {"front": "How does the energy of an electron relate to its energy level (shell number)?", "back": "Electrons in lower energy levels (closer to the nucleus) have lower energy. Electrons in higher energy levels (farther from the nucleus) have more energy.", "id": "fc03"}, {"front": "What formula determines the maximum number of electrons that can occupy an energy level 'n'?", "back": "The maximum number of electrons in energy level 'n' is given by the formula $2n^2$.", "id": "fc04"}, {"front": "According to the $2n^2$ formula, what is the maximum number of electrons in the first three energy levels?", "back": "Level 1: $2(1)^2 = 2$ electrons. Level 2: $2(2)^2 = 8$ electrons. Level 3: $2(3)^2 = 18$ electrons.", "id": "fc05"}, {"front": "For the first 20 elements, how many electrons does the third energy level typically hold before the fourth level starts filling?", "back": "For the first 20 elements, the third energy level typically fills to 8 electrons before the fourth level begins to accept electrons.", "id": "fc06"}, {"front": "What is the first step when writing the electron configuration for a neutral atom?", "back": "The first step is to determine the number of electrons in the neutral atom, which is equal to its atomic number (Z).", "id": "fc07"}, {"front": "Write the electron configuration for sodium (Na), which has an atomic number (Z) of 11.", "back": "2–8–1 (2 electrons in level 1, 8 in level 2, 1 in level 3).", "id": "fc08"}, {"front": "Write the electron configuration for chlorine (Cl), which has an atomic number (Z) of 17.", "back": "2–8–7 (2 electrons in level 1, 8 in level 2, 7 in level 3).", "id": "fc09"}, {"front": "What is a Bohr diagram used for in chemistry?", "back": "A Bohr diagram is a visual representation of an atom's electron configuration, showing the nucleus at the center surrounded by concentric circles representing energy levels with dots for electrons.", "id": "fc10"}, {"front": "What common feature in the electron configurations of helium, neon, and argon explains their stability and low reactivity?", "back": "They all have completely filled outermost energy levels (shells), which is an especially stable electron arrangement, making them noble gases.", "id": "fc11"}, {"front": "Define a valence electron.", "back": "A valence electron is an electron located in the outermost energy level (shell) of an atom.", "id": "fc12"}, {"front": "Why are valence electrons crucial for an atom's chemical behavior?", "back": "Valence electrons are the electrons involved in chemical bonding (transferred or shared) and thus determine an element's chemical reactivity.", "id": "fc13"}, {"front": "How many valence electrons does an oxygen atom (electron configuration 2–6) have?", "back": "An oxygen atom has 6 valence electrons.", "id": "fc14"}, {"front": "How many valence electrons does a potassium atom (electron configuration 2–8–8–1) have?", "back": "A potassium atom has 1 valence electron.", "id": "fc15"}, {"front": "For main-group elements, what is a simple shortcut to determine the number of valence electrons?", "back": "The number of valence electrons for main-group elements equals their group number (using the older 1–8 numbering system) on the periodic table.", "id": "fc16"}, {"front": "What is a Lewis dot structure?", "back": "A Lewis dot structure is a diagram that shows the chemical symbol of an element surrounded by dots, with each dot representing a valence electron. It's used to predict how atoms will bond.", "id": "fc17"}, {"front": "Describe the proper way to place dots around an element's symbol when drawing a Lewis dot structure.", "back": "Place one dot on each of the four sides (top, bottom, left, right) of the symbol first. If there are more valence electrons, then pair them up on the sides.", "id": "fc18"}, {"front": "What is the 'octet rule' and how does it relate to atomic stability?", "back": "The octet rule states that atoms tend to gain, lose, or share electrons until they achieve a full outer shell, typically with 8 valence electrons (or 2 for hydrogen and helium), which is a stable arrangement.", "id": "fc19"}, {"front": "Using Lewis dot structures, how would you predict the bonding interaction between sodium (1 valence electron) and chlorine (7 valence electrons)?", "back": "Sodium tends to lose its single valence electron to achieve a full inner shell, forming a positive ion. Chlorine tends to gain one electron to complete its octet, forming a negative ion. This electron transfer forms an ionic bond.", "id": "fc20"}, {"front": "How do the number of valence electrons predict whether an atom will form a cation or an anion?", "back": "Atoms with 1, 2, or 3 valence electrons tend to lose electrons and form positive ions (cations). Atoms with 5, 6, or 7 valence electrons tend to gain electrons and form negative ions (anions).", "id": "fc21"}, {"front": "What is unique about atoms with 4 valence electrons (like carbon) compared to those with 1, 2, 3 or 5, 6, 7 valence electrons in terms of bonding behavior?", "back": "Atoms with 1, 2, or 3 valence electrons typically lose them, and atoms with 5, 6, or 7 typically gain them. Atoms with 4 valence electrons (like carbon) typically share electrons with other atoms to achieve stability.", "id": "fc22"}, {"front": "Explain why elements in the same column (group) of the periodic table, such as lithium, sodium, and potassium, tend to exhibit similar chemical properties.", "back": "Elements in the same column of the periodic table have the same number of valence electrons (e.g., lithium, sodium, and potassium all have 1). Since valence electrons determine chemical reactivity, these elements behave similarly.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
