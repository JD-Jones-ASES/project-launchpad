    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                </div>

    <script>
    var CARDS = [{"front": "What is the setting of the Apology, and how did the Athenian legal system work?", "back": "Socrates stands before a jury of 501 citizens in an Athenian dikasterion (law court) in 399 BC. There were no judges, lawyers, or rules of evidence. Any citizen could bring charges; the accuser spoke first, then the accused, and the jury voted immediately by dropping pebbles into urns.", "id": "fc01"}, {"front": "What distinction does Socrates draw between his 'old accusers' and his 'new accusers'?", "back": "The old accusers are years of gossip, suspicion, and comic ridicule -- especially Aristophanes' play The Clouds, which portrayed Socrates as a charlatan. The new accusers are three specific men: Meletus (a poet), Anytus (a wealthy politician), and Lycon (an orator). Socrates considers the old accusers far more dangerous.", "id": "fc02"}, {"front": "What were the two formal charges against Socrates at his trial?", "back": "First, corrupting the young -- turning them against the values of their parents and city. Second, impiety (asebeia) -- not believing in the city's gods and introducing new divinities (his daimonion, an inner divine sign).", "id": "fc03"}, {"front": "How did Aristophanes' comedy The Clouds misrepresent Socrates?", "back": "It portrayed Socrates as running a 'Thinkery' where students learned dishonest arguments, and showed him studying clouds and heavenly bodies. The real Socrates had no interest in natural science and never charged fees, but the caricature stuck for decades.", "id": "fc04"}, {"front": "What is parrhesia, and how does Socrates use it in his opening remarks?", "back": "Parrhesia means 'frank speech' -- speaking openly without artifice. Socrates warns the jury not to expect polished rhetoric, saying he will speak plainly as he always does. This distinguishes him from the Sophists but also risks alienating a jury that expects eloquence.", "id": "fc05"}, {"front": "What did the Oracle at Delphi declare about Socrates, and how did he respond?", "back": "Socrates' friend Chaerephon asked the Pythia (priestess of Apollo) if anyone was wiser than Socrates. The oracle said no one was. Puzzled, Socrates set out to test this by questioning those reputed to be wise: politicians, poets, and craftsmen.", "id": "fc06"}, {"front": "What did Socrates discover when he questioned the politicians, poets, and craftsmen of Athens?", "back": "The politicians thought they were wise but could not defend their views. The poets produced beautiful work but could not explain its meaning, composing by 'genius and inspiration' rather than wisdom. The craftsmen had genuine expertise but wrongly assumed it extended to everything else.", "id": "fc07"}, {"front": "Define Socratic ignorance and explain why Socrates considered it a form of wisdom.", "back": "Socrates does not claim knowledge is impossible. He claims he lacks deep wisdom (sophia) about the great questions of life. His advantage is that he does not pretend to have answers he lacks. Others claimed knowledge they did not possess; Socrates at least recognized his own ignorance -- the starting point of genuine inquiry.", "id": "fc08"}, {"front": "How does Socrates connect his philosophical mission to the charge of impiety?", "back": "He argues that his mission of testing and questioning was given to him by the god Apollo through the oracle. His entire philosophical career is an act of obedience to a divine command -- making it deeply ironic that he is charged with impiety.", "id": "fc09"}, {"front": "How does Socrates expose a contradiction in Meletus' charges during cross-examination?", "back": "Meletus claims Socrates is a complete atheist who believes in no gods, but the indictment says Socrates introduces new divinities (his daimonion). These claims contradict each other -- one cannot introduce divine things while believing in no divine things at all.", "id": "fc10"}, {"front": "What is the gadfly speech, and what does it reveal about Socrates' self-understanding?", "back": "Socrates compares himself to a gadfly (myops) that stings a large, noble, but sluggish horse (Athens) into wakefulness. His mission is not to provide answers but to provoke citizens into examining their beliefs. Philosophy is not a body of doctrines but the activity of relentless, often uncomfortable questioning.", "id": "fc11"}, {"front": "What was the outcome of the vote at Socrates' trial, and what counter-penalty did he propose?", "back": "The jury voted 280 to 221 for conviction (a shift of 30 votes would have acquitted him). When Meletus proposed death, Socrates audaciously proposed free meals at the Prytaneum -- the honor given to Olympic victors -- claiming his philosophical mission was Athens' greatest service.", "id": "fc12"}, {"front": "What was the Prytaneum, and why was Socrates' proposal so provocative?", "back": "The Prytaneum was Athens' state dining hall where Olympic victors, war heroes, and distinguished servants were honored with free meals. By proposing this as his 'punishment,' Socrates claimed his gadfly mission was more valuable than any athletic victory, which angered wavering jurors.", "id": "fc13"}, {"front": "What two possibilities does Socrates offer regarding the nature of death?", "back": "Either death is annihilation -- a complete lack of consciousness like dreamless sleep, which would be restful and pleasant -- or it is a migration of the soul to another place, where Socrates could spend eternity questioning the great heroes and thinkers of the past.", "id": "fc14"}, {"front": "What are Socrates' famous closing words at the trial?", "back": "'The hour of departure has arrived, and we go our ways -- I to die, and you to live. Which is better, only the god knows.'", "id": "fc15"}, {"front": "Explain Socrates' claim that 'the unexamined life is not worth living.'", "back": "Socrates means that a human life without philosophical self-scrutiny -- without questioning beliefs, testing values, and asking whether one is living rightly -- is not a fully human life. It is the life of a sleepwalker, comfortable but unconscious. The examined life is the only life that takes seriously what it means to be human.", "id": "fc16"}, {"front": "How does the Apology connect philosophy to rhetoric, and what contrast does Socrates draw?", "back": "Professional orators use emotional appeals, tears, and flattery to manipulate juries. Socrates refuses all of this, arguing that the jury's job is to judge truth, not distribute favors. Truth is discovered by argument, not emotional pressure. A juror who acquits out of pity is being manipulated, not doing justice.", "id": "fc17"}, {"front": "What is the Allegory of the Cave, and how does it connect to the Apology?", "back": "In the Republic, Plato describes prisoners chained in a cave, seeing only shadows on a wall. One prisoner is freed and ascends to see real objects and finally the sun (the Form of the Good). The allegory extends the Apology's theme: most people mistake opinion for knowledge, and the philosopher's painful ascent from shadows to truth mirrors Socrates' mission in Athens.", "id": "fc18"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
