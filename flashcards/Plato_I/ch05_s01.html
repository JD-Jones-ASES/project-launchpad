<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Alfred North Whitehead, the European philosophical tradition consists of a series of _____ to Plato.", "back": "footnotes"}, {"front": "What was the title of the 1929 book by Alfred North Whitehead that famously characterized the legacy of Plato?", "back": "Process and Reality"}, {"front": "What does Alfred North Whitehead mean when he refers to Western philosophy as \"footnotes to Plato\"?", "back": "The fundamental questions Plato asked are still the primary subjects of philosophical debate today."}, {"front": "Concept: Metaphysics", "back": "Definition: The branch of philosophy concerned with the ultimate nature of reality, including what exists and how the world is structured."}, {"front": "What central question regarding piety and goodness is posed in Plato's dialogue, the *Euthyphro*?", "back": "Is goodness defined by God's command, or does God command it because it is already good?"}, {"front": "In the *Apology*, what did Socrates famously claim about the value of an unexamined life?", "back": "The unexamined life is not worth living."}, {"front": "According to the *Apology*, what pursuit should matter more than wealth, reputation, or survival?", "back": "The pursuit of wisdom."}, {"front": "What principle regarding legal obedience does Socrates maintain in the dialogue *Crito*?", "back": "We must obey just laws even when it involves a personal cost of everything."}, {"front": "What ethical stance does Socrates take in the *Crito* regarding responding to injustice?", "back": "We must never return injustice for injustice."}, {"front": "In what year did Plato found the Academy?", "back": "387 BC"}, {"front": "Where was Plato’s Academy located in relation to Athens?", "back": "In a grove sacred to the hero Akademos on the outskirts of the city."}, {"front": "How did the Academy differ from a modern school in its structure?", "back": "It was a community of thinkers who discussed philosophy, mathematics, and science rather than a system of classrooms and exams."}, {"front": "For how many years did the Academy operate as an institution of higher learning?", "back": "Nearly nine hundred years."}, {"front": "In what year was the Academy finally closed by the Emperor Justinian?", "back": "AD 529"}, {"front": "What was Emperor Justinian’s primary reason for shutting down all pagan philosophical schools?", "back": "Christianity had become the official religion of the Roman Empire."}, {"front": "Besides philosophy, what three specific mathematical subjects were studied at the Academy?", "back": "Geometry, astronomy, and harmonics."}, {"front": "Term: Harmonics", "back": "Definition: The mathematical study of musical intervals and ratios."}, {"front": "Why did Plato believe mathematical reasoning was essential for students at the Academy?", "back": "It trained the mind to think abstractly and grasp universal truths rather than particular objects."}, {"front": "What famous inscription allegedly hung over the entrance to the Academy?", "back": "Let no one ignorant of geometry enter here."}, {"front": "For how many years did Aristotle remain at the Academy as Plato’s student?", "back": "Twenty years."}, {"front": "How did Aristotle's view on universals differ from Plato's Theory of Forms?", "back": "Aristotle insisted that universals exist within particular things rather than apart from them."}, {"front": "In Raphael’s *The School of Athens*, what is symbolized by Plato pointing upward?", "back": "His belief in the eternal Forms as the source of all reality."}, {"front": "In Raphael’s *The School of Athens*, what is symbolized by Aristotle extending his hand over the earth?", "back": "His focus on the natural world of experience as the location of reality."}, {"front": "What was the name of the school founded by Aristotle after he left Athens?", "back": "The Lyceum."}, {"front": "By what title was Aristotle known to medieval scholars?", "back": "The Philosopher."}, {"front": "Plato's Theory of _____ argues that perfect, unchanging realities exist behind every physical object.", "back": "Forms"}, {"front": "What is the Greek term Plato used for the eternal realities known as Forms or Ideas?", "back": "eide"}, {"front": "In the dialogue *Phaedo*, what does Socrates argue happens to the soul after the death of the body?", "back": "The soul survives death because it belongs to the realm of the eternal Forms."}, {"front": "According to Plato's *Republic*, who should govern the ideal city to ensure true justice?", "back": "Philosopher-kings."}, {"front": "In the *Republic*, what specific knowledge qualifies philosophers to rule a society?", "back": "They have seen the Form of the Good."}, {"front": "What is Plato's doctrine regarding the nature of learning and the soul's prior knowledge?", "back": "Knowledge as recollection (learning is remembering)."}, {"front": "In the dialogue *Meno*, how does Socrates demonstrate that learning is actually recollection?", "back": "He leads an uneducated slave boy through a geometric proof using only questions."}, {"front": "What is the meaning of the Latin paraphrase \"amicus Plato, sed magis amica veritas\"?", "back": "Plato is dear to me, but dearer still is truth."}, {"front": "Who was the founder of Neoplatonism in the 3rd century AD?", "back": "Plotinus"}, {"front": "What is the title of the six groups of treatises written by Plotinus and collected by his student Porphyry?", "back": "The Enneads"}, {"front": "In Plotinus's philosophical system, what is \"the One\"?", "back": "A supreme principle so perfect and simple that it is beyond all"}, {"front": "In Neoplatonism, what is the divine Mind or Intellect that contains the Platonic Forms called?", "back": "Nous"}, {"front": "According to Plotinus, what is the correct hierarchical order of reality proceeding from the One?", "back": "The One rightarrow Nous (Intellect) rightarrow Soul rightarrow material world."}, {"front": "Plotinus compared the flow of existence from the One to what natural phenomenon?", "back": "Light radiating from a sun."}, {"front": "What did Plotinus consider the ultimate goal of human life?", "back": "To achieve mystical union with the One."}, {"front": "How did Neoplatonism impact early Christian theologians?", "back": "It provided a philosophical language to help articulate convictions about God, creation, and the soul."}, {"front": "Which philosopher stayed at the Academy for twenty years after arriving as a seventeen-year-old from Macedon?", "back": "Aristotle"}, {"front": "The grove where Plato founded his school was named after which hero?", "back": "Akademos"}, {"front": "According to Plato, why does musical harmony reflect the underlying nature of reality?", "back": "It can be expressed in numerical ratios, suggesting that mathematics underlies everything."}, {"front": "What specific branch of philosophy addresses the \"ultimate nature of reality\" and was famously shaped by Plato's Theory of Forms?", "back": "Metaphysics"}, {"front": "What is the primary significance of Plato's legacy according to the \"key concept\" in the text?", "back": "It is a set of questions that every subsequent generation has been compelled to answer."}, {"front": "In the *Phaedo*, Plato suggests that the soul exists _____ birth.", "back": "before"}, {"front": "Who was the student responsible for collecting and organizing the writings of Plotinus?", "back": "Porphyry"}, {"front": "Plato’s idea that the ideal city would be governed by philosophers launched centuries of debate on the relationship between _____ and political power.", "back": "wisdom"}, {"front": "What historical transition occurred during the final centuries of the Academy’s operation?", "back": "Christianity became the official religion of the Roman Empire."}, {"front": "Concept: The One (Plotinus)", "back": "Definition: A source of being so simple and perfect that it exists beyond all"}, {"front": "In what specific dialogue does Socrates argue that learning is a process of the soul remembering what it once knew?", "back": "The *Meno*"}, {"front": "Which famous student of Plato eventually tutored Alexander the Great?", "back": "Aristotle"}, {"front": "Plato regarded the study of _____ as evidence that mathematics underlies reality.", "back": "harmonics"}, {"front": "What term describes the transformation of Plato's ideas into a grand system by Plotinus?", "back": "Neoplatonism"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
