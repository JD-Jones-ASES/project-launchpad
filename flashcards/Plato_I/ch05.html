    <script>
    var CARDS = [{"front": "What did Alfred North Whitehead mean when he said Western philosophy 'consists of a series of footnotes to Plato'?", "back": "He did not mean every philosopher repeated Plato. He meant that the questions Plato asked -- about justice, knowledge, reality, the soul, and the good life -- are still the questions philosophers argue about today. Every generation of thinkers has had to respond to Plato, whether by agreeing, refining, or pushing back."}, {"front": "What was Plato's Academy, and why is it historically significant?", "back": "Founded in 387 BC in a grove sacred to the hero Akademos outside Athens, it was a community of thinkers who studied philosophy, mathematics, and science. It continued for nearly nine hundred years -- the longest-running institution of higher learning in the ancient world -- until Emperor Justinian closed it in AD 529."}, {"front": "What subjects were studied at Plato's Academy, and why did Plato value mathematics?", "back": "Students studied philosophy, geometry, astronomy, and harmonics (the mathematical study of musical intervals). Plato believed mathematical reasoning trained the mind to think abstractly -- to look past the particular and grasp the universal. A legendary inscription read: 'Let no one ignorant of geometry enter here.'"}, {"front": "How did Aristotle's philosophy differ from Plato's regarding the Forms?", "back": "Where Plato looked upward to eternal Forms as the source of all reality, Aristotle insisted that universals exist in particular things, not apart from them. Aristotle famously wrote 'Plato is dear to me, but dearer still is truth.' Raphael captured this in The School of Athens: Plato points to the heavens while Aristotle gestures over the earth."}, {"front": "List four of Plato's most influential philosophical ideas.", "back": "1) The Theory of Forms -- eternal, perfect realities behind particular things. 2) The immortality of the soul -- argued in the Phaedo. 3) The philosopher-king -- in the Republic, philosophers should govern the ideal city. 4) Knowledge as recollection -- learning is remembering what the soul once knew."}, {"front": "Who was Plotinus, and what is Neoplatonism?", "back": "Plotinus (c. 204-270 AD) transformed Plato's ideas into a grand system. He proposed that all reality flows from a single supreme principle called 'the One,' from which proceeds Nous (divine Mind, containing the Forms), then Soul, then the material world. The goal of life was to ascend back through these levels to mystical union with the One."}, {"front": "What is the praeparatio evangelica, and why was it important for early Christianity?", "back": "It means 'preparation for the Gospel' -- the idea that Greek philosophy, especially Plato, had glimpsed by reason alone truths that the Gospel would fully reveal. This allowed early Christians to present Plato not as an enemy of faith but as an intellectual forerunner of Christian truth."}, {"front": "What was Justin Martyr's concept of the logos spermatikos?", "back": "Justin Martyr (c. 100-165 AD) taught that God had scattered 'seeds of the Word' (logos spermatikos) throughout the world. Greek philosophers cultivated some of these seeds. Socrates, who pursued truth and died for it, was in Justin's view a 'Christian before Christ' -- one who lived according to the divine Logos without knowing Christ."}, {"front": "How did Augustine resolve the Euthyphro dilemma?", "back": "Augustine argued the dilemma is a false choice. God does not choose to be good as if goodness were external to him -- God is Goodness itself. God's will and God's nature are not two separate things. This doctrine of divine simplicity means morality flows from the divine nature, dissolving the apparent conflict between the two horns."}, {"front": "How did Augustine transform Plato's Theory of Forms for Christian theology?", "back": "Augustine placed the Forms in the mind of God. They are the eternal ideas (rationes aeternae) according to which God created the world. For Plato, the Form of the Good was the highest reality; for Augustine, the Form of the Good is God. The Platonic hierarchy of reality became a map of creation leading back to its Creator."}, {"front": "Who was Boethius, and how did his Consolation of Philosophy connect to Plato?", "back": "Boethius (c. 477-524 AD), called 'the last of the Romans and the first of the Scholastics,' wrote the Consolation while awaiting execution. In it, Lady Philosophy appears in his cell -- echoing the personified Laws in the Crito -- and argues that true happiness is found only in the Good itself, which is God. Through Boethius, Platonic ideas passed into the medieval world."}, {"front": "What are Aquinas' four kinds of law, and how do they relate to the Crito?", "back": "1) Eternal law: God's governance of the universe. 2) Natural law: human participation in eternal law through reason. 3) Human law: specific laws that should apply natural law. 4) Divine law: revealed law in Scripture. An unjust human law -- one violating natural law -- is 'no law at all,' going beyond Socrates' 'persuade or obey' principle."}, {"front": "How did Aquinas extend Augustine's resolution of the Euthyphro dilemma?", "back": "Like Augustine, Aquinas held that God's will and goodness are one. He added that God does not arbitrarily decree what is good -- God's commands reflect his rational nature, and human reason can discern moral law because it participates in divine reason. The dilemma arises only if one assumes God's will and nature can pull in different directions."}, {"front": "What happened during the Renaissance that revived direct knowledge of Plato's works?", "back": "In 1438-1439, Greek scholars brought manuscripts of Plato's complete works to Florence for a church council. Cosimo de' Medici sponsored Marsilio Ficino to translate the entire Platonic corpus into Latin (completed by 1484), making Plato's actual words available to Western readers for the first time in over a thousand years."}, {"front": "Who was Marsilio Ficino, and what was his Platonic Academy of Florence?", "back": "Ficino (1433-1499) translated all of Plato into Latin and founded a circle of humanist scholars in Florence dedicated to studying Plato and Plotinus in the original Greek. He believed, as Augustine had, that Platonic philosophy and Christian theology were ultimately compatible."}, {"front": "How does Raphael's School of Athens embody the theme of Plato's legacy?", "back": "The fresco (1509-1511) in the Vatican depicts the great philosophers of antiquity with Plato and Aristotle at the center. Plato points upward toward the realm of Forms; Aristotle gestures outward toward the world of experience. Its placement in Christendom's heart represents the Renaissance union of Greek philosophy and Christian faith."}, {"front": "What is the central claim of the chapter regarding Plato's legacy?", "back": "Plato's legacy is not a set of doctrines everyone accepted but a set of questions -- about justice, knowledge, reality, the soul, and the good life -- that every subsequent generation of thinkers has been compelled to answer. To do philosophy in the Western tradition is to join a conversation Plato started twenty-four centuries ago."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
