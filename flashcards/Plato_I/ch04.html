    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "What is the dramatic setting of the Crito?", "back": "It is early morning in Socrates' prison cell in Athens, roughly a month after his conviction. The sacred ship sent to Delos has been sighted at Sunium and will return the next day, ending the religious moratorium on executions. Socrates has one day left to live."}, {"front": "Who is Crito, and what does he propose to Socrates?", "back": "Crito is one of Socrates' oldest and wealthiest friends. He has bribed the jailer to enter before dawn and urges Socrates to escape. Money has been arranged, guards can be bribed, and safe houses in Thessaly are ready."}, {"front": "What emotional contrast between Crito and Socrates drives the dialogue?", "back": "Crito is driven by loyalty, fear, and grief -- the natural impulses of a devoted friend. Socrates is driven by reason. The central question is whether reason, at the very edge of death, still has authority to overrule every natural impulse to survive."}, {"front": "List Crito's four main arguments for why Socrates should escape.", "back": "1) Public opinion will blame Crito for not saving his friend. 2) Socrates' three sons will grow up fatherless. 3) Escape is practically easy -- everything is arranged. 4) The trial was unjust, decided by a narrow margin on false charges."}, {"front": "How does Socrates use the analogy of the athletic trainer to counter the argument from public opinion?", "back": "Just as an athlete should follow the expert trainer's advice rather than the crowd's opinions about diet and exercise, we should not trust the crowd with matters of the soul. If we would not trust the many with physical health, why trust them with what is far more important -- moral health?"}, {"front": "What does Socrates mean by 'the soul' (psyche) in the Crito?", "back": "The part of us that reasons, chooses, and is capable of moral goodness or corruption -- roughly what we might call character or inner self. Just as bad food destroys the body, bad moral choices destroy the soul."}, {"front": "State Socrates' central moral principle in the Crito.", "back": "Never return injustice for injustice. It is never right to do wrong, even in response to wrong done to us. Doing wrong damages your own soul, regardless of what was done to you first. This principle is absolute."}, {"front": "How does Socrates' principle of never returning injustice differ from the common Greek view?", "back": "The common Greek view held that it was noble to help friends and harm enemies. Socrates rejects this entirely: harming anyone, even an enemy, is always wrong because it corrupts the soul. He would rather die with an uncorrupted soul than live with a guilty one."}, {"front": "What is prosopopoeia, and how does Socrates use it in the Crito?", "back": "Prosopopoeia is a rhetorical device in which an absent or abstract entity is given a voice. Socrates imagines the Laws of Athens themselves speaking to him, presenting four arguments for why he must not escape."}, {"front": "What is the Laws' first argument -- the Laws as parents and teachers?", "back": "The Laws made Socrates' life possible: under them his parents married, he was born, raised, and educated. They provided the framework for everything good in his life. To destroy them by disobedience would be like striking a parent."}, {"front": "Explain the social contract argument as the Laws present it in the Crito.", "back": "Socrates was free to leave Athens at any time in seventy years but chose to stay, raise his children there, and enjoy the city's life. By staying, he entered an implicit agreement to live under the Laws' authority and obey their judgments, even when they go against him."}, {"front": "What is the Laws' argument about disobedience destroying the city?", "back": "If any citizen can simply ignore a court verdict when it goes against him, the entire legal system collapses. Socrates' escape would not be merely a private act of self-preservation but an attack on the rule of law itself."}, {"front": "What qualification do the Laws offer through the principle 'persuade or obey'?", "back": "If a citizen believes a law is unjust, he has every right to try to change it through argument and persuasion. What he may not do is simply disobey. Socrates had his chance to persuade at his trial; the jury disagreed. To flee now would mean persuasion only counts when it works in your favor."}, {"front": "Who was Thrasymachus, and how does his challenge in the Republic threaten Socrates' position in the Crito?", "back": "Thrasymachus was a sophist who argued that justice is nothing but the interest of the stronger -- the powerful make laws to benefit themselves and call obedience 'justice.' If he is right, Socrates' social contract is not a fair agreement but a trap, and dying for the principle of lawfulness is foolish."}, {"front": "How did Hobbes, Locke, and Rousseau differ in their views on social contract theory as it relates to the Crito?", "back": "Hobbes would approve of Socrates' obedience, since disobedience risks societal collapse. Locke would challenge Socrates, arguing that natural rights to life and liberty override unjust verdicts. Rousseau would be torn, admiring civic devotion but questioning whether the verdict reflected the genuine general will of Athens."}, {"front": "What is Augustine's principle about unjust laws, and how does it go beyond Socrates?", "back": "Augustine wrote that 'an unjust law is no law at all' (lex iniusta non est lex). A law contradicting God's eternal law has no binding moral authority. This is sharper than Socrates' position: where Socrates said 'persuade or obey,' Augustine said unjust laws need not -- indeed must not -- be obeyed."}, {"front": "How did Martin Luther King Jr. draw on both Socrates and the natural law tradition?", "back": "In his 'Letter from Birmingham Jail,' King invoked Augustine and Aquinas to argue that unjust laws (like segregation) have no moral authority. He called Socrates an early practitioner of civil disobedience, but went further: disobedience of unjust laws is not only permitted but morally required, provided it is nonviolent and the person accepts legal punishment."}, {"front": "What are Socrates' final words in the Crito, and what do they convey?", "back": "He compares the voice of the Laws to the sound of a flute in a mystic's ears, saying it 'prevents me from hearing any other.' He tells Crito to let him 'fulfil the will of God, and follow whither He leads.' He stays, choosing to drink the hemlock the next day rather than betray his principles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
