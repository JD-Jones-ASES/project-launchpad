<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the setting for Plato's dialogue Euthyphro?", "back": "The dialogue opens outside the Porch of the King Archon in Athens."}, {"front": "Why has Socrates been summoned to court at the beginning of the Euthyphro?", "back": "He has been indicted by Meletus on charges of impiety (asebeia) and corrupting the minds of young people."}, {"front": "Who is Meletus in the context of the Euthyphro?", "back": "Meletus is a young poet who served as the primary prosecutor against Socrates, accusing him of impiety and corrupting the youth."}, {"front": "What were the potential consequences of the charges against Socrates in democratic Athens?", "back": "Charges of impiety and corrupting the youth were serious offenses that could carry the death penalty."}, {"front": "What is Euthyphro's reason for being at the court?", "back": "Euthyphro is there to prosecute his own father for murder, believing his father committed an impious act."}, {"front": "Briefly describe the incident that led Euthyphro to prosecute his father.", "back": "Euthyphro's father bound a hired laborer who had killed a slave, threw him in a ditch, and sent for religious advice. Before the messenger returned, the bound man died of cold, hunger, and neglect."}, {"front": "What is the central irony of Socrates' meeting with Euthyphro?", "back": "Socrates, who is accused of impiety, encounters Euthyphro, who claims to be an expert on piety and is prosecuting his own father in its name."}, {"front": "What is the dramatic sequence of the dialogues Euthyphro, Apology, and Crito?", "back": "Euthyphro takes place before Socrates' trial, Apology describes the trial, and Crito takes place after the trial, in prison, forming a continuous narrative."}, {"front": "How is Euthyphro characterized in the dialogue?", "back": "Euthyphro is described as a professional religious expert, a diviner (mantis), confident, self-important, and unreflective in his assumptions about piety."}, {"front": "What is the Socratic elenchus?", "back": "The Socratic elenchus is Socrates' characteristic method of philosophical inquiry, involving cross-examination to reveal contradictions or inadequacies in an interlocutor's thesis, aiming to test beliefs for rational scrutiny."}, {"front": "What common misconception do students often have about Socrates' method in this dialogue?", "back": "Students sometimes think Socrates is 'just being difficult' or unfairly picking apart good answers, rather than understanding his genuine philosophical concern for a universal definition."}, {"front": "What is the Greek term for 'piety' or 'holiness' that Socrates asks Euthyphro to define?", "back": "The Greek term is to hosion."}, {"front": "What is the 'Socratic Demand for Definitions'?", "back": "Socrates demands a universal definition—a statement of the essential nature that all instances of a concept (like piety) share—rather than a list of examples. He believes one cannot reliably identify examples without first knowing the definition."}, {"front": "According to Socrates, why is a definition more valuable than an example for philosophical understanding?", "back": "An example only identifies a particular instance, while a definition identifies the essential nature shared by all instances, providing a reliable standard for judging new cases."}, {"front": "What is Euthyphro's first attempt to define piety?", "back": "Euthyphro's first 'definition' is that piety is what he is doing now—prosecuting wrongdoers, including his own father, just as Zeus punished Kronos."}, {"front": "What is Socrates' main objection to Euthyphro's first definition of piety?", "back": "Socrates objects that Euthyphro has given an example of piety, not a definition of its essence. There are many pious acts unrelated to prosecution, and the example doesn't explain what they all have in common."}, {"front": "What is Euthyphro's second attempt to define piety?", "back": "Euthyphro defines piety as what is 'dear to the gods' (theophiles)—whatever the gods love."}, {"front": "What is Socrates' objection to Euthyphro's second definition of piety?", "back": "Based on traditional Greek mythology, the gods often disagree and love different things. Therefore, an action could be loved by one god (pious) and hated by another (impious) simultaneously, leading to a contradiction."}, {"front": "What is Euthyphro's third attempt to define piety?", "back": "Euthyphro amends his definition, stating that piety is what all the gods love unanimously."}, {"front": "State the 'Euthyphro Dilemma' as posed by Socrates.", "back": "'Is the pious loved by the gods because it is pious, or is it pious because it is loved by the gods?'"}, {"front": "What is the implication if 'the pious is loved by the gods because it is pious'?", "back": "This implies that piety has an independent standard or essence, existing prior to and independently of the gods' love. The gods love it because it possesses this inherent quality."}, {"front": "What is the implication if 'the pious is pious because it is loved by the gods'?", "back": "This implies that piety is arbitrary and depends entirely on the gods' will or affections. There is no independent standard, and the gods could make anything pious simply by loving it."}, {"front": "How does the 'song analogy' illustrate the Euthyphro Dilemma?", "back": "It asks: Is a song good because it is popular (goodness is a matter of popularity), or is it popular because it is good (popularity is explained by inherent goodness)? This highlights the two opposing directions of cause and effect."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
