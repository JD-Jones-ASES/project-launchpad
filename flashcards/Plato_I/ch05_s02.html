    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What challenge did early Christians face when explaining their faith to the Greek-speaking world?", "back": "The Gospel was rooted in Hebrew Scriptures (God acting in history, covenants, raising the dead), but educated Greeks thought in terms of Forms, first principles, reason, and the soul's ascent.", "id": "fc01"}, {"front": "What is the meaning and significance of *praeparatio evangelica*?", "back": "Latin for 'preparation for the Gospel,' it's the idea that pagan thinkers like Plato, by reason alone, glimpsed truths that the Gospel would fully reveal. It became a major theme in Christian thought.", "id": "fc02"}, {"front": "Name some early Christian thinkers who developed the idea of *praeparatio evangelica*.", "back": "Justin Martyr, Clement of Alexandria, Origen, and later Eusebius of Caesarea (who coined the phrase).", "id": "fc03"}, {"front": "Who was Justin Martyr and what was his significance?", "back": "A pagan philosopher who converted to Christianity (c. 100–165 AD), he became one of its first great intellectual defenders, martyred under Emperor Marcus Aurelius.", "id": "fc04"}, {"front": "Explain Justin Martyr's concept of *logos spermatikos*.", "back": "Meaning 'seeds of the Word,' it's the idea that God had scattered seeds of truth throughout the world, which Greek philosophers cultivated as partial glimpses of the divine Logos (Word or Reason of God).", "id": "fc05"}, {"front": "How did Justin Martyr view Socrates in relation to Christianity?", "back": "He saw Socrates as a 'Christian before Christ' because Socrates lived according to the Logos, pursuing truth and willing to die for it, even without explicit knowledge of Christ.", "id": "fc06"}, {"front": "Briefly describe Augustine of Hippo's early life and conversion.", "back": "Born to a pagan father and Christian mother, he pursued rhetoric and philosophy, drifting through Manichaeism and skepticism before encountering Neoplatonism, which prepared him for his dramatic Christian conversion in Milan in 386 AD.", "id": "fc07"}, {"front": "Name two monumental works by Augustine of Hippo.", "back": "*Confessions* (the first great autobiography in Western literature) and *City of God* (a monumental work of philosophy, theology, and history).", "id": "fc08"}, {"front": "How did Augustine 'baptize' Plato's Theory of Forms into Christian theology?", "back": "He argued that Plato's Forms are not free-floating abstractions but the eternal ideas (*rationes aeternae*) in the mind of God, according to which God created the world.", "id": "fc09"}, {"front": "For Augustine, what was the ultimate reality that corresponds to Plato's Form of the Good?", "back": "For Augustine, the Form of the Good is God. He viewed the Platonic hierarchy of reality as a map leading back to the Creator.", "id": "fc10"}, {"front": "How did Augustine address the Euthyphro dilemma ('Is something good because God wills it, or does God will it because it is good?')?", "back": "He argued it's a false choice. God's will and God's nature are not separate; God *is* Goodness itself (divine simplicity). The source of morality is God's divine nature.", "id": "fc11"}, {"front": "What is the doctrine of divine simplicity, as held by Augustine?", "back": "It's the belief that God is not composed of parts; God's goodness, will, knowledge, and being are all ultimately one and the same.", "id": "fc12"}, {"front": "Who was Boethius and what was his most influential work?", "back": "Anicius Manlius Severinus Boethius (c. 477–524 AD) was a Roman senator and philosopher, imprisoned and executed. His most influential work was *The Consolation of Philosophy*.", "id": "fc13"}, {"front": "How did Platonic ideas influence Boethius' *Consolation of Philosophy*?", "back": "He argued that true happiness is found only in the Good (God), independent of fortune, echoing Plato's insistence on the soul's true home being in an eternal realm, not this world of change.", "id": "fc14"}, {"front": "What was the 'Medieval Synthesis'?", "back": "It was the grand intellectual project (roughly 5th-15th centuries) of joining Greek philosophy and Christian revelation into a unified vision of truth.", "id": "fc15"}, {"front": "What philosophical tradition dominated the early Medieval Synthesis, and what shifted later?", "back": "Augustine's Christianized Platonism dominated early on. Later (12th-13th centuries), the works of Aristotle were rediscovered through Arabic translations and commentaries.", "id": "fc16"}, {"front": "What was the role of Islamic philosophers in the rediscovery of Aristotle in the Latin West?", "back": "Philosophers like Avicenna (Ibn Sina) and Averroes (Ibn Rushd) preserved and commented on Aristotle's works, profoundly influencing Christian Scholastic thought when translated into Latin.", "id": "fc17"}, {"front": "What was Thomas Aquinas' major contribution to the Medieval Synthesis?", "back": "He achieved the greatest synthesis, arguing that faith and reason are allies, two paths to the same truth, with reason establishing natural truths and faith revealing others.", "id": "fc18"}, {"front": "According to Thomas Aquinas, what is the relationship between faith and reason?", "back": "They are allies, not enemies, both leading to truth. Reason can discover many truths about God, morality, and nature (guided by Aristotle), while faith confirms these and reveals truths reason cannot reach (like the Trinity).", "id": "fc19"}, {"front": "Define Thomas Aquinas' doctrine of natural law.", "back": "Natural law is the 'rational creature's participation in the eternal law,' which is God's rational plan for governing the universe. Human laws are just only if they participate in this higher law.", "id": "fc20"}, {"front": "According to Aquinas' natural law doctrine, what is the status of an unjust law?", "back": "An unjust law, one that contradicts natural law, is not truly a law at all and does not bind the conscience.", "id": "fc21"}, {"front": "How did Aquinas further clarify the Euthyphro dilemma, building on Augustine?", "back": "He held that God's will and goodness are one and God does not arbitrarily decree what is good. Instead, God's commands reflect his rational nature, and human reason can discern the moral law because it participates in divine reason.", "id": "fc22"}, {"front": "In natural law ethics, why is it called 'natural'?", "back": "Because its principles can be known by natural reason, without special divine revelation. For example, the command 'do not murder' can be known by any rational person.", "id": "fc23"}, {"front": "How does Socrates' argument in the *Crito* connect to Aquinas' doctrine of natural law?", "back": "Socrates argued obedience to laws based on implied agreement and protecting the city. Aquinas went further, arguing human laws are just only if they participate in the eternal law of God, a higher standard than mere human agreement.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
