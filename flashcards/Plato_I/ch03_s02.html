    <style>
        .fc-container {

            margin: 0 auto;

        .fc-breadcrumb {

    <script>
    var CARDS = [{"front": "What event convinced Plato that no existing form of government could be trusted with justice?", "back": "The execution of Socrates in 399 BC.", "id": "fc01"}, {"front": "In Plato's 'Republic', who are the individuals proposed to rule the ideal city?", "back": "Philosopher-kings.", "id": "fc02"}, {"front": "According to the 'Republic', what have philosopher-kings trained their minds to perceive?", "back": "What is truly real and truly good.", "id": "fc03"}, {"front": "How does Plato's account of knowledge in the 'Republic' build upon Socrates' recognition of his own ignorance?", "back": "It develops a systematic account distinguishing between mere opinion and true reality.", "id": "fc04"}, {"front": "According to Plato, what subjects must a philosopher study to ascend from 'shadows' to reality?", "back": "Dialectic, mathematics, and years of rigorous study.", "id": "fc05"}, {"front": "In the Allegory of the Cave, what have the prisoners been forced to look at since childhood?", "back": "Shadows projected on the wall before them.", "id": "fc06"}, {"front": "In the Allegory of the Cave, what prevents the prisoners from turning their heads to see the fire behind them?", "back": "Chains on their legs and necks.", "id": "fc07"}, {"front": "In the Allegory of the Cave, what is the source of light inside the underground den?", "back": "A fire blazing at a distance above and behind the prisoners.", "id": "fc08"}, {"front": "What do the prisoners in the cave believe the shadows to be?", "back": "True reality.", "id": "fc09"}, {"front": "In the Allegory of the Cave, what is the initial reaction of a liberated prisoner to the glare of the light?", "back": "He suffers sharp pains and is unable to see the realities he previously saw as shadows.", "id": "fc10"}, {"front": "Why would a newly liberated prisoner initially believe the shadows were 'truer' than the objects shown to him?", "back": "Because his eyes are dazzled and he is accustomed to the clarity of the shadows.", "id": "fc11"}, {"front": "In the Allegory of the Cave, what is the final object the liberated prisoner is able to contemplate?", "back": "The sun itself in its own proper place.", "id": "fc12"}, {"front": "What does the 'prison-house' symbolize in Plato's Allegory of the Cave?", "back": "The world of sight.", "id": "fc13"}, {"front": "In Plato's interpretation, what does the journey upwards from the cave represent?", "back": "The ascent of the soul into the intellectual world.", "id": "fc14"}, {"front": "According to Plato, what is the 'universal author of all things beautiful and right'?", "back": "The Idea of the Good.", "id": "fc15"}, {"front": "What is the likely reaction of the remaining prisoners if a freed man returns to the cave to enlighten them?", "back": "They will think he is mad and may try to kill him.", "id": "fc16"}, {"front": "How does the Allegory of the Cave serve as a meditation on the fate of Socrates?", "back": "It depicts the hostility a philosopher faces when trying to awaken those comfortable in 'darkness'.", "id": "fc17"}, {"front": "Why does Plato argue that the 'rule of the many' (democracy) is inherently defective?", "back": "Because the many are trapped in the 'Cave' and cannot see reality clearly.", "id": "fc18"}, {"front": "Which early Christian philosopher claimed that Socrates was a Christian before Christ because he lived reasonably?", "back": "Justin Martyr.", "id": "fc19"}, {"front": "What was the specific religious accusation brought against Socrates by the Athenian authorities?", "back": "Impiety toward the Athenian gods.", "id": "fc20"}, {"front": "What was the specific religious accusation brought against Jesus by his community's authorities?", "back": "Blasphemy against the God of Israel.", "id": "fc21"}, {"front": "In terms of legal process, what common factor drove the condemnations of both Socrates and Jesus?", "back": "Fear, resentment, and political calculation.", "id": "fc22"}, {"front": "How did Socrates' behavior at his trial differ from Jesus' behavior before Pilate?", "back": "Socrates delivered long philosophical arguments while Jesus was largely silent.", "id": "fc23"}, {"front": "What was the ultimate purpose of life for Socrates, which he pursued even during his trial?", "back": "The search for truth through questioning and admitting ignorance.", "id": "fc24"}, {"front": "How does the Christian view of Jesus' identity differ from Socrates' view of himself regarding 'truth'?", "back": "Socrates admitted he did not possess wisdom, while Jesus claimed to be the truth.", "id": "fc25"}, {"front": "In Christian theology, what was the primary redemptive purpose of Jesus' death?", "back": "Atonement for sin to reconcile humanity to God.", "id": "fc26"}, {"front": "What is the term for the Church Fathers' idea that Greek philosophy prepared the pagan world for Christian revelation?", "back": "Praeparatio evangelica.", "id": "fc27"}, {"front": "Which philosopher founded the Stoic school about a century after Socrates' death?", "back": "Zeno of Citium.", "id": "fc28"}, {"front": "Where did the Stoic school get its name?", "back": "From the Painted Stoa (Stoa Poikile) in the Athenian marketplace where Zeno taught.", "id": "fc29"}, {"front": "What is the foundational distinction found at the opening of Epictetus' 'Handbook'?", "back": "The distinction between things that are in our power and things that are not.", "id": "fc30"}, {"front": "According to the Stoic Epictetus, what categories fall under 'our power'?", "back": "Our judgments, desires, and choices.", "id": "fc31"}, {"front": "According to the Stoic Epictetus, what categories fall 'not in our power'?", "back": "Our bodies, reputations, and external circumstances.", "id": "fc32"}, {"front": "How did the Roman statesman Seneca echo Socrates during his forced suicide?", "back": "He reportedly asked for water to pour a libation to Jupiter.", "id": "fc33"}, {"front": "Which Roman emperor and Stoic wrote about the worthlessness of reputation in his 'Meditations'?", "back": "Marcus Aurelius.", "id": "fc34"}, {"front": "Who was the American essayist who read the 'Apology' before writing the 1849 essay 'Civil Disobedience'?", "back": "Henry David Thoreau.", "id": "fc35"}, {"front": "What specific injustice prompted Thoreau to refuse to pay his poll tax, leading to his imprisonment?", "back": "The Mexican-American War and the expansion of slavery.", "id": "fc36"}, {"front": "In which famous 1963 document did Martin Luther King Jr. invoke Socrates as a 'creative extremist'?", "back": "Letter from Birmingham Jail.", "id": "fc37"}, {"front": "How did Socrates' stance on the law in the 'Apology' differ from Martin Luther King Jr.'s stance on unjust laws?", "back": "Socrates accepted the authority of the law, while King argued that unjust laws should be openly disobeyed.", "id": "fc38"}, {"front": "What shared conviction connects the actions of Socrates, Thoreau, and Martin Luther King Jr.?", "back": "The conviction that individual conscience or moral law matters more than personal safety.", "id": "fc39"}, {"front": "The 'Idea of the Good' is described as the immediate source of _____ and _____ in the intellectual world.", "back": "Reason and truth.", "id": "fc40"}, {"front": "In the Allegory of the Cave, what do the 'marionette players' hold up behind the wall?", "back": "Vessels, statues, and figures of animals made of various materials.", "id": "fc41"}, {"front": "What does Plato suggest is the source of all light and life in the visible world within the Allegory?", "back": "The sun.", "id": "fc42"}, {"front": "Socrates claimed his divine mission was given to him by the _____ at _____.", "back": "God at Delphi.", "id": "fc43"}, {"front": "Why did the high priests fear Jesus according to the source material?", "back": "They feared Roman intervention and a loss of their own political authority.", "id": "fc44"}, {"front": "According to Clement of Alexandria, what role did philosophy play for the Greeks that was similar to the Law of Moses for the Jews?", "back": "It was a teacher leading them toward Christ.", "id": "fc45"}, {"front": "How long did the Stoic school last as an influential philosophical movement?", "back": "About five centuries.", "id": "fc46"}, {"front": "Which Stoic philosopher was a former slave?", "back": "Epictetus.", "id": "fc47"}, {"front": "Who was the emperor that forced the Stoic Seneca to commit suicide?", "back": "Nero.", "id": "fc48"}, {"front": "For the Stoics, Socrates was the _____ of the philosopher, proving wisdom matters more than life.", "back": "Prototype.", "id": "fc49"}, {"front": "What did Henry David Thoreau choose over supporting slavery, according to the text?", "back": "Jail.", "id": "fc50"}, {"front": "What metaphor does the text use to describe the philosopher's role in society?", "back": "A gadfly.", "id": "fc51"}, {"front": "In the 'Republic', Plato argues that only the philosopher can distinguish _____ from _____.", "back": "Appearance from reality.", "id": "fc52"}, {"front": "What does the fire in the Cave represent in Plato's interpretation?", "back": "The sun in the visible world.", "id": "fc53"}, {"front": "Term: Praeparatio evangelica", "back": "Definition: The idea that Greek philosophy prepared the pagan world to receive Christian revelation.", "id": "fc54"}, {"front": "How many years after Socrates' trial was the 'Republic' written?", "back": "Approximately twenty years.", "id": "fc55"}, {"front": "According to the source, what is the 'fundamental problem of political thought' raised by the tension between philosophy and democracy?", "back": "Whether the majority can be trusted to protect wisdom and the 'philosophical gadfly'.", "id": "fc56"}, {"front": "What is the 'visible world' equated to in the Allegory of the Cave?", "back": "The world of sight (inside the cave).", "id": "fc57"}, {"front": "Which specific Christian creed describes Jesus' death as being 'for us and for our salvation'?", "back": "The Nicene Creed.", "id": "fc58"}, {"front": "What modern therapeutic approach has been influenced by Stoicism according to the text?", "back": "Cognitive therapy.", "id": "fc59"}, {"front": "Which specific group of people did Martin Luther King Jr. address in his 'Letter from Birmingham Jail'?", "back": "White clergymen who criticized his protests.", "id": "fc60"}, {"front": "According to Plato, the 'Idea of Good' appears _____ in the world of knowledge.", "back": "Last of all.", "id": "fc61"}, {"front": "What does the 'steep and rugged ascent' represent in the Allegory?", "back": "The difficult process of education and attaining knowledge.", "id": "fc62"}, {"front": "In the Allegory, what must a person have their 'eye fixed' upon to act rationally in public or private life?", "back": "The Idea of the Good.", "id": "fc63"}, {"front": "Which three groups did Socrates criticize in the 'Apology' for thinking they knew things they did not?", "back": "Politicians, poets, and craftsmen.", "id": "fc64"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
