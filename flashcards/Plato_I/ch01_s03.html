    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central transformation did Socrates and Plato bring to philosophy?", "back": "They transformed philosophy from a speculation about nature into an investigation of how to live."}, {"front": "What specific metaphor did Socrates use to describe his philosophical method, and what was its origin?", "back": "He used the metaphor of 'midwifery' (maieutike), stating he helped others 'give birth' to ideas, inspired by his mother, Phaenarete, a midwife."}, {"front": "What was significant about Socrates' written legacy?", "back": "He wrote nothing. All information about him comes from others, leading to the 'Socratic problem'."}, {"front": "Name at least three historical figures who provided accounts of Socrates' life and philosophy.", "back": "Plato, Xenophon, Aristophanes, and Aristotle."}, {"front": "Explain the 'Socratic problem.'", "back": "Since Socrates left no writings, it's difficult to distinguish between what the historical Socrates actually believed and what Plato attributed to him in his dialogues."}, {"front": "How do scholars generally approach the 'Socratic problem' when reading Plato's dialogues?", "back": "They generally agree that early dialogues are closer to the historical Socrates, while later dialogues increasingly reflect Plato's own philosophy. They are read as philosophical works, not historical transcripts."}, {"front": "Describe the fundamental difference between Socrates' philosophical method and that of the Pre-Socratics.", "back": "Pre-Socratics made grand claims about the nature of reality, while Socrates made almost no claims, instead focusing on asking questions."}, {"front": "Define 'elenchus' and outline its typical four-step process.", "back": "Elenchus is Socrates' method of 'cross-examination' or 'refutation.' It involves: (1) asking for a concept's definition, (2) drawing out implications, (3) showing the definition leads to contradiction, and (4) starting over with a revised definition."}, {"front": "What is the primary goal of the Socratic method (elenchus)?", "back": "The goal is not to humiliate the interlocutor but to strip away false beliefs and move closer to the truth by revealing ignorance."}, {"front": "What was the defining event of Plato's life, and how did it impact his views on government?", "back": "The execution of Socrates in 399 BC. This event disgusted him with Athenian democracy and led him to argue that only philosophers should govern."}, {"front": "What institution did Plato found, and what was its significance?", "back": "He founded the Academy around 387 BC, one of the first institutions of higher learning in the Western world, which operated for nearly 900 years."}, {"front": "Why did Plato choose the dialogue form for his philosophical writings instead of treatises?", "back": "It was partly a tribute to Socrates and a philosophical choice. Plato believed philosophy is a living activity of questioning and reasoning, which dialogues capture better than static treatises."}, {"front": "How are Plato's dialogues typically divided into chronological periods?", "back": "Into three periods: Early, Middle, and Late dialogues."}, {"front": "Characterize Plato's 'Early dialogues' in terms of their style and typical outcome, and name an example.", "back": "They are short, dramatic, and often end in aporia (puzzlement) as Socrates' cross-examination reveals no satisfactory answer. Examples include the Euthyphro, Apology, and Crito."}, {"front": "Define 'aporia' and explain its philosophical value in the context of Socrates' method.", "back": "Aporia means 'without a path,' a state of puzzlement when an argument reaches a dead end. Socrates saw it as valuable because recognizing one's ignorance is the first step toward genuine understanding and intellectual humility."}, {"front": "What distinguishes Plato's 'Middle dialogues' from his Early ones, and name an example.", "back": "They are longer and more ambitious, with Socrates beginning to advance positive theories like the Theory of Forms, immortality of the soul, or the philosopher-king. Examples include the Republic, Phaedo, and Symposium."}, {"front": "What were the two main charges brought against Socrates that led to his trial?", "back": "He was charged with impiety (not believing in the city's gods and introducing new divine beings) and corrupting the youth."}, {"front": "In what dialogue does Socrates discuss the nature of piety while on his way to his preliminary hearing?", "back": "The Euthyphro, where he meets a self-proclaimed religious expert."}, {"front": "Who were the main accusers who brought formal charges against Socrates?", "back": "Meletus, backed by the influential politician Anytus and the orator Lycon."}, {"front": "What was the approximate size of the jury that tried Socrates in Athens, and what was the verdict?", "back": "A jury of 501 Athenian citizens. He was found guilty by a vote of 280 to 221 and sentenced to death."}, {"front": "In the Crito, why does Socrates refuse his wealthy friend's offer to escape prison?", "back": "He argues that breaking the law – even an unjust law – would be wrong, as it would violate his agreement with the state and corrupt him."}, {"front": "How was Socrates executed, and in which Platonic dialogue is this scene primarily described?", "back": "He was executed by drinking hemlock. This scene is described in the Phaedo, which also contains his final arguments for the immortality of the soul."}, {"front": "What makes the philosophical questions discussed in the Euthyphro, Apology, and Crito particularly urgent?", "back": "They are set against the background of Socrates' impending death, transforming them from abstract exercises into pressing questions about how to respond to injustice and how to live an examined life."}, {"front": "What role did Socrates play in the Peloponnesian War?", "back": "He served with distinction as a soldier, known for extraordinary physical endurance and courage."}, {"front": "What does Plato's Seventh Letter (if genuine) suggest about how philosophical truths are discovered?", "back": "It suggests that the most important philosophical truths 'cannot be put into words like other sciences,' but are kindled in the soul 'after much converse about the matter itself and a life lived together.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
