    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Where does the Euthyphro take place, and why are both Socrates and Euthyphro at this location?", "back": "Outside the Porch of the King Archon in Athens. Socrates has been summoned to answer a formal indictment for impiety, and Euthyphro has come to prosecute his own father for murder."}, {"front": "What are the formal charges against Socrates that bring him to the court in the Euthyphro?", "back": "Impiety (asebeia) -- failing to honor the gods of Athens -- and corrupting the minds of young people. These charges could carry the death penalty."}, {"front": "Why is Euthyphro prosecuting his own father, and what are the circumstances of the case?", "back": "A hired laborer on the family estate killed a slave in a drunken fight. Euthyphro's father bound the killer in a ditch and sent for advice, but the man died of cold, hunger, and neglect before the messenger returned. Euthyphro considers this an impious act."}, {"front": "What is the Socratic elenchus?", "back": "Socrates' characteristic method of cross-examination. He asks an interlocutor to state a thesis, then asks questions to reveal contradictions or inadequacies. The goal is not to win an argument but to test whether a belief can withstand rational scrutiny."}, {"front": "What is Socrates' central question in the Euthyphro, and what kind of answer does he demand?", "back": "He asks 'What is piety?' (to hosion). He demands a universal definition -- a statement of the essential nature all pious things share -- not merely examples of pious behavior."}, {"front": "Why does Socrates reject Euthyphro's first definition of piety ('piety is what I am doing now')?", "back": "Because Euthyphro has given an example of piety, not a definition. Prosecuting one's father might be pious, but it does not explain what piety is. An example cannot do the work of a definition."}, {"front": "What is Euthyphro's second definition of piety, and what problem does Socrates identify with it?", "back": "Piety is what is 'dear to the gods' (theophiles). Socrates objects that the Greek gods disagree among themselves, so the same action could be both pious (loved by one god) and impious (hated by another) -- a contradiction."}, {"front": "How does Euthyphro's third definition attempt to fix the problem of the second?", "back": "He narrows it to what all the gods love unanimously. This avoids the contradiction by requiring divine consensus, but Socrates presses further with the Euthyphro dilemma."}, {"front": "State the Euthyphro dilemma in Socrates' own terms.", "back": "Is the pious loved by the gods because it is pious, or is it pious because it is loved by the gods? The two options point in opposite directions regarding the source of moral value."}, {"front": "Explain Horn 1 of the Euthyphro dilemma and the problem it creates.", "back": "Horn 1: The gods love pious things because they are pious. This means piety has an independent nature prior to the gods' love, implying a standard of goodness above the gods themselves."}, {"front": "Explain Horn 2 of the Euthyphro dilemma and the problem it creates.", "back": "Horn 2: Things are pious because the gods love them. This means morality is arbitrary -- whatever the gods happen to approve is automatically right, even if it seems monstrous. If the gods changed their minds, morality would change too."}, {"front": "What is Euthyphro's fourth definition of piety, and why does it fail?", "back": "Piety is that part of justice dealing with service to the gods. It fails because Euthyphro cannot explain what goal or great work pious service accomplishes for the gods, who are supposedly perfect and self-sufficient."}, {"front": "How does Euthyphro's fifth and final definition collapse into circularity?", "back": "He proposes piety is a kind of sacred exchange -- humans give honor and sacrifice, gods give blessings. But when Socrates asks what the gods actually gain, Euthyphro can only say it 'pleases' them, which collapses back into 'piety is what is dear to the gods' -- the same as Definition 3."}, {"front": "What is aporia, and why does Socrates consider it valuable rather than a failure?", "back": "Aporia means 'no passage' or 'no way through' -- a state of genuine puzzlement when you realize you do not know the answer to something you thought you understood. For Socrates, it is not a failure but the beginning of real thinking and the first step toward wisdom."}, {"front": "How does the Euthyphro end, and what has been accomplished despite the lack of a final answer?", "back": "Euthyphro leaves, claiming he has somewhere to be, and no definition of piety is reached. Yet five definitions have been tested and found wanting, revealing that piety is far more complex than casually assumed. The dialogue demonstrates that knowing what you do not know is more valuable than false confidence."}, {"front": "How did Plato later develop the Euthyphro's unresolved search for definitions into his Theory of Forms?", "back": "Plato proposed that behind every general concept (piety, justice, beauty) exists a perfect, eternal, unchanging reality called a Form (eidos). Particular instances are imperfect copies of their Form. The Form of Piety is the standard against which all pious acts are measured."}, {"front": "In Plato's Republic, what role does the Form of the Good play in the Theory of Forms?", "back": "The Form of the Good is the supreme Form, the source and ground of all reality. Like the sun provides light and life to the visible world, the Good provides truth and being to the intelligible world. It is not just another Form but 'far exceeds essence in dignity and power.'"}, {"front": "What is the difference between doxa and episteme in Plato's philosophy?", "back": "Doxa is opinion, the kind of understanding we have of the changing physical world. Episteme is true knowledge, which can only be achieved through knowledge of the eternal, unchanging Forms."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
