    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental nature of a Socratic dialogue, distinguishing it from a textbook?", "back": "A Socratic dialogue is a dramatic work, a conversation between characters with personalities, motives, and flaws, where the arguments are shaped by the speakers."}, {"front": "Define Socratic irony.", "back": "A deliberate pose of ignorance used by Socrates to draw others into philosophical examination, expose false confidence, and encourage genuine inquiry."}, {"front": "When Socrates says things like \"I know nothing\" or \"You must be very wise — please teach me,\" how should a reader interpret these statements?", "back": "These are examples of Socratic irony; the reader should not take them at face value, as Socrates is setting a \"philosophical trap\" to test his interlocutor's supposed knowledge."}, {"front": "What term did ancient rhetoricians use for the technique now known as Socratic irony?", "back": "Eironeia, meaning \"irony\" or \"dissimulation.\""}, {"front": "How did Aristotle describe *eironeia*, and how does Socratic irony go further than Aristotle's description?", "back": "Aristotle described *eironeia* as an understatement of one's own abilities. Socratic irony goes further by being a philosophical tool for inquiry, not just a social manner."}, {"front": "Outline the typical structured pattern of argument found in a Socratic dialogue.", "back": "Socrates asks a question; an interlocutor proposes a definition; Socrates tests it with further questions; the definition is shown inadequate; a new definition is proposed."}, {"front": "What is the reader's primary task when engaging with a Socratic dialogue, according to the text?", "back": "To actively engage with the arguments, follow each step, critically evaluate Socrates' objections, and even disagree with the text, rather than just absorbing information."}, {"front": "What is \"aporia\" in the context of Socratic dialogues, and what is its significance?", "back": "Aporia is a state of productive confusion, 'being without a path,' where one realizes what they thought they knew they don't. It is considered the first step toward genuine philosophical progress and wisdom."}, {"front": "How did Socrates explain his own experience with the puzzlement he induced in others, using an analogy from the *Meno*?", "back": "He compared himself to a torpedo fish, stating that if he numbs others, he numbs himself too, implying he perplexes others not because he is clear, but because he is utterly perplexed himself."}, {"front": "Who was Benjamin Jowett, and what is his significance to the study of Plato's dialogues?", "back": "He was a Victorian scholar and influential educator who produced the most widely read English translations of Plato's dialogues, first published in the 1870s."}, {"front": "Why are Jowett's translations of Plato's dialogues often used in textbooks, despite their old-fashioned style?", "back": "Because they are in the public domain, which allows for the inclusion of the complete text of each dialogue without copyright issues."}, {"front": "According to Socrates, how does one truly learn philosophy?", "back": "Philosophy is not a spectator sport; one learns to think by doing it oneself, by actively engaging with arguments and questions."}, {"front": "What famous claim did Socrates make about the \"unexamined life\"?", "back": "\"The unexamined life is not worth living.\""}, {"front": "Who were the \"Pre-Socratics,\" and what distinguished them from earlier thinkers?", "back": "They were the philosophers who came before Socrates, distinguished by their revolutionary conviction that the world could be understood through reason rather than myth."}, {"front": "What was the fundamental contribution of the Pre-Socratics to Western philosophy?", "back": "They laid the groundwork for all of Western philosophy by pursuing rational explanations for the natural world, moving away from mythological answers."}, {"front": "What fundamental question did the Milesian philosophers primarily seek to answer?", "back": "They asked what everything is made of, seeking a single underlying substance or 'arche' from which all things come."}, {"front": "Define the term \"arche\" as used by the Pre-Socratics.", "back": "The 'beginning,' 'origin,' or 'first principle' of all things; the fundamental substance or principle from which everything in the universe derives."}, {"front": "Who is traditionally regarded as the first Western philosopher, and what did he propose as the *arche*?", "back": "Thales of Miletus, who proposed that water is the *arche* of all things."}, {"front": "Why was Thales' contribution considered a breakthrough, despite his seemingly naive answer?", "back": "His breakthrough was not the specific answer, but the question itself: asking what the world is made of and seeking a natural, rather than mythological, explanation."}, {"front": "What did Anaximander propose as the *arche*?", "back": "The *apeiron*, which means \"the boundless\" or \"indefinite.\""}, {"front": "Why did Anaximander propose the *apeiron* as the *arche*, rather than a specific element like water?", "back": "He believed no particular element could be truly fundamental because each is defined by opposition to others; only something unlimited and undefined could generate them all."}, {"front": "What did Anaximenes propose as the *arche*?", "back": "Air."}, {"front": "What was Anaximenes' key contribution regarding the *arche* of air?", "back": "He proposed that qualitative differences in the world (like fire, water, stone) could be explained by quantitative changes in air (rarefaction making it thinner, condensation making it thicker)."}, {"front": "How did the Milesian approach to philosophy differ from what would later be considered scientific method?", "back": "They reasoned about the nature of reality from first principles, asking what *must be true*, rather than performing experiments or building mathematical models, though science eventually grew from their methods."}, {"front": "What fundamental question differentiated the philosophical inquiries of Heraclitus and Parmenides from those of the Milesians?", "back": "While the Milesians asked what the world is *made of*, Heraclitus and Parmenides debated whether the world fundamentally *changes* or *stays the same*."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
