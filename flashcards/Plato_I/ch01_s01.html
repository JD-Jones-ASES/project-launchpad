<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What literary genre best describes a Socratic dialogue?", "back": "A dramatic work involving characters with distinct personalities and motives."}, {"front": "Why is it important to consider the personality of the characters in a Socratic dialogue?", "back": "A character's situation and traits can change the meaning of the arguments they make."}, {"front": "How does the text describe Socrates' personality in the dialogues?", "back": "Witty, relentless, and occasionally maddeningly evasive."}, {"front": "What are the personality traits of Euthyphro as described in the text?", "back": "Confident and a little pompous."}, {"front": "How is the character Crito characterized in terms of his personality?", "back": "Loyal, anxious, and practical."}, {"front": "What instance of dramatic irony occurs between Socrates and Euthyphro?", "back": "The reader knows Socrates is facing an impiety charge, but Euthyphro is unaware of the connection while discussing piety."}, {"front": "Define the concept of Socratic Irony.", "back": "A deliberate pose of ignorance used to draw others into philosophical examination."}, {"front": "What is the intended purpose of the \"philosophical trap\" set by Socrates' professed ignorance?", "back": "To expose false confidence and replace it with genuine inquiry."}, {"front": "Term: eironeia", "back": "Definition: An ancient rhetorical technique meaning irony or dissimulation."}, {"front": "How did Aristotle describe the technique of irony in relation to social grace?", "back": "As an understatement of one's own abilities, which he deemed more graceful than boasting."}, {"front": "What is the strategic reason behind Socrates calling an interlocutor \"wise\"?", "back": "He is inviting them to put their supposed knowledge to a public test."}, {"front": "What is the typical first step in the structured pattern of a Socratic dialogue?", "back": "Socrates asks a question, typically seeking a definition such as \"What is piety?\""}, {"front": "How does Socrates process an interlocutor's proposed definition?", "back": "He tests the definition by asking a series of further questions."}, {"front": "What are three common reasons a proposed definition is shown to be inadequate in a dialogue?", "back": "It is too narrow, too broad, or self-contradictory."}, {"front": "What action is recommended if a reader loses the thread of a Socratic argument?", "back": "Go back a page and reread, because Plato rewards slow and careful reading."}, {"front": "Why is \"arguing with the text\" considered a respectful way to read Plato?", "back": "It is an active engagement with the arguments, which is what Socrates wanted from his audience."}, {"front": "Term: aporia", "back": "Definition: A state of productive confusion literally meaning \"being without a path.\""}, {"front": "According to Plato, what is the first step toward achieving wisdom?", "back": "The realization that what you thought you knew, you do not actually know."}, {"front": "To what creature is Socrates compared in the Meno due to his effect on others?", "back": "A torpedo fish."}, {"front": "How does Socrates justify his ability to numb or perplex others during conversation?", "back": "He claims he is only able to perplex others because he is utterly perplexed himself."}, {"front": "Who was the Victorian scholar known for the most widely read English translations of Plato?", "back": "Benjamin Jowett."}, {"front": "What is the general style of Benjamin Jowett's translations of Plato?", "back": "Elegant and literary, but occasionally old-fashioned or archaic to modern ears."}, {"front": "In Jowett's translation, what modern term is equivalent to the word \"allegation\"?", "back": "Charge."}, {"front": "How is the term \"impiety\" defined in the context of Jowett's Victorian English?", "back": "Disrespect for religion."}, {"front": "What does the phrase \"I allegation you\" mean in modern English?", "back": "I accuse you."}, {"front": "What reading technique can help a reader clarify the rhythms of Jowett's Victorian prose?", "back": "Reading the text aloud."}, {"front": "Why does the text state that philosophy is not a \"spectator sport\"?", "back": "One learns to think by actively engaging with arguments rather than just absorbing information."}, {"front": "What is the reader's primary task when navigating the arguments in the dialogues?", "back": "To engage with and evaluate the arguments rather than simply accepting them."}, {"front": "According to Socrates, what is the most rewarding and dangerous thing a human being can do?", "back": "Thinking."}, {"front": "Socrates famously claimed that \"the _____ life is not worth living.\"", "back": "unexamined"}, {"front": "What is the intended outcome of experiencing aporia?", "back": "Moving from false confidence to a state where genuine philosophical progress can begin."}, {"front": "How does the text distinguish Socratic irony from a mere social manner?", "back": "It is a philosophical tool used strategically to dismantle arguments and provoke inquiry."}, {"front": "In the structured argument, what happens immediately after a definition is proven inadequate?", "back": "A new definition is proposed, and the process of testing begins again."}, {"front": "What is the significance of dialogues ending without a clear answer?", "back": "It emphasizes that the point of the dialogue is the puzzlement itself, rather than a final conclusion."}, {"front": "Approximately how old are the Socratic dialogues discussed in the text?", "back": "Nearly 2,400 years old."}, {"front": "What was Benjamin Jowett's academic role at Oxford?", "back": "Master of Balliol College."}, {"front": "Why might a claim from Socrates be considered strategic rather than sincere?", "back": "He often poses as ignorant to lure others into exposing their lack of understanding."}, {"front": "What does it mean for a definition to be \"too narrow\" in a Socratic cross-examination?", "back": "It fails to include all things that should be categorized under that concept."}, {"front": "What does it mean for a definition to be \"too broad\" in a Socratic cross-examination?", "back": "It includes things that do not actually belong to the concept being defined."}, {"front": "How should a reader use the margins of the text while studying a dialogue?", "back": "To mark definitions and note Socrates' specific objections."}, {"front": "When did Benjamin Jowett first publish his translations of Plato?", "back": "In the 1870s."}, {"front": "What does the text suggest a reader do if they disagree with Socrates' objections?", "back": "Write down the reasons for the disagreement."}, {"front": "Which dialogue is mentioned as the source for the \"torpedo fish\" comparison?", "back": "The Meno."}, {"front": "What is the primary danger associated with the \"unexamined life\" according to the text?", "back": "Living without ever stopping to ask what \"good\" and \"happy\" truly mean."}, {"front": "How does the text define the state of \"productive confusion\"?", "back": "Aporia."}, {"front": "Why does the text refer to Jowett's English as \"Victorian\"?", "back": "Because Jowett was a scholar who lived and published during the Victorian era (1817–1893)."}, {"front": "What is the literal meaning of the ancient Greek term eironeia?", "back": "Irony or dissimulation."}, {"front": "How should the reader interpret Socrates saying, \"You must be very wise — please teach me\"?", "back": "As an ironic invitation and a strategic trap to test the interlocutor's knowledge."}, {"front": "Why are character motives considered as important as the arguments themselves in a dialogue?", "back": "Because the dialogues are dramatic works where people, not just textbooks, are speaking."}, {"front": "In a Socratic argument, what follows the question \"What is piety?\"", "back": "The interlocutor proposes a definition."}, {"front": "What is the historical debate regarding Socrates' ignorance?", "back": "Whether his professed ignorance was entirely sincere or partly strategic."}, {"front": "How does Jowett's translation of \"impiety\" relate to modern language?", "back": "Modern English might use \"disrespect for religion\" instead."}, {"front": "What was the reputation of Benjamin Jowett's translations in Victorian England?", "back": "They were praised for their literary grace and were highly influential."}, {"front": "What is the primary goal of the \"test\" Socrates applies to a definition?", "back": "To determine if the definition is adequate or if it contains contradictions."}, {"front": "According to the text, why does Plato reward slow, careful reading?", "back": "Because the thread of the argument is complex and easy to lose."}, {"front": "What is the significance of the year 1870 in the history of Platonic study?", "back": "It marks the decade when Jowett's influential translations were first published."}, {"front": "In the Socratic method, what happens if a definition is found to be self-contradictory?", "back": "The definition is rejected as inadequate, and a new one is sought."}, {"front": "What is the benefit of the state of numbness caused by Socrates, according to the torpedo fish analogy?", "back": "It forces others to stop and realize they are perplexed, leading to deeper inquiry."}, {"front": "How does Jowett use the word \"allegation\" differently than modern speakers?", "back": "He uses it as a noun meaning a charge, and as a verb meaning to accuse."}, {"front": "True or False: There are trick questions in philosophy according to the text.", "back": "False, but there are no easy answers either."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
