<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did the trial of Socrates take place?", "back": "The trial took place in 399 BC."}, {"front": "What was the name of the Athenian law court where Socrates was tried?", "back": "The dikasterion."}, {"front": "How many Athenian citizens composed the jury for Socrates' trial?", "back": "The jury consisted of 501 citizens."}, {"front": "What distinguished the dikasterion from modern courts regarding legal professionals?", "back": "It had no judges, no professional lawyers, and no public prosecutors."}, {"front": "What device was used to measure the time allotted for speeches in the Athenian court?", "back": "The klepsydra (a water clock)."}, {"front": "How did Athenian jurors indicate a vote for acquittal?", "back": "They used a solid bronze token."}, {"front": "Which type of bronze token was used by jurors to indicate a vote for conviction?", "back": "A token with a hole in the center."}, {"front": "In the Athenian legal system, how was the final penalty determined after a conviction?", "back": "The jury chose between a penalty proposed by the accuser and one proposed by the defendant."}, {"front": "Why did Socrates consider his 'old accusers' more dangerous than the specific individuals in court?", "back": "Their accusations were based on years of rumor and gossip absorbed by the jurors since childhood."}, {"front": "Which playwright's comedy *The Clouds* helped create the public caricature of Socrates as a charlatan?", "back": "Aristophanes."}, {"front": "The 'old accusers' falsely associated Socrates with the study of heavenly bodies and natural phenomena, a field known as _____.", "back": "Natural philosophy."}, {"front": "What is 'sophistry' as defined in the context of Socrates' trial?", "back": "The art of winning arguments through rhetoric regardless of the truth."}, {"front": "How did Socrates distinguish his teaching method from that of the Sophists regarding money?", "back": "Socrates never charged a fee for his instruction."}, {"front": "Which of Socrates' new accusers was a young poet who filed the formal complaint?", "back": "Meletus."}, {"front": "Who was the wealthy tanner and influential democratic leader among the new accusers?", "back": "Anytus."}, {"front": "The accuser Lycon is said by Socrates to represent the interests of which professional group?", "back": "The orators (rhetoricians)."}, {"front": "What was the first formal charge brought against Socrates in the written indictment?", "back": "Corrupting the young."}, {"front": "What was the second formal charge against Socrates, relating to religious belief?", "back": "Impiety (asebeia)."}, {"front": "What term refers to the inner divine voice or sign that Socrates claimed warned him against wrong actions?", "back": "His daimonion."}, {"front": "What is parrhesia, the rhetorical technique Socrates used in his opening defense?", "back": "The claim to speak frankly and straightforwardly without polished artifice."}, {"front": "Which friend of Socrates asked the Oracle at Delphi if anyone was wiser than Socrates?", "back": "Chaerephon."}, {"front": "What was the Oracle at Delphi’s response to the question regarding Socrates' wisdom?", "back": "The Oracle stated that no one was wiser than Socrates."}, {"front": "How did Socrates initially respond to the Oracle's claim that he was the wisest man?", "back": "He was puzzled because he believed he possessed no special knowledge or wisdom."}, {"front": "What flaw did Socrates find when questioning politicians who had reputations for wisdom?", "back": "They thought they were wise but could not explain or defend their views when pressed."}, {"front": "According to Socrates, by what means do poets produce their work rather than by wisdom?", "back": "Through a kind of genius and divine inspiration."}, {"front": "What error did the craftsmen make that undermined their genuine expertise?", "back": "They assumed their technical skill made them wise about all other great matters."}, {"front": "What is the core meaning of 'Socratic Ignorance'?", "back": "Being wiser than others only by recognizing that one does not know the answers to great life questions."}, {"front": "Socrates claims his philosophical career is not for personal amusement but is an act of _____.", "back": "Obedience to a divine command from the god Apollo."}, {"front": "How does Socrates use a horse-training analogy to refute Meletus’ charge of corrupting the youth?", "back": "He argues that only specialized experts improve animals, while the 'many' are likely to do harm."}, {"front": "What argument does Socrates use to show that he would not intentionally corrupt his associates?", "back": "Corrupted associates would harm him, and no sane person intentionally causes themselves harm."}, {"front": "What logical contradiction does Socrates highlight in Meletus' charge of atheism?", "back": "Meletus claims Socrates believes in no gods while also charging him with introducing new divinities (daimonion)."}, {"front": "To what animal does Socrates compare himself in his famous speech about his role in Athens?", "back": "A gadfly (myops)."}, {"front": "In Socrates' gadfly analogy, what does the 'great but sluggish horse' represent?", "back": "The city of Athens."}, {"front": "According to Socrates, what is the primary purpose of his 'stinging' questioning of citizens?", "back": "To provoke the city into wakefulness and self-examination."}, {"front": "What evidence does Socrates offer to the jury to prove his sincerity and lack of profit-motive?", "back": "His state of considerable poverty."}, {"front": "What was the jury's vote count for the conviction of Socrates?", "back": "280 for conviction to 221 for acquittal."}, {"front": "Under Athenian law, what was the result if a jury's vote ended in a tie?", "back": "The defendant was acquitted."}, {"front": "How many votes would have needed to shift to result in Socrates' acquittal?", "back": "30 votes."}, {"front": "What 'punishment' did Socrates audaciously suggest he actually deserved for his service to Athens?", "back": "Free meals at the Prytaneum."}, {"front": "What was the Prytaneum in ancient Athens?", "back": "The state dining hall where Olympic victors and war heroes were honored."}, {"front": "At the urging of his friends, what monetary fine did Socrates eventually propose as a counter-penalty?", "back": "Thirty minae."}, {"front": "Why did more jurors vote for the death penalty than for the initial conviction?", "back": "They were likely angered by Socrates' defiant proposal of being honored in the Prytaneum."}, {"front": "What prophecy does Socrates give to those who voted for his execution?", "back": "His death will not silence criticism, and younger, harsher questioners will take his place."}, {"front": "According to Socrates, what is the only true way to escape criticism?", "back": "By making oneself genuinely good rather than silencing the critic."}, {"front": "Socrates views death as potentially a 'dreamless sleep,' which he categorizes as _____.", "back": "Annihilation."}, {"front": "What is the second possibility Socrates considers for death, involving the soul?", "back": "Migration of the soul to another place to meet the heroes of the past."}, {"front": "What famous Socratic dictum regarding the value of a life appears near the end of the defense?", "back": "The unexamined life is not worth living for a human being."}, {"front": "Why does Socrates refuse to bring his children into court to plead for mercy?", "back": "He believes the jury's job is to judge based on truth and argument, not to grant favors based on pity."}, {"front": "What did Socrates' daimonion do during the trial that gave him hope that death was not an evil?", "back": "It remained completely silent, never warning him against any of his words or actions."}, {"front": "According to the text, the trial of Socrates represents a collision between philosophical inquiry and the city's need for _____.", "back": "Stability."}, {"front": "Which group of later philosophers looked to Socrates' calm acceptance of death as their primary model of virtue?", "back": "The Stoics."}, {"front": "In the *Apology*, how does Socrates define the 'examined life'?", "back": "A life of regular philosophical self-scrutiny, testing one's values and beliefs."}, {"front": "Why did Socrates characterize the poets as prophets who do not understand their own prophecies?", "back": "They produced beautiful works through inspiration but could not explain the meaning of what they wrote."}, {"front": "What is the literal meaning of the term *klepsydra*?", "back": "Water-thief."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
