    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;

        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;

        /* Controls */
        .fc-controls {

            align-items: center;

            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>

    <script>
    var CARDS = [{"front": "What single revolutionary conviction was shared by all Pre-Socratic thinkers?", "back": "The world could be understood through reason rather than myth.", "id": "fc01"}, {"front": "Term: $\\alpha\\rho\\chi\\eta$ (Arche)", "back": "The fundamental substance or first principle from which all things derive and return.", "id": "fc02"}, {"front": "Which city is traditionally identified as the birthplace of Western philosophy?", "back": "Miletus.", "id": "fc03"}, {"front": "According to Thales of Miletus, what is the $\\alpha\\rho\\chi\\eta$ of all things?", "back": "Water.", "id": "fc04"}, {"front": "Which philosopher was credited with predicting a solar eclipse and measuring the height of pyramids using shadows?", "back": "Thales of Miletus.", "id": "fc05"}, {"front": "What was the major intellectual breakthrough of Thales, regardless of his specific answer to the nature of reality?", "back": "Seeking a natural rather than mythological explanation for the world's composition.", "id": "fc06"}, {"front": "Why did Anaximander argue that the $\\alpha\\rho\\chi\\eta$ could not be a specific element like water or fire?", "back": "Because specific elements are defined by their opposition to one another.", "id": "fc07"}, {"front": "Term: $\\alpha\\pi\\epsilon\\iota\\rho o\\nu$ (Apeiron)", "back": "The infinite, formless, or \"boundless\" substance proposed by Anaximander as the origin of all things.", "id": "fc08"}, {"front": "According to Anaximenes, what is the fundamental substance of the universe?", "back": "Air.", "id": "fc09"}, {"front": "In Anaximenes' theory, by what process does air become fire?", "back": "Rarefaction (becoming thinner).", "id": "fc10"}, {"front": "In Anaximenes' theory, by what process does air become wind, cloud, water, earth, and stone?", "back": "Condensation (becoming thicker).", "id": "fc11"}, {"front": "What significant scientific concept did Anaximenes anticipate by explaining qualitative differences through quantitative changes?", "back": "The foundations of modern chemistry and physics.", "id": "fc12"}, {"front": "How did the Milesian method differ from modern science?", "back": "They reasoned from first principles rather than performing experiments or building mathematical models.", "id": "fc13"}, {"front": "What was the central teaching of Heraclitus of Ephesus regarding the nature of the world?", "back": "Everything is in a state of constant flux.", "id": "fc14"}, {"front": "According to Heraclitus, what is the \"hidden harmony\" or rational principle that governs all change?", "back": "The $\\lambda o\\gamma o\\varsigma$ (Logos).", "id": "fc15"}, {"front": "Which primary element did Heraclitus believe was always transforming yet governed by measure?", "back": "Fire.", "id": "fc16"}, {"front": "What was Parmenides of Elea's radical conclusion regarding change?", "back": "Change is impossible.", "id": "fc17"}, {"front": "Term: $\\tau o$ $\\epsilon o\\nu$ (Being)", "back": "The one, eternal, and unchanging true reality according to Parmenides.", "id": "fc18"}, {"front": "How did Parmenides argue against the possibility of something coming into existence?", "back": "He argued that something cannot come from nothing (what is not).", "id": "fc19"}, {"front": "According to Parmenides, why are motion and diversity considered illusions?", "back": "They are deceptive products of the senses that contradict logic.", "id": "fc20"}, {"front": "How did Plato's Theory of Forms attempt to reconcile the views of Heraclitus and Parmenides?", "back": "By arguing the physical world changes while an unchanging reality of Forms exists behind it.", "id": "fc21"}, {"front": "What did the Pythagoreans believe was the $\\alpha\\rho\\chi\\eta$ of all things?", "back": "Number.", "id": "fc22"}, {"front": "What discovery regarding musical harmony supported the Pythagorean belief in a mathematical cosmos?", "back": "Harmony can be expressed as simple numerical ratios, such as $2:1$ for an octave.", "id": "fc23"}, {"front": "Term: Transmigration of the soul", "back": "The belief that the soul is reborn in a new body, human or animal, after death.", "id": "fc24"}, {"front": "Which Pre-Socratic community deeply influenced Plato's views on the immortality of the soul?", "back": "The Pythagoreans.", "id": "fc25"}, {"front": "Who were the two primary thinkers associated with the original theory of Atomism?", "back": "Leucippus and Democritus.", "id": "fc26"}, {"front": "Term: $\\alpha\\tau o\\mu o\\iota$ (Atoms)", "back": "Tiny, indivisible particles that make up all matter according to Democritus.", "id": "fc27"}, {"front": "According to the Atomists, what two things constitute the entirety of reality?", "back": "Atoms and the void ($\\kappa\\epsilon\\nu o\\nu$).", "id": "fc28"}, {"front": "What characterizes the \"materialist\" account of reality provided by the Atomists?", "back": "The belief that there is nothing in existence but matter and empty space.", "id": "fc29"}, {"front": "Why did Socrates and Plato oppose the materialist view of the Atomists?", "back": "They believed the soul, goodness, and beauty are real and cannot be reduced to matter.", "id": "fc30"}, {"front": "Define $mythos$ in the context of ancient Greek thought.", "back": "Explaining natural events through traditional stories about the gods.", "id": "fc31"}, {"front": "Define $\\lambda o\\gamma o\\varsigma$ in the context of the Pre-Socratic revolution.", "back": "Explaining the world through reasoned argument based on observation and logic.", "id": "fc32"}, {"front": "Term: $\\phi\\upsilon\\sigma\\iota\\varsigma$ (Physis)", "back": "The Greek word for \"nature\" or \"the way things grow,\" forming the root of the word \"physics.\"", "id": "fc33"}, {"front": "What were the Pre-Socratics sometimes called due to their investigation of nature?", "back": "$\\phi\\upsilon\\sigma\\iota\\kappa o\\iota$ (Physikoi).", "id": "fc34"}, {"front": "Term: $\\nu o\\upsilon\\varsigma$ (Nous)", "back": "The cosmic \"Mind\" or \"Intellect\" introduced by Anaxagoras to explain the order of the universe.", "id": "fc35"}, {"front": "How did Socrates change the primary focus of philosophical inquiry?", "back": "He shifted the focus from the natural world (the stars) to the human soul.", "id": "fc36"}, {"front": "In Plato's \"Apology,\" what was the source of the confusion in the accusations against Socrates?", "back": "He was mistakenly associated with the natural speculations of the Pre-Socratics.", "id": "fc37"}, {"front": "What defines the label \"Pre-Socratic\" in the history of philosophy?", "back": "It groups thinkers who came before Socrates, marking him as the field's major turning point.", "id": "fc38"}, {"front": "According to the text, the Pythagorean ratio for a musical fifth is _____.", "back": "$3:2$", "id": "fc39"}, {"front": "The primary method used by the Pre-Socratics to transition from $mythos$ to $\\lambda o\\gamma o\\varsigma$ was _____.", "back": "Reasoned argument (or logic and observation)", "id": "fc40"}, {"front": "Heraclitus was known by the nickname \"_____\", due to his cryptic writing style.", "back": "The Obscure", "id": "fc41"}, {"front": "The term used by Parmenides to describe the deceptive nature of change and motion was _____.", "back": "Illusions (of the senses)", "id": "fc42"}, {"front": "Anaximander was the student of which other Milesian philosopher?", "back": "Thales.", "id": "fc43"}, {"front": "Anaximenes was the student of which other Milesian philosopher?", "back": "Anaximander.", "id": "fc44"}, {"front": "Identify the Greek word for \"word,\" \"reason,\" or \"rational principle.\"", "back": "$\\lambda o\\gamma o\\varsigma$ (Logos).", "id": "fc45"}, {"front": "Which Pre-Socratic thinker argued that every event has a physical cause?", "back": "Democritus.", "id": "fc46"}, {"front": "What specific question drove the inquiries of the three Milesian philosophers?", "back": "What is everything made of?", "id": "fc47"}, {"front": "How many steps constitute Parmenides' logical argument for why change is impossible?", "back": "Five.", "id": "fc48"}, {"front": "Which philosopher wrote his work in hexameter verse?", "back": "Parmenides.", "id": "fc49"}, {"front": "What was the significance of the shift to $\\lambda o\\gamma o\\varsigma$ for the future of human knowledge?", "back": "It opened the door to philosophy, science, and all forms of rational inquiry.", "id": "fc50"}, {"front": "According to the text, what is the literal meaning of the word \"atomos\"?", "back": "Un-cuttable.", "id": "fc51"}, {"front": "In Greek myth, which god was responsible for striking the ground to cause earthquakes?", "back": "Poseidon.", "id": "fc52"}, {"front": "Which Pre-Socratic combined mathematics with a religious community in southern Italy?", "back": "Pythagoras.", "id": "fc53"}, {"front": "What was the core debate between Heraclitus and Parmenides?", "back": "Whether the world is characterized by constant change or eternal stasis.", "id": "fc54"}, {"front": "According to the Milesians, to what do all things eventually return?", "back": "The $\\alpha\\rho\\chi\\eta$ (Arche).", "id": "fc55"}, {"front": "Why does the text claim the Pre-Socratics were not \"performing experiments\" in the modern sense?", "back": "They relied on reasoning from first principles rather than empirical testing.", "id": "fc56"}, {"front": "Which philosopher proposed that qualitatively different things like stone and wind are just different densities of air?", "back": "Anaximenes.", "id": "fc57"}, {"front": "How does the Gospel of John echo Heraclitean terminology?", "back": "By using the term \"Logos\" in its opening line: \"In the beginning was the Logos.\"", "id": "fc58"}, {"front": "According to Anaximander, things emerge from the $\\alpha\\pi\\epsilon\\iota\\rho o\\nu$ and eventually _____ back into it.", "back": "Dissolve", "id": "fc59"}, {"front": "Identify the five steps of Parmenides' logical argument.", "back": "(1) What is, is; (2) What is not, is not; (3) Change requires coming from what is not; (4) What is not does not exist; (5) Change is impossible.", "id": "fc60"}, {"front": "In the dialogue \"Phaedo\", Plato discusses the death of Socrates and mentions a doctrine regarding the soul from which Pre-Socratic?", "back": "Pythagoras.", "id": "fc61"}, {"front": "How did Anaxagoras believe the universe was organized?", "back": "By a cosmic Mind ($\\nu o\\upsilon\\varsigma$).", "id": "fc62"}, {"front": "According to the text, the move from myth to reason was revolutionary because it explained nature through _____.", "back": "Reason (rather than myth)", "id": "fc63"}, {"front": "Why is it useful to understand the Pre-Socratics when reading the dialogues of Plato?", "back": "Plato's theories, like the Theory of Forms, were developed to solve problems raised by the Pre-Socratics.", "id": "fc64"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
