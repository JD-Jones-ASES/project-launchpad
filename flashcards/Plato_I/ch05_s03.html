    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central question does Socrates explore with the Thessalian nobleman in the 'Meno'?", "back": "Whether virtue can be taught."}, {"front": "According to the 'Meno', learning is a process of _____.", "back": "Recollection."}, {"front": "In the 'Meno', what demonstration does Socrates use to show that the soul already knows the truth?", "back": "Leading a slave boy through a geometric proof."}, {"front": "Which Platonic dialogue takes place on the final day of Socrates' life?", "back": "The 'Phaedo'."}, {"front": "In the 'Phaedo', Socrates and his friends discuss the immortality of the _____.", "back": "Soul."}, {"front": "What is the primary question Socrates and his companions seek to answer in the 'Republic'?", "back": "What is justice?"}, {"front": "In the 'Republic', Plato proposes that the ideal city should be ruled by _____.", "back": "Philosopher kings."}, {"front": "Which famous allegory in the 'Republic' describes the human condition and the effect of education?", "back": "The Allegory of the Cave."}, {"front": "How many 'books' comprise Plato's masterpiece, the 'Republic'?", "back": "Ten."}, {"front": "In what major work does Aristotle ask, 'What is the good life for a human being?'", "back": "'Nicomachean Ethics'."}, {"front": "Aristotle define happiness, or _____, as an activity of the soul in accordance with virtue.", "back": "Eudaimonia."}, {"front": "How does Aristotle's approach to ethics differ from Plato's?", "back": "It is more practical and less mystical, grounding ethics in the experience of living well."}, {"front": "Marcus Aurelius's 'Meditations' is a private journal reflecting the tenets of which philosophical school?", "back": "Stoicism."}, {"front": "What was the original language of Marcus Aurelius's 'Meditations'?", "back": "Greek."}, {"front": "In what specific setting did Marcus Aurelius write his reflections on duty and death?", "back": "During military campaigns along the Danube frontier."}, {"front": "Augustine's 'Confessions' is a synthesis of the God of the Bible and _____ philosophy.", "back": "Greek."}, {"front": "Augustine's 'Confessions' follows his journey from a young man pursuing pleasure to what religious position?", "back": "A Christian bishop."}, {"front": "What was the physical setting of Boethius when he wrote 'The Consolation of Philosophy'?", "back": "A prison while he awaited execution."}, {"front": "In 'The Consolation of Philosophy', Boethius engages in a conversation with which personified figure?", "back": "Lady Philosophy."}, {"front": "What are the primary themes discussed between Boethius and Lady Philosophy?", "back": "Fortune, happiness, and the goodness of God."}, {"front": "Boethius's calm resolve in the face of death is compared to Socrates' behavior in which dialogue?", "back": "The 'Crito'."}, {"front": "Which character in literature famously asks 'To be or not to be', mirroring Socratic questioning?", "back": "Shakespeare's Hamlet."}, {"front": "In what way do Dostoevsky's characters revisit the 'Euthyphro' dilemma?", "back": "By debating whether 'everything is permitted' in the absence of God."}, {"front": "Which classical philosophers were read by the American founders to help shape their ideas?", "back": "Plato, Aristotle, and Cicero."}, {"front": "Which intellectual movement that fueled the French Revolution was rooted in philosophy?", "back": "The Enlightenment."}, {"front": "The civil rights movement drew on _____ theory to support its arguments for justice.", "back": "Natural law."}, {"front": "According to the text, why does understanding Plato make one a better reader of Scripture?", "back": "It reveals the intellectual world in which the early Church Fathers thought and wrote."}, {"front": "What contribution did the pre-Socratics make to the foundations of modern science?", "back": "The search for natural explanations."}, {"front": "Which of Plato's emphases significantly contributed to the development of the scientific revolution?", "back": "His emphasis on mathematical structure."}, {"front": "What scientific methodology is specifically attributed to Aristotle in the provided text?", "back": "Systematic observation of the natural world."}, {"front": "List one of the three philosophical assumptions modern science rests upon that it cannot prove itself.", "back": "The reliability of reason (or the intelligibility of nature/the existence of truth)."}, {"front": "What famous sentence regarding the value of self-reflection did Socrates utter in the 'Apology'?", "back": "The unexamined life is not worth living."}, {"front": "For Socrates, the 'examined life' was not solitary reflection, but a life lived in _____.", "back": "Conversation."}, {"front": "What does 'honesty' entail within the context of the Socratic examined life?", "back": "The willingness to admit when you are wrong."}, {"front": "What does 'courage' entail within the context of the Socratic examined life?", "back": "The willingness to ask hard questions even when the answers are uncomfortable."}, {"front": "According to Socrates, where does wisdom begin?", "back": "With knowing how much you do not know."}, {"front": "The 'examined life' is characterized not as a final destination, but as a _____. ", "back": "Practice (or habit)."}, {"front": "The 'Meno' is considered a natural next step for readers because it is short, accessible, and explores _____. ", "back": "Virtue."}, {"front": "Socrates examined his life by asking questions, listening to others, and pushing back against _____.", "back": "Sloppy reasoning."}, {"front": "Socrates was willing to _____ rather than give up the practice of the examined life.", "back": "Die."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
