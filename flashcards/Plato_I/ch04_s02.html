<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Thrasymachus in Book I of the Republic, what is the definition of justice?", "back": "Justice is nothing else than the interest of the stronger."}, {"front": "In Thrasymachus' view, what is the primary purpose of laws made by a ruling group?", "back": "To benefit the rulers themselves."}, {"front": "Term: Sophist", "back": "Definition: A traveling professional teacher in ancient Greece who charged fees for instruction in rhetoric and public speaking."}, {"front": "Why were Socrates and Plato critical of the sophists?", "back": "They accused them of teaching persuasion without regard for truth."}, {"front": "Thrasymachus argues that a democracy makes democratic laws and a tyranny makes tyrannical laws to ensure obedience to _____.", "back": "Self-serving laws."}, {"front": "To whom does Thrasymachus compare rulers who \"fatten or tend\" their subjects?", "back": "Shepherds or neatherds who look after sheep or oxen for their own profit."}, {"front": "How does Thrasymachus describe the outcome for a just man versus an unjust man in a private contract partnership?", "back": "The unjust man always ends up with more and the just man with less when the partnership dissolves."}, {"front": "In dealings with the State, why is the just man considered a \"loser\" by Thrasymachus regarding income tax?", "back": "The just man pays more than the unjust man on the same amount of income."}, {"front": "What does Thrasymachus identify as the \"highest form of injustice\"?", "back": "Tyranny, which takes property wholesale by fraud and force."}, {"front": "According to Thrasymachus, why do people censure injustice?", "back": "They fear being victims of injustice rather than shrinking from committing it."}, {"front": "What is the \"Social Contract\" theory in political philosophy?", "back": "The idea that government rests on an agreement or consent among the governed."}, {"front": "Which English philosopher argued that without a strong government, life would be \"solitary, poor, nasty, brutish, and short\"?", "back": "Thomas Hobbes."}, {"front": "In Hobbes' social contract, what do individuals surrender in exchange for security and order?", "back": "Their natural freedom."}, {"front": "Why did Thomas Hobbes believe that disobedience to a sovereign was not a valid option?", "back": "Because the alternative, the state of nature, is worse than any tyranny."}, {"front": "John Locke argued that every person possesses natural rights to _____, liberty, and property.", "back": "Life."}, {"front": "According to John Locke, what is the duty of citizens if a government violates their natural rights?", "back": "They have a duty to resist the government."}, {"front": "Which philosopher introduced the concept of the \"general will\" in his work *The Social Contract*?", "back": "Jean-Jacques Rousseau."}, {"front": "Under Rousseau's theory, what makes a law legitimate?", "back": "It must reflect the general will and aim at the common good."}, {"front": "Augustine of Hippo's famous principle regarding unjust laws states that an unjust law is _____.", "back": "No law at all (lex iniusta non est lex)."}, {"front": "According to Augustine, what must a law align with to have binding moral authority?", "back": "The eternal law of God."}, {"front": "In Thomas Aquinas' framework, what is the definition of \"Eternal law\"?", "back": "God's rational governance of the entire universe."}, {"front": "Concept: Natural Law (Aquinas)", "back": "Definition: The participation of rational creatures in the eternal law, discoverable through reason."}, {"front": "What is the first principle of natural law according to Thomas Aquinas?", "back": "Good is to be done and pursued, and evil is to be avoided."}, {"front": "How does Aquinas define \"Human law\"?", "back": "Specific laws enacted by human governments that apply natural law to particular circumstances."}, {"front": "What is the purpose of \"Divine law\" in Aquinas' four-fold system?", "back": "To guide humans toward their supernatural end of eternal life with God through revelation."}, {"front": "Term: Prudence (phronesis)", "back": "Definition: The virtue of practical wisdom or the ability to judge rightly what should be done in a specific situation."}, {"front": "Why did Aquinas suggest that citizens might sometimes obey an unjust law?", "back": "To avoid causing more harm, such as provoking violence or disorder."}, {"front": "In \"Letter from Birmingham Jail,\" which two thinkers did Martin Luther King Jr. invoke to defend civil disobedience?", "back": "St. Augustine and St. Thomas Aquinas."}, {"front": "What standard did MLK Jr. use to define a \"just law\"?", "back": "A law that accords with natural and divine law and uplifts the human person."}, {"front": "According to MLK Jr., why were segregation laws unjust?", "back": "They degraded the human person and were imposed on a minority that had no voice in enacting them."}, {"front": "What is the core requirement for an act of civil disobedience to be legitimate according to MLK Jr.?", "back": "It must be nonviolent and the individual must be willing to accept the legal punishment."}, {"front": "What biblical principle from Acts 5:29 serves as the foundation for Christian conscientious objection?", "back": "\"We ought to obey God rather than men.\""}, {"front": "Term: Prosopopoeia", "back": "Definition: A rhetorical device involving giving speech to an abstraction or an absent person."}, {"front": "In the *Crito*, how is prosopopoeia used to challenge Socrates?", "back": "The Laws of Athens are personified and speak to interrogate him."}, {"front": "Who visits Boethius in his prison cell in *The Consolation of Philosophy* to offer arguments about happiness?", "back": "Lady Philosophy."}, {"front": "How does the dialogue structure change in the *Crito* when the Laws begin to speak?", "back": "Socrates becomes the one on trial and the Laws become the questioners."}, {"front": "Which medieval work features the poet Virgil as a guide, representing an authority beyond his literal person?", "back": "Dante's *Divine Comedy*."}, {"front": "According to the source, why is Thrasymachus' challenge a threat to Socrates' \"social contract\" in the *Crito*?", "back": "It implies the contract is a trap designed to shape compliant citizens for the interests of the powerful."}, {"front": "Thrasymachus uses the example of _____ the pancratiast to argue that justice is merely the interest of the stronger.", "back": "Polydamas."}, {"front": "What was the primary goal of the rest of Plato's *Republic* after Book I?", "back": "To prove that justice is a harmony of the soul and good in itself."}, {"front": "According to Hobbes, what happens when citizens ignore legal verdicts they dislike?", "back": "The social contract collapses and society slides back into the chaos of the state of nature."}, {"front": "How did Thomas Jefferson adapt John Locke's formulation of natural rights?", "back": "He changed \"property\" (or estate) to \"the pursuit of happiness.\""}, {"front": "In the context of the *Republic*, what does Thrasymachus mean by calling the just man a \"truly simple\" person?", "back": "He means the just man is easily exploited by the stronger and unjust ruler."}, {"front": "According to Thrasymachus, why is the successful tyrant considered the \"happiest of men\"?", "back": "He takes what he wants through fraud and force without being punished."}, {"front": "What historical conflict influenced Thomas Hobbes' belief in the necessity of an absolute sovereign?", "back": "The English Civil War."}, {"front": "Concept: The General Will", "back": "Definition: The collective will of citizens that aims specifically at the common good of the community."}, {"front": "How does Aquinas' view of disobedience differ from a simple rejection of law?", "back": "It requires the use of prudence to determine if disobedience serves the actual good or causes more harm."}, {"front": "Which philosopher described prudence as the \"charioteer of the virtues\"?", "back": "Thomas Aquinas."}, {"front": "Why does Socrates compare himself to someone trying to \"shave a lion\" when talking to Thrasymachus?", "back": "To indicate the danger or futility of trying to trick or challenge such an aggressive opponent."}, {"front": "In the classical Christian tradition, when is a citizen's obedience to the state considered conditional?", "back": "It is conditional on the state's laws being consistent with divine and natural law."}, {"front": "What literary form uses characters and events to represent abstract ideas, as seen in the *Romance of the Rose*?", "back": "Allegory."}, {"front": "Thrasymachus claims that \"the just\" and \"the right\" are simply words used by the _____ to control others.", "back": "Powerful."}, {"front": "According to Thrasymachus, how does the just man fare when holding public office compared to the unjust man?", "back": "He is hated by friends for refusing to serve them in unlawful ways and gains nothing from the public."}, {"front": "What is the English translation of Aquinas' work *Summa Theologiae*?", "back": "Summary of Theology."}, {"front": "Locke's *Two Treatises of Government* was written as an argument against _____.", "back": "Absolute monarchy."}, {"front": "In what century did Thomas Hobbes write *Leviathan*?", "back": "The 17th century (1651)."}, {"front": "To Thrasymachus, injustice is a man's own _____ and interest.", "back": "Profit."}, {"front": "What simile does Socrates use to describe Thrasymachus' exit after his long speech?", "back": "A bath-man deluging their ears with words."}, {"front": "According to the source, why is Socrates' death considered a rebuttal to Thrasymachus?", "back": "His willingness to die rather than act unjustly proves that justice is a real principle worth more than life."}, {"front": "What did Thrasymachus mean by saying justice is \"another's good\"?", "back": "That it benefits the ruler and harms the subject."}, {"front": "In the view of the Laws in the *Crito*, what is the consequence of a citizen ignoring a legal verdict?", "back": "It undermines and potentially destroys the city's legal system."}, {"front": "Who were the primary audience for MLK Jr.'s \"Letter from Birmingham Jail\"?", "back": "Eight white clergymen who criticized his protests as \"untimely.\""}, {"front": "What distinguishes \"Divine law\" from \"Natural law\" in Aquinas' philosophy?", "back": "Divine law is revealed through Scripture, while natural law is discovered through human reason."}, {"front": "According to Thrasymachus, what happens when a man achieves the \"consummation of injustice\" by making slaves of citizens?", "back": "He is termed happy and blessed by everyone."}, {"front": "How does Rousseau's social contract differ from Hobbes' regarding the absolute power of the ruler?", "back": "Rousseau emphasizes the general will for the common good rather than simple survival under a sovereign."}, {"front": "What is the relationship between Human Law and Natural Law for Thomas Aquinas?", "back": "Human law should be a specific application of natural law to a local context."}, {"front": "According to the text, why did Plato spend nine more books in the *Republic* after Book I?", "back": "To answer Thrasymachus' challenge by defining justice in the soul and the city."}, {"front": "Thrasymachus asserts that the just man is always a _____ in comparison with the unjust man.", "back": "Loser."}, {"front": "What historical philosopher's situation was \"remarkably like Socrates' own,\" involving imprisonment and a death sentence?", "back": "Boethius."}, {"front": "According to the source, what is the Christian tradition's view on blind obedience to the state?", "back": "It rejects blind obedience, placing God's law above human law."}, {"front": "In Thrasymachus' argument, why are small-scale criminals (like burglars) punished while tyrants are praised?", "back": "Small-scale wrongdoers commit crimes \"little by little,\" while tyrants commit them \"wholesale.\""}, {"front": "What was the year of publication for Rousseau's *The Social Contract*?", "back": "1762."}, {"front": "Which branch of philosophy is primarily concerned with the \"social contract\"?", "back": "Political philosophy."}, {"front": "According to Aquinas, a law that contradicts natural law is a _____ of law.", "back": "Perversion (or corruption)."}, {"front": "In the *Republic*, what is Thrasymachus' initial attitude toward Socrates' method of questioning?", "back": "He is aggressive and impatient with Socrates' polite questioning."}, {"front": "For Hobbes, what is the primary motivation for humans to leave the \"state of nature\"?", "back": "Fear of violent death and the desire for security."}, {"front": "Which philosopher's ideas on natural rights were adapted into the American Declaration of Independence?", "back": "John Locke."}, {"front": "According to Thrasymachus, what is the ultimate result of injustice on a \"sufficient scale\"?", "back": "It has more strength, freedom, and mastery than justice."}, {"front": "In the *Crito*, Socrates argues that justice is worth more than _____ itself.", "back": "Life."}, {"front": "According to MLK Jr., what is the status of an unjust law in the eyes of conscience?", "back": "It has no moral authority and one has a responsibility to disobey it."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
