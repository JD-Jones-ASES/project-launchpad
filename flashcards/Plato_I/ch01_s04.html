<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the etymological origin of the word 'philosophy'?", "back": "It comes from two Greek words: 'philos' (love or friendship) and 'sophia' (wisdom)."}, {"front": "Who is traditionally credited with coining the term 'philosophia' and what did it signify?", "back": "Pythagoras, who said he was not a wise man (sophos) but merely a lover of wisdom (philosophos), indicating philosophy is a pursuit, not a finished product."}, {"front": "According to the text, what defines a 'philosopher'?", "back": "A lover of wisdom—someone who cares enough about the truth to keep searching for it, rather than someone who already possesses all the answers."}, {"front": "How does philosophy distinguish itself from other disciplines like science or history?", "back": "Philosophy asks the most fundamental questions—about existence, knowledge, goodness, and meaning—that cannot be settled by observation, experiment, or historical document alone."}, {"front": "Provide the formal definition of 'Philosophy' as given in the text.", "back": "The disciplined pursuit of wisdom through reason and argument. It investigates fundamental questions about reality, knowledge, morality, and the good life that cannot be settled by observation or experiment alone."}, {"front": "What main question does the philosophical branch of Ethics address?", "back": "Ethics asks 'how we ought to live,' covering questions like what is good, what is just, and what we owe to one another. It is sometimes called moral philosophy."}, {"front": "What is the primary concern of Metaphysics?", "back": "Metaphysics asks 'what is ultimately real,' exploring questions about the existence of the soul, the nature of the physical world, and the concept of God or gods."}, {"front": "Explain the etymological origin of the term 'metaphysics.'", "back": "It literally means 'after the physics,' derived from the arrangement of Aristotle's works where his treatise on first principles was placed after his treatise on nature (physis)."}, {"front": "What is the central focus of Epistemology?", "back": "Epistemology asks 'what we can know and how we know it,' exploring what counts as genuine knowledge versus mere opinion, and whether the senses can be trusted."}, {"front": "Which branch of philosophy studies the rules of correct reasoning?", "back": "Logic, which investigates when a conclusion truly follows from its premises and what makes an argument valid."}, {"front": "What kind of questions does Political Philosophy address?", "back": "Political philosophy asks 'how societies should be organized,' examining questions about a government's right to rule and citizens' obligations to the state."}, {"front": "Define 'dialectic' as a philosophical method.", "back": "Dialectic is the method of seeking truth through structured conversation—asking questions, testing answers, and following the argument wherever it leads."}, {"front": "In what historical and geographical context did the Western philosophical tradition begin?", "back": "It began in the Greek-speaking world around the sixth century BC."}, {"front": "Name one of the key conditions in ancient Greece that contributed to the rise of philosophy.", "back": "The Greek city-states (poleis) were small enough for citizens to debate public questions face to face, yet prosperous enough for some men to have leisure to think."}, {"front": "Name another key condition in ancient Greece that fostered philosophy.", "back": "The Greeks were seafaring people who encountered diverse cultures, prompting them to question which customs were universal and which were merely local."}, {"front": "What third condition in ancient Greece helped create 'intellectual space' for philosophy?", "back": "Greek religion, unlike priestly traditions of other cultures, had no sacred scripture and no official theology, allowing more room for independent speculation."}, {"front": "What is a 'polis' in the context of ancient Greece?", "back": "An independent city-state, the basic political unit of ancient Greece (e.g., Athens, Sparta)."}, {"front": "What fundamental shift characterized the birth of philosophy in ancient Greece?", "back": "The shift from mythological to rational explanation—from 'mythos' (e.g., 'Which god makes the rain fall?') to 'logos' (e.g., 'What natural process explains the rain?')."}, {"front": "Which philosophical branch would ask, 'Is the physical world all there is?'", "back": "Metaphysics."}, {"front": "Which philosophical branch would ask, 'What counts as genuine knowledge, as opposed to mere opinion?'", "back": "Epistemology."}, {"front": "Which philosophical branch would ask, 'What obligations do citizens have to the state?'", "back": "Political philosophy."}, {"front": "According to the text, how does Plato's *Euthyphro* engage with philosophical branches?", "back": "It raises questions of ethics ('What is piety?') and metaphysics."}, {"front": "How does Plato's *Apology* exemplify questions from epistemology and ethics?", "back": "Epistemology through 'What does Socrates really know?' and ethics through 'Is the examined life worth living?'"}, {"front": "Who is generally credited with founding formal logic as a discipline?", "back": "Aristotle, though Socrates and Plato practiced logical reasoning before him."}, {"front": "Where did early Greek philosophy primarily begin geographically?", "back": "In a string of Greek colonies along the coast of what is now Turkey."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
