<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial of Socrates (Plato I) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Plato_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What unresolved question from the Euthyphro dialogue haunted Plato?", "back": "Socrates wanted to know the essential nature of piety, not just examples or opinions about it."}, {"front": "What major philosophical theory did Plato develop in response to this unresolved question?", "back": "The Theory of Forms."}, {"front": "What kind of definition did Socrates seek from Euthyphro?", "back": "A universal definition—a stable, unchanging quality shared by all pious acts, independent of particular examples or opinions."}, {"front": "In philosophy, what is a \"universal\"?", "back": "A general property or nature that can be shared by many particular things (e.g., \"redness\" apart from a specific red apple)."}, {"front": "What was Plato's \"bold answer\" to the problem of whether universals are real?", "back": "Plato argued that universals really exist as independent entities."}, {"front": "What Greek term did Plato use for these universals, and how is it typically translated?", "back": "Eide (singular eidos), translated as \"Forms\" or \"Ideas.\""}, {"front": "Describe the fundamental characteristics of Plato's Forms.", "back": "Forms are perfect, eternal, unchanging realities that exist in a realm beyond the physical world, serving as the originals of which particular things are imperfect copies."}, {"front": "How do particular physical objects or actions relate to their corresponding Forms?", "back": "Particular things \"participate in\" or \"imitate\" the Forms; they are imperfect copies of the perfect original Forms."}, {"front": "According to Plato's Theory of Forms, what constitutes true knowledge (episteme) versus mere opinion (doxa)?", "back": "True knowledge is knowledge of the eternal, unchanging Forms, while opinion pertains to the fleeting, imperfect things of the physical world."}, {"front": "How does the Theory of Forms provide a solution to the Euthyphro dilemma regarding piety?", "back": "Piety is defined by the eternal, perfect Form of Piety, which serves as a standard. Gods love pious things because they participate in the Form of the Good, not the other way around."}, {"front": "What is the significance of the Form of the Good within Plato's overall Theory of Forms?", "back": "It is the supreme Form that makes all other Forms knowable and is the ultimate source and ground of all reality."}, {"front": "Explain the role of the sun in Plato's Sun Analogy as it relates to the visible world.", "back": "The sun provides light, making objects visible, and also provides life, enabling growth and generation in the physical world."}, {"front": "Explain the role of the Form of the Good in Plato's Sun Analogy as it relates to the intelligible world.", "back": "The Form of the Good provides truth, making Forms knowable to the mind, and also provides being or essence, giving Forms their reality."}, {"front": "Why does Plato state that the Form of the Good \"exceeds essence in dignity and power\"?", "back": "The Good is not just another Form; it is the ultimate source and ground of all reality and truth, prior to and enabling the existence and knowability of all other Forms."}, {"front": "How does the Form of the Good relate to virtues like piety, according to Plato?", "back": "Virtues like piety derive their nature and value from the Form of the Good; truly wise beings (like gods) love pious things because they participate in the Good."}, {"front": "Who did Plato believe could gain access to the Forms, especially the Form of the Good?", "back": "Only specially trained philosophers who have undergone years of mathematical and dialectical training."}, {"front": "What is the overall purpose of Plato's Divided Line analogy?", "back": "To illustrate how human understanding relates to the Forms by dividing reality into four segments, each representing a different level of awareness and truth."}, {"front": "What are the two main divisions of reality represented on Plato's Divided Line?", "back": "The visible world (realm of opinion/doxa) and the intelligible world (realm of knowledge/episteme)."}, {"front": "Describe the lowest segment of the visible world on the Divided Line.", "back": "\"Images,\" such as shadows and reflections, which are the least real and lead to the lowest level of understanding."}, {"front": "Describe the higher segment of the visible world on the Divided Line.", "back": "Physical objects like animals, plants, and human-made artifacts, which are more real than images but still imperfect copies."}, {"front": "What kind of understanding characterizes the lower segment of the intelligible world on the Divided Line?", "back": "Mathematical and scientific reasoning, where the soul uses visible forms as images but thinks of ideal universals (hypotheses without ascending to a first principle)."}, {"front": "How do mathematicians, in Plato's view, operate within the Divided Line's framework?", "back": "They use visible diagrams as aids but are truly contemplating ideal forms (e.g., the absolute square), starting from hypotheses without questioning their first principles."}, {"front": "What is the highest level of understanding on the Divided Line, and what does it involve?", "back": "Pure intellection or dialectic, where the soul ascends beyond hypotheses to grasp first principles and the Forms themselves, without relying on images."}, {"front": "How does the concept of \"copy vs. original\" apply across the segments of the Divided Line?", "back": "Each higher segment represents the \"original\" for the segment below it (e.g., physical objects are originals to shadows, mathematical forms are originals to physical shapes, Forms are originals to mathematical forms)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
