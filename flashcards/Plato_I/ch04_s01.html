    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Trial of Socrates (Plato I) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Plato_I.html">&larr; Back to The Trial of Socrates (Plato I)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Socrates' immediate situation at the beginning of the Crito dialogue?", "back": "Socrates is in his prison cell in Athens, with only one day left before his execution. His death was delayed for approximately 30 days due to Athens' sacred ship being on its annual pilgrimage to Delos.", "id": "fc01"}, {"front": "What is the key emotional and philosophical contrast between Crito and Socrates at their meeting?", "back": "Crito is driven by loyalty, fear, and grief for Socrates, urging him to escape to save his life. Socrates, in contrast, is calm and driven by reason, seeking to determine the just course of action regardless of the personal cost.", "id": "fc02"}, {"front": "How does Crito's character and his arguments for escape differ from Socrates' approach?", "back": "Crito is a practical, wealthy, and devoted friend who argues from common concerns such as public opinion, family duty, and the ease of escape. Socrates, a philosopher, addresses these concerns by appealing to principles of justice and reason.", "id": "fc03"}, {"front": "What is the irony embedded in Crito's name?", "back": "Crito's name comes from the Greek word 'krites,' meaning 'judge' or 'one who decides.' The irony is that while Crito comes asking Socrates to decide to escape, it is Socrates who performs the real, careful judgment about justice in the dialogue.", "id": "fc04"}, {"front": "Name two of the four main categories of arguments Crito uses to persuade Socrates to escape.", "back": "Crito argues that public opinion will blame his friends, that Socrates has a duty to his children, that escape is easy due to friends' arrangements, and that the trial's verdict was unjust.", "id": "fc05"}, {"front": "Why does Crito believe Socrates should not respect the verdict of his trial?", "back": "Crito argues that the trial was unjust, that Socrates was convicted on false charges by a narrow margin, and that the system itself was manipulated by his enemies, rendering its verdict illegitimate.", "id": "fc06"}, {"front": "How does Socrates use an analogy to challenge Crito's concern about public opinion?", "back": "Socrates compares public opinion to the advice an athlete receives: just as an athlete consults an expert trainer, not the general public, for physical health, one should consult the expert (reason) for the health of the soul.", "id": "fc07"}, {"front": "According to Socrates' analogy, what is more important than physical health, and whose opinion matters regarding it?", "back": "The health of one's 'soul' (which Socrates defines as the part of us that reasons, chooses, and is capable of moral goodness or corruption) is more important. Only the opinion of the 'expert' (reason and truth), not the crowd, matters for the soul's moral well-being.", "id": "fc08"}, {"front": "What is Socrates' central and radical principle that governs his decision not to escape?", "back": "Socrates' central principle is: 'Never Return Injustice for Injustice.' He argues that it is never right to do wrong, even in response to wrong done to oneself.", "id": "fc09"}, {"front": "Why does Socrates believe that returning injustice for injustice is always wrong?", "back": "Doing wrong corrupts one's own soul. Socrates believes the soul is more important than the body, and he would rather die with an uncorrupted soul than live with a guilty one by acting unjustly.", "id": "fc10"}, {"front": "How does Socrates' principle of 'Never Return Injustice for Injustice' differ from the common Greek view?", "back": "The common Greek view held that it was noble to help one's friends and harm one's enemies. Socrates rejects this, stating that harming anyone, even an enemy, is always wrong because it damages one's own soul.", "id": "fc11"}, {"front": "What rhetorical device does Socrates use when he imagines the Laws of Athens speaking?", "back": "Socrates uses 'prosopopoeia,' a rhetorical device where an absent or imaginary person, or an abstract idea, is given a voice and speaks directly. He 'makes a person' out of the Laws of Athens.", "id": "fc12"}, {"front": "What is one of the arguments the Laws make, comparing themselves to parents and teachers?", "back": "The Laws remind Socrates that they made his life possible by providing the framework for his parents' marriage, his birth, upbringing, and education. Disobeying them would be like striking a parent, a grave offense in ancient Athens.", "id": "fc13"}, {"front": "Explain the 'social contract' argument put forth by the Laws in the Crito.", "back": "The Laws argue that by choosing to live in Athens for 70 years, enjoying its benefits, and raising his family there, Socrates implicitly entered into an agreement to obey its authority and judgments, even when they went against him.", "id": "fc14"}, {"front": "What is the Laws' argument about the consequence of Socrates' escape for the city itself?", "back": "The Laws argue that if citizens can simply ignore a court's verdict when it goes against them, the entire legal system collapses, destroying the city's foundation and the rule of law. Socrates' escape would be an attack on the city.", "id": "fc15"}, {"front": "What binary choice do the Laws offer citizens who believe a law or verdict is unjust?", "back": "The Laws state that a citizen has every right to try to change an unjust law through argument and persuasion within the system. The choice is binary: persuade the Laws that they are wrong, or obey them. Disobedience is not an option once the legal process has run its course.", "id": "fc16"}, {"front": "What is a common misreading of Socrates' position on obeying unjust laws in the Crito?", "back": "A common misreading is that Socrates believes all laws are inherently just, or that citizens must blindly obey every law. However, Socrates acknowledges that the verdict against him was wrong, but argues that the system of law itself is more important than any single unjust case, and persuasion is the proper response, not disobedience.", "id": "fc17"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
