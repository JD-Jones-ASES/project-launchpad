    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 11, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary function of Sonnets 117–126 within the Fair Youth sequence?", "back": "They perform a gradual, rueful withdrawal, serving as apologies, justifications, and quiet reckonings before the sequence falls silent on the youth."}, {"front": "What is the dominant posture of the poet in Sonnets 117–126?", "back": "The poet's dominant posture is contrite, confessing to neglect, seeking 'bitter sauces,' and experiencing love-madness, before returning to devotion."}, {"front": "How does Shakespeare typically structure his apologies in this sequence?", "back": "Shakespeare rarely apologizes without simultaneously constructing a defense; his apologies are argued, not abject."}, {"front": "What types of metaphors does Shakespeare frequently use in these sonnets to frame guilt and reconciliation?", "back": "He uses legal and commercial metaphors such as 'bonds,' 'ransoms,' 'adjuncts,' and 'audits' to frame guilt and reconciliation in terms of debt and repayment."}, {"front": "What is the opening declaration or invitation in Sonnet 117?", "back": "It opens with a formal invitation to accusation: 'Accuse me thus'."}, {"front": "According to Sonnet 117, what is the poet's justification for his 'straying'?", "back": "He claims his very straying was a test of the bond's strength with the youth."}, {"front": "What specific confession does the poet make in Sonnet 118 using the phrase 'bitter sauces'?", "back": "He confesses to having sought out 'bitter sauces' as a remedy for an excess of sweetness."}, {"front": "What kind of 'madness' does the poet confess to in Sonnet 119?", "back": "He confesses to losing himself in a kind of 'love-madness' before returning, chastened, to his proper devotion."}, {"front": "What unique achievement does Sonnet 120 accomplish regarding the relationship between the poet and the youth?", "back": "It achieves genuine reciprocity, where the youth's past unkindness cancels the poet's own debt."}, {"front": "In Sonnet 120, what serves as the 'currency of mutual pardon'?", "back": "Their shared wounds become the currency of mutual pardon."}, {"front": "Which sonnet is arguably the most defiant in the entire sequence?", "back": "Sonnet 121."}, {"front": "What famous line from Sonnet 121 expresses the speaker's defiance?", "back": "'I am that I am'."}, {"front": "How does the speaker in Sonnet 121 respond to slanderous observers?", "back": "He refuses to let them define his inner life and turns the charge of vice back upon his accusers."}, {"front": "What is unique about the structure of Sonnet 126 compared to a traditional Shakespearean sonnet?", "back": "It is not a sonnet in the strict sense, consisting of twelve lines (six rhyming couplets) without the customary closing turn."}, {"front": "What is the literary term for Sonnet 126's function as a formal leave-taking?", "back": "It constitutes an envoi."}, {"front": "Who or what is addressed as the youth's 'sovereign mistress' in Sonnet 126?", "back": "Nature."}, {"front": "What quiet warning does Nature deliver to the youth in Sonnet 126?", "back": "That her 'audit must eventually be answered,' implying time will eventually claim the youth's beauty."}, {"front": "What new sequence does Shakespeare's collection turn toward after the Fair Youth vanishes in Sonnet 126?", "back": "The book turns toward the darker world of the Dark Lady."}, {"front": "Do Sonnets 117–126 announce a climax?", "back": "No, they do not announce a climax; rather, they perform a gradual, rueful withdrawal."}, {"front": "What are three key confessions made by the poet in Sonnets 117-119?", "back": "He confesses to neglect (117), seeking 'bitter sauces' (118), and losing himself in 'love-madness' (119)."}, {"front": "How does the 'excess of sweetness' relate to the search for 'bitter sauces' in Sonnet 118?", "back": "The 'bitter sauces' are sought as a remedy for an excess of sweetness, suggesting a desire for contrast or a temporary straying from pure devotion."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
