    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 11, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "In Sonnet 122, why does the speaker explain giving away writing tablets that were a gift from the youth?", "back": "The speaker explains that the youth's memory is fully inscribed in his own brain, making physical tablets redundant and inferior."}, {"front": "What does the word 'tables' refer to in Sonnet 122?", "back": "Writing tablets, which were common personal gifts in the Elizabethan period and conventional tokens of remembrance."}, {"front": "According to the speaker in Sonnet 122, where does the youth's memory truly reside?", "back": "The youth's memory resides 'within my brain / Full character’d with lasting memory,' indicating the speaker's mind."}, {"front": "Why does the speaker in Sonnet 122 claim that keeping a physical aide-mémoire would imply 'forgetfulness'?", "back": "To keep an external record ('adjunct') would imply that his natural memory might fail, which would be an insult to the depth and permanence of his love."}, {"front": "Explain the phrase 'full character'd' as used in Sonnet 122.", "back": "'Full character'd' means fully inscribed or written through and through. It likens the brain to a tablet already perfectly written upon with the beloved's memory."}, {"front": "How does Sonnet 122's argument about memory differ from earlier sonnets that promote poetry as an immortalizing medium?", "back": "Sonnet 122 reverses that logic by distrusting writing and physical documents, instead trusting the living brain as the superior and more lasting record of memory."}, {"front": "What is the central challenge the speaker makes to Time itself in Sonnet 123?", "back": "The speaker challenges Time by refusing to be impressed by its apparent novelties or monuments, asserting his constancy is beyond Time's power to change."}, {"front": "What does 'pyramids' signify in Sonnet 123?", "back": "'Pyramids' refers to ancient monuments and spectacular structures representing human attempts at permanence, not necessarily just the Egyptian ones. They are seen as Time's 'newer might'."}, {"front": "How does the speaker in Sonnet 123 view Time's 'novelties' and 'wonders'?", "back": "The speaker views them as mere 'dressings of a former sight,' meaning old things disguised as new, which human brevity leads people to admire as novelties."}, {"front": "What metaphor is implied by 'dressings of a former sight' in Sonnet 123 regarding Time's actions?", "back": "It implies a theatrical metaphor, suggesting Time acts as a stage manager, making its recycled props and creations look fresh and new."}, {"front": "How does Sonnet 123's approach to defying Time compare to other defiance sonnets like 55 or 107?", "back": "While those poems defeat Time through verse or prophecy, Sonnet 123 defeats it through sheer refusal to be moved, a stoic posture of unshakeable fidelity similar to Sonnet 116."}, {"front": "What is the significance of the 'scythe' in the context of Sonnet 123?", "back": "The 'scythe' is the curved blade traditionally carried by Father Time or the figure of Death, symbolizing Time's power to cut down crops and lives alike. The speaker vows to be true 'despite thy scythe and thee.'"}, {"front": "What is the speaker's main philosophical claim about the nature of true love in Sonnet 124?", "back": "True love is not the 'child of state'—meaning it's not born of circumstance, fashion, or political fortune—and therefore cannot be undone by them."}, {"front": "In Sonnet 124, what does it mean for love to be a 'child of state'?", "back": "To be a 'child of state' means to be a product of circumstances, contingent on political condition or personal fortune rather than possessing intrinsic worth."}, {"front": "How does the speaker describe love that depends on 'outward conditions' in Sonnet 124?", "back": "Love dependent on 'outward conditions' (like smiling pomp or thralled discontent) is dismissed as 'Fortune’s bastard,' an illegitimate offspring of chance without stable parentage or legal standing."}, {"front": "Explain the term 'policy, that heretic' in Sonnet 124.", "back": "'Policy' refers to worldly cunning or strategic calculation, labeled a 'heretic' because it operates only by short-term advantage and lacks faith in anything beyond immediate gains, making it 'religiously wrong'."}, {"front": "How does Sonnet 124's argument for constancy relate to Sonnet 116?", "back": "Both sonnets make a philosophical claim that true love transcends the accidents of time and fortune. Sonnet 116 uses meteorological metaphors, while Sonnet 124 uses political and legal imagery to reach the same conclusion about love's unwavering nature."}, {"front": "Who are the 'fools of time' called as witnesses in the couplet of Sonnet 124, and what do they testify to?", "back": "The 'fools of time' are interpreted as those who are deceived by time's reversals or who, after a life of crime, repent for goodness only at the moment of death. They testify to love's independence from earthly calculation."}, {"front": "What is the ironic meaning of 'hugely politic' when applied to the speaker's love in Sonnet 124?", "back": "The irony is that by refusing to engage in worldly 'policy' or play politics at all, love achieves the 'most politic position' by becoming supremely wise and enduring beyond fickle circumstances."}, {"front": "What two kinds of devotion does Sonnet 125 distinguish between?", "back": "Sonnet 125 distinguishes between outward, ceremonial devotion (like bearing the canopy or building monuments) and genuine, inner devotion, which the speaker calls 'mutual render, only me for thee.'"}, {"front": "What does 'bore the canopy' represent in Sonnet 125?", "back": "'Bore the canopy' represents carrying the ceremonial cloth over a dignitary in procession, symbolizing formal honor, outward show, and a service role rather than true, intrinsic devotion."}, {"front": "Why does the speaker in Sonnet 125 reject 'dwellers on form and favour'?", "back": "He rejects them because he has seen them 'Lose all and more by paying too much rent' for outward show, indicating that investing in superficial honors ultimately leads to ruin."}, {"front": "What is the true nature of the speaker's offering to the youth, as described in Sonnet 125?", "back": "His offering is 'poor but free,' 'not mix'd with seconds, knows no art,' and is characterized by 'mutual render, only me for thee,' emphasizing its unadulterated, sincere, and reciprocal nature."}, {"front": "How does the Early Modern meaning of 'obsequious' in Sonnet 125 differ from its modern connotation?", "back": "In Early Modern usage, 'obsequious' meant devoutly attentive or dutiful, especially in religious or memorial service, without the modern connotation of fawning servility."}, {"front": "What does the 'suborned informer' in the couplet of Sonnet 125 likely suggest about the background situation?", "back": "It suggests the presence of some specific accuser or false witness, perhaps hinting at the Rival Poet or an intermediary who has attempted to undermine the poet's standing with the youth."}, {"front": "What does 'not mix'd with seconds' mean in the context of the speaker's offering in Sonnet 125?", "back": "'Not mix'd with seconds' means unadulterated and not blended with inferior material, emphasizing the purity and genuine quality of the speaker's love, free from any impurity or artifice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
