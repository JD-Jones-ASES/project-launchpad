    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "What is the fundamental definition of a sonnet?", "back": "A fourteen-line poem, compact and self-contained, often described as a small world complete in itself."}, {"front": "Why is the sonnet considered the most durable short form in the Western literary tradition?", "back": "It imposes just enough constraint to demand precision while leaving sufficient room for a poet to think, argue, change direction, and land with force."}, {"front": "What are the three defining structural features shared by every sonnet?", "back": "Fourteen lines, a fixed rhyme scheme, and a meter built on iambic pentameter."}, {"front": "Define an 'iamb' and explain what 'iambic pentameter' means in the context of a sonnet.", "back": "An iamb is the smallest rhythmic unit: an unstressed syllable followed by a stressed one (da-dum). Pentameter means five of these units per line, giving ten syllables in a standard line."}, {"front": "What is the purpose of iambic pentameter in English sonnets?", "back": "It creates a line that rides the natural rhythms of English speech while remaining formal enough to signal an elevated poetic experience."}, {"front": "How is the Petrarchan (or Italian) sonnet structured?", "back": "It divides into an octave of eight lines (rhyming abbaabba) and a sestet of six lines (typically cdecde, cdccdc, or other variants)."}, {"front": "What are the typical functions of the octave and sestet in a Petrarchan sonnet?", "back": "The octave presents a problem, a situation, or a feeling; the sestet responds, resolves, or complicates it."}, {"front": "What is the 'volta' in a sonnet, and what does its name signify?", "back": "The 'volta' (Italian for 'turn') is the hinge between the sonnet's structural movements, signifying a turn in the argument, a shift in perspective, or a moment when the poem changes direction."}, {"front": "Where does the volta typically occur in a Petrarchan sonnet?", "back": "It typically falls at line 9, marking the first line of the sestet, often announced by words like 'but,' 'yet,' or 'however.'"}, {"front": "Why did English poets modify the original Italian sonnet form?", "back": "The interlocked rhyme scheme of the Petrarchan octave (abbaabba) was demanding in English, which is less rhyme-rich than Italian, making it feel strained."}, {"front": "How is the Shakespearean (or English) sonnet structured?", "back": "It consists of three quatrains of four lines each, followed by a closing couplet of two lines, rhyming abab cdcd efef gg."}, {"front": "What is a key practical advantage of the Shakespearean sonnet's rhyme scheme over the Petrarchan?", "back": "It requires only seven distinct rhyme sounds (compared to the Petrarchan's eight or more), making it far more accommodating for the English language."}, {"front": "What is the typical function of the closing couplet in a Shakespearean sonnet?", "back": "It often lands like a verdict—epigrammatic, decisive, and sometimes paradoxical—crystallizing everything the three quatrains have been approaching."}, {"front": "How does the logical rhythm of a Shakespearean sonnet typically differ from a Petrarchan sonnet?", "back": "Shakespearean: develops an argument through accumulation across three quatrains. Petrarchan: creates a balanced debate of thesis (octave) and response (sestet)."}, {"front": "Who developed the Spenserian sonnet variation, and what is its distinctive rhyme scheme?", "back": "Edmund Spenser (in *Amoretti*) developed it, featuring an interlocking rhyme scheme of abab bcbc cdcd ee."}, {"front": "What effect do the interlocking rhymes create in a Spenserian sonnet?", "back": "They create a sense of continuous flow and a more unified, seamless quality rather than three separate blocks."}, {"front": "Why is the volta considered 'the most important structural feature of any sonnet'?", "back": "It marks the pivotal shift in the poem's argument, perspective, or emotional trajectory, essential to its overall meaning and development."}, {"front": "Where can the volta be found in a Shakespearean sonnet?", "back": "It more often comes at line 9 or line 13 (the couplet), and sometimes at both, with Shakespeare being inventive in its placement."}, {"front": "How does recognizing the volta transform the reading experience of a sonnet?", "back": "It transforms the reader from a passive absorber to an active participant, alert to the moment the poem pivots, and helps unlock the sonnet's deeper meaning and thought process."}, {"front": "What type of 'turn' can a Shakespearean sonnet's closing couplet sometimes provide, making it particularly daring?", "back": "It can sometimes reverse everything that came before, pulling the rug from under the reader's feet with a wry or devastating twist."}, {"front": "What specific questions should a reader ask themselves when they identify a volta in a sonnet?", "back": "'When does it change direction? What changes? Why?' These questions are key to unlocking a sonnet's meaning."}, {"front": "What is meant by the statement that a sonnet is 'a small world complete in itself'?", "back": "Despite its brevity, a sonnet develops and resolves a single idea, argument, or feeling fully within its fourteen lines, creating a coherent, self-contained universe."}, {"front": "What is the characteristic 'music' created by iambic pentameter, particularly in Elizabethan verse?", "back": "It creates a ten-syllable pulse that rides the natural rhythms of English speech while signaling a formal, elevated tone, giving verse a distinct musicality."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
