    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "What is the primary reason the speaker gives for the \"farewell\" in Sonnet 87?", "back": "The speaker concludes he never deserved the relationship due to the youth's inherent worth and his own unworthiness, not due to anger or betrayal."}, {"front": "In Sonnet 87, how does the speaker characterize the youth's worth using legal terminology?", "back": "The youth's worth is a \"charter\" that entitles him to freedom, implying his value inherently grants him rights."}, {"front": "Explain the legal term \"patent\" as used in Sonnet 87.", "back": "A \"patent\" is an exclusive right granted by authority. In the sonnet, it refers to the speaker's claim to the youth's love, which he believes has now lapsed or is revoked."}, {"front": "What does the word \"dear\" pun on in Sonnet 87?", "back": "It puns on \"precious\" or \"costly\" and \"beloved,\" suggesting the youth is too valuable both in price and affection for the poet to maintain the relationship."}, {"front": "What is the significance of the \"volta\" (turn) in Sonnet 87?", "back": "The volta reveals the speaker's conclusion that the youth's original gift of love was based on a \"misprision\" (mistake) regarding his own worth or the poet's unworthiness, and now that judgment has corrected itself, the gift \"comes home again.\""}, {"front": "How does the couplet of Sonnet 87 (\"In sleep a king, but waking no such matter\") summarize the speaker's view of the relationship?", "back": "It frames the entire relationship as a dream, a flattering illusion where the speaker felt powerful (\"a king\"), but upon \"waking\" (reality), the illusion is shattered and the relationship is \"no such matter.\""}, {"front": "How did Elizabethan poets like Shakespeare use legal and commercial vocabulary in their poetry, as exemplified by Sonnet 87?", "back": "They frequently borrowed terms like \"charter,\" \"patent,\" and \"bonds\" to describe relationships, debts, and obligations, creating a sustained conceit that makes emotional arguments in cool, precise terms."}, {"front": "What extreme offer does the speaker make to the youth in Sonnet 88 if the youth decides to \"set him light\"?", "back": "The speaker offers to take the youth's side and actively argue against himself, using his intimate knowledge of his own \"conceal'd faults\" to justify his rejection."}, {"front": "Define \"attainted\" as used in Sonnet 88.", "back": "\"Attainted\" is a legal term meaning found guilty, convicted, or stained with dishonor, implying formal condemnation of the speaker's faults."}, {"front": "Explain the paradox of \"double-vantage\" in Sonnet 88.", "back": "The speaker claims that even his self-destruction and the \"injuries that to myself I do\" become a form of gain, or \"double-vantage,\" because by directing all his love towards the youth's benefit, the act of loving the youth completely is its own reward."}, {"front": "What is the ultimate pledge of the speaker in the couplet of Sonnet 88?", "back": "\"Such is my love, to thee I so belong, / That for thy right, myself will bear all wrong.\" He pledges absolute submission, willing to bear all fault for the youth's perceived right."}, {"front": "How does Sonnet 89 extend the self-erasure seen in Sonnet 88 into daily life?", "back": "The speaker promises to play along if the youth invents a reason for separation, even feigning physical \"lameness\" if accused, and avoiding the youth's presence and name to avoid disgracing him."}, {"front": "What does the speaker mean by promising to \"strangle acquaintance\" in Sonnet 89?", "back": "He means he will suppress or cut off all knowledge of and association with the youth, choosing to act like a stranger to the person he loves most."}, {"front": "What chilling conclusion does the speaker reach in the couplet of Sonnet 89 regarding his love?", "back": "\"For I must ne'er love him whom thou dost hate.\" Since the youth apparently hates him, the speaker concludes he must now hate himself or at least stop loving the youth."}, {"front": "What specific request does the speaker make of the youth in Sonnet 90 regarding their separation?", "back": "Instead of begging to be kept, he begs to be abandoned immediately and all at once (\"in the onset come\"), rather than as a delayed \"after-loss\" following other smaller griefs."}, {"front": "What is the \"stoic\" logic behind the speaker's request in Sonnet 90?", "back": "He argues it would be easier to bear the worst blow first, when the spirit is still braced, than to suffer a series of lesser sorrows only for the greatest loss to arrive later, cumulatively breaking him."}, {"front": "Explain the vivid central image in Sonnet 90: \"Give not a windy night a rainy morrow.\"", "back": "This image captures the exhaustion of cumulative grief. A \"windy night\" (storm) is bearable, but to wake to a \"rainy morrow\" (continuing rain) signifies being broken by attrition, not by a single, impactful event."}, {"front": "According to the couplet of Sonnet 90, what is the ultimate consequence of losing the youth for the speaker?", "back": "\"Compar'd with loss of thee, will not seem so.\" The loss of the youth is the measure by which all other suffering is calibrated; once that greatest loss occurs, all other \"strains of woe\" will seem insignificant in comparison."}, {"front": "What recurring motif connects Sonnet 90 to other Shakespearean works?", "back": "The military vocabulary (\"rearward,\" \"onset,\" \"conquered woe,\" \"overthrow\") connects it to battlefield imagery often deployed by Shakespeare."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
