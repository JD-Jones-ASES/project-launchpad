    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What is the initial praise for the youth's appearance in Sonnet 69?", "back": "The world acknowledges the perfection of his outward appearance, finding nothing that 'the thought of hearts can mend'."}, {"front": "How do 'the same tongues' later 'confound' their praise for the youth in Sonnet 69?", "back": "They look beyond his outward appearance to his mind, judging him by his deeds, and find fault, thereby ruining their initial praise."}, {"front": "In Sonnet 69, what do 'churls' metaphorically add to the youth's 'fair flower'?", "back": "They add 'the rank smell of weeds,' symbolizing inner corruption or coarse, base behavior that undermines his outward beauty."}, {"front": "What is the diagnosis for why the youth's 'odour matcheth not thy show' in Sonnet 69's couplet?", "back": "The reason is 'that thou dost common grow,' meaning he has lowered himself through ordinary, base, or promiscuous behavior."}, {"front": "Define 'common grow' as used in Sonnet 69.", "back": "To become common, to lower oneself, or to behave without distinction, implying a loss of what is special through base association or promiscuity."}, {"front": "According to Sonnet 70, why should being blamed or slandered not be considered a 'defect'?", "back": "Slander always targets what is beautiful and worthy ('slander's mark was ever yet the fair'), thus it can be a mark of distinction."}, {"front": "What does 'canker vice the sweetest buds doth love' symbolize in Sonnet 70?", "back": "Using a garden metaphor, it means that corrosive evil and vice naturally target what is most valuable, beautiful, and alive, proving its worth."}, {"front": "How does Sonnet 70 describe the youth's journey through 'the ambush of young days'?", "back": "He either was 'not assail'd, or victor being charg'd,' meaning he has successfully navigated and survived the temptations and dangers of youth."}, {"front": "What is the ultimate concession about the youth's praise in Sonnet 70's couplet?", "back": "Despite his virtues, some 'suspect of ill' (shadow of suspicion or envy) is inevitable; otherwise, his virtues would be so overwhelming as to 'own' all hearts."}, {"front": "What is the poet's initial request to the beloved regarding mourning in Sonnet 71?", "back": "He asks the beloved to mourn him only as long as the death-bell rings and then to forget him."}, {"front": "Why does the poet wish the beloved to forget 'The hand that writ it' (his verses) in Sonnet 71?", "back": "He loves the beloved so much that he wants to spare them grief ('make you woe') that might come from remembering him after his death."}, {"front": "What is the 'final, practical reason' the poet gives for desiring to be forgotten in Sonnet 71?", "back": "To prevent 'the wise world' from mocking the beloved for mourning excessively for a man of 'no worth,' thereby bringing shame upon both of them."}, {"front": "Define 'surly sullen bell' from Sonnet 71.", "back": "It refers to the death-knell, the bell tolled to announce a death in the parish, described with a bitter, brooding, and reproaching character."}, {"front": "How does Sonnet 71 exemplify 'Love's Self-Abnegation'?", "back": "The poet genuinely sacrifices his own claim to memory and immortalization, expressing a willingness to be completely forgotten if remembering him causes pain or public ridicule for the beloved."}, {"front": "In Sonnet 72, what does the poet ask the beloved to do after his death regarding his merit?", "back": "He asks the beloved to 'forget me quite' and to deny that he ever had any merit worthy of love, stating, 'For you in me can nothing worthy prove'."}, {"front": "What is a 'virtuous lie' in the context of Sonnet 72?", "back": "It is a falsehood told for a good moral purpose, specifically for the beloved to invent praise for the poet to avoid shame or to show kindness, despite the poet's perceived worthlessness."}, {"front": "What does 'niggard truth' mean in Sonnet 72?", "back": "Truth that is stingy or reluctant in giving praise, implying that an honest assessment would find nothing worthy of commendation for the poet."}, {"front": "What is the deliberate double meaning of 'untrue' in Sonnet 72 ('speak well of me untrue')?", "back": "It means both speaking of him inaccurately (falsely) and speaking well of him as an untrue (dishonest, worthless) person."}, {"front": "What is the poet's ultimate declaration about his work and himself in Sonnet 72's couplet?", "back": "He states he is 'shamed by that which I bring forth' and that the beloved should also feel shame 'to love things nothing worth'."}, {"front": "How do Sonnets 69 and 70 present contrasting perspectives on criticism directed at the youth?", "back": "Sonnet 69 confirms and delivers criticism, reproaching the youth for inner faults. Sonnet 70 defends against criticism, arguing slander can be a mark of distinction and proving worth."}, {"front": "What tension exists between Sonnets 71, 72 and earlier sonnets (e.g., 60, 63, 65) regarding memory?", "back": "Earlier sonnets promise immortalization of the beloved through the poet's verse, making his memory a vehicle. Sonnets 71 and 72 express a desire for the poet to be forgotten to spare the beloved pain or shame."}, {"front": "What common literary device does Shakespeare use in these sonnets to describe inner corruption?", "back": "He frequently uses garden metaphors, such as 'the rank smell of weeds' in Sonnet 69 and 'canker vice the sweetest buds doth love' in Sonnet 70."}, {"front": "How do Sonnets 71 and 72 demonstrate the theme of extreme self-deprecation?", "back": "The poet not only asks to be forgotten but also to have his worth entirely denied, willing to sacrifice his legacy and identity to protect the beloved from grief, shame, or the necessity of lying."}, {"front": "Which earlier sonnet does the selfless love of Sonnet 71 echo, according to the provided context?", "back": "Sonnet 36 ('Let me confess that we two must be twain'), where the poet suggests separation to protect the beloved's reputation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
