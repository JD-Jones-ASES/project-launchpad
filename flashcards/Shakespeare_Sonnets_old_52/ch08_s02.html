    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What unsettling development does the speaker acknowledge at the opening of Sonnet 78?", "back": "He is no longer the only poet drawing creative sustenance from the young man; other writers, referred to as 'alien pens,' are doing the same."}, {"front": "Define 'alien pen' as used in Sonnet 78.", "back": "A foreign or rival writer's instrument. 'Alien' carries a sense of strangeness and intrusion, suggesting someone who doesn't belong to the speaker's intimate circle."}, {"front": "According to the speaker in Sonnet 78, what effect does the youth's influence have on rival poets?", "back": "It elevates them, adding 'feathers to the learned’s wing' and enabling even the unlearned to write with unexpected power."}, {"front": "How does the speaker differentiate his relationship with the youth from that of the rival poets in Sonnet 78?", "back": "For rivals, the youth merely improves their style ('mend the style') and adds grace; for the speaker, the youth is the 'very substance,' origin, and 'all my art,' the engine of his verse."}, {"front": "What is the significance of the phrase 'Thou art all my art' in Sonnet 78?", "back": "It emphasizes that the youth is not just an ornament or stylistic inspiration for the speaker, but the fundamental essence, origin, and entire creative force of his poetry."}, {"front": "In Elizabethan England, what was the nature of the relationship between poets and patrons, as reflected in the context of Sonnet 78?", "back": "Poets dedicated works to wealthy patrons for financial support and social protection. This often led to competition among multiple writers for a patron's favor and approval."}, {"front": "What initial concession does the speaker make to the rival poet in Sonnet 79?", "back": "He openly acknowledges that the youth 'deserves the travail of a worthier pen' than his own, seemingly conceding the rival's skill."}, {"front": "Explain the speaker's counterargument regarding the rival poet's praise in Sonnet 79.", "back": "The rival poet cannot actually 'give' the youth anything new in his praise; he can only borrow what already exists in the youth's face, character, and behavior, and then reflect it back in verse."}, {"front": "What is the meaning of the line 'He robs thee of, and pays it thee again' in Sonnet 79?", "back": "It's a paradox suggesting that everything the rival 'gives' the youth in praise (like virtue or beauty) was originally taken from the youth's own innate qualities, making the rival both thief and debtor."}, {"front": "Define 'lovely argument' as used in Sonnet 79.", "back": "A beautiful subject or theme. In Elizabethan usage, 'argument' refers to the subject matter of a poem, not a quarrel or dispute."}, {"front": "What does the speaker claim the youth owes the rival poet in the couplet of Sonnet 79, and why?", "back": "The youth owes the rival poet no gratitude, because the youth himself has, with his own innate worth, 'paid' for every compliment the rival has bestowed."}, {"front": "How does the 'sick Muse' metaphor in Sonnet 79 connect to later sonnets in the sequence?", "back": "It anticipates the speaker's more extended meditation on creative paralysis in Sonnet 86, where silence becomes a measure of the rival's indirect triumph, suggesting a draining of the speaker's creative vitality."}, {"front": "Describe the central metaphor that controls Sonnet 80.", "back": "The youth is the vast ocean, capable of bearing both great ships and small; the rival is a 'tall building' of a vessel; and the speaker is a 'saucy bark,' a small, impertinent boat."}, {"front": "What does the speaker mean by calling his own vessel a 'saucy bark' in Sonnet 80?", "back": "It's a self-deprecating but defiant image: a small, impertinent, or bold boat that, despite its inferiority to the rival's grander ship, still dares to venture onto the same 'broad main.'"}, {"front": "How does the speaker characterize the rival poet's abilities in Sonnet 80?", "back": "As a 'better spirit' with superior gifts who can ride upon the youth's 'soundless deep,' implying greater skill and capacity for profound, measured praise."}, {"front": "What is the significance of the couplet in Sonnet 80: 'The worst was this: my love was my decay'?", "back": "It reframes the speaker's potential ruin (being 'wrack’d' or 'cast away') as an almost noble fate. It suggests that if his love for the youth leads to his poetic downfall, it is not a shameful epitaph."}, {"front": "Why was the ocean voyage a powerful metaphor for Elizabethan writers, as seen in Sonnet 80?", "back": "England was in an era of maritime expansion (e.g., defeat of the Spanish Armada, voyages of Drake), making the sea a charged imaginative space for themes of ambition, discovery, and precarious states."}, {"front": "How does Shakespeare transform the conventional sailing imagery in Sonnet 80 compared to earlier poets like Petrarch or Sidney?", "back": "He uses it as a precise social allegory: the ocean is not love itself but the patron (the youth), whose vast capacity makes room for both rivals, even as it dwarfs the lesser one."}, {"front": "What claim does the speaker reassert in Sonnet 81, momentarily stepping back from the rivalry?", "back": "He reasserts one of the sequence's most persistent claims: that his 'gentle verse' will make the youth's memory and name immortal, even after the speaker himself is forgotten and 'in earth am rotten.'"}, {"front": "According to Sonnet 81, where will the youth's 'monument' be found?", "back": "The youth's monument will be the speaker's 'gentle verse,' which 'eyes not yet created shall o’er-read,' ensuring his memory lives on through poetry."}, {"front": "What is the speaker's ultimate promise to the youth in Sonnet 81 regarding immortality?", "back": "The youth 'still shall live' because of the virtue of the speaker's pen, ensuring his memory endures 'where breath most breathes, even in the mouths of men' (through reading and recitation)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
