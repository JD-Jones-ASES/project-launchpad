    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What does 'temperate' imply in Sonnet 18 beyond merely 'mild'?", "back": "It implies the philosophical ideal of temperance, a proper balance of qualities, suggesting the beloved possesses a balanced nature unlike summer's extremes."}, {"front": "What central question does Sonnet 18 open with, and how does the poet immediately begin to answer it?", "back": "The sonnet opens with 'Shall I compare thee to a summer's day?' The poet immediately answers by systematically dismantling the comparison, detailing summer's imperfections like rough winds, a short 'lease,' and fading beauty."}, {"front": "What is the significance of the 'volta' at line 9 in Sonnet 18?", "back": "The volta ('But thy eternal summer shall not fade') signals the poet's triumphant counter-claim: where nature's beauty fails and decays, poetry endures as a means of immortalizing the beloved."}, {"front": "How does Sonnet 18 claim to grant immortality to the beloved?", "back": "Through the poem itself, referred to as 'eternal lines,' which preserves the beloved's beauty against the decay of time, ensuring they live 'So long as men can breathe, or eyes can see.'"}, {"front": "How does Sonnet 18 engage with the Elizabethan poetic tradition of the 'blazon'?", "back": "It invokes the comparison convention of the blazon ('shall I compare you to a summer's day?') but then refuses it from the inside, finding nature (summer) wanting. It transforms into a philosophical argument about the enduring nature of art versus the transient nature of the world."}, {"front": "What classical precursor does Shakespeare's claim of poetic immortality in Sonnet 18 echo?", "back": "It echoes Ovid's boast in the *Metamorphoses* ('my work shall survive'), though Shakespeare's version is more intimate and addressed to a particular, though unnamed, person."}, {"front": "Why might Shakespeare choose to 'dispraise summer rather than simply praise the beloved' in Sonnet 18?", "back": "This indirect approach creates a stronger effect by highlighting the beloved's superiority through contrast with an already beautiful but imperfect standard. It makes the beloved's virtues stand out more clearly and grounds the argument in a philosophical comparison rather than mere flattery."}, {"front": "What does 'devouring' signify in Sonnet 19's opening line, connecting it to classical sources?", "back": "It signifies Time as actively consuming and destroying, an image that recurs throughout the sequence. The Latin *tempus edax rerum* ('time, devourer of all things') from Ovid's *Metamorphoses* is almost certainly the source."}, {"front": "How does Sonnet 19's approach to Time differ from that of Sonnet 18?", "back": "Sonnet 18 defeats Time by asserting the poem's existence beyond its commands, while Sonnet 19 directly confronts Time, granting it sweeping destructive license over the natural world before issuing one specific prohibition."}, {"front": "What is the significance of the 'phoenix' in Sonnet 19, and how does the poet use it?", "back": "The phoenix is a mythical bird symbolizing immortality and renewal. By permitting Time to burn even the phoenix 'in her blood,' Shakespeare grants Time dominion over immortality itself, making his own poetic claim to immortality even more audacious."}, {"front": "Explain the pun on 'antique pen' in Sonnet 19.", "back": "It puns on 'antique' (ancient, old) and 'antic' (grotesque, clownish). Time's 'pen'—the wrinkles it inscribes on the face—is both ancient and faintly ridiculous, a clown's instrument set against the poet's own serious pen."}, {"front": "What is the 'one most heinous crime' that the poet forbids Time from committing in Sonnet 19?", "back": "The poet forbids Time from carving lines into his love's fair brow, specifically stating, 'O! carve not with thy hours my love’s fair brow, / Nor draw no lines there with thine antique pen,' meaning Time must not age or mark the beloved's face."}, {"front": "How does the couplet of Sonnet 19 ultimately defy Time, despite its destructive powers?", "back": "Despite conceding 'Yet do thy worst, old Time; despite thy wrong,' the couplet pivots to confidence: 'My love shall in my verse ever live young,' reaffirming poetry's power to immortalize the beloved beyond Time's reach."}, {"front": "How does Sonnet 20 describe the Fair Youth's appearance and temperament?", "back": "The youth is described as having 'A woman’s face with nature’s own hand painted' and 'A woman’s gentle heart,' but combined with masculine constancy ('not acquainted / With shifting change, as is false women’s fashion')."}, {"front": "Explain the controversial phrase 'master mistress of my passion' from Sonnet 20.", "back": "'Master' suggests male gender and perhaps superiority, while 'mistress' denotes the emotional role of the beloved in a love lyric (the object of the poet's devotion). The phrase resists easy categorization, combining feminine and masculine roles in the beloved."}, {"front": "What is the significance of the wordplay on 'hue' in Sonnet 20's line 'A man in hue all hues in his controlling'?", "back": "'Hue' means color, complexion, or appearance, but also puns on 'Hugh' or 'hew' (which some editors have taken as a possible proper name for the youth). The line is deliberately tangled, enacting through its wordplay the youth's captivating power over all who look at him."}, {"front": "According to Sonnet 20, why did Nature make it impossible for the poet to have a sexual relationship with the youth?", "back": "Nature, while creating the youth, 'fell a-doting' (fell in doting love) on her own creation and, by an 'addition' (a penis), 'defeated' the poet's 'purpose,' selecting the youth 'for women’s pleasure.'"}, {"front": "Explain the double meaning of 'prick'd thee out' in Sonnet 20.", "back": "It primarily means 'chose you' or 'selected you' (like pricking a name from a list). However, Shakespeare is fully aware of the bawdy secondary meaning referring to the male genitalia, which the couplet exploits for comic effect."}, {"front": "How does the couplet of Sonnet 20 resolve the poet's dilemma regarding his 'master mistress'?", "back": "It draws an elegant and witty division: the youth's platonic 'love' belongs to the poet, while the physical 'use' or sexual dimension of that love (their 'treasure') belongs to women."}, {"front": "What is the central 'Master Mistress' debate surrounding Sonnet 20?", "back": "The debate centers on the nature of the poet's love for the Fair Youth. Interpretations include: evidence of homoerotic desire (acknowledged and then renounced), a witty compliment within Elizabethan conventions of intense male friendship, or Shakespeare's deliberate use of ambiguity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
