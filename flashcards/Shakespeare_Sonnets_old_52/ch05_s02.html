    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "In Sonnet 33, what does the phrase \"sovereign eye\" refer to?", "back": "The sun's gaze, described as that of a supreme ruler, implying majesty and the power to bestow or withdraw favour. This regal quality is also attributed to the Youth."}, {"front": "Explain the dual meaning of the word \"stain\" in Sonnet 33.", "back": "It means both a mark of discolouration (like clouds staining the sun) and a mark of moral shame or dishonour, suggesting the Youth's actions are both a natural event and an act of dishonour."}, {"front": "How does Shakespeare transform the traditional 'solar conceit' in Sonnet 33?", "back": "Unlike the Petrarchan tradition where the beloved is a fixed point of brightness, Shakespeare's 'sun' (the Youth) *permits* its own obscuration, implying agency and placing a subtle but unmistakable accusation at the Youth's feet."}, {"front": "What does the word \"disgrace\" in line 8 of Sonnet 33 suggest about the speaker's true feelings?", "back": "Despite the speaker's eventual melancholy pardon in the couplet, 'disgrace' carries the full weight of what has been lost and the speaker's underlying sorrow and sense of injury."}, {"front": "What is the 'delayed revelation' in Sonnet 33?", "back": "The first eight lines vividly describe a natural phenomenon (a glorious sunrise turning cloudy). The 'turn' in line 9, 'Even so my sun one early morn did shine,' reveals this is a metaphor for the Youth and his actions."}, {"front": "What does the possessive 'my' in 'my sun' (Sonnet 33, line 9) convey?", "back": "It emphasizes the personal connection and the speaker's profound emotional investment in the Youth, making the subsequent obscuration a deeply personal betrayal and loss."}, {"front": "According to the commentary, what specific role does Sonnet 33 play within the Fair Youth sequence?", "back": "It stands as a hinge between unconditional praise for the Youth and the subsequent development of a more complicated, troubled love, marked by betrayal and complicated forgiveness."}, {"front": "How does Sonnet 34 continue and intensify the weather metaphor from Sonnet 33?", "back": "In 34, the weather metaphor is explicitly turned into an accusation. The speaker confronts the Youth for promising a 'beauteous day' and letting 'base clouds o'ertake' him, leaving him exposed."}, {"front": "Define 'salve' as used in Sonnet 34.", "back": "An ointment applied to a wound; a remedy. Metaphorically, it refers to the Youth's attempts at making amends, which the speaker initially deems insufficient to heal the wound completely."}, {"front": "Describe the speaker's initial stance on the Youth's tears in Sonnet 34.", "back": "Initially, the speaker rejects the Youth's tears and remorse as insufficient, arguing that they cannot undo the harm or remove the 'disgrace'—a salve heals a cut but doesn't remove the scar."}, {"front": "How does the couplet of Sonnet 34 reverse the speaker's earlier argument?", "back": "Despite earlier insisting remorse is insufficient, the couplet declares the Youth's tears are 'pearl,' precious enough to 'ransom all ill deeds,' transforming the grievance into an act of helpless tenderness and forgiveness."}, {"front": "What is 'physic' in Sonnet 34?", "back": "Medicine or a remedy. The speaker argues that the Youth's shame and tears, while offered as a treatment, cannot truly cure the speaker's grief or loss."}, {"front": "What is the 'rhetorical reversal' that occurs in Sonnet 35?", "back": "The speaker begins by excusing the Youth's fault with natural comparisons, but then reverses, accusing *himself* of 'corrupting' himself by excusing the Youth's sins, thereby becoming an accomplice."}, {"front": "In Sonnet 35, what does 'loathsome canker' symbolize?", "back": "A caterpillar or grub that destroys rose buds from within, or a disease of plants. It symbolizes inward corruption hidden by outward beauty, representing the Youth's inherent fault."}, {"front": "How does Sonnet 35 use legal metaphors to describe the speaker's internal conflict?", "back": "The speaker becomes simultaneously the 'adverse party' (prosecutor) and the 'advocate' (defense attorney) for the Youth, commencing a 'lawful plea' against himself, creating 'civil war' between his love and hate."}, {"front": "What is the significance of 'sensual fault' in Sonnet 35?", "back": "It is the closest the sonnet comes to specifically naming the Youth's transgression, implying a fault arising from physical desire or pleasure, while still maintaining deliberate indirectness."}, {"front": "Define 'accessary' in the context of Sonnet 35's couplet.", "back": "An accomplice to a crime; one who assists a wrongdoer without directly committing the act. The speaker becomes an 'accessary' to the 'sweet thief' (Youth) by excusing his wrongdoing."}, {"front": "How do Sonnets 33, 34, and 35 demonstrate a progression in the speaker's approach to the Youth's transgression?", "back": "33 offers forgiveness through cosmic precedent, 34 through the beauty of repentance and tears, and 35 through the speaker's self-accusation and admission of complicity in excusing the Youth."}, {"front": "According to the commentary, what were the political implications for an Elizabethan reader of a 'sun' (patron) choosing to 'permit' its own obscuration, as in Sonnet 33?", "back": "The Elizabethan reader, steeped in sun iconography as royal/divine power, would understand that a patron withdrawing his countenance leaves his dependent exposed, suggesting political as well as emotional abandonment."}, {"front": "The speaker in Sonnet 35 says he is 'excusing thy sins more than thy sins are.' Explain this statement.", "back": "By actively seeking comparisons and justifications for the Youth's actions, the speaker feels he is going beyond mere forgiveness, effectively becoming an accomplice and corrupting himself more than the Youth's original sin."}, {"front": "What effect does placing the extended description of natural beauty at the beginning of Sonnet 33 have on the reader?", "back": "It creates a powerful aesthetic contrast, making the subsequent revelation of betrayal ('Even so my sun...') more impactful and surprising, thereby deepening the sense of personal loss and 'disgrace' for the speaker."}, {"front": "In Sonnet 34, the speaker states, 'The offender's sorrow lends but weak relief / To him that bears the strong offence's cross.' What does this convey about the nature of amends?", "back": "It suggests that while an offender's repentance might bring them some relief, it often does little to alleviate the suffering or burden ('cross') borne by the wronged party, highlighting the lasting impact of the offense."}, {"front": "Why was legal metaphor a 'pervasive feature' in Elizabethan writing, including Shakespeare's Sonnets?", "back": "Litigation was common, legal language was widely understood, and the Inns of Court (legal training centers) were significant hubs of literary culture, making legal imagery resonate deeply with the Elizabethan audience."}, {"front": "Compare the nature of forgiveness in Sonnet 33 and Sonnet 34.", "back": "In Sonnet 33, forgiveness is granted based on cosmic precedent (even heavenly suns are stained). In Sonnet 34, it comes from the preciousness and perceived beauty of the Youth's repentant tears, despite earlier resistance."}, {"front": "What is the primary complaint the speaker makes against the Youth in Sonnet 34?", "back": "The speaker complains that the Youth 'promised such a beauteous day' (implied fidelity or joy) but then allowed 'base clouds' (betrayal or misbehavior) to overtake the speaker, leaving him exposed and hurt."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
