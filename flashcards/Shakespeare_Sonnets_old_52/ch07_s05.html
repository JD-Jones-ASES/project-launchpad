    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 7, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is the central argument of Sonnet 74 concerning the poet's death?", "back": "It offers consolation by asserting that death will only take the poet's body (the 'worst part'), while his spirit, preserved in his verse, will remain with the beloved."}, {"front": "Explain the meaning of 'fell arrest' in Sonnet 74.", "back": "It refers to death as a 'fierce, absolute seizure,' like a bailiff taking the body without possibility of bail, portraying death as a violent agent."}, {"front": "How does the poet distinguish between his body and spirit in Sonnet 74?", "back": "The body is dismissed as 'dregs' and 'prey of worms,' not worth remembering, while the spirit is the 'better part of me,' preserved in verse and 'consecrate' to the beloved."}, {"front": "What does the poet mean by his verse being 'consecrate to thee' in Sonnet 74?", "back": "It means his spirit, expressed in his verse, is formally set apart for the beloved, like a sacred gift at an altar, ensuring its remembrance."}, {"front": "How does Sonnet 74 reframe the body-spirit distinction compared to traditional Platonic or Christian views?", "back": "While engaging with the tradition, Shakespeare secularizes it; the spirit's immortality is guaranteed not by God but by the beloved's reading and remembrance of the verse."}, {"front": "What is the significance of the final couplet in Sonnet 74: 'The worth of that is that which it contains, / And that is this, and this with thee remains'?", "back": "The couplet is self-referential, pointing to the poem itself as the container of the poet's enduring self, which will remain with the beloved through the verse."}, {"front": "What extended metaphor does Sonnet 75 use to describe the poet's relationship with the beloved?", "back": "The sonnet uses the extended metaphor of a miser and his hoard, representing an obsessive and anxious love."}, {"front": "How does the simile 'So are you to my thoughts as food to life, / Or as sweet-season’d showers are to the ground' characterize the beloved in Sonnet 75?", "back": "It establishes the beloved as absolutely necessary and vital for the poet's existence, like essential sustenance."}, {"front": "Describe the emotional oscillation experienced by the poet in Sonnet 75.", "back": "He swings between extremes: pride and fear, desire for privacy and desire for public display, surfeit (overfed) and starvation (desperate for a look), never finding peace."}, {"front": "What does 'filching age' refer to in Sonnet 75, and how does it relate to the miser metaphor?", "back": "'Filching age' refers to time as a petty thief, stealing the beloved (the 'treasure'), reflecting the miser's justified anxiety about losing his wealth."}, {"front": "Explain the antithetical pair 'pine and surfeit' from Sonnet 75.", "back": "'Pine' means to waste away from want, while 'surfeit' means to overindulge to the point of sickness. This captures the lover's unhealthy alternation between deprivation and excess."}, {"front": "What 'mock-apology' does the poet make in Sonnet 76?", "back": "He apologizes for his verse being repetitive, 'barren of new pride,' and lacking 'variation or quick change.'"}, {"front": "What is the poet's defense for the seeming repetitiveness of his verse in Sonnet 76?", "back": "He states that he always writes of the same subject—love and the beloved—making it natural for his verse to sound constant, like the daily renewal of the sun."}, {"front": "Define 'barren of new pride' in the context of Sonnet 76.", "back": "It means empty of new ornament or novelty, lacking fashionable displays of style."}, {"front": "What does 'keep invention in a noted weed' signify in Sonnet 76?", "back": "It means the poet clothes his creative imagination in a well-known, recognizable style, instantly identifiable as his own."}, {"front": "In Sonnet 76, what is the 'argument' that the poet always returns to?", "back": "The 'argument' is the subject matter or theme, specifically 'you and love,' meaning the beloved and the concept of love itself."}, {"front": "How does the daily sun metaphor in Sonnet 76 explain the poet's constancy?", "back": "Just as the sun is daily both 'new and old' but always the sun, his repeated telling of love is not mere repetition but a daily renewal of an eternal theme."}, {"front": "What three objects are central to Sonnet 77, and what is its primary purpose?", "back": "A mirror ('glass'), a sundial ('dial'), and a blank book ('vacant leaves'). The purpose is to prompt the youth's self-reflection on time's passage and to encourage writing."}, {"front": "What does the 'glass' (mirror) reveal to the youth in Sonnet 77, and what tradition does it evoke?", "back": "It shows 'how thy beauties wear' away with time, serving as a memento mori, linking to earlier sonnets (3, 22) that also use the mirror to reflect transience."}, {"front": "How does observing the 'dial's shady stealth' in Sonnet 77 help the youth understand time?", "back": "The imperceptible movement of the sundial's shadow reveals 'Time’s thievish progress to eternity,' showing time's continuous, quiet, and unavoidable advance."}, {"front": "What is the invitation extended to the youth by the 'vacant leaves' or 'waste blanks' in Sonnet 77?", "back": "The blank pages invite the youth to write down thoughts and memories that his mind cannot contain, 'nursing' them into permanence."}, {"front": "What are the 'offices' referred to in the couplet of Sonnet 77?", "back": "The 'offices' are the functions or tasks performed by the three gifts (mirror, sundial, blank book) in confronting time and fostering self-knowledge and preservation of thought."}, {"front": "Explain the imagery of 'mouthed graves' in Sonnet 77.", "back": "It links the wrinkles shown in the mirror to graves that 'gape open to receive the dead,' suggesting that aging faces are a premonition of burial."}, {"front": "How does Sonnet 77 connect to the Elizabethan practice of commonplace books?", "back": "The invitation for the youth to fill the blank book with thoughts and observations mirrors the practice of educated readers keeping notebooks to extend their memory and preserve knowledge."}, {"front": "How does Sonnet 77, by including a blank book, make the companion book we are reading interactive?", "back": "It transforms the physical book into a living object, inviting the reader (the youth) to engage with it actively by recording their own thoughts and reflections, making it a 'second memory.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
