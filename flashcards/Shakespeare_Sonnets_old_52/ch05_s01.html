    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "What is the overall significance of the ten sonnets gathered in Chapter 5 of the sequence?", "back": "They mark one of the most significant turning points in the entire sequence, moving from unclouded devotion to a period where a 'shadow' falls, introducing hurt and complexity."}, {"front": "How does the relationship between the speaker and the Fair Youth change in Chapter 5 compared to earlier sonnets like 18?", "back": "It becomes significantly more complex, moving from a 'simple' state of near-unclouded devotion to one marked by hurt, implicit accusation, and a 'shadow' of something having happened."}, {"front": "Explain the 'shadow' metaphor as introduced in Sonnet 33.", "back": "It uses the imagery of a glorious morning sun (representing the Fair Youth) being obscured by clouds and stealing away, symbolizing a brief dimming of the Youth's perfection and the speaker's pain, while also excusing the Youth's lapse."}, {"front": "What kind of imagery does Sonnet 33 employ to describe the Fair Youth, and what does it imply?", "back": "It uses solar imagery, portraying the Youth as a 'heavenly body' whose brief dimming (the source of the speaker's hurt) is both excused and mourned by the speaker."}, {"front": "What are the key emotional stages the speaker progresses through in Chapter 5, following the initial hurt?", "back": "Accusation (34), self-recrimination (35), separation to protect the Youth's reputation (36), and a painful reorientation of the speaker's sense of self (37)."}, {"front": "What specific emotional response is most prominent in Sonnet 35 regarding the Youth's actions?", "back": "Self-recrimination, where the speaker astonishingly blames himself for 'authorising' the trespass, rather than condemning the Youth."}, {"front": "Why do Sonnets 38 and 39 carry a more complex emotional charge despite appearing devotional?", "back": "Placed within this chapter, they seem to praise the Youth, but the surrounding context of betrayal and hurt means their 'devotional mode' is tinged with deeper, more conflicted emotions."}, {"front": "What specific betrayal is suggested by Sonnets 40, 41, and 42?", "back": "The Youth has become involved with a woman who was, or is, also the speaker's beloved, a figure later to be known as the Dark Lady."}, {"front": "According to the text, what makes the sonnets in this chapter 'remarkable' regarding the betrayal?", "back": "It is not the betrayal itself, but the speaker's astonishing act of rhetorical contortion and complex response, avoiding outright condemnation of the Youth."}, {"front": "How does the speaker manage forgiveness and grief simultaneously in Sonnet 40?", "back": "He insists on forgiveness even while explicitly naming the grief, showcasing an extraordinary combination of tender permission and barely suppressed anguish."}, {"front": "Describe the 'sophistic finale' of Sonnet 42.", "back": "The speaker constructs a logical argument that since he and the Youth are 'one,' the mistress who loves the Youth actually loves the poet, a transparent act of self-deception."}, {"front": "What is the significance of the final word 'flattery' in Sonnet 42?", "back": "It is the speaker's own admission that his elaborate argument in the sonnet is a comforting fiction and a transparent self-deception, revealing his awareness of his own rationalization."}, {"front": "When does the figure of the 'Dark Lady' emerge fully in the sonnet sequence?", "back": "She emerges fully in Chapters 12 and 13."}, {"front": "What is the overall psychological impact or theme of this chapter's sequence of sonnets?", "back": "They form one of the earliest and most psychologically acute sequences about the experience of being wronged by someone you cannot stop loving."}, {"front": "Which sonnet is highlighted as the first to register the 'fall from unclouded adoration'?", "back": "Sonnet 33."}, {"front": "In which sonnet does the speaker's self-blame reach its 'most elaborate expression'?", "back": "Sonnet 35."}, {"front": "What is the 'extraordinary combination' observed in Sonnet 40?", "back": "It combines tender permission with barely suppressed anguish, as the speaker grapples with forgiveness and grief."}, {"front": "Why is Sonnet 42 considered the chapter's 'most transparent self-deception'?", "back": "Because the speaker's complex argument for unity and shared love is revealed by his own final word, 'flattery,' to be a mere comforting fiction."}, {"front": "How many sonnets celebrating the Fair Youth's beauty precede this turning point chapter?", "back": "Fifteen sonnets celebrated the Fair Youth's beauty with near-unclouded devotion, following sixteen urging procreation."}, {"front": "What is one reason the speaker separates from the Youth in Sonnet 36?", "back": "To protect the Youth's reputation, indicating the speaker's continued concern despite the personal hurt."}, {"front": "How does the speaker's response to betrayal challenge a simple interpretation of victimhood?", "back": "Instead of simply condemning the betrayer, the speaker complicates the situation with self-blame, rhetorical maneuvering, and an insistence on forgiveness, showing a deeper psychological conflict."}, {"front": "What is the 'painful reorientation of the speaker's sense of self' mentioned in Sonnet 37?", "back": "It refers to the speaker having to redefine his identity and relationship to the Youth after the betrayal, as the simple devotion is no longer possible."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
