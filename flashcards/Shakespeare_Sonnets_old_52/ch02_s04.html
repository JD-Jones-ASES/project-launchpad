    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

        </div>

    <script>
    var CARDS = [{"front": "What is the most important piece of advice for reading Shakespeare's sonnets, and what are its benefits?", "back": "The most important advice is to read them aloud. Benefits include forcing decisions about pace and emphasis, making the meter audible, exposing rhymes, slowing down the reading, and engaging your voice to experience the poem physically."}, {"front": "What is iambic pentameter?", "back": "Iambic pentameter is the underlying rhythm of Shakespeare's verse, consisting of five iambs (an unstressed syllable followed by a stressed syllable) per line, totaling ten syllables, with a 'da-dum da-dum' rhythm."}, {"front": "How should a reader approach 'feeling the meter' in a sonnet without forcing it into a mechanical sing-song?", "back": "Read naturally, following the sense of the words, and notice where the rhythm seems to resist natural speech. These points of resistance often indicate Shakespeare's deliberate and expressive variations."}, {"front": "What is a trochee, and what effect does it typically create when used at the start of a line in an iambic poem?", "back": "A trochee is a metrical foot with a stressed-unstressed syllable pattern (the reverse of an iamb). At the start of a line, it often signals emphasis and can create a heavier, more deliberate feel."}, {"front": "Define a spondee and explain its effect in a line of poetry.", "back": "A spondee consists of two stressed syllables in a row. It stops the forward movement of the line and forces weight and slowness, making certain words stand out."}, {"front": "What is a pyrrhic, and what effect does it typically create in a line of poetry?", "back": "A pyrrhic consists of two unstressed syllables. It creates lightness and speed, often used in lines describing movement or transience."}, {"front": "Why is it important to identify the rhyme scheme of a sonnet before deeply analyzing its meaning?", "back": "Identifying the rhyme scheme reveals the poem's audible architecture, allowing the reader to feel the structural blocks (quatrains and couplet). It acts as a map, making the journey through the poem more purposeful."}, {"front": "What is the typical rhyme scheme of a Shakespearean sonnet?", "back": "A Shakespearean sonnet typically follows an ABAB CDCD EFEF GG rhyme scheme."}, {"front": "What is the 'volta' in a sonnet?", "back": "The volta is the 'turn' or pivot in the argument, theme, or emotional register of the sonnet."}, {"front": "Where should a reader typically look for the volta in a Shakespearean sonnet?", "back": "In a Shakespearean sonnet, the volta is usually found at the beginning of the third quatrain (line 9) or in the couplet (line 13)."}, {"front": "What are some 'signal words' that often indicate a volta in a sonnet?", "back": "Common signal words include 'but,' 'yet,' 'however,' 'thus,' 'then,' and 'and yet.'"}, {"front": "Besides signal words, how else can a volta be identified in a sonnet?", "back": "A volta can also manifest through a shift in tense, a change in the subject addressed, a shift in emotional register, or a change in imagery clusters."}, {"front": "How does understanding the volta help clarify the sonnet's architecture?", "back": "Once the volta is found, the sonnet's structure clarifies, with everything before the turn serving as the setup and everything after as the response or resolution."}, {"front": "Why is it recommended to read the couplet of a sonnet twice?", "back": "Reading the couplet twice (first in flow, then in isolation) allows the reader to fully appreciate the weight it carries. It helps analyze whether it resolves, reverses, or suspends the argument, and to interpret the speaker's tone and the rhyme's feeling."}, {"front": "What is a common mistake readers make regarding line ends in metered poetry, and why is it incorrect?", "back": "A common mistake is pausing at the end of every line. This is incorrect because, while the line is a rhythmic unit, it is not necessarily a grammatical one; the sense often flows continuously across line breaks."}, {"front": "How should a reader correctly approach pauses and flow when reading a sonnet?", "back": "Readers should follow the punctuation for sense (pausing at commas, stopping at periods/semicolons) and allow the lines to create the rhythm, rather than pausing arbitrarily at line ends."}, {"front": "What are the three forms of the Elizabethan second-person pronoun system, and how are they typically used?", "back": "The three forms are: 'thou' (subject form, e.g., 'thou art'), 'thee' (object form, e.g., 'I see thee'), and 'thy/thine' (possessive forms, e.g., 'thy beauty,' 'thine eyes')."}, {"front": "What do the verb endings '-est' and '-eth' signify in Elizabethan English?", "back": "'-est' signifies the second-person singular (e.g., 'thou dost'), and '-eth' signifies the third-person singular (e.g., 'he doth,' 'beauty fadeth')."}, {"front": "When encountering tangled or inverted sentences in a sonnet, what practical strategy can help unlock the meaning?", "back": "Identify the main subject and the main verb of the sentence. Cutting through to this grammatical skeleton will usually clarify the meaning."}, {"front": "Why is it beneficial to read a sonnet at least twice?", "back": "The first reading can focus on sound and overall impression, while the second reading can be for sense and detail. It allows for gradual understanding and gives permission not to grasp everything on the initial encounter."}, {"front": "Why does the text suggest reading Shakespeare's sonnets as a 'sequence' rather than 154 separate poems?", "back": "The sonnets reward sequential reading because recurring images accumulate meaning, arguments begun in one sonnet are answered in others, and an emotional narrative develops across the entire collection, revealing a vast, designed meditation."}, {"front": "What is the key insight about Shakespeare's use of iambic pentameter variations?", "back": "Shakespeare varies the iambic pattern deliberately and expressively. Every significant departure from the norm carries interpretive weight and illuminates something about the meaning."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
