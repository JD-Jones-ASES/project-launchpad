    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Shakespeare_Sonnets_old_52 &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Shakespeare_Sonnets_old_52.html">&larr; Back to Shakespeare_Sonnets_old_52</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "In Sonnet XXVIII, what does 'debarre’d' mean, and what connotation does it carry?", "back": "It means 'excluded' or 'shut out.' It has a legal connotation, giving the deprivation of sleep a quasi-official, almost judicial quality."}, {"front": "How do Day and Night, normally opposing forces, conspire to torture the speaker in Sonnet XXVIII?", "back": "Day tortures him with physical toil and distance from the beloved, while Night prolongs his suffering through sleeplessness and grief over that distance."}, {"front": "What literary device is at play when Sonnet XXVIII describes Day and Night as 'enemies to either’s reign' who 'Do in consent shake hands to torture me'?", "back": "Prosopopoeia (a form of personification), which gives absent or abstract forces a vivid presence and agency, making grief feel inhabited."}, {"front": "What futile strategy does the speaker employ in Sonnet XXVIII to seek relief from his tormentors?", "back": "He attempts to flatter Day and Night, telling Day that the beloved's brightness graces it and Night that the beloved 'gilds the even.' The flattery is transparently futile and gains him no reprieve."}, {"front": "Explain the meaning of 'swart-complexion’d night' in Sonnet XXVIII.", "back": "'Dark-faced night.' 'Swart' means dark or swarthy, personifying night with a specific, vivid human characteristic."}, {"front": "What does 'twire' mean in the line 'When sparkling stars twire not' from Sonnet XXVIII?", "back": "To peep or glance furtively. It means when the stars are not peeping out, suggesting they are covered by clouds."}, {"front": "How does Sonnet XXVIII function as a continuation of Sonnet XXVII?", "back": "It directly continues Sonnet XXVII's theme of sleeplessness and longing, completing a day-night structure where XXVII is the night half and XXVIII is the day-into-night half."}, {"front": "Describe the complete emotional arc of Sonnet XXIX.", "back": "It moves from deep despair, self-loathing, and envy in the opening octave to exultant joy, gratitude, and contentment in the sestet, all within fourteen lines."}, {"front": "What serves as the catalyst for the speaker's profound emotional transformation in Sonnet XXIX?", "back": "The memory of the beloved, specifically when he 'Haply I think on thee' (by chance, he thinks of the beloved)."}, {"front": "Analyze the significance of the lark image in Sonnet XXIX.", "back": "The lark, a symbol of joyful morning song, rises 'From sullen earth' to 'sing hymns at heaven’s gate,' metaphorically enacting the speaker's sudden, soaring ascent from despair to pure joy."}, {"front": "In Sonnet XXIX, what does 'bootless cries' refer to?", "back": "Useless, profitless, or in vain cries/prayers that bring no relief, implying that heaven is not listening or responding to his lamentations."}, {"front": "Why is the word 'Haply' crucial to understanding the emotional impact of Sonnet XXIX?", "back": "'Haply' means 'by chance' or 'perhaps.' It's crucial because it emphasizes that the beloved's memory is not willed but arrives accidentally, an unsummoned grace that makes the subsequent transformation feel more moving and authentic."}, {"front": "Where does the volta (turn) occur in Sonnet XXIX, and what is its effect on the poem's structure and emotion?", "back": "The volta occurs at an unusual line 10, mid-sentence, with 'Haply.' This delay allows despair to accumulate over nine full lines, making the subsequent shift to joy arrive with the surprise and power of grace."}, {"front": "After nine lines of intense despair and envy, how does Sonnet XXIX justify the speaker's final claim that he 'scorns to change his state with kings'?", "back": "The poem earns this reversal by portraying the memory of the beloved's sweet love as such profound 'wealth' that it genuinely outweighs and cancels all worldly misfortune, leading to sincere contentment rather than mere wishfulness."}, {"front": "What dual meaning does 'sullen earth' carry in Sonnet XXIX?", "back": "It refers literally to the heavy, dark ground from which the lark rises, but also implicitly to the heaviness, gloom, and despair of the poet's own body and spirit before the memory of the beloved rescues him."}, {"front": "What intricate literary conceit is central to Sonnet XXX?", "back": "The 'sessions of sweet silent thought' are imagined as a formal court of law, where memory acts as a judge, and past griefs, dead friends, and vanished joys are summoned as 'witnesses' or 'cases' for review."}, {"front": "In Sonnet XXX, what do 'sessions' refer to?", "back": "Formal sittings of a law court. This word immediately establishes the legal metaphor that runs throughout the sonnet."}, {"front": "How does the legal and financial conceit of Sonnet XXX resolve in the final couplet?", "back": "The thought of the 'dear friend' acts to 'cancel' all accumulated 'losses' and 'sorrows,' meaning the emotional debts are settled, the ledger is cleared, and all past griefs are 'restor’d' or undone."}, {"front": "Define 'dateless night' as used in Sonnet XXX.", "back": "'Endless; without a fixed term or date of expiry.' 'Death’s dateless night' signifies not merely darkness but permanence and finality, unlike a court term or financial deadline."}, {"front": "What is the meaning of 'cancell’d woe' in Sonnet XXX?", "back": "'Discharged grief' or a debt that was supposedly crossed out or voided. The poem suggests that this grief, though 'cancelled' in the past, can be 'reopened' and felt afresh."}, {"front": "How does Sonnet XXX meticulously accumulate loss throughout its first twelve lines?", "back": "Each quatrain adds new layers of grief by recalling 'precious friends hid in death’s dateless night,' 'love’s long since cancell’d woe,' and 'many a vanish’d sight,' using legal and financial terms to build a precise 'account of sorrow.'"}, {"front": "In what way does Sonnet XXX parallel Sonnet XXIX regarding emotional resolution?", "back": "Both sonnets depict a profound emotional journey from deep sorrow, loss, and despair to a complete restoration of joy and contentment, catalyzed by the singular, transformative thought of the 'dear friend' or beloved."}, {"front": "What dual meaning does 'expense' carry in 'the expense of tears of many a vanish’d sight' in Sonnet XXX?", "back": "It means both the 'expenditure' or outlay of tears for things now gone, and the 'loss' of those very things themselves, linking the act of weeping to a financial cost and a personal sacrifice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
