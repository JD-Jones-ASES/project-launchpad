<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How is the fall of the Western Roman Empire best understood?", "back": "Not as a single event, but as the final act of a slow decline that had been building for more than two centuries."}, {"front": "What was the 'Crisis of the Third Century' (AD 235–284)?", "back": "A 50-year period marked by political instability (over 50 emperors, most murdered), civil war, constant pressure from Germanic tribes, collapsed trade, shrinking cities, and severe currency debasement leading to inflation."}, {"front": "Define 'currency debasement' as practiced by Roman emperors.", "back": "When a government reduces the precious metal content of its coins while keeping their face value. Roman emperors did this to pay soldiers and officials when tax revenues fell short, leading to inflation."}, {"front": "What were the major reforms implemented by Emperor Diocletian (r. AD 284–305) to stabilize the Empire?", "back": "He doubled the army, reorganized provincial administration, and divided the Empire into two administrative halves (East and West), each ruled by a senior (Augustus) and junior (Caesar) emperor, known as the Tetrarchy."}, {"front": "Describe the key differences between the Eastern and Western Roman Empires after Diocletian's division.", "back": "The East was densely populated, urbanized, economically productive (Egypt, Syria, Anatolia, Greece) with a strong capital (Constantinople). The West was less urbanized, faced a longer, exposed frontier (Rhine/Danube), and was more vulnerable to barbarian incursions, leading to its collapse while the East survived."}, {"front": "What does the text argue about the traditional understanding of the term 'barbarian' in the context of Rome's fall?", "back": "The term was originally contemptuous for non-Greek speakers. By Rome's fall, Germanic peoples were not primitive; many had served in Roman armies, converted to Christianity, and had long contact with Rome. The 'invasions' were complex migrations and cultural exchanges, not merely a collision of civilization and savagery."}, {"front": "What new threat emerged in the 370s AD, and what was its immediate impact on Germanic peoples?", "back": "The Huns, fierce horse-warriors from Central Asia, swept westward, driving Germanic peoples like the Visigoths into panic and causing them to seek refuge within Roman territory."}, {"front": "Why did the Visigoths seek to cross the Danube River into Roman territory in AD 376?", "back": "They were refugees fleeing the Huns and sought safety and settlement within the Roman Empire, which Emperor Valens initially granted."}, {"front": "How did Roman administrators treat the Visigoths after they were allowed into the Empire, and what was the consequence?", "back": "Corrupt Roman administrators exploited them, failing to provide promised grain, selling them dog-meat at extortionate prices, and demanding their children as slaves, which led to a Visigothic revolt."}, {"front": "What was the significance of the Battle of Adrianople in AD 378?", "back": "The Visigoths decisively defeated the Roman field army, killing Emperor Valens and destroying two-thirds of the army. It was Rome's worst military defeat since Cannae (216 BC) and signaled a major crack in the Empire's frontier defenses."}, {"front": "Who were the 'Foederati' in the context of the Roman Empire's decline?", "back": "Germanic groups settled inside the Roman Empire under treaty agreements ('foedus'), providing soldiers in exchange for land and payment. This system increasingly meant the Roman army relied on Germanic warriors whose loyalty was to their chieftains."}, {"front": "Why did Alaric, the Visigothic leader, sack Rome in AD 410?", "back": "Alaric repeatedly demanded land, official recognition, and a senior Roman command. When the Western government refused or broke its promises, he invaded Italy and finally sacked the city after two earlier attempts."}, {"front": "What was the psychological impact of the Sack of Rome in AD 410?", "back": "It was devastating. Rome had not fallen to an enemy in 800 years. Christians struggled to explain God's will, while pagans blamed Rome's abandonment of old gods. Augustine began writing 'The City of God' in direct response."}, {"front": "Who was Attila the Hun, and what was his impact on the Roman Empire?", "back": "Attila (r. AD 434–453) united the Hunnic tribes into a fearsome military force, extorting enormous tribute from the Eastern Empire and launching devastating raids into Gaul and Italy. He was widely known as 'The Scourge of God.'"}, {"front": "What was the significance of the Battle of the Catalaunian Plains (AD 451)?", "back": "It was the last great Roman military victory in the West, where a combined Roman and Visigothic army under the Roman general Aetius fought Attila to a standstill in modern France."}, {"front": "How did Pope Leo I influence Attila the Hun during his invasion of Italy in AD 452?", "back": "Pope Leo I met Attila at the Mincio River and persuaded him to turn back, sparing Rome. The reasons for Attila's withdrawal are debated, including Leo's personal authority, disease in Attila's army, or fear of other Roman forces."}, {"front": "Who sacked Rome in AD 455, and how did it differ from Alaric's sack?", "back": "The Vandals, who had seized Carthage, sailed up the Tiber and sacked Rome a second time. This sack was more thorough than Alaric's, stripping even the gilded roof tiles from the Capitoline temples."}, {"front": "By the 460s AD, who held the real power in the Western Roman Empire despite the existence of emperors?", "back": "Germanic military commanders (magistri militum) controlled the shadow emperors, holding the true authority behind the throne."}, {"front": "What happened in AD 476 that is traditionally considered the end of the Western Roman Empire?", "back": "A Germanic chieftain named Flavius Odoacer led a mutiny, killed Orestes, and deposed the boy emperor Romulus Augustulus. Odoacer sent the imperial regalia to Constantinople, signifying that the West no longer needed a separate emperor."}, {"front": "What is the symbolic significance of the name 'Romulus Augustulus' for the last Western Roman Emperor?", "back": "Romulus was Rome's legendary founder, and Augustulus is a diminutive of Augustus ('little Augustus'). This name symbolizes both a new beginning and a diminished, final state for the Western Roman Empire."}, {"front": "List some of the multiple causes modern historians cite for the fall of the Western Roman Empire.", "back": "Military overstretching, economic decline, currency debasement, the Third-Century Crisis, devastating plagues (Antonine, Cyprian), administrative corruption, loss of political legitimacy, and barbarian incursions."}, {"front": "Why is the Eastern Roman Empire often referred to as the 'Byzantine Empire' by historians?", "back": "Historians use the term 'Byzantine Empire' to distinguish the continuing Eastern Roman Empire from the classical Roman Empire, especially after the fall of the West, highlighting its distinct cultural and political evolution centered around Constantinople (formerly Byzantium)."}, {"front": "The Eastern Roman Empire survived for another thousand years. What does this suggest about the fall of the Western Empire?", "back": "It suggests that collapse was not inevitable for the entire Roman Empire and that the Western Empire had specific vulnerabilities (e.g., less urbanized, exposed frontiers, economic issues) that ultimately led to its unique fate."}, {"front": "According to Augustine, what fundamental question did the fall of Rome raise about its past?", "back": "Augustine asked if Rome had ever truly met Cicero's standard of a republic as 'an assemblage of people associated in an agreement with respect to justice,' or if Roman virtue had always been, at its root, a form of collective pride."}, {"front": "What happened to Attila the Hun's empire after his death in AD 453?", "back": "His empire collapsed almost immediately after his death, which occurred on his wedding night from a nosebleed or internal hemorrhage."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
