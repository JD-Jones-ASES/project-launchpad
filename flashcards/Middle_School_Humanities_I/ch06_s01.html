<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How should the 'fall' of the Roman Empire in the West be understood?", "back": "It was not a single dramatic moment, but a slow process of collapse for the Western imperial administration, army, and tax base, while many Roman elements persisted."}, {"front": "What key Roman structures and institutions *survived* in Western Europe after AD 500, despite the imperial collapse?", "back": "Roman roads, Latin (as the language of Church and scholarship), Roman law (adapted by Germanic kingdoms), and the bishop of Rome as a stable institution."}, {"front": "What was arguably the most consequential change for ordinary people's lives during the collapse of the Western Roman Empire?", "back": "The collapse of trade and Roman economic integration, leading to unmaintained roads, disrepaired ports, and a contracted money economy."}, {"front": "What archaeological evidence indicates a decline in ordinary life in Western Europe between AD 400 and 600?", "back": "A dramatic decline in the variety and quantity of goods available to ordinary people."}, {"front": "How did the Eastern Roman (Byzantine) Empire compare to the Western Roman Empire in AD 476?", "back": "The Eastern Empire was still intact, larger, wealthier, and had its capital at Constantinople, including crucial regions like Egypt. The 'Fall of Rome' was primarily a Western phenomenon."}, {"front": "Why are the 'Dark Ages' considered specific to Western Europe?", "back": "Because the Eastern Roman (Byzantine) Empire continued to flourish until AD 1453, meaning the Roman Empire was very much alive for those in Constantinople, Alexandria, or Antioch in AD 500."}, {"front": "What institution is credited with preserving civilization through the collapse of the Western Empire?", "back": "The monastery."}, {"front": "Who was St. Benedict of Nursia, and what was his key contribution to Western monasticism?", "back": "He founded Monte Cassino in AD 529 and wrote the Rule of Saint Benedict, which became the standard for organizing monastic life."}, {"front": "What is the 'Rule of Saint Benedict'?", "back": "A practical document governing monastic life, prescribing a daily schedule of prayer, manual labor, hospitality, and study, designed to make holiness sustainable."}, {"front": "What is the Benedictine motto, and what does it mean?", "back": "The motto is *ora et labora*, meaning 'pray and work'."}, {"front": "What was a 'scriptorium' in a monastery?", "back": "It was the room in a monastery dedicated to copying manuscripts. Before the printing press, monks working in scriptoria were responsible for producing all books by hand."}, {"front": "How did monastic scriptoria contribute to the survival of classical and Christian texts?", "back": "Monks patiently copied manuscripts by hand for centuries, preserving the works of classical antiquity and Christian theology, which otherwise would have been lost during a period of widespread illiteracy."}, {"front": "Name some examples of classical authors or texts whose works were preserved by monastic scriptoria.", "back": "Homer, Plato, Cicero, Livy, the Psalms of David, the letters of Paul, the Aeneid, and the Iliad."}, {"front": "What three key elements made monasteries effective 'arks' for preserving knowledge during the collapse of the Western Roman Empire?", "back": "1) A community committed to staying in one place for generations (*stabilitas*); 2) a daily practice of reading and copying texts; and 3) economic self-sufficiency through farming."}, {"front": "How did the Germanic kingdoms that replaced Roman rule demonstrate a 'transformation' rather than total 'destruction' of Rome?", "back": "They adapted Roman administrative structures, kept Latin as an official language, retained Roman bishops, and formed partnerships with the Roman Church."}, {"front": "How did the Ostrogoths under Theodoric exemplify the preservation of Roman structures?", "back": "They maintained Roman administrative structures in Italy."}, {"front": "What significant religious and political action did the Frankish king Clovis take around AD 496, and what was its long-term impact?", "back": "Clovis converted to orthodox Christianity, creating a powerful partnership between the most dominant Germanic kingdom and the Roman Church, which would influence future European development."}, {"front": "What crucial caution should be remembered when using the term 'Fall of Rome'?", "back": "This phrase describes only the Western Empire. The Eastern Roman (Byzantine) Empire did not fall in AD 476 but continued for nearly a thousand more years, preserving Greek learning, Roman law, and Christian theology."}, {"front": "How does the collapse of Roman trade routes relate to the modern economic concept of 'institutional economics'?", "back": "Both demonstrate that economic prosperity and sustained growth depend on stable political institutions. When these institutions collapse, economies often collapse with them."}, {"front": "What does the 'teachernote' about 'Teaching Collapse Without Fatalism' suggest is the key question to focus on regarding the fall of Rome?", "back": "The key question is not 'Why did Rome fall?' but 'What was worth preserving, and who preserved it?', reframing the narrative from tragedy to stewardship."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
