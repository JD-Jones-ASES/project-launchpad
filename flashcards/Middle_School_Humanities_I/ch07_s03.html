<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the historical term “Dark Ages,” and why is it largely avoided by modern historians?", "back": "A popular term for the period roughly AD 476–1000 in Western Europe, characterized by a decline in urban life, literacy, and long-distance trade after Rome's fall. Modern historians avoid it as pejorative, recognizing that while material conditions declined, it wasn't intellectually “dark” due to monastic learning."}, {"front": "Describe the material conditions in Western Europe during the “Dark Ages” compared to the Roman period.", "back": "There were significant losses in population (e.g., Rome from 1 million to 50,000), literacy, urban life, and long-distance trade. Infrastructure like roads fell into disrepair, and trade shifted from diverse imported goods to only local products."}, {"front": "How did the “Dark Ages” in Western Europe differ from the Eastern Roman (Byzantine) Empire?", "back": "The Eastern Roman (Byzantine) Empire did not experience this collapse. Constantinople remained a large city (c. 400,000 inhabitants), and the “Dark Ages” were a specifically Western European phenomenon."}, {"front": "What was the single most important institution for preserving civilization in Western Europe during the “Dark Ages”?", "back": "The monastery, especially Irish and Benedictine monasteries, was crucial for preserving civilization."}, {"front": "Define the “Rule of Saint Benedict” and state its motto.", "back": "A practical guide for monastic life written by Benedict of Nursia (c. AD 480–547), organizing the monk's day around communal prayer (the Divine Office), manual labor, and sacred reading (*lectio divina*). Its motto is *ora et labora* (“pray and work”)."}, {"front": "Why were Irish monasteries particularly important during the 6th and 7th centuries for the survival of learning?", "back": "Ireland had never been part of the Roman Empire, so it didn't share in Rome's collapse. Irish monasteries became extraordinary centers of learning, preserving Scripture, Church Fathers, Latin grammar, classical authors, and the art of illuminated manuscripts."}, {"front": "Name two prominent Irish monks who helped spread learning back to the continent.", "back": "Columba (c. AD 521–597) and Columbanus (AD 543–615) carried learning and founded monasteries across Europe."}, {"front": "Who was the Venerable Bede, and what was the significance of his *Ecclesiastical History of the English People*?", "back": "Bede (c. AD 673–735) was an English monk and scholar. His *Ecclesiastical History* (AD 731) is the primary source for early English Christianity and introduced the AD/BC dating system still used today."}, {"front": "List at least four roles a monastery played as “Civilization's Ark” during the early medieval period.", "back": "A monastery was simultaneously: a library and scriptorium (copying manuscripts), a farm (self-sufficient), a school (providing formal education), a hospital (medical care), and an inn (hospitality to travelers)."}, {"front": "Who was Gregory the Great, and why is he considered a consequential figure in medieval Church history?", "back": "Gregory I (c. AD 540–604) was the first monk to become pope (AD 590). He organized charitable activities in Rome, sent Augustine of Canterbury to convert the Anglo-Saxons, and his *Pastoral Care* became a standard manual for bishops. He is sometimes called “the last Roman and the first medieval pope.”"}, {"front": "In what ways did Gregory the Great act as both a civil and spiritual governor of Rome and much of Italy?", "back": "He managed church finances, organized food distribution, negotiated with Lombard invaders, and wrote hundreds of letters managing the real problems of a church trying to survive without functioning imperial administration."}, {"front": "Who was Charles Martel, and what was his primary role in the Frankish kingdom?", "back": "Charles Martel (“the Hammer,” c. AD 688–741) was the Mayor of the Palace in the Frankish kingdom, effectively its ruler."}, {"front": "Define the Battle of Tours (AD 732) and its traditional significance.", "back": "A battle in central France where Charles Martel's Frankish forces defeated an Umayyad army advancing from Muslim-controlled Spain. It is traditionally presented as the battle that saved Western Europe for Christianity by ending the northward expansion of Islamic rule."}, {"front": "What is a common historical caution regarding the significance of the Battle of Tours?", "back": "While significant, calling it the moment that “saved Western civilization” is an exaggeration. The Muslim forces were a raiding party, not a full invasion army, and their main presence remained in Spain for centuries. However, it did establish Charles Martel as a powerful ruler and set the stage for Charlemagne's empire."}, {"front": "How did Pepin the Short contribute to the shift in dynastic power and papal authority?", "back": "Pepin the Short (r. AD 751–768), Charles Martel's son, deposed the last Merovingian king with papal approval, establishing the precedent that popes could crown kings."}, {"front": "Who was Charlemagne, and what was his primary goal regarding learning?", "back": "Charlemagne (“Charles the Great,” AD 742–814), son of Pepin, was King of the Franks and one of the most important rulers in Western history. Despite barely being able to write, he had a passionate commitment to learning."}, {"front": "Describe the extent of Charlemagne's Carolingian Empire.", "back": "Through nearly continuous warfare for four decades, he conquered the Saxons, Lombards, Bavarians, Avars, and pushed into Spain. At his death, his empire encompassed most of modern France, Germany, the Low Countries, Austria, Switzerland, and northern Italy."}, {"front": "What was the “Carolingian Renaissance”? List its key features.", "back": "The cultural and intellectual revival under Charlemagne, centered at his court in Aachen. Key features included systematic manuscript copying, reform of education, development of the Carolingian minuscule script (ancestor of modern lowercase letters), and recovery of classical Latin texts."}, {"front": "Explain the significance of Charlemagne's Imperial Coronation on Christmas Day, AD 800.", "back": "Pope Leo III crowned Charlemagne “Emperor of the Romans” in St. Peter's Basilica. This reasserted the idea of a Christian Roman Empire in the West and set a precedent for the complex relationship between pope and emperor that would define medieval politics for centuries."}, {"front": "How did Charlemagne's empire fare after his death?", "back": "His empire did not survive him intact. The Treaty of Verdun (AD 843) divided it among his grandsons, creating the foundations for France, Germany, and a contested middle kingdom. However, the *idea* of the Carolingian Empire survived through the Holy Roman Empire."}, {"front": "What are two specific long-term impacts of Charlemagne's reign that are still relevant today?", "back": "The Carolingian minuscule script he sponsored is the direct ancestor of modern lowercase letters. His efforts in education anticipated universal education. His coronation defined the relationship between religious and political authority in Europe, influencing debates about church and state for centuries."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
