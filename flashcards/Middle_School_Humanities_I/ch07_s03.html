<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Western Europe's economy recover after the collapse of the Roman trade system?", "back": "Through the development of a new, more self-sufficient economic and social order at the local level, less dependent on distant markets."}, {"front": "What three key aspects characterized the new economic and social order in post-Roman Western Europe?", "back": "Feudal agriculture, the monastic economy, and Charlemagne's efforts at standardization and education."}, {"front": "How did the territorial extent of Charlemagne's Carolingian Empire compare to the Western Roman Empire?", "back": "By Charlemagne's death in AD 814, the Carolingian Empire covered roughly the same territory as the Western Roman Empire west of the Rhine and Danube rivers."}, {"front": "Who crowned Charlemagne 'Emperor of the Romans,' and when did this significant event occur?", "back": "Pope Leo III crowned Charlemagne on Christmas Day, AD 800."}, {"front": "Define 'Manor' in the context of the feudal economy.", "back": "The basic unit of the feudal economy: a landed estate owned by a lord, farmed by dependent peasants (serfs or villeins) who owed the lord labor, produce, and fees in exchange for protection and the right to farm. It was largely self-sufficient."}, {"front": "What was the primary agricultural innovation of the early medieval period, replacing the Roman two-field system?", "back": "The three-field system."}, {"front": "Describe how the three-field system worked.", "back": "Arable land was divided into three sections: one planted with a winter grain (wheat or rye), one with a spring crop (oats, barley, legumes), and one left fallow to recover, with fields rotating each year."}, {"front": "List three significant advantages of the three-field system over the two-field system.", "back": "It increased total production by one-third, improved soil fertility (especially with legumes), spread agricultural risk, and provided more protein in the diet."}, {"front": "Why was the three-field system crucial for Western European population recovery and future development?", "back": "It meant roughly 50% more land under cultivation at any given time, providing more food per acre, which supported a growing population and freed up labor for crafts, building, and scholarship, laying the agricultural foundation for the High Middle Ages."}, {"front": "What principle guided the economic life of Benedictine monasteries, and what does it mean?", "back": "'Ora et labora' ('pray and work'), which required monks to support themselves through their own labor."}, {"front": "Beyond spiritual life, what economic expertise did Benedictine monasteries develop?", "back": "Expertise in agriculture, craft production, and meticulous record-keeping."}, {"front": "How did monasteries contribute to technological diffusion in the early medieval West?", "back": "They introduced innovations like water mills, improved crop rotation techniques, and systematic drainage into regions that lacked them."}, {"front": "What role did the monastic 'scriptorium' play in the economic and intellectual life of the early medieval period?", "back": "Scriptoriums maintained careful records, allowing monasteries to track yields, manage resources, and plan for the future, and they were centers for copying and preserving texts."}, {"front": "Name three ways monasteries functioned as economic hubs in their regions.", "back": "They pioneered agricultural techniques, engaged in craft production (manuscripts, metalwork), provided hospitality, offered credit, and established schools."}, {"front": "What was Charlemagne's uniform silver coin called, which became a standard for centuries?", "back": "The denier."}, {"front": "Define 'Capitulary.'", "back": "A written royal decree issued by Charlemagne, organized into chapters (capitula), covering various aspects of governance from military to education. They represented the most systematic attempt at governance in Western Europe since the Romans."}, {"front": "What was the purpose and key requirement of Charlemagne's Admonitio Generalis (AD 789)?", "back": "It ordered every monastery and cathedral to establish a school teaching reading, writing, singing, arithmetic, and grammar, primarily to produce literate administrators and priests."}, {"front": "What was the long-term effect of Charlemagne's educational program?", "back": "It led to a genuine cultural revival, known as the Carolingian Renaissance, by promoting literacy and scholarship."}, {"front": "How did Charlemagne's educational program echo Plato's philosopher-king ideal and the Roman cursus honorum?", "back": "Like Plato, Charlemagne believed good governance required educated leaders; like the Roman system, it stressed demonstrated competence for public service."}, {"front": "What was the Carolingian Minuscule, and why was it significant?", "back": "A clear, rounded script (the precursor to modern lowercase letters) developed by Alcuin of York. It standardized handwriting, making manuscripts easier to read across the empire and reducing copying errors."}, {"front": "Who is credited with developing or standardizing the Carolingian Minuscule?", "back": "Alcuin of York, working at Charlemagne's court."}, {"front": "How did the Carolingian Minuscule influence later European writing?", "back": "Italian humanists of the Renaissance adopted it, mistaking it for ancient Roman script, and it became the model for the lowercase letters we use today."}, {"front": "Compare the primary goal of Charlemagne's schools to Plato's academy for an elite.", "back": "Plato's academy aimed to produce philosophical elites who contemplated the Good, while Charlemagne's schools aimed at broader literacy to produce literate administrators and priests for practical governance, based on Scripture and grammar."}, {"front": "In the context of the early medieval world, how did the Church function as an administrative network for Charlemagne's empire?", "back": "Monasteries and major churches were distributed across the empire, connecting communities, carrying information, educating administrators, and providing infrastructure for governance, acting as the post office, school system, and relief agency."}, {"front": "How did the Carolingian Renaissance compare to earlier cultural revivals in Periclean Athens or Augustan Rome?", "back": "All were deliberate efforts to yoke political power with cultural revival. While Athens built the Parthenon and Rome commissioned the Aeneid, Charlemagne focused on copying manuscripts and teaching grammar, shifting the model from physical grandeur/epic poetry to parchment/Scripture, but retaining the impulse that a great civilization must be learned."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
