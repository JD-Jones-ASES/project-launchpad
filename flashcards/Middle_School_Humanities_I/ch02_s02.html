<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the primary purpose of attending theater in ancient Athens?", "back": "Attending the theater in ancient Athens was a civic and religious duty, performed at the festival of Dionysus, and often attended by thousands of citizens at public expense."}, {"front": "Who were the three great tragedians of ancient Greece mentioned in the text?", "back": "Aeschylus, Sophocles, and Euripides."}, {"front": "What was the role of comedy in Greek drama, and who was a prominent comic playwright?", "back": "Comedy, exemplified by Aristophanes, satirized politicians and philosophers mercilessly."}, {"front": "What does the text imply by stating, 'Drama was how Athens thought out loud about itself'?", "back": "It means drama served as a public forum for Athenians to collectively explore and debate deep questions of justice, fate, human-god relationships, and societal issues."}, {"front": "What is Aeschylus's most famous surviving work, and what is its significance?", "back": "Aeschylus wrote the *Oresteia*, the only complete tragic trilogy to survive from antiquity, which includes *Agamemnon*."}, {"front": "What is the central conflict and act of vengeance in Aeschylus's *Agamemnon*?", "back": "King Agamemnon is murdered by his wife Clytemnestra upon his triumphant return, as she seeks vengeance for his sacrifice of their daughter, Iphigenia."}, {"front": "What literary insight does Aeschylus offer by opening *Agamemnon* with a low-ranking watchman?", "back": "Greek tragedy often gives the clearest moral vision to ordinary characters rather than to kings or heroes, highlighting universal human truths."}, {"front": "Who is often considered the greatest of the Greek tragedians, and what is his most famous play discussed?", "back": "Sophocles is often considered the greatest, and his play *Antigone* is highlighted."}, {"front": "What is the fundamental clash presented in Sophocles's *Antigone*?", "back": "The clash between human law (King Creon's decree) and divine law (the gods' unwritten laws)."}, {"front": "What specific action does Antigone take that defies King Creon's decree?", "back": "Antigone defies the king's decree by burying her brother Polynices, whom Creon had declared a traitor and forbidden burial rites."}, {"front": "What timeless ethical question does *Antigone* raise, particularly relevant for classical Christian students?", "back": "What do you owe the state, and what do you owe God? When they conflict, which takes priority?"}, {"front": "What philosophical concept, described as 'immutable unwritten laws of Heaven,' is central to Antigone's argument?", "back": "Natural law, the idea that certain moral truths exist eternally and are not invented by human societies."}, {"front": "How does Sophocles's concept of 'unwritten laws' in *Antigone* align with Christian tradition?", "back": "Sophocles's intuition that moral laws exist above human legislation aligns with the Christian tradition of natural law, as seen in Cicero, Paul's letter to the Romans, and Thomas Aquinas."}, {"front": "Why is understanding Socrates's exact words and beliefs a 'historical puzzle'?", "back": "Socrates wrote nothing himself; all attributed words come through others, primarily Plato, Xenophon, and Aristophanes, each with their own interpretations and agendas."}, {"front": "Who are the primary sources for our knowledge of Socrates's philosophy?", "back": "His student Plato (especially in *The Apology*), Xenophon (a soldier and historian), and Aristophanes (a comic playwright)."}, {"front": "What charges were brought against Socrates in Plato's *Apology*?", "back": "Socrates was charged with impiety and corrupting the youth."}, {"front": "What is Socrates's most famous declaration about human existence, as recorded in Plato's *Apology*?", "back": "'The unexamined life is not worth living.'"}, {"front": "How did Socrates respond to the Athenian jury when faced with a choice between obeying the state and obeying God?", "back": "He declared, 'Men of Athens, I honour and love you; but I shall obey God rather than you, and while I have life and strength I shall never cease from the practice and teaching of philosophy.'"}, {"front": "What was the outcome of Socrates's trial in Athens?", "back": "The jury voted to convict Socrates (280–221) and then voted for his death."}, {"front": "What sobering reminder does Socrates's execution provide about democracy?", "back": "It reminds us that democracy does not guarantee wisdom, as Athens, the birthplace of democracy, executed its greatest philosopher for asking too many questions."}, {"front": "Beyond historical influence, why do texts like *Antigone* and Plato's *Apology* still matter today?", "back": "They address continuing urgent questions such as what to do when conscience forbids what the state commands, and the necessity of the 'examined life' (thinking carefully about truth, goodness, and beauty)."}, {"front": "According to the 'Then and Now' section, what moral intuitions did Greek tragedy and philosophy share with Christian truths?", "back": "They arrived at intuitions like pride destroying (*Agamemnon*), laws existing above human laws (*Antigone*), and the soul being more important than the body (*Socrates*)."}, {"front": "How did the early Church approach Greek philosophy?", "back": "The early Church 'baptized the best of it,' integrating elements like Plato's language of the soul and Aristotle's logic into Christian theology, rather than discarding it."}, {"front": "How does the concept of *arete* (excellence) in Sophocles's *Antigone* differ from its portrayal in Homeric epics?", "back": "Homeric heroes valued *arete* as personal glory and military courage, while Sophocles in *Antigone* values moral courage, adherence to divine law, and fidelity to conscience, even against state power."}, {"front": "Name two historical figures mentioned in the text who faced the same dilemma as Antigone regarding state law vs. conscience.", "back": "Thomas More (1535) and Dietrich Bonhoeffer (1945)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
