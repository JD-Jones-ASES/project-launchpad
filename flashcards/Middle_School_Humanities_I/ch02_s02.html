<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the role of theater in Athenian society during the Golden Age?", "back": "Attending theater was a civic and religious duty, performed at the festival of Dionysus, publicly funded, and used to explore deep societal questions about justice, fate, and human-god relationships."}, {"front": "Name the three great Greek tragedians mentioned in the text.", "back": "Aeschylus, Sophocles, and Euripides."}, {"front": "Who was Aristophanes, and what was his contribution to Greek drama?", "back": "Aristophanes was a comedic playwright who mercilessly satirized politicians and philosophers."}, {"front": "Which is the only complete tragic trilogy by Aeschylus to survive from antiquity?", "back": "The Oresteia."}, {"front": "What is the central plot of Aeschylus's 'Agamemnon'?", "back": "King Agamemnon returns home from Troy and is murdered by his wife Clytemnestra, who seeks revenge for his sacrifice of their daughter Iphigenia."}, {"front": "What is significant about Aeschylus opening 'Agamemnon' with a watchman's soliloquy?", "back": "It demonstrates that Greek tragedy often gives the clearest moral vision to ordinary characters rather than to heroes or kings."}, {"front": "Who is often considered the greatest of the Greek tragedians?", "back": "Sophocles."}, {"front": "What central conflict does Sophocles' 'Antigone' present?", "back": "The clash between human law (King Creon's decree) and divine law (Antigone's belief in the gods' unwritten laws)."}, {"front": "What was Antigone's act of defiance in the play 'Antigone'?", "back": "She defied King Creon's decree by burying her brother Polynices, whom Creon had declared a traitor."}, {"front": "According to Antigone, what are the characteristics of the gods' 'unwritten laws'?", "back": "They were not ordained by Zeus or human Justice, are immutable, eternal, and their origin is unknown."}, {"front": "What is 'natural law,' as described in relation to 'Antigone'?", "back": "The philosophical concept that certain moral truths are not invented by human societies but simply exist, eternal and unchosen, above human legislation."}, {"front": "What enduring question does Sophocles' 'Antigone' pose that remains relevant today?", "back": "What do we do when the state commands something our conscience forbids? (Or, what do you owe the state, and what do you owe God, when they conflict?)"}, {"front": "Why is it historically challenging to understand the 'real' Socrates?", "back": "Socrates wrote nothing himself; all accounts come through others, primarily his brilliant student Plato, but also Xenophon and Aristophanes, each with their own interpretations and agendas."}, {"front": "What is Plato's 'Apology' an account of?", "back": "Plato's account of Socrates' trial before an Athenian jury of 501 citizens on charges of impiety and corrupting the youth."}, {"front": "What was Socrates' key argument in his defense at trial, according to Plato's 'Apology'?", "back": "He argued that the 'unexamined life is not worth living' and that his philosophizing was a command from God, which he would never cease, even if it meant death."}, {"front": "What famous phrase from Plato's 'Apology' expresses Socrates' core belief about human existence?", "back": "'The unexamined life is not worth living.'"}, {"front": "What sobering reminder does Socrates' execution offer about democracy?", "back": "It reminds us that democracy does not guarantee wisdom, as Athens, the birthplace of democracy, executed its greatest philosopher for asking too many questions."}, {"front": "How did Greek tragedy and philosophy influence later Western thought?", "back": "Roman poets read Aeschylus, Church Fathers read Plato, medieval universities taught Aristotle, and figures like Thomas Jefferson knew Plato, shaping generations of educated Western people."}, {"front": "How does the text connect the moral intuitions of Greek thought to Christian beliefs?", "back": "Greek works arrived at moral truths (e.g., pride destroys, laws above human laws, soul over body) that Christians recognize as genuinely true, reflecting what Paul referred to as 'the work of the law written in their hearts' (Romans 2:15)."}, {"front": "How did the early Church 'baptize' Greek philosophy, according to the text?", "back": "Church Fathers like Augustine used Plato's language of the soul's journey, Aquinas used Aristotle's logic, and Justin Martyr even called Socrates 'in a measure a Christian,' integrating the best of Greek thought into Christian theology."}, {"front": "How did the concept of 'arete' (excellence) evolve from Homer's time to Sophocles' time?", "back": "Homer's heroes valued personal glory and military courage; Sophocles, through Antigone, valued moral integrity and adherence to divine, unwritten laws over state decrees, indicating a shift towards internal moral excellence."}, {"front": "What is a key similarity between Antigone's argument and the Christian claim to 'obey God rather than men' (Acts 5:29)?", "back": "Both assert the supremacy of a higher, divine moral authority over human or state law when they conflict."}, {"front": "What is a key difference between Antigone's argument and the Christian claim to 'obey God rather than men'?", "back": "Antigone's belief is based on eternal, unwritten laws whose origin is unknown, while Christian ethics are founded on special revelation and a known, personal God."}, {"front": "Why does the text suggest Christians can read Sophocles and Plato 'with gratitude, not suspicion'?", "back": "Because these ancient Greek works contain 'genuine glimpses of truth' that align with Christian understanding of moral reality, even if they are not equivalent to Christianity itself."}, {"front": "According to Socrates, what is the 'greatest good of man'?", "back": "Daily discourse about virtue and examining oneself and others through philosophy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
