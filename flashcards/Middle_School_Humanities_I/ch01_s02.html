<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the significance of Homer's epics, the Iliad and the Odyssey, in ancient Greek culture?", "back": "They were considered the 'Bible' of ancient Greek culture, shaping education, morality, and understanding of heroism; memorized by boys, quoted by generals, and debated by philosophers."}, {"front": "What is debated about Homer's identity and authorship?", "back": "Scholars debate whether Homer was a single blind poet (traditional view, c. 8th century BC) or if his works were the product of a longer oral tradition and multiple poets."}, {"front": "What does the word 'Homeric' mean today?", "back": "'Homeric' means something vast, heroic, and larger than life."}, {"front": "What is the opening word of the Iliad, and what central theme does it introduce?", "back": "The Iliad opens with 'm=enin' (wrath or rage), signifying that the poem is primarily about the consequences of one man's anger."}, {"front": "What is the historical context of the Iliad's story?", "back": "The Iliad is set during the tenth year of the Trojan War, fought between the Greeks (Achaeans) and the city of Troy (Ilion)."}, {"front": "Why does Achilles withdraw from battle in the Iliad?", "back": "Achilles withdraws because Agamemnon, the Greek commander, dishonors him by taking Briseis, a captive woman who was Achilles' prize of honor."}, {"front": "Who is Patroclus, and what role does his death play in the Iliad?", "back": "Patroclus is Achilles' closest companion. His death at the hands of Hector prompts Achilles to return to battle, driven by grief and a desire for revenge."}, {"front": "Describe the significance of the scene between King Priam and Achilles in Book XXIV of the Iliad.", "back": "Priam, Hector's aged father, kneels before Achilles (who killed his son) to ransom Hector's body. He appeals to Achilles' humanity by reminding him of his own father, leading both men to weep together and share their grief as enemies."}, {"front": "How does the Iliad portray its heroes, particularly Achilles and Hector?", "back": "The Iliad presents deeply flawed heroes. Achilles is brilliant but consumed by pride and rage, while Hector, the man Achilles kills, is portrayed as admirable, a loving husband and father defending his city out of duty."}, {"front": "What is the central theme of the Odyssey?", "back": "The Odyssey is about the costs of long absence, the ingenuity required to survive it, and Odysseus's ten-year journey to return home after the Trojan War."}, {"front": "What quality does Odysseus embody that sets him apart from a warrior like Achilles?", "back": "Odysseus is celebrated for his cleverness, resourcefulness, patience, and self-knowledge ('brains rather than brawn'), distinguishing him from Achilles' raw strength."}, {"front": "How does Odysseus defeat the Cyclops Polyphemus?", "back": "Odysseus tells the Cyclops his name is 'Nobody' (Outis), then blinds him with a sharpened stake. When other Cyclopes ask who is hurting him, Polyphemus cries 'Nobody,' allowing Odysseus and his men to escape under sheep."}, {"front": "How does Odysseus navigate the danger of the Sirens' song?", "back": "Odysseus has his men plug their ears with wax and tie him to the ship's mast, allowing him to hear the beautiful, deadly song without being able to act on its pull, thus passing safely."}, {"front": "How does Penelope, Odysseus's wife, demonstrate her cleverness and loyalty while he is away?", "back": "Penelope delays her suitors by promising to choose a new husband after weaving a burial shroud for Odysseus's father, but secretly unravels her weaving each night for three years."}, {"front": "How do Hesiod's works, particularly 'Works and Days,' differ from Homer's epics in subject matter and focus?", "back": "While Homer's epics are about aristocratic heroes, gods at war, and glory, Hesiod writes about farmers, justice, honest labor, and how to live a moral life in his own time."}, {"front": "What is the context and purpose of Hesiod's 'Works and Days'?", "back": "The poem is addressed to Hesiod's brother Perses, who cheated him out of an inheritance. Its purpose is to guide honest living, advocating for honest labor, fairness, and justice."}, {"front": "Briefly describe Hesiod's myth of the Five Ages of Humanity.", "back": "Hesiod describes a decline from an initial Golden Age of ease and virtue, through Silver, Bronze, and a heroic age, to the present Iron Age, marked by toil, injustice, and moral decay."}, {"front": "What does Hesiod mean by his famous quote, 'the half is better than the whole'?", "back": "It means it is better to take one's fair share through honest labor and justice than to try and greedily grab everything, implying that greed leads to ruin or injustice."}, {"front": "Define the 'Homeric Ideal.'", "back": "The Homeric Ideal (aristocratic) emphasizes fame (kleos) through great deeds in war, with the hero preferring to die young and famous rather than live long and obscure. Achilles is the model."}, {"front": "Define the 'Hesiodic Ideal.'", "back": "The Hesiodic Ideal (farmer/citizen) emphasizes justice, honest work, and community. It describes a man who tends his farm, keeps his word, and treats neighbors fairly, forming a foundation for later Greek democratic values."}, {"front": "What is a key difference between the Homeric and Hesiodic ideals concerning human values?", "back": "The Homeric ideal prioritizes individual glory and heroic deeds in battle, while the Hesiodic ideal values community, justice, and the virtue of honest, diligent labor in everyday life."}, {"front": "What are essential questions to ask when reading a primary source, according to the text?", "back": "Who wrote it and when? Why were they writing (purpose)? Who was their audience? What are they assuming their reader believes? What might they be leaving out?"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
