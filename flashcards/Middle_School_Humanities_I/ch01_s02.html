<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What were the two major epic poems attributed to Homer, and what was their cultural significance in ancient Greece?", "back": "The Iliad and The Odyssey. They were considered the 'Bible of ancient Greek culture,' shaping education, values, and providing models for behavior.", "id": "fc01"}, {"front": "According to ancient tradition, who was Homer?", "back": "A single blind poet who composed his works around the eighth century BC.", "id": "fc02"}, {"front": "What does the term 'Homeric' signify today?", "back": "Something vast, heroic, and larger than life.", "id": "fc03"}, {"front": "What is the opening word and central theme of Homer's *The Iliad*?", "back": "The opening word is *menin* (wrath, or rage), and the poem's central theme is the consequences of one man's anger.", "id": "fc04"}, {"front": "What is the historical setting for *The Iliad*?", "back": "The tenth year of the Trojan War, with the Greeks (Achaeans) fighting against the city of Troy (Ilion).", "id": "fc05"}, {"front": "What specific event triggers Achilles' withdrawal from battle in *The Iliad*?", "back": "King Agamemnon dishonors Achilles by taking Briseis, a captive woman who was Achilles' prize of honor.", "id": "fc06"}, {"front": "What event ultimately compels Achilles to return to battle in *The Iliad*?", "back": "The death of his closest companion, Patroclus, who was killed by the Trojan hero Hector while wearing Achilles' armor.", "id": "fc07"}, {"front": "How is the character of Hector portrayed in *The Iliad*?", "back": "Hector is depicted as the most admirable character—a loving husband and father defending his city out of duty, not glory-hunger.", "id": "fc08"}, {"front": "What makes the scene between Achilles and King Priam in *The Iliad* so powerful and enduring?", "back": "Priam, Hector's father, appeals to Achilles' shared humanity by reminding him of his own father, leading to shared grief and a moment of mercy between enemies, showcasing the poem's complexity.", "id": "fc09"}, {"front": "What is the main theme of Homer's *The Odyssey*?", "back": "The costs of long absence and the ingenuity required to survive it; it chronicles Odysseus's ten-year journey home after the Trojan War.", "id": "fc10"}, {"front": "Who is the protagonist of *The Odyssey*, and what is his most celebrated characteristic?", "back": "Odysseus (Ulysses). He is celebrated for his cleverness, resourcefulness, and ingenuity rather than raw strength.", "id": "fc11"}, {"front": "How did Odysseus outwit the Cyclops Polyphemus?", "back": "He told the Cyclops his name was 'Nobody,' then blinded him. When other Cyclopes asked who was hurting him, Polyphemus cried 'Nobody,' allowing Odysseus and his men to escape.", "id": "fc12"}, {"front": "How did Odysseus manage to hear the Sirens' song and survive?", "back": "He had his men plug their ears with wax and tie him to the mast, enabling him to hear the beautiful, deadly song without being able to act on its pull.", "id": "fc13"}, {"front": "How does *The Odyssey* redefine the Greek heroic ideal compared to *The Iliad*?", "back": "It shifts the focus from raw strength (brawn) to cleverness, patience, and self-knowledge (brains), showing these qualities can triumph where physical might cannot.", "id": "fc14"}, {"front": "Describe Penelope's character and her clever trick to delay suitors in *The Odyssey*.", "back": "Penelope is Odysseus's faithful and equally clever wife. She delayed suitors by promising to choose a new husband after weaving a burial shroud for Odysseus's father, then secretly unraveled her weaving each night.", "id": "fc15"}, {"front": "Who was Hesiod, and how did his literary focus differ from Homer's?", "back": "Hesiod was a poet writing a generation or two after Homer. While Homer focused on heroes and gods at war, Hesiod wrote about farmers, justice, and how to live.", "id": "fc16"}, {"front": "What is Hesiod's most famous work, and to whom is it primarily addressed?", "back": "*Works and Days*, addressed to his brother Perses, who had cheated him out of his inheritance through a corrupt court judgment.", "id": "fc17"}, {"front": "Name Hesiod's Five Ages of Humanity in chronological order.", "back": "Golden Age, Silver Age, Bronze Age, Heroic Age, and the Iron Age (Hesiod's present time).", "id": "fc18"}, {"front": "According to Hesiod, what characterizes the Iron Age?", "back": "It is marked by toil, injustice, moral decline, and a lack of harmony, even within families.", "id": "fc19"}, {"front": "What key ethical advice did Hesiod offer in *Works and Days*?", "back": "He advocated for honest labor, fair treatment of neighbors, and keeping contracts, famously stating that 'the half is better than the whole' (meaning it's better to take a fair share than to grasp everything).", "id": "fc20"}, {"front": "Contrast the 'Homeric Ideal' with the 'Hesiodic Ideal.'", "back": "The Homeric Ideal (aristocratic) values fame (*kleos*) through great deeds in war (model: Achilles). The Hesiodic Ideal (farmer/citizen) values justice, honest work, and community (model: the man who tends his farm and keeps his word).", "id": "fc21"}, {"front": "How does the textbook suggest the Greek sense of nostalgia differs from the Christian concept of hope?", "back": "Both acknowledge issues with the present world. Greek nostalgia often views history as decline with no recovery, while Christian hope includes the belief in redemption and restoration.", "id": "fc22"}, {"front": "When reading a primary source, what critical questions should one ask?", "back": "Who wrote this, and when? Why were they writing (purpose)? Who was their audience? What are they assuming their reader already believes? What might they be leaving out?", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
