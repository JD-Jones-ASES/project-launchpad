    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

    <main class="main-content">

    <script>
    var CARDS = [{"front": "What was the Pax Romana, and what conditions did it create?", "back": "Latin for 'Roman peace.' The period of relative political stability from Augustus (27 BC) to Marcus Aurelius (AD 180). It unified the Mediterranean world under one government, one road system, and one shared language (koine Greek). These conditions — safe travel, shared language, single legal system — proved essential to the spread of Christianity."}, {"front": "What three Roman conditions made rapid Gospel spread possible in the first century?", "back": "1) Political unity: one empire, one law, a postal system connecting Rome to Jerusalem in weeks; Roman law protected Paul from summary execution. 2) Roman roads: over 50,000 miles of paved, maintained roads. 3) Koine Greek: the shared language of the eastern Empire from Egypt to Macedonia — a preacher in Greek needed no translator."}, {"front": "Who was Herod the Great, and what was the political situation of Judea when Jesus was born?", "back": "Herod the Great (d. 4 BC) was Rome's client king of Judea who rebuilt the Jerusalem Temple into one of the ancient world's grandest structures but ruled with notorious cruelty. The Jewish population lived under double authority: Roman taxation and military occupation on one side, Torah and the Temple priesthood on the other. Many awaited a Messiah."}, {"front": "What do historians Josephus and Tacitus contribute to the historical case for Jesus?", "back": "Josephus (Jewish historian, within a generation of events) wrote of 'Jesus, a wise man' who 'performed surprising feats' and whose followers reported he appeared alive after crucifixion. Tacitus (Roman historian, c. AD 116) confirmed 'Christus suffered the extreme penalty during the reign of Tiberius at the hands of Pontius Pilatus.' As hostile/neutral witnesses, their testimony carries particular historical weight."}, {"front": "What is the historical evidence for the Resurrection, as presented in the text?", "back": "Paul's letter to the Corinthians (1 Cor. 15:3–8, c. AD 54–55), written within 25 years of the event, names specific living eyewitnesses — 'above five hundred brethren at once' who could still be consulted. No ancient source claimed the tomb was not empty; the dispute was about what the empty tomb meant. The disciples who fled in fear became a movement willing to die for their testimony within weeks."}, {"front": "What was the ministry of Jesus, and when was it active?", "back": "Jesus was baptized by John the Baptist in the Jordan River c. AD 27–30, beginning approximately three years of public ministry in Galilee and Judea: teaching, healing, and calling followers including twelve apostles. His teaching reversed conventional wisdom (Sermon on the Mount), claimed authority over the Torah, forgave sins in his own name, and accepted worship."}, {"front": "What happened on Palm Sunday and in the following days?", "back": "c. AD 30 or 33: Jesus entered Jerusalem to popular acclaim. Within the week he was arrested at the instigation of the chief priests, tried before the Roman governor Pontius Pilate, and crucified — the method reserved for slaves and enemies of the state. His followers fled. Three days later, multiple groups reported encountering him alive, risen from the dead."}, {"front": "What happened at Pentecost, and why was it significant?", "back": "Fifty days after the Resurrection, the disciples gathered in Jerusalem for the Jewish festival of Pentecost. According to Acts 2, the Holy Spirit descended and they began speaking in other languages — enabling Diaspora Jews to hear the Gospel in their own tongue. Peter preached, three thousand were baptized, and the Church was born."}, {"front": "Who was Paul (Saul) of Tarsus, and what transformed him?", "back": "Paul was a Roman citizen, a Pharisee trained under the rabbi Gamaliel, and an energetic persecutor of the early Church — until on the road to Damascus (c. AD 33–35) he reported an encounter with the risen Christ that blinded him temporarily and transformed him permanently. He became Christianity's most effective missionary."}, {"front": "What were Paul's three missionary journeys, and where did they go?", "back": "Three journeys c. AD 46–48, 49–52, and 53–57 carried the Gospel from Antioch through Asia Minor and Greece to Rome. Paul traveled Roman roads built in previous units of study. His Roman citizenship shielded him from arbitrary punishment and gave him the right to appeal to Caesar (Acts 25:11). His letters (Epistles) to young churches are the earliest written documents of the New Testament."}, {"front": "What was Paul's missionary strategy in each city?", "back": "Go first to the synagogue (where people were already familiar with Hebrew Scriptures), preach, weather opposition, and plant a church before moving on. His letters to these young churches (Epistles) are the earliest written New Testament documents — predating the Gospels by a decade or more."}, {"front": "What was Nero's persecution of Christians, and how did Tacitus describe it?", "back": "The first organized Roman state persecution, launched after the Great Fire of Rome (AD 64). Tacitus described Christians 'sewn up in the skins of wild beasts, and exposed to the fury of dogs; others were smeared over with combustible materials, and used as torches to illuminate the darkness of the night.' Peter is traditionally believed crucified upside down; Paul, as a citizen, was beheaded."}, {"front": "What was the Diocletianic Persecution (AD 303-311)?", "back": "The most severe Roman persecution of Christians: churches destroyed, Scriptures confiscated, clergy imprisoned, Christians required to sacrifice to Roman gods on pain of death. Launched by Emperor Diocletian (r. 284–305). This most intense persecution was followed within about twelve years by Constantine's Edict of Milan (313) granting full toleration."}, {"front": "What was the Battle of Milvian Bridge (AD 312) and what did it lead to?", "back": "Constantine I defeated his rival outside Rome. Before the battle, he reportedly saw a sign in the sky — the Chi-Rho symbol (first two Greek letters of Christos) with the words 'by this sign, conquer.' His soldiers painted the symbol on their shields. He won. The following year he and Licinius issued the Edict of Milan granting religious toleration throughout the Empire."}, {"front": "What was the Edict of Milan (AD 313)?", "back": "Issued jointly by Constantine and co-emperor Licinius, it granted religious toleration throughout the Empire to Christians and all others, restored confiscated Christian property, and ended official persecution. The motivation was political as well as personal: religious conflict was a source of disorder. Christianity was now not merely tolerated but protected."}, {"front": "Who were Arius and Athanasius, and what did each teach?", "back": "Arius (c. AD 256–336): a priest in Alexandria who taught that the Son of God was the greatest of all created beings but was a created being — 'there was a time when he was not.' Athanasius (c. AD 296–373): argued that if Christ was not fully God, his death could not accomplish human salvation. He championed the homoousios ('of one substance') formula at Nicaea."}, {"front": "What was the Council of Nicaea (AD 325)?", "back": "The first ecumenical council — a council of bishops from the entire Church, approximately 318 bishops — called by Constantine to resolve the Arian controversy. It declared Arius' teaching heretical and formulated the Nicene Creed, affirming the Son is homoousios ('of one substance') with the Father: fully divine, not created."}, {"front": "What is the Nicene Creed, and why is it still significant?", "back": "The statement of Christian faith produced at Nicaea (AD 325) and refined at Constantinople (AD 381). It affirms: 'God from God, Light from Light, true God from true God, begotten, not made, of one substance with the Father.' It is the most widely used statement of Christian faith in the world, recited every Sunday in Catholic, Orthodox, Anglican, Lutheran, and many other churches."}, {"front": "What was the Greek word 'homoousios', and why was one letter disputed?", "back": "Homoousios means 'of one substance' — used in the Nicene Creed to affirm that the Son is of the same substance as the Father. The Arians preferred homoiousios ('of similar substance') — the difference of a single Greek letter ('i') that represented the entire difference between Christ being fully God or merely God-like. Hence the later saying that the Church was divided over an iota."}, {"front": "What does the Sermon on the Mount (Matthew 5) claim about blessing, and why was it revolutionary?", "back": "The Beatitudes declare blessed those who mourn, are poor in spirit, meek, and persecuted — exactly those whom the Greco-Roman world considered failures or losers. In classical Greek, makarios ('blessed') described the Olympian gods, beyond suffering and death. Jesus applied it to those who suffer and mourn — a revolutionary inversion of the world's value system that was simultaneously electrifying to the poor and threatening to the powerful."}, {"front": "How does John's Gospel Prologue use the Stoic concept of the Logos?", "back": "John opens with 'In the beginning was the Word (Logos), and the Word was with God, and the Word was God.' The Stoics taught that the Logos was the impersonal divine rational principle woven through all reality. John claims that this eternal rational principle — which Greek philosophers had reasoned about abstractly — became a specific human being in a specific historical moment. 'The Word was made flesh' (ho Logos sarx egeneto) is the entire Incarnation compressed into four Greek words."}, {"front": "What does Paul's sermon at Athens (Acts 17) illustrate about missionary contextualization?", "back": "Rather than quoting Hebrew Scripture (which his audience didn't know), Paul began with his audience's own altar 'To the Unknown God' and quoted their own Stoic poets: 'for we are also his offspring' (Aratus, Phaenomena 5). This method — finding the best point of connection between an unfamiliar message and the audience's existing knowledge — is called contextualization. Paul does not compromise the Gospel; he finds the best door through which to introduce it."}, {"front": "Who was Ignatius of Antioch, and why was his death significant?", "back": "Third bishop of Antioch (c. AD 35–108) — the city from which Paul launched all three missionary journeys. Arrested under Trajan and transported to Rome for arena execution. During the journey he wrote seven letters. These show: (1) the early Church already had structure of bishop, presbyters, and deacons; (2) how seriously early Christians took the physical reality of Christ's body; (3) the understanding of martyrdom as bearing witness to the Resurrection with one's body."}, {"front": "What did Pliny the Younger's letter (c. AD 112) reveal about Christian practice?", "back": "This Roman governor's hostile external account describes Christians: meeting before dawn, addressing 'a form of prayer to Christ, as to a divinity,' binding themselves by oath never to commit fraud, theft, or adultery, and sharing 'a harmless meal.' These practices perfectly match New Testament descriptions (Acts 2:42–47), and confirm that by AD 112, Christians existed in large numbers in Roman provinces."}, {"front": "What was Tertullian's famous saying about martyrdom, and what did it mean?", "back": "Tertullian observed that 'the blood of the martyrs was the seed of the Church' — far from stamping out Christianity, the persecutions produced public witnesses whose courage drew converts. Ignatius of Antioch being transported to Rome for execution, writing letters of faith along the way, is the vivid example the text presents of this phenomenon."}, {"front": "What was the Pax Romana's providential significance for the Gospel, and what phrase does Paul use?", "back": "Paul writes that 'when the fullness of time was come, God sent forth his Son' (Galatians 4:4). Early Christian writers including Justin Martyr recognized that the Pax Romana's conditions — safe roads, shared language, legal protections for citizens — were providentially prepared for the Incarnation. The Gospel spread faster in the first century than would have been possible in any earlier period."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
