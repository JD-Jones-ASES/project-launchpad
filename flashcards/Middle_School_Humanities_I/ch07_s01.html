<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the 'Dark Ages' in Western Europe?", "back": "A term (now largely avoided by historians) for the period roughly AD 476–1000, characterized by declines in urban life, literacy, and long-distance trade after Rome's fall, though learning was preserved in monasteries."}, {"front": "Why do modern historians largely reject the term 'Dark Ages'?", "back": "It's considered pejorative and misleading, as the period wasn't 'intellectually dark' due to monastic preservation of learning, although material conditions did decline significantly in Western Europe."}, {"front": "What evidence illustrates the material decline in Western Europe during the 'Dark Ages'?", "back": "Rome's population fell from perhaps 1 million to 50,000 by AD 600; archaeological sites show a shift from diverse imported goods to only local goods in the 7th century; infrastructure like roads fell into disrepair."}, {"front": "How did the Eastern Roman (Byzantine) Empire compare to Western Europe during the 'Dark Ages'?", "back": "The Byzantine Empire did not experience the same collapse; Constantinople remained a large, thriving city (c. 400,000 inhabitants), making the 'Dark Ages' a specifically Western European phenomenon."}, {"front": "What was the single most important institution for preserving civilization in Western Europe during the 5th-8th centuries?", "back": "The monastery, especially Irish monasteries in the 6th and 7th centuries."}, {"front": "Define the 'Rule of Saint Benedict'.", "back": "A practical guide for monastic life written by Benedict of Nursia (c. AD 480–547), organizing the monk's day around the Divine Office (communal prayer), manual labor, and sacred reading (lectio divina). Its motto was 'ora et labora' ('pray and work')."}, {"front": "Why were Irish monasteries uniquely significant centers of learning during this period?", "back": "Ireland had never been part of the Roman Empire and did not share in its collapse. Irish monasteries became extraordinary centers of learning, preserving Scripture, Church Fathers, Latin grammar, classical authors, and the art of illuminated manuscript."}, {"front": "Who was the Venerable Bede, and what was his major contribution to history?", "back": "An English monk (c. AD 673–735) who produced historical, theological, and scientific works. His 'Ecclesiastical History of the English People' (AD 731) is a primary source for early English Christianity and introduced the AD/BC dating system."}, {"front": "Describe the concept of 'The Monastery as Civilization's Ark'.", "back": "Monasteries served simultaneously as libraries and scriptoria, self-sufficient farms, schools (the only formal education), hospitals, and inns, making them uniquely capable of surviving civilizational collapse through their combination of prayer, scholarship, and self-sufficiency."}, {"front": "Who was Gregory the Great, and what was his historical significance?", "back": "Gregory I (c. AD 540–604) was the first monk to become pope (elected AD 590) and one of the most consequential figures in medieval Church history. He is sometimes called 'the last Roman and the first medieval pope' as his life bridged the two worlds."}, {"front": "Name three major achievements or contributions of Pope Gregory the Great.", "back": "He organized the Church's charitable activities in Rome; sent Augustine of Canterbury to convert the Anglo-Saxons; wrote 'Pastoral Care', which became the standard manual for bishops; and essentially became the civil and spiritual governor of Rome."}, {"front": "Who was Charles Martel, and what was his primary role in the Frankish kingdom?", "back": "Charles Martel ('the Hammer,' c. AD 688–741) was the Mayor of the Palace in the Frankish kingdom, effectively its ruler, and laid the political foundation for the Carolingian Empire."}, {"front": "Define the Battle of Tours (AD 732).", "back": "A battle in central France where Charles Martel's Frankish forces defeated an Umayyad army advancing from Muslim-controlled Spain, ending the northward expansion of Islamic rule into Western Europe."}, {"front": "Why is it an exaggeration to say the Battle of Tours 'saved Western civilization,' and what was its actual significance?", "back": "The Muslim forces at Tours were a raiding party, not a full invasion. Its actual significance was establishing Charles Martel as the most powerful ruler in the West and creating the political foundation for his grandson Charlemagne's empire."}, {"front": "How did Pepin the Short contribute to the relationship between the papacy and secular rulers?", "back": "Pepin the Short (r. AD 751–768) deposed the last Merovingian king with papal approval, establishing the precedent that popes could crown kings, thereby linking papal authority to the legitimacy of European monarchs."}, {"front": "Who was Charlemagne, and what empire did he establish?", "back": "Charlemagne ('Charles the Great,' AD 742–814), son of Pepin, was King of the Franks and is considered one of the most important rulers in Western history, establishing the vast Carolingian Empire across much of Western Europe."}, {"front": "Describe the scope of Charlemagne's military expansion.", "back": "Charlemagne waged nearly continuous warfare for four decades, conquering the Saxons, Lombards in Italy, Bavarians, and Avars, and pushed the frontier into Spain. His empire encompassed most of modern France, Germany, the Low Countries, Austria, Switzerland, and northern Italy."}, {"front": "Define the Carolingian Renaissance.", "back": "The cultural and intellectual revival under Charlemagne, centered on his court at Aachen. It featured systematic manuscript copying, reform of education, development of the Carolingian minuscule script (ancestor of modern lowercase letters), and recovery of classical Latin texts."}, {"front": "What was the lasting legacy of the Carolingian Renaissance?", "back": "It ensured the survival of many classical works through systematic copying, developed a script that became the ancestor of modern lowercase letters, and established cathedral schools that laid the groundwork for future European education."}, {"front": "What significant event occurred on Christmas Day, AD 800, and why was it important?", "back": "Pope Leo III crowned Charlemagne 'Emperor of the Romans' in St. Peter's Basilica in Rome. This reasserted the idea of a Christian Roman Empire in the West and set a precedent for the complex relationship between pope and emperor that would define medieval politics for five centuries."}, {"front": "How did Charlemagne's empire fare after his death?", "back": "His empire did not survive intact; the Treaty of Verdun (AD 843) divided it among his grandsons, creating the foundations for France, Germany, and a contested middle kingdom. The idea of the Carolingian Empire, however, survived in the Holy Roman Empire."}, {"front": "How does Charlemagne's legacy still affect us today?", "back": "His sponsored Carolingian minuscule script is the direct ancestor of the lowercase letters we read today. His coronation in AD 800 defined the relationship between religious and political authority in Europe, influencing debates about church and state that continue into modern times."}, {"front": "Why is Charlemagne often called the 'Father of Europe'?", "back": "He unified much of Western Europe politically and culturally, fostering a shared Christian identity and laying the groundwork for future European nations through his legal, educational, and administrative reforms, thus defining a distinct Western European civilization."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
