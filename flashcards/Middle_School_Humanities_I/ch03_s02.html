<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did the heroes celebrated by the Roman Republic differ from Greek heroes like Achilles?", "back": "Roman heroes sought duty, refused wealth and personal fame, and sacrificed their own interests for the good of the res publica, unlike Greek heroes who sought kleos (personal glory) or return home."}, {"front": "What was the primary purpose of historical writing for authors like Livy and Plutarch?", "back": "They used history not merely to record the past, but to form their readers, holding up moral exemplars to shape character and transmit virtues."}, {"front": "Who was Titus Livius, and what was his most famous work?", "back": "Titus Livius (Livy, c. 64 BC – AD 17) was a Roman historian whose most famous work was Ab Urbe Condita (From the Founding of the City)."}, {"front": "What was Livy's main focus in Ab Urbe Condita, as described in his preface?", "back": "Livy focused on 'their life and their manners' and 'their morals,' writing a moral history where heroes served as exemplars and villains as warnings, rather than just armies or dates."}, {"front": "Who was Horatius Cocles, and what famous act is he known for?", "back": "Horatius Cocles was a Roman hero who single-handedly defended the Pons Sublicius (Sublician Bridge) against the Etruscan army led by Lars Porsena, allowing his comrades time to demolish it and save Rome."}, {"front": "What virtue did Horatius Cocles demonstrate, and how did it differ from Achillean glory?", "back": "Horatius demonstrated Roman virtus, which is courage in the service of the community, indifferent to personal reward. This contrasts with Achilles' courage, which served his pride and sought personal glory."}, {"front": "In the context of Horatius Cocles, what does virtus mean in its Roman sense?", "back": "Virtus in its Roman sense means courage in the service of the community, characterized by self-sacrifice and indifference to personal reward, often expecting to die for the greater good."}, {"front": "Who was Plutarch, and what was his most significant work?", "back": "Plutarch (c. AD 46–120) was a Greek philosopher and biographer whose greatest work was Parallel Lives, which paired famous Greeks and Romans to compare their characters."}, {"front": "What was Plutarch's purpose in writing Parallel Lives?", "back": "Plutarch's purpose was to look for virtue in history, not just events, and to show what greatness of character looked like across both Greek and Roman civilizations."}, {"front": "Who was Lucius Quinctius Cincinnatus, and what makes him Rome's supreme example of republican virtue?", "back": "Cincinnatus was a Roman farmer who, when appointed dictator during a crisis, left his farm, rescued a surrounded Roman army, defeated the enemy, and then resigned his power after only fifteen days to return to his farm."}, {"front": "What central message did Cincinnatus's actions convey about power in the Roman Republic?", "back": "Cincinnatus's actions conveyed that power is a burden to be borne only when the community needs you, not a prize to be seized and kept for personal gain."}, {"front": "How did George Washington's actions after the American Revolutionary War relate to Cincinnatus?", "back": "Like Cincinnatus, George Washington resigned his military commission after achieving victory and returned to his farm at Mount Vernon, earning him the title 'the American Cincinnatus' and inspiring organizations like the Society of the Cincinnati."}, {"front": "Who was Marcus Atilius Regulus, and what was the historical context of his story?", "back": "Marcus Atilius Regulus was a Roman consul captured by Carthage during the First Punic War, whose story exemplifies faithfulness to an oath."}, {"front": "What critical decision did Regulus make when sent to Rome by Carthage on parole?", "back": "Despite being sent to negotiate a prisoner exchange and peace treaty, Regulus urged the Roman Senate to reject the Carthaginian terms, arguing they were not favorable enough to Rome."}, {"front": "What did Regulus do after the Senate followed his advice to reject the peace treaty?", "back": "Regulus, having sworn an oath to return to Carthage if negotiations failed, kept his word and sailed back, knowing he would face torture and death."}, {"front": "What Roman virtue did Marcus Atilius Regulus exemplify through his actions? Define this virtue.", "back": "Regulus exemplified fides, which means faithfulness, trustworthiness, and the keeping of one's word regardless of the personal cost."}, {"front": "Why was fides considered fundamental to Roman social life?", "back": "Romans understood fides as the foundation of all social life because without trust in oaths and agreements, no alliance would hold, no court could function, and civilization itself would unravel."}, {"front": "According to Livy's preface, what happens when 'discipline gradually declined' in a society?", "back": "Livy's preface states that when discipline gradually declined, morals would sink more and more, then fall headlong, leading to a point where vices could neither be endured nor remedies found."}, {"front": "What was the significance of the year 508 BC in Roman tradition regarding the story of Horatius?", "back": "Roman tradition linked Horatius's defense of the bridge in 508 BC to the same year the Republic was founded, emphasizing the foundational importance of such heroic acts."}, {"front": "How does Livy's admission about the truth of Horatius's swim reflect his historical purpose?", "back": "Livy admitted he wasn't sure if Horatius's swim was true but repeated it because the story's moral point—that one brave man can save a republic—was too important to lose, demonstrating his focus on moral history."}, {"front": "Why is Plutarch considered one of Shakespeare's most important sources?", "back": "Plutarch's vivid, anecdote-rich style and focus on character made his Parallel Lives a key source for Shakespeare's historical plays, particularly those set in Rome."}, {"front": "What does the 'note' in the text emphasize as a key difference between Horatius's and Achilles' motivations?", "back": "The note emphasizes that Horatius acts out of duty and service to the community, expecting to die without personal glory, while Achilles' courage serves his pride and desire for personal honor."}, {"front": "What specific Roman virtues are mentioned as being admirable from a Christian perspective?", "back": "Virtus (courage), pietas (duty/piety), and fides (faithfulness) are mentioned as admirable Roman virtues, representing courage, faithfulness, and self-sacrifice for something larger than oneself."}, {"front": "What does the story of Cincinnatus tell us about the ideal Roman leader?", "back": "The story of Cincinnatus illustrates that the ideal Roman leader is humble, dedicated to civic duty above personal gain, willing to take power only when necessary, and eager to relinquish it once the crisis is over."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
