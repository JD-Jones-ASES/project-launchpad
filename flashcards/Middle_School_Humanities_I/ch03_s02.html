<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did the Italian Peninsula's geography differ from Greece's, and what was its impact on early Roman development?", "back": "Unlike Greece's isolated pockets, Italy had broad coastal plains (e.g., Latium, Campania) and a central mountain spine, permitting larger agricultural communities and easier overland communication, fostering Roman unity and expansion."}, {"front": "What is Latium, and why is it significant to Roman history and language?", "back": "Latium is the plain west of the Apennines in central Italy where Rome was founded. It gave its name to the Latin language and people, which became the basis for several modern Romance languages."}, {"front": "Describe the key geographic advantages of Rome's location.", "back": "Rome was built on seven hills along the Tiber River, 15 miles from the sea. This provided natural defense, fresh water, a ford for overland trade, and access to the Mediterranean via the river."}, {"front": "What type of volcanic rock was used to build early Rome's walls, and where did it originate?", "back": "Tufa, a dark, hard volcanic rock, was used for early Roman walls. It came from the nearby Alban Hills."}, {"front": "How did Rome's geography contribute to it becoming an overland empire, in contrast to Athens' maritime empire?", "back": "Rome's strategic location at an easily fordable crossing of the Tiber connected northern and southern parts of the western coastal plain, making overland travel feasible and supporting an overland empire. Athens' peninsula encouraged sea travel."}, {"front": "What were the three main functions of Roman roads?", "back": "Roman roads served military, commercial, and political functions simultaneously."}, {"front": "Who was responsible for building and maintaining the Roman road network?", "back": "The Roman army built the roads, and the state maintained them."}, {"front": "What was the name of the first great Roman road, when was it begun, and what did it initially connect?", "back": "The Via Appia (Appian Way) was begun in 312 BC, initially connecting Rome to Capua in the south. It was later extended to Brundisium."}, {"front": "How did Roman roads prove essential for purposes far beyond their original military intent?", "back": "They facilitated trade, political administration, and later served as routes for the spread of Christianity (e.g., Paul's missionary journeys) and aided medieval governance (e.g., Charlemagne)."}, {"front": "According to Procopius, what enduring qualities made the Via Appia remarkable?", "back": "Procopius noted its pavement with hard stone, its perfect straightness, its width for two wagons, and its durability against time, rain, and heat, suffering no damage."}, {"front": "What do the letters SPQR stand for?", "back": "SPQR stands for Senatus Populusque Romanus, meaning 'The Senate and the Roman People'."}, {"front": "What Roman political ideal did the phrase SPQR encapsulate?", "back": "It encapsulated the ideal of authority shared between the aristocratic Senate and the citizen body (the Roman People)."}, {"front": "In practice, which body typically dominated Roman politics, despite the SPQR ideal?", "back": "The Senate generally dominated Roman politics."}, {"front": "What specific institutions made the 'populus' (citizen body) share in Roman sovereignty a reality?", "back": "The Twelve Tables (Roman law code) and the tribunate (office protecting plebeian rights) acknowledged and enforced the people's legitimate share in sovereignty."}, {"front": "What was the Roman cursus honorum, and what was its typical sequence of offices?", "back": "The cursus honorum was the required path of offices for aspiring politicians, typically quaestor, aedile, praetor, and then consul, with minimum age requirements and mandatory gaps."}, {"front": "What was the primary purpose of the cursus honorum in the Roman Republic?", "back": "Its primary purpose was to ensure that leaders gained necessary experience in lower offices before holding higher ones, serving as a check on ambition without experience."}, {"front": "Compare the core governance philosophy of the Roman Senate with that of the Athenian Assembly.", "back": "The Roman Senate trusted experienced former magistrates for stability and policy continuity. The Athenian Assembly trusted average citizens to vote directly, fostering dynamism but sometimes recklessness."}, {"front": "What were the general outcomes or strengths of the Roman Senate's system versus the Athenian Assembly's system?", "back": "The Roman Senate's stability produced law and empire. The Athenian Assembly's dynamism and direct democracy produced philosophy and art."}, {"front": "In the context of connecting vast territories, why are Roman roads considered a more durable form of connection than Greek sea routes?", "back": "Roads are more durable because they can be walked, maintain utility through political change, and are less dependent on weather or naval power. Many Roman roads are still visible today."}, {"front": "How did Rome's territorial expansion rate change after 264 BC, and what factors contributed to this acceleration?", "back": "Expansion accelerated dramatically after 264 BC (when Rome controlled most of Italy). Gaining control of Sicily, North Africa, and Spain after the Punic Wars added significant resources and capacity for further conquest across the Mediterranean."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
