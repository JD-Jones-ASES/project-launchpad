<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What unique form of writing did Augustine's *Confessions* introduce to Western literature?", "back": "It was a book simultaneously a prayer addressed to God, a confession of personal sin, and a philosophical autobiography, influencing later memoirs, diaries, and personal essays."}, {"front": "What fundamental question did both Augustine and Boethius address in their works, reflecting the anxieties of their time?", "back": "They asked: 'What do you hold onto when the world falls apart?' in the context of the collapsing Western Roman Empire."}, {"front": "What is the core agreement between Augustine and Boethius, despite their different approaches (theology vs. philosophy)?", "back": "They converged on the point that things which can be taken from you were never truly yours; only virtue, wisdom, and (for Augustine) God himself are the real, unassailable goods."}, {"front": "Where and when was Augustine born, and what were his parents' religious backgrounds?", "back": "Born in AD 354 in Thagaste, Numidia (modern-day Algeria); his father Patricius was a pagan, and his mother Monica was a devout Christian."}, {"front": "What prestigious profession did Augustine pursue early in his career, and where did he teach?", "back": "He pursued rhetoric, teaching in Rome and later Milan."}, {"front": "What two key events led to Augustine's conversion to Christianity in Milan?", "back": "Hearing Bishop Ambrose preach, which showed him Christianity was intellectually respectable, and experiencing a sudden conversion in a garden after reading letters of Paul."}, {"front": "What famous quote from Augustine before his conversion encapsulates his struggle with committing his will to God?", "back": "'Lord, make me chaste, but not yet.'"}, {"front": "Describe the 'garden scene' that marked Augustine's conversion experience.", "back": "While weeping in despair, he heard a child's voice singing 'Tolle, lege' ('take up and read'), which prompted him to open Paul's letter to the Romans at random. Reading a specific passage instantly removed all his doubt."}, {"front": "Who was Monica, and what was her significance in Augustine's life and in Christian tradition?", "back": "Augustine's mother, a devout Christian who prayed for his conversion for over thirty years. She is recognized as a saint for her persistent, faithful prayer and faith."}, {"front": "What ecclesiastical position did Augustine reluctantly take after returning to Africa, and what was his primary role for the rest of his life?", "back": "He was made bishop of Hippo in AD 396 and served for 34 years, preaching nearly daily, writing theology, and defending orthodox Christianity."}, {"front": "Name two of the three major heresies Augustine defended orthodox Christianity against.", "back": "The Manichaeans, the Donatists, and the Pelagians."}, {"front": "What is the central theme and theological psychology expressed in the opening lines of Augustine's *Confessions* ('Thou madest us for Thyself, and our heart is restless, until it repose in Thee.')?", "back": "It means the human heart (the whole person) was made for God, and its inherent restlessness is a built-in feature, a hunger that can only be satisfied by God."}, {"front": "According to Augustine in *Confessions*, what is sin at its most basic level?", "back": "It is not merely breaking rules, but loving the gifts (created things) instead of the Giver (the Creator), searching outside for what is truly within."}, {"front": "What historical event prompted Augustine to write *The City of God*?", "back": "The Sack of Rome by Alaric in AD 410, which led pagan critics to blame Christianity for the Empire's decline."}, {"front": "What is the central argument of Augustine's *The City of God*?", "back": "There are two cities, the earthly and the heavenly, formed by two fundamentally different loves: self-love (amor sui) and the love of God (amor Dei)."}, {"front": "Describe Augustine's 'City of Man'.", "back": "It is built on *amor sui* (self-love), glories in itself, achieves great things through ambition and power, but is temporal and ultimately destined to end. Rome was an example of a great City of Man."}, {"front": "Describe Augustine's 'City of God'.", "back": "It is built on *amor Dei* (love of God). Its citizens are mixed with the City of Man on earth, but it cannot be destroyed by earthly calamities. It represents where ultimate trust and love should be placed."}, {"front": "Who was Boethius, and what was his major intellectual project?", "back": "He was the chief minister of Ostrogothic king Theodoric and the most learned Latin-speaker of his age. His project was to translate all of Aristotle and Plato into Latin to preserve Greek philosophy for the West."}, {"front": "What was the lasting impact of Boethius's translations and commentaries on medieval philosophy?", "back": "His translations of Aristotle's logical works were used as textbooks in European universities for 700 years, directly influencing major medieval philosophers like Anselm, Abelard, and Aquinas."}, {"front": "Why was Boethius imprisoned and ultimately executed, leading him to write *Consolation of Philosophy*?", "back": "He was accused of treason, conspiring with the Eastern Roman Emperor against Theodoric, an accusation likely fabricated by political enemies."}, {"front": "What is *The Consolation of Philosophy*, and who are its main characters?", "back": "It is a philosophical dialogue written by Boethius while under sentence of death, in alternating prose and verse, between Boethius (in despair) and an allegorical figure called Lady Philosophy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
