<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Augustine's Confessions differ from previous historical or biographical writings?", "back": "It was simultaneously a prayer, a confession of personal sin, and a philosophical autobiography tracing a single human soul's journey toward truth, creating a new literary form that influences memoirs and personal essays today.", "id": "fc01"}, {"front": "What fundamental question did both Augustine and Boethius address that resonated with people in the collapsing Western Empire?", "back": "What do you hold onto when the world falls apart? Or, does life have any meaning when Fortune has stripped away everything?", "id": "fc02"}, {"front": "Despite different approaches (theology vs. philosophy), what central point did Augustine and Boethius agree upon regarding true goods?", "back": "The things that can be taken from you were never truly yours; only virtue, wisdom, and (for Augustine) God himself are the only real goods.", "id": "fc03"}, {"front": "Where and when was Augustine of Hippo born, and who were his notable parents?", "back": "He was born in AD 354 in Thagaste, Numidia (modern-day Algeria). His father Patricius was a pagan, and his mother Monica was a devout Christian.", "id": "fc04"}, {"front": "Before his conversion, what were some key aspects of Augustine's intellectual and personal journey?", "back": "He pursued a career in rhetoric, studied at Carthage, took a concubine, and experimented with Manichaean religion, teaching in Rome and Milan.", "id": "fc05"}, {"front": "What two significant events in Milan led to Augustine's intellectual and spiritual turning point?", "back": "Hearing Bishop Ambrose preach (which showed him Christianity was intellectually respectable) and reading the letters of Paul.", "id": "fc06"}, {"front": "Describe the 'garden scene' moment of Augustine's conversion, including the famous phrase he heard.", "back": "While wrestling with his will in a garden, he heard a child's voice singing 'Tolle, lege' ('take up and read'), which led him to open Paul's letter to the Romans at random and experience an instant conversion.", "id": "fc07"}, {"front": "What is the lasting significance of Augustine's mother, Monica, in Christian history?", "back": "She is recognized as a saint for her persistent, faithful prayer for Augustine's conversion over thirty years, embodying the power of prayer.", "id": "fc08"}, {"front": "What significant role did Augustine take on after returning to Africa, and what were some of his key responsibilities?", "back": "He was made bishop of Hippo in AD 396 and served for 34 years, preaching, writing theology, and defending orthodox Christianity against major heresies.", "id": "fc09"}, {"front": "Name three major heresies Augustine combated as bishop.", "back": "Manichaeans (dualism), Donatists (refusal to recognize clergy who compromised during persecution), and Pelagians (belief that humans can earn salvation by their own effort).", "id": "fc10"}, {"front": "What is the famous opening line and central theological psychology of Augustine's Confessions?", "back": "'Thou madest us for Thyself, and our heart is restless, until it repose in Thee.' It signifies that the human heart seeks satisfaction only found in God.", "id": "fc11"}, {"front": "According to Augustine, what does the 'restlessness' of the human heart signify?", "back": "It is a built-in feature, a hunger that will not be satisfied by anything less than God, for whom the heart was designed, not by wealth, fame, or pleasure.", "id": "fc12"}, {"front": "How did Augustine define sin at its most basic level, as expressed in his Confessions?", "back": "Not merely breaking rules, but loving the gifts (created things) instead of the Giver (God), searching outside for what is within ('Thou wert within, and I abroad').", "id": "fc13"}, {"front": "What historical event prompted Augustine to write The City of God, and what criticisms was he refuting?", "back": "The sack of Rome by Alaric in AD 410. He was refuting pagan critics who blamed Christianity for Rome's decline.", "id": "fc14"}, {"front": "What is the central argument of Augustine's The City of God?", "back": "There are two cities—the earthly (City of Man) and the heavenly (City of God)—formed by two fundamentally different loves: love of self and love of God.", "id": "fc15"}, {"front": "Describe Augustine's 'City of Man,' including its foundation and characteristics.", "back": "It is built on 'amor sui' (self-love), glories in itself, and while it can achieve great things, it is temporal and ultimately destined to end. Rome was an example.", "id": "fc16"}, {"front": "Describe Augustine's 'City of God,' including its foundation and characteristics.", "back": "It is built on 'amor Dei' (love of God), cannot be destroyed by any earthly force, and its citizens are mixed with those of the City of Man until the end of time.", "id": "fc17"}, {"front": "According to Augustine, is the Church on earth identical with the City of God?", "back": "No, the Church on earth is not identical with the City of God; the two are intertwined until the end of time, as the City of God is a spiritual reality that transcends any earthly institution.", "id": "fc18"}, {"front": "Who was Boethius, and what was his major academic life project?", "back": "He was the chief minister to the Ostrogothic king Theodoric in Italy. His life's project was to translate all of Aristotle and Plato into Latin.", "id": "fc19"}, {"front": "What was Boethius's significant contribution to medieval philosophy?", "back": "His translations and commentaries on Aristotle's logical works (e.g., Categories) were used as textbooks for 700 years and formed the direct foundation for medieval philosophical tradition.", "id": "fc20"}, {"front": "What circumstances led to Boethius writing the Consolation of Philosophy?", "back": "He was falsely accused of treason against King Theodoric and imprisoned at Pavia while awaiting execution.", "id": "fc21"}, {"front": "What is the structure and who are the main characters of Boethius's Consolation of Philosophy?", "back": "It is a philosophical dialogue in alternating prose and verse, between Boethius (in despair) and an allegorical figure called Lady Philosophy.", "id": "fc22"}, {"front": "What central question does Boethius explore in the Consolation of Philosophy?", "back": "The question of whether life has any meaning when Fortune has stripped away everything, reflecting his personal crisis and the broader collapse of the Western Empire.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
