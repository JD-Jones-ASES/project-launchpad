<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define Pax Romana and state its duration.", "back": "Latin for 'Roman peace,' a period of relative political stability and absence of major wars in the Roman Empire, lasting roughly from the reign of Augustus (27 BC) to the death of Marcus Aurelius (AD 180)."}, {"front": "How did the conditions of the Pax Romana prove essential to the spread of Christianity?", "back": "The Pax Romana provided safe roads, a shared language (Koine Greek), and a single legal system, which facilitated travel, communication, and protection for early Christian missionaries."}, {"front": "Who was the client king governing Judea when Jesus was born, and what was he known for?", "back": "Herod the Great. He rebuilt the Jerusalem Temple into a grand structure but ruled with notorious cruelty."}, {"front": "According to Paul (Galatians 4:4), what does 'the fullness of time' refer to regarding the Incarnation?", "back": "It implies a providential timing when God prepared the world through specific historical conditions (political unity, Roman roads, Greek language, Roman law) to enable the rapid spread of the Gospel."}, {"front": "Name three key conditions of the Roman world that enabled the rapid spread of the Gospel once it began.", "back": "Political unity (one empire, one law), extensive Roman roads (over 50,000 miles), and the widespread use of Koine Greek as a common language (lingua franca)."}, {"front": "Which two non-Christian ancient historians provided early corroboration for the historical reality of Jesus and his execution?", "back": "Josephus (Jewish historian) and Tacitus (Roman historian)."}, {"front": "What did the Roman historian Tacitus (c. AD 116) confirm about Jesus?", "back": "He confirmed that 'Christus suffered the extreme penalty during the reign of Tiberius at the hands of one of our procurators, Pontius Pilatus.'"}, {"front": "How do early Christian sources, particularly Paul, support the Resurrection as a historical claim?", "back": "Paul's letter to the Corinthians (1 Cor. 15:3–8), written within 25 years, lists specific named eyewitnesses ('above five hundred brethren at once'), many of whom were still alive."}, {"front": "When and where was Jesus born and baptized, marking the beginning of his public ministry?", "back": "Born in Bethlehem (c. 4 BC) during Augustus's reign, and baptized by John the Baptist in the Jordan River (c. AD 27–30)."}, {"front": "What made Jesus' teaching revolutionary, especially as seen in the Sermon on the Mount?", "back": "It reversed conventional wisdom (e.g., bless the meek, love enemies), claimed personal authority over the Torah, forgave sins in his own name, and accepted worship."}, {"front": "Who instigated Jesus' arrest and who was the Roman governor who tried and condemned him?", "back": "The chief priests instigated his arrest, and the Roman governor Pontius Pilate tried him."}, {"front": "Why is the Resurrection considered the central claim of Christianity?", "back": "It is presented as a bodily, physical event that dramatically transformed fearful disciples into a movement willing to die for their testimony; the entire New Testament is written in its light."}, {"front": "What event, occurring fifty days after the Resurrection, is considered the birth of the Church?", "back": "Pentecost, when the Holy Spirit descended on the disciples, enabling them to speak in other languages and resulting in 3,000 baptisms."}, {"front": "Who was the first Christian martyr, and under what circumstances did he die?", "back": "Stephen, one of the first deacons, was stoned to death (c. AD 35) in Jerusalem, with Saul of Tarsus (Paul) present and approving."}, {"front": "Describe Saul of Tarsus's background before his conversion and the nature of his conversion experience.", "back": "He was a Roman citizen, a Pharisee trained under Gamaliel, and an energetic persecutor of the Church. He converted after a dramatic encounter with the risen Christ on the road to Damascus."}, {"front": "What was Paul's consistent strategy during his missionary journeys?", "back": "He would arrive in a city, first go to the synagogue, preach, weather opposition, and then plant a church before moving on."}, {"front": "Why are Paul's Epistles significant in the context of the New Testament?", "back": "They are the earliest written documents of the New Testament, predating the Gospels by a decade or more."}, {"front": "How did Paul's Roman citizenship aid him in his ministry and legal situations?", "back": "His Roman citizenship shielded him from arbitrary punishment and gave him the right to appeal to Caesar himself, as seen when he was arrested in Jerusalem."}, {"front": "Which Roman emperor launched the first organized persecution of Christians, and what was the pretext?", "back": "Emperor Nero (AD 54–68), who blamed Christians for the Great Fire of Rome in AD 64 to deflect suspicion from himself."}, {"front": "According to tradition, how did Peter and Paul die during Nero's persecution?", "back": "Peter is believed to have been crucified upside down in Rome; Paul, as a Roman citizen, was beheaded."}, {"front": "How did the Roman Empire's policy towards Christians vary after Nero, particularly under the 'Good Emperors'?", "back": "Persecution varied in intensity; emperors like Trajan had a moderate policy ('do not hunt them down'), and Hadrian discouraged false accusations, though Christians remained legally vulnerable."}, {"front": "Which Roman persecution was the most severe, known as the 'Great Persecution'?", "back": "The Diocletianic Persecution (AD 303–311), which involved destroying churches, confiscating Scriptures, imprisoning clergy, and forcing Christians to sacrifice to Roman gods."}, {"front": "What did Tertullian famously observe about the effect of Christian persecutions?", "back": "He stated that 'the blood of the martyrs was the seed of the Church,' meaning the courage of public witnesses drew converts rather than suppressing Christianity."}, {"front": "Who was Ignatius of Antioch, and why is he a significant figure related to early Christian martyrdom?", "back": "He was a bishop arrested under Trajan and transported to Rome for execution. His seven letters, written during his journey, are powerful documents of early Christianity that testify to his faith."}, {"front": "What was the Jewish population's dual authority in Judea during Jesus' time?", "back": "They lived under Roman taxation and military occupation on one side, and the Torah and the Temple priesthood on the other."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
