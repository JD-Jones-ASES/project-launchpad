<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the primary source for Shakespeare's *The Tragedy of Julius Caesar*?", "back": "Shakespeare's primary source was Plutarch's *Parallel Lives of the Noble Greeks and Romans*, specifically the lives of Caesar and Brutus, translated into English by Thomas North in 1579."}, {"front": "What is the key difference between a historian's obligation and a dramatist's obligation, according to the text?", "back": "A historian's first obligation is to tell what actually happened (historical accuracy), while a dramatist's first obligation is to illuminate something true about human nature (literary truth), even if it involves compressing, inventing, or rearranging events."}, {"front": "Explain the concept of 'literary truth' as it relates to Shakespeare's *Julius Caesar*.", "back": "Literary truth refers to what a scene reveals about human nature, psychology, or a moment's significance, regardless of exact historical facts. For example, Shakespeare's 'Et tu, Brute?' captures the emotional truth of betrayal, even if not historically spoken."}, {"front": "What was Cassius's main objective in Act I, Scene ii of Shakespeare's *Julius Caesar*?", "back": "Cassius's main objective was to recruit Brutus to the conspiracy against Caesar, appealing to his sense of Roman honor and fear of Caesar becoming a king."}, {"front": "How did Cassius appeal to Brutus in Act I, Scene ii to recruit him for the conspiracy?", "back": "Cassius appealed to Brutus's pride and the republican ideal of self-rule, framing the assassination as an act for Rome's freedom rather than personal gain. He used lines like 'The fault, dear Brutus, is not in our stars, / But in ourselves, that we are underlings.'"}, {"front": "What famous line from Cassius's speech in Act I, Scene ii highlights the republican ideal of self-rule?", "back": "“Men at some time are masters of their fates: / The fault, dear Brutus, is not in our stars, / But in ourselves, that we are underlings.”"}, {"front": "Describe Shakespeare's portrayal of Cassius compared to the historical/Plutarchan account.", "back": "Shakespeare's Cassius is a jealous, scheming villain driven by envy. Historically/in Plutarch, Cassius was a competent military officer, experienced politician with genuine republican convictions, and the chief organizer, presented as less villainous."}, {"front": "Why did Shakespeare change the character of Cassius from Plutarch's account?", "back": "Shakespeare made Cassius a dark schemer to create a moral contrast with Brutus, making Brutus's motives appear purer. This sharpens the tragedy, emphasizing idealism gone wrong rather than mere political calculation."}, {"front": "What famous Latin line, invented by Shakespeare, does Caesar speak upon seeing Brutus among his assassins?", "back": "“Et tu, Brute?—Then fall, Caesar!”"}, {"front": "How does Plutarch's account of Caesar's reaction to Brutus's betrayal differ from Shakespeare's 'Et tu, Brute?' line, and what 'truth' did Shakespeare likely capture?", "back": "Plutarch states Caesar covered his face with his robe and submitted upon seeing Brutus's sword. Shakespeare's 'Et tu, Brute?' captures the profound emotional truth of betrayal—that Caesar stopped fighting because of Brutus's involvement—which the historical account implied."}, {"front": "How does Shakespeare portray Julius Caesar in the play?", "back": "Shakespeare's Caesar is proud, superstitious, rigid, dismissive of warnings (like the Ides of March or Calphurnia's dream), and easily flattered. He speaks of himself in the third person, suggesting arrogance, making him appear a man who believes he is above ordinary dangers."}, {"front": "What specific details about the historical Caesar did Shakespeare omit or change, and why?", "back": "Shakespeare heightened Caesar's arrogance (e.g., dismissing warnings) to justify the conspirators' fears, while omitting details like Caesar's epilepsy. This makes Caesar's death genuinely tragic and makes him a more clearly flawed character for dramatic purposes."}, {"front": "How did Brutus's speech to the Roman crowd after Caesar's assassination differ in style and strategy from Antony's?", "back": "Brutus spoke in plain, logical prose, appealing to reason and principle. Antony, conversely, used apparent humility, then systematically employed evidence, irony, and emotion to dismantle Brutus's case and manipulate the crowd."}, {"front": "What was Mark Antony's initial rhetorical strategy in his funeral oration for Caesar?", "back": "Antony began with apparent humility, stating, 'I come to bury Caesar, not to praise him,' to gain the crowd's trust and appear to concede to Brutus's authority before subtly undermining his arguments."}, {"front": "Explain how Antony uses the phrase 'Brutus is an honourable man' to manipulate the crowd.", "back": "Antony repeatedly calls Brutus 'an honourable man' while simultaneously presenting evidence that contradicts Brutus's claims about Caesar's ambition. This ironic repetition becomes increasingly cutting, turning the phrase into its opposite and fueling the crowd's rage."}, {"front": "Describe Shakespeare's portrayal of Mark Antony.", "back": "Shakespeare's Antony is a masterful, cold, calculating, and politically brilliant orator who deftly turns the Roman mob against the conspirators using a single, powerful speech built on irony, evidence, and emotional manipulation."}, {"front": "What historical detail about Antony's speech did Shakespeare invent, and what effect did this invention have?", "back": "Shakespeare invented the specific contents and brilliant rhetoric of Antony's 'Friends, Romans, countrymen' speech. This invention serves as the play's turning point, creating the most famous example of manipulative rhetoric in English literature and driving the plot forward."}, {"front": "What is Shakespeare's portrayal of Brutus's primary motivation for joining the conspiracy?", "back": "Shakespeare portrays Brutus as joining the conspiracy not out of envy or greed, but out of a genuine, though ultimately mistaken, conviction that killing Caesar would save the Roman Republic, making him 'the noblest Roman of them all.'"}, {"front": "According to Shakespeare, what is Brutus's fatal flaw?", "back": "Brutus's fatal flaw is his idealism, which blinds him to political reality. This leads him to make critical errors, such as refusing to kill Antony, allowing Antony to speak at the funeral, and making a tactical error at Philippi."}, {"front": "How does the historical/Plutarchan account of Brutus's motives differ from Shakespeare's portrayal?", "back": "Historically/in Plutarch, Brutus's motives were more complex: genuine republican conviction, but also pride, peer pressure from Cassius, and the burden of his family name, as well as being deeply in debt to Caesar, who had pardoned him."}, {"front": "Why did Shakespeare simplify Brutus's motives in *Julius Caesar*?", "back": "Shakespeare simplified Brutus's motives to make him purely principled, creating a clear tragic structure: a good man performing a terrible act for what he believes are the right reasons, and ultimately being destroyed by the consequences."}, {"front": "Who was Portia in *Julius Caesar*, and what act did she perform to demonstrate her loyalty and self-control?", "back": "Portia was Brutus's devoted wife, daughter of the Stoic senator Cato the Younger. To prove she could keep secrets and share Brutus's burdens, she deliberately wounded herself in the thigh."}, {"front": "What historical detail about Portia's death did Shakespeare adapt or simplify?", "back": "Shakespeare compresses the timeline and romanticizes Portia's death. Historically, Portia died before the Battle of Philippi, with one ancient source suggesting she swallowed burning coals, though the exact cause is disputed."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
