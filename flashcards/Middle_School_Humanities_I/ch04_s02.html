<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a historian's primary obligation?", "back": "To tell what actually happened.", "id": "fc01"}, {"front": "What is a dramatist's primary obligation?", "back": "To illuminate something true about human nature, even if it means compressing, inventing, or rearranging events.", "id": "fc02"}, {"front": "Explain the \"two ways of telling the truth\" as presented in the context of Shakespeare and history.", "back": "Historical accuracy (what the record says happened) versus dramatic/literary truth (what a scene reveals about human nature, regardless of the exact facts).", "id": "fc03"}, {"front": "Which historical work did Shakespeare use as a primary source for *The Tragedy of Julius Caesar*?", "back": "Plutarch's *Parallel Lives of the Noble Greeks and Romans*, translated into English by Thomas North.", "id": "fc04"}, {"front": "Give an example from *Julius Caesar* where Shakespeare prioritizes dramatic truth over historical accuracy.", "back": "The line \"Et tu, Brute?\" is invented by Shakespeare to capture the psychological truth of Caesar's betrayal by his trusted friend, though it doesn't appear in Plutarch.", "id": "fc05"}, {"front": "How does Shakespeare portray Gaius Cassius Longinus in *Julius Caesar*?", "back": "As a jealous, scheming villain driven primarily by envy of Caesar's greatness, calculating and manipulative.", "id": "fc06"}, {"front": "How did the historical Cassius (according to Plutarch) differ from Shakespeare's portrayal?", "back": "The historical Cassius was a competent military officer, experienced politician, and the chief organizer of the conspiracy with genuine republican convictions, not primarily motivated by envy.", "id": "fc07"}, {"front": "What was Shakespeare's likely purpose in making Cassius a more villainous character?", "back": "To create a moral contrast with Brutus, making Brutus's motives appear purer and sharpening the tragedy as idealism gone wrong.", "id": "fc08"}, {"front": "How does Cassius appeal to Brutus in Act I, Scene ii to recruit him to the conspiracy?", "back": "He appeals to Brutus's pride, his sense of Roman honor, and the republican ideal of self-rule, dressing self-interest in the language of principle.", "id": "fc09"}, {"front": "Analyze the meaning of Cassius's line: \"The fault, dear Brutus, is not in our stars, / But in ourselves, that we are underlings.\"", "back": "It's an appeal to human agency and the republican ideal, suggesting that individuals, not fate, are responsible for their circumstances, thereby motivating action against Caesar.", "id": "fc10"}, {"front": "Is Caesar's dying line \"Et tu, Brute?\" historically accurate according to Plutarch?", "back": "No, it is an invention by Shakespeare. Plutarch records that Caesar simply covered his face with his robe and submitted upon seeing Brutus.", "id": "fc11"}, {"front": "How does Shakespeare characterize Julius Caesar in his play?", "back": "As proud, superstitious, rigid, easily flattered, and arrogant, often dismissing warnings and speaking of himself in the third person.", "id": "fc12"}, {"front": "How did the historical Caesar (according to Plutarch) differ from Shakespeare's portrayal?", "back": "Plutarch's Caesar was more complex: genuinely beloved, brave, politically astute, warned multiple times, and suffered from epilepsy (a fact Shakespeare omits).", "id": "fc13"}, {"front": "What was Shakespeare's artistic reason for heightening Caesar's arrogance in the play?", "back": "To make the conspirators' fears seem more justified, while still making Caesar human enough for his death to be genuinely tragic.", "id": "fc14"}, {"front": "Describe Brutus's rhetorical style in his funeral speech to the Roman crowd.", "back": "Brutus uses plain, logical prose, appealing to reason and principle rather than emotion, to convince the crowd that Caesar's killing was just.", "id": "fc15"}, {"front": "Describe Mark Antony's rhetorical strategy in his funeral oration.", "back": "Antony begins with apparent humility, then systematically uses evidence, irony, and emotion (showing Caesar's wounds, reading his will) to dismantle Brutus's case and incite the crowd.", "id": "fc16"}, {"front": "How does Antony use the phrase \"Brutus is an honourable man\" to manipulate the crowd?", "back": "He repeats the phrase with increasing irony, juxtaposing it with evidence that Caesar was not ambitious, until the phrase becomes its own opposite and fuels the crowd's rage.", "id": "fc17"}, {"front": "How does Shakespeare portray Mark Antony in *Julius Caesar*?", "back": "As a masterful, cold, calculating, and politically brilliant orator capable of turning the Roman mob against the conspirators with a single speech.", "id": "fc18"}, {"front": "What is known about the historical Mark Antony's funeral oration compared to Shakespeare's dramatic version?", "back": "The historical Antony was a skilled politician who delivered a funeral oration, and public anger did follow. However, Plutarch does not record its specific contents; Shakespeare invented the detailed speech.", "id": "fc19"}, {"front": "What was the dramatic significance of Shakespeare inventing the detailed content of Antony's \"Friends, Romans, countrymen\" speech?", "back": "It serves as the play's turning point, dramatically illustrating manipulative rhetoric and providing a clear cause for the second half of the play's events.", "id": "fc20"}, {"front": "How does Shakespeare portray Marcus Junius Brutus, particularly his motivations?", "back": "As \"the noblest Roman,\" driven solely by genuine (if mistaken) conviction that killing Caesar would save the Republic, not by envy or greed. His fatal flaw is idealism that blinds him to political reality.", "id": "fc21"}, {"front": "How did the historical Brutus's motives differ from Shakespeare's simplified portrayal?", "back": "Plutarch's Brutus had more mixed motives, including genuine republican conviction, but also being in debt to Caesar, pride, and peer pressure, making him more complicated.", "id": "fc22"}, {"front": "Why did Shakespeare simplify Brutus's motives in *Julius Caesar*?", "back": "To create a tragic structure: a good man doing a terrible thing for the right reasons, leading to his destruction, which makes for a more satisfying tragedy.", "id": "fc23"}, {"front": "Describe Portia's character and a notable action in Shakespeare's *Julius Caesar*.", "back": "Portia is Brutus's devoted wife, characterized by extraordinary courage and loyalty. She wounds herself in the thigh to prove her ability to keep secrets.", "id": "fc24"}, {"front": "What historical detail about Portia (Brutus's wife) does Plutarch record that Shakespeare incorporates?", "back": "The story of Portia wounding herself in the thigh to prove her constancy and ability to keep secrets for Brutus.", "id": "fc25"}, {"front": "In the context of historical drama, what is \"dramatic plausibility\"?", "back": "What could believably have happened in a story, even if not precisely historically recorded.", "id": "fc26"}, {"front": "In the context of Shakespeare's *Julius Caesar*, what is \"literary truth\"?", "back": "What a scene or character reveals about human nature, regardless of the exact historical facts.", "id": "fc27"}, {"front": "Compare the core rhetorical approaches of Brutus and Antony in their speeches to the Roman crowd.", "back": "Brutus appealed to reason and principle with plain, logical prose; Antony appealed to emotion, irony, and systematic evidence to manipulate the crowd.", "id": "fc28"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
