    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What happened at the Battle of Marathon (490 BC)?", "back": "Athenians and their small Plataean allies defeated a Persian army under King Darius without Spartan reinforcements. Tradition names Pheidippides as the runner who carried news of victory back to Athens, 26 miles away."}, {"front": "What was the strategic genius of Themistocles at the Battle of Salamis?", "back": "He lured the massive Persian fleet into the narrow straits of Salamis, where its size became a disadvantage. The Athenian navy destroyed the Persian fleet, ending Xerxes' invasion and making Athens the most powerful city-state in Greece."}, {"front": "What was the Delian League, and how did it change over time?", "back": "An alliance of Greek city-states formed after the Persian Wars in 478 BC for mutual defense against Persia, led by Athens. It gradually became an Athenian empire: Athens moved the treasury to Athens and used tribute money for its own building projects. Member states that tried to leave were forced to remain."}, {"front": "What did Pericles mean when he called Athens 'the school of Hellas'?", "back": "In his Funeral Oration (recorded by Thucydides), Pericles claimed Athens was a model and teacher for all of Greece: its constitution favored the many over the few, law gave equal justice to all, and public advancement depended on merit rather than class or birth."}, {"front": "What democratic reform did Pericles introduce regarding pay for public service?", "back": "Pericles extended pay to jurors and public officeholders, so that poor citizens could participate in government without losing their livelihoods. This deepened Athenian democracy by making it accessible to all economic classes, not just the wealthy."}, {"front": "What critical limitation did Athenian democracy have despite its ideals?", "back": "Athenian democracy excluded women, slaves, and foreigners—who together made up the majority of Athens' population. The democracy that produced the Parthenon and Sophocles' plays was built on this profound exclusion."}, {"front": "What caused the Peloponnesian War (431–404 BC)?", "back": "The rise of Athenian power alarmed Sparta and its allies. Athens relied on its maritime empire and navy; Sparta relied on its land army. The two systems of power proved unable to deliver a decisive blow, leading to 27 years of increasingly destructive conflict."}, {"front": "How did the plague of 430 BC affect Athens during the Peloponnesian War?", "back": "A devastating plague struck Athens in 430 BC, killing perhaps a quarter of the city's population, including Pericles himself. This blow to manpower, morale, and leadership severely weakened Athens' ability to prosecute the war effectively."}, {"front": "What was the Sicilian Expedition (415–413 BC), and why was it catastrophic for Athens?", "back": "Athens launched an ambitious invasion of Sicily in 415–413 BC. The campaign ended in total disaster: Athens lost its best fleet and army, fatally weakening its ability to continue the war. The expedition is a classic case study of imperial overreach."}, {"front": "Who was Philip II of Macedon, and what was his key military innovation?", "back": "Philip II (382–336 BC) forged Macedonia into the greatest military power in Greece. His key innovation was the sarissa—an eighteen-foot pike—organized into the Macedonian phalanx. By 338 BC at the Battle of Chaeronea, he had conquered most of Greece."}, {"front": "How was Alexander the Great tutored, and what were the limits of his conquests?", "back": "Alexander (356–323 BC) was tutored by Aristotle. He conquered Persia, Egypt, Mesopotamia, and pushed into modern India before his army refused to go further. He died in Babylon in 323 BC at age thirty-two."}, {"front": "What is Hellenism, and why is it important for understanding Christianity?", "back": "Hellenism is the spread of Greek language, culture, and ideas throughout the Middle East and Central Asia following Alexander's conquests. Greek (koine) became the common language of trade and scholarship. The New Testament was written in koine Greek, and Paul's missionary journeys relied on Greek-speaking cities Alexander had planted."}, {"front": "What happened to Alexander's empire after his death?", "back": "His empire fragmented almost immediately as his generals carved it into rival kingdoms that spent generations at war. But the cultural unity—Greek as the common tongue, Greek-style cities—proved far more durable than the political empire, lasting roughly three centuries until Rome's conquest of Egypt in 30 BC."}, {"front": "Who were the three great Greek tragedians?", "back": "Aeschylus (c. 525–456 BC), Sophocles (c. 497–406 BC), and Euripides. They used tragedy to probe questions of justice, fate, and the relationship between humans and gods. Comedy was represented by Aristophanes, who satirized politicians and philosophers."}, {"front": "What is the central conflict in Sophocles' Antigone?", "back": "Antigone defies King Creon's decree by burying her brother Polynices (declared a traitor). Creon insists state law is supreme; Antigone insists the gods' unwritten laws rank higher than any king's edict. Both die. The play raises the question: when human law and divine law conflict, which takes priority?"}, {"front": "What is natural law, and how does Sophocles' Antigone illustrate it?", "back": "Natural law is the idea that certain moral truths exist above human legislation, eternal and unchosen. Antigone expresses this when she says the gods' unwritten laws 'die not; and none knoweth whence they sprang.' Sophocles is claiming that some moral laws are not invented by human societies—they simply exist."}, {"front": "What were the charges against Socrates at his trial?", "back": "Socrates was tried before an Athenian jury of 501 citizens on charges of impiety (disrespecting the gods) and corrupting the youth. He was convicted 280–221 and sentenced to death."}, {"front": "What was Socrates' response to his possible execution?", "back": "Instead of begging for mercy, Socrates argued that 'the unexamined life is not worth living,' that death may be an eternal sleep or a journey to meet the heroes of the past, and that he would obey God rather than men and would not stop philosophizing. Athens executed its greatest philosopher for asking too many questions."}, {"front": "What was Plato's theory of Forms?", "back": "Plato taught that the material world is an imperfect shadow of a higher realm of perfect, eternal Forms—Beauty itself, Justice itself, Goodness itself. Physical things imperfectly imitate these Forms. The philosopher's task is to turn away from the cave of shadows and climb toward the light of true reality."}, {"front": "What was Aristotle's approach, and how did it differ from Plato's?", "back": "Aristotle trusted his senses and observed the world carefully, classifying plants and animals. He argued that virtue was a habit cultivated through practice, not a mystical vision of eternal Forms. 'You become courageous by doing courageous things.' He founded the Lyceum school."}, {"front": "What did the Stoics believe about the Logos?", "back": "Zeno of Citium founded the Stoa after Alexander's conquests. Stoics taught that a divine Logos (rational principle) governed the entire universe and that all human beings shared in this one rational community. Rank, wealth, and national origin were irrelevant to moral worth."}, {"front": "What was the Parthenon, and who built it?", "back": "The Parthenon (447–432 BC) was a temple to Athena built on the Acropolis of Athens entirely of marble from Mount Pentelicus. Its architects were Ictinus and Callicrates; the sculptor Pheidias created a forty-foot ivory-and-gold statue of Athena inside. It was the centerpiece of Pericles' building program."}, {"front": "What optical corrections did Greek architects use in the Parthenon?", "back": "Ictinus and Callicrates used subtle optical corrections—slightly curved columns and floors that bow upward in the center—to make the building appear perfectly straight to the human eye. What looks like mathematical perfection was actually calculated imperfection."}, {"front": "What were the three orders of Greek architecture?", "back": "Doric (plain, sturdy—used on the Parthenon's exterior), Ionic (slender, with scroll-like capitals), and Corinthian (elaborate, with leaf-shaped capitals). These orders were adopted by Rome and have appeared in Western architecture ever since, from the United States Capitol to modern courthouses."}, {"front": "How did the Greek theater function as a civic institution?", "back": "The theater of Dionysus at Athens held approximately 17,000 spectators. Plays were performed at the festival of Dionysus, judged in competition, and citizens received an allowance from the city to attend. Drama was not a luxury but a shared civic experience: tragedy taught reflection, comedy taught self-criticism."}, {"front": "How did the Funeral Oration look different to Thucydides than to Pericles' original audience?", "back": "Pericles delivered the Funeral Oration during the first year of what became a disastrous 27-year war that his own policies had helped bring about. Thucydides recorded it not to endorse it, but to show how Athens saw itself at the height of its power—tinged with the tragedy of what followed."}, {"front": "What was the Lyceum, and who founded it?", "back": "Aristotle founded the Lyceum as his school in Athens. It operated as a center of empirical research and philosophical teaching. Aristotle's approach—observing the natural world, classifying living things, arguing that virtue is habit—defined one of the two great streams of Greek philosophy."}, {"front": "Why did early Christian thinkers engage positively with Greek philosophy rather than reject it?", "back": "The text describes how Augustine used Plato's language of the soul's journey toward transcendent truth, Aquinas used Aristotle's logic to systematize Christian theology, and Justin Martyr said Socrates was 'in a measure a Christian' because he was guided by the divine Logos before the Incarnation. Greek philosophy contained genuine glimpses of truth."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
