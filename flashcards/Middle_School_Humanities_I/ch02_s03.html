<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the significance of the Battle of Marathon in 490 BC?", "back": "The Athenians, with their Plataean allies, defeated the Persian army under King Darius, signaling a crucial early victory for Greece against the Persian Empire."}, {"front": "Who was King Leonidas, and what was the historical impact of the Battle of Thermopylae?", "back": "King Leonidas led a small Spartan force that held the mountain pass of Thermopylae for three days against Xerxes' massive Persian army, buying critical time for the rest of Greece to prepare its defenses."}, {"front": "How did Athens achieve victory against the Persian fleet at the Battle of Salamis?", "back": "The Athenian navy, guided by General Themistocles, lured the larger Persian fleet into the narrow straits of Salamis and destroyed it, effectively saving Greece from Persian conquest."}, {"front": "What was the immediate consequence for Athens after the Persian Wars?", "back": "Athens emerged as the most powerful city-state in the Greek world, gaining both wealth and the confidence to begin its 'Golden Age'."}, {"front": "Explain how the Persian Wars contributed to Athens' Golden Age.", "back": "The wars secured the silver mines at Laurium, which funded a powerful navy. The navy supported Athenian democracy, and democracy, under leaders like Pericles, funded ambitious building programs and cultural flourishing."}, {"front": "Define the Delian League and describe its transformation.", "back": "The Delian League was an alliance of Greek city-states formed in 478 BC for mutual defense, led by Athens. It gradually became an Athenian empire as Athens moved the treasury to its city, used funds for its own projects, and forced member states to remain."}, {"front": "Who was Pericles, and what were his key contributions to Athenian society?", "back": "Pericles (c. 495–429 BC) was a prominent Athenian leader who used Delian League tribute to fund vast building programs on the Acropolis and deepened Athenian democracy by providing pay to jurors and public officeholders."}, {"front": "What were some of the famous structures built on the Acropolis during Pericles' leadership?", "back": "The Parthenon, the Erechtheion, and the Propylaea were significant monuments constructed as part of Pericles' ambitious building program."}, {"front": "According to Pericles' Funeral Oration, what were the defining characteristics of Athenian democracy?", "back": "Pericles stated that Athens was 'an education to Greece,' where merit mattered more than birth, the law protected the weak, and citizens dedicated themselves to both private excellence and public duty. It favored the many over the few."}, {"front": "What were the significant limitations of Athenian democracy, despite its perceived brilliance?", "back": "Athenian democracy excluded women, slaves, and foreigners, who collectively made up the majority of Athens' population."}, {"front": "What historical context is important when interpreting Pericles' Funeral Oration?", "back": "The speech was delivered during the first year of the devastating Peloponnesian War, which Athens ultimately lost. Thucydides recorded it not as an endorsement, but to illustrate how Athens viewed itself at the height of its power, with a tragic undertone."}, {"front": "Define the Peloponnesian War and identify the main opposing alliances.", "back": "The Peloponnesian War (431–404 BC) was a great war that divided the Greek world, pitting the maritime, democratic Athenian alliance against the land-based, oligarchic Spartan-led Peloponnesian League."}, {"front": "List two major factors that contributed to Athens' defeat in the Peloponnesian War.", "back": "A devastating plague in 430 BC (which killed Pericles) and a disastrous invasion of Sicily (415–413 BC) that destroyed its best fleet and army were critical factors in Athens' eventual defeat."}, {"front": "What was the lasting impact of the Peloponnesian War on the Greek city-state system?", "back": "The exhausted city-states never fully recovered their previous power, creating a power vacuum that was later filled by the rising kingdom of Macedonia."}, {"front": "Who was Philip II of Macedon, and what was his key military innovation?", "back": "Philip II (382–336 BC) was a brilliant military innovator who forged the Macedonian army into the world's finest fighting force. His key innovation was the sarissa, an eighteen-foot-long pike, used effectively in the Macedonian phalanx."}, {"front": "Who was Alexander the Great, and what was the geographical extent of his conquests?", "back": "Alexander (356–323 BC), tutored by Aristotle, was Philip II's son. In 13 years, he conquered Persia, Egypt, Mesopotamia, and pushed into modern India, creating an empire stretching from Greece to northwestern India."}, {"front": "Define Hellenism and explain its long-term significance.", "back": "Hellenism is the spread of Greek language, culture, and ideas across the Middle East and Central Asia following Alexander's conquests. It created a culturally unified 'Hellenistic world' with koine Greek as a common language, crucial for future developments like the spread of the New Testament."}, {"front": "Why is Hellenism particularly important for understanding the early Christian era (Unit 5)?", "back": "The New Testament was written in koine Greek, the common language of the Hellenistic world. Paul's missionary journeys and the early Church greatly benefited from the network of Greek-speaking cities and infrastructure established by Alexander's conquests."}, {"front": "How did Alexander's cultural legacy compare to the fate of his political empire after his death?", "back": "Alexander's political empire fragmented almost immediately into rival kingdoms. However, his cultural legacy (Hellenism) proved far more durable, spreading Greek language, art, and philosophy across vast territories for centuries."}, {"front": "According to the text, what enduring question do the Persian Wars raise for Western history?", "back": "The Persian Wars raise the question of how a small, free people can defeat a vast imperial army, highlighting the motivation of citizen-soldiers fighting for their own city and laws."}, {"front": "What lessons can be learned from the collapse of Athens during the Peloponnesian War, even today?", "back": "It serves as a case study in military and political science on how a democracy can lead to its own downfall through arrogance, short-sighted decision-making, and succumbing to the flattery of demagogues."}, {"front": "What was the fundamental difference in military strategy between Athens and Sparta during the Peloponnesian War?", "back": "Athens primarily relied on its powerful navy, while Sparta depended on its superior land army."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
