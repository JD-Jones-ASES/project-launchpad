<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Parthenon, and what did it represent for Athens?", "back": "The Parthenon was a magnificent temple dedicated to Athena on the Acropolis, serving as a powerful statement of Athenian civic pride, beauty, and imperial power."}, {"front": "Who were the main architects of the Parthenon, and what unique architectural technique did they employ?", "back": "Ictinus and Callicrates were the architects. They used subtle optical corrections, such as slightly curved columns and upward-bowing floors, to make the building appear perfectly straight and proportioned to the human eye."}, {"front": "What famous statue was housed inside the Parthenon?", "back": "A forty-foot ivory-and-gold statue of Athena, sculpted by Pheidias."}, {"front": "Describe the Doric order of Greek architecture.", "back": "The Doric order is characterized by plain, sturdy columns with simple capitals, exemplified by the exterior of the Parthenon."}, {"front": "Describe the Ionic order of Greek architecture.", "back": "The Ionic order features more slender columns with distinctive scroll-like (volute) capitals."}, {"front": "Describe the Corinthian order of Greek architecture.", "back": "The Corinthian order is the most elaborate, recognized by its ornate, leaf-shaped capitals."}, {"front": "How was the Parthenon and other Athenian cultural achievements largely funded?", "back": "They were partly funded by tribute money extracted from allied city-states in the Delian League, who had little say in how the money was spent."}, {"front": "What ethical dilemma does the funding of the Parthenon present for historians?", "back": "It presents the dilemma of admiring human achievement and beauty while acknowledging that it was partly built on unjust foundations—the involuntary contributions of subject peoples."}, {"front": "Who was Plato, and what school did he found?", "back": "Plato (c. 428–348 BC) was a student of Socrates who founded the Academy, one of the most influential philosophical schools in ancient Greece."}, {"front": "What was Plato's core philosophical idea about the nature of reality?", "back": "He taught that the material world we perceive is an imperfect shadow of a higher, unchanging realm of perfect, eternal 'Forms' (e.g., Beauty itself, Justice itself)."}, {"front": "What was the main idea presented in Plato's work 'The Republic'?", "back": "It imagined an ideal city-state governed by 'philosopher-kings' who had attained knowledge of the eternal Forms."}, {"front": "Who was Aristotle, and what school did he found?", "back": "Aristotle (384–322 BC) was Plato's student who founded the Lyceum, another major philosophical school."}, {"front": "How did Aristotle's approach to knowledge differ from Plato's?", "back": "Unlike Plato, Aristotle trusted his senses and believed truth was found through careful observation and classification of the world as it actually is, rather than by turning away from it."}, {"front": "According to Aristotle, how is virtue cultivated?", "back": "He argued that virtue is not a mystical vision but a habit cultivated through consistent practice—by repeatedly doing courageous, generous, or just actions over time."}, {"front": "In simple terms, what was the primary focus of Plato's philosophy compared to Aristotle's?", "back": "Plato 'looked upward,' seeking truth in eternal, invisible Forms; Aristotle 'looked outward,' finding truth by observing the world as it is."}, {"front": "How did Christian thinkers later utilize the philosophies of Plato and Aristotle?", "back": "Augustine was deeply influenced by Plato, while Thomas Aquinas was deeply influenced by Aristotle, demonstrating that Christian tradition found both approaches valuable."}, {"front": "Who founded the Stoic school of philosophy?", "back": "Zeno of Citium founded the Stoa after Alexander's conquests."}, {"front": "What was a central tenet of Stoic philosophy regarding the universe and human beings?", "back": "Stoics believed the entire universe was governed by a divine rational principle (Logos), and that all human beings shared in one rational community, making social status irrelevant to moral worth."}, {"front": "How did Stoic universalism prove useful in later historical contexts, such as for the Apostle Paul?", "back": "Its concept of a divine Logos and a shared rational community provided useful vocabulary for Paul when preaching in Athens, allowing him to connect with existing philosophical ideas."}, {"front": "What was the capacity of the Theater of Dionysus in Athens, and how was attendance made accessible to citizens?", "back": "It held approximately 17,000 spectators. Citizens received an allowance from the city to attend, making drama a shared civic experience rather than a luxury for the wealthy."}, {"front": "How did Greek tragedy and comedy serve democracy's needs in Athens?", "back": "Tragedy made audiences reflect on universal themes like pride and fate, while comedy allowed them to critically laugh at their own politicians. Both fostered citizens who could feel and reason, promoting community reflection."}, {"front": "How did the Greeks use natural engineering in their theaters?", "back": "They ingeniously built their theaters into hillsides to provide excellent natural acoustics, an elegant engineering solution."}, {"front": "How did the Romans, as military conquerors of Greece, demonstrate the influence of Greek culture?", "back": "The Romans extensively adopted Greek architectural orders, adapted Greek drama, and absorbed Stoic and Platonic philosophy through educated slaves and tutors, demonstrating profound cultural influence."}, {"front": "Explain the meaning of the Roman saying 'Graecia capta ferum victorem cepit.'", "back": "Meaning 'Captive Greece captured its fierce conqueror,' this saying by Horace illustrates that while Rome conquered Greece militarily, Greek culture profoundly influenced and shaped Roman civilization."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
