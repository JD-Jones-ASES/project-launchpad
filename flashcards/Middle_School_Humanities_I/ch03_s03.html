<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Italy's geography compare to Greece's, and what advantage did this offer Rome?", "back": "Italy had broad coastal plains and a central spine (Apennines), allowing for larger agricultural communities and easier overland communication, unlike Greece's mountainous, fragmented landscape."}, {"front": "Describe Rome's strategic geographic location on the Italian peninsula.", "back": "Rome was built on seven hills along the Tiber River, approximately 15 miles from the sea. These hills provided natural defense, and the river offered fresh water, a ford for trade routes, and access to the sea."}, {"front": "What was Latium, and what is its historical significance?", "back": "Latium was the plain west of the Apennines in central Italy where Rome was founded. It gave its name to the Latin language and the Latin-speaking peoples, which became the basis for many modern Romance languages."}, {"front": "In what fundamental way did Rome's geography influence its empire-building compared to Athens?", "back": "Rome's geography, with its broad plains and a key Tiber ford, facilitated overland travel and helped it become an overland empire. Athens, on a peninsula, became a maritime empire."}, {"front": "What were the primary functions of Roman roads?", "back": "Roman roads served military, commercial, and political functions simultaneously, enabling troop movement, trade, and communication across the empire."}, {"front": "Name the first great Roman road and its initial purpose.", "back": "The Via Appia (Appian Way), begun in 312 BC, initially connected Rome to Capua and was later extended to Brundisium, serving as a main route for troops and trade to the eastern Mediterranean."}, {"front": "How did Roman roads, originally built for imperial control, paradoxically serve another significant historical purpose?", "back": "Roman roads, built by legions for imperial control, later became the primary routes for the spread of the Gospel, as exemplified by Paul's missionary journeys."}, {"front": "What did the acronym SPQR stand for, and what Roman political ideal did it represent?", "back": "SPQR stood for 'Senatus Populusque Romanus' ('The Senate and the Roman People'), representing the ideal of authority shared between the aristocratic Senate and the citizen body."}, {"front": "In practice, who held more power in the Roman Republic according to the SPQR ideal?", "back": "In practice, the aristocratic Senate dominated, although the formula acknowledged the people's legitimate share in sovereignty, reinforced by institutions like the Twelve Tables and the tribunate."}, {"front": "Compare the composition of the Roman Senate and the Athenian Assembly.", "back": "The Roman Senate comprised aristocratic, experienced former magistrates. The Athenian Assembly consisted of all adult male citizens who could vote directly."}, {"front": "Contrast the decision-making processes of the Roman Senate and the Athenian Assembly.", "back": "The Roman Senate debated and made recommendations, emphasizing stability and expert knowledge. The Athenian Assembly voted directly on matters of war, peace, and law, emphasizing direct democracy and public participation."}, {"front": "What were the perceived strengths of the Roman Senate's approach to governance?", "back": "The Roman Senate's approach produced remarkable continuity of policy, stability, and leveraged the experience of former magistrates, making it slower to panic and steady in its decisions."}, {"front": "What were the perceived strengths of the Athenian Assembly's approach to governance?", "back": "The Athenian Assembly was dynamic and allowed for direct participation from its citizens, leading to a dynamic and creative society, though sometimes reckless."}, {"front": "What was the *cursus honorum* in the Roman Republic?", "back": "The *cursus honorum* was the 'path of offices,' requiring aspiring politicians to hold a sequence of offices (quaestor, aedile, praetor, consul) with minimum age requirements and mandatory gaps between offices."}, {"front": "What was the primary purpose of the *cursus honorum*?", "back": "Its primary purpose was to ensure that leaders gained necessary experience in various civic duties (finances, public works, courts) before reaching the highest office, checking ambition with experience."}, {"front": "How did the rate of Roman territorial expansion change before and after 264 BC, and what facilitated the acceleration?", "back": "Expansion was slower from 509-264 BC (controlling Italy) but dramatically accelerated from 264-31 BC (controlling the Mediterranean basin). Gaining control of Sicily, North Africa, and Spain after the Punic Wars added significant resources and capacity for further conquest."}, {"front": "According to Procopius, what made the Via Appia so remarkable?", "back": "Procopius noted that the Via Appia was paved throughout with hard stone, remained perfectly straight, was wide enough for two wagons, and had suffered no damage over a long course of time, rain, or heat."}, {"front": "How do Roman roads compare to modern infrastructure like interstate highways or the internet in terms of fostering unity?", "back": "Roman roads, like modern highways or the internet, provided crucial infrastructure that made political unity and rapid communication possible across vast distances."}, {"front": "Which form of connection, sea routes or roads, proved more durable for ancient empires, and why?", "back": "Roads proved more durable, as they can be walked and maintain utility through political change, unlike sea routes which depend on weather and naval power. Many Roman roads are still visible today."}, {"front": "What larger question about governance do the Roman Senate and Athenian Assembly help us explore?", "back": "They help us explore the fundamental question of 'who should govern?' and the trade-offs between stability and experience (Rome) versus direct democracy and dynamism (Athens)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
