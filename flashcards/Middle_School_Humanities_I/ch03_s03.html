<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Roman legend, who were the twin brothers involved in the founding of Rome?", "back": "Romulus and Remus, who were abandoned as infants, nursed by a she-wolf, and raised by a shepherd. Romulus eventually killed Remus and founded Rome."}, {"front": "What traditional date did Romans use for the founding of their city, and what Latin phrase referred to it?", "back": "753 BC, from which they counted years as *ab urbe condita* ('from the founding of the city')."}, {"front": "What Roman virtue is embodied by the legend of the Trojan prince Aeneas carrying his aged father and household gods from burning Troy?", "back": "*Pietas*, signifying dutiful devotion to the gods, to family, and to the state, often subordinating personal desires to these obligations."}, {"front": "Why were Rome's founding stories, even if partly legendary, important to the Romans?", "back": "They revealed what Rome stood for, answering 'Who are we, and what do we stand for?' by teaching core values like *pietas*, endurance, and honoring parents and gods."}, {"front": "Who was Tarquinius Superbus, and what specific event led to the downfall of the Roman monarchy?", "back": "He was the last king of Rome, a tyrant. His downfall was triggered when his son Sextus violated the noblewoman Lucretia, sparking a revolt led by Lucius Junius Brutus."}, {"front": "What year marks the traditional end of the Roman monarchy and the beginning of the Republic?", "back": "509 BC."}, {"front": "What is the literal meaning of *res publica*, the Latin term for Rome's system of shared government?", "back": "'The public thing' or 'the public affair.'"}, {"front": "What was the primary mechanism designed to prevent any single man from seizing permanent power in the early Roman Republic?", "back": "The system of two annually elected consuls, each holding the right of *intercessio* (veto) over the other's decisions."}, {"front": "Describe the role and composition of the Roman Senate during the Republic.", "back": "An advisory body of experienced former magistrates (originally patrician only) who served for life. It controlled state finances, foreign policy, and military commands, and its decrees carried overwhelming moral weight."}, {"front": "What powers did the Roman Consuls possess, and how were their powers checked?", "back": "Two annually elected chief magistrates who commanded the army and presided over the Senate, holding full *imperium* (right to command). Their powers were checked by mutual *intercessio* (veto)."}, {"front": "What was the role of the Tribunes of the Plebs, and why were they considered 'sacrosanct'?", "back": "Ten annually elected officials whose persons were legally inviolable (sacrosanct). They protected plebeian citizens by vetoing any magistrate's action affecting them."}, {"front": "What was the *Cursus Honorum*, and what was its purpose?", "back": "The 'path of honors' – a required sequence of public offices (quaestor, aedile, praetor, consul, censor) designed to ensure that Roman leaders were tested and experienced before reaching the highest offices."}, {"front": "Explain the 'Conflict of the Orders' in early Rome.", "back": "The long struggle between patricians (hereditary noble families) and plebeians (ordinary free citizens) for equal political rights and access to power."}, {"front": "What was the significance of the 'secession of the plebs' in 494 BC?", "back": "Plebeian soldiers refused to fight and walked out of Rome until patricians created the office of Tribune of the Plebs, giving common citizens a voice and protection."}, {"front": "What were the Twelve Tables, and why were they a crucial development for Roman law?", "back": "Rome's first written law code, displayed publicly in the Forum (451-450 BC). They made the law public, knowable, and—in principle—binding on rich and poor alike, preventing arbitrary application by patrician judges."}, {"front": "How did the Licinian-Sextian Laws (367 BC) contribute to the resolution of the Conflict of the Orders?", "back": "They opened the consulship to plebeians, allowing them to hold the highest executive office."}, {"front": "What was the effect of the Lex Hortensia (287 BC) on the balance of power in the Republic?", "back": "It declared that resolutions of the plebeian assembly were binding on all Romans, patrician and plebeian alike, marking a major victory for plebeian rights."}, {"front": "According to Roman thinkers, what explained the longevity and strength of Rome's Republic?", "back": "Its genuinely mixed constitution, which balanced the stability and experience of the Senate, the executive energy of the consuls, and the protection offered to ordinary citizens by the tribunes."}, {"front": "Define *Virtus* in the context of Roman morality.", "back": "From Latin *vir* (man), it meant courage, self-discipline, and excellence in the service of the community (*res publica*), tested in difficulty and aimed at the common good."}, {"front": "Define *Pietas* as a Roman virtue.", "back": "Dutiful devotion—to the gods, to family, and to the state—subordinating personal desires to one's obligations."}, {"front": "What did the Roman virtue of *Gravitas* entail, and what was its opposite?", "back": "The quality of seriousness, weight, and dignity appropriate to a man of public responsibility, involving deliberate speech, honor for tradition, and taking duties seriously. Its opposite was *levitas* (frivolity)."}, {"front": "What policy did Rome employ after defeating the Latin League (e.g., at the Battle of the Latin Way in 338 BC) to integrate conquered peoples?", "back": "A policy of incorporation, offering defeated cities 'Latin rights' (partial Roman citizenship) or full citizenship, rather than merely enslaving them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
