<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the primary role of the Aegean Sea for the ancient Greeks?", "back": "It acted as a highway, connecting Greek communities and serving as the organizing principle of their civilization, rather than a barrier.", "id": "fc01"}, {"front": "How did the Aegean Sea facilitate cultural and economic exchange?", "back": "Major cultural exchanges (trade, travel of philosophers, spread of art/religion) moved along its sea lanes, connecting distant communities far more readily than mountains divided them.", "id": "fc02"}, {"front": "Name two significant Greek-speaking communities located on the coast of Asia Minor mentioned in the text.", "back": "Miletus and Ephesus.", "id": "fc03"}, {"front": "What was the main geographic feature that divided ancient Greek communities?", "back": "The rugged mountainous terrain of the Greek peninsula, which made overland travel slow and difficult.", "id": "fc04"}, {"front": "How did Greece's geography influence its political organization?", "back": "The mountains fragmented the population into isolated, self-contained communities, leading to the development of hundreds of independent city-states (poleis) instead of a unified nation.", "id": "fc05"}, {"front": "List three geographic factors that contributed to the formation of independent Greek city-states.", "back": "Mountains separated valleys, coastlines gave communities access to sea trade, and small arable areas limited the agricultural base of any single community.", "id": "fc06"}, {"front": "Explain the difference in political organization between ancient Greece and Egypt based on their geography.", "back": "Greece's mountains fragmented the population into independent city-states, while Egypt's Nile valley funneled people into a single fertile strip, allowing for one unified kingdom.", "id": "fc07"}, {"front": "Define 'Acropolis' in the context of a Greek city-state.", "back": "A defensible hilltop (from akra = 'high' + polis = 'city') that served as a citadel, last-resort fortress, and often housed the city's most important temple.", "id": "fc08"}, {"front": "What was the function of the Agora in a Greek city-state?", "back": "It was the open marketplace and civic center where merchants sold goods, citizens gathered for public life (voting, announcements), philosophers argued, and courts met.", "id": "fc09"}, {"front": "Which major Greek city-state was an exception to the rule of coastal or island locations, and how did its geography affect its character?", "back": "Sparta, located inland, had no direct sea access. This meant it built its power on land through agriculture and military conquest rather than sea trade.", "id": "fc10"}, {"front": "Why did ancient Greek city-states rely heavily on commerce?", "back": "Due to limited arable land (only about 20%), they couldn't grow enough food for their growing populations, so they produced specialized goods for export and traded for necessary imports like grain.", "id": "fc11"}, {"front": "Name two major exports of ancient Greece.", "back": "Olive oil and wine (Pottery is also a key export).", "id": "fc12"}, {"front": "How was olive oil used by the ancient Greeks?", "back": "For cooking, lighting lamps, cleaning the body after exercise, and as a base for perfume. It was prized across the Mediterranean.", "id": "fc13"}, {"front": "What was the primary import for classical Athens, and from where did it mainly come?", "back": "Grain, primarily from the Black Sea colonies (especially around the Crimea, modern Ukraine).", "id": "fc14"}, {"front": "Why did Greek city-states engage in colonization during the eighth and seventh centuries BC?", "back": "To address the problem of not enough farmland for their growing populations.", "id": "fc15"}, {"front": "What was the relationship between a Greek colony and its 'mother city' (metropolis)?", "back": "Colonies were new, independent settlements abroad that maintained cultural and religious ties to their founding 'mother city'.", "id": "fc16"}, {"front": "Name three significant Greek colonies mentioned in the text and their modern locations.", "back": "Massalia (modern Marseille, France), Neapolis (modern Naples, Italy), Byzantium (modern Istanbul, Turkey), and Olbia/Panticapaeum (modern Ukraine/Crimea).", "id": "fc17"}, {"front": "How did Greek colonial expansion impact the spread of Greek culture?", "back": "It spread Greek language, religion, and culture across an enormous area, bringing Greeks into contact with various other peoples and facilitating the rapid dissemination of ideas like philosophy and democracy.", "id": "fc18"}, {"front": "Describe the nature of the 'empire' built by the ancient Greeks.", "back": "It was a network of independent, like-minded communities sharing language, religion, and culture, rather than a unified empire with a capital and an army of occupation.", "id": "fc19"}, {"front": "How did trade contribute to cultural exchange in the ancient Greek world?", "back": "Trade was not just economic; it carried myths, styles, tastes, and ideas along with goods like pottery and olive oil, leading to the rapid spread of Greek philosophy, drama, and architecture across the Mediterranean.", "id": "fc20"}, {"front": "Where and approximately when did the first metal coins appear?", "back": "In the kingdom of Lydia in western Asia Minor, around 600 BC.", "id": "fc21"}, {"front": "What was the significance of Athens' silver drachma?", "back": "It was widely trusted and circulated, becoming a de facto international currency across the eastern Mediterranean, supported by silver from the rich mines at Laurium.", "id": "fc22"}, {"front": "What specific geographic advantage did Athens' harbor at Piraeus offer?", "back": "It was connected to the city by long walls, making it a well-defended economic lifeline through which goods from across the Mediterranean passed.", "id": "fc23"}, {"front": "Why was Greek wine typically diluted with water before drinking?", "back": "Drinking undiluted wine was considered a barbarian custom by the Greeks.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
