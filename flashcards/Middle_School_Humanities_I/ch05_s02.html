<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What primary sources are covered in Unit 5 for understanding early Christianity?", "back": "The Gospels, the book of Acts, letters of an early bishop facing martyrdom (Ignatius), and a letter from a pagan Roman governor (Pliny the Younger, implied by context)."}, {"front": "What is the Sermon on the Mount, and where can it be found?", "back": "The Sermon on the Mount (Matthew 5–7) is the most concentrated body of ethical teaching in Western literature, delivered by Jesus on a hillside in Galilee."}, {"front": "What are the Beatitudes, and what is the meaning of the word 'blessed' (beatus/makarios) in this context?", "back": "The Beatitudes are the opening section of the Sermon on the Mount, calling certain groups 'blessed.' 'Beatus' (Latin) and 'makarios' (Greek) mean happy, fortunate, or divinely favored, but Jesus applies it to those who suffer, reversing traditional values."}, {"front": "How did the Beatitudes challenge the values of the Roman world and Greek philosophy?", "back": "Rome valued military glory, wealth, power, and status, while the Beatitudes called the poor, meek, mourning, and persecuted 'blessed.' Aristotle taught wealth and good fortune were necessary for human flourishing (eudaimonia), but Jesus taught the opposite."}, {"front": "Why were the Beatitudes considered revolutionary or offensive in the ancient world?", "back": "By declaring the poor and suffering 'blessed,' Jesus made a revolutionary claim about the moral order, reversing the world's value system. This was electrifying to the poor but threatening to the powerful, as it inverted their understanding of fortune and honor."}, {"front": "What is unique about the opening of John's Gospel compared to other Gospels?", "back": "The Gospel of John opens not with a genealogy or birth narrative but with a theological declaration, drawing on the Greek philosophical concept of the Logos."}, {"front": "Explain the significance of the term 'Logos' in John's Prologue.", "back": "The Greek 'Logos' (Word, Reason, Divine Principle) was a key philosophical concept for Stoics, representing the rational principle ordering the universe. John uses it to declare that this eternal principle became a human being, Jesus, in history, making it personal rather than abstract."}, {"front": "What does the phrase 'the Word was made flesh' (ho Logos sarx egeneto) signify?", "back": "This phrase encapsulates the Incarnation doctrine, claiming that the eternal rational principle of the universe (the divine Logos) became a human being in a specific time and place (Bethlehem, under Augustus, in the reign of Herod)."}, {"front": "How does John's use of 'Logos' represent both a fulfillment of and a departure from Greek philosophy?", "back": "It fulfills Greek philosophical longing for a rational principle but radically departs by claiming this principle is not impersonal but a specific Person who can be touched, followed, and loved, grounding it in historical reality."}, {"front": "What was the context of Paul's sermon on the Areopagus in Athens (Acts 17)?", "back": "Paul preached in Athens, the intellectual capital, to Epicurean and Stoic philosophers who often dismissed him. He chose not to quote Hebrew Scriptures, which they wouldn't know."}, {"front": "How did Paul 'contextualize' his message to the Athenians?", "back": "Paul started with his audience's existing knowledge and religious practices, referencing their altar 'To the Unknown God' and quoting their own poets (like Aratus). This method finds connections without compromising the Gospel."}, {"front": "What were the results of Paul's sermon in Athens?", "back": "The results were mixed: some mocked, others wanted to hear more, and a few believed, including Dionysius the Areopagite and a woman named Damaris. It planted seeds for future generations."}, {"front": "What was the nature of Paul's defense before King Agrippa II and Governor Festus (Acts 26)?", "back": "Paul's defense was primarily an autobiography, recounting his life as a Pharisee, his encounter with the risen Christ on the Damascus road, and his call to preach to the Gentiles. He appealed to Agrippa's knowledge of Jewish Scripture."}, {"front": "What were the three distinct responses to the Gospel seen in Paul's appearance before Agrippa and Festus?", "back": "Agrippa was 'almost persuaded' (the nearly-persuaded), Festus dismissed Paul as 'mad' (the Roman rationalist), and Paul himself represented the fully committed believer."}, {"front": "How did Paul's approach in Acts 26 (before Agrippa) differ from his approach in Acts 17 (in Athens)?", "back": "In Athens (Acts 17), Paul argued from natural theology and Greek philosophy. Before Agrippa (Acts 26), he argued from Hebrew Scripture and personal testimony, showing adaptability to different audiences while presenting the same Gospel."}, {"front": "Who was Ignatius of Antioch, and what significant event defined his later life?", "back": "Ignatius of Antioch (c. AD 35–108) was the third bishop of Antioch. He was arrested under Emperor Trajan and transported under Roman military guard to Rome for execution in the arena, during which he wrote important letters."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
