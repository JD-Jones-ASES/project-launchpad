<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Name four key geographical locations in the Gospel narrative in Judaea and Galilee.", "back": "Bethlehem, Nazareth, Jerusalem, and the Jordan River."}, {"front": "What was the significance of the region of Samaria in the context of Judaea and Galilee?", "back": "Samaria separated Judaea and Galilee, highlighting the deep hostility between Jews and Samaritans, as seen in the 'Good Samaritan' parable."}, {"front": "What was the approximate size of the area where Jesus conducted his entire ministry?", "back": "It was smaller than the state of New Jersey."}, {"front": "List three elements of Roman infrastructure that facilitated the rapid spread of the Gospel.", "back": "Roman roads, Roman naval protection for sea travel, and Koine Greek as the common language."}, {"front": "How quickly did Christianity reach Rome from the time of the Resurrection?", "back": "Within twenty years of the Resurrection, covering approximately 1,400 miles."}, {"front": "How did Paul acquire Roman citizenship?", "back": "He inherited it from his father, as his hometown of Tarsus had been granted citizen status for its loyalty to Rome."}, {"front": "Provide two examples of how Paul's Roman citizenship protected him during his missionary journeys.", "back": "It prevented him from being flogged by a Roman tribune in Jerusalem, and it allowed him to appeal to Caesar when facing unjust trial in Caesarea."}, {"front": "Describe Paul's consistent missionary strategy upon arriving in a city.", "back": "He would first go to the local synagogue."}, {"front": "How did the Jewish Diaspora's synagogue network aid in the spread of the Gospel?", "back": "It provided ready-made communities of people who believed in the God of Abraham, knew the Hebrew Scriptures, and were accustomed to welcoming 'God-fearers,' creating a pre-existing distribution network across the Empire."}, {"front": "Who were 'God-fearers' and why were they important to Paul's mission?", "back": "'God-fearers' were Gentiles who attended synagogues without converting to Judaism; they often became Paul's most receptive audience."}, {"front": "What was the common language in which the New Testament was written, and how did it become so widespread?", "back": "It was written in Koine Greek, which had been spread across the Empire by Alexander's conquests."}, {"front": "What is the difference between Koine Greek and classical Athenian Greek?", "back": "Koine Greek was the common, everyday spoken language of the marketplace, accessible to ordinary people across the Empire, unlike classical Athenian Greek, which was the language of educated writers."}, {"front": "How did the universality of Koine Greek impact early Christian missionary activity?", "back": "It allowed the Christian message to be understood by diverse audiences across the Roman Empire, regardless of their native language, greatly aiding its spread."}, {"front": "Compare the functions of Roman roads in the first century and Benedictine/Carolingian monasteries in the early medieval period.", "back": "Both served as infrastructure or networks for the movement of ideas, people, and civilization. Roman roads were public infrastructure for military/economic purposes, while monasteries were built by the Church for spiritual purposes."}, {"front": "According to historians, list four main reasons for the extraordinary spread of Christianity in the ancient world.", "back": "The unique message, strong community care, public witness of martyrs, and existing Roman infrastructure."}, {"front": "What made the early Christian message unique in the ancient world?", "back": "It proclaimed universal human dignity, care for the poor, hope beyond death, and a God who had become human."}, {"front": "How did early Christian communities differentiate themselves through their care for others?", "back": "They cared for the sick, widows, orphans, and the poor in ways that pagan society did not, notably staying to care for the dying during epidemics like the Antonine Plague."}, {"front": "Explain the significance of martyrs in the spread of Christianity, as expressed by Tertullian.", "back": "Christians who died for their faith rather than renouncing it provided a powerful public witness. Tertullian famously stated, 'The blood of the martyrs is the seed of the Church.'"}, {"front": "What does the text suggest about the ultimate fate of the Roman infrastructure that aided the Gospel's spread?", "back": "The Roman infrastructure would not last forever; the roads would crumble, and the empire would fragment, posing new challenges for Christianity."}, {"front": "How can Paul's use of Roman law be seen as ironic?", "back": "The same legal system designed to protect its citizens, which Paul used instrumentally to survive and spread the Gospel, would eventually be the system that executed him under Nero."}, {"front": "What specific geographic regions did Paul's first missionary journey cover?", "back": "Cyprus and southern Asia Minor (modern Turkey)."}, {"front": "Which major regions and cities did Paul visit during his second missionary journey?", "back": "Macedonia and Greece, including Philippi, Thessalonica, Corinth, and Athens."}, {"front": "Name some major Roman provincial cities where Paul planted churches, often along main communication routes.", "back": "Philippi, Thessalonica, Corinth, and Ephesus."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
