<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental questions, foundational to Western civilization, did the ancient Greeks explore?", "back": "The ancient Greeks explored questions such as: Who should govern? What is justice? What makes a hero? What does a man owe his city—and what does his city owe him? The habit of asking these questions became the foundation of Western civilization."}, {"front": "Define the Mycenaean civilization.", "back": "The Mycenaean civilization (c. 1600–1100 BC) was the dominant Bronze Age Greek culture, centered at Mycenae. They were skilled warriors and traders, built massive stone fortresses, traded across the eastern Mediterranean, and used a writing system called Linear B."}, {"front": "What was the Bronze Age Collapse, and when did it occur?", "back": "The Bronze Age Collapse was a period around 1200 BC when the Mycenaean world and other major civilizations in the eastern Mediterranean collapsed almost simultaneously. Palaces burned, trade networks dissolved, writing was forgotten, and populations shrank. Its causes are debated but include invasion by 'Sea Peoples,' climate change, or internal rebellions."}, {"front": "What was the Greek Dark Age, and what characterized it?", "back": "The Greek Dark Age (c. 1100–800 BC) was a three-century period following the Bronze Age Collapse. It was characterized by reduced population, lost literacy, and fragmented communities."}, {"front": "Define 'polis' and list its key characteristics.", "back": "A polis was a self-governing Greek city-state, not just a city. It consisted of an urban center (often with an acropolis) and its surrounding farmland/villages. Each polis had its own laws, army, coins, and often a patron deity, functioning as an independent political and social unit."}, {"front": "Why did the Greek world develop independent city-states (poleis) rather than a single unified nation?", "back": "Greece's intensely mountainous geography, with deep valleys and rocky ridges, naturally separated communities. The Aegean Sea, dotted with islands, also supported independent communities. These geographic barriers made communication difficult and unity unlikely, fostering distinct local identities."}, {"front": "Name two of the most powerful and influential Greek city-states that emerged by the 8th century BC.", "back": "Athens and Sparta."}, {"front": "Describe the key characteristics and values of ancient Athens.", "back": "Athens was a city of commerce, culture, and eventually democracy. It thrived on sea trade due to its natural harbor, and its citizens valued education, debate, and the arts. Public life centered on the agora, where citizens engaged in trade, philosophy, and civic participation."}, {"front": "Describe the key characteristics and values of ancient Sparta.", "back": "Sparta was a military state located inland. It maintained its power by conquering neighbors and enslaving them as helots, who significantly outnumbered Spartan citizens. Spartan society emphasized discipline, courage, and military training from a young age (the agoge), with the ideal citizen being a fearless soldier."}, {"front": "Explain the purpose and key features of the Spartan 'agoge.'", "back": "The agoge was Sparta's state education and training system for boys, starting at age seven. Boys were removed from their families, placed in groups, deliberately underfed to encourage resourcefulness, taught to endure hardship, and drilled in combat. Completion of the agoge was required for full Spartan citizenship."}, {"front": "How did Sparta's emphasis on disciplined citizen-soldiers influence later civilizations, specifically Rome?", "back": "Sparta's ideal of disciplined citizen-soldiers fighting in formation had a long legacy. Centuries later, the Romans adopted and adapted this core idea, believing that a city's own citizens, trained from youth, made the most formidable army, a principle seen in their legions."}, {"front": "What was the significance of Draco's law code in Athens, and what was its main characteristic?", "back": "Draco's law code, established in 621 BC, was Athens' first written law code. Its significance was making the rules public, moving away from unwritten customs interpreted by the powerful. However, its main characteristic was its legendary harshness, with almost every offense punishable by death (giving us the word 'draconian')."}, {"front": "What were Solon's major reforms in Athens, and why were they significant?", "back": "In 594 BC, Solon canceled all debt slavery, freed those enslaved for debt, and reorganized Athenian society into four classes based on wealth rather than birth. His reforms were significant because they addressed social inequality, allowed merchants to participate in government, and laid crucial groundwork for Athenian democracy."}, {"front": "Who was Cleisthenes, and what key democratic principles did he introduce in Athens?", "back": "Cleisthenes, in 508 BC, furthered Solon's reforms by creating the democratic institutions that would define Athenian democracy for two centuries. He introduced citizen assemblies, the random selection of officials, and the principle of isonomia (equality before the law)."}, {"front": "Describe the general nature of ancient Greek religion.", "back": "Ancient Greek religion involved worshipping a pantheon of deities (like Zeus, Hera, Athena) who were powerful, often jealous, and deeply involved in human affairs. The religion focused on maintaining the gods' favor through sacrifice, ritual, and proper observance, rather than primarily on morality."}, {"front": "What was the significance of the Olympic Games in ancient Greece?", "back": "The Olympic Games, founded in 776 BC and held every four years at Olympia in honor of Zeus, were a major expression of shared Greek identity. They famously involved the suspension of all warfare between city-states and celebrated athletic prowess, awarding an olive wreath and eternal fame (kleos) to victors."}, {"front": "What does the suspension of warfare during the Olympic Games reveal about ancient Greek values?", "back": "The suspension of warfare during the Olympic Games reveals the profound power of shared religious and cultural identity among the otherwise independent Greek city-states. It suggests that respect for common gods and the pursuit of athletic glory were values that could temporarily transcend intense political rivalries."}, {"front": "Who was Thales of Miletus, and what was his revolutionary contribution to thought?", "back": "Thales of Miletus, around 585 BC, was the first recorded philosopher who attempted to explain natural phenomena (like the flooding of the Nile or solar eclipses) without appealing to the gods. He proposed that water was the fundamental substance of reality, initiating a quest for rational explanations."}, {"front": "What fundamental shift in thinking did Thales's approach initiate?", "back": "Thales's approach initiated the tradition of natural philosophy, marking a fundamental shift from mythical or divine explanations to seeking rational, observable principles for how the world works. This method of public argument and testing ideas became the foundation for what would eventually develop into science and philosophy."}, {"front": "How did early Greek philosophers like Pythagoras build upon Thales's innovative approach?", "back": "Building on Thales's method of seeking rational explanations for nature, later thinkers extended his ideas by proposing other fundamental principles (like air, fire, or number). Pythagoras, slightly later, argued that mathematical relationships governed the cosmos, further developing the idea that nature operates by regular and discoverable principles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
