<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental questions did the ancient Greeks ask that became the foundation of Western civilization?", "back": "Who should govern? What is justice? What makes a hero? What does a man owe his city—and what does his city owe him? (And the habit of asking these questions)."}, {"front": "Describe the nature of the Greek coastline and its relationship with the sea.", "back": "The coastline fractures into peninsulas, gulfs, and harbors, and continues as hundreds of islands; for the ancient Greeks, the sea was not a barrier but a highway."}, {"front": "How was the Aegean Sea an \"organizing principle\" of Greek civilization?", "back": "It was a connective tissue that linked Greek communities, facilitating trade, travel, and the spread of cultural exchange (e.g., olive oil, pottery, philosophers, art styles, religious practices) across the region."}, {"front": "Compare the efficiency of sea travel versus overland travel through the mountains in ancient Greece.", "back": "Sailing from Athens to Ephesus took days, while traveling the same distance overland through the mountains would take weeks, demonstrating the sea's crucial role as a faster highway."}, {"front": "What was Sparta's unique geographic characteristic compared to other major Greek city-states, and how did it influence its development?", "back": "Sparta was famously landlocked, unlike most coastal city-states. This meant it built its power on land through agriculture and military conquest, rather than relying on sea trade."}, {"front": "How did the mountainous Greek geography directly cause political fragmentation?", "back": "Mountains separated fertile valleys, making overland travel difficult and unity unlikely. This led to the development of hundreds of independent *poleis* (city-states), each fiercely proud of its own identity."}, {"front": "List four ways geography contributed to the creation of independent Greek city-states.", "back": "1) Mountains separated valleys. 2) The coastline gave each community access to sea trade. 3) Small arable areas limited the size of any single community's agricultural base. 4) Islands could each support an independent community."}, {"front": "Explain the geographic reason why Greece developed numerous independent city-states while Egypt formed one unified kingdom.", "back": "Greece's mountains fragmented the population into isolated pockets that no single ruler could easily unite, whereas Egypt's Nile valley funneled people into a long, narrow strip of fertile land easily controlled by a single ruler."}, {"front": "Define the \"acropolis\" in a Greek city-state and state its primary functions.", "back": "The acropolis (from 'akra' = high + 'polis' = city) was a defensible hilltop that served as a citadel, a last-resort fortress, and often the location of the city's most important temple (e.g., the Parthenon in Athens)."}, {"front": "What was the \"agora\" in a Greek city-state, and what activities took place there?", "back": "The agora was the city's open marketplace and civic center, located at the foot of the acropolis. It was where merchants sold goods, citizens gathered to vote, philosophers argued, and courts met—the heart of public life."}, {"front": "What was the economic importance of a \"harbor\" (limen) for coastal Greek city-states?", "back": "For coastal cities, the harbor was the economic lifeline, facilitating sea trade and the exchange of goods with other regions, such as Athens' port at Piraeus, which connected it to the wider Mediterranean."}, {"front": "Why did Greek city-states rely heavily on trade despite being agricultural societies?", "back": "Greece had limited arable land (only about 20% suitable for farming) and could not grow enough food to feed its growing population. This drove them to produce specialized goods for trade to acquire necessary food."}, {"front": "Name three major Greek exports and briefly explain their significance or characteristics.", "back": "1) Olive oil: used for cooking, lighting, cleaning, and perfume; preserved well in amphorae. 2) Wine: widely exported, diluted before drinking. 3) Pottery: beautiful and functional, used to hold oil/wine, often decorated with mythological scenes, making it a luxury good."}, {"front": "Name three major Greek imports and their primary sources.", "back": "1) Grain: primarily from the Black Sea colonies (e.g., Crimea), vital for Athenian democracy. 2) Timber: for shipbuilding, from Macedonia and the Black Sea region. 3) Metals: silver (from Laurium), gold, copper, and tin for bronze, traded across the Mediterranean."}, {"front": "What was the primary reason for Greek colonization in the 8th and 7th centuries BC?", "back": "As the population of Greek city-states grew, many cities faced a familiar problem: not enough farmland to feed their increasing number of citizens."}, {"front": "How did a \"mother city\" (metropolis) maintain ties with its new colonies?", "back": "A group of citizens would set out and found a new city, but they would maintain cultural and religious ties to their original 'mother city' (metropolis)."}, {"front": "By 500 BC, what was the geographic extent of Greek colonization?", "back": "Greek colonies stretched from the coasts of modern Spain and France in the west, along the northern shore of Africa, around the Black Sea coast, and down the Anatolian coast in the north and east."}, {"front": "List three significant impacts of Greek colonial expansion.", "back": "1) Spread Greek language, religion, and culture across an enormous area. 2) Brought Greeks into contact with diverse peoples (e.g., Carthaginians, Celts, Scythians). 3) Facilitated the rapid spread of Greek ideas (philosophy, democracy, science) across the Mediterranean."}, {"front": "Why was Byzantium strategically important among Greek colonies?", "back": "Byzantium commanded the straits between the Aegean and Black Sea, making it crucial for controlling the vital grain trade routes from the Black Sea regions, a key resource for Athens."}, {"front": "How did the \"empire\" built by the Greeks differ from traditional empires with capital cities and armies of occupation?", "back": "The Greeks did not build a unified empire with a capital and army. Instead, they created a network of independent, like-minded communities, each independent but sharing a common language, religious practices, and cultural identity."}, {"front": "Explain how Greek trade served as a \"driver of cultural exchange.\"", "back": "Greek merchants brought not only goods (like pottery or olive oil) but also myths, styles of dress, tastes in wine, and ideas about the gods and philosophy, exposing other cultures to Athenian values and spreading Greek culture."}, {"front": "What does the text suggest about the durability of the Greek cultural network compared to a traditional empire?", "back": "This network proved more durable than any empire; even when political independence was lost (to Macedonia, then Rome), Greek language and culture survived as the cultural medium of the entire eastern Mediterranean for another thousand years."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
