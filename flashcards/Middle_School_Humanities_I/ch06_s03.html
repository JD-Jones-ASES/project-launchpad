<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What common misconception exists about the \"fall\" of the Western Roman Empire?", "back": "The fall was not a single event but the final act of a slow decline that had been building for over two centuries, with seeds planted long before 376 AD."}, {"front": "What major crisis afflicted the Roman Empire between AD 235 and 284?", "back": "The Crisis of the Third Century, characterized by over fifty emperors (most murdered), civil war, constant frontier pressure, trade collapse, and widespread currency debasement."}, {"front": "Define \"currency debasement\" in the context of the Roman Empire.", "back": "When the government reduces the precious metal content (e.g., silver) of its coins while keeping their face value. Roman emperors did this to pay soldiers and officials when tax revenues fell short."}, {"front": "What were the main consequences of widespread currency debasement in the Roman Empire?", "back": "Inflation (merchants raised prices to compensate for less silver per coin), steep price rises, weakening of the money economy, and a loss of trust in the monetary system."}, {"front": "How did Emperor Diocletian attempt to stabilize the Roman Empire after the Crisis of the Third Century?", "back": "He doubled the army, reorganized provincial administration, and divided the Empire into two administrative halves (East and West), each ruled by a senior emperor (Augustus) and a junior emperor (Caesar) – the Tetrarchy."}, {"front": "Explain the concept of the \"Tetrarchy\" as established by Diocletian.", "back": "A system of \"rule of four\" where the Roman Empire was governed by two Augusti (senior emperors) and two Caesars (junior emperors), intended to ensure smoother succession and more effective administration of the divided empire."}, {"front": "What were the key differences between the Eastern and Western halves of the Roman Empire that contributed to their divergent fates?", "back": "The East was more densely populated, urbanized, economically productive, and had a nearly impregnable capital (Constantinople). The West was less urbanized, had a longer and more exposed frontier, and was more vulnerable to barbarian incursions."}, {"front": "How did the meaning of the term \"barbarian\" evolve by the time of Rome's fall?", "back": "Originally a Greek term for non-Greek speakers, by Rome's fall it referred to Germanic peoples who had long interacted with Rome, served in its armies, and sometimes converted to Christianity, making them complex neighbors rather than primitive 'savages'."}, {"front": "What new force arrived in the 370s AD that significantly impacted Rome's frontiers?", "back": "The Huns, horse-warriors from Central Asia, whose westward sweep across the Eurasian steppes drove Germanic peoples into panic and towards Roman territory."}, {"front": "Why did the Visigoths seek refuge within Roman territory in AD 376?", "back": "They were a Germanic people fleeing the terrifying advance of the Huns and begged Emperor Valens to let them cross the Danube River and settle within Roman territory."}, {"front": "What immediate cause led to the Visigothic revolt against the Roman Empire after they were granted refuge?", "back": "Corrupt and indifferent Roman administrators exploited them, failing to provide promised grain and fair treatment. Instead, they sold them dog-meat at extortionate prices and demanded their children as slaves."}, {"front": "What was the significance of the Battle of Adrianople in AD 378?", "back": "The Visigoths decisively defeated the Roman field army, killing Emperor Valens and destroying two-thirds of the army. It was Rome's worst military defeat since Cannae and signaled that the frontier had cracked."}, {"front": "Define \"foederati\" in the context of the late Roman Empire.", "back": "Latin for \"allies,\" these were Germanic groups settled inside the Roman Empire under treaty agreements, providing soldiers for the Roman army in exchange for land and payment."}, {"front": "Who was Alaric, and what was his primary demand from the Western Roman government?", "back": "A Visigothic leader who had served as a Roman military officer. He repeatedly demanded land, official recognition, and a senior Roman command for himself and his people."}, {"front": "What symbolic event occurred in AD 410, and what was its psychological impact?", "back": "Alaric and his Visigothic forces sacked Rome. It was the first time in 800 years the city had fallen to an enemy, causing immense psychological shock across the Mediterranean world, leading Augustine to write *The City of God*."}, {"front": "Who was Attila the Hun, and what formidable title was often associated with him?", "back": "Attila was the powerful leader who united the Hunnic tribes into the most feared military force of his age (AD 434–453). He was widely known as 'The Scourge of God'."}, {"front": "What was the significance of the Battle of the Catalaunian Plains in AD 451?", "back": "A combined Roman and Visigothic army under the Roman general Aetius fought Attila the Hun to a standstill in modern France, marking the last great Roman military victory in the West."}, {"front": "Who famously persuaded Attila the Hun to turn back from invading Rome in AD 452?", "back": "Pope Leo I, alone among the great figures of the late West with genuine moral authority, rode out to meet Attila at the Mincio River and persuaded him to withdraw."}, {"front": "Which Germanic group sacked Rome a second time in AD 455, and what made this sack particularly destructive?", "back": "The Vandals, who had seized Carthage in North Africa. Their sack was more thorough than Alaric's, as they stripped valuable materials like the gilded roof tiles from Capitoline temples."}, {"front": "Who was the last Western Roman Emperor, and what was symbolic about his name?", "back": "Romulus Augustulus, deposed in AD 476. His name was symbolic: Romulus (the city's legendary founder) combined with Augustulus (the diminutive of Augustus, meaning 'little Augustus')."}, {"front": "What event is traditionally considered the end of the Western Roman Empire in AD 476?", "back": "The Germanic chieftain Flavius Odoacer led a mutiny, killed the Roman general Orestes (Romulus Augustulus' father), deposed the boy emperor, and sent the imperial regalia to Constantinople, signaling the West no longer needed a separate emperor."}, {"front": "According to modern historians, what were some of the key interacting causes of the Fall of the Western Roman Empire?", "back": "Military overstretching, economic decline, currency debasement, the third-century crisis, devastating plagues (Antonine, Cyprian), administrative corruption, loss of political legitimacy, and barbarian incursions."}, {"front": "What major difference in fate existed between the Western and Eastern Roman Empires after the 5th century AD?", "back": "The Western Empire fragmented and 'fell' in AD 476, while the Eastern Roman Empire (which historians call the Byzantine Empire) continued to flourish for another thousand years."}, {"front": "How did the historical figures Cicero and Augustine offer contrasting perspectives on Roman virtue, as presented in the text?", "back": "Cicero defined a republic by 'an agreement with respect to justice,' while Augustine devastatingly questioned if Rome ever truly met that standard, suggesting Roman virtue might have been a form of collective pride."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
