<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How is the 'fall' of the Roman Empire best described?", "back": "It was not a single dramatic moment, but a slow process of collapse, particularly of the Western imperial administration, army, and tax base.", "id": "fc01"}, {"front": "What key aspects of Roman civilization endured in Western Europe around AD 500 despite the collapse of imperial administration?", "back": "Roman roads, Latin (as language of Church and scholarship), adapted Roman law in Germanic kingdoms, and the bishop of Rome as a stable institution.", "id": "fc02"}, {"front": "What was the most consequential change for ordinary people's lives during the fall of Rome?", "back": "The collapse of trade and Roman economic integration.", "id": "fc03"}, {"front": "What archaeological evidence supports the claim of trade collapse in Western Europe between AD 400 and 600?", "back": "A dramatic decline in the variety and quantity of goods available to ordinary people.", "id": "fc04"}, {"front": "How did the Eastern Roman (Byzantine) Empire differ from the Western Empire in AD 476?", "back": "The Eastern Empire, with its capital at Constantinople, remained intact, was larger and wealthier, and included key regions like Egypt (the 'breadbasket').", "id": "fc05"}, {"front": "For whom was the 'Roman Empire' still very much alive in AD 500?", "back": "Someone living in Constantinople, Alexandria, or Antioch (cities within the Eastern Roman Empire).", "id": "fc06"}, {"front": "Until what year did the Eastern Roman (Byzantine) Empire continue to exist?", "back": "AD 1453, when it fell to the Ottoman Turks.", "id": "fc07"}, {"front": "What is the key question to ask when studying the fall of Rome, to avoid fatalism?", "back": "'What was worth preserving, and who preserved it?'", "id": "fc08"}, {"front": "What institution is credited with preserving civilization through the collapse of the Western Empire?", "back": "The monastery.", "id": "fc09"}, {"front": "Who was St. Benedict of Nursia and what was his key contribution?", "back": "He was an Italian Christian saint (c. AD 480–547) who founded Monte Cassino and wrote the 'Rule of Saint Benedict,' which became the standard for Western monasticism.", "id": "fc10"}, {"front": "What is the motto of the Benedictine Order?", "back": "Ora et labora ('pray and work').", "id": "fc11"}, {"front": "Define 'scriptorium' and explain its significance during the fall of Rome.", "back": "A scriptorium was the room in a monastery dedicated to copying manuscripts. Monks' work in scriptoria preserved classical antiquity and Christian theology, vital texts that would otherwise have been lost.", "id": "fc12"}, {"front": "Name two types of texts that survived the fall of Rome specifically due to the patient labor of monks in scriptoria.", "back": "Classical authors like Homer, Plato, Cicero, Livy, and Christian texts like the Psalms of David and the letters of Paul.", "id": "fc13"}, {"front": "How did the Germanic kingdoms that replaced Roman rule contribute to the 'transformation' of Western Europe rather than just destruction?", "back": "They often used Roman administrative structures, kept Latin as an official language, retained Roman bishops, and formed partnerships with the Roman Church.", "id": "fc14"}, {"front": "What was the significance of the Frankish king Clovis's conversion to orthodox Christianity around AD 496?", "back": "It created the first of many partnerships between a powerful Germanic kingdom and the Roman Church, laying foundations for future empires like Charlemagne's.", "id": "fc15"}, {"front": "Describe the core principles of the 'Rule of Saint Benedict.'", "back": "It was a practical guide prescribing a daily schedule of communal prayer, manual labor, and *lectio divina*, balancing asceticism and comfort to make holiness sustainable for decades.", "id": "fc16"}, {"front": "What does *conversatio morum* mean in the context of the Benedictine Rule?", "back": "It refers to the monk's commitment to 'ongoing conversion of life,' emphasizing continuous spiritual growth and transformation.", "id": "fc17"}, {"front": "What three factors allowed monasteries to succeed as 'arks' of civilization in preserving knowledge?", "back": "1. A community committed to staying in one place (*stabilitas*), 2. A daily practice of reading and copying texts, and 3. Economic self-sufficiency through farming.", "id": "fc18"}, {"front": "How did the Ostrogoths under Theodoric demonstrate a preservation of Roman structures?", "back": "They maintained Roman administrative structures in Italy.", "id": "fc19"}, {"front": "What later role did the Visigoths play in Western Europe, despite their earlier sacking of Rome?", "back": "They became the main barrier preventing Islamic expansion into western Europe (before their defeat at the Battle of Guadalete in AD 711).", "id": "fc20"}, {"front": "What broader lesson about economic prosperity can be drawn from the collapse of Roman trade routes?", "back": "Economic prosperity depends on political order and stable institutions; when institutions collapse, economies often collapse with them.", "id": "fc21"}, {"front": "Why is it crucial to use the term 'Fall of Rome' with caution?", "back": "Because it primarily describes the Western Empire and excludes the Eastern (Byzantine) Empire, which continued to flourish for nearly a thousand years and preserved Greek learning, Roman law, and Christian theology.", "id": "fc22"}, {"front": "How did the Byzantine Empire contribute to Western Europe's recovery during the Renaissance?", "back": "Much of what Western Europe recovered during the Renaissance came through contact with Byzantine scholarship, which had preserved classical knowledge.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
