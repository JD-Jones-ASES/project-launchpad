<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Mycenaean civilization?", "back": "A dominant Bronze Age Greek culture (c. 1600–1100 BC) centered at Mycenae, known for its warrior culture, massive fortresses, trade, and the Linear B writing system."}, {"front": "What was the approximate time period of the Mycenaean civilization?", "back": "Approximately 1600–1100 BC."}, {"front": "What significant event occurred around 1200 BC that led to the Greek Dark Age?", "back": "The Bronze Age Collapse, a widespread catastrophe that saw the simultaneous collapse of major civilizations across the eastern Mediterranean, including the Mycenaean world."}, {"front": "What were some of the debated causes of the Bronze Age Collapse?", "back": "Invasion by mysterious 'Sea Peoples,' climate change, internal rebellions, or a combination of these factors."}, {"front": "What was the duration and characteristic of the Greek Dark Age?", "back": "Lasting from roughly 1100 to 800 BC (three centuries), it was characterized by reduced population, lost literacy (including Linear B), and fragmented communities."}, {"front": "Define 'polis' in the context of ancient Greece.", "back": "A self-governing Greek city-state, consisting of an urban center (often with an acropolis) and its surrounding farmland and villages, with its own laws, army, coins, and patron deity."}, {"front": "How did geography influence the development of independent city-states (poleis) in ancient Greece?", "back": "The intensely mountainous Greek peninsula and the numerous islands of the Aegean Sea created natural barriers, making communication and political unity difficult, thus fostering independent local identities."}, {"front": "What were the two most powerful and influential city-states in ancient Greece by the eighth century BC?", "back": "Athens and Sparta."}, {"front": "Contrast the primary values and economic bases of Athens and Sparta.", "back": "Athens valued commerce, culture, education, debate, and democracy, thriving on sea trade. Sparta was a military state, valuing discipline, obedience, and the fearless soldier, with its economy based on conquering neighbors and relying on enslaved labor (helots)."}, {"front": "What was the 'agoge' in Spartan society?", "back": "Sparta's state education and training system for boys, starting at age seven, which focused on physical endurance, resourcefulness, and combat skills, and was required for full citizenship."}, {"front": "How did the existence of helots shape Spartan society and military focus?", "back": "The large enslaved helot population (outnumbering citizens 7:1) kept Sparta permanently on a military footing, requiring constant vigilance and a highly disciplined citizen-soldier army to maintain control."}, {"front": "What was the purpose and impact of Draco's law code in Athens?", "back": "Issued in 621 BC, it was Athens' first written law code, making laws public. However, it was famously harsh, with almost every offense punishable by death, earning the term 'draconian.'"}, {"front": "What major reforms did Solon introduce in Athens, and what was their significance?", "back": "In 594 BC, Solon canceled all debt slavery, freed debt slaves, and reorganized society based on wealth rather than birth. These reforms laid crucial groundwork for Athenian democracy."}, {"front": "What was the role of Cleisthenes in the development of Athenian democracy?", "back": "In 508 BC, Cleisthenes pushed reforms further, establishing key democratic institutions like citizen assemblies, random selection of officials, and the principle of isonomia (equality before the law), defining Athenian democracy for centuries."}, {"front": "How did ancient Greek religion differ from a modern moralistic religion?", "back": "Greek religion was not primarily about morality (gods often behaved badly) but about maintaining the favor of powerful, jealous deities through sacrifice, ritual, and proper observance."}, {"front": "What was the significance of the Olympic Games in ancient Greece?", "back": "Founded in 776 BC and held every four years to honor Zeus, they were a powerful expression of shared Greek identity, fostering peace (warfare suspended) and emphasizing individual glory (kleos)."}, {"front": "What does the suspension of warfare during the Olympic Games reveal about ancient Greek shared culture?", "back": "It demonstrates the immense power of a shared religious and cultural identity that could transcend the fierce independence and frequent conflicts between city-states, unifying them under a common purpose."}, {"front": "Who was Thales of Miletus, and why is he considered the 'first philosopher'?", "back": "Around 585 BC, Thales was the first known individual to attempt to explain natural phenomena (like solar eclipses or Nile floods) using rational principles (e.g., water as the fundamental substance) rather than appealing to gods."}, {"front": "What was the fundamental shift in thinking that Thales introduced, leading to the 'Greek Intellectual Revolution'?", "back": "He introduced the method of 'natural philosophy,' assuming the world has a rational structure that human reason can discover through observation and argument, without relying on mythology."}, {"front": "How did Athens and Sparta differ in their approach to education and civic life for their citizens?", "back": "Athens emphasized education, debate, and the arts, preparing citizens for active participation in a democratic agora. Sparta focused on rigorous military training (agoge) from a young age, preparing citizens to be disciplined soldiers for their military state."}, {"front": "What was 'Linear B' and what happened to it during the Bronze Age Collapse?", "back": "Linear B was the writing system used by the Mycenaean civilization. It was entirely lost and forgotten during the Bronze Age Collapse."}, {"front": "What is an 'acropolis' and what was its typical role within a polis?", "back": "An acropolis was a fortified hilltop, often serving as the urban center or citadel around which a Greek polis was built, providing defense and housing important religious or civic buildings."}, {"front": "Who were the 'helots' in Spartan society?", "back": "Helots were the enslaved population in Sparta, forced into state slavery after their lands were conquered, significantly outnumbering Spartan citizens."}, {"front": "What does the English word 'draconian' signify, and how does it relate to Athenian lawgivers?", "back": "'Draconian' means excessively harsh or severe, stemming from Draco's law code in Athens (621 BC), which was notorious for prescribing death as punishment for most offenses."}, {"front": "What was 'isonomia,' and which Athenian reformer is associated with its establishment?", "back": "Isonomia means 'equality before the law,' a key principle of Athenian democracy, which was established and furthered by Cleisthenes' reforms in 508 BC."}, {"front": "What was 'kleos' to the ancient Greeks, and how was it achieved through events like the Olympic Games?", "back": "'Kleos' referred to a man's immortal glory or fame. It was achieved through heroic deeds, athletic victories (like an olive wreath at the Olympics), or contributions to the city, ensuring one's name lived on."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
