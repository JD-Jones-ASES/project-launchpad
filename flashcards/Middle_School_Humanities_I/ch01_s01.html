<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What role did the Aegean Sea play in ancient Greek civilization?", "back": "The Aegean Sea was not a barrier but a 'highway' and the 'organizing principle' of Greek civilization, connecting communities and facilitating widespread trade, travel, and cultural exchange."}, {"front": "How did the mountainous geography of mainland Greece influence its political organization?", "back": "The rugged mountains made overland travel difficult, isolating communities in fertile valleys and coastal plains. This led to the political fragmentation of Greece into hundreds of independent city-states (poleis), rather than a unified nation."}, {"front": "Name three geographical factors that contributed to the formation of independent Greek city-states.", "back": "Mountains separated valleys, making unity unlikely; the coastline gave each community access to sea trade without depending on neighbors; small arable areas limited the size of agricultural bases, keeping communities small; and numerous islands could each support independent communities."}, {"front": "What was the Acropolis in a Greek city-state?", "back": "A defensible hilltop (from 'akra' = high + 'polis' = city) that served as the citadel, a last-resort fortress, and often the location of the city's most important temple, such as the Parthenon in Athens."}, {"front": "Describe the function of the Agora in ancient Greek cities.", "back": "The agora was the city's open marketplace and civic center, located at the foot of the acropolis. It was where merchants sold goods, citizens gathered to vote, philosophers debated, and courts met, making it the hub of public life."}, {"front": "Why was a harbor (limēn) economically crucial for many Greek city-states?", "back": "For coastal cities, the harbor was the economic lifeline, facilitating extensive sea trade for both essential imports (like grain) and valuable exports (like olive oil and pottery). Athens' port at Piraeus is a prime example."}, {"front": "Why did ancient Greek city-states rely heavily on sea trade for food, especially grain?", "back": "Only about 20% of the Greek peninsula's land was arable, meaning it could not grow enough food to feed its growing population. This scarcity drove commerce, particularly the import of grain from Black Sea colonies."}, {"front": "Name three key goods that ancient Greek city-states exported.", "back": "Olive oil (used for cooking, lighting, cleaning, perfume), wine (suited to the Greek climate, exported diluted), and pottery (beautiful, functional, and often decorated with mythological scenes)."}, {"front": "What were the primary imports for Greek city-states, and where did they typically originate?", "back": "Grain (from Black Sea colonies, especially around Crimea), timber (from Macedonia and the Black Sea region for shipbuilding), and metals (like silver from Laurium, gold, copper, and tin from across the Mediterranean)."}, {"front": "What was the main reason for Greek colonization during the 8th and 7th centuries BC?", "back": "As the population of Greek city-states grew, many faced a problem of not enough farmland to feed their citizens. Colonization provided new settlements abroad to alleviate this pressure."}, {"front": "What term refers to the 'mother city' from which a new Greek colony was founded?", "back": "Metropolis."}, {"front": "Provide two examples of significant Greek colonies outside the Greek mainland and Aegean.", "back": "Massalia (modern Marseille, France) and Byzantium (modern Istanbul, Turkey). Other examples include Neapolis (modern Naples, Italy) and Olbia/Panticapaeum (modern Ukraine/Crimea)."}, {"front": "How did Greek colonial expansion impact the spread of Greek culture and ideas?", "back": "It spread Greek language, religion, and culture across an enormous area, bringing Greeks into contact with diverse peoples. This facilitated the rapid dissemination of ideas like philosophy, democracy, and science across the Mediterranean world."}, {"front": "Explain the concept of 'Trade as a Driver of Cultural Exchange' in ancient Greece.", "back": "Beyond economic transactions, Greek trade carried cultural elements. Merchants spread myths, art styles, religious practices, and philosophical ideas along with goods like pottery and olive oil, making commerce and culture inseparable."}, {"front": "Where and approximately when were the first coins minted, and how quickly did the idea spread to the Greek world?", "back": "The first coins appear to have been minted in the kingdom of Lydia (western Asia Minor) around 600 BC, and the idea spread to the Greek world almost immediately."}, {"front": "What was the Athenian drachma, and what made it significant?", "back": "The drachma was Athens' famous silver coin, bearing the image of the goddess Athena and her sacred owl. Mined from Laurium, these coins were widely trusted and circulated, becoming a de facto international currency across the Mediterranean."}, {"front": "How did Sparta's geographical location differ from most other major Greek city-states, and what was the consequence?", "back": "Sparta was notably landlocked in the southern Peloponnese, without direct access to the sea. This meant it had to build its power on land, relying on agriculture and military conquest, rather than on sea trade like coastal city-states."}, {"front": "How did the political structure of ancient Greece compare to that of unified empires like Egypt or Persia, and why?", "back": "Greece produced hundreds of independent city-states due to its fragmented mountainous geography, which made central control difficult. In contrast, Egypt's Nile valley funneled people into a single strip of fertile land, allowing for a unified kingdom under one ruler."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
