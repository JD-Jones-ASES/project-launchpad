<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was a primary economic factor that led to the collapse of the Roman Republic?", "back": "Wealth from conquest flowed mostly to the rich, who bought enormous tracts of land worked by slaves, displacing small independent farmers."}, {"front": "How did the displacement of small farmers weaken the Roman Republic?", "back": "These farmers were the backbone of the Roman legions. When they lost their land, Rome lost citizen-soldiers who no longer had personal stakes in fighting for the Republic, but instead became loyal to generals promising pay and plunder."}, {"front": "Who were the Gracchi brothers, and what was their main political goal?", "back": "Tiberius and Gaius Gracchus were tribunes of the plebs who attempted to address Rome's structural problems. Tiberius aimed to redistribute public land to the landless poor, and Gaius extended reforms to include subsidized grain, road-building, and extended citizenship."}, {"front": "Define 'Tribune of the Plebs' and describe their key powers.", "back": "An elected office created in the early Republic to protect ordinary citizens (plebeians) from patrician abuses. Tribunes had the power of veto ('I forbid') and their persons were sacrosanct (legally untouchable)."}, {"front": "What was the significance of Tiberius Gracchus's murder in 133 BC?", "back": "He was the first tribune murdered in office in Roman history, signaling a breakdown in the Republic's commitment to resolving political disputes through argument and law, leading to a shift towards force."}, {"front": "What lasting impact did the Gracchi brothers' attempts at reform have on Roman politics?", "back": "They represented the Republic's last serious attempt to fix its structural problems constitutionally. After them, both reformers and conservatives increasingly resorted to force rather than legal or political argument."}, {"front": "What fateful decision did Gaius Marius make regarding army recruitment, and why?", "back": "Facing a military crisis, Marius opened the army to landless volunteers. This solved the immediate need for more soldiers but created a long-term problem of soldiers' loyalty shifting from the state to their general."}, {"front": "Explain why Marius's army reforms ultimately undermined the Roman Republic.", "back": "Marius created an army of landless men whose entire livelihood depended on their general (pay, equipment, land grants, plunder). Their loyalty was to him, not to the Senate or the Republic, making them willing to follow their general against the state itself."}, {"front": "Who was Lucius Cornelius Sulla, and what unprecedented action did he take in 88 BC?", "back": "Sulla was a Roman general who, when stripped of his command by political enemies, marched his legions on Rome itself—the first time in Roman history a general had attacked the city."}, {"front": "Define 'proscription' as a political tool in the Roman Republic.", "back": "A public list of 'enemies of the state' posted in the Forum, whose lives were forfeit. Anyone could kill a proscribed person for a reward, and their property was confiscated. Sulla introduced it as a political weapon."}, {"front": "What was the First Triumvirate, and who were its three members?", "back": "An informal, private agreement formed in 60 BC among Julius Caesar, Pompey the Great, and Marcus Licinius Crassus to divide power among themselves and cut the Senate out of major decisions."}, {"front": "How did Julius Caesar's campaigns in Gaul strengthen his position and alarm the Senate?", "back": "The campaigns made him fabulously wealthy, secured the fanatical loyalty of his troops, and provided a platform for him to write his own propaganda ('Commentarii de Bello Gallico'), significantly increasing his power and influence, which deeply alarmed the Senate."}, {"front": "What was the Rubicon, and what did Caesar's crossing of it signify?", "back": "The Rubicon was a small river marking the legal boundary between Caesar's province and Roman Italy. Crossing it with his army in 49 BC was an act of war against the state, signifying an irreversible decision or 'point of no return' that plunged Rome into civil war."}, {"front": "List some of the extraordinary powers and honors Julius Caesar accumulated after his civil war victory.", "back": "He became consul, dictator, pontifex maximus (head of state religion), and eventually dictator perpetuo (dictator for life). He also adopted symbols of royalty, such as purple attire, and had the month Quintilis renamed Julius (July)."}, {"front": "What were some of the genuinely popular or beneficial policies implemented by Julius Caesar?", "back": "He extended Roman citizenship to provincials, reduced debt slavery, reformed the chaotic Roman calendar (the Julian calendar), colonized landless veterans, and reduced the Senate's corruption in the provinces."}, {"front": "What was the Ides of March, and what was its immediate outcome?", "back": "March 15, 44 BC, the date Julius Caesar was assassinated by senators (led by Brutus and Cassius) who hoped to restore the Republic. Instead, the city erupted, Mark Antony rallied public opinion against the conspirators, and fifteen more years of civil war followed."}, {"front": "Who formed the Second Triumvirate, and what was its defining characteristic?", "back": "A formal, legally recognized alliance formed after Caesar's death between Octavian (Caesar's adopted heir), Mark Antony, and Lepidus. It was defined by its rule through terror, including the widespread use of proscription lists against its enemies."}, {"front": "What was the fate of Cicero, Rome's greatest orator, under the Second Triumvirate?", "back": "Cicero, a staunch defender of the Republic, was proscribed by Mark Antony and executed in December 43 BC. His head and hands were displayed in the Forum as a warning."}, {"front": "How did the Second Triumvirate ultimately dissolve, leading to the final conflict of the Republic?", "back": "It disintegrated as Antony allied with Cleopatra VII in Egypt and consolidated power in the East, while Octavian consolidated power in the West. This led to their final confrontation at the Battle of Actium."}, {"front": "What was the Battle of Actium (31 BC) and its significance?", "back": "A decisive naval battle in which Octavian's fleet defeated the combined forces of Mark Antony and Cleopatra VII. This victory left Octavian unchallenged ruler of the Roman world, paving the way for the end of the Republic and the rise of the Empire."}, {"front": "What political challenge did Octavian face after his victory at Actium, and how did he initially approach it?", "back": "He held more power than any one person was supposed to have, but needed to avoid calling himself 'king' or 'dictator' due to Roman republican sensitivities. He began by incrementally accumulating powers like the tribunician power and proconsulship."}, {"front": "Compare the nature of the First Triumvirate to the Second Triumvirate.", "back": "The First Triumvirate (Caesar, Pompey, Crassus) was an informal, private agreement. The Second Triumvirate (Octavian, Antony, Lepidus) was a formal, legally recognized alliance that ruled with terror and proscription lists."}, {"front": "Explain the analytical point made by the text regarding historical figures like Julius Caesar.", "back": "The text cautions against simple hero/villain narratives. Caesar, though seen as a tyrant by some, implemented popular and beneficial policies, while his opponents were often self-interested aristocrats. The question of who was 'right' remains debated by historians."}, {"front": "Provide an example of a cause-and-effect relationship illustrating the collapse of the Republic, as described in the text.", "back": "Cause: Marius opened the army to landless volunteers. Effect: Soldiers' loyalty shifted from the state to their individual generals, leading generals like Sulla and Caesar to use their armies as political tools against the Republic, ultimately destroying it."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
