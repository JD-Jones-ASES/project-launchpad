<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the greatest technological innovation of the Romans, combined with their mastery of the arch?", "back": "Opus caementicium, or Roman concrete."}, {"front": "What unique ingredient did Roman concrete use, and what made it remarkable?", "back": "It used a volcanic ash called pozzolana, found near Pozzuoli. The chemical reaction created a material that hardened underwater and grew stronger with age."}, {"front": "How did the Roman arch fundamentally improve upon Greek post-and-lintel construction?", "back": "The arch transferred weight sideways into supporting columns through compression, allowing much larger spans. Post-and-lintel relied on a horizontal beam's tensile strength, which stone is weak in."}, {"front": "How did Roman engineering (arch and concrete) enable the scale of the Roman Empire, unlike Greek city-states?", "back": "It allowed for massive infrastructure like bridges, aqueducts, and large buildings (e.g., Pantheon, Colosseum), facilitating expansion, administration, and military power on an unprecedented scale."}, {"front": "Name three iconic Roman structures built using their mastery of the arch and concrete.", "back": "The Pantheon's coffered dome, the Colosseum, and hundreds of aqueducts."}, {"front": "Define an 'aqueduct' and describe its typical Roman operation.", "back": "An aqueduct is a channel or pipe system for carrying water, usually over long distances. Roman aqueducts typically ran on stone arches at a precise, gentle downhill gradient, allowing gravity to move water from mountain springs into cities."}, {"front": "What is the engineering significance of the Pantheon's dome, 1,900 years later?", "back": "It is still the largest unreinforced concrete dome in the world, showcasing the principle of compressive strength distributed through a curved form."}, {"front": "Explain why an arch is structurally stronger than a horizontal beam in stone construction.", "back": "In an arch, every stone is under compression (being squeezed by its neighbors), and stone is very strong in compression. A horizontal beam in post-and-lintel is under tension (being pulled apart in the middle), and stone is weak in tension."}, {"front": "Besides soldiers, what types of professionals were essential for maintaining the vast Roman Empire?", "back": "Engineers, surveyors, masons, accountants, and administrators in every province, integral to supporting the engineering and bureaucracy."}, {"front": "How did Roman conquest contribute to the Roman provincial economy?", "back": "Conquered peoples paid tribute, their land produced grain for Rome, and their skilled craftsmen and educated people were enslaved, filling Roman households and workshops."}, {"front": "By the late Republic, what percentage of Italy's population was estimated to be enslaved?", "back": "Perhaps one-third of Italy's population."}, {"front": "Name several key roles that slaves played in the Roman economy and society.", "back": "Building roads, harvesting grain, teaching children, copying manuscripts, running businesses, and rowing warships."}, {"front": "What does the phrase 'panem et circenses' mean, and who coined it?", "back": "It means 'bread and circuses,' coined by the Roman poet Juvenal. It described how Roman rulers bought popular support with a grain dole and spectacular entertainments."}, {"front": "What was the cynical political calculation behind the 'bread and circuses' policy?", "back": "A city of hungry, unemployed men is dangerous; a city of fed and entertained unemployed men is manageable, thus buying popular support and preventing unrest."}, {"front": "How did Roman roads, initially military supply lines, support the provincial economy?", "back": "They became vital arteries for transporting goods like grain from Egypt, olive oil from Spain, and pottery from Gaul, fostering economic integration across the empire."}, {"front": "What Roman landmark literally embodied the saying 'all roads lead to Rome'?", "back": "The Milliarium Aureum (Golden Milestone) erected by Augustus in the Roman Forum, from which all distances on Roman milestones were measured."}, {"front": "Give two examples of how Roman engineering influenced subsequent periods and even modern times.", "back": "Medieval churches and cathedrals used Roman arch technology; Gothic vaults extended the Roman arch. Modern concrete (re-invented in the 19th century) owes its theoretical foundation to Roman builders."}, {"front": "What famous Roman aqueduct, built in 19 BC, still stands today?", "back": "The Pont du Gard in southern France."}, {"front": "What event highlighted Rome's extreme economic dependence on slave labor?", "back": "Repeated slave revolts, such as Spartacus's revolt (73–71 BC), which sent waves of terror through the slaveowning class."}, {"front": "How did the densest road networks on Roman maps reflect Roman priorities?", "back": "They clustered in the most economically productive regions (e.g., Italy, Gaul, North Africa, Anatolian coast), indicating Rome's economic and administrative priorities."}, {"front": "What 'moral challenge' does the Roman slave economy present, as noted in the text?", "back": "It presents the challenge of ancient thinkers rationalizing slavery, while some ancient voices (like Stoics and early Christians) argued for the common humanity of slaves, eventually challenging the institution."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
