    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>

    <script>
    var CARDS = [{"front": "What was the Crisis of the Third Century (AD 235–284)?", "back": "In fifty years the Empire had more than fifty emperors, most murdered by their own soldiers after reigns of months or weeks. Civil war raged across the provinces. Rhine and Danube frontiers came under constant pressure. Trade collapsed. Cities shrank. Currency debasement caused severe inflation. It set in motion the long decline that ended in 476."}, {"front": "What is currency debasement, and what were its effects in Rome?", "back": "Reducing the precious metal content of coins while keeping their face value. Roman emperors did this to pay soldiers when tax revenues fell short. Merchants raised prices to compensate (inflation). By the mid-third century, Roman silver coins contained almost no silver at all — one of the earliest recorded examples of inflation through monetary debasement."}, {"front": "How did Diocletian (r. AD 284–305) stabilize the Empire?", "back": "He doubled the size of the army, reorganized provincial administration, and divided the Empire into two administrative halves (East and West), each with a senior emperor (Augustus) and junior emperor (Caesar) — the Tetrarchy ('rule of four'). This worked while Diocletian lived but collapsed into civil war after his retirement."}, {"front": "What was the East-West division of the Roman Empire, and why did the West prove more vulnerable?", "back": "The Eastern provinces (Egypt, Syria, Anatolia, Greece) were densely populated, urbanized, and economically productive. Constantinople was nearly impregnable. The Western provinces (Britain, Gaul, Spain, Italy) were less urbanized, faced a longer exposed frontier along the Rhine and Danube, and were more vulnerable to barbarian incursion. When pressures arrived, the West could not sustain them; the East survived another thousand years."}, {"front": "Who were the Huns, and what was their effect on the Roman Empire?", "back": "Horse-warriors of extraordinary skill and ferocity from Central Asia who swept westward across the Eurasian steppes in the 370s AD. As they advanced, they drove Germanic peoples living on Rome's frontiers into panic — most importantly the Visigoths, who begged Emperor Valens to let them cross the Danube into Roman territory in AD 376. The Huns thus set in motion the chain of events that cracked the Western Empire open."}, {"front": "What happened in AD 376 that triggered the Visigothic crisis?", "back": "The Visigoths, fleeing the Huns, begged Emperor Valens to let them cross the Danube and settle inside Roman territory. Valens agreed. But Roman administrators failed to provide promised grain and fair treatment — instead exploiting the Visigoths, selling them dog-meat at extortionate prices and demanding their children as slaves. The Visigoths revolted."}, {"front": "What was the Battle of Adrianople (AD 378), and why was it so significant?", "back": "The revolting Visigoths met the Roman field army under Emperor Valens himself. Valens was killed; two-thirds of the Roman field army was destroyed. The text calls it the worst Roman military defeat since Hannibal's victory at Cannae in 216 BC (Unit 3). 'The frontier had cracked' — and was never fully repaired."}, {"front": "What were the foederati, and why did they create problems for Rome?", "back": "Latin for 'allies' (from foedus, treaty). Germanic groups settled inside the Roman Empire under treaty, providing soldiers in exchange for land and payment. The problem: the Roman army increasingly consisted of Germanic warriors whose first loyalty was to their chieftains, not to Rome. A pragmatic response to a crisis that embedded long-term structural weakness."}, {"front": "Who was Alaric, and what happened in AD 410?", "back": "A Visigothic leader who had served as a Roman military officer. When the Western government repeatedly refused his demands for land, official recognition, and a senior Roman command (or broke its promises), Alaric invaded Italy. After two earlier failures, his forces sacked Rome for three days in AD 410 — the first time the Eternal City had fallen in eight hundred years."}, {"front": "What was Jerome's reaction to the sack of Rome in AD 410?", "back": "Writing from Bethlehem, Jerome lamented: 'The city which had taken the whole world was itself taken.' Pagans blamed Rome's adoption of Christianity for abandoning the gods who had protected the city. Christians struggled to explain what God was doing. Augustine began writing The City of God in direct response to the theological crisis the sack caused."}, {"front": "Who was Attila the Hun, and why was he called 'the Scourge of God'?", "back": "Attila (r. AD 434–453) united the Hunnic tribes into the most feared military force of his age. He extorted enormous tribute from the Eastern Empire and devastated Gaul. Christians took the title 'Scourge of God' literally — as divine punishment for Roman sins. He died on his wedding night in AD 453 from a nosebleed or hemorrhage; his empire collapsed almost immediately."}, {"front": "What happened at the Battle of the Catalaunian Plains (AD 451)?", "back": "A combined Roman and Visigothic army under the Roman general Aetius fought Attila to a standstill in modern France — the last great Roman military victory in the West. The following year Attila invaded Italy, sacking Aquileia so thoroughly that its refugees fled to the Venetian lagoon, eventually founding Venice."}, {"front": "What was Pope Leo I's encounter with Attila at the Mincio River?", "back": "In AD 452, Pope Leo I — alone among the great figures of the late West with genuine moral authority — rode out to meet Attila at the Mincio River. He persuaded the Hun to turn back. Whether through Leo's personal authority, disease in Attila's army, fear of Aetius' approach, or Byzantine pressure on the Hunnic homeland, Attila withdrew from Italy."}, {"front": "What happened in AD 455 and AD 476 — the final blows to the Western Empire?", "back": "455: The Vandals (who had crossed to North Africa and seized Carthage) sailed up the Tiber and sacked Rome a second time, more thoroughly than Alaric — stripping gilded roof tiles from the Capitoline temples. 476: Odoacer led a Germanic mutiny, killed regent Orestes, deposed the boy-emperor Romulus Augustulus, and sent the imperial regalia to Constantinople. No new emperor was named."}, {"front": "Who was Romulus Augustulus, and why is his name symbolically significant?", "back": "The last emperor of the Western Roman Empire, deposed by Odoacer in August AD 476 at approximately age fourteen. His name carries almost unbearable irony: Romulus (the legendary founder of Rome) + Augustulus (the diminutive of Augustus — 'little Augustus'). Rome's founding name and greatest name, combined in their diminutive forms, at the moment of Rome's end."}, {"front": "Who was Justinian I, and what were his three great achievements?", "back": "Eastern Roman Emperor (r. AD 527–565) — perhaps the most ambitious Byzantine ruler. Three achievements: 1) Military: briefly reconquered North Africa, Italy, and southern Spain (though losses could not be held after the Plague of Justinian). 2) Legal: the Corpus Juris Civilis — the foundation of European law. 3) Architectural: the Hagia Sophia (completed AD 537), still standing today."}, {"front": "What was the Corpus Juris Civilis?", "back": "Justinian's systematic compilation of all Roman law (AD 529–534), comprising: the Institutes (student textbook), the Digest (summary of legal opinions), the Codex (imperial decrees), and the Novels (Justinian's new laws). It became the foundation of legal systems across most of Europe — from medieval Italy to modern France, Germany, and Spain."}, {"front": "What was the Plague of Justinian (AD 541–549), and why was it historically significant?", "back": "The first major recorded outbreak of bubonic plague in history. Spreading from Egypt along trade routes, it killed an estimated 25–50 million people — perhaps a quarter to a third of the Byzantine Empire's population. Armies were decimated, tax revenues collapsed, and the reconquered western territories could not be held. Justinian's empire never fully recovered."}, {"front": "What is the Byzantine Empire, and how long did it last?", "back": "The name historians give to the Eastern Roman Empire after the fall of the West (AD 476). The Byzantines called themselves Romaioi ('Romans') until Constantinople fell to the Ottoman Turks in AD 1453 — nearly a thousand years after the Western Empire's fall. Their contributions: preserving Greek learning, Justinian's law code, converting the Slavs (Saints Cyril and Methodius), and Eastern Church art."}, {"front": "Who was Boethius, and what did he contribute?", "back": "Anicius Manlius Severinus Boethius (c. AD 480–524): Roman aristocrat, chief minister to the Ostrogothic king Theodoric. He translated Aristotle and other Greek philosophers into Latin — preserving Greek thought for a Latin-speaking world that could no longer read Greek. Falsely accused of treason, he wrote the Consolation of Philosophy while awaiting execution (AD 524)."}, {"front": "What is the Consolation of Philosophy, and why was it so influential?", "back": "Written by Boethius in prison awaiting execution: a dialogue between Boethius (in despair) and an allegorical figure, Lady Philosophy. Lady Fortune explains her wheel — Fortune by nature cannot be stable; expecting wealth and power to remain is like expecting the sea to always be calm. The real goods (virtue, wisdom, intelligence) cannot be taken by any court or executioner. The most read book outside the Bible throughout the Middle Ages."}, {"front": "What was Augustine's 'two cities' framework in The City of God?", "back": "Two cities built on two loves: the City of Man (built on amor sui — self-love, even to contempt of God; glorifies itself) and the City of God (built on amor Dei — love of God, even to contempt of self; glories in the Lord). Rome was a great City of Man — tremendous achievements built on self-love and pride. But the City of God cannot be destroyed by any barbarian army or civilizational collapse."}, {"front": "What were the five things that survived the fall of Rome?", "back": "1) The Church: bishops maintained civic functions abandoned by the imperial government. 2) Latin: remained the language of scholarship, law, and theology. 3) Roman law: Justinian's Corpus Juris Civilis preserved legal principles that re-emerged in the 12th century. 4) Manuscripts: monks copied and preserved classical texts. 5) The idea of Rome: the memory of Christian imperial unity inspired Charlemagne and the medieval papacy."}, {"front": "Why does the text challenge the word 'barbarian' for Rome's invaders?", "back": "By Rome's fall, the Visigoths, Franks, Ostrogoths, and other Germanic peoples were not primitive savages. Many had centuries of contact with Rome; many served in Roman armies; many had converted to Christianity (Arian form). The Visigoths had a Gothic-language Bible translation from bishop Wulfila. The 'invasions' were as much migration, negotiation, and cultural exchange as collision of civilization and savagery."}, {"front": "What are the main modern explanations for why Rome fell?", "back": "Modern historians cite multiple interacting causes: military overstretching, economic decline, currency debasement, the third-century crisis, plague (Antonine Plague AD 165 and Plague of Cyprian AD 249 each killed millions), administrative corruption, and loss of political legitimacy. Edward Gibbon (1776) blamed Christianity; most modern historians reject single-cause explanations. The Eastern Empire's survival for a thousand more years shows collapse was not inevitable."}, {"front": "What was the Hagia Sophia, and what did Justinian say when he first entered it?", "back": "The Church of the Holy Wisdom ('Holy Wisdom'), built in Constantinople, completed AD 537, still standing today. One of the greatest architectural achievements in history. When Justinian first walked into the finished building, he reportedly exclaimed: 'Solomon, I have surpassed thee!' — referring to King Solomon's Temple in Jerusalem."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
