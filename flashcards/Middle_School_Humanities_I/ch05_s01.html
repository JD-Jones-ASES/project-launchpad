<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the primary sources for studying early Christianity in Unit 5?", "back": "The Gospels, the book of Acts, letters of an early bishop facing martyrdom, and a letter from a pagan Roman governor."}, {"front": "What three-dimensional picture do these primary sources provide of early Christianity?", "back": "How it saw itself, what it demanded of its followers, and how it appeared to outsiders."}, {"front": "What is the significance of the Sermon on the Mount in Western literature?", "back": "It is considered the most concentrated body of ethical teaching in Western literature."}, {"front": "Where did Jesus deliver the Sermon on the Mount, and what does 'Beatitudes' mean?", "back": "On a hillside in Galilee. 'Beatitudes' comes from the Latin *beatus*, meaning 'blessed.'"}, {"front": "How did the Beatitudes challenge the values typically held in the Roman world?", "back": "Rome valued military glory, wealth, power, and status, while the Beatitudes called blessed those who mourned, the poor in spirit, the meek, and the persecuted."}, {"front": "How did Jesus' teaching in the Beatitudes contrast with Aristotle's concept of *eudaimonia*?", "back": "Aristotle taught that wealth and good fortune were necessary for human flourishing (*eudaimonia*), whereas Jesus taught the opposite by declaring the suffering and poor to be blessed."}, {"front": "What is the Greek word translated as 'blessed' in the Beatitudes, and what was its original classical Greek application?", "back": "*Makarios*, meaning 'happy, fortunate, divinely favored.' In classical Greek literature, the *makarioi* were the Olympian gods, beings beyond suffering."}, {"front": "In what way were the Beatitudes truly radical in the context of Greco-Roman honor culture?", "back": "They directly opposed ideals like Aristotle's 'magnanimous man' and the avoidance of shame, instead blessing qualities like meekness and enduring persecution."}, {"front": "How does the Gospel of John's Prologue begin, and what significant philosophical concept does it introduce?", "back": "It begins with a theological declaration, not a genealogy or birth, introducing the Greek philosophical concept of the *Logos* (divine Word or rational principle)."}, {"front": "Explain the difference between the Stoic philosophical concept of the *Logos* and John's use of the term.", "back": "Stoics saw the *Logos* as an impersonal rational principle woven through all reality, while John claimed this *Logos* became a specific Person—Jesus Christ—who could be touched and followed."}, {"front": "What profound doctrine is expressed by the phrase 'the Word was made flesh' (ho Logos sarx egeneto) in John's Prologue?", "back": "It encapsulates the Incarnation doctrine, stating that the eternal rational principle of the universe became a human being in a specific historical moment."}, {"front": "What does the New Testament's deliberate use of Greek philosophical vocabulary (like *Logos*) indicate about early Christians?", "back": "It shows that early Christians actively engaged the Greco-Roman intellectual world on its own terms, using familiar concepts as a bridge to introduce Jesus."}, {"front": "When Paul preached at Athens (Acts 17), why did he avoid quoting Hebrew Scriptures, and what approach did he take instead?", "back": "His audience (Epicurean and Stoic philosophers) would not have known Hebrew Scriptures. He started with their existing practices, like the altar to 'the Unknown God,' and their own poets."}, {"front": "What is 'contextualization' as demonstrated by Paul's sermon in Athens?", "back": "It is the method of finding the best point of connection between an unfamiliar message and an audience's existing knowledge, without compromising the core message of the Gospel."}, {"front": "What were the varied reactions of Paul's audience in Athens to his message?", "back": "Some mocked, others said they would hear him again, and a few believed, including Dionysius the Areopagite and a woman named Damaris."}, {"front": "Before King Agrippa II and Governor Festus (Acts 26), what was Paul's primary defense strategy?", "back": "He offered an autobiography/personal testimony, recounting his life as a Pharisee, his encounter with the risen Christ on the Damascus road, and his call to preach to Gentiles."}, {"front": "What was King Agrippa's famous reply to Paul, and what does it represent?", "back": "'Almost thou persuadest me to be a Christian.' It represents the position of those who are intellectually moved but not yet ready to commit."}, {"front": "How did Governor Festus react to Paul's testimony before Agrippa, and what viewpoint does his reaction represent?", "back": "He dismissed it, saying, 'Paul, thou art beside thyself; much learning doth make thee mad,' representing the Roman rationalist perspective."}, {"front": "Compare Paul's argumentative approach in Acts 17 (Athens) with his approach in Acts 26 (before Agrippa).", "back": "At Athens, he argued from natural theology and Greek philosophy. Before Agrippa, he argued from Hebrew Scripture and personal testimony."}, {"front": "What remained consistent across Paul's different evangelistic approaches in Athens and before Agrippa?", "back": "The core Gospel message itself remained the same; he simply adapted his method and vocabulary to suit different audiences."}, {"front": "Who was Ignatius of Antioch, and under which Roman emperor was he arrested?", "back": "He was the third bishop of Antioch, arrested under Emperor Trajan."}, {"front": "What was Ignatius of Antioch's ultimate fate after his arrest under Emperor Trajan?", "back": "He was transported under Roman military guard to Rome for execution in the arena."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
