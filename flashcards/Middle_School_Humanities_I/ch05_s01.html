<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Pax Romana?", "back": "Latin for “Roman peace,” a period of relative political stability and absence of major wars throughout the Roman Empire, lasting roughly from Augustus (27 BC) to Marcus Aurelius (AD 180)."}, {"front": "How did the conditions of the Pax Romana prove essential to the spread of Christianity?", "back": "It provided safe roads, shared language (Koine Greek), and a single legal system, creating an environment where the Gospel could travel and communicate more easily."}, {"front": "Who was the Roman emperor at the height of the Pax Romana and during Jesus' birth?", "back": "Augustus Caesar (27 BC–AD 14)."}, {"front": "Who governed the Roman province of Judea when Jesus was born, and what was notable about his rule?", "back": "Herod the Great, a client king, known for rebuilding the Jerusalem Temple into a grand structure but ruling with notorious cruelty."}, {"front": "What does Paul's phrase 'the fullness of time' (Galatians 4:4) refer to in the context of the Incarnation?", "back": "The specific historical conditions of the first century (Pax Romana, Roman roads, Greek koine language, Roman law) that providentially prepared the world for the rapid spread of the Gospel."}, {"front": "List three specific conditions of the Roman world that enabled the rapid spread of the Gospel.", "back": "Political unity (one empire, one law, postal system), Roman roads (50,000 miles connecting cities), and the Greek language (Koine Greek as the lingua franca of the eastern Empire)."}, {"front": "Name two non-Christian ancient historians who corroborated the historical reality of Jesus and his execution.", "back": "Josephus (Jewish historian) and Tacitus (Roman historian)."}, {"front": "What specific details about Jesus' execution did Tacitus record around AD 116?", "back": "He confirmed that 'Christus suffered the extreme penalty during the reign of Tiberius at the hands of one of our procurators, Pontius Pilatus.'"}, {"front": "According to Paul in 1 Corinthians 15:3–8, what historical evidence supported the Resurrection?", "back": "Paul listed specific, named eyewitnesses, including 'above five hundred brethren at once,' many of whom were still alive when he wrote, affirming it as a bodily, physical event."}, {"front": "What was the approximate timeframe for Jesus' birth and the beginning of his public ministry?", "back": "Born around 4 BC in Bethlehem; began public ministry around AD 27–30 after baptism by John the Baptist."}, {"front": "How did Jesus' teaching, particularly the Sermon on the Mount, challenge conventional wisdom?", "back": "He taught revolutionary concepts such as blessing the meek, loving enemies, and unlimited forgiveness, and claimed personal authority over the Torah and the ability to forgive sins."}, {"front": "Summarize the key events of the final week of Jesus' life leading to his crucifixion.", "back": "He entered Jerusalem on Palm Sunday to popular acclaim, was arrested at the instigation of chief priests, tried by the Roman governor Pontius Pilate, and crucified—a Roman method of execution."}, {"front": "What was the significance of the Resurrection for the early Christians and historians?", "back": "It was the central claim of Christianity, a bodily event that transformed disciples from fearful individuals into a movement willing to die for their testimony. Historians must explain this transformation."}, {"front": "What significant event occurred 50 days after the Resurrection, marking the birth of the Church?", "back": "Pentecost, when the Holy Spirit descended on the disciples, enabling them to speak in other languages and leading to Peter's sermon and 3,000 baptisms."}, {"front": "Who were two key leaders of the early Jerusalem church?", "back": "Peter, and James (the brother of Jesus)."}, {"front": "Who was the first Christian martyr, and who witnessed his stoning?", "back": "Stephen, one of the first deacons, was stoned to death (c. AD 35); Saul of Tarsus (later Paul) watched approvingly."}, {"front": "Describe Paul's background before his conversion and the nature of his conversion experience.", "back": "He was a Roman citizen, a Pharisee trained under Gamaliel, and an energetic persecutor of Christians, until he encountered the risen Christ on the road to Damascus (c. AD 33–35), which temporarily blinded him and transformed him."}, {"front": "How did Paul's Roman citizenship aid his missionary efforts?", "back": "It shielded him from arbitrary punishment and gave him the right to appeal to Caesar, protecting him on multiple occasions and allowing him to reach Rome."}, {"front": "What was Paul's consistent missionary strategy when arriving in a new city?", "back": "He would first go to the synagogue to preach to those already familiar with the Hebrew Scriptures, weather opposition, and then plant a church before moving on."}, {"front": "What are the earliest written documents of the New Testament?", "back": "Paul's letters (Epistles), predating the Gospels by a decade or more."}, {"front": "When and under which emperor did the first organized Roman persecution of Christians occur?", "back": "The first organized persecution was launched by Emperor Nero (AD 54–68) after the Great Fire of Rome in AD 64, for which he blamed Christians."}, {"front": "How did Tacitus describe the brutal methods used by Nero against Christians during the Great Fire persecution?", "back": "Christians were sewn into animal skins and exposed to dogs, or smeared with combustible materials and used as human torches to light the night."}, {"front": "How are Peter and Paul traditionally believed to have died under Nero?", "back": "Peter was crucified upside down in Rome; Paul, as a Roman citizen, was beheaded."}, {"front": "How did the Roman Empire's relationship with Christians vary during the Pax Romana, beyond Nero's persecution?", "back": "While Nero was brutal, later 'Good Emperors' like Trajan often adopted more moderate policies ('do not hunt them down'), yet Christians remained in a state of permanent legal vulnerability, punctuated by periods of active persecution."}, {"front": "Name three later Roman emperors who launched organized persecutions against Christians.", "back": "Domitian (AD 81–96), Decius (AD 249–251), and Diocletian (AD 284–305)."}, {"front": "What was the Diocletianic Persecution, and what measures did it involve?", "back": "Also known as the 'Great Persecution' (AD 303–311), it was the most severe, involving the destruction of churches, confiscation of Scriptures, imprisonment of clergy, and required sacrifice to Roman gods on pain of death."}, {"front": "What did Tertullian famously observe about the impact of Christian persecutions?", "back": "He observed that 'the blood of the martyrs was the seed of the Church,' meaning that the courage of martyrs often inspired converts rather than stamping out Christianity."}, {"front": "Who was Ignatius of Antioch, and what is the significance of his letters?", "back": "Bishop of Antioch (d. AD 107/108) and an early Christian martyr arrested under Trajan; his seven letters, written en route to his execution in Rome, are powerful documents of early Christianity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
