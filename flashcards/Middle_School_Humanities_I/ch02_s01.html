    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What event in 490 BC marked the first major confrontation of the Persian Wars?", "back": "The Battle of Marathon, where Athenians and Plataean allies defeated a Persian army under King Darius."}, {"front": "Who led the Spartan force that famously held the pass at Thermopylae against Xerxes' much larger Persian army?", "back": "King Leonidas."}, {"front": "What crucial naval battle in 480 BC, guided by Themistocles, destroyed the Persian fleet and saved Greece?", "back": "The Battle of Salamis."}, {"front": "How did Athens' victory in the Persian Wars contribute to its Golden Age?", "back": "It provided wealth from the Laurium silver mines (funding the navy), boosted confidence, and enabled the democratic reforms and building programs of Pericles."}, {"front": "Name three significant cultural or philosophical achievements of Athens' Golden Age that 'grew from the soil of Marathon and Salamis'.", "back": "The Parthenon, the plays of Sophocles, and the philosophy of Socrates."}, {"front": "Define the Delian League.", "back": "An alliance of Greek city-states formed after the Persian Wars in 478 BC, led by Athens, initially for mutual defense but later transformed into an Athenian empire."}, {"front": "How did Athens' leadership under Pericles deepen its democracy?", "back": "Pericles extended pay to jurors and public officeholders, allowing poorer citizens to participate in government without starving."}, {"front": "According to Pericles' Funeral Oration, what made Athens 'an education to Greece'?", "back": "Its democratic constitution favored the many, afforded equal justice, valued merit over birth, and protected the weak, while citizens devoted themselves to both private excellence and public duty."}, {"front": "What were the major limitations of Athenian democracy, despite its achievements?", "back": "It excluded women, slaves, and foreigners, who together constituted the majority of Athens' population."}, {"front": "Why did Thucydides record Pericles' Funeral Oration?", "back": "Not to endorse it, but to show how Athens saw itself at the height of its power, providing context that is 'tinged with tragedy' given Athens' later defeat."}, {"front": "What was the primary cause of the Peloponnesian War?", "back": "The alarm felt by Sparta and its allies over the rising power and imperial ambitions of Athens."}, {"front": "What were the two main alliances that fought in the Peloponnesian War, and what characterized them?", "back": "The Athenian alliance (maritime, democratic) fought the Spartan-led Peloponnesian League (land-based, oligarchic)."}, {"front": "What devastating event, besides warfare, severely weakened Athens during the Peloponnesian War?", "back": "A devastating plague struck Athens in 430 BC, killing perhaps a quarter of the population, including Pericles himself."}, {"front": "What was the ultimate outcome of the Peloponnesian War?", "back": "Athens surrendered to Sparta in 404 BC, ending its political dominance and permanently weakening the Greek city-state system."}, {"front": "Who was Philip II of Macedon, and what was his key military innovation?", "back": "He was a brilliant military innovator who forged the Macedonian army into the finest fighting force in the world, inventing the sarissa (an eighteen-foot pike) organized into the devastating Macedonian phalanx."}, {"front": "At what battle in 338 BC did Philip II of Macedon conquer most of Greece?", "back": "The Battle of Chaeronea."}, {"front": "Who was Alexander the Great's famous tutor?", "back": "Aristotle."}, {"front": "Name three major regions conquered by Alexander the Great.", "back": "Persia, Egypt, and Mesopotamia (he also pushed into modern India)."}, {"front": "What happened to Alexander the Great's empire immediately after his death?", "back": "It fragmented almost immediately, as his generals carved it into rival kingdoms that spent generations at war with one another."}, {"front": "Define Hellenism.", "back": "The spread of Greek language, culture, and ideas throughout the Middle East and Central Asia following Alexander's conquests, making Greek (koine) the common language of trade and scholarship."}, {"front": "How did Alexander's conquests create a lasting cultural unity despite his political empire fragmenting?", "back": "Greek became the common tongue of educated people from Egypt to Persia, and Greek-style cities were planted, creating a 'Hellenistic world' that proved crucial for later historical developments like the spread of the Gospel."}, {"front": "What does the text suggest is a lasting lesson from the Persian Wars regarding small, free peoples versus vast empires?", "back": "The power of citizen-soldiers fighting for their own city and laws, not for a distant king's ambitions, as exemplified by Marathon and Thermopylae."}, {"front": "According to the 'then and now' section, what questions from Pericles' Funeral Oration are still relevant today?", "back": "'What does democracy owe its citizens?' and 'What do citizens owe their city?'"}, {"front": "What lesson does the text draw from Athens' collapse during the Peloponnesian War for military and political science?", "back": "How a democracy can destroy itself through arrogance, short-sighted decision-making, and the flattery of demagogues."}, {"front": "How did Athens under Pericles fund its ambitious building program on the Acropolis, including the Parthenon?", "back": "It was funded by the tribute money pouring into Athens from the Delian League, often from allied states who had little say in the matter."}, {"front": "What was the Koine Greek, and why is it significant for later historical periods?", "back": "It was the common Greek language that spread throughout the Hellenistic world. It is significant because the New Testament was written in Koine Greek, and early Christian missionaries relied on this linguistic unity."}, {"front": "What specific example from the text shows the long-term impact of Hellenism on religious history?", "back": "The New Testament was written in koine Greek, and Paul's missionary journeys relied on the network of Greek-speaking cities Alexander had planted."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
