    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities I &mdash; Chapter 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_I.html">&larr; Back to History &amp; Humanities I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How long did the Roman Republic last, and what were the main factors in its slow collapse?", "back": "The Roman Republic lasted nearly five centuries. It slowly collapsed under the weight of wealth concentration, political ambition, and civil war."}, {"front": "How did Rome's conquests and increasing wealth contribute to the Republic's instability?", "back": "Wealth flowed mostly to senators and their allies, who bought vast lands worked by slaves. This pushed small independent farmers (the backbone of the legions) off their land, creating a landless class with loyalty shifting from Rome to individual generals."}, {"front": "Who was Tiberius Gracchus, and what was his proposed reform in 133 BC?", "back": "Tiberius Gracchus was a tribune of the plebs who proposed redistributing Rome's public land (ager publicus), which wealthy senators had illegally occupied, back to the landless poor."}, {"front": "What was the fate of Tiberius Gracchus, and what dangerous precedent did it set?", "back": "He was murdered in the Forum by a mob of senators and their thugs, marking the first time a tribune was killed in office. This violated his sacrosanctity and signaled a breakdown in resolving political disputes through law."}, {"front": "Define 'Tribune of the Plebs' in the context of the Roman Republic.", "back": "An elected office created in the early Republic to protect ordinary citizens (plebeians) against patrician abuses. Tribunes had the power of veto and were legally sacrosanct (untouchable)."}, {"front": "What reforms did Gaius Gracchus propose, and what was his ultimate fate?", "back": "As tribune, Gaius Gracchus extended his brother's land program, introduced subsidized grain for the urban poor, road-building projects, and proposed extending Roman citizenship to Italian allies. He was cornered on the Aventine Hill and had his slave kill him rather than be captured, with 3,000 supporters killed without trial."}, {"front": "What was the overall significance of the Gracchi brothers' attempts at reform?", "back": "They represented the Republic's last serious attempt to fix its structural problems from within constitutional structures. After them, both reformers and conservatives increasingly resorted to force instead of argument."}, {"front": "How did Gaius Marius's military reforms fundamentally change the Roman army's loyalty?", "back": "Marius opened the army to landless volunteers, who became entirely dependent on their general for pay, equipment, land grants, and plunder. Their loyalty shifted from the state and the Republic to their individual general."}, {"front": "Explain how Marius's army reforms ultimately undermined the Roman Republic.", "back": "A republic requires citizens who prioritize the common good. Marius's reforms created a professional army loyal to its general, enabling generals to use their troops as political tools against the Senate, constitution, and state itself, leading to civil wars."}, {"front": "Who was Lucius Cornelius Sulla, and what unprecedented action did he take with his army?", "back": "Sulla was a Roman general who, when his command was stripped, marched his legions on Rome itself in 88 BC—the first time a Roman general had attacked the city."}, {"front": "What were 'proscription lists,' and who introduced them as a political weapon?", "back": "Proscription lists were public lists of enemies of the state, posted in the Forum, whose lives were forfeit. Anyone could kill a proscribed person for a reward, and their property was confiscated. Sulla introduced them in 82 BC."}, {"front": "What was the 'First Triumvirate,' and who were its three members?", "back": "The First Triumvirate was an informal private agreement formed in 60 BC by Julius Caesar, Pompey the Great, and Marcus Licinius Crassus to divide power and cut the Senate out of major decisions."}, {"front": "What major military and political accomplishments did Julius Caesar achieve during his governorship of Gaul?", "back": "Over a decade (58–50 BC), Caesar conquered all of modern France, twice invaded Britain, bridged the Rhine into Germany, killed or enslaved approximately one million people, and documented his triumphs in *Commentarii de Bello Gallico*."}, {"front": "What choice did Caesar face when the Senate ordered him to disband his army, and what was its significance?", "back": "Caesar had to choose between complying (surrendering power and facing prosecution) or refusing (committing treason). His decision to cross the Rubicon with his army was an act of war that plunged Rome into civil war."}, {"front": "What does the phrase 'crossing the Rubicon' mean in modern English, and what was its historical origin?", "back": "It means making an irreversible decision or reaching a point of no return. Its origin is Julius Caesar's act of crossing the Rubicon River with his army in 49 BC, signifying an act of war against the Roman state."}, {"front": "Name three significant powers or honors Julius Caesar accumulated after defeating his rivals.", "back": "Caesar accumulated powers such as consul, dictator perpetuo (dictator for life), and pontifex maximus (head of the state religion). The month Quintilis was also renamed Julius (July) in his honor."}, {"front": "What were some of Julius Caesar's popular or beneficial policies as dictator?", "back": "His policies included extending Roman citizenship to provincials, reducing debt slavery, reforming the Roman calendar (Julian calendar), colonizing landless veterans, and reducing senatorial corruption in the provinces."}, {"front": "Who were the key conspirators in Caesar's assassination, and on what date did it occur?", "back": "Marcus Junius Brutus and Gaius Cassius Longinus led the conspirators. Julius Caesar was assassinated on March 15, 44 BC, known as the Ides of March."}, {"front": "What was the immediate aftermath of Caesar's assassination, and how did it differ from the conspirators' expectations?", "back": "The conspirators expected the Republic to be restored and to be hailed as heroes, but the Senate fled, the city erupted in panic, and Mark Antony used Caesar's will to turn public opinion against them, leading to 15 more years of civil war."}, {"front": "What was the 'Second Triumvirate,' and who were its three members?", "back": "The Second Triumvirate was a formal, legally recognized alliance of Octavian, Mark Antony, and Lepidus. It ruled Rome by terror and reinstated proscription lists."}, {"front": "What was the fate of Cicero, the great orator and defender of the Republic, during the Second Triumvirate?", "back": "Cicero was placed on Antony's proscription list and was hunted down and beheaded in December 43 BC. His head and hands were displayed in the Forum as a warning."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
