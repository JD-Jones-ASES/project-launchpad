<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How long did the Roman Republic last and what ultimately led to its slow collapse?", "back": "The Roman Republic lasted nearly five centuries, slowly collapsing under the weight of wealth, ambition, and civil war."}, {"front": "Name three significant figures associated with the fall of the Roman Republic mentioned in the overview.", "back": "The reforming Gracchi brothers, the orator Cicero, and Julius Caesar."}, {"front": "What was the Romans' greatest technological innovation, which they combined with the arch?", "back": "Opus caementicium, or Roman concrete."}, {"front": "What unique ingredient did Roman concrete use, and what were its key properties?", "back": "It used volcanic ash called pozzolana, mixed with lime and seawater. It hardened underwater and grew stronger with age."}, {"front": "How did the Roman arch improve upon Greek post-and-lintel construction?", "back": "The arch transferred weight sideways into supporting columns through compression, allowing for much larger spans. Post-and-lintel was limited by stone's tensile strength."}, {"front": "Give two examples of monumental Roman structures built using concrete and arches.", "back": "The Pantheon's coffered dome, the Colosseum, and hundreds of aqueducts."}, {"front": "Define an 'aqueduct' and describe a key engineering feature of Roman aqueducts.", "back": "An aqueduct is a channel or pipe system for carrying water over long distances. Roman aqueducts ran on stone arches with a precise, gentle downhill gradient (e.g., one inch per hundred feet) to move water by gravity."}, {"front": "What is the significance of the Pantheon's dome in the context of Roman engineering?", "back": "The Pantheon's dome, 142 feet in diameter, is still the largest unreinforced concrete dome in the world after 1,900 years, showcasing the advanced application of Roman concrete and arch technology."}, {"front": "How did Roman conquest contribute to its economy and society?", "back": "Roman conquest was profitable through tribute from conquered peoples, grain from their land, and skilled craftsmen and educated slaves filling Roman households and workshops."}, {"front": "What percentage of Italy's population was enslaved by the late Republic, and what roles did slaves play?", "back": "Perhaps one-third of Italy's population was enslaved. Slaves built roads, harvested grain, taught children, copied manuscripts, ran businesses, and rowed warships."}, {"front": "Who coined the phrase 'panem et circenses,' and what does it mean?", "back": "The Roman poet Juvenal coined 'panem et circenses' (bread and circuses) to describe how Roman rulers bought popular support with a grain dole (annona) and spectacular entertainments."}, {"front": "What was the political calculation behind the 'bread and circuses' policy?", "back": "It was a cynical calculation that a city of fed and entertained unemployed men was manageable, preventing the dangers posed by hungry, restless populations."}, {"front": "What common saying originated from the Roman road system, and what does it literally describe?", "back": "The saying 'all roads lead to Rome' originated from the Roman road system, which literally radiated outward from the city, with distances measured from the Milliarium Aureum in the Roman Forum."}, {"front": "How did Roman roads serve purposes beyond military supply lines?", "back": "Roman roads also facilitated economic integration, carrying goods like grain, olive oil, and pottery across the empire, comparable in scale to a modern single market like the EU."}, {"front": "What is the lasting legacy of Roman engineering on Western construction?", "back": "Roman arch technology shaped medieval churches and cathedrals (Gothic vaults), and modern concrete's theoretical foundation owes to Roman builders. Many Roman aqueducts, like the Pont du Gard, still stand."}, {"front": "How does Shakespeare's approach to history, as seen in *Julius Caesar*, differ from a historian's?", "back": "A historian's first obligation is to tell what actually happened. A dramatist's first obligation is to illuminate human nature, which may involve compressing, inventing, or rearranging events."}, {"front": "What three types of 'truth' can be distinguished when analyzing historical drama?", "back": "Historical accuracy (what the record says), dramatic plausibility (what could believably have happened), and literary truth (what the scene reveals about human nature)."}, {"front": "What was the Roman Empire's greatest extent, and what infrastructure did it require beyond soldiers?", "back": "At its greatest extent (Trajan, AD 117), it stretched from Hadrian's Wall to the Euphrates. Maintaining this required engineers, surveyors, masons, accountants, and administrators, making engineering and bureaucracy inseparable from military power."}, {"front": "How did ancient thinkers view slavery, and how did some challenge this view?", "back": "Some ancient thinkers, like Aristotle, rationalized slavery. However, many ancient voices, including some Stoic philosophers and early Christians, argued for the common humanity and dignity of slaves."}, {"front": "How did Roman engineering (arch and concrete) make the scale of the Roman Empire possible in a way that Greek city-states never achieved?", "back": "These breakthroughs enabled the Romans to build extensive infrastructure like long-span bridges, aqueducts over valleys, and vast domed buildings, crucial for administering and connecting a large, unified empire that Greek city-states could not match."}, {"front": "Describe the engineering principle of 'compressive strength' as applied to the Roman arch.", "back": "In an arch, every stone is under compression, being squeezed by its neighbors. Stone is very strong in compression, allowing arches to bear immense weight by redirecting forces sideways into the supporting columns or buttresses."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
