<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What distinguished the heroes Rome celebrated during the Republic's early centuries from Greek heroes like Achilles or Odysseus?", "back": "Roman heroes prioritized duty, refusing wealth and personal fame, and sacrificing for the good of the *res publica*, unlike Greek heroes who sought *kleos* (personal glory) or return home."}, {"front": "What shared didactic purpose did historians Livy and Plutarch have in writing their historical works?", "back": "Both used history not merely to record the past but to shape and morally form their readers, holding up exemplars of virtue."}, {"front": "Who was Titus Livius, and what was the title of his monumental historical work?", "back": "Livy (c. 64 BC – AD 17) was a Roman historian who wrote 'Ab Urbe Condita' (From the Founding of the City)."}, {"front": "What was Livy's primary goal or 'moral purpose' in writing his history, as explicitly stated in his preface?", "back": "Livy aimed to write a moral history, focusing on 'their life and their manners' and 'their morals,' presenting heroes as moral exemplars and villains as warnings for his contemporary Rome."}, {"front": "How many books of Livy's 'Ab Urbe Condita' were originally written, and how many survive today?", "back": "Livy wrote 142 books, covering Rome from its founding to his own day, but only 35 survive."}, {"front": "Who was Publius Horatius Cocles, and what famous act of heroism is he known for?", "back": "Horatius Cocles was a Roman hero who single-handedly defended the Pons Sublicius (Sublician Bridge) against the Etruscan army, allowing his comrades to demolish it behind him."}, {"front": "What was the critical military situation that prompted Horatius Cocles's stand at the Pons Sublicius?", "back": "The Etruscan king Lars Porsena was marching on Rome to restore the exiled Tarquin, and his army was advancing toward the Sublician Bridge, Rome's last defense before the city."}, {"front": "What Roman virtue did Horatius Cocles primarily exemplify by holding the Sublician Bridge, expecting to die?", "back": "Horatius exemplified *virtus* in its Roman sense: courage and valor in the service of the community, indifferent to personal reward or glory."}, {"front": "Contrast Horatius Cocles's motivation for battle with that of the Greek hero Achilles.", "back": "Horatius rushed to the bridge out of duty to save Rome, expecting to die without personal glory. Achilles, in contrast, sometimes held back from battle or sought *kleos* (personal glory) to serve his pride."}, {"front": "Who was Plutarch, and what was the title of his greatest work?", "back": "Plutarch (c. AD 46–120) was a Greek philosopher and biographer who wrote the 'Parallel Lives.'"}, {"front": "What was Plutarch's main purpose in writing the 'Parallel Lives'?", "back": "Plutarch's purpose was to look for virtue and character in history, pairing famous Greeks and Romans and comparing them in terms of character to show what greatness looked like."}, {"front": "What was Lucius Quinctius Cincinnatus's occupation when senators arrived to appoint him dictator?", "back": "Cincinnatus was a farmer, living on a small farm across the Tiber after having lost most of his land."}, {"front": "What crisis led the Roman Senate to appoint Cincinnatus as dictator?", "back": "An enemy tribe called the Aequi had surrounded a Roman army, putting the Republic in grave crisis."}, {"front": "What significant action did Cincinnatus take immediately after successfully rescuing the Roman army and defeating the Aequi?", "back": "Cincinnatus resigned his dictatorship after only fifteen days and returned to his farm, demonstrating that power was a burden for the community, not a prize."}, {"front": "What enduring message about leadership and power did Cincinnatus's actions convey to Romans?", "back": "His actions conveyed that power is a temporary burden to be borne for the community's good, not a prize to be seized or kept for personal gain."}, {"front": "How did George Washington's actions after the American Revolutionary War reflect the example of Cincinnatus?", "back": "Washington, like Cincinnatus, resigned his military commission after the war and returned to his farm, Mount Vernon, earning him the moniker 'the American Cincinnatus.'"}, {"front": "Who was Marcus Atilius Regulus, and what was his fate during the First Punic War?", "back": "Regulus was a Roman consul captured by Carthage during the First Punic War, later tortured to death after returning to Carthage."}, {"front": "What difficult choice did Regulus make after being sent to Rome on parole by the Carthaginians to negotiate peace?", "back": "He advised the Roman Senate to reject the Carthaginian peace terms, deeming them unfavorable to Rome, and then kept his oath to return to Carthage, knowing he would face torture and death."}, {"front": "What specific Roman virtue did Marcus Atilius Regulus exemplify by returning to Carthage despite the known consequences?", "back": "Regulus exemplified *fides*—faithfulness, trustworthiness, and the sacred keeping of one's word, regardless of personal cost."}, {"front": "Why was *fides* (faithfulness) considered such a fundamental virtue in Roman society?", "back": "Romans understood *fides* as the foundation of all social life; without trustworthy oaths and agreements, alliances, courts, and civilization itself would unravel."}, {"front": "Name three core Roman virtues highlighted in the text.", "back": "*Virtus* (courage, valor), *pietas* (duty, devotion), and *fides* (faithfulness, trustworthiness)."}, {"front": "Define *virtus* in its Roman sense, as exemplified by Horatius Cocles.", "back": "*Virtus* in its Roman sense is courage and valor in the service of the community, often involving self-sacrifice and indifference to personal reward."}, {"front": "How might a Christian student recognize and appreciate Roman virtues like courage and self-sacrifice?", "back": "A Christian student could recognize and admire the courage, faithfulness, and self-sacrifice evident in Roman virtues, as these qualities resonate with aspects of Christian ethics, even if the ultimate motivations differ."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
