<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was a primary economic cause of the Roman Republic's instability after its conquests?", "back": "The concentration of wealth and land in the hands of senators and their allies, who used slave labor, displacing small independent farmers."}, {"front": "How did the displacement of small farmers impact the Roman legions?", "back": "It reduced the number of citizen-soldiers who owned land and fought for Rome, shifting loyalty towards generals who promised pay and plunder to landless volunteers."}, {"front": "Who were the Gracchi brothers, and what was their main reform objective?", "back": "Tiberius and Gaius Gracchus were tribunes who aimed to redistribute Rome's public land (ager publicus) back to the landless poor and implement other social reforms."}, {"front": "What was the fate of Tiberius Gracchus, and what did his death signify for the Roman Republic?", "back": "He was beaten to death by a mob of senators and thugs, becoming the first tribune murdered in office. His death marked the Republic's first major crack in resolving political disputes through law, not violence."}, {"front": "Define 'Tribune of the Plebs' in the Roman Republic.", "back": "An elected office created to protect ordinary citizens (plebeians) against patrician abuses. Tribunes had veto power and their persons were sacrosanct (legally untouchable)."}, {"front": "How did Gaius Gracchus expand on his brother's reforms, and what was his ultimate fate?", "back": "He proposed subsidized grain for the urban poor, road-building projects, and extending Roman citizenship to Rome's Italian allies. He was cornered on the Aventine Hill and had his slave kill him to avoid capture, with 3,000 supporters killed."}, {"front": "What was the long-term significance of the Gracchi brothers' failed reforms?", "back": "They represented the Republic's last serious attempt to fix structural problems constitutionally from within. After them, both reformers and conservatives increasingly resorted to force rather than argument."}, {"front": "Who was Gaius Marius, and what fateful military reform did he introduce?", "back": "A self-made military genius and consul, Marius opened the Roman army to landless volunteers, solving an immediate recruitment crisis but creating a new problem of soldier loyalty."}, {"front": "Explain how Marius's army reforms ultimately undermined the Roman Republic.", "back": "Soldiers became loyal to their generals, not to Rome or the Republic, because their entire livelihood (pay, equipment, land grants) depended on their general. This made the army a tool for political power struggles."}, {"front": "Who was Lucius Cornelius Sulla, and what unprecedented act did he commit against Rome?", "back": "A Roman general who, when stripped of his command, marched his legions on Rome itself (the first time a Roman general had done so), seized the city, and executed enemies."}, {"front": "What was a 'proscription list,' and how did Sulla use it as a political weapon?", "back": "A public list of enemies of the state whose lives were forfeit. Anyone could kill a proscribed person for a reward, and their property was confiscated. Sulla used it to eliminate political opponents."}, {"front": "Who formed the First Triumvirate, and what was its purpose?", "back": "An informal private agreement between Julius Caesar, Pompey the Great, and Marcus Licinius Crassus in 60 BC to divide power among themselves and bypass the Senate in major decisions."}, {"front": "What was Julius Caesar's primary military achievement during his governorship of Gaul?", "back": "He conquered all of modern France (Gaul), invaded Britain twice, bridged the Rhine into Germany, and documented his campaigns in the Commentarii de Bello Gallico."}, {"front": "What did 'crossing the Rubicon' mean for Julius Caesar and for the Roman Republic?", "back": "It was Caesar's irreversible decision to cross the legal boundary into Roman Italy with his army, committing an act of war against the state and initiating civil war. It signifies a 'point of no return'."}, {"front": "What powers did Julius Caesar accumulate after defeating his rivals, leading to fears of monarchy?", "back": "He became consul, dictator perpetuo (dictator for life), pontifex maximus, dressed in the purple of a king, and had coins struck with his face, among other honors."}, {"front": "Identify some popular or beneficial policies enacted by Julius Caesar, despite being seen as a tyrant by some.", "back": "He extended Roman citizenship to provincials, reduced debt slavery, reformed the chaotic Roman calendar (Julian calendar), colonized landless veterans, and reduced Senate corruption in the provinces."}, {"front": "Who led the conspiracy to assassinate Julius Caesar, and when did it occur?", "back": "Marcus Junius Brutus and Gaius Cassius Longinus, along with other senators, assassinated Caesar on March 15, 44 BC (the Ides of March)."}, {"front": "What was the conspirators' motive for killing Caesar, and what was the immediate outcome?", "back": "They believed it would restore the Republic. Instead, it led to panic, turned public opinion against them (thanks to Mark Antony), and plunged Rome into 15 more years of civil war."}, {"front": "Who formed the Second Triumvirate, and how did it differ from the First?", "back": "A formal, legally recognized alliance of Octavian, Mark Antony, and Lepidus. It differed by being a legally sanctioned ruling body that governed by terror, prominently using proscription lists."}, {"front": "What was the fate of Cicero, Rome's greatest orator, under the Second Triumvirate?", "back": "He was proscribed by Mark Antony, hunted down, and beheaded in December 43 BC, with his head and hands displayed in the Forum as a warning against defending the Republic."}, {"front": "How did the Second Triumvirate ultimately collapse?", "back": "It disintegrated into conflict between its members, culminating in Octavian's decisive naval victory over Antony and Cleopatra at the Battle of Actium in 31 BC."}, {"front": "Who was Octavian, and what political challenge did he face after his victory at Actium?", "back": "Julius Caesar's adopted heir, who became the sole power in the Roman world. He faced the problem of how to legitimize his immense power without calling himself king or dictator, given Roman aversion to these titles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
