<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What three literary masterpieces are highlighted from this period, and who were their authors?", "back": "Bede's *Ecclesiastical History*, Einhard's *Life of Charlemagne*, and Gregory the Great's *Pastoral Care*."}, {"front": "Who was the Venerable Bede, and where did he spend most of his life?", "back": "The Venerable Bede (c. AD 673–735) was a monk who spent virtually his entire life in the monastery of Wearmouth-Jarrow in Northumbria."}, {"front": "What is the primary historical significance of Bede's *Ecclesiastical History of the English People*?", "back": "It is the primary historical source for early English Christianity and one of the finest works of historical writing from the medieval period."}, {"front": "What innovative historical methods did Bede employ that made his work stand out?", "back": "He identified his sources, distinguished between eyewitness testimony and hearsay, and acknowledged uncertainty, a method closer to Thucydides than most medieval chroniclers."}, {"front": "How did Bede's dating system impact Western historical writing?", "back": "His system of counting years from the Incarnation of Christ (the AD system) became standard throughout the West."}, {"front": "Identify one similarity between Bede's and Thucydides' approach to historical writing.", "back": "Both took their craft seriously, sought witnesses, cross-checked accounts, acknowledged the limits of their knowledge, and wrote to explain not just what happened but why."}, {"front": "What was the crucial difference in how Bede and Thucydides understood the driving forces of history?", "back": "For Thucydides, history was driven by human nature (power, fear, self-interest); for Bede, it was providential, guided by God's purposes."}, {"front": "According to the text, why is a complete historical understanding said to require both Thucydides' and Bede's perspectives?", "back": "A complete understanding needs Thucydides' skeptical eye (rational analysis) and Bede's sense that human events have meaning beyond what power politics can explain (providential view)."}, {"front": "What is the context of the famous 'sparrow in the mead-hall' passage from Bede's *Ecclesiastical History*?", "back": "It is a reflection offered by a pagan counsellor of King Edwin of Northumbria, debating whether to adopt Christianity."}, {"front": "What universal human longing does the 'sparrow in the mead-hall' passage express, and what does it frame the Gospel as an answer to?", "back": "It expresses the universal human longing for meaning and permanence, framing the Gospel as an answer to that longing."}, {"front": "Who was Caedmon, and what is his significance in English literature?", "back": "Caedmon was the first named English poet, and his hymn, preserved by Bede, is the oldest surviving poem in Old English."}, {"front": "How does Bede's account of Caedmon's poetic gift compare to the Greek tradition of the Muse?", "back": "Both attribute poetry to external divine inspiration, making the poet a vessel. However, Caedmon's inspiration is Christianized (from a divine visitor in a dream) and highlights divine grace given to the undeserving, unlike the professional invocation of the Muse by Homer."}, {"front": "Who was Einhard, and what was the title of his most famous work?", "back": "Einhard (c. AD 770–840) was a scholar at Charlemagne's court, and his most famous work is *Vita Karoli* (*Life of Charlemagne*)."}, {"front": "On what classical work did Einhard model his *Life of Charlemagne*?", "back": "He modeled it on Suetonius' *Lives of the Twelve Caesars*, a deliberate act of Carolingian Renaissance culture."}, {"front": "What aspects of Charlemagne's character and daily life does Einhard's biography highlight?", "back": "He details Charlemagne's physical appearance, temperate eating and drinking habits, linguistic abilities (Latin proficiency, Greek understanding), and his late, unsuccessful attempts to learn to write."}, {"front": "What is one key difference between Einhard's biographical emphasis on Charlemagne and Plutarch's emphasis on Roman heroes?", "back": "Einhard emphasizes Charlemagne's personal piety, love of the church, and table habits, while Plutarch focuses on the moral exemplar as a pattern for all citizens."}, {"front": "What was Gregory the Great's *Pastoral Care* (Regula Pastoralis), and what was its purpose?", "back": "It was a handbook for bishops, instructing them on how to teach and guide the diverse people in their care."}, {"front": "How did King Alfred the Great demonstrate the importance of Gregory the Great's *Pastoral Care* in England?", "back": "He translated it into Old English in the 9th century and sent a copy to every bishop in his kingdom."}, {"front": "What distinctly Christian vision of leadership does Gregory the Great's *Pastoral Care* articulate?", "back": "It represents a vision where authority is exercised as service."}, {"front": "According to Gregory the Great, why is a leader's sin particularly damnable if they hold a title of holiness?", "back": "Because no one presumes to take to task a man honored with sanctity, their position protects them from correction, making their sin more damnable."}, {"front": "How did the historical understanding of classical historians (Thucydides, Livy) differ from that of Bede, Einhard, and Gregory?", "back": "Classical historians wrote as observers of human nature, seeking patterns of power and ambition, while Bede, Einhard, and Gregory understood history as providential, guided by God's determined end."}, {"front": "How long did the providential view of history, championed by Bede, Einhard, and Gregory, dominate Western historical writing?", "back": "This providential view would dominate Western historical writing until the Renaissance."}, {"front": "In what way do Bede's 'sparrow passage' and Augustine's 'restless heart' concept relate?", "back": "Both express a longing for something beyond this life and frame Christianity as the answer, though in different registers (Bede's is communal and narrative; Augustine's is philosophical and introspective)."}, {"front": "What common quality characterized the works of Bede, Einhard, and Gregory the Great during a time when such qualities were rare?", "back": "They each produced literate, thoughtful work, consciously writing against the grain of their times."}, {"front": "What biographical detail about Charlemagne, included by Einhard, suggests he was not a pure flatterer?", "back": "Einhard notes Charlemagne's failure to learn to write despite great effort, a detail a pure flatterer would likely omit."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
