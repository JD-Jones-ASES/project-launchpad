<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities I &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Name three literary masterpieces from the period discussed (Dark Ages to Charlemagne), along with their authors.", "back": "Bede's Ecclesiastical History, Einhard's Life of Charlemagne, and Gregory the Great's Pastoral Care."}, {"front": "What unique quality characterized the authors Bede, Einhard, and Gregory the Great compared to their contemporaries?", "back": "They consciously wrote literate, thoughtful work when such qualities were rare, essentially 'against the grain of their times'."}, {"front": "Who was the Venerable Bede and what was his most significant work?", "back": "Bede (c. AD 673–735) was a monk from Wearmouth-Jarrow; his most significant work is Ecclesiastical History of the English People, finished in AD 731."}, {"front": "What makes Bede's Ecclesiastical History of the English People a crucial historical source?", "back": "It is the primary historical source for early English Christianity and one of the finest works of historical writing from the entire medieval period."}, {"front": "Describe Bede's method as a historian.", "back": "Bede identified his sources, distinguished between eyewitness testimony and hearsay, and acknowledged uncertainty, a method closer to Thucydides than most medieval chroniclers."}, {"front": "Which widespread dating system did Bede establish?", "back": "He established the AD (Anno Domini) system, counting years from the Incarnation of Christ, which became standard throughout the West."}, {"front": "In what significant ways were Bede and Thucydides similar as historians?", "back": "Both took their craft seriously, sought and cross-checked witnesses, acknowledged the limits of their knowledge, and wrote to explain not just 'what' happened but 'why'."}, {"front": "How did Thucydides understand the primary driving force of history?", "back": "For Thucydides, history is driven by human nature: the desire for power, fear of rivals, and the calculations of self-interest."}, {"front": "How did Bede understand the primary driving force of history?", "back": "For Bede, history is providential: God is guiding human events toward his purposes, seeing events like the conversion of the English as chapters in salvation history."}, {"front": "What is the significance of the 'sparrow in the mead-hall' passage from Bede's Ecclesiastical History?", "back": "Spoken by a pagan counselor, it beautifully expresses the universal human longing for meaning and permanence, framing the Gospel as an answer to that longing."}, {"front": "Who was Caedmon, and what is his significance in English literature?", "back": "Caedmon was the first named English poet, and his hymn, preserved by Bede, is the oldest surviving poem in Old English."}, {"front": "How does Bede's account frame Caedmon's acquisition of poetic talent?", "back": "Bede frames Caedmon's gift of poetry as divine inspiration received in a dream, a distinctly Christian counterpart to the Greek concept of the Muse."}, {"front": "Compare and contrast Caedmon's story of divine inspiration with the Greek tradition of the Muse.", "back": "Both traditions view poetry as a divine gift and the poet as a vessel. However, Caedmon receives the gift despite his inability and reluctance, emphasizing Christian grace given to the undeserving, unlike the professional invocation of the Muse."}, {"front": "Who was Einhard and what was his most notable work?", "back": "Einhard (c. AD 770–840) was a scholar at Charlemagne's court, known for his Vita Karoli (Life of Charlemagne), written after the emperor's death."}, {"front": "What classical work did Einhard use as a model for his Life of Charlemagne?", "back": "He modeled it on Suetonius' Lives of the Twelve Caesars, a deliberate act of Carolingian Renaissance culture imitating classical forms."}, {"front": "Based on Einhard's account, what were some key personal traits of Charlemagne?", "back": "Charlemagne was temperate in eating and especially drinking, spoke Latin fluently, understood Greek, but struggled and ultimately failed to learn to write late in life."}, {"front": "How did Einhard's biographical emphasis differ from that of classical biographers like Plutarch?", "back": "Einhard emphasized Charlemagne's personal piety, his love of the church, and his table habits, whereas Plutarch focused on the moral exemplar as a pattern for all citizens."}, {"front": "Who was Gregory the Great and what was the purpose of his Regula Pastoralis?", "back": "Gregory I (Pope Gregory the Great) wrote Regula Pastoralis (Pastoral Care) as a handbook for bishops, instructing them on how to teach and guide the diverse people in their care."}, {"front": "What is the significance of King Alfred the Great's interaction with Gregory the Great's Pastoral Care?", "back": "King Alfred translated it into Old English in the 9th century and sent a copy to every bishop in his kingdom, highlighting its importance for Christian leadership."}, {"front": "What distinct vision of leadership does Gregory the Great's Pastoral Care present?", "back": "It represents a distinctly Christian vision of leadership where authority is exercised as service, emphasizing that a pastor must lead by example."}, {"front": "According to Gregory the Great, what kind of leader does the most harm in the Church?", "back": "One who, having the title or rank of holiness, acts evilly, because respect for their position protects them from correction, making their sin more damnable."}, {"front": "How did medieval historians like Bede, Einhard, and Gregory understand history, in contrast to classical historians like Thucydides and Livy?", "back": "They understood history as providential, believing God is guiding human events toward an end He has determined, rather than simply as a record of human nature and power struggles."}, {"front": "What impact did the providential view of history have on Western historical writing?", "back": "This providential view of history dominated Western historical writing from the early medieval period until the Renaissance."}, {"front": "Compare the 'register' or approach of Bede's sparrow passage to Augustine's concept of the 'restless heart' (from Confessions).", "back": "Augustine's passage is philosophical, personal, and introspective, while Bede's is a narrative story told in a communal setting (a mead-hall)."}, {"front": "What shared human longing is expressed in both Bede's 'sparrow passage' and Augustine's concept of the 'restless heart'?", "back": "Both passages express a longing for something beyond this earthly life and frame Christianity as the answer to that longing."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
