<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 20, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "For someone who hasn't started investing yet, what is the most important message regarding timing?", "back": "The best time to start is right now, regardless of age."}, {"front": "How does the math of compound growth relate to delaying investment and maintaining hope?", "back": "Compound growth is \"ruthless about delay\" because time is crucial, but \"honest about hope\" because starting late is still dramatically better than not starting at all."}, {"front": "Is it still worthwhile to start investing for retirement at ages like 40, 45, or even 50?", "back": "Yes, starting at these ages is dramatically better than not starting at all, as any investment leverages compound growth over time."}, {"front": "Marcus, age 42, starts investing $400/month at a 7% annual return. Approximately how much will he accumulate by age 65?", "back": "He will accumulate approximately $272,880."}, {"front": "Even if a late starter like Marcus doesn't reach $1 million, why is his accumulated amount of $272,880 still significant?", "back": "It's \"far better than nothing,\" and combined with Social Security, home equity, and lifestyle adjustments, it can make a real difference in retirement."}, {"front": "How does increasing monthly contributions affect a late starter's final retirement savings?", "back": "Increasing contributions significantly boosts the final amount. For example, Marcus's $400/month yielded $272,880, while $1,000/month would yield $682,200."}, {"front": "What is the most effective primary strategy for late starters to build retirement wealth quickly?", "back": "Maximize contributions immediately, getting as close to annual limits as possible, which requires living below one's means."}, {"front": "What are the general annual contribution limits for a 401(k) and an IRA that a late starter should aim for?", "back": "$23,000/year for a 401(k) and $7,000/year for an IRA (2024 limits mentioned)."}, {"front": "Define \"catch-up contributions\" and explain why they exist.", "back": "Catch-up contributions are additional amounts the IRS allows individuals aged 50 and over to contribute to retirement accounts, specifically recognizing that many people start saving late."}, {"front": "For someone aged 50 or older, what are the additional annual catch-up contribution limits for a 401(k) and an IRA?", "back": "An extra $7,500 per year for a 401(k) (total $30,500) and an extra $1,000 per year for an IRA (total $8,000) (2024 limits mentioned)."}, {"front": "Why is aggressive reduction of expenses a crucial strategy for late starters?", "back": "With fewer years for compound growth, late starters need to make harder trade-offs and higher contributions, which necessitates significant cuts to discretionary spending, car expenses, or even housing."}, {"front": "What are the two main benefits of working 2-3 extra years for a late starter's retirement plan?", "back": "It adds more years of contributions to their accounts AND reduces the number of years they need to fund from their retirement savings."}, {"front": "How can considering part-time income in early retirement (e.g., ages 65-70) help a late starter?", "back": "It reduces the amount they must draw from investments, allowing the retirement account to continue compounding for several more years."}, {"front": "Why is minimizing investment fees particularly important for late starters?", "back": "With less time for compound growth, every percentage point of fees matters more because there is less time to recover from their drag on returns."}, {"front": "What type of investment funds are generally recommended for late starters to minimize fees, and what are their typical expense ratios?", "back": "Low-cost index funds, with expense ratios typically ranging from 0.03–0.20%, are recommended over actively managed funds (0.5–1.5% or higher)."}, {"front": "According to the \"moneytip,\" what is the best financial move anyone can make, regardless of their age?", "back": "To start investing today."}, {"front": "What is the consequence of delaying investment by even a single month?", "back": "Every month of waiting costs compound growth that can never be recovered."}, {"front": "What unique advantage do students have regarding investing that a 40-year-old cannot \"buy back\"?", "back": "Time, which is the most critical factor for maximizing compound growth."}, {"front": "A late starter and an early starter contribute nearly the same total amount over their careers, yet the early starter ends up with significantly more wealth. What is the fundamental reason for this disparity?", "back": "The fundamental reason is purely compound growth, which requires time to work its magic effectively, magnifying early contributions over many decades."}, {"front": "What common \"perfectionism trap\" should individuals avoid when considering investing?", "back": "The trap of thinking, \"I can't afford to invest the right amount, so I won't invest at all,\" which leads to the most costly financial mistake."}, {"front": "Why is investing even a small amount, such as $25 per month, infinitely better than not investing at all?", "back": "Even a small amount starts the compounding process, and you can always increase contributions later, but you can't reclaim lost years of compounding."}, {"front": "What crucial element of investing, once skipped, can never be recovered?", "back": "The compounding years (time)."}, {"front": "In the context of maximizing contributions, what does \"living below your means\" entail for late starters?", "back": "It means prioritizing retirement savings over other spending and making sacrifices to free up more money for investments."}, {"front": "How can retiring at age 67 instead of 65 significantly improve a late starter's retirement picture?", "back": "It extends the period for contributions and reduces the period for withdrawals by 2 years, substantially boosting total savings and reducing the burden on retirement funds."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
