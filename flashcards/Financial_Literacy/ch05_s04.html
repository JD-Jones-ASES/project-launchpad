<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does FICA stand for?", "back": "FICA stands for the Federal Insurance Contributions Act."}, {"front": "What is the primary difference in funding between FICA taxes and federal/state income taxes?", "back": "FICA taxes fund two specific programs (Social Security and Medicare), while federal and state income taxes fund general government operations."}, {"front": "Who is required to pay FICA taxes?", "back": "All W-2 employees are required to pay FICA taxes on every paycheck, with no exceptions or opt-out options."}, {"front": "What is the purpose of the Social Security program?", "back": "Social Security provides monthly income benefits to retired workers, workers who become disabled, and surviving family members of deceased workers who paid into the system."}, {"front": "What is the employee's Social Security tax rate?", "back": "The employee's Social Security tax rate is 6.2% of gross pay."}, {"front": "What is the employer's matching contribution rate for Social Security tax?", "back": "The employer also pays an additional 6.2% on behalf of the employee, matching the employee's contribution."}, {"front": "What is the total percentage of gross pay contributed to Social Security on an employee's behalf (combining employee and employer contributions)?", "back": "The total percentage contributed to Social Security is 12.4% (6.2% employee + 6.2% employer)."}, {"front": "Define the Social Security Wage Base.", "back": "The Social Security wage base is the maximum annual earnings on which the 6.2% Social Security tax is collected. Earnings above this amount are not subject to Social Security tax."}, {"front": "For 2024, approximately what was the Social Security Wage Base?", "back": "For 2024, the Social Security wage base was approximately $168,600."}, {"front": "What is the purpose of the Medicare program?", "back": "Medicare provides health insurance coverage for Americans aged 65 and older and for people with certain disabilities."}, {"front": "What is the employee's Medicare tax rate?", "back": "The employee's Medicare tax rate is 1.45% of gross pay."}, {"front": "What is the employer's matching contribution rate for Medicare tax?", "back": "The employer also pays an additional 1.45% on behalf of the employee, matching the employee's contribution."}, {"front": "What is a key difference between the Social Security tax and the Medicare tax regarding a wage base cap?", "back": "Unlike Social Security tax, Medicare tax applies to all earnings; there is no upper wage limit or cap."}, {"front": "What is the total FICA deduction percentage from a W-2 employee's paycheck?", "back": "The total FICA deduction from a W-2 employee's paycheck is 7.65% (6.2% Social Security + 1.45% Medicare)."}, {"front": "If Samira's gross monthly pay is $2,240, what is her Social Security tax deduction for that month?", "back": "Social Security Tax = $2,240 × 0.062 = $138.88."}, {"front": "If Samira's gross monthly pay is $2,240, what is her Medicare tax deduction for that month?", "back": "Medicare Tax = $2,240 × 0.0145 = $32.48."}, {"front": "If Samira's gross monthly pay is $2,240, what is her total FICA deduction for that month?", "back": "Total FICA = 138.88 (SS) +32.48 (Medicare) = 171.36. (Alternatively,2,240 × 0.0765 = $171.36)."}, {"front": "When and why was the Social Security program created?", "back": "It was created in 1935 during the Great Depression to provide reliable retirement income for elderly Americans who often had no reliable income."}, {"front": "What is the significance of Social Security for most American retirees today?", "back": "Social Security is the single largest source of income for most American retirees; about half rely on it for 50% or more of their income."}, {"front": "How do FICA taxes differ for gig workers or self-employed individuals compared to W-2 employees?", "back": "Gig workers and self-employed individuals pay both the employee and employer portions of FICA taxes, which is known as self-employment tax."}, {"front": "What is the combined self-employment tax rate for Social Security and Medicare for gig workers?", "back": "The combined self-employment tax rate is 15.3% (12.4% for Social Security + 2.9% for Medicare) on net business income."}, {"front": "What financial advice is given to gig workers regarding taxes?", "back": "Gig workers should always set aside at least 25-30% of their gig income for taxes, including self-employment taxes."}, {"front": "What is the Additional Medicare Tax, and who pays it?", "back": "The Additional Medicare Tax is an extra 0.9% tax that applies to individuals earning over $200,000 per year, paid only by the employee."}, {"front": "What happens to the Social Security tax deduction for an employee whose annual earnings exceed the Social Security Wage Base?", "back": "Once an employee's annual earnings exceed the Social Security Wage Base, no further Social Security tax is deducted from their pay for that calendar year."}, {"front": "How do the total contributions to Social Security and Medicare compare (employee vs. employer)?", "back": "For both Social Security and Medicare, the employer's contribution rate matches the employee's contribution rate, effectively doubling the amount paid into the system for the employee's benefit."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
