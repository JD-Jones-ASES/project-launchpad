<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 24, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overarching principle for coupons and cash-back offers to genuinely save you money?", "back": "They must be used 'correctly,' meaning they save money on items you would have bought anyway, at the quantity you need, and make them cheaper than alternatives."}, {"front": "List the three conditions under which a deal truly saves money.", "back": "1. You were going to buy the item anyway. 2. The deal makes it cheaper than the next-best alternative. 3. You buy only the quantity you actually need."}, {"front": "Provide an example of a deal that genuinely saves money.", "back": "Using a $1.50 off coupon for one bag of Brand X coffee that you regularly buy, or 30% off chicken breasts you were going to purchase this week."}, {"front": "Explain 'The Coupon Trap' using the provided example of Sarah buying her favorite snack.", "back": "Sarah spent $8.00 on 3 snack packages to save $1.00 with a coupon. However, she normally buys only one for $3.00, meaning the coupon caused her to spend $5.00 more than she would have, tying up money in unneeded items."}, {"front": "What is the key rule to determine if a coupon is a true financial saving?", "back": "A coupon is only a savings if it reduces the price of something you were buying anyway, at a quantity you actually need."}, {"front": "How do cash-back apps and programs typically work?", "back": "You buy a qualifying product, submit a receipt or link your card, and receive a small cash-back payment (usually 1–10%) after the fact."}, {"front": "When are cash-back programs most effective for providing genuine savings?", "back": "They are most effective on products you buy regularly at stores you already shop at."}, {"front": "What are some common caveats or 'watch-for' points associated with cash-back programs?", "back": "Minimum payout thresholds (e.g., needing $20 accumulated), expiration of earnings, and requirements to create accounts that may lead to marketing lists."}, {"front": "Why is it important to 'compare the sale price—not just the discount' before using a deal?", "back": "A large discount percentage is meaningless if the starting price was inflated. The 'sale price' might still be more expensive than the everyday price at a competing store."}, {"front": "Under what specific condition can buying gift cards at a discount be a legitimate way to save money?", "back": "Only for stores you genuinely shop at regularly."}, {"front": "What are the three main cautions consumers should observe when considering buying discounted gift cards?", "back": "1. Only buy for stores you genuinely use. 2. Buy only from reputable resellers to avoid fraud. 3. Do not stockpile large balances due to the risk of retailer business failure."}, {"front": "Analyze the 'Buy 2 Get 1 Free' offer: Is the 'free' item truly free if you only needed one item?", "back": "No. If you only needed one, the deal causes you to buy three, spending twice what you planned. The 'free' item is effectively bundled into the purchase requirement, not a true freebie."}, {"front": "What critical question should you ask yourself to determine if a 'Buy 2 Get 1 Free' or similar deal is actually saving you money?", "back": "'Would I have spent this money without the deal?' If the answer is no, the deal is costing you money."}, {"front": "Define 'Price Anchoring' in the context of retail sales tactics.", "back": "Price anchoring is when retailers use inflated original prices (e.g., 'Was $199.99') to make a discounted 'sale price' seem more impressive, even if the item was rarely sold at the higher price."}, {"front": "How can consumers use knowledge of sale timing to their advantage?", "back": "Knowing when specific items (e.g., mattresses in May/Nov, TVs around major sporting events, winter clothing in Jan-Feb, cars at month-end) are typically cheapest allows shoppers to plan purchases for maximum savings."}, {"front": "If you normally spend $60 on groceries and a cash-back app offers 8% back on a brand of specialty cheese you don't typically buy, is purchasing that cheese for the cash back a genuine saving? Why or why not?", "back": "No, it's not a genuine saving. You are spending money you wouldn't have otherwise, just to receive a small percentage back. It doesn't meet the condition of buying something you were going to buy anyway."}, {"front": "You see a product advertised as 'Was $200, Now $120.' What immediate action should you take to verify if it's a real deal?", "back": "Immediately compare the 'Now' price to the price of the same or equivalent item at competing stores, and research if the 'Was' price reflects a genuine previous selling price."}, {"front": "Why is it generally advisable not to stockpile large balances on discounted gift cards?", "back": "Gift card balances can be lost if the retailer goes out of business, making it a risky investment to hold large amounts."}, {"front": "A store has a '25% off all electronics' sale. Why might this discount 'mean nothing'?", "back": "It means nothing if the starting prices were inflated. The discounted price might still be higher than the everyday price at another store or not genuinely below fair market value."}, {"front": "You're considering a 'Buy One Get One Free' deal for a cleaning product. What specific thought process should you use to decide if it's a true saving?", "back": "Ask yourself: Do I genuinely need two of this product right now, or will I use both within their shelf life? If not, you're spending money on an item you don't need or won't use efficiently, making it not a true saving."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
