<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What determines money's usefulness?", "back": "Money's usefulness is determined by what it does (its functions), not by what it is made of (paper, metal, electrons)."}, {"front": "List the three core functions that any good form of money must perform.", "back": "The three core functions are: Medium of Exchange, Store of Value, and Unit of Account."}, {"front": "Define 'Medium of Exchange'.", "back": "A medium of exchange is anything that is widely accepted as payment for goods and services, simplifying trade by breaking it into two steps."}, {"front": "How does money, as a medium of exchange, solve the complexities of a barter system?", "back": "Money breaks the trading problem into two separate steps: (1) sell your labor or goods for money, and (2) use that money to buy what you want, eliminating the need for a 'double coincidence of wants'."}, {"front": "What are the four essential properties for money to work effectively as a medium of exchange?", "back": "For money to work as a medium of exchange, it must be widely accepted, portable, divisible, and durable."}, {"front": "Why would milk fail as an effective medium of exchange, despite having real value?", "back": "Milk fails because it is not durable (spoils quickly), not easily divisible in a standard way, and not portable in large quantities."}, {"front": "Define 'Store of Value'.", "back": "A store of value is something that holds its worth over time, allowing people to save it today and use it in the future."}, {"front": "How does money's function as a store of value benefit individuals and the economy?", "back": "It allows people to save for the future, plan for expenses, and delay spending, enabling long-term financial stability."}, {"front": "Contrast saving wealth in a barter economy versus using money as a store of value.", "back": "In a barter economy, wealth stored as perishable goods (like vegetables or fish) would rot. Money, like gold coins or stable paper/digital currency, does not spoil, rust, or decay."}, {"front": "What factor can erode money's effectiveness as a store of value?", "back": "Inflation, especially rapid inflation, can erode money's purchasing power too quickly, diminishing its ability to store value."}, {"front": "How do savings accounts exemplify money's 'store of value' function?", "back": "Savings accounts allow individuals to deposit money earned today and access it later (next week, next year, or decades from now), demonstrating money's ability to retain worth over time."}, {"front": "What is a more powerful way to use money's store-of-value function than simply keeping it in a savings account?", "back": "Investing is a more powerful way to use the store-of-value function, as it allows money to grow over time, counteracting the erosive effects of inflation."}, {"front": "Define 'Unit of Account'.", "back": "A unit of account is a standard numerical unit used to measure and express the value of goods, services, debts, and wealth, providing a common language for prices."}, {"front": "What is the unit of account in the United States?", "back": "In the United States, the dollar ($) is the unit of account."}, {"front": "How does the 'unit of account' function simplify economic comparisons that would be difficult in a barter system?", "back": "It collapses the complexity of comparing countless different goods and services into a single number (price), allowing direct comparisons of value across diverse items (e.g., a car vs. college tuition)."}, {"front": "List two practical applications of money functioning as a unit of account.", "back": "1. Comparing the value of very different things (e.g., goods, services, investments). 2. Keeping financial records (tracking assets, debts, profits). 3. Making contracts (loans, leases, wages)."}, {"front": "Why is the unit of account function considered one of money's most economically powerful features?", "back": "It provides a clear, consistent measuring stick for value, which is crucial for rational economic decision-making, accounting, and the functioning of markets."}, {"front": "What happens to the unit of account function during hyperinflation?", "back": "During hyperinflation, prices change so rapidly that money loses its meaning as a measuring stick. Businesses often switch to a stable foreign currency as their unit of account, even if they use local currency for transactions."}, {"front": "What is required for a healthy monetary system regarding the three functions of money?", "back": "A healthy monetary system performs all three functions (medium of exchange, store of value, unit of account) simultaneously and effectively."}, {"front": "What are the consequences if money stops performing one or more of its core functions?", "back": "The effects on ordinary people and the economy can be devastating, leading to economic instability and a breakdown of trade and trust."}, {"front": "What role do governments and central banks play in relation to money's functions?", "back": "Governments and central banks work hard to keep money stable and trustworthy, ensuring it can effectively perform all three of its core functions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
