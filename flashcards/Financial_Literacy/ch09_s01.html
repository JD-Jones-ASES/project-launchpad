<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of an emergency fund?", "back": "An emergency fund is money set aside specifically to cover large, unexpected expenses or to provide income during a job loss or income disruption. It is held in a separate, accessible savings account, not invested, and not mixed with regular spending money."}, {"front": "What is the primary purpose of an emergency fund?", "back": "To provide financial security and peace of mind by being prepared for life's inevitable unexpected and expensive events."}, {"front": "Why is an emergency fund considered essential, even if you follow a strict budget?", "back": "Because while their timing is unpredictable, unexpected and expensive events (like car breakdowns, medical bills, or job loss) are absolutely predictable in their existence. A budget alone cannot account for these surprises."}, {"front": "In what type of account should an emergency fund be held?", "back": "It should be held in a separate, accessible savings account, not invested, and not mixed with regular spending money."}, {"front": "Explain the 'debt cycle' that can occur without an emergency fund.", "back": "The debt cycle is when emergencies create debt, debt creates financial strain, and financial strain reduces your ability to prepare for the next emergency, which creates more debt."}, {"front": "How does an emergency fund 'break' the debt cycle?", "back": "An emergency fund breaks the debt cycle at the first step by providing the money to cover unexpected expenses without having to incur debt, thus preventing the subsequent financial strain and difficulty in preparing for future emergencies."}, {"front": "Compare the financial outcomes for Marcus (with an emergency fund) and Sofia (without) when both faced a $900 furnace repair.", "back": "Marcus used his fund, paid $900, incurred no interest, and planned to rebuild his savings quickly. Sofia put it on a credit card, paid over $280 in interest, and took over three years to pay it off, costing her over $1,180 total."}, {"front": "What are the three common characteristics that define a 'true' financial emergency?", "back": "True emergencies are unexpected, necessary, and would cause serious harm if unaddressed."}, {"front": "Give examples of situations that are NOT considered true financial emergencies for an emergency fund.", "back": "Optional spending opportunities (e.g., concert tickets, items on sale, birthday gifts) or anticipated expenses that are better handled by a sinking fund."}, {"front": "What is identified as the biggest threat to an emergency fund?", "back": "Yourself – the temptation to dip into the fund for things that 'sort of' feel like emergencies but are not truly critical. Using it for non-emergencies makes it unavailable for real ones."}, {"front": "Why is using a credit card as a 'backup' for emergencies considered a costly misunderstanding?", "back": "Credit cards typically carry high interest rates, turning an emergency into a debt event with significant additional costs and prolonged financial strain. A credit card should only be a last resort, not the plan."}, {"front": "What is the recommended first goal for someone with no savings when starting an emergency fund?", "back": "A starter emergency fund of $500 to $1,000."}, {"front": "What types of situations can a starter emergency fund typically handle?", "back": "Many common minor emergencies such as a minor car repair, a medical copay, or a broken appliance, without needing to use a credit card."}, {"front": "After establishing a starter emergency fund, what is the next financial goal for the emergency fund?", "back": "To work toward building a full 3-6 month emergency fund, while also managing other financial goals."}, {"front": "Is a $400 car engine light repair a legitimate use of an emergency fund? Explain why.", "back": "Yes. It is unexpected, necessary for transportation (preventing serious harm or disruption to daily life), and would cause serious harm if unaddressed."}, {"front": "Is buying a jacket on a 50%-off sale a legitimate use of an emergency fund? Explain why.", "back": "No. It is an optional spending opportunity, not a necessary expense, and does not prevent serious harm if unaddressed. It is a non-emergency."}, {"front": "Is covering rent after losing your job a legitimate use of an emergency fund? Explain why.", "back": "Yes. Job loss is unexpected, covering rent is necessary to avoid serious harm (like eviction), and the fund is intended to provide income during disruption."}, {"front": "Is replacing a broken laptop right before final exams a legitimate use of an emergency fund? Explain why.", "back": "Yes. This is an unexpected and necessary expense that would cause serious harm (academic failure) if unaddressed, making it a true emergency."}, {"front": "Is buying a friend a birthday gift when you forgot to save for it a legitimate use of an emergency fund? Explain why.", "back": "No. It is an anticipated (even if forgotten) and optional expense, not preventing serious harm. It is a non-emergency."}, {"front": "Is an emergency dental visit for a severe tooth infection a legitimate use of an emergency fund? Explain why.", "back": "Yes. It's unexpected, necessary for health, and would cause serious harm (severe pain, worsening infection) if unaddressed, making it a true emergency."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
