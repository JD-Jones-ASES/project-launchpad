<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the key difference between simple interest and compound interest?", "back": "Simple interest is earned only on your original principal. Compound interest is earned on your principal AND on the interest you have already earned."}, {"front": "Define \"Compound Interest.\"", "back": "Compound interest is interest calculated on both the original principal and the accumulated interest from previous periods. Each time interest is added, that new (larger) balance becomes the basis for the next interest calculation."}, {"front": "Explain the core concept behind \"your interest earns interest\" with compound interest.", "back": "It means that the interest accumulated in previous periods is added to the principal, and subsequent interest calculations are then based on this larger total, allowing interest itself to generate further interest."}, {"front": "If you start with $1,000 at 6% annual interest, how much will you have after Year 1 with annual compounding?", "back": "$1,000.00 * 1.06 = $1,060.00"}, {"front": "Continuing from Year 1, how much will you have after Year 2 if $1,000 is invested at 6% annual interest with annual compounding?", "back": "You earn 6% on the Year 1 balance ($1,060.00): $1,060.00 * 1.06 = $1,123.60."}, {"front": "After 3 years, how much more does a compound interest account yield compared to a simple interest account, given a starting principal of $1,000 at 6% annual interest?", "back": "The compound interest account yields $1,191.02, while the simple interest account yields $1,180.00, a difference of $11.02 ($11.02 more with compound interest)."}, {"front": "Why does the financial 'gap' between compound interest and simple interest accounts grow larger over many years?", "back": "Because with compound interest, the base on which interest is calculated (principal + accumulated interest) continuously increases, leading to exponential growth that simple interest cannot match."}, {"front": "Write down the compound interest formula.", "back": "A = P * (1 + r/n)^(nt)"}, {"front": "In the compound interest formula, what does 'A' represent?", "back": "'A' represents the final amount (the original principal plus all accumulated interest)."}, {"front": "In the compound interest formula, what does 'P' represent?", "back": "'P' represents the principal (the starting amount or initial investment)."}, {"front": "In the compound interest formula, what does 'r' represent, and in what format should it be used?", "back": "'r' represents the annual interest rate, and it must be expressed as a decimal (e.g., 6% becomes 0.06)."}, {"front": "In the compound interest formula, what does 'n' represent, and what are its common values?", "back": "'n' represents the number of compounding periods per year. Common values include 1 for annual, 12 for monthly, and 365 for daily."}, {"front": "In the compound interest formula, what does 't' represent?", "back": "'t' represents the time in years."}, {"front": "What does an exponent like $(1.06)^{10}$ mean in the context of the compound interest formula?", "back": "It means the base number, 1.06, is multiplied by itself 10 times. It represents the annual growth factor applied over 10 compounding periods (if compounding annually)."}, {"front": "How does increasing the compounding frequency (e.g., from annual to monthly or daily) affect the final amount earned on an investment?", "back": "More frequent compounding leads to a higher final amount because interest is added and begins earning its own interest sooner, accelerating growth."}, {"front": "You deposit $1,000 at 6% annual interest for 10 years. Briefly compare the final amounts for annual vs. monthly compounding.", "back": "Monthly compounding ($1,819.40) yields a higher final amount than annual compounding ($1,790.85), demonstrating the benefit of more frequent compounding."}, {"front": "When comparing savings accounts with the same stated Annual Percentage Rate (APR), what should an investor prioritize regarding compounding frequency?", "back": "An investor should prioritize an account that compounds interest more frequently (e.g., monthly or daily) as this will lead to faster money growth and a higher final balance."}, {"front": "Calculate the balance after 3 years if $2,000 is deposited at a 5% annual interest rate with annual compounding.", "back": "A = $2,000 * (1 + 0.05/1)^(1*3) = $2,000 * (1.05)^3 = $2,000 * 1.157625 = $2,315.25"}, {"front": "Without calculating, would monthly compounding give a higher or lower balance than annual compounding for a $2,000 deposit at 5% annual interest over 3 years? Explain why.", "back": "Monthly compounding would give a higher balance. This is because interest is added to the principal more often throughout the year, allowing that interest to earn subsequent interest for a longer duration within the 3-year period."}, {"front": "What is meant by \"the power of compounding\"?", "back": "The power of compounding refers to the exponential growth of an investment over time, where the interest earned is continually added to the principal, causing subsequent interest to be calculated on an ever-increasing base, leading to significant wealth accumulation."}, {"front": "How does the example of a $1,000 investment at 6% over 30 years illustrate the power of compounding?", "back": "It shows that after 30 years, the compound account ($5,743.49) is vastly larger than the simple interest account ($2,800.00), highlighting how compounding generates significantly more wealth over long periods."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
