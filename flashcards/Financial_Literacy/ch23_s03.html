<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 23, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a Power of Attorney (POA)?", "back": "A legal document where the principal gives an agent (attorney-in-fact) legal authority to act on their behalf in financial and legal matters."}, {"front": "In a Power of Attorney document, who is the 'principal' and who is the 'agent'?", "back": "The 'principal' is the person granting the authority, and the 'agent' (or attorney-in-fact) is the person receiving the authority to act on the principal's behalf."}, {"front": "What is the critical distinction between a 'General Power of Attorney' and a 'Durable Power of Attorney'?", "back": "A General Power of Attorney automatically becomes invalid if the principal becomes incapacitated, while a Durable Power of Attorney remains effective (or only takes effect) if the principal becomes incapacitated."}, {"front": "List three problems that could arise if you become incapacitated without a Durable Power of Attorney in place.", "back": "1. No one can access your bank accounts or pay your bills. 2. No one can manage your investments or sell property. 3. Your family would need to go to court to be appointed a conservator, which is expensive and time-consuming."}, {"front": "How does a Durable Power of Attorney benefit someone who becomes incapacitated?", "back": "It allows a trusted individual (the agent) to manage the incapacitated person's financial and legal affairs without requiring court involvement, which avoids a costly and time-consuming conservatorship process."}, {"front": "Describe the purpose and typical duration of a 'Limited (Special) Power of Attorney'.", "back": "A Limited Power of Attorney grants authority for a specific, single task (e.g., selling a particular property) and expires automatically once that task is completed."}, {"front": "Define a Healthcare Directive. What are other common names for this document?", "back": "A Healthcare Directive is a legal document specifying your wishes for medical treatment in situations where you cannot communicate. It's also known as a living will or advance directive."}, {"front": "What types of critical medical decisions can a Healthcare Directive address?", "back": "It can address preferences for life-sustaining measures (ventilators, feeding tubes), pain management, and organ donation, particularly when there's no reasonable chance of recovery."}, {"front": "What happens regarding medical decisions if a person becomes incapacitated and does not have a Healthcare Directive?", "back": "Medical decisions are made by healthcare providers in consultation with the closest available family members, who may disagree or not know the incapacitated person's actual wishes."}, {"front": "What is a Healthcare Proxy?", "back": "A Healthcare Proxy (or healthcare power of attorney) is a legal document designating a specific person to make medical decisions on your behalf if you are unable to do so yourself."}, {"front": "Differentiate between a Healthcare Directive and a Healthcare Proxy.", "back": "A Healthcare Directive states your specific wishes for medical treatment. A Healthcare Proxy designates a person to make medical decisions for you based on their understanding of your wishes and values."}, {"front": "What are three important qualities to consider when choosing someone to be your healthcare proxy?", "back": "The person should be someone you: 1. Trust completely, 2. Who knows your values and wishes regarding medical care, and 3. Is willing and able to advocate for you in a medical setting."}, {"front": "Why is it generally recommended that your financial Power of Attorney and your Healthcare Proxy be different individuals?", "back": "To avoid potential conflicts of interest, as one person might have to make decisions about finances and medical care simultaneously, which could create complex ethical and practical dilemmas."}, {"front": "Why is it particularly important for young adults (age 18 and older) to have Durable Powers of Attorney and Healthcare Directives?", "back": "Accidents and sudden illnesses can happen at any age. Once 18, parents lose automatic legal rights to access medical records or make decisions, even in emergencies, making these documents crucial for legal authority."}, {"front": "What legal right do parents lose regarding their child's medical care once the child turns 18?", "back": "Parents lose the automatic legal right to access their adult child's medical records or make medical decisions for them, even in a medical emergency."}, {"front": "What document is typically required for parents to legally speak with their adult child's doctors about their condition?", "back": "A HIPAA authorization or a Healthcare Proxy is needed for parents to legally access their adult child's medical information and speak with doctors."}, {"front": "For most young adults without complex situations, are Durable Powers of Attorney and Healthcare Proxies expensive or difficult to obtain?", "back": "No, state-specific forms are often available online at no or low cost through state bar associations or health departments, and professional attorney assistance is typically not required for simple situations."}, {"front": "Besides planning for what happens after death, what other crucial aspect of personal planning do Power of Attorney and Healthcare Directives address?", "back": "They address what happens if you are alive but become temporarily or permanently unable to make decisions for yourself due to incapacitation."}, {"front": "If an individual is in a coma and only has a General Power of Attorney, can their agent still manage their finances? Explain why.", "back": "No, a General Power of Attorney automatically becomes invalid if the principal becomes mentally incapacitated, so the agent would lose authority to act on their behalf."}, {"front": "What does the term 'durable' signify when referring to a Power of Attorney?", "back": "'Durable' means the Power of Attorney remains effective (or only becomes effective) even if the principal becomes mentally incapacitated, ensuring continuous management of affairs during a time of need."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
