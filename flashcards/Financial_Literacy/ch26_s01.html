<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 26, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary reason first-time renters are often surprised by moving costs?", "back": "First-time renters often underestimate the significant amount of cash needed upfront, before even paying for furniture or ongoing monthly rent."}, {"front": "List the main categories of upfront costs typically required when renting an apartment.", "back": "Upfront costs include: Security deposit, first month's rent, last month's rent (if applicable), utility deposits, furnishings, and moving costs."}, {"front": "Define a 'security deposit' and explain its purpose.", "back": "A security deposit is usually equal to one or two months' rent. The landlord holds this money during your tenancy and returns it (minus deductions for damage beyond normal wear and tear) when you move out. It is not 'extra' rent, but your money on hold."}, {"front": "Why might a landlord require 'last month's rent' upfront in addition to the first month's rent?", "back": "Many landlords, especially in competitive markets, require both first and last month's rent upfront to secure the lease. This is legal in most states."}, {"front": "Who typically requires utility deposits, and why?", "back": "Some utility companies require a deposit from customers without a credit history to mitigate the risk of unpaid bills."}, {"front": "What is the typical financial range for utility deposits per utility (e.g., electricity, gas)?", "back": "Typical utility deposits range from $50 to $200 per utility."}, {"front": "What are the absolute minimum furnishings needed for a bare apartment, and what budget should be allocated for used/budget items?", "back": "Minimum furnishings include: a bed/mattress, bedding, towels, kitchen essentials (dishes, pots, utensils), basic cleaning supplies, and seating. Budget at least $1,000–$2,000 for used/budget furnishings."}, {"front": "What types of costs are included in 'moving costs,' and what is a typical range for a modest local move?", "back": "Moving costs include truck rental, gas, packing supplies, and potentially professional movers. A modest local move can cost $200–$800 if renting a truck."}, {"front": "According to the financial advisors mentioned, how many months' worth of expenses should one aim to have saved before moving out?", "back": "Financial advisors recommend having 3–6 months of total expenses saved before attempting to move out."}, {"front": "What are the potential negative consequences of underestimating upfront moving costs?", "back": "Underestimating moving costs can lead to unexpected financial shortfalls, forcing first-time renters into credit card debt or borrowing from family."}, {"front": "What is a 'sinking fund,' and why is it recommended for aspiring renters?", "back": "A 'sinking fund' is a dedicated savings account for a specific future expense. For renters, a 'Moving Out' sinking fund helps accumulate the necessary upfront cash for deposits, rent, and furnishings, preventing financial strain at move-in."}, {"front": "What is the recommended target amount to save in a 'Moving Out' sinking fund?", "back": "Target at least 3 months of your expected rent plus $1,500 for furnishings and setup."}, {"front": "Besides rent, list common ongoing monthly costs for renters.", "back": "Common ongoing monthly costs include: Utilities (electric, gas, water), renter's insurance, Internet, groceries and household supplies, and transportation."}, {"front": "What is a typical monthly cost for renter's insurance?", "back": "Renter's insurance often costs $15–$30 per month for substantial coverage."}, {"front": "What is a typical monthly cost for internet service?", "back": "Internet service typically costs $50–$80 per month."}, {"front": "According to the '30% rule,' what monthly gross income is needed to afford a $2,000/month one-bedroom apartment?", "back": "To afford a $2,000/month apartment under the 30% rule, a monthly gross income of at least $6,667 (or an annual salary of roughly $80,000) is needed."}, {"front": "How much cash did Mia need upfront for her $1,000/month apartment, assuming a 1-month security deposit, first and last month's rent, $150 utility deposit, $1,000 for furnishings, and $300 for moving costs?", "back": "Mia needed $4,450 upfront ($1,000 security + $1,000 first month + $1,000 last month + $150 utility + $1,000 furnishings + $300 moving)."}, {"front": "If planning to move out in 12 months, how would you calculate the approximate monthly savings goal for a 'Moving Out' sinking fund, assuming an expected rent of $1,200/month?", "back": "Monthly savings goal: (3 * $1,200 rent + $1,500 for furnishings and setup) / 12 months = ($3,600 + $1,500) / 12 = $5,100 / 12 = $425 per month."}, {"front": "Explain the significance of the fact that Mia needed nearly five months' worth of rent available in cash before she could live in a one-month apartment.", "back": "This illustrates that the total upfront costs (security deposit, last month's rent, utility deposits, furnishings, moving) are often significantly higher than just the first month's rent, emphasizing the need for substantial savings beyond basic rent calculations."}, {"front": "What is the '30% rule' often applied to renting, and why is it important?", "back": "The '30% rule' suggests that your monthly rent should ideally not exceed 30% of your gross monthly income. It's important because it helps ensure you have enough income remaining to cover other ongoing expenses and save."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
