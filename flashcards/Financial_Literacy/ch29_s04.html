<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Literacy for High School &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Financial Literacy for High School &mdash; Chapter 29, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Financial_Literacy">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of reviewing your financial plan after a major life change?", "back": "To ensure your financial strategy remains aligned with your current circumstances, goals, and needs."}, {"front": "You've just received a substantial inheritance. What is the *first* financial step you should take, according to expert advice?", "back": "Do not rush; park the money in a savings account and give yourself 30–90 days before making major financial moves, as grief can impair decision-making."}, {"front": "Why is paying off high-interest debt a top priority when you receive an inheritance?", "back": "It offers a guaranteed, tax-free return, effectively improving your financial health immediately."}, {"front": "Differentiate between short-term and long-term disability insurance.", "back": "Short-term typically covers 60-70% of salary for 3-6 months and is often employer-provided. Long-term kicks in after short-term ends, covering a portion of income for years or until retirement."}, {"front": "What is the statistical chance a 20-year-old has of experiencing a disabling event before retirement?", "back": "Approximately 1-in-4."}, {"front": "What financial action should you take regarding your emergency fund after receiving an inheritance, if it's not already complete?", "back": "Build or complete your emergency fund to cover 3–6 months of living expenses."}, {"front": "What is a critical caution about 'financial friends' when you receive a substantial inheritance?", "back": "Be skeptical of unsolicited advice and investment pitches, especially from anyone urging fast decisions."}, {"front": "Are directly inherited funds subject to income tax? What about interest earned on them?", "back": "Directly inherited money is generally not subject to income tax. However, any interest earned on that money is taxable."}, {"front": "What special financial guidance applies if you inherit a traditional IRA or 401(k)?", "back": "The rules are complex, and tax implications are significant. Consult a tax professional before making any decisions about inherited retirement accounts."}, {"front": "What is one of the *first* essential financial steps to take when a separation or divorce begins?", "back": "Separate all joint accounts and open individual accounts as soon as possible."}, {"front": "Beyond accounts, what critical updates are necessary for financial documents during a divorce?", "back": "Update all beneficiary designations on retirement accounts, life insurance, and bank accounts."}, {"front": "Why is pulling your credit reports important during a divorce?", "back": "To identify any joint debt and understand your individual credit position."}, {"front": "What is a key budgeting challenge after divorce, and how should you address it?", "back": "Transitioning from a dual-income to a single-income household. You must build a new solo budget based on your individual income."}, {"front": "Why is it crucial to work with an attorney during a divorce for financial matters?", "back": "Divorce law, especially regarding property division and debt responsibility, varies significantly by state."}, {"front": "When considering a job offer in a new city, what financial factor related to expenses should you compare?", "back": "The cost of living between your current city and the new one, to understand your true purchasing power."}, {"front": "Besides salary and cost of living, what tax-related factor should you check before relocating for a job?", "back": "The state income tax rate, as some states have no income tax while others have rates above 10%."}, {"front": "What financial negotiation strategy should you employ if a new job requires relocation?", "back": "Negotiate for relocation assistance, as many employers offer it for key hires."}, {"front": "What does it mean for your financial plan to be a 'living document'?", "back": "It means it's not static; it should be regularly reviewed and updated to adapt to major life changes and evolving circumstances."}, {"front": "List three questions you should ask yourself when reviewing your financial plan after a major life change.", "back": "Has my income changed? Have my fixed expenses changed? Do my savings goals still reflect my priorities? Are my beneficiary designations still accurate? Do I need more or different insurance? (Any three are acceptable)"}, {"front": "What recurring financial plan review reminder is suggested in the text?", "back": "Set a calendar reminder for every January 1 and July 1 to 'Review financial plan and update for any life changes'."}, {"front": "Why is it important for your emergency fund to cover any gaps left by short-term disability insurance?", "back": "Short-term disability insurance typically covers only 60-70% of your salary, leaving a 30-40% gap that your emergency fund needs to cover to maintain financial stability."}, {"front": "Why might a higher salary in a new city not necessarily improve your financial situation?", "back": "If the new city has a significantly higher cost of living, the increased salary might result in less actual purchasing power or disposable income."}, {"front": "When should 'investing wisely' with an inheritance take place relative to other financial steps?", "back": "After paying off high-interest debt and building/completing your emergency fund. It should be a thoughtful process aligned with your existing financial plan, not an impulsive one."}, {"front": "How does grief impact financial decision-making, particularly concerning an inheritance?", "back": "Grief impairs decision-making abilities, which is why it's advised to delay major financial moves for 30-90 days after receiving an inheritance."}, {"front": "You're compiling a new solo budget after a divorce. What is the most significant income consideration you need to account for?", "back": "The transition from a dual-income household to a single-income one, requiring a realistic assessment of your individual income and expenses."}, {"front": "What is the primary message about 'the skill' of financial planning as life unfolds?", "back": "The skill is not building a perfect plan once, but rather continually updating it as life unfolds and circumstances change."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
