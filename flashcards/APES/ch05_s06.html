<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "CAFO (Concentrated Animal Feeding Operation)", "back": "A facility, as defined by the US EPA, that confines animals for more than 45 days per year and exceeds regulatory size thresholds (e.g., 1,000+ cattle, 2,500+ pigs, 125,000+ broiler chickens, 82,000+ laying hens). Approximately 80,000 operations in the US produce the vast majority of meat, eggs, and dairy. Achieve high feed-conversion efficiency by confining animals and optimizing nutrition — but externalize costs through manure-lagoon contamination, antibiotic resistance, GHG emissions, and feed-crop land use.", "id": "fc01"}, {"front": "Manure Lagoon Failures", "back": "Open-air manure storage at hog and dairy CAFOs is subject to breach during floods or hurricanes. The textbook documents Hurricane Floyd (1999) causing multiple North Carolina lagoon failures that contaminated rivers with pathogens and nutrients. Beyond breaches: ammonia volatilizes routinely (acid deposition, downwind eutrophication); land application of effluent beyond agronomic need saturates soils with P and contaminates groundwater with nitrates and pathogens. A single 10,000-animal hog CAFO produces more raw waste than a city of 40,000 people — but without secondary sewage treatment.", "id": "fc02"}, {"front": "CAFO Antibiotic Resistance", "back": "Approximately 70% of medically important antibiotics sold in the United States are used in food-animal production, predominantly as growth promoters rather than disease treatment. The constant selective pressure accelerates the evolution of antibiotic-resistant bacteria. Resistant strains spread to humans through food, water, and direct animal contact. The World Health Organization has designated antibiotic resistance as one of the greatest threats to global public health.", "id": "fc03"}, {"front": "CAFO GHG Emissions", "back": "Cattle enteric fermentation produces methane (CH4), a GHG approximately 28x more potent than CO2 over a 100-year period. Global livestock contribute approximately 14.5% of global anthropogenic GHG emissions, with cattle responsible for the largest share. Manure management (lagoon decomposition) also emits methane and nitrous oxide (N2O, ~300x more potent than CO2). Industrial animal production is a major contributor to climate change as well as water pollution.", "id": "fc04"}, {"front": "Feed Footprint", "back": "The indirect land use required to produce feed for a confined animal population. A US beef feedlot of 100,000 cattle requires roughly 50,000 hectares of cropland and the irrigation water, fertilizer, and pesticides that cropland demands. This 'feed footprint' is rarely included in land-use accounting for meat production but represents one of the primary drivers of agricultural expansion in Brazil, Argentina, and Southeast Asia. The TRUE land use of CAFO production is far larger than the feedlot itself.", "id": "fc05"}, {"front": "Maximum Sustainable Yield (MSY)", "back": "The largest average catch that can be removed from a fish stock indefinitely without reducing its productive capacity. Biologically, MSY corresponds to harvesting at the level of MAXIMUM NET GROWTH RATE — typically near HALF the carrying capacity, where the population's reproductive rate is highest relative to its size. Consistently harvesting above MSY causes stock decline. The theoretical basis of most fisheries management — though political pressure routinely results in quotas being set above scientifically recommended MSY levels.", "id": "fc06"}, {"front": "Fishing Down the Food Web", "back": "Daniel Pauly's 1998 finding: the mean trophic level of global marine catch has been declining since the 1950s. Mechanism: large, slow-reproducing apex predators (cod, halibut, bluefin tuna, swordfish, sharks) collapse first; fishing effort then shifts to smaller, shorter-lived planktivores and invertebrates. Sequential depletion of higher trophic levels leaves marine ecosystems increasingly simplified and reduces overall resilience. A diagnostic of progressive ecosystem stress.", "id": "fc07"}, {"front": "Atlantic Cod Collapse (1992)", "back": "The Grand Banks fishery off Newfoundland sustained one of the world's most productive cod fisheries for FIVE CENTURIES. Despite scientific warnings through the 1980s that cod stocks were below MSY, harvest quotas remained near or above sustainable levels due to political pressure. In 1992 Canada declared a moratorium; the stock had collapsed to approximately 1% of historical biomass. Over 30 years later, the cod stock has NOT recovered to commercially significant levels. The most frequently cited example of fisheries management failure and a landmark case in common-pool resource governance.", "id": "fc08"}, {"front": "Bottom Trawling", "back": "Drags heavy nets and metal rollers across the seafloor to capture groundfish (cod, halibut, sole, shrimp). The ecological analogy to CLEARCUTTING is apt: trawl gear destroys physical habitat structure — coral, sponge beds, rock outcrops — that provides nursery habitat for juvenile fish. Recovery times for heavily trawled seafloor habitats may exceed decades; deep-water coral communities disrupted by trawling may require centuries to reestablish.", "id": "fc09"}, {"front": "Bycatch", "back": "The incidental capture of non-target species in commercial fishing gear. Includes juvenile fish of target species, non-target fish, marine mammals, sea turtles, seabirds, and invertebrates. Shrimp trawl nets typically capture 3-10 kg of non-target species per kg of shrimp retained. Dolphin bycatch in tuna purse-seine nets in the eastern tropical Pacific led to 'dolphin-safe' tuna labeling in early 1990s. Global bycatch estimates: 7-25 million metric tonnes per year — rivaling total directed catch for many species. Reduction requires gear modifications (turtle excluders, circle hooks, acoustic pingers) and spatial/temporal restrictions.", "id": "fc10"}, {"front": "Aquaculture", "back": "The controlled cultivation of aquatic organisms — fish, shellfish, seaweed — in enclosed or semi-enclosed environments. Now supplies approximately 50% of global fish consumption and is the FASTEST-GROWING food-production sector. Environmental impacts vary widely by species and system: filter-feeding bivalves (oysters, mussels) require no feed inputs and improve water quality; carnivorous species in open net-pens produce waste effluent, consume wild forage fish for feed, and risk spreading parasites and escaped domesticated individuals to wild populations.", "id": "fc11"}, {"front": "Open-Net Salmon Aquaculture", "back": "Sea-cage farming concentrates thousands of Atlantic salmon in coastal fjords or bays. ENVIRONMENTAL ISSUES: Sea lice (Lepeophtheirus salmonis) proliferate in dense conditions and spread to wild salmon smolts migrating past cage sites — primary contributing factor in declines of wild Pacific salmon in British Columbia. Uneaten feed and waste smother the seafloor beneath cages. Antibiotic use is among the highest of any food-animal production system. Major BC, Norway, and Chile industry but increasingly contested.", "id": "fc12"}, {"front": "Mangrove Loss from Shrimp Aquaculture", "back": "Tropical shrimp aquaculture, particularly in Southeast Asia, Thailand, Bangladesh, and Ecuador, has been associated with the destruction of mangrove forests to create pond sites. Globally, shrimp aquaculture has been implicated in the loss of approximately 30% of world mangrove area since 1980. Mangrove forests provide nursery habitat for marine species, storm-surge protection for coastal communities, and among the highest carbon-storage densities of any terrestrial ecosystem.", "id": "fc13"}, {"front": "Recirculating Aquaculture Systems (RAS)", "back": "Land-based, closed aquaculture facility that treats and recycles water within the system, eliminating effluent discharge to natural water bodies and allowing siting anywhere — not only in coastal waters. INTEGRATED MULTI-TROPHIC AQUACULTURE (IMTA) combines species at different trophic levels (e.g., salmon + mussels + seaweed), with the mussels and seaweed absorbing nutrients released by salmon waste, reducing effluent and providing additional harvestable products. Both represent more sustainable models than open-net salmon farming but require higher capital investment.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
