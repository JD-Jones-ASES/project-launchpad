<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Pesticide Treadmill", "back": "The cycle in which each generation of pesticides selects for resistant pests, requiring more potent chemicals, which in turn select for greater resistance. Mechanism: any chemical powerful enough to kill 99.9% of a pest population leaves the 0.1% survivors disproportionately carrying resistance alleles; their offspring inherit and proliferate resistance, and within a few generations the chemical is largely ineffective. The treadmill is driven especially by calendar-based spraying.", "id": "fc01"}, {"front": "Pesticide Resistance Evolution", "back": "Natural selection applied to populations with short generation times. Selection for resistance is fastest when (1) pesticide exposure is consistent and intense, eliminating susceptibles rapidly; (2) the pest reproduces quickly (multiple generations per growing season); and (3) resistance is controlled by one or a few genes with dominant inheritance. Slowing resistance requires LEAVING SUSCEPTIBLE INDIVIDUALS in the population — the basis of IPM's economic threshold and Bt-refuge strategies.", "id": "fc02"}, {"front": "Integrated Pest Management (IPM)", "back": "A pest-control strategy combining ecological monitoring, biological control, cultural practices, and TARGETED chemical use to manage pest populations below economically damaging levels. The defining principle is the ECONOMIC THRESHOLD: chemical treatment is applied only when scouting confirms that the cost of crop damage at the observed pest density exceeds the cost of control. IPM reduces total pesticide use, slows resistance evolution, and lowers the risk of off-target ecological harm compared to calendar-based chemical programs.", "id": "fc03"}, {"front": "Economic Threshold", "back": "The pest density at which the cost of crop damage exceeds the cost of control. The conceptual centerpiece of IPM: spray decisions are made based on whether observed pest density (measured by scouting) exceeds this threshold — NOT on a calendar. This contrasts with calendar-based spraying ('spray every two weeks regardless'), which the textbook identifies as the principal driver of resistance evolution and unnecessary pesticide use.", "id": "fc04"}, {"front": "Biological Control", "back": "The use of LIVING ORGANISMS — predators, parasitoids, pathogens, or competitors — to suppress pest populations. CLASSICAL biocontrol involves deliberate introduction of a pest's natural enemies from its region of origin to a region where the pest is invasive. AUGMENTATIVE biocontrol involves mass-rearing and periodic release of natural enemies to supplement existing populations. Examples: ladybird beetles and lacewings (predators), Trichogramma wasps (egg parasitoids), Bacillus thuringiensis (Bt) sprays (microbial pathogen).", "id": "fc05"}, {"front": "Cultural Controls", "back": "Modifications to farming practices that reduce pest establishment and spread, distinct from chemical or biological agents. Crop rotation breaks the life cycle of soilborne pathogens and root pests (corn → soybeans eliminates corn rootworm habitat for one season). Intercropping disrupts the visual and chemical cues pests use to locate host plants in dense monocultures. Trap crops attract pests to a sacrificial planting at the field margin, concentrating them for targeted removal.", "id": "fc06"}, {"front": "Bt Refuge Strategy", "back": "The required management practice for Bt crops (genetically modified to express Bacillus thuringiensis toxin): plant non-Bt 'refuge' areas adjacent to Bt fields. Refuge populations remain susceptible and mate with resistant survivors, diluting resistance alleles in the next generation. Inadequate refuges (large-scale Bt planting without enough non-Bt area) allowed resistant corn rootworm populations to develop and spread across US corn-growing regions — illustrating that even biological pesticides are not exempt from the treadmill.", "id": "fc07"}, {"front": "Persistent Organic Pollutant (POP)", "back": "A synthetic organic chemical that resists biodegradation and therefore persists in the environment for years to decades. POPs are typically LIPOPHILIC (fat-soluble) and BIOACCUMULATE in fatty tissues, becoming more concentrated at each trophic level (BIOMAGNIFICATION). Regulated under the Stockholm Convention (2001). Examples: organochlorine pesticides (DDT, chlordane, dieldrin), industrial chemicals (PCBs), and combustion byproducts (dioxins).", "id": "fc08"}, {"front": "DDT (Dichlorodiphenyltrichloroethane)", "back": "Introduced as an agricultural insecticide after WWII, DDT initially appeared near-perfect: cheap, effective, environmentally stable. Within a decade the first DDT-resistant mosquitoes (Anopheles gambiae malaria vector) had been documented. DDT-resistance spread across sub-Saharan Africa within fifteen years. DDT is a classic POP — lipophilic, bioaccumulating, biomagnifying — implicated in raptor declines (eggshell thinning) before being banned in most uses. Iconic example of the pesticide treadmill.", "id": "fc09"}, {"front": "Organic Agriculture", "back": "A legally defined production system (under USDA National Organic Program in the US) that PROHIBITS the use of synthetic pesticides AND synthetic nitrogen fertilizers, relying instead on biological nutrient cycling, mechanical weed control, and biological pest management. Organic certification requires a THREE-YEAR TRANSITION PERIOD during which no prohibited substances can be applied, after which the farm may sell with the USDA Organic seal.", "id": "fc10"}, {"front": "Cover Crops", "back": "Plants grown between cash crop seasons (not for harvest) to prevent erosion, fix nitrogen via legume-rhizobium symbiosis, and add organic matter when tilled in. Common species: rye, vetch, hairy clover, oats. Used in organic and increasingly in conventional agriculture. Supports soil structure improvement, nutrient cycling, and reduced synthetic input dependence. GREEN MANURE is a cover crop turned into the soil before maturity, contributing to soil organic matter.", "id": "fc11"}, {"front": "Agroforestry", "back": "A land-management system that DELIBERATELY INTEGRATES trees or shrubs with crops and/or livestock in the same unit of land. Trees provide ecosystem services — nitrogen fixation (if leguminous), microclimate modification, erosion control, carbon sequestration, beneficial insect habitat — while also producing timber, fruit, or fodder. Examples: shade-grown coffee under forest canopy, alley cropping, silvopasture (trees + livestock). Maintains higher biodiversity and lower synthetic input requirements than equivalent monocultures.", "id": "fc12"}, {"front": "Permaculture", "back": "A design philosophy applying principles inspired by natural ecosystems — diversity, redundancy, functional relationships, closed-loop nutrient cycling — to agricultural landscapes. Emphasizes PERENNIAL plants over annuals, MULTI-LAYER production (canopy, understory, ground cover, root crops), and integration of food production with water management and habitat. The name comes from 'permanent agriculture.' Lower per-hectare yields than monoculture but reduced input dependence and enhanced ecological function.", "id": "fc13"}, {"front": "Polyculture", "back": "The simultaneous cultivation of multiple crop species in the same field. Reduces monoculture vulnerability (the single-pathogen catastrophe risk from Section 5.3), supports more diverse beneficial insect communities, and often reduces the need for synthetic inputs. Trade-offs: more difficult to mechanize and typically requires more labor per unit of output. Common in traditional agriculture (the Three Sisters: corn, beans, squash) and increasingly in market gardens and small-scale operations.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
