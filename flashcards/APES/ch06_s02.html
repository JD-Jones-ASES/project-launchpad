<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Strip Mining", "back": "Surface coal-mining method for shallow seams. Overburden (overlying rock and soil) is stripped away in parallel strips to expose the coal seam; debris is placed back in the previous strip's void. Used when coal lies within tens of meters of the surface.", "id": "fc01"}, {"front": "Mountaintop Removal Mining (MTR)", "back": "Practiced in central Appalachia. Entire ridge summits are blasted off; debris (valley fill) is dumped into adjacent stream hollows. >500 Appalachian mountains altered since the 1970s. Buries headwater streams, disrupts hydrology, and exposes sulfur-bearing rock to oxidation, generating acid mine drainage (pH sometimes <3) loaded with heavy metals.", "id": "fc02"}, {"front": "Room-and-Pillar vs. Longwall Mining", "back": "Room-and-pillar (underground): leaves rectangular pillars supporting the roof; recovers ~40-60% of seam. Longwall: shearing machine traverses up to 400 m face with hydraulic roof supports advancing behind; recovers 70-80% but causes surface subsidence above the mined panel.", "id": "fc03"}, {"front": "Hydraulic Fracturing (Fracking)", "back": "Well-stimulation technique. Horizontal well drilled 1.5-3 km along shale; fluid (~90% water + 8-9% sand proppant + <1% additives) injected at >70 MPa to create fractures. Sand props open the fractures so oil/gas flow back. Unlocked vast US tight-oil and shale-gas reserves in the 2000s-2010s.", "id": "fc04"}, {"front": "Fracking Environmental Concerns", "back": "(1) Flowback water — chemicals + brine + sometimes radioactive material; improper disposal causes water-quality issues and induced seismicity. (2) Methane leakage — CH4 ~80x more potent than CO2 over 20 yr; estimates 1-4% of production. (3) Water use — 10-20 ML per well stresses arid aquifers like Ogallala. (4) Possible aquifer contamination from casing failures.", "id": "fc05"}, {"front": "Oil Sands and SAGD", "back": "Bitumen (extremely viscous hydrocarbon) in Canadian Athabasca region. Shallow deposits (<70 m): open-pit strip mining. Deeper deposits: steam-assisted gravity drainage (SAGD) injects steam to reduce bitumen viscosity for pumping. Generates ~2x the CO2 per barrel vs. conventional oil due to natural-gas energy inputs.", "id": "fc06"}, {"front": "Combustion Chemistry", "back": "Fossil fuel combustion: C_xH_y + O2 → CO2 + H2O + heat. Pure carbon releases ~32.8 MJ/kg. Real fuels also contain sulfur, nitrogen, trace metals, and ash, which generate SO2, NOx, particulates, and Hg. Combustion in air (~79% N2) also forms thermal NOx from atmospheric nitrogen at high temperatures.", "id": "fc07"}, {"front": "CO2 per Unit of Energy", "back": "Coal > oil > natural gas in CO2 emissions per MJ. Reason: coal has the lowest hydrogen-to-carbon ratio; methane (CH4) has the highest. Hydrogen oxidation produces water (no CO2); only carbon oxidation produces CO2.", "id": "fc08"}, {"front": "SO2 and Acid Deposition", "back": "Sulfur dioxide forms when sulfur impurities in fuel are oxidized; coal combustion is the world's largest single source. SO2 + H2O vapor → H2SO4 (sulfuric acid), the primary driver of acid deposition.", "id": "fc09"}, {"front": "NOx", "back": "Nitrogen oxides form from fuel-bound nitrogen and from atmospheric N2 reacting with O2 at high combustion temperatures (thermal NOx). Contributes to photochemical smog and ground-level ozone formation.", "id": "fc10"}, {"front": "PM2.5 (Fine Particulate Matter)", "back": "Solid and liquid aerosols with diameter < 2.5 micrometers. Penetrate deep into lung tissue; linked to cardiovascular and respiratory mortality. Coal combustion is a major global source. PM10 (≤10 micrometers) is broader; PM2.5 is the most dangerous fraction.", "id": "fc11"}, {"front": "Mercury Cycling", "back": "Coal contains trace mercury that volatilizes during combustion. Atmospheric Hg deposits into water bodies; anaerobic bacteria convert it to methylmercury — a highly bioaccumulative neurotoxin that biomagnifies up the food chain to top predators.", "id": "fc12"}, {"front": "Deepwater Horizon (2010)", "back": "BP rig drilling Macondo Prospect at 1,525 m depth. 20 April 2010: misinterpreted negative-pressure test triggered blowout; BOP shear rams failed; rig sank; 11 workers killed. ~4.9 Mb (779 ML) of crude released over 87 days. >1,100 km of Gulf shoreline oiled. BP paid >$20 B in settlements; MMS reorganized into BSEE.", "id": "fc13"}, {"front": "Negative Externalities of Fossil Fuels", "back": "Market prices reflect extraction/processing/distribution but not the full social cost of emissions: PM2.5 health impacts, acid deposition, oil-spill ecosystem damage, climate change from CO2. The price gap creates systematic over-consumption. Carbon taxes and cap-and-trade are policy mechanisms to internalize these externalities.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
