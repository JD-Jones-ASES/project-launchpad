<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Nuclear Fission", "back": "Splitting of a heavy nucleus (typically U-235) upon thermal-neutron absorption: U-235 + n → U-236* → fission products + 2-3 neutrons + gamma + ~200 MeV. About 50 million times more energy per atom than chemical combustion.", "id": "fc01"}, {"front": "Multiplication Factor (k)", "back": "Average number of fission neutrons that go on to cause another fission. k = 1: criticality (steady reactor operation). k > 1: supercriticality (power grows; prompt criticality is the bomb condition). k < 1: subcriticality (chain reaction dies). Reactors maintain k = 1 via control rods and moderators.", "id": "fc02"}, {"front": "Uranium Enrichment", "back": "Natural U is 0.7% U-235 (fissile) + 99.3% U-238 (not fissile with thermal neutrons). Most commercial reactors require 3-5% U-235 enrichment to maintain criticality. Weapons-grade uranium needs >90% enrichment, so commercial fuel is not directly weapons-usable.", "id": "fc03"}, {"front": "Pressurized Water Reactor (PWR)", "back": "Most common design globally (~70% of capacity). Water at ~155 atm prevents boiling; serves as both coolant and moderator. Heat transfers to a secondary loop where steam is generated to drive turbines. Primary radioactive loop is isolated from the turbine.", "id": "fc04"}, {"front": "Boiling Water Reactor (BWR)", "back": "Water boils directly in the reactor vessel, generating steam that drives the turbine. Simpler than PWR but allows some radioactive contamination of the turbine circuit. All six Fukushima Daiichi reactors (including Units 1, 2, 3 that melted down in 2011) are BWRs.", "id": "fc05"}, {"front": "CANDU Reactor", "back": "Canada Deuterium Uranium design uses heavy water (D2O) as moderator. Heavy water absorbs fewer neutrons than ordinary water, allowing CANDU reactors to run on natural (unenriched) uranium. Major advantage for nations without enrichment facilities.", "id": "fc06"}, {"front": "Fast Breeder Reactor", "back": "Uses fast (unmoderated) neutrons to convert non-fissile U-238 into fissile Pu-239. Produces more fissile material than it consumes, theoretically extending uranium resources enormously. In practice, breeders have proven expensive and technically difficult; only a handful operate globally.", "id": "fc07"}, {"front": "Half-Life", "back": "Time required for half of a given quantity of a radioactive isotope to decay. After n half-lives, the fraction remaining is (1/2)^n. Spent nuclear fuel contains isotopes with half-lives from seconds to ~24,100 yr (Pu-239), explaining why geological-timescale isolation is required.", "id": "fc08"}, {"front": "Spent Fuel Hazard", "back": "After 3-4 years in core, fuel rods accumulate fission products (Cs-137, Sr-90, hundreds of others) and transuranic actinides (Pu-239 t1/2 = 24,100 yr, Am-241 t1/2 = 432 yr). Spent fuel emits heat and penetrating radiation; full radiological hazard persists 10^5 to 10^6 years.", "id": "fc09"}, {"front": "Spent-Fuel Storage", "back": "Cooling pools first: water absorbs radiation and removes decay heat for 5-10 years. Then dry-cask storage: concrete and steel containers with passive air-convection cooling. As of 2024, essentially all US spent fuel sits in on-site pools or dry casks; no permanent repository operates.", "id": "fc10"}, {"front": "Geological Repository", "back": "Yucca Mountain, Nevada was effectively halted by Congress after 2010 due to political opposition and DOE license-application withdrawal. Finland's Onkalo repository is the world's first permanent geological repository under construction (targeting full operation ~2025).", "id": "fc11"}, {"front": "Chernobyl Disaster (1986)", "back": "RBMK-1000 reactor had a positive void coefficient: steam bubbles raised reactivity rather than reducing it. Combined with control-rod graphite tips and a low-power xenon-poisoned state during a safety test, an emergency SCRAM caused a power surge ~30,000x normal. Steam explosions exposed the graphite, which burned for 10 days. ~30 immediate deaths from acute radiation; ~4,000 thyroid cancers attributed by WHO.", "id": "fc12"}, {"front": "Fukushima Daiichi Disaster (2011)", "back": "Magnitude-9.0 Tohoku earthquake + tsunami (>14 m, exceeding 5.7 m seawall) flooded backup diesel generators. With all power lost, three BWR cores (Units 1, 2, 3) overheated and melted down. Hydrogen from zirconium-cladding oxidation exploded, releasing radioactive material. ~150,000 evacuated within 20 km. Radiation deaths very low; evacuation-related deaths in the hundreds.", "id": "fc13"}, {"front": "Nuclear's Trade-Off", "back": "Strengths: zero direct CO2 in operation, ~92% capacity factor (highest), among the lowest lifecycle emissions per kWh (often lower than solar PV). Costs: spent fuel must be isolated from the biosphere for up to 10^6 years; finite risk of catastrophic accidents (Chernobyl, Fukushima). The question is normative — how to weigh near-term climate benefits against long-consequence risks.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
