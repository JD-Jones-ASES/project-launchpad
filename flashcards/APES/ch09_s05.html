<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 9, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Sixth Extinction", "back": "The contemporary extinction event, popularized by Elizabeth Kolbert's 2014 Pulitzer Prize-winning book and grounded in earlier work by Richard Leakey and E.O. Wilson. The current observed extinction rate is estimated at 100-10,000 E/MSY (extinctions per million species per year), compared to a background rate of approximately 1 E/MSY. Unlike the previous five mass extinctions, the sixth has a known cause: the cumulative impact of a single species — humans.", "id": "fc01"}, {"front": "HIPPO", "back": "An acronym coined by E.O. Wilson identifying the five major drivers of biodiversity loss in approximate order of current impact: Habitat destruction and fragmentation, Invasive species, Pollution, Population (human growth and consumption), and Overharvesting. Climate change is increasingly recognized as a sixth driver that interacts with and amplifies all five HIPPO factors.", "id": "fc02"}, {"front": "Background Extinction Rate", "back": "The natural rate of species extinction inferred from the fossil record in the absence of unusual perturbations, typically estimated at approximately 1 E/MSY (one extinction per million species per year). The current observed rate is at least 100 times background and possibly 1,000 times higher — defining the contemporary period as the Sixth Extinction.", "id": "fc03"}, {"front": "Mass Extinction", "back": "A geologically rapid, global event in which more than 75% of species go extinct over a relatively short interval (thousands to a few million years). Five mass extinctions are recognized: Ordovician-Silurian (~443 Ma), Late Devonian (~375 Ma), Permian-Triassic (~251 Ma, the largest at ~96% species loss), Triassic-Jurassic (~201 Ma), and Cretaceous-Paleogene (~66 Ma).", "id": "fc04"}, {"front": "Habitat Destruction and Fragmentation", "back": "The largest single driver of biodiversity loss. Forests cleared for agriculture, wetlands drained, grasslands converted to crops — these conversions eliminate the living space species require. Even without total destruction, fragmentation isolates populations, reduces gene flow, and creates 'edge effects' favoring generalists over specialists. IPBES (2019): roughly 75% of land surface and 66% of ocean has been 'significantly altered' by human activity.", "id": "fc05"}, {"front": "Invasive Species", "back": "Organisms introduced outside their native range — intentionally (agriculture, biocontrol) or accidentally (ballast water, shipping cargo) — that outcompete, predate, or hybridize with natives. Island ecosystems are disproportionately vulnerable because their fauna evolved in the absence of mammalian predators; introduced rats, cats, and mongooses have driven numerous bird extinctions.", "id": "fc06"}, {"front": "Keystone Species", "back": "A species whose ecological role is disproportionately large relative to its numerical abundance, such that its removal causes major cascading restructuring of the community. Examples: gray wolves in Yellowstone (top-down trophic cascade); sea otters in Pacific kelp forests (controlling sea urchins); African elephants as 'ecosystem engineers' in savannas. Loss of a keystone produces effects far out of proportion to biomass lost.", "id": "fc07"}, {"front": "Trophic Cascade", "back": "A pattern in which the addition or removal of a top predator causes effects to propagate down through multiple trophic levels. Yellowstone wolf reintroduction (1995) is the classic case: wolf predation on elk altered elk grazing behavior, allowing streamside vegetation to recover, which reduced bank erosion, restored beaver habitat, and altered stream hydrology.", "id": "fc08"}, {"front": "Endangered Species Act (1973)", "back": "US federal statute conserving threatened and endangered species AND the ecosystems on which they depend. Administered jointly by USFWS (terrestrial/freshwater) and NMFS (marine/anadromous). Listing decisions must be based on best available science alone — economic factors may not be considered at listing. Approximately 1,900 species currently listed (2024); ~99% of listed species have been prevented from going extinct.", "id": "fc09"}, {"front": "ESA 'Take' Prohibition", "back": "Section 9 of the ESA makes it unlawful for any person to 'take' a listed species — defined to include harass, harm, pursue, hunt, shoot, wound, kill, trap, capture, or collect. The prohibition extends to private landowners, making it one of the most powerful species-protection tools in US law. Combined with Section 7 consultation and critical habitat designation, the ESA gives federal agencies authority to halt projects that would jeopardize listed species.", "id": "fc10"}, {"front": "ESA Section 7 Consultation", "back": "The procedural requirement that federal agencies consult with the US Fish and Wildlife Service or NMFS before authorizing any action that may affect listed species or their critical habitat. The agency issues a Biological Opinion; a 'jeopardy opinion' can halt or require modification of federal projects. This consultation requirement has been the most legally consequential ESA mechanism.", "id": "fc11"}, {"front": "CITES (1973)", "back": "Convention on International Trade in Endangered Species. Multilateral treaty regulating international wildlife trade through a permit system administered by national Management Authorities. Three-tier appendix system: Appendix I (commercial trade prohibited), Appendix II (regulated trade with non-detriment findings), Appendix III (national-request listings). 184 parties (2024); ~6,000 animals and ~32,000 plants listed. Notable success: 1989 ivory trade ban.", "id": "fc12"}, {"front": "CITES Appendix System", "back": "Three-tier graduated trade regulation. Appendix I: species threatened with extinction; commercial trade prohibited; permits only in exceptional circumstances. Appendix II: species not yet threatened but requiring strict regulation to prevent decline. Appendix III: species listed at the request of a single party for inter-party cooperation in trade control. Listings can move species between appendices as status improves or worsens.", "id": "fc13"}, {"front": "Population-Level Decline (Living Planet Report)", "back": "The IPBES 2019 Global Assessment and WWF Living Planet Report document that approximately 60% of monitored vertebrate populations have declined in abundance since 1970. Even within species not yet extinct, population declines represent functional erosion of biodiversity — species lose their ability to perform pollination, seed dispersal, predator control, and other ecological services as numbers fall.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
