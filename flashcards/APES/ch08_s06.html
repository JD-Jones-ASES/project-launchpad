<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 8, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Solid Waste Hierarchy", "back": "EPA's priority ranking from most to least preferred: (1) source reduction — prevent waste at design stage; (2) reuse — use product again without reprocessing; (3) recycling — reprocess for new products; (4) composting — biological conversion of organic waste; (5) combustion with energy recovery (waste-to-energy); (6) landfilling — last resort. The earlier in the chain a waste is intercepted, the more embodied energy and materials are conserved.", "id": "fc01"}, {"front": "Source Reduction (Why Top of Hierarchy)", "back": "The most preferred strategy: design products to use less material, last longer, and generate less waste. Saves more than recycling because every downstream stage (collection, sorting, transport, reprocessing) requires energy and produces pollution. A glass bottle never made requires no melting; recycling reduces but cannot eliminate those costs.", "id": "fc02"}, {"front": "Sanitary Landfill Engineering", "back": "Modern engineered disposal site with four key features: (1) composite liner (compacted clay + HDPE membrane) prevents leachate from contaminating groundwater; (2) perforated leachate collection pipes route contaminated liquid to treatment; (3) daily soil or synthetic cover suppresses pests and odors; (4) landfill gas collection captures methane (CH₄) for electricity generation. Required under RCRA Subtitle D for all municipal solid waste landfills.", "id": "fc03"}, {"front": "Leachate", "back": "Liquid produced when precipitation or groundwater percolates through a solid waste disposal site, dissolving heavy metals (lead, cadmium, mercury), volatile organic compounds, chlorinated solvents, and decomposition byproducts. Without engineered capture, leachate migrates downward into aquifers and contaminates drinking-water sources for decades. Modern sanitary landfills are required to collect and treat leachate under RCRA.", "id": "fc04"}, {"front": "Landfill Methane (CH₄)", "back": "Greenhouse gas generated by anaerobic decomposition of organic waste in landfills. Modern landfills capture methane through perforated pipes for electricity generation (or flaring), partially offsetting their greenhouse gas footprint. Despite controls, US landfills remain the third-largest source of anthropogenic methane emissions.", "id": "fc05"}, {"front": "Incineration / Waste-to-Energy (WTE)", "back": "Reduces solid waste volume by 70-90% and generates electricity from thermal energy. Modern WTE plants include flue-gas controls — wet scrubbers, electrostatic precipitators, activated carbon injection, fabric filters — to remove mercury, dioxins, furans, hydrogen chloride, and fine particulates from stack gases. Public opposition remains intense in many communities due to residual emissions concerns and environmental justice issues around facility siting in lower-income neighborhoods.", "id": "fc06"}, {"front": "E-Waste", "back": "Discarded consumer and industrial electronics — smartphones, computers, televisions, printers, batteries — containing both recoverable valuable materials (gold, silver, copper, palladium) and hazardous substances (lead solder, cadmium, mercury, brominated flame retardants, PVC plastics). Globally ~50 million metric tonnes generated annually, the fastest-growing solid waste stream. Only ~20% formally recycled; majority exported to low- and middle-income countries for informal processing.", "id": "fc07"}, {"front": "Basel Convention (1989)", "back": "International treaty restricting export of hazardous waste from industrialized to developing countries. Historically had a 'second-hand goods' loophole through which much e-waste was exported under the guise of reusable electronics. 2019 amendments closed some of these loopholes by requiring prior informed consent for plastic-waste exports. Sites like Agbogbloshie in Ghana document the consequences of inadequate enforcement: workers (including children) burn circuit boards to recover copper, releasing dioxins and heavy metals.", "id": "fc08"}, {"front": "Primary Wastewater Treatment", "back": "PHYSICAL stage: wastewater passes through bar screens (remove rags, large solids), then enters settling tanks (primary clarifiers) where gravity removes ~30-40% of total suspended solids and ~30% of BOD. Settled sludge goes to digesters; liquid effluent moves to secondary treatment.", "id": "fc09"}, {"front": "Secondary Wastewater Treatment", "back": "BIOLOGICAL stage: aerobic microorganisms decompose dissolved and colloidal organic matter. Most common design is the activated sludge process — effluent enters aeration tanks where air is bubbled through and a dense suspension of aerobic bacteria (activated sludge) decomposes organic matter, then a secondary clarifier settles the biomass. Achieves 85-95% BOD and TSS reduction. Minimum legally required standard for US POTWs under the Clean Water Act.", "id": "fc10"}, {"front": "Tertiary Wastewater Treatment", "back": "ADVANCED stage: removes nitrogen, phosphorus, pathogens, pharmaceuticals, and trace organics that secondary treatment leaves behind. Processes include biological nutrient removal (anoxic + aerobic zones for denitrification and P precipitation), membrane filtration, ultraviolet disinfection, and activated carbon adsorption. Required where downstream water-quality standards (TMDLs for N and P) would be violated by secondary-only effluent. Increasingly mandated in watersheds experiencing eutrophication.", "id": "fc11"}, {"front": "Resource Conservation and Recovery Act (RCRA, 1976)", "back": "First comprehensive federal framework for managing hazardous and non-hazardous solid waste. Subtitle C creates the cradle-to-grave manifest system requiring every shipment of listed or characteristic hazardous waste to be tracked from generation through transport to final disposal at a permitted treatment, storage, and disposal facility (TSDF). Subtitle D sets minimum criteria for municipal solid waste landfills. Subtitle I regulates ~600,000 underground fuel storage tanks. Civil penalties up to $70,000/day. Forward-looking; covers ongoing waste generation only.", "id": "fc12"}, {"front": "CERCLA / Superfund (1980)", "back": "Comprehensive Environmental Response, Compensation, and Liability Act, Pub. L. 96-510. Created federal authority and funding to clean up abandoned or uncontrolled hazardous waste sites — the legacy contamination from before RCRA's 1976 cradle-to-grave requirements. Key features: National Priorities List (~1,300 highest-risk sites); Potentially Responsible Parties (PRPs) held strictly, jointly, and severally liable; Superfund trust originally funded by tax on petroleum and chemical industries (lapsed 1995, reinstated 2021); innocent landowner defense for buyers who conducted 'all appropriate inquiry'.", "id": "fc13"}, {"front": "Polluter-Pays Principle", "back": "Environmental policy doctrine holding that those who generate pollution should internalize its full social cost rather than passing it to taxpayers and future generations. Embedded in CERCLA's strict liability framework, the Rio Declaration's Principle 16 (1992), and OECD environmental guidelines. The conceptual basis for Superfund's joint-and-several liability and for hazardous-waste fee systems worldwide. Implementation is contested when polluters lack resources, liability is shared across many PRPs, or the original polluter no longer exists.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
