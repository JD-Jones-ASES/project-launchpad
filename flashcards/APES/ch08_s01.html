<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Point Source", "back": "Any discernible, confined, and discrete conveyance from which pollutants may be discharged into navigable waters — a pipe, ditch, channel, tunnel, conduit, well, or container. Defining feature is traceability: inspectors can follow the discharge to a specific operator. Regulated under the Clean Water Act through NPDES permits with enforceable numeric limits.", "id": "fc01"}, {"front": "Nonpoint Source", "back": "Any pollution source that does not meet the statutory definition of a point source — in practice, any discharge that is diffuse, spatially dispersed, and not attributable to a single discrete conveyance. Major categories: agricultural runoff, urban stormwater, atmospheric deposition, septic systems. Regulated through CWA Section 319 with voluntary best management practices, not mandatory permits.", "id": "fc02"}, {"front": "NPDES (National Pollutant Discharge Elimination System)", "back": "The Clean Water Act's permit-based regulatory mechanism for point sources. Every discharge requires a permit specifying maximum allowable concentrations and loads of regulated pollutants. Industrial dischargers receive technology-based effluent limits (best available technology, BAT) plus water-quality-based limits when downstream standards require it. Largest single permit category: municipal POTWs.", "id": "fc03"}, {"front": "POTW (Publicly Owned Treatment Works)", "back": "Municipal wastewater treatment plant. Collects sewage from homes, businesses, and stormwater inlets, treats it through primary and secondary (and sometimes tertiary) processes, and discharges treated effluent through a single outfall pipe. The largest single category of NPDES permits.", "id": "fc04"}, {"front": "CAFO (Concentrated Animal Feeding Operation)", "back": "Large livestock or poultry facility confining more animals than a regulatory threshold (e.g., 1,000 beef cattle or 30,000 laying hens). Despite being agricultural, CAFOs are regulated as point sources under NPDES because their wastewater lagoons and manure application fields are localized and traceable. Subject to land-application restrictions to prevent runoff.", "id": "fc05"}, {"front": "CSO (Combined Sewer Overflow)", "back": "Single-pipe system in older cities that carries both sewage and stormwater. During heavy rain the combined flow exceeds plant capacity, and untreated sewage and stormwater overflow directly to receiving waters through dedicated outfall structures. CSOs are point sources subject to NPDES; EPA requires municipalities to develop Long-Term Control Plans.", "id": "fc06"}, {"front": "Biological Oxygen Demand (BOD₅)", "back": "The mass of dissolved oxygen consumed by microorganisms decomposing organic matter in a water sample over five days at 20°C. High BOD signals heavy organic pollution — sewage, food-processing effluent, or decomposing algae after a bloom. Pristine streams have BOD < 2 mg/L; raw municipal sewage reaches 200–300 mg/L.", "id": "fc07"}, {"front": "Dissolved Oxygen (DO)", "back": "The mass of O₂ dissolved in water (mg/L). Cold, turbulent water holds more O₂; warm, still water holds less. Most fish and invertebrates require DO > 5 mg/L; sensitive cold-water species (trout, stonefly larvae) require > 8 mg/L. Hypoxic conditions occur below 2 mg/L; anoxic conditions below 0.5 mg/L.", "id": "fc08"}, {"front": "Streeter-Phelps Oxygen Sag Curve", "back": "The predictable downstream pattern of oxygen depletion and recovery following a high-BOD point-source discharge. Three zones: (1) degradation zone — DO drops sharply as bacteria decompose organic matter; (2) septic zone — DO approaches zero, anaerobic bacteria produce H₂S and CH₄, only tubifex worms and chironomid midges survive; (3) recovery zone — organic load is depleted, re-aeration restores DO, and the stream self-purifies.", "id": "fc09"}, {"front": "Fecal Coliform / E. coli", "back": "Indicator bacteria signaling fecal contamination from humans or warm-blooded animals. Their presence suggests pathogens capable of causing gastroenteritis, hepatitis A, or more serious waterborne illness may also be present. EPA's recreational water-quality standard is < 235 CFU/100 mL E. coli; beach closures occur when sampling exceeds this threshold.", "id": "fc10"}, {"front": "Nitrate (NO₃⁻) MCL", "back": "EPA's Maximum Contaminant Level for nitrate in drinking water is 10 mg/L (as N). Above this level, infants face risk of methemoglobinemia (\"blue baby syndrome\"), in which nitrate interferes with hemoglobin's oxygen-carrying capacity. Elevated nitrate also signals nutrient over-enrichment from fertilizer runoff or sewage.", "id": "fc11"}, {"front": "Limiting Nutrients in Freshwater vs. Marine Systems", "back": "Phosphorus is typically the limiting nutrient in freshwater systems; algal growth runs out of phosphorus before nitrogen. Nitrogen is typically limiting in coastal marine systems. This distinction shapes regulatory priorities: freshwater nutrient management focuses on phosphorus (e.g., detergent phosphate bans), while marine eutrophication management targets nitrogen.", "id": "fc12"}, {"front": "Turbidity (NTU)", "back": "Measure of water cloudiness in Nephelometric Turbidity Units. High turbidity from suspended sediment, algal cells, or colloidal organic matter blocks sunlight, limiting photosynthesis by submerged aquatic vegetation. Sediment particles also clog fish gills and smother benthic invertebrate habitat. Primary sources: agricultural tillage, construction-site runoff, and streambank erosion.", "id": "fc13"}, {"front": "Clean Water Act (1972) Aspirational Goals", "back": "Section 101 set two famously aspirational national goals: (1) eliminate discharge of pollutants into navigable waters by 1985; (2) achieve fishable/swimmable waters by July 1, 1983. Neither was met. Despite that, the CWA succeeded in creating NPDES permits for point sources and federal funding for publicly owned treatment works, transforming US water quality after 1972.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
