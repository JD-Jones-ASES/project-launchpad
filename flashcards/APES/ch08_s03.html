<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Wetland", "back": "Area where soil is saturated with water permanently or seasonally, creating conditions that favor hydrophytic (water-tolerant) vegetation. Includes marshes, swamps, bogs, fens, and seasonally flooded bottomlands. Provides ecosystem services: water filtration, flood attenuation, groundwater recharge, wildlife habitat, and carbon storage. The US has lost approximately 50% of its original wetland extent since European settlement.", "id": "fc01"}, {"front": "Wetland Ecosystem Services", "back": "Wetlands function as the landscape's kidneys: a single acre can remove hundreds of pounds of nitrogen per year at far lower cost than engineered treatment infrastructure. They reduce downstream flood peaks by 20–60% by storing rain water and releasing it slowly. They provide critical wildlife habitat (especially for migratory birds and fish nurseries) and significant carbon storage. No single engineered system replicates all these integrated functions.", "id": "fc02"}, {"front": "Clean Water Act Section 404", "back": "Prohibits the discharge of dredged or fill material into \"waters of the United States\" without a permit from the Army Corps of Engineers. For decades, this provision was interpreted to protect most jurisdictional wetlands — the structural mechanism by which CWA regulated wetland conversion.", "id": "fc03"}, {"front": "Sackett v. EPA (2023)", "back": "Supreme Court case that narrowed CWA jurisdiction to wetlands with a \"continuous surface connection\" to navigable waters. The decision removed federal protection from tens of millions of acres of ephemeral and geographically isolated wetlands, representing one of the most significant rollbacks of the CWA's reach since the Act's passage. State law now governs many wetlands previously covered by federal CWA Section 404.", "id": "fc04"}, {"front": "Mangrove", "back": "Salt-tolerant tree or shrub that grows in tropical and subtropical intertidal zones, forming dense coastal forests on muddy or sandy substrates. Characterized by prop roots or pneumatophores (aerial roots) that anchor in soft sediment and exchange gases with the atmosphere. Mangroves cover approximately 138,000 km² globally; ~35% of the world's mangrove area has been lost since the 1950s, primarily to shrimp aquaculture and coastal development.", "id": "fc05"}, {"front": "Mangrove Storm-Surge Attenuation", "back": "Dense root and trunk structure dissipates wave energy and slows surge propagation inland. Field studies after the 2004 Indian Ocean tsunami (\"Boxing Day tsunami\") found 4–10 times lower fatality rates in coastal communities behind intact mangrove belts than on exposed shorelines. A 100-meter-wide mangrove belt can reduce wave height by 50–70%.", "id": "fc06"}, {"front": "Blue Carbon (Mangrove Carbon Sequestration)", "back": "Mangrove soils accumulate organic carbon at rates 3–5 times higher per hectare than tropical rainforest soils due to waterlogged, anaerobic sediment slowing decomposition. Combined with above-ground biomass, this makes mangroves among the most carbon-dense ecosystems on Earth. Clearing or degrading mangroves releases stored carbon to the atmosphere as CO₂, contributing to climate forcing.", "id": "fc07"}, {"front": "Mangrove Fishery Nursery Habitat", "back": "Mangrove root systems provide shelter from predators for juvenile fish, shrimp, and crustaceans that later migrate to offshore reef and open-water environments. An estimated one-third of tropical coastal fishery production is linked to mangrove nursery habitat. Coastal communities that clear mangroves for shrimp ponds gain short-term economic benefit but lose the storm protection and fishery production sustaining them.", "id": "fc08"}, {"front": "Coral Bleaching", "back": "Loss of color and primary productivity in a coral reef when thermal stress causes coral polyps to expel their symbiotic photosynthetic dinoflagellates (zooxanthellae). The polyps turn white because the zooxanthellae, not the coral tissue, provide the reef's pigmentation and approximately 90% of the polyps' energy via photosynthesis. If thermal stress persists for more than a few weeks, corals starve and die.", "id": "fc09"}, {"front": "Zooxanthellae", "back": "Photosynthetic dinoflagellates (Symbiodiniaceae spp.) that live symbiotically within reef-building coral polyps' tissues. They supply the host polyp with sugars from photosynthesis (providing up to 90% of the coral's energy budget) and contribute to vibrant reef coloration. In return, the polyp provides shelter and access to CO₂ and inorganic nutrients. Thermal stress, pollution, or disease disrupts this mutualism, triggering expulsion.", "id": "fc10"}, {"front": "Bleaching Mechanism", "back": "When sea surface temperature (SST) rises 1°C or more above the long-term summer maximum for four or more weeks, the metabolic rate of zooxanthellae increases to the point that they produce reactive oxygen species (ROS) toxic to the host polyp. The polyp expels the zooxanthellae as a stress response. If temperatures drop within a few weeks, some polyps recover; if heat stress is prolonged, the polyp starves and dies, leaving a white carbonate skeleton.", "id": "fc11"}, {"front": "Coral Reef Stressors (Beyond Thermal Stress)", "back": "(1) Ocean acidification — atmospheric CO₂ dissolves in seawater, lowering pH and reducing carbonate saturation; harder for corals to build CaCO₃ skeletons. (2) Nutrient pollution — coastal runoff promotes algal overgrowth that smothers corals. (3) Sedimentation — eroded sediment smothers polyps and blocks light. (4) Overfishing — removal of herbivorous fish (parrotfish, surgeonfish) allows algae to outcompete corals for substrate.", "id": "fc12"}, {"front": "Cumulative-Stress Framework", "back": "Conceptual model holding that ecosystems are simultaneously subjected to multiple, interacting stressors operating at different spatial and temporal scales. Corals weakened by nutrient pollution and sedimentation are then killed when warming events push them past their thermal threshold. Local stressor management cannot substitute for global climate action, but can buy time while global stressors are addressed.", "id": "fc13"}, {"front": "Great Barrier Reef Bleaching (2016–2024)", "back": "Five mass bleaching events in 9 years (2016, 2017, 2020, 2022, 2024). Approximately 50% loss of coral cover since 2000. Recovery interval has compressed from 25–30 years to less than a decade. IPCC projects 70–90% loss of tropical coral reefs at 1.5°C of warming; at 2°C, more than 99% of reefs experience annual or biannual bleaching, incompatible with recovery. Australia invests in local stressor management but the GBR's future depends primarily on global GHG reductions.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
