<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Biomass Energy", "back": "Any fuel derived from recently living organic material: wood, agricultural crop residues, animal dung, charcoal, purpose-grown energy crops. Supplies ~5% of global primary energy in aggregate, but 60-80% of household energy in sub-Saharan Africa, South Asia, and parts of Latin America (often invisible in aggregate stats).", "id": "fc01"}, {"front": "Indoor Air Pollution from Biomass", "back": "WHO estimates ~3.8 million premature deaths annually from indoor air pollution caused by biomass combustion in open fires and poorly vented cookstoves. Burden falls primarily on women and children who spend the most time near cooking fires. A major hidden public-health cost of traditional biomass.", "id": "fc02"}, {"front": "Deforestation from Traditional Biomass", "back": "In many low-income rural areas, wood is harvested faster than forests regenerate, particularly near urban centers where demand is high and alternatives are expensive. Result: forest degradation, reduced carbon storage, continued dependence on the same depleting resource.", "id": "fc03"}, {"front": "Biofuel", "back": "Liquid, gaseous, or solid fuel produced from recently living biological material. First-generation: ethanol from corn or sugarcane, biodiesel from soybean or palm oil. Second-generation: cellulosic non-food feedstocks. Third-generation: algae or similar non-crop sources.", "id": "fc04"}, {"front": "First-Generation Biofuels", "back": "Produced from food crops by mature fermentation or transesterification. Corn ethanol (US) — ~40% of US corn crop is diverted, large enough to influence global grain prices. Sugarcane ethanol (Brazil). Soybean biodiesel (US, Brazil, Argentina). Compete with food crops, raising the food-vs.-fuel debate.", "id": "fc05"}, {"front": "Net Energy Ratio (NER)", "back": "Ratio of energy content of fuel to fossil energy consumed in producing it (also called EROEI). NER > 1: fuel delivers more energy than it took to produce. NER < 1: energy sink. US corn ethanol NER ~1.3 (marginal). Brazilian sugarcane ethanol NER ~8.0 (substantial).", "id": "fc06"}, {"front": "Why Sugarcane Ethanol Outperforms Corn Ethanol", "back": "Two reasons: (1) sugarcane has higher fermentable sugar yield per hectare than corn, requiring less land/fertilizer/diesel per gallon of ethanol. (2) Brazilian mills burn the fibrous bagasse residue for process heat instead of natural gas, dramatically reducing fossil-energy inputs.", "id": "fc07"}, {"front": "Second-Generation Biofuels", "back": "Use cellulosic feedstocks: structural plant material (cellulose, hemicellulose, lignin) in agricultural residues like corn stover and wheat straw, or dedicated energy crops like switchgrass. Avoid food-vs.-fuel conflict but require costly enzyme cocktails or acid pretreatment to break down lignin. Few commercial plants operate.", "id": "fc08"}, {"front": "Third-Generation Biofuels", "back": "Primarily algal biodiesel. Algae produce oil at 10-100x higher per-hectare yields than soybeans, can grow on non-arable land using saline or wastewater, and do not compete with food crops. Cost and scaling challenges have prevented commercial deployment as of 2024.", "id": "fc09"}, {"front": "Hydroelectric Generation", "back": "Converts gravitational potential energy of elevated water into electricity via turbines. Global capacity ~1,400 GW supplies ~7% of primary energy and ~15% of global electricity — more than any other renewable source.", "id": "fc10"}, {"front": "Run-of-River vs. Large Reservoir Dam", "back": "Run-of-river: extracts energy from natural flow with minimal storage; modest ecological footprint, no large flooding, but output varies with seasonal flow. Large reservoir: dispatchable renewable power but causes upstream flooding, population displacement, and downstream sediment disruption.", "id": "fc11"}, {"front": "Three Gorges Dam (2012)", "back": "On Yangtze River, China. 22,500 MW installed (largest power station on Earth). Concrete gravity dam 2,335 m long, 181 m high. Reservoir 600 km long, >1,000 km^2. ~$30 billion construction cost. Forced relocation of ~1.4 million people from 13 cities, 140 towns, 1,000+ villages.", "id": "fc12"}, {"front": "Three Gorges Ecological Impacts", "back": "Traps ~530 Mt/yr of sediment that previously reached the Yangtze Delta, accelerating delta erosion. Contributed to functional extinction of the Yangtze River dolphin (baiji, declared functionally extinct 2007). Induced landslides and seismicity around reservoir margins.", "id": "fc13"}, {"front": "Lifecycle Accounting and Land Use", "back": "Net energy ratio is necessary but not sufficient. If grassland or forest is cleared to grow biofuel crops, the resulting CO2 release can take decades to repay even under favorable NER. Full lifecycle accounting must include land-use change emissions, fossil energy inputs, and feedstock processing.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
