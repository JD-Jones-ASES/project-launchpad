<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Surface Mining", "back": "Mining that extracts minerals or coal by removing the overlying soil and rock (overburden). Includes STRIP MINING (horizontal stripping of shallow seams), OPEN-PIT MINING (large excavation advancing downward), and MOUNTAINTOP REMOVAL (blasting and removing ridge summits). Surface mining accounts for approximately 60% of US mineral and coal production. Disturbs more land per unit of resource than subsurface mining but is generally lower cost and safer for workers.", "id": "fc01"}, {"front": "Strip Mining", "back": "Surface mining method that removes successive strips of overburden across a flat or gently rolling landscape, mining each strip and then restoring it with overburden from the next strip. Most common method for shallow coal seams in the eastern and midwestern United States. Regulated under the Surface Mining Control and Reclamation Act (SMCRA, 1977), which requires restoration to approximate original contour and a suitable post-mining land use, secured by a performance bond.", "id": "fc02"}, {"front": "Open-Pit Mining", "back": "Surface mining method that excavates a large pit, advancing progressively deeper as ore is extracted. Used for copper (Bingham Canyon, Utah — the largest man-made excavation on Earth), gold, iron, and phosphate. Waste rock (overburden and non-ore material) is piled in adjacent waste dumps; waste dumps can be geologically unstable and are sources of acid drainage if they contain sulfide minerals.", "id": "fc03"}, {"front": "Mountaintop Removal Mining (MTR)", "back": "A surface coal-mining method practiced in Central Appalachia (West Virginia, Kentucky, Virginia, Tennessee) in which explosives remove up to 300 meters of summit overburden to expose underlying coal seams. The removed rock and soil ('spoil') is deposited in adjacent valleys as VALLEY FILL, burying headwater streams. MTR has buried more than 3,200 km of Appalachian headwater streams and affected more than 500 mountain summits. Physical alteration is permanent — buried stream channels do not recover after mining ceases.", "id": "fc04"}, {"front": "Acid Mine Drainage (AMD)", "back": "Water with extremely low pH (as low as 2-3, comparable to lemon juice) and high dissolved metal concentrations, produced when pyrite (FeS2) in exposed rock and waste piles is oxidized by contact with oxygen and water — forming sulfuric acid and ferric hydroxide. The sulfuric acid then dissolves additional metals (iron, aluminum, manganese, arsenic, lead, cadmium). EPA estimates AMD affects more than 23,000 kilometers of US streams. Treatment requires indefinite alkaline neutralization (limestone or lime); abandoned mines continue producing acid drainage for centuries.", "id": "fc05"}, {"front": "Yellow Boy", "back": "The orange-red precipitate of iron hydroxide (ferric oxyhydroxide) that forms when AMD-affected water encounters less acidic conditions — typically as it enters streams. Yellow boy coats streambeds, eliminates benthic invertebrate habitat, and is the most visible indicator of AMD pollution. AMD-affected streams in the Appalachian coalfields, the Rocky Mountain mining districts, and the Iberian Pyrite Belt (Spain/Portugal) display this characteristic discoloration alongside lethal pH and metal concentrations.", "id": "fc06"}, {"front": "SMCRA (Surface Mining Control and Reclamation Act, 1977)", "back": "Federal law that established regulation of surface coal mining. Operators must restore mined land to its 'approximate original contour' and to a 'suitable' post-mining land use, secured by a performance bond held by regulators until reclamation is certified. The 'approximate original contour' requirement has been interpreted loosely for MTR operations, where summit removal makes literal restoration impossible. Critics note inconsistent enforcement, particularly for valley-fill projects.", "id": "fc07"}, {"front": "Subsurface (Underground) Mining", "back": "Mining that extracts ore or coal through shafts and tunnels without removing the overlying land surface. Two principal methods: ROOM-AND-PILLAR (excavates a grid of tunnels leaving columns of unmined material as pillars to support the roof; partial pillar extraction at closure causes planned subsidence) and LONGWALL (advances a large mechanized panel up to 400 m wide through a coal seam, allowing roof to collapse in controlled manner). Highly productive and safer for workers; surface subsidence over longwall panels is predictable but can damage buildings, roads, and surface water.", "id": "fc08"}, {"front": "Urban Sprawl", "back": "Low-density, automobile-dependent expansion of urban land use outward from city centers, typically onto agricultural, forest, and wetland land at the urban fringe. In the United States, developed land area grew from ~25 million acres in 1945 to over 100 million acres by 2000 — a fourfold increase while population only slightly more than doubled, reflecting a long-term decline in average residential density. Externalities include farmland loss, increased VMT and GHG emissions, ecosystem-service loss, heat island intensification, and spatial inequity.", "id": "fc09"}, {"front": "Smart Growth", "back": "A set of urban-planning principles designed to concentrate development, reduce vehicle dependence, and protect open space. Core tools: MIXED-USE ZONING (residential + commercial + employment in proximity, reducing trip length); TRANSIT-ORIENTED DEVELOPMENT (density around transit nodes); URBAN GROWTH BOUNDARIES (legally drawn limits on outward expansion, e.g., Portland Oregon's 1979 UGB); and BROWNFIELD RECLAMATION (redeveloping contaminated former industrial sites within existing urban areas). Associated with reduced GHG/capita, lower infrastructure cost/household, and greater preservation of peri-urban ecosystem services.", "id": "fc10"}, {"front": "Urban Growth Boundary (UGB)", "back": "A legally drawn boundary beyond which urban development is prohibited or heavily restricted. Portland, Oregon's UGB (adopted 1979) is the most studied US example; studies show it has reduced sprawl relative to comparable cities without UGBs. UGBs are a primary smart-growth tool for protecting peri-urban farmland, forest, and wetland from low-density development pressure. The boundary is periodically reviewed and expanded to accommodate population growth without abandoning the principle.", "id": "fc11"}, {"front": "Easter Island (Rapa Nui) Deforestation", "back": "Volcanic island ~165 km² in the remote South Pacific, colonized by Polynesian settlers ~800-1200 CE. Forest dominated by extinct palm species (Paschalococos disperta). Over centuries, islanders cleared forest for moai construction, deep-sea fishing canoes, agriculture, and fuel; by ~1500 CE the island was largely deforested. Pollen records confirm the transition. Polynesian rats may have accelerated decline by consuming palm seeds. Soil erosion; ocean-going canoes lost; deep-sea fishing ceased; population fell from ~15,000 peak to ~2,000-3,000 by 1722 European contact. Routinely invoked as parable of overshoot.", "id": "fc12"}, {"front": "Ecological Footprint (Wackernagel-Rees)", "back": "A measure of human demand on nature, expressed in GLOBAL HECTARES (gha) of biologically productive land and sea required to produce the resources a person/population consumes and to absorb wastes generated. Developed by Mathis Wackernagel and William Rees at UBC in early 1990s. Global average ~2.7 gha/person; biocapacity ~1.6 gha/person. Wide variation: US ~8.1 gha, India ~1.2 gha. If everyone lived as the average American, approximately FIVE Earths would be required. Methodological criticisms exist but the structural gap between consumption and biocapacity is real.", "id": "fc13"}, {"front": "Ecological Overshoot", "back": "The condition in which humanity's aggregate annual demand on nature — measured by ecological footprint — exceeds Earth's annual biocapacity to regenerate resources and absorb resulting waste. During overshoot, natural capital stocks (forests, fisheries, groundwater, fertile soil) are being LIQUIDATED faster than they regenerate. Humanity has been in overshoot since approximately the early 1970s; current overshoot factor is ~1.7 (humanity consumes ~1.7 Earths per year). Sustainable only temporarily — declining stocks eventually reduce biocapacity, forcing consumption back through deliberate policy or involuntary collapse.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
