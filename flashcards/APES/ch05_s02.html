<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Conservation (Pinchot sense)", "back": "The science-based, utilitarian management of natural resources to achieve the greatest good for the greatest number of people over the longest sustainable time horizon. Resources exist to be used; the task is to prevent waste and ensure that today's use does not foreclose tomorrow's. Compatible with — indeed requires — active use, extraction, and development under scientific standards. Distinguished sharply from preservation.", "id": "fc01"}, {"front": "Preservation (Muir sense)", "back": "The protection of natural systems and wild places from significant human alteration — based on the conviction that nature has intrinsic value independent of its usefulness to humans. Mountains and forests possess worth in themselves; preserving them is a moral obligation, not merely a prudent investment. The governing mandate of the National Park Service and the explicit purpose of designated wilderness under the 1964 Wilderness Act.", "id": "fc02"}, {"front": "Multiple Use (USFS Mandate)", "back": "The governing mandate of the U.S. Forest Service, codified in the Multiple-Use Sustained-Yield Act of 1960: national forests must be managed for a balanced combination of timber harvest, livestock grazing, mineral extraction, outdoor recreation, and wildlife/fish habitat. No single use may dominate to the exclusion of others, and aggregate use must not exceed the long-run productive capacity of the land. Stands in deliberate contrast to NPS's exclusive preservation mandate.", "id": "fc03"}, {"front": "Sustainable Yield", "back": "The maximum quantity of a renewable resource that can be harvested in a given period without reducing the stock's capacity to regenerate at the same rate. For forests, sustainable yield approximates the mean annual increment — the average annual volume of wood added by tree growth across a stand's age classes. When annual harvest equals annual regrowth, the forest maintains productive capacity indefinitely. When harvest exceeds regrowth, natural capital is being liquidated.", "id": "fc04"}, {"front": "Clearcutting", "back": "A harvesting method that removes every tree in a designated area in a single operation, regardless of species, size, or age. The CHEAPEST and most efficient method for industrial timber, ecologically appropriate for shade-intolerant species (e.g., Douglas fir) that regenerate best in full sunlight. But on steep slopes it accelerates erosion, eliminates canopy (raising stream temperatures, harming cold-water fish), and removes structural complexity. Recovery: 50-100 years; old-growth characteristics may take centuries.", "id": "fc05"}, {"front": "Selective Cutting (Selection Harvest)", "back": "A harvesting method that removes only the largest or most commercially valuable trees, leaving younger trees and forest structure intact. Maintains continuous canopy cover, reduces erosion, and preserves more biodiversity than clearcutting. Trade-offs: HIGHER operational cost and the tendency to remove the genetically superior individuals from the stand (genetic high-grading).", "id": "fc06"}, {"front": "Shelterwood Cutting", "back": "A harvesting method that removes the mature stand in two or three operations over a decade, leaving a 'shelter' of mature trees to provide seed and microclimate conditions for regeneration. Intermediate in disturbance and cost between clearcutting and selective cutting. Best suited to species that regenerate well under partial shade.", "id": "fc07"}, {"front": "Strip Cutting", "back": "A harvesting method that removes trees in narrow strips across the landscape, allowing adjacent intact forest to serve as a seed source and buffer. Reduces the edge effects of large clearcuts and maintains forest connectivity for wildlife movement. Intermediate cost and ecological impact between clearcutting and selective cutting.", "id": "fc08"}, {"front": "U.S. Forest Service (USFS)", "back": "Created in 1905 within the Department of Agriculture under Gifford Pinchot, manages approximately 193 million acres of national forests and grasslands under an explicit MULTIPLE-USE mandate. Timber harvest, livestock grazing, mining, water production, recreation, and wildlife habitat are all legitimate uses, balanced by professional managers under the principle of sustained yield (total extraction must not exceed long-run productive capacity).", "id": "fc09"}, {"front": "National Park Service (NPS)", "back": "Created by Congress in 1916 within the Department of the Interior; manages national parks and monuments under a PRESERVATION mandate: parks are to be 'conserved unimpaired for the enjoyment of future generations.' Commercial extraction is prohibited. The agency's mission is fundamentally preservationist in Muir's sense — distinct from the USFS multiple-use mandate.", "id": "fc10"}, {"front": "Hetch Hetchy Controversy (1908–1913)", "back": "The proposal to dam the Hetch Hetchy Valley INSIDE Yosemite National Park to supply water to San Francisco after the 1906 earthquake. Pinchot supported it as rational use; Muir led a national campaign against it as ecological vandalism. Congress passed the Raker Act in December 1913 authorizing the dam; Wilson signed it. The O'Shaughnessy Dam was completed in 1923; the valley remains flooded. Muir died in 1914 considering this his greatest defeat. The controversy radicalized the preservation movement and led to the 1964 Wilderness Act.", "id": "fc11"}, {"front": "Wilderness Act of 1964", "back": "Federal law that created the National Wilderness Preservation System — legally designated wilderness areas explicitly BEYOND the reach of development, even within otherwise managed federal lands. A direct response to the Hetch Hetchy precedent that national parks alone offered insufficient protection. Wilderness areas prohibit roads, motorized vehicles, structures, and commercial activities; the goal is preservation in Muir's strongest sense.", "id": "fc12"}, {"front": "Theodore Roosevelt (1858-1919)", "back": "The 26th US President and the most consequential figure in American land conservation. Established the U.S. Forest Service (1905) under Pinchot's direction; invoked the Antiquities Act (1906) eighteen times to designate national monuments including the Grand Canyon; created five new national parks; withdrew approximately 230 million acres from private sale (an area larger than Texas + California). Convened the 1908 Governors' Conference on Conservation. Occupied a 'complex middle position' between Pinchot and Muir — Pinchot's closest ally institutionally, yet sharing Muir's reverence for wild places.", "id": "fc13"}, {"front": "Yellowstone Wolf Reintroduction (1995)", "back": "The 1995 reintroduction of gray wolves to Yellowstone National Park triggered one of the most studied trophic cascades in ecological history. Wolves reduced elk overgrazing, allowing riparian willows and aspens to regenerate. The recovery restored beaver populations, stabilized streambanks, and increased bird and fish diversity across thousands of hectares. Possible only because Yellowstone is managed for ecological integrity (preservation) rather than extractive use — illustrating how preservationist management generates ecosystem-service values undercount by utilitarian frameworks.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
