<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 4, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Watershed (Drainage Basin)", "back": "The entire area of land that drains via surface runoff, streams, and rivers to a common outlet point. Boundaries are defined by topographic divides (ridgelines), not political lines. The Mississippi watershed covers ~3.2 million km^2 across 31 states and 2 Canadian provinces. Land use anywhere in the basin affects water quality at the outlet — the canonical reason why upstream-downstream pollution accountability is so hard.", "id": "fc01"}, {"front": "Surface Runoff vs. Groundwater", "back": "The two pathways water takes to leave a watershed. Surface runoff travels over the land surface to streams; it moves quickly (hours to days) and dominates flood response. Groundwater infiltrates through soil into aquifers and moves slowly (years to millennia); it provides base flow to streams between rains and is the long-term water reservoir for wells, springs, and ecosystems.", "id": "fc02"}, {"front": "Aquifer", "back": "A permeable geological formation — sand, gravel, fractured rock, or karst limestone — that stores groundwater in pore spaces or fractures and yields it in economically significant quantities to wells or springs. Unconfined aquifers are open to direct recharge from above; confined aquifers are bounded by an impermeable aquitard, recharge only where the formation outcrops, and can produce artesian flow due to pressure transmitted from distant elevated recharge zones.", "id": "fc03"}, {"front": "Aquifer Recharge", "back": "The process by which precipitation or surface water infiltrates downward to the saturated zone of an aquifer. Recharge rates depend on precipitation amount, soil permeability, land cover, and depth to water table. Shallow alluvial aquifers along rivers can recharge near-instantaneously; deep arid-region aquifers like the Ogallala recharge at only 1-3 cm/yr. Sustainable yield requires withdrawals at or below recharge.", "id": "fc04"}, {"front": "Ogallala (High Plains) Aquifer", "back": "Underlies ~450,000 km^2 of the US Great Plains from South Dakota to Texas. Filled primarily during the wetter Pleistocene over thousands of years. Modern withdrawal rates (30-60 cm/yr in heavy-irrigation zones) far exceed natural recharge (1-3 cm/yr). Water tables have dropped 30 m or more since 1950s. The canonical example of fossil water depletion — millennia of accumulated water mined in decades.", "id": "fc05"}, {"front": "Solar Radiation Budget", "back": "Of the ~342 W/m^2 reaching the top of Earth's atmosphere on average: ~30% is reflected back to space (clouds ~20%, surface ~10%); ~20% is absorbed by the atmosphere (water vapor, dust, ozone, clouds); ~50% is absorbed at the surface (driving evaporation, photosynthesis, and the thermal emissions that greenhouse gases trap). Earth's effective albedo is ~0.30.", "id": "fc06"}, {"front": "Albedo", "back": "The fraction of incident solar radiation reflected by a surface, dimensionless from 0 (perfect absorber) to 1 (perfect reflector). Fresh snow ~0.85, sea ice ~0.60, forests ~0.10-0.15, open ocean ~0.06-0.07, asphalt ~0.05. Lower-albedo surfaces absorb more energy and warm; higher-albedo surfaces reflect more and stay cooler. Land-cover changes alter albedo and force regional and global climate.", "id": "fc07"}, {"front": "Ice-Albedo Feedback", "back": "A canonical positive (amplifying) climate feedback. Warming melts sea ice (albedo ~0.60), exposing open ocean (albedo ~0.07). The dark water absorbs ~9x more solar energy per unit area than ice, accelerating local warming and further ice loss. This feedback is a primary reason Arctic warming runs 2-4x faster than global average temperatures and is one of the most-studied climate amplifiers.", "id": "fc08"}, {"front": "Earth's Axial Tilt", "back": "Earth's rotational axis is tilted 23.5 degrees relative to the plane of its orbit around the Sun. This tilt is the cause of Earth's seasons. As Earth orbits, the tilt causes hemispheres to alternate between facing toward and away from the Sun, varying the angle of incoming sunlight (energy concentration per area) and day length. The tilt is fixed in direction over a year, so the seasonal cycle is predictable and globally synchronized.", "id": "fc09"}, {"front": "Why Seasons Are NOT About Distance", "back": "Earth's orbit is nearly circular — perihelion (early January) and aphelion (early July) differ by only ~3% in distance. If distance drove seasons, both hemispheres would have summer simultaneously. Instead, axial tilt determines which hemisphere receives concentrated, long-day sunlight: the hemisphere tilted toward the Sun has summer; the other has winter. Seasons in opposite hemispheres are mirror-image and simultaneous, a hallmark of tilt-driven seasons.", "id": "fc10"}, {"front": "Solstice", "back": "One of two moments per year when the Sun reaches its maximum or minimum declination from the celestial equator. June solstice (~June 21) — Sun at +23.5 degrees declination, perpendicular at the Tropic of Cancer; longest day in the Northern Hemisphere. December solstice (~December 21) — Sun at -23.5 degrees, perpendicular at the Tropic of Capricorn; shortest day in the Northern Hemisphere. Above 66.5 degrees latitude, the Sun does not set (midnight Sun) or does not rise (polar night).", "id": "fc11"}, {"front": "Equinox", "back": "One of two moments per year when the Sun crosses the celestial equator, with day and night approximately equal in length across the globe. Vernal (spring) equinox in the Northern Hemisphere — ~March 21. Autumnal equinox — ~September 22. At equinoxes, solar rays strike perpendicular at the equator, the Sun rises due east and sets due west, and at every latitude day and night are ~12 hours each. Equinoxes mark the transitions between the seasons.", "id": "fc12"}, {"front": "Latitudinal Precipitation Pattern", "back": "Predictable from atmospheric circulation: rising air at the ITCZ (~0 degrees) and at the Ferrel-Polar convergence (~60 degrees) cools adiabatically, condensing moisture into rain — these are the wet belts (rainforests, boreal forests). Descending air at ~30 degrees and at the poles warms adiabatically, suppressing precipitation — these are the dry belts (Sahara, Sonoran, Australian Outback, polar deserts). Most freshwater recharge therefore occurs near 0 degrees and ~60 degrees.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
