<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 9, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Ocean as Heat Reservoir", "back": "The ocean has absorbed approximately 91% of the excess heat trapped by anthropogenic greenhouse gases since 1970, with the atmosphere, land, and cryosphere sharing the remaining 9%. Ocean heat content in the upper 2,000 m has reached new records in 2020-2024 consecutively. The buffering has slowed atmospheric warming significantly but at the cost of thermal expansion, marine heatwaves, and disruption of thermohaline circulation.", "id": "fc01"}, {"front": "Ocean Acidification", "back": "The ongoing decrease in seawater pH caused by absorption of anthropogenic CO2, which reacts with seawater to form carbonic acid (H2CO3) that releases hydrogen ions (H+). Surface ocean pH declined from approximately 8.2 (pre-industrial) to approximately 8.1 today — a 26% increase in [H+] — and is projected to reach approximately 7.8 by 2100, a 151% increase from pre-industrial.", "id": "fc02"}, {"front": "Carbonic Acid Reaction", "back": "CO2 dissolved in seawater forms a weak acid: CO2 + H2O <-> H2CO3 <-> H+ + HCO3-. The H+ ions lower pH and react with carbonate: H+ + CO3^2- -> HCO3-. This consumes carbonate ions needed by calcifying organisms (corals, pteropods, oysters) for shell and skeleton formation.", "id": "fc03"}, {"front": "pH Calculation for Acidification", "back": "Because pH = -log10[H+], each unit drop in pH represents a 10x increase in [H+]. Pre-industrial pH 8.2 to current 8.1: [H+]_now/[H+]_pre = 10^(8.2-8.1) = 10^0.1 = 1.26 (26% increase). Projection to pH 7.8 by 2100: 10^(8.2-7.8) = 10^0.4 = 2.51 (151% increase). Small pH numbers, large [H+] consequences.", "id": "fc04"}, {"front": "Saturation State (Omega)", "back": "The ratio of the ion product of calcium and carbonate ions in seawater to the solubility product constant of a specific calcium carbonate mineral (calcite or aragonite). Omega > 1 = supersaturated and shells can form; Omega < 1 = corrosive water and CaCO3 shells dissolve. Ocean acidification reduces aragonite and calcite saturation, threatening calcifying organisms including corals, pteropods, oysters, and coccolithophores.", "id": "fc05"}, {"front": "Marine Heatwave (MHW)", "back": "A prolonged, discrete period of anomalously high sea-surface temperature in a given region, defined as conditions exceeding the 90th percentile of the historical temperature distribution for at least five consecutive days. Classified from 'moderate' to 'extreme'. MHWs cause mass coral bleaching, toxic algal blooms, fish displacement, marine mammal die-offs, and destruction of kelp and seagrass beds.", "id": "fc06"}, {"front": "Northeast Pacific Blob (2014-2016)", "back": "A major marine heatwave that raised sea-surface temperatures in a large patch of the Pacific by up to 3 degrees C above normal for over two years. Triggered massive toxic algal blooms, widespread seabird die-offs, and the displacement of warm-water species from California to Alaska. A landmark example of MHW ecological consequences.", "id": "fc07"}, {"front": "Coral Bleaching", "back": "Thermal stress causes corals to expel their symbiotic photosynthetic algae (zooxanthellae). The white CaCO3 skeleton becomes visible through transparent tissue — the 'bleaching'. Bleached coral is not dead: zooxanthellae can recolonize within weeks if temperatures return to normal. But if heat stress persists, corals starve (zooxanthellae provide 70-90% of energy) and die. Mass bleaching has increased dramatically with ocean warming.", "id": "fc08"}, {"front": "Great Barrier Reef Bleaching Events", "back": "Mass bleaching events on the Great Barrier Reef occurred in 1998, 2002, 2016, 2017, 2020, 2022, and 2024 — the interval has collapsed from years to nearly annual. Acidification interacts synergistically: reduced calcification rates slow reef recovery between bleaching events, making the reef increasingly unable to rebuild before the next thermal anomaly arrives.", "id": "fc09"}, {"front": "Pteropods (Sea Butterflies)", "back": "Free-swimming pelagic snails with thin aragonite shells. Form a critical link in polar and sub-polar food webs as primary consumers of phytoplankton, prey for fish, seabirds, and whales. Especially vulnerable to ocean acidification because cold polar water is already most acidified. Documented shell dissolution in the Southern Ocean. Indicator species for acidification impacts.", "id": "fc10"}, {"front": "Pacific NW Oyster Hatchery Collapse", "back": "Hatchery collapses on the US Pacific Northwest coast in the 2000s-2010s were linked to upwelling of corrosive water (low aragonite saturation). Cold, deep water that absorbed CO2 decades ago surfaced with Omega-aragonite < 1, dissolving thin larval oyster shells before they could harden. An early signal of conditions that will become more widespread as acidification progresses.", "id": "fc11"}, {"front": "Calcifying Organisms at Risk", "back": "Corals (aragonite skeletons), pteropods (thin aragonite shells), bivalves like oysters/mussels/clams (calcite or aragonite), and coccolithophores and foraminifera (microscopic calcite shells). All build their structures from calcium carbonate that dissolves under low aragonite/calcite saturation. Reduced calcification rates threaten reef growth, polar food webs, fisheries, and the biological carbon pump.", "id": "fc12"}, {"front": "Coccolithophores and Foraminifera", "back": "Microscopic planktonic organisms that form calcite shells. Major contributors to the biological carbon pump (sinking organic carbon to the deep ocean) and to marine food webs. Thinner shells under acidified conditions reduce their effectiveness as carbon sinks and alter their food-web role. Ocean chemistry changes affect both ecosystem function and global carbon cycling.", "id": "fc13"}, {"front": "Why Cold Water Acidifies First", "back": "CO2 solubility is higher in cold water than warm water. Polar and sub-polar surface waters absorb proportionally more CO2 per unit volume than tropical waters, so they reach low aragonite saturation first. The Southern Ocean shows the most advanced acidification globally, which is why pteropod shell dissolution there is an early warning signal.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
