<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Nitrogen Cycle Reservoirs", "back": "Atmosphere (N2, the largest reservoir at 78% of air), living organisms (amino acids and nucleic acids), soil (NH4+, NO2-, NO3-), and fresh and ocean water (dissolved inorganic and organic nitrogen). Despite the vast atmospheric pool, nitrogen is frequently limiting because N2 is chemically inert and unavailable to most organisms.", "id": "fc01"}, {"front": "Nitrogen Fixation", "back": "Conversion of atmospheric N2 into ammonia (NH3) or ammonium (NH4+), forms living organisms can incorporate. Carried out almost exclusively by specialized prokaryotes — free-living soil bacteria (Azotobacter, cyanobacteria) and mutualistic species (Rhizobium in legume root nodules) — plus a small contribution from lightning. Industrially replicated by the Haber-Bosch process at high temperature and pressure.", "id": "fc02"}, {"front": "Nitrification", "back": "A two-step microbial oxidation: ammonia or ammonium is first converted to nitrite (NO2-) by Nitrosomonas bacteria, then to nitrate (NO3-) by Nitrobacter. Nitrate is highly water-soluble — both the most plant-available form of inorganic nitrogen and the most easily leached from agricultural soils into streams and groundwater.", "id": "fc03"}, {"front": "Assimilation", "back": "The uptake of inorganic nitrogen (NH4+ or NO3-) by plants and microbes and its incorporation into organic molecules — amino acids, nucleotides, chlorophyll. Animals obtain organic nitrogen by consuming other organisms. Assimilation is the bridge from inorganic soil nitrogen to the biotic compartment of the cycle.", "id": "fc04"}, {"front": "Ammonification (Mineralization)", "back": "The decomposition of organic nitrogen back to ammonium by bacteria and fungi. Every dead organism, every digested protein, releases nitrogen this way. Ammonification is the crucial link that returns organic nitrogen to inorganic forms available for plant uptake — closing the loop within the biotic-soil portion of the cycle.", "id": "fc05"}, {"front": "Denitrification", "back": "Conversion of nitrate (NO3-) back to N2 (and sometimes N2O, a potent greenhouse gas) under anaerobic conditions — waterlogged soils, sediments, oxygen-depleted water. Denitrifying bacteria use nitrate as an electron acceptor in the absence of oxygen. Denitrification is the only process that returns nitrogen to the atmospheric reservoir, closing the cycle.", "id": "fc06"}, {"front": "Haber-Bosch Process", "back": "Industrial nitrogen fixation, first operated commercially in 1913. Now adds ~120 Tg N/yr for fertilizer — roughly equal to all pre-industrial natural fixation combined. This near-doubling of reactive nitrogen entering the biosphere is the foundation of modern agriculture and one of the most profound human alterations of any biogeochemical cycle.", "id": "fc07"}, {"front": "Phosphorus Cycle (No Atmospheric Form)", "back": "Phosphorus has no significant atmospheric reservoir. It moves from lithosphere (apatite minerals in igneous rock) to soil and water through weathering, then accumulates in ocean sediment for millions of years before tectonic uplift exposes it again. The absence of a gas phase means there is no fast 'reset' mechanism — the cycle operates on far longer timescales than nitrogen.", "id": "fc08"}, {"front": "Phosphate Uptake and Recycling", "back": "Plants and microbes take up phosphorus as the phosphate ion (PO4^3-), incorporating it into ATP, DNA, RNA, and structural phospholipids. Decomposition of organic matter returns phosphorus to soil. Much of the phosphorus applied as agricultural fertilizer runs off into streams and lakes, where it drives explosive algal growth — the eutrophication mechanism.", "id": "fc09"}, {"front": "Limiting Nutrient", "back": "The nutrient whose availability exerts the greatest control over the rate of primary production. When that nutrient is added, productivity rises; when scarce, productivity is constrained regardless of other resources. Nitrogen is typically limiting in marine ecosystems; phosphorus is typically limiting in freshwater. Many transitional systems are co-limited.", "id": "fc10"}, {"front": "Eutrophication", "back": "The process by which a body of water becomes enriched in dissolved nutrients — especially nitrogen and phosphorus — supporting dense algal and plant growth that ultimately depletes oxygen and degrades water quality. Cultural eutrophication, caused by human nutrient loading (fertilizer runoff, sewage), occurs far faster than natural eutrophication.", "id": "fc11"}, {"front": "Hypoxic Dead Zone", "back": "An area of water with depleted oxygen where most aquatic animals cannot survive. Mechanism: nutrient loading drives explosive algal bloom; bloom dies and decomposes; bacterial respiration consumes dissolved oxygen during decay; oxygen falls below survival thresholds. The Gulf of Mexico dead zone — driven by Mississippi River fertilizer runoff — covers thousands of square kilometers each summer.", "id": "fc12"}, {"front": "Phosphorus Finiteness", "back": "Phosphate rock is a non-renewable resource mined primarily in Morocco, China, and Florida. Estimates of economically recoverable reserves range from a few decades to a few centuries depending on extraction technology and price. There is no technological substitute for phosphorus in agriculture, making it the rare case of a nutrient with a genuinely finite long-term supply.", "id": "fc13"}, {"front": "Reactive Nitrogen Cascade", "back": "Industrial nitrogen fixation has consequences that ripple through every ecosystem: nitrate leaching into groundwater (contaminating drinking water), nitrogen deposition acidifying forest soils, N2O emissions contributing to climate change and stratospheric ozone depletion, and coastal hypoxia driven by nitrogen loading. One molecule of fixed nitrogen can cycle through many of these pathways before denitrification returns it to N2.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
