<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Greenhouse Effect", "back": "The process by which atmospheric gases (water vapor, CO2, methane, nitrous oxide, ozone) absorb outgoing infrared radiation from Earth's warmed surface and re-radiate it in all directions, including back toward the surface. The natural greenhouse effect raises Earth's surface temperature about 33 degrees C above what a bare rock at the same distance from the Sun would equilibrate at, making the planet habitable. Anthropogenic emissions amplify the effect.", "id": "fc01"}, {"front": "Radiative Forcing", "back": "The change in net energy flux at the top of the troposphere caused by a perturbation to the climate system, measured in watts per square meter (W/m^2). Positive forcing means Earth retains more energy than it emits — a warming influence. The total anthropogenic forcing (1750 to present) is approximately +3.0 W/m^2; CO2 alone contributes about +2.1 W/m^2.", "id": "fc02"}, {"front": "Carbon Dioxide (CO2)", "back": "The most abundant anthropogenic greenhouse gas by mass and cumulative forcing. Sources: fossil-fuel combustion (dominant), deforestation, cement production. Pre-industrial concentration ~280 ppm; 2024 concentration ~422 ppm — a 51% increase unprecedented in the 800,000-year ice-core record. Atmospheric lifetime: decades to centuries with a millennial fraction. GWP_100 = 1 (reference value).", "id": "fc03"}, {"front": "Methane (CH4)", "back": "Potent greenhouse gas with GWP_100 of 27-30 times CO2. Sources: fossil-fuel extraction and distribution leakage, livestock enteric fermentation, rice paddy flooding (anaerobic microbial decomposition), landfill decomposition, and thawing permafrost. Atmospheric concentration has risen from a pre-industrial ~700 ppb to ~1930 ppb in 2024, making it the second-most-important anthropogenic greenhouse gas.", "id": "fc04"}, {"front": "Nitrous Oxide (N2O)", "back": "Greenhouse gas with GWP_100 of approximately 273 times CO2. Sources: synthetic nitrogen fertilizers (nitrification and denitrification in soils), livestock manure, fossil-fuel and biomass combustion. Concentration has risen from a pre-industrial ~270 ppb to ~336 ppb in 2024. N2O also depletes stratospheric ozone and is now the dominant ozone-depleting substance as CFC concentrations decline.", "id": "fc05"}, {"front": "Fluorinated Gases (F-gases)", "back": "Entirely synthetic compounds including hydrofluorocarbons (HFCs, introduced as CFC substitutes), perfluorocarbons (PFCs), and sulfur hexafluoride (SF6). SF6 has GWP_100 of about 23,500 — the highest of any well-characterized atmospheric gas. Sources include industrial refrigeration, semiconductor manufacturing, and high-voltage electrical switchgear. The 2016 Kigali Amendment to the Montreal Protocol established an HFC phase-down.", "id": "fc06"}, {"front": "Global Warming Potential (GWP_100)", "back": "A standardized measure comparing the cumulative radiative effect of one unit mass of a greenhouse gas to one unit mass of CO2 over a 100-year timescale. CO2 = 1 (reference); CH4 = 27-30; N2O = 273; SF6 = 23,500. GWP captures both the molecule's infrared absorption efficiency and its atmospheric lifetime, allowing different gases to be compared on a common scale.", "id": "fc07"}, {"front": "Water-Vapor Feedback (Positive)", "back": "As temperature rises, the atmosphere holds about 7% more water vapor per degree C of warming. Additional water vapor traps more outgoing infrared, amplifying the original warming. This positive feedback roughly doubles the direct warming that CO2 alone would produce, making it the largest single amplifying feedback in the climate system. Critically, water vapor is a feedback (responds to temperature), not a forcing.", "id": "fc08"}, {"front": "Ice-Albedo Feedback (Positive)", "back": "As temperatures rise, snow and ice melt, replacing high-albedo surfaces (fresh snow ~0.80-0.90, sea ice 0.50-0.70) with low-albedo ocean (~0.06) or tundra (~0.15-0.20). The darker surface absorbs more solar radiation, generating further warming and more melt. This feedback drives Arctic amplification — the Arctic is currently warming approximately three times faster than the global average.", "id": "fc09"}, {"front": "Planck Response (Negative)", "back": "By the Stefan-Boltzmann law, a body's radiation flux scales with the fourth power of its absolute temperature. A warmer Earth therefore emits more energy to space, returning the climate system toward energy balance at a new, higher temperature. This is the primary negative feedback that prevents runaway warming and ensures the climate equilibrates at a new (warmer) steady state for any given forcing.", "id": "fc10"}, {"front": "Forcing vs. Feedback", "back": "A forcing is an external perturbation that drives the climate (CO2 emissions, solar variability, volcanic aerosols). A feedback is a process whose magnitude depends on temperature (water vapor, ice albedo, clouds). The water-vapor argument fails because water vapor is a feedback that responds to whatever drives the forcing — removing CO2 forcing would reduce water vapor and the warming both.", "id": "fc11"}, {"front": "Observed Temperature Record", "back": "Direct instrumental temperature measurements have been compiled globally since approximately 1880. Global average surface temperature has risen approximately 1.1-1.2 degrees C above the 1850-1900 pre-industrial baseline. Roughly half of the total increase has occurred since 1980. The years 2014-2024 are the ten warmest on record; 2023 was the warmest single year measured.", "id": "fc12"}, {"front": "Attribution Science", "back": "The methodology of comparing climate model runs with and without anthropogenic forcing to determine the cause of observed warming. Natural-forcing-only models cannot reproduce the post-1975 warming; including anthropogenic forcing matches observations. IPCC AR6 (2021) concluded 'it is unequivocal that human influence has warmed the atmosphere, ocean and land' — the strongest attribution language in IPCC history.", "id": "fc13"}, {"front": "IPCC Sixth Assessment Report (AR6)", "back": "The 2021 Intergovernmental Panel on Climate Change report synthesizing global climate science. Key finding: 'it is unequivocal that human influence has warmed the atmosphere, ocean and land.' Multiple reconstructions confirm the current rate of warming is at least ten times faster than any natural warming event in the post-glacial record. AR6 also reframed temperature targets around the 1.5 degrees C goal under the Paris Agreement.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
