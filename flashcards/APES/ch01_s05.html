<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Matter Cycles, Energy Flows", "back": "The fundamental asymmetry of ecology. Atoms in carbon, nitrogen, and phosphorus cycles can be reused indefinitely. Energy, by contrast, follows a one-way path: solar input → producers → consumers → decomposers → heat. The Second Law of Thermodynamics ensures energy degrades to heat at every transfer, so energy must be continuously resupplied while atoms are recycled.", "id": "fc01"}, {"front": "Autotrophs (Producers)", "back": "Organisms that manufacture their own food from inorganic compounds and an energy source. Photoautotrophs (plants, algae, cyanobacteria) use sunlight; chemoautotrophs (deep-sea vent bacteria) use chemical-bond energy from inorganic compounds like H2S. Autotrophs are the producers — the entry point of energy into virtually every ecosystem.", "id": "fc02"}, {"front": "Gross Primary Productivity (GPP)", "back": "The total rate of energy fixed by photosynthesis: total chemical energy stored in organic molecules per unit area per unit time before any is used by the plant itself. GPP represents the theoretical ceiling on how much energy is available to consumers.", "id": "fc03"}, {"front": "Net Primary Productivity (NPP)", "back": "Energy remaining after autotrophic respiration: NPP = GPP - R_autotrophic. NPP is what ecologists measure in the field and the quantity that matters to the rest of the food web — only the NPP surplus is available to herbivores. Tropical rainforests have the highest GPP and NPP of any terrestrial biome; open ocean has the highest total GPP by virtue of its enormous surface area.", "id": "fc04"}, {"front": "Trophic Level", "back": "A position in a food chain or food web defined by feeding relationships: producers (first level), primary consumers (second level), secondary consumers (third level), and so on. A food chain is a linear sequence; a food web is the more realistic network of overlapping food chains. Energy moves from one trophic level to the next at low efficiency.", "id": "fc05"}, {"front": "10% Rule (Lindeman's Efficiency Law)", "back": "On average, ~10% of the energy at one trophic level is transferred to and stored in the biomass of the next trophic level. The remaining ~90% is lost as heat (Second Law) or to feces, urine, and movement. Actual transfer efficiencies range from ~5% (warm-blooded predators) to ~20% (small ectotherms). 10% is the AP-canonical figure.", "id": "fc06"}, {"front": "Energy Loss Pathways at Each Trophic Transfer", "back": "Three main routes for the ~90% of energy lost at each transfer: (1) heat generated by cellular respiration (Second Law); (2) feces and urine carrying undigested or excreted organic matter to decomposers; (3) energy expended in movement, thermoregulation, and other non-biomass activities. None of these contribute to building new tissue at the next trophic level.", "id": "fc07"}, {"front": "Food-Chain Length Constraint", "back": "Cumulative energy losses limit productive food chains to about four or five trophic levels. Each level retains only ~10% of the energy from the level below, so apex predators receive a tiny fraction of the producer flux. This constraint explains why apex predators are always rare relative to prey, and why animal agriculture is energetically far less efficient than grain agriculture for feeding humans.", "id": "fc08"}, {"front": "Math Routine: 10% Rule Energy Budget", "back": "Forward problem: 10,000 kcal grass × 0.10 = 1,000 grasshoppers × 0.10 = 100 frogs × 0.10 = 10 snakes × 0.10 = 1 kcal hawk (per m² per year). Reverse problem: a hawk needing 1,000 kcal/yr requires 10,000 kcal of snakes, 100,000 of frogs, 1,000,000 of grasshoppers, and 10,000,000 kcal of grass. Working backward = multiply by 10 per trophic level.", "id": "fc09"}, {"front": "Decomposers and the Detrital Pathway", "back": "Bacteria and fungi that break down dead organic matter (detritus), releasing chemical energy and nutrients. In most ecosystems, more plant biomass enters the detrital pathway through leaf litter, dead roots, and woody debris than through direct herbivory. Uneaten prey, dead herbivores, feces, and shed skin from every trophic level also feed decomposers, making the decomposer web energetically wealthier than the herbivory chain implies.", "id": "fc10"}, {"front": "Decomposers Couple Energy Flow to Nutrient Cycling", "back": "Decomposers simultaneously dissipate energy (as heat from microbial respiration) and mineralize nutrients (N, P, C in organic molecules) back to inorganic forms available for plant uptake. The decomposer pathway links energy flow to biogeochemical cycling — the two processes are coupled at every step, not separate.", "id": "fc11"}, {"front": "Light-Bottle / Dark-Bottle Method", "back": "Field method for measuring NPP and GPP in aquatic systems via dissolved oxygen change. Light bottle integrates photosynthesis minus respiration (NPP measurable as DO rise); dark bottle isolates respiration alone (DO fall). Calculations: NPP = Final DO_light - Initial DO; R = Initial DO - Final DO_dark; GPP = NPP + R. Conversion: 1 mg O2/L ≈ 0.375 mg C/L based on the photosynthesis molar ratio.", "id": "fc12"}, {"front": "Apex Predator Rarity", "back": "A direct consequence of the 10% rule: apex predators receive less than 0.1% of the producer NPP after four trophic transfers. To support viable population sizes, apex predators must occupy enormous territories — a savanna can support thousands of wildebeest but only a handful of lions. Conservation strategy must account for this energy-imposed rarity.", "id": "fc13"}, {"front": "Why Animal Agriculture Is Less Efficient", "back": "Feeding grain directly to humans places people at trophic level 2; feeding grain to cattle and then humans places people at trophic level 3 — losing another 90% of the energy. The 10% rule is therefore the energetic argument for plant-based diets in the context of food-system sustainability. The same calorie of grain feeds about 10 humans directly or 1 human via cattle.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
