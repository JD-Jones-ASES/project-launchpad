<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "System", "back": "A set of interacting components that together form a functional whole. Earth is a system divided into four interacting spheres — atmosphere, hydrosphere, lithosphere, and biosphere — that exchange matter and energy through continuous physical, chemical, and biological processes. Stability emerges from the exchange itself, not from any sphere in isolation.", "id": "fc01"}, {"front": "Earth's Four Spheres", "back": "The atmosphere (gases), the hydrosphere (water in all phases), the lithosphere (rock, soil, sediment), and the biosphere (all living organisms and the environments they occupy). Each sphere continuously exchanges matter and energy with the others, producing the conditions on which life depends.", "id": "fc02"}, {"front": "Closed System for Matter / Open System for Energy", "back": "Earth is a closed system for matter — essentially no atoms arrive or leave, so the same atoms that built Cambrian trilobites cycle through living organisms today. Earth is an open system for energy — solar radiation continuously arrives and an approximately equal amount of infrared radiates back to space. This asymmetry is why human activity can disrupt cycles by accelerating fluxes but cannot create or destroy atoms.", "id": "fc03"}, {"front": "Biosphere", "back": "The sum of all ecosystems on Earth — every region of the planet's surface, water, and lower atmosphere where living organisms exist and interact with their physical surroundings. It extends from roughly 11 km below sea level (deep-ocean trenches) to roughly 15 km above (upper limit of viable bacterial spores in the stratosphere).", "id": "fc04"}, {"front": "Biotic vs. Abiotic Factors", "back": "Biotic factors are the living components of an ecosystem — all organisms, populations, and biological interactions (predation, competition, mutualism, decomposition). Abiotic factors are the nonliving physical and chemical components — temperature, light, water, nutrients, pH, substrate. The relationship is bidirectional: abiotic conditions determine which organisms can survive, but organisms also modify their abiotic environment (forests increase humidity; oyster reefs alter water flow; soil microbes form topsoil).", "id": "fc05"}, {"front": "Stock and Flow", "back": "A stock is any quantity that accumulates in a reservoir — atmospheric CO2, a wolf population, groundwater volume. A flow is the rate at which material or energy moves into or out of a stock. The stock's size at any moment equals its starting value plus the cumulative difference between all inflows and outflows over time. Stocks and flows are the formal vocabulary borrowed from systems analysis to reason about environmental change.", "id": "fc06"}, {"front": "Negative Feedback Loop", "back": "A stabilizing or balancing feedback in which a change in a system variable triggers responses that counteract the perturbation and push the system back toward its original state. Negative feedbacks are why ecosystems are generally stable — for example, a deer population that overshoots its food supply crashes from starvation, allowing vegetation to recover, which lets the deer population rebuild.", "id": "fc07"}, {"front": "Positive Feedback Loop", "back": "An amplifying feedback in which a change reinforces itself, accelerating the perturbation rather than damping it. Classic example: melting Arctic sea ice exposes dark ocean water that absorbs more solar radiation than reflective ice, raising temperature and melting more ice. Positive feedbacks explain how small perturbations can cascade into large, rapid shifts rather than returning to baseline.", "id": "fc08"}, {"front": "Emergent Properties", "back": "Characteristics of a whole system that none of its individual parts possess. A single nitrogen atom cannot cycle; it requires nitrogen-fixing bacteria, soil organisms, plant roots, and atmospheric chemistry working together. A single organism cannot regulate a climate; entire biospheres of photosynthesizers, ocean chemistry, and rock weathering are required. Emergent properties explain why reducing environmental science to lists of individual species or chemicals always misses something important.", "id": "fc09"}, {"front": "Dynamic Equilibrium", "back": "A state in which stocks remain roughly constant because inflows and outflows are balanced, even though material keeps moving through. A forest in dynamic equilibrium adds biomass through photosynthesis at roughly the same rate it loses biomass through respiration and decomposition; total carbon stock stays constant while individual trees are born and die. When equilibrium is disturbed by fire, logging, or climate shift, a new equilibrium establishes itself, often differing substantially from the original.", "id": "fc10"}, {"front": "Mechanism (AP Practice 1)", "back": "On the AP exam, naming the mechanism — the specific causal chain — is what earns full credit, not the outcome alone. \"Ice melts because it warms\" earns no credit. \"Ice melts because absorbed solar radiation exceeds the melting point, exposing dark water that absorbs more radiation, further raising ocean temperature\" earns full credit because it traces the perturbation step by step through the system.", "id": "fc11"}, {"front": "Water-Vapor / Cloud Negative Feedback", "back": "An example of a stabilizing feedback in climate science: increased evaporation from a warming surface can produce low clouds that reflect incoming solar radiation, partially offsetting the original warming. Contrast with the ice-albedo positive feedback, which amplifies warming by exposing dark, low-reflectivity ocean water as ice melts.", "id": "fc12"}, {"front": "Bidirectional Biotic-Abiotic Interaction", "back": "Organisms not only respond to abiotic conditions but also modify them. Tropical forests increase local humidity through transpiration; oyster reefs alter water-flow patterns and filter suspended particles; soil microorganisms slowly weather bedrock into productive topsoil. Recognizing this bidirectionality is essential for predicting how ecosystem disturbance (e.g., deforestation) propagates through a system.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
