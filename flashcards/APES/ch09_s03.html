<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Thermal Expansion", "back": "The increase in ocean volume — and therefore sea level — caused by warming water. Water molecules move faster and occupy slightly more space at higher temperatures, so the ocean surface rises as heat penetrates downward. Thermal expansion accounts for approximately one-third of observed sea-level rise and will continue for centuries after greenhouse gas concentrations stabilize, because the deep ocean warms on centennial timescales.", "id": "fc01"}, {"front": "Sea-Level Rise: Two Mechanisms", "back": "Thermal expansion (warming water expands, ~1/3 of observed rise) and land-ice melt (Greenland, Antarctica, mountain glaciers, ~2/3 of observed rise). Sea ice does NOT directly raise sea level when it melts — it already displaces its weight in water. Total sea-level rise since 1900 is approximately 20-23 cm; satellite altimeter rate since 1993 is ~3.4 mm/year and accelerating.", "id": "fc02"}, {"front": "Ice-Albedo Feedback", "back": "A positive climate feedback in which warming melts snow and ice, replacing high-albedo reflective surfaces (~0.7-0.9) with darker ocean or soil (~0.06-0.20). The darker surface absorbs more solar radiation, generating further warming and further ice loss. Ice-albedo feedback drives Arctic amplification — the Arctic is currently warming approximately three times faster than the global average.", "id": "fc03"}, {"front": "Albedo Values (Arctic Surfaces)", "back": "Fresh snow: 0.80-0.90 (high reflectance). Sea ice: 0.50-0.70 (moderate to high). Vegetated tundra: 0.15-0.20 (low). Ocean water: 0.06 (very low). The contrast between ice (~0.7) and ocean (~0.06) means each km^2 of lost sea ice exposes ocean that absorbs roughly 14 times more solar radiation than it reflected.", "id": "fc04"}, {"front": "Arctic Amplification", "back": "The observation that Arctic temperatures are rising approximately three times faster than the global mean. Driven primarily by ice-albedo feedback (loss of high-albedo snow and sea ice exposes darker ocean and soil). Arctic September sea-ice extent has declined ~13% per decade since 1979; the Arctic has lost roughly 75% of its summer sea-ice volume since satellite records began.", "id": "fc05"}, {"front": "Permafrost", "back": "Ground that remains at or below 0 degrees C continuously for at least two years. Permafrost underlies approximately 22-25% of the Northern Hemisphere's land area (Siberia, Alaska, northern Canada, Tibetan Plateau) and stores an estimated 1,700 Pg of frozen organic carbon — nearly twice the current atmospheric carbon burden of ~860 Pg.", "id": "fc06"}, {"front": "Permafrost Carbon Feedback", "back": "As permafrost thaws, microbial decomposition releases CO2 (aerobic) and CH4 (anaerobic, in flooded thermokarst features). Current global flux is approximately 0.37-0.81 Pg C/year (Schuur et al. 2022). The feedback is self-reinforcing: warming releases carbon, which warms further, which thaws more permafrost. Most IPCC scenarios do not yet adequately represent this feedback.", "id": "fc07"}, {"front": "Tipping Point", "back": "A threshold in the climate system beyond which a major component undergoes a rapid, self-sustaining change that is difficult or impossible to reverse on human timescales. Examples: Greenland Ice Sheet retreat (estimated at 1.5-2.0 C above pre-industrial), West Antarctic Ice Sheet marine instability, and boreal permafrost carbon release. Crossing one removes the possibility of reversal within any foreseeable future.", "id": "fc08"}, {"front": "Greenland Ice Sheet", "back": "Continental ice mass covering approximately 1.7 million km^2, containing enough water to raise global sea level by ~7.4 m if fully melted. Mass loss accelerated from ~50 Gt/year in the 1990s to ~250-280 Gt/year in the 2010s. Currently contributes ~0.7 mm/year to global sea-level rise. IPCC AR6 identifies a tipping point at 1.5-2.0 C beyond which retreat may become irreversible on millennial timescales.", "id": "fc09"}, {"front": "West Antarctic Ice Sheet (WAIS)", "back": "Marine-based ice sheet whose bedrock slopes inward toward the interior, creating geometric conditions favorable to marine-ice-sheet instability. If triggered, the collapse becomes self-sustaining as warm ocean water reaches deeper, more vulnerable ice. Could add several meters of sea-level rise this century if instability begins. Major source of high-end uncertainty in IPCC sea-level projections.", "id": "fc10"}, {"front": "Marine-Ice-Sheet Instability", "back": "A self-sustaining ice-sheet collapse mechanism that occurs where ice sheets sit on bedrock sloping inward toward the interior, allowing warm ocean water to penetrate progressively deeper as the grounding line retreats. Once triggered, retreat accelerates regardless of further warming. The mechanism makes WAIS particularly vulnerable and is the dominant high-end uncertainty in 21st-century sea-level projections.", "id": "fc11"}, {"front": "Thermokarst", "back": "Irregular, hummocky terrain produced when ice-rich permafrost thaws and the ground surface collapses, often creating depressions that fill with water. Flooded thermokarst features are anaerobic environments where methanogenic archaea decompose organic matter, releasing methane (CH4) rather than CO2. Thermokarst landscapes are increasingly common across the Arctic.", "id": "fc12"}, {"front": "Biome Shifts", "back": "The migration of vegetation zones in response to climate change. Tree lines in boreal forests and mountain ranges are migrating northward and upslope. Shrubs are encroaching on tundra (a darker surface, reducing albedo and amplifying local warming). Species distributions globally are shifting poleward at approximately 6 km per decade. Tropical disease vectors are expanding into higher latitudes and altitudes.", "id": "fc13"}, {"front": "Active Layer", "back": "The surface zone of permafrost that thaws each summer and refreezes each winter. As Arctic warming intensifies, the active layer is deepening, exposing previously perennially-frozen organic matter to microbial decomposition. Active-layer thickening is one of the primary monitored indicators of permafrost degradation and is the immediate trigger for permafrost carbon release.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
