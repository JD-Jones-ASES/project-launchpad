<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Eutrophication", "back": "Over-enrichment of a water body with nutrients (primarily nitrogen and phosphorus) that triggers explosive algal growth, oxygen depletion through decomposition, and ecosystem collapse. Distinguished by timescale: natural eutrophication unfolds over thousands of years as lakes accumulate sediment; cultural eutrophication unfolds over years to decades from human nutrient inputs.", "id": "fc01"}, {"front": "Cultural Eutrophication", "back": "Accelerated nutrient enrichment of a water body driven by human activity — agriculture, urban runoff, sewage discharge. Produces algal blooms, loss of submerged aquatic vegetation, oxygen depletion, and hypoxic or anoxic dead zones on timescales of years to decades. Importantly, cultural eutrophication is reversible if nutrient inputs are reduced, though sediment-bound phosphorus can sustain eutrophic conditions for years.", "id": "fc02"}, {"front": "Hypoxia and Dead Zone", "back": "Hypoxia: dissolved oxygen below 2 mg/L, sufficient to cause physiological stress and death in most aerobic aquatic organisms. A dead zone is a spatially defined hypoxic region, typically at depth, where the bottom-water oxygen is too low to support aerobic benthic life. Dead zones form most frequently in stratified coastal waters receiving high nutrient loads.", "id": "fc03"}, {"front": "Six-Step Mechanism: Field to Dead Zone", "back": "(1) Nutrient loading from agricultural runoff, urban stormwater, atmospheric deposition, sewage; (2) algal bloom triggered by nutrient pulse; (3) light attenuation by surface mats kills submerged aquatic vegetation; (4) algal die-off when nutrients are depleted, biomass sinks; (5) bacterial decomposition consumes dissolved oxygen faster than re-aeration; (6) hypoxia and fish kills below 2 mg/L DO.", "id": "fc04"}, {"front": "Limiting Nutrients in Freshwater vs. Marine Systems", "back": "In most freshwater systems, phosphorus is the limiting nutrient: algal growth runs out of P before N. In most coastal marine systems, dissolved inorganic nitrogen is the proximate control on algal growth. This shapes regulatory priorities — freshwater nutrient management focuses on phosphorus controls (e.g., detergent phosphate bans); marine eutrophication management targets nitrogen.", "id": "fc05"}, {"front": "Cyanobacterial Blooms", "back": "Blooms of cyanobacteria (blue-green algae) form dense surface mats in shallow water under warm, sunny, nutrient-rich conditions and can double in biomass within 24 hours. Many cyanobacteria species produce hepatotoxins, neurotoxins, and skin irritants dangerous to people, pets, and livestock. Lake closures and livestock-poisoning events are common during cyanobacterial blooms.", "id": "fc06"}, {"front": "Stratification and Thermocline", "back": "Vertical layering of water by temperature (and density), where a thermocline separates warmer, lighter surface water from cooler, denser bottom water. Stratification prevents mixing between surface and bottom waters, isolating the deep layer. During eutrophication, this isolation accelerates hypoxia: bacterial decomposition consumes O₂ in the stratified bottom layer with no replenishment from the surface.", "id": "fc07"}, {"front": "Gulf of Mexico Dead Zone", "back": "Largest recurring dead zone in the Western Hemisphere, formed annually at the outflow of the Mississippi-Atchafalaya River system. Average area 2000–2024: ~5,300 mi² (13,700 km²); 2017 peak: 8,776 mi². Drains ~41% of the contiguous US, with Corn Belt agriculture as the dominant nitrogen source. Approximately 1.5 million metric tons of dissolved inorganic nitrogen reach the Gulf annually.", "id": "fc08"}, {"front": "Chesapeake Bay TMDL", "back": "Historically the most productive estuary in North America; hypoxic zones have formed each summer since at least the 1960s due to agricultural runoff from the Susquehanna, Potomac, and James River watersheds. The 2010 Chesapeake Bay TMDL (\"pollution diet\") set nitrogen and phosphorus reduction targets binding on all six watershed states.", "id": "fc09"}, {"front": "Baltic Sea Dead Zone", "back": "Semi-enclosed sea with limited water exchange; nutrient inputs from intensively farmed catchments in Sweden, Poland, and Germany have produced persistent bottom-water anoxia covering more than 70,000 km² in some years — the largest anthropogenic marine dead zone on Earth.", "id": "fc10"}, {"front": "2008 Gulf Hypoxia Action Plan", "back": "Federal target of reducing nitrogen delivery to the Gulf by 45% and shrinking the dead zone to less than 5,000 mi². Progress has been modest: the dominant reduction strategy — voluntary payments to farmers for cover crops, reduced fertilizer application, and constructed wetland buffers — lacks enforcement. As of 2024, the five-year average remains above 5,500 mi². Scientists argue meeting the target requires binding nutrient standards.", "id": "fc11"}, {"front": "Spatial-Scale Mismatch", "back": "Fundamental challenge in environmental governance: the source of a pollution problem and its victims are geographically and politically separated. Corn Belt farmers apply fertilizer in Iowa/Illinois/Indiana; Gulf Coast shrimpers and ecosystems bear the cost. No single regulatory body governs both regions, so voluntary programs in source states lack the force to compel reductions the receiving region needs.", "id": "fc12"}, {"front": "Internal Loading", "back": "Re-release of phosphorus from lake or coastal sediments back into the water column over years, particularly under hypoxic conditions when iron-bound phosphate becomes mobilized. Internal loading sustains eutrophic conditions for years after external inputs are reduced, complicating recovery timelines.", "id": "fc13"}, {"front": "Eutrophication Control Strategies", "back": "(1) Source reduction: precision fertilizer management — soil testing, split-season applications, inhibitor-coated fertilizers; phosphorus detergent bans. (2) Interception: riparian buffers, constructed wetlands (40–80% N removal). (3) End-of-pipe: tertiary wastewater treatment removing N and P at POTWs. (4) Watershed-scale governance crossing state lines.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
