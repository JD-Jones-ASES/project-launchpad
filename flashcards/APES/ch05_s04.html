<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Aquifer", "back": "A subsurface geological formation of permeable rock, sediment, or soil that stores and transmits groundwater in extractable amounts. UNCONFINED aquifers are recharged directly by precipitation infiltrating from above. CONFINED aquifers are bounded by impermeable layers (aquitards) and recharged only in distant recharge zones. FOSSIL-WATER aquifers accumulated during wetter past climates and have negligible modern recharge rates — extracting them is non-renewable.", "id": "fc01"}, {"front": "Fossil Water", "back": "Groundwater that accumulated in an aquifer during past geological or climatic periods and is not being meaningfully recharged under current conditions. Extracting fossil water is analogous to mining a non-renewable resource — it can continue only until the economically accessible reserve is exhausted. The Ogallala Aquifer (US Great Plains) and deep aquifers of the Arabian Peninsula and North Africa are the largest known fossil-water reserves; depletion rates in all of these regions substantially exceed recharge.", "id": "fc02"}, {"front": "Ogallala (High Plains) Aquifer", "back": "A fossil-water aquifer underlying ~450,000 km² of the US Great Plains (South Dakota to Texas), supporting irrigation of ~30% of all groundwater-irrigated cropland in the United States — wheat, corn, sorghum, cotton. Natural recharge ~0.5 cm/yr; annual withdrawals exceed 30 cm/yr in some areas (60:1 mining ratio). Saturated thickness has declined ~30% on average and >60% in parts of Kansas/Texas since 1950s irrigation began. Portions will become economically unusable within decades.", "id": "fc03"}, {"front": "Flood Irrigation (Surface/Border)", "back": "Releases water at the top of a field and lets it flow across the surface under gravity. Efficiency ~50%: roughly half the water evaporates, runs off at the field margin, or percolates below the root zone without crop absorption. INEXPENSIVE to install and requires no specialized equipment, which keeps it dominant in developing-country agriculture despite its low efficiency.", "id": "fc04"}, {"front": "Furrow Irrigation", "back": "Directs water through shallow channels between crop rows. Efficiency ~60%. Like flood irrigation, gravity-driven and low-cost — but achieves somewhat better distribution because water concentrates between rows rather than spreading across the entire field surface. Common in row-crop agriculture in the developing world.", "id": "fc05"}, {"front": "Sprinkler Irrigation", "back": "Distributes water through pressurized pipes to overhead or lateral-move sprinklers that simulate rainfall. Efficiency ~75%. Main losses: evaporation from droplets in the air and interception by leaf canopy. More capital-intensive than surface methods but can irrigate irregular terrain and sandy soils that surface methods cannot reach uniformly.", "id": "fc06"}, {"front": "Drip Irrigation (Micro-Irrigation)", "back": "Delivers water directly to the root zone through low-pressure emitters at or just below the soil surface. Efficiency ~90% — the HIGHEST of any irrigation method. Water moves directly into soil without aerial dispersion; reduces wet soil surface area available for evaporation. Highest capital cost. Pioneered in Israel in the 1960s; California's Central Valley and Spain's Almería now rely heavily on it. Reduces total water use, energy costs, and salinization risk.", "id": "fc07"}, {"front": "Salinization", "back": "Accumulation of soluble salts in the soil profile to concentrations that inhibit plant growth. All irrigation water contains dissolved salts; when water evaporates and transpires, salts are left behind. Without adequate drainage, salts accumulate in the root zone over seasons and years. As salt concentration rises, osmotic potential prevents roots from absorbing water even when soil moisture is present. Salt-tolerant crops (barley, sugar beet, cotton) outlast sensitive ones (strawberries, soybeans, onions) but no crop persists indefinitely. Effectively irreversible without expensive leaching infrastructure.", "id": "fc08"}, {"front": "Land Subsidence", "back": "The gradual sinking of land surface caused by extraction of subsurface fluids. In California's Central Valley, agricultural pumping has caused documented subsidence of up to 9 meters over the past century, accelerating during droughts. The mechanism: fine-grained sediment layers (clays) compact when groundwater is removed and CANNOT re-expand when water returns. Subsidence permanently destroys aquifer storage capacity. Beijing has experienced up to 10 cm/yr in some areas.", "id": "fc09"}, {"front": "Mesopotamian Salinization (4,000 BP)", "back": "Possibly the oldest documented case of irrigation-induced salinization. Ancient irrigation records in the lower Mesopotamian river valleys (modern southern Iraq) suggest soil salinization began reducing barley yields ~4,000 years ago. By 1000 BCE the region had largely shifted from wheat (more salt-sensitive) to barley alone; by 1700 BCE agricultural productivity had declined enough to likely contribute to the collapse of Sumerian civilization. The same slow poisoning now threatens the Murray-Darling basin in Australia.", "id": "fc10"}, {"front": "Aral Sea Desiccation", "back": "Once the world's fourth-largest lake (~68,000 km², area of Ireland), the Aral Sea has shrunk to ~10% of original area since the 1960s. Mechanism: the Soviet Union diverted nearly all flow of its tributaries, the Amu Darya and Syr Darya, into a cotton irrigation network. Salinity rose from ~10 g/L to >100 g/L (10x ocean salinity), killing all fish; exposed lake bed (Aralkum Desert) emits salt and pesticide-laden dust causing respiratory disease; loss of lake's climate moderation produced continentalization. Kazakhstan's 2005 Kok-Aral Dam restored North Aral; South Aral remains effectively dead.", "id": "fc11"}, {"front": "Riparian", "back": "Of or relating to the banks of a river or stream. Riparian water rights allocate water to landowners based on proximity to a watercourse — a legal doctrine common in the eastern United States. Riparian ECOSYSTEMS (riparian buffers, riparian zones) are vegetated corridors along streambanks that filter agricultural runoff, stabilize stream channels, and provide wildlife habitat — frequently eliminated by irrigation infrastructure development.", "id": "fc12"}, {"front": "Non-Substitutability of Water", "back": "Unlike fertilizer or pesticides — which can be partially replaced by alternative inputs — water has no substitute in crop production. Photosynthesis and plant metabolism require liquid water, and there is no synthetic equivalent. As aquifers decline and surface-water allocations are cut, agricultural systems face HARD physical limits that cannot be engineered around through chemistry or crop breeding alone — only through genuine reductions in water demand per unit of food, or adoption of dryland-adapted crops. This makes water depletion qualitatively different from most resource constraints.", "id": "fc13"}, {"front": "Irrigation Efficiency", "back": "The fraction of water delivered to a field that actually reaches the crop root zone and is taken up. Inefficiency takes the form of evaporation, runoff at field margins, deep percolation below the root zone, and canopy interception. Typical values: flood ~50%, furrow ~60%, sprinkler ~75%, drip ~90%. Higher-efficiency methods reduce TOTAL withdrawals for the same crop water needs and therefore reduce both aquifer drawdown and salinization risk.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
