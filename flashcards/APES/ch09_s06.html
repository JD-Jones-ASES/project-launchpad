<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 9, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "UNFCCC (1992)", "back": "United Nations Framework Convention on Climate Change, adopted at the Rio Earth Summit (1992). Stated objective: 'stabilization of greenhouse gas concentrations in the atmosphere at a level that would prevent dangerous anthropogenic interference with the climate system.' Established the principle of common but differentiated responsibilities (CBDR-RC) and provided institutional infrastructure (COP, Bonn secretariat). 198 parties.", "id": "fc01"}, {"front": "Common But Differentiated Responsibilities (CBDR-RC)", "back": "The principle, established in the UNFCCC, that all countries share responsibility for addressing climate change but developed countries — having historically contributed most of the cumulative atmospheric CO2 stock — bear greater initial responsibility. CBDR-RC has been the central axis of every subsequent climate negotiation, contested by major emitters for different reasons.", "id": "fc02"}, {"front": "Kyoto Protocol (1997)", "back": "First legally binding emission-reduction instrument under UNFCCC. Required Annex I countries to reduce aggregate GHG emissions by ~5% below 1990 levels over 2008-2012. Developing countries (China, India, Brazil) had no binding targets. The US never ratified (Byrd-Hagel Resolution, 95-0); Canada withdrew in 2011. Introduced flexibility mechanisms: emissions trading, CDM (Clean Development Mechanism), JI (Joint Implementation).", "id": "fc03"}, {"front": "Paris Agreement (2015)", "back": "Climate treaty adopted at COP21 (12 December 2015), entered into force 4 November 2016. Goal: hold global temperature rise to well below 2 C above pre-industrial, pursuing efforts toward 1.5 C. Uses voluntary Nationally Determined Contributions (NDCs) instead of binding targets. 197 parties — essentially universal. Strength: universal coverage of major emitters. Weakness: voluntary commitments produce a 2.5-2.9 C trajectory under current NDCs.", "id": "fc04"}, {"front": "Nationally Determined Contribution (NDC)", "back": "A country's self-determined climate action plan submitted under the Paris Agreement, specifying emission-reduction targets and policies. NDCs are not legally binding in their emission targets, but the obligation to submit and update them every five years (with 'a progression beyond' the previous one) IS legally binding. Current NDCs project 2.5-2.9 C of warming by 2100 — well above the Paris targets.", "id": "fc05"}, {"front": "Ratchet Mechanism", "back": "The procedural requirement in the Paris Agreement that each successive NDC must 'represent a progression beyond' the previous one in ambition and scope. Designed to increase collective ambition over time as technology improves and political feasibility evolves. The first global stocktake (COP28, Dubai, 2023) found current NDCs insufficient and called for a 'transition away from fossil fuels.'", "id": "fc06"}, {"front": "Climate Finance ($100B/yr Goal)", "back": "Developed countries' Paris Agreement commitment to mobilize at least $100 billion per year by 2020 to support developing-country mitigation and adaptation. The target was not met until 2022. A new collective quantified goal (NCQG) is under negotiation for the post-2025 period. Estimates of actual need run into trillions annually, creating a substantial 'climate finance gap.'", "id": "fc07"}, {"front": "Loss and Damage Fund", "back": "Established at COP27 (Sharm el-Sheikh, 2022) for climate-vulnerable developing countries to receive compensation for climate harms beyond what can be adapted to. A major equity breakthrough — formally acknowledges historical responsibility for climate damages. Funding levels remain far below estimated need. Distinct from mitigation (reducing emissions) and adaptation (adjusting to impacts).", "id": "fc08"}, {"front": "Precautionary Principle (Rio Principle 15)", "back": "Foundational concept in international environmental law, codified in the 1992 Rio Declaration: 'Where there are threats of serious or irreversible damage, lack of full scientific certainty shall not be used as a reason for postponing cost-effective measures to prevent environmental degradation.' Applied to permafrost thaw, climate tipping points, GMO regulation, and chemical bans.", "id": "fc09"}, {"front": "Convention on Biological Diversity (CBD, 1992)", "back": "Companion biodiversity treaty adopted alongside UNFCCC at Rio. Covers conservation, sustainable use, and equitable sharing of genetic resources. Aichi Biodiversity Targets (2010) were largely missed. Successor framework: the Kunming-Montreal Global Biodiversity Framework (December 2022), with the '30 by 30' target — protecting at least 30% of land and ocean by 2030.", "id": "fc10"}, {"front": "Basel Convention (1989)", "back": "Multilateral treaty regulating the transboundary movement of hazardous wastes. Prevents wealthy nations from exporting toxic waste to developing countries. 197 parties. The 2019 'plastic waste' amendment added certain plastic wastes to the prior-informed consent procedure, requiring exporting countries to obtain consent before shipping plastic waste.", "id": "fc11"}, {"front": "Stockholm Convention (2001)", "back": "Multilateral treaty targeting persistent organic pollutants (POPs): the original 'dirty dozen' (DDT, PCBs, dioxins, furans) and subsequent additions including PFAS compounds. Requires parties to eliminate or restrict production, use, and release of listed substances. Operates by listing chemicals for elimination, restriction, or unintentional-release reduction.", "id": "fc12"}, {"front": "Carbon Budget", "back": "The remaining cumulative amount of CO2 that can be emitted while staying within a temperature target. As of 2023, approximately 400 Gt CO2 remain for a 1.5 C pathway — roughly 10 years at current emission rates. Distributing this finite budget equitably is central to international negotiations and pits historical responsibility (CBDR-RC) against developing countries' need for 'carbon space' to lift populations from poverty.", "id": "fc13"}, {"front": "Vostok Ice-Core Record / Mauna Loa Curve", "back": "Two complementary datasets establishing the unprecedented nature of contemporary CO2. The Vostok ice-core (Antarctica) shows CO2 oscillating between ~180 ppm (glacial) and ~280 ppm (interglacial) over 800,000 years. The Mauna Loa instrumental record (1958-present) shows CO2 rising from 315 ppm to 422 ppm (2024) — far above the natural interglacial maximum. Linear extrapolation at +2.5 ppm/yr projects 612 ppm by 2100.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
