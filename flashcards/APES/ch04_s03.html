<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Atmospheric Composition (Dry Air at Sea Level)", "back": "Approximately 78.09% nitrogen (N₂), 20.95% oxygen (O₂), and 0.93% argon (Ar) — together accounting for over 99.9% of the dry atmosphere by volume. CO₂ is approximately 0.042% (420 ppm in 2024); methane (CH₄) and other greenhouse gases are at much lower concentrations but powerful per molecule. Water vapor is highly variable (near zero in polar air, up to 4% in humid tropical air).", "id": "fc01"}, {"front": "Troposphere", "back": "The lowest atmospheric layer, extending from the surface to approximately 8-16 km altitude (deeper at the equator, shallower at the poles). Contains about 80% of total atmospheric mass and virtually all weather-producing moisture. Temperature decreases with altitude at an average lapse rate of about 6.5°C/km. All weather and life occur in the troposphere.", "id": "fc02"}, {"front": "Stratosphere", "back": "The atmospheric layer above the troposphere, extending from approximately 12 to 50 km altitude. Characterized by a temperature inversion (warm above cool) caused by ozone absorption of solar UV radiation, peaking in the ozone layer between 15-35 km. The stratosphere is highly stable against vertical mixing, allowing volcanic aerosols and ozone-depleting substances to persist for years.", "id": "fc03"}, {"front": "Mesosphere", "back": "The atmospheric layer extending from approximately 50 to 80 km altitude. Temperature decreases with altitude, reaching the coldest temperatures in the entire atmosphere (-90°C or below) at the mesopause. Most meteors ablate and burn up in the mesosphere as they enter from space. Above aircraft and below satellites, it is one of the least-studied parts of the atmosphere.", "id": "fc04"}, {"front": "Thermosphere", "back": "The uppermost atmospheric layer, above approximately 80 km, where temperature increases dramatically with altitude (up to 2,000°C in outer reaches) due to absorption of high-energy solar UV and X-rays by sparse oxygen and nitrogen molecules. Despite very high thermodynamic temperatures, the low molecular density means negligible heat transfer to objects. Hosts aurora borealis/australis and the International Space Station's orbit.", "id": "fc05"}, {"front": "Greenhouse Effect", "back": "The warming of Earth's surface caused when greenhouse gases (water vapor, CO₂, CH₄, N₂O) absorb and re-emit outgoing infrared (longwave) radiation while remaining nearly transparent to incoming visible solar radiation. Without any atmosphere, Earth's surface would average -18°C; with the natural greenhouse effect, +15°C — a 33°C warming. Anthropogenic enhancement of this effect is the mechanism of climate change.", "id": "fc06"}, {"front": "Greenhouse Gas Properties", "back": "Greenhouse gases share a key molecular property: they absorb infrared radiation through vibrational modes that diatomic homonuclear molecules (N₂, O₂) lack. Water vapor is most abundant; CO₂ is the dominant long-lived anthropogenic driver; methane (CH₄) has ~80x the warming potential of CO₂ over 20 years per molecule; N₂O and CFCs are powerful per molecule but at lower concentrations.", "id": "fc07"}, {"front": "Ozone (O₃) and the Ozone Layer", "back": "Triatomic oxygen forming a thin layer (~300 Dobson Units, equivalent to about 3 mm if compressed to sea-level pressure) in the stratosphere between 15-35 km. Forms when UV splits O₂ and the freed O atom combines with another O₂. The layer absorbs more than 97% of incoming UV-B radiation, protecting life at the surface from DNA damage, skin cancer, and reduced phytoplankton productivity.", "id": "fc08"}, {"front": "Stratospheric vs. Tropospheric Ozone", "back": "Stratospheric ozone (15-35 km) forms naturally from O₂ photodissociation and is a UV shield critical to life. Tropospheric (ground-level) ozone is a secondary pollutant generated by photochemical reactions of NOₓ and VOCs from vehicles and industry; it is a respiratory irritant and major component of urban smog. The two have OPPOSITE effects on human health, and phrases like 'ozone hole' refer specifically to stratospheric depletion.", "id": "fc09"}, {"front": "Lapse Rate", "back": "The rate at which atmospheric temperature changes with altitude. The standard tropospheric lapse rate is about 6.5°C decrease per km. Temperature inversions (warm above cool) occur where the lapse rate reverses — at the tropopause boundary, throughout the stratosphere, and where surface air is unusually cold (e.g., over snow or in winter valleys). Inversions trap pollutants by suppressing vertical mixing.", "id": "fc10"}, {"front": "Atmospheric Pressure", "back": "At sea level, atmospheric pressure is approximately 101 kPa (1 atmosphere). This pressure is high enough to maintain water in liquid form at typical surface temperatures and to support efficient gas exchange in animal lungs. At very high altitudes, pressure falls below the partial pressure of oxygen needed for normal aerobic respiration — the basis of altitude sickness and the requirement for supplemental oxygen on tall peaks.", "id": "fc11"}, {"front": "CO₂ Trend Since Pre-Industrial Era", "back": "Pre-industrial atmospheric CO₂ was approximately 280 ppm (parts per million). The 2024 value is approximately 420 ppm — a 50% increase representing 140 ppm added to the atmosphere primarily from fossil-fuel combustion and deforestation. The current concentration is the highest in at least 800,000 years of ice-core records, rising at roughly 2-3 ppm/year and driving the enhanced greenhouse effect.", "id": "fc12"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
