<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Green Revolution", "back": "The mid-20th-century transformation of agriculture through a coordinated package of technologies: high-yield crop varieties, synthetic nitrogen fertilizer, expanded irrigation, mechanization, and commercial pesticides. Pioneered by Norman Borlaug in Mexico starting 1944. Tripled global cereal production from 1961 to 2000 while population also doubled, averting predicted mass famines (e.g., Ehrlich's 1968 Population Bomb). Components were mutually reinforcing — none was fully effective without the others.", "id": "fc01"}, {"front": "Norman Borlaug (1914-2009)", "back": "American agronomist born on a farm in Cresco, Iowa, who joined the Rockefeller Foundation's wheat-improvement program in Mexico in 1944. Developed semi-dwarf, photoperiod-insensitive, stem-rust-resistant wheat varieties that raised Mexican wheat yields more than 600% within two decades. The technology spread to India and Pakistan in the mid-1960s; both achieved grain self-sufficiency within five years. Won the 1970 Nobel Peace Prize — the only agricultural scientist ever to do so. Credited with preventing an estimated 1 billion famine deaths.", "id": "fc02"}, {"front": "Semi-Dwarf Wheat", "back": "Borlaug's central innovation: shorter-stemmed wheat plants with stiff stems that could bear the weight of a large grain head without lodging (falling over) under high-nitrogen fertilization. Traditional tall-stemmed varieties given high N produced lush vegetative growth but lodged before harvest; semi-dwarf varieties directed the extra N into grain instead. They were also photoperiod-insensitive (could grow at any latitude) and resistant to stem rust. Bred conventionally, not genetically engineered.", "id": "fc03"}, {"front": "Haber-Bosch Process", "back": "Industrial chemical process developed 1909 by Fritz Haber and Carl Bosch (commercialized 1913) that synthesizes ammonia (NH3) from atmospheric nitrogen and hydrogen at high temperature and pressure over an iron catalyst: N2 + 3H2 → 2 NH3. Broke the biological nitrogen-fixation bottleneck that historically limited crop yields. Highly energy-intensive: consumes 1-2% of global energy production, depends on fossil-fuel-derived hydrogen. Approximately half of all nitrogen atoms in current human-body proteins passed through a Haber-Bosch plant.", "id": "fc04"}, {"front": "Synthetic Nitrogen Fertilizer", "back": "Ammonia-based fertilizer produced by the Haber-Bosch process. Decoupled crop yields from nitrogen-cycle constraints of traditional farming (manure, legume rotation, mined guano). A foundational input of the Green Revolution: without abundant N, semi-dwarf high-yield varieties cannot express their yield potential. Production is energy-intensive and fossil-fuel-dependent, making the entire food system structurally tied to fossil energy.", "id": "fc05"}, {"front": "Monoculture", "back": "The agricultural practice of planting a single crop species, often a single variety of that species, across a large area in a given growing season. Maximizes yield per labor input and facilitates mechanization — but reduces biodiversity, increases susceptibility to pests and pathogens, and eliminates the ecological buffering provided by diverse plantings. Sets up the monoculture vulnerability problem: a single pathogen can sweep through genetically uniform crops with nothing to stop it.", "id": "fc06"}, {"front": "Monoculture Vulnerability (Irish Potato Famine)", "back": "The risk that a genetically uniform crop population can suffer catastrophic, widespread failure from a single pathogen. Archetype: the 1845-52 Irish Potato Famine — nearly all Irish potatoes belonged to a single clonal variety (Lumper); when a new strain of Phytophthora infestans arrived, it swept through the entire cultivated area with no resistance to slow it. Modern corn and wheat face analogous risks: a novel rust strain or corn blight can spread globally before resistance can be bred in.", "id": "fc07"}, {"front": "Soil Salinization", "back": "Accumulation of soluble salts in soil from inadequately drained irrigation water. As water evaporates and transpires, dissolved salts are left behind in the root zone. As salt concentration rises, osmotic potential prevents plants from absorbing water even when water is physically present. An estimated 20-30% of the world's irrigated land has been degraded by salinization — the same slow poisoning that ended agriculture in the lower Mesopotamian river valleys several thousand years ago. Detailed in Section 5.4.", "id": "fc08"}, {"front": "Groundwater Depletion (Ogallala)", "back": "The Ogallala (High Plains) Aquifer underlies ~450,000 km² from South Dakota to Texas and supports ~30% of US groundwater-irrigated cropland (wheat, corn, sorghum, cotton). Natural recharge ~0.5 cm/yr; annual withdrawals exceed 30 cm/yr in some areas — a 60:1 mining ratio. Saturated thickness has declined 30% on average and >60% in parts of Kansas/Texas. Portions will become economically unusable within decades. Detailed in Section 5.4.", "id": "fc09"}, {"front": "Fossil-Fuel Dependence in Agriculture", "back": "Modern industrial agriculture is powered almost entirely by fossil fuels: fertilizer synthesis (Haber-Bosch is energy-intensive), mechanization (tractors, combines, irrigation pumps), transport. The food system in developed countries typically consumes 7-10 calories of fossil-fuel energy for each food calorie delivered — a ratio the textbook calls 'ecologically and economically precarious.' The system has structural dependence on a finite, non-renewable input.", "id": "fc10"}, {"front": "GMO (Genetically Modified Organism)", "back": "An organism whose genome has been directly altered by genetic engineering — introducing, deleting, or modifying specific DNA sequences — rather than through conventional selective breeding. Common agricultural traits: insect resistance (Bt crops, expressing Bacillus thuringiensis toxin), herbicide tolerance (Roundup Ready), drought tolerance, enhanced nutrition (Golden Rice with beta-carotene). The 2016 National Academies of Sciences assessment found approved GMO crops do not pose health risks greater than conventional counterparts; ecological and socioeconomic debates remain contested.", "id": "fc11"}, {"front": "Mechanization", "back": "The substitution of fuel-powered machinery (tractors, combines, seed drills, irrigation pumps) for human and animal labor in farming. Dramatically reduced labor required per unit of food and allowed farms to scale to thousands of hectares. In the US, the fraction of the labor force in farming fell from ~40% in 1900 to under 2% by 2000 while output rose continuously. Foundational component of Green Revolution; a major contributor to fossil-fuel dependence.", "id": "fc12"}, {"front": "Productivity-Resilience Tradeoff", "back": "The Green Revolution's core liability: high-yield varieties, synthetic fertilizer, mechanization, and monoculture produced spectacular gains in food output per hectare, but the same system creates long-run vulnerabilities — fossil-fuel dependence, groundwater depletion, soil salinization, accelerated erosion, pesticide resistance, and genetic narrowing. The tradeoff is not unique to agriculture: it is a general property of highly optimized, low-redundancy systems that maximize efficiency at the cost of adaptability.", "id": "fc13"}, {"front": "Soil Amendment", "back": "Any material added to soil to improve its physical structure, nutrient content, or biological activity. Amendments include organic materials (compost, manure, biochar), inorganic fertilizers (synthetic N, P, K), lime (raises pH), and sulfur (lowers pH). Unlike fertilizers — which primarily add nutrients — structural amendments improve water retention, aeration, and microbial diversity. Foundational to both organic and conventional agricultural management.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
