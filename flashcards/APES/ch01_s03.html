<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Biogeochemical Cycle", "back": "The path of a chemical element or compound through the biotic and abiotic components of an ecosystem — from atmosphere to organisms to soil to water and back. Biogeochemical cycles are the mechanisms by which Earth's closed-system-for-matter recycling actually happens. The carbon, water, nitrogen, and phosphorus cycles are the AP-essential examples.", "id": "fc01"}, {"front": "Carbon Cycle Reservoirs", "back": "Four major reservoirs: atmosphere (CO2 and CH4), biosphere (organic compounds in living organisms and detritus), hydrosphere (dissolved CO2, carbonate ions, marine organic matter), and lithosphere (carbonate rocks, fossil fuels, soil organic matter). Each reservoir stores carbon for a characteristic residence time, ranging from years to tens of millions of years.", "id": "fc02"}, {"front": "Residence Time", "back": "The average length of time a substance spends in a given reservoir, calculated as reservoir size divided by outflow rate. Atmospheric carbon has a residence time of years; deep ocean sediment carbon may reside for tens of millions of years. The contrast in residence times is what distinguishes the carbon cycle's fast loop (atmosphere-biosphere-ocean) from its slow loop (lithosphere).", "id": "fc03"}, {"front": "Short-term vs. Long-term Carbon Cycle", "back": "Short-term (fast loop, years to centuries): photosynthesis removes CO2; respiration returns it; ocean surface diffusion exchanges CO2 with the atmosphere. Long-term (slow loop, millions of years): marine organisms build CaCO3 shells that lithify into limestone; tectonic subduction returns rock to mantle; volcanic outgassing re-releases CO2; organic matter buried under anoxic conditions becomes coal, oil, gas.", "id": "fc04"}, {"front": "Flux", "back": "The rate of flow of material (or energy) between two reservoirs, expressed as mass per unit area per unit time (e.g., Pg C/yr, where 1 Pg = 10^15 g). Fluxes can be positive (into a reservoir) or negative (out). A reservoir whose total inflows exceed outflows is a sink; one whose outflows exceed inflows is a source.", "id": "fc05"}, {"front": "Carbon Sink vs. Carbon Source", "back": "A sink has net inflow > outflow, accumulating carbon (examples: a growing forest, the ocean during a cool period). A source has net outflow > inflow, releasing carbon (examples: combustion of fossil fuels, active volcanoes, deforestation that releases biomass carbon). Identifying sinks and sources is essential to understanding why atmospheric CO2 is currently rising.", "id": "fc06"}, {"front": "Carbon Sequestration", "back": "Long-term removal of CO2 from the atmosphere and storage in a reservoir with a long residence time — ocean, terrestrial soils, rock, or biomass. Natural sequestration includes forest growth and ocean uptake; engineered sequestration includes capture at power plants and injection into geological formations.", "id": "fc07"}, {"front": "Fossil Fuel Combustion", "back": "The transfer of slow-loop lithospheric carbon (formed over millions of years from buried organic matter) into the fast-loop atmosphere within decades. Because ocean and terrestrial sinks cannot absorb the excess quickly enough, atmospheric CO2 rises — the fundamental driver of contemporary climate change. The rate has no geological precedent.", "id": "fc08"}, {"front": "Hydrologic Cycle", "back": "The continuous movement of water among the ocean, atmosphere, land surface, and groundwater. Unlike the carbon cycle, it has no significant geological slow loop; water cycles entirely through physical and biological processes on timescales from days (atmosphere) to thousands of years (deep groundwater and glaciers).", "id": "fc09"}, {"front": "Evapotranspiration (ET)", "back": "The combined water loss from a land surface through direct evaporation from soil and open water plus transpiration through plant stomata. A key component of any watershed's water budget, strongly controlled by temperature and vegetation cover. Tropical forests transpire enormous quantities — Amazonia 'manufactures' much of its own rainfall by recycling vapor downwind.", "id": "fc10"}, {"front": "Condensation and Precipitation", "back": "As moist air rises (over mountains, near weather fronts, or by tropical convection), it cools and water vapor condenses into liquid droplets or ice crystals, forming clouds. Precipitation — rain, snow, sleet, hail — returns water to Earth's surface, completing the atmosphere-to-land transfer in the hydrologic cycle.", "id": "fc11"}, {"front": "Runoff vs. Infiltration", "back": "Precipitation reaching land either infiltrates into soil (feeding groundwater recharge) or runs off across the surface into streams and rivers. The proportion depends on soil permeability, slope, and vegetation cover. Impervious surfaces — roads, parking lots, roofs — dramatically increase runoff and decrease recharge, with consequences for flooding (Unit 4) and groundwater supply (Unit 5).", "id": "fc12"}, {"front": "Aquifer and 'Fossil Water'", "back": "An aquifer is a permeable geological formation that stores and transmits groundwater. Recharge rates vary enormously; deep aquifers like the Ogallala (US) and North China Plain accumulated over thousands of years under wetter climates and are now being drawn down faster than recharge can replace them — a 'fossil water' depletion with no short-term solution.", "id": "fc13"}, {"front": "Carbon-Water Coupling", "back": "The cycles are intimately linked. Water is a reactant in photosynthesis and a product of respiration. Soil moisture controls decomposition rates and therefore CO2 release. Climate warming accelerates the water cycle (more evaporation, more intense precipitation, faster melting) while shifting precipitation regimes regionally — affecting terrestrial carbon storage.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
