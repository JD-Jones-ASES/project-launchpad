<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Lithosphere", "back": "The rigid outer shell of Earth, comprising the oceanic and continental crust plus the uppermost solid mantle to a depth of roughly 70-150 km. It is broken into about twenty tectonic plates that move atop the weaker, partially molten asthenosphere, driven by mantle convection. Plate motions of a few centimeters per year accumulate over geological time into mountain ranges, ocean basins, earthquakes, and volcanoes.", "id": "fc01"}, {"front": "Convergent Boundary", "back": "A plate boundary where two plates move toward each other. When oceanic and continental plates converge, the denser oceanic plate subducts, generating volcanic arcs (Cascades, Andes) and trenches. When two oceanic plates converge, the older subducts under the younger, producing island arcs (Japan, Philippines). When two continental plates converge, neither subducts and crust crumples upward into ranges (Himalayas).", "id": "fc02"}, {"front": "Divergent Boundary", "back": "A plate boundary where plates pull apart, allowing magma to well up from the mantle and form new crust. On the seafloor, divergent boundaries form mid-ocean ridges and produce seafloor spreading (the Atlantic widens by about 2.5 cm/yr). On continents, they form rift valleys (East African Rift) that can eventually open new ocean basins. Divergent volcanism is effusive rather than explosive because the magma is water-poor.", "id": "fc03"}, {"front": "Transform Boundary", "back": "A plate boundary where two plates slide horizontally past each other without creating or destroying crust. The San Andreas Fault — where the Pacific Plate moves northwest past the North American Plate at about 5 cm/yr — is the type example. Transform faults generate earthquakes (1906 San Francisco rupture: 470 km) but produce little volcanism because no slab descends to release water and induce mantle melting.", "id": "fc04"}, {"front": "Subduction", "back": "The process by which a denser tectonic plate (typically oceanic crust) sinks beneath another plate into the mantle at a convergent boundary. The descending slab carries water-bearing minerals into the mantle, where the released water lowers the melting point of mantle rock and generates magma that rises to feed volcanic arcs. Subduction also produces deep ocean trenches at the surface and concentrates ore deposits along plate margins.", "id": "fc05"}, {"front": "Hotspot", "back": "A location of unusually high volcanic activity caused by a rising plume of hot mantle material, independent of plate-boundary processes. Because hotspots remain relatively stationary while plates drift over them, they generate chains of volcanic islands or calderas with the youngest at the active plume location and progressively older landforms in the direction of plate motion. The Hawaiian Islands and Yellowstone are textbook examples.", "id": "fc06"}, {"front": "Mid-Ocean Ridge", "back": "An undersea mountain chain marking a divergent plate boundary, where mantle decompression melting produces basaltic magma that emerges, cools, and forms new oceanic crust. Mid-ocean ridges are the longest mountain range on Earth, almost entirely submerged, and their seafloor spreading drives plate motion. The Atlantic widens about 2.5 cm/year, and rift-related volcanism is generally low-explosivity because the magma is water-poor.", "id": "fc07"}, {"front": "Pacific Ring of Fire", "back": "The belt of subduction-related volcanism and seismicity encircling the Pacific Ocean, hosting roughly 75% of Earth's active volcanoes and 90% of all earthquakes. Major segments include the Andean (South America), Cascadia (North America), Aleutian (Alaska), Japanese, Philippine, and New Zealand subduction zones. Megathrust events in this belt — Tohoku 2011, Indian Ocean 2004 — are among history's deadliest natural disasters.", "id": "fc08"}, {"front": "Volcanic Arc", "back": "A chain of volcanoes formed parallel to a subduction-zone trench, fed by water-fluxed magma rising through the overriding plate. Volcanic arcs on continents are continental arcs (Cascades, Andes); arcs on oceanic crust form island arcs (Japan, Philippines, Indonesia). The arc geometry reflects the geometry of the descending slab, with magma generated at the depth where slab dehydration releases sufficient water to trigger mantle melting.", "id": "fc09"}, {"front": "Volcanic (Andisol) Soils", "back": "Soils derived from weathered volcanic ash and rock, exceptionally rich in potassium, phosphorus, calcium, and trace minerals. These soils support some of the world's densest agricultural populations — Java rice paddies, Central American coffee, Italian vineyards — addressing the nutrient limitations typical of leached tropical soils. The hazard of living near active volcanoes is thus inseparable from the fertility that draws people there.", "id": "fc10"}, {"front": "Hydrothermal Ore Deposit", "back": "A concentration of metals (copper, zinc, lead, gold, silver) precipitated where seawater percolates into hot, fractured crust near spreading centers and subduction zones, dissolves metals, and rises to deposit them in sulfide ore bodies. Most commercially significant ore deposits worldwide track plate margins; Chile's Atacama copper province and the porphyry copper deposits of the Ring of Fire are direct consequences of subduction-related hydrothermal circulation.", "id": "fc11"}, {"front": "Pyroclastic Surge / Lahar", "back": "Two of the deadliest volcanic hazards. A pyroclastic surge is a fast-moving cloud of hot gas, ash, and rock fragments that flows down volcanic slopes at hundreds of kilometers per hour, lethal to anyone in its path (Pompeii, Mount St. Helens). A lahar is a volcanic mudflow generated when ash mixes with water from snow, rain, or rivers, capable of traveling tens of kilometers and burying valley communities (Nevado del Ruiz, 1985, killed about 23,000 in Armero, Colombia).", "id": "fc12"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
