<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Stratospheric Ozone (O3)", "back": "The layer of ozone concentrated between approximately 15 and 35 km altitude in the stratosphere. It absorbs 95-99% of incoming solar UV-B and UV-C radiation, protecting surface life from DNA damage, skin cancer, cataracts, and immune suppression. Column abundance is measured in Dobson units; global average is roughly 300 DU. The Antarctic ozone hole drops below 100 DU in austral spring.", "id": "fc01"}, {"front": "Tropospheric Ozone vs. Stratospheric Ozone", "back": "Both are O3, but the biological effect depends on altitude. In the troposphere (0-15 km), ozone is a secondary pollutant that damages lung tissue and crops. In the stratosphere (15-50 km), ozone shields life from UV-B and UV-C. The phrase 'good up high, bad nearby' captures the dual role of the same molecule.", "id": "fc02"}, {"front": "Chlorofluorocarbon (CFC)", "back": "Synthetic compound containing carbon, fluorine, and chlorine, used industrially as refrigerants, aerosol propellants, and foam-blowing agents. CFC-11 (CCl3F) and CFC-12 (CCl2F2) are the two most common. CFCs are inert in the troposphere — they accumulate for decades — but UV-C in the stratosphere cleaves them, releasing free chlorine atoms that catalytically destroy ozone.", "id": "fc03"}, {"front": "Catalytic Ozone Destruction Cycle", "back": "A two-step cycle: (1) Cl + O3 -> ClO + O2 (ozone destroyed); (2) ClO + O -> Cl + O2 (chlorine regenerated). Net: 2O3 -> 3O2. Because Cl is a catalyst — consumed in step 1 but regenerated in step 2 — a single chlorine atom can destroy roughly 100,000 ozone molecules before a competing sink reaction (e.g., Cl + CH4 -> HCl) terminates the cycle.", "id": "fc04"}, {"front": "Antarctic Ozone Hole", "back": "Severe, seasonal stratospheric ozone depletion above Antarctica during austral spring (September-October). Discovered in 1985 by Farman, Gardiner, and Shanklin (British Antarctic Survey, Halley Bay). October ozone above Antarctica had declined more than 50% since the late 1970s. Maximum recorded areal extent was 29.9 million km^2 in September 2006. The hole is defined as ozone below 220 DU.", "id": "fc05"}, {"front": "Polar Stratospheric Clouds (PSCs)", "back": "Ice crystal clouds that form in the polar stratosphere when temperatures fall below approximately -78 degrees Celsius. Their surfaces catalyze heterogeneous reactions converting stable chlorine reservoir compounds (HCl, ClONO2) into reactive Cl2, which photodissociates into chlorine atoms when sunlight returns in spring. PSCs are the primary reason the Antarctic ozone hole is far more severe than mid-latitude depletion.", "id": "fc06"}, {"front": "Molina and Rowland (1974)", "back": "Mario Molina and F. Sherwood Rowland published the foundational hypothesis that CFCs released into the troposphere would migrate to the stratosphere and there release chlorine atoms that catalytically destroy ozone. Their work was awarded the 1995 Nobel Prize in Chemistry. The catalytic-cycle insight (one chlorine destroys roughly 100,000 ozone molecules) explains why parts-per-trillion CFCs produce measurable depletion.", "id": "fc07"}, {"front": "Montreal Protocol (1987)", "back": "International treaty signed September 16, 1987 in Montreal, entered into force January 1, 1989. The first international environmental treaty to achieve universal ratification (every country on Earth is a party). Its mandate is to phase out the production and consumption of ozone-depleting substances under a legally binding multilateral framework. Stratospheric chlorine peaked around 1997 and now declines.", "id": "fc08"}, {"front": "Stepped Phase-Out Architecture", "back": "The Montreal Protocol's reduction schedule used a freeze at 1986 levels, then 50% reduction, then complete elimination. This stepped design gave industries time to develop and patent substitutes and gave developing nations grace periods to acquire substitute technology. Article 5 provided multi-year delays plus the Multilateral Fund (over 4 billion USD disbursed) for technology transition.", "id": "fc09"}, {"front": "Kigali Amendment (2016)", "back": "Amendment to the Montreal Protocol that phases down hydrofluorocarbons (HFCs). HFCs were introduced as CFC substitutes; they do not deplete ozone but are potent greenhouse gases (GWP up to 14,800). Full Kigali compliance is projected to prevent 0.3-0.5 degrees C of warming by 2100, making the protocol the largest near-term climate co-benefit treaty in force.", "id": "fc10"}, {"front": "Why Montreal Succeeded (Four Conditions)", "back": "1) The science was unusually clear: defined chemistry from Molina-Rowland 1974 plus the Farman 1985 measurements. 2) The implicated industry was concentrated in a few chemical companies who could profit from substitute patents. 3) CFCs have no natural sources, so eliminating anthropogenic emissions was sufficient. 4) Stepped phase-out gave industry and developing nations time to adapt.", "id": "fc11"}, {"front": "Stratospheric Chlorine Recovery Timeline", "back": "Stratospheric chlorine loading peaked around 1997 and has been declining steadily under Montreal Protocol compliance. The ozone layer is projected to return to 1980 levels over most latitudes by approximately 2066. The Antarctic ozone hole is projected to recover to pre-1980 levels by around 2090. Slow recovery reflects the multi-decade stratospheric residence time of CFCs.", "id": "fc12"}, {"front": "UV-B Radiation", "back": "Ultraviolet radiation in the 280-320 nm band, the biologically active band that stratospheric ozone strongly absorbs. Surface UV-B causes sunburn, skin cancer, cataracts, and immune suppression in humans, and damages DNA in phytoplankton, amphibian eggs, and crops. The Montreal Protocol is estimated to prevent 2 million additional skin-cancer deaths per year in the US alone by 2030.", "id": "fc13"}, {"front": "Vienna Convention (1985)", "back": "International framework convention adopted in 1985 that established a political framework for cooperation on ozone protection but did not impose binding emission controls. The Vienna Convention paved the way for the Montreal Protocol two years later (1987), which provided the substantive phase-out targets. Together they represent the framework-protocol model used in many subsequent environmental agreements.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
