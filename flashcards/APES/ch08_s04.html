<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 8, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Bioaccumulation", "back": "Net accumulation of a substance in an organism's tissues over its lifetime because the rate of intake (through food, water, or direct absorption) exceeds the rate of elimination. Most pronounced for lipophilic (fat-soluble) compounds that partition into fatty tissue rather than being excreted in urine or bile. Quantified by the bioaccumulation factor (BAF) — the ratio of tissue concentration to ambient water concentration.", "id": "fc01"}, {"front": "Biomagnification", "back": "Process by which the concentration of a bioaccumulating substance increases with each successive trophic level of a food chain. Each predator eats many prey items and retains most of the pollutant load carried by each. For many persistent organic pollutants, tissue concentrations increase by approximately one order of magnitude (10x) per trophic level. Top predators carry concentrations millions of times higher than ambient water concentrations.", "id": "fc02"}, {"front": "Persistent Organic Pollutant (POP)", "back": "Carbon-based compound meeting four criteria: (1) resists environmental degradation; (2) bioaccumulates in living tissue; (3) biomagnifies up food chains; (4) is transported long distances from the source via air, water, and migratory organisms. Regulated internationally under the Stockholm Convention on Persistent Organic Pollutants (2001). Major examples: DDT, PCBs, dioxins, PFAS, methylmercury.", "id": "fc03"}, {"front": "Lipophilicity", "back": "Property of dissolving in fats and lipid membranes rather than water. The critical determinant of bioaccumulation: a water-soluble compound is rapidly excreted in urine; a fat-soluble compound dissolves into lipid membranes and fat deposits and is stored there. POPs (DDT, PCBs, dioxins, methylmercury) are highly lipophilic and biomagnify; water-soluble compounds (table salt) do not bioaccumulate.", "id": "fc04"}, {"front": "DDT (Dichlorodiphenyltrichloroethane)", "back": "Broad-spectrum organochlorine insecticide used extensively in the post-WWII era for agricultural pest control and malaria vector control. Bioaccumulates in fatty tissues; biomagnifies up food chains (1960s Long Island Sound: water 0.000003 ppm → osprey tissue 25 ppm, ~8 million times concentration factor). Banned in the US in 1972 by EPA Administrator Ruckelshaus; restricted globally under the Stockholm Convention with limited exception for malaria vector control.", "id": "fc05"}, {"front": "Eggshell Thinning Mechanism", "back": "DDE (DDT breakdown product) inhibits carbonic anhydrase in the shell-forming gland of bird ovaries, reducing calcium carbonate deposition into eggshell. Shells became 25–40% thinner than normal — incubating parents crush their own eggs. Reproductive failure was catastrophic across populations of osprey, brown pelican, peregrine falcon, and bald eagle in the 1950s–1960s.", "id": "fc06"}, {"front": "Bald Eagle Recovery (1963–2024)", "back": "1963: 487 nesting pairs in contiguous 48 states (down from estimated 100,000 pre-DDT). 1967: listed as endangered. 1972: DDT banned. 2006: 9,789 pairs. 2007: delisted from ESA. 2024: > 70,000 breeding pairs. One of the great conservation success stories of the 20th century — recovery from near-extinction within one human lifetime, achieved by understanding the causal mechanism and removing the stressor.", "id": "fc07"}, {"front": "Rachel Carson and Silent Spring (1962)", "back": "Carson (1907–1964) was a US Bureau of Fisheries scientist whose Silent Spring (Houghton Mifflin, 1962) argued that broad-spectrum insecticides — particularly DDT — caused cascading, ecosystem-wide damage. Her central conceptual contribution: a chemical's harm cannot be assessed at the point of application alone; only by tracing it through the entire food web, across trophic levels and time, can true toxicity be understood. Galvanized public opinion, contributed to founding the EPA (1970) and the DDT ban (1972).", "id": "fc08"}, {"front": "Methylmercury (CH₃Hg⁺)", "back": "Organic form of mercury produced when inorganic mercury (from coal combustion, industrial discharge) is methylated by anaerobic bacteria in sediments. Highly bioaccumulative; concentrates primarily in muscle tissue (unlike most other POPs that partition to fat). FDA and EPA advise pregnant women and young children to limit consumption of large predatory fish (shark, swordfish, king mackerel, tilefish, bigeye tuna) due to methylmercury contamination.", "id": "fc09"}, {"front": "Minamata Mercury Poisoning", "back": "Chisso Corporation discharged mercury-laden wastewater into Minamata Bay, Japan, from the 1930s–1960s. Anaerobic bacteria converted inorganic mercury to methylmercury, which entered fish and shellfish consumed by local communities. Resulted in \"Minamata disease\": neurological symptoms (sensory loss, ataxia, tunnel vision, coma, death). \"Congenital Minamata disease\" affected infants of mothers with no or mild symptoms — establishing transplacental transfer as a distinct, more severe pollutant risk. > 2,000 cases certified; 10,000+ affected at sub-clinical levels.", "id": "fc10"}, {"front": "PFAS (Per-/Polyfluoroalkyl Substances)", "back": "Family of > 12,000 \"forever chemicals\" containing carbon-fluorine bonds among the strongest in organic chemistry. Used in non-stick cookware (PTFE/Teflon), food packaging, stain-resistant fabrics, firefighting foam (AFFF). Contaminate drinking water at US military bases and airports. In 2024, EPA established Maximum Contaminant Levels of 4 ppt for PFOA and PFOS — among the strictest standards ever set. Linked to kidney cancer, thyroid disruption, immune suppression, developmental effects.", "id": "fc11"}, {"front": "Endocrine Disruptor", "back": "Chemical that interferes with the body's hormonal signaling system by mimicking, blocking, or otherwise altering the synthesis, transport, binding, action, or elimination of natural hormones. Effects include reproductive abnormalities, developmental defects, immune dysfunction, and cancer. Endocrine disruption can occur at extremely low concentrations — sometimes below conventional regulatory thresholds — because the endocrine system responds to hormones measured in parts per trillion.", "id": "fc12"}, {"front": "Atrazine and BPA", "back": "Atrazine: most widely used herbicide in US agriculture (corn, sorghum). Demasculinizes male frogs at concentrations as low as 0.1 ppb in drinking water. Banned in the EU; remains in widespread US use. BPA (bisphenol-A): used in polycarbonate plastics and epoxy can linings; mimics estrogen, linked to breast/prostate cancer, obesity, cardiovascular disease, altered brain development. FDA banned BPA from baby bottles; \"BPA-free\" alternatives often contain similar substitutes (BPS, BPF).", "id": "fc13"}, {"front": "Pharmaceutical Estrogens in Wastewater", "back": "Synthetic estrogens (ethinyl estradiol from oral contraceptives) pass through human bodies and through wastewater treatment plants into receiving waters. In rivers receiving POTW effluent, male fish have been found producing vitellogenin (an egg-yolk protein normally produced only by females), indicating estrogenic disruption at ambient environmental concentrations. Establishes that endocrine disruption operates on entire receiving-water populations, not just acute-exposure scenarios.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
