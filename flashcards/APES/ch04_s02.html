<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Soil", "back": "The structured, biologically active medium of weathered mineral particles, organic matter, water, and air at Earth's surface that supports terrestrial plant life. Soil is the foundation of food production, the primary filter for precipitation entering aquifers, and a major reservoir of carbon and nutrients. Because formation rates (cm per centuries to millennia) are far slower than erosion rates (cm per year or season), soil is non-renewable on human planning horizons.", "id": "fc01"}, {"front": "CLORPT — The Five Soil-Forming Factors", "back": "An acronym summarizing the variables that determine what kind of soil forms in a given location: Climate (precipitation and temperature controlling weathering), Living organisms (plants, microbes, earthworms), Orography (relief and topography), Regolith/parent material (the underlying rock or sediment), and Time (centuries to millions of years). Together these factors produce the global diversity of soil orders.", "id": "fc02"}, {"front": "Soil Profile", "back": "A vertical cross-section through a mature soil revealing distinct layers (horizons) that record the soil's formation history. From top to bottom: O (organic litter), A (humus-rich topsoil), E (eluviated, leached, often pale), B (subsoil, illuvial accumulation of clay and Fe/Al oxides), C (regolith, weathered parent material), R (bedrock). Not all profiles include every horizon.", "id": "fc03"}, {"front": "A Horizon (Topsoil)", "back": "The biologically richest mineral soil layer, dark in color due to accumulated humus, hosting the vast majority of soil microorganisms, earthworms, and plant roots. The high humus content gives the A horizon its characteristic dark color, spongy texture, and high cation exchange capacity, which together support plant nutrition. Loss of the A horizon to erosion is the primary harm of unsustainable land use.", "id": "fc04"}, {"front": "B Horizon (Subsoil)", "back": "The zone of illuviation — accumulation of materials leached downward from above, including clay particles, iron and aluminum oxides, and dissolved minerals. Less organic matter than the A horizon, harder texture, and often a reddish or yellowish color from iron oxides. The B horizon stores the leached products of overlying horizons and is typically less fertile than the topsoil.", "id": "fc05"}, {"front": "Cation Exchange Capacity (CEC)", "back": "A measure of a soil's ability to hold positively charged nutrient ions (Ca²⁺, Mg²⁺, K⁺, NH₄⁺) on negatively charged clay and humus surfaces, expressed in milliequivalents per 100 g. High-CEC soils (clay-rich, humus-rich) hold nutrients against leaching and are typically more fertile; low-CEC soils (sandy) require more frequent fertilization because applied nutrients leach away.", "id": "fc06"}, {"front": "Soil Texture", "back": "The relative proportions of three mineral particle-size classes: clay (<0.002 mm; sticky, retentive, poor drainage), silt (0.002-0.05 mm; intermediate), and sand (0.05-2 mm; large pores, drains rapidly, low retention). Texture is plotted on the soil-texture triangle, which classifies soils into 12 textural classes (loam, sandy clay loam, silty clay, etc.). Texture is essentially permanent over human timescales.", "id": "fc07"}, {"front": "Loam", "back": "The agronomically ideal soil texture: roughly 25-50% sand, 25-50% silt, 10-30% clay. Loam combines adequate drainage and aeration (from sand), good water and nutrient retention (from silt and clay), and workability for tillage. Most highly productive agricultural soils are loams or close textural relatives (sandy loam, silt loam, clay loam).", "id": "fc08"}, {"front": "Soil pH", "back": "A measure of soil acidity that controls the solubility and availability of plant nutrients. Most crops grow best at pH 6.0-7.0. Below pH 5.5, aluminum and manganese become soluble at toxic levels, damaging roots; above pH 7.5, phosphorus, iron, zinc, and boron become insoluble and unavailable. Acid rain and acidifying fertilizers can push agricultural soils below their optimal pH range.", "id": "fc09"}, {"front": "Salinization", "back": "Accumulation of dissolved salts in agricultural soils to levels that damage root cells through osmotic stress. Typically caused by irrigation water carrying trace salts under arid conditions where evaporation concentrates salts at the surface, or by capillary rise of saline groundwater under unmanaged irrigation. Salinization has rendered large areas of formerly productive land unproductive in Central Asia, the Middle East, and the American West.", "id": "fc10"}, {"front": "Weathering", "back": "The physical and chemical breakdown of rocks and minerals at or near Earth's surface — the source of mineral particles in soil. Physical (mechanical) weathering — frost wedging, root expansion, abrasion — fragments rock without changing chemistry. Chemical weathering — hydrolysis, oxidation, carbonation — alters mineral chemistry and releases soluble nutrient ions. Chemical weathering rates increase with temperature and moisture, which is why tropical soils are more deeply weathered than arctic soils.", "id": "fc11"}, {"front": "Chernozem", "back": "A deep, fertile soil characterized by a thick, dark, humus-rich A horizon, formed under temperate grasslands where annual root death adds organic matter faster than the mild, subhumid climate can decompose it. The breadbasket regions of North America (Great Plains), Ukraine, and Argentina sit on chernozems. The contrast with leached, acid podzols of cool conifer forests illustrates how climate and vegetation jointly determine soil fertility.", "id": "fc12"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
