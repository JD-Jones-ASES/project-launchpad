<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 8, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Toxicology", "back": "The science of poisons — centrally, the science of dose. It relates how much of a substance reaches a biological target to the magnitude of the effect produced. Virtually every substance in the environment is harmful at high enough doses and harmless (or even beneficial) at low enough ones. The dose-response framework underlies environmental regulation; without it, regulators have no principled way to derive safety standards.", "id": "fc01"}, {"front": "Dose-Response Curve", "back": "Graph of biological response (typically % of test organisms affected) versus dose, usually plotted on a log-dose x-axis. For lethal endpoints the response is mortality %; for sub-lethal endpoints it is the % showing a defined effect (seizure, reproductive failure, enzyme inhibition). The classic shape for lethal substances is sigmoidal (S-shaped) on a log-dose scale, reflecting biological variability across the test population.", "id": "fc02"}, {"front": "LD50 (Lethal Dose, 50%)", "back": "The dose required to kill exactly half of a standardized test population under defined conditions (species, sex, age, route, exposure duration). Expressed as mass per unit body mass (mg/kg). Lower LD50 = more toxic. Reference range: ~1-2 mg/kg (botulinum toxin, extremely toxic) to ~30,000 mg/kg (table sugar, essentially nontoxic). The single most important value derived from a dose-response curve.", "id": "fc03"}, {"front": "ED50 (Effective Dose, 50%)", "back": "The dose at which 50% of the test population exhibits a specified sub-lethal biological effect — e.g., the dose at which half the animals show measurable liver-enzyme spikes or experience induced seizures. Used when the regulatory question concerns effects below mortality thresholds, as is common for chronic environmental exposures and endocrine disruption.", "id": "fc04"}, {"front": "Acute vs. Chronic Exposure", "back": "ACUTE: single or short-term high-dose exposure; effects manifest in hours to days; LD50 is the canonical acute measure (industrial accidents, pesticide spills, workplace exposures). CHRONIC: repeated or continuous low-level exposure over months to years; effects may take decades to become clinically apparent (cancer from low-level benzene; neurological damage from childhood lead). Extrapolating acute high-dose data to chronic low-dose effects is the central scientific challenge of environmental toxicology.", "id": "fc05"}, {"front": "Threshold Model", "back": "Dose-response model holding that no measurable adverse effect occurs below a certain minimum dose (the threshold dose). Below threshold, the body can repair damage, metabolize the substance, or compensate physiologically. Applies to most non-genotoxic substances. Underlies the regulatory concept of a 'safe dose' derived by dividing the threshold by an uncertainty factor.", "id": "fc06"}, {"front": "Linear-No-Threshold (LNT) Model", "back": "Dose-response model holding that any dose of a genotoxic carcinogen or ionizing radiation carries proportional risk, with no safe dose. Cancer risk versus dose is a straight line through the origin: half the dose means half the risk, never zero risk. Default regulatory model for ionizing radiation and genotoxic carcinogens (benzene, formaldehyde) in the United States, though scientifically debated for low-dose extrapolation.", "id": "fc07"}, {"front": "Hormesis", "back": "A biphasic dose-response curve in which very low doses produce a beneficial or stimulatory effect opposite to the harm seen at high doses. Alcohol is the classic human example — small amounts may reduce cardiovascular risk while large amounts cause liver disease and death. Some herbicides stimulate plant growth at sub-herbicidal concentrations. Hormesis complicates regulation because a strict precautionary threshold could overshoot the beneficial zone, but the consensus is that hormesis is too narrowly applicable to undermine the precautionary framework for industrial pollutants.", "id": "fc08"}, {"front": "NOAEL (No Observed Adverse Effect Level)", "back": "The highest dose tested at which no statistically or biologically significant adverse effect is observed in the test population. Together with the LOAEL, it defines the threshold region of the dose-response curve and serves as the starting point for regulatory reference-dose calculation. Reference dose (RfD) = NOAEL / safety factor.", "id": "fc09"}, {"front": "LOAEL (Lowest Observed Adverse Effect Level)", "back": "The lowest dose tested at which a statistically or biologically significant adverse effect is observed. The LOAEL bookends the threshold region opposite the NOAEL. When NOAEL data are unavailable, the LOAEL with an additional safety factor (typically 10x) is used to derive the reference dose.", "id": "fc10"}, {"front": "Reference Dose (RfD) and Safety Factors", "back": "The regulatory daily dose deemed unlikely to cause harm. Derived by dividing the NOAEL (or LOAEL) by safety factors of 100x to 10,000x: 10x for interspecies extrapolation (rat-to-human), 10x for intraspecies variability (sensitive subpopulations like children and pregnant women), and additional 10x factors for data uncertainty (sub-chronic data, use of LOAEL, route extrapolation). Larger factors (1,000-10,000) apply when toxicity data are derived from animal studies rather than human clinical data, or when genotoxic effects are suspected.", "id": "fc11"}, {"front": "Hazard Quotient (HQ)", "back": "HQ = Estimated Exposure Dose / Reference Dose. HQ < 1.0 indicates exposure is below the level of concern; HQ > 1.0 indicates potential risk warranting investigation or action. The HQ is the basic risk-communication tool for environmental exposure assessment, applied across air, water, soil, and food-residue contexts. Note that an HQ slightly under 1 still leaves only a small margin from the toxicity endpoint and is not equivalent to the regulatory safe dose.", "id": "fc12"}, {"front": "Sigmoidal Curve Shape (Why)", "back": "On a log-dose scale, the dose-response curve for a lethal substance is sigmoidal because populations are heterogeneous. Individuals differ in body mass, metabolic rate, genetic sensitivity, and prior exposures. The most sensitive die at relatively low doses; the median individual at the LD50; the most resistant only at very high doses. The flat lower plateau (no effect) and upper plateau (100% effect) plus the steep middle range produce the characteristic S-shape.", "id": "fc13"}, {"front": "Why Acute Mammalian LD50 Is Insufficient as a Safety Criterion", "back": "A high LD50 (low acute toxicity) does not rule out: (1) bioaccumulation in fatty tissue over a lifetime; (2) biomagnification up food chains to top predators; (3) endocrine disruption at parts-per-trillion concentrations far below the LD50; (4) chronic carcinogenicity manifesting decades later; (5) developmental and transgenerational effects. The DDT-eagle and PFAS stories established that acute mammalian toxicity testing alone misses the most important environmental endpoints. Modern frameworks (including the 2016 TSCA reforms) require evaluation of these alternative endpoints before market entry.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
