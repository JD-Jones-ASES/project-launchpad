<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Differential Solar Heating", "back": "The unequal absorption of solar radiation across Earth's surface caused by latitude-dependent solar angles. The Sun's rays strike the equator nearly perpendicular (concentrated energy) and the poles obliquely (spread over larger areas), creating a permanent equator-to-pole temperature gradient that is the fundamental energy input driving all atmospheric circulation.", "id": "fc01"}, {"front": "Intertropical Convergence Zone (ITCZ)", "back": "The persistent zone of low surface pressure near the equator (~0° latitude) where intense solar heating drives rising warm, moist air, producing towering cumulonimbus clouds, heavy rainfall, and surface calms (the historical 'doldrums' of sailing tradition). Tropical rainforests cluster along the ITCZ. The zone migrates seasonally with maximum solar heating.", "id": "fc02"}, {"front": "Hadley Cell", "back": "A large-scale atmospheric convection cell located in the tropics (0°-30° latitude), in which equatorial air rises (driven by intense solar heating), flows poleward at high altitude, descends at approximately 30° latitude (creating the subtropical high-pressure belt and desert zones), and returns to the equator as surface trade winds. One Hadley cell per hemisphere; they are the most energetically vigorous cells in the three-cell model.", "id": "fc03"}, {"front": "Ferrel Cell", "back": "A mid-latitude (30°-60°) atmospheric circulation cell that is thermally indirect — mechanically driven by the Hadley and Polar cells flanking it rather than directly by temperature contrasts. Surface air flows poleward from the subtropical highs to the sub-polar lows, rises near 60° latitude, returns equatorward at altitude. Weaker and less stable than Hadley or Polar cells; produces the mid-latitude westerlies at the surface.", "id": "fc04"}, {"front": "Polar Cell", "back": "A high-latitude (60°-90°) atmospheric circulation cell in which cold, dense polar air sinks at the poles (creating polar high pressure), flows equatorward at the surface, rises at approximately 60° latitude where it meets the Ferrel cell, and returns poleward at altitude. The surface flow becomes the polar easterlies after Coriolis deflection.", "id": "fc05"}, {"front": "Coriolis Effect", "back": "The apparent deflection of moving objects (air, water, projectiles) caused by Earth's rotation. Free-moving objects are deflected to the RIGHT in the Northern Hemisphere and to the LEFT in the Southern Hemisphere. The deflection is proportional to the object's speed and to the sine of latitude — zero at the equator and maximum at the poles. The Coriolis effect produces the rotation of large-scale wind systems, ocean gyres, and hurricane structure.", "id": "fc06"}, {"front": "Trade Winds", "back": "The persistent surface winds in the tropical zones, formed by Coriolis deflection of the equatorward return flow of the Hadley cells. Northeast trade winds in the Northern Hemisphere (deflected rightward) and southeast trade winds in the Southern Hemisphere (deflected leftward). The trades historically provided the predictable sailing route between Europe and the Americas, and today drive Saharan dust transport across the tropical Atlantic.", "id": "fc07"}, {"front": "Westerlies", "back": "The mid-latitude (30°-60°) prevailing winds that blow predominantly from west to east, formed when poleward Ferrel-cell surface flow is deflected to the right (Northern Hemisphere) or left (Southern Hemisphere) by the Coriolis effect. The westerlies drive storms across North America, Europe, and Australia from west to east, and explain why eastbound transcontinental flights are typically faster than westbound flights.", "id": "fc08"}, {"front": "Polar Easterlies", "back": "Weak, irregular surface winds blowing from approximately 90° toward 60° latitude in both hemispheres. Formed by Coriolis deflection of cold air draining equatorward from the polar cells: deflected rightward in the Northern Hemisphere and leftward in the Southern. Weaker than the trades and westerlies, the polar easterlies contribute to the meeting zone with the Ferrel cell where mid-latitude storm tracks develop.", "id": "fc09"}, {"front": "Subtropical High-Pressure Belt", "back": "The belt of descending dry air at approximately 30° latitude in both hemispheres, produced by the poleward edge of the Hadley cells. Descending air warms adiabatically, increases its capacity to hold water vapor, and suppresses precipitation — producing Earth's great deserts: Sahara, Kalahari, Arabian, Iranian, Sonoran, Chihuahuan, and Australian Outback. The latitudinal placement of these deserts is a predictable consequence of atmospheric physics.", "id": "fc10"}, {"front": "Adiabatic Cooling and Warming", "back": "Temperature changes in air parcels caused by changes in pressure rather than by external heat exchange. Rising air expands as pressure drops, doing work and cooling without heat loss (adiabatic cooling); descending air compresses, has work done on it, and warms (adiabatic warming). Adiabatic processes drive precipitation patterns: rising air condenses moisture as rain, descending air dries and suppresses precipitation.", "id": "fc11"}, {"front": "Rain Shadow", "back": "A dry region on the leeward (downwind) side of a mountain range, formed because moist air loses most of its precipitation on the windward side (forced upward and cooled adiabatically) and then descends on the leeward side as warm, dry air. Examples: Atacama Desert (leeward of the Andes), eastern Washington shrub steppe (leeward of the Cascades), Gobi Desert (north of Tibetan Plateau). Rain shadows produce dramatic juxtapositions of wet and dry climates across single mountain barriers.", "id": "fc12"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
