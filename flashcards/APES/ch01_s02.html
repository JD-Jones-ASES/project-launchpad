<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Biome", "back": "A large geographic region defined by a characteristic climate and the distinctive plant and animal communities that have evolved to live there. Biomes are identified primarily by dominant vegetation type, which reflects the temperature and precipitation regime of the region. Climate, not political boundaries, is the architect of biome structure — Borneo and Congo rainforests share form despite different species.", "id": "fc01"}, {"front": "Master Variables for Terrestrial Biomes", "back": "Mean annual temperature and mean annual precipitation. Plotted on perpendicular axes, these two variables place the world's terrestrial biomes into largely non-overlapping clusters: desert (hot-dry), tropical rainforest (hot-wet), tundra (cold-dry), and temperate forest (intermediate). Together they govern water availability and length of the growing season — the two limits on plant growth.", "id": "fc02"}, {"front": "Ecotone", "back": "A transition zone between two adjacent ecological communities or biomes. Boundaries between biomes are not sharp lines but gradual transitions. Ecotones often support higher species diversity than either adjacent community because they contain species characteristic of both biomes plus specialists adapted to the edge conditions themselves — the edge effect.", "id": "fc03"}, {"front": "Tropical Rainforest", "back": "Equatorial biome receiving >2000 mm rain/yr with no pronounced dry season and mean monthly temperatures above 18°C. Canopy 30-40 m captures ~80% of incoming light. Decomposition is so rapid in warm, moist conditions that nutrients are locked in living biomass rather than soil — once cleared, soils support agriculture only briefly before productivity collapses. Highest NPP per unit area of any terrestrial biome.", "id": "fc04"}, {"front": "Temperate Deciduous Forest", "back": "Mid-latitude biome with four distinct seasons, receiving 750-1500 mm of annual precipitation. Deciduous trees shed leaves in autumn to conserve water and nutrients during cold winters. Soils are generally nutrient-rich because slowed winter decomposition allows organic matter to accumulate, producing fertile topsoils that support major agricultural regions worldwide.", "id": "fc05"}, {"front": "Boreal Forest (Taiga)", "back": "The largest terrestrial biome by area, stretching across sub-Arctic North America, Europe, and Asia. Long, cold winters and short, cool summers support evergreen conifers (spruce, fir, pine) whose needle leaves and waxy coatings minimize winter water loss and resist freezing. Soils are thin, acidic, and nutrient-poor — typical podzols formed under conifer litter.", "id": "fc06"}, {"front": "Grasslands (Savanna and Temperate Prairie)", "back": "Biomes occupying the intermediate precipitation band where moisture is sufficient to prevent desert but insufficient (or seasonally variable) to support forest. Fire — maintained by drought and lightning — plays a structural role, preventing shrub encroachment and recycling nutrients to soil. Tropical savanna features scattered trees among grasses with pronounced wet/dry seasons and supports Earth's most spectacular large-mammal communities.", "id": "fc07"}, {"front": "Tundra", "back": "Biome lying north of the treeline (Arctic tundra) or above it on high mountains (alpine tundra). Permafrost — a permanently frozen layer beginning a few centimeters to a meter below the surface — prevents deep rooting and limits drainage. Growing season under 60 days/yr. NPP is among the lowest of any terrestrial biome. Climate change is warming the Arctic at ~2x the global rate, thawing permafrost and releasing stored carbon — a positive feedback explored in Unit 9.", "id": "fc08"}, {"front": "Desert", "back": "Biome defined not strictly by heat but by aridity: annual precipitation below 250 mm. Hot deserts (Sahara, Sonoran) experience extreme diurnal temperature swings; cold deserts (Gobi, Great Basin) endure freezing winters. Convergent adaptations for water conservation — succulent stems, nocturnal activity, highly concentrated urine — appear in both, reflecting aridity rather than heat as the dominant selective pressure.", "id": "fc09"}, {"front": "Salinity", "back": "The concentration of dissolved inorganic salts in a body of water, typically expressed in parts per thousand (ppt) or practical salinity units (psu). Freshwater systems have salinity below ~0.5 ppt; typical ocean water is ~35 ppt; estuaries occupy an intermediate and highly variable range. Salinity is one of the two master variables organizing aquatic biomes.", "id": "fc10"}, {"front": "Photic Zone vs. Aphotic Zone", "back": "The photic zone is the upper layer of a water body through which sufficient sunlight penetrates to support photosynthesis — about 200 m in clear open ocean, shallower in turbid coastal water. Below it lies the aphotic zone, where decomposers and chemolithotrophs dominate in permanent darkness. Light penetration is the second master variable organizing aquatic biomes.", "id": "fc11"}, {"front": "Open Ocean (Pelagic Zone) — the 'Blue Desert'", "back": "The pelagic zone covers most of Earth's surface but is paradoxically among the least productive biomes per unit area. Nutrients sink continuously out of the photic zone and return only slowly via upwelling. Its enormous total area, however, makes its integrated annual carbon fixation a large fraction of global NPP — high total flux from low per-area productivity.", "id": "fc12"}, {"front": "Coral Reefs", "back": "Cover <1% of the ocean floor but harbor ~25% of all marine species, with productivity comparable to tropical rainforests. Sustained by a tight mutualism between coral polyps and photosynthetic Symbiodinium algae (zooxanthellae) that recycles nutrients efficiently within the holobiont, explaining how reefs achieve high productivity in oligotrophic tropical waters. Thermal bleaching disrupts this symbiosis.", "id": "fc13"}, {"front": "Estuaries", "back": "Habitats where fresh and salt water mix — among the most productive on Earth. The mixing creates gradients of salinity, temperature, and nutrients that few species tolerate year-round but that provide essential nursery habitat for commercially important fish and overwintering grounds for migratory birds. High productivity and coastal accessibility make estuaries disproportionately threatened by development and pollution.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
