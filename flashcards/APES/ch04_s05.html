<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 4, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Surface Currents and Gyres", "back": "Wind-driven currents that circulate within ocean basins, organized into five major subtropical gyres that rotate clockwise in the Northern Hemisphere and counterclockwise in the Southern (per the Coriolis effect). Each gyre has warm, fast, narrow western boundary currents (Gulf Stream, Kuroshio) and cool, slow, broad eastern boundary currents (California, Humboldt, Canary, Benguela). Surface currents redistribute tropical heat poleward and shape regional climates.", "id": "fc01"}, {"front": "Western Boundary Current", "back": "A warm, fast, narrow, deep current on the western side of an ocean basin that transports tropical heat poleward. The Gulf Stream — carrying heat equivalent to roughly 1,300 times total US electricity capacity — is the canonical example. Western Europe is 5-10 degrees C warmer than its latitude alone would suggest because Gulf Stream heat is released to the atmosphere and carried inland by the prevailing westerlies.", "id": "fc02"}, {"front": "Eastern Boundary Current", "back": "A cool, slow, broad, shallow current on the eastern side of an ocean basin that flows equatorward. The California, Humboldt (Peru), Canary, and Benguela Currents all chill their adjacent coasts and suppress convective precipitation. They also drive coastal upwelling because equatorward winds combined with the Coriolis effect push surface water offshore, drawing cold nutrient-rich water from depth.", "id": "fc03"}, {"front": "Thermohaline Circulation (THC)", "back": "Density-driven deep-ocean circulation, with cold, salty water sinking in the North Atlantic (Labrador and Greenland-Iceland-Norwegian seas) and around Antarctica, then flowing along the seafloor before upwelling in the Indo-Pacific. Also called the global conveyor belt or Atlantic Meridional Overturning Circulation (AMOC), it completes a circuit on roughly 1,000-year timescales and is a major mechanism of poleward heat transport.", "id": "fc04"}, {"front": "AMOC and the Younger Dryas", "back": "The Atlantic Meridional Overturning Circulation is sensitive to freshwater input. About 12,900 years ago, glacial meltwater pulses freshened the North Atlantic, lowered surface density, slowed or stopped North Atlantic Deep Water formation, and triggered centuries of rapid cooling in Europe (the Younger Dryas). Climate models project that ongoing Greenland ice melt could weaken AMOC over coming centuries with significant climatic consequences.", "id": "fc05"}, {"front": "Upwelling", "back": "The process by which wind-driven surface divergence draws cold, nutrient-rich water from depth to replace surface water displaced offshore. It occurs primarily along eastern ocean boundaries (where equatorward winds and the Coriolis effect push surface water offshore) and at the equator. Upwelled water is rich in nitrate and phosphate because it comes from depths where organic matter has been remineralized below the photic zone.", "id": "fc06"}, {"front": "Why Upwelling Drives Productivity", "back": "Most of the open ocean is nutrient-limited at the surface — phytoplankton consume nitrate and phosphate faster than they are resupplied. Upwelling delivers nutrients from depth to the photic zone, fueling huge phytoplankton blooms and the entire food web above them. Upwelling zones cover only a few percent of ocean area but support some of Earth's largest fisheries (Humboldt anchovy, California sardine, Benguela hake).", "id": "fc07"}, {"front": "Walker Circulation", "back": "The east-west atmospheric overturning loop in the tropical Pacific. Under neutral conditions, southeast trade winds push warm surface water westward, piling a 2-m-thick warm pool 8-9 degrees C warmer than the eastern Pacific near Indonesia. Air rises over the warm pool, flows eastward at altitude, sinks over the eastern Pacific, and returns westward as surface trade winds. Walker circulation is the atmospheric counterpart to the ENSO cycle.", "id": "fc08"}, {"front": "El Nino (ENSO Warm Phase)", "back": "Trade winds weaken; the western Pacific warm pool migrates eastward across the central and eastern Pacific. The thermocline deepens in the east, suppressing cold upwelling off Peru and devastating the anchovy fishery. Convective precipitation shifts eastward: Peru and Ecuador flood, California and the US Gulf Coast are wetter, while Australia, Indonesia, the Philippines, southern Africa, and northeastern Brazil are drier than normal.", "id": "fc09"}, {"front": "La Nina (ENSO Cool Phase)", "back": "Trade winds intensify beyond normal, pushing the warm pool further west. Eastern Pacific upwelling intensifies; Australia and Indonesia flood; California and Peru experience drought. La Nina events typically increase Atlantic hurricane activity by reducing upper-level wind shear over the tropical Atlantic, allowing tropical storms to organize more readily. La Nina is not merely the absence of El Nino — it has its own distinct global signature.", "id": "fc10"}, {"front": "ENSO Teleconnections", "back": "Statistically robust correlations between climate anomalies in widely separated regions, linked through the jet stream by tropical-Pacific sea-surface temperature changes of only 1-3 degrees C. ENSO simultaneously alters precipitation in southern Africa, Brazil, Indonesia, and the western United States, and modulates Atlantic hurricane seasons. Teleconnections are why ENSO is the single largest source of year-to-year climate variability worldwide.", "id": "fc11"}, {"front": "Oceanic Nino Index (ONI)", "back": "The standard NOAA metric for ENSO state, defined as the running three-month sea-surface temperature anomaly in the Nino 3.4 region (east-central equatorial Pacific). ONI > +0.5 degrees C for five consecutive overlapping three-month periods constitutes an official El Nino; ONI < -0.5 degrees C qualifies as La Nina. The 1982-83, 1997-98, 2015-16, and 2023-24 events all reached peak ONI values above +2 degrees C.", "id": "fc12"}, {"front": "Major Historical El Nino Events", "back": "1982-83 (then-record event, Peru flooding, Australian drought, anchovy collapse, ~$8B damages); 1997-98 (Borneo/Sumatra fires released ~2 Gt carbon, first Great Barrier Reef mass bleaching, ~$35-45B damages); 2015-16 (worst Great Barrier Reef bleaching to date, southern African food crisis); 2023-24 (overlaid on anthropogenic warming, record ocean heat content, every month June 2023-early 2025 at record global temperatures).", "id": "fc13"}, {"front": "ENSO + Anthropogenic Warming", "back": "Background ocean temperatures are rising due to greenhouse gas emissions, so ENSO events are now superimposed on warmer baselines. The 2023-24 El Nino illustrates this 'supercharging' — coral bleaching, marine heatwaves, and food-security impacts intensify even when atmospheric ENSO amplitude is unchanged. ENSO is therefore not separable from climate change; its consequences are amplified by the altered baseline climate.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
