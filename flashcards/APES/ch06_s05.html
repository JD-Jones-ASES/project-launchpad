<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Photovoltaic (PV) Cell", "back": "Converts sunlight directly into electricity via the photovoltaic effect: photons absorbed by a semiconductor (typically silicon) knock electrons loose, creating an electric current. Commercial silicon PV averages 20-23% efficiency; lab multi-junction cells exceed 40%. DC output goes through inverters to AC for grid injection.", "id": "fc01"}, {"front": "Concentrated Solar Power (CSP)", "back": "Uses mirrors/lenses to focus sunlight onto a receiver, generating high-temperature heat that drives a steam turbine. With molten-salt thermal storage (6-18 hours), CSP can generate after sunset — making it dispatchable. Most cost-effective in regions with high direct normal irradiance (Southwest US, Spain, MENA, Australia).", "id": "fc02"}, {"front": "Passive Solar Design", "back": "Building strategy with no moving parts: south-facing windows (in Northern Hemisphere) admit low-angle winter sun while roof overhangs block high-angle summer sun. Thermal mass (concrete, stone, water walls) absorbs daytime heat and releases it at night. Can reduce heating energy demand by 50% or more.", "id": "fc03"}, {"front": "Wind Power Cubic Law", "back": "Wind power is proportional to the cube of wind speed (P proportional to v^3). Doubling wind speed increases available power by 8x; 1.5x wind speed gives 1.5^3 = 3.4x more power. Explains why offshore sites (with steadier, faster winds) generate dramatically more per unit of installed capacity.", "id": "fc04"}, {"front": "Onshore vs. Offshore Wind", "back": "Onshore: capacity factor 30-40%, hub heights 80-120 m, rotor diameters up to 160 m. Offshore: capacity factor 40-55%, larger turbines (rotor diameters >200 m), stronger and more consistent winds, but installation/maintenance cost 2-3x more. European North Sea has the most developed offshore industry.", "id": "fc05"}, {"front": "Wind Environmental Concerns", "back": "Bird and bat mortality from rotor strikes (significant at some migratory flyway sites), visual and noise impacts on nearby communities, habitat disruption during construction, substantial land area (though land between turbines remains usable for agriculture), and variability — generation only when wind blows.", "id": "fc06"}, {"front": "Geothermal Energy", "back": "Taps Earth's internal heat (primordial + radioactive decay of U, Th, K). Hydrothermal systems extract naturally occurring steam or hot water in permeable rock for steam turbines. Iceland generates ~100% of its electricity from geothermal; Geysers complex (~725 MW) is the largest US geothermal facility.", "id": "fc07"}, {"front": "Geothermal Capacity Factor", "back": "~75% capacity factor — higher than any renewable source other than hydroelectric — because Earth's internal heat is constant. Geothermal plants run 24/7, making them truly baseload renewable energy. Geographically concentrated in volcanic and tectonically active regions.", "id": "fc08"}, {"front": "Enhanced Geothermal Systems (EGS)", "back": "Drills into hot dry rock (3-10 km depth, >150 deg C); injects water, fractures the rock for permeability, heats it, and returns it through a second well. Could make geothermal available almost anywhere. Concern: induced seismicity from fracturing (similar to fracking). High drilling costs limit deployment. First utility-scale EGS in US entered operation in Nevada in 2024.", "id": "fc09"}, {"front": "Hydrogen as Energy Carrier", "back": "Hydrogen is not a primary energy source — it does not exist in useful quantities in nature. It must be produced by consuming energy from another source. Like a battery, it stores and releases energy. Lifecycle CO2 emissions depend entirely on the production pathway.", "id": "fc10"}, {"front": "Green vs. Grey vs. Blue Hydrogen", "back": "Green: electrolysis of water (2H2O → 2H2 + O2) powered by renewable electricity — near-zero lifecycle CO2. Grey: steam methane reforming (CH4 + H2O → CO + 3H2; CO + H2O → CO2 + H2) — substantial CO2 emissions. Blue: SMR with carbon capture. SMR/grey hydrogen dominates current commercial production.", "id": "fc11"}, {"front": "Hydrogen Fuel Cell", "back": "Electrochemical device that combines H2 and O2 to produce electricity and water vapor without combustion: 2H2 + O2 → 2H2O + electricity. Efficiency ~60% in combined heat-and-power applications. Promising for heavy transport (long-haul trucks, ships, aircraft) where battery weight/charging time is prohibitive.", "id": "fc12"}, {"front": "Capacity Factor", "back": "Ratio of actual annual electrical output to the theoretical maximum if running at 100% rated capacity for all 8,760 h/yr. CF = Actual MWh / (Rated MW × 8,760). Nuclear ~92%, geothermal ~75%, combined-cycle gas ~55%, offshore wind 45-55%, hydroelectric ~40%, onshore wind ~35%, utility solar PV ~25%.", "id": "fc13"}, {"front": "Intermittency Solutions", "back": "Three approaches to manage variable renewables: (1) Grid-scale storage — batteries, pumped hydro, or hydrogen — to absorb excess and release on demand. (2) Long-distance transmission to aggregate generation across geographically diverse areas. (3) Demand response — flexible loads (EV charging, industrial) that shift consumption to surplus generation periods.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
