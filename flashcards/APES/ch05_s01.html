<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Environmental Science &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Environmental Science &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APES.html">&larr; Back to AP Environmental Science</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Tragedy of the Commons", "back": "Garrett Hardin's 1968 framework: when a resource is open to all (rival but non-excludable), each user gains the full benefit of an additional unit consumed but bears only a fractional share of the collective harm. The result is systemic overuse — not from irrationality, but from the aggregate of individually sensible choices. Classic examples: fisheries, atmospheric waste sinks, groundwater aquifers, rangeland.", "id": "fc01"}, {"front": "Common-Pool Resource", "back": "A resource that is RIVAL (one user's consumption reduces what is available for others) but NON-EXCLUDABLE (it is difficult or costly to prevent anyone from using it). This combination creates an incentive structure prone to overuse unless rules, prices, or governance institutions internalize the shared cost of each additional unit consumed. Examples: fish stocks, groundwater, atmosphere as a waste sink, public rangeland.", "id": "fc02"}, {"front": "Externality", "back": "A cost or benefit that falls on a party not involved in a market transaction. Negative externalities (pollution, congestion, acid rain) cause markets to OVER-produce harmful activities; positive externalities (vaccination, education, basic research) cause markets to UNDER-produce beneficial ones. Policy tools that force prices to reflect externalities — Pigovian taxes, subsidies, cap-and-trade — are said to 'internalize' the externality.", "id": "fc03"}, {"front": "Pigovian Tax", "back": "A per-unit tax on an activity equal to its external cost, designed by economist A. C. Pigou to make market prices reflect true social cost. Example: a carbon tax that charges emitters for the social cost of each tonne of CO2 raises fossil-fuel prices to reflect climate damages, incentivizing fuel switching and efficiency without specifying how each firm must reduce emissions. The tax fixes PRICE; emission quantity varies with demand response.", "id": "fc04"}, {"front": "Cap-and-Trade", "back": "A market-based pollution control system: regulators set a ceiling (the 'cap') on total emissions and issue tradable permits equal to the cap. Firms that can reduce cheaply sell surplus permits to firms for which reduction is expensive. Total pollution is guaranteed not to exceed the cap; the market determines who reduces. The 1990 Clean Air Act SO2 program achieved acid-rain reductions at roughly half the cost of command-and-control. Fixes QUANTITY; permit prices vary.", "id": "fc05"}, {"front": "Command-and-Control Regulation", "back": "Pollution control by setting technology or emission standards enforced by law. Examples: catalytic converter requirements on cars, Clean Water Act effluent limits, appliance energy-efficiency standards. Administratively straightforward and provides outcome certainty, but typically achieves reductions at HIGHER cost than market-based approaches because firms cannot choose flexible compliance methods.", "id": "fc06"}, {"front": "Natural Capital", "back": "Ecological economics term for stocks of nature — forests, wetlands, fisheries, aquifers, climate system — that generate ongoing flows of ecosystem services (clean water, flood buffering, climate regulation, pollination, soil formation) without which the human economy cannot function. Distinct from neoclassical economics, which treats natural resources as substitutable inputs. Running down natural capital is asset liquidation, not growth.", "id": "fc07"}, {"front": "Ecosystem Services", "back": "The benefits humans receive from functioning ecosystems: provisioning (food, fiber, water), regulating (climate, flood, disease control), supporting (soil formation, nutrient cycling, primary production), and cultural (recreation, spiritual, aesthetic). Costanza et al. (1997) estimated global ecosystem services at approximately $33 trillion per year — roughly equal to global GDP at the time — none of which appears in conventional national accounts.", "id": "fc08"}, {"front": "Sustainability (Brundtland Definition)", "back": "Codified in 1987's Our Common Future: meeting the needs of the present generation without compromising the ability of future generations to meet their own needs. Three pillars must be simultaneously satisfied: environmental, economic, and social. Operationally, a society is sustainable when resource consumption does not exceed natural regeneration AND waste production does not exceed ecosystem absorptive capacity.", "id": "fc09"}, {"front": "Ecological Footprint", "back": "Wackernagel-Rees metric (1990s): the area of biologically productive land and sea, in global hectares (gha), required to produce the resources a person or population consumes and to absorb the wastes generated. Global average is approximately 2.7 gha/person against Earth's biocapacity of approximately 1.6 gha/person. The gap is OVERSHOOT — humanity consuming natural capital faster than regeneration. US footprint ~8.1 gha; if everyone lived as Americans, ~5 Earths needed.", "id": "fc10"}, {"front": "Ecological Overshoot", "back": "The condition in which humanity's aggregate annual demand on nature exceeds Earth's annual biocapacity. Humanity has been in overshoot since approximately the early 1970s; current overshoot factor is roughly 1.7 (humanity consumes ~1.7 Earths per year). Overshoot is sustained only by drawing down stocks (forests, fish, groundwater, soil organic matter); declining stocks eventually reduce biocapacity, forcing consumption back below regeneration through deliberate policy or involuntary collapse.", "id": "fc11"}, {"front": "Discount Rate", "back": "The rate used to convert future costs or benefits to their present-day equivalent value in cost-benefit analysis. A $100 benefit ten years from now is worth only ~$62 today at 5% per year, or ~$39 at 10%. High discount rates systematically undervalue future environmental outcomes — making over-harvesting 'rational' even when long-run costs obviously exceed short-run gains. The choice of discount rate is a critical and contested decision in climate, fishery, and aquifer policy.", "id": "fc12"}, {"front": "Intergenerational Equity", "back": "The principle that resource-use decisions should not impose unjust costs on future generations who have no voice in current choices. The argument cuts directly against high discount rates: future people did not consent to depleted aquifers, destabilized climate, or eroded soil, so discounting their welfare at market rates is morally indefensible for non-substitutable resources. The debate is not merely technical — it determines whether climate, fishery, and aquifer policies should act urgently now or defer.", "id": "fc13"}, {"front": "Elinor Ostrom (2009 Nobel Prize)", "back": "Political economist whose empirical research on common-pool resource governance challenged Hardin's binary of 'privatize or state-regulate.' Studying irrigation cooperatives, coastal fisheries, and grazing commons, Ostrom documented that communities reliably develop self-organized governance rules (clear boundaries, monitoring, graduated sanctions, conflict-resolution mechanisms) that sustainably manage shared resources WITHOUT either privatization or state coercion. Won the 2009 Nobel Prize in Economic Sciences.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
