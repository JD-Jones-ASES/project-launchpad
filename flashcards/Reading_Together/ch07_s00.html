<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the initial magical problem the children faced regarding dinner in the banqueting-hall?", "back": "The dinner was invisible and unfeelable; they couldn't eat it, despite knowing it should be there."}, {"front": "How did Cyril first provide food for his siblings during the 'siege'?", "back": "He found three whole biscuits and crumbs in his pocket, which he had forgotten."}, {"front": "Why did the biscuits taste 'a little oddly'?", "back": "They had been in Cyril's pocket all morning with tarred twine, green fir-cones, and cobbler's wax."}, {"front": "What was Cyril's initial theory about why the biscuits were real, unlike the invisible dinner?", "back": "He believed it was 'because WE had them,' implying that anything physically possessed by them remained real."}, {"front": "Describe Cyril's experiment that allowed the children to eat invisible food.", "back": "He leaned over the table and opened and shut his mouth as if taking bites out of air, which magically turned into real bread in his mouth."}, {"front": "What was Martha's reaction after the children's magical dinner, which involved eating air?", "back": "She exclaimed she had 'never seen such a mess in all her born days' when changing the plates."}, {"front": "What does it mean to 'reconnoitre' in a military context, as Robert did from the castle tower?", "back": "To explore or survey an area, especially to gather information about an enemy's position or movements."}, {"front": "What signs did the children observe that indicated the besieging party's serious intentions?", "back": "They saw men cleaning/sharpening weapons, re-stringing bows, polishing shields, and horses dragging a tree trunk for a battering-ram."}, {"front": "What is a battering-ram, and what was its purpose in the context of the siege?", "back": "A heavy beam of wood used to smash down castle doors and gates, signifying an imminent attack."}, {"front": "How did Cyril dramatically characterize their role in the besieged castle?", "back": "He said they were 'intrepid survivors' who were going to 'defend it to the death.'"}, {"front": "What historical defense mechanism did Anthea recall from Bodiam Castle?", "back": "Pouring boiling lead down on besiegers through special holes in the castle walls."}, {"front": "How did the children's perception of the siege differ between Robert and the others?", "back": "Robert felt it was 'real deadly dangerous work,' while for the others, it was mostly 'half a game of make-believe, and half a splendidly distinct and perfectly safe dream.'"}, {"front": "How did Anthea cleverly ensure the 'garrison' was provisioned with biscuits for tea?", "back": "She asked Martha to put biscuits directly into their pockets, knowing that anything 'had' by them became real."}, {"front": "What improvised defenses did the children plan since the castle's heavy weapons were unusable?", "back": "They gathered stones to drop on heads, planned to hurl daggers like javelins, and brought cold water to pour on besiegers instead of hot lead."}, {"front": "What sound signaled the imminent attack by the besieging party?", "back": "A loud, fierce cry of a trumpet."}, {"front": "How did Robert react immediately after hearing the trumpet blast confirming the attack?", "back": "He declared, 'You see it IS real,' rushed to the window, and defiantly put his tongue out at an enemy."}, {"front": "How did Cyril respond to Robert's apparent bravery when facing the besiegers?", "back": "His pallor turned to redness, and he claimed he wasn't ready but would be braver than Robert 'in half a jiffy.'"}, {"front": "What were Jane's primary fears and questions about the besieging army?", "back": "She questioned if it was 'only a game' and whether the besiegers were 'civilized' enough to spare women and children."}, {"front": "How did Anthea try to reassure Jane about the besieging army?", "back": "She pointed out their bright flags, fine leader, and gleaming armor, making the scene appear 'too pretty to be alarming,' and stated civilized armies spare women and children."}, {"front": "What did the besiegers mean when they threatened 'no quarter' if the castle did not surrender?", "back": "It meant they would show no mercy to the defeated enemy, especially by not sparing their lives."}, {"front": "What was the besieging party's demand to the castle's inhabitants?", "back": "They demanded the castle's surrender 'in the name of our Lord the King, and of our good lord and trusty leader Sir Wulfric de Talbot,' threatening 'fire and sword and no quarter.'"}, {"front": "How did Robert respond to the summons to surrender?", "back": "He loudly and repeatedly refused, shouting, 'No! Never, Never, NEVER!'"}, {"front": "What collective action did Robert instruct the children to take to show defiance?", "back": "To cheer 'Hip, hip, hooray!' and rattle their daggers to make more noise and lend strength to their weak cheers."}, {"front": "What was Jane's final worried observation at the very end of the section?", "back": "She noted, 'The moat is dreadfully thin,' indicating her ongoing fear despite earlier reassurances."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
