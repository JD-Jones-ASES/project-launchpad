<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What were the first two wishes the children made with the Psammead?", "back": "The children's first two wishes were for Beauty and for boundless Wealth."}, {"front": "Why were the children unhappy with their initial wishes for beauty and wealth?", "back": "Neither wish had made them happy, leading to unexpected and unpleasant consequences."}, {"front": "Describe one chaotic action the Baby performed during breakfast.", "back": "The Baby wriggled through his high chair, hit Cyril with a tablespoon, put his fist in his bread-and-milk, or knocked over the goldfish bowl."}, {"front": "What significant accident occurred during breakfast that further disrupted the children?", "back": "The Baby knocked over the bowl of golden carp, spilling water and fish into everyone's laps."}, {"front": "What dilemma did Jane face after the goldfish incident due to her torn dress?", "back": "Jane had to mend her torn dress or appear all day in her best petticoat, which Martha deemed 'not respectable'."}, {"front": "According to Martha, why was wearing a petticoat as an outer garment 'not respectable'?", "back": "Wearing a petticoat in public was considered like going out in underwear, as it was an undergarment."}, {"front": "What is 'Hash' as described in the text?", "back": "Hash is leftover meat chopped up small and cooked again with potatoes or vegetables, considered a boring meal."}, {"front": "Where did the children sit to discuss the Psammead while Jane mended her dress?", "back": "They sat on the grass-plot around the sundial."}, {"front": "What was Robert's theory about why the Psammead's wishes were not working out well for them?", "back": "Robert believed the Psammead was a 'spiteful brute' and wished every time that the children's wishes wouldn't do them any good."}, {"front": "How did Cyril and Jane's opinion of the Psammead's intentions differ from Robert and Anthea's?", "back": "Cyril and Jane were more hopeful, believing the Psammead didn't act on purpose and that their previous wishes were simply 'silly' or 'donkeyish'."}, {"front": "What does it mean to have 'darned' a hole in fabric?", "back": "To 'darn' means to mend a hole in fabric by weaving thread back and forth with a needle, a common practice before cheap clothing existed."}, {"front": "What phrase did the author use to describe the children's ability to talk simultaneously and still listen to each other?", "back": "They were used to talking 'by fours,' like soldiers march, managing to listen to others while speaking themselves."}, {"front": "What is a 'vulgar fraction' in the context of the story's narrator?", "back": "A 'vulgar fraction' is an old-fashioned name for ordinary fractions like 3/4 or 1/2, where 'vulgar' means 'common' not rude."}, {"front": "What was the new, more 'sensible' wish the children decided to ask the Psammead for?", "back": "They decided to wish for 'fifty pounds in two-shilling pieces'."}, {"front": "Why did Cyril consider 'fifty pounds in two-shilling pieces' a more sensible wish than 'boundless wealth'?", "back": "He felt 'boundless wealth' was silly and 'fifty pounds' was a more practical and manageable amount."}, {"front": "Who insisted that the children take the Baby with them to the gravel-pit?", "back": "Martha insisted they take the Baby, reminding them of their promise to their mother."}, {"front": "How did the Baby's behavior change once he was with the children on their way to the gravel-pit?", "back": "He laughed, rode on Robert's back, tried to feed Jane stones, and generally made himself so agreeable that they weren't sorry he was with them."}, {"front": "What specific item did Jane suggest buying for the Baby with part of the new wish money?", "back": "Jane suggested buying a three-pound-fifteen rocking-horse, like those in the Army and Navy Stores catalogue."}, {"front": "What was the 'Army and Navy Stores' mentioned in the text?", "back": "It was a famous department store in London that sold a wide variety of goods and published a thick mail-order catalogue."}, {"front": "According to Anthea, why couldn't the Sand-fairy's wishes ensure the Baby's future later in life?", "back": "The Sand-fairy's wishes only lasted until sunset each day, so they could not ensure any long-term benefit for the Baby's later years."}, {"front": "What is a 'shilling' in British currency, as mentioned in the text?", "back": "A shilling was a British coin worth twelve old pennies, and twenty shillings made one pound."}, {"front": "Why couldn't the children immediately find the Psammead when they arrived at the gravel-pit?", "back": "They had forgotten to mark the Psammead's spot with a ring of stones the previous day after it had warned them to run away from the boundless wealth."}, {"front": "What warning had the Psammead given them the previous day that led to them forgetting its location?", "back": "The Psammead had told them to run outside the quarry for fear they would be buried alive in the heavy treasure of minted gold."}, {"front": "How did the children's reaction to forgetting the Psammead's location differ from what the author implied about 'children in a book'?", "back": "Being 'real live children,' it only made their 'ruddy cheeks pale' and gave them 'blank and silly expressions,' rather than the dramatic, profound reaction of 'children in a book'."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
