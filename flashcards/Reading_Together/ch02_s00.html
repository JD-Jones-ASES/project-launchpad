<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Reading_Together.html">&larr; Back to Let&#x27;s Read: Five Children and It</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What ingenious method did Robert use to wake Anthea?", "back": "He gently squeezed water from a wet bath-towel onto her face, drop by drop."}, {"front": "What significant event did all four children (Anthea, Jane, Robert, Cyril) initially believe was a shared dream?", "back": "They all dreamed they found a Sand-fairy in the gravel-pits and that it granted wishes."}, {"front": "What was Cyril's reaction when the younger children told him about their shared Sand-fairy dream?", "back": "He revealed that it wasn't a dream but was actually true, and he was keen to go back for another wish."}, {"front": "What rule did Cyril propose for making future wishes to the Sand-fairy?", "back": "They must decide what they want 'solid' before they go, and no one must ask for anything unless the others agree first."}, {"front": "How did Martha's reminders about their 'naughty conduct' help Anthea believe the Sand-fairy encounter was real?", "back": "Anthea reasoned that servants 'never dream anything but the things in the Dream-book,' confirming the Sand-fairy must be real because Martha's world was unaffected by it."}, {"front": "Why was Martha taking the Baby (referred to as 'the Lamb') to Rochester?", "back": "She was taking him to see her cousins, with Mother's permission."}, {"front": "Define 'carrier' as mentioned in the story.", "back": "A person with a horse and cart who transported goods and passengers between villages, acting as a local delivery and bus service."}, {"front": "What safety precaution did the children take when returning to the gravel-pit to find the Sand-fairy?", "back": "They did not climb down the sides of the pit but went around by the safe lower road, 'as if they had been carts'."}, {"front": "How did the children ensure they could easily find the Sand-fairy's spot again?", "back": "They had made a ring of stones around the place where it had disappeared."}, {"front": "Describe the physical appearance of the Sand-fairy (Psammead) when they uncovered it.", "back": "It had a spider-shaped brown hairy body, long arms and legs, bat's ears, and snail's eyes."}, {"front": "How did the Sand-fairy react when it overheard the children arguing over its head?", "back": "It said it had quite thought it had dreamed them all until it heard them being disagreeable and loud."}, {"front": "Why did the children collectively sigh in relief when the Sand-fairy declined to tell them about its dreams?", "back": "If they had said 'Yes,' it would have used up their day's wish, sacrificing the wishes they had planned."}, {"front": "What was the 'extra' small wish Robert requested from the Sand-fairy?", "back": "They wished that 'the servants not notice the gifts' the Sand-fairy gave them."}, {"front": "What was the Sand-fairy's general observation about people noticing things?", "back": "It stated, 'People don't notice things much, anyway.'"}, {"front": "What was the children's main wish, as articulated by Robert?", "back": "They wished 'to be rich beyond the dreams of avarice'."}, {"front": "What specific quantity of gold did the children ask for?", "back": "'Millions of it,' enough to fill the gravel-pit."}, {"front": "What warning did the Sand-fairy give the children immediately before granting their wish for gold?", "back": "It told them to 'get out before I begin, or you'll be buried alive in it.'"}, {"front": "Describe the appearance of the gravel-pit after the wish for gold was granted.", "back": "The entire sand-pit was filled, right up to the top, with new shining gold pieces, gleaming like 'the mouth of a smelting furnace' or 'fairy halls in the sky at sunset'."}, {"front": "What was Robert's immediate observation about the type of gold coins they received?", "back": "He noted, 'It's not sovereigns.'"}, {"front": "How did the children initially react to seeing and touching the vast amount of gold?", "back": "They stood with their mouths open, then picked up handfuls, letting it run through their fingers, initially forgetting to think of spending it."}, {"front": "What was the 'wonderful music' associated with the gold?", "back": "The chink it made as it fell through their fingers."}, {"front": "Define 'Apple-pie bed'.", "back": "A practical joke where someone folds the sheets in a bed so that the person who gets in can't stretch out their legs."}, {"front": "Define 'Booby-trap'.", "back": "Tricks set up to surprise or startle someone, like balancing a bucket of water on top of a door."}, {"front": "Define 'Tilt' as it refers to the carrier's cart.", "back": "A canvas cover stretched over hoops on a cart to protect passengers from rain and sun, similar to a covered wagon."}, {"front": "What did the Sand-fairy mutter to itself after granting the wish for riches beyond avarice?", "back": "'But it won't do you much good, that's one comfort.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
