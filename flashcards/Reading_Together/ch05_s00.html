<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What critical situation do the children find themselves in at the beginning of the chapter?", "back": "They are stranded at the top of an English church tower because the door is locked, and they cannot get down."}, {"front": "What was Anthea's initial, practical suggestion for escaping the tower?", "back": "She suggested they signal with their handkerchiefs in the morning, once they were dry, expecting someone would come and let them out."}, {"front": "Why was Cyril particularly worried about the soda-water syphon they possessed?", "back": "He feared they would be accused of stealing it and sent to prison if it was found by their rescuers."}, {"front": "What was Robert's desperate suggestion for dealing with the syphon, and why was it dismissed by Cyril?", "back": "Robert suggested throwing it away, but Cyril feared it might hit someone and make them 'murderers' in addition to 'the other thing' (stealing)."}, {"front": "What strategy did Cyril ultimately devise for attracting help, despite the risk of the syphon being discovered?", "back": "He decided they must risk the syphon, hide it, and yell as loud as they could to attract attention, with specific roles for each child's yell."}, {"front": "How did the Vicarage maid react to the children's initial series of yells?", "back": "She was startled, fled from the window, and fainted after telling others she had seen a ghost."}, {"front": "What was the Vicar's immediate assumption upon hearing the screams from the church?", "back": "He believed someone was being murdered in the church and suspected it was a 'lunatic who stole the tongue'."}, {"front": "Who were the three members of the rescue party that set out for the church tower?", "back": "The Vicar, Andrew (the man-servant), and the cook's cousin (a gamekeeper)."}, {"front": "What were the differing suspicions of the rescue party members regarding the source of the screams?", "back": "The Vicar thought it was a lunatic, Andrew suspected a 'trap,' and the gamekeeper remained calm, believing it was 'great cry, little wool' (not truly dangerous)."}, {"front": "Why was the cook's cousin (the gamekeeper) chosen to lead the way up the dark church tower?", "back": "He was calm, experienced with 'vicious characters' as a gamekeeper, and had a gun, which made him feel fearless."}, {"front": "Describe the physical journey the rescue party undertook to reach the top of the church tower.", "back": "They ascended worn, steep, dark, corkscrew stairs, passed through the bell-ringers' loft, then the belfry, up a ladder, and finally a little stone stair to a bolted door."}, {"front": "What specific questions did the gamekeeper ask the children through the bolted door?", "back": "He asked how they got up there, how many of them there were, and if they were armed, warning them not to try any tricks."}, {"front": "How did Cyril respond to the gamekeeper's question about how they got to the top of the tower?", "back": "He vaguely replied, 'We got up - and then we found the door was locked and we couldn't get down,' avoiding the truth about their magical flight."}, {"front": "What precautions did the gamekeeper demand from the children before opening the door to the tower top?", "back": "He insisted they move to the 'other side of the tower' and warned he would fire his gun if anyone rushed him."}, {"front": "What was the gamekeeper's surprised reaction when he finally opened the door and saw the 'desperadoes'?", "back": "He was utterly shocked to find 'a pack of kiddies' instead of dangerous criminals, nearly dropping his lantern and gun."}, {"front": "What was Jane's immediate plea to the Vicar once the children were discovered?", "back": "She caught at his coat and begged, 'Oh, take us down... and we'll tell you anything you like.'"}, {"front": "Why was Cyril forced to stand 'as far out of the lantern light as possible' during the initial interaction with the adults?", "back": "He was struggling to keep the soda-water syphon hidden and steady under his jacket, requiring both hands."}, {"front": "How did the children collectively explain their predicament to the Vicar once they were safely in the Vicarage study?", "back": "Robert stated they went up, got tired, fell asleep, and woke to find the door locked, so they yelled."}, {"front": "What was the Vicar's wife's primary reaction to the children's account of being locked in the tower?", "back": "She scolded them for 'Frightening everybody out of their wits like this' and said they 'ought to be ashamed of yourselves.'"}, {"front": "What crucial piece of information about their adventure did the children intentionally omit from their story to the adults?", "back": "They did not reveal that they had flown up the tower (or any details related to the magical syphon)."}, {"front": "What persistent challenge did Cyril face both during the ascent and descent of the tower?", "back": "The soda-water syphon kept slipping and trying to escape from under his jacket, forcing him to keep it hidden and steady with both hands."}, {"front": "What was the Vicar's final unanswered question after hearing the children's story?", "back": "'But who locked the door?'"}, {"front": "Why did Andrew position himself after the gamekeeper when climbing the tower?", "back": "He pretended it was bravery, but really he feared 'traps' and didn't want anyone catching his legs from behind in the dark."}, {"front": "How did the children manage to maintain the secret of the syphon even when they were detained by the gamekeeper?", "back": "Cyril dared not use violence to resist being caught by the keeper because the syphon began to slip again at that moment, demanding his attention."}, {"front": "What is a 'belfry' in the context of a church tower?", "back": "A belfry is the part of a church tower where the bells hang."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
