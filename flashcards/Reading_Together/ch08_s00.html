    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 8</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was Cyril's new strategy for getting a truly useful wish from the Psammead?", "back": "Cyril proposed they stop actively trying to think of wishes and instead play ordinary games, believing that useful wishes would then 'crop up' naturally."}, {"front": "What does the term 'jackape' mean, as used in the text?", "back": "Short for 'jackanapes,' meaning a cheeky, impertinent person or a mischievous troublemaker."}, {"front": "Define 'humbugging' according to the story's context.", "back": "Joking around, being dishonest, or talking nonsense."}, {"front": "What is a 'water-butt'?", "back": "A large barrel placed outside to collect rainwater from the roof gutters."}, {"front": "What was the outcome of the struggle between Cyril and Robert on the water-butt?", "back": "Robert received a lump 'as big as a cricket ball' over his eye, and the boys were partially dried from the damp."}, {"front": "What did 'pax' signify among British schoolchildren?", "back": "'Pax,' a Latin word meaning 'peace,' was used as a truce call during fights."}, {"front": "How did the children improvise their 'bandit' costumes and weapons?", "back": "Robert wore a red-spotted handkerchief as a bandage; they used bows and arrows, umbrellas and cricket stumps as weapons, and hats with turkey feathers for a 'brigandish' effect."}, {"front": "What was the children's initial interaction with the baker's boy?", "back": "They tried to 'hold him up' as part of their bandit game, shouting 'Stand and deliver!' and 'Your money or your life!'"}, {"front": "Describe the baker's boy's reaction to the children's bandit game.", "back": "He did not enter into the spirit of the game, pushed them aside disrespectfully, and told them to 'Chuck it now.'"}, {"front": "How did Robert accidentally start the physical fight with the baker's boy?", "back": "He tried to lasso the baker's boy with a skipping-rope, but it went around his feet instead of his shoulders, tripping him and scattering his loaves."}, {"front": "What detail does the narrator explicitly state about Robert's performance in the fight with the baker's boy?", "back": "The narrator admits that Robert was 'badly beaten' for the second time that day, contrasting it with heroic adventure tales."}, {"front": "How did the baker's boy display a lack of 'fair play' during the fight?", "back": "He pulled Robert's hair and kicked him on the knee, in addition to blacking his other eye."}, {"front": "Why was Jane's attempt to stop Cyril from joining the fight hurtful to Robert?", "back": "Jane cried and asked Cyril not to 'go and be beaten *too*,' which publicly affirmed Robert's defeat and hurt his pride."}, {"front": "What is 'chivalry,' and how did the baker's boy's actions defy it?", "back": "Chivalry is the medieval code of honor for knights, emphasizing bravery, courtesy, and protecting the weak. The baker's boy pushed Anthea away roughly and continued to fight despite her pleas, showing no chivalrous instincts."}, {"front": "Why did Robert find Anthea's intervention in the fight 'despicable'?", "back": "Anthea rushed in, pleaded with the baker's boy, and offered an apology for Robert. If the baker's boy had accepted, Robert would have been honor-bound not to retaliate later."}, {"front": "What was the exact wish Robert made that led to his transformation?", "back": "Robert, enraged, wished, 'I only wish I was bigger than him, that's all,' referring to the baker's boy."}, {"front": "How large did Robert become after the Psammead granted his wish?", "back": "He grew to be 'much, much bigger,' estimated at ten or eleven feet high, and proportionately broad."}, {"front": "What happened to Robert's clothes when he grew to a gigantic size?", "back": "His Norfolk suit fortunately grew with him, fitting his new enormous stature."}, {"front": "Despite his transformation, what emotions did Robert still display after his wish was granted?", "back": "He still had 'immense tears of fury' on his flushed giant face and looked surprised."}, {"front": "What was Cyril's immediate reaction to Robert's giant size?", "back": "Cyril remarked, 'The Sammyadd's done us again,' indicating he saw it as another problematic wish."}, {"front": "Why was Robert upset with his friends after becoming a giant?", "back": "He felt 'silly' at his immense size and was frustrated that his friends wouldn't try to become the same size as him."}, {"front": "What is 'The Conquest' that Robert mentions in his thoughts about history?", "back": "The Norman Conquest of 1066, when William the Conqueror invaded England from France."}, {"front": "What is a 'mail-cart' as mentioned in the description of the children's game?", "back": "A sturdy baby carriage originally modeled after the carts used to deliver mail."}, {"front": "What literary technique does the narrator use when discussing their inability to describe the fight like 'The Boys of England' writers?", "back": "The narrator employs meta-commentary (or breaks the fourth wall) by discussing the conventions of adventure tales versus their own truthful storytelling approach."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
