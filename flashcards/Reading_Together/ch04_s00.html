<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'Indian ink'?", "back": "A deep black ink originally from China, used for drawing and writing, despite its name."}, {"front": "Why did the children decide to write letters on a particular day?", "back": "It was a very wet day, too wet to go out, so they decided to write letters to their mother in the afternoon."}, {"front": "What was the immediate cause of the ink-pot spilling onto Anthea's desk?", "back": "Robert was lifting the ink across the desk just as Anthea opened her secret drawer, and the Lamb poked Robert's leg with a broken toy's wire at the same moment."}, {"front": "How did the ink spill impact Anthea's letter and her secret drawer?", "back": "Her letter was flooded with ink, and her secret drawer, made of gum and cardboard, was ruined."}, {"front": "What prevented Robert from finishing his letter to his mother?", "back": "He had to help Anthea clean out her desk and promised to make her a new secret drawer, which took up all his time until post-time."}, {"front": "Why was Cyril's letter never found?", "back": "After writing it, he went to set a slug trap. When it was post-time, the letter could not be found, and was never recovered (the narrator suggests 'Perhaps the slugs ate it')."}, {"front": "Which child's letter was successfully sent, and what difficulty did she face while writing it?", "back": "Jane's letter was the only one sent. She spent so long trying to spell 'Psammead' that she didn't have time to properly tell the story about it."}, {"front": "What was the main reason the children's mother never learned about the Sand-fairy from their letters?", "back": "A series of misfortunes (ink spill, lost letter, spelling difficulties) and the pressure of post-time meant they couldn't properly convey the story."}, {"front": "What is a 'wagonette'?", "back": "A four-wheeled horse-drawn carriage with bench seats facing each other, open at the back."}, {"front": "How did Uncle Richard demonstrate his generosity during the Maidstone outing?", "back": "He took the children to a shop and let them choose any toys they wanted, without restrictions on price or whether the items were 'instructive'."}, {"front": "What 'instructive' item did Robert accidentally choose at the Maidstone shop?", "back": "He chose a box depicting winged bulls and winged men, thinking it contained animal toys, but it turned out to be a Sunday puzzle about ancient Nineveh."}, {"front": "List the main activities the children enjoyed with Uncle Richard in Maidstone.", "back": "They chose toys at a shop, went boating on the beautiful Medway river, and had tea at a pastrycook's."}, {"front": "Why were the children unable to make any wishes on the day of the Maidstone outing?", "back": "They returned home too late in the evening to have any wishes that day."}, {"front": "How did Anthea manage to wake herself up precisely at five o'clock in the morning?", "back": "She used a self-discipline method: lying flat, stating her desired wake-up time, pushing her chin to her chest, and banging her head on the pillow a number of times corresponding to the hour."}, {"front": "What was Anthea's 'fairy charm' to prevent going back to bed after waking early?", "back": "Immediately putting her face and hands into a basin of cold water."}, {"front": "What detail about Anthea's morning routine showed she was a 'well-brought-up little girl'?", "back": "She didn't tumble her nightgown together but folded it carefully by the seams from the hem."}, {"front": "Why did Anthea choose to climb out the dining-room window instead of using the door?", "back": "She found the window more romantic and believed it was less likely to be noticed by Martha."}, {"front": "What was the Psammead's initial reaction when Anthea dug it out early in the morning?", "back": "It was very cross, complaining about the 'arctic weather' and 'middle of the night'."}, {"front": "How did Anthea show consideration for the Psammead's comfort?", "back": "She gently covered it with her white pinafore and later offered for it to sit on her lap to be warmer, wrapping her frock skirt around it."}, {"front": "What unusual request did Anthea make of the Psammead regarding wishes, and why?", "back": "She asked it not to grant her any wishes until after breakfast because previous wishes had turned out 'horrid' and she wanted to talk and get advice first."}, {"front": "According to the Psammead, how did people in 'old days' differ in their approach to wishes?", "back": "It claimed people in old days 'almost always knew whether it was Megatherium or Ichthyosaurus they really wanted for dinner,' implying they were more decisive and knew their true desires."}, {"front": "Why did Anthea want the Psammead's advice about their wishes?", "back": "Because everything they had wished for had turned out 'horrid,' and she felt their wishes were being wasted because they were 'too silly to know what to wish for.'"}, {"front": "What was the Psammead's initial stance on giving advice?", "back": "It stated, 'But one thing I won't give - that's advice,' despite claiming to always be generous in giving other things."}, {"front": "What piece of 'non-advice' did the Psammead eventually offer Anthea, and why did it say it didn't count as real advice?", "back": "It advised her to 'think before you speak.' It said this didn't count as advice because it's not original, is in all copy-books, and she would never take it anyway."}, {"front": "What specific warning did the Psammead give Anthea about wishing for wings?", "back": "It warned her to 'take care you aren't flying high at sunset,' referencing a 'little Ninevite boy' it once heard of, hinting at potential dangers."}, {"front": "Why did Anthea choose to pursue her plan to visit the Psammead alone?", "back": "She felt it wouldn't be any better if she told the others about it and preferred to go through with it alone, right or wrong."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
