<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 10</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What literary work influenced Cyril's breakfast wish?", "back": "The Last of the Mohicans by James Fenimore Cooper, an adventure novel set during the French and Indian War."}, {"front": "What was Cyril's specific wish regarding Red Indians?", "back": "He wished for 'little Red Indians in England – not big ones, you know, but little ones, just about the right size for us to fight.'"}, {"front": "What prior agreement with the Psammead made wishes effective anywhere?", "back": "The children had previously wished to have their wishes granted 'wherever you happened to be'."}, {"front": "How did the Psammead confirm a wish had been granted, despite the children's forgetfulness?", "back": "The Psammead told them, 'You've had your wish,' and reminded them of their previous request to have wishes granted anywhere."}, {"front": "What ominous warning did the Psammead give about the granted wish?", "back": "The Psammead said, 'A nice thing you've let yourselves in for!' and wished them 'joy of it!'"}, {"front": "How did Anthea and Jane finally remember what Cyril had wished for?", "back": "Jane tumbled over the book The Last of the Mohicans, which Anthea then picked up and immediately connected to Cyril's breakfast wish."}, {"front": "What was the immediate and terrifying implication of Cyril's wish for Red Indians?", "back": "The children feared the Indians would be 'scalping people all over the country' and were particularly concerned they would come to their house and scalp 'the Lamb'."}, {"front": "How did Anthea determine that the wish's effects would be permanent, unlike some previous wishes?", "back": "She stated, 'The things that grow out of the wishes don't go,' recalling the example of the fifteen shillings from a prior wish that didn't disappear."}, {"front": "What was Anthea's primary objective and plan to ensure the safety of the youngest child, 'the Lamb'?", "back": "Her primary objective was to get the Lamb out of danger. Her plan was to raise money to send Martha and the Lamb away from the house for the afternoon."}, {"front": "Describe the two main methods Anthea used to acquire money for her plan.", "back": "She deliberately broke a valuable toilet-jug and then broke open the locked missionary-box with a poker."}, {"front": "How did Anthea justify breaking the missionary-box, despite Jane's objection?", "back": "She dismissed Jane's concerns by stating it was 'a matter of life and death' to protect the Lamb."}, {"front": "Approximately how much money did Anthea gather in total?", "back": "She collected seven-and-fourpence from the missionary-box and nearly four shillings from the girls, totaling over eleven shillings."}, {"front": "How did Anthea arrange for Martha and the Lamb to travel to Rochester?", "back": "She paid the farmer, who was already going to Rochester, to take Martha and the Lamb instead of the older children, who had planned to go earlier."}, {"front": "What incentive did Anthea offer Martha to convince her to take the Lamb to town?", "back": "Anthea offered her valuable 'Liberty box,' described as being inlaid with real silver, ivory, and ebony."}, {"front": "What was Martha's skeptical perception of Anthea's true motive for sending the Lamb away?", "back": "Martha suspected Anthea's true motive was 'to get the precious Lamb off your hands for the afternoon'."}, {"front": "Why did Anthea burst into tears after Martha and the Lamb departed?", "back": "She cried partly from relief and joy because she had accomplished her aim and felt certain the Lamb was safely out of danger."}, {"front": "How did the boys react when Anthea told them about the Red Indians and her plan?", "back": "They laughed, called her 'a little silly,' and found her 'thrilling tale' flat and unbelievable, especially while eating dinner."}, {"front": "What argument did Cyril use to challenge the immediate threat of Red Indians?", "back": "He argued that 'the wishes always come that very minute,' so if Indians were coming, 'they'd be here now,' not lurking."}, {"front": "What internal conflict led Cyril to disbelieve in the Red Indians?", "back": "He felt in his heart that if Indians did appear, it would be 'entirely his own fault,' so he actively tried not to believe in their existence."}, {"front": "What were 'two-shilling pieces' also known as?", "back": "Florins."}, {"front": "What is a 'boot-tree' and how was it used in the story?", "back": "A foot-shaped wooden form inserted into boots or shoes to help them keep their shape. Anthea used it to break the jug when it wouldn't break by itself."}, {"front": "What does the phrase 'Deepening of the damask of Martha's complexion' suggest about Martha's mood?", "back": "It implies that Martha's face was getting redder, indicating she was becoming flustered, agitated, or annoyed."}, {"front": "What type of dessert was served after the minced beef?", "back": "Treacle-pudding, a warm, sticky British dessert."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
