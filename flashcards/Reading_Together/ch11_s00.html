    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 11</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is the day described in 'The Last Wish' particularly significant for the children and the Psammead?", "back": "It is the last day Cyril, Anthea, Robert, and Jane will have a chance to get anything from the Psammead, as it's the eleventh and final chapter."}, {"front": "What were the children's initial favorite wish ideas for the day, before their parents' news?", "back": "One hundred pounds in modern florins, or a 'pony each' which could be wished for daily and vanish at sunset."}, {"front": "What news caused the children to change their wish-planning strategy?", "back": "A letter from their mother stating that Granny was better, and their parents hoped to be home that very afternoon."}, {"front": "After hearing the news, what became the children's new goal for the day's wish?", "back": "To wish for something splendid that would please their mother, rather than themselves."}, {"front": "What important rule about wishing did Anthea remind the others of?", "back": "Wishes are granted exactly where they happen to be when they say 'I wish'."}, {"front": "What alarming news did Martha bring about Peasmarsh Place?", "back": "Burglars had broken into Peasmarsh Place and stolen all of Lady Chittenden's diamonds and jewels."}, {"front": "How was Lady Chittenden characterized by Anthea?", "back": "She was described as 'rather a nasty lady' who had no children of her own and 'can't abide other folkses'.' "}, {"front": "What types of jewels did the children's mother possess, in contrast to Lady Chittenden?", "back": "A topaz necklace, a sapphire ring, a garnet star, and a small pearl brooch with great-grandpapa's hair."}, {"front": "What specific wish did Jane make that set the day's events in motion?", "back": "She wished Mother could find 'all those lovely things, necklaces and rivers of diamonds and tarrers' (tiaras) in her room when she came home."}, {"front": "What was the children's immediate, terrifying realization after Jane's wish?", "back": "The wish would undoubtedly come true, and their mother would find the stolen jewels in her room, leading to serious trouble."}, {"front": "What major legal concern did Cyril raise about the jewels appearing in their house?", "back": "Their mother would unknowingly become a 'receiver of stolen goods,' which is a serious crime."}, {"front": "To scare the others into silence, what exaggerated fate did Cyril suggest if they told their mother about the Psammead?", "back": "They would be sent to Bedlam, an asylum, to be shut up in iron cages with padded walls, like maniacs."}, {"front": "Why did Anthea agree with Cyril that telling their mother the truth about the Psammead was not a viable option?", "back": "She believed 'it's not true enough for grown-up people to believe it,' fearing their mother would think they were pretending or mad."}, {"front": "What did the children do to make the house welcoming for their mother and distract themselves from their worries?", "back": "They filled all the pots and vases they could find with asters, zinnias, and roses, making the house 'a perfect bower.' "}, {"front": "What was the first jewel their mother discovered upon entering her room?", "back": "A large pearl with shining diamonds set around it, found in a green leather case on her dressing-table."}, {"front": "How did Mother initially react to finding the first jewel, before realizing its potential origin?", "back": "She was very interested and pleased, wondering where it came from and trying it on her wedding finger."}, {"front": "Where did Mother subsequently find the rest of the stolen jewellery?", "back": "In a dressing-table drawer (diamond necklace), the wardrobe (tiara and brooches), and various other parts of her room."}, {"front": "What partial truth did Jane blurt out when Mother pressed her for an explanation?", "back": "She obediently said, 'We found a Fairy.' "}, {"front": "How did Cyril quickly intervene and redirect Mother's suspicion after Jane's 'fairy' comment?", "back": "He suggested the jewels were Lady Chittenden's stolen ones, implying the burglars had hidden them in their house."}, {"front": "What improvised explanation did Cyril offer for why burglars would hide the jewels in their mother's room?", "back": "He suggested they were waiting for nightfall before making off with the goods, and knew no one would be home until Mother arrived that day."}, {"front": "What was Mother's immediate decision after Cyril's explanation about the jewels being stolen?", "back": "She decided she must 'send for the police at once.' "}, {"front": "Why did Robert try to persuade Mother to wait to call the police until Father arrived?", "back": "He knew his father would not be home before sunset, hoping to buy more time before irreversible actions were taken."}, {"front": "What are 'florins' as mentioned in the children's wish?", "back": "British silver coins, each worth two shillings. The children wanted 'modern' ones that shopkeepers would accept."}, {"front": "In the context of keeping ponies, what do 'litter' and 'stabling' refer to?", "back": " 'Litter' is the straw bedding in a horse's stall, and 'stabling' refers to a stable or barn for horses."}, {"front": "What is the legal definition of a 'receiver of stolen goods,' as understood by Cyril?", "back": "Someone who knowingly accepts property that has been stolen, which is considered a serious crime."}, {"front": "What does 'Bedlam' refer to in Cyril's dramatic warning?", "back": "It is the nickname for a famous London asylum, used loosely by Cyril to mean any chaotic, mad place where mentally ill people are confined."}, {"front": "What is a 'tiara'?", "back": "A jeweled ornamental crown or headband typically worn by women at very formal occasions."}, {"front": "What is a 'brooch'?", "back": "A decorative pin worn on clothing, often set with gems."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
