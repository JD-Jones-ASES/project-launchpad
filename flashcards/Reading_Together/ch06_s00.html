<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Let&#x27;s Read: Five Children and It &mdash; Chapter 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Reading_Together">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Martha justify punishing the children, despite her own reluctance?", "back": "She believed it was her duty and for their own good, despite hating to do it and knowing it would cause noise."}, {"front": "Why were Robert's siblings kept indoors as a punishment?", "back": "For 'misfortunes of the day before,' which Martha considered naughtiness, specifically due to the 'wings wish' getting them into trouble."}, {"front": "In Kent, what is meant by the phrase 'and no rabbits caught'?", "back": "It means 'and no work done'."}, {"front": "What unusual behavior did the Sand-fairy (Psammead) exhibit when Robert found it?", "back": "It was out of its own accord due to the hot day, sitting in a sand-pool, stretching, trimming its whiskers, and turning its snail's eyes."}, {"front": "How long was Robert allowed out to get the day's wish?", "back": "Half an hour."}, {"front": "What challenge did Robert face when trying to make his wish to the Psammead?", "back": "He could only think of selfish, trivial things for himself, like toffee, a stamp album, or a clasp-knife, rather than something the others would care for."}, {"front": "What specific wish did Robert ultimately make to the Psammead?", "back": "He wished the Psammead could give one of the others their wish without them having to come and ask for it."}, {"front": "Describe the Psammead's physical reaction immediately after Robert made his unusual wish.", "back": "It blew itself out to about three times its size, then collapsed like a pricked bubble, sighing deeply and leaning back, quite faint with effort."}, {"front": "What warning did the Psammead give Robert after granting his wish?", "back": "It warned him to hurry home, or the others were sure to wish for 'something silly' before he got there."}, {"front": "As Robert ran home, what types of 'silly' wishes did he fear his siblings might have made?", "back": "He worried they might wish for rabbits, white mice, chocolate, a fine day, or most likely, that Robert would hurry up (thereby wasting the day's wish)."}, {"front": "What startling discovery did Robert make when he expected to see his house?", "back": "His house and front-garden railings were gone, replaced by a black and stately castle."}, {"front": "Name three architectural features of the castle Robert saw in place of his home.", "back": "Battlements, lancet windows, and eight great towers."}, {"front": "What was happening in the area where the garden and orchard used to be around the castle?", "back": "There were many tents and crowds of men in armour walking about, indicating a siege."}, {"front": "What did Robert quickly realize was the grim consequence of his siblings' wish for a castle?", "back": "The castle was being besieged, making their wish a dangerous and inconvenient reality."}, {"front": "Where was the moat located around the newly wished-for castle?", "back": "It lay where the garden had been only half an hour before."}, {"front": "What 'unwise' action did Robert take that immediately drew attention from the besieging force?", "back": "He waved back at someone waving a handkerchief from the castle window."}, {"front": "How did the two men in steel-caps who first approached Robert initially perceive him?", "back": "They called him a 'brave varlet,' showing a mixture of respect and mild insult."}, {"front": "How did Robert handle the old English speech of the men-at-arms?", "back": "He tried to translate their archaic phrases into modern English in his head (e.g., 'what brings thee hither' to 'what are you up to here?'), showing his familiarity with historical romances."}, {"front": "Where was Robert taken after being questioned by the soldiers?", "back": "He was dragged 'by the reluctant ear' to their leader."}, {"front": "Describe the overall appearance of the besieging army's leader, Wulfric de Talbot, from Robert's perspective.", "back": "He was a 'glorious creature' with armour, a helmet, a horse, a crest, feathers, a shield, a lance, and a sword, exactly like pictures in historical romances."}, {"front": "What historical inaccuracies were present in the leader's armour, and why didn't Robert notice?", "back": "His armour pieces came from different historical periods (e.g., 13th C shield, Peninsular War sword). Robert didn't notice because he lacked knowledge of heraldry or archaeology."}, {"front": "Despite the danger, what was Robert's primary feeling towards the leader and the scene?", "back": "He was 'dumb with admiration' and felt braver than ever, believing it was 'perfectly correct' like a picture from a book."}, {"front": "When the leader said, 'thou shalt take no scathe,' what did Robert wonder 'scathe' was?", "back": "He wondered if it was 'nastier than the senna tea' he sometimes had to take."}, {"front": "Why did Robert feel a 'wild feeling' that Wulfric de Talbot might understand his story better than other adults?", "back": "He believed that since the leader was himself 'part of a wish,' he might comprehend the true tale of the wishes and the Psammead."}, {"front": "What difficulty did Robert anticipate when trying to explain his story to the historical romance leader?", "back": "He knew he couldn't remember enough 'quothas' and 'beshrew me's' to make his speech sound authentic to the period, as he had read in books."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
