    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is Aristotle's 'Poetics' considered his most compressed work?", "back": "It is likely composed of internal lecture notes rather than a polished treatise for a general audience."}, {"front": "What term does the text use to describe Aristotle's lost works written for general audiences?", "back": "Exoteric works."}, {"front": "In what setting was the surviving text of the 'Poetics' likely revised and used over many years?", "back": "The Lyceum."}, {"front": "Describe the writing style of the 'Poetics' as characterized in the source material.", "back": "Dense, elliptical, and startlingly brief."}, {"front": "What is the recommended reading speed for the 'Poetics' due to its density?", "back": "Slowly."}, {"front": "According to the reading guide, what should a reader do after finishing each chapter of the 'Poetics'?", "back": "Attempt to state the chapter's main argument in one or two sentences."}, {"front": "What is the 'key to understanding' what Aristotle is saying throughout the 'Poetics'?", "back": "Finding the specific argument he is making."}, {"front": "Name the three logical actions Aristotle is consistently performing in his writing.", "back": "Identifying distinctions, drawing conclusions, and classifying types."}, {"front": "Which play does Aristotle use as the model of the 'perfect tragedy'?", "back": "Sophocles' 'Oedipus Rex'."}, {"front": "Approximately how much of the 'Poetics' is illuminated by understanding the plot of 'Oedipus Rex'?", "back": "At least one third."}, {"front": "How does the organization of the 'Rhetoric' differ from the 'Poetics'?", "back": "It is longer and more systematically organized into three distinct books."}, {"front": "What is the primary subject of Book I of the 'Rhetoric'?", "back": "The modes and types of rhetoric."}, {"front": "Which three topics are covered in Book II of the 'Rhetoric'?", "back": "Emotion, character, and argument."}, {"front": "What are the two primary focuses of Book III of the 'Rhetoric'?", "back": "Style and arrangement."}, {"front": "Why is it recommended to read the 'Rhetoric' in its original three-book order?", "back": "Each book builds on the information presented in the preceding one."}, {"front": "Which of Aristotle's works is described as his 'most practical'?", "back": "The 'Rhetoric'."}, {"front": "List Aristotle's three essential categories of persuasion.", "back": "Ethos, pathos, and logos."}, {"front": "According to the text, where can one see Aristotle's categories of persuasion in real life today?", "back": "In speeches (church, class, politics) and advertising."}, {"front": "Who is the translator of the 'Poetics' version mentioned in this volume?", "back": "S. H. Butcher."}, {"front": "Who is the translator of the 'Rhetoric' version mentioned in this volume?", "back": "W. Rhys Roberts."}, {"front": "What quality makes Butcher's translation of the 'Poetics' a scholarly standard?", "back": "Its accuracy and ability to render elliptical Greek into readable English."}, {"front": "What is the primary tool for defining Greek terms after their first appearance in the text?", "back": "The glossary at the back of the book."}, {"front": "Where is a Greek term defined the very first time it appears in the volume?", "back": "In a footnote."}, {"front": "What is the suggested strategy for learning the various Greek terms used by Aristotle?", "back": "Allow them to accumulate naturally while reading rather than attempting to memorize them all at once."}, {"front": "What warning is given regarding the 'brevity' of chapters in the 'Poetics'?", "back": "Do not mistake brevity for simplicity."}, {"front": "In which chapter of the 'Poetics' is the famous definition of tragedy found?", "back": "Chapter VI."}, {"front": "What is the core subject of Chapter IX of the 'Poetics'?", "back": "The relationship between poetry and history."}, {"front": "When a passage in the 'Poetics' seems very short, what is Aristotle typically doing with the text?", "back": "Packing multiple distinctions into every phrase."}, {"front": "What three specific questions should a reader ask when analyzing a compressed Aristotelian sentence?", "back": "What question is he answering, what distinction is he drawing, and what conclusion is he reaching?"}, {"front": "Cloze: The 'Poetics' is characterized as _____ or elliptical because it was likely an internal document.", "back": "dense"}, {"front": "Aristotle's 'Poetics' primarily uses examples from which two literary genres?", "back": "Tragic and epic poetry."}, {"front": "What is the recommended action if a reader cannot summarize a chapter's main argument in two sentences?", "back": "Read the chapter again."}, {"front": "Which translation is noted for being clear and authoritative while following the three-book structure faithfully?", "back": "W. Rhys Roberts's translation of the 'Rhetoric'."}, {"front": "How does the text describe the nature of Chapter VI's definition of tragedy?", "back": "It is given in a single dense sentence."}, {"front": "Term: Ethos", "back": "Definition: One of Aristotle's three categories of persuasion, identified in every act of persuasion."}, {"front": "Term: Pathos", "back": "Definition: One of Aristotle's three categories of persuasion, visible in speeches and advertising."}, {"front": "Term: Logos", "back": "Definition: One of Aristotle's three categories of persuasion used in the 'Rhetoric'."}, {"front": "What is the status of the 'Poetics' text regarding its completeness?", "back": "It shows signs of being an unfinished or condensed work."}, {"front": "Cloze: Skimming the 'Poetics' is discouraged because almost every sentence carries _____ _____.", "back": "significant weight"}, {"front": "How many pages does Aristotle use to present his argument on poetry and history in Chapter IX?", "back": "Two pages."}, {"front": "What does the text suggest a reader look ahead at before beginning each chapter of the 'Poetics'?", "back": "How long the chapter is."}, {"front": "Aristotle returns to 'Oedipus Rex' repeatedly as a model for which specific concept?", "back": "The perfect tragedy."}, {"front": "What describes the 'telegraphic' style found in some chapters of the 'Poetics'?", "back": "Extremely compressed writing that requires slowing down to break sentences into parts."}, {"front": "Why does the 'Rhetoric' have a 'more practical' reputation than the 'Poetics'?", "back": "Its categories are easily identifiable in everyday acts of persuasion like church speeches or advertising."}, {"front": "What distinguishes the 'Poetics' from the 'Rhetoric' in terms of required reading strategies?", "back": "The 'Poetics' requires slow, sentence-by-sentence analysis, while the 'Rhetoric' is best read sequentially to follow its building structure."}, {"front": "Cloze: The first time a Greek term appears, it is defined in a(n) _____; after that, the _____ is the guide.", "back": "footnote; glossary"}, {"front": "According to the text, what is a productive way to test one's understanding of 'ethos', 'pathos', and 'logos'?", "back": "Identifying them in real-world situations and speeches."}, {"front": "What is the primary purpose of identifying the 'distinctions' Aristotle draws?", "back": "To find the argument that is key to understanding his meaning."}, {"front": "In the context of Aristotelian study, what is 'Oedipus Rex' considered?", "back": "The model of the perfect tragedy."}, {"front": "What distinguishes S. H. Butcher's translation of the 'Poetics'?", "back": "It is prized for accuracy and rendering the original elliptical Greek into readable English."}, {"front": "How does the text define the 'cost' of skimming the 'Poetics'?", "back": "Loss of understanding, as nearly every sentence carries significant weight."}, {"front": "Which Aristotelian project involves the study of emotion and character?", "back": "The 'Rhetoric' (specifically Book II)."}, {"front": "Which Aristotelian project involves the study of tragic and epic poetry?", "back": "The 'Poetics'."}, {"front": "What determines whether a reader should revisit the glossary for a Greek term?", "back": "Feeling uncertain about the term's specific use by Aristotle."}, {"front": "Cloze: Finding the _____ is the key to understanding what Aristotle is saying.", "back": "argument"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
