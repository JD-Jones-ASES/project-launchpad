    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

        </div>

    <script>
    var CARDS = [{"front": "Around what year did Aristotle write the Poetics?", "back": "335 BC"}, {"front": "How did the reception of Aristotle's Poetics change during the Renaissance?", "back": "Humanist scholars transformed its descriptive observations into binding prescriptions."}, {"front": "Which ancient critic evaluated tragedy based on its emotional and spiritual effect rather than structural features?", "back": "Longinus"}, {"front": "What is the only unity that Aristotle explicitly prescribes for tragedy?", "back": "Unity of action"}, {"front": "According to Aristotle, what structural elements must a plot possess to maintain unity of action?", "back": "A beginning, middle, and end that are causally connected."}, {"front": "What was Aristotle's descriptive observation regarding the time span of a tragedy?", "back": "Tragedy endeavors to confine itself to a single revolution of the sun."}, {"front": "The Greek word peiratai in Aristotle’s observation on time translates to what English concept?", "back": "It means \"tries\" or \"tends to,\" indicating a tendency rather than a command."}, {"front": "What does Aristotle's Poetics say regarding the unity of place?", "back": "Nothing; unity of place is entirely absent from the text."}, {"front": "Who was the Italian humanist scholar responsible for the 1570 commentary Poetica d'Aristotele Vulgarizzata et Sposta?", "back": "Lodovico Castelvetro"}, {"front": "Term: Verisimilitude", "back": "The principle that art should appear true to life (from the Latin verisimilis)."}, {"front": "Why did Castelvetro argue that a play must take place in a single location?", "back": "He believed audiences could not suspend disbelief if the stage represented multiple distant locations."}, {"front": "How did Castelvetro define the Unity of Time in a prescriptive sense?", "back": "A play must take place within the 12 to 24 hours of the performance itself."}, {"front": "Which of the three unities was Lodovico Castelvetro’s own invention?", "back": "Unity of place"}, {"front": "In literary history, what does \"Neoclassicism\" refer to regarding drama?", "back": "A 17th- and 18th-century movement seeking to revive ancient standards, specifically the three unities."}, {"front": "Name the two greatest dramatists of French neoclassicism who followed Castelvetro’s unities.", "back": "Pierre Corneille and Jean Racine"}, {"front": "Which 1677 French tragedy is cited as an example of concentrated action following the three unities?", "back": "Phèdre by Jean Racine"}, {"front": "Which structural principle did William Shakespeare observe despite ignoring the unities of time and place?", "back": "Unity of action"}, {"front": "Which Shakespearean play is noted for covering sixteen years and crossing between Sicily and Bohemia?", "back": "The Winter's Tale"}, {"front": "Who wrote The Defence of Poesy (c. 1580) to defend the three unities against English dramatic practice?", "back": "Philip Sidney"}, {"front": "What was the \"ironic\" misunderstanding of Aristotle's unity of action involving subplots?", "back": "It is often mistaken as a rule against subplots, even though Aristotle allowed them if they mirror the main action."}, {"front": "What is the primary question Longinus asks when evaluating a tragedy?", "back": "\"Does this tragedy transport us?\""}, {"front": "Term: hypsos", "back": "The Greek word for \"the sublime,\" representing a quality of greatness that overwhelms the reader."}, {"front": "What is the meaning of ekplexis in Longinus’s literary theory?", "back": "A state of transport or ecstasy produced in the hearer by the sublime."}, {"front": "How does the effect of the sublime differ from that of a logical argument according to Longinus?", "back": "The sublime sways the reader with irresistible force rather than merely convincing the reason."}, {"front": "To what sudden event does Longinus compare a sublime thought?", "back": "A lightning flash that illumines the entire subject instantly."}, {"front": "How does Longinus's theory of the sublime relate to Aristotle's theory of catharsis?", "back": "It describes the internal, aesthetic experience of the emotional shattering Aristotle explains structurally."}, {"front": "According to Longinus, what is the first and most important source of the sublime?", "back": "The power of forming great conceptions."}, {"front": "How does Longinus view the role of technical rules versus genius in creating the sublime?", "back": "Genius is the vital principle, but scientific method (art) provides the necessary control and timing."}, {"front": "According to Longinus, what is the danger of great passions left without the control of reason?", "back": "They are like a ship driven at random without ballast."}, {"front": "In Longinus’s view, what happens to \"terrible\" images if they are tasteless or grandiloquent?", "back": "They cease to be tragic and sink into the burlesque or absurd."}, {"front": "Define \"bombast\" as a stylistic fault in Longinus’s treatise.", "back": "A style that transcends the sublime through hollow, affected bulk that ends up appearing little."}, {"front": "Define \"puerility\" as a stylistic vice according to Longinus.", "back": "A pedantic habit of mind which, by over-elaboration, ends in frigidity."}, {"front": "What did Theodorus mean by the vice of \"false sentiment\" (parenthyrsus)?", "back": "An ill-timed or empty display of emotion where none is warranted by the situation."}, {"front": "What common root does Longinus identify for most \"improprieties of language\" in literature?", "back": "The pursuit of novelty in thought."}, {"front": "According to Longinus, what is the \"final fruit of long experience\" in reading?", "back": "A just judgment of style."}, {"front": "What criterion does Longinus use to identify \"true\" sublimity in a work?", "back": "It pleases all readers across different ages, languages, and lifestyles, and stays in the memory."}, {"front": "Why does Longinus prefer a writer who achieves the sublime despite technical errors over one who is merely correct?", "back": "Because greatness is achieved through \"single happy strokes\" rather than an even flow of correctness."}, {"front": "According to Longinus, what quality of the writer is essential for great writing?", "back": "The character of the mind and soul (greatness of soul)."}, {"front": "How does Longinus distinguish between true greatness and external pomp in human life?", "back": "Nothing is truly great if the act of despising it is itself considered a blessing."}, {"front": "What is the significance of the moment of reversal and recognition in Oedipus Rex for Longinus?", "back": "It represents the point where structural perfection becomes an experience of the sublime."}, {"front": "What Greek word does Longinus use for the treatise's title, meaning \"On the Sublime\"?", "back": "Peri Hypsous"}, {"front": "How does Longinus characterize the effect of a \"lofty passage\" on the reader?", "back": "It does not convince the reason but takes the reader \"out of himself.\""}, {"front": "What metaphor does Longinus use for passions without reason, citing the need for a \"spur\" and a \"curb\"?", "back": "A ship at sea without ballast."}, {"front": "Why does Longinus criticize the phrase \"vultures, those living tombs\" by Gorgias of Leontini?", "back": "He considers it a conceit that is high-flown rather than truly sublime."}, {"front": "What is the result of an author displaying violent transport when the reader remains cold?", "back": "The author appears ridiculous."}, {"front": "According to Longinus, how should a writer use \"art\" in relation to \"genius\"?", "back": "A writer should use art to learn when to abandon themselves to the direction of their genius."}, {"front": "What specific fault does Longinus attribute to the writer Timaeus?", "back": "Frigidity (childish absurdities resulting from an eagerness for new thoughts)."}, {"front": "What is the \"lesson for reading Aristotle\" mentioned regarding descriptive versus prescriptive language?", "back": "To distinguish between what a thinker observes as a tendency and what they mandate as a rule."}, {"front": "Under what condition are Shakespeare's double plots considered consistent with Aristotle's principles?", "back": "If the secondary action mirrors and illuminates the primary action."}, {"front": "Which critic identified benevolence and love of truth as the points where humans resemble the divine?", "back": "Longinus"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
