<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What did Aristotle produce that is considered the first systematic psychology of human emotion in Western philosophy?", "back": "A rigorous and precise account of what emotions are, how they arise, and their purposes."}, {"front": "What are the three interconnected questions Aristotle uses to analyze each emotion?", "back": "What state of mind produces it, toward whom is it directed, and for what reasons does it arise?"}, {"front": "How does Aristotle organize the fourteen emotions he analyzes in Book II?", "back": "He organizes them into contrasting pairs to illuminate each term by its opposite."}, {"front": "What is the contrasting emotion for anger in Aristotle's list of fourteen emotions?", "back": "Calmness."}, {"front": "What is the contrasting emotion for fear in Aristotle's list of fourteen emotions?", "back": "Confidence."}, {"front": "What is the contrasting emotion for pity in Aristotle's list of fourteen emotions?", "back": "Indignation."}, {"front": "According to Aristotle, why is an 'apparent' slight sufficient to trigger anger?", "back": "Perceived reality, rather than objective truth, determines a person's emotional response."}, {"front": "Why does Aristotle state that humans do not get angry at inanimate forces like thunderstorms?", "back": "Anger requires a rational agent who could have chosen to act differently."}, {"front": "What specific pleasure accompanies the pain of anger according to Aristotle?", "back": "The anticipated pleasure of retaliation or revenge."}, {"front": "To what does Aristotle compare an angry person's anticipation of retaliation?", "back": "A person who has just sat down to a banquet."}, {"front": "How does Aristotle define fear (phobos)?", "back": "Pain or disturbance due to a mental picture of some destructive or painful evil in the future."}, {"front": "Why does fear require the belief that a bad event is 'not too distant'?", "back": "Humans generally do not fear evils that are merely remote."}, {"front": "Why is uncertainty a necessary component of fear in Aristotle's framework?", "back": "Perfect certainty produces despair rather than fear."}, {"front": "Why do individuals in 'extreme prosperity' often fail to feel fear?", "back": "They believe that they are beyond the reach of any potential harm."}, {"front": "Why do individuals in 'extreme despair' often fail to feel fear?", "back": "They believe they have nothing left to lose."}, {"front": "In Aristotle's view, what distinguishes legitimate rhetoric from sophistry regarding emotion?", "back": "Legitimate rhetoric ensures the emotions aroused are appropriate to the actual facts of the case."}, {"front": "Which factor does Aristotle identify as the most universal shaping force on human character?", "back": "Age."}, {"front": "What is the primary driving force behind the character of the young?", "back": "Passion and desire."}, {"front": "Why do the young tend to trust others readily and think well of people?", "back": "They have not yet experienced enough disappointment to become cynical."}, {"front": "Why do the young live primarily by hope rather than memory?", "back": "Their future is long while their past is relatively short."}, {"front": "Why are the young often generous with their resources?", "back": "They have not yet learned how difficult it is to earn money."}, {"front": "What causes the young to be quick to anger?", "back": "Their sense of honor is tender and easily offended."}, {"front": "Why do the young typically lack a sense of the 'doctrine of the mean'?", "back": "They lack the hard experience necessary to avoid doing everything in excess."}, {"front": "How does life experience typically affect the character of the elderly according to Aristotle?", "back": "It makes them cynical, hesitant, and suspicious because things usually go wrong."}, {"front": "Why do the elderly live by memory rather than hope?", "back": "Their future is short and uncertain while their past is long."}, {"front": "Why are the elderly often characterized as 'small-minded'?", "back": "They have been humiliated enough times that they no longer aim for greatness."}, {"front": "Why are the elderly generally cold in temperament compared to the young?", "back": "The passions or 'fires' of youth have burned down with age."}, {"front": "According to Aristotle, what is the age range for the 'prime of life'?", "back": "Roughly thirty-five to forty-nine years of age."}, {"front": "How is the character of a person in their prime related to youth and old age?", "back": "It represents the mean between the two extremes."}, {"front": "What is the spoudaios as described in Aristotle's Ethics?", "back": "A person of practical wisdom who has found the mean through the maturing of experience."}, {"front": "Why must an orator adapt their speech to the character of their audience?", "back": "It is a matter of effective communication, as the speaker will fail if they ignore the audience's tendencies."}, {"front": "What is the difference between adapting to an audience and flattering them?", "back": "Adapting means speaking so they can hear, whereas flattering means telling them what they want to hear regardless of truth."}, {"front": "What are the two fundamental types of rhetorical proof identified by Aristotle?", "back": "The Example (paradigma) and the Enthymeme (enthymema)."}, {"front": "What is the logical nature of the rhetorical Example (paradigma)?", "back": "It is an inductive argument that draws a general conclusion from particular cases."}, {"front": "What is the difference between historical and invented rhetorical examples?", "back": "Historical examples are real past events, while invented examples are fables or analogies."}, {"front": "What is an enthymeme (enthymema) in rhetorical terms?", "back": "A deductive argument from probable premises, serving as the rhetorical counterpart of the logical syllogism."}, {"front": "Why is the enthymeme referred to as the 'body of persuasion'?", "back": "It constitutes the core of rational argument within rhetoric."}, {"front": "Why does an enthymeme typically omit one of its premises?", "back": "The audience is expected to supply the missing premise from their own common knowledge."}, {"front": "How do examples and enthymemes work together in an oration?", "back": "Examples establish the plausibility of enthymemes, while enthymemes provide logical force to examples."}, {"front": "What is a maxim (gnome) in Aristotle's rhetoric?", "back": "A short, pithy general statement about human life and conduct."}, {"front": "How do maxims function within rhetorical logic?", "back": "They serve as the premises of enthymemes in a portable and memorable form."}, {"front": "Why are maxims effective in persuading an audience?", "back": "They tap into moral understandings that the audience already half-believes."}, {"front": "What are Aristotle's 'topoi' (lines of argument)?", "back": "General patterns of logic that work across any kind of oratory on any subject."}, {"front": "How many 'topoi' are included in Aristotle's systematic catalog?", "back": "Twenty-eight."}, {"front": "How does the topos of 'arguing from degree' function?", "back": "It argues that if even a lesser case is true, the greater case must be true as well."}, {"front": "How does the topos of 'arguing from opposites' function?", "back": "It posits that if a certain thing is good, its opposite must be bad."}, {"front": "How does the topos of 'arguing from definition' function?", "back": "It determines what falls under a word based on that word's actual meaning."}, {"front": "How does the topos of 'arguing from analogy' function?", "back": "It suggests that if a principle is true in one domain, it should be true in a parallel domain."}, {"front": "What is the primary benefit of an orator internalizing the twenty-eight topoi?", "back": "They possess a mental toolkit capable of generating relevant arguments for almost any question."}, {"front": "In Aristotle's three-question method, what is the 'appropriate object' of an emotion?", "back": "The person or thing toward whom the emotion is specifically directed."}, {"front": "According to Aristotle, what specific state of mind disposes a person toward anger?", "back": "The belief that they have been unjustly slighted."}, {"front": "What is the contrasting emotion for shame in Aristotle's framework?", "back": "Shamelessness."}, {"front": "What is the contrasting emotion for kindness in Aristotle's framework?", "back": "Unkindness."}, {"front": "What is the contrasting emotion for envy in Aristotle's framework?", "back": "Emulation."}, {"front": "According to Aristotle, why must an orator prove a defendant acted freely to incite anger?", "back": "Anger requires the belief that the offender could have acted differently."}, {"front": "Which emotion is defined by pain or disturbance regarding a future destructive evil?", "back": "Fear (phobos)."}, {"front": "Why is the future orientation essential to the definition of fear?", "back": "Fear is only felt for events that have not yet occurred."}, {"front": "What state of mind regarding the future is necessary for fear to exist?", "back": "Uncertainty."}, {"front": "Why do the supremely confident tend not to experience fear?", "back": "They believe they are capable of handling any challenge that arises."}, {"front": "According to Aristotle, what moral obligation does an orator have when using pathos?", "back": "The orator must ensure the emotions are appropriate to the actual facts of the case."}, {"front": "Why are the young characterized as quick to forgive?", "back": "They do not have the habit of cherishing grudges."}, {"front": "What quality does 'prime of life' possess that youth lacks?", "back": "The realism of experience that tempers hopefulness."}, {"front": "What quality does 'prime of life' possess that old age lacks?", "back": "The courage of youth that tempers caution."}, {"front": "What is the rhetorical advantage of using a historical example over an invented one?", "back": "Historical examples carry the persuasive weight of established facts."}, {"front": "What is the rhetorical advantage of using an invented example?", "back": "It allows the speaker to construct an ideal case to illustrate their point."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
