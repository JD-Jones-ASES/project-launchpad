<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

        </div>

    <script>
    var CARDS = [{"front": "In Aristotle's definition of tragedy, what is the 'genus' of the form?", "back": "It is an imitation of an action (mimesis)."}, {"front": "Tragedy imitates action, rather than persons, landscapes, or _____.", "back": "abstract ideas"}, {"front": "What Greek term is used to distinguish the 'serious' nature of tragedy from comedy?", "back": "$\\textit{spoudaios}$"}, {"front": "According to Aristotle, a 'complete' action must possess a _____.", "back": "beginning, middle, and end"}, {"front": "What heuristic determines the 'certain magnitude' of a tragedy?", "back": "It must be long enough for fortune to change through probability or necessity."}, {"front": "How does Aristotle characterize 'embellished' language in tragedy?", "back": "Language that includes meter, musical accompaniment, and elevated diction."}, {"front": "Which meter in Greek tragedy is described as the closest to ordinary speech?", "back": "iambic trimeter"}, {"front": "Tragedy is distinguished from epic because its form is action, not _____.", "back": "narrative"}, {"front": "What is the emotional purpose or 'end' of tragedy according to Aristotle?", "back": "To effect the proper purgation ($\\textit{catharsis}$) of pity and fear."}, {"front": "What are the two specific emotions that tragedy is designed to engage and purge?", "back": "Pity and fear."}, {"front": "One interpretation of $\\textit{catharsis}$ is that tragedy purges excess emotion, while another suggests it _____.", "back": "clarifies and refines the emotions cognitively"}, {"front": "How does Aristotle's view of catharsis respond to Plato's critique of poetry in 'Republic X'?", "back": "It argues that poetry benefits the audience by engaging emotions in a controlled, artistically shaped way."}, {"front": "Rank the six elements of tragedy from most to least important.", "back": "Plot, Character, Thought, Diction, Song, Spectacle."}, {"front": "What element does Aristotle call the 'soul of a tragedy'?", "back": "Plot ($\\textit{mythos}$)"}, {"front": "Term: Character ($\\textit{ethos}$)", "back": "The moral qualities that define agents as specific types of people."}, {"front": "Term: Thought ($\\textit{dianoia}$)", "back": "The intellectual content expressed through the arguments and demonstrations of characters."}, {"front": "Term: Diction ($\\textit{lexis}$)", "back": "The metrical arrangement of words and the verbal expression of the drama."}, {"front": "Term: Song ($\\textit{melos}$)", "back": "The musical element involving the composition of the choral parts."}, {"front": "Term: Spectacle ($\\textit{opsis}$)", "back": "The visual staging, including costumes, masks, and theatrical machinery."}, {"front": "Why is plot considered the most essential element of tragedy?", "back": "Tragedy is an imitation of action, and plot is the arrangement of that action."}, {"front": "What is the relationship between character and plot in Aristotelian theory?", "back": "Characters exist to carry out the action; they are in service of the plot."}, {"front": "Why does Aristotle consider spectacle the element 'least connected with the art of poetry'?", "back": "The power of tragedy should be felt through reading the plot alone, without needing visual staging."}, {"front": "What is the 'key requirement' for a well-constructed plot?", "back": "Unity"}, {"front": "Unity of plot requires that every incident be _____ to what precedes and follows it.", "back": "causally connected"}, {"front": "How does unity of plot differ from the structure of a biography?", "back": "Unity focuses on a single whole action rather than a chronicle of everything that happened to one person."}, {"front": "Aristotle describes _____ plots, where episodes follow without necessary or probable connection, as 'the worst.'", "back": "episodic"}, {"front": "Why does Aristotle claim poetry is 'more philosophical' than history?", "back": "Poetry expresses universals while history records particulars."}, {"front": "Concept: Universal", "back": "A statement regarding what a certain kind of person will probably or necessarily say or do."}, {"front": "Concept: Particular", "back": "A record of what a specific individual, like Alcibiades, actually did or experienced."}, {"front": "Why is it not necessary for a playwright to adhere strictly to traditional myths?", "back": "The goal of poetry is the universality of the action, not the historical antiquity of the story."}, {"front": "Definition: Peripeteia", "back": "A reversal of fortune where the action turns to its opposite in accordance with probability."}, {"front": "Definition: Anagnorisis", "back": "A change from ignorance to knowledge regarding a crucial identity or relationship."}, {"front": "The best recognitions involve a change toward _____ between persons destined for good or bad fortune.", "back": "friendship or enmity"}, {"front": "What defines a 'complex' plot in Aristotle's framework?", "back": "A plot in which reversal and recognition occur simultaneously."}, {"front": "Which play does Aristotle regard as the paradigm of great tragedy due to its complex plot?", "back": "$\\textit{Oedipus Rex}$"}, {"front": "Why is a 'perfectly good man' passing from happiness to misery an unsuitable protagonist?", "back": "It produces outrage and disgust rather than the characteristic pity and fear."}, {"front": "Why is the fall of a 'thoroughly wicked man' disqualified from tragedy?", "back": "It satisfies our sense of justice but fails to produce pity or fear."}, {"front": "The ideal tragic protagonist is a person who falls due to some _____ rather than vice or depravity.", "back": "$\\textit{hamartia}$ (error or frailty)"}, {"front": "What is the literal meaning of the Greek word $\\textit{hamartia}$?", "back": "A missing of the mark."}, {"front": "In what way is $\\textit{hamartia}$ broader than the modern concept of a 'tragic flaw'?", "back": "It includes intellectual errors, mistakes in judgment, and well-intentioned choices with catastrophic consequences."}, {"front": "Why do we feel 'pity' for a tragic hero?", "back": "Because the hero's suffering is disproportionate to their moral fault."}, {"front": "Why do we feel 'fear' during a tragedy?", "back": "Because the hero is morally imperfect and human enough for us to imagine ourselves in their situation."}, {"front": "Character Requirement: Goodness", "back": "Characters must fully embody whatever excellence is appropriate to their social type or role."}, {"front": "Character Requirement: Appropriateness", "back": "Characters must behave in ways that are fitting to their social position and situation."}, {"front": "Character Requirement: Likeness to reality", "back": "Characters must be recognizable as human beings with psychological and moral plausibility."}, {"front": "Character Requirement: Consistency", "back": "Characters must behave in a stable and predictable way throughout the play."}, {"front": "If a character is intended to be inconsistent, Aristotle requires that they be _____.", "back": "consistently inconsistent"}, {"front": "Aristotle's critique of the heroine in 'Iphigenia at Aulis' centers on a failure of which requirement?", "back": "Consistency"}, {"front": "According to Aristotle's framework, does Oedipus deserve his fate?", "back": "No, he did not choose his actions with full knowledge, but his catastrophe arose from his own character errors."}, {"front": "In Aristotle's view, tragedy demonstrates how greatness and _____ can arise from the same source.", "back": "catastrophe"}, {"front": "In a well-constructed plot, the beginning, middle, and end must follow one another by _____.", "back": "necessity or probability"}, {"front": "What aspect of characters allows us to feel 'fear' according to Aristotle?", "back": "Their likeness to us."}, {"front": "How should a true 'reversal' (peripeteia) feel to an audience in retrospect?", "back": "Inevitable."}, {"front": "In 'Oedipus Rex', the moment Oedipus learns his true identity acts as both _____ and _____.", "back": "recognition; reversal"}, {"front": "Aristotle's 'Thought' element focuses on characters making _____, demonstrations, or arguments.", "back": "maxims"}, {"front": "What distinguishes the meter of choral odes from the dialogue between actors?", "back": "Choral odes use song and dance while dialogue uses spoken verse like iambic trimeter."}, {"front": "Which element of tragedy involves costumes and theatrical machinery?", "back": "Spectacle ($\\textit{opsis}$)"}, {"front": "What is the main difference between tragedy and comedy regarding the type of action portrayed?", "back": "Tragedy imitates a serious action ($\\textit{spoudaios}$), whereas comedy does not."}, {"front": "Unity of plot is achieved when the removal of any part would _____.", "back": "disjoint or affect the whole"}, {"front": "How does Aristotle characterize the role of a poet in relation to historical figures?", "back": "The poet aims to capture what a kind of person must necessarily do, even if writing about a real person."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
