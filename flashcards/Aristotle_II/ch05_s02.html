<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Aristotle's analysis of rhetoric spread throughout Western civilization?", "back": "It entered through a chain of thinkers who adapted, refined, and applied it to new contexts like Roman courts, Christian preaching, medieval universities, and modern mass communication."}, {"front": "What was the primary focus and goal of Aristotle's *Rhetoric*?", "back": "It was an analysis asking 'what are the available means of persuasion, and how do they work?' The orator's goal was to bring the audience to a correct judgment by the most effective legitimate means."}, {"front": "Who was Longinus, and what is his most famous work?", "back": "Longinus is the traditional name for the anonymous author of *On the Sublime*, a Greek treatise probably written in the first century AD."}, {"front": "What unique question did Longinus pose about speech and writing that differed from Aristotle?", "back": "He asked what happens when a speaker or writer surpasses mere persuasion, when the audience is not just convinced but overwhelmed, struck with awe, and transported."}, {"front": "Define 'the sublime' (*hypsos*) according to Longinus.", "back": "The sublime (*hypsos*) is the quality of genuine greatness in writing that produces transport or ecstasy in the reader—a going-beyond ordinary experience."}, {"front": "How does the effect of the sublime differ from ordinary persuasion?", "back": "Ordinary rhetoric convinces the reason, moving us to agree or act. The sublime 'takes the hearer out of himself,' seizing the rational faculty itself and producing an experience closer to compulsion than conviction."}, {"front": "What image does Longinus use to describe the impact of a sublime passage?", "back": "He compares it to a 'lightning-flash' that 'illumines an entire subject... and exhibits the whole power of the orator in a moment of time.'"}, {"front": "How might Aristotle have viewed the sublime, given his emphasis on legitimate persuasion?", "back": "Aristotle might have resisted the conclusion that the sublime bypasses reason, insisting that legitimate persuasion (ethos, pathos, logos) works *through* the hearer's rational nature, not around it."}, {"front": "In what sense can Longinus's sublime be seen as the 'upper limit' of Aristotle's analysis?", "back": "It is when ethos becomes overwhelming, pathos shattering, and logos luminously clear, transforming persuasion into something resembling revelation."}, {"front": "What ethical question does the concept of the sublime raise for students of rhetoric?", "back": "Whether it is a legitimate rhetorical goal or if it risks overstepping the boundary between honest argument and psychological domination."}, {"front": "How did Augustine of Hippo apply the concept of the sublime to Christian preaching?", "back": "He argued that the preacher aims not merely to persuade the intellect but to move the will, and that the sublime power of Scripture is itself a form of divine pathos moving hearers toward God."}, {"front": "Which two Roman figures were most influential in disseminating rhetorical theory after Aristotle, shaping Western education for over a thousand years?", "back": "Cicero and Quintilian."}, {"front": "Describe Cicero's ideal orator, as presented in *De Oratore*.", "back": "The ideal orator is a philosopher-statesman who combines philosophical wisdom with the power of eloquence to guide the commonwealth toward the good."}, {"front": "What are Cicero's three 'offices of the orator' (*docere, delectare, movere*), and what do they broadly correspond to in Aristotle's framework?", "back": "To teach (*docere*, corresponds to logos), to delight (*delectare*, corresponds to ethos), and to move (*movere*, corresponds to pathos)."}, {"front": "What is Quintilian's famous definition of the ideal orator?", "back": "*Vir bonus dicendi peritus*, which translates to 'a good man skilled in speaking.'"}, {"front": "Why did Quintilian insist that true rhetorical excellence requires genuine virtue?", "back": "He believed that greatness in rhetoric requires the kind of authentic trustworthiness (ethos) that cannot be faked indefinitely, linking rhetorical ability to genuine moral character."}, {"front": "List the five canons of rhetoric.", "back": "1. *Inventio* (invention), 2. *Dispositio* (arrangement), 3. *Elocutio* (style), 4. *Memoria* (memory), 5. *Pronuntiatio* (delivery)."}, {"front": "Which of the five canons of rhetoric did Aristotle's *Rhetoric* primarily lay the theoretical foundations for?", "back": "The first three: *Inventio*, *Dispositio*, and *Elocutio*. The last two (*Memoria* and *Pronuntiatio*) were largely added by the later Roman tradition."}, {"front": "How did Augustine of Hippo resolve the tension regarding Christian preachers using 'pagan' rhetoric?", "back": "In *De Doctrina Christiana*, he argued that rhetorical techniques are morally neutral tools, and a preacher with truth on his side should learn to speak that truth effectively in service of the Gospel."}, {"front": "How did Augustine apply Cicero's three offices of the orator to Christian preaching?", "back": "To teach sound doctrine, to delight the audience with eloquence (to keep them attentive), and to move their will (so that what is known in the mind becomes what is chosen in life)."}, {"front": "What was the medieval trivium, and what three foundational arts did it include?", "back": "The trivium ('three roads') was a foundational part of the medieval liberal arts curriculum, including grammar (correct use of language), logic (correct reasoning), and rhetoric (effective communication)."}, {"front": "What were the Aristotelian roots for each of the three arts in the medieval trivium?", "back": "Grammar from Aristotle's *De Interpretatione*; logic from the *Organon*; and rhetoric from the *Rhetoric*."}, {"front": "Provide a modern example of *ethos* in rhetoric.", "back": "A politician who builds a reputation for trustworthiness over years of consistent behavior is investing in ethos."}, {"front": "Provide a modern example of *pathos* in rhetoric.", "back": "A charity that shows photographs of suffering children to evoke emotion is appealing to pathos."}, {"front": "Provide a modern example of *logos* in rhetoric.", "back": "A lawyer who builds a case from documented evidence and logical reasoning is appealing to logos."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
