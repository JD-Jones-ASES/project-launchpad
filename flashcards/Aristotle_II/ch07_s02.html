<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Greek title of the work attributed to Longinus?", "back": "Peri Hypsous"}, {"front": "To which student is Longinus's 'On the Sublime' addressed?", "back": "Terentianus"}, {"front": "What grander question does Longinus ask regarding the arrangement of words compared to Aristotle?", "back": "How can the arrangement of words transport a reader beyond the ordinary?"}, {"front": "What is the meaning of the Greek term hypsos in the context of Longinus?", "back": "The overwhelming experience of the sublime."}, {"front": "What is identified by Longinus as the fifth and final source of the sublime?", "back": "Composition (the arrangement of words and harmonious structure)."}, {"front": "According to Longinus, what is the natural power of harmony in a passage?", "back": "To win, delight, and exalt the soul."}, {"front": "How does Longinus's view of prose rhythm differ from Aristotle's ear-pleasing focus?", "back": "He argues it produces a physiological effect of overwhelming the reader."}, {"front": "What literary equivalent does Longinus use to describe the power of well-arranged words?", "back": "Music at its most powerful."}, {"front": "Define the term ekstasis as used by Longinus.", "back": "A state of being so overwhelmed by writing that one is carried out of ordinary consciousness."}, {"front": "In the example from Demosthenes, which phrase's placement concentrates the energy of the whole sentence?", "back": "\"Like a cloud\" (ddotωσπερ νεφ oς)."}, {"front": "According to Longinus, what happens to the grandeur of a passage if its rhythmic movement is abbreviated?", "back": "The grandeur is at once crippled."}, {"front": "Longinus compares the elements of a fine passage to the members of a _____.", "back": "Body (or organism)"}, {"front": "According to Longinus, how can writers with low natural powers still attain dignity and elevation?", "back": "Through the mere harmony of their composition."}, {"front": "The poetical quality of Euripides is said to depend more on his _____ than on his thoughts.", "back": "Arrangement"}, {"front": "In the work of Longinus, the success that consists in the avoidance of error is the gift of _____.", "back": "Art"}, {"front": "According to Longinus, high though unequal excellence is the attribute of _____.", "back": "Genius"}, {"front": "What famous literary figure does Longinus use as an example of a sublime but error-laden master?", "back": "Homer"}, {"front": "What does the 'Doryphorus of Polycletus' represent in Longinus's analogy?", "back": "Technical perfection and exactness in art."}, {"front": "Unlike the exactness looked for in statuary, what does Longinus claim literature requires?", "back": "Something which transcends humanity."}, {"front": "How was Aristotle's two-part theory of rhetoric later reorganized by Western rhetoricians?", "back": "Into the five canons of rhetoric."}, {"front": "Which of the five canons refers to the finding and construction of arguments?", "back": "Inventio (Invention)"}, {"front": "Which of the five canons deals with the organization of the parts of a speech?", "back": "Dispositio (Arrangement)"}, {"front": "Which of the five canons covers the language and expression used in a speech?", "back": "Elocutio (Style)"}, {"front": "Which of the five canons involves the memorization of a speech for delivery?", "back": "Memoria (Memory)"}, {"front": "Which of the five canons refers to the management of voice, gesture, and expression?", "back": "Pronuntiatio (Delivery)"}, {"front": "What is the Latin equivalent of the Greek term heuresis?", "back": "Inventio"}, {"front": "What is the Latin equivalent of the Greek term lexis?", "back": "Elocutio"}, {"front": "What was the earliest complete Latin rhetoric manual to systematically organize the five canons?", "back": "Rhetorica ad Herennium"}, {"front": "Who was the greatest Roman orator who developed the five canons across several works?", "back": "Marcus Tullius Cicero"}, {"front": "What Latin formula summarizes Cicero's ideal of the orator as a moral and intellectual leader?", "back": "vir bonus dicendi peritus (a good man skilled in speaking)"}, {"front": "Which 12-book treatise by Quintilian covers rhetorical education from infancy to advanced training?", "back": "Institutio Oratoria"}, {"front": "Which canon did Quintilian develop most extensively in Books VIII–IX of his work?", "back": "Elocutio (Style)"}, {"front": "What are the three arts of language that comprise the medieval Trivium?", "back": "Grammar, logic, and rhetoric."}, {"front": "Which component of the Trivium corresponds to the study of language in Aristotle's lexis?", "back": "Grammar"}, {"front": "What were the four subjects of the medieval Quadrivium?", "back": "Arithmetic, geometry, music, and astronomy."}, {"front": "Who wrote 'De Doctrina Christiana' to defend the use of rhetoric in Christian preaching?", "back": "Augustine of Hippo"}, {"front": "According to Cicero and Augustine, what is the purpose of the orator known as docere?", "back": "To teach."}, {"front": "According to Cicero and Augustine, what is the purpose of the orator known as delectare?", "back": "To delight."}, {"front": "According to Cicero and Augustine, what is the purpose of the orator known as movere?", "back": "To move (the audience to action)."}, {"front": "Which of Aristotle's modes of persuasion corresponds to Cicero's goal of docere (teaching)?", "back": "Logos"}, {"front": "Which of Aristotle's modes of persuasion corresponds to Cicero's goal of movere (moving)?", "back": "Pathos"}, {"front": "What mnemonic system did the Romans develop for the canon of Memoria?", "back": "Memory palaces"}, {"front": "What were Cicero's 14 speeches attacking Mark Antony called?", "back": "The Philippics"}, {"front": "How many sources of the sublime does Longinus identify in his analysis?", "back": "Five"}, {"front": "List the first four sources of the sublime identified by Longinus.", "back": "Greatness of thought, vehement passion, figures of speech, and noble diction."}, {"front": "According to Longinus, why is the dactylic measure significant in the speech of Demosthenes?", "back": "It is the noblest measure and the chief constituent of the heroic metre."}, {"front": "In the analogy of the Colossus, what quality does Longinus associate with 'works of nature'?", "back": "Magnificence"}, {"front": "Which canon of rhetoric was largely absent from Aristotle's original theory?", "back": "Memoria (Memory)"}, {"front": "Which humanist recovered Quintilian's 'Institutio Oratoria' in 1416?", "back": "Poggio Bracciolini"}, {"front": "In the Trivium, which art corresponds to Aristotle's 'Organon'?", "back": "Logic"}, {"front": "Who was the author of the 'Philippics' that inspired the title of Cicero's speeches against Antony?", "back": "Demosthenes"}, {"front": "According to Quintilian, why must a skilled orator necessarily be a virtuous person?", "back": "Because dishonest or vicious speaking will eventually fail."}, {"front": "What is the primary concern of Longinus regarding the hearer, compared to Aristotle's concern with persuasion?", "back": "What happens to the hearer at the highest levels of literary achievement (ecstasy)."}, {"front": "What specific part of Aristotle's 'Rhetoric' corresponds to the canon of Dispositio?", "back": "Book III, chapters 13–19."}, {"front": "Which work by Cicero focuses specifically on the first canon, Inventio?", "back": "De Inventione"}, {"front": "According to Longinus, what is the effect of lengthening a phrase into an 'abrupt grandeur'?", "back": "It dissipates and relaxes the passage's impact by lingering over final syllables."}, {"front": "What are the 'septem artes liberales'?", "back": "The seven liberal arts (the Trivium and the Quadrivium)."}, {"front": "In the example of Dirce being dragged by a bull, what gives the passage 'vigour'?", "back": "The language is disposed to delay the time, advancing slowly to a pitch of sublimity."}, {"front": "What is the Latin term for the Greek rhetorical concept of delivery (hypokrisis)?", "back": "Pronuntiatio"}, {"front": "To Longinus, what attribute 'lifts [a writer] near to the great spirit of the Deity'?", "back": "The Sublime"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
