<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Aristotle describes Rhetoric as the \"counterpart\" of which art of reasoning?", "back": "Dialectic"}, {"front": "According to Aristotle, what distinguishes Rhetoric from \"special sciences\" like medicine or geometry?", "back": "Rhetoric is a universal faculty of reasoning on any subject rather than having a definite subject matter."}, {"front": "What term does Aristotle use to describe a \"rhetorical syllogism\" or argument from probable premises?", "back": "Enthymeme"}, {"front": "Why does Aristotle criticize contemporary writers for focusing on the arousing of prejudice, pity, and anger?", "back": "These emotions are non-essential accessories that deal with the judge's frame of mind rather than the facts of the case."}, {"front": "According to Aristotle, what is the only \"true constituent\" or substance of the art of rhetoric?", "back": "The modes of persuasion."}, {"front": "Why should well-drawn laws define as many points as possible rather than leaving them to a judge's discretion?", "back": "It prevents decisions from being obscured by the judge's personal feelings of friendship, hatred, or self-interest."}, {"front": "What is the primary difference between the \"political\" orator and the \"forensic\" orator regarding their audience?", "back": "The political orator's audience decides on their own vital interests, while the forensic judge decides on other people's affairs."}, {"front": "What is Aristotle's formal definition of Rhetoric?", "back": "The faculty of observing in any given case the available means of persuasion."}, {"front": "What are \"non-technical\" (inartistic) means of persuasion?", "back": "Means of persuasion that are not created by the speaker but exist at the outset, such as witnesses or contracts."}, {"front": "What are \"technical\" (artistic) means of persuasion?", "back": "Means of persuasion that the speaker constructs themselves using the principles of rhetoric."}, {"front": "Which mode of persuasion depends on the personal character of the speaker to make them appear credible?", "back": "Ethos"}, {"front": "According to Aristotle, how should Ethos (persuasion by character) be achieved?", "back": "It should be achieved through what the speaker says during the speech, not by their prior reputation."}, {"front": "Which mode of persuasion relies on putting the audience into a certain frame of mind by stirring their emotions?", "back": "Pathos"}, {"front": "Which mode of persuasion is effected through the proof or apparent proof provided by the words of the speech itself?", "back": "Logos"}, {"front": "Aristotle argues that rhetoric is an offshoot of Dialectic and which other field of study?", "back": "Ethical (or political) studies."}, {"front": "What are the three elements involved in every act of speech-making?", "back": "The speaker, the subject, and the person addressed (the hearer)."}, {"front": "Who is the most important element of a speech, as they determine the speech's end and object?", "back": "The hearer (the audience)."}, {"front": "What are the three divisions of oratory based on the role of the listener?", "back": "Political (deliberative), Forensic (legal), and Ceremonial (epideictic)."}, {"front": "What is the primary time-frame of concern for the Political (deliberative) orator?", "back": "The future."}, {"front": "What is the primary time-frame of concern for the Forensic (legal) orator?", "back": "The past."}, {"front": "What is the primary time-frame of concern for the Ceremonial (epideictic) orator?", "back": "The present."}, {"front": "What is the main \"end\" or objective of Political oratory?", "back": "To establish the expediency or harmfulness of a proposed course of action."}, {"front": "What is the main \"end\" or objective of Forensic oratory?", "back": "To establish the justice or injustice of an action."}, {"front": "What is the main \"end\" or objective of Ceremonial (epideictic) oratory?", "back": "To prove a person worthy of honor (praise) or the reverse (blame)."}, {"front": "Under what condition is an action considered \"practicable\" in a rhetorical sense?", "back": "If it is both possible to do and easy to do."}, {"front": "What are the five main subjects of deliberation in political oratory?", "back": "Ways and means, war and peace, national defense, imports and exports, and legislation."}, {"front": "According to Aristotle, why is legislation the most important subject for a political speaker to understand?", "back": "Because the whole welfare of a country depends upon its laws."}, {"front": "What is the ultimate \"end\" that Aristotle claims all men aim for in their choices?", "back": "Happiness and its constituents."}, {"front": "How does Aristotle define \"happiness\" for the purpose of rhetorical argument?", "back": "Prosperity combined with virtue, or independence of life."}, {"front": "Which constituents of happiness does Aristotle classify as \"internal\" goods?", "back": "Goods of the soul and goods of the body."}, {"front": "Which constituents of happiness does Aristotle classify as \"external\" goods?", "back": "Good birth, friends, money, and honor."}, {"front": "In the context of wealth, how does Aristotle define \"productive\" property?", "back": "Property from which one derives an income."}, {"front": "In the context of wealth, how does Aristotle define \"enjoyable\" (gentlemanly) property?", "back": "Property from which one gets nothing worth mentioning except its use."}, {"front": "How is \"Honour\" defined in Aristotle's rhetorical framework?", "back": "The token of a man's being famous for doing good."}, {"front": "What is the primary aim of deliberation according to Aristotle?", "back": "To determine the means to ends rather than the ends themselves."}, {"front": "How does Aristotle define a \"good thing\" in a general sense?", "back": "That which ought to be chosen for its own sake, or that for which we choose something else."}, {"front": "In comparing goods, why is a thing that is an \"end\" considered a greater good than one that is not?", "back": "Because it is chosen for its own sake rather than for the sake of something else."}, {"front": "Why might \"what is rare\" be argued as a greater good than \"what is plentiful\"?", "back": "Because it is harder to acquire and thus better worth getting."}, {"front": "Why might \"what is plentiful\" be argued as a greater good than \"what is rare\"?", "back": "Because its utility is greater due to being more often useful."}, {"front": "What is the \"Noble\" as defined by Aristotle?", "back": "That which is desirable for its own sake and worthy of praise, or that which is good and pleasant because it is good."}, {"front": "Which virtue is defined as the faculty through which everyone enjoys their own possessions according to law?", "back": "Justice"}, {"front": "Which virtue disposes men to do noble deeds in situations of danger?", "back": "Courage"}, {"front": "What is the virtue of \"Magnanimity\"?", "back": "The virtue that disposes one to do good to others on a large scale."}, {"front": "According to Aristotle, why are the most useful virtues to others honored the most?", "back": "Because virtue is seen as a faculty of beneficence."}, {"front": "In epideictic rhetoric, what quality makes an action noble if its benefit is enjoyed after death?", "back": "It is less likely to have been done for the speaker's own selfish sake."}, {"front": "What rhetorical tactic does Aristotle suggest for praising or blaming a man whose qualities are \"borderline\"?", "back": "Identify his actual quality with the closely allied virtue, such as calling a cautious man \"cold-blooded\" or a passionate man \"outspoken.\""}, {"front": "In a speech of praise, what is the significance of the audience's specific values?", "back": "The orator must represent the hero as possessing the specific qualities that the particular audience esteems."}, {"front": "What is the difference between \"praise\" and \"encomium\"?", "back": "Praise expresses the eminence of a man's qualities, while encomium refers specifically to his actual deeds."}, {"front": "What is the defining \"end\" or goal of a Democracy?", "back": "Freedom"}, {"front": "What is the defining \"end\" or goal of an Oligarchy?", "back": "Wealth"}, {"front": "What is the defining \"end\" or goal of an Aristocracy?", "back": "The maintenance of education and national institutions."}, {"front": "What is the defining \"end\" or goal of a Tyranny?", "back": "The protection of the tyrant."}, {"front": "What are the five specific \"non-technical\" means of persuasion mentioned in forensic oratory?", "back": "Laws, witnesses, contracts, tortures, and oaths."}, {"front": "Why does Aristotle state that \"ethical argument\" (Ethos) is vital in political rhetoric?", "back": "It helps convince the audience if they believe the speaker possesses goodness or goodwill toward them."}, {"front": "According to the text, how does a democracy eventually lose its vigor or transition into an oligarchy?", "back": "By pushing its democratic principles either not far enough or a great deal too far."}, {"front": "What is the \"most effective means of persuasion\" that a speaker possesses, according to Aristotle?", "back": "Their character (Ethos)."}, {"front": "What constitutes the \"body of persuasion\" in the orator's demonstration?", "back": "The enthymeme."}, {"front": "How is \"strength\" defined in the context of bodily excellence?", "back": "The power of moving someone else at will through pulling, pushing, lifting, pinning, or gripping."}, {"front": "What is the difference between Kingship and Tyranny as forms of monarchy?", "back": "Kingship is limited by prescribed conditions, whereas tyranny is not limited by anything."}, {"front": "Which virtue of the understanding enables men to come to wise decisions regarding happiness and goods?", "back": "Prudence"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
