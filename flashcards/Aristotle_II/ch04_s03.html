<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Aristotle's definition of 'lexis' in the Poetics?", "back": "Lexis is diction or style—the linguistic expression of thought in both poetry and rhetoric."}, {"front": "How does Aristotle rank 'lexis' among the elements of tragedy?", "back": "Lexis is the fourth element, after plot, character, and thought."}, {"front": "What does 'metaphora' literally mean, and what is Aristotle's definition of it?", "back": "Metaphora literally means 'carrying over.' Aristotle defines it as the transfer of a name from the thing it ordinarily designates to something else."}, {"front": "According to Aristotle, what is a unique characteristic of metaphor compared to other poetic devices like rare words or coined terms?", "back": "Metaphor cannot be taught. The ability to create good metaphors is a natural gift."}, {"front": "What does Aristotle call the ability to see resemblances between unlike things, and to capture that resemblance in a single word or phrase?", "back": "He calls it 'the mark of genius.'"}, {"front": "Explain the 'genus to species' type of metaphor, with an example.", "back": "Applying an alien name from a general category (genus) to a more specific instance (species). Example: 'There lies my ship' (lying at anchor is a species of lying)."}, {"front": "Explain the 'species to genus' type of metaphor, with an example.", "back": "Applying an alien name from a specific instance (species) to a more general category (genus). Example: 'Verily ten thousand noble deeds hath Odysseus wrought' (ten thousand is a species of large number, used for a large number generally)."}, {"front": "Explain the 'species to species' type of metaphor, with an example.", "back": "Applying an alien name from one species to another species, both belonging to the same genus. Example: 'With blade of bronze drew away the life' (to draw away is a species of taking away, used for to cleave, which is also a species of taking away)."}, {"front": "Explain the 'analogy or proportion' type of metaphor.", "back": "This type of metaphor is used when the second term is to the first as the fourth is to the third. One term can be used for another (e.g., calling a cup 'the shield of Dionysus' if shield is to Ares as cup is to Dionysus)."}, {"front": "How can analogy be used when a specific term for one of the proportional elements does not exist?", "back": "The metaphor can still be used. For example, 'sowing the god-created light' for the sun scattering rays, as 'sowing' is to 'seed' what the sun's action is to 'light'."}, {"front": "What is an 'altered word' in Aristotle's analysis of poetic diction?", "back": "An altered word is one in which part of the ordinary form is left unchanged, and part is re-cast."}, {"front": "What is a 'newly-coined word' according to Aristotle?", "back": "A newly-coined word is one which has never been in local use but is adopted by the poet himself."}, {"front": "How is a word 'lengthened' in poetic diction?", "back": "A word is lengthened when its own vowel is exchanged for a longer one, or when a syllable is inserted."}, {"front": "How is a word 'contracted' in poetic diction?", "back": "A word is contracted when some part of it is removed."}, {"front": "What is Aristotle's ideal for the 'perfection of style'?", "back": "The perfection of style is 'to be clear without being mean' (low or undistinguished)."}, {"front": "According to Aristotle, what kind of style is 'mean' or 'undistinguished'?", "back": "The clearest style, which uses only current or proper words, is at the same time mean. It achieves clarity but nothing more, like a weather report."}, {"front": "What makes diction 'lofty and raised above the commonplace'?", "back": "Diction that employs unusual words, such as strange (or rare) words, metaphorical words, or lengthened words—anything that differs from the normal idiom."}, {"front": "What stylistic pitfall arises if a style is 'wholly composed' of metaphors?", "back": "It becomes a riddle, because a riddle expresses true facts under impossible combinations, which can be done through metaphor."}, {"front": "What stylistic pitfall arises if a style is 'wholly composed' of strange (or rare) words?", "back": "It becomes a jargon, which is impressive perhaps, but impenetrable."}, {"front": "Why does Aristotle argue that an 'infusion' of unusual elements (strange words, metaphors, etc.) is necessary for poetic style?", "back": "These elements raise the style above the commonplace and mean, while the use of proper words ensures perspicuity."}, {"front": "What contributes most to producing a clearness of diction that is 'remote from commonness'?", "back": "The lengthening, contraction, and alteration of words. This deviation gains distinction while partial conformity ensures perspicuity."}, {"front": "How does Aristotle respond to critics who censure poetic licenses like lengthening words?", "back": "He argues that critics like Eucleides are in error. While obtrusive use is grotesque, moderation and propriety in any mode of poetic diction are necessary for distinction and perspicuity."}, {"front": "Give an example of how a single word choice can elevate poetic style, according to Aristotle.", "back": "Euripides substituted a 'rarer term' ('feasts on') for an 'ordinary one' ('feeds on') in an iambic line common to both him and Aeschylus, making his verse appear beautiful where Aeschylus's was trivial."}, {"front": "Why did Aristotle disagree with critics like Ariphrades who ridiculed tragedians for using phrases not found in ordinary speech?", "back": "Aristotle argued that it is precisely because such phrases are not part of the current idiom that they give distinction to the style, a point Ariphrades failed to see."}, {"front": "What does Aristotle consider 'the greatest thing by far' in mastering modes of expression, and why?", "back": "A command of metaphor. This alone cannot be imparted by another; it is the mark of genius, for to make good metaphors implies an eye for resemblances."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
