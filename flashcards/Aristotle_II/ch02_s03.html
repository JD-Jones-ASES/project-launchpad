<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Aristotle establish his school, the Lyceum?", "back": "Around 335 bc."}, {"front": "What nickname was given to Aristotle's students because they discussed philosophy while walking?", "back": "Peripatetics."}, {"front": "Why did Plato view poetry with suspicion?", "back": "He saw it as a dangerous imitation of appearances that was twice removed from reality."}, {"front": "According to Aristotle's Poetics, what is the single fundamental characteristic shared by all arts called poetry?", "back": "They are all modes of imitation (mimesis)."}, {"front": "Concept: Mimesis", "back": "Definition: The creative representation of human action rather than mere copying."}, {"front": "What are the three dimensions in which the arts differ from one another according to Aristotle?", "back": "The medium, the objects, and the manner of imitation."}, {"front": "Which three elements are combined or used singly to produce imitation in the arts?", "back": "Rhythm, language, and harmony."}, {"front": "Which mediums of imitation are employed in the music of the flute and the lyre?", "back": "Harmony and rhythm."}, {"front": "What medium does dancing use to imitate character, emotion, and action?", "back": "Rhythm."}, {"front": "How does Aristotle distinguish a poet from a writer of a medical or scientific treatise in verse?", "back": "A poet is defined by imitation rather than the use of metre."}, {"front": "Why does Aristotle classify Homer as a poet and Empedocles as a physicist?", "back": "Homer produces poetic imitation, while Empedocles only shares the same metre without the imitation."}, {"front": "Which specific arts employ the combination of rhythm, tune, and metre?", "back": "Dithyrambic and Nomic poetry, Tragedy, and Comedy."}, {"front": "According to Aristotle, what are the primary 'objects' of artistic imitation?", "back": "Men in action."}, {"front": "What are the three ways poets can represent the moral character of men relative to real life?", "back": "As better than they are, worse than they are, or as they are."}, {"front": "Which painter depicted men as 'nobler than they are'?", "back": "Polygnotus."}, {"front": "How did the painter Pauson represent his subjects compared to real life?", "back": "He depicted them as less noble (worse)."}, {"front": "In Aristotle's classification, how does Comedy differ from Tragedy regarding its objects of imitation?", "back": "Comedy represents men as worse than in actual life, while Tragedy represents them as better."}, {"front": "Which poet is cited by Aristotle as representing men as better than they are?", "back": "Homer."}, {"front": "How did Hegemon the Thasian, the inventor of parodies, represent men?", "back": "Worse than they are."}, {"front": "What distinction identifies the 'manner' of imitation in poetry?", "back": "The difference between narrative poetry and dramatic poetry."}, {"front": "In the 'narrative' manner of imitation, whose voice tells the story?", "back": "The poet's own voice."}, {"front": "How is the 'dramatic' manner of imitation defined?", "back": "The poet makes characters speak and act directly."}, {"front": "Aristotle roots the origin of poetry in the instinct for rhythm and the instinct for _____.", "back": "Imitation."}, {"front": "Why do humans take pleasure in seeing realistic representations of painful things like dead bodies?", "back": "Humans enjoy the act of learning and recognizing what a representation corresponds to in reality."}, {"front": "According to Aristotle, what is the 'liveliest pleasure' shared by both philosophers and men in general?", "back": "The act of learning."}, {"front": "What original form of poetry was produced by 'the more trivial sort' of writers?", "back": "Satires (lampoons)."}, {"front": "What original form of poetry was produced by 'graver spirits' who imitated noble actions?", "back": "Hymns to the gods and praises of famous men."}, {"front": "Into which two broad traditions did early poetry diverge?", "back": "The noble tradition (heroic verse) and the ignoble tradition (lampooning verse)."}, {"front": "Which metre is historically associated with the 'lampooning' measure?", "back": "The iambic measure."}, {"front": "Why is Homer considered the pre-eminent poet in the serious style?", "back": "He combined dramatic form with excellence of imitation."}, {"front": "Which work by Homer is said to have laid down the main lines of Comedy?", "back": "Margites."}, {"front": "How did Homer shift the focus of comedy in his work Margites?", "back": "He dramatized the ludicrous instead of writing personal satire."}, {"front": "Which higher form of art succeeded epic poetry?", "back": "Tragedy."}, {"front": "Which higher form of art succeeded the tradition of lampooning?", "back": "Comedy."}, {"front": "How does Aristotle define the 'Ludicrous' in Comedy?", "back": "A subdivision of the ugly consisting of a defect or ugliness that is not painful or destructive."}, {"front": "Why is the early history of Comedy less known than that of Tragedy?", "back": "It was not at first treated seriously by the state."}, {"front": "What is the significance of the 'Archon' in the history of Greek comedy?", "back": "The Archon eventually granted a comic chorus to a poet, marking its official recognition."}, {"front": "Which Athenian writer was the first to move away from personal lampoons to generalized themes and plots?", "back": "Crates."}, {"front": "In what way do Epic poetry and Tragedy agree?", "back": "Both are imitations in verse of characters of a higher type."}, {"front": "What is a major difference between Epic poetry and Tragedy regarding their form?", "back": "Epic poetry is narrative, while Tragedy is dramatic."}, {"front": "How do Epic poetry and Tragedy differ in their use of metre?", "back": "Epic poetry admits only one kind of metre."}, {"front": "What is the typical time limit for the action of a Tragedy according to Aristotle?", "back": "A single revolution of the sun (or slightly exceeding it)."}, {"front": "How does the time limit of Epic action compare to that of Tragedy?", "back": "Epic action has no limits of time."}, {"front": "According to Aristotle, what is the relationship between the constituent parts of Epic and Tragedy?", "back": "All elements of an Epic are found in Tragedy, but not all elements of Tragedy are found in an Epic."}, {"front": "Term: Dithyramb", "back": "Definition: A choral hymn sung in honor of Dionysus, possibly a precursor to tragedy."}, {"front": "Term: Lyceum", "back": "Definition: The school founded by Aristotle in Athens near the sanctuary of Apollo Lykeios."}, {"front": "According to Aristotle, what is the 'manner' of imitation that distinguishes Drama from Narrative?", "back": "Whether the characters are presented as speaking and acting for themselves."}, {"front": "Why does Aristotle claim that we are the 'most imitative' of living creatures?", "back": "Because humans learn their earliest lessons through imitation from childhood."}, {"front": "What does the phrase 'Ah, that is he' represent in Aristotle's theory of imitation?", "back": "The pleasure of recognition and understanding when seeing a likeness."}, {"front": "Which specific work by Homer serves as the model for Tragedy?", "back": "The Iliad (or the Odyssey)."}, {"front": "Where did the comedic plot originally come from before it reached Athens?", "back": "Sicily."}, {"front": "In Aristotle's view, does the pleasure of a painting come from the imitation itself if the viewer has never seen the original?", "back": "No, the pleasure would then be due to execution, colouring, or another cause."}, {"front": "What does Aristotle say determines the 'moral tone' of an artistic tradition?", "back": "The objects of imitation (whether men are depicted as better, worse, or the same)."}, {"front": "Who was the author of the 'Deiliad', and how did he represent characters?", "back": "Nicochares; he represented them as worse than in real life."}, {"front": "How does Aristotle characterize the 'Capacity of Learning' in the general public compared to philosophers?", "back": "It is more limited, yet they still find the act of learning pleasurable."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
