    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Greek term for 'style' in Aristotle's rhetoric?", "back": "λ ε ξ ι ς (lexis)"}, {"front": "What is the Greek term for the 'arrangement' of a speech's parts?", "back": "τ α ξ ι ς (taxis)"}, {"front": "According to Aristotle, style must always be in service of _____.", "back": "Argument (or substance)."}, {"front": "Why does Aristotle consider style a 'practical necessity' despite preferring logic?", "back": "Due to the defects and character of the audience."}, {"front": "Which three factors constitute the management of the voice in delivery?", "back": "Volume, pitch, and rhythm."}, {"front": "According to Aristotle, the way something is said primarily affects its _____.", "back": "Intelligibility."}, {"front": "Which Athenian orator is cited as the first to give oratorical prose a 'poetical colour'?", "back": "Gorgias."}, {"front": "What are the two fundamental requirements for 'good' style?", "back": "Clarity and appropriateness."}, {"front": "How is clarity achieved in oratorical prose?", "back": "By using words that are current and ordinary."}, {"front": "What is the effect of using 'strange' or 'out of the way' language in prose?", "back": "It makes the language appear more stately and strikes the hearer."}, {"front": "According to the rule of 'naturalness', a writer must disguise their _____.", "back": "Art (or artificiality)."}, {"front": "Why is artificiality in speech detrimental to persuasion?", "back": "Hearers become prejudiced and think the speaker has a design against them."}, {"front": "Which actor is praised by Aristotle for having a voice that truly seemed to be that of the character?", "back": "Theodorus."}, {"front": "Which poet was the first to show how to hide art by using the speech of ordinary life?", "back": "Euripides."}, {"front": "In addition to regular terms, which type of terms are the only ones permitted in prose?", "back": "Metaphorical terms."}, {"front": "Why must prose-writers pay more careful attention to metaphor than poets do?", "back": "Their other linguistic resources are scantier."}, {"front": "Metaphor gives style three specific qualities: clearness, distinction, and _____.", "back": "Charm."}, {"front": "To pay a compliment through metaphor, from what should the metaphor be drawn?", "back": "Something better in the same class."}, {"front": "To disparage through metaphor, from what should the metaphor be drawn?", "back": "Something worse in the same class."}, {"front": "When using metaphors for 'nameless things', from where should they be drawn?", "back": "Kindred and similar things."}, {"front": "Aristotle notes that good _____ can often furnish good metaphors.", "back": "Riddles."}, {"front": "What was the sophist Bryson's fallacy regarding language?", "back": "That there is no such thing as 'foul language' because the meaning remains the same."}, {"front": "How do diminutives affect the perceived quality of a subject?", "back": "They make a bad thing less bad and a good thing less good."}, {"front": "Term: *To prepon*", "back": "Definition: Appropriateness; the match between style and its subject, speaker, and audience."}, {"front": "Why is 'appropriateness' considered an epistemic virtue in rhetoric?", "back": "Language fitting its context is more likely to produce correct judgment in the hearer."}, {"front": "How should an orator describe an 'impiety' to express emotion?", "back": "With the language of disgust and discreet reluctance."}, {"front": "How can a speaker counteract the appearance of exaggeration?", "back": "By putting in some criticism of themselves."}, {"front": "What is the primary rule for prose rhythm?", "back": "It should be rhythmical but not metrical."}, {"front": "Why does metrical prose destroy the hearer's trust?", "back": "It has an artificial appearance and diverts attention to the meter."}, {"front": "Which rhythm does Aristotle describe as 'the very language of ordinary people'?", "back": "The iambic rhythm."}, {"front": "The trochaic rhythm is rejected for prose because it is too akin to _____.", "back": "Wild dancing."}, {"front": "Which specific rhythm is recommended for prose because it does not arise from a definite metre?", "back": "The paean."}, {"front": "What is the numerical ratio of the paean rhythm?", "back": "$3:2$."}, {"front": "Which type of paean should be used at the beginning of a sentence?", "back": "The one that begins with a long syllable and ends with three short ones."}, {"front": "How should a sentence break off rhythmically to indicate finality?", "back": "With a long syllable."}, {"front": "What is the Greek term for 'vividness' or 'actuality' in style?", "back": "ε ν ε ρ γ ε ι α (energeia)"}, {"front": "According to Aristotle, how does a speaker 'make an audience see things'?", "back": "By using expressions that represent things as in a state of activity."}, {"front": "Which three points must an orator aim for to create 'taking' or lively sayings?", "back": "Antithesis, Metaphor, and Actuality."}, {"front": "Why are metaphors considered more 'taking' than similes?", "back": "They are shorter and state the identity of two things directly."}, {"front": "What is the 'proportional' type of metaphor?", "back": "A metaphor based on a four-term analogy where A is to B as C is to D."}, {"front": "Pericles compared the loss of young men in war to the _____.", "back": "Spring being taken out of the year."}, {"front": "How does Homer create *energeia* in his", "back": "By giving metaphorical life to lifeless things (e.g., a 'remorseless' boulder)."}, {"front": "In rhetoric, 'liveliness' is often achieved by metaphor and _____.", "back": "Surprising the hearer with an unexpected idea."}, {"front": "Why are hyperboles considered appropriate for young men but not elderly speakers?", "back": "They show vehemence of character, which suits youth and anger."}, {"front": "What are the two 'essential' parts of any speech?", "back": "Statement of the case and the Argument (Proof)."}, {"front": "List the four parts that a speech may typically have in practice.", "back": "Introduction, Statement, Argument, and Epilogue."}, {"front": "What is the most essential function of an introduction?", "back": "To show what the aim of the speech is."}, {"front": "To what does Aristotle compare the introduction of a 'speech of display'?", "back": "The prelude in flute-music."}, {"front": "Where should a defendant place arguments intended to remove prejudice?", "back": "In the introduction."}, {"front": "Where should a prosecutor place arguments intended to excite prejudice?", "back": "In the epilogue."}, {"front": "What was Prodicus' 'fifty-drachma show-lecture' technique?", "back": "Slipping in attention-grabbing remarks whenever the audience began to nod."}, {"front": "Why are introductions rare in political oratory?", "back": "The subject is usually already known to the audience."}, {"front": "What is the Greek term for the 'epilogue' of a speech?", "back": "ε π ι λ ο γ ο ς (epilogos)"}, {"front": "List the four simultaneous functions of an epilogue.", "back": "Inspire favor/disfavor, magnify/minimize, arouse emotion, and refresh memory."}, {"front": "How should an orator 'refresh the memory' in the epilogue?", "back": "By summarizing the arguments and the proof of the case."}, {"front": "What style of language is most appropriate for the very end of a peroration?", "back": "A disconnected style."}, {"front": "Aristotle relates the four functions of the epilogue back to which three modes of persuasion?", "back": "Ethos, Pathos, and Logos."}, {"front": "How does Aristotle characterize the attempt to win over an audience through flattery?", "back": "As a concession to human weakness rather than a feature of the art itself."}, {"front": "In the epilogue, 'magnifying' and 'minimizing' refers to the importance of the _____.", "back": "Facts that have been proved."}, {"front": "Which orator used the graphic metaphor that the Athenians had 'emptied' their town into Sicily?", "back": "Aesion."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
