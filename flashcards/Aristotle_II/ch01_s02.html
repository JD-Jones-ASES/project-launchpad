    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);

        /* Card */

            user-select: none;

        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;

            transition: transform 0.5s ease;

        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;

        .fc-back {

        }
        .fc-label {
            position: absolute;

        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;

            font-size: 0.75rem;

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {

            border: 2px solid var(--secondary-color);

            background: transparent;

            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;

        .fc-progress-bar {
            height: 100%;

            transition: width 0.3s ease;

        /* Toolbar */
        .fc-toolbar {
            display: flex;

        }
        .fc-tool {
            padding: 0.35rem 0.8rem;

            font-family: 'Crimson Text', serif;

            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */

            margin-top: 1.5rem;

            border-radius: 3px;
            border: 1px solid var(--border-color);

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>

                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle

        </div>

    <script>
    var CARDS = [{"front": "What central question does Aristotle's \"Poetics\" attempt to answer?", "back": "What is art and how does it work?"}, {"front": "What central question does Aristotle's \"Rhetoric\" attempt to answer?", "back": "How do words persuade and how should they be used?"}, {"front": "Why does Aristotle consider both poetry and rhetoric essential to a political community?", "back": "Because citizens must be moved by words for the community to function."}, {"front": "When was Aristotle's \"Poetics\" approximately written?", "back": "c. 335 BC."}, {"front": "Which work is considered the earliest surviving example of literary criticism in the Western tradition?", "back": "Aristotle's \"Poetics\"."}, {"front": "Which genres of literature are the primary focus of the surviving Book I of the \"Poetics\"?", "back": "Tragedy and epic poetry."}, {"front": "What was the intended subject of the lost second book of Aristotle's \"Poetics\"?", "back": "Comedy."}, {"front": "How does Aristotle define \"mimesis\" in the context of poetry?", "back": "The imitation or creative representation of human beings in action."}, {"front": "According to Aristotle, how does the poet's task differ from the historian's task?", "back": "The poet shows what could happen, while the historian records what did happen."}, {"front": "Why does Aristotle describe poetry as \"more philosophical and higher\" than history?", "back": "Poetry reveals universal truths about the human condition rather than specific past events."}, {"front": "How many elements of tragedy did Aristotle identify?", "back": "Six."}, {"front": "Which element of tragedy does Aristotle rank as the most important?", "back": "Plot."}, {"front": "Which element of tragedy does Aristotle rank as second in importance?", "back": "Character."}, {"front": "Define the term \"katharsis\" in Aristotelian tragedy.", "back": "The purification or purgation of emotions, specifically pity and fear."}, {"front": "According to Aristotle, which two specific emotions does tragedy use to achieve its emotional effect?", "back": "Pity and fear."}, {"front": "What did Aristotle claim was \"the greatest thing by far\" in the poet's craft?", "back": "Metaphor."}, {"front": "Which two structural components does Aristotle emphasize as part of the nature of a tragic plot?", "back": "Reversal and recognition."}, {"front": "How does Aristotle define rhetoric?", "back": "The faculty of observing in any given case the available means of persuasion."}, {"front": "How many books comprise Aristotle's \"Rhetoric\"?", "back": "Three."}, {"front": "Against which group of teachers did Aristotle set himself by insisting rhetoric should serve truth and justice?", "back": "The Sophists."}, {"front": "What was the Sophists' primary claim regarding rhetorical arguments?", "back": "That they could make the weaker argument appear the stronger."}, {"front": "Name the three modes of persuasion identified in Aristotle's rhetorical theory.", "back": "Ethos, Pathos, and Logos."}, {"front": "In rhetoric, what does the term \"Ethos\" refer to?", "back": "The character or credibility of the speaker."}, {"front": "What three specific qualities contribute to a speaker's \"Ethos\"?", "back": "Competence, goodwill, and integrity."}, {"front": "In rhetoric, what does the term \"Pathos\" refer to?", "back": "The arousal of appropriate emotions in the audience."}, {"front": "In rhetoric, what does the term \"Logos\" refer to?", "back": "The rational content, evidence, and structure of the argument itself."}, {"front": "What is an \"enthymeme\" in the context of Aristotelian rhetoric?", "back": "A rhetorical syllogism that argues from probable rather than certain premises."}, {"front": "Which rhetorical tool does Aristotle describe as \"the body of persuasion\"?", "back": "The enthymeme."}, {"front": "How do the premises of an enthymeme differ from those of a logical demonstration?", "back": "They are based on what is generally or usually true rather than universal truths."}, {"front": "What is the focus of \"deliberative\" oratory?", "back": "Political speeches concerning future actions."}, {"front": "What is the focus of \"forensic\" oratory?", "back": "Legal speeches concerning past acts."}, {"front": "What is the focus of \"epideictic\" oratory?", "back": "Ceremonial speeches of praise and blame."}, {"front": "Which work by Aristotle is noted as the first systematic study of the emotions in Western philosophy?", "back": "The \"Rhetoric\"."}, {"front": "Where was Aristotle born?", "back": "Stagira, a Greek colony in northern Macedonia."}, {"front": "How long did Aristotle remain at Plato's Academy?", "back": "Twenty years."}, {"front": "Who was the young Macedonian prince tutored by Aristotle?", "back": "Alexander the Great."}, {"front": "What was the name of the school Aristotle founded in Athens in 335 BC?", "back": "The Lyceum."}, {"front": "What is the collective name for Aristotle's works on formal logic?", "back": "The \"Organon\"."}, {"front": "Which of Aristotle's works established the science of formal reasoning for nearly two thousand years?", "back": "The \"Organon\"."}, {"front": "What methodology distinguishes Aristotle's biological works?", "back": "A modern-style attention to observation and classification."}, {"front": "According to the text, what question does Aristotle's \"Ethics\" ask?", "back": "What makes a life good?"}, {"front": "According to the text, what question does Aristotle's \"Politics\" ask?", "back": "What kind of community makes good lives possible?"}, {"front": "How does Aristotle connect the \"Poetics\" to his study of the good life?", "back": "Art helps human beings understand and appreciate the good life."}, {"front": "How does Aristotle connect the \"Rhetoric\" to his study of the good community?", "back": "Words move a community toward right action."}, {"front": "Why does the text recommend reading Aristotle's \"Ethics\", \"Politics\", \"Poetics\", and \"Rhetoric\" together?", "back": "They form a single, unified inquiry into human nature and the human community."}, {"front": "According to the \"Poetics\", mimesis is not mechanical copying, but rather a way to reveal _____.", "back": "Deeper patterns and meaning in human actions."}, {"front": "In Aristotle's view, rhetoric is an art that properly serves _____ and _____.", "back": "Truth; justice."}, {"front": "What specific emotions does Aristotle analyze in the \"Rhetoric\"'s psychology of emotions?", "back": "Anger, fear, pity, shame, and envy."}, {"front": "For how long did Aristotle teach at the Lyceum?", "back": "Twelve years."}, {"front": "Aristotle describes all \"poetry\"—including tragedy, comedy, epic, and lyric—as forms of _____.", "back": "Mimesis."}, {"front": "Which of Aristotle's works is notably shorter and denser compared to the comprehensive \"Rhetoric\"?", "back": "The \"Poetics\"."}, {"front": "True or False (rephrased): Does Aristotle's theory of persuasion rely solely on logic?", "back": "No; it requires the mastery of character (Ethos) and emotion (Pathos) alongside logic (Logos)."}, {"front": "What is the primary distinction between a syllogism and an enthymeme regarding their premises?", "back": "Syllogisms use certain/universal premises, while enthymemes use probable/general premises."}, {"front": "Where did Aristotle go at age seventeen to begin his formal studies?", "back": "Athens (Plato's Academy)."}, {"front": "In the \"Poetics\", what is the relationship between the universal and the particular in poetry versus history?", "back": "Poetry deals with the universal (what could happen), whereas history deals with the particular (what did happen)."}, {"front": "In Aristotelian rhetoric, why is it necessary to arouse emotions like anger or pity in an audience?", "back": "To engage the audience's feelings in ways that are fitting and true to the case at hand."}, {"front": "What aspect of Aristotle's definition of rhetoric suggests it is a \"faculty\" rather than just a set of tricks?", "back": "It involves the observation and finding of available means of persuasion in any given case."}, {"front": "How did Aristotle's status at the Academy change over his twenty-year tenure?", "back": "He began as a student and eventually became a teacher and researcher."}, {"front": "What happened to Aristotle's life in 347 BC?", "back": "He left Athens following the death of Plato."}, {"front": "Which two emotions are essential to the \"purification\" process of tragedy?", "back": "Pity and fear."}, {"front": "What did Aristotle believe was the relationship between a speaker's goodwill and their persuasive power?", "back": "Goodwill is a component of \"Ethos\" that makes a speaker more trustworthy and thus more persuasive."}, {"front": "According to the \"Rhetoric\", why are we persuaded by a speaker's integrity?", "back": "Because it establishes \"Ethos\", the character or credibility that builds audience trust."}, {"front": "Which classification of oratory is used specifically for ceremonial occasions?", "back": "Epideictic."}, {"front": "Which classification of oratory is used specifically for political debates about the future?", "back": "Deliberative."}, {"front": "Which classification of oratory is used specifically for legal arguments about past events?", "back": "Forensic."}, {"front": "In \"Poetics\", what is the primary role of the \"tragic hero\" in the structure of the plot?", "back": "To experience reversal and recognition as part of the imitation of action."}, {"front": "What did Aristotle consider the \"logical\" element of a rhetorical argument?", "back": "The \"Logos\", which refers to the rational structure and evidence of the case."}, {"front": "How did Aristotle's upbringing in Stagira and his time in Macedonia influence his career?", "back": "It led to his role as the tutor for Alexander of Macedon."}, {"front": "Which work by Aristotle focuses on the \"means of persuasion\"?", "back": "The \"Rhetoric\"."}, {"front": "What did Aristotle consider the \"greatest thing by far\" regarding poetic language?", "back": "The command of metaphor."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
