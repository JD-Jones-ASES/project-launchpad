    <style>
        .fc-container {

        .fc-breadcrumb {

        .fc-back {

        .fc-label {

        .fc-btn:hover {

        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;

        .fc-counter {

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;

        .fc-progress-bar {

        /* Toolbar */
        .fc-toolbar {
            display: flex;

            padding: 0.35rem 0.8rem;

            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */

            margin-top: 1.5rem;

            color: var(--text-secondary);
            opacity: 0.6;
        }

            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;

                min-height: 220px;
            }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>

    <main class="main-content">
        <div class="container">

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;

    <script>
    var CARDS = [{"front": "Which Roman poet's work is considered the great Aristotelian document of Latin literary theory?", "back": "Horace"}, {"front": "What is the Latin title of Horace's influential verse letter on poetry written around 19 BC?", "back": "Ars Poetica"}, {"front": "According to Horace's 'Ars Poetica', what are the two primary purposes of poetry?", "back": "To delight and to instruct."}, {"front": "What does the Latin phrase 'aut prodesse aut delectare' mean in the context of Horace's literary theory?", "back": "Either to benefit or to delight."}, {"front": "Which famous phrase from Horace's 'Ars Poetica' translates to 'as is painting, so is poetry'?", "back": "Ut pictura poesis"}, {"front": "In Horace's literary discipline, what does 'the file' (lima) represent?", "back": "The discipline of revision."}, {"front": "During which century was the Greek text of Aristotle's 'Poetics' first printed?", "back": "The sixteenth century (1508)."}, {"front": "Which Renaissance scholar is associated with the 'three unities' that became a standard for judging drama?", "back": "Castelvetro"}, {"front": "Identify the three dramatic unities derived by Renaissance critics from Aristotle's work.", "back": "Time, place, and action."}, {"front": "Which group of seventeenth-century neoclassical dramatists wrote under the strict discipline of the three unities?", "back": "French dramatists (e.g., Corneille, Racine, Molière)."}, {"front": "In his prefaces, how did the playwright Corneille interact with Aristotelian criticism?", "back": "He defended his departures from the unities with ingenuity."}, {"front": "Which French tragedian achieved a 'concentrated intensity' by strictly observing the unities of action and time?", "back": "Racine"}, {"front": "In 'The Defence of Poesy', what was Philip Sidney's primary complaint about English playwrights?", "back": "They mixed comic and tragic elements in defiance of the rules."}, {"front": "Which specific Aristotelian unity did Shakespeare's theater typically observe?", "back": "Unity of action."}, {"front": "In Aristotelian terms, what causes the downfall of Shakespeare's tragic heroes?", "back": "Errors of judgment or character."}, {"front": "Aristotle describes comedy as the imitation of the _____, rather than the imitation of evil.", "back": "Ridiculous (or laughably absurd)"}, {"front": "What term describes the Aristotelian concept of prose fiction as an 'imitation of human action'?", "back": "Mimesis"}, {"front": "Which nineteenth-century novelist drew explicitly on Aristotelian categories in his critical writings?", "back": "Henry James"}, {"front": "Identify the three components of the standard Hollywood 'three-act structure'.", "back": "Setup, confrontation, and resolution."}, {"front": "In modern screenwriting, where are the Aristotelian elements of 'reversal' and 'recognition' typically placed?", "back": "At the moment of maximum tension."}, {"front": "What is the commercial adaptation of 'catharsis' in modern film theory called?", "back": "The character arc."}, {"front": "Who wrote 'Screenplay' (1979), the manual that adapted Aristotelian structure for cinema?", "back": "Syd Field"}, {"front": "Which Roman orator is credited with synthesizing Greek rhetorical theory for the Latin world?", "back": "Marcus Tullius Cicero"}, {"front": "List the five canons of rhetoric systematized by Cicero.", "back": "Inventio, dispositio, elocutio, memoria, and pronuntiatio."}, {"front": "In the five canons of rhetoric, what is the purpose of 'inventio'?", "back": "Finding arguments."}, {"front": "In the five canons of rhetoric, what does the term 'dispositio' refer to?", "back": "The arrangement of arguments."}, {"front": "In the five canons of rhetoric, what does 'elocutio' concern?", "back": "Style."}, {"front": "Who authored the twelve-volume 'Institutio Oratoria' on the education of the orator?", "back": "Quintilian"}, {"front": "What is Quintilian's famous definition of an orator?", "back": "A good man skilled in speaking (vir bonus dicendi peritus)."}, {"front": "Which humanist scholar rediscovered the complete text of Quintilian's 'Institutio Oratoria' in 1416?", "back": "Poggio Bracciolini"}, {"front": "In which work did Augustine of Hippo argue for the use of classical rhetoric in Christian preaching?", "back": "De Doctrina Christiana"}, {"front": "Identify the three purposes of the orator according to the tradition of Cicero and Augustine.", "back": "To teach (docere), to delight (delectare), and to move (movere)."}, {"front": "Which of the three rhetorical purposes (teach, delight, move) did Augustine consider the most vital for conversion?", "back": "To move (movere)."}, {"front": "Name the three arts that comprise the medieval 'trivium'.", "back": "Grammar, logic, and rhetoric."}, {"front": "Name the four arts that comprise the medieval 'quadrivium'.", "back": "Arithmetic, geometry, music, and astronomy."}, {"front": "In modern advertising, which Aristotelian appeal is utilized by a 'trusted celebrity endorser'?", "back": "Ethos"}, {"front": "In modern persuasion, which Aristotelian appeal relies on 'statistics and guarantees'?", "back": "Logos"}, {"front": "What is the primary value of learning Aristotelian rhetorical categories in the modern world?", "back": "It provides a critical vocabulary to analyze and evaluate persuasion."}, {"front": "According to Aristotle's 'Poetics', how does comedy differ from tragedy in its choice of subjects?", "back": "Comedy imitates people 'worse than average' while tragedy imitates 'better than average' figures."}, {"front": "Which 1980 novel by Umberto Eco centers on the mystery of Aristotle's lost book on comedy?", "back": "The Name of the Rose"}, {"front": "In Eco's 'The Name of the Rose', why does the villain suppress Aristotle's book on comedy?", "back": "He believes laughter undermines the pious fear of God."}, {"front": "Aristotle's logic entered the medieval university curriculum primarily through his collection of works known as the _____.", "back": "Organon"}, {"front": "The phrase 'match Horn-pipes and Funerals' refers to the violation of which neoclassical principle?", "back": "The separation of genres (avoiding mixing comedy and tragedy)."}, {"front": "What is the specific Aristotelian term for the moment a character moves from ignorance to knowledge?", "back": "Recognition"}, {"front": "What is the specific Aristotelian term for a sudden change in fortune or direction in a plot?", "back": "Reversal"}, {"front": "According to the text, what era rediscovered Aristotle's 'Poetics' with 'explosive enthusiasm'?", "back": "The Italian Renaissance."}, {"front": "In the context of the trivium, from which two Aristotelian works was the art of grammar derived?", "back": "The Poetics and the Rhetoric."}, {"front": "Who was the great patron of the arts associated with Horace's literary circle?", "back": "Maecenas"}, {"front": "Which Roman Emperor's era is known as the Augustan age, during which Horace wrote?", "back": "Augustus Caesar"}, {"front": "How did Renaissance critics view the relationship between Aristotle and Horace?", "back": "They saw them as twin authorities (theoretical system vs. practical wisdom)."}, {"front": "What is the significance of the year 1549 in the history of the 'Poetics'?", "back": "It was the year the Greek text was translated into Italian."}, {"front": "Identify the author of 'Poetices Libri Septem' (1561), a work that sought to systematize literary rules.", "back": "Julius Caesar Scaliger"}, {"front": "Which Aristotelian principle involves the hero being 'undone by errors of judgment'?", "back": "Hamartia (though the text describes it as 'heroes of genuine greatness undone by errors of judgment')."}, {"front": "Why did Sidney argue that English drama had power despite violating neoclassical rules?", "back": "He believed it possessed a quality the rules could not fully account for."}, {"front": "According to Henry James, what is the essential form of the novel?", "back": "Mimesis (imitating human action in prose narrative)."}, {"front": "What are Cicero's 'Philippics' against Mark Antony examples of in practice?", "back": "Aristotelian rhetoric in action."}, {"front": "The humanist ideal of the educated person is substantially derived from which Roman's educational philosophy?", "back": "Quintilian"}, {"front": "Which Latin work by Cicero first turned Augustine toward the study of wisdom?", "back": "Hortensius"}, {"front": "In medieval sermon literature, what happened to Aristotle's 'ethos, pathos, and logos'?", "back": "They were 'baptized' into Christian service."}, {"front": "How many plays is William Shakespeare credited with writing?", "back": "Approximately 37."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
