<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Aristotle define the fundamental principle of poetry?", "back": "Imitation (mimesis)."}, {"front": "According to Aristotle, why is tragedy considered the \"perfected form\" of poetic imitation?", "back": "It is the art at its most rigorous, most unified, and most emotionally powerful."}, {"front": "Tragedy is an imitation of an action that is serious, complete, and of a certain _____.", "back": "Magnitude"}, {"front": "What two specific emotions is tragedy intended to purge through the process of catharsis?", "back": "Pity and fear."}, {"front": "By what medium is tragedy performed, as opposed to narrative forms?", "back": "The form of action."}, {"front": "What does Aristotle mean by \"language embellished\"?", "back": "Language that includes rhythm, harmony, and song."}, {"front": "Which two elements of tragedy constitute the \"medium of imitation\"?", "back": "Diction and Song."}, {"front": "Which element of tragedy constitutes the \"manner of imitation\"?", "back": "Spectacle."}, {"front": "Which three elements of tragedy constitute the \"objects of imitation\"?", "back": "Plot, Character, and Thought."}, {"front": "What is Aristotle's definition of Plot?", "back": "The arrangement of the incidents."}, {"front": "What is the primary function of Character in a tragedy?", "back": "To reveal moral purpose by showing what kind of things a person chooses or avoids."}, {"front": "In what specific context is \"Thought\" required within a tragedy?", "back": "Wherever a statement is proved or a general truth is enunciated."}, {"front": "What is the most important of the six elements of tragedy?", "back": "Plot."}, {"front": "Term: Diction", "back": "Definition: The expression of meaning in words, specifically the metrical arrangement of words."}, {"front": "Why does Aristotle rank Plot as more important than Character?", "back": "Tragedy is an imitation of an action and of life, not of men."}, {"front": "Aristotle claims that a tragedy can exist without Character, but it cannot exist without _____.", "back": "Action"}, {"front": "According to Aristotle's painting analogy, which is more essential: beautiful colors or a chalk outline?", "back": "The chalk outline."}, {"front": "What does the painter Polygnotus excel at that the painter Zeuxis lacks?", "back": "Delineating character (ethical quality)."}, {"front": "What metaphorical term does Aristotle use to describe the importance of the Plot?", "back": "The soul of a tragedy."}, {"front": "Which of the six elements is described as the \"least artistic\" and least connected to poetry?", "back": "Spectacle."}, {"front": "According to the definition of a \"whole,\" what characterizes the \"Beginning\" of a plot?", "back": "It does not follow anything by causal necessity, but naturally leads to something else."}, {"front": "According to the definition of a \"whole,\" what characterizes the \"End\" of a plot?", "back": "It follows something else by necessity or rule but has nothing following it."}, {"front": "Why is the magnitude (length) of a plot important for the spectator?", "back": "It must be of a size that can be easily embraced by the memory."}, {"front": "Under what condition does a greater length make a tragedy more beautiful?", "back": "The whole must remain perspicuous (clear and easily understood)."}, {"front": "Why does Unity of Plot not simply consist of focusing on a single hero?", "back": "A single man's life contains many incidents that cannot be reduced to a single unified action."}, {"front": "What is the test for whether a part of a plot is truly \"organic\"?", "back": "Its removal or displacement would disjoint and disturb the whole."}, {"front": "How does the poet differ from the historian according to Aristotle?", "back": "The poet relates what may happen (possibility), while the historian relates what has happened (fact)."}, {"front": "Why is poetry considered \"more philosophical\" than history?", "back": "Poetry expresses universals, while history expresses particulars."}, {"front": "In the context of Aristotle's Poetics, what is a \"universal\"?", "back": "How a person of a certain type will act according to the law of probability or necessity."}, {"front": "What is the definition of an \"episodic\" plot?", "back": "A plot in which acts succeed one another without a probable or necessary sequence."}, {"front": "Under what conditions is \"tragic wonder\" greatest?", "back": "When events occur by surprise but also follow the laws of cause and effect."}, {"front": "What is the definition of peripeteia (Reversal of the Situation)?", "back": "A change by which the action veers round to its opposite."}, {"front": "What is the definition of anagnorisis (Recognition)?", "back": "A change from ignorance to knowledge, producing love or hate between characters."}, {"front": "Which play does Aristotle use as the paradigm for a simultaneous reversal and recognition?", "back": "*Oedipus Rex* (or *Oedipus Tyrannus*)."}, {"front": "What is a \"Scene of Suffering\" in a tragedy?", "back": "A destructive or painful action, such as death on stage, bodily agony, or wounds."}, {"front": "Why should a tragedy not depict a perfectly virtuous man falling from prosperity to adversity?", "back": "It merely shocks the audience rather than moving them to pity or fear."}, {"front": "Why is the downfall of an \"utter villain\" not considered tragic?", "back": "It satisfies the moral sense but inspires neither pity nor fear."}, {"front": "Under what condition is the emotion of \"pity\" aroused in the audience?", "back": "When misfortune is unmerited."}, {"front": "Under what condition is the emotion of \"fear\" aroused in the audience?", "back": "When misfortune happens to a man like ourselves."}, {"front": "Term: hamartia", "back": "Definition: A \"missing of the mark\" or a great error/frailty that causes the hero's downfall."}, {"front": "What are the two ideal moral characteristics of a tragic hero?", "back": "Not eminently good and just, but also not falling through vice or depravity."}, {"front": "According to Aristotle, the change of fortune in a perfect tragedy should be from _____ to _____.", "back": "Good; bad"}, {"front": "Why does Aristotle defend Euripides against critics who dislike his unhappy endings?", "back": "The unhappy ending is the \"right ending\" to produce the most tragic effect."}, {"front": "What is the first and most important requirement for Character in tragedy?", "back": "It must be good."}, {"front": "What does Aristotle mean by \"propriety\" in character development?", "back": "Qualities must be appropriate to the character's type (e.g., valor for a man)."}, {"front": "What are the four requirements Aristotle lists for characters?", "back": "Goodness, propriety, truth to life, and consistency."}, {"front": "How should a poet handle an inconsistent character model?", "back": "The character must be \"consistently inconsistent.\""}, {"front": "Where should the \"unravelling\" of a plot originate?", "back": "Out of the plot itself."}, {"front": "For what specific purpose should the Deus ex Machina be used?", "back": "For events external to the drama, such as antecedent or subsequent events."}, {"front": "How should a poet represent men with defects of character, like irascibility?", "back": "By preserving the type while ennobling the character, much like a good portrait-painter."}, {"front": "According to Aristotle, where should \"irrational elements\" be kept in relation to a tragedy?", "back": "Outside the scope of the action or tragedy itself."}, {"front": "What does the messenger in *Oedipus Rex* intend to do, and what is the actual outcome (illustrating reversal)?", "back": "He intends to cheer Oedipus but instead reveals his identity, producing the opposite effect."}, {"front": "Why does Aristotle suggest that a poet should be a \"maker of plots\" rather than a \"maker of verses\"?", "back": "A poet is defined by imitation, and what is imitated is action."}, {"front": "What example does Aristotle give of a character that is \"inconsistent\" and \"does not resemble her later self\"?", "back": "Iphigenia in *Iphigenia at Aulis*."}, {"front": "In Aristotle's view, how does the magnitude of a plot relate to the beauty of the work?", "back": "Beauty depends on magnitude and orderly arrangement."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
