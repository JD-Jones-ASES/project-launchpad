<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Aristotle's Poetics, what is the definition of mimesis?", "back": "The imitation or artistic representation of human action."}, {"front": "What are the three criteria Aristotle uses to distinguish between different types of imitative arts?", "back": "What they imitate, how they imitate, and the medium used."}, {"front": "According to the Poetics, poetry originates from the deep human instincts for _____ and _____.", "back": "imitation; rhythm"}, {"front": "Why does Aristotle believe we take pleasure in the imitation of painful or ugly things?", "back": "We enjoy the recognition involved in the depiction, learning \"what it is to be human.\""}, {"front": "How does Aristotle define tragedy in relation to its emotional effect on the audience?", "back": "It achieves catharsis, a purification or purgation of pity and fear."}, {"front": "List the six elements of tragedy in Aristotle's ranked order of importance.", "back": "Plot, character, thought, diction, song, and spectacle."}, {"front": "Which element of tragedy did Aristotle famously call the \"soul of a tragedy\"?", "back": "Plot (mythos)."}, {"front": "The Aristotelian term for a \"reversal of fortune\" within a narrative is _____.", "back": "peripeteia"}, {"front": "In the context of literary criticism, what does the term anagnorisis represent?", "back": "A moment of recognition."}, {"front": "Define the concept of hamartia as used in Aristotelian tragedy.", "back": "The error or flaw that leads to the hero's undoing."}, {"front": "Why did Aristotle argue that poetry is \"more philosophical than history\"?", "back": "Poetry deals with universal truths (what might happen), while history deals with particulars (what did happen)."}, {"front": "According to Aristotle, why is the command of metaphor a \"sign of genius\"?", "back": "It implies an intuitive perception of the similarity in dissimilars."}, {"front": "Aristotle argues that Rhetoric is the \"counterpart\" (antistrophos) of _____.", "back": "dialectic"}, {"front": "What is the primary objective of rhetoric compared to dialectic?", "back": "Rhetoric seeks to make truth persuasive to an audience, whereas dialectic seeks truth through reasoned argument."}, {"front": "Identify the three architectonic modes of persuasion in Aristotle's Rhetoric.", "back": "ethos, pathos, and logos."}, {"front": "Which mode of persuasion relies on the credibility and moral character of the speaker?", "back": "ethos"}, {"front": "The mode of persuasion known as pathos refers to _____.", "back": "the emotions aroused in the audience."}, {"front": "Which mode of persuasion focuses specifically on the logic and reason of the argument itself?", "back": "logos"}, {"front": "What are the three kinds of rhetoric distinguished by Aristotle?", "back": "Deliberative, forensic, and epideictic."}, {"front": "What is the time reference and characteristic aim of deliberative rhetoric?", "back": "It focuses on the future and involves advising for or against a specific action."}, {"front": "Which type of rhetoric is concerned with accusing or defending regarding a past action?", "back": "Forensic rhetoric."}, {"front": "What is the primary function of epideictic rhetoric?", "back": "Praising or blaming in the present."}, {"front": "In the Rhetoric, what is the term for a \"rhetorical syllogism\" that serves as the body of persuasion?", "back": "The enthymeme."}, {"front": "What are the two cardinal virtues of prose style identified in Book III of the Rhetoric?", "back": "Clarity (sapheneia) and appropriateness (to prepon)."}, {"front": "List the four essential parts of a well-ordered speech according to Aristotle.", "back": "Introduction, narration, proof, and epilogue."}, {"front": "What core concept did Longinus add to the study of literature in \"On the Sublime\"?", "back": "The sublime (hypsos), or that which makes a work great and immortal rather than merely effective."}, {"front": "According to Longinus, what are the two \"gifts of nature\" that serve as sources of the sublime?", "back": "Greatness of thought and strong emotion."}, {"front": "How did Averroes adapt the Poetics for the Arabic-speaking world which lacked a theater tradition?", "back": "He reinterpreted tragedy as praise poetry and comedy as satirical verse."}, {"front": "Which interpreter is known for turning Aristotle's observations into the rigid \"three unities\" of drama?", "back": "Castelvetro"}, {"front": "How did Sir Philip Sidney defend the \"truth\" of literature against its critics?", "back": "He argued that because the poet \"nothing affirms,\" the poet \"never lieth.\""}, {"front": "In Sidney's view, how does the poet's \"golden world\" compare to nature's \"brazen world\"?", "back": "Literature is free to show what \"ought to happen\" rather than being bound to report what did happen."}, {"front": "What is the central question of the Ethics within Aristotle's unified inquiry into human nature?", "back": "What is the good life?"}, {"front": "How does the Politics contribute to Aristotle's unified vision of the human community?", "back": "It asks how the community makes the good life possible through just constitutions and civic virtue."}, {"front": "In the unified vision, the goal of the Poetics is to show how art _____.", "back": "imitates life and teaches us about it through creative representation."}, {"front": "In the unified vision, the goal of the Rhetoric is to explain how words _____.", "back": "move people to right action through honest persuasion."}, {"front": "Aristotle's theory of mimesis asserts that art imitates the _____ of life rather than its surface details.", "back": "essential patterns"}, {"front": "Why is the priority of plot considered a healthy corrective in literary analysis?", "back": "It emphasizes what happens and the inevitability of the narrative over the specific traits of the characters."}, {"front": "According to Aristotle, any rhetoric that abandons character, emotion, or reason has already _____.", "back": "begun to fail."}, {"front": "What is the primary function of \"appropriateness\" in the art of style?", "back": "Matching the word to the subject, the occasion, and the speaker."}, {"front": "Which Greek term refers to the element of \"thought\" or themes in a tragedy?", "back": "dianoia"}, {"front": "The term lexis in the Poetics refers to which element of tragedy?", "back": "Diction."}, {"front": "In tragedy, what does the element of melos represent?", "back": "Song."}, {"front": "What is the Greek term for the visual \"spectacle\" of a tragedy?", "back": "opsis"}, {"front": "According to Aristotle's Poetics, how do comedy and tragedy differ in terms of the human beings they imitate?", "back": "Tragedy imitates \"better\" human beings, while comedy imitates \"worse\" ones."}, {"front": "What are the two modes of imitation distinguished by Aristotle?", "back": "Dramatic (acting out) and narrative (telling a story)."}, {"front": "Which interpreter's work is described as a \"cautionary tale\" about turning descriptive analysis into prescriptive rules?", "back": "Castelvetro"}, {"front": "Aristotle's ranking of literary forms places _____ above _____ as the higher form.", "back": "tragedy; epic"}, {"front": "Which specific work of Aristotle provides the most sophisticated psychology of emotion in ancient philosophy?", "back": "The Rhetoric (specifically Book II)."}, {"front": "In Aristotelian ethics, what is the term for the \"active exercise of the soul in accordance with virtue\"?", "back": "eudaimonia (happiness or flourishing)."}, {"front": "What three factors must an orator analyze for each emotion in Book II of the Rhetoric?", "back": "The state of mind, the person it is directed toward, and the reasons for it."}, {"front": "According to Longinus, which three sources of the sublime can be acquired through learning?", "back": "Figures of speech, noble diction, and dignified composition."}, {"front": "True or False: Aristotle believes the deepest source of persuasive power is the speaker's moral character.", "back": "True"}, {"front": "What was the title of Longinus's major work that influenced the Aristotelian tradition?", "back": "\"On the Sublime\" (Peri Hypsous)."}, {"front": "The Aristotelian principle that a narrative must have a \"beginning, middle, and end\" is a theory of _____.", "back": "narrative causation."}, {"front": "Which work by Sir Philip Sidney provides the most eloquent defense of literature in English?", "back": "\"An Apology for Poetry\" (or \"The Defence of Poesy\")."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
