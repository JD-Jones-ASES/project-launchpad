<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Words (Aristotle II) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Words (Aristotle II) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary practical focus of Book III of Aristotle's Rhetoric?", "back": "The actual writing and construction of a speech."}, {"front": "What does Aristotle identify as the supreme virtue of prose style?", "back": "$sapheneia$ (clarity)."}, {"front": "In the context of style, what is the literal meaning of the Greek term $sapheneia$?", "back": "Clarity or transparency."}, {"front": "Why does Aristotle argue that clarity is a logical requirement of speech?", "back": "Because speech exists to convey meaning, and failing to be clear means the speech has failed its essential purpose."}, {"front": "What is the stylistic result of a speech that achieves perfect clarity but lacks distinction?", "back": "It becomes flat and prosaic."}, {"front": "Define the rhetorical concept of $to\\ prepon$.", "back": "Appropriateness or fitness—the match between style and subject, audience, speaker, and occasion."}, {"front": "What is the Latin equivalent for the Greek term $to\\ prepon$?", "back": "Decorum."}, {"front": "How does appropriateness ($to\\ prepon$) function as an 'epistemic virtue'?", "back": "It makes the argument more believable by preventing the language from distracting the audience from the subject."}, {"front": "How is the virtue of clarity primarily achieved in prose?", "back": "By using current, ordinary words for the things they commonly name."}, {"front": "When is a prose style considered 'appropriate' regarding its emotional register?", "back": "When the language used matches the elevation and emotion of the subject matter."}, {"front": "According to Aristotle, what is the 'third quality' of distinguished prose beyond clarity and appropriateness?", "back": "Distinction (character and force)."}, {"front": "What is the single most powerful device for achieving distinction in prose style?", "back": "Metaphor."}, {"front": "A good prose style must navigate between the danger of being 'too ordinary' and the danger of being '_____'.", "back": "Too elevated (obscure or pretentious)."}, {"front": "What is the Aristotelian principle regarding the 'concealment' of stylistic craft?", "back": "The best style conceals its art so that it sounds like natural, unforced speech."}, {"front": "Why does Aristotle warn that 'artificiality' is the opposite of persuasion?", "back": "Because the audience becomes suspicious when they sense a speaker is performing rather than communicating."}, {"front": "Why is metaphor more central to the prose writer than the poet?", "back": "Prose writers lack the poet's resources like unusual words, elaborate rhythms, and elevated subject matter."}, {"front": "What mental event makes a well-crafted metaphor pleasurable and intellectually productive?", "back": "A small act of recognition where the mind perceives a previously unseen resemblance."}, {"front": "How does Aristotle define a 'proportional' metaphor?", "back": "A metaphor established by a four-term ratio ($A$ is to $B$ as $C$ is to $D$)."}, {"front": "Pericles' statement that young men lost in war were like the 'spring taken out of the year' is an example of what?", "back": "A proportional metaphor."}, {"front": "What is the danger of using metaphors that are 'too remote'?", "back": "They become obscure and fail to produce the pleasure of recognition."}, {"front": "Term: $asteia$", "back": "Smart sayings; lively, witty remarks that convey new understanding in a brief and memorable form."}, {"front": "The term $asteia$ (smart sayings) is derived from the Greek word $astu$, meaning _____.", "back": "City (denoting urban sophistication)."}, {"front": "Which three qualities typically combine to create effective $asteia$ (smart sayings)?", "back": "Antithesis, metaphor, and actuality ($energeia$)."}, {"front": "In Aristotle’s stylistic theory, what does $energeia$ literally mean?", "back": "Actuality or vividness."}, {"front": "How does a speaker achieve the highest expression of $energeia$ in a metaphor?", "back": "By giving metaphorical life to lifeless things, setting events before the eyes as if in motion."}, {"front": "How does Homer's description of an arrow as 'flying on eagerly' demonstrate $energeia$?", "back": "It gives the lifeless object (the arrow) a sense of will and motion."}, {"front": "What is the primary difference between prose rhythm and poetic meter?", "back": "Meters are fixed, recurring patterns, while prose rhythm is varied and unpredictable."}, {"front": "Why should prose have rhythm but avoid strict meter?", "back": "Meter distracts the audience from the argument and makes the speech feel artificial."}, {"front": "How does rhythm in a well-composed sentence aid in persuasion?", "back": "It unconsciously guides the listener through the movement of the argument."}, {"front": "Which Greek metrical foot does Aristotle recommend as most suitable for prose rhythm?", "back": "The paean."}, {"front": "Describe the structure of a paean metrical foot.", "back": "One long syllable followed by three short syllables, or the reverse."}, {"front": "What rhythmic structure does Aristotle suggest for sentence endings to create closure?", "back": "The 'long paean' (three short syllables followed by one long)."}, {"front": "What is the 'running style' ($lexis\\ eiromene$)?", "back": "A style where clauses are strung together with simple connectives like 'and'."}, {"front": "What is the 'periodic style' ($lexis\\ katestrammene$)?", "back": "A style where the sentence is constructed as a self-contained unit with a clear beginning and end."}, {"front": "Term: $to\\ psychron$", "back": "Frigidity or coldness; the vice of using ostentatiously elaborate or strained language."}, {"front": "What causes the stylistic vice of 'frigidity' ($to\\ psychron$)?", "back": "Attempting to be impressive at the expense of being natural."}, {"front": "Name one of the forms Aristotle identifies as leading to stylistic frigidity.", "back": "Awkward compound words (or overstretched metaphors/elaborate epithets)."}, {"front": "According to Aristotle, what are the only two 'strictly necessary' parts of a speech?", "back": "The statement of the case ($prothesis$) and the argument ($pistis$)."}, {"front": "What is the function of the $prothesis$ in the structure of a speech?", "back": "To state what the speaker proposes to prove."}, {"front": "What is the function of the $pistis$ in the structure of a speech?", "back": "To provide the proof or argument through $logos$, $ethos$, and $pathos$."}, {"front": "Define $prooimion$ in the context of speech arrangement.", "back": "The introduction or prelude, designed to prepare the audience to receive the argument."}, {"front": "The word $prooimion$ literally translates as 'before the _____'.", "back": "Path."}, {"front": "What are the three primary goals of a speech's introduction ($prooimion$)?", "back": "To make the audience attentive, well-disposed, and clear about the subject."}, {"front": "Term: $epilogos$", "back": "The conclusion or epilogue of a speech."}, {"front": "What does it mean for an $epilogos$ to 'amplify or minimize' facts?", "back": "To emphasize the importance of the speaker's facts or downplay the importance of the opponent's."}, {"front": "What are the four functions of an effective $epilogos$?", "back": "Establish goodwill, amplify/minimize facts, arouse emotion, and refresh the audience's memory."}, {"front": "The word $epilogos$ literally means '_____'.", "back": "After the speech."}, {"front": "In a speech's structure, which two parts act as the 'frame' for the essential argument?", "back": "The introduction ($prooimion$) and the epilogue ($epilogos$)."}, {"front": "Which mode of persuasion is primarily engaged during the $pistis$ (argument) phase of a speech?", "back": "$logos$ (logical reasoning)."}, {"front": "How does the structure of the $epilogos$ echo the three modes of persuasion introduced in Book I?", "back": "It combines disposing the audience ($ethos$), magnifying facts ($logos$), and exciting emotion ($pathos$)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
