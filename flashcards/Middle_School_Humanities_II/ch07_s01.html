<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the dominant characteristic of the Catholic Church in Europe by 1500, prior to the Reformation?", "back": "By 1500, the Catholic Church was the most powerful organization in Europe. It owned vast land, ran institutions like hospitals and universities, collected taxes, and its Pope wielded authority that could humble emperors.", "id": "fc01"}, {"front": "List some examples of corruption within the Catholic Church on the eve of the Reformation.", "back": "Examples of corruption included simony (buying/selling church offices), illiterate parish priests unable to explain Latin services, and monasteries becoming comfortable estates for wealthy families rather than centers of learning.", "id": "fc02"}, {"front": "Define 'simony' and explain its significance during the medieval Church.", "back": "Simony is the buying or selling of church offices, appointments, or sacraments. It was widely condemned but commonly practiced, allowing wealthy families to place relatives in positions of power regardless of their spiritual qualifications.", "id": "fc03"}, {"front": "Who were two key precursors to the Protestant Reformation in the centuries prior, and what ideas did they advocate?", "back": "John Wycliffe (England, died 1384) argued the Church had no right to own property and that Scripture, not the Pope, was the final authority. Jan Hus (Bohemia, died 1415) preached similar ideas.", "id": "fc04"}, {"front": "What crucial technological innovation helped Luther's ideas spread in 1517, unlike the earlier movements of Wycliffe and Hus?", "back": "The printing press, a new technology at the time, allowed Luther's Ninety-Five Theses to be printed and distributed across Germany and Europe within weeks, making it impossible to silence him.", "id": "fc05"}, {"front": "What was an 'indulgence' in the context of the 16th-century Catholic Church?", "back": "An indulgence was a certificate issued by the Catholic Church that claimed to reduce the amount of time a soul would spend in purgatory for sins already forgiven. By 1517, they were primarily sold for money.", "id": "fc06"}, {"front": "According to Catholic teaching, what is 'purgatory'?", "back": "Purgatory is a state of purification after death for souls who have died in God's grace but still need to be cleansed of the effects of sin before entering heaven. The Catholic Church taught that indulgences could reduce time spent there.", "id": "fc07"}, {"front": "What specific event is often cited as the immediate spark that triggered the Protestant Reformation?", "back": "The immediate cause was the sale of indulgences in 1517 by Dominican friar Johann Tetzel near Wittenberg, Germany. Proceeds were intended for the construction of St. Peter's Basilica and to pay the Archbishop of Mainz's debt.", "id": "fc08"}, {"front": "What was the infamous sales pitch attributed to Johann Tetzel regarding indulgences?", "back": "Johann Tetzel's sales pitch was reportedly summarized as: 'As soon as the coin in the coffer rings, the soul from purgatory springs.' This phrase captured the crude commercialism of the practice.", "id": "fc09"}, {"front": "Describe Martin Luther's personal journey that led to his theological struggles and eventual breakthrough.", "back": "Luther was a law student who, after a terrifying thunderstorm, vowed to become a monk. As a monk and priest, he intensely studied theology, agonizing over how a sinful human could be made right with a holy God, finding traditional methods unsatisfactory.", "id": "fc10"}, {"front": "What was Martin Luther's theological breakthrough regarding salvation, and what biblical passage inspired it?", "back": "Luther came to believe that salvation was not earned by human effort but was a free gift from God, received through faith alone. This insight came from studying Romans 1:17, which states 'the righteous shall live by faith'.", "id": "fc11"}, {"front": "Define 'sola fide' and explain its significance in Luther's theology.", "back": "'Sola fide' is Latin for 'by faith alone.' It is Luther's foundational doctrine that a person is justified (made right with God) solely by faith in Jesus Christ, not by good works, penances, or indulgences. He saw it as central to the Gospel.", "id": "fc12"}, {"front": "What was the purpose of Luther's Ninety-Five Theses when he posted them in October 1517?", "back": "Luther's Ninety-Five Theses were a formal list of arguments, written in Latin, challenging the theological basis and corrupt practice of selling indulgences. He intended to start an academic debate, not to break away from the Church.", "id": "fc13"}, {"front": "How did Pope Leo X initially respond to Martin Luther's challenges?", "back": "In 1520, Pope Leo X issued a papal bull (Exsurge Domine) threatening Luther with excommunication unless he withdrew his writings. Luther defiantly responded by publicly burning the papal bull.", "id": "fc14"}, {"front": "What was the 'Diet of Worms' and who presided over it?", "back": "The Diet of Worms was a formal assembly of the Holy Roman Empire held in the city of Worms in 1521. It was presided over by Emperor Charles V, who summoned Luther to recant his writings.", "id": "fc15"}, {"front": "Summarize Martin Luther's famous statement at the Diet of Worms.", "back": "Luther declared, 'Unless I am convinced by the testimony of Scripture or by clear reason... My conscience is captive to the Word of God. I cannot and will not retract anything, since to act against conscience is neither safe nor right before God. Here I stand. I cannot do otherwise. God help me. Amen.'", "id": "fc16"}, {"front": "What was the lasting significance of Luther's stand at the Diet of Worms?", "back": "Luther's refusal to recant, based on his conscience being 'captive to the Word of God,' became a defining statement of the Reformation, emphasizing individual conscience and biblical authority over papal and council authority.", "id": "fc17"}, {"front": "Who protected Martin Luther after he was declared an outlaw by Emperor Charles V?", "back": "Frederick the Wise, Elector of Saxony, arranged for Luther to be 'kidnapped' by friendly knights and hidden in Wartburg Castle, protecting him from imperial decree.", "id": "fc18"}, {"front": "What significant work did Luther accomplish while hiding in Wartburg Castle?", "back": "While hidden in Wartburg Castle for a year, Luther translated the entire New Testament into German in just eleven weeks, making the Bible accessible to ordinary people in their vernacular language.", "id": "fc19"}, {"front": "Define 'sola scriptura' and explain its revolutionary implication.", "back": "'Sola scriptura' is Latin for 'by Scripture alone.' It's the doctrine that the Bible is the sole, supreme, and final authority for Christian faith and practice. Its revolutionary implication was that if Scripture is the highest authority, every Christian who can read should be able to read and interpret it.", "id": "fc20"}, {"front": "Define 'sola gratia' and how it challenged medieval penitential practices.", "back": "'Sola gratia' is Latin for 'by grace alone.' It is the doctrine that salvation is entirely God's free and undeserved gift, not the result of human merit, penance, pilgrimage, or any other human effort. It directly challenged the medieval penitential system, including indulgences.", "id": "fc21"}, {"front": "How did the doctrine of 'sola scriptura' impact Christian practice?", "back": "By asserting the Bible as the final authority, 'sola scriptura' encouraged individual study of Scripture, led to widespread translation of the Bible into vernacular languages, and diminished the unquestioned authority of the Pope and Church tradition.", "id": "fc22"}, {"front": "Who was Ulrich Zwingli, and what was his role in the Reformation?", "back": "Ulrich Zwingli (1484–1531) was a reformer in Zurich, Switzerland, who began reforming the church in his city around 1519, independently of Luther. He died fighting alongside Protestant troops against Catholic Swiss cantons.", "id": "fc23"}, {"front": "Who was John Calvin, and what were some key aspects of the theological system known as 'Calvinism'?", "back": "John Calvin (1509–1564) was a French lawyer who established a reformed Christian community in Geneva, Switzerland. Calvinism emphasized the absolute sovereignty of God, the total depravity of human nature, and the doctrine of predestination.", "id": "fc24"}, {"front": "Define 'predestination' as emphasized by John Calvin.", "back": "Predestination is the theological doctrine, emphasized by John Calvin, that God from eternity has chosen ('elected') those who will be saved—not on the basis of any foreseen faith or merit on their part, but solely according to His own sovereign will and purpose.", "id": "fc25"}, {"front": "Compare the factors that led to the suppression of Wycliffe's and Hus's movements with why Luther's movement succeeded where theirs had failed.", "back": "Wycliffe and Hus lacked the printing press, which made their ideas easier for the Church to suppress. Luther's movement, in contrast, was amplified by the rapid dissemination of his ideas through print, making it impossible to silence him in the same way.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
