<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why are primary sources particularly important for understanding the Protestant Reformation?", "back": "The Reformation was an 'argument in words,' meaning primary sources (sermons, letters, books) provide the direct voices and arguments of the Reformers themselves."}, {"front": "What were the 'Ninety-Five Theses'?", "back": "Martin Luther's ninety-five arguments challenging the theological basis of the sale of indulgences, written in 1517."}, {"front": "How did the printing press affect the impact of Luther's Ninety-Five Theses?", "back": "While Luther intended them for scholarly debate, the printing press ensured they reached a much wider audience, accelerating the Reformation."}, {"front": "According to Luther's Thesis 1, what should be the continuous characteristic of a believer's life?", "back": "The entire life of believers should be one of repentance."}, {"front": "Which of Luther's Ninety-Five Theses directly challenged the popular belief that money could release souls from purgatory?", "back": "Thesis 27: 'They preach mere human folly who say that as soon as the money clinks in the chest, the soul flies out of purgatory.'"}, {"front": "What did Luther identify as 'the true treasure of the church' in Thesis 62?", "back": "The most holy Gospel of the grace and glory of God."}, {"front": "What 'political jab' did Luther make in Thesis 86 regarding papal wealth?", "back": "He questioned why the Pope, whose wealth exceeded the richest, did not build St. Peter's Basilica with his own money rather than that of poor believers."}, {"front": "What was the main purpose of Luther's *Address to the Christian Nobility of the German Nation* (1520)?", "back": "It was an appeal to German princes, arguing they had the right and responsibility to reform the Church if the hierarchy would not."}, {"front": "What were the 'three walls' that Luther claimed the Roman party used to defend itself from reform?", "back": "1. Temporal power has no jurisdiction over spiritual. 2. The Pope alone interprets Scripture. 3. Only the Pope can call a council."}, {"front": "What biblical imagery did Luther use when discussing the 'three walls,' and what did it symbolize?", "back": "He referred to the 'walls of Jericho,' casting reformers as a new Joshua tearing down walls protecting corruption."}, {"front": "How did John Calvin's theological style differ from Martin Luther's?", "back": "Calvin was systematic and precise, while Luther was fiery and explosive."}, {"front": "What was *The Institutes of the Christian Religion*?", "back": "John Calvin's comprehensive theological textbook, which presented a careful and organized account of Protestant doctrine, first published in 1536."}, {"front": "Define 'predestination' as described by John Calvin.", "back": "God's eternal decree by which He determined what would happen to every person, specifically that some are preordained to eternal life and others to eternal damnation."}, {"front": "How did Calvin's doctrine of predestination connect to Luther's concept of *sola gratia* ('by grace alone')?", "back": "Both emphasized that salvation is entirely God's work, not human merit. Calvin extended this by asserting God's sovereign and eternal choice as the basis for who receives this grace."}, {"front": "Who was Thomas Cranmer, and what was his major contribution to the English Reformation?", "back": "Archbishop of Canterbury under Henry VIII and Edward VI, he was the architect of the English Reformation's worship life, most notably producing *The Book of Common Prayer*."}, {"front": "What was *The Book of Common Prayer*?", "back": "A liturgy in English (1549) that gave the English church a distinctive worship style, combining Reformed theology with the beauty of traditional Latin liturgy."}, {"front": "Beyond worship, what was a significant cultural impact of *The Book of Common Prayer*?", "back": "Its elegant prose style profoundly influenced English writing, almost as much as the King James Bible."}, {"front": "What theological statement is embedded in the opening words of the Collect for Purity ('unto whom all hearts be open, all desires known, and from whom no secrets are hid')?", "back": "It asserts that God is omniscient, knowing all human thoughts and desires, implying that sincerity and honesty are essential in prayer."}, {"front": "How does the General Confession from *The Book of Common Prayer* reflect the doctrine of *sola gratia* ('by grace alone')?", "back": "It includes the line 'And there is no health in us,' indicating humanity's complete inability to earn salvation and dependence solely on God's mercy."}, {"front": "How does the General Confession's phrasing ('We have left undone those things which we ought to have done; And we have done those things which we ought not to have done') connect to Luther's Thesis 1?", "back": "Both imply a continuous need for repentance and acknowledge humanity's inherent fallen nature and ongoing sinfulness, aligning with the idea that Christian life is one of perpetual repentance."}, {"front": "What was the ultimate fate of Thomas Cranmer, and what did his final actions signify?", "back": "He was burned at the stake for his Protestant faith under Mary I. After initially recanting under torture, he recanted his recantation at his execution, placing the hand that signed it into the flames first as a symbol of remorse and steadfast faith."}, {"front": "Based on historical understanding of the early Church, how does Luther's argument about the gradual development of papal supremacy hold merit?", "back": "Luther's argument that the early Church did not recognize the Pope's supreme authority aligns with historical evidence that papal power developed gradually over centuries, rather than being an original, universally accepted doctrine."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
