<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did urban life in Western Europe during the High Middle Ages (11th-13th centuries) differ from the early Middle Ages?", "back": "The early Middle Ages saw cities vanish, replaced by villages, monasteries, and castles, with local trade. The High Middle Ages saw the revival of genuine urban life with cities of tens of thousands, bustling markets, craftsmen, and centers of trade."}, {"front": "What key factors contributed to the revival of towns and urban life in Western Europe starting in the 11th century?", "back": "Population growth, agricultural improvements (heavy plow, three-field system, horse collar), and the revival of trade along old Roman and river routes."}, {"front": "Define \"commune\" in the context of medieval Europe.", "back": "A self-governing town or city, typically granted a charter by a king or lord, allowing it to manage its own affairs, elect officers, hold courts, and collect taxes."}, {"front": "Explain the significance of the German proverb \"Stadtluft macht frei\" (\"Town air makes you free\") during the High Middle Ages.", "back": "It signified that a serf who lived in a chartered town for a year and a day would gain legal freedom, drawing people from the feudal countryside to urban centers."}, {"front": "What was a medieval \"guild\"?", "back": "An association of craftsmen or merchants in the same trade, organized to regulate their craft by setting standards for quality, controlling entry into the trade, setting prices, training workers, and protecting members."}, {"front": "Name and describe the three ranks within a medieval craft guild.", "back": "1. Apprentice: Learner, received board, lodging, and training but no wages for 7+ years. 2. Journeyman: Paid by the day, traveled to improve skills, had to produce a 'masterpiece.' 3. Master: Full guild member, allowed to open a shop and take apprentices."}, {"front": "How did the guild system function as a \"quality-control mechanism\" in medieval society?", "back": "Guilds set strict standards for goods, punishing members who produced substandard or adulterated products. Their mark on a product served as a guarantee of quality in a world without modern regulations."}, {"front": "What significant innovations did medieval merchant guilds contribute to the economy?", "back": "They created the first banks, developed letters of credit to facilitate long-distance trade, and eventually formed the first joint-stock companies, serving as direct ancestors of modern capitalism."}, {"front": "What were the Champagne Fairs, and why were they important?", "back": "A series of six annual fairs held in the County of Champagne (France) that served as the commercial crossroads of Europe, attracting merchants from across the known world to trade luxury goods and develop financial instruments."}, {"front": "Identify some key financial innovations that emerged or were refined at the Champagne Fairs.", "back": "The bill of exchange (a written promise to pay at a future date), double-entry bookkeeping, and early forms of insurance."}, {"front": "From what origin does the word \"bankrupt\" derive?", "back": "It comes from the Italian \"banca rotta\" (\"broken bench\"), referring to a moneychanger whose trading bench was literally broken in the market as a sign of dishonor if he could not pay his debts."}, {"front": "How did the great cathedrals of the High Middle Ages serve as \"arguments\"?", "back": "Every element of their design expressed a theological idea: height symbolized the aspiration of the soul toward God, light represented God's presence, and images educated illiterate worshippers."}, {"front": "What was the Gothic cathedral's major innovation regarding light, and what theological idea did it express?", "back": "Gothic cathedrals replaced the thick, dark walls of Romanesque style with enormous stained-glass windows, creating \"walls of glass.\" This expressed the belief that God was pure light and physical light was the closest thing in creation to the divine nature."}, {"front": "Why were images, such as carvings and stained-glass windows, so important in medieval cathedrals?", "back": "They served as \"the Bible of the poor,\" providing a visual narrative of Scripture and Church history for worshippers who could not read."}, {"front": "Beyond their religious and artistic significance, how did cathedral construction impact the medieval economy?", "back": "They were economic engines, creating work for various craftsmen (stonemasons, glassworkers), business for merchants, and pilgrim traffic for the surrounding city."}, {"front": "How did the medieval university originate?", "back": "It grew out of cathedral schools, which trained clergy. As these schools attracted more students and renowned teachers, they evolved into permanent \"universitas magistrorum et scholarium\" (corporations of masters and scholars) with royal or papal charters."}, {"front": "What does \"universitas magistrorum et scholarium\" mean in the context of the medieval university?", "back": "It means \"corporation of masters and scholars,\" referring to the self-governing institutional structure of medieval universities that had the right to grant degrees."}, {"front": "What was unique about the University of Bologna, and what did it specialize in?", "back": "Bologna specialized in law, particularly Roman law, and was unusual because its students, rather than masters, ran the university. Its students were often older men already working in legal or government roles."}, {"front": "What was the University of Paris primarily known for during the High Middle Ages?", "back": "Paris became the theological center of Christendom, where figures like Thomas Aquinas taught, the scholastic method was refined, and major debates on faith and reason took place."}, {"front": "Describe the \"scholastic method\" used in medieval universities.", "back": "An intellectual method involving stating a question (quaestio), listing objections to a proposed answer, providing a determination (the master's answer with full reasoning), and then replying to each objection. It was designed for rigorous examination of every claim."}, {"front": "What was the initial curriculum for students at a medieval university, known as the seven liberal arts?", "back": "It began with the trivium (grammar, rhetoric, logic) and then the quadrivium (arithmetic, geometry, music, astronomy)."}, {"front": "Explain the significance of the \"degree that traveled\" concept in medieval universities.", "back": "Degrees were recognized throughout Latin Christendom, creating an international academic community (the 'republic of letters') where scholars shared a common language (Latin), method, and texts, directly influencing the modern university system."}, {"front": "What was the Silk Road?", "back": "A vast network of overland and maritime trade routes connecting China, Central Asia, Persia, the Indian Ocean, and the Mediterranean world, facilitating the exchange of goods, ideas, technologies, and diseases."}, {"front": "How did the Pax Mongolica impact trade along the Silk Road?", "back": "It created a brief window when a single empire controlled most of the route, making travel safer and trade more predictable than it had been in centuries, thereby boosting East-West exchange."}, {"front": "Name at least three significant items or ideas that came to Europe via the Silk Road and profoundly impacted European society.", "back": "Silk and spices (luxury goods), paper (cheaper books, replaced parchment), gunpowder (cannon/firearms, changed military), and mathematical ideas (Hindu-Arabic numerals, concept of zero)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
