<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What factors contributed to the revival of urban life in Western Europe by the 11th century?", "back": "Population growth, agricultural improvements (heavy plow, three-field system, horse collar), and renewed trade along old Roman roads and river routes led to the growth of towns."}, {"front": "How did cities in Western Europe change after the fall of Rome in 476?", "back": "Busy, commercial cities largely vanished, and Europe became a world of villages, monasteries, and castles, with people living on manors and trading locally."}, {"front": "Define 'commune' in the context of medieval Europe.", "back": "A self-governing town or city, typically granted a charter by a king or lord, giving it the right to manage its own affairs, elect officers, hold courts, and collect taxes."}, {"front": "Explain the significance of the German proverb 'Stadtluft macht frei.'", "back": "Meaning 'Town air makes you free,' it signified that a serf who lived in a chartered town for a year and a day would gain legal freedom, drawing people from the countryside to towns."}, {"front": "What was the social impact of the growth of communes during the High Middle Ages?", "back": "It was one of the most important developments, creating a new class of merchants and craftsmen with their own political rights, distinct from the feudal system."}, {"front": "What was a 'guild' in medieval towns and what were its primary purposes?", "back": "A guild was an association of craftsmen or merchants in the same trade, organized to regulate quality, set prices, train workers, protect members from outside competition, and provide social support."}, {"front": "List the three ranks within a medieval guild, in order.", "back": "Apprentice, Journeyman, and Master."}, {"front": "Describe the role and typical duration of an 'apprentice' in a medieval guild.", "back": "An apprentice was usually a boy placed in a master craftsman's household to learn the trade, receiving board, lodging, and training (but no wages) for seven years or more."}, {"front": "How did a 'journeyman' become a 'master' in a medieval guild?", "back": "A journeyman, after completing apprenticeship and being paid daily, traveled to improve skills. To become a master, they had to produce a 'masterpiece'—a work of exceptional quality judged by guild masters."}, {"front": "How did the guild system ensure quality control for products in the High Middle Ages?", "back": "Guilds set strict standards and punished members for producing inferior goods. A guild's mark on a product served as a guarantee of quality, similar to a trusted brand name today."}, {"front": "Beyond craftsmen's guilds, what important financial innovations were pioneered by merchant guilds?", "back": "Merchant guilds created the first banks, letters of credit (eliminating the need to carry heavy coin), and eventually the first joint-stock companies, making them direct ancestors of modern capitalism."}, {"front": "What were the Champagne Fairs and why were they significant?", "back": "A series of six annual fairs in the County of Champagne (northeastern France) that served as the commercial crossroads of Europe, attracting merchants from across the known world to trade luxury goods."}, {"front": "Name three financial instruments or practices that emerged from the Champagne Fairs, particularly developed by Italian merchants.", "back": "The bill of exchange, double-entry bookkeeping, and early forms of insurance. The word 'bankrupt' (banca rotta) also originated from these fairs."}, {"front": "How did the height of Gothic cathedrals express a theological idea?", "back": "The soaring height (sixty to over a hundred feet) of the nave expressed the aspiration of the soul toward God, making observers feel small but uplifted towards the divine."}, {"front": "How did medieval cathedrals use light to express theological ideas, especially in the Gothic style?", "back": "Medieval theologians believed God was pure light. Gothic cathedrals replaced thick Romanesque walls with enormous stained-glass windows, flooding the interior with colored light, making God's presence and theology visible."}, {"front": "What was the purpose of the images (carvings, stained glass) found in medieval cathedrals?", "back": "These images served as 'the Bible of the poor,' educating illiterate worshippers by providing a visual narrative of Scripture and Church history."}, {"front": "What was the economic impact of cathedral building during the High Middle Ages?", "back": "Cathedrals were economic engines, creating extensive work for various craftsmen (stonemasons, glassworkers, carpenters) and business for merchants, while also attracting pilgrim traffic to the city."}, {"front": "What was the origin of the medieval university?", "back": "Medieval universities grew out of cathedral schools, institutions attached to cathedrals that trained clergy in Latin, theology, and the liberal arts."}, {"front": "What did a 'universitas magistrorum et scholarium' signify in the context of medieval universities?", "back": "It meant 'corporation of masters and scholars,' referring to the organized body of teachers and students that received a charter from a pope or king to grant degrees and govern itself."}, {"front": "Name two prominent medieval universities and specify their areas of specialization.", "back": "Bologna specialized in law (particularly Roman law), while Paris became the theological center of Christendom."}, {"front": "Describe the 'scholastic method' characteristic of medieval universities.", "back": "This intellectual method involved stating a question (quaestio), listing objections, providing a determination (the master's reasoned answer), and then replying to each objection, designed for rigorous examination of claims."}, {"front": "What were the 'seven liberal arts' that formed the basic curriculum of a medieval university student?", "back": "First, the trivium (grammar, rhetoric, logic), and then the quadrivium (arithmetic, geometry, music, astronomy)."}, {"front": "What was the significance of medieval university degrees being recognized throughout Latin Christendom?", "back": "It created the first truly international academic community—the 'republic of letters'—with scholars sharing a common language (Latin), method (scholastic disputation), and set of texts, from which modern universities descend."}, {"front": "What was the 'Silk Road' and what specific development in the 13th century facilitated its trade?", "back": "The Silk Road was a network of overland and maritime trade routes connecting China and Southeast Asia to the Mediterranean. The Pax Mongolica (Mongol peace) in the 13th century made travel safer and trade more predictable along much of the route."}, {"front": "Name three significant goods or ideas that came to Europe via the Silk Road and briefly explain their impact.", "back": "1. **Paper:** Replaced expensive parchment, making books cheaper and more plentiful. 2. **Gunpowder:** Adapted for cannons and firearms, fatally disrupting the feudal military order. 3. **Mathematical ideas:** The Hindu-Arabic numeral system (including zero) dramatically simplified calculation. (Also silk and spices, which generated fortunes for Italian trading cities)."}, {"front": "How did the University of Oxford develop and what was a notable area of its study?", "back": "Oxford developed partly from scholars who left Paris and established its own tradition, particularly in natural philosophy (early science), with figures like Roger Bacon and the later Oxford Calculators."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
