<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What characterized the literature of the High Middle Ages, as introduced in the section?", "back": "It was ambitious and diverse, ranging from epic poems mapping the spiritual universe to detailed theological treatises, vast travelogues, and hymns to creation."}, {"front": "List the four prominent literary figures discussed in this section of the High Middle Ages.", "back": "Dante Alighieri, Thomas Aquinas, Marco Polo, and Francis of Assisi."}, {"front": "How did the literary approaches of Dante, Aquinas, Marco Polo, and Francis of Assisi differ, despite being from the same era?", "back": "Aquinas used precise philosophical argument, Dante used soaring poetic imagery, Marco Polo used careful observation, and Francis used simple, grateful language."}, {"front": "Who was Dante Alighieri, and what is his most famous work?", "back": "Dante Alighieri was a Florentine poet, philosopher, and politician, exiled from his city. His most famous work is 'The Divine Comedy'."}, {"front": "What is the three-part journey described in Dante's 'The Divine Comedy'?", "back": "The journey takes Dante through Hell (Inferno), Purgatory (Purgatorio), and Heaven (Paradiso)."}, {"front": "What was a revolutionary decision Dante made regarding the language of 'The Divine Comedy'?", "back": "He wrote it in the Tuscan dialect of Italian, the everyday language, instead of Latin, asserting that Christian truths deserved expression in common speech. This later became the model for standard Italian."}, {"front": "Who is Dante's primary guide through Hell and Purgatory in 'The Divine Comedy'?", "back": "The Roman poet Virgil."}, {"front": "Why can Virgil not guide Dante all the way to Heaven?", "back": "Virgil, representing classical reason, is a virtuous pagan in Limbo and cannot enter Heaven as he lived before Christ. His guidance is incomplete without Christian faith."}, {"front": "What famous inscription is found above the Gate of Hell in Dante's 'Inferno'?", "back": "'All hope abandon, ye who enter in!'"}, {"front": "Explain the 'Logic of Dante's Hell'.", "back": "Dante's Hell is organized on the principle that punishments fit the crimes. Sin is a disorder of the soul, and the eternal punishments are logical consequences of the sinner's earthly choices."}, {"front": "How does Dante portray Satan at the bottom of Hell?", "back": "Satan is depicted as a grotesque, weeping, frozen figure with three faces and six eyes, mindlessly chewing the greatest traitors (Judas, Brutus, Cassius)."}, {"front": "What theological point does Dante convey through his depiction of Satan?", "back": "He shows that the ultimate rejection of God leads not to heroic defiance, but to nothingness and helplessness. Evil is the absence of good."}, {"front": "According to Dante's organization of Hell, what is considered the worst sin?", "back": "Betrayal, with Judas Iscariot placed in Satan's central mouth."}, {"front": "What is the title of Thomas Aquinas's most important work, and what was its purpose?", "back": "His major work is 'Summa Theologica', a systematic attempt to answer every important theological and philosophical question using logical argument."}, {"front": "Describe the unique format of the 'Summa Theologica'.", "back": "It presents each question, states objections, gives a reply (his own argument), and then answers each objection individually."}, {"front": "What are 'The Five Ways' (quinque viae) in Aquinas's 'Summa Theologica'?", "back": "They are Aquinas's five logical arguments for the existence of God, derived from observable facts about the world."}, {"front": "What is the basis for Aquinas's arguments in 'The Five Ways'?", "back": "They are arguments from reason alone, starting from observations anyone can make about the natural world, rather than from Scripture or Church authority."}, {"front": "Explain Aquinas's 'Argument from Motion' for the existence of God.", "back": "Everything in motion is put in motion by another. This chain cannot go on to infinity, so there must be a 'first mover' put in motion by no other, which everyone understands to be God."}, {"front": "Which ancient philosopher significantly influenced Aquinas's 'Argument from Motion'?", "back": "Aristotle, particularly his concept of the 'unmoved mover'."}, {"front": "What was Aquinas demonstrating by using reason to argue for God's existence?", "back": "He was showing that reason, properly used, leads to the same conclusions as faith, and that there is no contradiction between natural philosophy (science) and Christian theology."}, {"front": "What is Marco Polo's famous work, and how was it produced?", "back": "His famous work is 'The Travels', dictated to Rustichello of Pisa in 1298 while both were prisoners of war in Genoa."}, {"front": "What regions did Marco Polo's 'Travels' describe, and what was its impact on Europeans?", "back": "It described the Mongol Empire, China, Southeast Asia, Japan, India, and East Africa, providing medieval Europeans with their first detailed picture of the world east of Persia."}, {"front": "Which powerful Asian ruler did Marco Polo serve for many years?", "back": "Kublai Khan, the Emperor of the Mongol Empire."}, {"front": "What is Francis of Assisi's contribution to High Middle Ages literature, as mentioned in the text?", "back": "He sang a hymn to creation that is still sung today, demonstrating a simple, grateful love for God's creation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
