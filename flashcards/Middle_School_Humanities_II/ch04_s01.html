<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a flying buttress, and how did it impact Gothic architecture?", "back": "A flying buttress is an arched stone support that transfers the outward thrust of a heavy stone vault to an outer pier. It allowed Gothic architects to thin walls, fill them with large windows, and build to extraordinary heights previously impossible."}, {"front": "What time period does the term 'High Middle Ages' generally refer to, and what was a defining characteristic of this era?", "back": "The High Middle Ages refers roughly to 1150–1350. It was characterized by significant 'building upward' in cathedrals, universities, trade networks, and philosophical systems that sought to integrate faith and reason."}, {"front": "What catastrophic event brought a sudden end to the High Middle Ages?", "back": "The High Middle Ages came to a sudden end in 1347 with the arrival of the Black Death (bubonic plague) in Sicily."}, {"front": "Define Gothic architecture and list its key distinguishing features.", "back": "Gothic architecture was the dominant style of cathedrals in the High Middle Ages, characterized by the pointed arch, the ribbed vault, and the flying buttress. These features allowed for extraordinary height and large stained-glass windows."}, {"front": "How did medieval theologians use light in Gothic cathedrals like Chartres to convey spiritual meaning?", "back": "They believed light itself was a symbol of God. Stained-glass windows filled the interior with colored light, transforming the physical space into a vision of the New Jerusalem, meant to be experienced as divine presence and grace."}, {"front": "Beyond being places of worship, what deeper purposes did cathedrals serve in the High Middle Ages, reflecting the medieval worldview?", "back": "Cathedrals were the most important buildings in a city, acts of worship built by entire communities for generations. They embodied a sacramental worldview where physical spaces mediated spiritual realities, teaching scripture and making people feel small before God."}, {"front": "What was a 'university' in the medieval sense, and where did the first ones emerge?", "back": "From the Latin 'universitas' (a corporation), a medieval university was a corporation of scholars (students and teachers) chartered by a pope or king. The first appeared in the late 12th/early 13th centuries, notably Bologna (law), Paris (theology), and Oxford (theology and philosophy)."}, {"front": "Describe the two main curricula of medieval universities, the trivium and the quadrivium.", "back": "The trivium ('three roads') covered the arts of language: grammar, rhetoric, and logic. The quadrivium ('four roads') covered the arts of number: arithmetic, geometry, music, and astronomy. Together, they formed the seven liberal arts, pointing towards theology."}, {"front": "What subjects comprised the 'trivium' in medieval education?", "back": "The trivium consisted of grammar (learning to read and write Latin correctly), rhetoric (the art of speaking and writing persuasively), and logic (the art of valid argument)."}, {"front": "Explain the 'scholastic method' used by medieval university teachers.", "back": "The scholastic method was rigorous: a master would state a proposition, present all arguments for and against it, and then reason towards a resolution. It emphasized systematic argument and critical thinking rather than accepting authority without proof."}, {"front": "What is scholasticism?", "back": "Scholasticism was the intellectual method and tradition of medieval universities, characterized by systematic argumentation, careful distinctions, and the attempt to reconcile classical philosophy (especially Aristotle) with Christian theology. It viewed faith and reason as companions."}, {"front": "Who was Thomas Aquinas, and what was his major intellectual achievement?", "back": "Thomas Aquinas (1225–1274) was a Dominican friar and the greatest scholastic theologian. His major achievement was integrating Aristotle's logic and natural philosophy into Christian theology, demonstrating how reason could serve faith."}, {"front": "How did Aquinas reconcile the philosophy of Aristotle with Christian theology?", "back": "Aquinas argued that Aristotle's rational methods, far from threatening Christianity, could actually support it. He believed correct reasoning would lead to conclusions that faith already knew, confident that truth is one, whether discovered by reason or revealed by faith."}, {"front": "What were Aquinas's 'Five Ways,' and upon what did they base their arguments for God's existence?", "back": "The 'Five Ways' are Thomas Aquinas's five logical arguments for the existence of God. They are based entirely on observation of the natural world and logical reasoning (e.g., from motion to an unmoved mover, from cause to an uncaused cause), not on Scripture or Church authority."}, {"front": "According to Thomas Aquinas, what is the relationship between faith and reason?", "back": "Aquinas insisted that faith and reason are two distinct paths to truth, leading to the same destination. Reason can discover many truths about God, while faith reveals others (like the Trinity). They do not contradict each other, as God is the author of both the natural world and Scripture."}, {"front": "Who was Francis of Assisi, and what characterized his approach to Christian life?", "back": "Francis of Assisi (c. 1181–1226) was the son of a wealthy merchant who radically embraced poverty, literally obeying Jesus' command to sell everything. His approach was characterized by joy, preaching the Gospel, and celebrating creation as a gift from God."}, {"front": "How did the Franciscan Order differ from older monastic orders like the Benedictines in its mission and lifestyle?", "back": "Unlike older monastic orders (e.g., Benedictines) who retreated from the world into monasteries, Franciscans were 'friars' (traveling preachers) who owned nothing, lived on alms, and went 'into the world'—into city streets, markets, and leper colonies—to preach among the poor and sick."}, {"front": "How did Francis of Assisi express his connection to creation and God's love?", "back": "Francis expressed his connection through joyful preaching, even to birds, and by calling the sun his brother and the moon his sister. His 'Canticle of the Sun' is a famous poem celebrating creation as a gift from God, flowing with gratitude and wonder."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
