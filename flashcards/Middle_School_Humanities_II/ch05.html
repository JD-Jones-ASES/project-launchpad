<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What were the three overlapping catastrophes of the Late Medieval Crisis?", "back": "The Great Famine (1315–1322), the Black Death (1347–1353), and the Hundred Years' War (1337–1453). Together they shook every institution of medieval civilization.", "id": "fc01"}, {"front": "What is the Black Death?", "back": "The epidemic of bubonic plague (caused by Yersinia pestis) that swept through Europe, North Africa, and the Middle East between 1347 and 1353. It killed an estimated 30–50% of Europe's population — the worst demographic catastrophe in recorded Western history.", "id": "fc02"}, {"front": "How did the Black Death spread to Europe?", "back": "The plague originated in Central Asia, spread along the Silk Road carried by infected rodents, reached Black Sea ports, and arrived in Sicily in 1347 via Genoese trading ships from the Crimea. It then spread along European trade routes — reaching England by 1348.", "id": "fc03"}, {"front": "What are the three forms of bubonic plague?", "back": "Bubonic plague (swollen lymph nodes, flea bites, kills 60–70%); pneumonic plague (airborne, attacks lungs, almost always fatal); septicemic plague (blood infection, rarest, kills within hours — the most deadly form).", "id": "fc04"}, {"front": "How many people died in Europe from the Black Death?", "back": "Europe's population fell from roughly 75 million before the plague to approximately 45–50 million by 1400. In some regions (England, France, parts of Italy), the death rate was as high as 50%. Some villages were entirely abandoned.", "id": "fc05"}, {"front": "Why was medieval medicine helpless against the Black Death?", "back": "Medieval medicine had no understanding of bacteria or viruses. Physicians believed the plague was caused by poisoned air (miasma), bad planetary alignments, or divine judgment. Treatments like bleeding and herbal remedies were useless.", "id": "fc06"}, {"front": "How did the Black Death end serfdom in Western Europe?", "back": "When a third of the workforce died, the surviving peasants had economic power they had never had before. They demanded higher wages or freedom to leave the manor. Landlords could not ultimately stop the change — they needed workers too badly to enforce the old rules.", "id": "fc07"}, {"front": "What is serfdom?", "back": "The condition of peasants legally bound to a lord's land who could not leave without permission. Serfs owed labor service and payments in exchange for land use. Serfdom was the economic foundation of feudalism in Western Europe; it largely collapsed after the Black Death.", "id": "fc08"}, {"front": "Who were the flagellants?", "back": "Religious groups who publicly whipped themselves (flagellare = to whip) as acts of penance during the Black Death. They believed extreme self-punishment would appease God's wrath. The movement swept through Germany and the Low Countries in 1349; Pope Clement VI condemned it.", "id": "fc09"}, {"front": "How were Jewish communities scapegoated during the Black Death?", "back": "Some communities accused Jews of poisoning wells to cause the plague. This was entirely false — Jewish communities died at the same rate as their neighbors — but it led to horrific massacres in France, Germany, and Switzerland. Pope Clement VI specifically condemned these accusations.", "id": "fc10"}, {"front": "What was the Hundred Years' War?", "back": "A series of conflicts between England and France from 1337 to 1453, fought over the English claim to the French throne. Despite major English victories (Crécy, Poitiers, Agincourt), France ultimately expelled the English from all territories except Calais by 1453.", "id": "fc11"}, {"front": "What was the longbow, and why was it militarily revolutionary?", "back": "The English and Welsh war bow — about six feet tall, made from yew wood. Trained archers could fire 10–12 arrows per minute with enough power to penetrate armor at up to 300 yards. It gave English armies decisive advantages at Crécy (1346), Poitiers (1356), and Agincourt (1415).", "id": "fc12"}, {"front": "What happened at the Battle of Crécy (1346)?", "back": "A large French cavalry force attacked a smaller English army in the traditional way — armored knights charging on horseback. English longbowmen cut them to pieces before they reached the English lines. It marked the beginning of the end of the armored knight as the decisive military unit.", "id": "fc13"}, {"front": "What happened at the Battle of Agincourt (1415)?", "back": "Henry V's tired, outnumbered English army faced a much larger French force. The French charged across a muddy field in heavy armor; English longbowmen cut them down catastrophically. Henry captured much of France and married the French king's daughter.", "id": "fc14"}, {"front": "Who was Joan of Arc?", "back": "A French peasant girl (c. 1412–1431) from Domrémy who claimed visions from Saints Michael, Catherine, and Margaret commanding her to drive the English from France. She lifted the siege of Orléans (1429), escorted Charles VII to coronation at Reims, was captured and burned at the stake in 1431 at approximately age 19.", "id": "fc15"}, {"front": "How was Joan of Arc's trial unjust?", "back": "She was tried before an ecclesiastical court on charges of heresy (primarily for wearing men's clothing). The judges were her political enemies. She was burned May 30, 1431 in Rouen. The verdict was overturned in 1456; she was beatified in 1909 and canonized in 1920.", "id": "fc16"}, {"front": "What was the Avignon Papacy?", "back": "The period from 1309 to 1377 during which the papacy was located at Avignon in southern France under heavy French influence. All seven Avignon popes were French. Critics called it the 'Babylonian Captivity of the Church,' arguing the papacy had become a tool of the French crown.", "id": "fc17"}, {"front": "What was the Great Western Schism?", "back": "The division of the Western Church (1378–1417) in which two, then three, rival claimants each claimed to be the true pope. Resolved at the Council of Constance (1414–1418), which deposed or obtained resignations from all claimants and elected Martin V as the single new pope.", "id": "fc18"}, {"front": "What was the doctrine of conciliarism?", "back": "The doctrine, asserted by the Council of Constance, that a general council of the Church has authority over even the pope. It resolved the Great Western Schism by allowing the council to depose rival claimants. Controversial because it challenged papal supremacy.", "id": "fc19"}, {"front": "Who was John Wycliffe?", "back": "An Oxford theologian (c. 1330–1384) who argued that Church authority rested on Scripture alone, attacked the doctrine of transubstantiation, and began translating the Bible into English. His followers were called Lollards. He died naturally in 1384; the Council of Constance posthumously condemned him and ordered his bones exhumed and burned.", "id": "fc20"}, {"front": "Who were the Lollards?", "back": "Followers of John Wycliffe who advocated Church reform, Scripture as supreme authority, and Bible translation into English. The name was a term of abuse (possibly from the Dutch lollaerd, 'mumbler'). The movement was suppressed but its ideas influenced later reformers.", "id": "fc21"}, {"front": "Who was Jan Hus?", "back": "A Czech theologian at the University of Prague (c. 1369–1415) influenced by Wycliffe. He attacked clerical corruption, simony, and indulgence sales. Summoned to the Council of Constance under a guarantee of safe conduct, then burned at the stake on July 6, 1415 — the council ruling that promises to heretics need not be kept.", "id": "fc22"}, {"front": "What were the Hussite Wars?", "back": "Religious wars in Bohemia (1419–1434) sparked by the execution of Jan Hus. Czech armies fighting under the chalice symbol (representing Hus's demand for communion in both bread and wine) repeatedly defeated crusading armies sent against them. Hus became a national hero and Reformation martyr figure.", "id": "fc23"}, {"front": "What happened on May 29, 1453?", "back": "Constantinople — capital of the Eastern Roman Empire, founded by Constantine in 330, the greatest city in Christendom — fell to Ottoman Sultan Mehmed II. The last Roman Emperor, Constantine XI, died fighting on the walls. The fall ended over a thousand years of Byzantine survival after Rome's fall in 476.", "id": "fc24"}, {"front": "What were the consequences of the fall of Constantinople for European history?", "back": "Three major consequences: (1) Greek scholars fled to Italy with ancient manuscripts, directly fueling the Renaissance; (2) the overland Silk Road trade route was disrupted, driving Portuguese and Spanish explorers to seek sea routes to Asia; (3) the millennium-long remnant of the Roman Empire finally ended.", "id": "fc25"}, {"front": "Who was Jean Froissart?", "back": "A French-speaking chronicler (c. 1337–1405) who spent his career at courts across England, Scotland, and France, interviewing knights about battles. His Chronicles cover the Hundred Years' War. He admired knightly courage even as he recorded the futility and brutality of the war.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
