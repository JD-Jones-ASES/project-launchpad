<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Catholic Church's influence and power in Europe by 1500?", "back": "By 1500, the Catholic Church was the most powerful organization in Europe, owning one-third of German land, running hospitals, universities, and courts, collecting taxes, and wielding authority that could humble emperors."}, {"front": "Describe the state of the Catholic Church's leadership and practices on the eve of the Reformation, particularly regarding corruption.", "back": "On the eve of the Reformation, the Church suffered from widespread corruption, including simony (purchasing church offices), illiterate parish priests, and monasteries that had become comfortable estates for the wealthy."}, {"front": "Define 'simony' and explain its significance to the Church's corruption.", "back": "Simony is the buying or selling of church offices, appointments, or sacraments. It was a significant form of corruption where wealthy families paid to have relatives appointed to positions like bishop or abbot, often regardless of spiritual qualification."}, {"front": "Who were two significant figures who criticized Church authority and practices before Martin Luther, and what was their fate?", "back": "John Wycliffe (England, died 1384) argued against Church property ownership and for Scripture as final authority. Jan Hus (Bohemia) preached similar ideas and was burned at the Council of Constance in 1415."}, {"front": "What key technological innovation, absent during the time of Wycliffe and Hus, made it impossible to silence Martin Luther in 1517?", "back": "The printing press was the key difference. It allowed Luther's Ninety-Five Theses to be printed and distributed across Germany and Europe within weeks, making his ideas impossible to suppress like earlier reformers."}, {"front": "What was an indulgence, and what did the Catholic Church claim it could do for souls?", "back": "An indulgence was a certificate issued by the Catholic Church that claimed to reduce the amount of time a soul would spend in purgatory for sins already forgiven."}, {"front": "Explain the Catholic doctrine of 'purgatory' as it relates to the sale of indulgences.", "back": "Purgatory, in Catholic teaching, is a state of purification after death for souls who died in God's grace but needed to be cleansed of the effects of sin before entering heaven. Indulgences were believed to reduce time spent there."}, {"front": "Who was Johann Tetzel, and what role did his actions play in igniting the Reformation?", "back": "Johann Tetzel was a Dominican friar who, in 1517, was selling indulgences near Wittenberg to raise money for St. Peter's Basilica. His crude commercialism infuriated Martin Luther and prompted the Ninety-Five Theses."}, {"front": "What was Martin Luther's background before he became a monk and theology professor?", "back": "Martin Luther was born in Germany to a copper miner who intended him to be a lawyer. He studied law but, after a terrifying thunderstorm, vowed to St. Anne and became an Augustinian monk."}, {"front": "What theological struggle did Martin Luther experience as a monk and priest, and what biblical passage led him to his central realization about salvation?", "back": "Luther agonized over how a sinful human could stand before a holy God, finding despair in traditional answers. He found his answer in Romans 1:17 ('the righteous shall live by faith'), leading him to believe in salvation by faith alone."}, {"front": "Explain Martin Luther's foundational doctrine of 'sola fide'.", "back": "Sola fide, Latin for 'by faith alone,' is Luther's doctrine that a person is justified (made right with God) solely by faith in Jesus Christ, not by good works, penances, or indulgences."}, {"front": "What were the Ninety-Five Theses, and what was Luther's initial intention in posting or sending them in October 1517?", "back": "The Ninety-Five Theses were a formal list of arguments challenging the theological basis of indulgences, written in Latin. Luther's initial intention was to start an academic debate, not to break up the Church."}, {"front": "How did Pope Leo X respond to Luther's challenges before the Diet of Worms?", "back": "In 1520, Pope Leo X issued a papal bull (Exsurge Domine) threatening Luther with excommunication unless he withdrew his writings. Luther publicly burned the bull in Wittenberg."}, {"front": "What was the Diet of Worms, and what crucial choice did Martin Luther make there?", "back": "The Diet of Worms was a formal assembly of the Holy Roman Empire in 1521, presided over by Emperor Charles V. Martin Luther was summoned there and refused to recant his writings, stating his conscience was bound by Scripture alone."}, {"front": "Quote the essence of Martin Luther's famous statement at the Diet of Worms, highlighting his commitment to Scripture and conscience.", "back": "Luther stated: 'Unless I am convinced by the testimony of Scripture or by clear reason... My conscience is captive to the Word of God. I cannot and will not retract anything... Here I stand. I cannot do otherwise. God help me. Amen.'"}, {"front": "Who protected Martin Luther after the Diet of Worms, and what significant work did Luther accomplish during his hiding?", "back": "Frederick the Wise, Elector of Saxony, arranged for Luther to be 'kidnapped' and hidden in Wartburg Castle. During his year in hiding, Luther translated the entire New Testament into German in just eleven weeks."}, {"front": "List and briefly explain the three Latin phrases that became the rallying cries of the Protestant Reformation.", "back": "The three 'solas' were: 1. Sola fide ('by faith alone'): salvation is received through faith. 2. Sola scriptura ('by Scripture alone'): the Bible is the final authority. 3. Sola gratia ('by grace alone'): salvation is entirely God's free gift."}, {"front": "Define 'sola scriptura' and explain its revolutionary implication for the common Christian.", "back": "Sola scriptura, 'by Scripture alone,' means the Bible is the sole and final authority for Christian faith and practice. Its revolutionary implication was that every Christian who could read should read the Bible, driving vernacular translations."}, {"front": "Explain the Reformation doctrine of 'sola gratia'.", "back": "Sola gratia, 'by grace alone,' is the doctrine that salvation is entirely God's free and undeserved gift, not the result of human merit, penance, pilgrimage, or any other human effort."}, {"front": "Who was Ulrich Zwingli, and what happened to him?", "back": "Ulrich Zwingli was a reformer in Zurich, Switzerland, who began reforming the church independently of Luther around 1519. He was killed in 1531 at the Battle of Kappel, fighting alongside Protestant troops against Catholic Swiss cantons."}, {"front": "Who was John Calvin, and what city became a center for his Reformed Christian community?", "back": "John Calvin was a French-born lawyer who became a key reformer. He settled in Geneva, Switzerland, where he established a 'godly city,' a reformed Christian community governed by biblical principles."}, {"front": "What were some key theological emphases of John Calvin's system of theology, known as Calvinism?", "back": "Calvinism emphasized the absolute sovereignty of God, the total depravity of human nature, and the doctrine of predestination."}, {"front": "Define 'predestination' as taught by John Calvin.", "back": "Predestination is the theological doctrine, emphasized by Calvin, that God from eternity has chosen ('elected') those who will be saved, not based on any foreseen faith or merit, but solely according to His own will."}, {"front": "How did Martin Luther's view of salvation fundamentally differ from the traditional medieval Catholic understanding he initially struggled with?", "back": "Luther believed salvation was a free gift from God received through 'faith alone' (sola fide), contrasting with the traditional Catholic emphasis on earning merit through good works, penance, confession, and indulgences."}, {"front": "What immediate practical impact did Luther's translation of the New Testament into German have on the common people?", "back": "Luther's translation of the New Testament into German made the Bible accessible to ordinary German-speaking people, fulfilling the 'sola scriptura' principle by allowing them to read and interpret Scripture for themselves."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
