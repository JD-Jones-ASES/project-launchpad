<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the significance of Johann Gutenberg's printing press to the spread of the Reformation?", "back": "Gutenberg's movable-type printing press (c. 1440) enabled rapid, mass production of documents, allowing Luther's ideas to spread across Germany and Europe within weeks, making them difficult to suppress."}, {"front": "How quickly did Martin Luther's Ninety-Five Theses spread across Europe after being printed?", "back": "Within two weeks, copies had spread across Germany, and within two months, Luther's name was known throughout Europe."}, {"front": "What was the quantitative impact of Martin Luther's writings on the German printing industry between 1517 and 1520?", "back": "Luther published about thirty pamphlets, selling roughly 300,000 copies, nearly doubling the annual output of the entire German printing industry in the decade before him."}, {"front": "How did the printing press change the nature of challenging authority compared to the pre-print world?", "back": "In the pre-print world, challenges could be suppressed by seizing and burning manuscripts. In the print world, multiple copies meant ideas could not be 'burned out of thousands of minds' once disseminated."}, {"front": "Define 'pamphlet' as it relates to the Reformation era.", "back": "A short, inexpensive printed booklet, typically unbound, functioning as the 'social media of the sixteenth century.' Luther mastered this form, writing in direct German accessible to ordinary people."}, {"front": "What 'simple, explosive idea' was at the heart of the Reformation's relationship with print regarding the Bible?", "back": "The idea that ordinary people should read the Bible for themselves, in their own language, which was revolutionary in 1520."}, {"front": "What was the Catholic Church's general position on Bible reading and interpretation before the Reformation?", "back": "The Church insisted the authoritative text was the Latin Vulgate and that interpretation belonged to trained clergy and church authority, fearing that unauthorized translations could spread heresy."}, {"front": "What was the double impact of Martin Luther's German Bible translation?", "back": "It made Scripture accessible to ordinary German people, selling thousands of copies, and helped standardize the modern German language due to its vigorous and clear style."}, {"front": "Who was William Tyndale, and what was his major contribution to the English Reformation?", "back": "Tyndale translated the New Testament into English (1525) and later parts of the Old Testament. Despite his execution, his translation profoundly influenced the King James Bible, forming an estimated 80% of its New Testament."}, {"front": "How did Tyndale and Luther's belief about vernacular Bibles influence literacy rates?", "back": "They believed affordable, printed vernacular Bibles would drive people to learn to read. They were correct, as the Reformation and the gradual spread of literacy across Protestant Europe advanced together."}, {"front": "What role did German princes play in the spread and protection of the Lutheran Reformation?", "back": "As rulers of territories within the loose Holy Roman Empire, they protected Luther after he was declared an outlaw and decided whether their lands would be Lutheran or Catholic, often for a mix of theological and political motives (e.g., seizing church lands)."}, {"front": "How did Henry VIII's break from Rome differ from Luther's motivations, and what was its ultimate effect on the English Church?", "back": "Henry's break was primarily driven by his marriage question, not Protestant theology (he had defended Catholicism). However, once broken from Rome, his successors moved the English church in a genuinely Protestant direction."}, {"front": "How did the Habsburg-Valois conflict illustrate the entanglement of religion and politics during the Reformation?", "back": "The Catholic French king Francis I (Valois) sometimes supported Protestant princes in Germany against the fiercely Catholic Holy Roman Emperor Charles V (Habsburg) to weaken his rival, showing how political strategy could override religious solidarity."}, {"front": "What military reality gave Protestant German princes leverage against Emperor Charles V?", "back": "The Ottoman Turks, under Suleiman the Magnificent, threatened the Empire's eastern frontier (e.g., siege of Vienna 1529). Charles V needed Protestant soldiers, preventing him from simultaneously crushing the Lutherans."}, {"front": "What is the consistent pattern observed throughout history regarding new technology and the spread of ideas?", "back": "A new communications or transportation technology doesn't create a movement, but it can transform a local movement into a continental one, determining whether compelling ideas stay local or go viral."}, {"front": "Name two examples from history (other than the printing press) where technology transformed the spread of ideas or movements.", "back": "The Roman road network for Paul's letters (early Church) and the Viking longship for Viking raids and trade networks."}, {"front": "What parallels can be drawn between the printing press during the Reformation and the modern internet?", "back": "Both drastically lowered information production/distribution costs, shattered existing monopolies on speech, empowered individuals against institutions, and produced a flood of conflicting claims alongside true ones."}, {"front": "What significant principle was established by the Peace of Augsburg (1555) regarding religious division?", "back": "The 'cuius regio, eius religio' principle, meaning 'whose realm, his religion,' allowed princes to determine the religion of their territory, managing the division for a generation."}, {"front": "What seed of a modern idea emerged from the Reformation regarding individual conscience?", "back": "The idea that individual conscience has rights the state cannot completely override, contributing to modern religious freedom."}, {"front": "How did the Reformation impact education across Protestant Europe?", "back": "It created a demand for educated laypeople, leading to the establishment of schools, universities, and eventually systems of public education."}, {"front": "How did the Reformation change the model of accountability for authority, even within the Church?", "back": "It demanded that authority justify itself by reference to Scripture and reason, rather than solely by tradition and power."}, {"front": "Why is the question of whether the Reformation was a 'blessing or a catastrophe' still debated by historians?", "back": "Its legacy includes both division and war (e.g., Thirty Years' War) and foundational ideas like religious freedom and literacy. The answer depends on one's perspective on the ultimate purpose of Christianity and its societal impact."}, {"front": "How does Alfred the Great's work (Unit 1) connect to Tyndale's efforts during the Reformation?", "back": "Both Alfred and Tyndale believed in making wisdom and faith accessible to ordinary people in their own language, demonstrating a recurring desire for vernacular access to important texts across centuries."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
