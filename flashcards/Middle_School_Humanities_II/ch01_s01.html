<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did the unique geography of Scandinavia influence the outward expansion of its people during the Viking Age?", "back": "Scandinavia's mountainous regions (Norway), marshlands (Denmark), and vast forests with limited fertile soil (Sweden) meant it struggled to feed its population. This, combined with water travel being easier than land travel, pushed its people outwards and fostered advanced seafaring skills."}, {"front": "Explain the statement: 'The Vikings were not invaders who learned to sail. They were sailors who became invaders.'", "back": "This emphasizes that the Vikings' mastery of the sea was a pre-existing skill, deeply integrated into their culture due to Scandinavia's geography. They were already expert mariners before they began their raids and expansions."}, {"front": "What does 'shallow draft' mean in the context of a ship, and why was it crucial for Viking longships?", "back": "'Shallow draft' refers to the minimal depth of water a ship needs to float without touching the bottom. Viking longships had a shallow draft (less than a meter), enabling them to navigate shallow rivers and beach directly on shores, without needing a harbor."}, {"front": "List three key technological features of the Viking longship that contributed to its revolutionary success.", "back": "1. Shallow draft (allowing river navigation and beaching). 2. Flexibility (could be rowed or sailed, even against the wind). 3. Symmetric design (no need to turn around in narrow rivers). 4. Lightweight (could be portaged overland)."}, {"front": "What strategic advantage did the longship's design give the Vikings over previous sea powers in accessing the interior of Europe?", "back": "The longship's combination of ocean capability and river navigation allowed Vikings to penetrate deep into Europe via its river systems, turning them into 'Viking highways' where previous sea powers were limited to coastal areas."}, {"front": "Name the sequence of major Norse westward explorations and settlements, culminating in North America.", "back": "The Norse sailed west to the Faroe Islands (c. 800), then Iceland (c. 874), Greenland (c. 985), and finally Vinland (North America) around 1000 CE."}, {"front": "What is the historical significance of L'Anse aux Meadows?", "back": "Located in modern Newfoundland, L'Anse aux Meadows is the site of Leif Eriksson's settlement in Vinland and is the earliest confirmed European presence in the Americas."}, {"front": "Who were the Varangians, and what was their primary sphere of activity?", "back": "The Varangians were Scandinavian (primarily Swedish) traders and mercenaries who established settlements along the river routes of modern Russia, Ukraine, and Belarus, primarily linking the Baltic Sea to the Black and Caspian Seas."}, {"front": "Name two important trading cities founded by the Varangians in Eastern Europe.", "back": "Kiev and Novgorod."}, {"front": "What was the Varangian Guard, and where did they serve?", "back": "The Varangian Guard was a corps of Norse mercenaries who served as the elite personal bodyguard for the Byzantine Emperor in Constantinople, the greatest city in the world at the time."}, {"front": "Which region of France was settled by Danish Vikings, and what was its lasting historical impact on England?", "back": "Danish Vikings settled the Duchy of Normandy ('Northmen'). From Normandy, William the Conqueror sailed to England in 1066, leading to the Norman Conquest."}, {"front": "What was the Danelaw, and how was it established?", "back": "The Danelaw was a region in the north and east of England where Danish law and customs prevailed. It was established by the Treaty of Wedmore in 878, dividing England between Anglo-Saxon and Danish control."}, {"front": "How can modern English place names provide evidence of the Danelaw's geographical and cultural division?", "back": "Place names ending in '-by' (farm/village), '-thwaite' (clearing), or '-thorpe' (outlying farm) are indicative of Danish settlement (e.g., Whitby, Slaithwaite), contrasting with Anglo-Saxon names ending in '-ton,' '-ham,' or '-bury' (e.g., Southampton, Birmingham)."}, {"front": "Describe Alfred the Great's reorganization of the internal administrative geography of his Anglo-Saxon kingdom.", "back": "Alfred strengthened the system of shires (administrative divisions akin to counties, each with a royal officer called an ealdorman) and introduced hundreds (subdivisions of shires, each supporting roughly a hundred households)."}, {"front": "Define 'shire' in the context of Anglo-Saxon England.", "back": "A shire was an administrative division of Anglo-Saxon England, roughly corresponding to a county. Each was centered on a town and administered by a royal officer, and many English counties still bear these names today."}, {"front": "Compare the 'logic of the sea' in Viking expansion to that of ancient Greek civilization.", "back": "Both civilizations, separated by nearly fifteen centuries, leveraged their mastery of water transport to connect distant places and establish networks of trade and power, reflecting how geography shaped their expansion."}, {"front": "What was a significant difference between the initial expansion strategies of the ancient Greeks and the Vikings?", "back": "The Greeks typically built planned colonies with citizens and laws, whereas the Vikings initially focused on raiding parties before eventually transitioning to settlement and civilization."}, {"front": "Give an example of the recurring pattern of 'raid becoming settlement, settlement becoming civilization' in Western history, as mentioned in the text.", "back": "The Viking expansion in Ireland, England, France, Iceland, and Russia exemplifies this, as initial raids often led to permanent Norse settlements that eventually evolved into established societies. Another example cited is the Germanic tribes settling in former Roman territory after 476 CE."}, {"front": "How did the longship's lightweight construction enhance Viking mobility beyond just water travel?", "back": "Its lightweight design allowed it to be portaged (carried overland) across narrow land bridges between different river systems, extending their reach to otherwise inaccessible interior regions."}, {"front": "Which two major bodies of water did the Varangian trade routes primarily connect?", "back": "The Baltic Sea to the Black Sea and the Caspian Sea."}, {"front": "What role did Constantinople play in the Varangian trade network?", "back": "Constantinople, 'the greatest city in the world,' served as a major destination for Varangian trade goods via the Black Sea, and its emperor hired Norse mercenaries for his personal guard."}, {"front": "Which king was instrumental in defending Anglo-Saxon England against the Danes and establishing the Danelaw?", "back": "Alfred the Great, King of Wessex."}, {"front": "What was the purpose of a 'hundred' in Alfred the Great's administrative system?", "back": "A 'hundred' was a subdivision of a shire that contained enough land to support a hundred households, serving as a localized administrative unit for law and military service."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
