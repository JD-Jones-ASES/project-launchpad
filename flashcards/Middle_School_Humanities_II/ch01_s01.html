<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "When did the first recorded Viking raid on the British Isles occur and where?", "back": "The first Viking raid occurred on June 8, 793, at the island monastery of Lindisfarne.", "id": "fc01"}, {"front": "What is the likely origin and meaning of the term 'Viking'?", "back": "From the Old Norse 'vikingr,' likely meaning 'one who comes from the fjords' or 'sea raider.'", "id": "fc02"}, {"front": "How did the monk Alcuin interpret the Viking raid on Lindisfarne?", "back": "Alcuin interpreted it as a sign of divine judgment, believing God permitted heathens to punish England for its sins.", "id": "fc03"}, {"front": "What does Alcuin's reaction to the Lindisfarne raid tell us about the medieval worldview?", "back": "It reveals a common medieval belief that national disasters were God's response to national sin.", "id": "fc04"}, {"front": "List the three primary reasons why the Vikings began raiding across Europe.", "back": "Reasons included economics (limited Scandinavian farmland), technology (the revolutionary longship), and culture (prized courage, glory, and treasure).", "id": "fc05"}, {"front": "What made the Viking longship a revolutionary piece of technology?", "back": "It combined ocean-going capacity with an extremely shallow draft, allowing Vikings to cross oceans and navigate far inland on rivers, reaching previously inaccessible targets.", "id": "fc06"}, {"front": "What was the 'Great Heathen Army' and when did it invade England?", "back": "The Great Heathen Army was a large coalition of Danish forces that invaded England in 865, systematically conquering Anglo-Saxon kingdoms.", "id": "fc07"}, {"front": "By 870, which Anglo-Saxon kingdom was the only one remaining unconquered by the Danes?", "back": "Wessex was the only remaining unconquered Anglo-Saxon kingdom.", "id": "fc08"}, {"front": "What notable intellectual trait did Alfred demonstrate as a child?", "back": "He loved poetry so much that he memorized an entire book of Old English verse before he could read, by having it read aloud repeatedly.", "id": "fc09"}, {"front": "Who was Asser, and why is he important for understanding Alfred the Great?", "back": "Asser was a Welsh monk and scholar at Alfred's court who wrote 'The Life of King Alfred,' the most important biographical source for Alfred.", "id": "fc10"}, {"front": "Where was Alfred driven into hiding by the Danes in 878, and what famous legend is associated with this period?", "back": "Alfred fled to the marshes of Somerset at Athelney. The famous legend is Alfred burning the cakes in a peasant woman's hut.", "id": "fc11"}, {"front": "What was the 'fyrd' in Anglo-Saxon England?", "back": "The fyrd was the Anglo-Saxon militia, made up of free men obligated to serve the king in defense of their land.", "id": "fc12"}, {"front": "What was the decisive battle where Alfred defeated Guthrum, and what major political agreement followed?", "back": "The Battle of Edington (878) was Alfred's decisive victory, leading to the Treaty of Wedmore.", "id": "fc13"}, {"front": "What were the two main terms of the Treaty of Wedmore?", "back": "Guthrum agreed to convert to Christianity (with Alfred as godfather) and to withdraw his forces north and east, establishing the Danelaw.", "id": "fc14"}, {"front": "Define the 'Danelaw' and describe its significance.", "back": "The Danelaw was the area of northern and eastern England under Danish law and custom after the Treaty of Wedmore, dividing England. Its influence is still seen in Danish place names today.", "id": "fc15"}, {"front": "What crisis motivated Alfred the Great's ambitious program of educational reform?", "back": "The Viking raids had devastated English literacy and learning, destroying monasteries, manuscripts, and disrupting the Latin education of the clergy.", "id": "fc16"}, {"front": "Name two important works that Alfred the Great personally translated into English.", "back": "Alfred translated Boethius's 'Consolation of Philosophy' and Gregory the Great's 'Pastoral Care' (among others).", "id": "fc17"}, {"front": "According to Alfred's preface to the Pastoral Care, why did he believe it was important to translate Latin books into English?", "back": "He believed it was essential because Latin literacy had declined so severely that few understood church services or could translate Latin, so books 'most needful for all men to know' should be in English.", "id": "fc18"}, {"front": "Besides translations, what other significant literary project did Alfred initiate to preserve English history?", "back": "Alfred initiated the Anglo-Saxon Chronicle, a year-by-year record of English history written in Old English.", "id": "fc19"}, {"front": "What were 'burhs,' and what was their strategic purpose?", "back": "Burhs were fortified settlements built or strengthened by Alfred to create a defensive network against Viking raids, strategically placed a day's march apart.", "id": "fc20"}, {"front": "Who was Alfred's grandson, and what achievement made him the first true 'King of all Britain'?", "back": "Alfred's grandson was Aethelstan; he became the first ruler to control all of England in 927 by defeating the last Scandinavian king of York.", "id": "fc21"}, {"front": "Who was Cnut the Great, and what kind of empire did he establish?", "back": "Cnut the Great, son of Sweyn Forkbeard, became King of England by 1016 and later King of Denmark and Norway, creating a vast North Sea empire.", "id": "fc22"}, {"front": "How did Cnut rule England despite being a Danish conqueror?", "back": "He ruled well, maintaining Alfred's laws, supporting the Church, and making peace with the Anglo-Saxon nobility.", "id": "fc23"}, {"front": "Who were the three main claimants to the English throne upon Edward the Confessor's death in January 1066?", "back": "The three main claimants were Harold Godwinson, Harald Hardrada (King of Norway), and William (Duke of Normandy).", "id": "fc24"}, {"front": "What was the major impact of the Norman Conquest of 1066 on Anglo-Saxon England?", "back": "It ended Anglo-Saxon culture, replaced Old English with a Norman-French ruling class, and fundamentally reshaped English law, church, and aristocracy.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
