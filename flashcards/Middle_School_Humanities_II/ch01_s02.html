<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What three primary texts are examined in this unit to understand the Viking Age from an 'inside' perspective?", "back": "Beowulf, The Anglo-Saxon Chronicle, and Asser's Life of King Alfred."}, {"front": "What is Beowulf, and what is its significance in English literature?", "back": "It is the longest surviving poem in Old English, drawing on older Germanic traditions and set in a Christian frame; it's considered the oldest significant poem in English literature."}, {"front": "What is the approximate composition period for the poem Beowulf?", "back": "Sometime between the eighth and tenth centuries."}, {"front": "Who wrote Beowulf down, and what was the likely source of its narrative?", "back": "A Christian monk, probably drawing on much older oral traditions."}, {"front": "In what geographic region is the poem Beowulf set?", "back": "Scandinavia, specifically Denmark and Geatland (part of modern Sweden)."}, {"front": "Who is the hero of Beowulf, and what is his origin?", "back": "Beowulf, a Geat warrior."}, {"front": "Name the three main antagonists Beowulf fights in the poem.", "back": "Grendel, Grendel's Mother, and the Dragon."}, {"front": "How does Beowulf defeat the monster Grendel?", "back": "He wrestles Grendel bare-handed (refusing weapons because Grendel has none) and tears off his arm."}, {"front": "Explain the key concept of 'Christian Themes in a Pagan Setting' as it applies to Beowulf.", "back": "The Christian poet describes a pre-Christian world, weaving in references like Grendel being a descendant of Cain and God as creator, while still celebrating older Germanic pagan virtues like courage, loyalty, and generosity."}, {"front": "What central question does the Beowulf poet explore regarding virtue?", "back": "How does Christian virtue relate to heroic virtue, and is a brave warrior who dies for his people doing something holy?"}, {"front": "How does Beowulf meet his end in the poem?", "back": "As an old king, he fights and kills a dragon but is mortally wounded and dies from his injuries."}, {"front": "What values does Beowulf embody and hold up as ideals in Anglo-Saxon culture?", "back": "Courage, loyalty, and the image of a good king who protects his people."}, {"front": "What is The Anglo-Saxon Chronicle?", "back": "It is a collection of terse, year-by-year entries recording events like raids, battles, deaths, and treaties, considered the closest thing to a newspaper from the Viking Age."}, {"front": "Who initiated the creation of The Anglo-Saxon Chronicle?", "back": "King Alfred the Great, probably at his direct command."}, {"front": "What are the characteristic features of the entries found in The Anglo-Saxon Chronicle?", "back": "They are generally terse and factual, occasionally opening up to reveal human reality behind the bare facts."}, {"front": "Compare the tone of the Anglo-Saxon Chronicle entry for AD 793 with that of AD 878.", "back": "The 793 entry (first Viking raid) is almost apocalyptic, describing dreadful forewarnings and divine judgment, while the 878 entry (Alfred hiding) is stark and matter-of-fact about a catastrophe."}, {"front": "Who was Asser, and what is the title of his most famous work?", "back": "Asser was a Welsh monk recruited by King Alfred, and he wrote Life of King Alfred."}, {"front": "What makes Asser's Life of King Alfred a unique historical document?", "back": "It is one of the few near-contemporary biographies of any medieval ruler, written while Alfred was still alive, offering a warm and personal portrait."}, {"front": "What does Asser's biography reveal about Alfred's early life and relationship with learning?", "back": "Alfred was loved, remained illiterate until age twelve due to parental neglect, but listened attentively to Saxon poems and committed them to memory, and ardently sought wisdom."}, {"front": "What qualities does Asser emphasize in his portrayal of King Alfred?", "back": "Alfred's love of learning, piety, generosity, justice, affability, eagerness to investigate unknown things, and his ability to govern diverse peoples effectively."}, {"front": "Why should a reader approach Asser's Life of King Alfred with a critical perspective?", "back": "Biographers, even contemporary ones, have agendas. Asser admired Alfred and wrote for an audience at Alfred's court, likely portraying him as an ideal Christian king and potentially omitting unfavorable details."}, {"front": "What specific aspect of Anglo-Saxon ideals does Beowulf illustrate?", "back": "The ideals of courage, loyalty, and the concept of a good king protecting his people."}, {"front": "What do these three texts—Beowulf, The Anglo-Saxon Chronicle, and Asser's Life of King Alfred—collectively suggest about King Alfred and his culture?", "back": "They suggest Alfred was not an accident, but a product of a culture that valued the qualities he embodied (courage, loyalty, piety, learning), and he in turn shaped the culture that would survive the Viking Age and become England."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
