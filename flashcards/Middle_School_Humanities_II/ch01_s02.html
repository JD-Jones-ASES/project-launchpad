<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Name the three key texts studied in this unit that offer insights into the Viking Age.", "back": "Beowulf, The Anglo-Saxon Chronicle, and Asser's Life of King Alfred."}, {"front": "Describe the primary genre and voice of *Beowulf*, *The Anglo-Saxon Chronicle*, and *Asser's Life of King Alfred*.", "back": "*Beowulf* is an epic poem (oldest surviving in Old English). *The Anglo-Saxon Chronicle* is a historical record (year-by-year entries). *Asser's Life of King Alfred* is a biography (warm, personal)."}, {"front": "What is *Beowulf* notable for in English literature?", "back": "It is the longest surviving poem in Old English, running to over 3,000 lines."}, {"front": "Who is believed to have written down *Beowulf*, and what older traditions did it draw upon?", "back": "A Christian monk wrote it down, drawing on older oral Germanic traditions."}, {"front": "Where is the poem *Beowulf* set, and what kind of world does it depict?", "back": "It is set in Scandinavia (Denmark and Geatland, part of modern Sweden) among the pre-Christian Germanic tribes."}, {"front": "Summarize Beowulf's three major battles in the poem.", "back": "Beowulf kills the monster Grendel, then Grendel's mother, and finally, as an old king, fights and kills a dragon, dying of his wounds."}, {"front": "Explain the 'Christian Themes in a Pagan Setting' key concept in *Beowulf*.", "back": "The Christian poet describes a pre-Christian world, weaving in references to God and Cain, while celebrating older Germanic heroic virtues like courage, loyalty, and generosity."}, {"front": "What are some of the older Germanic virtues celebrated in *Beowulf*?", "back": "Courage, loyalty, generosity, and the willingness to fight for one's people."}, {"front": "How does Beowulf defeat Grendel, and why does he choose this method?", "back": "Beowulf wrestles Grendel bare-handed, tearing off his arm, because Grendel uses no weapons."}, {"front": "What does the ending of *Beowulf* with the hero's funeral pyre and lament signify?", "back": "It serves as a meditation on loyalty, the passing of great men, and the uncertainty of the future."}, {"front": "When was *The Anglo-Saxon Chronicle* begun, and how long was it updated?", "back": "It was begun during Alfred's reign (probably at his command) and continued to be updated by monks until the mid-twelfth century."}, {"front": "Describe the typical style of entries in *The Anglo-Saxon Chronicle*.", "back": "The entries are generally terse, factual, and year-by-year, recording events like raids, battles, and treaties."}, {"front": "Compare the tone of the AD 793 entry with the AD 878 entry in *The Anglo-Saxon Chronicle*.", "back": "The 793 entry is apocalyptic, seeing Viking raids as divine judgment with portents. The 878 entry is stark and matter-of-fact about a catastrophe, with less editorializing."}, {"front": "What does the 'economy of language' in *The Anglo-Saxon Chronicle* suggest about the chronicler's attitude?", "back": "It suggests a focus on reporting facts directly, often without explicit editorializing, leaving the reader to infer the impact of the events."}, {"front": "Who was Asser, and how did he come to write about King Alfred?", "back": "Asser was a Welsh monk from St. David's, recruited by Alfred around 885 to serve at his court."}, {"front": "Describe the characteristics of *Asser's Life of King Alfred*.", "back": "It is a near-contemporary biography, warm, personal, and reflects Asser's clear admiration for Alfred, providing details about his character and inner life."}, {"front": "What significant detail does Asser reveal about King Alfred's early education?", "back": "Alfred remained illiterate until at least age twelve due to 'unworthy neglect,' but keenly listened to and memorized Saxon poems."}, {"front": "List some of the virtues Asser attributes to King Alfred.", "back": "Zeal in almsgiving, bountifulness, affability, eagerness to investigate unknown things, and a just governance of diverse peoples."}, {"front": "Why is it important to read *Asser's Life of King Alfred* critically, despite its contemporary nature?", "back": "Biographers, even contemporary ones, have agendas. Asser wrote for an audience at Alfred's court and likely emphasized virtues and positive aspects, shaping Alfred's image as an ideal Christian king."}, {"front": "How does *Beowulf* contribute to our understanding of the cultural values of the Anglo-Saxon world?", "back": "It highlights the ideals of courage, loyalty, and the importance of a good king who protects his people."}, {"front": "What kind of insights does *The Anglo-Saxon Chronicle* primarily offer about the Viking Age?", "back": "It provides a factual, terse account of the historical events, battles, and societal impact of the Viking Age."}, {"front": "What unique perspective does Asser's biography provide on King Alfred during the Viking Age?", "back": "It shows Alfred as a real person with curiosity, piety, and a passionate love of learning, offering a personal insight into a leader of the era."}, {"front": "According to the text, how do these three texts collectively suggest Alfred's significance to his culture?", "back": "They suggest Alfred was a product of a culture that valued his embodied qualities, and he, in turn, shaped the culture that would survive the Viking Age and become England."}, {"front": "How does the Christian background of the *Beowulf* poet influence the depiction of characters like Grendel?", "back": "Grendel is explicitly described as a descendant of Cain, framing him within a Christian understanding of evil and punishment."}, {"front": "What is the benefit of reading these three diverse primary sources together to understand the Viking Age?", "back": "They offer varied perspectives (heroic ideals, factual events, personal biography) that allow us to see the period 'from the inside' rather than as outsiders looking back."}, {"front": "What central question does *Beowulf* implicitly ask about 'heroic virtue'?", "back": "The poem asks: 'How does Christian virtue relate to heroic virtue? Is the brave warrior who dies for his people doing something holy?'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
