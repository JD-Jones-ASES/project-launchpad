<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "What does 'Renaissance' mean and when did it occur?", "back": "From French, meaning 'rebirth.' Roughly 1350–1600. European scholars, artists, and thinkers consciously revived the study of ancient Greek and Roman literature, art, and philosophy. The term was coined by later historians; the people themselves spoke of a 'restoration' of learning."}, {"front": "Who coined the term 'Dark Ages' and what did he mean?", "back": "Petrarch. He called the centuries after Rome's fall the 'Dark Ages' — a time when learning had been buried and would have to be dug up again. He saw himself as one of the diggers. Modern historians consider the term misleading."}, {"front": "What was a city-state?", "back": "An independent state consisting of a city and the surrounding territory it controls. The Italian city-states of the Renaissance — Florence, Venice, Milan, Naples, Rome — were self-governing units with their own laws, armies, and rivalries."}, {"front": "Why did the Renaissance begin in Italy?", "back": "Five factors: (1) wealth from Mediterranean trade and banking; (2) Roman ruins physically everywhere; (3) Latin close to Italian; (4) Greek scholars fled to Italy from Constantinople (1453) with manuscripts; (5) competitive city-state culture drove each city to outshine rivals."}, {"front": "What is Renaissance humanism?", "back": "The scholarly programme centered on studying ancient Greek and Roman literature, language, and thought (studia humanitatis: grammar, rhetoric, poetry, history, moral philosophy). Most Renaissance humanists were devout Christians who saw no conflict between faith and classical learning."}, {"front": "Who was Petrarch?", "back": "Francesco Petrarca (1304–1374), the founder and hero of Renaissance humanism. Born in exile from Florence; grew up near Avignon. He was captivated by Latin writers (Cicero, Virgil, Livy), searched his whole life for lost manuscripts, and coined the term 'Dark Ages' for the post-Roman centuries."}, {"front": "What is a patron?", "back": "A wealthy individual who supports artists, scholars, or writers by paying for their work, providing housing, or commissioning specific projects. Patronage was the economic engine of Renaissance art: wealthy patrons used art to display power, piety, and culture."}, {"front": "Who were the Medici?", "back": "A Florentine family of bankers who became the dominant political force in Florence and the greatest patrons of the Renaissance. Key members: Cosimo de' Medici (founded Platonic Academy, funded Plato translation) and Lorenzo the Magnificent (supported Botticelli, young Michelangelo, Leonardo da Vinci)."}, {"front": "What was the Platonic Academy?", "back": "A circle of scholars funded by Cosimo de' Medici in Florence who gathered to read and discuss Plato and the ancient philosophers. Cosimo also funded the translation of Plato's complete works into Latin — making Platonic philosophy available to Western Europe for the first time in centuries."}, {"front": "What is linear perspective?", "back": "A mathematical system for representing three-dimensional space on a flat surface. Parallel lines converge at a single vanishing point on the horizon, creating the illusion of depth. Developed by Brunelleschi around 1420; codified by Alberti in On Painting (1435). Transformed European painting."}, {"front": "Who was Giotto di Bondone?", "back": "Italian painter (c. 1267–1337), the first to give painted figures the weight and three-dimensionality of real people. His frescoes shocked viewers who had never seen figures that seemed to stand in real space. Often called the first Renaissance artist, though he predates the Renaissance proper."}, {"front": "Who was Sandro Botticelli?", "back": "Florentine painter (c. 1445–1510), favored by the Medici. Painted mythological subjects including The Birth of Venus (c. 1485) and Primavera. His figures have a dreamy, linear grace distinct from the solid realism of later Renaissance masters."}, {"front": "Who was Leonardo da Vinci?", "back": "Leonardo da Vinci (1452–1519), the supreme 'Renaissance man' — painter, sculptor, architect, engineer, anatomist, and scientist. His Mona Lisa and The Last Supper are among the most studied paintings in history. His notebooks contain scientific observations, mechanical designs, and anatomical drawings."}, {"front": "Who was Michelangelo?", "back": "Michelangelo Buonarroti (1475–1564). Considered himself first a sculptor; forced by Pope Julius II to paint the Sistine Chapel ceiling (1508–1512) covering it with hundreds of figures from Genesis. His statue David (1504) is a masterpiece of classical human form."}, {"front": "Who was Raphael?", "back": "Raphael Sanzio (1483–1520). His Vatican frescoes including The School of Athens placed Plato and Aristotle at the center of a grand classical building surrounded by philosophers — as if the ancient academy had been reborn in Christian Rome."}, {"front": "Who was Johannes Gutenberg?", "back": "A German goldsmith who developed movable type printing around 1440–1455. His first major publication was a Latin Bible (c. 1455). A Gutenberg press could produce hundreds of copies of a book in days; a scribe could produce one book per year."}, {"front": "What is movable type?", "back": "A printing system in which individual metal characters (letters, punctuation) are arranged to form words, locked into a frame, inked, and pressed onto paper. The type can then be rearranged for the next page. Gutenberg's development made printing vastly faster and cheaper than hand-copying."}, {"front": "What were the four major consequences of the printing press?", "back": "(1) Books became dramatically cheaper — a merchant's son could afford books a great lord previously couldn't. (2) Literacy spread. (3) Ideas spread faster than any authority could control. (4) Errors could be standardized rather than multiplied across hand-copied variations."}, {"front": "Who was Prince Henry the Navigator?", "back": "Portuguese prince (1394–1460) who systematically sponsored exploration of the African coast, seeking a sea route to Asia's spices. By 1488, Bartolomeu Dias had rounded the Cape of Good Hope under Portuguese patronage."}, {"front": "What did Columbus discover in 1492?", "back": "Christopher Columbus, a Genoese navigator sailing under Spanish patronage, crossed the Atlantic and reached the Caribbean islands, believing he had found a route to Asia. He had instead opened permanent contact between Europe and the Americas."}, {"front": "What did Vasco da Gama achieve in 1498?", "back": "Completed the first sea voyage from Europe to India, arriving at Calicut on the Malabar Coast. The Portuguese spice trade that followed transformed European economies and broke Venice and Genoa's monopoly on Eastern goods."}, {"front": "What was Magellan's achievement?", "back": "Ferdinand Magellan's expedition (1519–1521) became the first to circumnavigate the globe, proving that the earth was round and the oceans were connected."}, {"front": "What is a caravel?", "back": "A small, highly maneuverable sailing ship developed by Portuguese navigators in the early 15th century. It used lateen (triangular) sails, which allowed it to sail closer into the wind than traditional square-rigged ships. The primary vessel of the Age of Exploration."}, {"front": "Who was Machiavelli?", "back": "Niccolò Machiavelli (1469–1527), Florentine diplomat and writer. He wrote The Prince (1513) — a short, unsettling analysis of how political power is actually won and kept. He argued a prince must learn how to not be good when circumstances require it."}, {"front": "What is the adjective 'Machiavellian' mean?", "back": "Calculating, cunning, and willing to use deception or ruthlessness to achieve political ends. Derived from Machiavelli's name. Historians debate whether he was advising princes to be cruel or simply describing political reality as he observed it."}, {"front": "Who was Erasmus?", "back": "Desiderius Erasmus (c. 1466–1536), Dutch scholar and Christian humanist. He produced a revolutionary edition of the Greek New Testament (1516) and wrote The Praise of Folly (1509) mocking Church corruption with wit. He wanted to reform the Church from within; he was horrified when Luther split it."}, {"front": "What is Christian humanism?", "back": "A Renaissance movement that combined humanist scholarship with Christian devotion and a desire to reform the Church from within. Christian humanists like Erasmus and More believed returning to the original sources of Christianity (Greek New Testament, Church Fathers) would purify the faith."}, {"front": "Who was Thomas More?", "back": "English lawyer and statesman (1478–1535), Erasmus's closest friend. Published Utopia in 1516 — an imaginary island society with common property and no poverty. Refused to acknowledge Henry VIII as head of the Church of England; executed in 1535; later declared a saint by the Catholic Church."}, {"front": "What does 'Utopia' mean?", "back": "More's Greek pun: both 'good place' (eutopia) and 'no place' (outopia). The word has entered all European languages to mean an ideally perfect society that exists only in imagination."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
