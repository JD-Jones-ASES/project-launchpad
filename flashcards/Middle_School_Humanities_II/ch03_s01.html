<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary challenge historians face when using eyewitness accounts from historical events like the Crusades?", "back": "Eyewitnesses interpret events through the lenses of their culture, loyalties, and assumptions, leading to diverse and potentially conflicting"}, {"front": "Who are the three main 'voices' whose perspectives on the Crusades are examined in this section?", "back": "Robert the Monk, Geoffrey of Villehardouin, and Anna Komnene."}, {"front": "When faced with conflicting eyewitness accounts, what approach should historians take regarding their trustworthiness?", "back": "Historians should trust 'all of them, carefully, together,' triangulating multiple perspectives to build a more complete understanding rather than dismissing any single account."}, {"front": "Who was Robert the Monk, and what was his primary contribution to understanding the First Crusade?", "back": "A French Benedictine monk who was present at Clermont in 1095 and later wrote the *Historia Iherosolimitana*, a widely read account of Pope Urban II's speech calling for the First Crusade."}, {"front": "Why is Robert the Monk's account of Pope Urban II's speech at Clermont not considered a verbatim transcript?", "back": "It was a literary reconstruction written from memory and belief over a decade after the events, shaped by Robert's conviction that the Crusade was God's will."}, {"front": "What significant religious promise did Pope Urban II offer Crusaders, as reported by Robert the Monk?", "back": "Immediate remission of sins for all who died 'by the way, whether by land or by sea, or in battle against the pagans.'"}, {"front": "Besides religious motivations, what economic argument did Pope Urban II use to persuade Western Europeans, according to Robert the Monk?", "back": "He described Western Europe as overcrowded and suggested the Holy Land ('flowing with milk and honey') could offer land to younger sons, knights, and a growing population."}, {"front": "What was the attested crowd response to Pope Urban II's speech at Clermont?", "back": "'Deus lo volt!' (God wills it!)."}, {"front": "In medieval Catholic theology, what was an 'indulgence,' and what kind did Urban II offer Crusaders?", "back": "An indulgence was a remission of the temporal punishment due for sins already forgiven in confession. Urban II offered participating Crusaders a plenary (full) indulgence."}, {"front": "How did the concept of indulgences, as offered during the Crusades, later become a central issue in Christian history?", "back": "The vast expansion and abuse of indulgences in later centuries became a central issue that Martin Luther would attack in his 95 Theses, sparking the Protestant Reformation."}, {"front": "Who was Geoffrey of Villehardouin, and which Crusade did he participate in and document?", "back": "A French nobleman and marshal of Champagne who participated in the Fourth Crusade from its beginning and wrote about it in *La Conquête de Constantinople*."}, {"front": "In what sense was Villehardouin 'honest,' and what did he fail to acknowledge in his account of the Fourth Crusade?", "back": "He reported events with considerable clarity, but he did not always see or acknowledge the moral disaster, particularly the sack of Constantinople, describing it with detachment and satisfaction over the booty."}, {"front": "How did Villehardouin characterize the Crusaders and their actions during the Fourth Crusade?", "back": "He called them 'pilgrims' and saw their 'victory' and the immense booty gained from Constantinople as 'God had vouchsafed to them,' omitting mention of civilian deaths or desecration of churches."}, {"front": "What is 'The Problem of Self-Justification in History,' as illustrated by figures like Villehardouin?", "back": "It refers to the human tendency for individuals, even those doing terrible things, to believe they have good reasons and to justify their actions, often blinding them to their own moral failings."}, {"front": "Who was Anna Komnene, and what was her relationship to the Byzantine Empire during the First Crusade?", "back": "The highly educated daughter of Byzantine Emperor Alexios I Komnenos, who wrote *The Alexiad*, recording the First Crusade from a Byzantine perspective."}, {"front": "How did Anna Komnene's perception of the Crusaders differ sharply from their self-understanding?", "back": "She saw them as 'barbarians'—violent, undisciplined, greedy, and theologically unsophisticated—rather than as heroic liberators, as they saw themselves."}, {"front": "What specific terms or images did Anna Komnene use to describe the Western Crusaders, reflecting her Byzantine perspective?", "back": "She called them 'Franks,' 'a second deluge,' 'an ocean of people without order or discipline,' and 'alien to us in their customs, their Latin tongue, and their strange theology.'"}, {"front": "What 'agenda' might Anna Komnene have had that could influence her reliability as a narrator?", "back": "Her agenda was to glorify her father, Emperor Alexios I Komnenos, and defend the Byzantine Empire, which could lead to a biased portrayal of the Crusaders."}, {"front": "What does Anna Komnene's use of the term 'Franks' for all Western Crusaders reveal about 'Christendom' at the time?", "back": "It reveals that 'Christendom' was not a unified civilization; the Eastern (Byzantine) and Western churches had been drifting apart for centuries, viewing each other as foreigners despite shared faith."}, {"front": "Briefly summarize how Robert the Monk, Geoffrey of Villehardouin, and Anna Komnene each fundamentally viewed the Crusades.", "back": "Robert saw it as God's holy command to liberate the Holy Land; Villehardouin saw the Fourth Crusade as a glorious military adventure with satisfying spoils; Anna Komnene saw Crusaders as unstable, greedy, and destabilizing foreigners."}, {"front": "According to Robert the Monk, which significant city did Urban II describe as 'the navel of the world' and needing aid?", "back": "Jerusalem."}, {"front": "What key event of the Fourth Crusade did Villehardouin describe with notable detachment, cataloging its spoils rather than its moral horror?", "back": "The sack of Constantinople, particularly its great church."}, {"front": "Anna Komnene was highly educated in several fields. Name three of them.", "back": "Philosophy, mathematics, rhetoric, and medicine."}, {"front": "What was the name of Robert the Monk's account of the First Crusade?", "back": "*Historia Iherosolimitana* ('History of the Jerusalem Journey')."}, {"front": "What was the name of Anna Komnene's biography of her father, which included her perspective on the First Crusade?", "back": "*The Alexiad*."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
