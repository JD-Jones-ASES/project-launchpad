<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why was Jerusalem considered the holiest place on earth by medieval Christians?", "back": "It was the city where Jesus had been crucified, buried, and, Christians believed, risen from the dead.", "id": "fc01"}, {"front": "What is a 'pilgrimage' in the context of medieval Christian Europe?", "back": "A journey made to a holy place as an act of religious devotion, considered one of the most important religious practices, with destinations like Rome, Santiago de Compostela, and Jerusalem.", "id": "fc02"}, {"front": "Who controlled Jerusalem before the Crusades, and how did they generally treat Christian pilgrims?", "back": "Arab Muslim rule since 638. They generally tolerated Christian pilgrims and allowed them to visit holy sites.", "id": "fc03"}, {"front": "Who were the Seljuk Turks, and what impact did they have on the Byzantine Empire by the late 11th century?", "back": "A Central Asian Turkic people who converted to Sunni Islam and built a powerful empire. They shattered the Byzantine army at Manzikert (1071), overran Anatolia, and threatened Constantinople.", "id": "fc04"}, {"front": "Why did Byzantine Emperor Alexios I Komnenos appeal to the Pope in Rome for help?", "back": "The Seljuk Turks had pushed within a hundred miles of Constantinople, threatening the heartland of the Byzantine Empire.", "id": "fc05"}, {"front": "What was the significance of Pope Urban II's speech at the Council of Clermont in 1095?", "back": "He called for the First Crusade, urging European knights to go to the Holy Land, free Jerusalem, and promised remission of sins for those who died.", "id": "fc06"}, {"front": "What was the theological significance of Urban II's offer of remission of sins for Crusaders?", "back": "Urban was not offering salvation by works, but rather offering the Crusade as a legitimate form of penance.", "id": "fc07"}, {"front": "What does 'Deus lo volt!' mean, and why is it significant to the First Crusade?", "back": "It means 'God wills it!' and became the unanimous battle cry of the First Crusade.", "id": "fc08"}, {"front": "Define 'Crusade' as understood in the Middle Ages.", "back": "From the Spanish 'cruzada,' meaning 'marked with the cross.' It was a holy war called by the Pope, in which participants wore a red cross, believed they were on a pilgrimage (peregrinatio), and were promised remission of their sins if they died.", "id": "fc09"}, {"front": "Differentiate between the 'Official Crusade' and the 'People's Crusade' of 1096.", "back": "The Official Crusade assembled under several great lords, while the People's Crusade was a disorganized mass of peasants and poor people led by Peter the Hermit, which was largely destroyed by the Seljuk Turks.", "id": "fc10"}, {"front": "Describe the immediate aftermath of the First Crusade's capture of Jerusalem in 1099.", "back": "A massacre of the city's Muslim and Jewish inhabitants, followed by the Crusaders praying at the Church of the Holy Sepulchre.", "id": "fc11"}, {"front": "What were the 'Crusader States,' and what was their fundamental challenge?", "back": "Four small Christian principalities (County of Edessa, Principality of Antioch, County of Tripoli, and Kingdom of Jerusalem) carved out in the Holy Land. They faced constant pressure from Muslim neighbors, dependence on European resupply, and required a permanent military presence.", "id": "fc12"}, {"front": "According to the text, what common misconception exists about the motivations for the Crusades? What were the actual motivations?", "back": "The misconception is that Crusades were *only* about religion. Actual motivations were a complex mix of genuine religious devotion, political ambition, economic interest, and the culture of knightly warfare.", "id": "fc13"}, {"front": "What were the 'military orders,' and what two prominent examples are given?", "back": "Unique institutions combining the life of a monk with the life of a warrior. Members took monastic vows and vowed to fight for the faith. Examples include the Knights Templar and Knights Hospitaller.", "id": "fc14"}, {"front": "Who were the Knights Templar, and what was their eventual fate?", "back": "The Poor Fellow-Soldiers of Christ and of the Temple of Solomon, founded c. 1119, they were warrior-monks sworn to defend pilgrims and Christian territories. They became fabulously wealthy bankers, which eventually led to their destruction by the King of France in 1307.", "id": "fc15"}, {"front": "What event triggered the Second Crusade, and who was its most famous preacher?", "back": "The fall of the County of Edessa to the Muslim lord Zengi in 1144. It was preached with extraordinary passion by Bernard of Clairvaux.", "id": "fc16"}, {"front": "What was the outcome of the Second Crusade?", "back": "It was a disaster; the main German and French armies failed to coordinate, attacked the wrong targets, and accomplished nothing.", "id": "fc17"}, {"front": "Who was Saladin, and what was his significance in the conflict with the Crusaders?", "back": "Salah ad-Din Yusuf ibn Ayyub (1137–1193) was a Kurdish general and Sultan of Egypt and Syria. He united Muslim opposition to the Crusaders, was a brilliant commander, and was notably humane by medieval standards.", "id": "fc18"}, {"front": "What was the Battle of Hattin (1187), and what was its impact?", "back": "Saladin decisively defeated the combined Crusader army in a catastrophic ambush in the desert, where Crusaders were surrounded, cut off from water, and destroyed. This led to Saladin's reconquest of nearly the entire Kingdom of Jerusalem.", "id": "fc19"}, {"front": "How did Saladin's capture of Jerusalem in 1187 differ from the Crusaders' capture in 1099?", "back": "Saladin forbade a massacre, ransomed those who could pay, and allowed Christian pilgrims to continue visiting holy sites, contrasting sharply with the earlier slaughter by the Crusaders.", "id": "fc20"}, {"front": "What prompted the Third Crusade, and who were the three most powerful European monarchs who initially joined?", "back": "The fall of Jerusalem to Saladin in 1187. The Holy Roman Emperor Frederick Barbarossa, King Philip II of France, and King Richard I ('the Lionheart') of England.", "id": "fc21"}, {"front": "What challenges did the leaders of the Third Crusade face, and who emerged as its primary military leader?", "back": "Frederick Barbarossa drowned, and Philip II quarreled with Richard and left early. Richard I of England proved to be the greatest military commander and essentially carried the Crusade alone.", "id": "fc22"}, {"front": "What were Richard I's main achievements during the Third Crusade, and what was he ultimately unable to do?", "back": "He reconquered the coastal city of Acre and won the Battle of Arsuf, marching to within sight of Jerusalem. However, he could not take the city itself.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
