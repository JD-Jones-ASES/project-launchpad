<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the term “Renaissance” mean and what period does it generally refer to?", "back": "From the French “rebirth,” it refers to the period roughly from 1350 to 1600 in which European scholars, artists, and thinkers consciously revived the study of ancient Greek and Roman literature, art, and philosophy.", "id": "fc01"}, {"front": "How did Renaissance thinkers like Petrarch refer to the centuries between the fall of Rome and their own time?", "back": "They called them the “media aetas”—the “middle age”—implying history had been asleep. Petrarch specifically referred to them as the “Dark Ages,” a time when learning was buried.", "id": "fc02"}, {"front": "Why do most modern historians consider the term “Dark Ages” for the Middle Ages misleading?", "back": "The Middle Ages produced significant achievements such as great cathedrals, the university system, Dante's Divine Comedy, and the thought of Thomas Aquinas, demonstrating a strong foundation upon which the Renaissance built.", "id": "fc03"}, {"front": "What was the primary political and economic structure of Italy during the late Middle Ages, contributing to the start of the Renaissance?", "back": "Italy was a collection of powerful, competing city-states that grew rich on Mediterranean trade and banking, creating a wealthy merchant class able to patronize art and scholarship.", "id": "fc04"}, {"front": "Define “city-state” in the context of the Italian Renaissance.", "back": "An independent state consisting of a city and the surrounding territory it controls. These Italian city-states were self-governing political units with their own laws, armies, and rivalries, similar to ancient Greek poleis.", "id": "fc05"}, {"front": "Name three major Italian city-states that were prominent centers of the Renaissance.", "back": "Florence, Venice, and Rome.", "id": "fc06"}, {"front": "Which Italian city-state was considered the center of the early Renaissance, and which powerful family ruled it?", "back": "Florence, ruled by the powerful Medici family of bankers.", "id": "fc07"}, {"front": "List five key factors that explain why the Renaissance began in Italy.", "back": "1. Wealth from Mediterranean trade and banking. 2. Abundant physical ruins of Rome. 3. Latin was closer to Italian than to other vernaculars. 4. Greek scholars fled to Italy after Constantinople's fall (1453), bringing ancient manuscripts. 5. A competitive political culture among city-states.", "id": "fc08"}, {"front": "What was “humanism” during the Renaissance, and what were the *studia humanitatis*?", "back": "Humanism was the Renaissance intellectual program centered on the disciplined study of ancient Greek and Roman literature, language, and thought. The *studia humanitatis* were grammar, rhetoric, poetry, history, and moral philosophy.", "id": "fc09"}, {"front": "Was Renaissance humanism anti-Christian? Explain.", "back": "No. Most Renaissance humanists were devout Christians who saw no conflict between faith and classical learning. They believed pagan antiquity offered valuable lessons on rhetoric, politics, history, and ethics for a Christian world.", "id": "fc10"}, {"front": "Who is considered the founder and hero of Renaissance humanism?", "back": "Francesco Petrarca, known as Petrarch, who dedicated his life to searching for lost classical manuscripts and modeling his own writings on ancient forms.", "id": "fc11"}, {"front": "What did humanists believe the study of ancient texts, particularly in their original languages, would achieve?", "back": "They believed it would produce “better people”—more eloquent, more virtuous, and more capable of civic life.", "id": "fc12"}, {"front": "Define “patron” in the context of the Renaissance.", "back": "A wealthy individual who supports artists, scholars, or writers by paying for their work, providing housing, or commissioning specific projects. Patronage was the economic engine of Renaissance art.", "id": "fc13"}, {"front": "How did the Medici family exemplify the role of patrons in the Renaissance?", "back": "As wealthy bankers, they funded numerous artists, scholars, and projects. Cosimo de' Medici funded the translation of Plato's works, and Lorenzo the Magnificent supported artists like Botticelli, Michelangelo, and Leonardo da Vinci.", "id": "fc14"}, {"front": "How did Renaissance painting revolutionize the representation of space compared to medieval art?", "back": "Medieval painting used flat, symbolic forms and hierarchical sizing. Renaissance artists revolutionized this with techniques like linear perspective, creating the illusion of convincing three-dimensional depth on a flat surface.", "id": "fc15"}, {"front": "What is “linear perspective” in art?", "back": "A mathematical system for representing three-dimensional space on a flat surface, where parallel lines appear to converge at a single vanishing point on the horizon, creating the illusion of depth.", "id": "fc16"}, {"front": "Who is credited with rediscovering linear perspective around 1420?", "back": "The architect Filippo Brunelleschi.", "id": "fc17"}, {"front": "Who codified the rules of linear perspective in his treatise *On Painting*, making it widely accessible to artists?", "back": "Leon Battista Alberti.", "id": "fc18"}, {"front": "Which early painter is often called the first Renaissance artist for giving his figures weight and three-dimensionality, even before the Renaissance proper?", "back": "Giotto di Bondone.", "id": "fc19"}, {"front": "Which Renaissance artist painted mythological subjects like *The Birth of Venus* and *Primavera*, known for figures with a dreamy, linear grace?", "back": "Sandro Botticelli.", "id": "fc20"}, {"front": "Who is considered the supreme example of the “Renaissance man” due to his talents as a painter, sculptor, architect, engineer, anatomist, and scientist? Name two of his famous artworks.", "back": "Leonardo da Vinci. His famous works include the *Mona Lisa* and *The Last Supper*.", "id": "fc21"}, {"front": "Primarily a sculptor, which artist was commissioned by Pope Julius II to paint the Sistine Chapel ceiling and created the iconic statue *David*?", "back": "Michelangelo Buonarroti.", "id": "fc22"}, {"front": "Which artist brought the High Renaissance style to its most harmonious expression, notably in his Vatican frescoes like *The School of Athens*?", "back": "Raphael Sanzio.", "id": "fc23"}, {"front": "What significant invention by Johannes Gutenberg in the mid-fifteenth century drastically changed the spread of knowledge during the Renaissance?", "back": "The movable type printing press.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
