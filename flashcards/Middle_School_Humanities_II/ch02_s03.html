<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Describe Anglo-Saxon England's key features before the Norman Conquest.", "back": "It had shires and courts, a literate clergy, a tradition of royal law, and a rich literary language, shaped by Alfred the Great's legacy."}, {"front": "How did the Norman Conquest impact the ruling class and culture of England within a generation?", "back": "The new Norman ruling class overlaid Anglo-Saxon institutions, spoke French, thought in terms of continental feudalism, and answered to a Norman king, though Anglo-Saxon elements were not completely destroyed."}, {"front": "Who were the Normans?", "back": "Descendants of Viking settlers ('Northmen') who received the Duchy of Normandy in 911. By 1066, they were Christianized and Frenchified but retained a strong drive for conquest."}, {"front": "What was William the Conqueror's primary claim to the English throne?", "back": "He claimed Edward the Confessor had promised him the throne, and Harold Godwinson had sworn an oath (on holy relics) to support this claim."}, {"front": "When and where did William the Conqueror land in England to begin his invasion?", "back": "He landed at Pevensey on the Sussex coast on September 28, 1066."}, {"front": "What challenge did Harold Godwinson's army face before meeting William's forces at Hastings?", "back": "Harold's army was already exhausted from a rapid march south after fighting the Battle of Stamford Bridge against Norwegian invaders."}, {"front": "Who were housecarls and what was their significance at the Battle of Hastings?", "back": "Professional Anglo-Saxon household warriors, well-armed and well-paid, who formed the backbone of Harold's army and held the shield wall effectively throughout the morning."}, {"front": "What was the turning point of the Battle of Hastings?", "back": "William's cavalry feigned retreat, luring some of Harold's men off the ridge, which broke the English shield wall. Harold's death immediately followed."}, {"front": "When and where was William the Conqueror crowned King of England?", "back": "On Christmas Day, 1066, in Westminster Abbey."}, {"front": "What is the Bayeux Tapestry, and what is its historical significance?", "back": "An embroidery (not a tapestry), approximately 70 meters long, made in the 1070s. It depicts the events leading to the Norman Conquest from William's point of view and is a detailed visual record of the era and the battle."}, {"front": "What was the primary reason William undertook the 'Harrying of the North'?", "back": "To suppress serious English rebellions, particularly in 1069–1070, which were often allied with Danish raiders, and to prevent future challenges to his rule."}, {"front": "Describe the methods and impact of the Harrying of the North.", "back": "William systematically destroyed villages, farms, livestock, and food stores across Yorkshire and surrounding counties, leading to widespread starvation, depopulation, and economic devastation for over a generation."}, {"front": "What does Orderic Vitalis's account reveal about William's actions during the Harrying of the North?", "back": "It describes William's unrestrained fury, punishing innocent with guilty, burning all means of sustenance, and causing over 100,000 deaths from famine."}, {"front": "What is the Domesday Book and when was it compiled?", "back": "A comprehensive survey of virtually every manor, estate, and landholding in England, commissioned by William the Conqueror in 1085–1086."}, {"front": "Why was the Domesday Book given its name?", "back": "From the Old English 'dom' (judgment), because its decisions regarding land ownership and value were considered final and without appeal, like the Last Judgment."}, {"front": "What was the Domesday Book's practical purpose for William, and what historical insight does it provide today?", "back": "It provided William with accurate information for taxation and military planning. Today, it offers an unparalleled window into eleventh-century England, showing the thorough replacement of the Anglo-Saxon aristocracy by Normans."}, {"front": "Define feudalism as applied in medieval Europe.", "back": "A system of political and social organization based on the exchange of land (fief) for military service and loyalty. A lord granted land to a vassal, who swore fealty and owed military service."}, {"front": "How did William the Conqueror implement feudalism in England, and what was its effect on royal power?", "back": "He treated all English land as his property, granting it to Norman followers in exchange for military service (knights). This created a military force directly dependent on royal favor, giving him firm control over his nobility."}, {"front": "What was the central issue of the Investiture Controversy?", "back": "The dispute between popes and kings (or Holy Roman Emperors) over who had the right to appoint (invest) bishops and abbots with their office and lands."}, {"front": "Why was the appointment of bishops a significant power in medieval Europe?", "back": "Bishops controlled vast amounts of land and wealth, making them powerful figures in both church and state. A king who could appoint bishops secured reliable allies."}, {"front": "What famous event illustrates the intensity of the Investiture Controversy?", "back": "German Emperor Henry IV standing barefoot in the snow at Canossa for three days in January 1077, seeking Pope Gregory VII to lift his excommunication."}, {"front": "Who was Anselm of Canterbury, and what was his contribution to medieval thought?", "back": "Archbishop of Canterbury from 1093, a major theologian whose motto was 'faith seeking understanding' (fides quaerens intellectum). He believed faith and reason were partners and is often called the founder of scholasticism."}, {"front": "What is scholasticism?", "back": "The medieval intellectual method of using philosophical reasoning (especially Aristotelian logic) to explore and defend theological questions, aiming to show that faith and reason reinforce each other."}, {"front": "What historical period is referred to as 'the Anarchy' in England?", "back": "The civil war (1135–1154) between King Stephen and the Empress Matilda for the English throne."}, {"front": "Who was Henry II, and what dynasty did he found?", "back": "He came to power in 1154, ending 'the Anarchy,' and founded the Plantagenet dynasty. He controlled a vast 'Angevin Empire' stretching from Scotland to the Pyrenees."}, {"front": "Define the Plantagenet dynasty.", "back": "The royal dynasty founded by Henry II in 1154, ruling England until 1485. The name comes from 'planta genista' (broom plant), a family heraldic symbol."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
