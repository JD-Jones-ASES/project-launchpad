<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What social and economic system did William the Conqueror import to England after the Battle of Hastings?", "back": "He imported feudalism, an organization of society around the exchange of land for military service, from the continent."}, {"front": "Define \"feudalism\" as it was implemented in Norman England.", "back": "Feudalism was a social and economic system where society was organized around the exchange of land (fiefs) for loyalty and military service, creating a hierarchical structure of obligations."}, {"front": "Describe the basic structure of the feudal pyramid.", "back": "At the top was the king, followed by great lords (barons/earls), then knights, and at the bottom, the vast majority were villeins (serfs/peasants)."}, {"front": "What was the theoretical basis of the king's power regarding land in the feudal system?", "back": "In theory, the king owned all the land in the kingdom, making him the ultimate landlord."}, {"front": "Define \"vassal\" in the context of the feudal system.", "back": "A vassal was a person who held land from a lord in exchange for loyalty and military service. A person could be both a lord to those below them and a vassal to those above."}, {"front": "What was the ceremony called that sealed the relationship between a lord and a vassal, and what did it involve?", "back": "The ceremony was called homage. The vassal knelt before his lord, placed his hands between the lord's hands, and swore an oath of fealty (faithfulness)."}, {"front": "What were the primary obligations of a baron or great lord to the king?", "back": "Barons received large estates (fiefs) from the king in exchange for their homage and the promise to supply a specified number of armed knights when the king called."}, {"front": "What was the role and obligation of a knight in the feudal system?", "back": "Knights were professional warriors who received smaller portions of land from barons and were obligated to serve their lord for a specified number of days per year (typically forty) with his horse and armour."}, {"front": "Who were the \"villeins\" (also known as serfs or peasants) and what was their position in society?", "back": "Villeins were the vast majority of the population who worked the land and owed labor and dues to the lord of their manor. They were legally bound to the land."}, {"front": "How did the legal status of a villein differ from that of a slave?", "back": "Villeins were not slaves; they could not be bought and sold apart from the land. However, they were not free either, as they could not leave their lord's land or marry without permission and owed labor and fees."}, {"front": "What was a practical weakness of the feudal system's structure regarding loyalty?", "back": "While the king was at the apex, a baron's first loyalty was often to his immediate lord, not always to the distant king, which could make medieval kingdoms less unified."}, {"front": "Define \"manor\" and explain its significance in medieval economic life.", "back": "A manor was the basic unit of medieval economic life, consisting of a lord's estate, including his residence, a village, farmland, a mill, a church, and sometimes other facilities."}, {"front": "What was \"manorialism\"?", "back": "Manorialism was the system by which manors were organized and operated, governing the economic and social interactions between the lord and the peasants who worked his estate."}, {"front": "Describe the \"three-field system\" of agriculture.", "back": "The three-field system divided a manor's farmland into three large fields: one grew a winter crop, one a summer crop, and one was left fallow. These rotated annually to maintain soil fertility."}, {"front": "What was the purpose of leaving one field \"fallow\" in the three-field system?", "back": "Agricultural land was left unplanted for a season or year to allow the soil to rest and recover its fertility, often enhanced by grazing animals whose manure restored nutrients."}, {"front": "What were some of the key obligations and fees a villein owed to their lord?", "back": "Villeins typically owed two or three days of labor per week on the lord's own fields (the demesne), fees for using the lord's mill and bakehouse, a payment when a daughter married, and a \"death duty\" (the lord took their best animal)."}, {"front": "What did Norman castles symbolize and how were they used as instruments of conquest?", "back": "Castles symbolized Norman power and control. They were planted in rebellious districts to intimidate local populations, signaling surveillance and futility of resistance."}, {"front": "Describe the earliest type of Norman castle built in England.", "back": "The earliest type was the \"motte-and-bailey\" castle, consisting of a wooden tower on a raised earthen mound (motte) connected to an enclosed courtyard (bailey) ringed by a palisade and ditch. They were fast to build."}, {"front": "How did Norman castle architecture evolve after the initial motte-and-bailey designs?", "back": "Over the following century, wooden motte-and-bailey castles were replaced by stone structures, with the massive square or rectangular stone keep becoming the standard form (e.g., the Tower of London)."}, {"front": "What was the Domesday Book (1086), and what information did it record?", "back": "The Domesday Book was a comprehensive survey that recorded details for virtually every estate in England, including who held the land before and after the Conquest, population counts, resources (ploughs, meadows, woodlands), and property value."}, {"front": "What significant historical transformation does the Domesday Book reveal about Norman England?", "back": "It clearly reveals the transformation of England's ruling class, showing English names replaced by Norman names as landowners, tracing the impact of the Conquest manor by manor."}, {"front": "What was the \"Angevin Empire\" and who established it?", "back": "The Angevin Empire was a collection of territories in France (Normandy, Anjou, Maine, Touraine, Aquitaine) controlled by King Henry II of England, alongside England itself, giving him more French territory than the King of France."}, {"front": "Compare the centralized power of the Roman Empire's provincial administration with the decentralized nature of feudalism.", "back": "Roman administration was centralized, with power flowing directly from the emperor through governors. Feudalism was decentralized, with loyalty primarily to immediate lords, making direct royal commands to lower vassals difficult."}, {"front": "What were the main strengths and weaknesses of feudalism as a system of governance compared to Roman administration?", "back": "Feudalism's strength was its ability to function without a powerful central government (delegation, mutual obligation). Its weakness was its inability to produce unified action due to fragmented loyalties."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
