<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why was Jerusalem considered the holiest place on Earth for medieval Christians?", "back": "It was the city where Jesus was believed to have been crucified, buried, and risen from the dead, making it a primary destination for religious pilgrimage."}, {"front": "Define 'pilgrimage' in the context of medieval Christian Europe.", "back": "A journey made to a holy place as an act of religious devotion, considered one of the most important religious practices. Prized destinations included Rome, Santiago de Compostela, and especially Jerusalem."}, {"front": "Who were the Seljuk Turks and how did their actions contribute to the call for the Crusades?", "back": "A Central Asian Turkic people who converted to Sunni Islam and built a powerful empire. Their conquest of Byzantine lands (Battle of Manzikert, 1071) and threat to Constantinople led the Byzantine Emperor to appeal to the Pope for help."}, {"front": "What was the significance of the Battle of Manzikert in 1071?", "back": "In this battle, the Seljuk Turks shattered the Byzantine army, allowing them to overrun much of Anatolia and push close to Constantinople, prompting the Byzantine Emperor Alexios I Komnenos's appeal to the Pope."}, {"front": "Who issued the call for the First Crusade and where did it take place?", "back": "Pope Urban II, at a great council held in Clermont, France, in November 1095."}, {"front": "What were the main appeals Pope Urban II made in his speech at Clermont?", "back": "He described the suffering of Eastern Christians and desecration of holy places, called on knights to use their fighting skills for a righteous purpose (freeing Jerusalem), and promised remission of sins for those who died on Crusade."}, {"front": "What was the crowd's unanimous response to Urban II's speech, and what did it mean?", "back": "'Deus lo volt!' which means 'God wills it!' It became the battle cry of the First Crusade."}, {"front": "What theological significance did Pope Urban II's offer of 'remission of sins' for Crusaders hold?", "back": "It was offered as a form of penance for sins committed, not as a guarantee of salvation by works, but as a path to forgiveness through holy war."}, {"front": "Define 'Crusade' according to the text.", "back": "From the Spanish cruzada ('marked with the cross'), a holy war called by the Pope, with participants wearing a red cross. Crusaders believed it was both a pilgrimage (peregrinatio) and a military campaign, with remission of sins promised to those who died."}, {"front": "Beyond genuine religious devotion, what other motivations contributed to people joining the Crusades?", "back": "Political ambition, economic interest (e.g., younger sons seeking land they couldn't inherit), and the culture of knightly warfare (seeking purpose and glory). These motivations coexisted with religious zeal."}, {"front": "Describe the 'People's Crusade' and its fate during the First Crusade.", "back": "An unofficial, disorganized mass of peasants, minor knights, and zealous poor people led by Peter the Hermit. It set out before the main army and was almost entirely destroyed by the Seljuk Turks in Anatolia."}, {"front": "Name the four main Crusader States established after the First Crusade.", "back": "The County of Edessa, the Principality of Antioch, the County of Tripoli, and the Kingdom of Jerusalem."}, {"front": "What happened when the First Crusaders captured Jerusalem in 1099?", "back": "After a five-week siege, the Crusaders breached the walls and massacred most of the Muslim and Jewish inhabitants, then wept with joy and prayed at the Church of the Holy Sepulchre."}, {"front": "What was the primary purpose of the Military Orders, like the Knights Templar and Knights Hospitaller?", "back": "To provide permanent defenders for the Crusader States, combining the life of a monk (vows of poverty, chastity, obedience) with the life of a warrior, sworn to fight for the faith."}, {"front": "Briefly describe the Knights Templar.", "back": "The Poor Fellow-Soldiers of Christ and of the Temple of Solomon, founded c. 1119. They were warrior-monks who defended pilgrims and Christian territories, known for their white mantles with red crosses. They also became wealthy bankers, which eventually led to their destruction."}, {"front": "What prompted the Second Crusade, and who was its most famous preacher?", "back": "The fall of the County of Edessa to the Muslim lord Zengi in 1144. Its most famous preacher was Bernard of Clairvaux."}, {"front": "What was the outcome of the Second Crusade?", "back": "It was a disaster. The German and French armies failed to coordinate, attacked the wrong targets, and accomplished nothing, leading Bernard of Clairvaux to explain it as God's judgment on the Crusaders' sins."}, {"front": "Who was Saladin, and what was his significance in the Crusades?", "back": "Salah ad-Din Yusuf ibn Ayyub, a Kurdish general and Sultan of Egypt and Syria. He unified Muslim opposition, was a brilliant military commander, and notably humane by medieval standards, leading to the recapture of Jerusalem in 1187."}, {"front": "What was the Battle of Hattin (1187) and its immediate consequence?", "back": "A catastrophic ambush where Saladin defeated and destroyed the combined army of the Crusader states in the desert. This led directly to Saladin's reconquest of nearly the entire Kingdom of Jerusalem, including the city itself."}, {"front": "How did Saladin's treatment of Jerusalem after its capture in 1187 compare to the First Crusaders' capture in 1099?", "back": "Saladin forbade a massacre, ransomed those who could pay, and allowed Christian pilgrims to continue visiting holy sites, contrasting sharply with the First Crusaders' slaughter of Muslim and Jewish inhabitants."}, {"front": "What prompted the Third Crusade, and who were its three most powerful leaders?", "back": "The fall of Jerusalem to Saladin in 1187. Its leaders were Holy Roman Emperor Frederick Barbarossa, King Philip II of France, and King Richard I (the Lionheart) of England."}, {"front": "What ultimately happened to the major leaders of the Third Crusade?", "back": "Frederick Barbarossa drowned crossing a river, Philip II quarreled with Richard and left early, leaving Richard I essentially alone to fight Saladin, though he could not retake Jerusalem."}, {"front": "Name an example of a famous Crusader castle mentioned in the text.", "back": "Krak des Chevaliers, built by the military orders, still stands today in modern Syria as one of the best-preserved medieval fortresses."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
