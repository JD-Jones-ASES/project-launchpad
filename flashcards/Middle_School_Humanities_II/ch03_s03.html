<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did the Crusades change the nature of pilgrimage to Jerusalem?", "back": "They transformed it from a personal spiritual journey into a military expedition, but also made it more common as Crusader states controlled the route."}, {"front": "What types of routes did the First Crusade follow to Jerusalem?", "back": "They followed ancient Roman roads and established trade routes, passing through regions that had been Christian for centuries (like the Balkans and Greece) and previously contested territories."}, {"front": "How did Islamic civilization generally compare to Western European civilization during the 11th and 12th centuries?", "back": "The Islamic world was, in many ways, more sophisticated, having preserved and extended knowledge from ancient civilizations (Greek, Persian, Mesopotamian, Egyptian) much of which had been lost in the Latin West."}, {"front": "Name two significant mathematical contributions that entered Europe from the Islamic world.", "back": "Arabic numerals (which we still use today) and algebra (from the Arabic 'al-jabr')."}, {"front": "Who was Ibn Sina (Avicenna) and what was his major contribution to medicine?", "back": "Ibn Sina was an Islamic physician (c. 980–1037) who wrote a medical encyclopedia that remained a standard text in European universities for centuries."}, {"front": "What astronomical instrument, developed and refined by Arab scientists, was adopted in Europe and used to determine latitude and tell time from stars?", "back": "The astrolabe."}, {"front": "How did Islamic architecture influence European building design during the Crusades?", "back": "The pointed arch, seen by Crusaders in mosques and palaces, was adopted and dramatically used in Gothic cathedrals."}, {"front": "What role did Ibn Rushd (Averroes) play in making Aristotle's philosophy available to medieval European scholars?", "back": "His extensive commentaries on Aristotle were translated into Latin in the 12th and 13th centuries, making Aristotle's works available to scholars like Thomas Aquinas."}, {"front": "Define 'astrolabe'.", "back": "A navigational and astronomical instrument developed and refined by Arab scientists, used to determine latitude, tell time from the position of stars, and calculate celestial body positions. It passed from the Islamic world into European use."}, {"front": "What was the general state of the Islamic World when the First Crusade arrived in Jerusalem in 1099?", "back": "It stretched from Spain to India/China, boasted advanced universities (like the House of Wisdom), sophisticated medical systems, and impressive architecture. Much of what became 'Western' science, mathematics, and philosophy entered Europe through contact with this world."}, {"front": "How did the Crusades impact trade between Europe and the East?", "back": "They dramatically accelerated it, leading to the development of extensive commercial networks across the Mediterranean by Italian trading partners, especially Venice, Genoa, and Pisa."}, {"front": "What was the 'spice trade' and why were spices so valuable in the Middle Ages?", "back": "The trade in valuable spices (pepper, cinnamon, cloves, nutmeg, ginger) from the Far East and India to European markets. Spices were enormously valuable for preserving and flavoring food, and for medicinal uses."}, {"front": "What goods did Europeans primarily desire from the East during the Crusade era?", "back": "Spices (above all), silk from China, fine cotton from India, glassware, carpets, metalwork, and vivid dyes."}, {"front": "What goods did the East primarily desire from Europe during the Crusade era?", "back": "Primarily silver and gold (due to a chronic shortage), as well as timber, iron, wool, and weapons (though the Pope often forbade weapon sales to Muslims)."}, {"front": "What long-term economic and cultural impact did the wealth generated by the spice trade have on Europe?", "back": "It enormously enriched the Italian city-states, providing the financial foundation that would eventually fund the Renaissance."}, {"front": "What type of castle architecture did Crusaders initially use, and what challenges did they face in the Holy Land?", "back": "They initially used the motte-and-bailey castle (built of timber). In the Holy Land, they faced a dry landscape, a hostile environment, and the need for small garrisons to hold large territories against numerically superior enemies."}, {"front": "What new type of military architecture was developed by Crusaders in response to challenges in the Holy Land?", "back": "The concentric castle."}, {"front": "Define 'concentric castle' and explain its key defensive advantage.", "back": "A castle built with multiple rings of defensive walls, each higher than the ring outside it. Its key advantage was that even if an outer wall fell, defenders could retreat to the next, higher wall, offering multiple layers of defense."}, {"front": "Name the most famous Crusader castle and how it eventually fell.", "back": "Krak des Chevaliers, held by the Knights Hospitaller. It was never taken by force, but eventually fell in 1271 by treachery, when defenders were tricked into surrendering by a forged letter."}, {"front": "How did Crusader castle architecture influence European building upon their return?", "back": "The design of concentric castles was brought back to Europe, influencing English castle-building, such as Edward I's great Welsh castles (e.g., Conway, Caernarfon) in the 1280s."}, {"front": "How did the Crusades contribute to the development of the code of chivalry?", "back": "The experience of fighting together for years, far from home, under a holy cause, fostered a shared culture of valor, loyalty, and honor among knights, shaping the chivalric ideal."}, {"front": "Define 'chivalry' as a code of conduct.", "back": "The code of conduct for medieval knights, combining military skill, Christian piety, loyalty to one's lord, and courteous behavior (especially toward women and the defeated). It was an aspirational ideal, not always achieved in practice."}, {"front": "Give an example of chivalric behavior between enemies during the Crusades.", "back": "The relationship between Richard I and Saladin, who sent each other gifts during the Third Crusade, became a celebrated example of respecting a worthy enemy."}, {"front": "What was the fundamental difference between Roman Mediterranean trade and Crusade-era Mediterranean trade regarding political control?", "back": "Roman trade was held together by a single empire ('mare nostrum'), while Crusade-era trade was characterized by competing powers (Italian city-states, Crusader kingdoms, Byzantine, Muslim states) creating an 'anarchic order' driven by commercial interest."}, {"front": "What 'recurring pattern of Western history' is illustrated by the transfer of Greek philosophy during the Crusades?", "back": "The pattern of cultural transfer and the flow of knowledge and technology across boundaries when civilizations meet, even in conflict (e.g., Greek philosophy traveling back to medieval Europe through Islamic scholars and Crusade-era contact)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
