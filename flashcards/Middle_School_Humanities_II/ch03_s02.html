<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did the Crusades transform the nature of pilgrimage to Jerusalem?", "back": "The Crusades transformed pilgrimage from a personal spiritual journey into a military expedition, but also made it more common by securing the routes through the Crusader states."}, {"front": "What types of routes did the First Crusade generally follow to Jerusalem?", "back": "The Crusaders followed ancient Roman roads and established trade routes, passing through regions that had been Christian for centuries, contested for generations, and a coastline traded across for millennia."}, {"front": "How did Islamic civilization compare to Western European culture during the eleventh and twelfth centuries?", "back": "The Islamic world was an heir to multiple ancient civilizations (Greek, Persian, Mesopotamian, Egyptian) and had preserved and extended Greek philosophy and science when much of it was lost in the Latin West, making it more sophisticated in many ways."}, {"front": "Name three areas where Islamic scholars made fundamental advances that influenced Europe during the Crusade era.", "back": "Mathematics (Arabic numerals, algebra), Medicine (e.g., Ibn Sina's encyclopedia), Astronomy (astrolabe, star names), Architecture (pointed arch), and Philosophy (commentaries on Aristotle)."}, {"front": "What significant mathematical concepts and systems were introduced to Europe from the Islamic world?", "back": "Arabic numerals (which we still use today) and algebra (from the Arabic 'al-jabr')."}, {"front": "Who was Ibn Sina (Avicenna), and what was his contribution to medicine?", "back": "Ibn Sina was an Islamic physician whose medical encyclopedia remained the standard text in European universities for centuries."}, {"front": "Describe some contributions of Arab astronomers.", "back": "They preserved and extended Ptolemy's work, developed instruments like the astrolabe, and gave many stars names still used today (e.g., Aldebaran, Betelgeuse)."}, {"front": "Which significant architectural feature, commonly seen in Gothic cathedrals, originated in Islamic architecture?", "back": "The pointed arch. Crusader builders first saw it in the mosques and palaces of the Holy Land."}, {"front": "How did Arab scholars like Ibn Rushd (Averroes) contribute to European philosophy?", "back": "Ibn Rushd wrote extensive commentaries on Aristotle, which were translated into Latin and made Aristotle's work available to scholars like Thomas Aquinas in the High Middle Ages."}, {"front": "Define 'astrolabe'.", "back": "An astronomical and navigational instrument developed and refined by Arab scientists, used to determine latitude, tell time from stars, and calculate celestial body positions. It transferred from the Islamic world to Europe during the Crusades."}, {"front": "Summarize the state of the Islamic world at the time of the First Crusade (1099).", "back": "It stretched from Spain to India/China, possessing the most advanced universities (like the House of Wisdom), sophisticated medical systems, and great architecture. It was, in many material ways, more developed than Europe."}, {"front": "How did the Crusades impact the trade between Europe and the East?", "back": "The Crusades dramatically accelerated trade, fostering commercial networks between Crusader states, Italian trading partners (Venice, Genoa, Pisa), and the East, moving goods in unprecedented volume."}, {"front": "What was the 'spice trade' and why were spices valuable in the Middle Ages?", "back": "The trade in spices (pepper, cinnamon, cloves, nutmeg, ginger) from the Far East/India to Europe. Spices were enormously valuable for preserving and flavoring food, and for medicines."}, {"front": "What goods did Europeans primarily desire from the East via the spice trade?", "back": "Spices (pepper, cinnamon, cloves, nutmeg), silk from China, fine cotton from India, glassware, carpets, metalwork, and vivid dyes."}, {"front": "What goods did the East primarily want from Europe in return during the Crusade era?", "back": "Primarily silver and gold (due to a chronic shortage of bullion), timber, iron, wool, and weapons (often illegally traded despite papal bans)."}, {"front": "What was a significant long-term economic and cultural impact of the Crusades-era Mediterranean trade on Europe?", "back": "This trade enormously enriched Italian city-states (Venice, Genoa, Pisa), and this wealth eventually funded the Renaissance."}, {"front": "What military architectural innovation emerged from the Crusader states, and why was it developed?", "back": "The concentric castle. It was developed in response to the need for small garrisons to hold large territories in a dry, hostile landscape against numerically superior enemies."}, {"front": "Define 'concentric castle'.", "back": "A castle built with multiple rings of defensive walls, each higher than the ring outside it. This design allowed defenders to retreat to inner walls if outer ones fell."}, {"front": "Name one of the greatest Crusader castles and describe its significance.", "back": "Krak des Chevaliers, held by the Knights Hospitaller in Syria. It was besieged multiple times and never taken by force until treachery in 1271, and it stands today as one of the best-preserved medieval castles."}, {"front": "How did the concentric castle design influence European architecture?", "back": "Crusaders brought the design back to Europe, influencing castle-building, such as Edward I's Welsh castles (Conway, Caernarfon, Harlech, Beaumaris) in the 13th-14th centuries."}, {"front": "Define 'chivalry'.", "back": "The code of conduct for medieval knights, combining military skill, Christian piety, loyalty to one's lord, and courteous behavior, especially toward women and the defeated."}, {"front": "How did the Crusades help shape the code of chivalry?", "back": "Men fighting together for years under a holy cause developed a shared culture of valor, loyalty, and honor. The mutual respect between figures like Richard I and Saladin became a celebrated example."}, {"front": "How should chivalry be understood in the context of medieval warfare?", "back": "Chivalry was an aspirational ideal, not a descriptive reality of brutal medieval warfare. However, it was a genuine attempt to impose Christian moral limits on violence (like the Peace of God), creating a cultural pressure toward restraint."}, {"front": "What was the crucial difference between Roman Mediterranean trade networks and Crusade-era Mediterranean trade?", "back": "Roman trade was unified by a single empire's military power and law ('mare nostrum'). Crusade-era trade involved competing powers (Italian city-states, Crusader kingdoms, Byzantine, Muslim states) achieving 'anarchic order' through commercial interest even among enemies."}, {"front": "What is a recurring pattern of Western history demonstrated by the transfer of Greek philosophy through the Islamic world during the Crusades?", "back": "When two civilizations meet—even in conflict—knowledge and technology often flow across the boundary. This demonstrates cultural transfer through military contact, allowing the West to recover its intellectual heritage."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
