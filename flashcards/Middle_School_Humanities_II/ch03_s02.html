<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental challenge do historians face when using eyewitness accounts, especially from the Crusades?", "back": "Eyewitnesses interpret events through the lenses of their culture, loyalties, and assumptions, leading to vastly different descriptions of the same event.", "id": "fc01"}, {"front": "How do historians approach multiple, conflicting eyewitness accounts, according to the text?", "back": "Historians should trust 'all of them, carefully, together,' triangulating different perspectives rather than dismissing any single account entirely.", "id": "fc02"}, {"front": "Name the three key 'voices' from the Crusades discussed in this section, and briefly identify their roles.", "back": "Robert the Monk (French Benedictine, recorded Urban II's speech), Geoffrey of Villehardouin (French nobleman, participant in Fourth Crusade), and Anna Komnene (Byzantine Emperor's daughter, observed First Crusade).", "id": "fc03"}, {"front": "Who was Robert the Monk, and when did he write his account of Urban II's speech?", "back": "Robert the Monk was a French Benedictine who was present at Clermont in 1095. He wrote his account, 'Historia Iherosolimitana,' around 1107, more than a decade after the events.", "id": "fc04"}, {"front": "Describe the nature of Robert the Monk's account of Pope Urban II's speech.", "back": "It was not a verbatim transcript but a literary reconstruction, shaped by Robert's memory, what others told him, and his belief that the Crusade was God's will.", "id": "fc05"}, {"front": "According to Robert the Monk's version of Urban II's speech, what economic argument was made to encourage participation in the First Crusade?", "back": "Urban II described Western Europe as overcrowded and too narrow for its population, implying the Holy Land offered new opportunities for land and resources.", "id": "fc06"}, {"front": "What significant religious promise did Pope Urban II offer to Crusaders, as reported by Robert the Monk?", "back": "He promised immediate remission of sins for all who died on the way, by land or sea, or in battle against 'pagans.'", "id": "fc07"}, {"front": "Define 'indulgence' in medieval Catholic theology, as discussed in the text.", "back": "An indulgence was a remission of the temporal punishment due for sins already forgiven in confession, reducing a debt to be paid in this life or purgatory, through the merits of Christ and the saints.", "id": "fc08"}, {"front": "What was the long-term historical significance of the promise of indulgences, especially in later centuries?", "back": "The tradition of indulgences, vastly expanded and abused, would become a central issue attacked by Martin Luther in his 95 Theses, sparking the Protestant Reformation.", "id": "fc09"}, {"front": "What was the crowd's famous response to Urban II's speech, attested by all eyewitnesses?", "back": "“Deus lo volt!” (God wills it!)", "id": "fc10"}, {"front": "Who was Geoffrey of Villehardouin, and which Crusade did he participate in?", "back": "Geoffrey of Villehardouin was a French nobleman and Marshal of Champagne who participated in the Fourth Crusade from its beginning.", "id": "fc11"}, {"front": "What was Villehardouin's major written work, and what is its significance?", "back": "His work was 'La Conquête de Constantinople' (The Conquest of Constantinople), one of the first extended prose works in the French language and a key eyewitness account of the medieval world.", "id": "fc12"}, {"front": "How does Villehardouin's account of the Fourth Crusade's sack of Constantinople demonstrate 'limited honesty'?", "back": "He describes events with clarity and reports the immense booty with satisfaction, but he omits the moral disaster, such as civilian deaths and desecration of Christian churches, and expresses no doubt about the Crusaders' actions.", "id": "fc13"}, {"front": "Explain the historical concept: 'The Problem of Self-Justification in History.'", "back": "It is the tendency for people who commit terrible acts to genuinely believe they have good reasons or are serving a higher purpose, making it crucial for historians to analyze their underlying assumptions and self-understandings.", "id": "fc14"}, {"front": "Who was Anna Komnene, and what was her relationship to the Byzantine Empire during the First Crusade?", "back": "Anna Komnene was the daughter of Byzantine Emperor Alexios I Komnenos, the very emperor who had appealed to the Pope for military help and witnessed the arrival of the First Crusade.", "id": "fc15"}, {"front": "What was Anna Komnene's major work, and what perspective did it offer on the Crusades?", "back": "Her work was 'The Alexiad,' a biography of her father that recorded the arrival of the First Crusade from the Byzantine perspective, viewing Crusaders as 'barbarians.'", "id": "fc16"}, {"front": "How did Anna Komnene generally perceive the Crusaders who arrived in the Byzantine Empire?", "back": "She viewed them as violent, undisciplined, greedy, theologically unsophisticated 'barbarians' and saw their presence as destabilizing rather than helpful.", "id": "fc17"}, {"front": "What did Emperor Alexios I Komnenos initially expect from the West, according to Anna Komnene, versus what arrived?", "back": "He had asked for mercenaries but instead received large armies of 'knights' who seemed intent on claiming parts of his empire as their reward, causing him concern.", "id": "fc18"}, {"front": "Why is Anna Komnene considered one of the most important voices in Crusade history, despite not being a 'Crusade voice' herself?", "back": "Her external, non-Western perspective provides invaluable information and a critical counterbalance that would be missing if historians relied solely on Latin sources.", "id": "fc19"}, {"front": "What did the Byzantine term 'Franks' reveal about the relationship between Eastern and Western 'Christendom'?", "back": "The term 'Franks' (used for all Western Europeans) highlighted the significant Byzantine-Western divide, demonstrating that 'Christendom' was not a unified civilization and that the two churches had been drifting apart for centuries.", "id": "fc20"}, {"front": "How did Robert the Monk's perspective differ from Anna Komnene's regarding the motivation and justification for the Crusades?", "back": "Robert saw the Crusade as God's clear command to liberate the Holy Land, with violence fully justified. Anna viewed the Crusaders as primarily motivated by greed and an unstable, self-serving desire for conquest.", "id": "fc21"}, {"front": "Compare Geoffrey of Villehardouin's view of the Fourth Crusade's outcome with Anna Komnene's general view of Crusader impact.", "back": "Villehardouin saw the Fourth Crusade's capture of Constantinople as a military victory and a source of glory and booty. Anna viewed the Crusaders generally as a destabilizing 'deluge' of foreigners whose presence threatened rather than defended the East.", "id": "fc22"}, {"front": "What central lesson do these three voices—Robert, Villehardouin, and Anna—collectively teach historians about interpreting historical events?", "back": "They teach that understanding any historical event requires synthesizing multiple, often conflicting, perspectives to grasp the full complexity and avoid relying on a single, biased narrative.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
