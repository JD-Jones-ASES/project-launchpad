<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What overarching characteristic defined the literature of the High Middle Ages, as described in the introduction?", "back": "It was ambitious, attempting to map moral/spiritual universes, answer profound questions, or describe vast, new worlds."}, {"front": "Who are four prominent literary figures from the High Middle Ages discussed in this section?", "back": "Dante Alighieri, Thomas Aquinas, Marco Polo, and Francis of Assisi."}, {"front": "How did the literary approaches of Dante, Aquinas, Marco Polo, and Francis of Assisi differ despite living in the same era?", "back": "Aquinas used precise philosophical argument, Dante used soaring poetic imagery, Marco Polo used careful observation, and Francis used simple, grateful language of faith."}, {"front": "Who was Dante Alighieri, and what personal event profoundly influenced the writing of The Divine Comedy?", "back": "He was a Florentine poet, philosopher, and politician, banished from Florence in 1301. His exile deeply colored his poem with longing and fury."}, {"front": "What is Dante Alighieri's most famous work, and what are its three main sections?", "back": "The Divine Comedy, structured as a journey through Hell (Inferno), Purgatory (Purgatorio), and Heaven (Paradiso)."}, {"front": "What was Dante's revolutionary linguistic choice in writing The Divine Comedy, and what was its significance?", "back": "He wrote it in the Tuscan dialect of Italian (everyday language) instead of Latin, asserting that Christian truths deserved to be expressed in the common tongue, and setting a model for standard Italian."}, {"front": "In The Divine Comedy, who serves as Dante's initial guide through Hell and Purgatory?", "back": "The Roman poet Virgil."}, {"front": "What does Virgil symbolize in The Divine Comedy, and why can he not lead Dante into Heaven?", "back": "Virgil symbolizes classical reason. He cannot enter Heaven because he lived before Christ, signifying that reason can guide through sin and repentance, but faith is required for the final vision of God."}, {"front": "Where does Dante place virtuous non-Christians, such as Virgil and Homer, in the afterlife?", "back": "In Limbo, the first circle of Hell, a place for virtuous pagans who lived before Christ and cannot be saved."}, {"front": "What famous warning is inscribed above the Gate of Hell in Dante's Inferno, Canto III?", "back": "“All hope abandon, ye who enter in!”"}, {"front": "Explain the fundamental principle behind the organization of punishments in Dante's Hell.", "back": "The punishments strictly fit the crimes; they are logical consequences of the sinner's own choices, extended into eternity."}, {"front": "How does Dante define sin, which informs the structure of his Hell?", "back": "Dante believed sin is a disorder of the soul, a turning away from God toward a lesser good."}, {"front": "Describe Dante's depiction of Satan at the very bottom of Hell.", "back": "Satan is portrayed not as magnificent, but as a grotesque, weeping figure, frozen in a lake of ice, eternally chewing the greatest traitors in his three mouths."}, {"front": "What theological point does Dante convey by depicting Satan as frozen, weeping, and mindless?", "back": "That the rejection of God, taken to its extreme, leads not to heroic independence but to nothingness, helplessness, and the absence of good."}, {"front": "Which type of sin does Dante deem the absolute worst, reserving the lowest circle of Hell for its perpetrators?", "back": "Betrayal, specifically placing Judas Iscariot in Satan's central mouth."}, {"front": "What is the title of Thomas Aquinas's most famous and influential work?", "back": "The Summa Theologica."}, {"front": "What was the primary objective of Thomas Aquinas in writing the Summa Theologica?", "back": "To systematically answer every important theological and philosophical question using careful logical argument."}, {"front": "Describe the distinctive format used by Thomas Aquinas in the Summa Theologica.", "back": "Each question is posed, objections are stated, a reply is given, and then the objections are answered one by one."}, {"front": "What are the 'Five Ways' (quinque viae) in the Summa Theologica?", "back": "Thomas Aquinas's five arguments for the existence of God, each reasoning from an observable fact about the world."}, {"front": "Why are the 'Five Ways' significant in Aquinas's work regarding faith and reason?", "back": "They are arguments from reason alone, demonstrating that reason, properly used, can lead to conclusions about God's existence, thus showing no contradiction between natural philosophy and Christian theology."}, {"front": "How did the ancient philosopher Aristotle influence Thomas Aquinas's 'argument from motion' for God's existence?", "back": "Aquinas directly drew on Aristotle's concept of an 'unmoved mover' from his Physics and Metaphysics, identifying this prime mover with the Christian God."}, {"front": "What is the title of Marco Polo's famous account of his travels?", "back": "The Travels of Marco Polo."}, {"front": "Under what unusual circumstances was Marco Polo's book originally created?", "back": "He dictated his experiences to Rustichello of Pisa in 1298 while both were prisoners of war in Genoa."}, {"front": "What major geographical areas did Marco Polo's book describe, providing Europeans with their first detailed accounts?", "back": "The Mongol Empire, China, Southeast Asia, Japan, India, and East Africa."}, {"front": "What was the name of Kublai Khan's capital city, vividly described by Marco Polo?", "back": "Khanbaliq (modern Beijing)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
