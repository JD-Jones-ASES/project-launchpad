<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What period of history do the High Middle Ages approximately cover?", "back": "The High Middle Ages roughly span from 1150 to 1350."}, {"front": "Define 'flying buttress' and explain its significance in medieval architecture.", "back": "A flying buttress is an arched stone support that transfers the outward thrust of a heavy stone vault to an outer pier, freeing the wall between them from bearing weight. It allowed Gothic architects to thin walls, fill them with large windows, and build to unprecedented heights."}, {"front": "How is the High Middle Ages characterized as 'a civilization building upward in every sense'?", "back": "It was characterized by the construction of soaring cathedrals, the founding of universities, the expansion of trade networks, and the development of philosophical systems that integrated faith and reason."}, {"front": "What sudden, catastrophic event marked the end of the High Middle Ages in 1347?", "back": "The arrival of a ship in Sicily carrying rats with fleas, which initiated the Black Death."}, {"front": "What architectural style dominated the great cathedrals of the High Middle Ages?", "back": "Gothic architecture."}, {"front": "What are the three defining features of Gothic architecture?", "back": "The pointed arch, the ribbed vault, and the flying buttress."}, {"front": "What was the primary purpose behind the monumental effort to build cathedrals like Chartres during the High Middle Ages?", "back": "They were built as an ultimate act of worship, giving God the best of human skill and devotion. They also served as theological statements in stone, mediating spiritual realities and teaching scripture to the illiterate."}, {"front": "How did medieval theologians understand and use light within Gothic cathedrals?", "back": "They believed light itself was a symbol of God. Stained-glass windows were designed to fill the interior with colored light, transforming the physical space into a vision of divine presence, such as the New Jerusalem."}, {"front": "What is the meaning of 'university' in its medieval context?", "back": "From the Latin universitas ('a whole' or 'a corporation'), a medieval university was a corporation of scholars (students and teachers) chartered by a pope or king. They became intellectual centers."}, {"front": "Name two of the earliest medieval universities and their respective areas of focus.", "back": "Bologna (law) and Paris (theology). Oxford (theology and philosophy) is another prominent early example."}, {"front": "What were the two main curricula of medieval university education?", "back": "The trivium (arts of language) and the quadrivium (arts of number)."}, {"front": "List the subjects included in the medieval 'trivium.'", "back": "Grammar (learning to read and write Latin correctly), rhetoric (the art of speaking and writing persuasively), and logic (the art of valid argument)."}, {"front": "Describe the core principle of the 'scholastic method' employed by university teachers.", "back": "It was a rigorous method where a master would state a proposition, present all arguments for and against it, and then reason towards a resolution, demanding systematic argument and defense for all claims."}, {"front": "Define 'scholasticism.'", "back": "The intellectual method and tradition of medieval universities, characterized by systematic argumentation, careful distinctions, and the attempt to reconcile classical philosophy (especially Aristotle) with Christian theology."}, {"front": "Who was Thomas Aquinas, and what was his most influential written work?", "back": "Thomas Aquinas (1225–1274) was the greatest scholastic theologian, a Dominican friar. His most influential work was the Summa Theologica ('Summary of Theology')."}, {"front": "What was Aquinas's major intellectual contribution regarding Aristotle?", "back": "He successfully integrated Aristotle's logic and natural philosophy into Christian theology, demonstrating that reason could serve faith and that pagan philosophy, far from threatening Christianity, could illuminate it."}, {"front": "How did Aquinas's 'Five Ways' argue for the existence of God?", "back": "They drew entirely on observation of the natural world and logical reasoning, starting from observable facts (like motion, causation, and contingency) to conclude the necessity of an unmoved mover, uncaused cause, and necessary being."}, {"front": "According to Thomas Aquinas, how do faith and reason relate to each other?", "back": "Aquinas insisted that faith and reason are two distinct but complementary paths to truth that ultimately lead to the same destination. Reason can discover many truths, while faith reveals others beyond reason's grasp, but they never truly contradict each other because God is the author of both."}, {"front": "Who was Francis of Assisi, and what characterized his approach to Christian life?", "back": "Francis of Assisi (c. 1181–1226) was the son of a wealthy merchant who radically embraced evangelical poverty, preaching the Gospel with profound joy, love for creation, and calling himself a 'troubadour of God'."}, {"front": "What famous literary work by Francis of Assisi celebrates creation?", "back": "His Canticle of the Sun."}, {"front": "How did the Franciscan Order, founded by Francis of Assisi, differ from older monastic orders like the Benedictines?", "back": "The Franciscans were an order of friars who owned nothing, lived on alms, and actively went out into the world (cities, leper colonies) to preach and serve the poor and sick, unlike older monastic orders that primarily retreated from the world behind monastery walls."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
