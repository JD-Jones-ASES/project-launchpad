    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why are primary sources particularly important for understanding the Protestant Reformation?", "back": "Because the Reformation was primarily an 'argument in words'—sermons, letters, pamphlets, and books—expressing reformers' beliefs about salvation and frustrations with the Church."}, {"front": "What was the main purpose of Martin Luther's Ninety-Five Theses?", "back": "To challenge the theological basis and moral implications of the sale of indulgences within the scholarly tradition of academic debate."}, {"front": "In what year did Martin Luther publish the Ninety-Five Theses?", "back": "1517."}, {"front": "What language were Luther's Ninety-Five Theses originally written in, and how did they reach a wider audience?", "back": "They were written in Latin, but the printing press quickly ensured they reached a much wider audience beyond scholars."}, {"front": "According to Luther's Thesis 1, what did Jesus mean by 'Repent'?", "back": "He willed that the entire life of believers should be one of continuous repentance."}, {"front": "What was Luther's view on the Pope's power to remit penalties, as stated in Thesis 5?", "back": "The Pope neither desires nor is able to remit any penalties except those imposed by his own authority or church law."}, {"front": "Which of Luther's Ninety-Five Theses directly attacked the common sales pitch for indulgences, specifically regarding souls leaving purgatory?", "back": "Thesis 27: 'They preach mere human folly who say that as soon as the money clinks in the chest, the soul flies out of purgatory.'"}, {"front": "What did Luther claim in Thesis 36 was sufficient for a Christian to receive full remission of penalty and guilt?", "back": "True repentance, even without letters of indulgence."}, {"front": "What did Luther identify as 'the true treasure of the church' in Thesis 62?", "back": "The most holy Gospel of the grace and glory of God."}, {"front": "What political criticism did Luther make in Thesis 86 regarding the Pope's wealth?", "back": "He questioned why the Pope, whose wealth was immense, didn't build St. Peter's Basilica with his own money rather than that of poor believers."}, {"front": "Why did Luther write the 'Address to the Christian Nobility of the German Nation'?", "back": "He appealed to German princes to reform the Church, believing they had the right and responsibility since the church hierarchy refused."}, {"front": "What did Luther call the defensive strategies used by the Roman party to prevent reform?", "back": "The 'three walls.'"}, {"front": "Describe the first 'wall' Luther identified that protected the Roman party from temporal power.", "back": "The claim that temporal power has no jurisdiction over the spiritual power, but rather the spiritual is above the temporal."}, {"front": "Describe the second 'wall' Luther identified regarding scriptural interpretation.", "back": "The objection that the interpretation of the Scriptures belongs to the Pope alone."}, {"front": "Describe the third 'wall' Luther identified concerning church councils.", "back": "The assertion that no one can call a council but the Pope."}, {"front": "What biblical imagery did Luther use to describe blowing down the 'three walls,' and what did it signify?", "back": "The 'walls of Jericho,' signifying that reformers, like Joshua's Israelites, would tear down corruption."}, {"front": "How did John Calvin's writing style generally compare to Martin Luther's?", "back": "Calvin was systematic and precise, while Luther was fiery and explosive."}, {"front": "What was John Calvin's major theological work, and what doctrine is a key part of it?", "back": "Institutes of the Christian Religion; the doctrine of election (predestination)."}, {"front": "According to Calvin, what is predestination?", "back": "God's eternal decree determining what will happen to every person: some are preordained to eternal life, others to eternal damnation."}, {"front": "How did Calvin's doctrine of predestination connect to Luther's sola gratia?", "back": "Both emphasized that salvation is entirely God's free gift, not earned by humans. Calvin went further by asserting God's sovereign choice of who receives this gift."}, {"front": "What was Thomas Cranmer's role in the English Reformation?", "back": "As Archbishop of Canterbury, he was the architect of the English Reformation's worship life."}, {"front": "What was Thomas Cranmer's most famous literary work?", "back": "The Book of Common Prayer (1549)."}, {"front": "What was the primary purpose of The Book of Common Prayer?", "back": "To provide a liturgy (worship order) in English for the English church, combining Reformed theology with traditional beauty."}, {"front": "How did The Book of Common Prayer influence the English language?", "back": "Its prose style, shaped by Cranmer's ear for rhythm, influenced English writing almost as profoundly as the King James Bible."}, {"front": "What theological statement is conveyed in the opening of The Collect for Purity ('unto whom all hearts be open...')?", "back": "It's a theological statement about the nature of prayer, implying that one cannot pretend with God, as all thoughts and desires are known to Him."}, {"front": "What does The General Confession in The Book of Common Prayer assume about human nature?", "back": "It assumes human sinfulness and inability to achieve righteousness on their own ('there is no health in us'), reflecting the idea that salvation is by grace alone (sola gratia)."}, {"front": "How does The General Confession connect to Luther's Thesis 1 about repentance?", "back": "It reinforces the idea that the Christian life involves continuous recognition of sin and seeking God's mercy, aligning with Luther's emphasis on lifelong repentance."}, {"front": "What was the ultimate fate of Thomas Cranmer?", "back": "He was burned at the stake in 1556 for his Protestant faith under Queen Mary I, after famously recanting his recantation."}, {"front": "What historical argument did Luther make about papal supremacy, connecting to the early Church?", "back": "He argued that papal supremacy developed gradually and illegitimately over centuries, claiming the early Church did not recognize the Pope's supreme authority."}, {"front": "How did the printing press impact the spread of Reformation ideas, such as Luther's Ninety-Five Theses?", "back": "It enabled rapid and widespread dissemination of texts, allowing arguments and ideas to reach a much larger and more diverse audience quickly."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
