<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define \"pamphlet\" as it was understood during the Reformation era.", "back": "A short, inexpensive printed booklet, typically unbound, acting as the \"social media of the sixteenth century\" due to its low cost, easy distribution, and quick readability."}, {"front": "How quickly did Martin Luther's Ninety-Five Theses spread, and what technology enabled this?", "back": "Within two weeks, copies spread across Germany, and within two months, his name was known throughout Europe, primarily due to Johann Gutenberg's movable-type printing press."}, {"front": "Describe the output and impact of Martin Luther's publications between 1517 and 1520.", "back": "Luther published approximately thirty pamphlets, selling roughly 300,000 copies, nearly doubling the annual output of the entire German printing industry from the decade prior."}, {"front": "How did the printing press fundamentally change the ability to suppress dissenting ideas, compared to the pre-print world?", "back": "In the pre-print world, challenges to authority could be suppressed by seizing and burning manuscripts. With print, multiple copies meant ideas could not be burned out of the thousands of minds that had already read them."}, {"front": "What \"simple, explosive idea\" was central to the Reformation's use of the printing press regarding religious practice?", "back": "The idea that ordinary people should be able to read the Bible for themselves, in their own language, which was revolutionary in the early 16th century."}, {"front": "What was the Catholic Church's official stance on Bible reading and interpretation before the Reformation?", "back": "The Church insisted that the Latin Vulgate was the authoritative text and that interpretation of Scripture belonged exclusively to trained clergy and church authority."}, {"front": "What were the Constitutions of Oxford (1408), and how did they affect English Bible translations?", "back": "They were laws that effectively banned any English Bible translation without episcopal approval, reflecting the Church's reaction to unauthorized translations like Wycliffe's."}, {"front": "Beyond translating the Bible, what lasting impact did Martin Luther's German Bible (1534) have on the German language?", "back": "By writing in a vigorous, clear German that people across many dialects could understand, Luther's translation helped standardize the modern German language."}, {"front": "Name two significant contributions of William Tyndale to the English Reformation.", "back": "He translated the New Testament into English (1525) and was responsible for many memorable English phrases that later appeared in the King James Bible, heavily influencing its language."}, {"front": "To what extent did the King James Bible (1611) draw upon William Tyndale's earlier translation?", "back": "Scholars estimate that Tyndale's translation is the source for roughly eighty percent of the New Testament and fifty percent of the Old Testament in the King James Version."}, {"front": "Explain the symbiotic relationship between vernacular Bible translations and literacy rates during the Reformation.", "back": "Affordable printed Bibles in the vernacular encouraged people to learn to read, driving a gradual spread of literacy across Protestant Europe, with each factor propelling the other forward."}, {"front": "Why were German princes crucial political players in the Lutheran Reformation?", "back": "In the Holy Roman Empire's loose confederation, princes decided whether their territory would be Lutheran or Catholic, protecting Luther and wielding significant power over religious and territorial matters."}, {"front": "Besides genuine theological conviction, what other significant motive often drove German princes to support the Reformation?", "back": "Many princes recognized the Reformation as an opportunity to confiscate vast church lands, accrue wealth, and break free from Roman financial obligations, blending self-interest with religious belief."}, {"front": "What was the primary motivation behind King Henry VIII's break from the Roman Catholic Church, and what was his initial theological stance?", "back": "His break was driven by the marriage question and his desire for a male heir, not by Protestant theology. He had initially defended the seven sacraments against Luther, earning the title \"Defender of the Faith.\""}, {"front": "How did the Habsburg-Valois conflict demonstrate the complex entanglement of religion and politics during the Reformation?", "back": "Fiercely Catholic Emperor Charles V (Habsburg) was rivaled by Catholic French King Francis I (Valois), who sometimes supported Protestant German princes to weaken Charles, showing political opportunism overriding religious solidarity."}, {"front": "How did the Ottoman threat to Europe provide leverage for Protestant German princes against Emperor Charles V?", "back": "When the Ottoman Turks threatened Vienna in 1529, Charles V needed Protestant German soldiers for defense, meaning he could not afford to simultaneously fight the Turks and crush the Lutherans."}, {"front": "According to the text, what consistent pattern appears throughout history regarding technology and the spread of ideas?", "back": "A new communications or transportation technology does not create a movement, but it can transform a local movement into a continental one, making compelling ideas \"go viral.\""}, {"front": "Provide two historical examples (besides the printing press) where a technological advantage transformed the spread of ideas or influence.", "back": "The Roman road network for Paul's letters (first century) and the Viking longship for their raids and trade networks (Viking Age)."}, {"front": "List three commonalities between the impact of the printing press during the Reformation and the internet today.", "back": "Both lowered the cost of producing and distributing information, shattered existing monopolies on who could speak, empowered individuals against institutions, and produced a flood of conflicting claims alongside truthful ones."}, {"front": "By 1560, how had Western Christianity largely divided, and what principle initially managed this division?", "back": "It divided into competing communities like Catholic, Lutheran, Reformed, Anglican, and Anabaptist. The Peace of Augsburg (1555) managed this with the principle of cuius regio, eius religio (\"whose realm, his religion\")."}, {"front": "Name one significant legacy of the Reformation related to individual rights and freedom.", "back": "The idea that individual conscience has rights the state cannot completely override, which is considered a seed of modern religious freedom."}, {"front": "How did the Reformation influence the development of education in Protestant Europe?", "back": "It created a demand for educated laypeople, leading to the establishment of schools, universities, and eventually systems of public education across Protestant Europe."}, {"front": "What model of accountability did the Reformation introduce regarding authority, even within the Church?", "back": "It established a model where authority must justify itself by reference to Scripture and reason, rather than solely relying on tradition and power."}, {"front": "What is the enduring historical debate surrounding the Reformation's overall impact on Europe?", "back": "Whether the Reformation was, on balance, a blessing or a catastrophe for Europe, a question still debated by historians."}, {"front": "How does Alfred the Great's work in Anglo-Saxon England connect with the goals of William Tyndale during the Reformation?", "back": "Both Alfred and Tyndale believed ordinary people needed access to wisdom and faith in their own language, translating Scripture or other works from Latin into the vernacular, albeit with different methods and scale due to available technology."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
