<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What role did literature play in understanding the Late Middle Ages, according to the text?", "back": "Literature from this period, particularly the works of Froissart, Boccaccio, and Chaucer, provides vivid, often brutal descriptions of the world as it actually was, giving insight into a civilization under pressure."}, {"front": "What common characteristic defines the works of Jean Froissart, Giovanni Boccaccio, and Geoffrey Chaucer during the Late Middle Ages?", "back": "All three works are considered eyewitness accounts, offering a realistic portrayal of the crises of their time, rather than traditional romances or epics."}, {"front": "Who was Jean Froissart and what was his primary occupation?", "back": "Jean Froissart was a French-speaking chronicler from the Low Countries who spent his career at various courts, interviewing knights and nobles to record events like the Hundred Years' War."}, {"front": "What is the title of Froissart's major work?", "back": "Froissart's major work is *Chronicles*."}, {"front": "What historical events does Froissart's *Chronicles* primarily cover?", "back": "His *Chronicles* cover the Hundred Years' War from its beginnings to the end of the fourteenth century, and also records social disruptions like the Peasants' Revolt of 1381."}, {"front": "How did Froissart view knightly courage, as recorded in his *Chronicles*?", "back": "He admired knightly courage even as he recorded its futility in the face of changing warfare."}, {"front": "What does Froissart's account of the Battle of Crécy reveal about medieval warfare?", "back": "It vividly captures the chaos of battle and the shock of a new kind of warfare (English longbows) destroying the old chivalric order."}, {"front": "What was the significance of the English longbowmen at the Battle of Crécy?", "back": "The English longbowmen outshot the French-hired Genoese crossbowmen, causing disorder and leading to the French cavalry riding down their own retreating forces, marking a disaster due to a new weapon and breakdown of command."}, {"front": "How did Froissart describe the Peasants' Revolt of 1381?", "back": "He recorded English peasants marching on London to demand an end to serfdom, highlighting their belief that no one ought to be treated as a slave."}, {"front": "According to Froissart's *Chronicles*, what was a primary cause for the Peasants' Revolt?", "back": "The peasants felt they were held too much in bondage and desired an end to serfdom, arguing that at the beginning of the world, there were no slaves."}, {"front": "Who was Giovanni Boccaccio and what significant historical event did he witness?", "back": "Giovanni Boccaccio was a Florentine humanist who was present in Florence during the Black Death of 1348."}, {"front": "What is Boccaccio's major work and what is its literary structure?", "back": "Boccaccio's major work is *The Decameron*, a frame-story in which ten young Florentines flee the plague to a country villa and tell each other tales."}, {"front": "What makes the Introduction to Boccaccio's *Decameron* particularly significant?", "back": "The Introduction is considered one of the most important eyewitness accounts of the Black Death, describing its symptoms, the breakdown of social order, and the complete failure of human remedies."}, {"front": "How did the Black Death, as depicted by Boccaccio, impact social norms and family ties?", "back": "It led to a complete breakdown of social order, with citizens avoiding citizens, kin holding aloof, and even parents abandoning their own children."}, {"front": "What common social effect of plague is described in both Boccaccio's *Decameron* and Thucydides' account of the Athenian plague?", "back": "Both describe the same social breakdown: people abandoning the sick and the collapse of normal rules and customs."}, {"front": "What is the key difference in perspective between Boccaccio's and Thucydides' accounts of plague?", "back": "Thucydides was a rationalist, describing the plague clinically, while Boccaccio was more emotional, morally engaged, and incorporated a Christian framework of sin and divine judgment."}, {"front": "Who was Geoffrey Chaucer and what major historical events did he live through?", "back": "Geoffrey Chaucer was an English poet, diplomat, and courtier who lived through the Black Death (as a child), the Hundred Years' War, and the Peasants' Revolt."}, {"front": "What is the title of Chaucer's most famous work?", "back": "Chaucer's most famous work is *The Canterbury Tales*."}, {"front": "What does *The Canterbury Tales* depict through its characters in the General Prologue?", "back": "It depicts a cross-section of medieval English society through brilliant and often satirical portraits of pilgrims traveling to Canterbury."}, {"front": "What is the purpose of the General Prologue in *The Canterbury Tales*?", "back": "The General Prologue introduces each pilgrim with a brief portrait, serving as a masterwork of social observation, sympathy, and satire."}, {"front": "What does the spring setting at the beginning of *The Canterbury Tales* symbolize?", "back": "The spring setting symbolizes renewal, new life, fertility, and spiritual rejuvenation, evoking the world coming back to life after winter and a generation of plague."}, {"front": "Chaucer introduces pilgrims who represent three very different aspects of medieval society. Name these three archetypes.", "back": "The three archetypes are: the ideal (represented by the Knight), the complicated (represented by the Prioress), and the corrupt (represented by the Pardoner, though not fully detailed in the excerpt)."}, {"front": "How do Froissart, Boccaccio, and Chaucer demonstrate the concept of literary genre?", "back": "Froissart's *Chronicles* reports events; Boccaccio's *Decameron* gives physical sensation and emotional texture through a frame-narrative; and Chaucer's *Canterbury Tales* sketches character through a poetic collection, showing how each form allows authors different expressive capabilities."}, {"front": "How did the Black Death fundamentally change the relationship between lords and workers, as suggested by Froissart's account of the Peasants' Revolt?", "back": "The Black Death created labor shortages, empowering peasants to demand an end to serfdom and asserting their inherent equality with lords, thereby changing traditional lord-worker dynamics."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
