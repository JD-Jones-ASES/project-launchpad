<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What characterized European civilization at the opening of the fourteenth century?", "back": "It appeared to be at its height, with soaring cathedrals, full universities, expansive trade routes, and intellectual syntheses like Thomas Aquinas'."}, {"front": "What term do historians use to describe the cluster of disasters that struck Europe between roughly 1315 and 1453?", "back": "The Late Medieval Crisis."}, {"front": "Name the three overlapping catastrophes that defined the Late Medieval Crisis.", "back": "The Great Famine (1315–1322), the Black Death (1347–1353), and the Hundred Years' War (1337–1453)."}, {"front": "What was the Great Famine and when did it occur?", "back": "A period of widespread crop failures and starvation across northern Europe between 1315 and 1322, which killed millions."}, {"front": "Define the Black Death.", "back": "The epidemic of bubonic plague (caused by the bacterium Yersinia pestis) that swept through Europe, North Africa, and the Middle East between 1347 and 1353, killing an estimated 30–50% of Europe's population."}, {"front": "Where did the Black Death originate?", "back": "Central Asia, probably in the grasslands around the Caspian Sea, where the Yersinia pestis bacterium lived in fleas infesting rats and other rodents."}, {"front": "How did the Black Death spread from Asia to Europe?", "back": "It traveled along the Silk Road with Mongol armies and merchant caravans to Black Sea ports, then to Sicily in 1347 via Genoese trading ships, and rapidly across Europe along trade routes."}, {"front": "Describe the three forms of the Black Death.", "back": "1. Bubonic plague: Most common, caused swollen, blackened lymph nodes (buboes), transmitted by flea bites, 60–70% fatal. 2. Pneumonic plague: Airborne, attacked lungs, transmitted by coughing/breathing, almost always fatal. 3. Septicemic plague: Rarest and deadliest, blood infection, death within hours."}, {"front": "What were some common medieval explanations for the Black Death?", "back": "Poisoned air (miasma), a bad alignment of the planets, or God's judgment on a sinful world."}, {"front": "What was the approximate population decline in Europe due to the Black Death?", "back": "Europe's population fell from roughly 75 million before the Black Death to approximately 45–50 million by 1400."}, {"front": "Which social classes were most affected by the Black Death?", "back": "No social class was immune; peasants, the wealthy, and clergy all died in large numbers, with clergy being particularly vulnerable due to close contact with the sick and communal living."}, {"front": "How did the Black Death impact the labor force and economy in Western Europe?", "back": "The death of a third of the workforce gave survivors economic power, leading peasants to demand higher wages or the right to leave manors, ultimately contributing to the effective end of serfdom."}, {"front": "Define serfdom and explain how the Black Death contributed to its decline.", "back": "Serfdom was the condition of peasants legally bound to a lord's land, owing labor and payments. The Black Death created severe labor shortages, making landlords desperate for workers and unable to enforce old rules, effectively ending serfdom in Western Europe within a generation."}, {"front": "How did the Black Death affect people's faith and the authority of the Church?", "back": "It shook faith in the Church as a mediator, as priests died and sacraments seemed ineffective. This led some to extreme piety (like flagellants) and others to cynicism, questioning religious authority."}, {"front": "Who were the flagellants?", "back": "Religious groups during the Black Death who publicly whipped themselves as acts of penance, believing extreme self-punishment would appease God's wrath. The movement was condemned by Pope Clement VI."}, {"front": "What form of scapegoating occurred during the Black Death?", "back": "Some communities falsely accused Jewish populations of poisoning wells to cause the plague, leading to horrific massacres in France, Germany, and Switzerland, despite Pope Clement VI condemning these accusations."}, {"front": "What was the Hundred Years' War and what was its primary cause?", "back": "A series of conflicts between England and France from 1337 to 1453, primarily over the English king's claim to the French throne."}, {"front": "How did the Battle of Crécy (1346) demonstrate a change in medieval warfare?", "back": "English longbowmen decimated a traditional French cavalry charge, proving the effectiveness of the longbow over armored knights and signaling the end of the knight as the decisive unit of battle."}, {"front": "Define the longbow and explain its significance in the Hundred Years' War.", "back": "A powerful English and Welsh war bow (about six feet tall) that allowed trained archers to fire 10-12 arrows per minute, penetrating armor at long distances. It gave English armies a decisive advantage over French heavy cavalry."}, {"front": "What was the outcome of the Battle of Agincourt (1415)?", "back": "An outnumbered English army under Henry V, again using longbowmen, achieved a celebrated victory over a larger French force, leading to catastrophic French losses and Henry capturing much of France, including Paris."}, {"front": "Who was Joan of Arc and what was her main role in the Hundred Years' War?", "back": "A teenage French peasant girl who claimed divine visions commanded her to drive the English from France. She led French troops to lift the siege of Orléans and escorted Charles VII to his coronation at Reims."}, {"front": "What was Joan of Arc's ultimate fate?", "back": "She was captured by Burgundian allies of England, tried for heresy, and burned at the stake in Rouen in 1331. (She was later canonized as a saint in 1920)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
