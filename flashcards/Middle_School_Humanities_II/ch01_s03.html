<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the first recorded Viking raid on the British Isles, and when did it occur?", "back": "The first recorded Viking raid was on the island monastery of Lindisfarne on June 8, 793."}, {"front": "Define 'Viking' according to its likely Old Norse origin.", "back": "From the Old Norse 'vikingr', likely meaning 'one who comes from the fjords' or 'sea raider'. Vikings were Scandinavian peoples (Norse, Danes, Swedes)."}, {"front": "How did the monk Alcuin interpret the Lindisfarne raid?", "back": "Alcuin interpreted it as a sign of divine judgment, a punishment from God for England's sins, describing it in apocalyptic terms."}, {"front": "List three primary reasons why the Vikings raided other lands.", "back": "1. Economics: Scandinavia had limited farmland. 2. Technology: The advanced Viking longship. 3. Culture: Norse society valued courage, glory, and treasure."}, {"front": "What made the Viking longship a revolutionary invention?", "back": "The longship combined ocean-going capacity with an extremely shallow draft, allowing Vikings to cross the Atlantic and also navigate shallow rivers far inland."}, {"front": "What was the 'Great Heathen Army'?", "back": "A large coalition of Danish forces that invaded England in 865, systematically conquering Anglo-Saxon kingdoms and threatening English Christianity."}, {"front": "By 870, how many of the four Anglo-Saxon kingdoms had fallen to the Great Heathen Army, and which one remained?", "back": "Three of the four kingdoms had fallen; only Wessex, ruled by the young King Alfred, remained."}, {"front": "Who was Asser, and what was his significance to Alfred the Great?", "back": "Asser was a Welsh monk and scholar who served at Alfred's court and wrote 'The Life of King Alfred', the most important biographical source for Alfred."}, {"front": "Describe Alfred the Great's situation in 878 after the Danish invasion led by King Guthrum.", "back": "Alfred was driven from his kingdom of Wessex and forced to hide in the marshes of Somerset at Athelney, a low point for the king."}, {"front": "What was the 'fyrd' in Anglo-Saxon England?", "back": "The Anglo-Saxon militia, composed of free men obligated to serve the king when summoned, representing ordinary citizens defending their land."}, {"front": "What decisive battle did Alfred win against Guthrum in 878?", "back": "The Battle of Edington."}, {"front": "What were the key terms of the Treaty of Wedmore (878)?", "back": "Guthrum agreed to convert to Christianity (with Alfred as godfather) and to withdraw his forces north and east of a line from London to Chester, establishing the Danelaw."}, {"front": "Define the 'Danelaw'.", "back": "The area of northern and eastern England under Danish law and custom after the Treaty of Wedmore, roughly dividing England into an Anglo-Saxon south/west and a Danish north/east."}, {"front": "What was Alfred the Great's primary motivation for his educational reforms?", "back": "Alfred recognized that Viking raids had devastated English literacy and learning, leading to a collapse of Latin literacy even among the clergy."}, {"front": "List three significant works that Alfred the Great personally translated from Latin into Old English.", "back": "Boethius's 'Consolation of Philosophy', Gregory the Great's 'Pastoral Care', and Bede's 'Ecclesiastical History of the English People'."}, {"front": "According to Alfred's Preface to the Pastoral Care, why was translating Latin books into English necessary?", "back": "Few people could understand church services in English or translate from Latin, so essential books needed to be in 'the language that we can all understand'."}, {"front": "Name two other significant reforms or creations by Alfred the Great besides his educational program.", "back": "He created the Anglo-Saxon Chronicle and built a network of fortified towns called burhs."}, {"front": "What was a 'burh' and what was its strategic purpose?", "back": "A burh was a fortified settlement built or strengthened by Alfred as a defensive network against Viking raids, strategically placed for rapid defense across Wessex."}, {"front": "How did Alfred's immediate successors, Edward the Elder and Aethelflaed, continue his work?", "back": "They continued to push north and east, recapturing much of the Danelaw."}, {"front": "Who was the first ruler to control all of England, and when did he achieve this?", "back": "Alfred's grandson, Aethelstan, achieved this in 927 by defeating the last Scandinavian king of York, taking the title 'King of all Britain'."}, {"front": "Who was Sweyn Forkbeard, and what was his impact on England in the early 11th century?", "back": "A new Danish king who invaded England in 1013, forcing King Aethelred 'the Unready' to flee, though Sweyn died shortly after."}, {"front": "Describe Cnut the Great's empire and his approach to ruling England.", "back": "Cnut became king of England by 1016, then of Denmark and Norway, creating a North Sea empire. He ruled England well, maintaining Alfred's laws and supporting the Church."}, {"front": "Who succeeded Cnut, and what impact did his Norman upbringing have?", "back": "Edward the Confessor, son of Aethelred, succeeded Cnut after dynastic struggle. Having grown up in Normandy, he was deeply influenced by Norman culture."}, {"front": "Who were the three main claimants to the English throne upon Edward the Confessor's death in January 1066?", "back": "Harold Godwinson (most powerful English earl), Harald Hardrada (King of Norway), and William (Duke of Normandy)."}, {"front": "What were the two decisive battles of 1066 that shaped the future of England?", "back": "The Battle of Stamford Bridge (Harold defeated Harald Hardrada) and the Battle of Hastings (William defeated Harold, ending Anglo-Saxon England)."}, {"front": "What is the overarching significance of the Norman Conquest of 1066?", "back": "It ended Anglo-Saxon England as a distinct culture, replaced Old English with a Norman-French ruling class, and fundamentally remade English law, church, and aristocracy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
