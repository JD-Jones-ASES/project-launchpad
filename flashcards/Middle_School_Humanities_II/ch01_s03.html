<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Describe the key geographic features of Norway, Sweden, and Denmark that influenced Viking expansion.", "back": "Norway: mostly mountains with deep fjords and little flat farmland. Denmark: low and marshy. Sweden: vast forests and long coastlines but limited fertile soil."}, {"front": "How did Scandinavia's geography impact its population and their skills?", "back": "The limited fertile land meant more people than could be easily fed. The extensive water routes (fjords, islands, archipelago) meant the people were already experienced sailors before they began to raid."}, {"front": "What critical distinction does the text make about the Vikings' relationship with sailing?", "back": "The Vikings were not invaders who learned to sail. They were sailors who became invaders."}, {"front": "What was the significance of the Viking longship's 'shallow draft'?", "back": "It allowed the longship to draw less than a meter of water, enabling it to navigate shallow rivers and be beached directly on riverbanks or sandy shores without needing a harbor."}, {"front": "Define 'shallow draft' in the context of shipbuilding.", "back": "The depth of water a ship requires to float without touching the bottom. A shallow-draft ship can sail in water that would strand a deeper vessel."}, {"front": "List two features of the Viking longship that allowed it to move efficiently in varied conditions.", "back": "It could be rowed or sailed (allowing movement against the wind) and had a symmetric design (it could be rowed in either direction, eliminating the need to turn around in narrow rivers)."}, {"front": "Besides shallow draft and propulsion flexibility, what other design feature made the longship revolutionary for inland travel?", "back": "It was lightweight and could be portaged (carried overland) across narrow land bridges between river systems."}, {"front": "How did the longship's design combine ocean and river capabilities to give Vikings a unique advantage?", "back": "It gave them access to the interior of Europe via rivers in a way no previous sea power had possessed, effectively turning European rivers into Viking highways."}, {"front": "Trace the westward expansion of the Norse Vikings.", "back": "The Norse sailed to the Faroe Islands (c. 800), then Iceland (c. 874), then Greenland (c. 985), and finally to Vinland (North America) around the year 1000, specifically Leif Eriksson's settlement at L'Anse aux Meadows."}, {"front": "Which Viking settlement marks the earliest confirmed European presence in the Americas?", "back": "Leif Eriksson's settlement at L'Anse aux Meadows, in modern Newfoundland (part of Vinland)."}, {"front": "Who were the Varangians, and where did they primarily establish their 'Sea Road'?", "back": "The Varangians were Scandinavian (primarily Swedish) traders and mercenaries who followed the rivers of modern Russia southward, establishing cities like Kiev and Novgorod."}, {"front": "How did the Varangians connect the Baltic Sea to the Black and Caspian Seas?", "back": "They paddled and portaged their longships along river routes, forming one of the most important commercial networks of the 9th and 10th centuries."}, {"front": "What was the Varangian Guard?", "back": "Norse mercenaries who served as elite personal bodyguards for the Byzantine Emperor in Constantinople, reached by the Varangians via the Black Sea."}, {"front": "Where did Danish Vikings primarily direct their raids and settlements in the south and west?", "back": "The coasts of England, Scotland, Ireland, France, and eventually the Mediterranean."}, {"front": "What significant duchy in France was established by Norse settlers, and what later historical event did it lead to?", "back": "The Duchy of Normandy (from 'Northmen'), from which William the Conqueror would sail to England in 1066."}, {"front": "What was the Treaty of Wedmore (878), and what did it establish in England?", "back": "It divided England into two zones: the Anglo-Saxon south and west under Alfred, and the Danelaw to the north and east, creating a lasting political, geographical, and cultural division."}, {"front": "How can one 'literally map' the Danelaw's influence on England's geography even today?", "back": "By examining place names: Danelaw areas frequently have names ending in -by, -thwaite, or -thorpe, contrasting with Anglo-Saxon endings like -ton, -ham, or -bury."}, {"front": "Define 'shire' as an administrative division in Anglo-Saxon England.", "back": "An administrative division, roughly corresponding to a county, centered on a town (often a burh) and administered by a royal officer called an ealdorman (later earl)."}, {"front": "What was the relationship between a 'shire' and a 'hundred' in Alfred's reorganized kingdom?", "back": "Hundreds were subdivisions of a shire, each containing enough land to support a hundred households."}, {"front": "What was one of Alfred the Great's most lasting achievements regarding England's internal geography?", "back": "His reorganization of the administrative system of shires and hundreds, which formed the basis of the English county system that persisted for centuries."}, {"front": "In what way did Viking expansion through the 'Sea Roads' resemble Greek civilization's relationship with the sea, as described in Unit 1?", "back": "Both mastered water transport to connect distant places and create networks of trade and power, following the 'logic of the sea'."}, {"front": "What was a key difference between Greek and Viking expansion patterns, initially?", "back": "Greeks built planned colonies with citizens and laws, while Vikings initially built raiding parties."}, {"front": "Describe the 'recurring pattern of Western history' exemplified by the Vikings and earlier Germanic tribes.", "back": "The pattern of raid becoming settlement, and settlement eventually becoming civilization, as seen with the Vikings and the Germanic tribes that settled in Rome's former territory."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
