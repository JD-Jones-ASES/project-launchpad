<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What three texts are presented as 'Three Voices of the Norman World' in this section?", "back": "The Song of Roland, William of Malmesbury's Chronicle of the Kings of England, and the Magna Carta."}, {"front": "What overarching themes do these three texts explore?", "back": "Honor and sacrifice, conquest and its costs, and the relationship between power and law."}, {"front": "What is 'The Song of Roland' and when was it composed?", "back": "It is the oldest surviving major work of French literature, composed around 1100 AD."}, {"front": "What historical event forms the basis of 'The Song of Roland'?", "back": "The ambush of Charlemagne's rearguard at the mountain pass of Roncevaux in 778 AD."}, {"front": "Who is Roland in the poem, and who betrays him?", "back": "Roland is Charlemagne's greatest knight and commander of the rearguard, betrayed by his stepfather Ganelon."}, {"front": "What is the central crisis Roland faces regarding his horn, the Olifant?", "back": "His companion Oliver urges him to blow the horn to summon Charlemagne's army, but Roland refuses, believing it would be a dishonor to call for help."}, {"front": "Define 'chivalry' as presented in the text.", "back": "The code of conduct expected of medieval knights: loyalty to one's lord, courage in battle, protection of the weak, and devotion to the Christian faith."}, {"front": "What is the significance of Roland's death in the poem?", "back": "His death is presented not just as a tragedy, but as a martyrdom, attended by angels, for fighting for God, king, and Christendom."}, {"front": "Explain the concept of 'Christian Knighthood' as portrayed in 'The Song of Roland'.", "back": "It presents the ideal of a warrior who fights for God, king, and Christendom. His courage is service to a larger cause, and his death is martyrdom if his violence is directed against enemies of the faith and his soul surrendered to God."}, {"front": "How does the ideal of the crusading knight in 'The Song of Roland' connect to a historical event?", "back": "This ideal is directly connected to the First Crusade, which was called just a few years before the poem was written."}, {"front": "Who was William of Malmesbury and what was his significance?", "back": "He was a medieval English historian (c. 1095–1143), half Norman and half English, known for his 'Chronicle of the Kings of England' and his complex perspective on the Norman Conquest."}, {"front": "What unique perspective did William of Malmesbury bring to his account of the Norman Conquest?", "back": "Being half Norman and half English, he could see both sides of the Conquest, offering a nuanced and complex view rather than simply celebrating or condemning."}, {"front": "What cultural loss did William of Malmesbury lament regarding the Norman Conquest?", "back": "He lamented that England had become 'the residence of foreigners, and the property of aliens,' reflecting a genuine cultural loss experienced by the English-born clergy and literate class."}, {"front": "How did William of Malmesbury contrast the English and Norman preparations before the Battle of Hastings?", "back": "He wrote that the English spent the night 'in drinking and singing,' while the Normans spent it 'in confessing their sins, and received the communion of the Lord's body.'"}, {"front": "What is the Magna Carta?", "back": "A legal document from 1215 containing sixty-three numbered clauses addressing feudal grievances."}, {"front": "What historical context led to the creation of the Magna Carta?", "back": "King John had lost Normandy, imposed crushing taxes, quarreled with the Pope, and treated his barons with arbitrary cruelty, leading the barons to demand reforms in 1215."}, {"front": "What foundational principle is expressed in Magna Carta Clause 39?", "back": "'No free man shall be seized, imprisoned, dispossessed, outlawed, exiled, or ruined in any way, nor in any way proceeded against, except by the lawful judgment of his peers and the law of the land.'"}, {"front": "What foundational principle is expressed in Magna Carta Clause 40?", "back": "'To no one will we sell, to no one will we deny or delay, right or justice.'"}, {"front": "Who did the principles of the Magna Carta initially apply to in 1215?", "back": "Only 'free men,' which excluded most of the population who were villeins (serfs)."}, {"front": "What enduring principle did the Magna Carta embed in Western history, despite its initial limitations?", "back": "The principle that there are limits to what a ruler can do to a person, and that those limits are enforced by law, making a specific written document bind the ruler's power."}, {"front": "How does 'The Song of Roland' contribute to understanding the 'ideals' of the Norman world?", "back": "It shows what a knight should be, what honor means, and what it looks like when a Christian warrior surrenders his soul to God, illustrating the ideals of Christian knighthood."}, {"front": "How does William of Malmesbury's account contribute to understanding the 'costs' of the Norman world?", "back": "He shows the costs of conquest: a conquered people, a displaced culture, and a historian's effort to preserve what is in danger of being forgotten."}, {"front": "How does the Magna Carta contribute to understanding the 'limits' of power in the Norman world?", "back": "It shows what happens when power is exercised without justice, and how powerful barons (and later generations) sought to establish legal limits on royal authority."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
