<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three primary texts discussed in this section, and what overarching themes do they share?", "back": "The Song of Roland, William of Malmesbury's Chronicle, and the Magna Carta. They explore honor, sacrifice, conquest, costs, power, and law."}, {"front": "What is 'The Song of Roland'?", "back": "The oldest surviving major work of French literature, composed around 1100 AD, celebrating Christian knighthood and self-sacrifice."}, {"front": "What historical event forms the basis for 'The Song of Roland'?", "back": "The ambush of Charlemagne's rearguard at the mountain pass of Roncevaux in 778 AD, although the poem transforms it into a legendary tale of Christian knighthood."}, {"front": "Who is Roland in the poem?", "back": "Charlemagne's greatest knight and the commander of the rearguard, who embodies the ideals of Christian chivalry."}, {"front": "What is 'chivalry' as defined in the context of medieval knights?", "back": "The code of conduct expected of medieval knights: loyalty to one's lord, courage in battle, protection of the weak, and devotion to the Christian faith."}, {"front": "What is Roland's central crisis in 'The Song of Roland'?", "back": "His refusal to blow his ivory horn (Olifant) to summon Charlemagne's main army when his rearguard is ambushed, believing it would be dishonorable."}, {"front": "What does Roland's refusal to blow the horn reveal about the chivalric value system?", "back": "It shows an extreme emphasis on personal honor, pride in lineage, and the belief that a knight should face overwhelming odds alone rather than call for help, which he views as a sign of weakness or shame."}, {"front": "How does Roland's decision ultimately affect his men and himself?", "back": "His initial refusal leads to the death of his men and his own mortal wounding, though he eventually blows the horn when it is too late."}, {"front": "What is the significance of Roland's death in the poem?", "back": "It is presented not merely as a tragedy, but as a martyrdom for God and Christendom, with angels bearing his soul to Paradise, elevating him to a saint-like status."}, {"front": "How does 'The Song of Roland' portray the ideal of Christian Knighthood?", "back": "It presents a knight who fights for God, king, and Christendom, whose courage serves a larger cause, and whose death against the enemies of the faith is a form of martyrdom, making a warrior a potential saint."}, {"front": "Who was William of Malmesbury, and what was his unique perspective on the Norman Conquest?", "back": "One of medieval England's finest historians (c. 1095–1143). Being half-Norman and half-English, he could see both sides of the Conquest, offering a complex, nuanced view rather than simple celebration or condemnation."}, {"front": "What work did William of Malmesbury write, and when?", "back": "His 'Chronicle of the Kings of England,' written around 1125, covering English history from the Anglo-Saxons to his own day."}, {"front": "What lament does William of Malmesbury express regarding post-Conquest England?", "back": "He laments that England 'has become the residence of foreigners,' with no English earls, bishops, or abbots, and that strangers consume England's riches, reflecting a genuine cultural loss."}, {"front": "According to William of Malmesbury, how did the English and Norman armies prepare differently for the Battle of Hastings?", "back": "The English spent the night 'in drinking and singing,' while the Normans spent it 'in confessing their sins, and received the communion of the Lord's body,' reflecting a medieval Christian ideal of the holy warrior."}, {"front": "What is the Magna Carta?", "back": "A legal document from 1215 with sixty-three numbered clauses, initially focused on feudal grievances, but containing foundational principles of law and governance."}, {"front": "What historical circumstances led to the creation of the Magna Carta?", "back": "King John's loss of Normandy, imposition of crushing taxes, quarrels with the Pope, and arbitrary cruelty towards his barons, which led the barons to demand limitations on his power."}, {"front": "Identify the core principle embedded in Magna Carta's Clause 39.", "back": "'No free man shall be seized, imprisoned, dispossessed...except by the lawful judgment of his peers and the law of the land.' This established due process and trial by jury for free men."}, {"front": "What does Magna Carta's Clause 40 state?", "back": "'To no one will we sell, to no one will we deny or delay, right or justice.' This guarantees access to justice and fair treatment under the law."}, {"front": "To whom did the crucial clauses of the Magna Carta initially apply?", "back": "Only to 'free men,' which excluded the majority of the population who were villeins (serfs) bound to their lords' land."}, {"front": "What fundamental and lasting principle did the Magna Carta establish, despite its initial limitations?", "back": "The principle that there are limits to what a ruler can do to a person, and that these limits are enforced by law. This provided a precedent for constitutional government."}, {"front": "How does Magna Carta differ from earlier attempts to limit arbitrary power, like those in ancient Athens or Rome?", "back": "Magna Carta is significant because it is a *specific written document*, agreed to by the ruler, that explicitly constrains his power, rather than just relying on custom or tradition."}, {"front": "How do 'The Song of Roland,' William of Malmesbury, and the Magna Carta collectively illustrate the 'ideals' of the Norman world?", "back": "'The Song of Roland' showcases the ideals of Christian knighthood, honor, and self-sacrifice for a greater cause."}, {"front": "How do 'The Song of Roland,' William of Malmesbury, and the Magna Carta collectively illustrate the 'costs' of the Norman world?", "back": "William of Malmesbury's work details the cultural loss and displacement experienced by the conquered English after the Norman Conquest."}, {"front": "How do 'The Song of Roland,' William of Malmesbury, and the Magna Carta collectively illustrate the 'limits' of power in the Norman world?", "back": "The Magna Carta demonstrates what happens when power is exercised without justice and how powerful barons resisted royal overreach through legal means."}, {"front": "Compare Roland's heroism to the Anglo-Saxon heroic ideal exemplified by Beowulf (from Unit 1).", "back": "Both choose certain death over dishonor. However, Roland's heroism is explicitly Christian (martyrdom for faith), while Beowulf's is rooted in pagan glory and personal renown."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
