<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was Europe's estimated population before the Black Death struck in 1347?", "back": "Approximately 75 million people, the highest it had ever been."}, {"front": "By how much did Europe's population decrease due to the Black Death by 1400?", "back": "It fell from 75 million to between 45 and 50 million, a loss of 25-30 million people."}, {"front": "How long did it take for Europe's population to recover to pre-Black Death levels?", "back": "Until the sixteenth century, roughly 150 years after the first outbreak. Some regions took even longer, until the seventeenth century."}, {"front": "What made the European population particularly vulnerable when the Black Death arrived?", "back": "Years of famine had already weakened many peasants who were living on marginal land with barely enough to eat."}, {"front": "Define 'labor scarcity' as it relates to the post-Black Death era.", "back": "A shortage of workers relative to the available work. After the plague, surviving peasants were in high demand, giving them economic bargaining power they never had before."}, {"front": "How did the Black Death lead to the decline of serfdom in Western Europe?", "back": "The scarcity of labor meant lords could not find enough workers. Serfs gained leverage, demanding better conditions or leaving to find new lords, which broke down the old feudal system."}, {"front": "What was the purpose of England's Statute of Laborers (1351)?", "back": "It was an attempt by landlords to fix wages at pre-plague levels and forbid peasants from leaving their home villages, aiming to restore the old feudal order."}, {"front": "Explain 'The Unintended Revolution' in the context of the Black Death.", "back": "The Black Death created social changes, like the end of serfdom, that were not planned or desired by those in power. Economic realities, specifically labor scarcity, ultimately overpowered even entrenched legal systems."}, {"front": "What were the main causes of the Peasants' Revolt in England in 1381?", "back": "Attempts to hold wages down and the imposition of a new poll tax sparked the full-scale uprising."}, {"front": "Who were the key leaders of the Peasants' Revolt of 1381?", "back": "Wat Tyler and the radical priest John Ball."}, {"front": "What was the significance of John Ball's sermon quote: 'When Adam delved and Eve span, who was then the gentleman?'", "back": "It challenged the legitimacy of social hierarchy and inequality, suggesting that noble status was not divinely ordained but derived from human tyranny."}, {"front": "What was the long-term impact of the Peasants' Revolt, despite its immediate failure?", "back": "Within a generation, serfdom in England was effectively over, showing that the ideas of freedom and equality, once sparked, could not be 'unthought.'"}, {"front": "How did the English longbow impact medieval warfare during the Hundred Years' War?", "back": "It shattered the military dominance of the armored knight at battles like Crécy, Poitiers, and Agincourt, demonstrating that an expensive noble warrior could be killed by a low-cost archer."}, {"front": "Define 'plate armor' and explain its limitations.", "back": "Full body armor made of shaped metal plates, developed in the 14th-15th centuries. While better than chainmail, it was expensive and couldn't stop a direct longbow hit at close range, eventually becoming obsolete with gunpowder improvements."}, {"front": "What was the origin of gunpowder and how did it reach Europe?", "back": "Gunpowder was invented in China and reached Europe via the Mongol trade routes in the late thirteenth century."}, {"front": "How did gunpowder-powered weapons (cannons) change siege warfare?", "back": "By the 15th century, cannons were powerful enough to break down castle walls previously considered impregnable, making the castle obsolete as a defensive technology."}, {"front": "What was the significance of the Fall of Constantinople in 1453 in terms of military revolution?", "back": "Ottoman artillery breached Constantinople's massive walls in seven weeks, demonstrating the new reality that even the strongest fortifications were vulnerable to cannon fire."}, {"front": "Beyond the battlefield, what were the social implications of the shift to gunpowder weapons?", "back": "The castle (physical symbol and military foundation of feudalism) and the knight (armed specialist whose training justified social privilege) became militarily unnecessary, undermining the feudal social order and its justification."}, {"front": "How did the Fall of Constantinople (1453) contribute to the Renaissance in Western Europe?", "back": "Fleeing Byzantine scholars brought ancient Greek texts, preserved in Constantinople, to Italy. These texts and scholars directly accelerated the Renaissance, which was already underway."}, {"front": "What was 'The Silk Road Closes' concept and its significance for European exploration?", "back": "The Ottoman conquest of Constantinople disrupted the overland Silk Road, making Asian goods more expensive and unreliable. This prompted Europeans to seek new sea routes to Asia, driving the Age of Exploration (e.g., Columbus in 1492)."}, {"front": "What parallels can be drawn between the Black Death crisis and the Fall of the Western Roman Empire?", "back": "Both involved population collapse, the end of a dominant economic order (serfdom vs. slave economy), military transformation (knight vs. legion), and significant cultural transfer."}, {"front": "What was a key difference in the resolution of the Late Medieval Crisis compared to the Fall of Rome?", "back": "The Late Medieval Crisis led to a rapid 'creative explosion' within a century (Renaissance, Age of Exploration, Reformation), whereas the Fall of Rome resulted in five centuries of reduced complexity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
