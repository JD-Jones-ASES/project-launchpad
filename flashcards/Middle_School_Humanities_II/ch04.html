<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What defines the 'High Middle Ages' and roughly when did it occur?", "back": "Roughly 1150–1350: the peak of medieval European civilization, characterized by Gothic cathedrals, the rise of universities, the Mongol trade connections, and the thought of Aquinas, Francis, Dante, and Marco Polo.", "id": "fc01"}, {"front": "What is a flying buttress?", "back": "An arched stone support that transfers the outward thrust of a heavy stone vault to an outer pier, freeing the wall from bearing weight. Flying buttresses allowed Gothic architects to thin their walls, fill them with large windows, and build to extraordinary heights.", "id": "fc02"}, {"front": "What is Gothic architecture?", "back": "The style of the great medieval cathedrals, characterized by the pointed arch, ribbed vault, and flying buttress. Together these allowed buildings of extraordinary height with walls thin enough to fill with enormous stained-glass windows. The word 'Gothic' was originally an insult from later Renaissance writers.", "id": "fc03"}, {"front": "Why did medieval people build cathedrals?", "back": "Cathedrals were acts of collective worship — the most important buildings in the city, built by donations from kings to ordinary craftsmen. Many workers knew they would die before the cathedral was finished. They built for God and future generations.", "id": "fc04"}, {"front": "What was the theological meaning of light in Gothic cathedrals?", "back": "Medieval theologians believed light itself was a symbol of God. The stained-glass windows were designed to fill the interior with colored light, making worshippers physically feel the presence of divine light. The cathedral was theology expressed in stone and glass.", "id": "fc05"}, {"front": "What was a medieval university?", "back": "From Latin universitas ('a whole' or 'a corporation'). A corporate body of scholars chartered by a pope or king. First universities: Bologna (law), Paris (theology), Oxford (theology and philosophy). They became the intellectual centers of the Christian world.", "id": "fc06"}, {"front": "What was the trivium?", "back": "The three foundational arts of language in medieval education: grammar (reading and writing Latin correctly), rhetoric (speaking and writing persuasively), and logic (valid argument). The trivium was the first stage of university education.", "id": "fc07"}, {"front": "What was the quadrivium?", "back": "The four mathematical arts in medieval education: arithmetic, geometry, music (understood as mathematical proportion), and astronomy. Together with the trivium, they formed the seven liberal arts pointing toward the final goal of theology.", "id": "fc08"}, {"front": "What was the scholastic method?", "back": "The medieval intellectual approach: a master would state a proposition, present all arguments for it, all arguments against it, and then reason toward a resolution. Nothing was accepted simply because an authority said so — everything had to be defended with argument.", "id": "fc09"}, {"front": "Who was Thomas Aquinas?", "back": "Thomas Aquinas (1225–1274), a Dominican friar from southern Italy and the greatest scholastic theologian. He taught in Paris and Rome; his Summa Theologica covers virtually every question of Christian theology with extraordinary rigor and intellectual grace.", "id": "fc10"}, {"front": "What was Aquinas's great achievement?", "back": "Showing that Aristotle's philosophy — recovered in the 12th century through Arabic translations — far from threatening Christianity, could actually serve it. Reason properly used arrives at conclusions that faith already knows.", "id": "fc11"}, {"front": "What are the Five Ways?", "back": "Aquinas's five arguments for God's existence, drawn from observation of the natural world: things move (unmoved mover), things are caused (uncaused cause), things exist contingently (necessary being), degrees of perfection (most perfect being), and things act toward ends (intelligent designer).", "id": "fc12"}, {"front": "How does Aquinas distinguish between what reason can and cannot discover about God?", "back": "Reason can discover that God exists, that He is one, and that He is good. But some truths exceed reason's reach — the Trinity, the Incarnation, the Resurrection — and are revealed through Scripture and Tradition. Faith and reason are partners, not competitors.", "id": "fc13"}, {"front": "Who was Francis of Assisi?", "back": "Francis of Assisi (c. 1181–1226), son of a prosperous cloth merchant. He gave away everything, put on a rough tunic, and preached the Gospel in streets and fields. He called himself a 'troubadour of God.' His Canticle of the Sun is one of the earliest poems in Italian.", "id": "fc14"}, {"front": "What was the Franciscan Order?", "back": "The community of friars founded by Francis of Assisi who were to own nothing, live on alms, and preach the Gospel among the poor and sick. Unlike the Benedictines who retreated to monasteries, Franciscans went into the world — cities, leper colonies, markets.", "id": "fc15"}, {"front": "What is a friar?", "back": "From Latin frater ('brother'). A member of a mendicant (begging) religious order such as the Franciscans or Dominicans, who lived by charity rather than from monastic landholdings. Unlike monks, friars traveled and preached in the world.", "id": "fc16"}, {"front": "Who was Genghis Khan, and what did he accomplish?", "back": "Temujin, who united Mongolian steppe tribes in 1206 and took the title 'Genghis Khan' ('Universal Ruler'). He and his successors created the largest contiguous land empire in history, stretching from the Pacific to eastern Europe.", "id": "fc17"}, {"front": "What was the Pax Mongolica?", "back": "The period of relative stability across Eurasia during the second half of the 13th century under Mongol control. Because a single power controlled all trade routes from China to Eastern Europe, merchants, missionaries, and diplomats could travel in relative safety.", "id": "fc18"}, {"front": "What happened when the Mongols sacked Baghdad in 1258?", "back": "Baghdad, the great capital of the Islamic world, was destroyed. The contents of its famous library were thrown into the Tigris River. Estimates of the dead run into the millions. It was among the most devastating cultural destructions of the medieval period.", "id": "fc19"}, {"front": "Who was Marco Polo?", "back": "A Venetian merchant (born 1254) who traveled with his father and uncle to the court of Kublai Khan in China in 1271–1275. He served Kublai Khan for 17 years and returned to Venice 24 years after departing. His Travels described a world of a million-person cities and paper money.", "id": "fc20"}, {"front": "Who was Dante Alighieri?", "back": "Dante Alighieri of Florence (1265–1321), the greatest medieval Italian poet. He wrote the Divine Comedy in exile after being banished from Florence in 1301. The poem describes an imagined journey through Hell (Inferno), Purgatory (Purgatorio), and Heaven (Paradiso).", "id": "fc21"}, {"front": "What is the Divine Comedy?", "back": "Dante's masterpiece (c. 1308–1321), written in Italian. Three parts: Inferno, Purgatorio, Paradiso. Guided first by Virgil (reason) and then by Beatrice (faith). Both a theological summa of medieval Christianity and one of the great poems of world literature.", "id": "fc22"}, {"front": "Why did Dante write the Divine Comedy in Italian instead of Latin?", "back": "Writing in Italian was a revolutionary choice — serious literature was expected in Latin. Dante declared that the deepest truths of Christian faith could be expressed in the language ordinary people spoke. His Tuscan Italian became the model for standard Italian.", "id": "fc23"}, {"front": "Why is Virgil in Limbo in Dante's Inferno?", "back": "Virgil was a virtuous pagan who lived before Christ and could not be baptized. Dante revered him as the greatest poet of antiquity but could not place him in Heaven. Limbo is comfortable but cheerless — a meditation on the limits of reason without faith.", "id": "fc24"}, {"front": "Who was Roger Bacon?", "back": "An English Franciscan friar (c. 1214–1294) who argued ahead of his time that knowledge should be based on observation and experiment (scientia experimentalis). He studied optics, described telescopes and flying machines, and represents the seeds of scientific method within medieval Christian learning.", "id": "fc25"}, {"front": "What does Roger Bacon's work show about the relationship between science and medieval Christianity?", "back": "That they were not enemies. Bacon was a friar who advocated experimental science; Aquinas believed reason applied to the natural world could reveal truth. The medieval university preserved ancient mathematics and natural philosophy. The road to the Scientific Revolution runs through the medieval university.", "id": "fc26"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
