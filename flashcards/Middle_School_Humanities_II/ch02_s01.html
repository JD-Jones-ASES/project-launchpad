<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp; Humanities II &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Middle_School_Humanities_II.html">&larr; Back to History &amp; Humanities II</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Describe Anglo-Saxon England's key characteristics before the Norman Conquest.", "back": "It had shires and courts, a literate clergy, a tradition of royal law, and a rich literary language, largely shaped by Alfred the Great's legacy.", "id": "fc01"}, {"front": "How did the Norman Conquest impact the existing Anglo-Saxon society?", "back": "A new French-speaking, continentally feudal, Norman ruling class overlaid—though did not destroy—Anglo-Saxon institutions within a generation.", "id": "fc02"}, {"front": "Define \"Norman.\"", "back": "Descendants of Viking settlers who received the duchy of Normandy in 911, becoming Christianized and Frenchified but retaining their energy for conquest.", "id": "fc03"}, {"front": "What was William the Conqueror's claim to the English throne?", "back": "He claimed Edward the Confessor had promised him the throne and Harold Godwinson had sworn (on holy relics) to support his claim.", "id": "fc04"}, {"front": "When and where did William the Conqueror land in England before the Battle of Hastings?", "back": "September 28, 1066, at Pevensey on the Sussex coast.", "id": "fc05"}, {"front": "What was a \"housecarl,\" and what was their role in Harold's army?", "back": "A professional warrior in the personal household of an Anglo-Saxon king or great lord, forming the backbone of Harold's army at Hastings with their great battle-axes.", "id": "fc06"}, {"front": "What was the key turning point in the Battle of Hastings?", "back": "William's cavalry feigned retreat, luring some of Harold's men off the ridge in pursuit, which broke the English shield wall.", "id": "fc07"}, {"front": "When and where was William the Conqueror crowned King of England?", "back": "Christmas Day, 1066, in Westminster Abbey.", "id": "fc08"}, {"front": "What is the Bayeux Tapestry, and why is it a significant historical source?", "back": "It is a 70-meter-long embroidery depicting events leading to the Norman Conquest from William's perspective. It's a detailed visual record of ships, weapons, customs, and the battle itself.", "id": "fc09"}, {"front": "What was the primary cause of the Harrying of the North?", "back": "A serious English uprising in Yorkshire and the north (1069–1070), aided by Danish raiders, challenging William's rule after the Conquest.", "id": "fc10"}, {"front": "Describe William the Conqueror's actions during the Harrying of the North.", "back": "He systematically laid waste to villages, farms, and food stores, burning houses, slaughtering livestock, and destroying seed grain, leading to widespread starvation.", "id": "fc11"}, {"front": "What was the long-term impact of the Harrying of the North?", "back": "It ensured no further serious challenges from the north and left the region depopulated and economically devastated for a generation, a fact recorded in the Domesday Book as 'Wasta est' ('It is waste').", "id": "fc12"}, {"front": "What was the primary purpose of William the Conqueror commissioning the Domesday Book?", "back": "To survey virtually every manor and landholding in England for taxation and military planning, giving the king accurate information about his conquered lands.", "id": "fc13"}, {"front": "From where does the name \"Domesday Book\" derive?", "back": "From the Old English word 'dom' (judgment), because its decisions regarding land ownership and value were considered final and without appeal, like the Last Judgment.", "id": "fc14"}, {"front": "How is the Domesday Book valuable to modern historians?", "back": "It provides an unparalleled window into eleventh-century England, detailing land ownership changes from English to Norman lords and showing how thoroughly the Conquest remade the English aristocracy.", "id": "fc15"}, {"front": "Define \"feudalism\" as it emerged in medieval Europe.", "back": "A system of political and social organization dominant in medieval Europe, built on the exchange of land (a fief) for military service and loyalty. A lord granted land to a vassal who swore fealty.", "id": "fc16"}, {"front": "How did William the Conqueror apply feudalism to consolidate his power in England?", "back": "He treated all English land as his personal property, granting it to Norman followers in exchange for military service (knights), creating a force directly dependent on royal favor and ensuring firm control over his nobility.", "id": "fc17"}, {"front": "What was the core issue of the Investiture Controversy?", "back": "The long dispute between popes and kings (especially Holy Roman Emperors) over whether kings or popes had the right to appoint (invest) bishops and abbots with their office and lands.", "id": "fc18"}, {"front": "What was the practical significance of the Investiture Controversy for kings?", "back": "Bishops controlled vast amounts of land and wealth, so a king who could appoint his own bishops had reliable allies in both church and state.", "id": "fc19"}, {"front": "Name a famous event associated with the Investiture Controversy involving Pope Gregory VII and Emperor Henry IV.", "back": "Emperor Henry IV stood barefoot in the snow at the castle of Canossa for three days (1077) to beg Pope Gregory VII to lift his excommunication.", "id": "fc20"}, {"front": "How was the Investiture Controversy eventually resolved?", "back": "It was largely resolved by the Concordat of Worms in 1122, which drew a distinction between the spiritual and secular aspects of episcopal appointments.", "id": "fc21"}, {"front": "How did Anselm of Canterbury relate to the Investiture Controversy in England?", "back": "As Archbishop from 1093, Anselm championed the Church's right to appoint its own bishops, challenging royal authority over church appointments in England.", "id": "fc22"}, {"front": "What was Anselm of Canterbury's guiding motto, and what did it mean?", "back": "'Fides quaerens intellectum' (faith seeking understanding), meaning he believed faith and reason were partners for exploring and defending Christian truths.", "id": "fc23"}, {"front": "Define \"scholasticism.\"", "back": "A medieval intellectual method of using philosophical reasoning (especially Aristotelian logic) to explore and defend theological questions, seeking to show that faith and reason reinforce each other. Anselm is considered its founder.", "id": "fc24"}, {"front": "What was \"the Anarchy,\" and when did it occur?", "back": "A civil war (1135–1154) in England between King Stephen and the Empress Matilda for the throne, which led to widespread chaos and instability.", "id": "fc25"}, {"front": "What new royal dynasty did Henry II found in England, ending 'the Anarchy'?", "back": "The Plantagenet dynasty.", "id": "fc26"}, {"front": "Define \"Plantagenet.\"", "back": "The royal dynasty founded by Henry II in 1154 and ruling England until 1485. The name comes from 'planta genista' (broom plant), a heraldic symbol of the family.", "id": "fc27"}, {"front": "What was the 'Angevin Empire' under Henry II?", "back": "A vast territory controlled by Henry II, stretching from Scotland to the Pyrenees, covering more land in France than the King of France himself controlled.", "id": "fc28"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
