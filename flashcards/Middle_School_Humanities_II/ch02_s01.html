<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History &amp;amp; Humanities II &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">History &amp;amp; Humanities II &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Middle_School_Humanities_II">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the Feudal System, as introduced by the Normans?", "back": "Feudalism was a social and economic system organized around the exchange of land for military service. It created a highly articulated structure of obligations and loyalties."}, {"front": "How did William the Conqueror's victory at Hastings impact England beyond just changing the king?", "back": "William imported the entire feudal system from the continent, transforming every aspect of English life, including land ownership, military service, justice administration, and daily routines for ordinary people."}, {"front": "Describe the basic structure of the Feudal Pyramid, starting from the top.", "back": "At the top was the king (ultimate landlord), who granted fiefs to great lords (barons/earls). Barons granted smaller portions to knights. Below knights were villeins (peasants) who worked the land."}, {"front": "What were 'fiefs' in the feudal system?", "back": "Fiefs were large estates granted by the king to his great lords (barons or earls) in exchange for their homage and military service."}, {"front": "Define 'vassal' in the context of the feudal system.", "back": "A vassal was a person who held land from a lord in exchange for loyalty and military service. A person could be both a lord to those below them and a vassal to those above."}, {"front": "Explain the ceremony of 'homage' and the 'oath of fealty' that sealed the vassal-lord relationship.", "back": "In homage, the vassal knelt before his lord, placed his hands between the lord's, and swore an oath of fealty (faithfulness), formally committing to loyalty and service."}, {"front": "What were the primary obligations of a baron or great lord to the king?", "back": "Barons owed homage to the king and were obligated to supply a specified number of armed knights when the king called."}, {"front": "What was the role and obligation of a knight in the feudal system?", "back": "Knights were professional warriors who formed the backbone of medieval armies. They were obligated to serve their lord for a specified number of days per year (typically forty) with his horse and armour."}, {"front": "Who were 'villeins' (also known as serfs or peasants) and what was their legal status?", "back": "Villeins were the vast majority of the population who worked the land. They were legally bound to the lord's manor, not free to leave or marry without permission, and owed labor and dues to the lord."}, {"front": "What was a key difference in loyalty within the feudal pyramid that made medieval kingdoms less unified than the Roman Empire?", "back": "In theory, loyalty went up the pyramid to the king, but in practice, a baron's first loyalty was often to his immediate lord rather than to the distant king, leading to decentralization."}, {"front": "Define 'manor' and 'manorialism'.", "back": "A manor was the basic unit of medieval economic life, a lord's estate. Manorialism was the system by which manors were organized and operated, focusing on agricultural production and peasant labor."}, {"front": "List the typical components found on a medieval manor.", "back": "A manor typically included the lord's hall or castle, a village with peasant cottages, farmland divided into strips, a church, a mill, and sometimes a forge and bakehouse."}, {"front": "How did medieval farmers keep soil fertile year after year, and what was the system called?", "back": "They used crop rotation through the 'three-field system' to prevent soil exhaustion and replenish nutrients."}, {"front": "Describe the three-field system of crop rotation.", "back": "Farmland was divided into three fields: one grew a winter crop (wheat/rye), one a summer crop (beans/peas/barley), and one was left fallow. These rotated annually to allow soil recovery and nitrogen replenishment."}, {"front": "What does 'fallow' mean in the context of medieval agriculture?", "back": "Fallow refers to agricultural land left unplanted for a season or a year to allow the soil to recover its fertility. It was often used for grazing animals whose manure helped restore nutrients."}, {"front": "What were the main labor obligations a villein owed to his lord?", "back": "A villein typically owed two or three days per week of labor on the lord's own fields (the 'demesne'), in addition to working his own strips on other days."}, {"front": "Beyond labor, what other fees and payments did villeins owe to their lord?", "back": "Villeins owed fees for using the lord's mill and bakehouse, a payment when their daughter married, and a 'death duty' (the lord took their best animal) when they died."}, {"front": "What did Norman castles symbolize and how did they function as instruments of conquest?", "back": "Castles symbolized Norman power and control. Planted in rebellious districts, they intimidated the local population and served as visible reminders of subjugation and the futility of resistance."}, {"front": "Describe the 'motte-and-bailey' castle, the earliest type built by the Normans in England.", "back": "A motte-and-bailey castle consisted of an artificial earthen mound (the motte) topped with a wooden tower, connected to an enclosed courtyard (the bailey) ringed by a wooden palisade and ditch. They were fast to build."}, {"front": "How did castle architecture evolve in England after the initial Norman Conquest?", "back": "Over the following century, wooden motte-and-bailey castles were gradually replaced by more permanent stone structures, with the massive stone keep becoming the standard form (e.g., the Tower of London)."}, {"front": "What was the purpose of the Domesday Book (1086)?", "back": "The Domesday Book was a comprehensive survey ordered by William the Conqueror to record for virtually every estate in England who held the land, its resources, population, and value both before and after the Conquest."}, {"front": "What key information did the Domesday Book record?", "back": "It recorded who held land in 1066 vs. 1086, the number of villagers, smallholders, slaves, and free men, the number of ploughs, acres of meadow or woodland, and the estate's worth then and now."}, {"front": "What significant transformation in England's ruling class did the Domesday Book reveal?", "back": "It clearly showed the displacement of the English ruling class by Normans, with English names in the 1066 column largely replaced by Norman names in the 1086 column for estate holders."}, {"front": "What was the 'Angevin Empire' and which English monarch established it?", "back": "The Angevin Empire was a collection of territories in France (including Normandy, Anjou, Aquitaine) that, along with England, were controlled by Henry II by 1154, giving him more French territory than the King of France himself."}, {"front": "Compare the flow of power in the Feudal System to that of Roman Provincial Administration.", "back": "Roman administration was centralized, with power flowing directly from the emperor outward. Feudalism was decentralized, with power flowing through a chain of obligations (king to baron, baron to knight), meaning loyalty was often to the immediate lord."}, {"front": "What were the main strengths and weaknesses of feudalism compared to Rome's centralized system?", "back": "Feudalism's strength was that it could function without a powerful central government. Its weakness was decentralization, which prevented the kind of unified action Rome achieved, as disloyal barons could pull knights away from the king."}, {"front": "What fundamental question did both the Roman Empire and medieval feudal Europe attempt to answer with their respective systems?", "back": "Both systems addressed the fundamental question of how to govern a large territory effectively with limited technology."}, {"front": "How did peasant life generally revolve around the agricultural calendar?", "back": "Life was dictated by seasonal tasks: plowing and planting in spring, tending fields in summer, intensive harvesting in August, animal slaughter and salting in autumn, and repairs, spinning, and surviving on stored food in winter."}, {"front": "When did villeinage (serfdom) begin to decline in Western Europe, and what was a major contributing factor?", "back": "Villeinage gradually declined after the Black Death (Unit 5) as labor became scarce, giving peasants increased bargaining power and leading to greater freedoms."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
