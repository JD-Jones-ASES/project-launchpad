<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math I &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Math_I.html">&larr; Back to Math I</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why is it difficult to compare fractions like 3/8 and 5/12 by sight?", "back": "It is hard to compare them by sight because they have different denominators, meaning the parts are not of the same size.", "id": "fc01"}, {"front": "What are the two reliable methods presented for comparing and ordering fractions?", "back": "The two reliable methods are using common denominators and using cross multiplication.", "id": "fc02"}, {"front": "What does LCD stand for in the context of comparing fractions?", "back": "LCD stands for Least Common Denominator.", "id": "fc03"}, {"front": "How is the Least Common Denominator (LCD) of two fractions determined?", "back": "The LCD is the Least Common Multiple (LCM) of their denominators.", "id": "fc04"}, {"front": "Describe the three steps to compare two fractions using the common denominator method.", "back": "1. Find the LCD (LCM of the denominators). 2. Rewrite each fraction with the LCD. 3. Compare the numerators: the fraction with the larger numerator is the larger fraction.", "id": "fc05"}, {"front": "If you compare fractions $a/b$ and $c/d$ using cross multiplication, and $a \\times d > b \\times c$, what can you conclude?", "back": "If $a \\times d > b \\times c$, then the first fraction is greater: $a/b > c/d$.", "id": "fc06"}, {"front": "If you compare fractions $a/b$ and $c/d$ using cross multiplication, and $a \\times d < b \\times c$, what can you conclude?", "back": "If $a \\times d < b \\times c$, then the first fraction is smaller: $a/b < c/d$.", "id": "fc07"}, {"front": "If you compare fractions $a/b$ and $c/d$ using cross multiplication, and $a \\times d = b \\times c$, what can you conclude?", "back": "If $a \\times d = b \\times c$, then the fractions are equal: $a/b = c/d$.", "id": "fc08"}, {"front": "Compare $3/8$ and $5/12$ using the common denominator method.", "back": "LCD(8, 12) = 24. $3/8 = 9/24$ and $5/12 = 10/24$. Since $9 < 10$, $3/8 < 5/12$.", "id": "fc09"}, {"front": "Compare $4/7$ and $3/5$ using cross multiplication.", "back": "Compute $4 \\times 5 = 20$ and $7 \\times 3 = 21$. Since $20 < 21$, $4/7 < 3/5$.", "id": "fc10"}, {"front": "How do you compare two mixed numbers, such as $3 \\, 2/5$ and $3 \\, 3/8$?", "back": "If the whole number parts are equal (e.g., both are 3), then compare only the fraction parts. If whole parts differ, the one with the larger whole part is greater.", "id": "fc11"}, {"front": "What is the general strategy for ordering three or more fractions from least to greatest or greatest to least?", "back": "Find the LCD for all fractions, rewrite each fraction with the LCD, and then order them by comparing their new numerators.", "id": "fc12"}, {"front": "Order $2/3$, $5/9$, and $7/12$ from least to greatest.", "back": "LCD(3,9,12) = 36. $2/3 = 24/36$, $5/9 = 20/36$, $7/12 = 21/36$. Ordering numerators: $20 < 21 < 24$. So, $5/9 < 7/12 < 2/3$.", "id": "fc13"}, {"front": "Sara has $5/6$ yard of ribbon and Tom has $7/9$ yard. Who has more ribbon?", "back": "Using cross multiplication: $5 \\times 9 = 45$ and $6 \\times 7 = 42$. Since $45 > 42$, $5/6 > 7/9$. Sara has more ribbon.", "id": "fc14"}, {"front": "What is a common mistake when comparing fractions, and why is it incorrect?", "back": "A common mistake is to compare numerators without finding a common denominator first. This is incorrect because fractions with different denominators represent parts of different sizes, so their numerators can't be directly compared.", "id": "fc15"}, {"front": "Is $3/8$ greater than $2/5$ because $3 > 2$? Explain.", "back": "No. You cannot compare numerators directly. Using a common denominator: $3/8 = 15/40$ and $2/5 = 16/40$. Since $15 < 16$, $3/8 < 2/5$.", "id": "fc16"}, {"front": "What is the primary benefit of the common denominator method for comparing fractions?", "back": "It transforms fractions into equivalent forms that represent the same size parts, making direct comparison of their numerators intuitive and easy.", "id": "fc17"}, {"front": "What is the primary benefit of the cross multiplication method for comparing fractions?", "back": "It provides a quick algebraic shortcut to compare two fractions without needing to explicitly calculate the LCD or rewrite the fractions.", "id": "fc18"}, {"front": "When using cross multiplication to compare $a/b$ and $c/d$, why is it specified that $b,d > 0$?", "back": "Denominators of fractions cannot be zero. The condition $b,d > 0$ ensures that the fractions are valid and that the comparisons are well-defined.", "id": "fc19"}, {"front": "To order $3/4$, $5/6$, and $7/12$ from greatest to least, what would be the first step?", "back": "Find the LCD for all three fractions, which is LCD(4,6,12) = 12.", "id": "fc20"}, {"front": "After finding the LCD of 12 for $3/4$, $5/6$, and $7/12$, how would you rewrite them and order them from greatest to least?", "back": "$3/4 = 9/12$, $5/6 = 10/12$, $7/12 = 7/12$. Ordering numerators (10 > 9 > 7): $5/6 > 3/4 > 7/12$.", "id": "fc21"}, {"front": "When comparing two mixed numbers, if their whole number parts are different, which one is larger?", "back": "The mixed number with the larger whole number part is the larger number.", "id": "fc22"}, {"front": "Can you use cross multiplication to order three or more fractions?", "back": "No, cross multiplication is typically used for comparing only two fractions at a time. For three or more, the common denominator method is more efficient for simultaneous ordering.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
