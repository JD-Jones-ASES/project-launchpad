<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math I &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Math_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of understanding GCF and LCM in the context of fractions?", "back": "They are powerful tools needed to add, subtract, and simplify fractions."}, {"front": "Define a 'factor' of a whole number.", "back": "A whole number that divides it evenly (with no remainder)."}, {"front": "List all the factors of 12.", "back": "1, 2, 3, 4, 6, 12."}, {"front": "Define the Greatest Common Factor (GCF) of two or more whole numbers.", "back": "The largest factor that all of the numbers share."}, {"front": "How is the GCF of two numbers, 'a' and 'b', typically written according to the text?", "back": "(a,b)"}, {"front": "Outline the steps to find the GCF by listing factors.", "back": "1. List all factors of each number. 2. Circle the factors that appear in every list. 3. The greatest circled factor is the GCF."}, {"front": "Find the GCF of 24 and 36 by listing factors.", "back": "Factors of 24: {1, 2, 3, 4, 6, 8, 12, 24}. Factors of 36: {1, 2, 3, 4, 6, 9, 12, 18, 36}. The common factors are 1, 2, 3, 4, 6, 12. The greatest common factor is 12."}, {"front": "Describe how to find the GCF using prime factorization.", "back": "1. Write the prime factorization of each number. 2. Identify every prime factor that appears in all factorizations. 3. For each shared prime, take the smallest exponent. 4. Multiply these together to get the GCF."}, {"front": "Use prime factorization to find GCF(60, 90).", "back": "60 = 2^2 * 3 * 5. 90 = 2 * 3^2 * 5. Shared primes with smallest exponents: 2^1, 3^1, 5^1. GCF(60,90) = 2 * 3 * 5 = 30."}, {"front": "What is a 'multiple' of a whole number?", "back": "The product of that number and any whole number (0, 1, 2, 3, ...)."}, {"front": "List the first few multiples of 4 (including 0).", "back": "0, 4, 8, 12, 16, 20, ..."}, {"front": "Define the Least Common Multiple (LCM) of two or more whole numbers.", "back": "The smallest positive number that is a multiple of each number."}, {"front": "How is the LCM of two numbers, 'a' and 'b', typically written according to the text?", "back": "(a,b)"}, {"front": "Outline the steps to find the LCM by listing multiples.", "back": "1. List several positive multiples of each number. 2. Find the smallest number that appears in every list. 3. That number is the LCM."}, {"front": "Find the LCM of 8 and 12 by listing multiples.", "back": "Multiples of 8: {8, 16, 24, 32, 40, 48,...}. Multiples of 12: {12, 24, 36, 48,...}. The smallest common multiple is 24. So LCM(8,12) = 24."}, {"front": "Describe how to find the LCM using prime factorization.", "back": "1. Write the prime factorization of each number. 2. For each prime factor that appears in *any* factorization, take the largest exponent. 3. Multiply these together to get the LCM."}, {"front": "Use prime factorization to find LCM(12, 18).", "back": "12 = 2^2 * 3. 18 = 2 * 3^2. For each prime, take the largest exponent: 2^2 and 3^2. LCM(12,18) = 2^2 * 3^2 = 4 * 9 = 36."}, {"front": "In the context of fractions, when is the GCF typically used?", "back": "The GCF is used when you need to simplify fractions (divide into equal parts)."}, {"front": "In the context of fractions, when is the LCM typically used?", "back": "The LCM is used when you need a common denominator (to combine different-sized parts, e.g., adding or subtracting fractions)."}, {"front": "How does the GCF compare in size to the original numbers?", "back": "The GCF is always less than or equal to the smallest of the original numbers."}, {"front": "How does the LCM compare in size to the original numbers?", "back": "The LCM is always greater than or equal to the largest of the original numbers."}, {"front": "Two buses leave a station at 8:00 a.m. Bus A returns every 20 minutes, Bus B every 30 minutes. When will both buses be at the station together again?", "back": "This is an LCM problem for 20 and 30. LCM(20,30) = 60 minutes. So, 60 minutes after 8:00 a.m. is 9:00 a.m."}, {"front": "When finding the GCF using prime factorization, what rule applies to the exponents of shared prime factors?", "back": "For each shared prime factor, you take the smallest exponent."}, {"front": "When finding the LCM using prime factorization, what rule applies to the exponents of prime factors?", "back": "For each prime factor that appears in *any* factorization, you take the largest exponent."}, {"front": "What mathematical relationship exists between any two numbers 'a' and 'b', their Greatest Common Factor (GCF), and their Least Common Multiple (LCM)?", "back": "GCF(a,b) * LCM(a,b) = a * b."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
