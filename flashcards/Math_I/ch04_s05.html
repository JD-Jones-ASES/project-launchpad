<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math I &mdash; Chapter 4, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Math_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the acronym for the order of operations, and what does each letter stand for when working with fractions?", "back": "PEMDAS: Parentheses, Exponents, Multiplication and Division (left to right), Addition and Subtraction (left to right)."}, {"front": "How does a fraction bar act as a grouping symbol in an expression?", "back": "A fraction bar indicates that the numerator and denominator must be evaluated separately as independent expressions before the final division."}, {"front": "When evaluating an expression with fractions, which operations are performed first: multiplication/division or addition/subtraction?", "back": "Multiplication and Division are performed before Addition and Subtraction. For operations at the same level (e.g., multiplication and division), work from left to right."}, {"front": "What is an important preliminary step to take when performing multiplication or division with mixed numbers?", "back": "Convert mixed numbers to improper fractions before performing multiplication, division, addition, or subtraction in multi-step problems."}, {"front": "Why is it recommended to simplify fractions at each step in a multi-step computation?", "back": "Simplifying at each step helps keep the arithmetic manageable and reduces the chances of calculation errors."}, {"front": "Evaluate: $1/2 + (3/4) \\cdot (2/3)$", "back": "Multiply first: $(3/4) \\cdot (2/3) = 6/12 = 1/2$. Then add: $1/2 + 1/2 = 2/2 = 1$."}, {"front": "Evaluate: $(5/6 - 1/3) \\cdot (3/5)$", "back": "Work inside the parentheses first: $(5/6 - 1/3) = (5/6 - 2/6) = 3/6 = 1/2$. Then multiply: $(1/2) \\cdot (3/5) = 3/10$."}, {"front": "In a complex fraction like $(3/4 + 1/2) / (5/6 - 1/3)$, what is the first step to simplify the numerator?", "back": "Find a common denominator and add the fractions: $3/4 + 1/2 = 3/4 + 2/4 = 5/4$."}, {"front": "In a complex fraction like $(3/4 + 1/2) / (5/6 - 1/3)$, what is the first step to simplify the denominator?", "back": "Find a common denominator and subtract the fractions: $5/6 - 1/3 = 5/6 - 2/6 = 3/6 = 1/2$."}, {"front": "After simplifying the numerator to $5/4$ and the denominator to $1/2$, what is the next step to evaluate the complex fraction $(5/4) / (1/2)$?", "back": "Divide the numerator by the denominator: $(5/4) \\div (1/2) = (5/4) \\cdot (2/1) = 10/4 = 5/2$."}, {"front": "What common mistake should be avoided when simplifying complex fractions?", "back": "Do not cross-cancel between the numerator and denominator before each part has been simplified to a single fraction. Simplify numerator and denominator first, then divide."}, {"front": "When approaching a word problem involving fractions and order of operations, what is the 'Read' step?", "back": "Understand the problem by identifying what is being asked and what information is given."}, {"front": "What is the 'Identify' step in solving a word problem with fractions?", "back": "Determine which operations are needed (e.g., addition, subtraction, multiplication, division) and in what order they should be performed."}, {"front": "What is the 'Write' step in solving a word problem with fractions?", "back": "Translate the problem into a clear mathematical expression using fractions and appropriate grouping symbols."}, {"front": "What is the 'Solve' step in solving a word problem with fractions?", "back": "Perform the calculations following the order of operations, converting mixed numbers as needed and simplifying intermediate results."}, {"front": "What is the 'Check' step in solving a word problem with fractions?", "back": "Verify if the answer makes sense in the context of the problem and if the calculations are accurate."}, {"front": "Do the order of operations rules (PEMDAS) change when working with fractions compared to whole numbers or integers?", "back": "No, the same rules for the order of operations (PEMDAS) apply universally, regardless of whether the numbers are whole numbers, integers, fractions, or mixed numbers."}, {"front": "Where do exponents fit into the order of operations for fractions?", "back": "Exponents are evaluated after Parentheses and other grouping symbols, but before Multiplication and Division."}, {"front": "Besides parentheses, what other symbols commonly act as grouping symbols in fractional expressions?", "back": "Other common grouping symbols include brackets [ ], braces { }, and the fraction bar itself."}, {"front": "Evaluate the expression that yields an answer of 1: $(2/3 + 1/6) \\div (5/6)$", "back": "First, add inside the parentheses: $(2/3 + 1/6) = (4/6 + 1/6) = 5/6$. Then, divide: $(5/6) \\div (5/6) = (5/6) \\cdot (6/5) = 1$."}, {"front": "Evaluate: $2/3 \\cdot 3/4 + 1/6$", "back": "Multiply first: $(2/3) \\cdot (3/4) = 6/12 = 1/2$. Then add: $1/2 + 1/6 = 3/6 + 1/6 = 4/6 = 2/3$."}, {"front": "How does the presence of parentheses change the evaluation of $1/2 + (3/4) \\cdot (2/3)$ compared to $(1/2 + 3/4) \\cdot (2/3)$?", "back": "In $1/2 + (3/4) \\cdot (2/3)$, multiplication is performed first. In $(1/2 + 3/4) \\cdot (2/3)$, the addition inside the parentheses is performed first, changing the entire calculation."}, {"front": "Explain the 'left to right' rule as it applies to multiplication/division and addition/subtraction in the order of operations.", "back": "When an expression contains only multiplication and division (or only addition and subtraction), these operations are performed in the exact order they appear from left to right."}, {"front": "Why is it crucial to evaluate the numerator and denominator of a fraction separately before performing the division?", "back": "The fraction bar acts as an implicit grouping symbol, meaning the entire numerator and the entire denominator must be simplified to single values before the final division operation can be carried out correctly."}, {"front": "For which operations involving fractions is it *most essential* to convert mixed numbers to improper fractions?", "back": "It is most essential to convert mixed numbers to improper fractions for multiplication and division. While possible to add/subtract mixed numbers directly, converting is often preferred for consistency in multi-step problems."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
