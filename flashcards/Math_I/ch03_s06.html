<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math I &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Math I &mdash; Chapter 3, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Math_I">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental strategy for adding and subtracting mixed numbers?", "back": "The key idea is to handle the whole-number parts and the fraction parts separately."}, {"front": "What is the first step for adding or subtracting mixed numbers with unlike denominators?", "back": "Rewrite the fraction parts with their Least Common Denominator (LCD)."}, {"front": "List the main steps for adding mixed numbers after finding a common denominator.", "back": "Add the fraction parts. Add the whole-number parts. If the fraction part is improper, convert it and add the extra whole number. Simplify the fraction part."}, {"front": "What should you do if the sum of the fraction parts when adding mixed numbers results in an improper fraction?", "back": "Convert the improper fraction to a mixed number, then add the resulting whole number to the existing whole-number sum."}, {"front": "List the main steps for subtracting mixed numbers after finding a common denominator.", "back": "If the fraction being subtracted is larger, borrow $1$ from the whole number. Subtract the fraction parts. Subtract the whole-number parts. Simplify the fraction part."}, {"front": "When is 'borrowing' (or regrouping) necessary in subtracting mixed numbers?", "back": "Borrowing is necessary when the fraction part you are subtracting from is smaller than the fraction part you are subtracting."}, {"front": "Explain how to 'borrow' $1$ from the whole-number part of a mixed number, using $5\\,1/4$ as an example.", "back": "Borrowing means taking $1$ from the whole part and adding it to the fraction part. For $5\\,1/4$, take $1$ from $5$ (making it $4$), and add it to $1/4$ as $4/4$, resulting in $4\\,(1/4 + 4/4) = 4\\,5/4$."}, {"front": "What is a common error to avoid when borrowing to increase the fraction part of a mixed number?", "back": "Make sure to add $d/d$ (one whole written with the common denominator) to the fraction part, not just $1/d$. For example, if the LCD is $12$, add $12/12$."}, {"front": "How do you subtract a mixed number from a whole number (e.g., $8 - 3\\,5/8$)?", "back": "Rewrite the whole number as a mixed number by borrowing $1$ (e.g., $8 = 7\\,8/8$), then proceed with subtraction. So, $7\\,8/8 - 3\\,5/8 = 4\\,3/8$."}, {"front": "Compare the handling of the fraction part in mixed number addition versus subtraction when results might be problematic.", "back": "In addition, if the fraction sum is improper, convert it to a mixed number and add its whole part to the total whole number. In subtraction, if the first fraction is too small, 'borrow' from the whole number to increase it before subtracting."}, {"front": "What is the final step for simplifying the result of adding or subtracting mixed numbers?", "back": "Always simplify the fraction part of the result to its lowest terms if possible."}, {"front": "What is an alternative method for adding or subtracting mixed numbers, as mentioned in the summary?", "back": "An alternative method is to convert both mixed numbers to improper fractions, perform the addition or subtraction, and then convert the result back to a mixed number."}, {"front": "Solve: $2\\,2/3 + 4\\,3/4$.", "back": "LCD is $12$. $2\\,8/12 + 4\\,9/12 = 6\\,17/12$. Convert $17/12$ to $1\\,5/12$. Add $1$ to $6$: $7\\,5/12$."}, {"front": "Solve: $5\\,1/6 - 2\\,3/4$.", "back": "LCD is $12$. $5\\,2/12 - 2\\,9/12$. Borrow from $5$: $4\\,(2/12 + 12/12) - 2\\,9/12 = 4\\,14/12 - 2\\,9/12 = 2\\,5/12$."}, {"front": "A recipe calls for $3\\,1/2$ cups of flour, and you have $1\\,3/4$ cups already. How much more flour do you need?", "back": "This is a subtraction problem: $3\\,1/2 - 1\\,3/4$. LCD is $4$. $3\\,2/4 - 1\\,3/4$. Borrow from $3$: $2\\,(2/4 + 4/4) - 1\\,3/4 = 2\\,6/4 - 1\\,3/4 = 1\\,3/4$ cups."}, {"front": "You ran $3\\,1/4$ miles on Monday and $2\\,1/2$ miles on Tuesday. How far did you run in total?", "back": "This is an addition problem: $3\\,1/4 + 2\\,1/2$. LCD is $4$. $3\\,1/4 + 2\\,2/4 = 5\\,3/4$ miles."}, {"front": "In the context of the example $8 - 3\\,5/8$, what intermediate step transforms the whole number 8?", "back": "The whole number $8$ is rewritten as $7\\,8/8$ to facilitate subtraction of the fraction part."}, {"front": "When adding mixed numbers, why is it important to check if the sum of the fraction parts is improper?", "back": "If the sum of the fraction parts is improper, it contains an additional whole unit that needs to be carried over and added to the whole-number part of the sum to get the correct final mixed number."}, {"front": "What does 'simplify the fraction part if possible' mean in the context of mixed numbers?", "back": "It means reducing the fraction to its simplest form by dividing both the numerator and denominator by their greatest common divisor."}, {"front": "A board is $8\\,1/4$ feet long. A carpenter cuts off a piece that is $3\\,5/6$ feet long. Set up the calculation to find the remaining length.", "back": "This is $8\\,1/4 - 3\\,5/6$. The LCD for $4$ and $6$ is $12$. This becomes $8\\,3/12 - 3\\,10/12$."}, {"front": "Continue solving the measurement problem: $8\\,3/12 - 3\\,10/12$.", "back": "Since $3/12 < 10/12$, borrow from $8$: $7\\,(3/12 + 12/12) - 3\\,10/12 = 7\\,15/12 - 3\\,10/12 = 4\\,5/12$ feet."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
