    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of John Cassian's \"Institutes\"?", "back": "To translate the wisdom and practices of Eastern desert monasticism into terms understandable and practical for Western monks."}, {"front": "According to Cassian, what is the spiritual significance of the monastic habit?", "back": "It is not merely a uniform, but a visible sign of the monk's interior commitment to God, with every detail holding spiritual meaning."}, {"front": "Which key Old Testament figures does Cassian cite to demonstrate the scriptural roots and symbolism of the monastic girdle?", "back": "Elijah and Elisha, known for being \"girt with a girdle of leather,\" symbolizing readiness and dedication to God as a \"soldier of Christ.\""}, {"front": "How did the", "back": "They described him as \"An hairy man, and girt with a girdle of leather about his loins,\" which the king immediately recognized as Elijah the Tishbite, the \"man of God.\""}, {"front": "What were the main purposes of the monk's robe, according to Cassian, beyond basic covering?", "back": "To prevent the disgrace of nudity, keep off cold, and avoid fostering vanity or pride. It should be plain, functional, and commonplace."}, {"front": "Why did Cassian advocate for plain and commonplace monastic clothing, rejecting splendid attire or novelty?", "back": "He believed clothing should not foster vanity or pride, but rather reflect humility, contentment, and detachment from worldly fashions. It should be \"common property\" for all servants of God."}, {"front": "Why did Cassian's \"Institutes\" reject the use of sackcloth for a monk's robe?", "back": "Sackcloth was considered too conspicuous, ministering to vanity and pride rather than virtue, and was inconvenient and unsuitable for necessary monastic work."}, {"front": "What principle did Cassian apply to monastic customs and rules regarding their authority?", "back": "He insisted on unhesitating allegiance to customs and rules passed down by long-standing antiquity and the unanimous decision of many holy fathers, rather than the arbitrary will of a few."}, {"front": "What distinctive headwear did Egyptian monks use, and what was its symbolic meaning?", "back": "They wore very small hoods covering only the head and shoulders, designed to constantly remind them to preserve the simplicity and innocence of little children, thus \"returning to childhood in Christ.\""}, {"front": "What is the term for the system of daily communal prayer that structured the monk's day in Egyptian monasteries?", "back": "The Canonical Hours, also known as the Opus Dei (\"the work of God\") or the Divine Office."}, {"front": "What specific scriptural verse from the Psalms served as the foundation for the practice of praying at fixed hours throughout the day?", "back": "Psalm 118:164: \"Seven times a day I have given praise to thee.\""}, {"front": "What were the \"little hours\" of prayer mentioned by Cassian, and approximately what times of day did they correspond to?", "back": "Tierce (9 a.m.), Sext (noon), and Nones (3 p.m.), corresponding to the third, sixth, and ninth hours of the day."}, {"front": "How did the practice of chanting Psalms, known as \"antiphonal singing,\" work?", "back": "It was a method where two groups of chanters would alternate verses of a Psalm back and forth."}, {"front": "What did Cassian observe about the number of Psalms appointed for prayer in different monasteries?", "back": "There was no uniform rule; many different numbers (e.g., twenty, thirty, eighteen) and arrangements existed, often based on individual fancy, which he contrasted with the ancient Egyptian system."}, {"front": "Which region did Cassian identify as maintaining the \"most ancient system of the fathers\" for prayer, which he recommended?", "back": "The whole of Egypt and the Thebaid."}, {"front": "What is a \"Cnobium\" in the context of early monasticism?", "back": "A monastery where monks live in a community under a common rule and an abbot, from the Greek koinos bios (\"common life\")."}, {"front": "What was a key prerequisite for someone to be allowed to preside over a monastic assembly or found a monastery in ancient Egypt, according to Cassian?", "back": "They must have deprived themselves of all property, learned they are not their own maker, and accepted they have no authority over their own actions."}, {"front": "What further requirements applied to an individual renouncing the world who wished to join a Cnobium?", "back": "They must be obedient to all, become like a little child (humble), and not flatter themselves on account of forsaken riches or their past age."}, {"front": "What is the significance of the \"Thebaid\" in the history of early monasticism, as mentioned by Cassian?", "back": "It was a region of Upper Egypt, around ancient Thebes, known as a major center of early monasticism where monastic traditions were deeply rooted and passed down through generations."}, {"front": "How does Cassian view the relationship between a monk's outward appearance and their inward spiritual state?", "back": "The outward appearance, particularly the monastic habit, is a visible sign that trains and reflects the inward disposition, fostering virtues like humility, simplicity, and readiness for spiritual battle."}, {"front": "According to Cassian, why is it important for a monastic community to adhere to common property and uniform customs, rather than individual preferences?", "back": "He believed that anything claimed by one or a few and not common to all brethren is either superfluous or vain, potentially hindering virtue and undermining the communal, humble life."}, {"front": "What is the broader aim of Cassian's work, \"Institutes,\" in the context of monastic development?", "back": "To establish a foundational understanding and practice of monastic life in the West by systematizing and transmitting the proven wisdom and traditions of the Eastern desert fathers."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
