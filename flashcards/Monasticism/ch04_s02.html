<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who wrote \"The Rule of Saint Benedict,\" and what is its primary purpose?", "back": "Saint Benedict wrote \"The Rule,\" primarily as a practical and spiritual guide for monks, functioning as a loving father's advice."}, {"front": "What other primary source is mentioned as providing insight into Saint Benedict's life?", "back": "Pope St. Gregory the Great's \"Dialogues\" offer a historical account of Benedict's life."}, {"front": "Describe Saint Benedict's characteristic tone and approach in writing his Rule.", "back": "Benedict's tone is firm yet loving, speaking as a father to his monks. He is both practical in his guidance and deeply spiritual."}, {"front": "What is the significance of the Prologue in \"The Rule of Saint Benedict\"?", "back": "The Prologue serves as the gateway to the entire Rule, calling the reader to \"listen\" and \"run while you have the light of life,\" and is considered a beautiful passage in Western monastic literature."}, {"front": "According to the Prologue, what is the initial action one should take when beginning a good work?", "back": "One should \"beg of Him with most earnest prayer to perfect it\" (referring to God) whatever good work is begun."}, {"front": "What \"strong, bright weapons\" are those who renounce their own will exhorted to take up in the Prologue?", "back": "The \"strong, bright weapons of obedience\" in doing battle under the Lord Christ."}, {"front": "How does Benedict describe the ultimate goal for those who follow the Rule, as stated in the Prologue?", "back": "To return to Him (God) from whom they had departed by sloth, to do battle under Christ, to have true and everlasting life, and to see God in His kingdom."}, {"front": "How does \"The Rule of Saint Benedict\" account for the success of good deeds, according to the Prologue?", "back": "Good deeds are attributed to God's grace, not to oneself, emphasizing humility and glorifying God's work in them (e.g., \"By the grace of God I am what I am.\")."}, {"front": "What are the four kinds of monks described in Chapter 1 of \"The Rule of Saint Benedict\"?", "back": "Cenobites, Anchorites (or Hermits), Sarabaites, and Gyrovagues."}, {"front": "Which two kinds of monks does Saint Benedict approve of, and which does he consider \"detestable\"?", "back": "Benedict approves of Cenobites and Anchorites. He considers Sarabaites and Gyrovagues \"detestable.\""}, {"front": "Define \"Cenobites\" according to \"The Rule of Saint Benedict.\"", "back": "Cenobites are monks who live in monasteries and serve under a rule and an Abbot. Benedict considers them the \"strongest kind of monks\" for whom he lays down his Rule."}, {"front": "Describe the characteristics of \"Anchorites\" or \"Hermits\" as outlined in the Rule.", "back": "Anchorites are monks who, after long probation in a monastery and having learned to fight the devil with the help of brethren, go out for solitary combat in the desert, relying solely on God."}, {"front": "Why does Saint Benedict criticize \"Sarabaites\"?", "back": "Sarabaites are criticized for not being tested by any rule or experience, living in small groups or singly without a shepherd, following their own desires, and having a 'tonsure marks them as liars before God.'"}, {"front": "What makes \"Gyrovagues\" worse than Sarabaites in Benedict's view?", "back": "Gyrovagues are wandering monks who lack stability, drift from monastery to monastery (staying only 3-4 days), indulge their own wills and gluttony, and are considered worse than Sarabaites due to their restless and undisciplined life."}, {"front": "What is the title and purpose of Chapter 4 of \"The Rule of Saint Benedict\"?", "back": "Chapter 4 is titled \"The Instruments of Good Works.\" It lists seventy-two short precepts that form a practical guide to the Christian life, applicable to any Christian, not just monks."}, {"front": "Name three \"instruments of good works\" related to one's relationship with God, as listed in Chapter 4.", "back": "Examples include: To love the Lord God with the whole heart; To put one’s hope in God; To attribute to God whatever good one sees in oneself; To fear the Day of Judgment; To desire eternal life; To devote oneself frequently to prayer; Never to despair of God’s mercy."}, {"front": "Name three \"instruments of good works\" related to one's relationship with others, as listed in Chapter 4.", "back": "Examples include: To love one’s neighbor as oneself; To respect all men; Not to do to another what one would not have done to oneself; To relieve the poor; To visit the sick; To love one’s enemies; To make peace with one’s adversary before the sun sets; To hate no one; Not to be jealous."}, {"front": "What specific advice does the Rule give in Chapter 4 regarding evil thoughts?", "back": "When evil thoughts come into one’s heart, one should \"dash them against Christ immediately\" and \"manifest them to one’s spiritual father.\""}, {"front": "According to Chapter 4, what is the \"workshop\" where the \"tools of the spiritual craft\" are diligently executed?", "back": "The \"workshop\" is \"the enclosure of the monastery and stability in the community.\""}, {"front": "How does Benedict emphasize the importance of obedience to the Abbot, even if the Abbot's actions are flawed?", "back": "Monks are to \"obey in all things the commands of the Abbot, even though he himself (which God forbid) should act otherwise,\" mindful of the Lord’s precept, “Do what they say, but not what they do.”"}, {"front": "What does Benedict advise regarding seeking recognition as holy?", "back": "He advises: \"Not to wish to be called holy before one is holy; but first to be holy, that one may be truly so called.\""}, {"front": "What kind of language and speech does Benedict's Rule discourage in Chapter 4?", "back": "The Rule discourages evil and depraved speech, much talking, useless words, words that move to laughter, and boisterous laughter."}, {"front": "How does Benedict connect the practice of the \"instruments of good works\" with future reward?", "back": "If these tools are employed unceasingly, the compensation from the Lord will be the wage He has promised: \"Eye has not seen, nor ear heard, what God has prepared for those who love Him.\""}, {"front": "Beyond monks, for whom did Benedict intend the practical guide to holiness found in Chapter 4 of the Rule?", "back": "Chapter 4, \"The Instruments of Good Works,\" is described as a practical guide to holiness that any Christian, not only a monk, could follow."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
