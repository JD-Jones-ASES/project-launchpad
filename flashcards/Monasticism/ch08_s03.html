    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the Four Degrees of Love according to St. Bernard?", "back": "A progression of the soul's love from self-centeredness to God-centeredness, culminating in loving self for God's sake."}, {"front": "Describe the First Degree of Love.", "back": "Love of self for self's sake. It is natural and God-given, seeking food, comfort, safety, and pleasure, but not yet directed toward God."}, {"front": "Describe the Second Degree of Love.", "back": "Love of God for self's sake. One turns to God for help in suffering or need, motivated by what God can do for the self."}, {"front": "Describe the Third Degree of Love.", "back": "Love of God for God's sake. The soul discovers God is worthy of love for who He is—good, beautiful, and true—marking a profound transformation from self-centeredness to God-centeredness."}, {"front": "Describe the Fourth Degree of Love.", "back": "Love of self for God's sake. The soul loves itself only in God and for God's sake, with its will perfectly united to God's, like a drop of water dissolved in wine."}, {"front": "How attainable is the Fourth Degree of Love in this life, according to Bernard?", "back": "Bernard admitted it is rarely, if ever, fully attained, even by the greatest saints, but it remains the ultimate spiritual goal."}, {"front": "How should the 'ladder' of Bernard's Four Degrees of Love be understood in the spiritual life?", "back": "It is not a ladder to be climbed once and for all; the spiritual life involves constant movement, falling back and pressing forward, with the direction of the soul's desire (toward or away from God) being key."}, {"front": "What is bridal mysticism?", "back": "A tradition of Christian theology and spirituality that uses the imagery of marriage and romantic love, especially from the Song of Songs, to describe the soul's intimate union with God."}, {"front": "What Old Testament book is central to Bernard's bridal mysticism?", "back": "The Song of Songs (also called the Song of Solomon or Canticle of Canticles)."}, {"front": "How did Bernard interpret the Song of Songs in his sermons?", "back": "He read every verse allegorically, describing the passionate, intimate, and transforming love relationship between God (Christ) and the human soul (or the Church)."}, {"front": "What deep truth about God and the soul does bridal mysticism emphasize?", "back": "That the relationship between God and the human soul is one of passionate, intimate, and transforming love, not merely obedience or friendship; God desires our hearts."}, {"front": "Did Bernard complete his sermons on the Song of Songs?", "back": "No, he died in 1153 having reached only chapter 3, verse 1, but the eighty-six sermons he completed are considered masterpieces of medieval literature."}, {"front": "What was a striking feature of Bernard's theology regarding how one knows God?", "back": "His insistence that knowing God is primarily a matter of encounter and experience ('tasting and seeing that the Lord is good'), not solely intellectual argument or philosophical reasoning."}, {"front": "What is the meaning of the Latin phrase 'Amor ipse intellectus est'?", "back": "'Love itself is a form of knowing.' It captures Bernard's conviction that the deepest truths about God are known through the experience of love, which takes us further than reason alone."}, {"front": "How did Bernard balance intellectual study with experiential knowledge of God?", "back": "He was learned and used reason, but insisted that the goal of all study was to know God (relationally), believing a monk praying with a burning heart knows something about God that the cleverest philosopher cannot reach by reason alone."}, {"front": "How did Cistercian spirituality describe the spiritual life, reflecting Bernard's emphasis on experience?", "back": "They used sensory language like 'tasting' God's sweetness, 'feeling' His presence, and being 'touched' by grace, asserting that this experience is a genuine form of knowledge."}, {"front": "What was the purpose of Bernard's Apologia to Abbot William (c. 1125)?", "back": "To criticize the excess and ornament in Cluniac monasteries, addressing the growing tension between the Cistercians and the Cluniacs regarding monastic practice."}, {"front": "What was Bernard's main theological argument against elaborate Cluniac decorations?", "back": "He argued that such splendor and elaborate sculptures were distractions for monks who had left the world to seek God in poverty and simplicity, drawing the eyes outward rather than inward toward God."}, {"front": "What was the Cistercian architectural approach, and what did it convey?", "back": "A radical commitment to simplicity, where beauty came from proportion, light, and stone, not ornament. It conveyed silence, eternity, and the theology that God is found in simplicity."}, {"front": "How should the historical 'conflict' between Cistercians and Cluniacs be nuanced?", "back": "Bernard did not condemn Cluniac practices for all monks, only that they were inappropriate for those who had vowed the strictest poverty; both represented legitimate approaches to monastic life."}, {"front": "Name some Catholic mystics influenced by Bernard's theology.", "back": "Bonaventure, the Franciscans, Teresa of Ávila, John of the Cross, and Thérèse of Lisieux."}, {"front": "What special title has the Catholic Church bestowed upon St. Bernard?", "back": "Doctor of the Church, a title for saints whose theological writings have been of outstanding benefit to the whole Church."}, {"front": "What is the modern-day continuation of the Cistercian tradition of strict observance?", "back": "The Order of Cistercians of the Strict Observance (O.C.S.O.), commonly known as Trappists."}, {"front": "Which famous Trappist monk, featured in Chapter 9, lived at the Abbey of Gethsemani in Kentucky?", "back": "Thomas Merton."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
