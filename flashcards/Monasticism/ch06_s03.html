    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the distinctive spiritual vision that drove the Cluniac reform?", "back": "A theology of worship, beauty, and prayer for the dead, shaping the medieval understanding of the relationship between heaven and earth."}, {"front": "According to Saint Benedict, what was the monk's most important work, and what was his famous command?", "back": "The Divine Office, also known as the Opus Dei. His command was: “Let nothing be preferred to the Work of God” (43)."}, {"front": "How did the monks of Cluny dramatically expand the daily round of prayer (Opus Dei)?", "back": "They added the Office of the Dead, the Office of All Saints, additional psalms and hymns, special prayers for benefactors, and elaborate processions on feast days, beyond the standard eight canonical hours."}, {"front": "List the eight canonical hours that form the Divine Office (Opus Dei).", "back": "Matins (night), Lauds (dawn), Prime, Terce, Sext, None, Vespers (evening), and Compline (bedtime)."}, {"front": "Define the Divine Office (Officium Divinum).", "back": "The cycle of daily communal prayer that structures the monk's day. Also called the Opus Dei or Liturgy of the Hours, it consists of psalms, hymns, scripture readings, and prayers chanted at fixed times."}, {"front": "Quantitatively, how did Cluny's expanded Office compare to Benedict's original arrangement regarding psalm recitation?", "back": "Cluniac monks might chant 138 psalms on an ordinary day, compared to the 40–50 psalms required by Benedict's original arrangement, which aimed to complete the Psalter over a single week."}, {"front": "What was a significant cost or consequence of Cluny's greatly expanded prayer schedule?", "back": "The hours spent in choir meant less time for manual labor, private reading, or study. Manual labor was largely delegated to lay servants and serfs."}, {"front": "What major criticism did the Cistercians, particularly Bernard of Clairvaux, raise against Cluny's emphasis on prayer over other activities?", "back": "Bernard argued that Cluny had abandoned Benedict's vision of 'ora et labora' (prayer and work) by eliminating the 'labora' (manual labor)."}, {"front": "What was the qualitative aspect of the Cluniac expansion of the liturgy, beyond just more prayers?", "back": "The belief that worship should be offered to God with the greatest possible beauty and splendor, expressed in magnificent churches, fine vestments, gold vessels, candles, incense, and disciplined chanting."}, {"front": "What was the theological justification for the Cluniac emphasis on the beauty and splendor of worship?", "back": "The belief that if God is infinitely worthy of praise, then nothing offered to Him can be too beautiful. Earthly liturgy was seen as an image and foretaste of heavenly worship (e.g., in the Book of Apocalypse)."}, {"front": "How did Cluny's theology of beauty influence Western culture?", "back": "It led to the development of vast Romanesque and Gothic churches, and greatly contributed to Gregorian chant, polyphony, and the entire tradition of Western sacred music, based on the conviction that prayer should be sung beautifully."}, {"front": "What distinctive and influential aspect of Cluniac spirituality involved intense devotion for the deceased?", "back": "Prayer for the dead, based on the Catholic teaching that souls needing purification (in Purgatory) can be helped by the prayers of the living."}, {"front": "What significant Catholic observance, still celebrated today, originated from Abbot Odilo's decree for Cluniac monasteries in 998?", "back": "All Souls' Day (November 2), a solemn day of prayer for all the faithful departed, which spread from Cluny to the entire Western Church."}, {"front": "Define the 'Communion of Saints' and explain its relation to Cluniac prayer for the dead.", "back": "The Catholic belief that all members of the Church (on earth, in purification after death, and in heaven) are united in a spiritual bond. Cluniac practice of praying for the dead is a powerful expression of this mutual assistance."}, {"front": "What social and economic consequence resulted from Cluny's intense devotion to prayer for the dead?", "back": "Nobles and kings donated land and wealth to Cluny in exchange for prayers for their souls and families, making Cluny fabulously wealthy. This wealth funded its great churches, libraries, and charitable works."}, {"front": "How did medieval society typically categorize its members into three orders, and where did monks fit?", "back": "Society was divided into 'oratores' (those who pray), 'bellatores' (those who fight), and 'laboratores' (those who work). Monks belonged to the 'oratores', serving society through prayer."}, {"front": "How was the monk's role as an 'orator' understood in medieval society?", "back": "Their prayer was not a private activity but a public service, considered essential for the salvation and well-being of the realm. Monks 'defended and nourished the realm with their prayers'."}, {"front": "What were some dangers or tensions that arose from the close relationship between monasteries and feudal society?", "back": "Wealthy benefactors expecting influence, powerful families placing sons in monasteries for non-spiritual reasons, and the distraction of managing estates as feudal landowners could compromise spiritual vocations."}, {"front": "Which broader Church reform movement in the eleventh century was deeply influenced by the Cluniac ideal of a Church free from secular control?", "back": "The Gregorian Reform, led by figures like Pope Gregory VII, which campaigned against simony (buying church offices) and lay investiture (appointment of bishops by secular rulers)."}, {"front": "What connection did Cluny have to the calling of the First Crusade?", "back": "Pope Urban II, who called the First Crusade in 1095, was a former Cluniac monk. The Cluniac network also provided organizational and spiritual support for the crusading movement."}, {"front": "What ongoing creative tension in Catholic history is highlighted by the debate between Cluny's splendor and Bernard of Clairvaux's simplicity?", "back": "The tension between the beauty of worship and the simplicity of monastic life, representing different approaches to honoring God and living a dedicated spiritual existence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
