<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is \"Peregrinatio pro Christo\" in the context of Celtic monasticism?", "back": "It was the practice of permanent exile from one's homeland for the love of Christ, meaning to cut all ties to family, land, and tribe and set out into the unknown with faith."}, {"front": "Why was \"Peregrinatio pro Christo\" considered such a radical practice for Irish monks?", "back": "Because in Irish law and custom, a person's identity was deeply bound to family and territory; to leave forever was akin to 'dying to the world.'"}, {"front": "How did the Celtic understanding of \"peregrinatio\" differ from modern pilgrimage?", "back": "For Celtic monks, it was a permanent, one-way departure from home, not a round trip to a holy place."}, {"front": "Explain the concept of \"white martyrdom\" as practiced by Celtic monks.", "back": "It was a radical sacrifice of everything familiar and beloved (home, family, land), offered to God as completely as the red martyrs offered their blood."}, {"front": "What significant outcomes resulted from the Celtic monks' practice of \"Peregrinatio pro Christo\"?", "back": "It drove the great Irish missions to Scotland, England, and the European continent, re-evangelizing parts of Gaul and preserving learning."}, {"front": "Name three prominent figures or places associated with the missionary work driven by \"Peregrinatio pro Christo.\"", "back": "Columba (brought Christianity to Picts of Scotland), Columbanus (re-evangelized Gaul), Aidan (established Lindisfarne and converted Northumbria)."}, {"front": "What is the \"sacramental vision of nature\" held by Celtic monks?", "back": "The understanding that the natural world is 'transparent to God,' meaning material things can reveal spiritual realities and point to their Maker."}, {"front": "How did Celtic monks express their deep awareness of the natural world in their spirituality?", "back": "Through literature (poems, prayers) that saw God's hand in creation, and by choosing monastic sites of stark beauty where creation's power was overwhelming."}, {"front": "Provide an example of a Celtic prayer or text that demonstrates their unique connection to nature.", "back": "The Breastplate of Saint Patrick (Lorica), which invokes God's power through elements of creation like the sun, moon, fire, and earth."}, {"front": "Name a famous monastic site chosen by Celtic monks for its stark natural beauty and spiritual significance.", "back": "Skellig Michael (rising from the Atlantic), Glendalough, Iona, or the Aran Islands."}, {"front": "Define \"asceticism\" as practiced by the Celtic monks.", "back": "The practice of self-denial and physical discipline for spiritual purposes, which was notable for its severity among Celtic monks."}, {"front": "List three specific ascetic practices common among Celtic monks.", "back": "Vigils in cold water, cross-vigils (standing with arms outstretched), severe fasting, sleeping on stone, or isolation in remote hermitages."}, {"front": "What was the underlying spiritual purpose of the extreme asceticism practiced by Celtic monks?", "back": "They believed that disciplining the body, which they saw as a 'battlefield of the spiritual life,' freed the soul for prayer and spiritual growth."}, {"front": "How did the Celtic approach to monastic discipline compare to the later Rule of Saint Benedict?", "back": "The Celtic tradition was harsher and more severe in its asceticism, while Benedict's Rule promised nothing 'harsh or burdensome' and focused on moderate discipline."}, {"front": "What were \"penitentials\" in Celtic monasticism?", "back": "Handbooks compiled by Celtic monks listing specific sins and their corresponding penances, used to systematize private, repeatable confession."}, {"front": "How did the Celtic penitential system differ from earlier Church practices regarding confession?", "back": "It introduced private, repeatable confession to a priest with specific penances, replacing the older system of public confession and penance (available only once)."}, {"front": "What was the long-term impact of the Celtic penitential system on the Western Church?", "back": "It gradually replaced the older system of public penance and became the universal norm for confession, forming the basis for the Catholic Sacrament of Reconciliation today."}, {"front": "Name two specific examples of Celtic penitential handbooks.", "back": "The Penitential of Columbanus and the Penitential of Cummean."}, {"front": "Besides the penitential system, what are two other major contributions of Celtic monasticism to civilization?", "back": "Their missionary journeys re-evangelized much of the continent, and their monasteries preserved classical and Christian learning through the early Middle Ages."}, {"front": "Name a masterpiece of Celtic monastic art mentioned in the text.", "back": "The Book of Kells or the Lindisfarne Gospels."}, {"front": "Despite its distinct institutional character fading, what aspects of Celtic monasticism's \"spirit\" endured within Catholic tradition?", "back": "The love of learning, willingness to sacrifice everything for Christ, deep awareness of God's presence in creation, and fierce courage."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
