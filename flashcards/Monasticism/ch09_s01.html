    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "What major crisis did the great monastic orders face by the late Middle Ages?", "back": "They faced a crisis unlike any before, culminating in the Protestant Reformation, which brought about the most devastating suppression of monastic life in Western history."}, {"front": "When did the Protestant Reformation begin, and what immediate impact did it have on monastic life?", "back": "It began with Martin Luther's break from Rome in 1517, leading to the most devastating suppression of monastic life in Western history."}, {"front": "What was Martin Luther's personal background, and what was his primary theological argument against monasticism?", "back": "Luther had been an Augustinian friar. He argued that monastic vows were contrary to Christian freedom, could not earn salvation, and that monastic life was a human invention, not a divine command."}, {"front": "What was the title of Luther's 1521 work challenging monastic vows?", "back": "De Votis Monasticis (On Monastic Vows)."}, {"front": "From the Catholic perspective, what was the true purpose of monastic vows, as opposed to Luther's interpretation?", "back": "The vows were never meant to 'earn' salvation, but to free the soul to pursue holiness more completely."}, {"front": "Describe the practical consequences of the Reformation for monasteries in the German lands.", "back": "Thousands of monasteries were dissolved, their properties seized, and their libraries scattered or destroyed."}, {"front": "Who initiated the Dissolution of the Monasteries in England, and what were the main motivations?", "back": "King Henry VIII carried out the Dissolution between 1536 and 1541, motivated as much by the Crown's desire for monastic wealth as by theological conviction."}, {"front": "What was the approximate scale of Henry VIII's Dissolution of the Monasteries?", "back": "More than 800 religious houses were closed between 1536 and 1541."}, {"front": "Name some major English abbeys that were destroyed during the Dissolution.", "back": "Glastonbury, Fountains, Rievaulx, and Tintern."}, {"front": "Beyond material destruction, what other significant losses occurred during the Reformation's suppression of monasteries?", "back": "Centuries of manuscripts, artwork, and sacred music were lost, with many great medieval libraries vanishing in a single generation."}, {"front": "In which European regions did monasticism continue and sometimes flourish after the Reformation?", "back": "In Catholic lands such as Spain, Italy, France, Austria, Bavaria, and Poland."}, {"front": "How did the Counter-Reformation, particularly through the Council of Trent, impact monasticism?", "back": "It brought renewed discipline to religious orders, reaffirmed the value of the consecrated life, and insisted on strict enclosure, regular observance, and proper formation of novices."}, {"front": "What was the Civil Constitution of the Clergy, and when was it enacted?", "back": "It was a decree of the French National Assembly in 1790 that nationalized Church property, dissolved religious orders, and required clergy to swear loyalty to the state."}, {"front": "How did the French Revolution affect monasticism in France and other Catholic parts of Europe?", "back": "It nearly destroyed monasticism by suppressing all religious orders, confiscating property, and leading to imprisonment or execution of monks and nuns who refused to leave."}, {"front": "What became of the once-great Abbey of Cluny during the French Revolution?", "back": "It was sold as a quarry, its stones carted away for building material, with only a small portion surviving by 1823."}, {"front": "How did Napoleon's campaigns further devastate European monasticism?", "back": "As Napoleon's armies swept across Europe, they suppressed monasteries in Italy, Germany, Austria, and Spain, leading to thousands of communities being dissolved by 1815."}, {"front": "What is 'charism' in Catholic theology, and why was it key to monasticism's 19th-century revival?", "back": "A 'charism' is a special gift of the Holy Spirit for the building up of the Church. The monastic charism, though suppressed, could not be destroyed forever, leading to a remarkable revival."}, {"front": "Who was Dom Prosper Guéranger, and what significant contribution did he make to the 19th-century monastic revival?", "back": "He refounded the Abbey of Solesmes in France in 1833, dedicating it to the restoration of Benedictine life and the revival of Gregorian chant."}, {"front": "What is Gregorian chant, and why was its revival important to Dom Prosper Guéranger?", "back": "It's the ancient form of unaccompanied sacred song, traditional music of the Roman liturgy. Guéranger believed restoring the chant meant restoring the soul of Benedictine prayer and the beauty of the liturgy."}, {"front": "Name two other significant sites or foundations involved in the 19th-century monastic revival outside of Solesmes.", "back": "The ancient abbey of Monte Cassino (Italy) was restored, and the Beuron Archabbey (Germany) was founded as a center for liturgical renewal and sacred art. Benedictine communities were also re-established in England."}, {"front": "When was the Second Vatican Council, and what was the significance of its decree *Perfectae Caritatis*?", "back": "The Council was held from 1962–1965. *Perfectae Caritatis* (1965) called all religious orders to undertake a twofold renewal: return to original inspiration and adaptation to modern conditions."}, {"front": "Explain the 'twofold renewal' called for by *Perfectae Caritatis*.", "back": "It involved (1) a continuous return to the sources of all Christian life and the original inspiration behind a given community, and (2) an adjustment of the community to the changed conditions of the times."}, {"front": "How did monastic orders specifically respond to the directives of *Perfectae Caritatis* regarding renewal?", "back": "They undertook fresh study of the Rule of Saint Benedict, Desert Fathers, lectio divina, and the Divine Office, leading to varied adaptations like vernacular liturgy or stricter observance."}, {"front": "Did the Second Vatican Council diminish the value of contemplative life? Explain.", "back": "No, *Perfectae Caritatis* explicitly reaffirmed that the contemplative life 'retains its full value' and encouraged communities to remain faithful while adapting wisely."}, {"front": "What is the 'universal call to holiness,' and where is it articulated in Vatican II documents?", "back": "It is the teaching that all Christians, not only monks and nuns, are called to pursue sanctity, found in Chapter V of *Lumen Gentium*."}, {"front": "How does the universal call to holiness relate to the special vocation of religious life?", "back": "It places the special vocation of religious life within the broader context of the Church's mission, affirming that while monks and nuns live the call in a particularly radical way, every baptized person shares in that same call."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
