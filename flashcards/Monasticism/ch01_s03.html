    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overall scope and timeline of Western monasticism covered in this book?", "back": "It spans nearly seventeen centuries, from its origins in the Egyptian desert to its modern presence, touching every corner of European civilization."}, {"front": "Who was Anthony of Egypt, and what significant act is he known for?", "back": "In the third century, he literally took the Gospel message, sold everything, gave to the poor, and sought God in total solitude in the desert, inspiring thousands."}, {"front": "Define 'Desert Fathers and Mothers' and mention a key legacy.", "back": "They were early Christian monks and nuns (3rd-5th centuries, Egypt, Palestine, Syria) known for their short, memorable spiritual sayings collected in works like the *Apophthegmata Patrum*."}, {"front": "How did the spiritual wisdom of the Egyptian desert primarily reach medieval Europe?", "back": "Largely through John Cassian (c. 360–435), who trained in Egyptian monasteries and later wrote *The Institutes* and *The Conferences* in Gaul, transmitting these teachings to the West."}, {"front": "According to John Cassian, what is *acedia*?", "back": "Spiritual listlessness or sloth, sometimes called the 'noonday devil,' which describes a monk's peculiar temptation to restlessness and boredom. Cassian's analysis is considered a masterpiece of early Christian psychology."}, {"front": "Who wrote *The Rule of Saint Benedict*, and what was its lasting impact on Western civilization?", "back": "Benedict of Nursia wrote it in sixth-century Italy. This short document shaped Western civilization for fifteen hundred years, becoming the standard for virtually all Western monasteries."}, {"front": "What was considered Benedict's 'genius' in crafting his Rule?", "back": "Moderation. Where earlier rules were often severe and demanding, Benedict's Rule was humane, flexible, and wise, organizing the monk's day around prayer, labor, reading, and rest."}, {"front": "In Benedictine usage, what does *Opus Dei* mean?", "back": "'The work of God,' referring to the communal chanting of the psalms and prayers at the set hours of the day, also known as the Divine Office or the Liturgy of the Hours."}, {"front": "What characterized Celtic monasticism, and where did it flourish?", "back": "It flourished in Ireland, Scotland, and the islands of the North Atlantic, characterized by monasteries on windswept cliffs, ferocious penances, illuminated manuscripts, and perilous sea voyages as 'pilgrims for Christ.'"}, {"front": "Name a famous medieval Latin narrative associated with Celtic monasticism.", "back": "*The Voyage of Saint Brendan* (*Navigatio Sancti Brendani*), which describes St. Brendan the Navigator's legendary sea voyage across the Atlantic in search of the Promised Land of the Saints."}, {"front": "By the ninth century, what problems arose from the widespread adoption of the Rule of Saint Benedict?", "back": "Success brought new problems: wealth, political entanglement, and spiritual laxity."}, {"front": "How did the monastery at Cluny initiate a significant reform movement in 910?", "back": "It was founded with a revolutionary charter that placed it under the direct protection of the pope, freeing it from local interference and allowing it to become the center of a vast reform movement encompassing over a thousand monasteries."}, {"front": "Who founded the Carthusian order, and what is its defining characteristic?", "back": "Bruno of Cologne founded it in 1084 at the Grande Chartreuse. It is the most austere and contemplative community in the Western Church, with monks living as hermits within a community, each having a private house and meeting only for certain prayers and one shared meal weekly."}, {"front": "What is the Carthusian motto and its meaning?", "back": "*Stat crux dum volvitur orbis* – 'The cross stands while the world turns,' expressing their conviction that the contemplative life, centered on Christ's cross, endures unchanged while empires rise and fall."}, {"front": "Describe *lectio divina* and its 'four rungs' as explained by Guigo II.", "back": "'Sacred reading,' a slow, prayerful reading of Scripture (or other spiritual texts) to seek communion with God. Guigo II described four 'rungs': reading, meditation, prayer, and contemplation."}, {"front": "What was the primary goal of the Cistercian movement, beginning in the twelfth century?", "back": "A determined return to the strict observance of Saint Benedict's Rule, initiated by monks who left the abbey of Molesme to found a 'new monastery' at Cîteaux."}, {"front": "Who was St. Bernard of Clairvaux, and what was his influence on the Cistercian movement?", "back": "A Cistercian abbot (1090–1153), Doctor of the Church, and the most influential churchman of the 12th century. His arrival at Cîteaux with thirty companions caused the Cistercian movement to 'explode.'"}, {"front": "Name a modern figure who introduced millions to the monastic life through his autobiography.", "back": "Thomas Merton, a twentieth-century convert whose autobiography *The Seven Storey Mountain* brought monastic life to a wide audience."}, {"front": "How has monasticism persisted into the modern world despite challenges like the Reformation and secularization?", "back": "Monks and nuns continue to live the ancient way of life today in various forms (abbeys, hermitages) in communities around the world, proving it is a living tradition."}, {"front": "What are the four standard parts of each content chapter in this book?", "back": "Historical Context, Primary Source Readings, Monastic Theology and Spirituality, and Questions and Homework."}, {"front": "Why does the author encourage readers to engage with the primary sources slowly and repeatedly?", "back": "Though old and sometimes using strange language, these sources are the voices of real men and women who wrestled with fundamental questions of human existence, offering timeless wisdom."}, {"front": "What is the author's overarching message about the relevance of the monastic tradition in the contemporary world?", "back": "It is not a museum exhibit but a living tradition with questions as urgent today as ever, offering wisdom not only to those in monastic habits but to anyone seeking a serious, thoughtful, God-centered life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
