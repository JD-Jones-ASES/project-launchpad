<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Where and when did Christian monasticism originate?", "back": "Christian monasticism was born in the East, specifically in the deserts of the ancient Near East (Egypt, Syria, Palestine) in the third and fourth centuries."}, {"front": "Who were the first Christian monks?", "back": "The first monks were Egyptians, Syrians, and Palestinians who fled into the deserts to seek God in solitude and silence."}, {"front": "What does 'Western monasticism' primarily refer to in the context of this book?", "back": "It refers to the monastic tradition of the Latin, Catholic Church."}, {"front": "What is the primary focus of 'Eastern Christian tradition' in terms of monasticism?", "back": "It primarily refers to the monastic heritage of the Eastern Orthodox Churches."}, {"front": "Why did some early Christians feel the need to retreat to the desert?", "back": "As Christianity grew more established and comfortable in cities, some believers felt the 'radical edge' of the Gospel was being lost and sought a more demanding faith in solitude."}, {"front": "Define 'Martyr' in the early Church context.", "back": "From the Greek 'martys' meaning 'witness,' a martyr was one who bore witness to Christ by dying rather than renouncing the faith."}, {"front": "What is 'red martyrdom'?", "back": "'Red martyrdom' refers to the ultimate sacrifice of dying for one's faith, typically during periods of persecution."}, {"front": "What is 'white martyrdom' and how does it relate to monasticism?", "back": "'White martyrdom' is a term sometimes used for monasticism, describing a daily dying to self through asceticism and spiritual discipline, in place of the 'red martyrdom' of blood."}, {"front": "Who is traditionally considered the first Christian hermit?", "back": "St. Paul of Thebes, who fled into the Egyptian desert during the persecution of Decius (250 AD)."}, {"front": "Name three prominent Eastern Christian founders of early monasticism mentioned in the text.", "back": "Anthony of Egypt, Pachomius, and Basil the Great."}, {"front": "What was St. Pachomius's significant contribution to monasticism?", "back": "He founded the first organized cenobitic (community) monasteries and established a written rule for communal life in Upper Egypt."}, {"front": "How did St. Basil the Great influence Eastern monasticism?", "back": "He organized Eastern monasticism through his 'Rules,' which remain the foundation of religious life in the Eastern Orthodox Church."}, {"front": "In what languages was the earliest monastic literature written?", "back": "Greek or Coptic, not Latin."}, {"front": "What is Coptic?", "back": "Coptic is the final stage of the ancient Egyptian language, written in a modified Greek alphabet, and was the everyday language of most Egyptian monks in the early centuries."}, {"front": "Describe Mount Athos and its significance.", "back": "Mount Athos, the 'Holy Mountain' in northern Greece, is a self-governing peninsula that has been home to Orthodox monks for over a thousand years, maintaining an ancient tradition of prayer, fasting, and manual labor with no women permitted."}, {"front": "What is 'The Philokalia'?", "back": "It is a vast collection of spiritual writings by Eastern monks and mystics from the fourth to the fifteenth century, preserving wisdom on prayer, spiritual warfare, and purification of the heart."}, {"front": "What is 'The Jesus Prayer' and its significance in Eastern monasticism?", "back": "'Lord Jesus Christ, Son of God, have mercy on me, a sinner' is the central prayer practice of Eastern monasticism, repeated countless times daily to fulfill the command to 'pray without ceasing'."}, {"front": "Define 'Hesychasm'.", "back": "From the Greek 'hesychia' (stillness or inner quiet), Hesychasm is an Eastern monastic tradition emphasizing interior silence and unceasing prayer as the path to union with God."}, {"front": "What does the hesychast tradition teach about the experience of God?", "back": "It teaches that through prayer and asceticism, a human person can experience the 'uncreated light of God,' representing a real participation in the divine life."}, {"front": "Who defended the classical theological understanding of Hesychasm in the 14th century?", "back": "St. Gregory Palamas."}, {"front": "What shared roots do Eastern and Western monastic traditions have?", "back": "They both share common roots in the Desert Fathers."}, {"front": "Why does this book primarily focus on Western monasticism?", "back": "The two traditions are distinct enough that attempting to do justice to both in a single book would sacrifice depth for breadth; focusing on the West allows for a coherent and detailed narrative arc."}, {"front": "Who was John Cassian, and what was his role in the development of Western monasticism?", "back": "John Cassian was a key figure who brought Eastern monastic wisdom and practices to the West."}, {"front": "What was St. Benedict of Nursia's foundational contribution to Western monasticism?", "back": "His 'Rule' became the cornerstone and foundation of Western monasticism, shaping its subsequent development."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
