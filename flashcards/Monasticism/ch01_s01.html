    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the etymological origin of the word \"monk\"?", "back": "The word \"monk\" comes from the Greek \"monachos,\" meaning \"one who lives alone\" or \"solitary.\""}, {"front": "Define \"monasticism\" based on its Greek etymology and practice.", "back": "From the Greek \"monazein\" (\"to live alone\"), monasticism refers to any consecrated religious life where men or women withdraw from ordinary society to devote themselves entirely to God through prayer, work, and community."}, {"front": "Which biblical passage is often cited as a literal call to monastic life?", "back": "Matthew 19:21 (DR): \"If thou wilt be perfect, go sell what thou hast, and give to the poor, and thou shalt have treasure in heaven: and come follow me.\""}, {"front": "According to the text, what is the simple answer for why someone would choose a monastic life?", "back": "The answer, for the monk, is simple: because God asked, seeing it as an invitation so compelling they cannot refuse."}, {"front": "How does the Catholic Church view the call to monasticism in relation to the 'universal call to holiness'?", "back": "The Church teaches a 'universal call to holiness' for all Christians (Lumen Gentium), recognizing many paths to holiness (like marriage, family, work). However, it also affirms a particular calling for some to leave everything behind in a more radical way, which is the consecrated life, with monasticism being its oldest form."}, {"front": "What is 'consecrated life' in the Catholic Church?", "back": "Consecrated life is a state in the Catholic Church where a person makes public vows (or similar commitments) of poverty, chastity, and obedience, dedicating their entire life to God."}, {"front": "What are the 'evangelical counsels' and what is their origin?", "back": "From 'evangelium' (gospel), these are recommendations (counsels) given by Christ in the Gospels, freely chosen by those called to a more radical following of Christ, distinct from commandments binding on all Christians."}, {"front": "List the three evangelical counsels that form the heart of monastic life.", "back": "Poverty, Chastity, and Obedience."}, {"front": "Explain the evangelical counsel of Poverty.", "back": "The monk gives up personal property and possessions, holding all things in common with the community. They depend on God, not wealth, for security, echoing the early Church (Acts 2:44)."}, {"front": "Explain the evangelical counsel of Chastity.", "back": "The monk renounces marriage and family life, dedicating their heart entirely to God. This is a choice to love God with an undivided heart, not a rejection of marriage as inherently bad (1 Cor. 7:32)."}, {"front": "Explain the evangelical counsel of Obedience.", "back": "The monk submits their own will to the authority of a superior (an abbot or abbess) and to the rule of the community. This is often considered the most difficult, as it requires surrendering one's own judgment and will."}, {"front": "What is an 'abbot'?", "back": "From the Aramaic 'abba' (father), the abbot is the head of a monastery, elected by the monks, who governs the community according to the monastic rule."}, {"front": "To what three fundamental human desires do the evangelical counsels correspond, and which desire does each counsel renounce?", "back": "Poverty renounces the desire for possessions; Chastity renounces the desire for pleasure; Obedience renounces the desire for power and autonomy."}, {"front": "What is the purpose of the monastic way of life, described as a 'spiritual training'?", "back": "Like an athlete training the body, the monk trains the soul through prayer, fasting, and self-denial. The goal is freedom: from disordered desires, from the tyranny of the self, and ultimately, freedom for God."}, {"front": "What is 'contemptus mundi' in the context of monasticism?", "back": "Literally 'contempt of the world,' it describes the monk's attitude not as hatred of creation, but as a refusal to let worldly things become idols that displace God from the center of one's life."}, {"front": "Describe the daily rhythm of monastic life.", "back": "Monastic life is a daily rhythm of prayer, work, study, and silence that shapes every hour, often involving rising before dawn, chanting psalms, reading Scripture prayerfully, manual labor, simple living, and speaking little."}, {"front": "What is a 'cell' in a monastery?", "back": "A 'cell' (from Latin 'cella,' a small room) is the monk's private room, typically small and sparsely furnished."}, {"front": "What is a 'habit' for a religious person?", "back": "A 'habit' (from Latin 'habitus,' condition or dress) is the distinctive clothing worn by members of a religious order, serving as a visible sign of their consecration to God."}, {"front": "What is 'tonsure' and what did it symbolize in Western monastic tradition?", "back": "Tonsure is the ritual shaving of part or all of the head as a sign of religious dedication. In the Western tradition, a circular patch shaved on the crown symbolized the crown of thorns."}, {"front": "What is a 'cloister' in the context of a monastery?", "back": "From the Latin 'claustrum' ('an enclosed place'), the cloister is both the covered walkway surrounding a monastery's central courtyard and, more broadly, the enclosed world of the monastery itself, separated from external distractions."}, {"front": "What is the ultimate motivation monks would give for choosing their way of life?", "back": "Monks would answer: 'because the love of God is worth everything,' emphasizing that they are running toward God, not grimly fleeing from life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
