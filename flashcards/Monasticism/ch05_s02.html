<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'The Voyage of Saint Brendan' (Navigatio Sancti Brendani Abbatis)?", "back": "A beloved Latin text from the 9th century, recounting Saint Brendan's seven-year sea voyage with his monks in search of the Promised Land of the Saints."}, {"front": "What is the primary nature or purpose of 'The Voyage of Saint Brendan'?", "back": "It is primarily a work of theology, not geography, serving as a parable of the Christian life—a pilgrimage through wonder and danger toward the heavenly homeland."}, {"front": "Who translated 'The Voyage of Saint Brendan' used in this section?", "back": "Denis O'Donoghue (1893), based on the medieval Latin text."}, {"front": "Describe the first mysterious island Brendan and his monks encountered after three days and three nights of sailing.", "back": "They arrived at a very level island, full of grass and covered with an immense multitude of sheep of 'surpassing whiteness' and wondrous size, each as great as an ox."}, {"front": "What was the significance of the extraordinarily large sheep on the Island of Sheep?", "back": "It was a common motif in medieval voyage literature signifying divine abundance and provision from God for his servants."}, {"front": "What specific feast did Saint Brendan intend to celebrate on the Island of Sheep?", "back": "The Paschal feast (Easter), for which God had provided food."}, {"front": "Who ministered to Saint Brendan and his monks on the Island of Sheep, and what did he provide?", "back": "A man appeared, bearing a basket full of unleavened bread and other provisions, deemed 'pure food' suitable for the solemnity."}, {"front": "Where were Brendan and his monks instructed to celebrate the morrow of Easter?", "back": "On another island visible 'nigh unto this place' (the Island of Sheep)."}, {"front": "Describe the 'crystal pillar' encountered by Brendan and his monks.", "back": "It was a towering pillar of the clearest crystal, impossibly high ('higher than the air, reaching as it were beyond the firmament itself'), with a wide-meshed net of silver-colored, marble-hard material around it."}, {"front": "What was the approximate size of the openings in the net surrounding the crystal pillar?", "back": "Each opening was about four cubits (roughly six feet) on every side, large enough for the boat to pass through."}, {"front": "What remarkable phenomenon did the monks observe beneath the sea near the crystal pillar?", "back": "The sea appeared 'clear as glass,' allowing them to behold the pillar's base and the net's edge fixed on the sea floor, illuminated by the pillar's light."}, {"front": "How long did it take Brendan's monks to sail around one face of the crystal pillar?", "back": "They sailed throughout that day along one face of the pillar, implying at least a day for a significant portion of its circumference."}, {"front": "What was Saint Brendan's interpretation of the crystal pillar marvel?", "back": "He believed God had shown them this wonder so they could tell of it 'to His praise and glory,' and urged them to continue their journey before provisions failed."}, {"front": "How long did Brendan and his monks wander before reaching the Promised Land of the Saints?", "back": "Seven years, during which they kept the great feasts each year upon their appointed islands."}, {"front": "What natural phenomenon preceded their arrival at the Promised Land of the Saints, and what did it symbolize?", "back": "A great fog fell upon them, which is a recurring motif in the Navigatio, symbolizing the boundary between the ordinary world and the sacred, hidden land of God's promise."}, {"front": "Describe the Promised Land of the Saints as experienced by Brendan and his monks.", "back": "It was a broad, spacious country with abundant herbage, fruit-laden trees (ripe as in harvest), precious stones, and sweet-fragranced herbs. They could not find its limit."}, {"front": "What prevented Brendan and his monks from exploring the entire Promised Land of the Saints?", "back": "They came upon a great river flowing through the midst of the land, which they could not cross."}, {"front": "Who met Saint Brendan and his monks in the Promised Land of the Saints, and what was his initial greeting?", "back": "A young man of fair countenance embraced them one by one, calling each by his proper name, and quoted Psalm 83:5: 'Blessed are they that dwell in thy house, O Lord; they shall praise thee for ever and ever.'"}, {"front": "What instructions and prophecy did the young man give Saint Brendan in the Promised Land of the Saints?", "back": "He told Brendan to return home with fruits and precious stones, for his 'last pilgrimage' (death) was nigh. He also prophesied that the land would be made manifest 'after the passing of many ages' during a 'time of the persecution of the faithful'."}, {"front": "To what famous biblical", "back": "The"}, {"front": "Who was St. Columbanus, and when did he arrive in Gaul?", "back": "He was the greatest of the Irish missionary monks, arriving in Gaul around 590 CE."}, {"front": "What was the state of the Frankish church when Columbanus arrived, and what did he introduce?", "back": "The Frankish church was in a state of considerable disorder, and Columbanus brought the fierce discipline of Irish monasticism to the continent."}, {"front": "What was the name of the first monastery founded by St. Columbanus, and where was it located?", "back": "Luxeuil, located in the Vosges Mountains."}, {"front": "Who wrote the 'Life of Columbanus,' and when?", "back": "Jonas of Bobbio, an Italian monk, wrote it around 642 CE, three years after Columbanus's death."}, {"front": "What was Jonas of Bobbio's primary source of information for his 'Life of Columbanus'?", "back": "He based his account on the testimony of monks who had known St. Columbanus personally."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
