<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the ultimate end (telos) of the monastic life, according to John Cassian?", "back": "The kingdom of heaven — eternal life with God."}, {"front": "What is the immediate aim (scopos) of the monastic life, according to John Cassian?", "back": "Purity of heart (puritas cordis)."}, {"front": "Define \"purity of heart\" (puritas cordis) as described by Cassian.", "back": "The state of the soul freed from disordered passions and vices. It is a deep interior freedom that allows one to love God and neighbor without the constant interference of selfishness, anger, lust, or pride. It is the gateway to contemplation."}, {"front": "Why is Cassian's distinction between the ultimate end and immediate aim practical for spiritual seekers?", "back": "The ultimate end (heaven) can seem distant and abstract, leading to discouragement. The immediate aim (purity of heart) provides a concrete, daily task for self-examination, allowing specific steps to overcome vices and making the goal always within reach."}, {"front": "How does Cassian's emphasis on purity of heart reflect a positive aim in the spiritual life?", "back": "It focuses not merely on avoiding sin (a negative aim), but on cultivating a heart that is free, open, and ready for God (a positive aim), so one can truly 'see God'."}, {"front": "What is Cassian's most famous and enduring contribution to Western spirituality regarding vices?", "back": "His analysis of the eight principal faults, drawing on the teaching of Evagrius Ponticus."}, {"front": "List the first three of Cassian's Eight Principal Faults, categorized as 'bodily vices'.", "back": "Gluttony (gastrimargia), Fornication (fornicatio), and Avarice (philargyria)."}, {"front": "List the fourth and fifth of Cassian's Eight Principal Faults, categorized as 'emotional vices'.", "back": "Anger (ira) and Sadness (tristitia)."}, {"front": "List the final three of Cassian's Eight Principal Faults, categorized as 'spiritual vices'.", "back": "Acedia (acedia), Vainglory (cenodoxia), and Pride (superbia)."}, {"front": "How does Cassian's list of eight principal faults differ from Pope Gregory the Great's later list of seven deadly sins?", "back": "Cassian listed eight, whereas Gregory combined sadness and acedia into sloth, and merged vainglory with pride, resulting in seven. Cassian's list is considered more psychologically precise."}, {"front": "According to Cassian, what is the significance of the order in which the eight principal faults are arranged?", "back": "The faults progress from bodily to emotional to spiritual, indicating that as one advances in the spiritual life, they must contend with increasingly subtle and dangerous enemies."}, {"front": "Define 'Acedia' according to Cassian, and explain why 'sloth' is an insufficient translation.", "back": "Acedia is a profound spiritual restlessness, weariness with one's vocation, and a temptation to abandon it for something else. It is not mere laziness, but a deeper spiritual despair and desire to escape one's circumstances."}, {"front": "What is meant by 'the noonday devil' in relation to Acedia?", "back": "Acedia often attacks spiritual practitioners, especially around midday, making their environment unbearable, their prayers meaningless, and tempting them to seek fulfillment elsewhere. It is named from Psalm 90:6."}, {"front": "What is Cassian's recommended remedy for overcoming Acedia?", "back": "Perseverance: the individual must stay in their cell (or commitment), continue their work, and wait for the temptation to pass, recognizing that changing circumstances will not resolve acedia."}, {"front": "What is the ultimate purpose of the monastic life, according to Cassian, based on Saint Paul's teaching?", "back": "Unceasing prayer ('Pray without ceasing' - 1 Thess. 5:17)."}, {"front": "How did Cassian interpret 'unceasing prayer' for monks?", "back": "It does not mean constant formal prayers, but that the monk's entire life—work, reading, meals, rest—becomes a form of prayer, an offering to God from a heart purified of vices and filled with love."}, {"front": "What role do the canonical hours play in Cassian's teaching on unceasing prayer?", "back": "The fixed hours of prayer (morning, midday, evening, night) serve as anchors, keeping the monk tethered to God and allowing the spirit of prayer to permeate every activity between these formal prayer times."}, {"front": "Define 'Discretio' as taught by Cassian.", "back": "Discretio is discernment or prudent moderation—the virtue of knowing the right measure in all things (e.g., when to fast, speak, work, or rest)."}, {"front": "Why did Abba Moses call Discretio 'the mother and guardian and guide of all virtues'?", "back": "Without Discretio, even good practices can become dangerous. Excessive zeal, fasting, or solitude can lead to collapse, delusion, or pride, turning potential virtues into traps."}, {"front": "How did Cassian illustrate the danger of lacking Discretio with the story of Monk Hero?", "back": "Hero practiced extreme asceticism but refused counsel, trusting only his own judgment. His pride led him into spiritual delusion and sin, demonstrating that extraordinary asceticism without humility and obedience is not true virtue."}, {"front": "How did Cassian's teaching on Discretio influence Saint Benedict of Nursia?", "back": "Benedict made moderation a defining characteristic of his Rule, describing it as 'a little rule for beginners' with 'nothing harsh, nothing burdensome,' directly inheriting Cassian's spirit of gentle moderation."}, {"front": "Name two major areas of Western Christian tradition significantly shaped by Cassian's teachings.", "back": "Moral theology (e.g., the examination of conscience, the development of the seven deadly sins) and monasticism (e.g., the foundation of the Opus Dei, the moderate character of Benedictine monasticism)."}, {"front": "How does Cassian stand at the crossroads of Eastern and Western Christianity?", "back": "His teachers were the great monks of Egypt (Eastern tradition), and his students were the monks of Gaul (founding Western monasticism). He is venerated as a saint in the Eastern Orthodox Church, and his teachers' texts are found in the Philokalia."}, {"front": "According to Cassian, what is the fundamental nature of Pride (superbia) among the vices?", "back": "Pride is considered the root of all vices, representing the soul's fundamental refusal to depend on God."}, {"front": "How does Cassian distinguish between sinful sadness (tristitia) and holy sorrow for sin (compunctio)?", "back": "Sinful sadness (tristitia) is a vice that paralyzes the soul and turns one away from God, draining energy and hope. Holy sorrow for sin (compunctio) is a virtue that draws one toward God through repentance and spiritual growth."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
