    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the prevailing sentiment regarding Cluniac monasticism by the late eleventh century?", "back": "While Cluniac monasteries flourished with magnificent liturgy, some monks questioned whether their splendor had drawn them away from the simplicity and silence prized by the Desert Fathers."}, {"front": "What was the primary aim of the Gregorian Reform, led by Pope Gregory VII in the eleventh century?", "back": "The Gregorian Reform sought to free the Church from the control of secular rulers and to restore clerical discipline."}, {"front": "What was St. Bruno of Cologne's early career before founding the Carthusians?", "back": "He was educated at the renowned Reims cathedral school, where he became a prominent teacher of theology and philosophy, eventually serving as its head."}, {"front": "What is 'simony,' and how did it influence Bruno's disillusionment with the Church?", "back": "Simony is the buying or selling of spiritual things, especially Church offices. Bruno was troubled by the simoniacal Archbishop Manasses de Gournay of Reims, who obtained his position through bribery."}, {"front": "When and where did St. Bruno and his six companions establish the first Carthusian hermitage?", "back": "Around 1084, in the wild and desolate Chartreuse valley (Cartusia) in the French Alps."}, {"front": "What characteristics did Bruno deliberately seek for the location of the Grande Chartreuse?", "back": "He chose a remote, inhospitable, high-altitude site with a harsh climate, poor land, and immense solitude."}, {"front": "Describe the typical Carthusian 'cell' and how monks utilize it.", "back": "A Carthusian cell is a small, self-contained dwelling with a workroom, bedroom, small garden, and covered walkway. Monks spend most of their time alone within it, praying, reading, and working with their hands."}, {"front": "How do Carthusians combine the solitary and communal aspects of monastic life?", "back": "They combine the solitary life of the desert hermit with the structure of a monastic community, essentially being 'a hermit living within a monastery' with profound personal solitude within a framework of communal obedience."}, {"front": "What is 'Matins' in the Carthusian tradition?", "back": "Matins is the first and longest of the canonical hours, prayed communally in the church in the middle of the night (typically around 2:00 a.m.)."}, {"front": "What is the role of a 'Prior' in a Carthusian monastery (charterhouse), and how does it differ from a Benedictine 'Abbot'?", "back": "The Prior is the head of a Carthusian house. Their authority touches the monks' daily routine less than an abbot's would, emphasizing the Carthusian value of personal solitude."}, {"front": "Why did St. Bruno leave the Grande Chartreuse, and what did he do afterward?", "back": "In 1090, he was summoned to Rome by Pope Urban II (his former student) as an advisor. He never returned to the Alps, instead founding a second hermitage in Calabria, Italy."}, {"front": "How was the Carthusian way of life transmitted after St. Bruno's death, given he left no written rule?", "back": "It was transmitted through the living example of the first community – a tradition of silence, solitude, and prayer passed from monk to monk across centuries."}, {"front": "Who was Guigo I, and what was the significance of his *Consuetudines Cartusiae*?", "back": "Guigo I was the fifth prior of the Grande Chartreuse. Around 1127, he wrote the *Consuetudines Cartusiae* ('Customs of the Chartreuse'), which was a detailed description of the Carthusian way of life already established, serving as its foundation."}, {"front": "Describe key elements of the extreme austerity practiced by Carthusian monks as outlined in the *Consuetudines*.", "back": "They ate one meal a day (two on Sundays/feast days), fasted frequently, abstained from meat entirely, wore coarse wool habits, went barefoot within the cloister, and kept almost perpetual silence."}, {"front": "What was the 'spatiamentum' in Carthusian life, and why was it significant?", "back": "The *spatiamentum* was a weekly communal walk, usually on Monday, during which monks were permitted to talk freely. It served as their primary social contact."}, {"front": "Who was Guigo II, and what influential spiritual work did he author?", "back": "Guigo II, a later prior, wrote the *Scala Claustralium* ('The Ladder of Monks'), a short treatise describing four stages of prayerful engagement with Scripture."}, {"front": "Name the four stages of *lectio divina* as described in Guigo II's *Ladder of Monks*.", "back": "Lectio (reading), meditatio (meditation), oratio (prayer), and contemplatio (contemplation)."}, {"front": "What unique distinction do the Carthusians hold among Catholic religious orders?", "back": "They have never undergone a major reform throughout their over nine hundred years of existence."}, {"front": "What Latin saying expresses the remarkable stability of the Carthusian tradition?", "back": "'Cartusia numquam reformata quia numquam deformata' ('The Carthusian order was never reformed because it was never deformed')."}, {"front": "What is the official motto of the Carthusian order, and what does it symbolize?", "back": "'Stat crux dum volvitur orbis' ('The cross stands while the world turns'). It expresses their conviction that while the world changes, the cross of Christ and the monk's devotion to it remain fixed."}, {"front": "What two primary factors help explain the Carthusians' sustained fidelity to their original way of life for over nine centuries?", "back": "The extreme austerity of the life attracted only the most serious candidates, and the absence of wealth or comfort prevented corruption within the order."}, {"front": "How did the cathedral schools of the eleventh century, such as Reims, relate to later educational institutions?", "back": "The cathedral schools of the eleventh century were the forerunners of the medieval universities, attracting students from across northern Europe and providing advanced education."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
