<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who wrote 'The Ladder of Monks' (Scala Claustralium) and approximately when?", "back": "Guigo II, the ninth prior of the Grande Chartreuse, wrote 'The Ladder of Monks' around 1150 A.D."}, {"front": "What is 'Scala Claustralium'?", "back": "It is Latin for 'The Ladder of Cloistered Monks,' a short treatise by Guigo II describing four steps to spiritual ascent, recalling Jacob's ladder."}, {"front": "What overall practice do Guigo II's four rungs articulate?", "back": "They form the classic articulation of *lectio divina* (sacred reading), a prayerful engagement with Scripture seeking transformation."}, {"front": "List the four rungs of Guigo II's Ladder of Monks in order, with their Latin and English names.", "back": "1. *Lectio* (reading)\n2. *Meditatio* (meditation)\n3. *Oratio* (prayer)\n4. *Contemplatio* (contemplation)"}, {"front": "Describe *Lectio* as the first rung of the ladder.", "back": "*Lectio* is the careful, attentive, slow, and reverent reading of Sacred Scripture, often done aloud, lingering over each word as if tasting it, like placing food in the mouth."}, {"front": "What analogy does Guigo II use for the act of *Lectio*?", "back": "Guigo II compares *Lectio* to placing food in the mouth, taking up the text slowly and tasting each word."}, {"front": "Explain *Meditatio* as the second rung of the ladder.", "back": "*Meditatio* is actively chewing upon what has been read, turning it over, breaking it open to understand what God is saying, engaging the intellect. It's like the teeth chewing food."}, {"front": "What critical spiritual development arises from *Meditatio*?", "back": "Through meditation, a great desire or longing for purity and for God is kindled within the soul. This desire is the 'hinge' driving the soul upward to prayer."}, {"front": "How does Guigo II define *Oratio*?", "back": "*Oratio* is personal, heartfelt prayer that arises spontaneously from meditation on Scripture. It is speaking to God from the heart, expressing desire and longing, not formal liturgical prayers."}, {"front": "What analogy describes *Oratio*?", "back": "Guigo II says prayer is like the savour or taste that rises from the food as it is chewed, with its fragrance ascending to God."}, {"front": "What is *Contemplatio*, the fourth and highest rung?", "back": "*Contemplatio* is God's own gift, a grace freely given, offering direct, experiential knowledge of God's presence that surpasses intellectual understanding. It cannot be earned."}, {"front": "What analogy does Guigo II use for *Contemplatio*?", "back": "Guigo compares contemplation to the nourishment the body receives from food that has been eaten and digested, where the sweetness passes into the substance of the soul."}, {"front": "Why are the four rungs of Guigo II's ladder interdependent?", "back": "They must not be separated because reading without meditation is dry, meditation without prayer is fruitless, and prayer without meditation lacks substance. The first rungs are of little use without the last, and the last can hardly ever be reached without the first."}, {"front": "What is the ultimate goal of a monk's daily work according to Guigo II?", "back": "To climb the ladder of prayer, step by step, from the written word of God to the living God Himself."}, {"front": "Who was St. Bruno, and what is notable about his surviving writings?", "back": "St. Bruno was the founder of the Carthusians. He left almost no writings—only two letters and a brief profession of faith—a stark contrast to many other monastic founders."}, {"front": "To whom did St. Bruno write his most personal and revealing letter?", "back": "He wrote to his friend Raoul le Verd, a fellow canon of Reims who was considering entering monastic life, describing the joys of his solitary life."}, {"front": "What did the term 'desert' signify for Carthusian monks like St. Bruno?", "back": "'Desert' meant a remote wilderness, like the steep Alpine valley of the Grande Chartreuse, not a sandy wasteland. It was a place removed from human habitations."}, {"front": "Beyond spiritual joys, what did St. Bruno appreciate about his physical surroundings?", "back": "He described the beauty, healthful air, pleasant plains, green meadows, mountains, shaded valleys, rivers, springs, gardens, orchards, and fruit-bearing trees, which refreshed the weary spirit."}, {"front": "What is a 'cell' in the Carthusian monastic context?", "back": "For Carthusians, a 'cell' is a small house with its own garden, workshop, and covered walkway, where the monk spends most of his life in solitude."}, {"front": "How do Carthusian monks typically spend their days?", "back": "They spend the greater part of their lives in their individual cells, praying, reading, writing, and laboring with their hands."}, {"front": "When and how do Carthusian monks typically interact with one another?", "back": "On Sundays and feast days, they come together in church for sacred offices (chanting canonical hours) and eat together, speaking and rejoicing in each other's company."}, {"front": "What is a defining characteristic of Carthusian life regarding communication?", "back": "Silence reigns among them. It is among the strictest commitments in the Church; monks rarely speak, and when they do, it is briefly and in low tones, as silence is a vessel for prayer."}, {"front": "According to St. Bruno, what spiritual benefits does solitude provide?", "back": "Solitude brings peace and joy, allowing a man to grieve for his sins, weep for the world's sins, and wholly devote himself to prayer and study without worldly distractions. The 'eye of the heart is purified'."}, {"front": "What does St. Bruno mean by the soul 'watching with the Bridegroom'?", "back": "This refers to the soul's intimate spiritual communion with Christ, drawing on the image of the soul as the bride of Christ from the Song of Songs, leading to inward gladness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
