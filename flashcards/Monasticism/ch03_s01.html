<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What major historical event marked the 5th century in the Western Roman Empire?", "back": "The collapse of the Western Roman Empire, marked by Germanic tribal invasions (Visigoths, Vandals, Ostrogoths) and the sacking of cities."}, {"front": "When was Rome sacked by the Visigoths under Alaric, and what was its significance?", "back": "In 410 AD; it was an event that shocked the entire Mediterranean world and prompted Saint Augustine to begin writing *The City of God*."}, {"front": "How did Saint Augustine respond to the catastrophe of Rome's sack?", "back": "He began writing *The City of God*, arguing that Christians should place their hope in the heavenly city, not in earthly empires."}, {"front": "What was the primary difference between Eastern and Western monastic settings as monasticism began moving West?", "back": "Eastern monasticism flourished in the deserts of Egypt, while the West had different environments like the forests and river valleys of Gaul."}, {"front": "Who was John Cassian?", "back": "A pivotal figure who brought the wisdom of Egyptian monasticism to the Western Church, often called the 'bridge between Eastern and Western monasticism'."}, {"front": "Where was John Cassian likely born?", "back": "Probably in the Roman province of Scythia Minor (modern Romania) around 360 AD, though some scholars suggest Gaul or Provence."}, {"front": "What was John Cassian's initial monastic training?", "back": "He entered a monastery in Bethlehem as a young man."}, {"front": "Where did Cassian travel to learn from the greatest monks of his age?", "back": "To the Egyptian desert (Nile Delta and the desert of Scetis) around 385 AD, where he spent roughly a decade."}, {"front": "Define 'Cenobites'.", "back": "Monks who live in community under a common rule, as opposed to hermits who live alone."}, {"front": "Define 'Abbas'.", "back": "A monastic father or spiritual director; the word 'abbot' comes from this Aramaic term meaning 'father'."}, {"front": "Who ordained Cassian a deacon in Constantinople?", "back": "John Chrysostom, the great bishop and preacher."}, {"front": "Where did John Cassian eventually settle and establish monasteries in the West?", "back": "Marseilles, in southern Gaul, around 415 AD, founding two monasteries (one for men and one for women) near the tomb of Saint Victor."}, {"front": "What are John Cassian's two major works that profoundly influenced later Western monasticism?", "back": "*The Institutes* (De Institutis Coenobiorum) and *The Conferences* (Collationes)."}, {"front": "What is the primary purpose and content of Cassian's *The Institutes*?", "back": "It's a practical handbook for organizing monastic life, describing external aspects (dress, prayer) and analyzing the eight principal faults that threaten the monk's soul."}, {"front": "What are the 'eight principal faults' described in *The Institutes*?", "back": "Eight vices Cassian identified as the chief obstacles to the spiritual life, which later influenced Pope Gregory the Great's list of the seven deadly sins."}, {"front": "What is the primary purpose and content of Cassian's *The Conferences*?", "back": "A series of twenty-four dialogues recording (or reconstructing) his conversations with the great abbas of the Egyptian desert, covering deeper theological topics like prayer, perfection, and divine grace."}, {"front": "How did *The Conferences* demonstrate its lasting importance in Western monasticism?", "back": "Saint Benedict specifically recommended them for evening reading in his Rule."}, {"front": "What unique contribution did Cassian's works provide to the Western Church?", "back": "A comprehensive, written guide to the monastic life—practical, psychological, and theological—in Latin, systematizing the oral wisdom of the desert."}, {"front": "Who was Martin of Tours, and what was his significance for early Western monasticism?", "back": "A Roman soldier who became a monk and then bishop of Tours in Gaul; he founded some of the earliest monastic communities in the West (Ligugé, Marmoutier) and helped spread the ideal of the monk-bishop."}, {"front": "Who founded the influential monastery on the island of Lérins, and what was its impact?", "back": "Honoratus of Lérins (c. 410 AD); it became a great center of monastic learning and produced several important bishops and theologians."}, {"front": "Who was Germanus in relation to John Cassian?", "back": "Cassian's lifelong companion who traveled with him through the deserts of Egypt and shared in the conversations that would later become *The Conferences*."}, {"front": "Why is John Cassian considered so important for Western monasticism?", "back": "He translated and systematized the scattered oral wisdom of the Eastern Desert Fathers into coherent, written Latin works, providing the West with a systematic monastic theology and practical guidance."}, {"front": "How did John Cassian's influence extend to future Western monasticism?", "back": "Saint Benedict of Nursia drew heavily on Cassian's *Institutes* and *Conferences* when writing his famous Rule, ensuring Cassian's ideas spread through the Benedictine order and the entire Western Church."}, {"front": "What title is often given to John Cassian due to his profound and lasting influence on monastic thought in the West?", "back": "He is rightly called the father of Western monastic spirituality."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
