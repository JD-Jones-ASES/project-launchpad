<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental purpose of the monastery, according to Benedict?", "back": "Benedict called the monastery 'a school of the Lord's service' (schola), a place for monks to learn, step by step, to love God with their whole heart."}, {"front": "Name the three distinct vows taken by a Benedictine monk upon solemn profession.", "back": "The three Benedictine vows are Stabilitas (Stability), Conversatio morum (Conversion of Life), and Obedientia (Obedience)."}, {"front": "How do Benedictine vows relate to the 'evangelical counsels' common to all religious orders?", "back": "Benedictine vows (Stabilitas, Conversatio morum, Obedientia) overlap with the evangelical counsels of poverty, chastity, and obedience, but express them in Benedict's unique way, focusing on specific community commitment and ongoing monastic living."}, {"front": "Define 'Stabilitas' as a Benedictine vow.", "back": "Stabilitas is the vow to remain in one monastery for the rest of one's life, committing to a particular community, abbot, and place. It roots the monk in reality and helps prevent spiritual flight."}, {"front": "Explain 'Conversatio morum' as a Benedictine vow.", "back": "Conversatio morum is the vow to live according to the monastic way of life and pursue ongoing conversion—a continual turning toward God. It encompasses the whole of the monk's daily life, including poverty, chastity, fasting, manual labor, and growth in holiness."}, {"front": "Describe 'Obedientia' in the context of Benedictine vows.", "back": "Obedientia is the vow to obey the abbot and the Rule. It is a freely chosen act of love, modeled on Christ's obedience to the Father, and is referred to by Benedict as 'the first step of humility'."}, {"front": "How do the three Benedictine vows (Stabilitas, Conversatio morum, Obedientia) work together?", "back": "Stability keeps the monk in one place; conversatio morum transforms his life within that place; and obedience ensures his transformation follows God's will, creating conditions for deep prayer and genuine holiness."}, {"front": "What is the 'Opus Dei' in Benedictine usage?", "back": "The Opus Dei, literally 'the Work of God,' refers to the communal prayer of the Divine Office—the psalms, hymns, and readings chanted by monks together at fixed times throughout the day and night."}, {"front": "What central instruction did Benedict give regarding the Opus Dei?", "back": "Benedict insisted: 'Let nothing be preferred to the Work of God,' meaning that when the bell rings for prayer, everything else must stop."}, {"front": "List the eight 'hours' of the Divine Office around which Benedict structured the monastic day.", "back": "The eight hours are Matins (Vigils), Lauds (Morning Prayer), Prime, Terce, Sext, None, Vespers (Evening Prayer), and Compline (Night Prayer)."}, {"front": "What is the significance of the Divine Office for the wider Catholic Church today?", "back": "The Divine Office, known today as the Liturgy of the Hours, remains the official prayer of the entire Catholic Church, obligatory for priests, deacons, and religious, and encouraged for laypeople."}, {"front": "What is 'Lectio Divina' and what is its purpose?", "back": "Lectio Divina, or 'sacred reading,' is a slow, attentive, prayerful reading of Scripture (and other spiritual texts) in which the reader seeks not information but a personal encounter with God, allowing the text to become prayer."}, {"front": "How does Lectio Divina differ from typical modern reading habits?", "back": "Unlike quick, information-extraction reading, Lectio Divina is slow, contemplative, and allows the text to 'read' the monk, letting words sink into the heart and lead to conversation with God."}, {"front": "What is the meaning of the word 'abbot' and what is his primary role in a Benedictine monastery?", "back": "Abbot comes from the Aramaic 'abba' meaning 'father.' In Benedict's vision, the abbot is the spiritual father of his monks, believed to 'hold the place of Christ in the monastery'."}, {"front": "What are some key duties and qualities Benedict outlines for the abbot?", "back": "The abbot must teach 'more by deeds than by words,' adapt his approach to each monk ('threatening one, coaxing another'), and remember his fearsome responsibility to give an account to God for every soul entrusted to his care."}, {"front": "How does Benedict's Rule balance the abbot's authority with community input?", "back": "Benedict instructs the abbot to call the whole community together and listen to their counsel before making important decisions, 'for the Lord often reveals what is better to the younger'."}, {"front": "Describe the countercultural nature of Benedictine authority as embodied by the abbot.", "back": "Benedictine authority is understood as servant leadership and responsibility before God for the salvation of the monks, not as power over others for the abbot's own sake."}, {"front": "What is perhaps the most distinctive quality of the Rule of Saint Benedict?", "back": "Its moderation. Benedict aimed to establish 'nothing harsh, nothing burdensome' for his monks, learning from the extremes of earlier monastic traditions."}, {"front": "How did Benedict's approach to monastic life differ from some earlier monastic traditions?", "back": "Benedict chose a path of moderation, in contrast to the extreme ascetic feats (like standing all night or eating only once a week) sometimes practiced by Desert Fathers, which could lead to burnout or pride."}, {"front": "Provide examples of moderation in the Rule of Saint Benedict.", "back": "Monks ate adequately (two cooked dishes, plus fruit/vegetables), slept a reasonable number of hours, were allowed moderate wine, and the sick, old, and young were to receive special, gentle care."}, {"front": "Why was moderation a key principle for Benedict?", "back": "Benedict recognized that the spiritual life is a marathon, not a sprint. A rule asking for more than human beings could sustain would eventually collapse, while moderation created a framework for lifelong faithfulness."}, {"front": "Define 'Discretio' as a key concept in Benedictine spirituality.", "back": "Discretio is the virtue of wise moderation and prudent discernment, the ability to find the right path between extremes—between laxity and harshness, or too little discipline and too much."}, {"front": "What did Gregory the Great say about Benedict's Rule and 'Discretio'?", "back": "Gregory the Great praised Benedict's Rule as 'remarkable for its discretio,' highlighting its wise moderation."}, {"front": "What single conviction lies at the heart of the Rule of Saint Benedict?", "back": "'Prefer nothing whatever to the love of Christ.' This captures the essence that the purpose of the monastic life is to seek God and love Him with one's whole heart, soul, and strength."}, {"front": "What significant recognition did Pope Paul VI bestow upon St. Benedict, and why?", "back": "In 1964, Pope Paul VI declared St. Benedict the patron saint of all Europe, recognizing the extraordinary contribution Benedictine monasticism made to Western civilization by preserving learning, cultivating land, and keeping faith alive during centuries of turmoil."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
