<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cloister and the Cell (Monasticism) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Cloister and the Cell (Monasticism) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Monasticism">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two primary texts introduced in this section about early monasticism?", "back": "The Life of Saint Anthony and The Paradise of the Fathers."}, {"front": "Who authored The Life of Saint Anthony and approximately when was it written?", "back": "Saint Athanasius, around AD 360, shortly after Anthony's death."}, {"front": "Why is The Life of Saint Anthony considered one of the most influential books in Christian history?", "back": "It helped convert Saint Augustine and inspired countless individuals to pursue solitude and seek God."}, {"front": "What kind of content does The Paradise of the Fathers offer?", "back": "It is a collection of sayings and stories from the Desert Fathers and Mothers."}, {"front": "According to the text, what are some of the universal human questions these ancient monks grappled with?", "back": "“How should I live? What does God want from me? How do I overcome my own weakness?”"}, {"front": "What specific event triggered Saint Anthony's radical conversion?", "back": "Hearing the Gospel of Matthew (specifically the passage about the rich man selling his possessions) read aloud in church."}, {"front": "Describe Saint Anthony's immediate response to hearing the Gospel passage about giving up possessions.", "back": "He immediately left the church, gave his ancestral land to villagers, sold all movable possessions, and distributed the money to the poor, reserving only a little for his sister."}, {"front": "What second Gospel passage prompted Anthony to give away his remaining possessions?", "back": "“Be not anxious for the morrow.”"}, {"front": "What arrangements did Saint Anthony make for his sister after his conversion?", "back": "He committed her to known and faithful virgins in a convent to be brought up."}, {"front": "How did early monastics like Anthony practice their discipline before the establishment of formal monasteries in Egypt?", "back": "They practiced discipline in solitude near their own villages or sought out older hermits for guidance."}, {"front": "How did Anthony gather 'supplies for his journey in the way of virtue' in his early days of solitude?", "back": "He visited good men, observed their unique virtues (graciousness, prayer, freedom from anger, endurance, etc.), and returned to his own place of discipline striving to unite these qualities in himself."}, {"front": "What was Anthony's approach to manual labor and prayer?", "back": "He worked with his hands, remembering 'he who is idle let him not eat,' and was constant in secret prayer, knowing a man ought to pray unceasingly."}, {"front": "What does the text say about Anthony's memory regarding scriptural readings?", "back": "He paid such heed to what was read that his memory served him for books, retaining everything."}, {"front": "Where did Anthony withdraw to for extended solitude after his initial discipline near the village?", "back": "He moved further into the desert, eventually settling in an abandoned fort across a river."}, {"front": "How did the Desert Fathers, including Anthony, understand the spiritual life?", "back": "As a fierce 'spiritual combat' or a 'real war' against invisible enemies (demons) who sought to drag the soul away from God."}, {"front": "How might modern readers interpret the Desert Fathers' accounts of battling demons?", "back": "Either literally as encounters with evil spirits, or as vivid"}, {"front": "What specific teaching from the Catholic Church affirms the reality of spiritual warfare?", "back": "The Catechism of the Catholic Church (CCC 409) states, 'The whole of man's history has been the story of dour combat with the powers of evil.'"}, {"front": "Describe Saint Anthony's reaction when he encountered real gold scattered in his path in the desert.", "back": "He marvelled at the quantity but passed it by as if it were fire, showing he truly cared nothing for money, and hurried on."}, {"front": "What signs did visitors outside Anthony's fort observe that indicated his spiritual combat within?", "back": "They heard clamouring crowds, dinning, piteous voices, and cries like 'Go from what is ours' from inside the fort."}, {"front": "What advice did Anthony give to those who were afraid of the demonic sounds outside his fort?", "back": "To sign themselves with the cross and depart boldly, as these were merely 'seeming onslaughts' against the cowardly."}, {"front": "How long did Anthony remain in solitary training within the abandoned fort?", "back": "Nearly twenty years."}, {"front": "What was remarkable about Saint Anthony's physical appearance when he finally emerged from the fort after two decades?", "back": "He had the 'same habit of body as before,' neither fat from lack of exercise nor lean from fasting, but appeared completely natural and balanced."}, {"front": "Describe Anthony's spiritual and mental state upon emerging from prolonged solitude.", "back": "His soul was free from blemish, not contracted by grief nor relaxed by pleasure, guided by reason, and abiding in a natural state; he was untroubled by crowds and not overjoyed by salutations."}, {"front": "What positive impacts did Anthony have on people after he emerged from his solitude in the fort?", "back": "The Lord healed bodily ailments through him, cleansed others from evil spirits, and gave Anthony grace in speaking to console the sorrowful."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
