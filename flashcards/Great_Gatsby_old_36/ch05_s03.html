    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "What was Nick's initial impression of Gatsby's house when he returned home late one night?", "back": "He thought his own house was on fire because Gatsby's house was blazing with light from tower to cellar, illuminating the entire corner of the peninsula."}, {"front": "What two unusual activities did Gatsby suggest to Nick very late at night?", "back": "He suggested going to Coney Island in his car or taking a plunge in the swimming pool."}, {"front": "How did Gatsby initially react to Nick's offer to invite Daisy for tea?", "back": "He feigned carelessness and said, 'Oh, that's all right. I don't want to put you to any trouble,' while showing suppressed eagerness."}, {"front": "What peculiar request did Gatsby make concerning the day of the tea invitation?", "back": "He said he wanted 'to get the grass cut,' implicitly referring to Nick's ragged lawn, which he immediately sent a gardener to tend."}, {"front": "What kind of 'little thing' did Gatsby hesitantly offer Nick?", "back": "He offered Nick a confidential side business opportunity that wouldn't take much time and could provide a 'nice bit of money,' assuming Nick didn't make much from selling bonds."}, {"front": "How did Nick respond to Gatsby's business proposition?", "back": "Nick politely refused, stating he had 'his hands full' and couldn't take on any more work, realizing the offer was a tactless payment for his help with Daisy."}, {"front": "What warning did Nick give Daisy when he invited her to tea?", "back": "He warned her, 'Don't bring Tom.'"}, {"front": "How did Daisy react to Nick's warning about Tom?", "back": "She responded with feigned innocence, asking, 'Who is `Tom'?'"}, {"front": "List the elaborate preparations Gatsby made for the tea party at Nick's house.", "back": "He sent a man with a lawnmower to cut Nick's grass and an hour before Daisy's arrival, sent an entire greenhouse of flowers and innumerable receptacles."}, {"front": "Describe Gatsby's appearance and demeanor when he arrived at Nick's house for the tea party.", "back": "He was pale, showed dark signs of sleeplessness, wore a white flannel suit, silver shirt, and gold-colored tie, and was extremely nervous, distracted, and vague."}, {"front": "What did Gatsby nearly do just before Daisy arrived, convinced she wouldn't come?", "back": "He informed Nick, in an uncertain voice, that he was going home because 'Nobody's coming to tea. It's too late!'"}, {"front": "Describe Daisy's arrival at Nick's house for tea.", "back": "She arrived in a large open car with a chauffeur, her voice was an 'exhilarating ripple,' and she asked Nick if he was 'in love with [her]' because she had to come alone."}, {"front": "What was Gatsby's behavior upon Daisy's entry into the living room?", "back": "He disappeared and then re-entered 'pale as death,' glaring tragically at Nick, and stalked silently into the living room."}, {"front": "How did Gatsby attempt to appear composed during the initial awkward reunion with Daisy?", "back": "He reclined against the mantelpiece in a 'strained counterfeit of perfect ease, even of boredom,' with his hands plunged in his coat pockets."}, {"front": "What significant object did Gatsby almost knock over during his nervous reunion with Daisy?", "back": "A 'defunct mantelpiece clock.'"}, {"front": "What does the 'defunct mantelpiece clock' symbolize in this chapter?", "back": "It symbolizes the stopped time Gatsby has been desperately trying to reverse, his desire to recapture a moment from five years past."}, {"front": "How long had it been since Gatsby and Daisy had last met, according to Gatsby?", "back": "Five years next November."}, {"front": "Why did Gatsby declare the reunion was a 'terrible mistake' to Nick in the kitchen?", "back": "He was overwhelmed by embarrassment and the reality of the situation, feeling the moment was ruined by his nervousness."}, {"front": "How did Nick help to alleviate Gatsby's extreme embarrassment?", "back": "He reassured Gatsby by telling him that Daisy was 'embarrassed too,' which seemed to surprise and comfort him."}, {"front": "What advice did Nick give Gatsby about his conduct during the reunion?", "back": "He told Gatsby he was 'acting like a little boy' and being 'rude' by leaving Daisy alone in the living room."}, {"front": "What historical detail is revealed about Gatsby's enormous house?", "back": "It was built by a brewer during the 'period' craze, who went into decline after his plan to have neighboring cottages thatch their roofs was refused."}, {"front": "What observation does the narrator make about Americans' attitudes towards being 'serfs' versus 'peasantry'?", "back": "Americans are 'occasionally willing to be serfs' but 'always been obstinate about being peasantry,' implying a resistance to being seen as a fixed lower class dependent on a landlord."}, {"front": "What does Gatsby's initial wild lighting of his house suggest about his motivation for the tea party?", "back": "It suggests his intense, almost desperate, desire to impress Daisy and create a grand, spectacular setting for her arrival, possibly revealing his anxiety and ostentation."}, {"front": "How does Daisy's question, 'Are you in love with me... or why did I have to come alone?' characterize her?", "back": "It characterizes her as flirtatious, self-centered, and accustomed to being the object of male attention, even in a seemingly innocent tone."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
