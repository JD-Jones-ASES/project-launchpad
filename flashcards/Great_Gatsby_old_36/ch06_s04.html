    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>

    </footer>
    <script>
    var CARDS = [{"front": "How does Daisy's initial behavior at Gatsby's party reveal aspects of her character?", "back": "She exhibits a flirtatious, almost performative demeanor, whispering suggestive remarks to Nick about arranging a kiss with a 'green card,' indicating a playful yet perhaps superficial or restless nature."}, {"front": "What is Tom Buchanan's initial perception of Gatsby's party and its guests?", "back": "He expresses arrogance and disdain, stating he doesn't 'know a soul here' and dismisses the celebrities as 'famous people in—in oblivion,' highlighting his East Egg snobbery and feeling out of place."}, {"front": "What is the significance of Gatsby deliberately introducing Tom as 'the polo player'?", "back": "Gatsby uses the label to assert a subtle dominance over Tom, reducing him to a single, defining characteristic associated with old money and tradition, perhaps as a slight or a way to control the social narrative."}, {"front": "What does Daisy's observation, 'I've never met so many celebrities!', indicate about her experiences and desires?", "back": "It shows a fascination with fame and a desire for new experiences, contrasting with the settled, perhaps stifling, world of old money she inhabits."}, {"front": "How does Nick describe Gatsby's dancing with Daisy?", "back": "Nick describes Gatsby's dancing as a 'graceful, conservative fox-trot,' which is notable because he had never seen Gatsby dance before and it hints at a more traditional, perhaps carefully constructed, side to Gatsby."}, {"front": "Why does Daisy ask Nick to remain watchfully in the garden while she is alone with Gatsby?", "back": "She jokingly states it's 'In case there's a fire or a flood, or any act of God,' which could be a lighthearted excuse for privacy or a symbolic reference to the unpredictable, potentially destructive nature of their reunion."}, {"front": "Describe the atmosphere at the 'tipsy table' where Nick and Daisy sit, and what Nick realizes about it.", "back": "The atmosphere is chaotic and 'septic,' with drunken guests like Miss Baedeker being doused in the pool. Nick realizes that what had amused him two weeks prior now felt toxic, highlighting the superficiality and vulgarity underlying the party's glamour."}, {"front": "What is Daisy's overall judgment of West Egg and Gatsby's party by the end of the evening?", "back": "She is 'offended' and 'appalled' by its 'raw vigor,' which 'chafed under the old euphemisms,' and saw its simplicity as 'awful' because she failed to understand the new-money world."}, {"front": "What suspicion does Tom voice about Gatsby's profession?", "back": "Tom suspects Gatsby is 'Some big bootlegger,' reflecting the common stereotype that many 'newly rich people' acquired their wealth illegally during Prohibition."}, {"front": "How does Daisy attempt to defend Gatsby's past profession against Tom's suspicions?", "back": "She claims Gatsby 'owned some drug-stores, a lot of drug-stores. He built them up himself,' a vague and likely fabricated story intended to offer a more respectable image of his wealth."}, {"front": "What is Gatsby's deep emotional reaction after Daisy expresses her dislike for the party?", "back": "He experiences 'unutterable depression,' feeling 'far away from her' and deeply disheartened that she 'didn't have a good time,' revealing the party's true purpose was to impress her."}, {"front": "What extreme demand does Gatsby want Daisy to fulfill regarding her relationship with Tom?", "back": "He wants her to go to Tom and declare, 'I never loved you,' to erase their four years together and signify her complete commitment to him."}, {"front": "What is Gatsby's ultimate goal for his relationship with Daisy, beyond their initial reunion?", "back": "He wants to return to Louisville, marry her from her original house, and restore their relationship 'just as if it were five years ago,' effectively repeating the past."}, {"front": "What warning does Nick give Gatsby about his desire to recreate the past?", "back": "Nick gently advises him, 'I wouldn't ask too much of her,' and directly states, 'You can't repeat the past.'"}, {"front": "How does Gatsby react to Nick's assertion that 'You can't repeat the past'?", "back": "Gatsby reacts incredulously and vehemently, crying, 'Why of course you can!' and determinately vows to 'fix everything just the way it was before.'"}, {"front": "According to Nick, what psychological motivation drives Gatsby's pursuit of the past?", "back": "Gatsby wants to 'recover something, some idea of himself perhaps, that had gone into loving Daisy'—he believes returning to their 'starting place' will allow him to reclaim a lost sense of self and purpose."}, {"front": "Describe the setting and sensory details of the flashback to Gatsby and Daisy's first kiss five years prior.", "back": "It was an autumn night with falling leaves, moonlight making the sidewalk white, and a 'mysterious excitement.' Gatsby saw the sidewalks form a 'ladder' to a 'secret place above the trees.'"}, {"front": "What significant consequence did Gatsby anticipate from kissing Daisy, according to the narrator?", "back": "He knew that 'when he kissed this girl, and forever wed his unutterable visions to her perishable breath, his mind would never romp again like the mind of God,' signifying a loss of boundless imagination for mortal reality."}, {"front": "What is the meaning of the word 'appalling' as used in the text to describe Nick's view of Gatsby's sentimentality?", "back": "As defined in the text, 'appalling' means causing shock or dismay, horrifying, or greatly diminishing in quality or intensity. Nick finds Gatsby's sentimentality profoundly disturbing or overwhelming."}, {"front": "What unresolved feeling does Nick experience when reflecting on Gatsby's sentimentality?", "back": "Nick is reminded of 'an elusive rhythm, a fragment of lost words,' a feeling he almost remembers but finds 'uncommunicable forever,' highlighting the ineffable nature of Gatsby's profound longing."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
