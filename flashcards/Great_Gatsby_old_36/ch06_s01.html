    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

    </footer>
    <script>
    var CARDS = [{"front": "What was Jay Gatsby's birth name and origin?", "back": "His birth name was James Gatz, and he was born to poor farm people in North Dakota."}, {"front": "How did James Gatz begin to reinvent himself into Jay Gatsby?", "back": "At age seventeen, he encountered the millionaire Dan Cody on Lake Superior. He served as Cody's protector and protégé for five years, absorbing the manners and aspirations of wealth."}, {"front": "What was the outcome of Gatsby's expected inheritance from Dan Cody?", "back": "Gatsby was cheated out of his inheritance, which instead went to Ella Kaye."}, {"front": "How did Tom Buchanan treat Gatsby during his visit to Gatsby's estate?", "back": "Tom treated Gatsby with casual condescension and grew suspicious of Gatsby's background and his connection to Daisy."}, {"front": "How did Daisy react to Gatsby's party when she attended with Tom?", "back": "Daisy was appalled by West Egg's vulgarity and did not enjoy the party, signaling a significant disconnect from Gatsby's idealized world."}, {"front": "What impossible demand did Gatsby confide to Nick regarding Daisy?", "back": "Gatsby demanded that Daisy tell Tom she never loved him, and then return with Gatsby to Louisville to relive their past exactly as it was."}, {"front": "What was Nick's warning to Gatsby about repeating the past, and Gatsby's famous reply?", "back": "Nick warned Gatsby that 'one cannot repeat the past.' Gatsby's incredulous and defining reply was, 'Can't repeat the past? Why of course you can!'"}, {"front": "What significant moment does Nick's lyrical account describe at the close of the chapter?", "back": "Gatsby's first kiss with Daisy five years earlier in Louisville, a moment when Gatsby permanently 'wed his unutterable visions to her perishable breath.'"}, {"front": "Define 'Notoriety' as used in the chapter's vocabulary.", "back": "The state of being famous or well known, typically for something negative or disreputable. (e.g., Gatsby's 'notoriety' grew through rumors of his party guests.)"}, {"front": "What does 'Insidious' mean, and how was it used in the text?", "back": "Proceeding in a gradual, subtle way but with harmful effects. (e.g., the hidden sandbar on Lake Superior where Cody anchored was 'the most insidious flat.')"}, {"front": "Explain 'Shiftless' in the context of the chapter.", "back": "Lacking ambition or purpose; lazy. (e.g., Nick describes Gatsby's parents as 'shiftless and unsuccessful farm people.')"}, {"front": "What is the meaning of 'Meretricious'?", "back": "Apparently attractive but having in reality no value or integrity; showily but falsely alluring. (e.g., Gatsby devoted himself to 'a vast, vulgar, and meretricious beauty.')"}, {"front": "How is 'Turgid' used to describe language in the chapter?", "back": "Pompously inflated. (e.g., used to describe the 'turgid sub-journalism' that reported on Ella Kaye and Dan Cody.)"}, {"front": "What are 'Contingencies'?", "back": "Future events or circumstances that are possible but cannot be predicted with certainty. (e.g., Cody 'provided for such contingencies' by trusting Gatsby to manage his affairs.)"}, {"front": "Describe a 'Debauchee' as used in the chapter.", "back": "A person given to excessive indulgence in sensual pleasures. (e.g., Nick calls Dan Cody 'the pioneer debauchee.')"}, {"front": "To 'Ingratiate' oneself means what?", "back": "To bring oneself into favor with someone by flattering or trying to please them. (e.g., Nick describes 'trotting around with Jordan and trying to ingratiate myself with her senile aunt.')"}, {"front": "How is 'Septic' used figuratively in the chapter?", "back": "Figuratively, corrupted or poisoned. (e.g., what had once amused Nick at Gatsby's parties 'turned septic on the air' when seen through Daisy's eyes.)"}, {"front": "Define 'Obtrusive.'", "back": "Noticeable in an unwelcome or intrusive way. (e.g., Daisy was repelled by 'the too obtrusive fate' that governed West Egg's inhabitants.)"}, {"front": "What does 'Dilatory' mean?", "back": "Slow to act; causing delay. (e.g., The Buchanans' 'dilatory limousine' arrives unhurriedly at the end of the party.)"}, {"front": "What is 'Incarnation' in the context of Gatsby's dream?", "back": "The embodiment of a quality or idea in physical form. (e.g., when Gatsby kissed Daisy, 'the incarnation was complete' — his dream took on human flesh.)"}, {"front": "What is meant by Gatsby's 'Platonic conception of himself'?", "back": "It refers to Plato's philosophy of ideal Forms. Gatsby created a perfect, ideal 'Jay Gatsby' in his imagination, believing this ideal self was more real than his actual origins (James Gatz, poverty), and spent his life trying to make reality conform to this vision."}, {"front": "How does Gatsby's Platonic worldview explain his desire to 'fix everything just the way it was before'?", "back": "He believed the ideal Form of his relationship with Daisy — the perfect moment in Louisville — was the true reality, and the intervening five years of Daisy's marriage and changed circumstances were merely an illusion that could be overridden."}, {"front": "Who serves as a foil to Gatsby in Chapter 6, and what does this character represent?", "back": "Tom Buchanan. He represents 'old money,' inherited status, physical dominance, and the brute force of social reality, contrasting Gatsby's 'new money,' self-made mythology, and romantic aspiration."}, {"front": "How does Tom Buchanan's presence at Gatsby's party expose a weakness in Gatsby's self-conception?", "back": "Tom's contempt ('Who is this Gatsby anyhow?') represents social reality pushing back against Gatsby's idealized world, and Daisy's discomfort at the party shows that she cannot accept Gatsby's version of reality."}, {"front": "What is identified as the tragic flaw in Gatsby's grand self-conception?", "back": "It depends entirely on other people, especially Daisy, accepting his idealized version of reality, and they are under no obligation to do so."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
