    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How did Nick feel after the accident, leading him to visit Gatsby at dawn?", "back": "He couldn't sleep, felt 'half-sick between grotesque reality and savage, frightening dreams,' and felt he had something to tell or warn Gatsby."}, {"front": "What was the outcome of Gatsby's all-night vigil waiting for Daisy?", "back": "'Nothing happened'; Daisy came to the window around four o'clock, stood for a minute, and then turned out the light."}, {"front": "How did Gatsby's house appear to Nick the morning after the accident, and what did its condition symbolize?", "back": "It seemed 'enormous,' dusty, and musty, suggesting neglect and symbolizing the collapse of Gatsby's dream."}, {"front": "What advice did Nick give Gatsby about his immediate future?", "back": "Nick advised Gatsby to 'go away,' suggesting Atlantic City or Montreal, because 'it's pretty certain they'll trace your car.'"}, {"front": "Why did Gatsby refuse to leave West Egg, despite Nick's warnings?", "back": "He couldn't possibly leave Daisy until he knew what she was going to do, clinging to his last hope."}, {"front": "What prompted Gatsby to finally reveal the true story of his youth and his past with Dan Cody to Nick?", "back": "He felt that 'Jay Gatsby' had 'broken up like glass against Tom's hard malice,' and his 'long secret extravaganza' was played out."}, {"front": "What was Daisy's significance to Gatsby as the 'first 'nice' girl he had ever known'?", "back": "She represented a world of wealth, sophistication, and desirability that he aspired to and found excitingly mysterious."}, {"front": "How did Gatsby perceive Daisy's house when he first visited, and what gave it its 'breathless intensity'?", "back": "He found it beautiful and permeated with a 'ripe mystery.' Its intensity came from Daisy living there, making it seem filled with fresh romances and vibrant emotions."}, {"front": "What did Gatsby mean by realizing he was in Daisy's house by a 'colossal accident'?", "back": "He was a penniless young man without a past, and his military uniform was a temporary disguise covering his true social standing."}, {"front": "How did Gatsby deceive Daisy when they first became involved?", "back": "He 'deliberately given Daisy a sense of security,' letting her believe he was from her social stratum and fully able to care for her, when he had no such means."}, {"front": "Explain the metaphor of Daisy as Gatsby's 'grail.'", "back": "His pursuit of Daisy became a sacred, all-consuming quest that gave his life meaning and direction, elevating her beyond ordinary desire."}, {"front": "How did Gatsby feel after Daisy 'vanished into her rich house' following their initial romantic encounter?", "back": "He felt 'married to her' and, when they met again, 'somehow, betrayed,' as if she had left him with nothing."}, {"front": "According to Gatsby, what quality did wealth imprison and preserve in Daisy?", "back": "Youth and mystery, making her 'gleam like silver, safe and proud above the hot struggles of the poor.'"}, {"front": "How did Gatsby's love for Daisy affect his personal ambitions?", "back": "He found himself 'way off [his] ambitions,' no longer caring about doing 'great things' if he could spend his time with Daisy."}, {"front": "Why did Daisy's letters to Gatsby during the war show 'nervous despair'?", "back": "She was feeling the 'pressure of the world outside' and wanted Gatsby's presence to reassure her that she was 'doing the right thing.'"}, {"front": "Describe Daisy's 'artificial world' and its influence on her.", "back": "It was 'redolent of orchids and pleasant, cheerful snobbery and orchestras,' a glamorous but superficial environment that swayed her decisions."}, {"front": "What was Daisy 'crying for' within herself during Gatsby's absence?", "back": "She wanted her life 'shaped now, immediately,' by 'some force—of love, of money, of unquestionable practicality—that was close at hand.'"}, {"front": "What 'force' took shape in the middle of spring and led to Daisy's marriage?", "back": "The arrival of Tom Buchanan, with his 'wholesome bulkiness' and established social position."}, {"front": "How did Gatsby rationalize Daisy's assertion that she loved Tom, even 'just for a minute'?", "back": "He believed Tom had 'frightened her' with accusations, making her say things she didn't mean, and that her love for him (Gatsby) was greater."}, {"front": "What was the significance of Gatsby's remark, 'In any case...it was just personal'?", "back": "It indicated the intense, almost unfathomable, and intensely subjective nature of his conception of his affair with Daisy, suggesting its cosmic importance to him personally, beyond external judgment."}, {"front": "After returning from France, what 'miserable but irresistible journey' did Gatsby make?", "back": "He went to Louisville on his last army pay, revisiting the places he and Daisy had shared, seeking fragments of their past."}, {"front": "What feeling did Gatsby have when he finally left Louisville, symbolizing the loss of his dream?", "back": "He felt he had 'lost that part of it, the freshest and the best, forever,' stretching out his hand 'desperately as if to snatch only a wisp of air.'"}, {"front": "What did Gatsby's gardener want to do that morning?", "back": "Drain the pool, as 'Leaves'll start falling pretty soon, and then there's always trouble with the pipes.'"}, {"front": "What was Gatsby's response to the gardener about the pool, and what's the significance of his comment to Nick?", "back": "He told the gardener not to drain it today, then told Nick, 'You know, old sport, I've never used that pool all summer?' This highlights the irony that despite his wealth, he hasn't enjoyed his possessions, his focus being solely on Daisy."}, {"front": "Why was Nick reluctant to leave Gatsby that morning, even missing his train?", "back": "He 'didn't want to leave Gatsby,' feeling emotionally attached and perhaps sensing the impending tragedy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
