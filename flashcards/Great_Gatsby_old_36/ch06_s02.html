    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "What was Jay Gatsby's birth name, and at what age did he change it?", "back": "Jay Gatsby's birth name was James Gatz. He changed it at the age of seventeen."}, {"front": "What specific event prompted James Gatz to change his name to Jay Gatsby?", "back": "He changed his name the moment he rowed out to Dan Cody's yacht on Lake Superior to warn Cody about dangerous winds, marking what Nick calls 'the beginning of his career.'"}, {"front": "Describe James Gatz's life along the shore of Lake Superior before he met Dan Cody.", "back": "He spent over a year working as a clam-digger and salmon-fisher, performing any labor that provided food and shelter, waiting for his destiny."}, {"front": "Why did James Gatz leave St. Olaf College after only two weeks?", "back": "He left because he was 'dismayed at its ferocious indifference to the drums of his destiny' and despised the janitor's work he had to do to pay his way."}, {"front": "What was James Gatz searching for during his time by Lake Superior?", "back": "He was searching for a path to the grand future he envisioned for himself, feeling a strong sense of an important 'destiny' and a life beyond his humble origins."}, {"front": "Who was Dan Cody, and what was the source of his wealth?", "back": "Dan Cody was a fifty-year-old millionaire whose fortune came from the Nevada silver fields, the Yukon, and Montana copper."}, {"front": "What role did Dan Cody play in Gatsby's transformation?", "back": "Cody became Gatsby's mentor and employer aboard his yacht, providing him an education in wealth, sophisticated manners, and the appearances of high society."}, {"front": "List some of the specific jobs Gatsby performed aboard Cody's yacht, the Tuolomee.", "back": "He served in multiple capacities: steward, mate, skipper, secretary, and even 'jailor'—guarding Cody from his own drunken excesses."}, {"front": "What happened to the twenty-five thousand dollars Dan Cody left Gatsby in his will?", "back": "Gatsby never received the money. A woman named Ella Kaye used a legal device to claim what remained of Cody's millions, including Gatsby's inheritance."}, {"front": "What did Gatsby gain from Dan Cody's mentorship that was more valuable than the lost inheritance?", "back": "He gained 'his singularly appropriate education'—the knowledge, bearing, and ambition that allowed him to construct the persona of Jay Gatsby and pursue his grand aspirations."}, {"front": "Explain Fitzgerald's phrase that Jay Gatsby “sprang from his Platonic conception of himself.”", "back": "This means Gatsby rejected his actual origins and parents in favor of an idealized, perfect self-image he created in his mind, embodying an almost spiritual ideal of what he believed he should be."}, {"front": "What does Gatsby's rejection of his real parents and origins reveal about his character?", "back": "It reveals his immense ambition, his profound dissatisfaction with his humble beginnings, and his unwavering determination to actively shape his own identity and destiny, rather than accept his given circumstances."}, {"front": "How does Gatsby's self-invention connect to the broader American idea of self-invention?", "back": "Gatsby embodies the American ideal of the self-made man who rises above his circumstances through sheer will and reinvention, pursuing a personal dream and constructing a new identity."}, {"front": "When does Nick explicitly state Gatsby shared his true backstory with him?", "back": "Nick states Gatsby shared it 'very much later' in their relationship, after many other events of the novel had already transpired."}, {"front": "Why does Nick choose to reveal Gatsby's true origins at this particular point in the novel, rather than earlier?", "back": "Nick explains he 'put it down here' to clear away misconceptions about Gatsby, giving the reader the complete truth about his past before further crucial events unfold, deepening understanding and recontextualizing his actions."}, {"front": "What effect does Nick's decision to rearrange the narrative (revealing Gatsby's past later) have on the reader's understanding of Gatsby?", "back": "It initially allows the reader to experience the mystery and rumors surrounding Gatsby without judgment, then provides a crucial revelation that recontextualizes everything learned so far, deepening their understanding of his motivations and complexities."}, {"front": "How does Gatsby's name change reflect his ambition?", "back": "The change from 'James Gatz' (a common, working-class name) to 'Jay Gatsby' (a more sophisticated, memorable, and unique name) signifies his aspiration to shed his humble identity and embrace a grander, self-created destiny."}, {"front": "What was the name of Dan Cody's yacht?", "back": "The Tuolomee."}, {"front": "Who was Ella Kaye, and what was her specific role in Gatsby's lost inheritance?", "back": "Ella Kaye was a woman who was able to use a legal device (which Gatsby never understood) to claim what remained of Dan Cody's fortune, thereby preventing Gatsby from receiving his twenty-five thousand dollar inheritance."}, {"front": "What was Gatsby's initial impression of St. Olaf College that led him to leave?", "back": "He found it 'dismayed at its ferocious indifference to the drums of his destiny,' implying it was too ordinary and couldn't accommodate his grand aspirations or provide the education he sought for his envisioned future."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
