    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Describe the geographical location of the valley of ashes in relation to West Egg and New York.", "back": "It lies halfway between West Egg and New York, where the motor road runs alongside the railroad."}, {"front": "How does Fitzgerald visually describe the valley of ashes?", "back": "It's a desolate landscape where ashes form into ridges, hills, and grotesque shapes resembling houses, chimneys, and even men. Ash-covered workers move through powdery air, stirring dust."}, {"front": "What is the significance of the valley of ashes as a setting in The Great Gatsby?", "back": "It serves as a stark contrast to the wealth of East and West Egg, representing the decay, moral destitution, and forgotten industrial underbelly of the American dream."}, {"front": "Describe the billboard of Doctor T. J. Eckleburg.", "back": "It features enormous blue, gigantic eyes with irises a yard high, looking out from yellow spectacles over a nonexistent nose."}, {"front": "What is the history behind the billboard of Doctor T. J. Eckleburg?", "back": "It was placed by an oculist who either went blind or moved away, leaving the faded advertisement to brood over the dumping ground."}, {"front": "What symbolic role do the eyes of Doctor T. J. Eckleburg play?", "back": "They function as an unsettling, watchful presence over the moral wasteland of the valley, often interpreted as a 'god-like' or judgmental gaze."}, {"front": "How does Fitzgerald describe George Wilson's physical and emotional state?", "back": "He is described as 'blond, spiritless,' 'anaemic,' and only 'faintly handsome.' He shows economic desperation, with a 'damp gleam of hope' in his eyes when he sees Tom."}, {"front": "How is Myrtle Wilson initially characterized upon her entrance?", "back": "She enters with 'immediately perceptible vitality,' carries herself sensuously, and commands attention, contrasting sharply with her husband."}, {"front": "How does Tom Buchanan behave toward George Wilson during their interaction at the garage?", "back": "Tom is condescending and domineering. He uses false joviality, then turns cold, threatening Wilson and dismissing him."}, {"front": "What does Tom Buchanan's behavior toward George Wilson reveal about their power dynamic?", "back": "It reveals Tom's absolute sense of social superiority and his willingness to use economic leverage and intimidation to control others."}, {"front": "How does Myrtle Wilson's characterization contrast with her husband, George?", "back": "George is 'spiritless,' 'anaemic,' and blends into the background, while Myrtle possesses 'immediately perceptible vitality,' asserts herself, and commands attention. She walks through him 'as if he were a ghost.'"}, {"front": "What is the emotional or economic condition suggested by the description of George Wilson?", "back": "His 'spiritless' nature, 'anaemic' appearance, and the 'damp gleam of hope' upon seeing Tom suggest profound economic desperation and a lack of agency."}, {"front": "How does the shift in Fitzgerald's descriptive register, from mythic language for the valley to prosaic for Wilson's garage, affect the reader's understanding?", "back": "It grounds the symbolic decay of the valley in the harsh, mundane realities of the lives of its inhabitants, making the abstract consequences of wealth inequality tangible."}, {"front": "What does Tom's 'management' of the situation—forcing Nick off the train, arranging Myrtle's departure, deceiving Wilson—reveal about his view of other people?", "back": "It reveals his manipulative nature, his casual disregard for others' feelings or autonomy, and his belief that he can orchestrate events and people to suit his desires."}, {"front": "What is Nick's role during the scene at Wilson's garage and how does it contribute to the scene's effect?", "back": "As an observer, Nick provides an outsider's perspective, highlighting the uncomfortable power dynamics and moral compromises without directly participating, thus allowing the reader to witness Tom's brazenness and Wilson's helplessness unfiltered."}, {"front": "How does the valley of ashes function as a symbol in The Great Gatsby?", "back": "It symbolizes the moral and social decay hidden beneath the glittering surface of the Jazz Age, representing the byproduct of unchecked industrialism and the waste generated by the pursuit of wealth."}, {"front": "What specific details in the text emphasize Tom Buchanan's social superiority over George Wilson?", "back": "Tom slaps Wilson on the shoulder, speaks in a domineering tone, threatens to sell a car elsewhere, and later calls Wilson 'dumb' for not knowing about his wife's affair."}, {"front": "What does the 'impenetrable clouds of dust' stirred by the workers in the valley of ashes suggest?", "back": "It suggests the suffocating nature of their existence, the obscured vision of their future, and the general moral blindness present in the area."}, {"front": "What immediate action does Tom take after leaving Wilson's garage, and what does this signify?", "back": "He arranges for Myrtle to follow them into the city, signifying his total control over her and his blatant disregard for discretion or his marriage."}, {"front": "What is the overall mood or atmosphere established by the description of the valley of ashes?", "back": "It's one of desolation, poverty, and moral decay, establishing a somber and oppressive tone that contrasts with the vivacity of New York and the Eggs."}, {"front": "How does Myrtle's 'immediately perceptible vitality' contrast with the general environment of the valley of ashes?", "back": "Her vibrant presence stands out against the ash-gray, spiritless landscape, suggesting a raw, untamed energy that seeks escape from her desolate surroundings."}, {"front": "What specific phrase describes George Wilson's economic hope when dealing with Tom?", "back": "A 'damp gleam of hope' appears in his eyes when he sees Tom, referring to his desperate desire to sell a car."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
