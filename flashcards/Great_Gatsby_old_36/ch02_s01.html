    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

    </footer>
    <script>
    var CARDS = [{"front": "What is the 'valley of ashes' introduced in Chapter 2?", "back": "A desolate industrial wasteland located between West Egg and New York, symbolizing the moral decay and forgotten poor of the Jazz Age."}, {"front": "Who is Doctor T. J. Eckleburg, and what do his eyes represent in Chapter 2?", "back": "He is a figure on a faded billboard whose brooding eyes observe the valley of ashes, often interpreted as a symbolic, indifferent deity or the eyes of God."}, {"front": "Who is Myrtle Wilson, and where does Nick first meet her?", "back": "Myrtle Wilson is Tom Buchanan's mistress, a woman of intense vitality. Nick first meets her at her husband George's failing garage in the valley of ashes."}, {"front": "Describe George Wilson's appearance and profession as presented in Chapter 2.", "back": "He is described as 'anaemic' (lacking vitality or energy), pale and weak. He owns a failing garage in the valley of ashes."}, {"front": "Where is the small apartment Tom Buchanan maintains for his affair with Myrtle located?", "back": "It is located on 158th Street in New York City."}, {"front": "What are some specific items Myrtle Wilson purchases on the way to the apartment party?", "back": "She purchases a dog and various small luxuries, attempting to project an image of upper-class gentility."}, {"front": "Who joins Tom, Nick, and Myrtle at the apartment party?", "back": "Myrtle's sister Catherine and the McKees from downstairs join the increasingly drunken gathering."}, {"front": "How does Myrtle's personality change when she changes her dress at the apartment?", "back": "Her 'intense vitality' transforms into 'impressive hauteur,' and her laughter and gestures become 'more violently affected,' as if her identity were a costume."}, {"front": "What false information does Catherine spread about Daisy Buchanan during the party?", "back": "Catherine falsely claims that Daisy is Catholic, suggesting this is the reason Tom cannot divorce her and marry Myrtle."}, {"front": "How does Myrtle describe her marriage to George Wilson to the party guests?", "back": "She recounts her marriage as a disappointment, implying she married beneath her, as an elaborate self-deception to justify her affair."}, {"front": "What action does Tom take when Myrtle repeatedly mentions Daisy's name?", "back": "Tom breaks her nose with his open hand in a violent outburst."}, {"front": "What is the main theme of Chapter 2, according to the literary analysis?", "back": "Chapter 2 functions as a sustained study in class performance and the violence that underlies the novel's social hierarchy."}, {"front": "What literary device does Fitzgerald use to highlight social differences in Chapter 2?", "back": "Juxtaposition is used, contrasting the desolate valley of ashes with the wealth of the Eggs, or George Wilson's compliance against Tom's aggression."}, {"front": "Explain the concept of 'identity as a costume' as it applies to Myrtle Wilson in Chapter 2.", "back": "Myrtle's change of dress mirrors a change in her projected self, suggesting that her identity and social status are artificial performances that can be put on and taken off."}, {"front": "What ironic details in the apartment scene expose the artificiality of Myrtle's performance?", "back": "The furniture is 'entirely too large,' the tapestry depicts Versailles, and Myrtle complains about service or dismisses an expensive dress as 'just a crazy old thing,' all revealing pretense."}, {"front": "What does Fitzgerald reveal about the 'class markers' Myrtle imitates?", "back": "He exposes the hollowness and artificiality of these markers, rather than simply mocking Myrtle for aspiring to a higher class."}, {"front": "On what does Tom Buchanan's authority primarily rest, as shown in Chapter 2?", "back": "His authority rests not on merit but on inherited wealth and physical intimidation."}, {"front": "What recurring motif of 'watching' pervades Chapter 2?", "back": "The motif of 'watching' is present through the eyes of Doctor T. J. Eckleburg, George Wilson's unsuspecting gaze, and Nick's perpetual observation as 'within and without'."}, {"front": "What does Tom's violent act against Myrtle ultimately reveal about his power and Myrtle's aspirations?", "back": "It strips away pretensions, revealing Tom's power as ultimately physical and demonstrating that Myrtle's aspirations exist entirely at his sufferance."}, {"front": "What is the purpose of the violence in Chapter 2, according to the analysis?", "back": "Fitzgerald uses this moment of violence not for shock, but for clarity, exposing the brutality that the novel's glittering surfaces work so hard to conceal."}, {"front": "Define 'Contiguous' as it is used in Chapter 2.", "back": "Sharing a boundary or edge; touching. Used to describe the garage's relationship to the surrounding emptiness."}, {"front": "Define 'Anaemic' as it is used in Chapter 2.", "back": "Lacking vitality or energy; pale and weak. Applied to George Wilson's appearance and manner."}, {"front": "Define 'Hauteur' as it is used in Chapter 2.", "back": "Disdainful pride; a haughty manner. Describes the transformation in Myrtle's personality when she changes into the cream-colored dress."}, {"front": "Define 'Proprietary' as it is used in Chapter 2.", "back": "Relating to ownership; behaving as if one owns something. Catherine enters the apartment with 'proprietary haste'."}, {"front": "Define 'Ectoplasm' as it is used in Chapter 2.", "back": "A supernatural substance supposedly emanating from a spiritualist medium; here, used metaphorically to describe the ghostly quality of McKee's enlarged photograph."}, {"front": "Define 'Strident' as it is used in Chapter 2.", "back": "Loud, harsh, and grating. Describes the arguments that keep pulling Nick back into his chair as the evening wears on."}, {"front": "Define 'Supercilious' as it is used in Chapter 2.", "back": "Behaving as though one is superior to others. Applied to Tom's assumption that Nick has nothing better to do on a Sunday afternoon."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
