    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Who is Meyer Wolfshiem, and what is his initial connection to Gatsby's business?", "back": "He is a shady gambler, a 'denizen of Broadway,' and Gatsby's business associate. He initially mistakes Nick Carraway for a potential 'business gonnegtion' for Gatsby."}, {"front": "What detail about Meyer Wolfshiem's appearance reveals his unsavory character?", "back": "His cuff buttons are made from 'finest specimens of human molars,' indicating a morbid and possibly predatory nature."}, {"front": "What infamous crime is Meyer Wolfshiem known for, according to Gatsby?", "back": "He is the man who 'fixed the World's Series back in 1919.'"}, {"front": "How does Nick Carraway react to the revelation about Wolfshiem's crime?", "back": "Nick is staggered, realizing it wasn't just an event but a deliberate act by one man who 'play[ed] with the faith of fifty million people.'"}, {"front": "What does Wolfshiem's assertion that Gatsby is an 'Oggsford man' imply, and what is the reality?", "back": "Wolfshiem intends to portray Gatsby as a man of fine breeding and education from a prestigious institution. This is Gatsby's fabrication, and Wolfshiem's mispronunciation ('Oggsford') highlights its artificiality."}, {"front": "Why does Gatsby abruptly leave Nick and Wolfshiem during lunch?", "back": "He claims he has to make a telephone call, but his departure is strategically timed after Nick's persistent questions about his business and just before Tom Buchanan arrives."}, {"front": "What is Gatsby's visible reaction when Nick introduces him to Tom Buchanan, and what does it suggest?", "back": "Gatsby displays a 'strained, unfamiliar look of embarrassment.' This suggests deep discomfort or fear, likely due to Tom being Daisy's husband and the threat to Gatsby's carefully constructed world."}, {"front": "What happens immediately after Gatsby is introduced to Tom Buchanan?", "back": "Gatsby vanishes from the restaurant without a word, leaving Nick alone with Tom."}, {"front": "Who narrates the flashback about Daisy and Gatsby's early relationship, and where does this narration take place?", "back": "Jordan Baker narrates the flashback. She tells Nick the story in the tea-garden at the Plaza Hotel."}, {"front": "How is Daisy Fay presented in Louisville in 1917, before her marriage to Tom?", "back": "She is eighteen, described as 'by far the most popular of all the young girls,' dressed in white, with a white roadster, and constantly courted by young officers from Camp Taylor."}, {"front": "What is Jordan Baker's first memory of Jay Gatsby?", "back": "She saw him in 1917 as a young lieutenant sitting with Daisy Fay in her white roadster in Louisville."}, {"front": "How does Daisy react after Gatsby, the young officer, leaves Louisville for the war?", "back": "Her mother prevented her from saying goodbye to him in New York, and afterward, she became withdrawn, only dating 'flat-footed, short-sighted young men' who couldn't go to war."}, {"front": "What extravagant gift did Tom Buchanan give Daisy the day before their wedding?", "back": "A string of pearls valued at three hundred and fifty thousand dollars."}, {"front": "Describe Daisy's behavior just before her wedding to Tom Buchanan.", "back": "She was found drunk, clutching a letter (presumably from Gatsby), and declared she had 'change' her mine,' trying to give back the expensive pearls."}, {"front": "What ultimately causes Daisy to go through with her wedding to Tom despite her earlier breakdown?", "back": "Jordan and her maid force her into a cold bath, destroy the letter, and give her 'spirits of ammonia' and ice to sober her up. She then proceeds with the wedding without another word."}, {"front": "How did Daisy appear in the early months of her marriage to Tom?", "back": "She seemed deeply 'mad about her husband,' displaying unfathomable delight and anxiety whenever he left her sight."}, {"front": "What evidence of Tom Buchanan's early infidelity is revealed shortly after his marriage to Daisy?", "back": "A week after their return from Santa Barbara, Tom crashed his car on Ventura road with a chambermaid, breaking her arm, which was reported in the papers."}, {"front": "How did Daisy manage to maintain an 'absolutely perfect reputation' despite associating with a 'fast crowd' in Chicago?", "back": "Jordan suggests it's because Daisy doesn't drink, allowing her to 'hold her tongue' and time any 'irregularity' so that others, being drunk, wouldn't notice or care."}, {"front": "What causes Daisy to ask Jordan about Gatsby for the first time in years?", "back": "Jordan had asked Nick if he knew Gatsby, and after Nick left, Daisy heard the name and instantly reacted, waking Jordan to ask, 'What Gatsby?'"}, {"front": "What pivotal realization does Jordan Baker have after Daisy's inquiry about Gatsby?", "back": "She connects the current Gatsby of West Egg with the young military officer she saw with Daisy in her white car in Louisville in 1917."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
