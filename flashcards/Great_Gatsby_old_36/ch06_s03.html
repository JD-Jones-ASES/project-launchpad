    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

    </footer>
    <script>
    var CARDS = [{"front": "What was Gatsby's birth name and where was he from?", "back": "James Gatz, born to poor farming parents in North Dakota."}, {"front": "At what age did James Gatz change his name to Jay Gatsby, and what event prompted this change?", "back": "He changed it at age seventeen, at the specific moment he saw Dan Cody's yacht drop anchor on Lake Superior."}, {"front": "Explain Gatsby's \"Platonic conception of himself.\"", "back": "It refers to his idealized self-image; he invented the sort of Jay Gatsby a seventeen-year-old boy would invent, seeing himself as a \"son of God\" dedicated to \"His Father's business\" in the service of a \"vast, vulgar, and meretricious beauty.\""}, {"front": "Before meeting Dan Cody, what kind of work did James Gatz do along Lake Superior?", "back": "He worked as a clam-digger and salmon-fisher, or in any capacity that brought him food and bed."}, {"front": "Describe young James Gatz's early experiences with women.", "back": "He knew women early, and because they spoiled him, he became contemptuous of them—young virgins for being ignorant, and others for being hysterical."}, {"front": "Who was Dan Cody?", "back": "A wealthy copper magnate and yachtsman, a product of various metal rushes, who became Gatsby's mentor and employer."}, {"front": "What did Dan Cody's yacht, the TUOLOMEE, symbolize to young James Gatz?", "back": "It represented \"all the beauty and glamour in the world.\""}, {"front": "What role did Gatsby play while employed by Dan Cody?", "back": "He served in various capacities: steward, mate, skipper, secretary, and even jailor, for five years, traveling the Continent three times."}, {"front": "How did Dan Cody's lifestyle influence Gatsby's personal habits, particularly concerning alcohol?", "back": "Witnessing Cody's debauchery made Gatsby drink very little himself, forming a habit of \"letting liquor alone.\""}, {"front": "What was Dan Cody's financial legacy to Gatsby, and what happened to it?", "back": "Cody left Gatsby $25,000, but Gatsby never received it because Ella Kaye used a legal device to inherit Cody's millions."}, {"front": "Who was Ella Kaye?", "back": "A journalist and companion to Dan Cody who, through some legal maneuver, inherited his fortune after his death, preventing Gatsby from receiving his legacy."}, {"front": "What was the significance of Gatsby's five years with Dan Cody?", "back": "It served as Gatsby's \"singularly appropriate education,\" allowing the \"vague contour of Jay Gatsby\" to \"fill out to the substantiality of a man.\""}, {"front": "Why did Nick Carraway decide to explain Gatsby's true background at this point in the narrative?", "back": "He wanted to \"explode those first wild rumors about his antecedents\" and clear up misconceptions, especially as he was in a state of confusion about Gatsby himself."}, {"front": "Describe the initial encounter between Gatsby and the New York reporter.", "back": "The ambitious reporter arrived at Gatsby's door based on vague office rumors about Gatsby's notoriety, seeking a statement, but Gatsby was politely evasive."}, {"front": "What \"contemporary legends\" were circulating about Gatsby's past?", "back": "Stories like an \"underground pipe-line to Canada\" or that he lived in a boat resembling a house that moved secretly along the Long Island shore."}, {"front": "Who unexpectedly arrived at Gatsby's house one Sunday afternoon?", "back": "Tom Buchanan, accompanied by a man named Mr. Sloane and a woman in a brown riding-habit."}, {"front": "How did Gatsby react to Tom Buchanan's presence?", "back": "He was \"profoundly affected\" and uneasy, eager to provide hospitality, though he realized in a vague way \"that was all they came for.\""}, {"front": "How did Tom Buchanan react when Gatsby mentioned they had met before and that Gatsby knew his wife?", "back": "Tom was gruffly polite but didn't clearly remember their previous meeting, though he accepted Gatsby's claim, then questioned Nick about living next door."}, {"front": "What invitation did the woman with Tom and Mr. Sloane extend to Gatsby?", "back": "She enthusiastically invited Gatsby (and Nick) to supper at her place."}, {"front": "What did Gatsby's eagerness to join Tom's riding party for supper reveal about his social understanding?", "back": "He wanted to go and didn't perceive that Mr. Sloane had determined he shouldn't, misinterpreting their superficial cordiality."}, {"front": "What was Tom Buchanan's opinion of Daisy meeting Gatsby, as expressed to Nick?", "back": "He frowned, remarking that \"women run around too much these days\" and \"meet all kinds of crazy fish,\" clearly disapproving of Daisy's association with Gatsby."}, {"front": "How did Mr. Sloane convey his desire for Gatsby not to join them for supper?", "back": "He pulled the woman aside, murmured something in her ear, and then abruptly stated they were late and had to go, telling Nick to tell Gatsby they couldn't wait."}, {"front": "Why did Gatsby stay at St. Olaf college for only two weeks?", "back": "He was dismayed by its \"ferocious indifference to the drums of his destiny\" and despised the janitor's work he had to do."}, {"front": "What phrase did Nick use to describe the \"beauty\" Gatsby sought to serve?", "back": "\"a vast, vulgar, and meretricious beauty.\""}, {"front": "What was James Gatz's \"constant, turbulent riot\" referring to?", "back": "His imaginative life, filled with \"grotesque and fantastic conceits\" and a \"universe of ineffable gaudiness\" that served as an outlet for his dreams."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
