    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How does Nick Carraway describe his own approach to judging other people, and what advice from his father shaped this habit?", "back": "Nick describes himself as tolerant and reserving judgment, a habit cultivated from his father's advice that 'not everyone has had the same advantages.' He admits this tolerance has limits, especially after his experiences in the East."}, {"front": "What contrasts does Nick draw between his modest house at West Egg and the mansion belonging to his neighbor, Gatsby?", "back": "Nick's house is a 'small eyesore' renting for eighty dollars a month, squeezed between two enormous estates. Gatsby's mansion is a 'colossal affair,' a factual imitation of a Norman Hôtel de Ville with a tower, marble pool, and over forty acres, highlighting a vast economic gulf."}, {"front": "Describe Tom Buchanan as Nick presents him upon arriving at East Egg, emphasizing physical details and what they suggest about his character.", "back": "Tom is described as a 'sturdy straw-haired man of thirty' with 'two shining arrogant eyes' and a 'supercilious manner.' Nick emphasizes his physical bulk and 'enormous power,' suggesting dominance, aggression, and intimidation, calling his body 'cruel.'"}, {"front": "What effect does Daisy Buchanan's voice have on those who listen to her, based on Nick's description?", "back": "Nick describes Daisy's voice as 'low' and 'thrilling,' like an 'arrangement of notes' or a 'singing compulsion, a whispered `Listen,'‚' promising excitement. It creates an effect of intimacy and allure, drawing listeners in, though Nick later questions its sincerity."}, {"front": "Nick claims to 'reserve all judgments,' yet he immediately judges Gatsby, Tom, and Daisy. What does this contradiction reveal about him as a narrator?", "back": "This contradiction reveals Nick's potential unreliability or hypocrisy as a narrator. Despite his stated intention, his narrative is filled with subjective judgments, suggesting he's not as neutral or objective as he claims. Fitzgerald likely intends for readers to notice this gap."}, {"front": "How does Fitzgerald's descriptive technique, focusing on surfaces, possessions, and physicality, serve as indirect characterization of the Buchanans' world?", "back": "By detailing the Buchanan house and Tom's body, Fitzgerald indirectly characterizes their world as materialistic, superficial, and centered on outward appearances and physical power. It suggests a lack of deeper substance or emotional depth, emphasizing their wealth and dominance."}, {"front": "Who is Nick Carraway and what is his profession?", "back": "Nick Carraway is a Yale-educated bond salesman from the Midwest."}, {"front": "Where does Nick Carraway rent a house upon moving East?", "back": "He rents a small house in West Egg, Long Island."}, {"front": "Who is Nick's mysterious neighbor in West Egg?", "back": "His neighbor is the mysterious Jay Gatsby, who lives in a lavish mansion next door."}, {"front": "What is Daisy Buchanan's relationship to Nick Carraway?", "back": "Daisy Buchanan is Nick's second cousin."}, {"front": "Who is Tom Buchanan?", "back": "Tom Buchanan is Daisy's husband, a wealthy former football star."}, {"front": "In which town do Daisy and Tom Buchanan live?", "back": "They live in East Egg."}, {"front": "Who is Jordan Baker, as introduced in this section?", "back": "Jordan Baker is a languid professional golfer whom Nick meets at the Buchanans' house."}, {"front": "What distinction can be inferred about West Egg and East Egg based on the descriptions?", "back": "West Egg appears to be the home of 'new money' (Gatsby) and less established residents (Nick), while East Egg is associated with 'old money' and established wealth (Buchanans)."}, {"front": "Nick admits his tolerance has a limit. When does he suggest this limit was tested or reached?", "back": "He admits this tolerance has a limit 'particularly after his experiences in the East.'"}, {"front": "What does Gatsby's mansion being a 'factual imitation of a Norman Hôtel de Ville' signify?", "back": "It signifies that the mansion, though grand, is not an original or authentic architectural piece but rather a replica. This hints at Gatsby's own potentially artificial or constructed persona and the superficiality of wealth in the setting."}, {"front": "Nick describes Tom Buchanan as having a 'supercilious manner.' What does this imply about Tom's personality?", "back": "A 'supercilious manner' implies that Tom is arrogant and haughty, looking down on others, which aligns with Nick's description of his 'arrogant eyes' and 'cruel body.'"}, {"front": "While Daisy's voice is alluring, what does Nick later question about it?", "back": "Nick later questions the sincerity behind the 'performance' of her voice, suggesting her charm might be a facade."}, {"front": "What does the chapter title 'In My Younger and More Vulnerable Years' suggest about Nick's perspective as a narrator?", "back": "It suggests that Nick is narrating from a later point in time, looking back on his experiences. It implies he was more naive or susceptible to influence at the time, indicating a potential for retrospective judgment and change in his views."}, {"front": "What is the primary geographical distinction between West Egg and East Egg?", "back": "They are two adjacent, wealthy communities on Long Island, physically separated but socially distinct, typically representing 'new money' (West Egg) and 'old money' (East Egg)."}, {"front": "Based on Nick's initial description, what is known about Jay Gatsby before he is fully introduced?", "back": "Gatsby is known for his lavish mansion next door to Nick's, and he is described as 'mysterious,' suggesting an air of enigma and a lack of clear background."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
