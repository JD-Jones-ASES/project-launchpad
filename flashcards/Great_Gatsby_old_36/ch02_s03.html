    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Describe the physical characteristics of the 'valley of ashes.'", "back": "It is a desolate land between West Egg and New York, characterized by ashes growing like wheat into ridges and hills, forming grotesque gardens, houses, and even the appearance of crumbling men."}, {"front": "Who are the 'ash-gray men' and what do they represent?", "back": "They are workers in the valley of ashes, covered in industrial dust. They appear ghostly, dehumanized, and are symbolic of the working class obscured by the industrial waste of society."}, {"front": "What is Doctor T. J. Eckleburg?", "back": "A faded billboard advertisement for an oculist (eye doctor) featuring enormous blue, bespectacled eyes that 'brood' over the valley of ashes."}, {"front": "What symbolic role do the eyes of Doctor T. J. Eckleburg play in this section?", "back": "They act as a silent, god-like witness or a moral oversight in a desolate, morally ambiguous landscape. They also symbolize the commercialism and forgotten past of America."}, {"front": "How does Nick Carraway first meet Tom Buchanan's mistress?", "back": "Tom forcibly takes Nick off the train in the valley of ashes, insisting that Nick meet 'his girl' at George Wilson's garage."}, {"front": "Describe George B. Wilson and his business.", "back": "He is a blond, spiritless, anaemic, and faintly handsome man who owns a desolate garage in the valley of ashes, specializing in 'Repairs. Cars bought and sold.'"}, {"front": "Characterize Myrtle Wilson's initial appearance and demeanor upon meeting Nick.", "back": "She is in her middle thirties, faintly stout but carries her flesh sensuously, with a noticeable vitality. She walks through her husband as if he were a ghost and shakes Tom's hand looking him flush in the eye."}, {"front": "How does Myrtle Wilson treat her husband, George, in the garage?", "back": "She speaks to him in a soft, coarse voice, ordering him to 'Get some chairs,' and moves close to Tom, treating George dismissively as if he were invisible or insignificant."}, {"front": "What is Tom Buchanan's attitude toward George Wilson?", "back": "Tom is condescending and disrespectful, mocking Wilson's business and hinting that he might not sell him a car. He also openly flaunts his affair with Myrtle, believing Wilson is too 'dumb' to notice."}, {"front": "What does George Wilson believe about Myrtle's trips to New York?", "back": "He believes she goes to see her sister in New York, completely unaware of her affair with Tom."}, {"front": "List some items Myrtle Wilson purchases on her way to Tom's New York apartment.", "back": "A copy of TOWN TATTLE., a moving-picture magazine, cold cream, a small flask of perfume, and a dog (an Airedale, though she wanted a 'police dog')."}, {"front": "What does Myrtle's desire for a 'police dog' and her eventual purchase of an Airedale suggest about her aspirations?", "back": "It suggests her desire for a more prestigious, powerful image and a higher social status, moving beyond her current circumstances in the valley of ashes, even if her attempts are slightly off the mark."}, {"front": "Describe the apartment Tom and Myrtle share in New York.", "back": "It's a small top-floor apartment with a living-room, dining-room, bedroom, and bath. The living room is crowded with oversized, tapestried furniture (scenes of Versailles) that makes it difficult to move."}, {"front": "What does the oversized furniture in the apartment suggest about Myrtle's taste or aspirations?", "back": "It suggests an attempt to project an image of wealth and grandeur that is ill-fitting and perhaps superficial, not truly harmonious with the actual space she occupies."}, {"front": "Who are the guests Myrtle invites to the apartment party?", "back": "Her sister, Catherine, and the McKees (a photographer and his wife)."}, {"front": "Describe Catherine, Myrtle's sister.", "back": "A slender, worldly girl of about thirty, with a solid, sticky bob of red hair, a milky white powdered complexion, and plucked/redrawn eyebrows."}, {"front": "How does Myrtle's personality seem to transform once she is in New York and away from the valley of ashes?", "back": "She becomes more assertive, haughty, and commanding, taking on airs of sophistication and projecting a sense of regal entitlement, contrasting sharply with her constrained life in the valley."}, {"front": "What is Nick's experience at the party in the New York apartment?", "back": "He becomes increasingly drunk, causing things to seem 'dim' and 'hazy.' He observes the scene but also gets caught up in the casual, sometimes vulgar, atmosphere."}, {"front": "What is the significance of the 'TOWN TATTLE.' and other scandal magazines found in Myrtle's apartment?", "back": "They reflect Myrtle's interest in gossip, celebrity culture, and the superficial aspects of wealth and social climbing, reinforcing her aspirational but somewhat shallow desires."}, {"front": "Explain the contrast drawn between Fifth Avenue and the valley of ashes.", "back": "Fifth Avenue is described as 'warm and soft, almost pastoral,' representing the luxurious, comfortable world of the wealthy elite, directly opposite to the desolate, industrial decay of the valley of ashes."}, {"front": "What does Tom's insistence that Nick join him and Myrtle in New York reveal about Tom's character?", "back": "It highlights his arrogance, sense of entitlement, and disregard for others' feelings or privacy, as he forces Nick into an uncomfortable social situation out of his own desire for company and validation."}, {"front": "How does Nick feel about accompanying Tom and Myrtle to the apartment?", "back": "He is reluctant and uncomfortable, initially trying to leave them on Fifth Avenue, but Tom's persistence and Myrtle's urging eventually make him comply."}, {"front": "What does the phrase 'leaving her at a table, sauntered about, chatting with whomsoever he knew' reveal about Tom's attitude towards Myrtle in public?", "back": "It shows that Tom publicly acknowledges Myrtle as his mistress but still maintains a casual, somewhat detached air, asserting his social freedom while not fully integrating her into his accepted social circles."}, {"front": "How does the 'drawbridge' incident involving the train and the river contribute to the sense of the valley of ashes?", "back": "It forces a prolonged viewing of the 'dismal scene' upon passengers, emphasizing its inescapable bleakness and the inability to simply pass through it without acknowledging its presence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
