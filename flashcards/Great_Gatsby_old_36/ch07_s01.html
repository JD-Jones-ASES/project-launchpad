    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Fitzgerald's original title, 'Trimalchio in West Egg,' imply about Gatsby?", "back": "It compares Gatsby to Trimalchio, a fabulously wealthy, vulgar former slave from Roman literature, underscoring Gatsby's nouveau riche excess and lack of old-money sophistication."}, {"front": "Why does Gatsby stop throwing his lavish parties and replace his servants in Chapter 7?", "back": "He does so to conceal Daisy's regular visits to his mansion, protecting their affair from public scrutiny and gossip."}, {"front": "What pivotal event at the Buchanan's tense lunch reveals Daisy and Gatsby's affair to Tom?", "back": "Daisy's open admiration of Gatsby, despite her attempts at subtlety, makes their affair evident to Tom."}, {"front": "What is the significance of the 'hottest day of summer' in Chapter 7?", "back": "The oppressive heat serves as both an atmospheric device, creating a stifling sense of tension, and a symbol of the mounting pressure and impending emotional explosion among the characters."}, {"front": "Why does Tom insist on swapping cars with Gatsby on the way to New York?", "back": "It is a calculated gesture of dominance, asserting his control and challenging Gatsby's status and perceived ownership over Daisy."}, {"front": "Define 'peripeteia' and explain how it applies to Gatsby in Chapter 7.", "back": "Peripeteia is a sudden reversal of fortune in a drama. Gatsby's peripeteia occurs at the Plaza Hotel confrontation when his dream of Daisy leaving Tom for him collapses."}, {"front": "What is Gatsby's ultimate demand of Daisy during the Plaza Hotel confrontation?", "back": "Gatsby demands that Daisy tell Tom she never loved him, hoping to erase the past five years and reconstruct their reality as if Tom never existed."}, {"front": "How does Daisy respond to Gatsby's demand at the Plaza Hotel?", "back": "Daisy falters and admits that she loved both Tom and Gatsby, shattering Gatsby's illusion and his carefully constructed dream."}, {"front": "According to the analysis, what is the *fundamental* conflict between Gatsby and Tom, beyond Daisy?", "back": "The fundamental conflict is about class: Gatsby's self-invented 'new money' identity versus Tom's inherited 'old money' social position and established legitimacy."}, {"front": "How does Tom use his 'old money' status as a weapon against Gatsby at the Plaza Hotel?", "back": "He exposes Gatsby's bootlegging, his association with Wolfsheim, and his fraudulent respectability, highlighting the illegitimacy of Gatsby's wealth against his own inherited status."}, {"front": "What does 'libertine' mean, and how does Nick use it to describe Tom's hypocrisy?", "back": "A libertine is a person who is morally or sexually unrestrained. Nick notes Tom's 'transition from libertine to prig,' exposing Tom's hypocrisy in condemning Gatsby's affair while having his own."}, {"front": "What effect does Tom's exposure of Gatsby's background have on Daisy?", "back": "Daisy's courage disintegrates, as the reality of Gatsby's illicit dealings and their social implications become clear and undermine her commitment to him."}, {"front": "What 'calculated act of contempt' does Tom commit after the Plaza Hotel confrontation?", "back": "He sends Daisy home with Gatsby in Gatsby's car, demonstrating his confidence in having won and his disdain for Gatsby as a rival."}, {"front": "What tragic accident occurs on the return trip from New York, and who is driving?", "back": "Myrtle Wilson is struck and killed by Gatsby's yellow car; Nick later learns that Daisy was driving."}, {"front": "Why does Myrtle Wilson rush into the road toward Gatsby's car?", "back": "She believes the yellow car is Tom's, and she wants to confront him after their earlier argument in New York."}, {"front": "How do Tom and Daisy demonstrate 'carelessness' after Myrtle's death?", "back": "Daisy, who was driving, retreats into the safety of Tom's house, and Tom directs Wilson's suspicion away from himself and toward the yellow car. Neither bears any personal consequence for their actions."}, {"front": "What is a 'caravansary,' and how does Nick use it metaphorically to describe Gatsby's house?", "back": "A caravansary is an inn surrounding a courtyard, used by travelers. Nick uses it to describe Gatsby's house as a place of transient, anonymous visitors that has now 'fallen in like a card house,' signifying its emptiness."}, {"front": "What is Gatsby doing at the end of Chapter 7, and what dramatic irony does Nick observe?", "back": "Gatsby stands vigil outside the Buchanans' house, watching over Daisy. Nick, however, sees Tom and Daisy 'conspiring together' inside, revealing Gatsby is 'watching over nothing'—a dream already abandoned."}, {"front": "How does Tom's 'magnanimous scorn' towards Gatsby after the confrontation reveal his character?", "back": "It is a performative display of condescension from the 'winner,' showing Tom's arrogance and false sense of generosity rather than genuine forgiveness or respect for Gatsby."}, {"front": "What does Nick mean by Gatsby 'watching over nothing' at the end of the chapter?", "back": "It signifies that Gatsby is guarding a dream (Daisy's love and loyalty) that has already been abandoned by Daisy, who has reconciled with Tom and chosen her established life."}, {"front": "What does 'portentous' mean, and how is it used in Chapter 7?", "back": "'Portentous' means of great significance; ominous. It is used to describe Mendelssohn's Wedding March and the road ahead of Nick at thirty, signaling impending doom or significant, unsettling events."}, {"front": "How does Fitzgerald use Tom as a foil to Gatsby in Chapter 7?", "back": "Both are morally compromised, but Tom's inherited 'old money' provides a shield of respectability that Gatsby's 'new money' bootlegging wealth lacks, highlighting the distinction between their class positions and societal acceptance."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
