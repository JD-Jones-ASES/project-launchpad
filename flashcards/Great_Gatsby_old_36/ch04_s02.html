    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Great_Gatsby_old_36 &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Great_Gatsby_old_36.html">&larr; Back to Great_Gatsby_old_36</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What does Nick's catalog of Gatsby's party guests primarily reveal about their nature and their connection to Gatsby?", "back": "It reveals they are a diverse cross-section of wealthy, shady, and reckless individuals, drawn by Gatsby's hospitality but lacking genuine connection or care for him personally."}, {"front": "What patterns do Nick notice in the names and fates of Gatsby's party guests?", "back": "Many guests come to dark or violent ends (imprisonment, suicide, murder), and the names suggest ethnic diversity and 'new money' figures like film producers, gamblers, and promoters."}, {"front": "What specific claims does Gatsby make about his family background during his drive with Nick to New York?", "back": "Gatsby claims he is the son of wealthy Midwesterners (now deceased) and that his family had a tradition of attending Oxford."}, {"front": "What does Gatsby claim about his life after inheriting his fortune?", "back": "He claims he lived 'like a young rajah,' collecting jewels, hunting big game, and traveling extensively in the capitals of Europe."}, {"front": "What claims does Gatsby make regarding his war service?", "back": "He claims distinguished service in the Argonne Forest, earning decorations for valor from every Allied government, including Montenegro."}, {"front": "What specific detail first triggers Nick's doubt about Gatsby's autobiographical claims?", "back": "Gatsby states he is from 'San Francisco' when asked what part of the Middle West he is from, a geographical error that undermines his story."}, {"front": "What other aspect of Gatsby's narrative triggers Nick's skepticism, related to his education?", "back": "Gatsby 'swallowed' or 'hurried' the phrase 'educated at Oxford,' making it sound like a claim he had rehearsed or that bothered him."}, {"front": "What two pieces of physical evidence does Gatsby produce to support his life story?", "back": "He produces the Order of Danilo medal from Montenegro and an Oxford photograph showing him among other young men with cricket bats and spires."}, {"front": "How does Nick initially react to Gatsby's elaborate life story?", "back": "Nick initially suspects Gatsby's story is fabricated, comparing it to a 'turbaned 'character' leaking sawdust.'"}, {"front": "How does Nick's reaction shift dramatically after seeing Gatsby's physical evidence?", "back": "His skepticism collapses, and he becomes credulous, believing 'Then it was all true' and imagining a romanticized, adventurous past for Gatsby."}, {"front": "What is Fitzgerald's purpose in showing Nick's dramatic shift from skepticism to belief based on Gatsby's physical evidence?", "back": "It demonstrates how easily material proof, even if limited, can override rational doubt and appeal to romantic imagination."}, {"front": "Describe Meyer Wolfshiem's most striking physical features as Nick observes him.", "back": "Wolfshiem is described as 'a small, flat-nosed Jew' with 'two fine growths of hair' in his nostrils and 'tiny eyes.'"}, {"front": "What infamous historical event is Meyer Wolfshiem known for being involved in?", "back": "He is known as the man who fixed the 1919 World Series."}, {"front": "What macabre detail about Wolfshiem's accessories does Nick emphasize, suggesting a sinister nature?", "back": "His cuff buttons are made of 'human molars.'"}, {"front": "What is significant about Wolfshiem's speech and behavior during lunch with Nick and Gatsby?", "back": "His speech includes dialect ('gonnegtion,' 'Oggsford'), and he transitions abruptly from a sentimental story about Rosy Rosenthal's murder to asking about a 'business gonnegtion.'"}, {"front": "What does the juxtaposition of Wolfshiem's sentimentality about violence and his immediate shift to business reveal about Gatsby's world?", "back": "It reveals a world where violence and crime are normalized, interwoven with business, and suggests Gatsby's wealth likely stems from illicit activities."}, {"front": "Why does Fitzgerald have Gatsby's autobiographical narrative sound so formulaic, like 'skimming hastily through a dozen magazines'?", "back": "It suggests Gatsby has constructed his identity not from genuine experience but by piecing together clichés and romanticized tropes of wealth and adventure, creating a superficial persona."}, {"front": "What does Gatsby's formulaic life story reveal about how he has constructed his identity?", "back": "It shows his identity is a carefully fabricated persona, built on conventional patterns and an imagined aristocratic past rather than an authentic personal history."}, {"front": "What do Wolfshiem's details—his macabre accessories, sentimental violence, and abrupt business focus—suggest about his character and the world he inhabits?", "back": "They suggest a man deeply immersed in the criminal underworld, combining a surface gentility with an underlying menace and a disregard for conventional morality."}, {"front": "How does the lunch with Meyer Wolfshiem complicate the reader's understanding of Gatsby's wealth?", "back": "It explicitly links Gatsby to criminal connections and illicit enterprises, revealing that his 'new money' is likely derived from illegal activities rather than legitimate business or inheritance."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
