    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 28, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Gambler's Fallacy?", "back": "The belief that past outcomes in a random, independent process influence future outcomes, making a particular outcome 'due' after a streak of another."}, {"front": "What famous historical incident is often cited to illustrate the Gambler's Fallacy?", "back": "The Monte Carlo Casino incident of 1913, where a roulette wheel landed on black 26 times in a row, causing gamblers betting on red to lose millions."}, {"front": "How does a roulette wheel demonstrate the independence of events?", "back": "Each spin of a fair roulette wheel is independent; past outcomes do not affect the probability of future outcomes, meaning the wheel has no memory."}, {"front": "Explain the Law of Large Numbers.", "back": "In a long sequence of fair, independent events, the proportion of specific outcomes (e.g., heads in coin flips) will approach its theoretical probability (e.g., 50%)."}, {"front": "How does the Gambler's Fallacy confuse the Law of Large Numbers?", "back": "The fallacy incorrectly believes the law works by 'correcting' past outcomes to restore balance, while the law actually works by 'diluting' initial imbalances over a large number of subsequent independent events."}, {"front": "How does the Law of Large Numbers 'dilute' an imbalance like 100 consecutive heads?", "back": "It doesn't correct past outcomes directly. Instead, it adds many more approximately 50/50 outcomes, making the initial streak's proportion negligibly small in the long run."}, {"front": "What is the 'Hot Hand' belief?", "back": "The belief that a streak of successful outcomes (e.g., a basketball player making several shots) increases the probability of subsequent successful outcomes."}, {"front": "Who initially identified the Hot Hand as a fallacy in 1985?", "back": "Gilovich, Vallone, and Tversky, who concluded it was an illusion based on analyzing basketball shooting data."}, {"front": "What surprising turn occurred in the Hot Hand research in 2018?", "back": "Economists Miller and Sanjurjo identified a statistical bias in the original analysis, and after correcting for it, found evidence of a small but real hot-hand effect in some athletic contexts."}, {"front": "What was the 'subtle statistical bias' discovered by Miller and Sanjurjo in the original Hot Hand analysis?", "back": "A mathematical bias that pushed the measured success rate downward when selecting sequences following a streak of hits, making a genuine hot-hand effect appear smaller or even invisible."}, {"front": "For what types of processes is the Hot Hand likely real, and for which is it not?", "back": "It is likely real, to a modest degree, in some athletic contexts (where skill, confidence, and other factors introduce dependencies), but not for purely random processes like roulette or coin flips."}, {"front": "Compare the Gambler's Fallacy and the Hot Hand in terms of misunderstanding randomness.", "back": "The Gambler's Fallacy assumes random processes are self-correcting (opposite outcomes more likely), while the Hot Hand (in its strong form) assumes streaks are self-reinforcing (similar outcomes more likely)."}, {"front": "What is the key question to ask when evaluating if a streak matters or if an outcome is 'due'?", "back": "Are the events truly independent?"}, {"front": "Give an example of a real-world financial decision where the Gambler's Fallacy might occur.", "back": "An investor believing a stock is 'due for a correction' after a long rise or 'due for a rebound' after a long fall, assuming its price movements are independent."}, {"front": "Why might basketball shots not be truly independent events, unlike coin flips?", "back": "A player's confidence, fatigue, defensive attention, and shot selection can change during a streak, introducing genuine dependencies that affect subsequent shot probabilities."}, {"front": "What is the overarching lesson from studying both the Gambler's Fallacy and the Hot Hand?", "back": "Both errors stem from a failure to accurately assess whether successive events are truly independent."}, {"front": "How does the Gambler's Fallacy affect lottery players?", "back": "Lottery players often avoid numbers that have recently won, believing they are less likely to win again, which is a manifestation of the fallacy and provides no actual advantage."}, {"front": "If a hot-hand effect genuinely exists in sports, what are its practical implications for strategy?", "back": "Feeding the ball to a 'hot' player might be marginally better than distributing shots evenly, though the effect is usually small enough that other factors (defensive adjustments, shot quality) often matter more."}, {"front": "What cognitive bias might cause vivid streaks to stick in memory and distort our sense of their frequency?", "back": "The Availability Heuristic."}, {"front": "What is the primary cause of both the Gambler's Fallacy and the strong belief in the Hot Hand?", "back": "A fundamental misunderstanding or misjudgment of the independence of probabilistic events."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
