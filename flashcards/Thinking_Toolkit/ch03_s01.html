<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the general meaning of the idiom \"getting your ducks in a row\"?", "back": "It means organizing everything and preparing thoroughly before starting something."}, {"front": "According to the text, what are the two main ways people engage in \"getting their ducks in a row\"?", "back": "It can be either genuine preparation (professional competence) or a sophisticated form of procrastination (illusion of progress without risk)."}, {"front": "Give an example from the text where \"getting your ducks in a row\" represents genuine, professional competence.", "back": "A pilot performing a preflight checklist before takeoff, a surgeon reviewing imaging before an incision, or an event planner confirming logistics."}, {"front": "Give an example from the text where \"getting your ducks in a row\" is a sophisticated form of procrastination.", "back": "An entrepreneur perfecting a business plan for six months without talking to customers, or a writer reorganizing notes for the third time instead of writing."}, {"front": "What is the primary psychological reason \"duck-arranging\" is so seductive?", "back": "It provides the feeling of control over an uncertain situation, which is a common human response to discomfort."}, {"front": "Explain the \"illusion of control\" in the context of procrastination.", "back": "It's the sensation of control gained through organizing activities (e.g., spreadsheets, filing systems, researching tools) that makes one feel busy and productive, but doesn't lead to actual forward progress or action."}, {"front": "What is the \"telltale sign\" that preparation has become procrastination?", "back": "The asymptote: preparation never quite reaches the point of feeling ready, with always one more thing to arrange, making the preparation an end in itself."}, {"front": "What principle is presented as the counterpoint to excessive \"duck-arranging\"?", "back": "The \"Ready, Fire, Aim\" principle."}, {"front": "Describe the \"Ready, Fire, Aim\" principle.", "back": "It means taking action (fire) first—launching a prototype, making a call, or writing a draft—and then learning and adjusting (aim) based on what is discovered."}, {"front": "In what kind of environments is \"Ready, Fire, Aim\" particularly effective?", "back": "In uncertain environments where learning more from doing is more valuable than endless planning."}, {"front": "What is the critical skill mentioned for effective action?", "back": "Distinguishing between situations that demand genuine preparation and situations where preparation is a form of avoidance."}, {"front": "What kind of situations typically demand genuine preparation?", "back": "Situations involving serious consequences for failure and well-understood procedures for reducing risk, such as surgery, aviation, or structural engineering."}, {"front": "What kind of situations are often susceptible to preparation as avoidance?", "back": "Situations involving uncertainty that no amount of preparation can eliminate, and which can only be resolved by action (e.g., launching a side project, writing a first draft, asking for a raise)."}, {"front": "What is the \"good enough threshold\" framework?", "back": "It's a framework for determining the point at which additional preparation produces diminishing returns, helping decide when to stop preparing and start acting."}, {"front": "What question should you ask yourself to apply the \"good enough threshold\"?", "back": "\"If I spent one more week preparing, would I be meaningfully more ready, or would I just be marginally more comfortable?\""}, {"front": "According to the \"good enough threshold,\" when should you continue preparing?", "back": "If the answer is \"meaningfully more ready,\" meaning there's a specific, concrete thing you need to learn or arrange before starting."}, {"front": "According to the \"good enough threshold,\" when are your \"ducks in a row enough\" and you should start?", "back": "If the answer is \"marginally more comfortable,\" meaning preparation is reducing anxiety without truly improving readiness."}, {"front": "How does the lean startup methodology exemplify the \"Ready, Fire, Aim\" principle?", "back": "It advocates building a Minimum Viable Product (MVP), getting it in front of real users, learning from their reactions, and iterating, rather than perfecting a business plan in isolation."}, {"front": "In writing, what is often the hardest part, and how should one approach it to avoid procrastination?", "back": "The hardest part is the first draft. One should produce even \"bad prose\" knowing revision will improve it, because a bad first draft is infinitely better than a perfect outline never written."}, {"front": "How do the ancient Stoics' ideas relate to personal decisions and \"getting your ducks in a row\"?", "back": "They distinguished between things \"up to us\" (our choices and actions) and things \"not up to us\" (outcomes and other people's reactions). Preparing for things \"not up to us\" is an exercise in futility."}, {"front": "What is the main idea conveyed by the \"Preparation vs. the Illusion of Control\" key concept?", "back": "\"Getting your ducks in a row\" can be genuine preparation or sophisticated procrastination; the test is whether it makes you meaningfully more ready or just more comfortable. In uncertain situations, information is often gained by starting, not just planning."}, {"front": "Name one concept from other chapters that the text connects to \"getting your ducks in a row.\"", "back": "Status Quo Bias, The Planning Fallacy, or Eat the Frog."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
