    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core principle of the 'Eat the Frog' concept?", "back": "The core principle is to tackle your most dreaded or difficult task (the 'frog') first thing in the morning. By doing so, you ensure the worst is behind you, and the rest of your day feels easier by comparison."}, {"front": "In the 'Eat the Frog' methodology, what exactly does 'the frog' represent?", "back": "The 'frog' represents the task you are most dreading. It's often the most important task that, if left undone, will cause anxiety, drain energy, and hang over your day."}, {"front": "What negative effects can result from *not* 'eating the frog' and leaving a dreaded task undone?", "back": "If a 'frog' is left undone, it will hang over the rest of your day like a cloud, draining energy, creating anxiety, and providing an excellent excuse to do anything else."}, {"front": "According to procrastination researchers, what is the primary psychological driver behind avoiding difficult tasks?", "back": "The primary driver is usually an excess of emotional avoidance, not laziness. The dreaded task provokes anxiety, discomfort, or fear of failure, leading the brain to seek immediate satisfaction elsewhere."}, {"front": "How do procrastinators typically spend their time, despite avoiding their 'frogs'?", "back": "Procrastinators are often highly productive; they simply redirect their energy toward less important but more comfortable activities, giving a false sense of accomplishment while the 'frog' remains untouched."}, {"front": "How does the 'eat the frog' heuristic effectively short-circuit the emotional avoidance loop of procrastination?", "back": "It short-circuits the loop by committing to do the dreaded task first, before willpower is depleted by smaller decisions and before comfortable alternatives have time to seduce you, utilizing peak morning energy."}, {"front": "Why is the morning often considered the optimal time to 'eat the frog'?", "back": "The morning is optimal because most people's self-discipline and mental energy are at their peak then, allowing them to apply their 'fullest charge' to the most challenging task."}, {"front": "What psychological concept supports the idea that willpower is a limited resource, consistent with the 'eat the frog' strategy?", "back": "Ego depletion, which posits that self-control draws on a limited pool of mental energy that is depleted by use throughout the day."}, {"front": "If willpower is like a battery, what is the clear implication for task prioritization?", "back": "The implication is to use the fullest charge of your willpower battery on the hardest, most important task first. Less demanding tasks can be handled when your energy is lower."}, {"front": "What kinds of tasks can typically be performed effectively even when one's willpower or 'mental battery' is running low?", "back": "Routine emails, triaging low-priority requests, and small talk are examples of tasks that can often be accomplished even with depleted mental energy."}, {"front": "What is a key limitation of the 'eat the frog' heuristic for individuals who are not 'morning people'?", "back": "For individuals who are not morning people, whose peak energy is in the afternoon or evening, the principle should be reinterpreted as 'eat the frog at your peak energy time,' not necessarily first thing in the morning."}, {"front": "How should one approach a 'frog' that is too large to be completed in a single morning session (e.g., a multi-month project)?", "back": "For very large 'frogs,' the strategy is to 'eat a piece of the frog' each day. This means making meaningful progress on the hardest task before turning to easier ones, consistently over time."}, {"front": "Is building momentum with a 'small win' early in the day considered a contradiction to the 'eat the frog' principle?", "back": "No, it's considered a legitimate alternative strategy. It's a different path to the same goal of overcoming inertia, where a small success can sometimes make facing the larger 'frog' easier later on."}, {"front": "Beyond suffering, what is the strategic purpose of 'eating the frog'?", "back": "The strategic purpose is the allocation of a finite resource—your willpower. It's about ensuring your most critical tasks receive your highest mental energy and focus."}, {"front": "Provide an example of 'eating the frog' in an academic context.", "back": "Students who begin their study sessions with their hardest subject consistently outperform those who 'warm up' with easier material, as the 'warm-up' often expands to fill available time, leaving the hard subject untouched."}, {"front": "How can the 'eat the frog' principle be applied in a professional setting?", "back": "A manager might start their day by addressing the most difficult personnel issue, contentious client problem, or overdue deliverable. This leads to a smoother day both practically (problem handled) and psychologically (cloud lifted)."}, {"front": "What is a common 'frog' in personal finance, and what is its typical outcome?", "back": "A common financial 'frog' is reviewing spending and creating a budget. While dreaded, most people report the anticipation was worse than the reality, and the peace of mind afterward was worth the discomfort."}, {"front": "Which other productivity framework is mentioned as being connected to distinguishing important tasks from urgent ones?", "back": "The Eisenhower Matrix (or Urgent/Important Matrix)."}, {"front": "What cognitive bias helps explain why we often underestimate how long our 'frogs' will take to complete?", "back": "The Planning Fallacy, which describes our tendency to underestimate the time, costs, and risks of future actions and overestimate the benefits."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
