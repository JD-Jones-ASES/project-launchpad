<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who discovered sensitive dependence on initial conditions, leading to the concept of the Butterfly Effect?", "back": "Edward Lorenz, a meteorologist at MIT, in 1963.", "id": "fc01"}, {"front": "What specific incident led Edward Lorenz to discover sensitive dependence on initial conditions?", "back": "He restarted a weather simulation using rounded numbers from a printout (three decimal places instead of the computer's six), causing the weather patterns to diverge completely.", "id": "fc02"}, {"front": "What is the core definition of 'sensitive dependence on initial conditions'?", "back": "In chaotic systems, tiny differences in starting conditions amplify exponentially over time, producing dramatically different outcomes.", "id": "fc03"}, {"front": "Explain the origin of the 'butterfly' image in the 'Butterfly Effect'.", "back": "It comes from the title of a 1972 talk by Lorenz: 'Does the Flap of a Butterfly's Wings in Brazil Set Off a Tornado in Texas?'", "id": "fc04"}, {"front": "Is chaos, in the mathematical sense, a form of randomness?", "back": "No. Mathematical chaos is fully deterministic; every state follows inevitably from the previous state according to fixed rules.", "id": "fc05"}, {"front": "If chaotic systems are deterministic, why is long-term prediction impossible in practice?", "back": "The system amplifies small differences so rapidly that predicting outcomes over time would require knowing the initial state with essentially infinite precision.", "id": "fc06"}, {"front": "How do differences evolve in systems exhibiting sensitive dependence on initial conditions?", "back": "Differences do not merely accumulate gradually; they amplify exponentially over time.", "id": "fc07"}, {"front": "What are the practical limits for reliable weather forecasting due to the Butterfly Effect?", "back": "Weather can be forecast reasonably well for about ten days, beyond which specific prediction becomes impossible.", "id": "fc08"}, {"front": "In the context of predictability, what is the key difference between 'weather' and 'climate'?", "back": "Weather refers to specific conditions on a specific day, which are unpredictable long-term. Climate refers to long-term statistical patterns, which are predictable.", "id": "fc09"}, {"front": "Name three areas outside meteorology where sensitive dependence on initial conditions is observed.", "back": "Financial markets, ecosystems, social movements, and political events.", "id": "fc10"}, {"front": "How does the magnitude of a cause relate to its effect in systems exhibiting the Butterfly Effect?", "back": "The magnitude of the cause bears no reliable relationship to the magnitude of the effect; tiny causes can have vast impacts.", "id": "fc11"}, {"front": "Given the inherent unpredictability of some systems, how should planning be adjusted?", "back": "Plans should be robust to surprise, designed to perform reasonably well across a range of scenarios, rather than betting on one specific forecast.", "id": "fc12"}, {"front": "What is Edward Lorenz widely regarded as the 'father' of?", "back": "Chaos theory.", "id": "fc13"}, {"front": "What is the 'Lorenz attractor' known for?", "back": "It is a butterfly-shaped pattern traced by Lorenz's equations in three-dimensional space, an icon of chaos theory.", "id": "fc14"}, {"front": "Provide a historical real-world example of the Butterfly Effect mentioned in the text.", "back": "The assassination of Archduke Franz Ferdinand in 1914, which triggered World War I and had vast consequences.", "id": "fc15"}, {"front": "In the case of Archduke Franz Ferdinand's assassination, what 'tiny difference' is identified as a 'butterfly's wing'?", "back": "The Archduke's driver taking a wrong turn, accidentally stopping in front of Gavrilo Princip.", "id": "fc16"}, {"front": "What broader historical consequences are attributed to the Franz Ferdinand assassination, illustrating the Butterfly Effect?", "back": "It triggered World War I, the collapse of four empires, the Russian Revolution, and the conditions that led to World War II.", "id": "fc17"}, {"front": "What concept describes low-probability, high-impact events that are difficult to predict?", "back": "The Black Swan (as mentioned in 'connections').", "id": "fc18"}, {"front": "What cognitive bias causes us to underestimate the uncertainty in our forecasts?", "back": "The Planning Fallacy (as mentioned in 'connections').", "id": "fc19"}, {"front": "What general mechanism is identified as making the Butterfly Effect possible?", "back": "Feedback loops, which are amplification mechanisms (as mentioned in 'connections').", "id": "fc20"}, {"front": "Does the Butterfly Effect imply that a butterfly's power can directly cause a tornado?", "back": "No, it implies that the atmosphere amplifies tiny perturbations through cascading interactions, not that the butterfly itself is powerful enough to cause a tornado.", "id": "fc21"}, {"front": "What is the profound implication of the Butterfly Effect for scientific understanding?", "back": "It tells us that some systems are inherently unpredictable beyond a certain time horizon, regardless of model quality or computational power.", "id": "fc22"}, {"front": "What level of precision would theoretically be needed to predict the weather perfectly for a month?", "back": "Essentially infinite precision in knowing the current state of the atmosphere.", "id": "fc23"}, {"front": "Why is the Butterfly Effect not about randomness?", "back": "It's about the limits of prediction in complex, interconnected deterministic systems, not about events occurring without cause or pattern.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
