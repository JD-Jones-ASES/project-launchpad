    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 25, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

        </div>

    <script>
    var CARDS = [{"front": "What is another common name for the Unexpected Hanging Paradox?", "back": "The Surprise Examination Paradox."}, {"front": "When did the Unexpected Hanging Paradox first appear in print?", "back": "In the 1940s–1950s."}, {"front": "Who popularized the Unexpected Hanging Paradox in his Scientific American column?", "back": "Martin Gardner."}, {"front": "What was the judge's exact sentence to the prisoner in the paradox?", "back": "“You will be hanged one day next week, but the day of the hanging will be a surprise. You will not be able to deduce, the evening before, that the hanging will occur the following day.”"}, {"front": "How does the prisoner's reasoning lead him to eliminate Friday as a possible hanging day?", "back": "He reasons that if he hasn't been hanged by Thursday evening, Friday would be the only day left. He would then know the hanging was on Friday, which would mean it wouldn't be a surprise, contradicting the judge's condition."}, {"front": "After eliminating Friday, how does the prisoner use backward reasoning to eliminate Thursday?", "back": "Since Friday is already eliminated, if he hasn't been hanged by Wednesday evening, Thursday becomes the last remaining day. He would know this on Wednesday night, making it not a surprise, thus eliminating Thursday."}, {"front": "What is the prisoner's ultimate conclusion based on his backward elimination reasoning?", "back": "He concludes that the hanging cannot happen at all because every day of the week can be eliminated, rendering the judge's sentence self-contradictory."}, {"front": "What actually happens to the prisoner, and what is his reaction?", "back": "The executioner arrives on Wednesday morning, and the prisoner is genuinely surprised."}, {"front": "Why is the Unexpected Hanging Paradox considered 'maddening'?", "back": "Because the prisoner's reasoning seems logically valid at each step, yet the conclusion is demonstrably false as the sentence can be carried out, making it difficult to identify the flaw."}, {"front": "Describe the 'knowledge problem' explanation for what went wrong in the paradox.", "back": "The prisoner's argument assumes he can know with certainty which days remain possible. But his reasoning is self-undermining: if his argument proves the hanging cannot happen, then he cannot know it will happen on any day, which means it *can* be a surprise after all. The argument 'saws off the branch it sits on.'"}, {"front": "How does the Unexpected Hanging Paradox involve 'self-reference'?", "back": "The judge's sentence refers to the prisoner's own state of knowledge, which in turn depends on the sentence. This creates a feedback loop where reasoning about the system includes one's own reasoning as a component."}, {"front": "Which other famous paradox is the Unexpected Hanging Paradox compared to due to its self-referential nature?", "back": "The Liar Paradox."}, {"front": "What does the 'gap between logic and experience' explanation suggest about the paradox?", "back": "It suggests that the paradox reveals a genuine difference between what can be logically deduced in a narrow formal sense and what can be known by actual experience in the real world."}, {"front": "What does the Unexpected Hanging Paradox demonstrate about reasoning about one's own future knowledge?", "back": "It shows that reasoning about one's own future knowledge can be treacherous and lead to self-defeating conclusions."}, {"front": "How can the prisoner's backward elimination reasoning be characterized in terms of its validity?", "back": "It is locally valid at each step but globally self-defeating. The conclusion that the hanging cannot happen is precisely what makes it surprising when it does happen."}, {"front": "What three areas of study does the Unexpected Hanging Paradox sit at the intersection of?", "back": "Logic, epistemology (the theory of knowledge), and self-reference."}, {"front": "In the 'surprise quiz' analogy, if a student uses the prisoner's reasoning and the professor gives the quiz on Tuesday, was it a surprise?", "back": "Yes, it would be a surprise. The student's reasoning, if consistently applied, would lead them to conclude that no surprise quiz could occur, thus making its actual occurrence surprising."}, {"front": "What is the flaw in the student's reasoning in the 'surprise quiz' scenario?", "back": "The flaw is identical to the prisoner's: the student's deduction that a surprise quiz is impossible removes the very knowledge that would make it predictable, thereby allowing it to be a surprise when it happens."}, {"front": "How does Hofstadter's Law relate to the Unexpected Hanging Paradox?", "back": "Both touch upon recursive self-reference, though Hofstadter's Law specifically deals with underestimating the time needed for tasks, often due to unforeseen complexities in self-referential systems."}, {"front": "What do Gödel's Incompleteness Theorems share in common with the Unexpected Hanging Paradox?", "back": "Both explore the profound limitations that arise when formal systems or reasoning processes attempt to reason about themselves or include their own reasoning as a component."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
