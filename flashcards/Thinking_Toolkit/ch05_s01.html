    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define the 'anchoring effect'.", "back": "The cognitive bias where the first number or piece of information encountered becomes a reference point (an anchor) that pulls subsequent judgments toward it, even if the anchor is arbitrary, irrelevant, or known to be meaningless.", "id": "fc01"}, {"front": "Who experimentally demonstrated the anchoring effect, and in what year?", "back": "Amos Tversky and Daniel Kahneman in 1974, as part of their research on heuristics and biases.", "id": "fc02"}, {"front": "Describe the core experimental setup Tversky and Kahneman used to illustrate anchoring.", "back": "Participants were first asked if the percentage of African countries in the UN was greater or less than an arbitrary number (generated by a visibly random wheel of fortune), then asked for their best estimate of the actual percentage.", "id": "fc03"}, {"front": "In Tversky and Kahneman's 1974 study, what was the average estimate for African UN membership when the random anchor was 65%?", "back": "Participants gave an average estimate of 45%.", "id": "fc04"}, {"front": "How did the average estimate change when the anchor was 10% instead of 65% in the Tversky and Kahneman study?", "back": "An anchor of 10% resulted in an average estimate of 25%, a 20-percentage point difference compared to the 65% anchor.", "id": "fc05"}, {"front": "Is the anchoring effect robust or easily overcome?", "back": "It is astonishingly robust, replicated hundreds of times across cultures, professions (experts and novices), and domains.", "id": "fc06"}, {"front": "Explain the 'insufficient adjustment' mechanism as a reason why anchoring works.", "back": "Individuals start from the anchor and adjust away from it, but they typically do not adjust far enough, stopping too soon.", "id": "fc07"}, {"front": "Explain the 'selective accessibility' mechanism as a reason why anchoring works.", "back": "The anchor activates information in memory that is consistent with it, making the anchor feel more plausible or relevant than it actually is (e.g., retrieving reasons why a high number might be accurate).", "id": "fc08"}, {"front": "How does anchoring affect real estate appraisals?", "back": "Real estate agents shown a high listing price appraise a house higher than agents shown the same house with a low listing price, even if they deny being influenced by it.", "id": "fc09"}, {"front": "Provide an example of anchoring's influence in a legal context.", "back": "Judges given a high sentencing suggestion tend to hand down longer sentences than judges given a low suggestion for the same case.", "id": "fc10"}, {"front": "What is a key practical implication of anchoring in negotiations?", "back": "The first number on the table exerts a gravitational pull on the final outcome. Experienced negotiators fight to make the opening offer to set a favorable anchor.", "id": "fc11"}, {"front": "How do retailers commonly exploit anchoring to influence purchasing decisions?", "back": "By displaying a higher 'original price' (anchor) crossed out next to a 'sale price,' making the sale price seem like a greater bargain by comparison, regardless of the item's actual value.", "id": "fc12"}, {"front": "How can anchoring impact salary negotiations for a job candidate?", "back": "Job candidates who name a high salary expectation early in the negotiation process tend to receive higher final offers, as their initial number anchors the employer's subsequent counteroffers.", "id": "fc13"}, {"front": "Give an example of anchoring in the context of charitable giving.", "back": "Donation forms suggesting higher amounts ($250, $500) lead to larger average donations than forms suggesting lower amounts ($10, $25), as the suggested amounts anchor the donor's sense of a 'normal' contribution.", "id": "fc14"}, {"front": "What question should one ask to help counteract the anchoring effect before reacting to a given number?", "back": "Ask yourself: 'Would I have come up with this number independently?'", "id": "fc15"}, {"front": "What makes the influence of an anchor particularly surprising?", "back": "Its power persists even when the anchor is arbitrary, irrelevant, or known to be meaningless (like a number from a wheel of fortune).", "id": "fc16"}, {"front": "How does an anchor redefine what feels 'reasonable'?", "back": "By establishing a high or low reference point, an anchor can make subsequent higher or lower numbers seem more acceptable or legitimate in comparison.", "id": "fc17"}, {"front": "The text mentions 'Loss Aversion' as a related concept. How do anchoring and loss aversion both relate to 'reference points'?", "back": "Both anchoring and loss aversion highlight how a specific reference point (an anchor in the case of anchoring, or the current state/expectation in loss aversion) profoundly shapes our evaluation of value, gains, and losses.", "id": "fc18"}, {"front": "What is the relationship between Anchoring and the 'Status Quo Bias'?", "back": "The text suggests that similar to how an anchor pulls judgments, the current state (status quo) can serve as a powerful anchor, biasing decisions towards maintaining the existing situation.", "id": "fc19"}, {"front": "Why is it strategic to make the first offer in a negotiation, according to the principles of anchoring?", "back": "Making the first offer allows you to set the initial anchor, which exerts a gravitational pull on all subsequent counteroffers and the final agreement, effectively shaping the entire conversation.", "id": "fc20"}, {"front": "Does anchoring only affect novices, or does it also influence experts?", "back": "The effect is robust and works on experts as well as novices, as shown with real estate agents and judges.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
