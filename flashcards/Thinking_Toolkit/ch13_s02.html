<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 13, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the \"brain in a vat\" (BIV) thought experiment?", "back": "It posits that a brain, removed from a body and kept alive in a vat, could be fed electrical signals by a powerful computer, perfectly simulating a complete reality indistinguishable from genuine experience."}, {"front": "Who first introduced the \"evil demon\" hypothesis, and who updated it to the \"brain in a vat\"?", "back": "René Descartes introduced the \"evil demon\" (1641), and Hilary Putnam updated it to the \"brain in a vat\" (1981)."}, {"front": "Why is it impossible for a brain in a vat to determine, from \"the inside,\" if its experiences are real or simulated?", "back": "Because any test or observation it might devise (e.g., pinching itself, consulting a friend) would itself be part of the computer's simulation, designed to confirm the illusion."}, {"front": "What was René Descartes's primary goal in his Meditations on First Philosophy?", "back": "To discover if anything could be known with absolute certainty, by subjecting all beliefs to systematic doubt."}, {"front": "Describe Descartes's \"evil demon\" hypothesis.", "back": "Descartes imagined an all-powerful, cunning evil demon devoted to deceiving him, making him believe in an entirely illusory world—complete with a body, sky, and earth—when none of it truly exists."}, {"front": "What famous conclusion did Descartes reach that even the evil demon could not make him doubt?", "back": "\"I think, therefore I am\" (Cogito ergo sum)."}, {"front": "What does \"Cogito ergo sum\" mean, and what single point of certainty does it establish for Descartes?", "back": "It means \"I think, therefore I am.\" It establishes the undeniable certainty of one's own existence as a thinking being, even if all else is an illusion."}, {"front": "What crucial aspects of knowledge did the \"cogito\" leave in doubt, according to Descartes?", "back": "It left in doubt the reality of the external world, the existence of other minds, and the genuineness of one's memories."}, {"front": "Which American philosopher proposed that the brain-in-a-vat hypothesis is self-refuting?", "back": "Hilary Putnam, in his 1981 work Reason, Truth and History."}, {"front": "On what theory of meaning does Putnam's self-refutation argument depend?", "back": "Semantic externalism."}, {"front": "Briefly explain the core idea of \"semantic externalism\" as it relates to Putnam's argument.", "back": "For a word to refer to something, there must be a causal connection or interaction between the speaker and that thing."}, {"front": "How does Putnam apply semantic externalism to a brain in a vat's language?", "back": "He argues that a brain in a vat has never causally interacted with real brains or real vats, so its words \"brain\" and \"vat\" would refer only to simulated electrical patterns, not physical objects."}, {"front": "According to Putnam's argument, why is the sentence \"I am a brain in a vat\" necessarily false if uttered by a brain in a vat?", "back": "Because the brain in a vat's words \"brain\" and \"vat\" would not refer to actual brains and vats, rendering its statement about real brains and vats untrue."}, {"front": "What are the main criticisms leveled against Putnam's self-refutation argument?", "back": "Critics point out that it relies on accepting semantic externalism, which is not universally endorsed, and it doesn't tell what the world is actually like, only that the statement is incoherent."}, {"front": "What is the \"deeper lesson\" about the limits of certainty that the brain-in-a-vat scenario teaches?", "back": "We navigate the world using fundamental assumptions that cannot be proven from the ground up, highlighting this as a feature of the human condition rather than a failure."}, {"front": "How does the brain-in-a-vat scenario relate to \"radical skepticism\"?", "back": "It demonstrates that we cannot prove the external world exists using evidence drawn from experience, because all such evidence could be fabricated."}, {"front": "Name two popular culture examples that explore themes similar to the brain-in-a-vat scenario.", "back": "The Matrix (1999) and The Truman Show (1998)."}, {"front": "In what way do modern virtual reality (VR) systems connect to the philosophical questions raised by the BIV scenario?", "back": "As VR experiences become increasingly indistinguishable from real ones, they raise the practical question of whether the distinction still matters between simulated and real experiences."}, {"front": "Beyond philosophy, what other significant contributions did René Descartes make?", "back": "He invented the Cartesian coordinate system (linking algebra and geometry) and made foundational contributions to optics and the study of the mind-body relationship."}, {"front": "Which ancient philosophical concept is considered a predecessor to the brain-in-a-vat scenario?", "back": "Plato's Allegory of the Cave."}, {"front": "If a brain in a vat says, \"My vat is leaking,\" to what do the words \"my vat\" refer, according to Putnam's semantic externalism?", "back": "They would refer to whatever the computer simulation presents as a vat (e.g., electrical patterns or simulated images of a vat), not a physical object in a real external world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
