    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 13, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Who introduced the Chinese Room argument and when?", "back": "The American philosopher John Searle, in 1980, in his paper 'Minds, Brains, and Programs'."}, {"front": "What is the primary target of Searle's Chinese Room argument?", "back": "Strong AI – the claim that a computer running the right program literally understands and has a mind in the same sense humans do."}, {"front": "Describe the core setup of the Chinese Room thought experiment.", "back": "A person is locked in a room, receiving Chinese characters through a slot. They use an English instruction manual to write appropriate Chinese responses, without understanding Chinese."}, {"front": "In the Chinese Room, what does the person inside the room actually understand?", "back": "The person understands nothing of Chinese; they are merely manipulating meaningless symbols according to formal rules."}, {"front": "What do external observers conclude about the Chinese Room based on its outputs?", "back": "Observers conclude that the room (or the system) understands Chinese, as its responses are intelligent and contextually appropriate."}, {"front": "How does Searle differentiate 'Strong AI' from 'Weak AI'?", "back": "Strong AI claims computers literally understand and have minds. Weak AI claims computers can simulate intelligent behavior and be useful tools without actual understanding."}, {"front": "What is Searle's stance on 'Weak AI'?", "back": "Searle had no objection to Weak AI, recognizing its usefulness for studying the mind and simulating intelligence."}, {"front": "State the first premise of Searle's argument against Strong AI.", "back": "Programs are purely formal; they manipulate symbols according to syntactic rules without regard to meaning."}, {"front": "State the second premise of Searle's argument against Strong AI.", "back": "Human minds have semantics; they do not merely manipulate symbols but understand what those symbols mean."}, {"front": "What is the conclusion of Searle's three-step argument against Strong AI?", "back": "Running a program is not sufficient for understanding; no amount of symbol manipulation constitutes genuine comprehension."}, {"front": "What is the 'Systems Reply' to the Chinese Room argument?", "back": "The person in the room doesn't understand Chinese, but perhaps the entire system – person, rule book, paper, room – does."}, {"front": "How does Searle counter the 'Systems Reply'?", "back": "He asks one to imagine memorizing the entire rule book and doing the processing in their head; that person still wouldn't understand Chinese, and that person *is* the system."}, {"front": "What is the 'Robot Reply' to the Chinese Room argument?", "back": "A computer connected to cameras, microphones, and robotic limbs, interacting with the real world, might develop genuine understanding."}, {"front": "How does Searle counter the 'Robot Reply'?", "back": "He argues that adding sensors and motors doesn't change the fundamental issue; the computer is still running a program, manipulating formal symbols, and its behavior remains purely syntactic."}, {"front": "What is the 'Brain Simulator Reply' to the Chinese Room argument?", "back": "If a program simulates the firing of every neuron in a Chinese speaker's brain, that would surely constitute understanding."}, {"front": "How does Searle counter the 'Brain Simulator Reply'?", "back": "He argues that simulation is not the real thing; simulating digestion doesn't digest, and simulating a brain doesn't produce understanding."}, {"front": "What is the 'Other Minds Reply' to the Chinese Room argument?", "back": "We infer understanding in other humans from their behavior; if a computer's behavior is indistinguishable, we have no more reason to deny understanding to the computer."}, {"front": "How does Searle counter the 'Other Minds Reply'?", "back": "He states we know that brains produce consciousness from our own direct experience, but we have no comparable evidence that programs do."}, {"front": "What does Searle's argument specifically claim is *not* sufficient for understanding?", "back": "Running a program, no matter how sophisticated the symbol manipulation, is not sufficient for understanding."}, {"front": "What does Searle's Chinese Room argument *not* prove about machines?", "back": "It does not prove that machines *cannot* understand, only that understanding might require mechanisms beyond mere symbol manipulation."}, {"front": "Why does the Chinese Room argument remain relevant in contemporary discussions about AI?", "back": "Modern AI systems process language and interact with remarkable fluency, making the temptation to attribute 'understanding' stronger than ever, which the argument directly challenges."}, {"front": "Explain the key distinction between 'symbol processing' and 'understanding' highlighted by the Chinese Room.", "back": "Symbol processing is the manipulation of symbols according to formal, syntactic rules, while understanding involves grasping the meaning (semantics) of those symbols."}, {"front": "According to the 'thinkaboutit' section, what question does the Systems Reply implicitly raise about understanding?", "back": "It raises the question of whether understanding is a property of entire systems rather than individual components, and where understanding truly resides."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
