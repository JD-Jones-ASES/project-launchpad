    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Coastline Paradox?", "back": "The observation that the measured length of a coastline (or similar natural boundary) depends on the resolution of the measurement, growing without bound as the measurement scale decreases, because coastlines are \"rough\" at every scale."}, {"front": "Who first observed the phenomenon that led to the Coastline Paradox, and in what context?", "back": "Lewis Fry Richardson in the 1950s, while studying the lengths of national borders."}, {"front": "Which mathematician developed the Coastline Paradox into a foundational concept of fractal geometry?", "back": "Benoit Mandelbrot."}, {"front": "What was the title of Benoit Mandelbrot's landmark 1967 paper related to the Coastline Paradox?", "back": "“How Long Is the Coast of Britain?”"}, {"front": "How does changing the measurement scale (e.g., ruler length) affect the measured length of a coastline?", "back": "As the measurement scale decreases (e.g., using a shorter ruler), the measured length of the coastline increases because more intricate details (bays, inlets, rocks) are captured."}, {"front": "How does a natural coastline differ from a smooth geometric shape (like a circle) when zoomed in?", "back": "A natural coastline remains \"rough\" at every scale, revealing more detail and length as you zoom in. A smooth shape, like a circle, appears increasingly flat and simple at higher magnifications."}, {"front": "What is the main implication of the Coastline Paradox regarding the \"true\" length of a natural coastline?", "back": "Natural coastlines have no single, well-defined \"true\" length; the reported number is entirely dependent on the resolution of the measurement used."}, {"front": "What phenomenon was the \"spark\" that ignited the field of fractal geometry?", "back": "The Coastline Paradox."}, {"front": "What common property do coastlines, mountain ranges, and other natural shapes share, according to fractal geometry?", "back": "Self-similarity at different scales, meaning a small section looks statistically similar to a larger section when magnified."}, {"front": "What concept did Mandelbrot introduce to describe objects like coastlines that are \"rough\" at every scale?", "back": "Fractal dimension."}, {"front": "How does the fractal dimension of an object describe its characteristics?", "back": "It describes how \"rough\" an object is and how quickly its measured length (or area/volume) increases as the measurement scale decreases, often being a non-integer value between classical dimensions."}, {"front": "What is the approximate fractal dimension of the coast of Britain, and what does it signify?", "back": "Approximately 1.25, indicating it is rougher than a 1-dimensional line but does not fully fill a 2-dimensional plane."}, {"front": "What was Benoit Mandelbrot's fundamental insight about the shapes found in the natural world compared to classical geometry?", "back": "He realized that the smooth, simple shapes of classical geometry (circles, triangles) are the exception, not the rule, and that the natural world is fundamentally fractal, characterized by roughness and irregularity."}, {"front": "Where did Benoit Mandelbrot spend most of his career, and what was the significance of his 1982 book?", "back": "He spent most of his career at IBM's research center. His 1982 book, *The Fractal Geometry of Nature*, demonstrated the prevalence of fractal patterns in nature and provided a mathematical language to describe them."}, {"front": "What iconic fractal image is named after Benoit Mandelbrot?", "back": "The Mandelbrot set."}, {"front": "How does the Coastline Paradox have practical consequences for international relations?", "back": "Neighboring countries may measure shared borders differently, leading to disputes, because the measured length depends on the resolution of the survey."}, {"front": "Provide an example of how the Coastline Paradox applies to environmental science.", "back": "The \"length\" of a river, \"area\" of a wetland, or \"surface area\" of a coral reef are all dependent on the measurement scale used."}, {"front": "How does the fractal structure of human lungs demonstrate an advantage from natural selection?", "back": "The fractal branching pattern of lung tissue vastly increases the \"surface area\" available for gas exchange, maximizing oxygen absorption beyond what a smooth-surface model would estimate."}, {"front": "In the context of fractal geometry, what is the fundamental feature of natural shapes like coastlines, rather than a smooth underlying form?", "back": "Their inherent \"roughness\" at every scale."}, {"front": "The Coastline Paradox is not just about geography. Name another natural phenomenon mentioned that displays fractal-like self-similarity.", "back": "Examples include mountain ranges, river networks, cloud boundaries, blood vessel systems, the surface of a piece of broccoli, or fluctuations of stock prices."}, {"front": "What other paradox, dealing with sharp boundaries, is mentioned as having connections to the Coastline Paradox?", "back": "The Sorites Paradox."}, {"front": "What concept, related to measuring with too much precision, is mentioned in connection to the Coastline Paradox?", "back": "The Overfitting Problem."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
