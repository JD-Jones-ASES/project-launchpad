    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "To whom is 'Cunningham's Law' attributed?", "back": "Ward Cunningham, the programmer who invented the wiki concept in 1995.", "id": "fc01"}, {"front": "State the usual formulation of Cunningham's Law.", "back": "\"The best way to get the right answer on the internet is not to ask a question; it is to post the wrong answer.\"", "id": "fc02"}, {"front": "According to Cunningham's Law, what is the primary psychological driver that makes wrong answers elicit quicker responses than direct questions?", "back": "The irresistible urge to correct someone who is mistaken, which is a stronger motivator than the appeal to generosity.", "id": "fc03"}, {"front": "How does the motivation to respond to a direct question differ from the motivation to correct a wrong answer?", "back": "Questions appeal to generosity, requiring someone to volunteer time and expertise. Wrong answers appeal to a stronger urge to correct an error and often to demonstrate one's own knowledge.", "id": "fc04"}, {"front": "Why are people more likely to 'scroll past a question' but almost never 'scroll past a wrong answer'?", "back": "Scrolling past a question requires no action, but a wrong answer triggers an 'itch to set the record straight' due to the strong urge to correct.", "id": "fc05"}, {"front": "What is often true about the quality of corrections provoked by wrong answers, compared to answers elicited by direct questions?", "back": "Corrections are often more detailed, more thorough, and more helpful than the answers a direct question would have elicited.", "id": "fc06"}, {"front": "Does Cunningham's Law depend on noble human motivations? Explain.", "back": "No. The impulse to correct often has as much to do with demonstrating one's own knowledge as with helping, but the law only relies on the reliable observation that wrong answers provoke corrections.", "id": "fc07"}, {"front": "How can teachers apply the principle of Cunningham's Law in a classroom setting to generate discussion?", "back": "By making a deliberately provocative or slightly incorrect statement instead of asking a direct question, prompting students to passionately correct the error.", "id": "fc08"}, {"front": "List two other practical applications of Cunningham's Law beyond internet forums and classrooms.", "back": "Meetings, brainstorming sessions, and editorial processes (e.g., a rough draft with errors generates more useful feedback than a blank page).", "id": "fc09"}, {"front": "How can a manager use Cunningham's Law to get better feedback on a project proposal?", "back": "By presenting a rough draft with deliberate errors or controversial points, rather than a blank page or a perfectly polished document, to provoke specific and detailed feedback.", "id": "fc10"}, {"front": "What is the 'shadow side' of Cunningham's Law in modern information environments, particularly on social media?", "back": "The blurring of the line between a genuine error and deliberate provocation, where wrong answers are strategically posted to generate engagement and outrage.", "id": "fc11"}, {"front": "How have social media platforms exploited Cunningham's Law?", "back": "They have discovered that outrage, often triggered by wrong or misleading claims, drives engagement more reliably than accuracy does.", "id": "fc12"}, {"front": "Does Cunningham's Law imply that exploiting the human tendency to correct errors is always benign?", "back": "No. While it describes a useful tendency of human nature, exploiting this tendency can lead to negative outcomes like the spread of misinformation and outrage.", "id": "fc13"}, {"front": "What is the core principle summarized by the key concept 'Wrong Answers Provoke Corrections'?", "back": "People are more motivated to correct a wrong answer than to respond to a question.", "id": "fc14"}, {"front": "How can the asymmetry described by Cunningham's Law be exploited constructively?", "back": "To generate discussion, elicit expertise, and improve drafts.", "id": "fc15"}, {"front": "How does Cunningham's Law help explain why certain content spreads faster online?", "back": "It explains why outrage and error often spread faster than curiosity and accuracy in information environments, due to the strong motivation people have to correct perceived wrongs.", "id": "fc16"}, {"front": "How does Wikipedia implicitly rely on Cunningham's Law for its accuracy and self-healing mechanism?", "back": "Wikipedia works because errors attract corrections. When a vandal or mistaken editor introduces an error, other editors are compelled to fix it, turning the human compulsion to correct into a self-healing system.", "id": "fc17"}, {"front": "Does Wikipedia's accuracy depend on every contributor being an expert? Explain using Cunningham's Law.", "back": "No. Its accuracy is sustained not by universal expertise, but by the dynamic described by Cunningham's Law: errors (even from non-experts) attract corrections from others, making the system self-correcting.", "id": "fc18"}, {"front": "Which other psychological phenomenon, mentioned in the text, relates to Cunningham's Law through 'counterintuitive information dynamics'?", "back": "The Streisand Effect.", "id": "fc19"}, {"front": "Which cognitive bias, mentioned in the text, relates to how people respond to information differently based on whether it confirms or challenges their beliefs?", "back": "Confirmation Bias.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
