<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the common formulation of Cunningham's Law?", "back": "Cunningham's Law states: \"The best way to get the right answer on the internet is not to ask a question; it is to post the wrong answer.\""}, {"front": "Who is Cunningham's Law attributed to, and what else is he known for?", "back": "It is attributed to Ward Cunningham, the programmer who invented the wiki concept in 1995."}, {"front": "Why do wrong answers often get faster replies than direct questions, according to Cunningham's Law?", "back": "Wrong answers appeal to the irresistible urge to correct someone who is mistaken, which is a stronger motivator than the generosity required to answer a question."}, {"front": "What psychological mechanism underpins Cunningham's Law?", "back": "The mechanism is psychological: wrong answers tap into the human compulsion to correct errors, often driven by a desire to demonstrate one's own knowledge."}, {"front": "Are the motivations behind correcting wrong answers always noble?", "back": "No, the impulse to correct often has as much to do with demonstrating one's own knowledge as with genuinely helping the person who is wrong."}, {"front": "How do the corrections generated by 'wrong answers' typically compare to direct answers?", "back": "Corrections provoked by wrong answers are often more detailed, more thorough, and more helpful than the answers a direct question would have elicited."}, {"front": "Give an example of Cunningham's Law in an educational setting.", "back": "Teachers can generate class discussion more effectively by making a deliberately provocative or slightly incorrect statement, as students will passionately correct an error."}, {"front": "How can Cunningham's Law be applied in professional contexts like meetings or editorial processes?", "back": "A rough draft with errors tends to generate more useful feedback than a blank page with a request for input, by provoking corrections and engagement."}, {"front": "What is the 'shadow side' or negative aspect of Cunningham's Law?", "back": "Its shadow side is the blurring of the line between genuine error and deliberate provocation, especially when wrong answers are strategically posted to generate engagement or outrage."}, {"front": "How do social media platforms sometimes exploit the principle behind Cunningham's Law?", "back": "Social media platforms have discovered that outrage, often triggered by wrong or misleading claims, drives engagement more reliably than accuracy does."}, {"front": "Does Cunningham's Law imply that exploiting this human tendency is always beneficial or benign?", "back": "No, Cunningham's Law describes a useful tendency but does not imply that exploiting this tendency is always benign; it can lead to the spread of misinformation and outrage."}, {"front": "What is the core 'key concept' summarized about Cunningham's Law?", "back": "The core concept is that people are more motivated to correct a wrong answer than to respond to a question, an asymmetry that can be exploited both constructively and destructively."}, {"front": "How does Cunningham's Law explain dynamics in information environments regarding error and outrage?", "back": "It explains why outrage and error can spread faster than curiosity and accuracy in information environments, as people are compelled to react to and correct perceived wrongs."}, {"front": "How does Wikipedia exemplify Cunningham's Law in action?", "back": "Wikipedia's accuracy is sustained because errors introduced by editors attract quick corrections from others, harnessing the human compulsion to fix mistakes as a self-healing mechanism."}, {"front": "What is Wikipedia's 'self-healing mechanism' based on?", "back": "It is based on Cunningham's Law: errors on the platform quickly attract corrections from other editors, ensuring information is continuously refined and improved."}, {"front": "What information dynamic is the 'Streisand Effect' connected to, similar to Cunningham's Law?", "back": "The Streisand Effect is another example of human psychology producing counterintuitive information dynamics, where an attempt to hide or remove information inadvertently draws more attention to it."}, {"front": "What is the difference in motivation when a person asks a direct question versus posts a wrong answer?", "back": "Asking a question appeals to generosity, while posting a wrong answer appeals to the stronger, often irresistible urge to correct a mistake."}, {"front": "Beyond the internet, where else can the dynamic described by Cunningham's Law be observed?", "back": "It can be observed in classrooms (teachers making incorrect statements), professional meetings, brainstorming sessions, and editorial processes with rough drafts."}, {"front": "Why is Wikipedia's accuracy, despite imperfect contributions, sustained according to Cunningham's Law?", "back": "Its accuracy is sustained because the system harnesses the human compulsion to correct errors; even mistaken edits are quickly noticed and fixed by other contributors."}, {"front": "In what two ways can the asymmetry described by Cunningham's Law be exploited?", "back": "It can be exploited constructively (to generate discussion, elicit expertise, improve drafts) or negatively (explaining why outrage and error spread faster than curiosity and accuracy)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
