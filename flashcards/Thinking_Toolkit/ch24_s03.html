    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 24, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the etymological origin of the term 'Sorites Paradox'?", "back": "It comes from the Greek word 'soros,' meaning 'heap.'"}, {"front": "Who is credited with formulating the Sorites Paradox?", "back": "Eubulides of Miletus, a 4th-century BC philosopher, also known for the Liar Paradox."}, {"front": "Describe the core scenario of the Sorites Paradox using the 'heap' example.", "back": "Starting with one grain (not a heap), and incrementally adding grains, at no single point does adding one grain seem to transform a non-heap into a heap, yet eventually, a heap clearly exists."}, {"front": "What are the two premises of the Sorites Paradox argument structure?", "back": "1. One grain of sand is not a heap. 2. Adding one grain of sand to a non-heap does not make it a heap."}, {"front": "What is the conclusion derived from the premises of the Sorites Paradox, and why is it paradoxical?", "back": "The conclusion is that no number of grains is a heap. It's paradoxical because the conclusion is obviously false (heaps exist), but both premises seem true, and the logic is valid."}, {"front": "Provide two examples, other than a heap of sand, where the Sorites Paradox applies.", "back": "Baldness (removing one hair incrementally) and tallness (incremental height changes) are common examples."}, {"front": "What term do philosophers use for predicates like 'heap,' 'bald,' 'tall,' or 'rich' that lead to the Sorites Paradox?", "back": "Vague predicates."}, {"front": "What defines a 'vague predicate'?", "back": "A predicate that admits borderline cases where applying the term seems neither clearly correct nor clearly incorrect."}, {"front": "Why is vagueness considered a 'deep logical problem' rather than just a practical inconvenience?", "back": "It shows that our basic categorical concepts resist the sharp boundaries that classical logic seems to require."}, {"front": "What is the core idea of 'Epistemicism' as an attempted solution to the Sorites Paradox?", "back": "It holds that there is a precise boundary (e.g., an exact number of grains for a heap), but we simply cannot know where it is. Vagueness is in our ignorance, not the world."}, {"front": "What is a major criticism of Epistemicism?", "back": "It strikes most people as deeply implausible; it's hard to accept an unknowable, precise boundary for vague concepts."}, {"front": "How does 'Supervaluationism' attempt to resolve the Sorites Paradox?", "back": "It suggests vague predicates can be 'precisified' in many legitimate ways. A statement is true if true on all precisifications, false if false on all, and neither true nor false in borderline cases."}, {"front": "What fundamental principle of classical logic does Supervaluationism require abandoning?", "back": "The principle of bivalence, which states that every statement is either true or false."}, {"front": "Explain the approach of 'Fuzzy Logic' to vagueness.", "back": "It replaces the two truth values (true/false) with a continuous scale from 0 to 1, allowing statements to be partially true (e.g., 0.3 true, 0.7 true)."}, {"front": "What is a criticism often leveled against Fuzzy Logic's solution?", "back": "The sharp boundary returns at a different level, as one must still decide why a statement has a specific truth value (e.g., 0.7 true and not 0.71)."}, {"front": "What 'structural feature' of how concepts work does the Sorites Paradox reveal about vagueness?", "back": "Vagueness is not merely sloppiness in language but a fundamental structural feature of how many concepts function, lacking sharp boundaries."}, {"front": "What practical lesson can be drawn from understanding the Sorites Paradox regarding arguments demanding precise boundaries?", "back": "Be suspicious of arguments that demand a precise boundary where none exists, and equally suspicious of arguments that exploit the absence of a boundary to deny a real difference."}, {"front": "Give an example of how the Sorites Paradox has real legal or political consequences.", "back": "Determining when a fetus becomes a person, when a stream of pollution becomes environmental damage, or defining legal adulthood (e.g., 18 years old) or intoxication levels (e.g., 0.08 BAC)."}, {"front": "How do legal systems often handle vague concepts like 'adult' or 'legally drunk' despite their inherent vagueness?", "back": "They 'stipulate' bright lines or precise numerical thresholds, which are useful fictions that allow institutions to function."}, {"front": "Why is the distinction between 'tax avoidance' (legal) and 'tax evasion' (illegal) an example of a Sorites boundary?", "back": "There's a vast gray zone of increasingly aggressive strategies, and the law must arbitrarily 'plant a flag' somewhere to define the legal/illegal boundary."}, {"front": "When designing a legal system, what is the dilemma posed by vague concepts like 'reasonable force'?", "back": "Whether to define precise (and inevitably arbitrary) numerical thresholds or to leave terms vague and allow judges to decide case by case (leading to potential inconsistency)."}, {"front": "Name two other paradoxes mentioned in the text that relate to identity or incremental change.", "back": "The Ship of Theseus (identity through incremental change) and Zeno's Paradoxes (infinite divisibility)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
