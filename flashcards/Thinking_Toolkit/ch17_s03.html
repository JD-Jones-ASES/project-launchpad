    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who proposed Dunbar's Number and in what year?", "back": "British anthropologist Robin Dunbar first proposed Dunbar's Number in 1992."}, {"front": "Define Dunbar's Number.", "back": "Dunbar's Number is a theoretical cognitive limit to the number of people with whom one can maintain stable social relationships—relationships in which an individual knows who each person is and how each person relates to every other person. It is approximately 150."}, {"front": "What was the scientific basis for Dunbar's Number?", "back": "Dunbar's Number emerged from the observed relationship between neocortex size (the part of the brain responsible for complex thought and social processing) and social group size in other primates. He extrapolated this relationship to humans."}, {"front": "According to Dunbar's research, what were the approximate social group sizes for chimpanzees, gorillas, and predicted humans based on neocortex size?", "back": "Chimpanzees: ~50; Gorillas: ~10; Humans (predicted): ~150."}, {"front": "Provide historical or contemporary examples that confirm Dunbar's Number in human groups.", "back": "Examples include Neolithic farming villages (150–200 inhabitants), Roman military companies (centuriae, ~160 soldiers), Hutterite communities (~150 members before splitting), and average personal social networks (e.g., Christmas card lists, ~150 contacts)."}, {"front": "What is the primary cognitive mechanism that limits the number of stable social relationships to Dunbar's Number?", "back": "Maintaining genuine social relationships requires extensive cognitive 'social bookkeeping'—keeping track of who people are, their personalities, their history with you, and their relationships with others in the group. This cognitive load exceeds human capacity beyond approximately 150 relationships."}, {"front": "How do social groups typically function when their size is *below* Dunbar's Number?", "back": "Below Dunbar's Number, groups can function effectively on personal knowledge and informal trust. Conflicts are resolved through personal relationships, gossip, and reputation, as everyone knows each other directly."}, {"front": "What organizational changes become necessary when a group grows *above* Dunbar's Number?", "back": "When a group exceeds Dunbar's Number, informal social mechanisms break down. Organizations must substitute formal structures for personal ones, such as written rules, hierarchies, job titles, performance reviews, and bureaucratic procedures."}, {"front": "According to the text, why might a startup that functioned well at 30 people begin to struggle at 200?", "back": "This struggle occurs because the organization has hit a 'cognitive wall.' The informal communication and personal relationships that worked when everyone knew everyone are replaced by less efficient formal structures like meetings, memos, and management layers, as the human brain's capacity for social processing is exceeded."}, {"front": "Explain the concept of 'The Cognitive Ceiling on Social Relationships.'", "back": "This refers to the inherent limit of the human brain to maintain approximately 150 stable social relationships characterized by personal knowledge, trust, and awareness of others' connections. Beyond this ceiling, groups require formal institutions to maintain cohesion."}, {"front": "How do military unit sizes often reflect Dunbar's Number?", "back": "Companies in most modern armies typically comprise 100–200 soldiers. Units of this size can be commanded through personal leadership, whereas larger formations require more hierarchical command structures."}, {"front": "How have companies like W. L. Gore applied the principle of Dunbar's Number?", "back": "W. L. Gore (makers of Gore-Tex) has experimented with capping facility size at roughly 150 employees, opting to create new facilities rather than expanding existing ones beyond this limit to maintain informal organizational cohesion."}, {"front": "How does Dunbar's Number manifest in social media interactions, despite many 'friends' or 'followers'?", "back": "Despite having hundreds or thousands of online contacts, studies consistently find that people actively interact with only about 150 contacts. The rest are passive connections without real social content, reflecting Dunbar's Number."}, {"front": "Is Dunbar's Number considered a precise, unvarying constant? Explain.", "back": "No, Dunbar's Number is an approximation, not a precise constant. There is significant individual variation, and the '150' figure refers to a specific type of close social relationship, not all acquaintances."}, {"front": "What specific *type* of social relationship does the '150' in Dunbar's Number primarily represent?", "back": "It refers to the number of people you know well enough to 'sit down with uninvited for a drink'—relationships characterized by personal knowledge, trust, and awareness of their connections to others you know."}, {"front": "Describe Dunbar's concept of concentric circles of relationships.", "back": "Dunbar described a series of concentric circles: about 5 intimate friends, 15 close friends, 50 good friends, 150 casual friends, 500 acquaintances, and 1,500 people you can recognize."}, {"front": "Are formal organizational structures (like hierarchies and rules) a sign of organizational failure when a group grows large?", "back": "No, according to the text, formal structures are not signs of organizational failure. They are necessary adaptations to the cognitive limits of human social processing when groups grow beyond Dunbar's Number."}, {"front": "What part of the brain is crucial for complex thought and social processing, and thus central to Dunbar's theory?", "back": "The neocortex is the part of the brain primarily responsible for complex thought and social processing, and its size is directly linked to social group size in Dunbar's theory."}, {"front": "What is the consequence for social control when a group exceeds Dunbar's Number?", "back": "Beyond Dunbar's Number, social control through personal relationships breaks down, making formal rules and structures necessary to maintain order and cohesion."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
