<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary difference between the Two Generals' Problem and the Byzantine Generals Problem?", "back": "The Two Generals' Problem deals with coordination when messages might be lost, assuming all parties are loyal. The Byzantine Generals Problem adds the complexity of some participants being traitors who actively send conflicting messages.", "id": "fc01"}, {"front": "Who authored the foundational paper on 'The Byzantine Generals Problem'?", "back": "Leslie Lamport, Robert Shostak, and Marshall Pease.", "id": "fc02"}, {"front": "What real-world reputation inspired the name 'Byzantine Generals Problem'?", "back": "The Byzantine Empire's reputation for intricate political treachery.", "id": "fc03"}, {"front": "Describe the core scenario of the Byzantine Generals Problem.", "back": "Several generals surround an enemy city and must agree on a common plan (attack or retreat) using messengers. Some generals, however, may be traitors sending conflicting messages to sabotage coordination.", "id": "fc04"}, {"front": "What is the main challenge loyal generals face in the Byzantine Generals Problem?", "back": "The challenge is not just communication reliability, but trust in the face of potential deception, as they cannot distinguish between honest messages and treacherous ones.", "id": "fc05"}, {"front": "What critical mathematical condition did Lamport and colleagues prove for achieving consensus in the Byzantine Generals Problem?", "back": "Consensus is possible only if the total number of generals ($n$) is greater than three times the number of traitors ($t$), i.e., $n > 3t$.", "id": "fc06"}, {"front": "In plain English, what is the minimum ratio of loyal generals to traitors required for consensus?", "back": "The loyal generals must outnumber the traitors by more than two to one.", "id": "fc07"}, {"front": "Why is consensus impossible with three generals and one traitor?", "back": "With one traitor among three generals, the two loyal generals cannot tell if conflicting information comes from the traitor or a confused loyal general. They lack enough independent confirmation to distinguish truth from deception.", "id": "fc08"}, {"front": "How does consensus become possible with four generals and one traitor?", "back": "With four generals and one traitor, there are three loyal generals. The two honest reports they receive (from other loyal generals) outnumber the one dishonest report (from the traitor), allowing them to use majority voting to distinguish truth from deception.", "id": "fc09"}, {"front": "What specific tactic can a traitor use to sabotage coordination in the Byzantine Generals Problem?", "back": "A traitor can send different messages to different generals, telling one group 'I'm attacking' and another 'I'm retreating,' creating contradictory views of the situation.", "id": "fc10"}, {"front": "Why is the Byzantine Generals Problem considered foundational in computer science?", "back": "Every distributed computer system, from banking networks to cloud computing, faces this problem because components can fail in arbitrary ways or be compromised, sending inconsistent or deceptive data.", "id": "fc11"}, {"front": "Give two examples of 'Byzantine failures' in distributed computer systems.", "back": "A malfunctioning server sending correct data to one part of the system and garbage to another, or a hacked node actively trying to deceive the network.", "id": "fc12"}, {"front": "What famous modern technology is a direct application and solution to the Byzantine Generals Problem?", "back": "Blockchain technology, exemplified by Bitcoin.", "id": "fc13"}, {"front": "Who introduced Bitcoin, a novel solution to the Byzantine Generals Problem?", "back": "The pseudonymous Satoshi Nakamoto, in 2008.", "id": "fc14"}, {"front": "How does Bitcoin, using proof-of-work, solve the Byzantine Generals Problem?", "back": "Instead of relying on a supermajority of honest participants, it makes deception computationally expensive. An attacker needs more computing power than the rest of the network combined to corrupt the ledger, which is prohibitively costly due to economic incentives.", "id": "fc15"}, {"front": "Define 'Consensus in the Presence of Bad Actors' as a key concept.", "back": "It refers to situations where honest participants in a coordination problem can reach consensus only if they sufficiently outnumber actively deceptive participants (more than two to one, in the classic Byzantine formulation).", "id": "fc16"}, {"front": "How do flight-critical aviation systems address the Byzantine Generals Problem?", "back": "They use redundant sensors and voting mechanisms. For example, if three sensors measure airspeed and one gives a different reading, the system trusts the majority, which works as long as at most one sensor is faulty.", "id": "fc17"}, {"front": "Provide an example of the Byzantine Generals Problem in organizational decision-making.", "back": "In a committee or board where some members may act in bad faith, honest members must significantly outnumber the dishonest ones for sound decisions to emerge, as a slim honest majority remains vulnerable.", "id": "fc18"}, {"front": "What is 'Byzantine failure' in computer science terminology?", "back": "It's any failure mode where a component behaves inconsistently, giving different responses or information to different observers, making it hard to detect and tolerate.", "id": "fc19"}, {"front": "What is the key difference between a 'Byzantine failure' and a 'crash failure'?", "back": "A 'crash failure' means a component simply stops working, which is relatively easy to handle. A 'Byzantine failure' means a component behaves inconsistently or maliciously, making it harder to detect and tolerate.", "id": "fc20"}, {"front": "Why are Byzantine failures considered more difficult to handle than crash failures?", "back": "Byzantine failures are harder to detect because the component might still be 'working' but sending contradictory information, making it difficult for other parts of the system to trust its outputs or reach consensus.", "id": "fc21"}, {"front": "The Byzantine Generals Problem connects to other concepts. Name one related problem or concept mentioned in the text.", "back": "The Two Generals' Problem (simpler version without traitors), The Prisoner's Dilemma (logic of trust and defection), or Dunbar's Number (cognitive limits on trust networks).", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
