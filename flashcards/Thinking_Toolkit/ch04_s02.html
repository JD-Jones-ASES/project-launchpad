<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Representativeness Heuristic?", "back": "It's the brain's tendency to judge the probability that something belongs to a category by how much it resembles the typical member of that category, rather than by consulting actual statistical base rates.", "id": "fc01"}, {"front": "Who identified the Representativeness Heuristic?", "back": "Kahneman and Tversky, in the early 1970s.", "id": "fc02"}, {"front": "Which famous problem demonstrates the Representativeness Heuristic and the Conjunction Fallacy?", "back": "The 'Linda problem'.", "id": "fc03"}, {"front": "Describe Linda's profile in the 'Linda problem'.", "back": "Thirty-one years old, single, outspoken, very bright, majored in philosophy, deeply concerned with discrimination and social justice, participated in anti-nuclear demonstrations.", "id": "fc04"}, {"front": "In the 'Linda problem', which statement did most people rate as more probable: (a) Linda is a bank teller, or (b) Linda is a bank teller and is active in the feminist movement?", "back": "Most people rated (b) 'Linda is a bank teller and is active in the feminist movement' as more probable.", "id": "fc05"}, {"front": "Why is 'Linda is a bank teller' always more probable than 'Linda is a bank teller and is active in the feminist movement'?", "back": "Because every feminist bank teller is also a bank teller. The set of 'bank tellers who are feminists' is entirely contained within the set of 'bank tellers'. Adding a condition can only narrow the category.", "id": "fc06"}, {"front": "What is the Conjunction Fallacy?", "back": "The error of judging a conjunction of two events (e.g., A and B) as more probable than one of the constituent events (e.g., A) alone.", "id": "fc07"}, {"front": "How does the Representativeness Heuristic lead to the Conjunction Fallacy in the Linda problem?", "back": "People judged 'feminist bank teller' as more likely because it matched their mental portrait of Linda better than 'bank teller' alone, substituting resemblance to a stereotype for actual probability.", "id": "fc08"}, {"front": "When applying the representativeness heuristic, what does the mind substitute for actual probability?", "back": "Resemblance to a stereotype or a mental portrait of a typical member of a category.", "id": "fc09"}, {"front": "What critical statistical information does the representativeness heuristic often cause us to ignore?", "back": "Actual statistical base rates, sample sizes, and the laws of probability.", "id": "fc10"}, {"front": "What common idiom is analogous to judging likelihood using the representativeness heuristic?", "back": "Judging a book by its cover, but applied to probabilities.", "id": "fc11"}, {"front": "When does the Representativeness Heuristic work reasonably well?", "back": "In many everyday situations where resemblance accurately correlates with probability (e.g., if something looks, walks, and quacks like a duck, it probably is a duck).", "id": "fc12"}, {"front": "When does the Representativeness Heuristic predictably fail?", "back": "When resemblance and actual probability diverge.", "id": "fc13"}, {"front": "If a person is shy, quiet, and loves order and detail, is that person more likely to be a librarian or a salesperson, according to the representativeness heuristic? Why might this judgment be flawed?", "back": "Most people say librarian due to stereotype resemblance. This judgment is flawed because there are far more salespeople than librarians in the general population (base rate), making a salesperson with those traits more statistically probable.", "id": "fc14"}, {"front": "How can the Representativeness Heuristic lead to errors in hiring decisions?", "back": "A candidate who 'looks the part' (resembles a mental image of a successful person in that role) may be rated as more likely to succeed, regardless of actual statistical predictors of success.", "id": "fc15"}, {"front": "Provide an example of the Representativeness Heuristic's impact on medical diagnosis.", "back": "A patient whose symptoms 'look like' a rare disease might receive that diagnosis even when a common condition is far more probable given the base rates.", "id": "fc16"}, {"front": "How does the 'hot hand' phenomenon in basketball relate to the Representativeness Heuristic?", "back": "Fans perceive a player making multiple shots in a row as having a 'hot hand' because the sequence *resembles* a pattern of genuine skill, even if it's statistically consistent with random chance.", "id": "fc17"}, {"front": "What is the 'cultural fit' trap in hiring, and how does it relate to the Representativeness Heuristic?", "back": "It's when companies hire candidates who resemble the existing team (similar background, style). This 'feels like good judgment' because they fit the mental image of 'one of us', but it can filter out high-performing individuals who don't match the stereotype.", "id": "fc18"}, {"front": "Which other cognitive error is closely related to the Representativeness Heuristic's tendency to ignore prior probabilities?", "back": "Base Rate Neglect.", "id": "fc19"}, {"front": "How does the Representativeness Heuristic connect with Confirmation Bias?", "back": "Both involve a tendency to seek or interpret information that fits our existing mental images, stereotypes, or beliefs.", "id": "fc20"}, {"front": "Which effect, where one trait influences our judgment of all others, shares a connection with how a representative image impacts overall probability judgment?", "back": "The Halo and Horn Effect.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
