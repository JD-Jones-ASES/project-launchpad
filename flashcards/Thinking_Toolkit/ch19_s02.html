    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 19, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who formulated Campbell's Law and in what year?", "back": "Donald T. Campbell, 1979.", "id": "fc01"}, {"front": "What is the core principle of Campbell's Law?", "back": "The more any quantitative social indicator is used for social decision-making, the more subject it will be to corruption pressures and the more apt it will be to distort and corrupt the social processes it is intended to monitor.", "id": "fc02"}, {"front": "Campbell's Law states that the higher the stakes attached to a quantitative measure, what will happen?", "back": "The more it will distort the very social processes it is supposed to monitor.", "id": "fc03"}, {"front": "How does Campbell's Law describe the nature of its warning?", "back": "It is a warning about institutional decay, not just a gentle observation about statistical artifacts.", "id": "fc04"}, {"front": "What is the key distinction in emphasis between Goodhart's Law and Campbell's Law?", "back": "Goodhart's Law describes a statistical phenomenon (from a central banker's perspective), while Campbell's Law describes a moral phenomenon (from a social scientist's perspective).", "id": "fc05"}, {"front": "According to Campbell's Law, what happens when people's livelihoods, reputations, and careers are tied to a number?", "back": "It creates incentives for dishonesty, which over time reshapes the culture of the institution itself.", "id": "fc06"}, {"front": "Describe the VA hospital scandal of 2014 as an example of Campbell's Law.", "back": "The VA set 14-day appointment targets. Administrators created secret waiting lists, making official numbers look good while veterans waited months and some died, replacing reality with the appearance of prompt treatment.", "id": "fc07"}, {"front": "How does the 'publish or perish' culture in academic research exemplify Campbell's Law?", "back": "Career advancement tied to publication and citation counts incentivizes 'salami slicing,' pursuing flashy results, and even data fabrication, leading to quantity over quality and increased retraction rates.", "id": "fc08"}, {"front": "Why are the effects of Campbell's Law considered 'self-concealing'?", "back": "When a measure is being gamed, the gaming itself produces numbers that look good, making the corruption invisible to anyone who only looks at the data dashboard.", "id": "fc09"}, {"front": "Where must one look to see what numbers distorted by Campbell's Law are hiding?", "back": "One must look at 'the floor'—at the patients, students, veterans, or the actual work being done—to see the reality behind the manipulated numbers.", "id": "fc10"}, {"front": "What uncomfortable practical implication does Campbell's Law suggest regarding high-stakes measures?", "back": "The measures that matter most are the ones you should be most cautious about turning into targets, as tying rewards/punishments to them can incentivize making numbers look good rather than improving the underlying reality.", "id": "fc11"}, {"front": "What is the core idea summarized by the 'High-Stakes Measures Corrupt' concept?", "back": "The greater the consequences attached to a quantitative indicator, the more aggressively people will game it, distorting the process and producing both bad data and bad behavior.", "id": "fc12"}, {"front": "How did the Atlanta Public Schools cheating scandal illustrate Campbell's Law?", "back": "Under pressure to meet standardized test targets, educators altered students' answer sheets, producing impressive scores but no real educational improvement, demonstrating institutional corruption.", "id": "fc13"}, {"front": "Does Campbell's Law imply we should abandon measurement in social policy?", "back": "No, it means we should design measurement systems with full awareness that they will be gamed and build in safeguards.", "id": "fc14"}, {"front": "What safeguards are recommended when designing measurement systems, given Campbell's Law?", "back": "Multiple independent measures, qualitative audits, rotating metrics, and consequences for gaming that are at least as severe as consequences for failing to meet targets.", "id": "fc15"}, {"front": "Campbell's Law describes a moral phenomenon. What kind of phenomenon does Goodhart's Law describe?", "back": "A statistical phenomenon.", "id": "fc16"}, {"front": "What is the primary concern of Campbell's Law regarding institutions?", "back": "The 'soul' of public institutions and the warning about institutional decay.", "id": "fc17"}, {"front": "What happens to children's actual safety when child welfare measures become targets for funding and careers?", "back": "The number may make children less safe by diverting attention from reality to reporting, as actors focus on improving the number rather than the safety itself.", "id": "fc18"}, {"front": "In the context of academic research, what is 'salami slicing'?", "back": "Slicing single studies into multiple papers to increase publication counts, a consequence of 'publish or perish' culture driven by high-stakes metrics.", "id": "fc19"}, {"front": "What has happened to the retraction rate for scientific papers since the 1970s, and why, according to the text?", "back": "It has increased tenfold, not because scientists are less ethical, but because incentive structures tied to publication metrics have become more intense.", "id": "fc20"}, {"front": "Campbell's Law is connected to which other concept regarding perverse incentives in policy design?", "back": "The Cobra Effect.", "id": "fc21"}, {"front": "What differentiates the level of 'anger' between Goodhart's Law and Campbell's Law, according to the text?", "back": "Campbell's Law is described as Goodhart's Law's 'older, angrier cousin' because Campbell went further, focusing on institutional decay and moral corruption, not just statistical breakdown.", "id": "fc22"}, {"front": "Explain the VA scandal quote: 'the measure was designed to ensure prompt treatment. The high stakes attached to it ensured that the appearance of prompt treatment replaced the reality.'", "back": "The intention was to ensure veterans received care quickly, but the pressure to meet targets led administrators to manipulate data (e.g., secret lists) to *appear* to meet the goal, while the actual problem of delayed veteran care persisted.", "id": "fc23"}, {"front": "How does Campbell's Law predict institutional corruption rather than just statistical distortion?", "back": "By tying people's livelihoods and careers to a number, it creates incentives for dishonesty and gaming, which over time reshapes the culture of the institution, leading to systemic corruption rather than genuine improvement.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
