    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 19, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who originally formulated Goodhart's Law?", "back": "Charles Goodhart, a British economist."}, {"front": "In what original context was Goodhart's Law formulated in 1975?", "back": "In the context of monetary policy in the United Kingdom, observing that statistical regularities collapse once used for policy purposes."}, {"front": "Who generalized Goodhart's Law into the pithier form most people know today?", "back": "Anthropologist Marilyn Strathern."}, {"front": "State Goodhart's Law in its most widely quoted form.", "back": "\"When a measure becomes a target, it ceases to be a good measure.\""}, {"front": "Explain the core insight behind Goodhart's Law.", "back": "When a number designed to capture something about reality is used as a target with attached rewards or punishments, people begin optimizing for the number itself rather than the underlying reality it was supposed to represent."}, {"front": "Describe the mechanism by which Goodhart's Law operates.", "back": "A measure initially works because no one is trying to manipulate it. The moment incentives are attached, the measure becomes a target, and people game the system by manipulating the number rather than improving the actual reality."}, {"front": "How does the hospital administrator example illustrate Goodhart's Law?", "back": "By setting a target to reduce \"average length of stay\" (the measure), administrators inadvertently pressured staff to discharge patients prematurely. The length of stay dropped (target met), but patient outcomes worsened (reality corrupted)."}, {"front": "Provide an example of Goodhart's Law in the field of education.", "back": "When standardized test scores become targets for school funding or teacher evaluations, schools may \"teach to the test,\" narrow curricula, or even commit fraud, leading to higher scores but not necessarily improved learning."}, {"front": "How can Goodhart's Law manifest in policing?", "back": "When police departments are evaluated by crime statistics, officers may reclassify serious crimes as minor ones or avoid taking reports to lower official crime rates, while actual public safety remains unchanged or worsens."}, {"front": "Explain how corporate Key Performance Indicators (KPIs) like \"average handle time\" can be corrupted by Goodhart's Law.", "back": "If call center agents are targeted on \"average handle time,\" they might rush callers, transfer unnecessarily, or hang up on difficult cases to meet the metric, leading to improved numbers but plummeting customer satisfaction."}, {"front": "What was the \"deeper lesson\" presented regarding measurement and Goodhart's Law?", "back": "Measurement itself is essential and not inherently bad. The lesson is that any measure used as a target will be gamed, and the stronger the incentives, the more aggressively it will be gamed."}, {"front": "What specific real-world event involving Wells Fargo is used as a prime example of Goodhart's Law?", "back": "The 2016 account scandal, where employees opened millions of unauthorized customer accounts due to intense pressure to meet targets for \"new accounts opened per customer,\" leading to massive fraud and fines."}, {"front": "What is the primary \"antidote\" or strategy to mitigate the effects of Goodhart's Law?", "back": "To not stop measuring, but to use multiple measures, rotate them, hold them loosely, and most importantly, never lose sight of the underlying reality the numbers are supposed to represent."}, {"front": "Goodhart's Law states: \"When a measure becomes a target, it ceases to be a good measure.\" What does \"ceases to be a good measure\" imply?", "back": "It implies that the measure no longer accurately reflects the reality it was intended to capture because people are now manipulating the measure itself instead of improving the underlying reality."}, {"front": "According to the text, what is the relationship between the strength of incentives and the corruption of a measure?", "back": "The stronger the incentives attached to the measure, the faster and more thoroughly it is corrupted."}, {"front": "What happens to the 'reality' when a measure becomes a target and is aggressively gamed?", "back": "The reality often moves in the opposite direction of what the numbers indicate, worsening even as the metrics appear to improve (e.g., patient outcomes worsen, customer satisfaction plummets)."}, {"front": "Is the ultimate message of Goodhart's Law to abandon all forms of measurement?", "back": "No, the text emphasizes that 'measurement is essential.' The goal is to understand how measures are corrupted and to use them wisely to prevent that corruption."}, {"front": "What is implied by 'holding measures loosely' as part of the antidote to Goodhart's Law?", "back": "It means not rigidly adhering to a single metric, being flexible with targets, and being prepared to adjust or discard measures when they show signs of being gamed or failing to reflect reality."}, {"front": "How does 'teaching to the test' specifically demonstrate Goodhart's Law?", "back": "Teachers prioritize drilling specific test formats and content (optimizing the test score, the measure) rather than fostering broader learning and critical thinking (the underlying reality), leading to potentially higher scores without true educational improvement."}, {"front": "Why is Goodhart's Law considered relevant in 'nearly every domain where humans try to manage complex systems with numbers'?", "back": "Because humans universally use numbers to manage systems, and whenever performance or decisions are tied to these numbers, the potential for Goodhart's Law to take effect and corrupt the measures is present across various domains."}, {"front": "What is the fundamental difference between a measure that works well and a measure that has become a corrupted target?", "back": "A measure works well when nobody is trying to manipulate it and it accurately captures reality. It becomes corrupted when it's used as a target, leading people to manipulate the number rather than the reality it represents."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
