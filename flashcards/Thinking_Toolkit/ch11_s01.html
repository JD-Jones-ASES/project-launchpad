<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 11, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Trolley Problem?", "back": "It is a thought experiment in modern moral philosophy, introduced by Philippa Foot and extended by Judith Jarvis Thomson, designed to explore ethical dilemmas involving tradeoffs between lives."}, {"front": "Describe the original Trolley Problem scenario.", "back": "A runaway trolley is heading toward five workers. You are next to a lever that can divert it to a side track where one worker stands. The choice is to do nothing (five die) or pull the lever (one dies, five are saved)."}, {"front": "What is the common intuition regarding the original Trolley Problem, and the initial justification?", "back": "Most people quickly say to pull the lever. The arithmetic suggests one death is better than five, and you are redirecting danger, not creating it."}, {"front": "What is the Doctrine of Double Effect?", "back": "A moral principle, rooted in medieval Catholic theology, that distinguishes between harm you intend and harm you merely foresee as a side effect of pursuing a good end."}, {"front": "How does the Doctrine of Double Effect apply to the original Trolley Problem?", "back": "Pulling the lever saves five people (intended effect); the death of the one worker is a foreseen but unintended consequence. Under this doctrine, the action is permissible."}, {"front": "Describe the Footbridge Variant of the Trolley Problem.", "back": "A runaway trolley is heading toward five workers. You are on a footbridge over the tracks, next to a very large man. If you push him off the bridge, his body will stop the trolley, saving the five workers, but he will die."}, {"front": "How does the common intuition in the Footbridge Variant differ from the original, despite the identical outcome?", "back": "Most people recoil from pushing the man, even though the arithmetic is the same (one life for five). It feels fundamentally different from pulling a lever."}, {"front": "Explain the 'Means vs. side effect' explanation for the differing intuitions.", "back": "In the lever case, the one worker's death is a side effect of diverting the trolley. In the footbridge case, the large man's death is the direct means by which the five are saved, making him a tool, which the doctrine of double effect prohibits."}, {"front": "Explain the 'Personal vs. impersonal force' explanation.", "back": "Pulling a lever feels mechanical and impersonal. Pushing a human being off a bridge requires physical contact and feels viscerally like killing, suggesting emotional response may drive the moral judgment."}, {"front": "What is the 'Contact Principle' in moral intuition?", "back": "It is the observation that people are more reluctant to cause harm when the action involves direct physical contact with the victim, suggesting intuitions track how harm is caused rather than just the outcome."}, {"front": "Describe the Transplant Surgeon Variant of the Trolley Problem.", "back": "A surgeon has five patients, each dying from a different organ failure. A healthy person enters for a routine checkup. The surgeon could kill this healthy person, harvest their organs, and save all five patients."}, {"front": "What is the common intuition regarding the Transplant Surgeon Variant, and what philosophical concept does it introduce?", "back": "Almost no one agrees the surgeon should proceed. This introduces the concept of 'rights,' arguing the healthy person has a right not to be killed, even if it produces a better outcome."}, {"front": "What is pure consequentialism, and how do the trolley problem variants challenge it?", "back": "Pure consequentialism is the view that the right action is the one that produces the best outcome. The variants, especially the Footbridge and Transplant cases, show that factors other than just outcomes (like rights or the means used) matter to our moral intuitions."}, {"front": "What is the difference between 'doing' and 'allowing' harm in moral judgments?", "back": "We judge actively causing harm more harshly ('doing') than passively allowing harm to occur ('allowing'), even if the outcome is identical. Pushing someone is 'doing'; pulling a lever feels closer to 'allowing' a path change."}, {"front": "What is deontological ethics, and which philosopher is most associated with it?", "back": "Deontological ethics (from Greek 'deon' meaning duty) holds that some actions are right or wrong regardless of their consequences. It holds that persons have inherent dignity and may not be used merely as means to others' ends, a principle most associated with Immanuel Kant."}, {"front": "According to neuroscience research (e.g., Joshua Greene), how do 'personal' vs. 'impersonal' moral dilemmas activate different brain regions?", "back": "'Personal' moral dilemmas (direct physical harm) activate emotional brain regions, while 'impersonal' dilemmas (pulling a lever) engage more calculating, utilitarian reasoning."}, {"front": "What is the primary power or significance of the Trolley Problem in philosophy?", "back": "Its power lies not in settling debates between consequentialism and deontology, but in making these abstract philosophical positions vivid and relatable as 'gut-level choices with human faces.'"}, {"front": "List three real-world applications where the Trolley Problem's logic is relevant.", "back": "1. Autonomous vehicles (choosing between hitting one pedestrian vs. a group).\n2. Medical triage (allocating scarce resources like ventilators).\n3. Military decisions (collateral damage in bombing military targets).\n4. Public policy (speed limits, pollution regulations involving tradeoffs)."}, {"front": "What does the Trolley Problem ultimately reveal about our moral judgments?", "back": "It reveals that our moral judgments are not driven by a single principle. We care about outcomes, but also about how those outcomes are produced—whether harm is a side effect or a means, personal or impersonal, and whether rights are violated."}, {"front": "Who was Philippa Foot and what was her key contribution to moral philosophy?", "back": "A British moral philosopher (1920–2010), best known for introducing the trolley problem in 1967. Her larger contribution was a revival of virtue ethics, focusing on character and human flourishing."}, {"front": "Who was Judith Jarvis Thomson and what was her key contribution to the Trolley Problem?", "back": "An American philosopher (1929–2020) known for vivid thought experiments. She sharpened the dilemma with devastating variations like the footbridge variant, shifting philosophical conversations."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
