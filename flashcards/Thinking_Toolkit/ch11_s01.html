<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 11, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core scenario presented in the \"Drowning Child\" thought experiment?", "back": "You are walking past a shallow pond and notice a small child drowning. You could easily save them, but it would ruin your expensive new shoes and make you late for a meeting."}, {"front": "What is the immediate moral judgment regarding saving the drowning child in the initial scenario?", "back": "The answer is obviously yes. No pair of shoes or meeting is worth a child's life; anyone who kept walking would be regarded as morally monstrous."}, {"front": "Who is the philosopher associated with the \"Drowning Child\" argument and its implications?", "back": "Peter Singer, an Australian moral philosopher."}, {"front": "In which influential 1972 paper did Peter Singer first present his argument related to the drowning child?", "back": "\"Famine, Affluence, and Morality.\""}, {"front": "State Peter Singer's core ethical principle as paraphrased from his 1972 paper.", "back": "If it is in our power to prevent something very bad from happening, without thereby sacrificing anything of comparable moral importance, we ought to do it."}, {"front": "How does Singer connect the moral obligation to save a nearby drowning child to the obligation to help distant suffering children?", "back": "He argues that if you would save the drowning child, you are logically committed to preventing distant suffering (e.g., from malaria or malnutrition) by donating to effective charities, as the cost to you is far less than a child's life."}, {"front": "According to Singer, does geographical distance change one's moral obligation?", "back": "No, Singer argues that distance does not change the moral calculus; a child dying of malaria in a distant country is just as dead as a child drowning at your feet."}, {"front": "What is the \"identifiable victim effect\"?", "back": "A psychological phenomenon where people respond more strongly to specific, visible individuals (identified victims) than to abstract statistics or large numbers of unknown victims."}, {"front": "How does \"identifiability\" explain why people feel less obligated to distant suffering children?", "back": "The drowning child is a specific, visible individual, while distant children are often perceived as statistics, making the plight of the latter less emotionally impactful."}, {"front": "How do \"proximity and certainty\" influence perceived moral obligation in the context of global suffering?", "back": "You can see the nearby drowning child and know your action will save them. Donating to a charity for distant children involves uncertainty about whether the money will reach the right people or be used effectively."}, {"front": "Explain \"diffusion of responsibility\" as a reason why people might feel less obligated to help distant children.", "back": "For the drowning child, you are the only one who can save them. For global issues, millions could donate, leading individuals to feel less obligated because responsibility is shared among many."}, {"front": "What role do \"effort and directness\" play in differing moral feelings between nearby and distant suffering?", "back": "Saving the drowning child is a single, concrete action, whereas addressing global poverty requires sustained, more abstract commitment."}, {"front": "How does Singer respond to the psychological differences people cite for not helping distant children?", "back": "He acknowledges these psychological differences but argues they are not morally relevant. Our feelings may simply reflect the limits of our evolved psychology, not actual moral obligation."}, {"front": "What is the highly demanding logical conclusion of Singer's 1972 argument regarding how much one must give to prevent suffering?", "back": "One should keep giving until the marginal cost to oneself equals the marginal benefit to others, which for a typical middle-class person implies donating the vast majority of one's income."}, {"front": "How did Singer moderate his practical recommendation in his 2009 book, *The Life You Can Save*?", "back": "He proposed a more achievable standard: a sliding scale of giving based on income, starting at roughly one percent for modest earners and rising for the wealthy."}, {"front": "What fundamental tension in moral theory does Singer's argument reveal regarding personal obligations?", "back": "It reveals a tension between impartiality (treating everyone's interests equally) and partiality (giving special weight to those closest to you, like family)."}, {"front": "What ethical movement did Peter Singer's arguments about our obligations to the global poor help to philosophically found?", "back": "The effective altruism movement."}, {"front": "Besides global poverty, what other significant area of ethics is Peter Singer known for?", "back": "Animal ethics, particularly with his work *Animal Liberation* (1975), which helped launch the modern animal rights movement."}, {"front": "What remains one of the deepest unsettled problems in ethics, as highlighted by Singer's argument?", "back": "The question of how demanding morality can reasonably be."}, {"front": "What is the author's overall conclusion about whether distance changes moral obligation, based on Singer's argument?", "back": "Consistency seems to require that helping distant suffering at modest cost is equivalent to saving a nearby drowning child. Psychological differences explain why we *feel* different, but may not *justify* different obligations."}, {"front": "What types of moral theories are challenged by Singer's demanding conclusion that we should give most of our income?", "back": "Moral theories that emphasize individual rights, the pursuit of personal projects, or a strong preference for one's own family and life plans (partiality)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
