    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 25, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who discovered Russell's Paradox and in what year?", "back": "Bertrand Russell, in 1901."}, {"front": "What was the prevailing belief about the foundations of mathematics before Russell's Paradox?", "back": "Mathematicians believed set theory, based on the idea that any collection satisfying a defining property formed a set (na\"ive set theory), provided an unshakeable foundation for all of mathematics."}, {"front": "What is 'na\"ive set theory'?", "back": "Na\"ive set theory is the intuitive idea that any collection of objects satisfying a clearly defined property can form a set."}, {"front": "To whom did Russell communicate his paradox, and what was the immediate impact on that person's work?", "back": "He communicated it to Gottlob Frege in 1902, just as Frege was publishing his foundational work. Frege recognized that the paradox undermined his entire project."}, {"front": "State the core question Russell asked that led to the paradox.", "back": "Does the set of all sets that do not contain themselves, contain itself?"}, {"front": "Define the paradoxical set, R, in Russell's Paradox.", "back": "R is defined as 'the set of all sets that do not contain themselves.' (Formally: R = {x : x ∉ x})."}, {"front": "Explain the contradiction if the set R (of all sets that do not contain themselves) *does* contain itself.", "back": "If R contains itself, then by its definition (as a set of sets that do *not* contain themselves), it must *not* contain itself. This is a contradiction."}, {"front": "Explain the contradiction if the set R (of all sets that do not contain themselves) *does not* contain itself.", "back": "If R does not contain itself, then it satisfies its own defining property (being a set that does not contain itself), so it *must* be a member of itself. This is a contradiction."}, {"front": "What axiom of na\"ive set theory does Russell's Paradox expose as inconsistent?", "back": "The Axiom of Unrestricted Comprehension, which states that for any property P, there exists a set S = {x : P(x)} containing exactly those objects satisfying P."}, {"front": "What was the primary consequence of Russell's Paradox for the foundations of mathematics?", "back": "It shattered the foundations of na\"ive set theory and forced a complete reconstruction of mathematical logic and set theory."}, {"front": "How was set theory rebuilt to resolve Russell's Paradox?", "back": "Na\"ive set theory was replaced with axiomatic systems, most notably Zermelo-Fraenkel (ZF) set theory, which carefully restrict which collections count as legitimate sets."}, {"front": "What happened to the Axiom of Unrestricted Comprehension in the reconstructed set theory?", "back": "It was abandoned. Instead, axioms like Separation and Replacement were introduced, allowing formation of subsets from existing sets but not arbitrary new sets based solely on a defining condition."}, {"front": "What is the standard foundational system for mathematics today, resulting from this reconstruction?", "back": "Zermelo-Fraenkel set theory with the Axiom of Choice (ZFC)."}, {"front": "What philosophical lesson did Russell's Paradox teach about the foundations of rigorous disciplines like mathematics?", "back": "It demonstrated that seemingly obvious principles can harbor hidden contradictions, and that the foundations of even the most rigorous disciplines are more fragile than they appear."}, {"front": "Beyond the paradox, what other major contribution did Bertrand Russell make to logic and mathematics?", "back": "His work with Alfred North Whitehead on 'Principia Mathematica' (1910–1913), attempting to derive all of mathematics from logical axioms."}, {"front": "What did Russell famously say about the impact of his paradox on his early career?", "back": "He described it as a blow that 'put an end to the logical honeymoon' of his early career."}, {"front": "What does the 'Set That Cannot Exist' concept highlight about na\"ive set theory?", "back": "It highlights that na\"ive set theory is internally inconsistent because the set of all sets that do not contain themselves leads to an unavoidable contradiction."}, {"front": "Give a real-world analogy for Russell's Paradox related to classification systems.", "back": "A library catalog that lists all books: is the catalog itself listed in the catalog? Or a list of all lists that do not list themselves."}, {"front": "What is the general solution whenever Russell's Paradox (or its variants) appears in practical classification or self-referential systems?", "back": "Impose restrictions on self-reference."}, {"front": "Name another paradox that involves self-reference in language, similar to Russell's Paradox.", "back": "The Liar Paradox ('This statement is false.')."}, {"front": "Name a proof technique that *harnesses* self-reference, rather than being crippled by it, as mentioned in the 'connections' section.", "back": "Gödel's Incompleteness Theorems."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
