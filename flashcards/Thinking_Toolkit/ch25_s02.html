<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 25, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core statement of the Liar Paradox?", "back": "The core statement is 'This sentence is false.'"}, {"front": "To whom is the Liar Paradox primarily attributed, and from what historical period?", "back": "It is attributed to Eubulides of Miletus, from the 4th century BC."}, {"front": "How does the Liar Paradox unfold if you assume the sentence 'This sentence is false' is true?", "back": "If 'This sentence is false' is true, then what it says must be the case, meaning it is false. So, if true, it is false."}, {"front": "How does the Liar Paradox unfold if you assume the sentence 'This sentence is false' is false?", "back": "If 'This sentence is false' is false, then what it says (that it is false) is not the case, meaning it is true. So, if false, it is true."}, {"front": "Is the Liar Paradox a mere riddle or a genuine logical problem?", "back": "It is a genuine logical problem that has resisted definitive resolution for over two millennia, exposing deep tensions in concepts of truth, meaning, and language."}, {"front": "Why is the Liar Paradox considered important in logic and mathematics?", "back": "It demonstrates the limits of formal reasoning and motivated Kurt Gödel's incompleteness theorems, which used a similar self-referential structure."}, {"front": "How does the 'Epimenides Paradox' (e.g., 'All Cretans are liars' by a Cretan) differ from the pure Liar Paradox?", "back": "The Epimenides version is not strictly paradoxical because the speaker could be lying about all Cretans while some Cretans tell the truth. The pure Liar Paradox is a single sentence directly asserting its own falsehood."}, {"front": "What was Alfred Tarski's proposed solution to the Liar Paradox in the 1930s?", "back": "Tarski argued for a hierarchy of languages, stating that a language cannot consistently contain its own truth predicate. Truth is always defined in a metalanguage at a higher level."}, {"front": "What is the main limitation of Tarski's hierarchy of languages when applied to natural languages?", "back": "Natural languages like English clearly contain their own truth predicate, and Tarski's hierarchy doesn't fully explain how everyday language functions despite this."}, {"front": "What is paraconsistent logic, and how does it approach the Liar Paradox?", "back": "Paraconsistent logic accepts that the Liar sentence is both true and false simultaneously, building logical systems that tolerate contradictions without collapsing into total incoherence."}, {"front": "What is the principle 'ex falso quodlibet' in classical logic, and how do paraconsistent logics deal with it?", "back": "'Ex falso quodlibet' (from falsehood, anything follows) states that a single contradiction allows proving anything. Paraconsistent logics block this explosive step."}, {"front": "What is Dialethism, and who is a prominent philosopher associated with it?", "back": "Dialethism, championed by Graham Priest, is a bolder version of paraconsistent logic that holds some contradictions are genuinely true, meaning the Liar sentence really is both true and false."}, {"front": "What is the 'dismissal' approach to the Liar Paradox?", "back": "Some philosophers argue the Liar sentence is simply meaningless because it fails to express a proposition, despite appearing grammatically well-formed and meaningful."}, {"front": "What key logical concept, combined with negation, is at the heart of the Liar Paradox and other related paradoxes?", "back": "Self-reference is the key concept."}, {"front": "How does 'This sentence is not true' compare to 'This sentence is false'?", "back": "They lead to essentially the same paradox. If 'not true' means false, then it is identical. If 'not true' allows for a third truth value (neither true nor false), it creates a similar oscillation."}, {"front": "If we introduce a third truth option (neither true nor false) for the Liar sentence, what new version of the paradox might arise?", "back": "A new version like 'This sentence is either false or neither true nor false' could arise, as it would still lead to an oscillation if assigned any of the three values."}, {"front": "Name two other famous paradoxes mentioned that involve self-reference, besides the Liar.", "back": "Russell's Paradox (in set theory) and The Unexpected Hanging Paradox (knowledge and time)."}, {"front": "What does the continuous discussion of the Liar Paradox for over 2,300 years suggest about its nature?", "back": "It suggests that it is not a mere trick or riddle, but a fundamental and unresolved challenge to our understanding of truth, language, and logic."}, {"front": "In what specific way did Kurt Gödel utilize the structure of the Liar Paradox?", "back": "He used a version of its self-referential structure to prove his incompleteness theorems, demonstrating inherent limitations in formal axiomatic systems."}, {"front": "Why is it problematic in classical logic for a system to allow self-referential statements that lead to contradictions?", "back": "In classical logic, a single contradiction (like the Liar) allows proving anything at all ('ex falso quodlibet'), leading to the entire system collapsing into incoherence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
