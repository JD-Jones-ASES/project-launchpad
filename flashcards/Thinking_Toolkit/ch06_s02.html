<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who identified the Dunning-Kruger effect and in what publication?", "back": "David Dunning and Justin Kruger, in their 1999 paper 'Unskilled and Unaware of It,' published in the Journal of Personality and Social Psychology.", "id": "fc01"}, {"front": "What types of tasks were used in Dunning and Kruger's 1999 study to test participants?", "back": "Logical reasoning, grammar, and humor tests.", "id": "fc02"}, {"front": "How did the lowest-performing participants (bottom quartile) in Dunning and Kruger's study estimate their performance?", "back": "They dramatically overestimated their performance, believing they performed better than roughly two-thirds of their peers.", "id": "fc03"}, {"front": "How did the highest-performing participants (top quartile) in Dunning and Kruger's study estimate their performance?", "back": "They consistently underestimated their performance.", "id": "fc04"}, {"front": "Define the Dunning-Kruger effect.", "back": "It is a cognitive bias where people with low ability in a domain tend to dramatically overestimate their competence, while people with high ability tend to modestly underestimate theirs.", "id": "fc05"}, {"front": "What is the core mechanism explaining why incompetent individuals overestimate their abilities?", "back": "The skills required to produce correct answers in a domain are the same skills required to recognize correct answers. Lacking the skill prevents them from recognizing their own incompetence ('unskilled and unaware of it').", "id": "fc06"}, {"front": "How is the Dunning-Kruger effect linked to metacognition?", "back": "It's a problem of metacognition (thinking about thinking). To know how good you are, you need a mental model of 'good,' which requires the domain expertise you do not yet have, creating a cognitive catch-22.", "id": "fc07"}, {"front": "What is the 'cognitive catch-22' for individuals experiencing the Dunning-Kruger effect?", "back": "You need the skill to recognize that you lack the skill. Without the expertise, you cannot accurately build the mental model needed to assess your own competence.", "id": "fc08"}, {"front": "What did Dunning and Kruger's experiments reveal as the 'cure' for overconfidence in low-performing participants?", "back": "Genuine competence. When low-performing participants received training that improved their actual skills, their self-assessments became more accurate.", "id": "fc09"}, {"front": "What is the primary reason highly competent individuals tend to underestimate their abilities?", "back": "Experts find certain tasks easy and incorrectly assume others do too. They project their own ease onto others, leading to the false assumption that their skills are common rather than exceptional.", "id": "fc10"}, {"front": "Summarize the key insight about the relationship between skill and self-assessment in the Dunning-Kruger effect.", "back": "The skills to produce good work are the same skills to recognize good work. Incompetence prevents self-awareness of errors, while high skill can lead to underestimation by assuming commonality.", "id": "fc11"}, {"front": "What is a common misuse of the Dunning-Kruger effect in popular culture?", "back": "Calling someone 'a Dunning-Kruger case' as an insult, or diagnosing it in a single individual from a single conversation. It is a statistical tendency, not a universal law for individual diagnosis.", "id": "fc12"}, {"front": "What is the irony sometimes involved in confidently declaring someone else is suffering from the Dunning-Kruger effect?", "back": "Such a confident declaration, made without careful examination, might itself be an example of overconfidence about one's ability to judge others, potentially demonstrating the effect.", "id": "fc13"}, {"front": "Describe the predictable arc of self-confidence for new employees or students learning a new skill, as it relates to the Dunning-Kruger effect.", "back": "Initial overconfidence (unaware of what they don't know), followed by a 'valley of despair' (learning enough to recognize the gap), then gradually increasing competence and more calibrated confidence.", "id": "fc14"}, {"front": "What is the 'conscious incompetence' phase in learning, and why is it significant?", "back": "It's the painful but necessary phase where learners realize how much they don't know. It signifies a transition from 'unskilled and unaware' to 'unskilled but aware,' which is crucial for growth.", "id": "fc15"}, {"front": "How does the Dunning-Kruger effect manifest in online discourse?", "back": "Social media gives everyone a platform, often leading people who are most confident in their opinions, but least qualified, to post extensive commentary. They lack the expertise to recognize their own errors.", "id": "fc16"}, {"front": "Which related concept describes the discipline of knowing the boundary of your own expertise?", "back": "The Circle of Competence.", "id": "fc17"}, {"front": "Which related cognitive bias describes experts forgetting what it's like not to know something, and how does it relate to the Dunning-Kruger effect?", "back": "The Curse of Knowledge. It relates to how competent people underestimate by assuming others find things as easy as they do, forgetting their past lack of knowledge.", "id": "fc18"}, {"front": "How can Confirmation Bias interact with the Dunning-Kruger effect?", "back": "Confirmation bias (selectively gathering evidence that supports existing beliefs) can reinforce inflated self-assessments in individuals, making them even less likely to recognize their incompetence.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
