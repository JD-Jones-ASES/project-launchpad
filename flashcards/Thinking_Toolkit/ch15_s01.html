<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'Cobra Effect' named after?", "back": "An apocryphal episode during British colonial rule in India, involving a bounty on cobras."}, {"front": "Who is widely attributed with popularizing the term 'Cobra Effect'?", "back": "Economist Horst Siebert in his 2001 book 'Der Kobra-Effekt'."}, {"front": "Describe the British colonial government's initial problem and solution in Delhi regarding cobras.", "back": "Problem: Too many venomous cobras. Solution: Offered a bounty for every dead cobra brought to authorities."}, {"front": "What was the initial, short-term result of the cobra bounty program in Delhi?", "back": "People killed cobras, collected rewards, and the cobra population initially declined."}, {"front": "What unexpected behavior emerged among residents in response to the cobra bounty?", "back": "Enterprising residents began breeding cobras specifically to kill them and collect the bounty, rather than hunting wild ones."}, {"front": "What happened when the British government discovered the cobra farms and cancelled the bounty program?", "back": "The breeders, left with large stocks of now-worthless cobras, released them into the streets."}, {"front": "What was the ultimate outcome of the Delhi cobra bounty program?", "back": "The cobra population ended up larger than it was before the program began."}, {"front": "How did the French colonial administration in Hanoi attempt to control the rat population?", "back": "They offered a bounty for rat tails, to avoid having piles of dead rats delivered to offices."}, {"front": "What 'entrepreneurial' tactic did residents of Hanoi adopt in response to the rat tail bounty?", "back": "They caught rats, cut off their tails to collect the bounty, and then released the rats alive to breed more."}, {"front": "What unusual sights became common in Hanoi due to the rat tail bounty?", "back": "Tailless rats were spotted throughout the city, and some residents even imported rats from the countryside to increase their supply."}, {"front": "The Cobra Effect is a specific and vivid instance of what broader phenomenon?", "back": "Perverse incentives."}, {"front": "Define 'perverse incentive'.", "back": "An incentive that produces the opposite of its intended effect."}, {"front": "Explain the underlying mechanism of a perverse incentive.", "back": "The policy targets a proxy (e.g., dead cobras, rat tails) rather than the actual goal (fewer cobras, fewer rats), leading clever agents to produce the proxy without achieving or even undermining the goal."}, {"front": "Provide a modern example of a perverse incentive in healthcare.", "back": "When hospitals are penalized for high patient mortality rates, some respond by avoiding the sickest patients, improving statistics but potentially worsening overall healthcare."}, {"front": "How can standardized test scores lead to a perverse incentive in education?", "back": "Schools evaluated by test scores may narrow their curriculum to focus exclusively on tested material, sacrificing broader education for better numbers."}, {"front": "In software development, how can measuring developers by lines of code written create a perverse incentive?", "back": "Developers might write unnecessarily verbose code to inflate their line count, rather than focusing on efficiency or quality."}, {"front": "Summarize the core pattern of perverse incentives (Cobra Effect).", "back": "An incentive designed for a desired outcome produces a measurable proxy, which then becomes the target and is gamed, often in ways that actively undermine the original goal."}, {"front": "According to the text, what crucial question should be asked when designing incentives, beyond 'What behavior does this incentive reward?'", "back": "'What other behaviors does it also reward?'"}, {"front": "What is a 'welfare cliff' and why is it considered a perverse incentive?", "back": "It's when social benefit programs phase out abruptly at an income threshold, causing a large loss of benefits for earning a small amount more, thus penalizing the very behavior (earning more) the program should encourage."}, {"front": "How can environmental regulations sometimes lead to 'carbon leakage'?", "back": "Regulations penalizing emissions at a specific facility may cause companies to move production to unregulated regions rather than reduce total emissions."}, {"front": "In academic publishing, what perverse incentive can arise from evaluating researchers by the number of papers they publish?", "back": "It favors many small papers over fewer, more significant works, causing the goal (advancing knowledge) to diverge from the metric (publication count)."}, {"front": "Does the Cobra Effect mean that all incentives are inherently flawed or backfire?", "back": "No, most well-designed incentive systems work reasonably well. The Cobra Effect is a warning about a specific failure mode."}, {"front": "When is the Cobra Effect most likely to occur?", "back": "When the metric (proxy) can be gamed more cheaply or easily than the actual goal can be achieved."}, {"front": "What is the recommended 'antidote' to the Cobra Effect when designing incentives?", "back": "To design them with an 'adversarial mindset'."}, {"front": "What question best embodies an 'adversarial mindset' in incentive design?", "back": "'If someone wanted to hit this target without achieving the actual goal, how would they do it?'"}, {"front": "Which related concepts are mentioned in connection to the Cobra Effect?", "back": "Goodhart's Law (measures corrupted when targets), Incentives (Munger's broader framework), and The Law of Unintended Consequences (systemic roots of policy surprises)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
