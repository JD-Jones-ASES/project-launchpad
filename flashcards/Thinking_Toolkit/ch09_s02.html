<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of Plato's Allegory of the Cave?", "back": "It is a philosophical parable about the nature of reality, the process of education, and the social cost of perceiving truth clearly."}, {"front": "Describe the initial conditions of the prisoners in Plato's Cave.", "back": "They have been chained inside a cave since birth, facing a blank wall, observing only shadows cast by objects carried by people behind them, illuminated by a fire."}, {"front": "What do the shadows on the wall represent to the chained prisoners?", "back": "The shadows constitute their entire reality. They name them, study their patterns, and become experts in predicting their appearance, believing this makes them wise."}, {"front": "What is the freed prisoner's initial experience when dragged out of the cave?", "back": "The sunlight is intensely blinding and painful, making it impossible for him to see anything at first."}, {"front": "What realization does the freed prisoner come to upon seeing real objects outside the cave?", "back": "He realizes that the shadows he once knew were mere projections, and the real objects represent a deeper, more fundamental reality."}, {"front": "What does the 'sun' symbolize in Plato's Allegory of the Cave?", "back": "The sun symbolizes the ultimate source of light, visibility, and understanding, often interpreted as the Form of the Good or absolute truth."}, {"front": "What happens when the freed prisoner returns to the cave and tries to explain his experience?", "back": "The other prisoners mock him, claim his eyes are ruined, and dismiss his journey as worthless or dangerous. Plato suggests they would even kill him if he tried to free them."}, {"front": "At its most basic level, what does Plato's Allegory of the Cave illustrate about education?", "back": "It describes education as a difficult and painful process of transitioning from a state of comfortable ignorance to uncomfortable but genuine knowledge."}, {"front": "In the context of the allegory, what do the 'chains' binding the prisoners symbolize?", "back": "The chains represent habits of thought, unexamined assumptions, and inherited cultural opinions that individuals mistakenly accept as truth."}, {"front": "What is Plato's central metaphysical claim presented through the Allegory of the Cave?", "back": "The physical world we perceive through our senses (the shadows) is an imperfect representation of a higher, unchanging reality (the Forms), which can only be accessed and understood through reason."}, {"front": "What does the 'deeper level' of the allegory explore regarding appearance and reality?", "back": "It explores the relationship where our perceived reality (appearances) is an imperfect representation, not identical to, a more fundamental and true reality."}, {"front": "What is the 'most urgent level' of meaning conveyed by Plato's Allegory of the Cave?", "back": "It highlights the social cost of truth: those who achieve clearer insight often face ridicule, hostility, and even violence from those who prefer comfortable illusions."}, {"front": "How does the allegory implicitly allude to the fate of Plato's teacher, Socrates?", "back": "Plato's comment about the prisoners wanting to kill anyone who tries to free them directly references the execution of Socrates, who challenged Athenian citizens' assumptions."}, {"front": "Name three enduring ideas illustrated by Plato's Cave.", "back": "(1) Much of what we take for reality is a projection or shadow; (2) Genuine education requires abandoning comfortable illusions and is often painful; (3) Those who see more clearly often face hostility."}, {"front": "Who was Plato, and what were his key relationships and contributions?", "back": "Plato was an Athenian philosopher, student of Socrates, teacher of Aristotle, and founder of the Academy. His 'Theory of Forms' profoundly shaped Western philosophy."}, {"front": "What is Plato's 'Theory of Forms' as reflected in the Cave allegory?", "back": "It is the belief that the physical world is an imperfect, changing copy of a higher, eternal, and unchanging reality (the Forms), which is only accessible through rational thought."}, {"front": "In which of Plato's influential works does the Allegory of the Cave appear?", "back": "The Allegory of the Cave is found in Book VII of Plato's *Republic*, arguably his most influential work of political and moral philosophy."}, {"front": "Provide a real-world example of how the 'social cost of truth' from Plato's Cave can manifest today.", "back": "Whistleblowers who expose institutional corruption often face retaliation and dismissal, not because their claims are false, but because the institution prefers to maintain its 'shadow-world' than confront uncomfortable truths."}, {"front": "How does the Allegory of the Cave relate to scientific 'paradigm shifts'?", "back": "It illustrates how established scientific communities, invested in old frameworks, may dismiss or ridicule scientists who challenge existing paradigms with new ways of seeing, much like the prisoners rejecting the freed traveler."}, {"front": "Why is the process of genuine education described as 'painful' in Plato's allegory?", "back": "It is painful because it requires abandoning deeply held beliefs, comfortable illusions, and inherited opinions, leading to a period of disorientation and discomfort before new understanding solidifies."}, {"front": "What distinction does Plato draw between the 'wisdom' of the cave-dwellers and true understanding?", "back": "The cave-dwellers possess a limited 'wisdom' based on predicting shadows within their illusory reality, whereas true understanding comes from comprehending the deeper, actual reality outside the cave."}, {"front": "What does the freed prisoner's initial inability to see clearly upon returning to the cave symbolize?", "back": "It symbolizes the disorientation and difficulty of re-engaging with comfortable illusions after having glimpsed a deeper truth, often misinterpreted as foolishness or impairment by those who remain ignorant."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
