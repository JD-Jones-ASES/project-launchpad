    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 15, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary concept described by the Red Queen Effect?", "back": "In competitive environments, continuous improvement is required merely to maintain one's current position, as standing still means falling behind relative to actively adapting competitors."}, {"front": "Who formalized the 'Red Queen hypothesis' and applied it to evolutionary biology?", "back": "Leigh Van Valen, in 1973."}, {"front": "What literary work inspired the name 'Red Queen Effect'?", "back": "Lewis Carroll's *Through the Looking-Glass* (1871)."}, {"front": "Explain the core idea of the Red Queen Effect using the quote from Lewis Carroll.", "back": "The Red Queen tells Alice, 'it takes all the running you can do, to keep in the same place.' This illustrates that in competitive systems, constant effort is required just to maintain status quo relative to others."}, {"front": "According to the Red Queen hypothesis in biology, what happens if a species stops adapting?", "back": "It falls behind relative to interacting species and eventually goes extinct."}, {"front": "How does the Red Queen Effect challenge the idea of evolution as a 'climb toward perfection'?", "back": "It posits that evolution is a 'race with no finish line,' where species must continuously adapt just to maintain fitness, rather than striving for an ultimate perfect state."}, {"front": "Provide a biological example of the Red Queen Effect.", "back": "Cheetahs evolving to run faster, requiring gazelles to also evolve to run faster to evade predation; or bacteria developing antibiotic resistance, necessitating new antibiotics."}, {"front": "How does the Red Queen Effect manifest in competitive markets?", "back": "Companies must continuously innovate (e.g., in products, costs, marketing) just to maintain their market share, as competitors are also improving and raising the competitive bar."}, {"front": "Describe how credential inflation exemplifies the Red Queen Effect.", "back": "As more people obtain higher degrees (e.g., bachelor's), the competitive advantage of that degree erodes, requiring even higher degrees (e.g., master's) to achieve the same relative position in the job market, at greater cost."}, {"front": "Give an example of the Red Queen Effect in military competition.", "back": "The Cold War arms race, where superpowers amassed thousands of nuclear warheads; both ran faster, but neither was ultimately safer due to mutual escalation."}, {"front": "How does corporate R&D illustrate the Red Queen Effect?", "back": "Technology companies invest billions in research and development, much of which serves only to match competitors' advances and avoid falling behind, rather than gaining a lasting, absolute competitive edge."}, {"front": "Why is the Red Queen Effect considered 'insidious'?", "back": "Because individual actors behave rationally (e.g., a company investing in R&D, a student pursuing an advanced degree), yet the collective outcome is an exhausting arms race where relative positions remain unchanged, but vast resources are consumed."}, {"front": "What is the 'tragedy' associated with the Red Queen Effect?", "back": "The tragedy is that the structure of competition ensures that good individual decisions can produce exhausting collective outcomes, consuming enormous resources while leaving everyone's relative position roughly unchanged."}, {"front": "In the context of the Red Queen Effect, what happens when all competitors escalate?", "back": "The individual gains from escalation often cancel out, but the costs (e.g., resources, effort) remain, leading to a situation where everyone is running harder but not getting ahead in relative terms."}, {"front": "Does the Red Queen Effect imply that all competition is futile?", "back": "No, it describes the baseline condition of competition—the continuous effort required just to maintain position. Genuine breakthroughs or radically different strategies can still change the landscape."}, {"front": "What is the fundamental difference between how organisms run in nature versus running against a 'fixed finish line'?", "back": "In nature (Red Queen Effect), organisms run against each other, meaning the competitive 'finish line' itself is constantly moving due to competitors' adaptations, requiring continuous effort just to maintain relative position."}, {"front": "How does the Red Queen Effect relate to the concept of 'fitness' in evolutionary biology?", "back": "It proposes that species must continuously adapt simply to maintain their fitness *relative* to the species they interact with, rather than achieving an absolute or fixed level of fitness."}, {"front": "What is the collective outcome when individual actors behave rationally under the Red Queen Effect?", "back": "An 'arms race' that consumes enormous resources (time, money, effort) but leaves everyone's relative position roughly unchanged."}, {"front": "What does 'standing still is falling behind' mean in the context of the Red Queen Effect?", "back": "It means that in a dynamic, competitive environment where others are constantly improving, merely maintaining one's current state is insufficient; one will inevitably lose ground relative to the advancing competitors."}, {"front": "How does the Red Queen Effect highlight that evolution is not necessarily a linear path to absolute improvement?", "back": "It shows that much of evolutionary effort is spent on maintaining an existing competitive balance and avoiding extinction, rather than achieving new, absolute levels of 'perfection' or superiority."}, {"front": "What concept describes a situation where individual rationality leads to collective waste, similar to the Red Queen Effect?", "back": "The Tragedy of the Commons, where individual actors pursuing their own self-interest deplete a shared resource, ultimately harming everyone."}, {"front": "What is the relationship between the Red Queen Effect and 'escalation' as described in the chapter title?", "back": "The Red Queen Effect explains why competitive environments lead to continuous escalation—each participant must increase their efforts just to maintain their relative position, even if it leads to no absolute gain or improvement in overall safety/well-being."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
