<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Dunbar's Number?", "back": "Approximately 150, representing the maximum number of stable social relationships an individual can genuinely know and maintain, characterized by personal knowledge, trust, and awareness of their connections.", "id": "fc01"}, {"front": "Who proposed Dunbar's Number and in what year?", "back": "Robin Dunbar, a British anthropologist, proposed it in 1992.", "id": "fc02"}, {"front": "How did Robin Dunbar initially derive his prediction for human group size?", "back": "He extrapolated from the consistent relationship between neocortex size and social group size observed in other primates to predict a natural group size for humans.", "id": "fc03"}, {"front": "What part of the brain is central to Dunbar's theory, and what is its role?", "back": "The neocortex, which is responsible for complex thought and social processing. Dunbar found its size correlates with social group size in primates.", "id": "fc04"}, {"front": "How do primate neocortex size and social group size vary between chimpanzees and gorillas?", "back": "Chimpanzees, with larger neocortices, form groups of about 50, while gorillas, with smaller neocortices, form groups of about 10.", "id": "fc05"}, {"front": "What is the primary cognitive mechanism that limits the number of genuine social relationships a human can maintain?", "back": "Maintaining genuine social relationships requires extensive 'social bookkeeping'—tracking personalities, histories, and inter-group relationships. This is cognitively expensive, and the human brain's capacity for it is limited to about 150 relationships.", "id": "fc06"}, {"front": "How do human groups typically function when their size is below Dunbar's Number?", "back": "They operate on personal knowledge, informal trust, gossip, and reputation for social control and conflict resolution, as everyone knows each other well.", "id": "fc07"}, {"front": "What happens to group dynamics and structure when a group exceeds Dunbar's Number?", "back": "Personal knowledge and informal trust break down. Groups must then substitute formal structures like written rules, hierarchies, job titles, and bureaucratic procedures to maintain cohesion.", "id": "fc08"}, {"front": "Provide two examples of historical or anthropological evidence supporting Dunbar's Number.", "back": "Neolithic farming villages typically had 150–200 inhabitants. Roman military companies (centuriae) comprised about 160 soldiers. Hutterite communities deliberately split near 150 members.", "id": "fc09"}, {"front": "What modern proxy for personal social networks has been used to confirm Dunbar's Number?", "back": "Studies of average personal social networks, measured through proxies like Christmas card lists, consistently cluster around 150 contacts.", "id": "fc10"}, {"front": "Describe the typical organizational shift observed when a startup grows from 30 people to 200, according to Dunbar's Number.", "back": "A startup at 30 functions well with informal communication and personal relationships. At 200, informal mechanisms struggle, replaced by formal meetings, memos, and management layers, shifting the culture from personal to institutional.", "id": "fc11"}, {"front": "Is the transition to formal organizational structures above Dunbar's Number a sign of bad leadership?", "back": "No, it is a necessary adaptation to the cognitive limits of human social processing, a 'cognitive wall' inherent in the human brain. While bad leadership can worsen it, it's not the cause.", "id": "fc12"}, {"front": "How does Dunbar's Number apply to the structure of military units?", "back": "Most modern army companies comprise 100–200 soldiers, as units of this size can be commanded through personal leadership. Larger formations inherently require hierarchical command structures.", "id": "fc13"}, {"front": "How have some corporate teams, like W. L. Gore, applied the concept of Dunbar's Number?", "back": "They cap facility size at roughly 150 employees, creating new facilities instead of expanding existing ones, to preserve informal communication and personal relationships.", "id": "fc14"}, {"front": "How does Dunbar's Number manifest in social media interactions?", "back": "Despite having hundreds or thousands of 'friends' or 'followers,' studies show people actively interact with only around 150 contacts; the rest are passive connections without real social content.", "id": "fc15"}, {"front": "Is Dunbar's Number a precise, unvarying constant for all individuals and situations?", "back": "No, it's an approximation. There's significant individual variation, and the '150' specifically refers to a certain type of 'casual friend' relationship.", "id": "fc16"}, {"front": "Explain Dunbar's concept of 'concentric circles' of relationships.", "back": "Dunbar describes layers of social intimacy: about 5 intimate friends, 15 close friends, 50 good friends, 150 casual friends, 500 acquaintances, and 1,500 people one can recognize.", "id": "fc17"}, {"front": "What is the 'Cognitive Ceiling on Social Relationships' and its implication for organizations?", "back": "It refers to the human brain's limit of approximately 150 stable social relationships based on personal knowledge and trust. Beyond this, organizations require formal institutions (hierarchies, rules, bureaucracy) to maintain cohesion, shaping their fundamental structure.", "id": "fc18"}, {"front": "What other concepts are related to the challenges of group size, communication, and organizational structure?", "back": "Brooks's Law (communication overhead growth), Conway's Law (organizational structure shapes systems), and The Tragedy of the Commons (erosion of personal accountability in large groups).", "id": "fc19"}, {"front": "What specific type of relationship does the '150' figure in Dunbar's Number refer to?", "back": "It refers to people you know well enough to sit down with uninvited for a drink, i.e., 'casual friends' with whom you have personal knowledge and a degree of trust.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
