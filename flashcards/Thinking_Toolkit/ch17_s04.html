    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Two Generals' Problem?", "back": "A classic distributed computing problem illustrating the impossibility of achieving perfect coordination between two parties communicating over an unreliable channel."}, {"front": "Who formalized and named the Two Generals' Problem?", "back": "Jim Gray in 1978, building on earlier work by Akkoyunlu, Ekanadham, and Huber in 1975."}, {"front": "Describe the basic scenario of the Two Generals' Problem.", "back": "Two allied generals on opposite sides of an enemy city need to coordinate a simultaneous attack to win. They can only communicate via messengers who might be captured."}, {"front": "What are the victory conditions for the generals?", "back": "Both generals must attack simultaneously. If only one attacks, that general will be defeated."}, {"front": "What is the core communication challenge faced by the generals?", "back": "They can only communicate over an unreliable channel (messengers through enemy territory), meaning any message or acknowledgment might be lost."}, {"front": "Why can't generals achieve certainty of coordination even with acknowledgments?", "back": "An infinite regress of acknowledgments occurs; neither general can be certain the other received the *most recent* message, leading to a logical impasse."}, {"front": "What is the 'remarkable property' of the Two Generals' Problem regarding its solvability?", "back": "It is provably unsolvable; no protocol, no matter how many messages are exchanged, can guarantee coordination over an unreliable channel."}, {"front": "Briefly explain the intuitive proof for the Two Generals' Problem's unsolvability.", "back": "If a protocol existed with 'n' messages, losing the 'n-th' message would mean the protocol must work with 'n-1' messages (since loss is indistinguishable from delay). This contradicts 'n' messages being necessary, implying no finite number of messages suffices."}, {"front": "What is the key implication of the Two Generals' Problem being provably unsolvable for system design?", "back": "Perfect certainty of coordination is impossible. Practical systems must accept some level of risk and design for probabilistic guarantees rather than absolute certainty."}, {"front": "How do people typically 'solve' the Two Generals' Problem in everyday life?", "back": "By accepting less than certainty, relying on social norms, shared expectations, and a tolerance for small risks, rather than requiring logical proof of message receipt."}, {"front": "Why can't computer systems always use the 'everyday life' approach to the Two Generals' Problem?", "back": "The stakes can be higher, and the tolerance for failure is often lower (e.g., financial transactions), requiring more robust, though still probabilistic, solutions."}, {"front": "What do practical solutions in distributed computer systems often involve instead of absolute certainty?", "back": "Probabilistic guarantees and mechanisms to tolerate occasional failures, rather than protocols that guarantee perfect coordination."}, {"front": "Give an example of how the Two Generals' Problem relates to Internet protocols.", "back": "The TCP 'three-way handshake' is a practical solution that achieves high reliability but cannot guarantee perfect coordination due to the inherent unreliability of the network."}, {"front": "How does the Two Generals' Problem apply to business agreements?", "back": "Deals negotiated via unreliable channels (email, phone) carry risks of misunderstanding. Contracts, witnesses, and escrow services are mechanisms to reduce this uncertainty, not eliminate it."}, {"front": "How do real military operations address the challenge posed by the Two Generals' Problem?", "back": "They use redundancy (multiple messengers, channels) and standing orders (default actions if communication fails) to reduce, but not eliminate, uncertainty."}, {"front": "What is the core challenge identified as 'Coordination Without Guaranteed Communication'?", "back": "The logical impossibility of achieving perfect certainty of coordination when two parties communicate through an unreliable channel."}, {"front": "What does practical coordination in such unreliable environments require?", "back": "Accepting some inherent risk and building systems that are designed to tolerate occasional failures."}, {"front": "What is the key difference between the Two Generals' Problem and the Byzantine Generals Problem?", "back": "The Byzantine Generals Problem introduces the additional complexity of potentially traitorous participants, making coordination even harder than with merely unreliable communication."}, {"front": "What other game-theoretic model explores coordination under uncertainty, similar to the Two Generals' Problem?", "back": "The Stag Hunt, which models situations where individuals must coordinate to achieve a mutually beneficial outcome, but risk failure if not everyone cooperates."}, {"front": "Which engineering principle suggests designing for failure, aligning with the lessons from the Two Generals' Problem?", "back": "Murphy's Law, which implies that anything that can go wrong will, thus necessitating resilient system design."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
