<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Hilbert's Grand Hotel?", "back": "A thought experiment proposed by David Hilbert in 1924 to illustrate the counterintuitive properties of infinite sets, building on Georg Cantor's work.", "id": "fc01"}, {"front": "Who was David Hilbert, and what was his primary contribution to the concept of the Grand Hotel?", "back": "A German mathematician (1862–1943) who used the Grand Hotel thought experiment to explore the nature of infinity, making foundational contributions to mathematics.", "id": "fc02"}, {"front": "Describe the initial scenario of Hilbert's Grand Hotel.", "back": "A hotel with infinitely many rooms (1, 2, 3...), all occupied, and a single weary traveler arrives asking for a room.", "id": "fc03"}, {"front": "How does the manager of Hilbert's Grand Hotel accommodate one new guest when all rooms are already occupied?", "back": "She asks every existing guest to move from their current Room 'n' to Room 'n+1', thereby emptying Room 1 for the new guest without displacing anyone.", "id": "fc04"}, {"front": "What surprising implication arises from the hotel accommodating one new guest while already full?", "back": "An infinite hotel can be 'full,' yet still accommodate one more guest without adding rooms or displacing anyone, violating finite intuition.", "id": "fc05"}, {"front": "How does Hilbert's Grand Hotel accommodate an infinitely long bus carrying infinitely many new guests?", "back": "All current guests are asked to move from Room 'n' to Room '2n', which leaves all odd-numbered rooms (an infinite number) empty for the new guests.", "id": "fc06"}, {"front": "What is the significance of the hotel accommodating infinitely many new guests?", "back": "It demonstrates that an infinite set can absorb another infinite set ('full plus infinity') and still be exactly as 'full' as before, showcasing infinity's unique arithmetic.", "id": "fc07"}, {"front": "Can Hilbert's Grand Hotel accommodate infinitely many buses, each with infinitely many passengers?", "back": "Yes, the text indicates this is possible using a clever numbering trick, further illustrating the profound nature of infinity.", "id": "fc08"}, {"front": "How does the behavior of infinity differ from that of very large finite numbers?", "back": "Infinity does not obey the same arithmetic rules as finite numbers. For example, an infinite set can be the same 'size' as one of its proper subsets.", "id": "fc09"}, {"front": "What is the rule 'the whole is always greater than the part' for finite sets?", "back": "For finite sets, a set always has more elements than any proper subset of itself.", "id": "fc10"}, {"front": "How does the rule 'the whole is always greater than the part' break down for infinite sets?", "back": "An infinite set can have the same 'size' (cardinality) as one of its proper subsets, such as the set of natural numbers and the set of even numbers.", "id": "fc11"}, {"front": "Who was Georg Cantor, and what was his revolutionary contribution to the mathematics of infinity?", "back": "A mathematician (1870s-1880s) who developed the mathematics of infinite sets and introduced the concept of cardinality to define and compare their 'sizes.'", "id": "fc12"}, {"front": "What is 'cardinality' in mathematics, especially concerning infinite sets?", "back": "Cardinality is the mathematical term for the 'size' of a set. For infinite sets, it's defined by whether their elements can be placed in one-to-one correspondence.", "id": "fc13"}, {"front": "How does Cantor define two sets as having the same cardinality?", "back": "Two sets have the same cardinality if their elements can be placed in a one-to-one correspondence, meaning each element in one set can be paired with exactly one element in the other, with no elements left over.", "id": "fc14"}, {"front": "Give examples of sets that have the same cardinality as the natural numbers.", "back": "The set of even numbers, odd numbers, integers, and rational numbers all have the same cardinality, known as 'aleph-null' ($_0$). This is a 'countable' infinity.", "id": "fc15"}, {"front": "Are all infinities the same size?", "back": "No, one of Cantor's most stunning discoveries was that there are different sizes of infinity, forming a hierarchy.", "id": "fc16"}, {"front": "Which set has a strictly larger infinity (cardinality) than the natural numbers?", "back": "The set of real numbers (all points on the number line, including irrational numbers like √2 and π) has a strictly larger, 'uncountable' cardinality.", "id": "fc17"}, {"front": "What is Cantor's diagonal argument?", "back": "A proof demonstrating that no matter how you try to list all real numbers between 0 and 1, you can always construct a new real number not on that list, proving the uncountability of real numbers.", "id": "fc18"}, {"front": "What is the difference between 'countable' and 'uncountable' infinities?", "back": "Countable infinities (like natural numbers) can be put into one-to-one correspondence with the natural numbers. Uncountable infinities (like real numbers) cannot.", "id": "fc19"}, {"front": "According to the 'Key Concept' box, what is the main principle Hilbert's Hotel illustrates about infinity?", "back": "Infinity defies ordinary arithmetic; an infinite set can be the same 'size' as one of its proper subsets, and a 'full' infinite hotel can accommodate any number of new guests.", "id": "fc20"}, {"front": "What does the 'Think About It' section demonstrate about 'infinity minus infinity'?", "back": "'Infinity minus infinity' is indeterminate. It can result in infinity (e.g., removing odd-room guests) or a finite number (e.g., removing guests from rooms greater than 5), depending on the specific infinite sets involved.", "id": "fc21"}, {"front": "Name two real-world fields where the mathematics of infinite sets and cardinality are practically applied.", "back": "Modern computing (theory of computability, undecidable problems), cryptography (security of encryption schemes), and physics (question of continuous vs. discrete spacetime).", "id": "fc22"}, {"front": "What does Hilbert's Hotel fundamentally challenge about our everyday understanding?", "back": "It challenges our finite intuitions by demonstrating that infinite sets behave in ways that contradict the rules and expectations derived from our finite experience.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
