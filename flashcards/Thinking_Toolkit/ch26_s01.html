<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core statement of the Banach-Tarski Paradox?", "back": "It states that a solid sphere can be decomposed into a finite number of pieces (five will do) and reassembled using only rotations and translations into two solid spheres, each identical in size to the original."}, {"front": "Who proved the Banach-Tarski Paradox and in what year?", "back": "Stefan Banach and Alfred Tarski proved it in 1924."}, {"front": "Is the Banach-Tarski Paradox a theory, a conjecture, or a proven theorem?", "back": "It is a rigorously proven mathematical theorem, with the same certainty as fundamental arithmetic or geometry."}, {"front": "Which fundamental axiom of set theory is crucial for the existence of the Banach-Tarski Paradox?", "back": "The Axiom of Choice."}, {"front": "What types of geometric operations are allowed when rearranging the pieces in the Banach-Tarski decomposition?", "back": "Only rotations and translations (no stretching, squishing, or gaps)."}, {"front": "What is the key characteristic of the 'pieces' involved in the Banach-Tarski Paradox?", "back": "The pieces are non-measurable sets, meaning they are so scattered and fragmented that no well-defined volume can be assigned to them."}, {"front": "Define a 'measurable set'.", "back": "A measurable set is one to which a well-defined volume (or area, or length) can be assigned."}, {"front": "Why can't the pieces of the Banach-Tarski decomposition be physically cut with a knife?", "back": "They are abstract mathematical objects, not physical chunks or slices. They exist only because the Axiom of Choice guarantees their existence in mathematical space."}, {"front": "How does the Axiom of Choice enable the existence of the non-measurable sets in the paradox?", "back": "The Axiom of Choice states that for any collection of non-empty sets, it's possible to select one element from each set, even if infinite, thus guaranteeing the existence of these abstract, non-constructible sets."}, {"front": "Why does the Banach-Tarski Paradox not violate physical laws like conservation of mass or energy?", "back": "It is a theorem about mathematical points in continuous space, not about physical matter (which is discrete and made of atoms). The required decomposition cannot be performed physically."}, {"front": "What common intuitive notion about 'volume' does the Banach-Tarski Paradox challenge?", "back": "It challenges the assumption that our intuitive notion of 'volume' applies to all subsets of three-dimensional space, and that volumes must always add up (i.e., the sum of parts equals the whole)."}, {"front": "How do non-measurable sets affect the concept of 'total volume' in the paradox?", "back": "Non-measurable sets are 'pieces without volume,' meaning the concept of volume never applied to them individually. Therefore, when they are rearranged, the 'total volume' can appear to change because the initial concept of volume was inapplicable to the parts."}, {"front": "Does the Banach-Tarski Paradox indicate a flaw in mathematics itself?", "back": "No, it is a consequence of working with infinite, continuous sets (like the real number line or points in space), demonstrating how mathematical infinity can defy finite intuition."}, {"front": "What profound insight does the Banach-Tarski Paradox offer about the nature of mathematical infinity?", "back": "It reveals that mathematical infinity, when applied to geometry and continuous sets, can lead to results that are deeply counterintuitive and challenge our everyday understanding of space and quantity."}, {"front": "Explain the difference between the Banach-Tarski Paradox and a 'magic trick' or 'thought experiment'.", "back": "It is a rigorously proven mathematical theorem, not a trick, a hypothesis, or an approximation. Its certainty is on par with fundamental mathematical truths, despite its counterintuitive nature."}, {"front": "What is the primary implication of the Banach-Tarski Paradox for our understanding of geometric properties?", "back": "It shows the limits of our geometric intuitions when applied to the mathematical infinite and reveals that properties like volume do not extend universally to all abstract subsets of continuous space."}, {"front": "Mention another mathematical concept or paradox that, like Banach-Tarski, demonstrates results incompatible with finite intuition.", "back": "Hilbert's Hotel or Zeno's Paradoxes (infinite divisibility) are examples. Gödel's Incompleteness Theorems are also mentioned as challenging common-sense expectations within mathematics."}, {"front": "Why is it important to distinguish between 'mathematical points in continuous space' and 'physical matter' when discussing the Banach-Tarski Paradox?", "back": "This distinction clarifies why the paradox does not violate physics. The theorem applies to abstract mathematical objects, not physical objects made of atoms, which cannot be decomposed into non-measurable sets."}, {"front": "If someone claimed to use the Banach-Tarski Paradox to 'duplicate gold,' what would be the flaw in their understanding?", "back": "The paradox applies to abstract mathematical space and non-measurable sets, which cannot be physically constructed or cut from real, discrete matter like gold. It does not provide a loophole for material creation."}, {"front": "How many pieces are sufficient to perform the Banach-Tarski decomposition, according to the text?", "back": "Five pieces are sufficient."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
