<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 15, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Cobra Effect?", "back": "A specific instance of a perverse incentive where an attempted solution to a problem unintentionally makes the problem worse."}, {"front": "What is the origin story behind the name 'Cobra Effect'?", "back": "It's named after an apocryphal episode during British colonial rule in India, where a bounty for dead cobras led to people breeding cobras, ultimately increasing the population after the policy's cancellation."}, {"front": "Describe the initial policy implemented by the British colonial government to address the cobra problem in Delhi.", "back": "They offered a bounty for every dead cobra brought to the authorities, aiming to incentivize their elimination."}, {"front": "How did residents in British India exploit the cobra bounty program?", "back": "Instead of hunting wild cobras, enterprising residents began breeding them safely at home to kill and collect the bounty."}, {"front": "What was the ultimate outcome of the British cobra bounty program?", "back": "When the government discovered the cobra farms and cancelled the bounty, breeders released their now worthless cobras, making the population larger than before the program began."}, {"front": "How did the French colonial administration in Hanoi attempt to control the rat population, and what was the unexpected consequence?", "back": "They offered a bounty for rat tails. Residents would cut off tails, collect the bounty, and release the rats alive to breed more, or even import rats from the countryside."}, {"front": "Why did the French administration in Hanoi offer bounties for rat tails instead of whole rats?", "back": "They wanted to avoid piles of dead rats delivered to their offices, but this proxy enabled people to collect bounties without fully eliminating the rats."}, {"front": "Define 'perverse incentive.'", "back": "An incentive that produces the opposite of its intended effect, typically by targeting a proxy rather than the actual goal."}, {"front": "What is the fundamental mechanism by which a perverse incentive operates?", "back": "A policy targets a proxy (a measurable metric) instead of the actual goal, and clever agents find ways to produce the proxy without achieving the goal, often undermining it."}, {"front": "Explain the distinction between a 'proxy' and the 'actual goal' in the context of perverse incentives.", "back": "The 'proxy' is a measurable metric that is *assumed* to correlate with the desired outcome (e.g., dead cobras), while the 'actual goal' is the true desired outcome (e.g., fewer cobras)."}, {"front": "Give a modern example of a perverse incentive in healthcare related to patient mortality rates.", "back": "Hospitals penalized for high mortality rates may respond by avoiding the sickest patients, improving their statistics but potentially worsening overall healthcare."}, {"front": "How can standardized test scores act as a perverse incentive in education?", "back": "When schools are evaluated by test scores, some narrow their curriculum to focus exclusively on tested material, sacrificing broader education for better numbers."}, {"front": "How might measuring software developers by lines of code lead to a perverse incentive?", "back": "Developers might write unnecessarily verbose code to increase their line count, rather than focusing on efficient or effective solutions."}, {"front": "According to the text, what happens when a reward or penalty targets a proxy rather than the actual goal?", "back": "Agents will optimize for the proxy, even at the expense of the actual goal. The more lucrative the incentive, the more creative the gaming."}, {"front": "What crucial question should be asked when designing incentives to help avoid the Cobra Effect?", "back": "The question is never just 'What behavior does this incentive reward?' but 'What other behaviors does it also reward?'"}, {"front": "Explain 'welfare cliffs' as an example of a real-world perverse incentive.", "back": "Social benefit programs that abruptly phase out at an income threshold can penalize earning more, as gaining a small amount of income can cause a loss of significant benefits."}, {"front": "How can environmental regulations lead to 'carbon leakage,' an example of a perverse incentive?", "back": "Regulations penalizing emissions at a specific facility might cause companies to move production to unregulated regions rather than reduce total emissions globally."}, {"front": "What is a common perverse incentive observed in academic publishing?", "back": "When researchers are evaluated by the number of papers published, the incentive favors many small papers over fewer, more significant works, diverging from the goal of advancing knowledge."}, {"front": "Does the Cobra Effect mean that all incentive systems are inherently flawed or will backfire?", "back": "No, most well-designed incentive systems work reasonably well. The Cobra Effect is a warning about a specific failure mode: when a metric can be gamed more cheaply than the goal can be achieved."}, {"front": "What is the recommended 'antidote' to the Cobra Effect when designing incentives?", "back": "Design incentives with an adversarial mindset, asking, 'If someone wanted to hit this target without achieving the actual goal, how would they do it?'"}, {"front": "Which general principle, related to measures becoming corrupted when they become targets, is connected to the Cobra Effect?", "back": "Goodhart's Law."}, {"front": "What broader framework on how incentive structures drive behavior is relevant to understanding the Cobra Effect?", "back": "Incentives (as described by Munger's framework in another chapter)."}, {"front": "Which concept explains the systemic roots of policy surprises, including instances of the Cobra Effect, where policies have unforeseen negative outcomes?", "back": "The Law of Unintended Consequences."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
