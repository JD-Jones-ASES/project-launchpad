    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary purpose of Martin Shubik's \"Dollar Auction\" game?", "back": "To demonstrate the phenomenon of irrational escalation, where intelligent people behave foolishly, leading to collectively insane outcomes."}, {"front": "Who designed the Dollar Auction and when was it first published?", "back": "Economist Martin Shubik designed it in 1971, and it was first published in the Journal of Conflict Resolution."}, {"front": "What is the unique rule in the Dollar Auction that leads to paradoxical outcomes?", "back": "The highest bidder wins the dollar, but the second-highest bidder must also pay their bid and receives nothing in return."}, {"front": "Describe the typical initial perception players have when the Dollar Auction begins.", "back": "It appears to be a wonderful opportunity for a significant return, as early bids are much lower than the dollar's value."}, {"front": "Explain the \"locally rational\" decision-making process that drives bidding above a dollar in the Dollar Auction.", "back": "At each step, a bidder faces a choice: stop and incur a certain loss, or bid slightly higher with a chance to win the dollar and potentially reduce or eliminate their loss. For the individual, continuing often seems better than stopping."}, {"front": "What is the ultimate outcome observed in classroom demonstrations of the Dollar Auction?", "back": "Bids frequently exceed the value of the dollar, sometimes going past $2.00, $5.00, or even $20 for a single dollar bill."}, {"front": "How does the text characterize the collective outcome of the Dollar Auction compared to individual decisions?", "back": "The sequence of locally rational individual decisions leads to a collectively insane outcome. The players are trapped, not stupid."}, {"front": "What is an \"escalation trap\"?", "back": "An escalation trap occurs when quitting incurs a certain loss, and continuing offers a diminishing chance of recovery, drawing rational actors step by step into outcomes far worse than their initial stake."}, {"front": "List the three main psychological forces combined in the Dollar Auction, according to the text.", "back": "The sunk-cost fallacy, loss aversion, and competitive pride."}, {"front": "Define the \"sunk-cost fallacy\" as it applies to the Dollar Auction.", "back": "It's the psychological tendency to continue an endeavor because of past investments, rationalizing 'I've already invested so much, I can't stop now,' even when further investment is no longer rational."}, {"front": "How does \"loss aversion\" contribute to the escalation in the Dollar Auction?", "back": "Loss aversion makes players strongly prefer avoiding a certain, immediate loss (by stopping) and instead take a risk (by continuing to bid) with the hope of recovering their investment."}, {"front": "What role does \"competitive pride\" play in the Dollar Auction's escalation?", "back": "It fuels the refusal to let the other person win, driving participants to bid higher even when it is economically unsound."}, {"front": "What is the critical insight about the Dollar Auction's structure, beyond the specific dollar amount?", "back": "The trap lies in any situation where stopping incurs a definite loss and continuing offers a diminishing chance of recovery."}, {"front": "Give three real-world examples of situations that follow the escalatory logic of the Dollar Auction.", "back": "Military escalation (e.g., Vietnam War), corporate bidding wars (e.g., AOL-Time Warner merger), and legal disputes."}, {"front": "Explain how military escalation can be seen as an Escalation Trap.", "back": "Governments commit more troops and resources to a losing conflict, justifying it by the 'waste' of sacrifices already made, even as the probability of 'winning' steadily decreases."}, {"front": "How can a corporate bidding war resemble a Dollar Auction?", "back": "Companies may overpay for acquisitions because withdrawing after public bids feels like a competitive defeat, leading them to invest more than the target's rational valuation."}, {"front": "What are the two primary ways to reliably escape an escalation trap?", "back": "Recognize the trap before entering it, or set a firm exit point in advance and honor it regardless of what happens."}, {"front": "What does the \"think about it\" section suggest about pre-commitment plans in the context of escalation traps?", "back": "It questions the reliability of pre-commitment plans, as people often believe they will stop at a rational point but rarely do in practice."}, {"front": "How does the Dollar Auction relate to the concept of a \"Pyrrhic Victory\"?", "back": "The Dollar Auction can lead to a Pyrrhic Victory, where one 'wins' the dollar but at an unsustainable cost, far exceeding its actual value."}, {"front": "What is the connection between the Dollar Auction and the Sunk-Cost Fallacy?", "back": "The Sunk-Cost Fallacy is identified as a primary psychological engine driving the escalation observed in the Dollar Auction, making players continue investing due to past commitments."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
