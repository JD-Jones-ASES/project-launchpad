<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Dollar Auction game, and who designed it?", "back": "A game designed by economist Martin Shubik in 1971 to demonstrate irrational escalation, where the highest bidder wins a dollar, but the second-highest bidder also pays their bid and receives nothing."}, {"front": "What is the crucial 'twist' in the rules of the Dollar Auction that differentiates it from a regular auction?", "back": "The second-highest bidder must also pay their bid and gets nothing in return, while the highest bidder wins the dollar."}, {"front": "How does the Dollar Auction initially appear to participants?", "back": "It seems like a wonderful opportunity, offering a very high return (e.g., bidding five cents for a dollar)."}, {"front": "In the Dollar Auction, if Bob has bid $0.85 and Alice has bid $0.90, why might Bob choose to bid $0.95 instead of stopping?", "back": "If Bob stops, he loses $0.85 outright. If he bids $0.95 and wins, he nets a $0.05 gain, which seems better than a certain loss."}, {"front": "After Alice bids $1.00 for the dollar, why might Bob then bid $1.05?", "back": "If Bob stops at $0.95, he loses $0.95. If he bids $1.05 and wins, he loses only $0.05 net ($1.05 paid - $1.00 received), which is better than losing $0.95."}, {"front": "What is the typical outcome of a Dollar Auction in terms of the final bid amount?", "back": "Bidding often continues past $1.00, $2.00, and sometimes even $5.00, with bids exceeding $20 for a single dollar bill observed in demonstrations."}, {"front": "What is the paradox demonstrated by the Dollar Auction regarding individual rationality versus collective outcome?", "back": "Each individual bid is 'locally rational' (continuing seems better than stopping), but the sequence of these rational decisions leads to a 'collectively insane' outcome, trapping the players."}, {"front": "Define an 'escalation trap' as described in the text.", "back": "An escalation trap occurs when quitting incurs a certain loss, and continuing offers a diminishing chance of recovery, leading rational actors step by step into outcomes far worse than their initial stake."}, {"front": "Name three psychological forces that combine to create the Dollar Auction's 'escalation trap.'", "back": "The sunk-cost fallacy, loss aversion, and competitive pride."}, {"front": "How does the 'sunk-cost fallacy' contribute to escalation in the Dollar Auction?", "back": "Players justify continuing to bid because they've 'already invested so much,' feeling they can't stop now without 'wasting' their prior investment."}, {"front": "How does 'loss aversion' play a role in the Dollar Auction's escalation?", "back": "Players are unwilling to accept a certain loss by stopping, preferring to risk more in hopes of avoiding or mitigating that loss."}, {"front": "Explain how 'competitive pride' can fuel escalation in the Dollar Auction.", "back": "Participants may refuse to let the other person win, viewing withdrawal as a competitive defeat, even if it's financially irrational."}, {"front": "What is the critical insight about the *structure* of situations that lead to escalation traps like the Dollar Auction?", "back": "Any situation where stopping incurs a definite loss and continuing offers a chance (however diminishing) of recovery has this structure, regardless of the specific dollar amount or context."}, {"front": "Provide a real-world example of military escalation that follows the logic of the Dollar Auction.", "back": "The Vietnam War, where additional troop commitments were justified by previous investments, even as the probability of 'winning' decreased, making withdrawal seem like a 'waste' of sacrifices."}, {"front": "Give a corporate example of an escalation trap, as mentioned in the text.", "back": "Corporate bidding wars, where companies overpay for acquisitions (e.g., the AOL–Time Warner merger) because withdrawing after public bids feels like a competitive defeat."}, {"front": "How do legal disputes sometimes become an escalation trap?", "back": "Litigants spend more in legal fees than the original dispute is worth, each side hoping the next filing will force the other to settle, rather than accepting a loss and stopping."}, {"front": "What is the most reliable way to escape an escalation trap?", "back": "To recognize the trap before entering it, or to set a firm exit point in advance and honor it regardless of what happens."}, {"front": "What does the Dollar Auction tell us about the reliability of our 'pre-commitment' plans (e.g., 'I'll quit if it goes past X')?", "back": "It suggests that despite initial intentions, pre-commitment plans are often unreliable in practice, as the psychological forces of the trap override rational stopping points."}, {"front": "Name two other concepts mentioned in the text that are connected to the Dollar Auction and escalation.", "back": "The Sunk-Cost Fallacy and The Pyrrhic Victory (The Game of Chicken is also mentioned as related)."}, {"front": "What was Martin Shubik's primary objective in designing the Dollar Auction?", "back": "To demonstrate how intelligent people can be drawn into irrational escalation and foolish behavior, even when individual decisions seem rational at each step."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
