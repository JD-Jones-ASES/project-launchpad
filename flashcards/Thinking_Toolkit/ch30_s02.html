    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 30, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Gish Gallop?", "back": "The Gish Gallop is a debating tactic where an individual overwhelms an opponent with a rapid succession of numerous arguments, often weak, misleading, or irrelevant, making it impossible to refute them all within the given time."}, {"front": "After whom is the Gish Gallop named, and what was his profession?", "back": "It is named after Duane Gish (1921–2013), a biochemist and prominent creationist debater."}, {"front": "Describe Duane Gish's debating technique that led to the naming of the Gish Gallop.", "back": "Gish would rapidly present dozens of claims—misquoted studies, out-of-context statistics, rhetorical questions, factual errors, and half-truths—in quick succession during debates against evolutionary biologists."}, {"front": "What impossible choice does an opponent face when confronted with a Gish Gallop?", "back": "The opponent must choose between addressing each claim carefully (and running out of time quickly) or ignoring most claims (and appearing to concede them)."}, {"front": "What fundamental asymmetry in argumentation does the Gish Gallop exploit?", "back": "It exploits the asymmetry that it takes far less effort to make a claim than to thoroughly refute one."}, {"front": "Explain the effort asymmetry between making a claim and refuting it.", "back": "A false assertion can be made in about ten seconds, while a thorough refutation (explaining why it's wrong, citing evidence, and addressing misunderstandings) might take five minutes."}, {"front": "What types of claims did Gish typically use in his gallops?", "back": "He used misquoted studies, out-of-context statistics, rhetorical questions, factual errors, and half-truths."}, {"front": "Why was Gish's technique 'devastatingly effective,' despite his arguments often being weak?", "back": "It was effective because of the sheer quantity of claims, not their quality, overwhelming the opponent's ability to respond comprehensively."}, {"front": "Is the Gish Gallop tactic exclusive to creationist debates?", "back": "No, it appears whenever someone responds to a focused objection by rapidly changing the subject to different objections."}, {"front": "Provide an example of how a Gish Gallop might appear in political debates.", "back": "A candidate accused of a specific policy failure might pivot to the economy, then to national security, then to their opponent's character, never allowing for substantive discussion on any one topic."}, {"front": "How does the Gish Gallop manifest in social media arguments?", "back": "It often involves one party posting a 'wall of links, memes, and talking points' that would take hours to fact-check."}, {"front": "What is the primary defense strategy against a Gish Gallop?", "back": "The defense is 'disciplined focus': identify the strongest or most central claim, address it thoroughly, and explicitly set aside other claims."}, {"front": "When defending against a Gish Gallop, how should one handle the multitude of claims made by the opponent?", "back": "Address only the strongest or most central claim thoroughly, and explicitly state that other claims are being set aside because serious arguments deserve serious treatment."}, {"front": "Why is audience awareness of the Gish Gallop important for the defense strategy to be effective?", "back": "An audience that understands the tactic will respect the disciplined focus; otherwise, they might perceive the refusal to address every claim as a concession."}, {"front": "When might it be necessary to explicitly name and explain the Gish Gallop tactic during a debate?", "back": "It might be necessary if the audience does not already understand the tactic, to ensure they comprehend why not all claims are being addressed."}, {"front": "Summarize the core idea of the Gish Gallop regarding quantity and quality in argumentation.", "back": "The Gish Gallop prioritizes quantity over quality in argumentation, overwhelming an opponent with many weak arguments that each require more effort to refute than to state."}, {"front": "What other concept is the Gish Gallop related to, and what is its alternative name?", "back": "It is related to Brandolini's Law, also known as the 'Bullshit Asymmetry Principle'."}, {"front": "Explain Brandolini's Law (or the Bullshit Asymmetry Principle).", "back": "Brandolini's Law states that the amount of energy needed to refute nonsense is an order of magnitude larger than the energy needed to produce it."}, {"front": "Is the asymmetry in the Gish Gallop primarily due to rhetorical skill or is it structural?", "back": "It is structural, meaning the difficulty of refutation is inherent to the nature of making and refuting claims, not just the skill of the debater."}, {"front": "Why does the Gish Gallop work even when the individual arguments presented by the 'galloper' are very weak?", "back": "It works due to the structural asymmetry (Brandolini's Law); the sheer volume of even weak claims still requires immense effort to refute thoroughly, exploiting the opponent's time constraints."}, {"front": "What is the primary goal of someone using a Gish Gallop?", "back": "The primary goal is to overwhelm the opponent, prevent substantive refutation of any single claim, and create the illusion of having numerous valid points."}, {"front": "What is the consequence for a debater who cares about accuracy when facing a Gish Gallop?", "back": "They are 'hopelessly outgunned' because their commitment to thorough, accurate refutation means they will run out of time long before addressing all of the opponent's numerous claims."}, {"front": "What does the text mean by 'Quantity Over Quality in Argumentation' in the context of the Gish Gallop?", "back": "It means the tactic relies on presenting a large number of arguments, regardless of their individual strength or validity, to overwhelm and distract the opponent rather than to persuade through sound reasoning."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
