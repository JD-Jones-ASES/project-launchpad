<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 16, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central argument or main point of Leonard Read's essay 'I, Pencil'?", "back": "The essay demonstrates how complex products, like a simple pencil, are created through the spontaneous coordination of vast, globally dispersed knowledge and resources, without any central planner, primarily through the price system."}, {"front": "Who originally authored the essay 'I, Pencil: My Family Tree as told to Leonard E. Read'?", "back": "Leonard E. Read."}, {"front": "Which prominent economist later popularized the 'I, Pencil' argument through his television series 'Free to Choose'?", "back": "Milton Friedman."}, {"front": "According to 'I, Pencil,' what is unique about the total knowledge required to make a pencil?", "back": "No single person on Earth, not even a CEO or brilliant engineer, possesses all the scattered knowledge required to make a pencil from scratch."}, {"front": "Where does the cedar wood for a pencil typically originate?", "back": "Forests in Oregon or California."}, {"front": "Name two primary global sources for the graphite found in a pencil's core.", "back": "Sri Lanka or China."}, {"front": "List some of the diverse origins of materials needed just for the chainsaw used to fell trees for pencil wood.", "back": "Steel (iron ore from Minnesota/Brazil, coal from West Virginia/Australia, limestone), rubber for tires (Southeast Asian plantations), glass (silica sand, soda ash, limestone)."}, {"front": "What is the primary ingredient for the yellow paint on a pencil, and from which continents might it be sourced?", "back": "Castor oil, derived from castor beans grown in Africa or India."}, {"front": "Which two metals make up the brass ferrule of a pencil, and where might they be mined?", "back": "Copper (from Chile or Zambia) and Zinc (from Peru or Australia)."}, {"front": "Describe the varied global origins of the materials for a pencil's eraser.", "back": "Originally derived from Indonesian rubber, combined with pumice from Italy and various binding agents."}, {"front": "What fundamental 'problem' in production does 'I, Pencil' highlight regarding the required knowledge?", "back": "The knowledge needed for pencil production is widely dispersed among thousands of specialists in dozens of countries, most of whom have never met and many are unaware their work contributes to pencils."}, {"front": "What is the key mechanism that 'I, Pencil' identifies as the 'answer' to how complex objects are reliably produced despite dispersed knowledge?", "back": "The price system."}, {"front": "How does the price system facilitate coordination among the diverse participants in the pencil's supply chain?", "back": "Each participant responds to local prices and local knowledge, performing their specialized task without needing to know about the entire production process or communicate directly with other distant specialists."}, {"front": "What term did Leonard Read use to describe the type of complex coordination that arises without central direction?", "back": "Spontaneous order."}, {"front": "Explain 'spontaneous order' in the context of the pencil's production.", "back": "It's a pattern of coordination that arises not from any single design or master plan, but from the interaction of countless individuals pursuing their own goals within a framework of voluntary exchange, guided by prices."}, {"front": "Does 'I, Pencil' argue that the pencil is the product of a 'plan' or a 'process'?", "back": "It is the product of a 'process,' emphasizing that complex beneficial outcomes can emerge from decentralized interactions rather than from intentional central design."}, {"front": "What does the 'humble pencil' ultimately demonstrate about complex economic coordination?", "back": "It proves that intricate coordination among thousands of strangers across dozens of countries can emerge without any central plan, master coordinator, or shared understanding of the whole, driven by the price system and voluntary exchange."}, {"front": "What theoretical concept by Hayek is explicitly connected to the ideas presented in 'I, Pencil' in the textbook?", "back": "Hayek's Knowledge Problem."}, {"front": "Why is it not necessary for a logger in Oregon to know about graphite mining in Sri Lanka for a pencil to be made?", "back": "Both individuals respond to the price signals and local knowledge relevant to their specific, specialized tasks. Their actions are coordinated by the market, not by direct communication or a shared overarching plan."}, {"front": "What does the 'I, Pencil' argument imply about the capabilities of central planning compared to a market economy?", "back": "It implies that no central authority, however powerful or intelligent, could effectively gather and process the vast, dispersed knowledge needed to design and manage the production of even simple goods as efficiently as the market does spontaneously."}, {"front": "How do 'local prices and local knowledge' contribute to the coordination described in 'I, Pencil'?", "back": "They serve as signals that guide each participant's specialized actions. For example, a higher price for wood encourages loggers to produce more, without needing to know why the demand for wood might be increasing across the entire supply chain."}, {"front": "What is the 'takeaway' from attempting to trace the supply chain of an everyday object, as suggested by the 'thinkaboutit' prompt?", "back": "It quickly reveals the immense complexity, global interconnectedness, and vast number of specialized skills involved in even simple products, demonstrating how difficult it is to grasp the full extent of the dispersed knowledge."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
