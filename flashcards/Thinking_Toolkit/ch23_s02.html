    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 23, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Where did the concept of Margin of Safety originate?", "back": "The concept originated in engineering, where structures are designed to bear loads far beyond their expected maximum."}, {"front": "Who introduced the Margin of Safety concept into investment thinking?", "back": "Benjamin Graham, through his books *Security Analysis* (1934) and *The Intelligent Investor* (1949)."}, {"front": "How is Margin of Safety defined in an engineering context?", "back": "It is the difference between the expected load a structure (like a bridge) will bear and its actual capacity, which is designed to be significantly higher."}, {"front": "What is the primary purpose of an engineering Margin of Safety?", "back": "To absorb everything the engineer did not or could not predict, such as heavier traffic, material fatigue, construction imperfections, or extreme weather."}, {"front": "What is the fundamental principle behind building in a Margin of Safety?", "back": "When you know you might be wrong, build in room to be wrong without catastrophe; design with slack, not to the edge."}, {"front": "How did Benjamin Graham apply the Margin of Safety principle to investing?", "back": "He argued investors should buy securities only when the market price is substantially below their estimate of the security's intrinsic value."}, {"front": "In investing, what does the 'margin of safety' represent according to Graham?", "back": "The difference between your estimate of a security's intrinsic value and the market price you actually pay for it, which absorbs errors of estimation."}, {"front": "How did Warren Buffett extend the Margin of Safety principle?", "back": "He extended it into a general decision-making principle, emphasizing that even if calculations suggest safety, a thin margin is too risky due to potential errors or degradation."}, {"front": "According to Buffett, what risks does a thin margin of safety present?", "back": "Your estimate might be off, capacity might have degraded, assumptions might be wrong, and the combination of multiple small errors can be catastrophic."}, {"front": "Give an example of applying Margin of Safety to time management.", "back": "If a task should take three hours, block four, building in buffer time for unexpected delays or complications."}, {"front": "How does Margin of Safety apply to personal financial planning?", "back": "Maintain emergency reserves for expenses you cannot predict, providing a buffer against unforeseen financial needs."}, {"front": "In project management, what is a practical application of the Margin of Safety principle?", "back": "Build in buffer time for delays that are consistently underestimated, often due to the Planning Fallacy."}, {"front": "How can the Margin of Safety principle be applied to personal health?", "back": "Maintain fitness above the minimum rather than at the minimum, so that an illness or injury does not push you into crisis."}, {"front": "What is considered the 'cost' of applying a Margin of Safety?", "back": "Inefficiency; for example, more material for a bridge, less earnings for emergency cash, or unused buffer time in a schedule."}, {"front": "Why is a Margin of Safety not considered 'waste' despite its cost?", "back": "It is insurance against the unexpected, which is a certainty in complex systems. It makes failures survivable, rather than preventing them."}, {"front": "Summarize the core idea of 'Build In Slack for Being Wrong.'", "back": "Design systems, plans, and investments with a margin between expected conditions and capacity. This margin absorbs errors, unexpected events, and compounding mistakes, ensuring survival when conditions inevitably deviate from expectations."}, {"front": "Who was Benjamin Graham and what is his significance in investing?", "back": "He was a British-born American economist, investor, and professor, widely regarded as the father of value investing and security analysis, and a major influence on Warren Buffett."}, {"front": "Name two influential books authored or co-authored by Benjamin Graham.", "back": "*Security Analysis* (with David Dodd) and *The Intelligent Investor*."}, {"front": "How did the Apollo 13 mission demonstrate the importance of Margin of Safety?", "back": "The crew survived an oxygen tank explosion because NASA engineers had built margins of safety into nearly every system, providing redundant life support, backup power, and a repurposed Lunar Module as a lifeboat, making the failure survivable."}, {"front": "What was the role of Margin of Safety in the Apollo 13 failure, specifically?", "back": "The margins did not prevent the failure itself, but they made the failure survivable by providing buffers for scenarios no one specifically predicted, enabling the crew to return safely."}, {"front": "Which psychological phenomenon explains why we often underestimate the slack we need, making a Margin of Safety crucial?", "back": "The Planning Fallacy."}, {"front": "Which principle suggests that if something can go wrong, it will, reinforcing the need for Margin of Safety?", "back": "Murphy's Law."}, {"front": "What analysis technique involves imagining potential failures that a Margin of Safety is designed to absorb?", "back": "Pre-Mortem Analysis."}, {"front": "What investment framework, also developed by Graham, complements the Margin of Safety by helping exploit market mispricing?", "back": "Mr. Market."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
