    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 21, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the popular, fatalistic saying often attributed to Murphy's Law?", "back": "\"Anything that can go wrong will go wrong.\""}, {"front": "Who was Captain Edward A. Murphy Jr. and what was his original field of work?", "back": "An engineer working on human deceleration experiments at Edwards Air Force Base in 1949."}, {"front": "Describe Captain Murphy's original observation that led to \"Murphy's Law.\"", "back": "After a technician wired sensors incorrectly, he observed that if a system allows a component to be installed incorrectly, it eventually will be."}, {"front": "How does the engineering version of Murphy's Law differ from its popular, fatalistic interpretation?", "back": "The engineering version is a design principle stating that if a failure mode exists, assume it will eventually be activated, rather than cosmic pessimism."}, {"front": "What is the core design principle derived from the engineering version of Murphy's Law?", "back": "Assume that if a failure mode exists, it will eventually be activated. Design to prevent or mitigate these assumed failures."}, {"front": "According to the engineering version of Murphy's Law, what is the designer's primary responsibility regarding potential user error?", "back": "To make incompetent use impossible or, at the very least, non-catastrophic, rather than hoping for competent users."}, {"front": "What are two other terms for the design principle of \"mistake-proofing\" mentioned in the text?", "back": "\"Defensive design\" and \"poka-yoke.\""}, {"front": "What does the Japanese manufacturing term \"poka-yoke\" mean?", "back": "\"Mistake-proofing.\""}, {"front": "Provide an example of \"defensive design\" in common technology to prevent incorrect use.", "back": "USB plugs designed not to fit Ethernet ports, or gas pump nozzles sized to prevent putting diesel in unleaded tanks."}, {"front": "How do nuclear launch systems apply the principle of Murphy's Law in their design?", "back": "They require two operators with two separate keys, assuming potential human error and designing for impossibility of single-point failure."}, {"front": "Why does the text state that the popular version of Murphy's Law (\"everything goes wrong\") still captures a \"statistical truth\"?", "back": "In any complex system with many components, the probability that at least one thing goes wrong is very high, even if the probability of any specific failure is low."}, {"front": "Explain how a system with 100 parts, each 99% reliable, demonstrates the statistical truth of Murphy's Law.", "back": "The overall system reliability is only about 37% (0.99^100 ≈ 0.366), highlighting that even small individual failure probabilities lead to high system-level failure probability."}, {"front": "What crucial engineering concept becomes essential due to the statistical truth of complex system failures?", "back": "Redundancy (backup systems, spare parts, multiple independent paths)."}, {"front": "What is the practical takeaway or proper response to understanding Murphy's Law?", "back": "Not despair, but preparation. It's an argument for redundancy, margin, and humility."}, {"front": "What specific actions should organizations take to plan for Murphy's Law, rather than trying to avoid it?", "back": "Build in backup systems, test failure modes, and run pre-mortems."}, {"front": "What is the \"Design for Failure\" key concept related to Murphy's Law?", "back": "If a component can fail, it eventually will. Design systems to remain safe and functional even when imperfect humans interact with them in imperfect conditions."}, {"front": "How did the Three Mile Island accident exemplify Murphy's Law, according to the text?", "back": "It was a cascade of small, individually unlikely failures (stuck valve, misleading indicator, operator confusion) that combined unexpectedly to create a crisis."}, {"front": "What kind of failures does Murphy's Law (engineering principle) predict, particularly in complex systems?", "back": "It predicts that something will go wrong, often a combination of small failures interacting in unexpected ways, rather than a single catastrophic event."}, {"front": "How does the engineering principle of Murphy's Law shift the focus of responsibility for potential failures?", "back": "It shifts responsibility from expecting competent users or good luck to the designer for creating systems that prevent or gracefully handle errors."}, {"front": "What is the difference between Murphy's Law and Finagle's Law, as mentioned in the note?", "back": "Murphy's Law is \"Anything that can go wrong, will go wrong,\" while Finagle's Law adds \"at the worst possible time.\" The distinction is largely folk-taxonomic, with the engineering principle being the durable insight."}, {"front": "Name two other concepts mentioned in the \"connections\" section that relate to preparing for the failures Murphy's Law predicts.", "back": "Margin of Safety, Pre-Mortem Analysis, or Gall's Law."}, {"front": "What is the ultimate goal of applying Murphy's Law in system design?", "back": "To ensure systems remain safe and functional even when errors occur or conditions are imperfect, making incompetent use either impossible or non-catastrophic."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
