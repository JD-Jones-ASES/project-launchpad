<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who formalized and named the Prisoner's Dilemma, and who initially developed the concept?", "back": "The Prisoner's Dilemma was formalized and named by Albert W. Tucker, based on work by Merrill Flood and Melvin Dresher at RAND Corporation in 1950.", "id": "fc01"}, {"front": "Describe the basic scenario of the Prisoner's Dilemma.", "back": "Two suspects are arrested for a crime and separated. They are each offered a deal: betray their partner (defect) or stay silent (cooperate).", "id": "fc02"}, {"front": "In the Prisoner's Dilemma, what is the outcome if one suspect betrays and the other stays silent?", "back": "The betrayer goes free, and the silent partner gets ten years in prison.", "id": "fc03"}, {"front": "In the Prisoner's Dilemma, what is the outcome if both suspects stay silent?", "back": "Both suspects cooperate and each get one year on a lesser charge.", "id": "fc04"}, {"front": "In the Prisoner's Dilemma, what is the outcome if both suspects betray each other?", "back": "Both suspects defect and each get five years in prison.", "id": "fc05"}, {"front": "Explain the core paradox of the Prisoner's Dilemma.", "back": "Individually rational choices (betrayal, as it's always better than staying silent regardless of what the partner does) lead to a collectively terrible outcome (both get five years) compared to mutual cooperation (both get one year).", "id": "fc06"}, {"front": "What is a payoff matrix in game theory?", "back": "A payoff matrix shows the outcomes (or 'payoffs') for each combination of choices made by the players in a game. Higher numbers usually represent better outcomes.", "id": "fc07"}, {"front": "What is a 'dominant strategy' in game theory, and what is it in the Prisoner's Dilemma?", "back": "A dominant strategy is one that yields a better outcome for a player regardless of what the other player does. In the Prisoner's Dilemma, defection (betrayal) is the dominant strategy for both players.", "id": "fc08"}, {"front": "Define a Nash equilibrium.", "back": "A Nash equilibrium is a situation in which no player can improve their outcome by unilaterally changing their strategy, assuming the other players' strategies remain unchanged.", "id": "fc09"}, {"front": "Why is mutual defection considered a Nash equilibrium in the Prisoner's Dilemma?", "back": "If both players are defecting, neither player can improve their own outcome by switching to cooperation alone; doing so would result in the worst possible outcome (ten years) for that player.", "id": "fc10"}, {"front": "What is the key distinction between a Nash equilibrium and an optimal outcome in the context of the Prisoner's Dilemma?", "back": "The Nash equilibrium (mutual defection) is the stable outcome that rational self-interest locks players into, but it is not the optimal outcome (mutual cooperation), which would be better for both players.", "id": "fc11"}, {"front": "Provide a real-world example of the Prisoner's Dilemma in international relations.", "back": "Arms races, where two nations would prefer to disarm (cooperation) but each fears being the only one to disarm, leading both to keep building weapons (mutual defection).", "id": "fc12"}, {"front": "How does the Prisoner's Dilemma apply to business competition?", "back": "Price wars: two companies would profit more by keeping prices high (cooperation), but each can gain market share by cutting prices (defection). When both cut prices, both earn less.", "id": "fc13"}, {"front": "Give an example of the Prisoner's Dilemma in environmental issues.", "back": "Environmental degradation: every country benefits from collective emissions reductions, but each has an incentive to 'free-ride' on others' efforts, leading to collective failure.", "id": "fc14"}, {"front": "How was the Prisoner's Dilemma relevant during the Cold War?", "back": "Strategists at the RAND Corporation used it to analyze nuclear deterrence, explaining why superpowers spent trillions on weapons despite preferring disarmament. Arms control treaties were attempts to enforce mutual cooperation.", "id": "fc15"}, {"front": "What is the fundamental difference between the single-round Prisoner's Dilemma and the Iterated Prisoner's Dilemma?", "back": "In the single-round game, defection is always rational. In the iterated game, players interact repeatedly, allowing for the possibility of reputation, punishment, and the emergence of cooperation.", "id": "fc16"}, {"front": "Who organized the famous tournament that explored strategies for the iterated Prisoner's Dilemma, and what was the winning strategy?", "back": "Robert Axelrod organized the tournament. The winning strategy was 'Tit-for-Tat', submitted by Anatol Rapoport.", "id": "fc17"}, {"front": "Describe the Tit-for-Tat strategy.", "back": "The Tit-for-Tat strategy involves cooperating on the first round, and then in subsequent rounds, doing whatever the other player did on the previous round.", "id": "fc18"}, {"front": "What are the four properties Axelrod identified in successful strategies for the Iterated Prisoner's Dilemma?", "back": "Successful strategies were: Nice (never defect first), Retaliatory (punish defection immediately), Forgiving (return to cooperation after the other player does), and Clear (predictable and easy to understand).", "id": "fc19"}, {"front": "Under what condition does cooperation break down due to the 'backward induction problem' in the Iterated Prisoner's Dilemma?", "back": "Cooperation breaks down if both players know the game has a definite, known endpoint. Rational defection on the last round unravels backward to make defection rational in all preceding rounds.", "id": "fc20"}, {"front": "How does anonymity affect cooperation in iterated interactions?", "back": "Anonymity prevents the development of reputation and makes it impossible to track past behavior, thus undermining strategies like Tit-for-Tat that rely on reciprocity to foster cooperation.", "id": "fc21"}, {"front": "Why is cooperation harder to achieve in large groups, relating to the Prisoner's Dilemma?", "back": "In large groups, individual defection is harder to detect and punish compared to a two-person game, making it more difficult to enforce cooperative behavior (e.g., the Tragedy of the Commons).", "id": "fc22"}, {"front": "What did the Iterated Prisoner's Dilemma reveal about trust and cooperation?", "back": "It showed that cooperation is not naive but can be a rational strategy under conditions of repeated interaction, reciprocity, and transparency. Trust is not automatic; it must be built, maintained, and protected through specific mechanisms.", "id": "fc23"}, {"front": "Who was John Nash, and for what concept did he receive the Nobel Prize in Economics?", "back": "John Nash was an American mathematician who received the Nobel Prize in Economics for his work on game theory, particularly for the concept of the Nash equilibrium.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
