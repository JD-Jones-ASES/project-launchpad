<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core premise of the Prisoner's Dilemma?", "back": "It is a game theory model where individually rational choices by two parties lead to a collectively suboptimal outcome that both would prefer to avoid."}, {"front": "Who formalized and named the Prisoner's Dilemma?", "back": "Albert W. Tucker, based on earlier work by Merrill Flood and Melvin Dresher at RAND Corporation in 1950."}, {"front": "In the classic Prisoner's Dilemma scenario, what is the individually rational choice for each suspect?", "back": "Betrayal (or defection), because it yields a better outcome for that individual regardless of what their partner chooses."}, {"front": "What is the collective outcome when both players in a single-round Prisoner's Dilemma act on individual rationality?", "back": "Both defect (betray), leading to a worse outcome for both compared to if they had both cooperated (stayed silent)."}, {"front": "What is a 'payoff matrix' in game theory?", "back": "A representation that shows the outcomes (payoffs) for each player for every possible combination of choices made by the players."}, {"front": "In a Prisoner's Dilemma payoff matrix, what do higher numbers typically represent?", "back": "Better outcomes for the player, often representing years avoided (less punishment) or higher gains."}, {"front": "What is a 'dominant strategy' in game theory?", "back": "A strategy that yields a better outcome for a player regardless of what the other player(s) do."}, {"front": "What is a Nash equilibrium?", "back": "A situation in which no player can improve their outcome by unilaterally changing their strategy, assuming the other players' strategies remain unchanged."}, {"front": "What is the Nash equilibrium outcome in a single-round Prisoner's Dilemma?", "back": "Mutual defection, where both players betray each other."}, {"front": "How does the Prisoner's Dilemma illustrate the difference between 'stability' and 'optimality'?", "back": "The Nash equilibrium (mutual defection) is a stable outcome because no one can unilaterally improve. However, it is not the optimal outcome, as mutual cooperation would yield a better result for both, showing that stability doesn't always mean the best outcome."}, {"front": "Provide one real-world example of the Prisoner's Dilemma structure.", "back": "Arms races, price wars, environmental degradation, or academic dishonesty."}, {"front": "How did the Prisoner's Dilemma framework apply to the Cold War?", "back": "It explained why superpowers continued building weapons (mutual defection) despite preferring disarmament (mutual cooperation), due to the individual fear of being exploited if disarming alone."}, {"front": "What is the key difference between the 'single-round' and 'iterated' Prisoner's Dilemma?", "back": "The single-round game is played once, while the iterated version involves repeated interactions between the same players, which can dramatically change rational strategies."}, {"front": "Who organized the famous computer tournament for the Iterated Prisoner's Dilemma in the early 1980s?", "back": "Political scientist Robert Axelrod."}, {"front": "What was the name of the winning strategy in Axelrod's tournament, and who submitted it?", "back": "Tit-for-Tat, submitted by mathematician Anatol Rapoport."}, {"front": "Describe the two simple rules of the Tit-for-Tat strategy.", "back": "1. Cooperate on the first round. 2. After that, do whatever the other player did on the previous round."}, {"front": "What does it mean for a successful strategy in the Iterated Prisoner's Dilemma to be 'Nice'?", "back": "They never defect first; cooperation is the default."}, {"front": "What does it mean for a successful strategy to be 'Retaliatory'?", "back": "They punish defection immediately, preventing exploitation."}, {"front": "What does it mean for a successful strategy to be 'Forgiving'?", "back": "They return to cooperation after the other player does, avoiding endless cycles of mutual defection."}, {"front": "What does it mean for a successful strategy to be 'Clear'?", "back": "Their behavior is predictable and easy for the other player to understand, which builds trust."}, {"front": "What is the key conclusion about cooperation from the Iterated Prisoner's Dilemma?", "back": "Under conditions like repeated interaction, the ability to punish and forgive, and transparency, cooperation can be a rational and advantageous strategy, making trust a competitive advantage."}, {"front": "Explain the 'backward induction problem' in the context of cooperation breakdown.", "back": "If players know the game's endpoint, defection becomes rational in the last round. This logic then unravels backward, making defection rational in all preceding rounds, destroying cooperation."}, {"front": "How does 'anonymity' hinder cooperation in repeated interactions?", "back": "Anonymity prevents the development of reputation and the tracking of past behavior, making reciprocal strategies like Tit-for-Tat ineffective and undermining the basis for cooperation."}, {"front": "Why is cooperation often harder to achieve in 'large groups'?", "back": "In large groups, individual defection is harder to detect and punish, leading to free-riding and making it difficult to maintain cooperative efforts."}, {"front": "Who was John Nash, and what was his most significant contribution to game theory?", "back": "An American mathematician who received the Nobel Prize in Economics for the concept of the Nash equilibrium, which describes stable outcomes in strategic interactions."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
