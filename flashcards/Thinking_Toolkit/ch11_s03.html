<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 11, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core ethical dilemma presented by the 'Drowning Child' thought experiment?", "back": "It presents a scenario where one must choose between a minor personal inconvenience (ruined shoes, late for meeting) and saving a child's life, then extends this to global suffering."}, {"front": "Who is the philosopher associated with the 'Drowning Child' argument and its implications for global poverty?", "back": "Peter Singer, notably in his 1972 paper 'Famine, Affluence, and Morality' and expanded in 'The Life You Can Save' (2009)."}, {"front": "Summarize Peter Singer's main argument from 'Famine, Affluence, and Morality'.", "back": "If it is in our power to prevent something very bad from happening, without thereby sacrificing anything of comparable moral importance, we ought to do it. This principle applies universally, regardless of distance."}, {"front": "In the original 'Drowning Child' scenario, what is the obvious moral judgment?", "back": "The answer is 'yes,' one should save the child. No pair of shoes or meeting is worth a child's life; not saving them would be morally monstrous."}, {"front": "What specific principle does Singer propose regarding preventing bad things from happening?", "back": "If it is in our power to prevent something very bad from happening, without thereby sacrificing anything of comparable moral importance, we ought to do it."}, {"front": "How does Singer argue that the moral obligation to save a nearby drowning child compares to a distant dying child?", "back": "Singer argues that distance does not change the moral calculus; the child dying of malaria in a distant country is just as dead as the child drowning at your feet, and thus the moral obligation is the same."}, {"front": "According to Singer, why do our feelings often differ regarding nearby vs. distant suffering?", "back": "Our feelings reflect limits of our 'evolved psychology,' developed in small communities. These intuitions haven't caught up with a world where choices affect distant people."}, {"front": "What is the 'identifiable victim effect'?", "back": "It's a psychological phenomenon where people respond more strongly to specific, visible individuals (identified victims) than to abstract statistics of suffering."}, {"front": "How does the 'identifiable victim effect' relate to our response to the drowning child vs. distant children?", "back": "The drowning child is an identifiable victim, eliciting a strong response. Distant dying children are often perceived as statistics, leading to a weaker emotional and moral response."}, {"front": "Explain 'diffusion of responsibility' in the context of Singer's argument.", "back": "It's the feeling that when many people could help (e.g., donate to fight malaria), each individual feels less obligated than when they are the sole person who can act (e.g., save the drowning child)."}, {"front": "How does the concept of 'certainty' differentiate saving a drowning child from donating to charity?", "back": "Saving the drowning child offers certainty that your action will directly save them. Donating to charity involves uncertainty about whether the money will reach the right people or be used effectively."}, {"front": "According to Singer, are psychological factors like identifiability or proximity morally relevant?", "back": "No, Singer argues these psychological differences are not morally relevant. The fact that we feel less obligated does not mean we are less obligated."}, {"front": "What is the logical conclusion of Singer's principle regarding how much a typical middle-class person should give to charity?", "back": "It implies that one should keep giving until the marginal cost to oneself equals the marginal benefit to others, suggesting donating the vast majority of one's income."}, {"front": "How did Singer moderate his position on 'how much to give' in 'The Life You Can Save' (2009)?", "back": "He argued for a more achievable standard: a sliding scale of giving based on income, starting at roughly one percent for modest earners and rising for the wealthy, making it a practical recommendation."}, {"front": "What is the 'tension in moral theory' that the drowning child argument reveals?", "back": "It reveals a tension between impartiality (treating everyone's interests equally) and partiality (giving special weight to those closest to you, like family or friends)."}, {"front": "Define and differentiate between 'impartiality' and 'partiality' in moral theory.", "back": "Impartiality means treating everyone's interests equally, without favoritism. Partiality means giving special weight or preference to the interests of those closest to you (e.g., family, friends)."}, {"front": "Name another influential work by Peter Singer and the movement it helped launch.", "back": "'Animal Liberation' (1975), which helped launch the modern animal rights movement."}, {"front": "What movement did Singer's argument about our obligations to the global poor help found?", "back": "The effective altruism movement."}, {"front": "If you accept Singer's argument that distance is not morally relevant, what does that imply about your personal responsibilities?", "back": "It implies that you have a moral obligation to help distant others (e.g., by donating to effective charities) if you can do so without sacrificing something of comparable moral importance."}, {"front": "Why might our 'evolved psychology' lead us to feel less obligated to distant suffering?", "back": "Our moral intuitions developed in small, close-knit communities where everyone was nearby and identifiable, and these intuitions haven't adapted to a globally interconnected world."}, {"front": "What does 'comparable moral importance' mean in the context of Singer's principle?", "back": "It means the sacrifice required to prevent a bad thing from happening should not itself be something that is equally or more morally significant than the bad thing being prevented."}, {"front": "Provide an example of how 'effort and directness' might influence someone's perceived obligation.", "back": "Saving a drowning child is a single, direct, concrete action. Addressing global poverty, however, requires sustained, abstract commitment and effort, which can feel less immediate and impactful."}, {"front": "How does the 'Drowning Child' thought experiment highlight the difference between moral feelings and moral obligations?", "back": "It shows that while people may feel a stronger emotional pull to nearby suffering, Singer argues that these feelings do not necessarily dictate our actual moral obligations, which should be consistent regardless of proximity."}, {"front": "What is one of the 'deepest unsettled problems in ethics' highlighted by this discussion?", "back": "The question of how demanding morality can reasonably be, and whether it requires significant personal sacrifice for the benefit of strangers."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
