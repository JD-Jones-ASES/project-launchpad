<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Availability Heuristic?", "back": "A mental shortcut where people judge the frequency or probability of an event based on how easily examples or instances come to mind."}, {"front": "Who identified the Availability Heuristic and when?", "back": "Daniel Kahneman and Amos Tversky identified it in their landmark 1973 paper, 'Availability: A Heuristic for Judging Frequency and Probability.'"}, {"front": "What fundamental cognitive error does the Availability Heuristic lead to?", "back": "It causes the brain to confuse 'easy to imagine/recall' with 'likely to happen' or 'frequent,' leading to biased judgments."}, {"front": "List factors that make examples 'easy to recall' and thus influence the Availability Heuristic.", "back": "Examples come to mind quickly if they are vivid, recent, emotionally charged, heavily covered by media, or part of personal experience."}, {"front": "According to the Availability Heuristic, why do most people overestimate the danger of shark attacks compared to falling airplane parts?", "back": "Shark attacks are vivid, terrifying, and heavily covered by the media, making them easier to recall and thus seem more likely, despite falling airplane parts causing more deaths."}, {"front": "Describe Kahneman and Tversky's classic 'letter K' experiment that demonstrated the Availability Heuristic.", "back": "Participants incorrectly judged that the letter K appears more often as the first letter of English words than as the third, because words starting with K are easier to recall. In reality, K appears twice as often as the third letter."}, {"front": "Is the Availability Heuristic considered a flaw in human cognition or a feature? Explain.", "back": "It's considered a feature of all human cognition. In many everyday situations, ease of recall is a reasonable proxy for frequency, making it an efficient mental tool."}, {"front": "When does the Availability Heuristic become problematic or lead to systematically biased judgments?", "back": "It becomes problematic when factors unrelated to actual frequency (e.g., media coverage, emotional intensity, recency) inflate the ease of recall, making an event seem more probable than it is."}, {"front": "How does the Availability Heuristic explain why people might switch to driving after a highly publicized plane crash, despite driving being more dangerous?", "back": "The vivid and dramatic media coverage of a plane crash makes it highly available in memory, leading to an overestimation of flying risk, pushing individuals toward the statistically more dangerous option of driving."}, {"front": "According to Gerd Gigerenzer's estimation, what was the impact of the Availability Heuristic on driving deaths after the September 11 attacks?", "back": "The increase in fear-driven road traffic led to approximately 1,600 additional driving deaths in the twelve months following the attacks, more than six times the number of passengers who died in the hijacked planes."}, {"front": "How does the Availability Heuristic distort people's perception of crime rates, particularly for those who watch a lot of television news?", "back": "Nightly news disproportionately shows vivid crime stories, making them readily available in memory. This leads frequent viewers to overestimate violent crime rates and feel less safe, even when actual crime rates are declining."}, {"front": "Provide an example of how the Availability Heuristic can affect medical diagnosis.", "back": "A physician who has recently seen an unusual case of a rare disease is more likely to diagnose the next ambiguous patient with that same rare disease, because the diagnosis is freshly available in their memory, not necessarily due to objective evidence."}, {"front": "What is the recommended 'antidote' or counter-measure for the Availability Heuristic when making judgments?", "back": "To explicitly ask oneself: 'Am I judging frequency, or am I judging how memorable this is?' This prompts a more statistical or objective assessment."}, {"front": "What was Daniel Kahneman's key contribution, alongside Amos Tversky, to the study of human judgment?", "back": "They revolutionized the understanding of human judgment and decision-making by demonstrating that human reasoning relies on powerful but systematically biased heuristics, leading Kahneman to receive the Nobel Prize in Economics in 2002."}, {"front": "What was Amos Tversky's specific role in his collaboration with Daniel Kahneman on heuristics and biases?", "back": "Tversky was Kahneman's closest collaborator, contributing mathematical brilliance to their partnership. Their joint papers reshaped economics, medicine, law, and public policy, although he died before the Nobel Prize was awarded."}, {"front": "How does the Availability Heuristic connect to Base Rate Neglect?", "back": "Both are cognitive biases where our probability judgments go wrong; Availability concerns ease of recall, while Base Rate Neglect involves ignoring general statistical information in favor of specific details."}, {"front": "How does the Availability Heuristic relate to the Peak-End Rule?", "back": "While availability distorts judgments of frequency/probability based on memorable examples, the Peak-End Rule describes how memory distorts our evaluation of entire experiences based primarily on their peak and end moments."}, {"front": "How might Confirmation Bias interact with the Availability Heuristic?", "back": "The Availability Heuristic can make certain information more prominent in memory, and Confirmation Bias then leads us to selectively notice and interpret information that aligns with those easily recalled beliefs or impressions, reinforcing the initial bias."}, {"front": "In what circumstances is the Availability Heuristic generally effective and useful?", "back": "In many everyday situations, things that happen often are genuinely easier to remember, making the heuristic a quick and often accurate way to estimate frequency."}, {"front": "What is the core principle summarized by the key concept 'Ease of Recall ≠ Frequency'?", "back": "It means we tend to judge the probability or frequency of events by how easily examples come to mind, leading us to believe vivid, recent, or emotionally charged events are more common than they truly are."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
