<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Availability Heuristic?", "back": "A mental shortcut where people judge the frequency or probability of an event based on how easily examples or instances come to mind."}, {"front": "Who first identified and studied the Availability Heuristic?", "back": "Daniel Kahneman and Amos Tversky, in their landmark 1973 paper 'Availability: A Heuristic for Judging Frequency and Probability.'"}, {"front": "In the context of the availability heuristic, what does the brain often confuse?", "back": "The brain often confuses 'easy to imagine' or 'easy to recall' with 'likely to happen' or 'frequent,' leading to biased judgments."}, {"front": "Provide an example of the availability heuristic related to perceived danger.", "back": "Most people confidently answer shark attacks when asked which kills more people than falling airplane parts each year in the US, despite falling airplane parts being far more deadly. Shark attacks are more vivid and heavily covered by media."}, {"front": "According to Kahneman and Tversky's research, what characteristics make examples easier to recall and thus inflate perceived frequency?", "back": "Examples that are vivid, recent, or emotionally charged come to mind more quickly, making the event seem more frequent or probable than it is."}, {"front": "Describe Kahneman and Tversky's 'letter K' experiment.", "back": "Participants were asked if the letter K appears more often as the first or third letter of English words. Most said first (easier to recall words like 'king'), but K actually appears as the third letter roughly twice as often. Ease of retrieval trumped actual frequency."}, {"front": "Why is the availability heuristic considered a 'feature' of human cognition, rather than just a flaw?", "back": "In many everyday situations, ease of recall is a reasonable proxy for actual frequency; things that happen often are generally easier to remember. The problem arises when other factors distort recall ease."}, {"front": "What factors can inflate the ease of recall without inflating the actual frequency of an event, leading to a biased judgment?", "back": "Media coverage, emotional intensity, personal experience, and recency can make events easier to recall, distorting our perception of their true frequency."}, {"front": "How does the availability heuristic influence people's travel choices after a highly publicized plane crash?", "back": "People often switch to driving, perceiving it as safer, even though statistics show driving is far more dangerous mile for mile. The vivid, dramatic crash makes flying seem riskier."}, {"front": "How does watching a lot of television news often distort people's perception of crime rates?", "back": "People tend to overestimate violent crime rates in their communities because news focuses on dramatic incidents, making crime stories highly available, even if actual crime rates are declining."}, {"front": "What is the core principle connecting ease of recall and frequency, according to the text?", "back": "We judge the probability of events by how easily examples come to mind. Vivid, recent, or emotionally charged events feel more common than they are, even if their actual frequency is low."}, {"front": "What question is recommended to counteract the availability heuristic?", "back": "The antidote is to ask: 'Am I judging frequency, or am I judging how memorable this is?'"}, {"front": "Give a real-world example of the availability heuristic affecting public behavior after a major event, specifically referencing the 9/11 attacks.", "back": "After 9/11, many Americans avoided air travel and drove instead. The resulting increase in road traffic led to an estimated 1,600 additional driving deaths in the following year, more than six times the number of passengers who died in the hijacked planes."}, {"front": "How can the availability heuristic impact medical diagnosis?", "back": "A physician who has recently seen an unusual case of a rare disease might be more likely to diagnose the next ambiguous patient with that same rare disease, not because the evidence points there, but because the diagnosis is freshly available in memory."}, {"front": "What was Daniel Kahneman's key contribution to the study of human judgment and decision-making?", "back": "Together with Amos Tversky, he revolutionized the understanding of human judgment, demonstrating that reasoning relies on powerful but systematically biased heuristics."}, {"front": "What recognition did Daniel Kahneman receive for his work, and when?", "back": "He received the Nobel Prize in Economics in 2002 for his work with Amos Tversky."}, {"front": "What was Amos Tversky's role in his collaboration with Daniel Kahneman?", "back": "He was an Israeli cognitive psychologist and Kahneman's closest collaborator, whose mathematical brilliance and psychological intuition formed one of the most productive partnerships in social science history."}, {"front": "Why did Amos Tversky not receive the Nobel Prize alongside Daniel Kahneman?", "back": "Tversky died in 1996, six years before the Nobel committee honored their work, and Nobel Prizes are not awarded posthumously."}, {"front": "Describe the overall impact of Kahneman and Tversky's research program.", "back": "Their joint papers on heuristics, prospect theory, and framing effects reshaped fields like economics, medicine, law, and public policy, demonstrating the systematic biases in human decision-making."}, {"front": "What common cognitive error causes individuals to overestimate risks for events that are dramatic but statistically rare?", "back": "The Availability Heuristic, which makes memorable events seem more frequent than they actually are."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
