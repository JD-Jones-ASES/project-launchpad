<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the acronym PoSiWiD stand for?", "back": "PoSiWiD stands for 'The Purpose of a System Is What It Does'."}, {"front": "Who coined the term PoSiWiD, and what was his field?", "back": "Stafford Beer, a British cyberneticist and pioneer of management cybernetics."}, {"front": "What is the core principle of PoSiWiD regarding a system's purpose?", "back": "A system's true purpose is revealed by what it actually does and reliably produces, not by its stated intentions, mission statements, or operators' beliefs."}, {"front": "According to PoSiWiD, what is the key difference between a system's stated purpose and its actual purpose?", "back": "The stated purpose is an aspiration or intention, while the actual purpose is what the system reliably outputs and its behavior reveals."}, {"front": "If a national prison system states its purpose is rehabilitation but produces high recidivism, what is its de facto purpose according to PoSiWiD?", "back": "Its de facto purpose is closer to warehousing and social exclusion, as evidenced by its outputs."}, {"front": "How would PoSiWiD analyze a healthcare system that produces profit more reliably than health?", "back": "PoSiWiD would identify profit generation as the system's de facto purpose, with healthcare potentially being a byproduct."}, {"front": "By PoSiWiD logic, what is the functional purpose of an education system that sorts students into social tiers more reliably than it cultivates understanding?", "back": "Its functional purpose is sorting students into social tiers."}, {"front": "Is PoSiWiD intended as a cynical conclusion or a diagnostic tool? Explain.", "back": "It is a diagnostic tool. It strips away comfortable narratives to confront a system's actual behavior, helping to understand its real function rather than just criticize."}, {"front": "What legal principle is PoSiWiD compared to in the text?", "back": "It is compared to the legal principle that people are presumed to intend the natural consequences of their actions."}, {"front": "What is the most effective way to understand what a system is 'for,' according to PoSiWiD?", "back": "Observe its outputs, count what it produces, follow the money, time, and attention – rather than reading its charter or mission statement."}, {"front": "Name one major work or concept associated with Stafford Beer besides PoSiWiD.", "back": "The Viable System Model, Brain of the Firm, or The Heart of Enterprise."}, {"front": "What was Project Cybersyn, and why was it significant?", "back": "Project Cybersyn was an ambitious attempt led by Stafford Beer in Chile (1971–1973) to manage the economy in real-time using networked computers and cybernetic principles, decades before the internet made such ideas commonplace."}, {"front": "When applying PoSiWiD, what crucial distinction must be made between system failure and actual purpose?", "back": "Not every bad outcome is 'the purpose.' PoSiWiD is most useful when a system *persistently* produces outcomes diverging from stated goals despite repeated reform efforts, indicating a functional difference, not just a failure."}, {"front": "How does PoSiWiD help cut through rhetoric when analyzing organizations?", "back": "It directs attention to measurable results and actual behavior, rather than well-meaning rhetoric or stated intentions, revealing the system's true operational purpose."}, {"front": "How do 'Feedback Loops' relate to PoSiWiD?", "back": "Feedback loops describe the reinforcing and balancing mechanisms that can lock systems into their actual, often unintended, outputs, illustrating how PoSiWiD's observed 'purpose' becomes entrenched."}, {"front": "How does 'The Cobra Effect' exemplify a scenario where PoSiWiD would be relevant?", "back": "The Cobra Effect shows how incentive structures can lead to outputs that spectacularly diverge from original intent, directly aligning with PoSiWiD's focus on actual outcomes over stated goals."}, {"front": "What is the connection between 'Goodhart's Law' and PoSiWiD?", "back": "Goodhart's Law states that when a measure becomes a target, it ceases to be a good measure. This connects to PoSiWiD by showing how a system's true purpose can be corrupted when intentions (the measure) diverge from actual outcomes (the target)."}, {"front": "How do 'Incentives' influence a system's actual purpose according to PoSiWiD?", "back": "PoSiWiD recognizes that system behavior often follows incentive structures, regardless of stated intentions, meaning the true purpose is often aligned with what the incentives actually reward."}, {"front": "In the context of PoSiWiD, why are 'outputs the truth' and 'intentions commentary'?", "back": "Outputs are empirical evidence of what the system consistently does, serving as undeniable truth. Intentions, while potentially noble, are merely explanations or aspirations that may not align with the system's reality."}, {"front": "When analyzing a corporation, how would PoSiWiD guide your understanding of its true purpose?", "back": "PoSiWiD would direct me to look at what the corporation reliably produces (e.g., profit, innovation, environmental impact) rather than what it claims to produce (e.g., 'customer satisfaction,' 'social good')."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
