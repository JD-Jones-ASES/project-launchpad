<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 20, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary focus of the 'Boiling Frog Revisited' section?", "back": "It applies the 'Boiling Frog' metaphor to institutional and cultural decay, describing slow, unnoticed drift that transforms organizations, communities, and societies."}, {"front": "How does the 'Boiling Frog Revisited' (institutional version) differ from the individual 'Boiling Frog' metaphor?", "back": "The institutional version applies to collective inattention and highlights that institutions often cannot 'jump out' because insiders adjust their sense of 'normal' at every step, making the drift harder to detect and correct."}, {"front": "What term did sociologist Diane Vaughan coin to describe the gradual acceptance of abnormal behavior as normal within an organization?", "back": "Normalization of deviance."}, {"front": "Explain how the Challenger disaster exemplifies the 'normalization of deviance.'", "back": "Engineers knew O-rings were eroding, but because past flights succeeded despite it, the erosion was gradually reclassified from 'alarming anomaly' to 'acceptable risk' to 'expected behavior,' leading to catastrophe."}, {"front": "Describe the core mechanism of 'institutional boiling.'", "back": "The 'temperature' rises one degree at a time; each step is barely noticeable and doesn't cross a 'bright line.' Cumulatively, it completely transforms what the organization considers acceptable."}, {"front": "Why are individuals inside an institution poorly positioned to recognize 'institutional boiling'?", "back": "They are the 'frogs in the water,' having adjusted to each incremental change. Their 'sense of normal' shifts in lockstep with the changes, making them perceive continuity rather than drift."}, {"front": "Provide an example of 'institutional boiling' in a news organization.", "back": "Gradually replacing investigative reporting with opinion commentary, not through a single decision, but hundreds of small budget reallocations, hiring choices, and content decisions over years."}, {"front": "How might a democratic institution undergo 'institutional boiling'?", "back": "By slowly concentrating power in the executive through a series of 'emergency measures,' each seeming reasonable in its immediate context, rather than through a single dramatic coup."}, {"front": "What is the antidote to 'institutional boiling'?", "back": "Deliberate comparison to a fixed standard (e.g., founding principles, written policy, aspirational culture), rather than comparing only to the most recent past."}, {"front": "What is the key takeaway from the concept of 'Gradual Decay and Institutional Drift'?", "back": "When change is slow, institutions lose the ability to recognize how far they've drifted from original standards. Small deviations are normalized, and the cumulative effect, invisible to insiders, is transformative. Antidote: fixed benchmarks."}, {"front": "How does the Boeing 737 MAX disaster serve as a real-world example of 'institutional boiling'?", "back": "Boeing's culture slowly shifted from engineering-driven to finance-driven through cost-cutting and organizational changes, eroding its safety culture. No single decision was catastrophic, but the cumulative drift contributed to design failures and fatal crashes."}, {"front": "What critical psychological adjustment prevents individuals within an institution from noticing 'slow drift'?", "back": "Their 'sense of normal' has shifted in lockstep with the incremental changes, making them perceive continuity rather than a significant transformation."}, {"front": "Why is the absence of a 'single bright line' crossing a significant factor in institutional boiling?", "back": "Each incremental change is barely noticeable and doesn't appear to violate a clear, established standard, making it easier to accept and harder to challenge until cumulative effects become severe."}, {"front": "In the context of ethical decay, what role do 'small violations' play in institutional boiling?", "back": "Small violations become 'precedents for larger ones,' gradually relaxing ethical standards without formally abandoning the code of ethics."}, {"front": "Which psychological bias is related to the difficulty of recognizing gradual change, where people prefer the current state of affairs?", "back": "Status Quo Bias."}, {"front": "Which concept describes how the range of acceptable ideas in society shifts gradually over time, similar to institutional boiling?", "back": "The Overton Window."}, {"front": "The antidote to institutional boiling is compared to which other concept that emphasizes understanding existing structures before changing them?", "back": "Chesterton's Fence."}, {"front": "What was the original focus of the 'Boiling Frog' metaphor introduced in an earlier chapter?", "back": "It was introduced as an everyday warning about individual inattention to gradual change."}, {"front": "What is the main danger of institutional boiling that is difficult for insiders to perceive?", "back": "Insiders experience only continuity, thinking 'We have always done it this way,' while the actual practices and standards have fundamentally changed over time."}, {"front": "In the Boeing example, what was the fundamental cultural shift that contributed to 'institutional boiling'?", "back": "A shift from an engineering-driven culture to a finance-driven culture, prioritizing cost-cutting over safety, gradually eroding the company's traditional values."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
