<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Agrippa's Trilemma also known as, and who attributed it?", "back": "It is also known as the M\"unchhausen Trilemma (after Hans Albert, 1968) and is attributed to Agrippa the Skeptic (1st century AD), reported by Sextus Empiricus."}, {"front": "What fundamental problem in epistemology does Agrippa's Trilemma address?", "back": "It addresses the problem of justifying a belief, stating that every attempt to justify a belief ultimately faces three unsatisfying options."}, {"front": "Name the three options (horns) presented by Agrippa's Trilemma.", "back": "Infinite Regress, Circular Reasoning, and Dogmatism (or Foundationalism)."}, {"front": "Explain the 'Infinite Regress' option in Agrippa's Trilemma.", "back": "Every justification requires a further justification, which requires another, and so on, forever. It's intellectually honest but practically impossible to trace an infinite chain of reasons."}, {"front": "What is the primary flaw of an infinite regress of justifications?", "back": "It is practically impossible to complete or trace, as you can never reach solid ground or a definitive conclusion."}, {"front": "Describe 'Circular Reasoning' as a horn of Agrippa's Trilemma.", "back": "The chain of justification eventually loops back on itself (e.g., A is true because of B, B because of C, and C because of A). It lacks an independent foundation."}, {"front": "What analogy is used to explain the problem with circular reasoning?", "back": "The Baron M\"unchhausen pulling himself out of a swamp by his own hair, illustrating that a system cannot hold itself up without external support."}, {"front": "Define 'Dogmatism' (or Foundationalism) in the context of Agrippa's Trilemma.", "back": "The chain of justification stops at some belief that is simply asserted without further justification (e.g., 'self-evident,' 'basic axiom'). The bottom is arbitrary or not itself justified."}, {"front": "What is the main problem with the 'Dogmatism' option?", "back": "The belief chosen as the stopping point is arbitrary or not itself justified by anything outside itself, making the foundation intellectually arbitrary."}, {"front": "Why are the three options of Agrippa's Trilemma considered exhaustive?", "back": "Every chain of justification must either continue forever, loop back on itself, or stop somewhere; there is no fourth possibility."}, {"front": "What is the fundamental flaw associated with each of Agrippa's three options?", "back": "Infinite regress is impractical; circularity is logically empty; and dogmatism is intellectually arbitrary."}, {"front": "Does Agrippa's Trilemma prove that knowledge is impossible?", "back": "No, it does not. Instead, it shows that 'certain knowledge'—knowledge justified all the way down with no gaps or assumptions—is impossible."}, {"front": "What profound implication does Agrippa's Trilemma have for all systems of belief?", "back": "Every system of belief, no matter how rigorous, ultimately rests on something it cannot independently prove."}, {"front": "How do 'Foundationalists' respond to Agrippa's Trilemma?", "back": "They accept the dogmatism option, trying to identify beliefs that are genuinely self-justifying or basic, needing no external support."}, {"front": "What is the classic example of a self-justifying belief cited by foundationalists?", "back": "Descartes' 'I think, therefore I am' (Cogito, ergo sum), which proves itself in the act of doubting it."}, {"front": "How do 'Coherentists' respond to Agrippa's Trilemma?", "back": "They accept a version of the circularity option, viewing justification as a web where beliefs mutually justify each other, and the system's strength lies in its overall coherence."}, {"front": "What analogy do Coherentists use to describe justification?", "back": "Justification is a web, not a chain, where beliefs interlink and mutually support each other."}, {"front": "How do 'Infinitists' respond to Agrippa's Trilemma?", "back": "They accept the infinite regress option, arguing that an infinite chain of reasons is not absurd because each belief can have a justification, even if the chain never terminates."}, {"front": "What is the 'real value' of Agrippa's Trilemma, beyond being a puzzle?", "back": "It serves as a tool for intellectual honesty and humility, inviting us to question the foundations of arguments that claim absolute certainty."}, {"front": "Give an example of Agrippa's Trilemma surfacing in the field of law.", "back": "Constitutional interpretation ultimately rests on the authority of the constitution itself, but what justifies that authority?"}, {"front": "How does Agrippa's Trilemma apply to the scientific method?", "back": "The scientific method relies on assumptions (e.g., uniformity of nature, reliability of observation) that cannot be scientifically tested without circularity."}, {"front": "Which mathematical concept is mentioned as a formal counterpart to Agrippa's Trilemma's insight?", "back": "G\"odel's incompleteness theorems, which prove that any sufficiently powerful formal system contains truths it cannot prove from within itself."}, {"front": "What is the core message of Agrippa's Trilemma regarding all knowledge systems?", "back": "All knowledge systems, including the most rigorous sciences, rest on foundations they cannot independently prove, fostering a counsel of humility rather than despair."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
