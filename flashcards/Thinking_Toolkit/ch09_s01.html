<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Plato's Allegory of the Cave primarily about?", "back": "It is a parable about the nature of reality, education, and the cost of seeing clearly."}, {"front": "Describe the initial state of the prisoners in Plato's Cave.", "back": "They are chained since birth, facing a blank wall, seeing only shadows projected by objects and a fire behind them. For them, these shadows constitute all of reality."}, {"front": "What creates the 'reality' that the chained prisoners perceive in the cave?", "back": "Objects carried by people between a burning fire and the prisoners cast shadows on the wall that the prisoners face."}, {"front": "What does Plato suggest the 'chains' in the allegory represent?", "back": "They represent habits of thought, unexamined assumptions, and inherited cultural opinions that we mistake for truth."}, {"front": "What happens when a prisoner is first freed and dragged out of the cave?", "back": "The sunlight is blinding and painful, making him unable to see. His eyes must gradually adjust to the light."}, {"front": "What does the freed prisoner realize about the shadows once he sees the outside world?", "back": "He realizes that the shadows were mere projections of a deeper reality, not reality itself."}, {"front": "What does the sun symbolize in Plato's Allegory of the Cave?", "back": "The sun symbolizes the ultimate source of all light, visibility, and knowledge, often understood as representing the Form of the Good or ultimate truth."}, {"front": "How do the other prisoners react when the freed prisoner returns to the cave?", "back": "They mock him, believe his eyes are ruined, and see his journey as worthless or dangerous, as he can no longer navigate their shadow-world effectively."}, {"front": "According to Plato, what is the ultimate danger faced by someone who tries to free others from the cave?", "back": "Plato suggests they might be killed by those who prefer their familiar darkness and resist being led to uncomfortable truth."}, {"front": "What is the allegory's message about genuine education?", "back": "Genuine education is a painful process of moving from comfortable ignorance to uncomfortable knowledge, requiring us to abandon comfortable illusions."}, {"front": "Explain Plato's central metaphysical claim illustrated by the allegory.", "back": "The physical world we perceive through our senses (the shadows) is an imperfect representation or 'shadow' of a higher, unchanging reality (the Forms) that can only be accessed through reason."}, {"front": "What is the 'most urgent level' of the allegory's meaning?", "back": "It is about the social cost of truth: those who see clearly often face ridicule, hostility, and danger from those who prefer comfortable illusions."}, {"front": "How does Socrates' fate relate to the Allegory of the Cave?", "back": "Socrates, Plato's teacher, was executed for making people uncomfortable with their assumptions, illustrating the danger Plato describes for those who try to 'drag others into the light.'"}, {"front": "Who was Plato?", "back": "An Athenian philosopher, student of Socrates, teacher of Aristotle, and founder of the Academy, known for his theory of Forms and works like 'The Republic'."}, {"front": "In which of Plato's works does the Allegory of the Cave appear?", "back": "It appears in 'The Republic', arguably his most influential work of political and moral philosophy."}, {"front": "According to the allegory, what are the three enduring ideas it illustrates?", "back": "1) Much of what we take for reality is a projection; 2) genuine education is painful, requiring abandonment of illusions; and 3) those who see clearly often face hostility."}, {"front": "Give a modern 'real-world' example of the Cave allegory's relevance.", "back": "Whistleblowers exposing corruption, scientists challenging established paradigms, or individuals changing deeply held beliefs all experience aspects of the allegory's themes."}, {"front": "What is the difference between the prisoners' 'wisdom' and genuine understanding in the allegory?", "back": "The prisoners' 'wisdom' is expertise in predicting shadow patterns (sensory perception of appearances), whereas genuine understanding involves seeing the real objects and the source of light (reason accessing deeper reality)."}, {"front": "Why is the freed prisoner's return to the cave described as 'the hardest part'?", "back": "Because he faces ridicule, incomprehension, and potential violence from those still in ignorance, and struggles to re-engage with the limited shadow-world he once knew."}, {"front": "What does Plato mean by 'Forms' in relation to the physical world?", "back": "Forms are a higher, unchanging reality or ideal essences that the physical world imperfectly copies, accessible through reason rather than the senses."}, {"front": "What is an allegory?", "back": "An allegory is a story, poem, or picture that can be interpreted to reveal a hidden meaning, typically a moral or political one, operating on multiple levels simultaneously."}, {"front": "How does the allegory explain why people might resist new truths or insights?", "back": "People are comfortable with their established 'shadow-world' and find the discomfort, disorientation, and challenge to their existing 'reality' that new knowledge brings to be threatening or painful."}, {"front": "What is the relationship between 'appearance' and 'reality' in the allegory?", "back": "The shadows are appearances, imperfect representations caused by real objects. The relationship is one of imperfect representation, not identity, suggesting a deeper reality beyond sensory perception."}, {"front": "Plato founded the first institution of higher learning in the Western world. What was it called?", "back": "The Academy."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
