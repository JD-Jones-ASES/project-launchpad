    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 20, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the origin of the 'Black Swan' metaphor?", "back": "The metaphor comes from the ancient Western belief that all swans were white, which was disproven when Dutch explorers discovered black swans in Australia in 1697."}, {"front": "What fundamental lesson did the discovery of black swans illustrate about universal claims?", "back": "It showed that no amount of confirming observations can prove a universal claim; it takes only one counter-example to destroy centuries of certainty."}, {"front": "Who popularized the concept of 'Black Swan' events, and in what influential book?", "back": "Nassim Nicholas Taleb, in his 2007 book 'The Black Swan: The Impact of the Highly Improbable'."}, {"front": "According to Taleb, what are the three defining characteristics of a Black Swan event?", "back": "1. It is an outlier (falls outside regular expectations). 2. It carries extreme impact. 3. After it occurs, we construct explanations that make it seem predictable in retrospect (hindsight bias)."}, {"front": "What is Taleb's key insight regarding the events that matter most in history and society?", "back": "The most consequential events (reshaping economies, toppling governments) are precisely those that our standard models fail to predict."}, {"front": "Why do traditional forecasting and risk models often fail to predict Black Swans?", "back": "They are built on the assumption that the future will resemble the past and often rely on distributions (like the normal bell curve) that underestimate the frequency and impact of extreme events."}, {"front": "What mathematical problem does Taleb identify with standard risk models and the normal distribution?", "back": "Many models assume events follow a normal distribution (bell curve), where extreme events are vanishingly rare. However, real-world events often have 'fat tails,' meaning extreme events are far more common."}, {"front": "How do the predicted frequencies of extreme events differ between a normal distribution and actual financial markets?", "back": "In a normal distribution, an event six standard deviations from the mean should occur about once every 1.5 million years. In actual financial markets, such events occur every few decades."}, {"front": "What are the profound consequences of designing systems (e.g., financial, supply chain, infrastructure) based on the assumption that large crashes or pandemics are extremely rare?", "back": "Such systems will be optimized for efficiency under normal conditions but will lack sufficient cushion and resilience, leading to devastation when an outlier event inevitably occurs."}, {"front": "If Black Swans are, by definition, unpredictable, what does Taleb argue is the proper response?", "back": "The solution is not better prediction, but better preparation. This means building systems that are robust to shocks you cannot foresee."}, {"front": "What specific strategies does Taleb recommend for preparing for Black Swans?", "back": "Build robust systems, avoid strategies that offer small gains but expose to catastrophic losses, and seek 'antifragility' – systems that benefit from volatility."}, {"front": "What is 'antifragility' in the context of Black Swans?", "back": "Antifragility refers to systems or entities that not only withstand shocks and disorder but actually benefit and grow stronger from them, rather than merely surviving."}, {"front": "Name two historical events mentioned that serve as examples of Black Swans.", "back": "The fall of the Roman Republic, the dissolution of the Soviet Union, and the global financial crisis of 2008."}, {"front": "How does the text describe the 'gap' where Black Swans reside?", "back": "It is the gap between an event being 'unthinkable' beforehand and then becoming 'obvious in retrospect' after it occurs."}, {"front": "How did the COVID-19 pandemic exemplify a Black Swan event?", "back": "It was an outlier that caused extreme global impact, despite prior warnings. Systems optimized for efficiency (supply chains, healthcare) proved fragile, lacking resilience, and later seemed 'obvious' in hindsight."}, {"front": "Why was the COVID-19 pandemic still considered a Black Swan, even though epidemiologists had warned about similar scenarios?", "back": "The warnings were largely ignored because the event fell outside the range of recent collective experience and regular expectations, leading to a lack of preparedness for its extreme impact."}, {"front": "What cognitive bias helps explain why Black Swans often seem obvious after they happen?", "back": "Hindsight bias, which leads people to believe that past events were more predictable or inevitable than they actually were."}, {"front": "What is the text's metaphor for how history actually progresses, in contrast to a smooth progression?", "back": "History is not a smooth river; it is a landscape punctuated by earthquakes, signifying periods of stability abruptly interrupted by sudden, high-impact events."}, {"front": "How does the concept of 'Margin of Safety' relate to preparing for Black Swans?", "back": "Margin of Safety involves building in slack, excess capacity, or conservative estimates to account for unforeseen problems or errors, aligning with Taleb's call for resilience against the unpredictable."}, {"front": "What is the fundamental assumption about the future that Taleb argues leads to system fragility in the face of Black Swans?", "back": "The fundamental assumption is that the future will largely resemble the past, and therefore, extreme, rare events do not need significant consideration in planning."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
