<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the origin and initial purpose of the Stag Hunt parable?", "back": "Introduced by Jean-Jacques Rousseau in his *Discourse on Inequality* (1755) to illustrate how social cooperation might emerge and its fragility. It was later formalized by game theorists.", "id": "fc01"}, {"front": "Describe the basic scenario of the Stag Hunt game.", "back": "Two hunters can either cooperate to catch a large stag (requiring both) or each can independently catch a small hare (a guaranteed but smaller prize).", "id": "fc02"}, {"front": "What is the core dilemma for hunters in the Stag Hunt?", "back": "The dilemma is not selfishness, but trust. A hunter risks getting nothing if they commit to the stag hunt and their partner chooses to hunt a hare instead.", "id": "fc03"}, {"front": "In the Stag Hunt, what is considered the 'safe choice' and the 'rewarding choice'?", "back": "The safe choice is to hunt a hare. The rewarding choice is to hunt a stag, but it only works if the other hunter also chooses to hunt stag.", "id": "fc04"}, {"front": "What is the critical difference between the Stag Hunt and the Prisoner's Dilemma?", "back": "In the Prisoner's Dilemma, defection is the dominant strategy regardless of the other player's action. In the Stag Hunt, mutual cooperation is an equilibrium, meaning cooperating is a best response if the other player also cooperates.", "id": "fc05"}, {"front": "List the two Nash equilibria in the Stag Hunt game.", "back": "The two Nash equilibria are: (1) both hunt stag (high reward, requires trust) and (2) both hunt hare (low reward, requires no trust).", "id": "fc06"}, {"front": "Why is the Stag Hunt considered a model of coordination, not conflict?", "back": "Players have aligned interests (both want the stag) but face uncertainty and a mutual fear of being left exposed. The obstacle is trust and coordination, not fundamentally opposed interests.", "id": "fc07"}, {"front": "Explain why cooperation can be risky in the Stag Hunt, even if everyone prefers the cooperative outcome.", "back": "Choosing to hunt stag makes a player vulnerable to the other person's choice. If the partner defects, the cooperating player gets nothing, making the safe hare option more appealing despite the lower reward.", "id": "fc08"}, {"front": "Provide a real-world example of a 'Stag Hunt' situation regarding international relations.", "back": "International climate agreements, where countries benefit from collective emissions reductions but fear others won't follow through, making their own sacrifices futile (hunting hare alone).", "id": "fc09"}, {"front": "How do new technologies or communication standards illustrate the Stag Hunt dilemma?", "back": "A new standard is only valuable if enough people adopt it. Individuals may wait to see if others switch, leading to a failure to reach critical mass even for a superior technology.", "id": "fc10"}, {"front": "According to the text's 'keyconcept,' what is fundamentally required for coordination in a Stag Hunt scenario?", "back": "Trust. Cooperation can fail even when everyone prefers the cooperative outcome due to uncertainty about others' choices, rather than conflicting interests.", "id": "fc11"}, {"front": "What mechanisms can help shift a group from the 'hare' equilibrium to the 'stag' equilibrium in a Stag Hunt?", "back": "Building trust, establishing clear signals, and creating mechanisms for mutual commitment can help overcome uncertainty and encourage cooperation.", "id": "fc12"}, {"front": "What type of policy mechanisms are typically effective for situations modeled by the Prisoner's Dilemma?", "back": "Enforcement mechanisms like contracts, penalties, and external authorities are needed to prevent defection.", "id": "fc13"}, {"front": "What type of policy mechanisms are effective for situations modeled by the Stag Hunt?", "back": "Assurance mechanisms, such as credible signals that others will cooperate (e.g., a handshake, a public commitment, or a shared history of successful cooperation).", "id": "fc14"}, {"front": "How can leadership play a crucial role in overcoming a Stag Hunt dilemma?", "back": "Leadership often involves being the first to visibly commit to the cooperative 'stag' choice, thereby making that commitment visible and signaling assurance to others.", "id": "fc15"}, {"front": "What is the consequence if one hunter commits to hunting the stag, but the other hunter chooses to hunt a hare?", "back": "The hunter who committed to the stag gets nothing, as the stag escapes and they also missed the opportunity to catch a hare.", "id": "fc16"}, {"front": "What is the core obstacle to cooperation in the Stag Hunt, contrasting with the Prisoner's Dilemma?", "back": "In the Stag Hunt, the obstacle is uncertainty about others' choices (a coordination problem), whereas in the Prisoner's Dilemma, the obstacle is that individual self-interest rationally leads to defection (a conflict of interest problem).", "id": "fc17"}, {"front": "Give an example of a 'Stag Hunt' scenario in a team project setting.", "back": "A group of students could produce an excellent joint project (stag) or each could do the minimum individually (hare). If one fears others will slack off, doing the minimum becomes the safe choice.", "id": "fc18"}, {"front": "Why is the Stag Hunt distinct from games like the Prisoner's Dilemma or Game of Chicken?", "back": "The Stag Hunt models coordination where interests are aligned but trust and uncertainty are the issues, unlike the Prisoner's Dilemma where defection is dominant, or Game of Chicken which often involves direct conflict over who 'gives in.'", "id": "fc19"}, {"front": "What does the concept of 'dominant strategy' mean in game theory, and in which game (PD or SH) is it a central feature?", "back": "A dominant strategy is one that yields the best outcome for a player regardless of what other players do. It is a central feature of the Prisoner's Dilemma, where defection is the dominant strategy.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
