<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core scenario described in the Stag Hunt parable?", "back": "Two hunters can cooperate to hunt a large stag (high reward) or each can independently hunt a smaller hare (guaranteed, low reward)."}, {"front": "Who introduced the Stag Hunt parable and in what philosophical work?", "back": "Jean-Jacques Rousseau introduced it in his 1755 work, A Discourse on Inequality."}, {"front": "How has the Stag Hunt been utilized in game theory in the twentieth century?", "back": "It was formalized as a foundational model for coordination problems."}, {"front": "What is the central dilemma faced by the hunters in the Stag Hunt?", "back": "The dilemma is one of trust. Each hunter must decide whether to commit to the stag hunt, risking getting nothing if the other defects, or play it safe by hunting hare."}, {"front": "If one hunter commits to hunting stag and the other decides to hunt a hare, what is the outcome for the stag hunter?", "back": "The stag hunter gets nothing, as the stag escapes and they have no hare either."}, {"front": "Is the problem in the Stag Hunt primarily about selfishness?", "back": "No, both hunters desire the stag. The problem is not selfishness but rather uncertainty and a mutual fear of being exploited or left exposed."}, {"front": "What is a critical difference in the dominant strategy between the Prisoner's Dilemma and the Stag Hunt?", "back": "In the Prisoner's Dilemma, defection is the dominant strategy regardless of the other player's action. In the Stag Hunt, mutual cooperation is an equilibrium."}, {"front": "What is your best response in the Stag Hunt if you are confident the other player will hunt stag?", "back": "Hunting stag is also your best response, leading to a mutually beneficial outcome."}, {"front": "What are the two Nash equilibria in the Stag Hunt game?", "back": "1. Both hunt stag (high reward, requires trust). 2. Both hunt hare (low reward, requires no trust)."}, {"front": "In the context of the Stag Hunt, is cooperation considered irrational?", "back": "No, cooperation (hunting stag) is not irrational, but it is risky because it makes one vulnerable to the other person's choice."}, {"front": "Is the Stag Hunt primarily a model of conflict or coordination?", "back": "It is a model of coordination. Players have aligned interests but are hindered by uncertainty about others' choices, not opposed interests."}, {"front": "What is the main obstacle to achieving the high-reward outcome in a Stag Hunt scenario?", "back": "The main obstacle is uncertainty about what the other person will do, rather than conflicting interests or selfishness."}, {"front": "How do international climate agreements serve as a real-world example of a Stag Hunt?", "back": "All countries benefit from collective emissions reductions (stag), but each fears its own sacrifices will be futile if others do not follow through (hunting hare alone)."}, {"front": "Explain how team projects can exemplify a Stag Hunt situation.", "back": "Students could produce an excellent joint project (stag), but if one fears others will slack off, doing the minimum individually (hare) becomes the safer choice."}, {"front": "Provide an example of a new technology scenario that resembles a Stag Hunt.", "back": "A new communication standard or messaging app is only valuable if enough people adopt it. Individuals wait to see if others will switch, potentially preventing the technology from reaching critical mass."}, {"front": "According to the 'Coordination Requires Trust' concept, why can cooperation fail even when everyone prefers the cooperative outcome?", "back": "Cooperation can fail not due to conflicting interests, but due to uncertainty about others' choices."}, {"front": "What three elements can help shift groups from the low-reward 'hare' equilibrium to the high-reward 'stag' equilibrium?", "back": "Building trust, establishing clear signals, and creating mechanisms for mutual commitment."}, {"front": "For policy-makers, what kind of mechanisms are needed to prevent defection in a true Prisoner's Dilemma?", "back": "Enforcement mechanisms such as contracts, penalties, or external authorities."}, {"front": "In a Stag Hunt situation, what is primarily needed to foster cooperation, as opposed to enforcement?", "back": "Assurance: credible signals that others will cooperate."}, {"front": "Name some examples of assurance mechanisms that can help move a group toward the 'stag' outcome.", "back": "A handshake, a public commitment, or a shared history of successful cooperation."}, {"front": "What significant role does leadership often play in Stag Hunt scenarios?", "back": "Leadership often involves being the first to visibly commit to the stag, thereby providing assurance to others."}, {"front": "What is the primary difference in the source of failure between a Stag Hunt and a Prisoner's Dilemma?", "back": "In a Stag Hunt, cooperation fails due to a lack of trust and coordination. In a Prisoner's Dilemma, cooperation fails because individual rationality dictates defection, even when cooperation would yield a better collective outcome."}, {"front": "What is the outcome if both hunters make the 'safe choice' in the Stag Hunt?", "back": "Both hunters independently hunt hare, resulting in a low but guaranteed reward for each."}, {"front": "What condition must be met for the 'rewarding choice' (hunting stag) to be successful?", "back": "The rewarding choice is only successful if the other person also makes that choice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
