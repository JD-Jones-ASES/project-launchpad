    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Plato's \"noble lie\" (gennaion pseudos) as proposed by Socrates in the Republic?", "back": "It is a founding myth designed to promote social cohesion by convincing citizens they were born with souls of different metals, suiting them for different roles in the city."}, {"front": "What problem was Socrates trying to solve by proposing the \"noble lie\"?", "back": "He sought a way to get people to accept their assigned places in the ideal city's social order."}, {"front": "According to the myth of the metals, which metal was mixed into the souls of the rulers?", "back": "Gold."}, {"front": "In Plato's noble lie, what metals were associated with warriors and with farmers/craftsmen, respectively?", "back": "Silver for warriors, and bronze for farmers and craftsmen."}, {"front": "How did the myth of the metals determine a person's social role?", "back": "It asserted that individuals were naturally suited for a particular role based on the metal mixed into their souls by a god, not based on their birth parents' status."}, {"front": "Is the system based on Plato's noble lie rooted in birthright or natural aptitude?", "back": "It is based on natural aptitude, as determined by the metal in one's soul, not on birth."}, {"front": "Who knows the \"noble lie\" is false, and who believes it to be true?", "back": "The rulers know the myth is false, while the citizens believe it is true."}, {"front": "What is the fundamental ethical dilemma presented by Plato's noble lie?", "back": "It proposes systematic, state-sponsored deception as a foundation for social order, raising the question of whether a lie can ever be justified if it produces a stable and just society."}, {"front": "What is one argument *for* the justification of the noble lie, based on \"cold logic\"?", "back": "Societies need shared narratives and founding myths to hold together; if all societies run on stories that aren't strictly true, then the question becomes whether to have a 'good' founding myth."}, {"front": "Provide examples of \"founding myths\" in real nations, as mentioned in the text.", "back": "The American founding narrative, the French revolutionary tradition, and the British constitutional story."}, {"front": "What is a primary argument *against* the justification of the noble lie?", "back": "A society built on deception creates a fundamentally dishonest relationship between rulers and the governed, as citizens cannot consent to an arrangement whose true nature is hidden."}, {"front": "What dangerous precedent does accepting \"noble lies\" set for rulers?", "back": "It blurs the line between 'noble' lies for the common good and self-serving lies, making it easy for rulers to rationalize personal or political convenience as the 'common good'."}, {"front": "What is a common misinterpretation of the term \"noble lie\"?", "back": "It is often misused to mean \"any politically convenient falsehood,\" such as a politician lying to cover up a scandal."}, {"front": "How does Plato's specific proposal for a \"noble lie\" differ from \"garden-variety political dishonesty\"?", "back": "Plato's proposal is a specific founding myth designed to produce genuine social harmony based on natural aptitude, whereas ordinary political dishonesty is self-interested."}, {"front": "What core question about justice and deception does Plato's Noble Lie pose?", "back": "Can deception ever serve justice, especially when it aims to create a harmonious society but denies citizens the information needed to evaluate their own social order?"}, {"front": "What tension remains unresolved regarding the Noble Lie's implications for social order?", "back": "The tension between stability achieved through narrative (even if false) and the principle of honesty."}, {"front": "How might a central banker's actions be seen through the \"Noble Lie\" framework?", "back": "Central bankers might express more confidence than they feel about economic stability, believing that confidence is self-fulfilling and beneficial, akin to a benevolent simplification."}, {"front": "Give an example of government health messaging that applies the \"Noble Lie\" framework.", "back": "Oversimplifying health advice to promote beneficial behavior (e.g., 'follow these three simple rules') at the cost of nuance, with the belief that the simplification serves a greater good."}, {"front": "How do teachers sometimes apply a principle similar to the \"Noble Lie\" in their pedagogy?", "back": "Teachers present simplified models (e.g., 'atoms look like solar systems') knowing they are technically wrong, but believing they are pedagogically useful for understanding."}, {"front": "What question arises when applying the Noble Lie framework to modern instances of simplifying narratives?", "back": "Does the benefit of the simplification justify the potential deception, and who gets to decide?"}, {"front": "How does Rawls's Veil of Ignorance relate to the Noble Lie, according to the text's \"connections\"?", "back": "Rawls's theory of justice works through hypothetical ignorance (not knowing one's place in society) rather than the active deception proposed by Plato's Noble Lie."}, {"front": "What concept is contrasted with the dangers of seeking \"the form of truth without its substance\" in the text's \"connections\"?", "back": "Cargo Cult Science."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
