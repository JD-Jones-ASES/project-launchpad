    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Plato's 'Noble Lie' (gennaion pseudos), as proposed by Socrates?", "back": "A founding myth designed to promote social cohesion by convincing citizens they were born with souls of different metals, suiting them for different roles in the city."}, {"front": "What problem was Socrates trying to solve by proposing the Noble Lie in Plato's Republic?", "back": "How to get people to accept their assigned places in an ideal social order."}, {"front": "According to the Noble Lie's myth, how were citizens supposedly formed and where did their 'metals' come from?", "back": "All citizens were formed in the earth and born from it, with a god mixing different metals into their souls."}, {"front": "What were the three categories of 'metals' in citizens' souls and the corresponding roles they signified in the Noble Lie?", "back": "Gold for rulers, silver for warriors, and bronze for farmers and craftsmen."}, {"front": "What principle, rather than birth, was intended to determine a person's social role according to the Noble Lie?", "back": "Natural aptitude; a gold-souled child of bronze-souled parents should be raised among rulers, and vice-versa."}, {"front": "What was Socrates' own acknowledgment about the Noble Lie, despite its proposed benefit?", "back": "He admitted that the story justifying the social structure was a fabrication."}, {"front": "What is the primary ethical concern that has troubled readers about the Noble Lie for centuries?", "back": "It proposes systematic, state-sponsored deception where rulers know the myth is false but citizens believe it's true, making the political structure rest on a lie."}, {"front": "What is a key argument in favor of the Noble Lie, based on the nature of societies?", "back": "Societies need shared narratives and founding myths to hold together, and most nations already have simplified or mythologized versions of their origins."}, {"front": "Under what condition might proponents argue a 'carefully constructed falsehood' like the Noble Lie is justified?", "back": "If it produces a genuinely just and stable society where people are assigned roles based on aptitude and everyone benefits from the arrangement."}, {"front": "What is a major argument against the Noble Lie concerning the relationship between rulers and the governed?", "back": "A society built on deception creates a fundamentally dishonest relationship, as citizens cannot consent to an arrangement whose true nature is hidden from them."}, {"front": "What 'slippery slope' warning is given regarding the acceptance of a Noble Lie?", "back": "The line between 'noble' lies for the common good and self-serving ones is dangerously easy to cross, as rulers can rationalize self-interest as the 'common good'."}, {"front": "How is Plato's 'Noble Lie' specifically defined, differentiating it from 'any politically convenient falsehood'?", "back": "It is a specific founding myth designed to produce genuine social harmony based on natural aptitude, not ordinary deception for self-interested reasons or to cover up scandals."}, {"front": "What fundamental philosophical tension does Plato's Noble Lie bring to light?", "back": "The tension between stability-through-narrative (potentially achieved through deception) and honesty-as-principle, questioning whether deception can ever truly serve justice."}, {"front": "Provide a modern 'real-world' example from the text where institutions might use 'simplifying narratives' similar to the Noble Lie.", "back": "Central bankers sometimes express more confidence in economic stability than they feel, believing confidence is self-fulfilling."}, {"front": "How does government health messaging sometimes exemplify a parallel to the Noble Lie's framework?", "back": "It sometimes oversimplifies complex information to promote beneficial behavior ('follow these three simple rules') at the cost of nuance, believing the simplification serves a greater good."}, {"front": "In what educational context might a teacher employ a 'simplified model' that reflects the Noble Lie's dilemma?", "back": "Teachers present simplified models to students (e.g., 'atoms look like solar systems'), knowing the model isn't entirely accurate but believing it's pedagogically useful for understanding."}, {"front": "What crucial question applies to modern instances of 'simplifying narratives' or 'benevolent deception' within the Noble Lie framework?", "back": "Does the benefit of the simplification justify the deception, and who gets to decide what constitutes that benefit and justification?"}, {"front": "Which modern theory of justice, mentioned in the connections, works through hypothetical ignorance rather than deception?", "back": "Rawls's Veil of Ignorance."}, {"front": "Which concept is mentioned as a warning against the 'dangers of the form of truth without its substance'?", "back": "Cargo Cult Science."}, {"front": "What is the name of Plato's work in which the Noble Lie is discussed?", "back": "The Republic, Book III."}, {"front": "What would happen if a bronze-souled child was born to gold-souled parents, according to the Noble Lie?", "back": "The child should be sent to live among the craftsmen."}, {"front": "What is the 'paradoxbox' question posed about the Noble Lie and justice?", "back": "If a carefully constructed falsehood produces a just and stable society, is the lie justified, or does the deception itself corrupt the justice it's supposed to serve?"}, {"front": "The text states that 'every nation has its founding myths.' What do these myths typically involve, beyond strict truth?", "back": "Selective emphasis, strategic omission, and a generous helping of retrospective mythmaking."}, {"front": "Why is it dangerously easy to misuse the concept of 'Noble Lie'?", "back": "Because it can be conflated with garden-variety political dishonesty, which is self-interested, unlike Plato's specific proposal for social harmony based on natural aptitude."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
