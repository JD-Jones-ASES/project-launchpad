    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the St. Petersburg Paradox?", "back": "It is a thought experiment demonstrating that a game can have an infinite expected monetary value, yet most rational people would only pay a small, finite amount to play it."}, {"front": "Who proposed and analyzed the St. Petersburg Paradox, and when?", "back": "Proposed by Nicolaus Bernoulli in 1713 and analyzed by his cousin Daniel Bernoulli in a 1738 paper."}, {"front": "Describe the game mechanics of the St. Petersburg Paradox.", "back": "A fair coin is flipped repeatedly until it lands tails. If tails first appears on flip 'n', you win $2^n$ dollars."}, {"front": "If tails first appears on flip 5 in the St. Petersburg game, how much do you win?", "back": "You win $2^5 = $32."}, {"front": "What is the probability of the first tails appearing on flip 'n'?", "back": "The probability is (1/2)^n, or 1/2^n."}, {"front": "How is the expected value (E) of the St. Petersburg game calculated?", "back": "E = (1/2 * $2) + (1/4 * $4) + (1/8 * $8) + ... = $1 + $1 + $1 + ..."}, {"front": "Why does the St. Petersburg game have an infinite expected monetary value?", "back": "Each possible outcome, regardless of how rare, contributes exactly $1 to the expected value, and there are infinitely many possible outcomes, leading to an infinite sum."}, {"front": "What is the typical amount people are willing to pay to play the St. Petersburg game, and how does it compare to the game's expected value?", "back": "Most people would pay between $5 and $25, which is a stark contrast to the game's infinite expected monetary value."}, {"front": "According to standard decision theory, how much should one be willing to pay for a game with an infinite expected value?", "back": "Standard decision theory suggests one should be willing to pay any finite amount."}, {"front": "What is the fundamental conflict or paradox that the St. Petersburg game highlights?", "back": "It highlights the conflict between the mathematically calculated infinite expected value of the game and people's intuitive, finite willingness to pay."}, {"front": "Who proposed the resolution to the St. Petersburg Paradox?", "back": "Daniel Bernoulli proposed the resolution in 1738."}, {"front": "What did Daniel Bernoulli propose as the true determinant of a decision-maker's choice, instead of expected value?", "back": "He proposed that what matters is 'expected utility' (the satisfaction or usefulness of money), not just the expected monetary value."}, {"front": "Explain the concept of 'diminishing marginal utility' in the context of wealth.", "back": "It means that the additional satisfaction (utility) gained from an extra unit of wealth decreases as one's total wealth increases. For example, $1,000 means more to someone with $0 than to someone with $1,000,000."}, {"front": "What mathematical relationship did Bernoulli propose for utility and wealth?", "back": "Bernoulli proposed that utility is proportional to the logarithm of wealth rather than to wealth itself."}, {"front": "What happens to the expected utility of the St. Petersburg game when Bernoulli's logarithmic utility function is applied?", "back": "Under this assumption, the expected utility of the game becomes a finite, modest number, which aligns with what people are actually willing to pay."}, {"front": "What profound insight did Bernoulli identify that became central to economics and decision theory?", "back": "He identified the fundamental distinction between the objective magnitude of an outcome (e.g., dollar amount) and its subjective value or utility to the person experiencing it."}, {"front": "How does Bernoulli's insight explain why people buy insurance, despite its negative expected value?", "back": "People pay more than the expected loss because the utility cost of financial ruin (catastrophe) far exceeds the utility cost of the insurance premium. It's rational under expected utility theory."}, {"front": "Use the concept of expected utility to explain why most people prefer a certain $50 to a 50% chance of $100.", "back": "Even though the expected monetary values are identical, the utility of a certain $50 exceeds the expected utility of the gamble due to diminishing marginal utility and risk aversion."}, {"front": "What is 'tail risk,' and how does the St. Petersburg Paradox relate to it in financial markets?", "back": "Tail risk refers to rare, high-impact events. The paradox illustrates the danger of focusing only on expected value in such situations, as ignoring the non-linear relationship between dollars and disaster can lead to catastrophic outcomes (like the 2008 financial crisis)."}, {"front": "What is the main lesson from the St. Petersburg Paradox regarding rational decision-making?", "back": "The main lesson is that expected monetary value alone is not a sufficient guide for rational decision-making; one must also account for the subjective value (utility) of money, which often exhibits diminishing marginal returns."}, {"front": "How does expected utility theory explain why people buy lottery tickets despite their negative expected value?", "back": "The 'utility' of dreaming about a jackpot, or the thrill of playing, has value beyond the negative expected monetary return, making the purchase rational from an expected utility perspective."}, {"front": "What two key concepts from modern decision theory are mentioned as extensions of Bernoulli's insight?", "back": "Loss Aversion and Prospect Theory (by Kahneman and Tversky) are mentioned as extensions that further elaborate on reference-dependent evaluation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
