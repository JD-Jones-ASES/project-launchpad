<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental definition of \"feedback\" in systems thinking?", "back": "Feedback simply means that the output of a process loops back to influence the input."}, {"front": "Who is considered a key figure in the formal study of feedback systems, particularly in the mid-twentieth century?", "back": "Norbert Wiener, through his work in cybernetics (e.g., Cybernetics, 1948)."}, {"front": "What are the two main types of feedback loops?", "back": "Reinforcing feedback loops and Balancing feedback loops."}, {"front": "Define a \"reinforcing feedback loop.\"", "back": "A reinforcing feedback loop (also called positive feedback) is a process where change in one direction produces more change in the same direction."}, {"front": "What kind of change do reinforcing feedback loops produce, and what are they considered \"engines\" of?", "back": "They produce amplifying change and are engines of acceleration, leading to exponential growth or exponential collapse."}, {"front": "Explain why the term \"positive feedback\" for a reinforcing loop doesn't necessarily mean it's good.", "back": "\"Positive\" in this context means amplifying or intensifying the change, not that the outcome is desirable or good."}, {"front": "Provide an example of a reinforcing loop leading to collapse.", "back": "A bank run: depositors' withdrawals intensify fear, leading to more withdrawals and accelerating the bank's collapse."}, {"front": "Provide an example of a reinforcing loop leading to growth.", "back": "Compound interest: your interest earns interest, which earns more interest, leading to exponential growth of capital."}, {"front": "How does a popular social media post demonstrate a reinforcing loop?", "back": "More engagement leads the algorithm to show it to more people, which generates even more engagement, creating a self-amplifying cycle."}, {"front": "Define a \"balancing feedback loop.\"", "back": "A balancing feedback loop (also called negative feedback) is a process where change in one direction produces a counterforce that resists the initial change."}, {"front": "What are balancing feedback loops the \"engines\" of?", "back": "They are engines of stability and equilibrium, keeping a system within bounds."}, {"front": "Explain how a thermostat functions as a classic example of a balancing feedback loop.", "back": "When the room gets cold, the heater turns on to warm it up. Once the set temperature is reached, the heater turns off. The system oscillates around a set point to maintain stability."}, {"front": "How do predator-prey cycles illustrate a balancing feedback loop?", "back": "More rabbits lead to more foxes, which reduces the rabbit population. Fewer rabbits lead to fewer foxes, allowing rabbits to recover. This creates an oscillating but stable cycle."}, {"front": "Why is the real world described as never being \"just one loop\"?", "back": "Real-world dynamic systems are complex tangles of reinforcing and balancing loops interacting simultaneously."}, {"front": "What determines whether a complex system, like a housing market, booms, stabilizes, or collapses?", "back": "It depends on which feedback loop (reinforcing or balancing) dominates at any given moment."}, {"front": "According to feedback thinking, what should you look for when you observe exponential growth or collapse in a system?", "back": "You should look for the reinforcing loop driving it."}, {"front": "According to feedback thinking, what should you look for when you observe stability or oscillation in a system?", "back": "You should look for the balancing loop maintaining it."}, {"front": "When a system is stuck in a \"bad equilibrium,\" what diagnostic question should be asked?", "back": "What balancing loop is holding it there, and what would it take to break that loop?"}, {"front": "How do social media algorithms create reinforcing feedback loops for users?", "back": "They show users more content similar to what they've already engaged with, leading to increased engagement, which then leads to more of the same content, narrowing the user's feed into an echo chamber."}, {"front": "What is a potential consequence of social media algorithms lacking a natural balancing mechanism?", "back": "Users can become trapped in self-reinforcing echo chambers, amplifying existing biases and potentially leading to polarization."}, {"front": "What is the key takeaway regarding the 'Two Engines of All Dynamic Systems'?", "back": "Every dynamic system is built from reinforcing loops (amplify change, driving growth/collapse) and balancing loops (resist change, maintaining stability). Understanding which dominates is foundational."}, {"front": "The concept of feedback loops can be applied to many fields. Name a few mentioned in the text.", "back": "Management, ecology, economics, and social science."}, {"front": "What is considered the 'skeleton key' to systems thinking?", "back": "Understanding the two kinds of feedback loops: reinforcing and balancing."}, {"front": "What type of feedback loop is typically involved in the 'Tragedy of the Commons' problem?", "back": "It often involves the failure of balancing mechanisms in shared resources, allowing a reinforcing loop of resource depletion to dominate."}, {"front": "If a small perturbation enters a reinforcing loop, what phenomenon might occur?", "back": "The Butterfly Effect, where small changes can lead to large, unpredictable outcomes due to the amplification by the reinforcing loop."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
