<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who discovered the phenomenon known as the Butterfly Effect and when?", "back": "Edward Lorenz, in 1963."}, {"front": "What scientific field was Edward Lorenz working in when he made his key discovery?", "back": "Meteorology, specifically running computer simulations of weather patterns at MIT."}, {"front": "What is the core principle behind 'sensitive dependence on initial conditions'?", "back": "Tiny differences in starting conditions amplify exponentially over time, producing dramatically different outcomes in certain systems."}, {"front": "Describe Edward Lorenz's accidental discovery that led to the concept of sensitive dependence on initial conditions.", "back": "In 1961, Lorenz restarted a weather simulation using rounded numbers (three decimal places) from a printout, while the computer used six. This tiny, seemingly trivial difference caused the simulated weather patterns to diverge completely within a few days."}, {"front": "How do differences in initial conditions behave over time in systems exhibiting the Butterfly Effect?", "back": "The differences do not merely accumulate gradually; they amplify exponentially, leading to vastly different outcomes."}, {"front": "Is 'chaos' in the mathematical sense the same as randomness? Explain.", "back": "No. Mathematical chaos is fully deterministic, meaning every state follows inevitably from the previous one according to fixed rules. However, the system amplifies small differences so rapidly that long-term prediction becomes impossible in practice."}, {"front": "Why is long-term prediction impossible in a chaotic system, even though it is deterministic?", "back": "Because chaotic systems amplify tiny initial differences exponentially. To predict perfectly for a long period, one would need to know the initial state with essentially infinite precision."}, {"front": "What are the practical implications of the Butterfly Effect for specific weather forecasting?", "back": "Specific weather can be forecast reasonably well for about ten days. Beyond that, the sensitivity to initial conditions makes accurate specific prediction impossible."}, {"front": "How does the predictability of 'climate' differ from the predictability of 'weather' according to the principles of the Butterfly Effect?", "back": "While specific 'weather' (conditions on a specific day far in the future) is unpredictable long-term, 'climate' (long-term statistical patterns) can still be discussed and predicted."}, {"front": "Beyond meteorology, name three other fields or systems where sensitive dependence on initial conditions applies.", "back": "Financial markets, ecosystems, social movements, and political events."}, {"front": "In systems exhibiting the Butterfly Effect, what is the relationship between the magnitude of a cause and the magnitude of its effect?", "back": "The magnitude of the cause bears no reliable relationship to the magnitude of the effect; a tiny cause can have a massive impact."}, {"front": "Given the inherent unpredictability of chaotic systems, what kind of planning strategy is recommended?", "back": "Plans should be robust to surprise. Instead of betting on one specific forecast, build systems that perform reasonably well across a range of scenarios and prepare for unexpected futures."}, {"front": "Who is widely regarded as the 'father of chaos theory'?", "back": "Edward Lorenz."}, {"front": "What is the 'Lorenz attractor'?", "back": "It is the butterfly-shaped pattern traced by Edward Lorenz's equations in three-dimensional space, which became an icon of chaos theory."}, {"front": "Explain how the assassination of Archduke Franz Ferdinand can be seen as an example of the Butterfly Effect.", "back": "A 'wrong turn' by the Archduke's driver was a tiny, chance event that led directly to his assassination, triggering a chain of events (WWI, collapse of empires, etc.) that profoundly reshaped the 20th century."}, {"front": "What is the origin of the 'butterfly' image in the 'Butterfly Effect'?", "back": "It comes from the title of a 1972 talk by Edward Lorenz: 'Does the Flap of a Butterfly's Wings in Brazil Set Off a Tornado in Texas?'"}, {"front": "Why is 'infinite precision' effectively required to predict chaotic systems perfectly for the long term?", "back": "Because any minute imprecision in measuring initial conditions will be exponentially amplified by the system, quickly leading to completely divergent outcomes."}, {"front": "How do feedback loops contribute to the Butterfly Effect?", "back": "Feedback loops are the amplification mechanisms that make the Butterfly Effect possible, allowing tiny perturbations to grow exponentially."}, {"front": "According to Lorenz's discovery, how does the atmosphere amplify tiny perturbations like a butterfly's wing flap?", "back": "The atmosphere amplifies tiny perturbations through cascading interactions, where small changes trigger further changes that grow in magnitude."}, {"front": "What is the key difference between how sensitive dependence on initial conditions (Butterfly Effect) is typically described versus simple gradual accumulation of differences?", "back": "The Butterfly Effect describes differences that amplify exponentially, not merely accumulate gradually, leading to rapid and profound divergence in outcomes."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
