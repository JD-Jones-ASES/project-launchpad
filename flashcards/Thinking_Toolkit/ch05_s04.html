<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core definition of the IKEA Effect?", "back": "The IKEA Effect is the tendency to place a disproportionately high value on things we have had a hand in creating, even when our contribution is modest and the final product is objectively no better than—or even worse than—something bought ready-made.", "id": "fc01"}, {"front": "Who named and experimentally demonstrated the IKEA Effect?", "back": "Michael Norton, Daniel Mochon, and Dan Ariely did so in a 2012 paper published in the Journal of Consumer Psychology.", "id": "fc02"}, {"front": "What ancient phenomenon does the IKEA Effect describe, even before its modern naming?", "back": "The phenomenon itself—that we overvalue what we help create—is ancient, though the systematic study and memorable label are recent.", "id": "fc03"}, {"front": "Describe the problem General Mills faced with its instant cake mixes in the 1950s.", "back": "Despite being technically excellent, sales were disappointing because consumers felt the process was too easy, and the cakes did not feel like 'theirs.'", "id": "fc04"}, {"front": "What was psychologist Ernest Dichter's suggested solution for the cake mix problem?", "back": "He suggested removing powdered eggs from the mix and requiring bakers to add a fresh egg themselves, to give them a sense of personal involvement and creation.", "id": "fc05"}, {"front": "How did Dichter's solution impact cake mix sales and consumer perception?", "back": "Sales took off, as adding an egg gave bakers a sense of labor and creation, increasing their ownership and value perception, even though the cakes were no better (arguably slightly worse).", "id": "fc06"}, {"front": "Describe one experiment Norton, Mochon, and Ariely used to demonstrate the IKEA Effect.", "back": "Participants who assembled simple IKEA storage boxes consistently valued their self-assembled box significantly more than an identical box assembled by someone else.", "id": "fc07"}, {"front": "Describe another experiment used to demonstrate the IKEA Effect involving origami figures.", "back": "Participants who built origami figures rated their own 'clumsy creations' nearly as favorably as expert-made origami, while outside observers clearly saw the quality gap.", "id": "fc08"}, {"front": "What is the crucial condition for the IKEA Effect to manifest, according to the researchers?", "back": "The effect depends on successful completion. If participants started assembling something but were prevented from finishing, the extra valuation disappeared.", "id": "fc09"}, {"front": "Why is successful completion essential for the IKEA Effect, beyond just time or exposure?", "back": "It is not mere exposure or time spent that creates the attachment; it is the satisfaction of having finished the work. Completion transforms effort into identity.", "id": "fc10"}, {"front": "How does the IKEA Effect bias our evaluation of our own ideas and work?", "back": "It makes creators systematically biased judges of their own creations, leading them to feel their business plans or strategies are more brilliant or sound than they might objectively be.", "id": "fc11"}, {"front": "How does the IKEA Effect manifest in organizational settings, particularly with managers?", "back": "Managers may defend their own initiatives (e.g., restructuring plans) beyond what the evidence supports, because the plan 'designed, advocated for, and implemented' by them becomes so personal that objective evaluation is nearly impossible.", "id": "fc12"}, {"front": "What is a positive implication or 'side' of the IKEA Effect?", "back": "The extra value we place on self-made things can increase satisfaction and engagement, as the process of creation itself contributes to the value experienced.", "id": "fc13"}, {"front": "Provide an example of the positive side of the IKEA Effect.", "back": "A meal cooked from scratch genuinely provides more satisfaction than an identical restaurant meal, not because it tastes better, but because the labor invested creates a sense of accomplishment and ownership.", "id": "fc14"}, {"front": "What is the recommended 'antidote' to mitigate the bias caused by the IKEA Effect?", "back": "The antidote is not to stop creating, but to seek outside evaluation from people who did not do the building (i.e., objective third parties).", "id": "fc15"}, {"front": "How does the IKEA Effect apply in software development?", "back": "Engineers are notoriously reluctant to discard code they've written, even when a cleaner rewrite would be faster and better, because the original code carries the emotional weight of the hours spent writing it.", "id": "fc16"}, {"front": "How do retail companies like Build-a-Bear leverage the IKEA Effect?", "back": "They deliberately inject customer labor into the product (e.g., choosing fabrics, stuffing the toy) because the IKEA Effect increases the perceived value, allowing customers to pay a premium and leave happier.", "id": "fc17"}, {"front": "According to the text, how does the IKEA Effect combine with the Sunk-Cost Fallacy?", "back": "In contexts like software development, the IKEA Effect (emotional attachment to one's creation) can work in concert with the Sunk-Cost Fallacy (distorted future decisions based on past investment) to make discarding old work even harder.", "id": "fc18"}, {"front": "What does the key concept 'Labor Leads to Love' summarize about the IKEA Effect?", "back": "It summarizes that we overvalue things we helped create, even when our contribution is small and the result is mediocre, making us poor judges of our own work, ideas, and projects.", "id": "fc19"}, {"front": "Name two other cognitive biases mentioned as connections to the IKEA Effect in the text.", "back": "The Dunning-Kruger Effect (misjudging our own competence) and Confirmation Bias (seeking evidence that our creations are good).", "id": "fc20"}, {"front": "Does the IKEA Effect imply that increased effort always leads to objectively better quality?", "back": "No, the IKEA Effect shows that we value things more due to our involvement, even when the final product is objectively no better than—or even worse than—a ready-made alternative.", "id": "fc21"}, {"front": "What is the key difference in perception between creators and outside observers regarding self-made creations, according to the origami experiment?", "back": "Creators rated their own clumsy creations nearly as favorably as expert-made ones, while outside observers clearly perceived the quality gap, highlighting the subjective bias of creators.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
