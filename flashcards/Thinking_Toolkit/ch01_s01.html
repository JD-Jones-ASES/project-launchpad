    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'Boiling Frog' metaphor commonly used to describe?", "back": "The idea that when change is slow and incremental, people fail to notice it until it's too late to react, leading to catastrophic outcomes."}, {"front": "Is the biological premise of the 'Boiling Frog' metaphor accurate?", "back": "No. A real frog with an intact brain will jump out of gradually heating water if it becomes uncomfortably warm. The underlying biology is false."}, {"front": "What enduring psychological insight does the 'Boiling Frog' metaphor capture despite its biological inaccuracy?", "back": "Humans tend to fail to notice slow, incremental change, adapting and normalizing each small step until the cumulative effect becomes obvious and potentially irreversible."}, {"front": "According to the metaphor, what is the consequence of failing to notice slow, incremental change?", "back": "By the time the cumulative effect becomes obvious, it may be too late to respond or reverse the negative trend."}, {"front": "How does the 'Boiling Frog' metaphor apply to the decline of Kodak?", "back": "Kodak, despite inventing the first digital camera, failed to adapt to the gradual shift from film to digital photography, dismissing small annual declines until it lost market relevance and filed for bankruptcy."}, {"front": "Provide an example of the 'Boiling Frog' phenomenon in personal life.", "back": "A person gaining two pounds a year for twenty years becomes genuinely surprised to find themselves forty pounds overweight, having normalized each small gain."}, {"front": "How can the 'Boiling Frog' metaphor apply to the erosion of democratic institutions?", "back": "A democratic institution can erode through a series of small precedents, each defensible in isolation, until the cumulative effect results in a system that no longer functions as intended."}, {"front": "What is the 'antidote' to the 'Boiling Frog' phenomenon?", "back": "Deliberate measurement against a fixed benchmark."}, {"front": "Why is comparing 'today to a standard you set in advance' more effective than 'today to yesterday' in combating the 'Boiling Frog' effect?", "back": "Comparing today to yesterday makes each small change seem insignificant. A fixed benchmark anchors you to an objective reference point, making gradual drift visible and actionable."}, {"front": "How does a doctor apply the antidote to the 'Boiling Frog' regarding a patient's blood pressure?", "back": "A doctor compares blood pressure to a fixed standard (e.g., 120/80), not just whether it's slightly higher than last month, to identify problematic trends."}, {"front": "How does a financial advisor apply the antidote to the 'Boiling Frog' regarding a client's savings?", "back": "A financial advisor checks if savings are on track for a retirement target, rather than just noting a small drop in the savings rate, to prevent long-term financial issues."}, {"front": "Define the key concept of 'Gradual Change and Inattention.'", "back": "The psychological tendency for humans to fail to notice slow, incremental changes until their cumulative effect becomes catastrophic, often due to adapting to each small, seemingly insignificant step."}, {"front": "Name two companies mentioned as real-world examples of 'Boiling Frog' decline.", "back": "Kodak, Blockbuster, and Sears (any two)."}, {"front": "How does environmental change relate to the 'Boiling Frog' concept?", "back": "Global average temperatures rising slowly over decades are psychologically easy to dismiss, despite the dramatic cumulative effects on ecosystems, weather patterns, and coastlines."}, {"front": "Give an example of the 'Boiling Frog' effect in personal habits.", "back": "The slow accumulation of small unhealthy choices (skipping one workout, having an extra drink, staying up late) that seem insignificant individually but lead to dramatic cumulative health effects over years."}, {"front": "Why is it important to understand that the 'Boiling Frog' is a metaphor, not a scientific claim?", "back": "The lesson is about human perception and psychology, not amphibian physiology. Its biological inaccuracy does not invalidate its profound psychological insight."}, {"front": "What is ironic about someone dismissing the 'Boiling Frog' metaphor by saying 'actually, frogs jump out'?", "back": "They are missing the larger psychological truth (human inattention to gradual change) by focusing on a minor detail (biological inaccuracy), which is itself an example of the pattern the metaphor describes."}, {"front": "When did the 'Boiling Frog' metaphor become popularized in management and political literature?", "back": "From the 1990s onward."}, {"front": "Who was the physiologist mentioned that demonstrated frogs with intact brains escape warm water?", "back": "Friedrich Goltz in the nineteenth century."}, {"front": "Why do humans tend to 'adapt, adjust, and normalize' when change is slow and incremental?", "back": "Each small step feels insignificant and barely different from yesterday, making it easy to rationalize and accept without perceiving a larger threat."}, {"front": "What is the overarching warning conveyed by the 'Boiling Frog' metaphor?", "back": "Be vigilant about slow, incremental changes, as they can accumulate into significant, often negative, outcomes before we fully recognize the danger and can effectively respond."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
