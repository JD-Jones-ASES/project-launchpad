<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core folk metaphor of \"The Boiling Frog,\" as it's commonly understood?", "back": "The idea that if you drop a frog into boiling water, it jumps out, but if you place it in lukewarm water and raise the temperature slowly, it will stay until it boils to death."}, {"front": "Is the biological premise of \"The Boiling Frog\" metaphor accurate?", "back": "No, the underlying biology is false. Real frogs with intact brains will attempt to escape water that becomes uncomfortably warm."}, {"front": "What psychological insight does \"The Boiling Frog\" metaphor effectively capture, despite its biological inaccuracy?", "back": "It captures the human tendency to fail to notice change when it is slow, incremental, and gradual."}, {"front": "According to the metaphor, why do humans often fail to respond to significant changes?", "back": "Because each small step of change feels insignificant and barely different from yesterday, leading us to adapt, adjust, and normalize without realizing the cumulative effect."}, {"front": "What is the potential consequence of human inattention to slow, incremental changes?", "back": "By the time the cumulative effect of the changes becomes obvious, it may be too late to respond effectively."}, {"front": "How does the example of Kodak illustrate \"The Boiling Frog\" principle in a business context?", "back": "Kodak invented the first digital camera but failed to adapt as the market slowly shifted from film to digital, dismissing small declines until it lost its market and eventually filed for bankruptcy."}, {"front": "What significant technological invention did Kodak's engineers achieve in 1975?", "back": "They invented the first digital camera."}, {"front": "How did Kodak's leadership interpret annual reports showing small declines in its core business?", "back": "They told themselves that film was still the core business, failing to recognize the transformative shift occurring in the market."}, {"front": "Describe a personal life example where the \"Boiling Frog\" pattern might play out.", "back": "A person gaining a small amount of weight each year for two decades and then being surprised to find themselves significantly overweight, or a relationship deteriorating through many small neglects."}, {"front": "How can \"The Boiling Frog\" metaphor apply to the erosion of democratic institutions?", "back": "A democratic institution can erode through a series of small precedents, each seemingly defensible, until the cumulative effect results in a system that no longer functions as intended."}, {"front": "What is the primary antidote proposed to counter the \"Boiling Frog\" effect in human psychology?", "back": "Deliberate measurement against a fixed benchmark."}, {"front": "Explain how using a \"fixed benchmark\" helps to overcome the \"Boiling Frog\" phenomenon.", "back": "It provides an objective reference point to compare the present against, making gradual drift visible and preventing comparison only to yesterday's slight changes."}, {"front": "Provide a health-related example of using a fixed benchmark to monitor change.", "back": "A doctor comparing a patient's blood pressure to a standard like 120/80, rather than just to last month's reading."}, {"front": "Provide a financial example of using a fixed benchmark to monitor progress.", "back": "A financial advisor checking if a savings rate is on track for a retirement target, rather than just noting a slight drop from the previous period."}, {"front": "Name two companies mentioned, besides Kodak, that experienced gradual market erosion before their collapses, exemplifying the \"Boiling Frog\" effect.", "back": "Blockbuster and Sears."}, {"front": "How does the gradual increase in global average temperatures relate to the \"Boiling Frog\" concept?", "back": "Because the change is spread over decades (e.g., 1.1 C since pre-industrial era), it's psychologically easy for humans to dismiss, despite its cumulative, transformative effects on ecosystems and weather."}, {"front": "How do personal habits often demonstrate the \"Boiling Frog\" effect?", "back": "The slow accumulation of small unhealthy choices (e.g., skipping a workout, an extra drink) rarely feels significant in the moment, but leads to dramatic cumulative effects over years."}, {"front": "Why is dismissing \"The Boiling Frog\" metaphor due to its biological inaccuracy missing the point?", "back": "Because the metaphor's lesson is about human perception and psychological insight into gradual change, not amphibian physiology; focusing on a minor detail ignores the larger truth."}, {"front": "What broader concept does the text summarize as the \"keyconcept\" of the section?", "back": "\"Gradual Change and Inattention\": When change is slow and incremental, we fail to notice it until the cumulative effect becomes catastrophic."}, {"front": "What are the two main components of the antidote for \"Gradual Change and Inattention\"?", "back": "Deliberate measurement and comparing the present to a fixed benchmark, not to yesterday."}, {"front": "What related psychological concepts are mentioned for further exploration in other chapters?", "back": "Status Quo Bias, The Boiling Frog Revisited, and Second-Order Effects."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
