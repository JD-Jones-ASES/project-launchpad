    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 31, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary objective of a pre-mortem decision tool?", "back": "The primary objective is to examine what *could* go wrong before a project begins, rather than reacting after it fails."}, {"front": "Who introduced the concept of the pre-mortem as a structured decision tool?", "back": "Gary Klein, in his 2003 book 'The Power of Intuition' and related work on naturalistic decision-making."}, {"front": "How does a 'pre-mortem' differ from a 'post-mortem'?", "back": "A post-mortem examines what went wrong *after* a project has failed, while a pre-mortem examines what *could* go wrong *before* the project begins."}, {"front": "What is the first step in conducting a pre-mortem exercise?", "back": "Assume failure: Imagine that you are one year in the future and the project has failed completely and spectacularly."}, {"front": "After assuming failure, what is the second step in the pre-mortem process?", "back": "Explain why: Each person independently writes down the reasons for the failure, including what went wrong, what wasn't anticipated, and what risks materialized."}, {"front": "What is the third step of a pre-mortem after explanations of failure are gathered?", "back": "Compile and prioritize: Gather all explanations and identify the most plausible, frequently mentioned, and catastrophic failure modes."}, {"front": "What is the final step in the pre-mortem process, once high-priority failure modes are identified?", "back": "Mitigate: For each high-priority failure mode, determine what can be done *now* to prevent it, reduce its likelihood, or limit its impact."}, {"front": "Name one powerful cognitive bias that the pre-mortem is designed to counteract.", "back": "Optimism bias."}, {"front": "How does optimism bias affect decision-making without a pre-mortem?", "back": "Once committed to a plan, group members tend to focus only on reasons for success and downplay potential failures, suppressing concerns."}, {"front": "How does the pre-mortem counteract optimism bias?", "back": "By asking people to explain a hypothetical failure, it gives them explicit permission to raise concerns they might otherwise suppress."}, {"front": "What is the second powerful bias addressed by the pre-mortem tool?", "back": "Groupthink."}, {"front": "Describe how groupthink can hinder effective risk identification in a team.", "back": "In a team setting, dissent is socially costly; individuals may suppress doubts to avoid 'raining on the parade' or appearing critical."}, {"front": "How does the pre-mortem reframe dissent to counteract groupthink?", "back": "It reframe dissent as a contribution to stress-testing the plan, making it safe to voice doubts by positioning the 'pessimist' as a 'realist'."}, {"front": "According to Gary Klein, by approximately what percentage do pre-mortems increase the ability to identify reasons for failure compared to simply asking 'What could go wrong?'", "back": "Roughly 30 percent."}, {"front": "What is the key difference in 'framing' that makes pre-mortems more effective than general 'what-if' questions?", "back": "Imagining that the failure has *already happened* makes the reasons feel concrete and specific, rather than abstract and hypothetical."}, {"front": "Can the pre-mortem technique be applied to personal decisions? Provide an example.", "back": "Yes. For example, before accepting a job offer, imagine regretting it a year later and identify the potential reasons (culture, commute, work itself, opportunity cost)."}, {"front": "What is the core insight of the pre-mortem, according to the 'keyconcept' summary?", "back": "The pre-mortem allows you to diagnose failure before it happens by imagining a project has already failed and explaining why, counteracting optimism bias and groupthink."}, {"front": "Provide a real-world application of the pre-mortem in software development.", "back": "Engineering teams use pre-mortems before launching new product features to identify edge cases, security vulnerabilities, and user-experience problems proactively."}, {"front": "How is the pre-mortem useful in medical decisions, such as preparing for a complex surgery?", "back": "A medical team imagines the surgery going wrong and identifies specific reasons, becoming better prepared for complications than if they only reviewed standard procedures."}, {"front": "Give an example of how event planners can leverage a pre-mortem.", "back": "Before an event, planners imagine it as a disaster and list reasons (e.g., weather, vendor failure, technology breakdown) to develop contingency plans that save the day."}, {"front": "What type of thinking does the pre-mortem encourage regarding potential problems?", "back": "Specific, concrete, and imaginative thinking about *how* failure could occur, rather than abstract or vague 'what-ifs'."}, {"front": "What is the main benefit of discovering a fatal flaw in a plan *before* execution?", "back": "It allows for proactive mitigation, preventing damage, reducing likelihood, or limiting impact, which is far more effective and less costly than post-launch debugging or reaction."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
