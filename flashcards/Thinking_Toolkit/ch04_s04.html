<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core definition of the Streetlight Effect?", "back": "The Streetlight Effect is the tendency to search for answers where searching is easy rather than where the answers are most likely to be found.", "id": "fc01"}, {"front": "What is the origin story or analogy behind the Streetlight Effect?", "back": "It's based on an old joke (the 'drunkard's search') where a drunk man searches for his lost keys under a streetlight because 'that's where the light is,' even though he dropped them in a dark alley.", "id": "fc02"}, {"front": "Why is the Streetlight Effect considered a pervasive mistake in human inquiry?", "back": "While the joke's error is absurd, the underlying pattern is often far less obvious when individuals or organizations commit it, leading them to unknowingly misdirect their efforts.", "id": "fc03"}, {"front": "In academic research, what are alternative names for the Streetlight Effect?", "back": "It is sometimes called the 'drunkard's search' or 'observational bias.'", "id": "fc04"}, {"front": "How do researchers typically exhibit the Streetlight Effect?", "back": "Researchers gravitate toward problems that are amenable to their existing methods, data, and instruments, rather than the most important or relevant questions.", "id": "fc05"}, {"front": "Provide an example of an economist exhibiting the Streetlight Effect.", "back": "An economist with a large dataset on consumer purchases will study consumer purchases, even if more important economic questions (like institutional trust) are unmeasured.", "id": "fc06"}, {"front": "Provide an example of a psychologist exhibiting the Streetlight Effect.", "back": "A psychologist with access to undergraduate volunteers will study them, even if the research question calls for a more diverse sample.", "id": "fc07"}, {"front": "Why is the Streetlight Effect considered 'especially dangerous'?", "back": "It is self-reinforcing. Searching where the light is yields 'results' (e.g., published papers, impressive dashboards), making the activity appear productive even when it's answering the wrong questions.", "id": "fc08"}, {"front": "How does the Streetlight Effect relate to the quote: 'Not everything that counts can be counted, and not everything that can be counted counts'?", "back": "The effect demonstrates this by showing how we often focus on what is easily measurable (what can be counted) rather than what truly matters (what counts), leading to a misallocation of effort.", "id": "fc09"}, {"front": "What is the implicit decision made by organizations when they decide what to measure?", "back": "When organizations decide what to measure, they are implicitly deciding what to care about.", "id": "fc10"}, {"front": "How does the Streetlight Effect apply to schools and standardized test scores?", "back": "If a school measures standardized test scores, teachers optimize for these, potentially neglecting other important educational outcomes like curiosity or ethical reasoning, which are harder to measure.", "id": "fc11"}, {"front": "What is the recommended antidote or question to combat the Streetlight Effect?", "back": "Periodically ask: 'Am I looking where the answer is, or am I looking where the light is?'", "id": "fc12"}, {"front": "How does the Streetlight Effect manifest in business metrics?", "back": "Companies might track easy-to-count metrics like website clicks, neglecting more important but harder-to-measure aspects like customer satisfaction, product quality, or employee morale.", "id": "fc13"}, {"front": "Give an example of the Streetlight Effect in healthcare quality measurement.", "back": "Hospitals measured on wait times might optimize for speed, potentially rushing patients through assessments and compromising the quality of care, which is less visible on the scoreboard.", "id": "fc14"}, {"front": "What is the distinction between the Streetlight Effect as a cognitive bias versus an institutional phenomenon?", "back": "As a cognitive bias, it's an individual tendency to search where easy. As an institutional phenomenon, entire organizations build measurement systems that institutionalize this error.", "id": "fc15"}, {"front": "Which related concept describes what happens when measures become targets?", "back": "Goodhart's Law (and Campbell's Law).", "id": "fc16"}, {"front": "Which cognitive bias is related to the Streetlight Effect by limiting our search to comfortable territory?", "back": "Confirmation Bias.", "id": "fc17"}, {"front": "The Streetlight Effect leads us to study what we can measure. What is the alternative it distracts us from?", "back": "It distracts us from studying what truly matters, even if it's harder to measure.", "id": "fc18"}, {"front": "What is the main problem with the 'results' or 'findings' obtained under the influence of the Streetlight Effect?", "back": "The problem is that these results are answering the wrong questions or focusing on irrelevant aspects, even if they appear productive.", "id": "fc19"}, {"front": "Explain the metaphor of 'the streetlight' and 'the dark alley' in the context of this effect.", "back": "The 'streetlight' represents where searching is easy, data is available, or tools exist. The 'dark alley' represents where the answers are most likely to be found, but where searching is difficult or inconvenient.", "id": "fc20"}, {"front": "How can the Streetlight Effect lead to optimizing the irrelevant?", "back": "By focusing solely on easily measurable metrics, organizations or individuals might perfect a less important aspect (like wait times) while neglecting the core problem (like assessment quality).", "id": "fc21"}, {"front": "What happens when researchers prioritize questions their methods can handle over questions that need answering?", "back": "They fall victim to the Streetlight Effect, producing findings that may be valid within their scope but fail to address the critical problems or provide meaningful insights.", "id": "fc22"}, {"front": "Why is recognizing the Streetlight Effect in oneself particularly challenging?", "back": "Because the error seems absurd when viewed from outside, but when we are doing it, our actions feel justified by the availability of resources, data, or tools, making it seem like the 'right' place to look.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
