        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 31, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "To whom is the Eisenhower Matrix attributed, and by whom was it popularized?", "back": "It is attributed to Dwight D. Eisenhower and popularized by Stephen Covey in 'The 7 Habits of Highly Effective People'."}, {"front": "What core observation by Eisenhower led to the development of the matrix?", "back": "Eisenhower observed that 'what is important is seldom urgent, and what is urgent is seldom important.'"}, {"front": "What are the two fundamental questions used to categorize tasks in the Eisenhower Matrix?", "back": "The two questions are: 'Is it urgent?' and 'Is it important?'"}, {"front": "Describe Quadrant 1 of the Eisenhower Matrix and provide examples.", "back": "Quadrant 1 is for tasks that are Urgent and Important. These are crises, hard deadlines, and emergencies (e.g., a burst pipe, a paper due tomorrow). They require immediate action."}, {"front": "Describe Quadrant 2 of the Eisenhower Matrix and provide examples.", "back": "Quadrant 2 is for tasks that are Important but Not Urgent. This is where the most valuable work lives, such as long-term planning, relationship-building, exercise, education, and strategic thinking."}, {"front": "Describe Quadrant 3 of the Eisenhower Matrix and provide examples.", "back": "Quadrant 3 is for tasks that are Urgent but Not Important. These are interruptions that feel pressing but do not advance your goals (e.g., most phone calls, many meetings, other people's minor emergencies)."}, {"front": "Describe Quadrant 4 of the Eisenhower Matrix and provide examples.", "back": "Quadrant 4 is for tasks that are Neither Urgent Nor Important. These are time-wasters that accomplish nothing (e.g., mindless scrolling, excessive television, busy work)."}, {"front": "Why is Quadrant 2 considered 'where the most valuable work lives'?", "back": "Quadrant 2 tasks, like strategic planning and preventive maintenance, contribute significantly to long-term goals and future success, even though they lack immediate deadlines."}, {"front": "What is the primary danger of consistently neglecting Quadrant 2 tasks?", "back": "Neglecting Quadrant 2 tasks (Important but Not Urgent) is precisely what generates the crises and emergencies that populate Quadrant 1."}, {"front": "How does urgency often affect the perceived importance of tasks in Quadrant 3?", "back": "Urgency creates a false sense of importance in Quadrant 3. Tasks feel like they must be addressed immediately, even if they don't align with personal or professional goals."}, {"front": "What is considered the 'deepest insight' of the Eisenhower Matrix?", "back": "The deepest insight is that Quadrant 2 (Important but Not Urgent) work is perpetually squeezed out, even though it's the quadrant that would, over time, reduce Quadrant 1 crises and Quadrant 3 interruptions."}, {"front": "According to the Eisenhower Matrix, how do most people typically spend their time, to their detriment?", "back": "Most people spend their lives bouncing between Quadrant 1 (putting out fires) and Quadrant 3 (responding to interruptions), using Quadrant 4 as a relief valve, thereby neglecting crucial Quadrant 2 work."}, {"front": "What is the practical discipline recommended by the Eisenhower Matrix for managing Quadrant 2 tasks effectively?", "back": "The discipline is to schedule Quadrant 2 work deliberately, block and protect time for it, and treat it as a non-negotiable appointment with your own future."}, {"front": "Explain the key concept: 'Urgency Is Often the Enemy of Importance.'", "back": "The most valuable work is usually important but not urgent. Because it lacks a forcing deadline, it is frequently postponed in favor of tasks that are urgent but less important. The Matrix helps make this pattern visible and correctable."}, {"front": "Provide a student life example that shows how a Quadrant 2 activity prevents a Quadrant 1 crisis.", "back": "Reviewing notes daily (Quadrant 2) prevents the all-night cramming session before an exam (Quadrant 1)."}, {"front": "How can organizational leaders effectively apply the Eisenhower Matrix?", "back": "Effective leaders deliberately protect time for Quadrant 2 tasks like strategic thinking, planning, and training, even when faced with immediate demands, to prevent future Quadrant 1 crises."}, {"front": "Give an example of a personal health activity that is Quadrant 2 and explain its long-term importance.", "back": "Regular exercise, a good diet, and adequate sleep are Quadrant 2 activities. While not urgent daily, they are enormously important over a lifetime to prevent future Quadrant 1 health emergencies (like an ER visit)."}, {"front": "If an individual is constantly engaged in crisis management (Quadrant 1), what does this often indicate about their prior task management?", "back": "It often indicates a neglect of Quadrant 2 activities (planning, prevention, maintenance) in the past, leading to important tasks escalating into urgent crises."}, {"front": "When is a phone call likely a Quadrant 3 task, and what action should be considered?", "back": "Most phone calls are Quadrant 3 tasks; they feel urgent but don't advance one's goals. Often, they can wait, be delegated, or be handled at a more opportune time."}, {"front": "What is the consequence of spending excessive time on Quadrant 4 activities?", "back": "While pleasant in the moment, Quadrant 4 activities (time-wasters) are regrettable in the aggregate, as they consume valuable time without contributing to any meaningful goals or well-being."}, {"front": "How does proactive engagement with Quadrant 2 tasks impact the frequency of Quadrant 1 events?", "back": "Proactive engagement with Quadrant 2 tasks (e.g., preventive maintenance, long-term planning) helps reduce the number of crises and emergencies that escalate into Quadrant 1 events."}, {"front": "A student spends time answering every group chat message immediately. Which quadrant are they likely operating in, and what is a potential cost?", "back": "This is likely a Quadrant 3 task (Urgent but Not Important). The potential cost is that it steals valuable time from more important Quadrant 2 activities like studying or long-term project planning."}, {"front": "In an organizational context, what is the consequence for leaders who neglect Quadrant 2 work?", "back": "Leaders who neglect Quadrant 2 (e.g., strategic planning, training) will likely find themselves constantly in Quadrant 1, managing competitive crises or operational failures instead of leading proactively."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
