    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 22, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the acronym PoSiWiD stand for?", "back": "The Purpose of a System Is What It Does."}, {"front": "Who coined the term PoSiWiD and what was his field?", "back": "Stafford Beer, a British cyberneticist and pioneer of management cybernetics."}, {"front": "What is the core principle of PoSiWiD regarding a system's purpose?", "back": "A system's true purpose is revealed by what it actually does and reliably produces, not by its stated intentions, mission statements, or designers' beliefs."}, {"front": "According to PoSiWiD, what is considered the 'truth' when assessing a system's purpose?", "back": "The system's actual outputs are the truth; the intentions are commentary."}, {"front": "How would PoSiWiD analyze a national prison system with a stated purpose of rehabilitation but high recidivism rates?", "back": "PoSiWiD would argue that the system's de facto purpose is closer to warehousing and social exclusion, evidenced by its reliable outputs of high recidivism and less employable former inmates."}, {"front": "Apply PoSiWiD to a healthcare system that reliably produces profit more than health.", "back": "PoSiWiD would conclude that the system's de facto purpose is profit generation, with healthcare serving as a byproduct, regardless of stated goals."}, {"front": "How does PoSiWiD view an education system that sorts students by socioeconomic background more reliably than it cultivates understanding?", "back": "PoSiWiD identifies sorting students into social tiers as the system's de facto purpose, despite any stated educational goals."}, {"front": "Is PoSiWiD meant to be a cynical conclusion or a diagnostic tool?", "back": "It is intended as a diagnostic tool, helping to strip away comfortable stories about institutions and confront their actual behavior."}, {"front": "What is the diagnostic power of PoSiWiD?", "back": "It cuts through rhetoric, directs attention to measurable results, and helps understand a system's true purpose by observing its outputs and behavior rather than its charter or brochures."}, {"front": "How can one truly understand what a system is 'for,' according to PoSiWiD?", "back": "By observing its outputs, counting what it produces, and following the money, time, and attention invested, rather than reading its charter or mission statement."}, {"front": "What other significant model did Stafford Beer develop, and what was its aim?", "back": "The Viable System Model, a framework for understanding how organizations maintain identity and adapt to their environments."}, {"front": "Briefly describe Project Cybersyn, led by Stafford Beer.", "back": "An ambitious attempt in 1971–1973 to manage Chile's economy in real time using networked computers and cybernetic principles, decades before the internet made such ideas commonplace."}, {"front": "What is the key takeaway from the principle 'Judge Systems by Their Outputs, Not Their Intentions'?", "back": "To understand a system's true purpose, consistently look at what it reliably produces (actual outputs/evidence) rather than what it claims to produce (stated goals/aspirations)."}, {"front": "Explain a potential pitfall of applying PoSiWiD without nuance.", "back": "It can become reductively cynical; not every bad outcome is 'the purpose.' Some systems genuinely fail due to difficulty, poor design, or unforeseen environmental changes."}, {"front": "When is PoSiWiD most useful, and when is it less applicable?", "back": "Most useful when a system persistently produces outcomes diverging from stated goals despite repeated reform efforts. Less applicable for isolated failures or accidents (e.g., a collapsed bridge)."}, {"front": "What is the distinction between a system genuinely failing and its purpose being revealed by PoSiWiD?", "back": "A genuine failure is often an isolated event. PoSiWiD reveals purpose through a *pattern* of persistent divergence between stated goals and reliable outcomes."}, {"front": "How does PoSiWiD relate to the legal principle that people are presumed to intend the natural consequences of their actions?", "back": "It's the systems-thinking equivalent: if a system reliably produces a particular outcome, that outcome is functionally its purpose, regardless of what anyone says."}, {"front": "Which related systems concept explains reinforcing and balancing mechanisms that lock systems into their actual outputs?", "back": "Feedback Loops."}, {"front": "Which related concept describes incentive structures whose outputs diverge spectacularly from their original intent?", "back": "The Cobra Effect."}, {"front": "What concept warns about the corruption of measures that were meant to track a system's true purpose?", "back": "Goodhart's Law."}, {"front": "Which related concept highlights the cascading consequences that shape what a system actually does?", "back": "Second-Order Effects."}, {"front": "How do 'Incentives' (as per Munger's insight) relate to PoSiWiD?", "back": "Munger's insight states that behavior follows incentive structures regardless of stated intentions, directly aligning with PoSiWiD's focus on actual outputs over rhetoric."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
