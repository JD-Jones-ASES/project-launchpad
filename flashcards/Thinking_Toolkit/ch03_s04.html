<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the common meaning of the American English idiom “getting your ducks in a row”?", "back": "It means to organize or prepare everything perfectly before starting something.", "id": "fc01"}, {"front": "Why is the phrase “getting my ducks in a row” described as both comforting and dangerous?", "back": "It sounds responsible and prudent (comforting), but it can often be a sophisticated form of procrastination (dangerous).", "id": "fc02"}, {"front": "When is 'getting your ducks in a row' considered professional competence rather than procrastination?", "back": "When it involves necessary pre-checks and reviews for situations with serious consequences, like a pilot's preflight checklist or a surgeon's imaging review.", "id": "fc03"}, {"front": "Give an example of 'getting your ducks in a row' as a form of professional competence.", "back": "A surgeon reviewing imaging before making the first incision, or an event planner confirming venue and caterer details.", "id": "fc04"}, {"front": "Give an example of 'getting your ducks in a row' as a sophisticated form of procrastination.", "back": "An entrepreneur spending months perfecting a business plan without talking to customers, or a writer endlessly reorganizing notes instead of writing the first draft.", "id": "fc05"}, {"front": "What is the primary psychological reason 'duck-arranging' is so seductive?", "back": "It provides the feeling of control over an uncertain situation, reducing discomfort associated with unpredictability.", "id": "fc06"}, {"front": "How does the 'illusion of control' manifest when people are 'arranging ducks'?", "back": "It involves activities like creating spreadsheets, building filing systems, or researching tools, which feel busy and productive but don't involve actual forward movement or risk.", "id": "fc07"}, {"front": "What is the 'telltale sign' that preparation has become an end in itself?", "back": "The preparation never quite reaches the point where one feels ready to begin; there's always one more thing to arrange, creating an asymptote where the project never launches.", "id": "fc08"}, {"front": "Explain the concept of the 'asymptote' in the context of over-preparation.", "back": "It refers to the point where preparation approaches completion but never quite reaches it, always having one more thing to do, thus becoming an endless process that prevents actual starting.", "id": "fc09"}, {"front": "What principle is introduced as a counterpoint to excessive 'duck-arranging'?", "back": "The principle of 'Ready, Fire, Aim'.", "id": "fc10"}, {"front": "Describe the 'Ready, Fire, Aim' principle.", "back": "It's a deliberate inversion of the conventional sequence, suggesting that in uncertain environments, you learn more from taking action ('fire') first, and then adjust ('aim') based on what you learn.", "id": "fc11"}, {"front": "Does 'Ready, Fire, Aim' advocate for reckless action? Explain.", "back": "No, it recognizes that in many situations, the value of information gained by starting outweighs the marginal value of additional preparation. It prioritizes learning through doing over endless planning.", "id": "fc12"}, {"front": "What is the 'critical skill' needed to distinguish between genuine preparation and avoidance disguised as preparation?", "back": "The ability to differentiate between situations demanding genuine preparation (serious consequences, well-understood procedures) and those where preparation is a form of avoidance (uncertainty not eliminated by prep).", "id": "fc13"}, {"front": "Name a type of situation that genuinely demands extensive preparation, as per the text.", "back": "Surgery, aviation, or structural engineering, due to serious consequences for failure and well-understood risk-reduction procedures.", "id": "fc14"}, {"front": "Name a type of situation where extensive preparation is often a form of avoidance, as per the text.", "back": "Launching a side project, writing a first draft, or asking for a raise, where uncertainty cannot be eliminated by planning alone.", "id": "fc15"}, {"front": "What is the 'good enough threshold'?", "back": "It's a framework to determine the point at which additional preparation produces diminishing returns, helping decide when to stop preparing and start acting.", "id": "fc16"}, {"front": "How do you apply the 'good enough threshold' to decide whether to continue preparing or to start?", "back": "Ask if more preparation would make you 'meaningfully more ready' (continue) or just 'marginally more comfortable' (stop and start).", "id": "fc17"}, {"front": "What is the core message regarding 'Preparation vs. the Illusion of Control'?", "back": "True readiness often comes from action and learning in uncertain situations, not from endless planning. At some point, 'good enough' is sufficient to begin.", "id": "fc18"}, {"front": "How does the Lean Startup methodology relate to the concept of avoiding over-preparation?", "back": "It advocates building a minimum viable product (MVP), testing it with real users, learning from reactions, and iterating, rather than perfecting a business plan in isolation.", "id": "fc19"}, {"front": "In the context of writing, what is considered more valuable: a perfect outline or a bad first draft?", "back": "A bad first draft is infinitely better than a perfect outline that never becomes a manuscript, because the hardest part is producing words that can then be revised.", "id": "fc20"}, {"front": "How do the ancient Stoics' ideas about 'things up to us' and 'things not up to us' apply to personal decisions and 'getting your ducks in a row'?", "back": "Deliberating about things 'not up to us' (outcomes, others' reactions) is futile; focus preparation on choices and actions that are within our control.", "id": "fc21"}, {"front": "Which cognitive bias, mentioned in the connections, explains the preference for the current state that makes starting feel risky?", "back": "Status Quo Bias.", "id": "fc22"}, {"front": "Which related concept explains why even our best preparation often underestimates the difficulty ahead?", "back": "The Planning Fallacy.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
