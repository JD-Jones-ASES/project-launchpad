<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who were Socrates and Euthyphro, and what was the context of their meeting?", "back": "Socrates met the prophet Euthyphro outside the Athenian law courts. Euthyphro was prosecuting his own father for impiety, believing he had a clear understanding of what piety was, which Socrates then questioned.", "id": "fc01"}, {"front": "What is Socrates' original formulation of the Euthyphro Dilemma?", "back": "Socrates asks: 'Is the pious loved by the gods because it is pious, or is it pious because it is loved by the gods?'", "id": "fc02"}, {"front": "How is the Euthyphro Dilemma typically phrased in modern ethical terms regarding God and goodness?", "back": "The modern question is: 'Is something good because God commands it, or does God command it because it is good?'", "id": "fc03"}, {"front": "Why is the Euthyphro Dilemma considered a highly consequential question in philosophy?", "back": "It is consequential because the two options lead to radically different conclusions about the fundamental nature of morality and its foundations.", "id": "fc04"}, {"front": "What is the philosophical name for the view that 'Something is good because God commands it'?", "back": "Divine Command Theory.", "id": "fc05"}, {"front": "What are the perceived advantages of Divine Command Theory?", "back": "Morality is grounded in divine authority, making it stable, absolute, and beyond human dispute.", "id": "fc06"}, {"front": "What is the significant 'cost' or disadvantage of accepting Divine Command Theory?", "back": "Goodness becomes arbitrary. If God commanded cruelty, cruelty would be good. Goodness is merely a label applied by divine fiat, not an inherent quality.", "id": "fc07"}, {"front": "Describe the second option of the Euthyphro Dilemma concerning God's relationship to good.", "back": "The second option is: God commands it because it is good. This implies that goodness is a real, objective quality that exists independently of God's commands.", "id": "fc08"}, {"front": "What important intuition does the second option ('God commands it because it is good') preserve?", "back": "It preserves the intuition that goodness is a real, objective quality, meaning actions possess goodness inherently.", "id": "fc09"}, {"front": "What is the 'severe cost' of the second option ('God commands it because it is good')?", "back": "Morality becomes independent of God, which seems to limit divine sovereignty. God is seen as a reliable reporter of morality, not its author or ultimate foundation.", "id": "fc10"}, {"front": "Why do both options of the Euthyphro Dilemma present a challenge for those who want morality to be both objective and divinely grounded?", "back": "The dilemma forces a choice: either God is the source of an arbitrary morality, or morality is independent of God and thus not ultimately founded by Him.", "id": "fc11"}, {"front": "What is the most influential philosophical response attempting to resolve the Euthyphro Dilemma?", "back": "The Divine Nature Theory.", "id": "fc12"}, {"front": "Explain how Divine Nature Theory attempts to resolve the Euthyphro Dilemma.", "back": "It posits that goodness flows from God's own nature—God is good, and God's commands necessarily reflect that nature. Goodness is neither arbitrary nor external to God.", "id": "fc13"}, {"front": "Where does Divine Nature Theory locate morality to 'thread the needle' between the two horns of the dilemma?", "back": "It locates morality in God's character (God's nature) rather than in God's will (commands) or in an external standard.", "id": "fc14"}, {"front": "What is a common philosophical criticism or follow-up question regarding the Divine Nature Theory?", "back": "Critics ask if it just renames the problem: Is God's nature good because of what it is, or is 'good' just a label for whatever God's nature happens to be?", "id": "fc15"}, {"front": "Regardless of its resolution, what does the Euthyphro Dilemma achieve for philosophical thought?", "back": "It brings clarity, forcing individuals to articulate exactly what they mean by 'good' and the role, if any, divine authority plays in that judgment.", "id": "fc16"}, {"front": "What central question does the 'Independence of Morality' concept, as discussed in relation to the Euthyphro Dilemma, address?", "back": "It asks whether morality depends on divine command or whether divine command merely tracks an independently existing moral reality.", "id": "fc17"}, {"front": "How does the Euthyphro Dilemma affect religious ethics?", "back": "It does not destroy religious ethics but demands that they be articulated with precision regarding the foundations of goodness and authority.", "id": "fc18"}, {"front": "What characteristic Socratic method is demonstrated in his questioning of Euthyphro?", "back": "Socratic irony, where Socrates professes ignorance to encourage Euthyphro to elaborate on his confident assertions about piety, ultimately exposing inconsistencies or lack of true understanding.", "id": "fc19"}, {"front": "How does the Euthyphro Dilemma relate to other foundational questions in ethics, such as those presented by the Ring of Gyges or Rawls's Veil of Ignorance?", "back": "Like these other concepts, the Euthyphro Dilemma serves as a foundational question, exploring the very nature and basis of morality, justice, and ethical principles.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
