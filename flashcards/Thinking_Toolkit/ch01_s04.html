    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core definition of 'moving the goalposts'?", "back": "It is the pattern of changing the criteria for success after the original criteria have already been met."}, {"front": "From what common context is the metaphor 'moving the goalposts' derived?", "back": "It's drawn from literally moving the goalposts on a playing field so that a successful kick no longer counts."}, {"front": "What are the two main ways 'moving the goalposts' can be employed?", "back": "It can be a deliberate rhetorical tactic to avoid conceding a point, or an unconscious defense mechanism to protect a cherished belief."}, {"front": "In debate and argumentation, what does 'moving the goalposts' reveal about the arguer when used as a deliberate rhetorical tactic?", "back": "It reveals a form of bad faith, indicating the arguer has no intention of being persuaded, as no evidence will ever be sufficient."}, {"front": "What is the key test to determine if someone is genuinely asking good questions or moving the goalposts in an argument?", "back": "The test is whether they stated their criteria for being convinced *before* the evidence was presented, and then shifted the standard after the evidence arrived."}, {"front": "What is the consequence if success criteria are never stated at the beginning of a conversation or debate?", "back": "The conversation becomes vulnerable to the 'moving the goalposts' tactic from the start, as there is no fixed standard to refer to."}, {"front": "Describe 'moving the goalposts' when it acts as an unconscious defense mechanism.", "back": "It's a genuine psychological defense to protect a cherished belief from disconfirmation. One unconsciously raises the evidentiary bar, genuinely feeling new evidence is 'not quite enough,' driven by the need to protect the belief."}, {"front": "How is 'moving the goalposts' related to confirmation bias?", "back": "Moving the goalposts is what confirmation bias looks like in a conversation; it's the act of scrutinizing or dismissing evidence that challenges existing beliefs by continually demanding more or different evidence."}, {"front": "What is a defining feature of conspiracy theories regarding counter-evidence?", "back": "Moving the goalposts; any evidence presented against the conspiracy is reinterpreted as further confirmation of the conspiracy itself (e.g., 'that's how powerful the cover-up is')."}, {"front": "How does 'moving the goalposts' contribute to a theory becoming unfalsifiable?", "back": "By reinterpreting every possible piece of counter-evidence as confirmation, it makes the theory impossible to disprove, even in principle, because the criteria for refutation are never fixed."}, {"front": "Why is Karl Popper's criterion of falsifiability important in understanding 'moving the goalposts' with conspiracy theories?", "back": "It highlights that a claim that cannot, even in principle, be disproven by any evidence is not a claim about the world, but rather a commitment masquerading as a hypothesis."}, {"front": "What is the recommended antidote to prevent or counter 'moving the goalposts'?", "back": "Define success criteria *before* examining the evidence, and hold yourself to the same standard you demand of others."}, {"front": "Give a real-world example of 'moving the goalposts' in a political debate.", "back": "One side demands evidence for a claim, receives it, and then demands a different kind of evidence, revealing the demand was never for evidence but for capitulation."}, {"front": "How might 'moving the goalposts' manifest in a performance review setting?", "back": "An employee meets all stated goals for the year but is told at review time that the real criteria were different (e.g., 'softer skills,' 'cultural fit') and were not specified in advance."}, {"front": "An example scenario: A parent asks if you got the highest grade, then if it was an AP class, then if it will get you into a top college. What logical fallacy or rhetorical tactic is this?", "back": "Moving the goalposts."}, {"front": "What fundamental problem arises when someone consistently moves the goalposts in an argument or situation?", "back": "The standard of sufficiency is continually redefined, making it impossible for any achievement, evidence, or point to ever be sufficient to meet the ever-shifting demands."}, {"front": "What is the key difference in intent between the deliberate rhetorical tactic and the unconscious defense mechanism of moving the goalposts?", "back": "The deliberate tactic is in bad faith, consciously avoiding concession. The unconscious defense is a genuine psychological need to protect a belief, where one genuinely feels evidence is 'not quite enough' without conscious intent to deceive."}, {"front": "The text states: 'The goalposts are not in a fixed location; they are on wheels.' What does this metaphor emphasize?", "back": "It emphasizes the constantly shifting and unstable nature of the criteria, making it impossible to achieve success because the target is never static."}, {"front": "When a theory becomes 'unfalsifiable' due to 'moving the goalposts,' what does it truly represent according to the text?", "back": "It represents a commitment masquerading as a hypothesis, meaning it's a deeply held belief rather than a claim about the world that can be tested or disproven."}, {"front": "Why is it important to define success criteria before examining evidence?", "back": "It prevents the 'moving the goalposts' tactic, ensuring a clear, fixed standard for evaluation and promoting fair assessment rather than allowing standards to shift based on received information or bias."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
