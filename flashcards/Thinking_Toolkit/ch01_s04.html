<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the idiom 'Rearranging Deck Chairs on the Titanic' describe?", "back": "It describes the futile optimization of trivial details while ignoring a catastrophic underlying problem.", "id": "fc01"}, {"front": "From what historical event does the idiom 'Rearranging Deck Chairs on the Titanic' originate?", "back": "The 1912 sinking of the RMS Titanic after it struck an iceberg.", "id": "fc02"}, {"front": "What specific failure mode does the metaphor 'Rearranging Deck Chairs on the Titanic' capture?", "back": "Optimizing the irrelevant.", "id": "fc03"}, {"front": "Is 'Rearranging Deck Chairs on the Titanic' about doing nothing?", "back": "No, it's about being busy and productive in a narrow sense, but directing that effort at the wrong target—where it's comfortable rather than where it's needed.", "id": "fc04"}, {"front": "Explain 'the comfort of competence' as a psychological driver for this behavior.", "back": "People gravitate toward tasks they know how to do, offering the satisfaction of a completed task when important tasks feel impossible or beyond their skill set.", "id": "fc05"}, {"front": "How does 'the illusion of progress' contribute to rearranging deck chairs?", "back": "Activity feels like accomplishment. Being busy provides psychological cover, making one feel like they are addressing the situation, even if they aren't addressing anything that matters.", "id": "fc06"}, {"front": "Describe 'avoidance' as a psychological force behind this behavior.", "back": "The real problem is so frightening, large, or painful that attention is unconsciously redirected to something manageable, serving as a coping mechanism rather than laziness.", "id": "fc07"}, {"front": "Give an example of 'avoidance' related to the 'Rearranging Deck Chairs' metaphor.", "back": "A student organizing notes to avoid the anxiety of writing a term paper, or an executive debating a logo to avoid confronting an obsolete product.", "id": "fc08"}, {"front": "When is it unfair to accuse someone of 'rearranging deck chairs'?", "back": "When the small task they are doing is the only one within their control, and they lack the ability to address the larger, catastrophic problem.", "id": "fc09"}, {"front": "Provide an example where the metaphor 'Rearranging Deck Chairs' does not fairly apply.", "back": "A frontline employee doing her job well, even if company strategy is failing, because she cannot fix the company's strategy herself.", "id": "fc10"}, {"front": "Under what conditions does the 'Rearranging Deck Chairs' metaphor apply to an individual?", "back": "When someone *has the ability* to address the real problem but chooses instead to optimize the irrelevant.", "id": "fc11"}, {"front": "When does the 'Rearranging Deck Chairs' metaphor apply to an organization?", "back": "When an organization with the resources to address a catastrophic issue allocates those resources to trivial improvements instead.", "id": "fc12"}, {"front": "What is the first diagnostic question to ask when assessing if the 'Rearranging Deck Chairs' metaphor applies?", "back": "Is the ship actually sinking?", "id": "fc13"}, {"front": "What is the second diagnostic question to ask when assessing if the 'Rearranging Deck Chairs' metaphor applies (assuming the ship *is* sinking)?", "back": "Are you someone who could be working on the hull instead of the deck chairs?", "id": "fc14"}, {"front": "Give a corporate example of 'Rearranging Deck Chairs on the Titanic.'", "back": "A retail chain facing e-commerce challenges redesigning store layouts instead of addressing the core problem of customers not walking through the doors.", "id": "fc15"}, {"front": "Provide an academic example of 'Rearranging Deck Chairs on the Titanic.'", "back": "A graduate student with a dissertation deadline reorganizing her bibliography management system multiple times instead of writing the dissertation.", "id": "fc16"}, {"front": "Illustrate 'Rearranging Deck Chairs on the Titanic' in a governmental context.", "back": "A legislature facing a debt crisis passing resolutions honoring sports teams or renaming highways, avoiding the systemic financial problem.", "id": "fc17"}, {"front": "A business is losing customers rapidly. The executive team debates a new logo. How does this exemplify 'Rearranging Deck Chairs on the Titanic'?", "back": "The new logo is a trivial detail (deck chair) compared to the catastrophic underlying problem of customer hemorrhaging (sinking ship). The effort is catastrophically misallocated.", "id": "fc18"}, {"front": "A student has a term paper due tomorrow and spends the evening color-coding notes. Explain this behavior using the idiom.", "back": "Color-coding notes is a manageable, comfortable task that creates an 'illusion of progress' or provides 'avoidance' from the more difficult, urgent task of writing the paper itself.", "id": "fc19"}, {"front": "Which related concept, mentioned in the text, involves searching for answers in easy places rather than where they actually are?", "back": "The Streetlight Effect.", "id": "fc20"}, {"front": "Which framework mentioned in the text helps distinguish urgent from important tasks, relevant to avoiding 'Rearranging Deck Chairs'?", "back": "The Eisenhower Matrix.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
