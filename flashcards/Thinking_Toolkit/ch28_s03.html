<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 28, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Enrico Fermi?", "back": "An Italian-American physicist renowned for his ability to make quick, surprisingly accurate estimates from minimal data, and for major contributions to nuclear physics, quantum theory, and statistical mechanics.", "id": "fc01"}, {"front": "What is Fermi Estimation?", "back": "The art of arriving at useful approximate answers to questions that seem unanswerable, by decomposing them into tractable sub-problems and combining rough estimates.", "id": "fc02"}, {"front": "What is the classic problem often used to illustrate Fermi Estimation?", "back": "Enrico Fermi's question: 'How many piano tuners are in Chicago?'", "id": "fc03"}, {"front": "When is Fermi Estimation particularly useful?", "back": "When precise data is unavailable and an approximate answer (often within an order of magnitude) is sufficient for planning, sanity-checking, or decision-making.", "id": "fc04"}, {"front": "What was the approximate population of Chicago used in the Fermi estimate for piano tuners?", "back": "Approximately 3 million people.", "id": "fc05"}, {"front": "How was the number of households in Chicago estimated in the piano tuner problem?", "back": "By dividing the estimated population (3 million) by an average household size of 2.5 people, resulting in roughly 1.2 million households.", "id": "fc06"}, {"front": "What fraction of households was estimated to own a piano in the Chicago tuner problem?", "back": "Approximately 1 in 20, or 5%.", "id": "fc07"}, {"front": "How often was a piano estimated to be tuned per year in the Fermi problem?", "back": "Perhaps once or twice a year on average, estimated as 1.5 times per year.", "id": "fc08"}, {"front": "Approximately how many pianos can one tuner service per year according to the Fermi estimate?", "back": "A tuner can service about 4 pianos per 8-hour workday. Working about 250 days a year, one tuner handles roughly 1,000 tunings per year.", "id": "fc09"}, {"front": "What was the final estimated number of piano tuners in Chicago using the Fermi method?", "back": "Approximately 90 piano tuners (calculated by dividing 90,000 tuning jobs by 1,000 jobs per tuner).", "id": "fc10"}, {"front": "How close was the Fermi estimate for piano tuners to the actual number?", "back": "The estimate of 90 was remarkably close to the actual number (between 80 and 200), placing it well within the right order of magnitude.", "id": "fc11"}, {"front": "What is one mathematical reason why Fermi Estimation often produces accurate results?", "back": "Errors tend to cancel out. When multiple independent estimates are multiplied, overestimates and underestimates partially neutralize each other.", "id": "fc12"}, {"front": "What is another mathematical reason why Fermi Estimation is considered effective?", "back": "Order of magnitude is usually enough. For many questions, knowing if the answer is 100, 1,000, or 10,000 is more useful than an exact figure, and Fermi estimation almost always achieves this.", "id": "fc13"}, {"front": "Beyond the numerical answer, what is the 'deeper skill' that Fermi Estimation cultivates?", "back": "It is a discipline of decomposition and approximate reasoning, forcing one to identify what is known/unknown, make assumptions explicit, and apply first-principles thinking.", "id": "fc14"}, {"front": "How does breaking a problem into components benefit the estimator in Fermi Estimation?", "back": "It forces them to identify what they do and do not know, to make their assumptions explicit, and to check whether their conclusion is even in the right neighborhood.", "id": "fc15"}, {"front": "List three examples of real-world questions that can be tackled using Fermi Estimation.", "back": "How much water does your city use per day? How many golf balls fit in a school bus? How large a market exists for a new product? How many servers does a major website need? Is this business plan's revenue projection in the right ballpark?", "id": "fc16"}, {"front": "Name two significant contributions or achievements of Enrico Fermi.", "back": "He received the Nobel Prize in Physics in 1938 and was a central figure in the Manhattan Project, leading the team that created the first controlled nuclear chain reaction in 1942.", "id": "fc17"}, {"front": "What famous question about extraterrestrial life is associated with Enrico Fermi?", "back": "His question 'Where is everybody?' is known as the Fermi Paradox.", "id": "fc18"}, {"front": "How do technology companies like Google use Fermi questions in job interviews?", "back": "They use them not for the specific answer, but to reveal the candidate's analytical skill, comfort with uncertainty, and ability to structure ambiguous problems.", "id": "fc19"}, {"front": "How do startups and consultants use Fermi estimation?", "back": "Startups use it to estimate market size before committing to a business plan, while consultants use it to test whether a client's projections are realistic.", "id": "fc20"}, {"front": "What is 'Useful Approximation from First Principles' in the context of Fermi Estimation?", "back": "It's the core idea that breaking an apparently unanswerable question into smaller sub-questions, estimating each roughly, and combining them yields a useful, order-of-magnitude accurate answer, with the deeper skill being decomposition and explicit assumption-making.", "id": "fc21"}, {"front": "Which thinking method is closely related to the 'first-principles thinking' aspect of Fermi Estimation?", "back": "First Principles Thinking (as discussed in a separate chapter).", "id": "fc22"}, {"front": "How can Fermi estimation help with the 'Planning Fallacy'?", "back": "It can serve as a corrective to optimistic projections by quickly providing a sanity-checking estimate, ensuring plans are in a realistic ballpark (as discussed in a separate chapter).", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
