    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 30, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Gish Gallop named after?", "back": "The Gish Gallop is named after Duane Gish (1921–2013), a biochemist and prominent creationist debater."}, {"front": "Describe Duane Gish's debating technique that led to the term 'Gish Gallop'.", "back": "Gish would rapidly present dozens of claims in succession, including misquoted studies, out-of-context statistics, rhetorical questions, factual errors, and half-truths, making it impossible for opponents to address them all."}, {"front": "What impossible choice did Gish's opponents face when confronted with a Gish Gallop?", "back": "Opponents faced the choice of either addressing each claim carefully (and running out of time quickly) or ignoring most claims (and appearing to concede them)."}, {"front": "What fundamental asymmetry in argumentation does the Gish Gallop exploit?", "back": "It exploits the asymmetry that it takes far less effort to make a claim than to refute one."}, {"front": "Explain the 'effort ratio' often seen when making versus refuting claims, as exploited by the Gish Gallop.", "back": "A false assertion can be made in ten seconds, but a thorough refutation (explaining why it's wrong, citing evidence, and addressing underlying misunderstandings) might take five minutes, creating a significant time disadvantage for the refuter."}, {"front": "Is the Gish Gallop exclusively used by creationist debaters?", "back": "No. It appears whenever someone responds to a focused objection by changing the subject to a different objection, then another, never pausing long enough for a substantive exchange."}, {"front": "How might a Gish Gallop manifest in a political debate?", "back": "A candidate accused of a specific policy failure might pivot to the economy, then national security, then their opponent's character, avoiding deep discussion on any single point."}, {"front": "How is the Gish Gallop commonly observed in social media arguments?", "back": "One party might post a 'wall' of links, memes, and talking points that would take hours to fact-check, overwhelming the other party and making thorough refutation impractical."}, {"front": "What is the primary defense strategy against a Gish Gallop?", "back": "The main defense is disciplined focus: Rather than chasing every claim, identify the strongest or most central one and address it thoroughly."}, {"front": "When defending against a Gish Gallop, what should you do about the claims you choose not to address immediately?", "back": "Explicitly acknowledge that you are setting aside the other claims, stating it's not because they are valid, but because serious arguments deserve serious treatment, and you can only address one at a time."}, {"front": "How does an audience's understanding of the Gish Gallop impact the defense strategy?", "back": "An audience that understands the Gish Gallop will respect the disciplined focus; an audience that does not may need to have the tactic named and explained."}, {"front": "According to the 'key concept' summary, what is the Gish Gallop and its primary effect?", "back": "The Gish Gallop overwhelms an opponent with a large number of weak arguments, where each requires more time to refute than to state, emphasizing quantity over quality."}, {"front": "What is Brandolini's Law (also called the 'Bullshit Asymmetry Principle')?", "back": "Brandolini's Law states that the amount of energy needed to refute nonsense is an order of magnitude larger than the energy needed to produce it."}, {"front": "How does Brandolini's Law relate to the effectiveness of the Gish Gallop?", "back": "Brandolini's Law explains the structural asymmetry that allows the Gish Gallop to work even when the galloper's individual arguments are very weak, as the asymmetry is structural, not merely a matter of rhetorical skill."}, {"front": "Why can the Gish Gallop be devastatingly effective even if the individual arguments presented are weak?", "back": "It is effective because the sheer volume of claims creates an impossible burden for the opponent, exploiting the asymmetry that it takes far more effort to refute than to make a claim. This forces the opponent to run out of time or appear to concede."}, {"front": "What is the ultimate goal of someone employing a Gish Gallop in a debate?", "back": "The ultimate goal is to overwhelm the opponent, exhaust their time and resources, and create the illusion of having made numerous valid points, even if those points are individually flimsy or false."}, {"front": "Name two other logical fallacies or rhetorical tactics mentioned as being related to the Gish Gallop.", "back": "Related concepts include Motte and Bailey, Straw Man, Red Herring, and False Dilemma (any two are acceptable)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
