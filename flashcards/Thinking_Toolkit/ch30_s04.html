    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 30, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the origin of the term \"Motte and Bailey\" in rhetoric?", "back": "It was named by philosopher Nicholas Shackel in a 2005 paper, borrowing from medieval castle architecture."}, {"front": "Describe the architectural \"motte\" in a medieval castle context.", "back": "The motte is a heavily fortified stone tower on a hill; it is cramped and austere but nearly impregnable, serving as a last refuge for defenders."}, {"front": "Describe the architectural \"bailey\" in a medieval castle context.", "back": "The bailey is the larger, less defensible open courtyard below the motte; it is spacious and desirable, where people live, work, and graze animals."}, {"front": "How does the architectural analogy of the Motte and Bailey apply to a rhetorical maneuver?", "back": "A speaker makes a bold, controversial \"bailey\" claim. When challenged, they retreat to a weaker, almost indisputable \"motte\" claim. Once the challenge passes, they return to the bailey."}, {"front": "What characterizes the \"bailey\" claim in the Motte and Bailey rhetorical maneuver?", "back": "It is a strong, bold, controversial claim that is hard to defend (e.g., 'Science is just another belief system')."}, {"front": "What characterizes the \"motte\" claim in the Motte and Bailey rhetorical maneuver?", "back": "It is a much weaker, modest, true, and almost indisputable claim (e.g., 'Scientists are human and can make mistakes')."}, {"front": "Outline the three main phases of the Motte and Bailey rhetorical maneuver.", "back": "1. Present a bold, controversial 'bailey' claim. 2. Retreat to a modest, indisputable 'motte' claim when challenged. 3. Quietly reoccupy the 'bailey' claim once the challenge subsides."}, {"front": "Provide the 'bailey' claim from the text's example concerning science.", "back": "\"Science is just another belief system,\" asserting that scientific knowledge has no special epistemic standing."}, {"front": "Provide the corresponding 'motte' claim for the statement \"Science is just another belief system.\"", "back": "\"Well, all I mean is that scientists are human and can make mistakes.\""}, {"front": "Why is the Motte and Bailey rhetorical maneuver considered particularly insidious?", "back": "It is often unconscious; the person employing it may genuinely believe they have answered the objection when they retreat to the motte."}, {"front": "What is the consequence of the Motte and Bailey being an unconscious maneuver for the speaker?", "back": "The speaker feels vindicated because the motte is defensible and returns to the bailey without recognizing that the original strong claim was never actually defended."}, {"front": "What is the recommended strategy to identify and counter a Motte and Bailey?", "back": "Hold the speaker to their original claim by agreeing with the weaker 'motte' claim, then asking, 'But that is not what you originally said. Do you still hold the stronger claim? If so, please defend it?'"}, {"front": "What is the purpose of holding a speaker to their original 'bailey' claim when countering a Motte and Bailey?", "back": "This forces the speaker to either defend the original strong claim on its own terms or explicitly abandon it."}, {"front": "Give an example of a Motte and Bailey in political rhetoric, distinguishing between the 'bailey' and 'motte'.", "back": "Bailey: \"We need to completely rethink our approach to immigration.\" Motte: \"I just think we should have a conversation about it.\""}, {"front": "How does the Motte and Bailey tactic manifest in corporate communications?", "back": "A company announces it is 'disrupting the industry' (bailey) to attract attention, then responds to hard questions with 'We're simply offering customers more choices' (motte) to deflect scrutiny."}, {"front": "Illustrate a common Motte and Bailey scenario in everyday arguments.", "back": "Bailey: \"You never listen to me.\" Motte: \"I'm not saying never, I just mean sometimes I feel unheard.\""}, {"front": "In the context of the Motte and Bailey, why might a speaker return to the 'bailey' claim after retreating to the 'motte'?", "back": "The speaker acts as though the strong claim was never challenged, having successfully deflected scrutiny with the undeniable 'motte' claim."}, {"front": "What rhetorical advantage does the Motte and Bailey offer to the speaker?", "back": "It allows the speaker to sound both bold and reasonable, attracting attention with a strong claim while deflecting scrutiny with a weak, defensible one."}, {"front": "What is the 'key concept' definition of the Motte and Bailey rhetorical pattern?", "back": "It's a pattern in which a speaker defends a bold claim by retreating to a modest, nearly indisputable one when challenged, then returns to the bold claim once pressure relents."}, {"front": "What is the general remedy for a Motte and Bailey argument?", "back": "To hold the speaker to their original claim and ask them to defend it directly."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
