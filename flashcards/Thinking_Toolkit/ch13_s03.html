<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who proposed the Chinese Room argument and when was it published?", "back": "The American philosopher John Searle, in 1980, in 'Minds, Brains, and Programs'.", "id": "fc01"}, {"front": "Describe the basic setup of Searle's Chinese Room thought experiment.", "back": "A person who doesn't understand Chinese is locked in a room. They receive Chinese characters through a slot and use an English instruction manual to produce specific Chinese character responses, which appear intelligent from outside.", "id": "fc02"}, {"front": "What is the crucial observation about the person inside the Chinese Room regarding understanding?", "back": "The person inside the room manipulates symbols perfectly according to rules but does not understand any of the Chinese characters or their meaning.", "id": "fc03"}, {"front": "What is 'strong AI' as defined by John Searle?", "back": "The claim that a computer running the right program literally understands and possesses a mind in the same sense that humans do.", "id": "fc04"}, {"front": "How does Searle distinguish 'weak AI' from 'strong AI'?", "back": "Weak AI is the modest claim that computers can simulate intelligent behavior and be useful tools for studying the mind (which Searle accepts). Strong AI claims the simulation *is* the real thing (which Searle rejects).", "id": "fc05"}, {"front": "State the first premise of Searle's argument against strong AI.", "back": "Programs are purely formal; they manipulate symbols according to syntactic rules without regard to meaning.", "id": "fc06"}, {"front": "State the second premise of Searle's argument against strong AI.", "back": "Human minds have semantics; they do not merely manipulate symbols but understand what those symbols mean.", "id": "fc07"}, {"front": "What is the conclusion of Searle's argument against strong AI?", "back": "Running a program is not sufficient for understanding; no amount of symbol manipulation, however sophisticated, constitutes genuine comprehension.", "id": "fc08"}, {"front": "How does the Chinese Room argument illustrate the difference between syntax and semantics?", "back": "The person in the room perfectly handles the syntax (form) of Chinese characters but lacks semantics (meaning), demonstrating that symbol manipulation alone doesn't equate to understanding.", "id": "fc09"}, {"front": "Explain the 'Systems Reply' to the Chinese Room argument.", "back": "The 'Systems Reply' argues that while the person in the room doesn't understand Chinese, the entire system (person + rule book + paper + room) as a whole does.", "id": "fc10"}, {"front": "How does Searle respond to the 'Systems Reply'?", "back": "Searle counters that even if the person memorized the rule book and performed all processing internally, they still wouldn't understand Chinese. The system is still just the person manipulating symbols.", "id": "fc11"}, {"front": "Explain the 'Robot Reply' to the Chinese Room argument.", "back": "The 'Robot Reply' suggests that a computer connected to sensors and robotic limbs, interacting with the real world, might develop genuine understanding beyond mere symbol processing.", "id": "fc12"}, {"front": "How does Searle respond to the 'Robot Reply'?", "back": "Searle argues that adding sensors and motors doesn't change the fundamental issue: the robot is still running a program, manipulating formal symbols. Its behavior appears intelligent, but the underlying process remains syntactic.", "id": "fc13"}, {"front": "Explain the 'Brain Simulator Reply' to the Chinese Room argument.", "back": "This reply posits that if a program simulated the firing of every neuron in a Chinese speaker's brain, it would surely constitute understanding.", "id": "fc14"}, {"front": "How does Searle respond to the 'Brain Simulator Reply'?", "back": "Searle replies that a simulation is not the real thing. Simulating digestion doesn't digest anything, and simulating a brain's neural activity doesn't produce understanding; it merely simulates it.", "id": "fc15"}, {"front": "Explain the 'Other Minds Reply' to the Chinese Room argument.", "back": "The 'Other Minds Reply' suggests that if a computer's behavior is indistinguishable from a human's, we have no more reason to deny understanding to the computer than to another person, as we infer understanding from behavior.", "id": "fc16"}, {"front": "How does Searle respond to the 'Other Minds Reply'?", "back": "Searle argues that we know our own brains produce consciousness from direct experience, but we have no comparable evidence that programs do. He questions inferring understanding solely from external behavior for machines.", "id": "fc17"}, {"front": "According to Searle, what does the Chinese Room argument *not* prove about machines and understanding?", "back": "It does not prove that machines *cannot* understand. It only argues that *running a program* is not sufficient for understanding.", "id": "fc18"}, {"front": "What type of mechanism might allow a machine to genuinely understand language, according to Searle, beyond mere symbol manipulation?", "back": "Perhaps one that involves the right kind of physical substrate, the right kind of causal connections to the world, or something not yet imagined.", "id": "fc19"}, {"front": "What is the fundamental gap highlighted by the Chinese Room argument regarding intelligence and understanding?", "back": "The gap between behaving intelligently (producing the right outputs) and *being* intelligent (genuinely thinking or understanding), suggesting this gap may be unbridgeable by programming alone.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
