<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 13, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Robert Nozick's Experience Machine thought experiment?", "back": "It's a hypothetical scenario challenging the idea that subjective experience is all that matters for a good life, by offering a machine that can perfectly simulate any desired experience, indistinguishable from reality."}, {"front": "Who proposed the Experience Machine and in what work?", "back": "Robert Nozick introduced this thought experiment in his 1974 book, Anarchy, State, and Utopia."}, {"front": "What philosophical view does the Experience Machine primarily challenge?", "back": "It primarily challenges hedonism, the philosophical view that pleasure (or positive subjective experience) is the only thing that is intrinsically good."}, {"front": "What is hedonism?", "back": "Hedonism is the philosophical view that pleasure (or positive subjective experience) is the only thing that is intrinsically good or valuable in itself."}, {"front": "Describe the core premise of the Experience Machine.", "back": "A machine exists that can give you any experience you desire, perfectly simulating reality so you would not know you are plugged in. Your life inside would feel exactly as rich, meaningful, and real as any life lived outside."}, {"front": "What is the central question Nozick poses to individuals regarding the Experience Machine?", "back": "The central question is: 'Would you plug in?'"}, {"front": "According to Nozick, what is the first reason people typically refuse the Experience Machine?", "back": "People want to actually do things, not merely experience doing them. They value genuine accomplishment, not just the feeling of it."}, {"front": "According to Nozick, what is the second reason people typically refuse the Experience Machine?", "back": "People want to be a certain kind of person (e.g., courageous, creative), not just experience being one while actually being a passive blob in a tank."}, {"front": "According to Nozick, what is the third reason people typically refuse the Experience Machine?", "back": "People want contact with a deeper reality. They care about living in the real world and having experiences caused by actual events and people, not an elaborate illusion."}, {"front": "Explain the difference between 'doing things' and 'experiencing doing them' in Nozick's argument.", "back": "Doing things implies actual engagement, effort, and real-world impact, leading to genuine accomplishment. Experiencing doing them is a subjective simulation of these feelings without the actual external reality or effort."}, {"front": "What does Nozick imply about 'being a certain kind of person' in relation to the Experience Machine?", "back": "Nozick implies that true character (e.g., courage, kindness) involves actual actions and choices in the real world, not just the subjective experience of these traits while being physically inactive and disconnected."}, {"front": "What does the common refusal to plug into the Experience Machine suggest about human values beyond subjective experience?", "back": "It suggests that humans also value truth, authenticity, genuine relationships, and real accomplishment, not solely how things feel from the inside."}, {"front": "How does the Experience Machine's argument impact moral theories about the 'good life'?", "back": "It implies that any moral theory of the good life that focuses exclusively on pleasant mental states or subjective experience is incomplete, as other values like authenticity and reality also matter."}, {"front": "What is one argument for *plugging in* to the Experience Machine based on the nature of experience?", "back": "If the experience is truly indistinguishable from reality, then from the subject's perspective, there is no practical difference, and 'reality' is merely a label for one set of experiences."}, {"front": "What is another argument for plugging in, related to the nature of 'real' accomplishment?", "back": "Much of what we call 'real' accomplishment is itself subjectively experienced as a sequence of mental states, similar to how it would be experienced inside the machine."}, {"front": "What is a psychological explanation offered for why people might *refuse* the machine, despite its potential benefits?", "back": "The refusal might reflect a bias toward the familiar ('reality' as we know it) rather than a genuine philosophical insight or a well-reasoned preference."}, {"front": "Do the counterarguments for plugging in necessarily defeat Nozick's main point?", "back": "No, the text states they do not necessarily defeat Nozick's argument, but they do show that the intuition against the machine is not universal or self-evident."}, {"front": "Regardless of the decision to plug in or not, what is the ultimate goal or effect of the Experience Machine thought experiment?", "back": "The thought experiment forces individuals to articulate what they truly value and why, clarifying their understanding of the good life."}, {"front": "How does the 'Brain in a Vat' thought experiment relate to the Experience Machine?", "back": "The 'Brain in a Vat' is the epistemological version, asking how one would *know* if they were in the machine, while the Experience Machine focuses on what we *value* even if we couldn't tell the difference."}, {"front": "How does the 'Ring of Gyges' relate to the themes explored by the Experience Machine?", "back": "The Ring of Gyges (about invisibility and absence of consequences) raises a related question: Does the absence of consequences change the nature of the action or our motivation, similar to how the machine removes external consequences."}, {"front": "What is the analogy between Plato's Allegory of the Cave and the Experience Machine?", "back": "Both involve the idea that what is perceived as reality might be an illusion. The shadows in the Cave are mistaken for reality, just as the machine's simulations could be mistaken for the real world."}, {"front": "If the experience inside the machine is truly indistinguishable from reality, what exactly is lost by plugging in?", "back": "What's lost, according to Nozick, is the actual engagement with the external world, genuine agency, authentic connections, and the unsimulated causes of one's experiences, emphasizing a value for reality beyond subjective feeling."}, {"front": "If you learned you had been in an experience machine your entire life, would anything change about how you value your memories?", "back": "This forces reflection on whether the value of memories depends on their 'real-world' origin and genuine events, or if the subjective experience and personal meaning are sufficient, even if simulated."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
