<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What historical figure is famously associated with the \"eureka moment\"?", "back": "Archimedes of Syracuse (c. 287–c. 212 BC).", "id": "fc01"}, {"front": "What is the origin of the phrase \"thinking outside the box\"?", "back": "It derives from a 1970s management puzzle involving nine dots and four lines.", "id": "fc02"}, {"front": "According to popular stories, how do great ideas or \"eureka moments\" often appear?", "back": "As sudden, effortless, and magical insights that arrive \"as bolts from the blue.\"", "id": "fc03"}, {"front": "Why are popular \"eureka\" stories, despite being appealing, considered misleading in a crucial sense?", "back": "They suggest ideas arrive magically and effortlessly, omitting the long period of conscious effort that almost always precedes true insight.", "id": "fc04"}, {"front": "Is the \"eureka moment\" a scientifically recognized phenomenon?", "back": "Yes, psychologists confirm it exists as a distinct cognitive phenomenon with identifiable neural signatures.", "id": "fc05"}, {"front": "What critical element does scientific research reveal is almost always present *before* a \"eureka moment\"?", "back": "A long period of conscious effort and struggle with the specific problem.", "id": "fc06"}, {"front": "Who was the mathematician who first described the pattern of insight as preparation, incubation, and illumination?", "back": "Henri Poincaré.", "id": "fc07"}, {"front": "Who formalized the four stages of creative thought in his 1926 book *The Art of Thought*?", "back": "Psychologist Graham Wallas.", "id": "fc08"}, {"front": "List the four stages of creative insight formalized by Graham Wallas.", "back": "Preparation, Incubation, Illumination, and Verification.", "id": "fc09"}, {"front": "Describe the \"Preparation\" stage of creative insight.", "back": "Conscious, deliberate engagement with the problem, involving hard work like reading, experimenting, calculating, and discussing.", "id": "fc10"}, {"front": "Describe the \"Incubation\" stage of creative insight.", "back": "The period where the problem is set aside, allowing the unconscious mind to continue processing it during activities like sleep, walks, or baths.", "id": "fc11"}, {"front": "Describe the \"Illumination\" stage of creative insight.", "back": "The \"aha\" moment when the solution suddenly appears, often accompanied by a feeling of certainty.", "id": "fc12"}, {"front": "Describe the \"Verification\" stage of creative insight.", "back": "The process of testing the insight against reality, as many initial \"eureka moments\" turn out to be incorrect upon examination.", "id": "fc13"}, {"front": "What is the critical implication regarding the relationship between the \"Preparation\" and \"Illumination\" stages?", "back": "Illumination cannot occur without preparation; it is the reward for sustained engagement with a hard problem, not a shortcut.", "id": "fc14"}, {"front": "What is the core challenge of the nine-dot puzzle, which inspired \"thinking outside the box\"?", "back": "To connect nine dots arranged in a three-by-three grid using only four straight lines, without lifting your pen.", "id": "fc15"}, {"front": "What unstated assumption do most people make when attempting the nine-dot puzzle that prevents them from solving it?", "back": "That the lines must stay within the square formed by the dots (the \"box\").", "id": "fc16"}, {"front": "What is the true, specific lesson taught by the nine-dot puzzle about creative problem-solving?", "back": "We often impose constraints that the problem does not require; the creative act is noticing and questioning these assumed constraints.", "id": "fc17"}, {"front": "Why is the instruction \"be creative\" or \"think outside the box\" often unhelpful advice?", "back": "It describes a desired outcome without providing a method or actionable steps, making it seem like a switch to flip or a personality trait.", "id": "fc18"}, {"front": "According to cognitive research, what is the actual relationship between creative insight and constraints?", "back": "Creative insight is a product of deep engagement with constraints, not a breezy disregard for them.", "id": "fc19"}, {"front": "How do highly creative individuals, like expert jazz musicians or novelists, typically interact with rules and conventions in their field?", "back": "They master the rules so thoroughly that they can distinguish genuine constraints from assumed ones, and then selectively violate only the assumed ones to good effect.", "id": "fc20"}, {"front": "Provide a real-world scientific example illustrating that \"Insight Follows Preparation.\"", "back": "Einstein's theory of special relativity emerged from years of intensive thought about light and motion, with the key \"insight\" preceded by a decade of preparation.", "id": "fc21"}, {"front": "How does the development of the iPhone exemplify practical \"thinking outside the box\"?", "back": "Apple's team deeply understood existing mobile computing constraints and recognized that many assumed constraints (like physical keyboards or styluses) were not truly necessary.", "id": "fc22"}, {"front": "In everyday problem-solving, how does the \"incubation period\" become effective?", "back": "The incubation period works by allowing the unconscious mind to process a problem, but *only if* a sufficient period of conscious preparation came first.", "id": "fc23"}, {"front": "Instead of simply telling someone to \"think outside the box,\" what more productive questions can be asked?", "back": "\"Which box? What are its walls made of? Which walls are real and which are assumed?\"", "id": "fc24"}, {"front": "What two related concepts mentioned in the text are connected to questioning assumed constraints?", "back": "The Gordian Knot (rejecting assumed constraints) and First Principles Thinking (systematic constraint-questioning).", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
