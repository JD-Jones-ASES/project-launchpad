    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 19, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Streetlight Effect when examined as an *organizational* or *institutional* phenomenon?", "back": "It is the systematic tendency of institutions to measure, study, and manage whatever is easiest to quantify, regardless of whether it is what matters most."}, {"front": "How does the institutional Streetlight Effect differ from the individual cognitive bias version?", "back": "The institutional version is worse because institutions have budgets, mandates, and the power to reshape entire fields around their measurement choices, unlike individuals."}, {"front": "What is the core issue when an organization needs to demonstrate results, according to the Streetlight Effect?", "back": "It gravitates toward outcomes that are easy to count, substituting measurable proxies for meaningful, but harder-to-quantify, outcomes."}, {"front": "A development agency measures the 'number of wells drilled.' What more meaningful outcome might this proxy obscure due to the Streetlight Effect?", "back": "The number of communities with reliable clean water, which is harder to measure but represents the actual impact."}, {"front": "A school district reports 'graduation rates.' What crucial aspect of genuine learning might be overlooked by this metric?", "back": "Whether graduates can actually read at grade level or possess genuine learning, which is harder to quantify than a diploma."}, {"front": "A tech company tracks 'daily active users.' What more meaningful outcome might they be failing to measure effectively?", "back": "Whether those users are actually getting value from the product, which is a more complex measure than simple clicks or activity."}, {"front": "Describe the 'self-reinforcing quality' of the institutional Streetlight Effect once a particular metric is adopted.", "back": "Careers are built around it, departments are organized to improve it, reports highlight it, and questioning the metric becomes politically dangerous as it threatens those whose success depends on it."}, {"front": "How does the Streetlight Effect manifest in academic research?", "back": "Studies that produce clean, quantifiable results get published more easily, causing entire fields to drift toward studying whatever yields clean numbers, even if the most important questions resist quantification."}, {"front": "What type of research tends to be favored and published more easily in academia due to the Streetlight Effect?", "back": "Studies that show a statistically significant effect size in a controlled experiment, rather than nuanced, qualitative accounts of complex systems."}, {"front": "How does the Streetlight Effect influence measurement practices in medicine?", "back": "It leads to a bias toward measuring biomarkers (e.g., blood pressure, cholesterol, tumor sizes) rather than patient outcomes that truly matter, like quality of life, functional capacity, or years of healthy living."}, {"front": "Why is the institutional Streetlight Effect described as 'insidious'?", "back": "Because it looks like rigor; an organization producing detailed metrics and reports appears data-driven and accountable, even if the metrics are precise about the wrong thing."}, {"front": "What does the text mean by stating, 'Precision about the wrong thing is not rigor. It is a more sophisticated form of ignorance'?", "back": "It means that producing highly accurate measurements for metrics that do not actually reflect what is most important can give a false sense of control and understanding, masking a fundamental lack of insight."}, {"front": "Define 'Institutional Measurement Bias' as presented in the text.", "back": "It is the structural tendency of organizations to systematically measure what is easy to quantify rather than what is most important, with institutional incentives and career paths organizing around adopted metrics, making them difficult to question."}, {"front": "Why is Institutional Measurement Bias described as 'structural' rather than 'mere laziness'?", "back": "Because once a metric is adopted, institutional incentives, career paths, and reporting structures organize around it, making it deeply embedded and difficult to change, even when it fails to capture reality."}, {"front": "Explain how the U.S. military's use of 'body counts' during the Vietnam War exemplifies the Streetlight Effect.", "back": "Body counts were easy to quantify and report, becoming the de facto measure of progress. This led to inflated numbers and misclassifications, while crucial unquantifiable factors like popular support and political legitimacy were ignored."}, {"front": "What crucial factors in the Vietnam War were largely ignored due to the focus on quantifiable body counts?", "back": "Popular support, political legitimacy, and logistical sustainability — the actual determinants of whether the war was being won — which resisted easy quantification."}, {"front": "Which individual cognitive bias is the institutional Streetlight Effect a phenomenon built upon?", "back": "The individual Streetlight Effect, where one looks for something where the light is, not necessarily where it was lost."}, {"front": "What other related concepts are mentioned in the text that describe what happens when institutional measures become targets?", "back": "Goodhart's Law and Campbell's Law."}, {"front": "Consider an organization you know. What's a metric it focuses on, and what's a more important, but unmeasured, outcome that might matter more?", "back": " (Answer will vary, but should follow the pattern of the examples provided in the text, e.g., 'A university measures research grants obtained, but not necessarily the real-world impact or quality of that research.')"}, {"front": "According to the text, why do 'unmeasured things' in an organization often remain unmeasured?", "back": "Often it's not because they are genuinely unmeasurable, but because measuring them would be inconvenient, challenging, or threaten existing structures and careers."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
