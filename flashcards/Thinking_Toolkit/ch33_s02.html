<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 33, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental difference between a 'tool' and an 'ideology'?", "back": "A tool is something you choose to use and put down when finished; an ideology 'picks you up,' applies itself universally, and reshapes your perception.", "id": "fc01"}, {"front": "How should the models presented in this book be regarded?", "back": "As tools or lenses to view situations more clearly, not as a worldview or a philosophy of life.", "id": "fc02"}, {"front": "What is the most important thing to do when using any 'lens' or model?", "back": "Remember to 'take it down from your eye and check what the world looks like without it,' to avoid its becoming an ideology.", "id": "fc03"}, {"front": "Define intellectual humility.", "back": "Holding your convictions firmly enough to act on them while remaining genuinely open to the possibility that you are wrong, and being willing to honestly admit mistakes based on evidence.", "id": "fc04"}, {"front": "What is intellectual humility NOT?", "back": "It is not intellectual timidity, refusing to hold strong opinions, declining to argue, or treating every idea as equally valid.", "id": "fc05"}, {"front": "How does the Dunning-Kruger Effect relate to intellectual humility?", "back": "It shows that people most confident in their judgments are often the least qualified, serving as a call for humility in self-assessment.", "id": "fc06"}, {"front": "What is Confirmation Bias, and why does it imply a need for humility?", "back": "It's the natural tendency to seek out evidence that supports what we already believe, demonstrating a systematic blind spot that humility helps address.", "id": "fc07"}, {"front": "Explain the 'curse of knowledge' and its relevance to intellectual humility.", "back": "Experts routinely overestimate how much others understand, highlighting a systematic human blind spot that calls for humility when communicating or teaching.", "id": "fc08"}, {"front": "What is Hindsight Bias, and how does it encourage humility?", "back": "It's the tendency to reconstruct the past to make our current beliefs seem inevitable, revealing how our perception can distort reality and requiring humility to recognize.", "id": "fc09"}, {"front": "What is the collective message of biases like Dunning-Kruger, Confirmation Bias, Curse of Knowledge, and Hindsight Bias?", "back": "They tell us we are human and have systematic blind spots that no amount of intelligence can fully eliminate, thus emphasizing the necessity of humility.", "id": "fc10"}, {"front": "What is the principle of Chesterton's Fence?", "back": "Before you tear down a fence, you should understand why it was built. Do not remove or dismiss something without first understanding its original purpose or the problem it solved.", "id": "fc11"}, {"front": "How does Chesterton's Fence apply to the models discussed in the book?", "back": "Before dismissing any model, one should understand the specific problem it was built to solve or the prevailing wisdom it was designed to challenge.", "id": "fc12"}, {"front": "What systematic errors did Kahneman and Tversky's work highlight?", "back": "They uncovered systematic errors in human judgment that rational-agent economics had ignored.", "id": "fc13"}, {"front": "What aspect of scientific change did Kuhn emphasize that was often overlooked?", "back": "He saw the revolutionary structure of scientific change that the cumulative view of progress had obscured.", "id": "fc14"}, {"front": "What crucial concept did Popper introduce regarding scientific theories?", "back": "He stressed the importance of falsifiability, which had previously been concealed by confirmatory thinking.", "id": "fc15"}, {"front": "Are the models presented in the book considered complete and infallible?", "back": "No, they are recognized as incomplete and partial, each capturing only a piece of the truth while leaving something out.", "id": "fc16"}, {"front": "How has Kahneman and Tversky's work been acknowledged as incomplete?", "back": "Their work has been refined and sometimes challenged by subsequent research, indicating its partial nature.", "id": "fc17"}, {"front": "What criticism has been directed at Kuhn's framework for scientific change?", "back": "It has been criticized for being too discontinuous, suggesting that scientific progress can sometimes be more gradual than he proposed.", "id": "fc18"}, {"front": "What is a practical limitation noted about Popper's falsifiability criterion?", "back": "It has been shown to be less clear-cut in practice than it is in theory.", "id": "fc19"}, {"front": "What is considered the book's central argument regarding its models?", "back": "The central argument is recognizing that every model is incomplete and captures only a piece of the truth, rather than being a perfect or all-encompassing explanation.", "id": "fc20"}, {"front": "According to the 'Tools, Not Ideologies' concept, how should intellectual humility guide our use of models?", "back": "It means treating every model as a valuable tool within its specific domain, acknowledging its limitations outside that domain, and remaining open to its revision in light of new evidence.", "id": "fc21"}, {"front": "What is the ultimate goal in the pursuit of intellectual humility and critical thinking?", "back": "The goal is not certainty, but rather the honest, ongoing effort to think more clearly.", "id": "fc22"}, {"front": "What does it mean for an ideology to 'reshape your perception'?", "back": "It means the ideology becomes so ingrained that you cannot see the world without it, as it universally applies itself to everything you perceive.", "id": "fc23"}, {"front": "Can an individual with intellectual humility still hold strong convictions?", "back": "Yes, intellectual humility means holding convictions firmly enough to act on them, while simultaneously being genuinely open to the possibility of being wrong.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
