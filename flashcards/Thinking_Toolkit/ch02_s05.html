<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a 'slippery slope' argument in informal logic?", "back": "A reasoning pattern that claims a small first step will inevitably lead, through a chain of consequences, to a dramatic and usually undesirable endpoint."}, {"front": "Why is 'slippery slope' considered unusual among reasoning patterns?", "back": "It is both a valid argument form and a named logical fallacy, depending on whether a causal mechanism is specified."}, {"front": "What is the fundamental claim of a slippery slope argument?", "back": "That 'If we allow A, then B will follow, and then C, and before you know it, we will be at Z,' meaning a small first step leads to an extreme conclusion."}, {"front": "What is the crucial question to ask when evaluating a slippery slope argument?", "back": "Is the slope actually slippery? Does a specific causal mechanism link each step to the next?"}, {"front": "What is the key indicator that a 'slippery slope' is a valid argument?", "back": "The presence of a specific, well-understood causal mechanism that links each step in the chain of consequences to the next, not just an assertion."}, {"front": "Describe how drug tolerance exemplifies a real slippery slope.", "back": "Developing tolerance to opioids leads to increased doses, which creates dependency, leading to withdrawal symptoms and pressure to continue use. Each step has a clear physiological mechanism."}, {"front": "How does regulatory precedent demonstrate a genuine slippery slope?", "back": "Once a government establishes authority for an action in one context, it becomes easier to invoke that authority in similar or slightly less similar contexts. Each precedent lowers the barrier for the next."}, {"front": "Explain technological lock-in as an example of a real slippery slope.", "back": "Adopting a specific technology creates infrastructure, training, and institutional habits that make it increasingly difficult and costly to switch to an alternative over time."}, {"front": "How should a legitimate slippery slope argument articulate its causal chain?", "back": "It should explain: 'A will cause B because of mechanism M, B will cause C because of mechanism N, and so on,' rather than just 'A will somehow lead to Z.'"}, {"front": "When does a slippery slope argument become a logical fallacy?", "back": "It becomes a fallacy when the chain of consequences is asserted without any specific causal mechanism explaining how one step leads to the next."}, {"front": "Provide an example of a fallacious slippery slope argument from the text.", "back": "'If we allow students to use calculators on exams, next they will stop learning math entirely, and eventually no one will be able to add.' This lacks a specified mechanism."}, {"front": "What is one rhetorical trick used in a fallacious slippery slope, involving intermediate steps?", "back": "Vagueness about intermediate steps, where the arguer asserts 'A will lead to Z' and expects the listener to fill in a plausible chain without specific explanations."}, {"front": "Explain the rhetorical trick of 'equivocation' in the context of a slippery slope fallacy.", "back": "The arguer describes the first step in mild terms and the last step in extreme terms, subtly redefining terms in each step to obscure the logical gap between them."}, {"front": "What is the diagnostic question to determine if a slippery slope argument is valid or fallacious?", "back": "Can you identify the specific mechanism by which each step leads to the next?"}, {"front": "If the answer to the diagnostic question ('Can you identify the specific mechanism?') is 'yes,' what does it imply about the argument?", "back": "The argument deserves serious consideration, as the slope may indeed be genuinely slippery due to a plausible causal story at each link."}, {"front": "If the answer to the diagnostic question ('Can you identify the specific mechanism?') is 'no,' what does it imply?", "back": "You are likely looking at a slippery slope fallacy, as the argument jumps from A to Z with only 'hand-waving' or general assertions in between."}, {"front": "Briefly distinguish between a legitimate and a fallacious slippery slope argument.", "back": "A legitimate slippery slope identifies specific causal mechanisms linking each step. A fallacious one asserts the chain of consequences without explaining how each step causes the next."}, {"front": "Why should one be cautious about dismissing an argument simply by labeling it a 'slippery slope'?", "back": "This dismissal is only valid if the argument lacks a causal mechanism. Some slopes are real, and reflexively dismissing them without evaluation is an error, as the label is a tool for analysis, not a trump card."}, {"front": "You hear an argument: 'If we allow children to stay up 15 minutes past their bedtime, soon they'll be running wild, never sleeping, and failing school.' How would you evaluate this as a slippery slope?", "back": "This is likely a fallacious slippery slope. There's no clear, specific causal mechanism explaining how an extra 15 minutes of bedtime leads to never sleeping or failing school. It relies on vague assertions and an extreme leap."}, {"front": "What does it mean for a causal mechanism to 'link each step to the next' in a valid slippery slope argument?", "back": "It means there is a specific, understandable reason or process (e.g., physiological, legal, behavioral) that makes the subsequent step in the chain more probable or inevitable once the preceding step occurs."}, {"front": "How does the 'Sorites Paradox' relate to the slippery slope concept?", "back": "The Sorites Paradox (or paradox of the heap) is a philosophical cousin, dealing with gradual changes along a continuum that make it hard to define categories (e.g., when does 'one grain of sand' become a 'heap'), similar to how a slippery slope involves a series of small, hard-to-distinguish steps."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
