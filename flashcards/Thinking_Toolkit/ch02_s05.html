<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In organizational psychology, what do the 'Mountain to Climb' and 'Maze with No Exit' metaphors diagnose?", "back": "They diagnose whether a problem is effort-responsive (mountain) or structure-constrained (maze)."}, {"front": "Describe the key characteristics of a 'mountain' type of problem.", "back": "A mountain is hard, demands effort, endurance, skill, and courage, and rewards these qualities. Sustained effort leads to progress."}, {"front": "Provide examples of situations typically considered 'mountain' problems.", "back": "Learning a musical instrument, training for a marathon, or building expertise in a craft or profession."}, {"front": "Describe the key characteristics of a 'maze' type of problem.", "back": "A maze is a structural problem where effort alone does not help. Running faster only leads to dead ends sooner. It requires a different strategy or a different maze."}, {"front": "Why is distinguishing between a 'mountain' and a 'maze' problem critically important?", "back": "The advice that works for a mountain is actively harmful in a maze, and vice versa."}, {"front": "What is the primary danger of applying 'mountain advice' (e.g., 'work harder') to a 'maze' problem?", "back": "It leads to exhaustion, frustration, and self-blame by encouraging effort where effort is not the solution, potentially trapping individuals in cycles of failure and blaming the victim."}, {"front": "Give an example where 'mountain advice' like 'just try harder' is ineffective or cruel in a 'maze' situation.", "back": "Telling someone stuck in a bureaucratic Catch-22 or whose career is stalled by a structural bottleneck (e.g., shrinking industry, promotion based on insiders only) to 'just try harder.'"}, {"front": "What is the danger of applying 'maze advice' (e.g., 'change strategy') to a 'mountain' problem?", "back": "Treating a mountain as a maze leads to giving up too early, switching strategies, or abandoning the goal when persistence was actually required."}, {"front": "According to the text, what is one of the most important and difficult acts of self-diagnosis regarding problem types?", "back": "Distinguishing between genuinely being mismatched with a subject (maze) and finding a subject difficult (mountain), especially when it leads to switching majors or paths too often."}, {"front": "What is the first diagnostic question to ask to determine if a situation is a mountain or a maze?", "back": "'Do other people succeed in this situation using the approach I am using?' (Yes = Mountain; No = Maze)."}, {"front": "What is the second diagnostic question related to assessing progress?", "back": "'Am I making any progress at all?' (Detectable = Mountain; Oscillating/finding yourself back where you started = Maze)."}, {"front": "What is the third diagnostic question related to strategy changes?", "back": "'Would a change in strategy help, or would it just move me to a different dead end?' (Specific strategic change unlocks progress = Maze; Obstacle is simply difficulty = Mountain)."}, {"front": "What is the fourth diagnostic question related to the system's design?", "back": "'Is the system designed to produce the outcome I want?' (If not, it's likely a maze, requiring structural awareness)."}, {"front": "What is the 'critical diagnostic' when facing a problem, according to the 'keyconcept' summary?", "back": "Determining whether the problem is a mountain (effort-responsive) or a maze (structure-constrained) because the advice for one is actively harmful for the other."}, {"front": "What specific action is recommended if you identify a problem as a 'mountain'?", "back": "Persist (keep climbing, apply sustained effort and skill)."}, {"front": "What specific action is recommended if you identify a problem as a 'maze'?", "back": "Change the structure of the problem, or find a different maze."}, {"front": "How can the Mountain vs. Maze framework be applied to a career plateau situation?", "back": "An employee must diagnose if they need to develop specific skills or visibility (mountain) or if the organization promotes based on unchangeable criteria like tenure, pedigree, or internal politics (maze)."}, {"front": "How does the Mountain vs. Maze framework apply to a team consistently missing deadlines?", "back": "The team needs to determine if they simply need to work harder (mountain) or if they are trapped by structural issues like too many approval layers or insufficient authority (maze)."}, {"front": "Provide an example of a 'maze' problem related to systemic barriers.", "back": "A first-generation college student navigating the admissions process without guidance. The system assumes knowledge and resources they lack, making it a structural barrier, not an effort or intelligence barrier."}, {"front": "Which other concept from the textbook is identified as a specific type of structural maze?", "back": "The Catch-22."}, {"front": "What broader framework is relevant to understanding structural constraints in the Mountain vs. Maze model?", "back": "Systems Thinking."}, {"front": "How can 'Inversion' (asking 'What would guarantee failure?') help identify if a problem is structural (a maze)?", "back": "By considering what would guarantee failure, one can pinpoint structural elements that inherently prevent success, thereby identifying a maze."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
