<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 14, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Describe the basic setup of the Ultimatum Game.", "back": "Two players are given money (e.g., $10) to split. Player One (proposer) decides the division. Player Two (responder) can either accept (both keep shares) or reject (both get nothing)."}, {"front": "Who conducted the original experimental analysis of ultimatum bargaining in 1982?", "back": "Werner G\"uth, Rolf Schmittberger, and Bernd Schwarze."}, {"front": "According to traditional economic theory, what is the rational prediction for outcomes in the Ultimatum Game?", "back": "The proposer offers the smallest possible amount (e.g., $1), and the responder accepts it because any positive amount is better than nothing."}, {"front": "What do proposers typically offer in real-world Ultimatum Game experiments?", "back": "Proposers typically offer between 40% and 50% of the total, close to an even split."}, {"front": "How do responders typically react to low offers (e.g., below 30% or 20%) in the Ultimatum Game?", "back": "Offers below 30% are rejected roughly half the time. Offers below 20% are rejected the vast majority of the time."}, {"front": "What is the most striking observation about human behavior in the Ultimatum Game, contrary to economic predictions?", "back": "Players routinely reject money, walking away from free cash, to punish what they perceive as an unfair offer."}, {"front": "Identify one key reason why responders reject low offers in the Ultimatum Game.", "back": "Fairness norms: Humans have an innate sense of fair division and are willing to pay a cost (lose money) to enforce this norm."}, {"front": "How does negative reciprocity explain rejections in the Ultimatum Game?", "back": "Rejecting a low offer is a form of punishment. The desire to punish perceived injustice is powerful enough to override self-interest, even though the responder also hurts themselves."}, {"front": "Explain the 'reputation and signaling' hypothesis for why responders reject unfair offers.", "back": "Rejecting unfair offers signals that one cannot be exploited, which may protect one in the long run. Even in one-shot games, people may act as if their reputation is at stake."}, {"front": "What role do emotions play in the rejection of unfair offers in the Ultimatum Game?", "back": "Brain imaging shows unfair offers activate the anterior insula (associated with disgust/negative emotion), suggesting rejections are partly an emotional, visceral response to injustice."}, {"front": "What general conclusion about human decision-making does the Ultimatum Game support, beyond material self-interest?", "back": "Human decision-making is not driven solely by material self-interest; fairness, reciprocity, and emotion also play significant roles."}, {"front": "Does the Ultimatum Game yield consistent results across different cultures?", "back": "While the basic pattern (generous offers, rejection of low ones) appears across cultures, there is meaningful variation in the degree of generosity and rejection rates."}, {"front": "What did Joseph Henrich and collaborators find about cross-cultural variation in the Ultimatum Game?", "back": "They found that the degree of market integration in a society predicted how generous offers were, with more market exchange leading to higher offers."}, {"front": "What does cross-cultural variation in the Ultimatum Game suggest about fairness norms?", "back": "Fairness norms are not purely innate; they are shaped by culture, institutions, and the economic structures in which people live."}, {"front": "How might market integration cultivate habits of fair dealing, despite markets often being seen as arenas of selfish competition?", "back": "In markets, the need for repeat customers encourages fair dealing, as long-term relationships benefit from perceived fairness."}, {"front": "What does the Ultimatum Game teach about the concept of 'Homo economicus'?", "back": "'Homo economicus' (the perfectly rational, purely self-interested agent) is an idealization; real people's decisions are influenced by fairness, reciprocity, and emotion."}, {"front": "Explain 'altruistic punishment' in the context of the Ultimatum Game.", "back": "People are willing to bear personal costs (altruistically) to punish unfairness. This is 'irrational' in a narrow sense but essential for maintaining cooperative social norms."}, {"front": "How does the anticipation of fairness influence proposers' behavior in the Ultimatum Game?", "back": "Proposers offer fair splits not out of pure generosity, but because they anticipate that unfair offers will be rejected, demonstrating that even selfish agents behave fairly when punishable."}, {"front": "What is the core lesson regarding 'Fairness Overrides Rationality' from the Ultimatum Game?", "back": "Human economic behavior is governed by deep-seated norms of fairness and a willingness to enforce them at personal cost, overriding pure self-interest, even if 'irrational.'"}, {"front": "How do the insights from the Ultimatum Game apply to real-world negotiations, such as job offers or supplier relationships?", "back": "Employers offering insultingly low salaries may face rejection, and companies imposing unfair terms on suppliers may lose them, even if switching is costly for the other party."}, {"front": "What is the main lesson for negotiation strategy derived from the Ultimatum Game?", "back": "People care about the process and perceived fairness of an offer, not just its absolute value. An offer that leaves the other party feeling disrespected is often worse than no offer at all."}, {"front": "Which psychological concept helps explain why the 'sting of an unfair offer may be disproportionate to the amount at stake' in the Ultimatum Game?", "back": "Loss Aversion."}, {"front": "How does the Ultimatum Game relate to the Prisoner's Dilemma?", "back": "Both games highlight the tension between individual rationality (self-interest) and collective outcomes, as well as the enforcement of cooperative norms."}, {"front": "How does the Ultimatum Game illustrate Munger's insight that 'behavior follows incentive structures'?", "back": "Even if self-interested, proposers are incentivized to offer fair splits because responders create an incentive structure where unfair offers are punished by rejection."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
