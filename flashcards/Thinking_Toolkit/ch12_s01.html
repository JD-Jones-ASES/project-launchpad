<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 12, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who authored 'A Theory of Justice,' a foundational work in 20th-century political philosophy?", "back": "John Rawls."}, {"front": "What is the central question explored by John Rawls's most famous thought experiment?", "back": "How would you design a just society if you did not know who you would be in it?"}, {"front": "Define Rawls's 'Veil of Ignorance.'", "back": "A hypothetical condition in which rational people designing a society do not know their own race, sex, intelligence, wealth, religion, or social position."}, {"front": "What is the primary purpose of the Veil of Ignorance in Rawls's theory?", "back": "To ensure impartiality by preventing individuals from rigging societal rules in their own favor."}, {"front": "According to Rawls, what are the two principles of justice that rational people behind the Veil of Ignorance would converge upon?", "back": "1) Equal basic liberties for all, and 2) Social and economic inequalities must benefit the least advantaged (the difference principle)."}, {"front": "Explain Rawls's First Principle of Justice.", "back": "Each person should have equal basic liberties, such as freedom of speech, religion, assembly, and the right to vote."}, {"front": "What is the 'difference principle' in Rawls's theory of justice?", "back": "The principle that social and economic inequalities are acceptable only if they make the worst-off group better off than they would be under strict equality."}, {"front": "What core human behavior does Rawls's reasoning for the difference principle rely on?", "back": "Risk aversion; people would want to insure against the worst possible outcome."}, {"front": "Define the maximin strategy.", "back": "A decision strategy used under uncertainty to maximize the minimum possible outcome, often by choosing the option where the worst possible result is still as good as possible."}, {"front": "In Rawls's example, if behind the veil you must choose between Society A (bottom 10% earn $5,000) and Society B (bottom 10% earn $30,000), which would a rational person choose, and why?", "back": "A rational person would choose Society B, because the worst position in B ($30,000) is significantly better than the worst position in A ($5,000), aligning with the maximin strategy."}, {"front": "How does Rawls's approach to social justice differ from a pure utilitarian perspective in the Society A/B example?", "back": "A pure utilitarian might prefer Society A if it has higher total wealth. Rawls, using the maximin strategy, would prefer Society B because its worst-off position is better, prioritizing the least advantaged."}, {"front": "Who criticized Rawls's theory for focusing too much on the distribution of goods rather than their acquisition?", "back": "Robert Nozick in 'Anarchy, State, and Utopia' (1974)."}, {"front": "What was Nozick's main argument against Rawls's redistributive principles?", "back": "Redistributing wealth, even to benefit the worst-off, might violate individuals' rights if that wealth was acquired through voluntary exchange and honest labor."}, {"front": "What is one major objection to Rawls's reliance on the maximin strategy?", "back": "It assumes extreme risk aversion, whereas some rational people might prefer a riskier society with higher potential rewards ('gambler's choice')."}, {"front": "How do critics question the ability to make meaningful choices behind the Veil of Ignorance regarding 'knowledge and motivation'?", "back": "They argue that stripping away so much personal information might make it impossible to determine what truly constitutes a 'basic liberty' or how to weigh competing values like freedom of speech vs. economic security."}, {"front": "What is the 'cultural blindness' objection raised against Rawls's framework?", "back": "Critics argue that Rawls's framework assumes a Western, liberal set of values, questioning whether people from all cultures would converge on the same principles behind a truly neutral veil."}, {"front": "Despite objections, what is the enduring value of Rawls's Veil of Ignorance as a thought experiment?", "back": "It forces a valuable discipline: to consider whether one would accept any social arrangement if they did not know their own position within it, thereby promoting impartiality."}, {"front": "Explain the concept of 'Justice as Fairness' as it relates to Rawls's Veil of Ignorance.", "back": "Justice as Fairness posits that a just society is one whose rules you would accept without knowing your place in it, achieved by stripping away self-interest through the Veil of Ignorance and designing institutions no one could reasonably reject."}, {"front": "What does your hypothetical choice of society behind the Veil of Ignorance (e.g., strict equality, meritocracy, strong safety net) reveal about your personal values?", "back": "It reveals your theory of justice and your tolerance for risk, specifically what you value most among freedom, security, and fairness."}, {"front": "What is the primary role of the 'veil of ignorance' in political philosophy?", "back": "To serve as a device for ensuring impartiality in the design of societal rules and institutions."}, {"front": "Why did Rawls argue that 'the stakes (your entire life) are too high for gambling' when choosing societal rules behind the veil?", "back": "To justify the maximin strategy and risk aversion, asserting that the potential negative consequences of a bad outcome are too severe to gamble on."}, {"front": "What does Rawls mean when he states that 'fairness is not about treating everyone identically'?", "back": "It means fairness is about designing institutions that are acceptable to everyone, regardless of their position, even if those institutions allow for some inequalities, provided those inequalities benefit the least advantaged."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
