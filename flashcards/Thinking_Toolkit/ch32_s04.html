    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 32, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the fundamental principle of 'Inversion' as a problem-solving technique?", "back": "Instead of asking how to achieve a desired outcome, inversion asks how to guarantee avoiding the outcome you want to prevent."}, {"front": "Who is credited with the advice, 'Invert, always invert'?", "back": "The mathematician Carl Gustav Jacob Jacobi, a principle later adopted by Charlie Munger."}, {"front": "How did Carl Jacobi originally apply the principle of inversion in mathematics?", "back": "He used it as a problem-solving technique, working backward from a solution when a problem was difficult to solve forward."}, {"front": "How did Charlie Munger generalize Jacobi's mathematical inversion principle?", "back": "He expanded it into a principle of practical reasoning for decision-making and life, focusing on avoiding failure to improve outcomes."}, {"front": "What is the typical approach most people take when solving problems, and how does inversion differ?", "back": "Most people ask, 'How do I achieve the outcome I want?' Inversion asks the opposite: 'How would I guarantee the outcome I want to avoid?'"}, {"front": "According to Munger's application of inversion, what behaviors would guarantee a miserable life?", "back": "Chronic dishonesty, resentment, substance abuse, envy, self-pity, and unreliability."}, {"front": "Applying inversion to business, what factors would guarantee failure?", "back": "Ignoring customers, mismanaging cash, hiring untrustworthy people, and refusing to adapt."}, {"front": "Why is inversion often considered a powerful problem-solving technique?", "back": "It is often easier to identify what leads to failure than what leads to success, as failure often has recurring, predictable patterns."}, {"front": "What is the nature of failure patterns compared to success patterns?", "back": "Success is complex and context-dependent, while failure often has recurring, predictable, and more universal patterns."}, {"front": "What is the primary benefit of cataloging and systematically eliminating the causes of failure?", "back": "While it may not guarantee success, it dramatically improves your odds of achieving a desired outcome."}, {"front": "How does inversion serve as a check on forward-looking plans or strategies?", "back": "After developing a strategy, one can invert it by asking, 'What could make this strategy fail?' to identify potential weaknesses."}, {"front": "What is the connection between inversion and a 'pre-mortem'?", "back": "Inversion, when used to check plans by identifying failure modes, is essentially a pre-mortem framed as 'how we fail'."}, {"front": "Why is a strategy tested by both forward reasoning ('how we succeed') and inverted reasoning ('how we fail') considered more robust?", "back": "It ensures that potential failure modes have been addressed, leading to a stronger plan than one tested only from a single direction."}, {"front": "How can inversion be applied to improve an everyday task like giving a presentation?", "back": "Instead of only asking, 'How do I make this presentation great?' also ask, 'What would make this presentation terrible?' and then fix those issues."}, {"front": "What is the key concept regarding success and failure that inversion exploits?", "back": "That the causes of failure are often more predictable and universal than the causes of success, making avoidance of failure a powerful strategy."}, {"front": "In personal finance, how would applying inversion help avoid financial ruin?", "back": "Ask, 'How do I guarantee financial ruin?' (e.g., spend more than you earn, take on high-interest debt, make concentrated bets, ignore insurance) and then avoid those behaviors."}, {"front": "According to relationship researchers, what predicts relationship success more reliably than the presence of positive behaviors?", "back": "The absence of negative behaviors (e.g., chronic contempt, dishonesty, neglect, keeping score)."}, {"front": "How do good engineers apply the principle of inversion in their design process?", "back": "Rather than only designing for optimal performance, they ask, 'How could this system fail?' leading to designs that handle extreme loads or have redundant systems."}, {"front": "What does the engineering application of inversion (e.g., designing bridges for far beyond expected loads) teach us about building robust systems?", "back": "It teaches us to design with potential failure in mind, building in margins of safety and redundancy to withstand unforeseen circumstances."}, {"front": "Does avoiding behaviors that guarantee failure automatically lead to wealth or success?", "back": "No, it creates a necessary foundation by preventing ruin, but doesn't guarantee wealth or success directly; it improves the odds."}, {"front": "Which related concepts are mentioned as connections to the idea of Inversion?", "back": "Pre-Mortem, First Principles Thinking, Margin of Safety, and Murphy's Law."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
