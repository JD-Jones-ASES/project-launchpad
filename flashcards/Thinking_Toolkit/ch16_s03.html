<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Gresham's Law?", "back": "Gresham's Law states that bad money drives out good; when two forms of money circulate at the same face value but differ in intrinsic value, the less valuable form dominates circulation."}, {"front": "After whom is Gresham's Law named?", "back": "Sir Thomas Gresham (c. 1519–1579), a financial adviser to the English Crown."}, {"front": "Who observed the principle of Gresham's Law centuries before Sir Thomas Gresham?", "back": "Nicolaus Copernicus (1526) and Nicole Oresme (14th century)."}, {"front": "In what historical context was Gresham's Law originally observed?", "back": "In 16th-century England, concerning gold and silver coins that had a face value but could be worn down, clipped, or shaved, altering their precious metal content."}, {"front": "According to Gresham's Law, if you have two coins of the same face value but one has less precious metal, which one would you spend?", "back": "You would spend the coin with less precious metal ('lighter coin') because it buys just as much in the marketplace, allowing you to hoard the more valuable 'heavier coin' for its intrinsic metal worth."}, {"front": "How does rational self-interest explain the operation of Gresham's Law in the context of coinage?", "back": "Rational self-interest drives individuals to spend the less valuable 'bad money' (clipped coins) that still holds its face value, and hoard the more valuable 'good money' (full-weight coins) for its intrinsic metal value."}, {"front": "What is the ultimate effect of Gresham's Law on the circulation of 'good' and 'bad' money?", "back": "The full-weight, 'good' coins are driven out of circulation, while the debased, 'bad' coins continue to flow and dominate the market."}, {"front": "Does Gresham's Law only apply to physical currency?", "back": "No, the principle extends far beyond coinage, operating wherever quality differences are hidden behind uniform pricing or uniform standards."}, {"front": "What is the key condition for Gresham's Law to operate in non-monetary contexts?", "back": "Quality differences must be hidden behind uniform pricing, uniform standards, or uniform labeling."}, {"front": "Which economist applied Gresham's Law to product quality in a famous paper?", "back": "George A. Akerlof, in his 1970 paper on 'lemons'."}, {"front": "What is the title of George Akerlof's famous 1970 paper that identified the mechanism of Gresham's Law applied to product quality?", "back": "\"The Market for `Lemons': Quality Uncertainty and the Market Mechanism.\""}, {"front": "Explain how Gresham's Law operates in a used car market (the 'lemons' problem).", "back": "Sellers of good cars are reluctant to sell below their value, while sellers of poor cars are eager to sell. Buyers, unable to distinguish quality, offer lower prices assuming the worst, driving good cars out and leaving the market dominated by poor cars."}, {"front": "How does Gresham's Law manifest in professional services?", "back": "When clients cannot distinguish quality, low-quality providers can undercut prices due to lower costs, driving higher-quality providers out of the market."}, {"front": "Provide an example of Gresham's Law in academic publishing.", "back": "When the quantity of publications is valued more than quality, the system becomes flooded with mediocre papers, displacing higher-quality, more nuanced work."}, {"front": "How does Gresham's Law relate to democratic discourse?", "back": "When sound bites and slogans circulate at the same 'face value' as nuanced arguments, the sound bites tend to drive out the nuance, diminishing the quality of public debate."}, {"front": "What is the central idea behind 'Quality, Selection, and What Markets Reward' as a key concept related to Gresham's Law?", "back": "When quality differences are hidden by uniform pricing, labeling, or standards, low-quality goods and services tend to drive out high-quality ones because rational actors spend the 'bad' and hoard the 'good'."}, {"front": "What is the primary antidote to the negative effects of Gresham's Law?", "back": "Transparency—mechanisms that make quality visible to consumers and participants."}, {"front": "Explain how Gresham's Law applies to online reviews.", "back": "When fake positive reviews are cheap to produce, they dilute the signal from genuine reviews. The 'bad money' of fake feedback drives out the 'good money' of honest assessment."}, {"front": "What is one function of professional licensing and certification in preventing Gresham's Law?", "back": "Licensing and certification aim to make quality visible to clients, thereby preventing a dynamic where low-quality practitioners can undercut and drive out high-quality ones."}, {"front": "In the context of coinage, what is the difference between the 'face value' and 'intrinsic value' of money?", "back": "Face value is the nominal value stamped on a coin by the government, while intrinsic value is the actual worth of the precious metal content of the coin. Gresham's Law occurs when these values diverge."}, {"front": "What effect does uniform pricing have when there are hidden quality differences?", "back": "Uniform pricing, when quality differences are hidden, creates an environment where low-quality goods can compete with and drive out high-quality goods, as buyers cannot distinguish value, and sellers of quality goods are disincentivized."}, {"front": "Why do buyers in a 'lemons' market (used cars) tend to offer lower prices?", "back": "Buyers anticipate that the market will be dominated by poor-quality cars ('lemons') due to Gresham's Law, so they adjust their offers downward to account for the risk of purchasing a bad car."}, {"front": "What is the consequence for good cars in a 'lemons' market?", "back": "Sellers of good cars withdraw from the market because they cannot get a fair price for their high-quality vehicles, further deteriorating the overall market quality and reinforcing the 'lemons' problem."}, {"front": "Describe the behavior of a 'rational actor' according to Gresham's Law.", "back": "A rational actor will spend or circulate the less intrinsically valuable item ('bad money' or low-quality good) while hoarding or retaining the more intrinsically valuable item ('good money' or high-quality good) when they are treated equivalently by face value or uniform standards."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
