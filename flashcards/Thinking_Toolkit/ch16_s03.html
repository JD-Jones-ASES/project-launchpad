    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 16, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is one of the central insights of twentieth-century economics regarding prices?", "back": "The idea that prices function as an information system, not merely as accounting tools."}, {"front": "Who first made explicit the idea of prices as an information system?", "back": "F.A. Hayek in 'The Use of Knowledge in Society' (1945)."}, {"front": "According to classical economics (e.g., Adam Smith), what role do prices implicitly play?", "back": "They implicitly function as an information system, a concept later made explicit by Hayek."}, {"front": "Describe the immediate effect of a sudden drop in the world's supply of a resource like tin.", "back": "The price of tin rises."}, {"front": "When the price of tin rises due to scarcity, how do manufacturers typically respond?", "back": "They begin substituting aluminum or plastic where possible, and engineers design products that use less tin."}, {"front": "How do recyclers typically respond to a significant rise in tin prices?", "back": "They find it profitable to recover tin from old equipment, increasing its supply."}, {"front": "What effect does a higher tin price have on miners in regions with less accessible deposits?", "back": "They expand production because the higher price now justifies the increased cost of extraction from those deposits."}, {"front": "What is the 'remarkable thing' about how actors respond to a price signal like a rise in tin prices?", "back": "None of the actors need to know *why* tin became scarce (e.g., flooded mine, shipping disruption); the price signal alone is sufficient to redirect behavior."}, {"front": "How do economists define 'prices as information'?", "back": "A price is a compressed summary of everything the market collectively knows about the relative scarcity and desirability of a good."}, {"front": "What specific types of information does a price encode?", "back": "It encodes information about supply conditions (how costly to produce?), demand conditions (how urgently wanted?), and the availability of substitutes."}, {"front": "What unique capability does the price system possess compared to committees, computers, or algorithms?", "back": "It aggregates the dispersed knowledge of millions of people and transmits the relevant summary in a single number that anyone can act on."}, {"front": "How did Hayek famously describe the price system's ability to aggregate knowledge?", "back": "He called it a 'marvel of information engineering'."}, {"front": "Explain the core principle of how market prices coordinate behavior without central direction.", "back": "They transmit information about relative scarcity and value in a compressed form, allowing millions of independent actors to coordinate their behavior without needing a full picture or central command."}, {"front": "When a resource becomes scarce and its price rises, how does this signal redirect conservation, substitution, and production?", "back": "The price rise alone is sufficient to redirect conservation efforts, encourage substitution with alternatives, and stimulate new production, all without central instruction."}, {"front": "Provide a real-world example of the price signal coordinating consumer and producer behavior during an oil crisis.", "back": "In the 1970s, rising oil prices led consumers to buy smaller cars and insulate homes, while producers invested in new drilling and alternative energy, all without government directives."}, {"front": "How does surge pricing in ride-sharing services utilize the price signal?", "back": "It simultaneously discourages marginal riders (reducing demand) and attracts more drivers (increasing supply), thereby balancing the market during periods of high demand."}, {"front": "How do agricultural markets use price signals to address regional crop shortfalls?", "back": "If a drought reduces a wheat harvest in one region, rising wheat prices signal farmers in other regions to plant more wheat the next season, partially compensating for the shortfall."}, {"front": "What is the distinction between prices conveying information and prices being 'right' or 'just'?", "back": "Prices are an information mechanism reflecting purchasing power and preferences, not a moral oracle. They do not necessarily reflect inherent importance or produce just outcomes."}, {"front": "What two factors, beyond just scarcity and desirability, do prices reflect?", "back": "The distribution of purchasing power and the distribution of preferences."}, {"front": "What theoretical concept, closely related to the price signal, is discussed as its foundation?", "back": "Hayek's Knowledge Problem, which explains how dispersed knowledge in society is utilized."}, {"front": "What illustrative example is often used to demonstrate price-coordinated production?", "back": "'I, Pencil'."}, {"front": "What principle describes the potential distortion when administered prices or metrics replace organic market signals, as mentioned in the chapter connections?", "back": "Goodhart's Law, which suggests that when a measure becomes a target, it ceases to be a good measure."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
