    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 28, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Gambler's Fallacy?", "back": "The belief that past outcomes in a random, independent process influence future outcomes, often leading to the conviction that an opposite outcome is 'due' after a streak."}, {"front": "Describe a classic example of the Gambler's Fallacy related to a roulette wheel.", "back": "After a long streak of one color (e.g., red) on a roulette wheel, many people believe the opposite color (black) is 'due,' even though each spin is an independent event with the same probability."}, {"front": "What famous incident in 1913 helped cement the Gambler's Fallacy in popular culture?", "back": "The Monte Carlo Casino incident, where black came up 26 times in a row at roulette, leading gamblers to lose millions betting on red."}, {"front": "Why do people tend to fall for the Gambler's Fallacy?", "back": "They confuse the Law of Large Numbers (which describes long-term proportions) with a false belief that past outcomes must 'catch up' to restore balance in the short term."}, {"front": "How does the Law of Large Numbers actually work, and how is it distinct from the idea of 'catching up'?", "back": "It works by *diluting* past outcomes over a long sequence, not by *correcting* them. An initial imbalance is swamped by many new, independent events, rather than being actively balanced out by compensatory outcomes."}, {"front": "What was the 'Hot Hand' originally identified as, and by whom?", "back": "It was initially identified as a fallacy by Gilovich, Vallone, and Tversky in their influential 1985 study, believed to be an illusion where people perceived streaks in independent events like basketball shots."}, {"front": "What does the belief in the 'Hot Hand' imply about future outcomes?", "back": "It implies that a streak of success (e.g., a basketball player making several shots in a row) increases the probability of the next similar outcome (the next shot going in)."}, {"front": "How is the Hot Hand belief conceptually opposite to the Gambler's Fallacy?", "back": "The Gambler's Fallacy assumes random processes are self-correcting (making the opposite outcome more likely), while the Hot Hand assumes streaks are self-reinforcing (making a similar outcome more likely)."}, {"front": "What was the main conclusion of Gilovich, Vallone, and Tversky's 1985 study on the Hot Hand?", "back": "They concluded that the hot hand was an illusion, and that basketball shots were essentially independent events, with fans simply pattern-matching on random noise."}, {"front": "What surprising turn did the research on the Hot Hand take in 2018?", "back": "Economists Miller and Sanjurjo (2018) demonstrated a subtle statistical bias in the original analysis, which had made genuine hot-hand effects appear smaller or even invisible."}, {"front": "What statistical bias did Miller and Sanjurjo (2018) identify in the original Hot Hand research?", "back": "When selecting sequences that followed a streak of hits and then measuring the success rate, a mathematical bias pushed the measured rate downward, underestimating any real hot-hand effect."}, {"front": "What is the current understanding of the Hot Hand effect after the 2018 research?", "back": "It is probably real, at least to a modest degree, in some athletic contexts, though much smaller than fans believe. It does not apply to purely random events like coin flips or roulette spins."}, {"front": "What is the critical question to ask when evaluating streaks for both the Gambler's Fallacy and the Hot Hand?", "back": "Are the events truly independent?"}, {"front": "Provide an example of the Gambler's Fallacy in the context of investing.", "back": "Believing a stock is 'due for a correction' after a long rise, or 'due for a rebound' after a long fall, if the stock's movements are independent."}, {"front": "How might a (small) genuine Hot Hand effect influence sports strategy?", "back": "Feeding the ball to a player who seems 'hot' might be marginally better than distributing shots evenly, although the effect is often small enough that other factors (like defensive adjustments) usually matter more."}, {"front": "Why might basketball shots *not* be truly independent events, unlike coin flips?", "back": "A player's confidence, fatigue, defensive attention, and shot selection can all change during a streak, introducing genuine dependencies that affect subsequent shot probabilities."}, {"front": "What is the fundamental error underlying both the Gambler's Fallacy and the strong form of the Hot Hand belief?", "back": "A failure to correctly assess whether successive events are truly independent."}, {"front": "What is one major real-world cost or implication of the Gambler's Fallacy?", "back": "It leads to costly errors in probabilistic reasoning, causing individuals to lose money by betting against streaks in genuinely random processes (e.g., gambling, lotteries) or making poor investment decisions."}, {"front": "For genuinely independent events like coin flips or roulette spins, do past streaks or perceived 'corrections' have predictive power for future outcomes?", "back": "No, for genuinely independent events, neither past streaks nor the expectation of 'corrections' have any predictive power for future outcomes."}, {"front": "Which other cognitive biases or concepts are related to the understanding of probabilistic errors discussed?", "back": "The Availability Heuristic (vivid streaks distort memory), Base Rate Neglect (ignoring background probabilities), and the Monty Hall Problem (where probability defies intuition)."}, {"front": "What is the irony highlighted in the modern discussion of the Hot Hand?", "back": "The researchers who originally debunked the hot hand as a fallacy may themselves have committed a subtle statistical error in their analysis, leading to a potential mischaracterization of the effect."}, {"front": "Summarize the core difference in how the Gambler's Fallacy and Hot Hand belief (in its strong form) misunderstand randomness.", "back": "The Gambler's Fallacy incorrectly assumes random processes are self-correcting (opposite outcome more likely), while the strong Hot Hand belief incorrectly assumes streaks are self-reinforcing (similar outcome more likely), especially when events are truly independent."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
