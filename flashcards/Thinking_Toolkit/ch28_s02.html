<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 28, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Simpson's Paradox?", "back": "Simpson's Paradox occurs when a trend that appears in every subgroup of data disappears or reverses when the subgroups are combined."}, {"front": "Who is Simpson's Paradox named after, and when was it described?", "back": "It is named after British statistician Edward H. Simpson, who described it in a 1951 paper, though it was noted earlier by Karl Pearson (1899) and Udny Yule (1903)."}, {"front": "What is the most famous real-world example of Simpson's Paradox?", "back": "The most famous example comes from a 1973 study of graduate admissions at the University of California, Berkeley, which was accused of sex discrimination."}, {"front": "What did the initial aggregate data suggest about UC Berkeley's graduate admissions in 1973?", "back": "The initial data showed that approximately 44% of male applicants were admitted compared to only about 35% of female applicants, suggesting systematic discrimination against women."}, {"front": "What did a department-by-department analysis reveal about UC Berkeley's admissions rates?", "back": "In most individual departments, women were admitted at the same rate as men, or even at higher rates, indicating no departmental-level discrimination."}, {"front": "What was the confounding variable that explained Simpson's Paradox in the UC Berkeley admissions case?", "back": "The confounding variable was the departments women applied to. Women disproportionately applied to smaller programs with lower admission rates overall."}, {"front": "How did application patterns by sex contribute to the UC Berkeley paradox?", "back": "Women applied overwhelmingly to harder-to-get-into departments, while men disproportionately applied to larger departments (e.g., engineering) with higher admission rates for everyone."}, {"front": "What is a 'lurking variable' in the context of Simpson's Paradox?", "back": "A lurking variable is one that is not included in the analysis but is correlated with both the grouping variable (e.g., sex) and the outcome variable (e.g., admission rate)."}, {"front": "How does a lurking variable lead to Simpson's Paradox?", "back": "When groups are combined, the lurking variable's effect is hidden, producing an overall misleading picture that reverses or obscures the trend within subgroups."}, {"front": "In the simplified two-department example, how could men have a 52% admission rate and women 28% overall, even with no discrimination in either department?", "back": "This occurs if women overwhelmingly applied to the department with a low admission rate for everyone, while men overwhelmingly applied to the department with a high admission rate for everyone."}, {"front": "What is the general lesson about aggregate data from Simpson's Paradox?", "back": "Never trust aggregate data without asking whether the groups being combined are comparable. The overall picture can be the exact opposite of the truth."}, {"front": "How can Simpson's Paradox have life-or-death consequences in medicine?", "back": "A treatment might appear better overall but be worse for every individual subgroup of patients (e.g., by severity of illness) if patients were unevenly distributed across treatment groups."}, {"front": "What techniques are used in modern clinical trials to prevent Simpson's Paradox from distorting results?", "back": "Modern clinical trials use randomization and stratification, which are designed to neutralize confounding variables."}, {"front": "Provide an example of Simpson's Paradox in sports.", "back": "A player can have a higher batting average than another player in every individual season but a lower overall average across multiple years if they faced easier opponents or played fewer games in their 'better' seasons."}, {"front": "Provide an example of Simpson's Paradox in public policy.", "back": "A policy can appear to improve outcomes overall (e.g., reducing crime rates) while making things worse for every specific demographic group, if the policy was disproportionately applied to groups already trending favorably."}, {"front": "A city has two hospitals. Hospital A has a higher overall patient survival rate than Hospital B. Does this mean Hospital A provides better care?", "back": "Not necessarily. This could be an example of Simpson's Paradox, where the aggregate data is misleading."}, {"front": "What confounding variable might explain why Hospital A appears better than Hospital B in aggregate survival rates, even if Hospital B provides superior care to all types of patients?", "back": "Hospital A might disproportionately treat less severe cases (who have higher survival rates regardless of care quality), while Hospital B might treat more severe cases (who are harder to save)."}, {"front": "How is Simpson's Paradox connected to Base Rate Neglect?", "back": "Both involve ignoring crucial background information or context that changes the meaning of a statistic or an overall rate."}, {"front": "How is Simpson's Paradox connected to Confirmation Bias?", "back": "Confirmation bias can make people accept aggregate data that confirms their pre-existing beliefs without questioning the underlying subgroups."}, {"front": "How is Simpson's Paradox connected to Goodhart's Law?", "back": "Goodhart's Law states that when a measure becomes a target, it ceases to be a good measure. In Simpson's Paradox, relying on an aggregate 'measure' (like overall admission rate) without understanding its underlying structure can mislead."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
