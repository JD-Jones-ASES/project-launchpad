<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 29, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is underdetermination in the philosophy of science?", "back": "Underdetermination is the uncomfortable fact that for any body of scientific data, there are always multiple theories that fit the observations equally well, meaning evidence alone cannot definitively determine which theory is correct.", "id": "fc01"}, {"front": "Who formalized the concept of underdetermination?", "back": "Pierre Duhem (1906) and W. V. O. Quine (1951) formalized the concept of underdetermination.", "id": "fc02"}, {"front": "By what other name is underdetermination sometimes known?", "back": "It is sometimes called the Duhem-Quine thesis.", "id": "fc03"}, {"front": "What historical scientific episode serves as a prime example of underdetermination?", "back": "The centuries-long competition between the Ptolemaic (Earth-centered) and Copernican (Sun-centered) models of the solar system.", "id": "fc04"}, {"front": "Why was it initially difficult to choose between the Ptolemaic and Copernican models based on observational data alone in the 16th century?", "back": "Both models predicted planetary positions with roughly comparable accuracy, and the Ptolemaic system, with its epicycles, could be adjusted to match almost any observation.", "id": "fc05"}, {"front": "What factors, beyond pure observation, eventually led to the widespread acceptance of the Copernican model?", "back": "Kepler's discovery of elliptical orbits, Galileo's telescopic observations (Venus's phases, Jupiter's moons), and the Copernican model's ability to pave the way for Newton's universal gravitation.", "id": "fc06"}, {"front": "What 'theoretical virtues' influenced the choice between the Ptolemaic and Copernican models, in addition to empirical evidence?", "back": "Values such as simplicity, elegance, unifying power, and fruitfulness for future research.", "id": "fc07"}, {"front": "What was Pierre Duhem's specific point regarding the testing of scientific hypotheses?", "back": "Duhem argued that you can never test a single hypothesis in isolation; every experiment relies on a web of background assumptions. If results are unexpected, the experiment cannot pinpoint which assumption is wrong.", "id": "fc08"}, {"front": "How did W. V. O. Quine extend Duhem's point about scientific testing?", "back": "Quine argued that our entire system of beliefs faces experience as a whole, meaning any belief can be maintained in the face of any evidence if we are willing to make adjustments elsewhere in the system.", "id": "fc09"}, {"front": "What is the 'strongest form' of the Duhem-Quine thesis?", "back": "The strongest form states that any belief can be maintained in the face of any evidence, provided one is willing to make adjustments elsewhere in the system of beliefs.", "id": "fc10"}, {"front": "What philosophical puzzle does underdetermination raise about the nature of science?", "back": "It raises the puzzle of what makes science more than just storytelling if evidence alone cannot force us to accept or reject any particular theory.", "id": "fc11"}, {"front": "How do most working scientists pragmatically address underdetermination?", "back": "They choose theories that are simpler, more fruitful, more unifying, and better at generating new predictions, not because these criteria guarantee truth, but because they have an extraordinary track record.", "id": "fc12"}, {"front": "How does underdetermination redefine the relationship between evidence and theory in science?", "back": "It means the relationship is more complex than 'the data proves it,' asserting that theory choice depends on both evidence and theoretical virtues, not solely on empirical observation.", "id": "fc13"}, {"front": "Does underdetermination imply that scientific choices are arbitrary?", "back": "No, it implies that science is the disciplined management of underdetermination through the careful application of theoretical virtues, which have proven effective, rather than being arbitrary.", "id": "fc14"}, {"front": "Give a real-world application of underdetermination in medical diagnosis.", "back": "Patient symptoms like fatigue, weight loss, and joint pain can be consistent with dozens of conditions (underdetermine the diagnosis), requiring doctors to use background knowledge, additional tests, and clinical judgment to narrow possibilities.", "id": "fc15"}, {"front": "How does underdetermination apply to historical explanation?", "back": "Multiple explanations for historical events (e.g., the fall of Rome) can be consistent with surviving evidence, with the 'correct' answer often depending on which evidence is emphasized and the analytical framework used.", "id": "fc16"}, {"front": "Provide an example of underdetermination in data science or machine learning.", "back": "In machine learning, any dataset can be fit by infinitely many models of varying complexity; the challenge is choosing the right model (managing underdetermination) that is simple enough to generalize but complex enough to capture real patterns.", "id": "fc17"}, {"front": "Are theoretical virtues like simplicity and elegance considered empirical evidence?", "back": "No, they are recognized as real virtues in theory choice but are distinct from empirical evidence. Reasonable people may weigh them differently.", "id": "fc18"}, {"front": "If an experiment yields an unexpected result, what challenge does Duhem's perspective on underdetermination highlight?", "back": "It highlights that the experiment alone cannot tell you which part of your 'web of beliefs' (hypothesis, instrument calibration, background assumptions, confounding factors) is wrong.", "id": "fc19"}, {"front": "In the context of underdetermination, how is science characterized differently from a simple deduction from data to truth?", "back": "Science is characterized as the disciplined management of underdetermination through the careful application of theoretical virtues, rather than a straightforward deductive path from data to truth.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
