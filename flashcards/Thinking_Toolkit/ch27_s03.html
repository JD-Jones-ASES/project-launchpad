    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 27, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the P vs. NP problem fundamentally ask?", "back": "It asks whether every problem whose solution can be efficiently verified can also be efficiently solved."}, {"front": "Who formalized the P vs. NP problem, and when?", "back": "Stephen Cook in 1971 and independently by Leonid Levin in 1973."}, {"front": "What is the current status and recognition of the P vs. NP problem?", "back": "It is one of the seven Millennium Prize Problems by the Clay Mathematics Institute, with a $1 million prize for a solution, and it remains unsolved."}, {"front": "Give an example of a problem that is easy to check but apparently hard to solve.", "back": "Assembling a jigsaw puzzle: verifying a proposed solution (that pieces fit) is quick, but finding the solution from scratch can be very time-consuming."}, {"front": "Define the class P in computer science.", "back": "P (polynomial time) is the class of problems that can be solved efficiently, meaning in time proportional to some polynomial function of the input size."}, {"front": "Name two types of problems that belong to the class P.", "back": "Sorting a list of numbers, searching a database, or finding the shortest path in a network."}, {"front": "Define the class NP in computer science.", "back": "NP (nondeterministic polynomial time) is the class of problems whose solutions can be verified efficiently, even if finding the solution might be hard."}, {"front": "Give an example of a problem in the class NP where finding a solution is considered hard.", "back": "The Traveling Salesman Problem (TSP): checking if a proposed route visits all cities and is under a certain distance is quick, but finding the optimal route appears to require checking an astronomical number of possibilities."}, {"front": "What is the fundamental relationship between the classes P and NP?", "back": "Every problem in P is automatically in NP, because if you can solve a problem quickly, you can certainly verify its solution quickly."}, {"front": "In simpler terms, what does the core P vs. NP question ask?", "back": "Does the ability to quickly check a solution guarantee the ability to quickly find one?"}, {"front": "How would modern cryptography be affected if P = NP?", "back": "Cryptography would collapse. Encryption relies on problems easy in one direction (e.g., multiplying primes) but hard in the other (e.g., factoring); if P=NP, the 'hard' direction would become easy, breaking most current systems."}, {"front": "What impact would P = NP have on optimization problems?", "back": "Optimization would be transformed. Problems like scheduling, logistics, and protein folding, where we currently settle for 'good enough' solutions, would become efficiently solvable to their optimal state."}, {"front": "How would the process of mathematical proof itself change if P = NP?", "back": "Mathematical proof would change significantly. Since verifying a proof is in NP, if P = NP, finding proofs would also become efficient, allowing computers to discover proofs as easily as they check them."}, {"front": "What do most computer scientists generally believe about P vs. NP?", "back": "Most computer scientists believe that P ≠ NP, meaning there are genuinely hard problems in NP that no efficient algorithm can solve."}, {"front": "What defines an NP-complete problem?", "back": "NP-complete problems are a specific subset of NP problems that are, in a precise sense, the 'hardest' problems in NP. If any one of them can be solved efficiently, then all problems in NP can be solved efficiently."}, {"front": "Who proved the existence of NP-complete problems?", "back": "Stephen Cook in 1971."}, {"front": "What would be the implication if an efficient algorithm was found for *any* NP-complete problem?", "back": "If any NP-complete problem can be solved efficiently, then all problems in NP can be solved efficiently, which would prove that P = NP."}, {"front": "What is considered the strongest evidence (though not a proof) that P ≠ NP?", "back": "The fact that no efficient algorithm has been found for any of the hundreds of important NP-complete problems, despite decades of trying by the world's best mathematicians and computer scientists."}, {"front": "How does the P vs. NP question already impact real-world engineering and science today, even without a resolution?", "back": "Because many important optimization problems are NP-complete, engineers and scientists use approximation algorithms — methods that find solutions that are 'good enough' rather than optimal — to solve them practically."}, {"front": "Provide a real-world example of an approximation algorithm being used due to the presumed P ≠ NP scenario.", "back": "Your GPS does not compute the truly shortest route; instead, it quickly computes a very good route using approximation algorithms because finding the optimal route would take too long."}, {"front": "What is the key difference between 'solving' and 'verifying' a problem in the context of P vs. NP?", "back": "'Solving' a problem means finding the answer from scratch. 'Verifying' a problem means checking if a given proposed answer is correct and valid."}, {"front": "Is 'NP' short for 'not polynomial'? Explain.", "back": "No, 'NP' stands for 'Nondeterministic Polynomial time.' It refers to problems whose solutions can be *verified* in polynomial time, not that they cannot be *solved* in polynomial time."}, {"front": "If P ≠ NP, what does that imply about the inherent difficulty of certain problems?", "back": "It implies there are genuinely hard problems where finding a solution is fundamentally more difficult than checking one, establishing a real and enduring distinction between 'easy to check' and 'easy to solve' problems."}, {"front": "Why are NP-complete problems often called 'bottleneck' problems for the P vs. NP question?", "back": "Because if you could find an efficient solution to *any* single NP-complete problem, it would immediately provide an efficient solution path for *all* problems in NP, thereby resolving P = NP."}, {"front": "What mathematical and computer science disciplines are most directly concerned with the P vs. NP question?", "back": "Computational complexity theory, theoretical computer science, and mathematics."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
