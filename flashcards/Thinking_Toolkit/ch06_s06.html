<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Hindsight Bias?", "back": "Hindsight bias is the tendency, once an outcome is known, to reconstruct one's memory of prior beliefs to make the outcome seem predictable or even inevitable, leading to an overestimation of its foreseeability."}, {"front": "What is another common name for Hindsight Bias?", "back": "It is sometimes called the 'knew-it-all-along effect.'"}, {"front": "Who experimentally demonstrated Hindsight Bias and when?", "back": "Baruch Fischhoff demonstrated it in a series of studies beginning in 1975."}, {"front": "How does Hindsight Bias affect our memory of past predictions?", "back": "Once an outcome is known, we unconsciously revise our memories to make the outcome seem predictable, often 'remembering' having predicted the correct outcome all along, even if our actual predictions were different."}, {"front": "Is Hindsight Bias a deliberate lie? Explain.", "back": "No, it is not a deliberate lie. It is described as a genuine failure of memory, where the brain automatically reorganizes evidence to make the known outcome appear foreseeable."}, {"front": "What were the two key findings from Baruch Fischhoff's original experiments on Hindsight Bias?", "back": "Participants who knew the outcome rated it as significantly more predictable than those who didn't, and they 'remembered' having predicted the correct outcome even when their original predictions were different."}, {"front": "How did the 2008 financial crisis serve as an example of Hindsight Bias?", "back": "After the crisis, many claimed they had seen it coming and explained why it was 'inevitable,' despite the prevailing view before the crash being that the financial system was sound."}, {"front": "What was the prevailing view among economists, regulators, and investors before the 2008 financial crisis?", "back": "The prevailing view was that the financial system was fundamentally sound. Those who warned of a housing bubble were dismissed as alarmists."}, {"front": "How does Hindsight Bias impact jurors in a courtroom setting?", "back": "Jurors who know a defendant caused harm judge the defendant's prior behavior as more reckless than jurors who evaluate the same behavior without knowing the outcome."}, {"front": "What are the consequences of Hindsight Bias in hospitals?", "back": "Doctors who know a patient died evaluate treatment decisions as more obviously wrong than doctors reviewing the same case without knowing the outcome."}, {"front": "How does Hindsight Bias affect decision-making evaluation in corporate boardrooms?", "back": "Executives who know a project failed judge the original decision as obviously flawed, potentially firing responsible individuals, even if the original decision was reasonable given the information at the time."}, {"front": "How does Hindsight Bias sabotage genuine learning?", "back": "If every outcome feels predictable after the fact, the illusion of foresight prevents genuine analysis of what was actually known, what was missed, and what could be done differently next time."}, {"front": "What does genuine learning require to overcome Hindsight Bias?", "back": "Genuine learning requires admitting uncertainty, acknowledging that the outcome was not obvious, and recognizing that prior understanding was incomplete."}, {"front": "What is the recommended antidote to Hindsight Bias?", "back": "To counteract Hindsight Bias, record your predictions before you know the outcome and then honestly compare them to the actual result."}, {"front": "How does the brain reorganize evidence under Hindsight Bias?", "back": "Facts pointing toward the known outcome become salient, while facts pointing elsewhere fade into the background. The narrative is cleaned up, ambiguity removed, creating a tidy story with a clear trajectory."}, {"front": "How does Hindsight Bias affect our judgment of others' past decisions?", "back": "It makes us too harsh, as we evaluate decisions based on the outcome rather than on the quality of reasoning and available information at the time the decision was made."}, {"front": "How does Hindsight Bias contribute to overconfidence?", "back": "By making past outcomes seem predictable, it fosters an illusion of foresight, making us overconfident in our own ability to foresee future events."}, {"front": "Provide a real-world example of Hindsight Bias in military strategy reviews.", "back": "After a battle, a losing general's decisions often look obviously foolish to those who know the outcome, even though the general operated with incomplete information and multiple plausible options at the time."}, {"front": "How does Hindsight Bias manifest in evaluating investment decisions?", "back": "After a stock crashes, people question why anyone bought it, but at the time, analysts might have recommended it based on sound reasons. Judging past investors by current knowledge is Hindsight Bias."}, {"front": "Which related cognitive bias involves distortions in how we evaluate past and future events, often alongside Hindsight Bias?", "back": "The Planning Fallacy."}, {"front": "Which related concept refers to events that are genuinely unpredictable but are often rationalized and explained away in hindsight?", "back": "The Black Swan."}, {"front": "How does Confirmation Bias relate to Hindsight Bias?", "back": "Confirmation Bias involves selectively gathering evidence to support a pre-existing narrative, which can reinforce the 'obviousness' of a known outcome created by Hindsight Bias."}, {"front": "What is the subjective feeling one experiences due to Hindsight Bias regarding an outcome?", "back": "You don't just know what happened; you feel that you always knew it would happen, making you feel more prescient than you actually were."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
