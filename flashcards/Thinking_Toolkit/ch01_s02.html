<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does the idiom 'Rearranging Deck Chairs on the Titanic' describe?", "back": "It describes the futile optimization of trivial details while ignoring a catastrophic underlying problem."}, {"front": "What historical event is the idiom 'Rearranging Deck Chairs on the Titanic' based on?", "back": "The 1912 sinking of the RMS Titanic after striking an iceberg."}, {"front": "What is the core failure mode captured by the 'Rearranging Deck Chairs' metaphor?", "back": "Optimizing the irrelevant – investing effort in trivial improvements instead of addressing a critical issue."}, {"front": "Does 'Rearranging Deck Chairs on the Titanic' imply complete inactivity?", "back": "No, it implies misdirected productivity. Effort is spent on comfortable, narrow tasks rather than the truly needed, important ones."}, {"front": "Provide a business example of 'Rearranging Deck Chairs on the Titanic'.", "back": "A business hemorrhaging customers while the executive team spends meetings debating a new logo."}, {"front": "Provide an academic example of 'Rearranging Deck Chairs on the Titanic'.", "back": "A student with a term paper due tomorrow who spends the evening color-coding her notes."}, {"front": "Provide a governmental example of 'Rearranging Deck Chairs on the Titanic'.", "back": "A government facing a structural fiscal crisis that passes legislation renaming a post office."}, {"front": "Name one psychological force that drives the behavior of 'Rearranging Deck Chairs'.", "back": "The comfort of competence."}, {"front": "Explain 'the comfort of competence' as a driver for optimizing the irrelevant.", "back": "We gravitate towards solvable tasks, offering satisfaction of completion, especially when important tasks feel impossible or beyond our skill set."}, {"front": "Name another psychological force that drives 'Rearranging Deck Chairs'.", "back": "The illusion of progress."}, {"front": "Explain 'the illusion of progress' as a driver for optimizing the irrelevant.", "back": "Activity feels like accomplishment, providing psychological cover for not addressing anything that truly matters."}, {"front": "What is the third psychological force discussed that drives 'Rearranging Deck Chairs'?", "back": "Avoidance."}, {"front": "Explain 'avoidance' as a driver for optimizing the irrelevant.", "back": "Unconsciously redirecting attention to manageable tasks because the real problem is too frightening, large, or painful. It's a coping mechanism, not laziness."}, {"front": "When is the 'Rearranging Deck Chairs' metaphor *not* an appropriate accusation?", "back": "When the small task is the only one within an individual's control, and they lack the ability to address the larger problem (e.g., a frontline employee)."}, {"front": "When does the 'Rearranging Deck Chairs' metaphor apply to an individual?", "back": "When an individual has the ability to address the real problem but chooses instead to optimize the irrelevant or engage in manageable busyness."}, {"front": "When does the 'Rearranging Deck Chairs' metaphor apply to an organization?", "back": "When an organization with the resources to address a catastrophic issue allocates those resources to trivial improvements instead."}, {"front": "What is the primary diagnostic question to determine if a 'Rearranging Deck Chairs' situation exists?", "back": "Is the ship actually sinking? (i.e., Is there a catastrophic underlying problem?)"}, {"front": "What is the second diagnostic question to determine personal culpability in a 'Rearranging Deck Chairs' situation?", "back": "Are you someone who could be working on the hull instead of the deck chairs? (i.e., Do you have the capacity to address the real problem?)"}, {"front": "Briefly summarize the key concept of 'Optimizing the Irrelevant'.", "back": "It's the pattern of investing effort in trivial improvements while ignoring a catastrophic underlying problem, driven by the comfort of competence, the illusion of progress, and avoidance."}, {"front": "Describe 'Corporate displacement' as a real-world example of optimizing the irrelevant.", "back": "A retail chain facing an existential challenge from e-commerce spends a leadership retreat redesigning store layouts, a real improvement but irrelevant if customers aren't visiting."}, {"front": "Describe 'Academic procrastination' as a real-world example of optimizing the irrelevant.", "back": "A graduate student with a dissertation deadline reorganizing her bibliography system for the third time instead of writing the dissertation."}, {"front": "Describe 'Governmental theater' as a real-world example of optimizing the irrelevant.", "back": "A legislature facing a debt crisis passes resolutions honoring sports teams or renaming highways, harmless actions that mask institutional avoidance."}, {"front": "Which concept is related to 'Rearranging Deck Chairs' in terms of misdirected effort, where one searches in an easy but wrong place?", "back": "The Streetlight Effect."}, {"front": "Which framework can help distinguish between urgent and important tasks, addressing a core issue of 'Rearranging Deck Chairs'?", "back": "The Eisenhower Matrix."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
