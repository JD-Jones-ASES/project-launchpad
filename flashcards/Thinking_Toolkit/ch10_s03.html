<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the definition of a Pyrrhic victory?", "back": "A victory where the tactical win comes at a cost that undermines, or even reverses, the strategic position, making the win strategically worthless.", "id": "fc01"}, {"front": "From whom does the term \"Pyrrhic Victory\" originate?", "back": "King Pyrrhus of Epirus, an ancient Greek military commander.", "id": "fc02"}, {"front": "What historical event is central to the origin of the term \"Pyrrhic Victory\"?", "back": "King Pyrrhus's victory over the Romans at the Battle of Asculum in 279 BC, where his losses were devastating.", "id": "fc03"}, {"front": "Why did King Pyrrhus cross the Adriatic to southern Italy in 280 BC?", "back": "To help the Greek colonies resist Roman expansion.", "id": "fc04"}, {"front": "Name two battles where King Pyrrhus achieved tactical victories against the Romans.", "back": "The Battle of Heraclea (280 BC) and the Battle of Asculum (279 BC).", "id": "fc05"}, {"front": "What unique military asset did Pyrrhus bring to Italy that the Romans had never encountered?", "back": "War elephants.", "id": "fc06"}, {"front": "What famous quote is attributed to King Pyrrhus after his costly victory at Asculum?", "back": "\"One more such victory and we are undone.\"", "id": "fc07"}, {"front": "Despite his tactical wins, what was the ultimate strategic outcome of Pyrrhus's campaign in Italy?", "back": "He abandoned Italy, and the Romans went on to conquer the entire Greek world. His tactical wins resulted in a strategic loss.", "id": "fc08"}, {"front": "What fundamental distinction does the concept of a Pyrrhic Victory reveal?", "back": "The distinction between tactical success (winning the immediate contest) and strategic success (advancing your long-term position).", "id": "fc09"}, {"front": "Define \"tactical success\" in the context of a Pyrrhic Victory.", "back": "Winning the immediate contest or battle.", "id": "fc10"}, {"front": "Define \"strategic success\" in the context of a Pyrrhic Victory.", "back": "Advancing one's long-term position or objectives.", "id": "fc11"}, {"front": "Give a business example of a Pyrrhic Victory.", "back": "A company winning a hostile takeover at such a high price, financed by so much debt, that the combined entity collapses.", "id": "fc12"}, {"front": "Give a legal example of a Pyrrhic Victory.", "back": "Prevailing in a lawsuit but spending so much on legal fees and enduring public scrutiny that the victory is worse than a settlement.", "id": "fc13"}, {"front": "Give a personal relationship example of a Pyrrhic Victory.", "back": "\"Winning\" an argument with a spouse but destroying the goodwill needed for the relationship to function.", "id": "fc14"}, {"front": "What is the common error made by those who achieve Pyrrhic Victories?", "back": "Optimizing for the immediate contest rather than for the larger, long-term objective. They \"win the wrong game.\"", "id": "fc15"}, {"front": "How does the sunk-cost fallacy contribute to Pyrrhic Victories?", "back": "It makes people reluctant to walk away from a contest they have already invested in, regardless of future costs.", "id": "fc16"}, {"front": "How does loss aversion contribute to the trap of Pyrrhic Victories?", "back": "It makes the prospect of \"losing\" (even a battle within a larger war) feel intolerable, pushing individuals to continue fighting.", "id": "fc17"}, {"front": "How does ego contribute to falling into the Pyrrhic Victory trap?", "back": "Ego makes individuals confuse winning the immediate contest with being \"right,\" blinding them to the larger consequences.", "id": "fc18"}, {"front": "What role does emotional momentum play in Pyrrhic Victories?", "back": "It narrows focus to the immediate contest, blinding individuals to the larger picture and long-term implications.", "id": "fc19"}, {"front": "What is the recommended antidote to avoid falling into the trap of Pyrrhic Victories?", "back": "Strategic awareness.", "id": "fc20"}, {"front": "What question should one regularly ask to practice strategic awareness?", "back": "\"Even if I win this, will I be better off?\" This helps assess long-term benefits vs. immediate costs.", "id": "fc21"}, {"front": "How was Pyrrhus of Epirus regarded as a military commander by contemporaries like Hannibal?", "back": "Hannibal reportedly ranked Pyrrhus as the second-greatest commander in history, after Alexander the Great.", "id": "fc22"}, {"front": "Describe the undignified end of King Pyrrhus.", "back": "He died in a street fight in Argos, struck on the head by a roof tile thrown by an old woman.", "id": "fc23"}, {"front": "Provide a modern, real-world example of a Pyrrhic Victory from the technology industry.", "back": "Companies engaging in patent wars that cost more in legal fees and executive attention than the patents were worth, or price wars that destroy industry profitability.", "id": "fc24"}, {"front": "According to the text, what is the rational move when the cost of winning exceeds the value of the prize?", "back": "To walk away, settle, or redirect one's energy.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
