<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 10, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a 'Pyrrhic victory'?", "back": "A victory won at such a devastating cost that it is strategically worthless or amounts to a defeat."}, {"front": "After whom is the term 'Pyrrhic victory' named?", "back": "King Pyrrhus of Epirus."}, {"front": "Who was King Pyrrhus of Epirus?", "back": "A highly skilled military commander of the ancient world, compared to Alexander the Great, who fought against Rome to help Greek colonies in southern Italy."}, {"front": "Name two significant battles where Pyrrhus defeated the Romans.", "back": "The Battle of Heraclea (280 BC) and the Battle of Asculum (279 BC)."}, {"front": "What unique military asset did Pyrrhus bring to Italy that the Romans had not encountered?", "back": "War elephants."}, {"front": "Despite winning battles, what catastrophic losses did Pyrrhus suffer that made his victories strategically worthless?", "back": "His best officers and irreplaceable veteran soldiers were dead, and he was fighting far from home with no easy way to reinforce."}, {"front": "What famous quote is attributed to Pyrrhus after the Battle of Asculum, illustrating the concept of a Pyrrhic victory?", "back": "'One more such victory and we are undone.'"}, {"front": "What was the ultimate strategic outcome for Pyrrhus and his campaign in Italy?", "back": "He abandoned Italy within a few years, and the Romans went on to conquer the entire Greek world, despite Pyrrhus's tactical wins."}, {"front": "What is the fundamental distinction revealed by the concept of a Pyrrhic victory?", "back": "The distinction between tactical success (winning the immediate contest) and strategic success (advancing your long-term position)."}, {"front": "In the context of a Pyrrhic victory, what happens to the tactical win in relation to the strategic position?", "back": "The tactical win comes at a cost that undermines, or even reverses, the strategic position."}, {"front": "Provide a business example of a Pyrrhic victory.", "back": "A company winning a hostile takeover at such a high price, financed by too much debt, that the combined entity collapses under the burden."}, {"front": "Provide a legal example of a Pyrrhic victory.", "back": "Winning a lawsuit in court but spending so much on legal fees and enduring public scrutiny that a settlement would have been better."}, {"front": "Provide a personal example of a Pyrrhic victory.", "back": "'Winning' an argument with a spouse but destroying the goodwill needed for the relationship to function."}, {"front": "What is the common error made by those who achieve Pyrrhic victories?", "back": "Optimizing for the immediate contest rather than for the larger, long-term objective."}, {"front": "Which psychological bias makes us reluctant to walk away from a contest we have already invested in, contributing to Pyrrhic victories?", "back": "The sunk-cost fallacy."}, {"front": "Which psychological bias makes the prospect of 'losing' an immediate contest feel intolerable, even if it's part of a larger war?", "back": "Loss aversion."}, {"front": "How does 'ego' contribute to falling into the Pyrrhic victory trap?", "back": "Ego makes us confuse winning the immediate contest with being 'right,' blinding us to the larger strategic implications."}, {"front": "What role does the 'emotional momentum of competition' play in leading to Pyrrhic victories?", "back": "It narrows our focus to the immediate contest, blinding us to the larger strategic picture."}, {"front": "What is the 'antidote' to falling into the Pyrrhic victory trap?", "back": "Strategic awareness – the discipline of regularly stepping back and asking, 'Even if I win this, will I be better off?'"}, {"front": "When does the text suggest the rational move is to walk away, settle, or redirect energy?", "back": "Whenever the cost of winning the immediate contest exceeds the value of the prize or the long-term objective."}, {"front": "What high praise did the Carthaginian general Hannibal reportedly give Pyrrhus?", "back": "He ranked Pyrrhus as the second-greatest commander in history, after Alexander the Great."}, {"front": "How did King Pyrrhus of Epirus ultimately die?", "back": "He died in a street fight in Argos, struck on the head by a roof tile thrown by an old woman."}, {"front": "Provide a modern example of a Pyrrhic victory in the technology industry.", "back": "Companies engaging in patent wars that cost more in legal fees and executive attention than the patents were ever worth."}, {"front": "How can a 'price war' between competitors exemplify a Pyrrhic victory?", "back": "It can destroy industry profitability for everyone, including the 'winner,' because the cost of winning (lower prices, reduced margins) outweighs the benefit."}, {"front": "What crucial calculation should one make before committing resources to a fight, according to the text?", "back": "Calculate not just whether you can win, but whether winning is worth what it will cost."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
