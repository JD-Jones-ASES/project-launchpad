<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 20, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core principle of Chesterton's Fence?", "back": "The principle states that before removing a law, tradition, rule, or institution, one must first understand why it was created. If the original purpose cannot be explained, one does not understand the situation well enough to know if removal is safe."}, {"front": "Who introduced the concept known as 'Chesterton's Fence'?", "back": "G. K. Chesterton, an English writer, philosopher, and literary critic."}, {"front": "In which work did G.K. Chesterton first discuss this principle, and in what context?", "back": "It appears in his 1929 book 'The Thing,' specifically in a chapter titled 'The Drift from Domesticity,' where he argued against the hasty removal of institutions whose purposes have been forgotten."}, {"front": "Describe the literal analogy G.K. Chesterton uses to explain his 'Fence' principle.", "back": "He describes walking through a field and encountering a fence with no obvious reason for its existence. A certain type of reformer might say 'Let us remove it' because its purpose is unclear."}, {"front": "According to Chesterton's Fence, what is the 'exactly wrong response' of a certain kind of reformer upon encountering an unexplained institution or rule?", "back": "To remove it simply because its purpose is not immediately obvious or understood."}, {"front": "What is the essential prerequisite for reform or removal, according to Chesterton's Fence?", "back": "Before removing a 'fence' (any established practice or institution), one must first understand why it was put there in the first place."}, {"front": "What does Chesterton suggest might be the case if the purpose of a 'fence' is not immediately obvious?", "back": "The fence may be holding back something one cannot see, or solving a problem that only becomes visible once the fence is gone."}, {"front": "Complete Chesterton's famous quote regarding the origin of a 'fence':", "back": "'The gate or fence did not grow there. It was not set up by somnambulists who built it in their sleep. Some person had some reason for thinking it would be a good thing for somebody.'"}, {"front": "Is Chesterton's Fence an argument against change itself? Explain.", "back": "No, it is explicitly stated not to be an argument against change. It is an argument against *ignorant* change."}, {"front": "If not against change, what specific kind of change does Chesterton's Fence argue against?", "back": "It argues against reform or removal that occurs without first understanding the original reasons and context for the existing structure or rule."}, {"front": "Once you understand why a 'fence' was built, what position are you in regarding its retention or removal?", "back": "You are then in a position to judge whether the original reason still applies and, consequently, whether the fence should stay or go."}, {"front": "Beyond physical fences, to what does the Chesterton's Fence principle apply?", "back": "It applies to every law, regulation, tradition, and institutional practice."}, {"front": "What real-world example is given to illustrate the consequences of ignoring Chesterton's Fence in a business context?", "back": "A company eliminating its quality assurance (QA) department to cut costs, only to face a flood of defective products, customer complaints, and costly recalls later."}, {"front": "What was the 'fence' in the company's quality assurance department example, and what happened when it was removed?", "back": "The QA department itself was the 'fence,' perceived as bureaucratic overhead. Its removal led to defective products and significantly higher costs due to recalls and customer complaints."}, {"front": "How does the removal of financial regulations illustrate Chesterton's Fence?", "back": "Financial deregulation in the late 1990s and early 2000s removed rules put in place after the Great Depression. These rules seemed outdated until the 2008 financial crisis demonstrated their continued necessity."}, {"front": "What did the 2008 financial crisis reveal about the forgotten reasons for financial regulations?", "back": "It demonstrated that the original reasons for those rules, which were to prevent banks from taking excessive risks, had not disappeared but had merely been forgotten, leading to renewed crisis."}, {"front": "What is identified as the 'deepest lesson' of Chesterton's Fence?", "back": "Intellectual humility, which asks us to consider that previous generations or decision-makers may have had valid reasons for their actions, even if those reasons are not immediately apparent to us."}, {"front": "How does Chesterton's Fence promote intellectual humility?", "back": "It asks us to consider the possibility that those who came before us were not stupid and may have known something we do not, urging us to understand their problems before declaring their solutions pointless."}, {"front": "What assumption does Chesterton's Fence ask us to make about those who established existing rules or institutions?", "back": "It asks us to assume that 'some person had some reason' for establishing them, rather than assuming they were arbitrary or foolish."}, {"front": "Briefly describe G.K. Chesterton's contributions.", "back": "He was an English writer, philosopher, and literary critic, known for his wit, paradoxes, and prolific output (over eighty books, thousands of essays, hundreds of poems)."}, {"front": "Why is Chesterton's 'Fence' principle appealing to both conservative and reformist thought?", "back": "It appeals to both by demanding intellectual rigor before action; conservatives appreciate caution, while reformers value understanding before making effective, rather than ignorant, changes."}, {"front": "How might Chesterton's Fence relate to 'The Lindy Effect' (a concept from the same chapter)?", "back": "Both suggest that long-standing institutions or ideas (like a fence that has been there for a long time) may have survived for good reasons and possess hidden robustness, implying caution before removal."}, {"front": "How does Chesterton's Fence relate to 'Second-Order Effects' (a concept from another chapter)?", "back": "Chesterton's Fence warns that the problems a 'fence' solves may only become visible through the negative second-order effects that appear *after* the fence is removed, highlighting unseen consequences."}, {"front": "When encountering a rule that seems pointless, what approach would Chesterton's Fence suggest before deciding to remove it?", "back": "First, research and understand why the rule was originally created, whether the original problem is still present, or if the situation has genuinely changed before making a judgment."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
