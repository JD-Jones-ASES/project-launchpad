<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 29, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define \"underdetermination\" in the context of scientific reasoning.", "back": "Underdetermination is the concept that for any given body of observational data, there are always multiple competing theories that fit the observations equally well, making it impossible for the data alone to determine which theory is correct."}, {"front": "Who are the key figures associated with formalizing the concept of underdetermination, often called the Duhem-Quine thesis?", "back": "Pierre Duhem (1906) and W. V. O. Quine (1951)."}, {"front": "What is the core \"uncomfortable fact\" about scientific reasoning that underdetermination highlights?", "back": "The uncomfortable fact is that the evidence never fully determines which theory is correct, as multiple theories can always fit observations equally well."}, {"front": "What did the initial comparison between the Ptolemaic and Copernican models of the solar system reveal about the power of observational data?", "back": "Around 1550, both models predicted planetary positions with roughly comparable accuracy, demonstrating that the best observational data alone could not definitively choose between them."}, {"front": "How did the Ptolemaic model manage to maintain its viability for so long despite being geocentric?", "back": "It used a complex system of epicycles (circles within circles) that could be adjusted to match almost any observation, making it highly flexible."}, {"front": "What was an initial weakness of the Copernican model that prevented its immediate acceptance based purely on observations?", "back": "It was initially less accurate than the Ptolemaic model because Copernicus kept the assumption of perfect circular orbits instead of ellipses."}, {"front": "Name three significant scientific advancements or discoveries that eventually tipped the balance in favor of the Copernican model over the Ptolemaic model.", "back": "Kepler's discovery of elliptical orbits, Galileo's telescopic observations (e.g., Venus's phases, Jupiter's moons), and Newton's theory of universal gravitation."}, {"front": "How did Kepler's discovery contribute to the eventual acceptance of the heliocentric model?", "back": "Kepler's discovery that planetary orbits are ellipses made the heliocentric model far more elegant and predictive than the Ptolemaic system."}, {"front": "What specific observations by Galileo provided strong, though not strictly impossible to accommodate, evidence against the Ptolemaic framework?", "back": "His telescopic observations of the phases of Venus (which indicated it orbited the Sun) and the moons orbiting Jupiter (which showed not everything orbited Earth)."}, {"front": "How did Isaac Newton's work further support the Copernican model and demonstrate its \"unifying power\"?", "back": "The Copernican model opened the door to Newton's universal gravitation, which unified terrestrial and celestial mechanics under a single set of laws in a way the Ptolemaic system never could."}, {"front": "Beyond pure observational data, what other types of criteria or \"virtues\" played a crucial role in the eventual acceptance of the Copernican model?", "back": "Values such as simplicity, elegance, unifying power, and fruitfulness for future research."}, {"front": "Explain Pierre Duhem's related point about testing hypotheses, often called the \"holism of testing.\"", "back": "Duhem argued that one can never test a single hypothesis in isolation; every experiment relies on a web of background assumptions. If results are unexpected, something in the web is wrong, but the experiment alone can't pinpoint which part."}, {"front": "According to Duhem's holism, if an experiment produces an unexpected result, what are some possibilities for where the error might lie?", "back": "The hypothesis itself might be wrong, the instrument used might be miscalibrated, or there might be a confounding variable that was not accounted for."}, {"front": "How did W. V. O. Quine extend Duhem's thesis in 1951?", "back": "Quine argued that our entire system of beliefs faces experience as a whole, meaning any belief can be maintained in the face of any evidence by making adjustments elsewhere in the system."}, {"front": "What is the \"strongest form\" of the Duhem-Quine thesis regarding how we can respond to contradictory evidence?", "back": "Any belief can be maintained in the face of any evidence, provided we are willing to make adjustments elsewhere in the system of beliefs."}, {"front": "What fundamental philosophical puzzle does the Duhem-Quine thesis raise about the nature of science?", "back": "If evidence alone cannot force us to accept or reject any particular theory, what makes science more than just storytelling or arbitrary choices?"}, {"front": "What is the pragmatic answer most working scientists give to the puzzle posed by underdetermination?", "back": "They choose theories that are simpler, more fruitful, more unifying, and better at generating new predictions because these criteria have an extraordinary track record, even if not logically guaranteed to lead to truth."}, {"front": "How does the text describe the relationship between evidence and theory choice, challenging the idea that \"the data proves it\"?", "back": "It's more complex; theory choice depends not only on evidence but also on theoretical virtues. Science is described as the disciplined management of underdetermination rather than simple deduction from data to truth."}, {"front": "List four theoretical virtues that help guide theory choice in the face of underdetermination.", "back": "Simplicity, elegance, unifying power, and fruitfulness for future research/generating new predictions."}, {"front": "Provide a real-world example of underdetermination in the field of medical diagnosis.", "back": "A patient's symptoms (e.g., fatigue, weight loss, joint pain) are often consistent with dozens of conditions, requiring doctors to use background knowledge, additional tests, and clinical judgment beyond just the symptoms to narrow the diagnosis."}, {"front": "Provide a real-world example of underdetermination in the field of historical explanation.", "back": "The fall of Rome, where surviving evidence is consistent with multiple proposed explanations (e.g., economic decline, military overextension, barbarian invasion), and the 'correct' answer depends on which evidence is emphasized and the framework used."}, {"front": "How does underdetermination apply to the field of data science or machine learning?", "back": "In machine learning, any dataset can be fit by infinitely many models of varying complexity. The 'art of modeling' involves choosing the right level of complexity (simple enough to generalize, complex enough to capture patterns), which is underdetermination in practice."}, {"front": "Which two related philosophical concepts are mentioned as connections to the theme of underdetermination?", "back": "Occam's Razor and Falsifiability."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
