    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 29, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'Cargo Cult Science' according to Richard Feynman?", "back": "Research that mimics the outward form of science (hypotheses, data collection, statistical analysis, publication) but lacks its essential substance: a ruthless commitment to not fooling oneself."}, {"front": "What is the anthropological origin of the term 'cargo cults' that Feynman referenced?", "back": "During WWII, Pacific islanders built imitation airstrips and equipment, hoping to make cargo planes return, replicating the *form* of an airfield without understanding the *substance* (the logistics and operations) of the supply chain."}, {"front": "When and where did Richard Feynman introduce the concept of 'Cargo Cult Science'?", "back": "In his 1974 commencement address at Caltech."}, {"front": "What did Feynman identify as the 'first principle' of scientific integrity?", "back": "You must not fool yourself—and you are the easiest person to fool."}, {"front": "According to Feynman, what is the 'substance' that cargo cult science is missing, beyond just the visible forms?", "back": "A radical honesty and a ruthless commitment to self-correction, ensuring one does not deceive oneself by only seeing what they wish to see."}, {"front": "Name two specific practices Feynman advocated for to avoid cargo cult science and ensure true scientific rigor.", "back": "1. Reporting all results, not just those that support your hypothesis. 2. Describing experiment conditions precisely enough for others to reproduce it."}, {"front": "What is another key practice Feynman suggested for scientific integrity, related to testing theories?", "back": "Actively seeking out reasons why your theory might fail, rather than designing experiments solely to confirm it."}, {"front": "How might a pharmaceutical company engage in cargo cult science regarding drug trials?", "back": "By running multiple trials of a drug, and then publishing only the one that, by chance, produced a positive result, while ignoring many null or negative findings."}, {"front": "Describe a common scenario of cargo cult science in social psychology.", "back": "A lab discovers a 'priming effect' using a small, specific sample (e.g., forty undergraduates), publishes it, but the finding later fails to replicate across different studies or populations."}, {"front": "How can nutritional epidemiology fall into the trap of cargo cult science?", "back": "By 'data-dredging': testing thousands of dietary variables against thousands of health outcomes and then selectively announcing only a few 'statistically significant' links, which may be spurious."}, {"front": "How do the incentive structures of modern academia sometimes work against true scientific integrity, fostering cargo cult science?", "back": "Scientists are often rewarded for publishing novel, positive results, which discourages replication studies, null findings, or slower, more cautious research."}, {"front": "What is the 'replication crisis' and how does Feynman's concept of cargo cult science explain it?", "back": "The 'replication crisis' is when many published scientific findings (especially in psychology/medicine) cannot be reproduced. Feynman would see it as a cargo cult crisis where the outward forms of science were maintained, but the inner commitment to self-correction eroded."}, {"front": "What did the 2015 Open Science Collaboration attempt reveal about the replication crisis in psychology?", "back": "They attempted to replicate 100 published psychology studies, and fewer than half produced the same results, often due to original studies using small samples, flexible statistical methods, and selective reporting."}, {"front": "What specific temptation must scientists resist regarding the presentation of their conclusions?", "back": "The temptation to present conclusions with more confidence than the actual evidence warrants."}, {"front": "When is it especially important for scientists to uphold the demanding standards of radical honesty, even if it's difficult?", "back": "Especially when doing so threatens their career, funding, or reputation."}, {"front": "How does Feynman's call for 'actively seeking out reasons your theory might fail' connect to the concept of falsifiability?", "back": "It aligns directly with falsifiability, a key scientific principle stating that a theory must be testable and capable of being proven false, encouraging robust experimental design that challenges assumptions rather than merely confirming them."}, {"front": "Feynman stated, 'you are the easiest person to fool.' What cognitive bias does this directly relate to?", "back": "Confirmation bias, which is the tendency to seek, interpret, and favor information that confirms one's own beliefs or hypotheses, making self-deception particularly easy for individuals, including scientists."}, {"front": "Is peer review alone sufficient to help scientists catch their own self-deception, according to the 'thinkaboutit' prompt?", "back": "The text implies it may not be sufficient, prompting consideration of what other practices or institutional mechanisms might be needed to bolster scientific integrity beyond peer review."}, {"front": "How can the concept of cargo cult science apply to business or corporate settings?", "back": "Companies that track many Key Performance Indicators (KPIs) and celebrate only those trending upward are engaging in cargo cult science; the dashboard looks rigorous, but the analysis is designed to confirm success rather than to truly test and understand performance."}, {"front": "What is the distinction between the 'form' and the 'substance' of science in the context of Cargo Cult Science?", "back": "The 'form' refers to the visible, superficial aspects like hypotheses, data, statistics, and publications. The 'substance' is the underlying, rigorous commitment to truth, self-correction, and not fooling oneself, which gives the form meaning."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
