    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 32, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who created the allegory of 'Mr. Market'?", "back": "Benjamin Graham, introduced in his 1949 book, The Intelligent Investor."}, {"front": "According to Warren Buffett, what is one of the most important ideas in investing?", "back": "Benjamin Graham's allegory of Mr. Market."}, {"front": "In the 'Mr. Market' allegory, what does Mr. Market represent?", "back": "A hypothetical business partner whose mood swings dramatically, unpredictably, and often irrationally, offering to buy or sell shares. Metaphorically, he embodies the emotional and volatile fluctuations of financial markets or broader public sentiment."}, {"front": "Describe Mr. Market's typical 'moods' and how they affect his offers.", "back": "He can be euphoric (offering extravagant prices due to optimism) or despondent (offering steep discounts due to pessimism). These moods are often unrelated to the actual performance of the underlying business."}, {"front": "What is the crucial point for an investor when dealing with Mr. Market's offers?", "back": "You are not obligated to trade with him. You can choose to buy, sell, or ignore him based on your own independent judgment of the underlying value."}, {"front": "How does an investor gain an advantage from Mr. Market's emotional volatility?", "back": "By recognizing that his mood swings create opportunities (to buy low when he's despondent or sell high when he's euphoric), rather than obligations to react emotionally."}, {"front": "What is the core distinction Benjamin Graham made that the Mr. Market allegory vividly illustrates?", "back": "The fundamental distinction between price (what Mr. Market offers based on his mood) and value (what the business is actually worth based on its fundamentals)."}, {"front": "How do stock prices fluctuate compared to the underlying value of a business?", "back": "Stock prices can fluctuate daily and wildly due to Mr. Market's mood, but the underlying value of the businesses those stocks represent changes far more slowly and fundamentally."}, {"front": "Give an example of how Mr. Market's mood (stock price) can diverge significantly from a company's underlying reality.", "back": "A company's stock price might drop 20% in a day, but its factories, patents, customer base, or long-term prospects (its underlying value) have not changed that rapidly."}, {"front": "Beyond financial markets, where else can the 'Mr. Market' allegory apply?", "back": "Any situation where public opinion, market sentiment, or social pressure fluctuates more wildly than the underlying reality (e.g., political approval ratings, restaurant popularity, social media trends for ideas)."}, {"front": "What key discipline does the 'Mr. Market' allegory teach individuals?", "back": "The discipline of independent judgment, encouraging one to evaluate reality based on analysis rather than reacting to crowd sentiment."}, {"front": "Instead of asking 'What is Mr. Market's opinion today?', what question should one prioritize?", "back": "One should ask, 'What is the underlying reality?'"}, {"front": "What is the proper role of Mr. Market in one's decision-making, according to Graham?", "back": "Mr. Market is there to serve you (by offering prices that create opportunities), not to guide or instruct you (by dictating your judgment or actions)."}, {"front": "Who is Benjamin Graham often regarded as in the field of finance?", "back": "The father of value investing."}, {"front": "Name two influential books authored or co-authored by Benjamin Graham that established the foundations of value investing.", "back": "Security Analysis (1934, with David Dodd) and The Intelligent Investor (1949)."}, {"front": "How did Warren Buffett famously describe 'The Intelligent Investor'?", "back": "As the best book on investing ever written."}, {"front": "Explain the 'Mr. Market' lesson as applied to the March 2020 market crash.", "back": "The S&P 500 lost a third of its value and then recovered within months. This reflected Mr. Market's panic and subsequent regaining of composure, not that businesses fundamentally lost and regained a third of their value. Investors who sold at the bottom followed Mr. Market's mood; those who held or bought used him as a servant."}, {"front": "How does the 'Mr. Market' concept apply to career decisions?", "back": "When a field becomes 'hot' or 'falls out of fashion,' Mr. Market (public sentiment/trends) is bidding up or marking down its perceived value. The underlying value of one's skills and the satisfaction derived from the work typically change much more slowly than these trends."}, {"front": "How can the 'Mr. Market' allegory be applied to social media and public opinion regarding individuals or ideas?", "back": "A public figure or idea praised one week and vilified the next has not fundamentally changed. Mr. Market (public sentiment) has simply swung. This teaches the discipline of evaluating based on actual merits, not the crowd's current mood."}, {"front": "Summarize the core message of the key concept: 'The Market Makes Offers; You Are Not Obligated to Accept'.", "back": "Mr. Market's daily offers reflect his mood, not necessarily reality. Your advantage lies in independent judgment: evaluate the underlying value, ignore the noise of fleeting sentiment, and only trade when the price is dramatically different from that value. Mr. Market is there to serve you, not to instruct you."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
