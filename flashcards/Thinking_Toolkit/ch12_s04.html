<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 12, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'Utility Monster' thought experiment?", "back": "A thought experiment by Robert Nozick designed as a reductio ad absurdum of classical utilitarianism, featuring a creature that derives vastly more pleasure from resources than ordinary people."}, {"front": "Who introduced the Utility Monster thought experiment and in what work?", "back": "Robert Nozick, in his 1974 book *Anarchy, State, and Utopia*."}, {"front": "Describe the Utility Monster's capacity for pleasure compared to an ordinary person.", "back": "The Utility Monster derives enormously more pleasure (e.g., ecstatic, overwhelming joy) from every unit of resource than any ordinary person, often by a factor of thousands."}, {"front": "According to simple utilitarianism, what action would maximize total happiness in the Utility Monster scenario?", "back": "Giving all resources (every dollar, meal, etc.) to the Utility Monster, as it derives the most pleasure from them, thereby maximizing total happiness."}, {"front": "What is the 'grotesque' result of applying simple utilitarianism to the Utility Monster scenario?", "back": "Everyone else is impoverished and stripped of all resources, while the monster feasts, and the utilitarian must approve because total happiness has been maximized."}, {"front": "What fundamental flaw in utilitarian thinking does Nozick believe the Utility Monster reveals?", "back": "Utilitarianism has no internal mechanism to prevent one entity's enormous capacity for pleasure from consuming everyone else's resources, treating people as mere vessels for happiness rather than individuals with rights."}, {"front": "How does simple utilitarianism treat 'people' according to Nozick?", "back": "It treats people as mere 'vessels for happiness' rather than as individuals with their own inherent rights and claims."}, {"front": "What is Nozick's 'structural point' revealed by the Utility Monster, even if the creature isn't realistic?", "back": "Any theory focused solely on maximizing total welfare is vulnerable to scenarios where a wildly unequal distribution is deemed 'optimal' if one entity has a disproportionate capacity for pleasure."}, {"front": "In less fantastical terms, when does the ethical 'worry' surfaced by the Utility Monster arise in real-world ethics?", "back": "Whenever harming a minority is justified for the benefit of a majority, such as the dilemma of torturing one innocent person for the immense happiness of millions of spectators."}, {"front": "How does the Utility Monster highlight the sharp divergence between consequentialism and rights-based ethics?", "back": "Consequentialism prioritizes the best outcome (total happiness), while rights-based ethics asserts that some things may not be done to a person regardless of the outcome, due to individual rights."}, {"front": "What is the core principle of a consequentialist regarding the 'right action'?", "back": "The right action is the one that produces the best overall outcome."}, {"front": "What is the core principle of a rights theorist regarding actions against individuals?", "back": "Some things may not be done to a person, regardless of the outcome, because individuals possess fundamental rights."}, {"front": "Explain 'diminishing marginal utility' as a utilitarian response to the Utility Monster.", "back": "This response argues that in practice, each additional unit of a resource provides less happiness than the last. If utility diminishes fast enough, an equal distribution might actually maximize total happiness."}, {"front": "How does 'rule utilitarianism' address the Utility Monster problem?", "back": "Rule utilitarians consider which rules would maximize happiness if everyone followed them. A rule allowing one entity to commandeer all resources would lead to long-term instability and unhappiness, so it would be prohibited."}, {"front": "How does 'preference utilitarianism' avoid the Utility Monster's conclusion?", "back": "Preference utilitarianism maximizes the satisfaction of people's actual preferences. Since no one prefers to be stripped of resources for a monster's benefit, this approach wouldn't endorse the monster's feasting."}, {"front": "What is Nozick's counter-argument regarding the utilitarian responses to the Utility Monster?", "back": "He argues that these responses concede his point, as they introduce considerations (diminishing utility, rules, preferences) beyond pure total happiness maximization, thus modifying or supplementing simple utilitarianism."}, {"front": "According to the text, what is the core 'limit of pure utilitarianism' that the Utility Monster illustrates?", "back": "If the only thing that matters morally is maximizing total happiness, then any being with a sufficiently large capacity for pleasure can justify absorbing everyone else's resources, violating intuitions about fairness and individual rights."}, {"front": "Give an example of a real-world debate where the logic of the Utility Monster appears.", "back": "Examples include investing disproportionately in gifted students for higher social return, giving an entire bonus pool to the top salesperson, or allocating scarce organs to patients who will gain the most life-years."}, {"front": "What competing claims arise in real-world scenarios applying the 'give to whoever benefits most' logic?", "back": "Competing claims of fairness, equal treatment, and individual rights clash with the utilitarian logic of maximizing overall benefit."}, {"front": "Why is the Utility Monster considered a 'reductio ad absurdum'?", "back": "Because it pushes the logic of classical utilitarianism to an extreme, absurd conclusion (everyone impoverished for one's extreme pleasure), thereby demonstrating a fundamental flaw."}, {"front": "What is the central ethical dilemma the Utility Monster forces an individual to decide on?", "back": "Whether one stands on the side of maximizing overall outcomes (consequentialism) or upholding individual rights and limitations on what can be done to a person, regardless of the outcome."}, {"front": "Which other philosophical problem is mentioned as an instance where consequentialist and deontological intuitions collide?", "back": "The Trolley Problem."}, {"front": "What alternative framework is mentioned that protects the worst-off rather than maximizing total welfare?", "back": "Rawls's Veil of Ignorance."}, {"front": "The Utility Monster reveals that a moral theory focused exclusively on ______ can produce results that violate our deepest intuitions about fairness and individual rights.", "back": "aggregate welfare (or total happiness)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
