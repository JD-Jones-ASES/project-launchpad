    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 12, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Non-Identity Problem, as identified by Derek Parfit?", "back": "A philosophical puzzle challenging our assumptions about harm, obligation, and the ethics of future generations, arising when a decision affects both the conditions of future lives and the identity of the people who will live them."}, {"front": "Who introduced the Non-Identity Problem and in what significant work?", "back": "Derek Parfit, in his 1984 book 'Reasons and Persons'."}, {"front": "Describe Parfit's initial hypothetical scenario involving two energy policies.", "back": "A government chooses between Policy A (clean, expensive, preserves environment for future generations) and Policy B (cheap, dirty, causes significant environmental degradation for future generations)."}, {"front": "What is the common moral intuition regarding Policy B (the dirty policy) before considering the Non-Identity Problem?", "back": "Most people feel that Policy B is wrong, believing that we owe future generations a livable planet."}, {"front": "What is the critical 'unsettling complication' Parfit identified regarding the choice between Policy A and Policy B?", "back": "The choice affects everything about the future, including who meets whom, who has children, and when they are conceived, meaning the specific people born under Policy A would be entirely different individuals from those born under Policy B."}, {"front": "Why can't the specific people living in the degraded world of Policy B claim they have been 'harmed'?", "back": "Their only alternative was nonexistence. If Policy A had been chosen, they would not have been born at all. As long as their lives are at least marginally worth living, they cannot claim to have been made worse off."}, {"front": "What fundamental question does the Non-Identity Problem force us to ask about harm?", "back": "'So who, exactly, has been harmed?' since there's no identifiable victim who is made worse off compared to their alternative (non-existence)."}, {"front": "When does the Non-Identity Problem generally arise?", "back": "Whenever a decision affects both the conditions of future lives AND the identity of the people who will live them."}, {"front": "Provide an example of a long-term societal decision, mentioned in the text, that leads to the Non-Identity Problem.", "back": "Environmental policies, medical advances, or even personal choices like when to have children."}, {"front": "How do standard moral concepts like 'harm,' 'rights,' and 'obligations' struggle with the Non-Identity Problem?", "back": "These concepts typically require an identifiable victim who is made worse off, but the Non-Identity Problem eliminates such a victim because the alternative for those specific individuals was non-existence."}, {"front": "Explain the 'impersonal value' approach as a proposed solution to the Non-Identity Problem.", "back": "This approach suggests that what matters is whether the overall state of the world is better or worse, regardless of who inhabits it. Policy A produces a better world regardless of specific identities."}, {"front": "What is the major criticism or difficulty associated with the 'impersonal value' approach?", "back": "It can lead to the Repugnant Conclusion, where a vast population of barely-happy people might be considered better than a small population of very happy ones if total impersonal value is the sole criterion."}, {"front": "Explain the 'rights-based' approach as a proposed solution to the Non-Identity Problem.", "back": "This approach argues that future people have a right to a certain quality of life, regardless of whether they could have existed under alternative policies."}, {"front": "What is the primary challenge in applying a 'rights-based' approach to the Non-Identity Problem?", "back": "It is difficult to specify what this right consists of when the very existence of the right-holder depends on the policy in question."}, {"front": "Explain the 'contractualism' approach (following T. M. Scanlon) as a proposed solution to the Non-Identity Problem.", "back": "An action is wrong if it violates principles that no one could reasonably reject. This approach would argue that no one could reasonably reject a principle requiring us to leave a habitable planet."}, {"front": "What is the 'circular situation' that arises when applying contractualism to the Non-Identity Problem?", "back": "The 'no one' who must reasonably reject a principle would need to include people who do not yet exist and whose existence depends on our choices, creating a circular argument."}, {"front": "How did Derek Parfit himself assess the significance and difficulty of the Non-Identity Problem?", "back": "He considered it one of the most important and difficult challenges in ethics, not merely an academic exercise."}, {"front": "How is the Non-Identity Problem directly relevant to climate change policy?", "back": "If we adopt aggressive emissions reductions, the specific people born in the future will be different from those born under a high-emissions scenario. Future inhabitants of the high-emissions world cannot claim harm, yet we believe we have obligations to them."}, {"front": "What fundamental aspect of moral theories does the Non-Identity Problem challenge and what does it suggest ethics may need to account for?", "back": "It challenges person-centered moral theories and suggests that ethics may need to account for impersonal values, focusing on the quality of outcomes rather than just the welfare of identifiable individuals."}, {"front": "What real-world policy discussions frequently encounter versions of the Non-Identity Problem?", "back": "Climate policy, genetic engineering, and long-term resource management."}, {"front": "What is the core takeaway regarding our obligations to future generations, despite the puzzle posed by non-identity?", "back": "We feel certain that we owe something to future generations, but our standard philosophical tools struggle to explain exactly what we owe and to whom."}, {"front": "What does the Non-Identity Problem imply about the concept of 'harm'?", "back": "It implies that 'harm' is typically understood as making an identifiable individual worse off than they would have been, a condition that doesn't hold when the alternative is non-existence for that specific individual."}, {"front": "Can bringing someone into existence, even into a less-than-ideal life, be considered 'harm' according to the Non-Identity Problem's logic?", "back": "No, as long as their life is at least marginally worth living, they cannot claim to have been harmed because the only alternative for them was non-existence."}, {"front": "Beyond energy policies, what specific types of personal decisions are mentioned as potentially triggering the Non-Identity Problem?", "back": "When to have children, or where to live, as these choices directly affect which specific individuals come into existence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
