<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Zeno of Elea and when did he live?", "back": "An ancient Greek philosopher who lived c. 490–c. 430 BC, known primarily through his paradoxes.", "id": "fc01"}, {"front": "What was the main philosophical goal Zeno's paradoxes aimed to achieve?", "back": "To defend the philosophy of his teacher Parmenides by demonstrating that concepts of motion and change lead to logical contradictions.", "id": "fc02"}, {"front": "What core idea did Zeno's teacher, Parmenides, propose about reality?", "back": "Parmenides argued that all change and motion are illusions, and that reality is fundamentally one, unchanging, and indivisible.", "id": "fc03"}, {"front": "Briefly explain the paradox known as 'Achilles and the Tortoise'.", "back": "Achilles, the fast runner, gives a slower tortoise a head start. The paradox argues Achilles can never overtake the tortoise because he must always first reach the point where the tortoise *was*, by which time the tortoise has moved a new, albeit smaller, distance ahead, creating an ever-decreasing, infinite gap.", "id": "fc04"}, {"front": "What is the apparent contradiction presented by the 'Achilles and the Tortoise' paradox?", "back": "It conflicts with our experiential knowledge (Achilles clearly overtakes) by presenting a seemingly logical argument that suggests he cannot, challenging our intuitive understanding of motion and space.", "id": "fc05"}, {"front": "Describe the 'Dichotomy Paradox' (forward version).", "back": "Before one can cross any distance, one must first cross half of it, then half of the remaining half, and so on, infinitely. This implies completing an infinite number of sub-journeys, which seems impossible in a finite amount of time.", "id": "fc06"}, {"front": "Describe the 'Dichotomy Paradox' (backward version).", "back": "Before motion can even begin, one must first reach the halfway point, but before that, the quarter-mark, then the eighth-mark, and so on. This implies completing an infinite number of tasks before even starting, suggesting motion cannot commence.", "id": "fc07"}, {"front": "What was Zeno's deeper philosophical point with his paradoxes, beyond simply questioning whether motion happens?", "back": "Zeno aimed to show that if our fundamental concepts of space, time, and motion lead to logical contradictions, then those concepts themselves must be flawed, thereby supporting Parmenides' view that perceived motion is an illusion.", "id": "fc08"}, {"front": "How did philosophers initially react to Zeno's paradoxes for much of history?", "back": "With frustration and 'hand-waving.' Diogenes the Cynic's act of simply standing up and walking, while satisfying theatrically, offered no logical refutation.", "id": "fc09"}, {"front": "Why was Diogenes' physical demonstration insufficient as a logical refutation of Zeno's paradoxes?", "back": "Zeno was not questioning whether motion *occurs*, but whether our *description* of motion through infinitely divisible space is logically coherent and free of contradictions.", "id": "fc10"}, {"front": "What major mathematical development eventually provided a resolution to Zeno's paradoxes?", "back": "The development of rigorous theories of infinite series and limits in the nineteenth century.", "id": "fc11"}, {"front": "How do infinite series and limits resolve the apparent contradictions in Zeno's paradoxes?", "back": "They demonstrate that an infinite number of quantities can sum to a finite total (a convergent series), meaning infinitely many tasks can indeed be completed in a finite amount of time, provided each task takes proportionally less time.", "id": "fc12"}, {"front": "Provide a mathematical example that illustrates how an infinite series can sum to a finite total.", "back": "The series 1/2 + 1/4 + 1/8 + 1/16 + ... converges to exactly 1. This shows how an infinite number of decreasing steps can cover a finite distance.", "id": "fc13"}, {"front": "What significant influence did Zeno's paradoxes have on the development of mathematics?", "back": "They forced the development of rigorous mathematical analysis, contributed to the foundations of calculus, and continue to inform debates about the nature of space, time, and continuity.", "id": "fc14"}, {"front": "What did Aristotle credit Zeno with inventing?", "back": "Dialectic, which is defined as the art of arguing by drawing contradictions from an opponent's assumptions.", "id": "fc15"}, {"front": "What 'genuine gap' in ancient mathematics did Zeno's paradoxes expose?", "back": "They revealed the lack of a proper mathematical framework for handling the concept of infinity, particularly how infinite processes can yield finite outcomes, taking two millennia to fill.", "id": "fc16"}, {"front": "Describe a real-world application of Zeno's principles in computer science.", "back": "In computer science, processes that 'converge' (getting closer and closer to a correct answer without ever reaching it exactly, such as iterative algorithms) are direct descendants of Zeno's concepts.", "id": "fc17"}, {"front": "How do Zeno's ideas manifest in numerical methods in engineering?", "back": "Numerical methods rely on iterative improvements—getting 'close enough' to a solution. The philosophical question of whether 'close enough' is the same as 'there' has practical stakes in engineering applications like bridge design or rocket landings.", "id": "fc18"}, {"front": "What is the key takeaway regarding the resolution of Zeno's paradoxes, according to the text's 'keyconcept' summary?", "back": "The paradoxes are not refuted by simply observing motion, but resolved by understanding what 'infinity' actually means through mathematical precision, demonstrating that infinite series can converge to finite sums.", "id": "fc19"}, {"front": "How do Zeno's paradoxes challenge our intuitive understanding of reality?", "back": "They demonstrate that our intuitive concepts of space, time, and motion, when examined rigorously, can lead to apparent logical contradictions, prompting a deeper philosophical and mathematical inquiry into their true nature.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
