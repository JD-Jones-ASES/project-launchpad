<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Zeno of Elea and when did he live?", "back": "A Greek philosopher (c. 490–c. 430 BC), student of Parmenides, known for his paradoxes concerning motion and infinity."}, {"front": "What was the primary purpose of Zeno's paradoxes?", "back": "To defend the philosophy of his teacher, Parmenides, by showing that motion leads to logical contradictions, implying motion and change are illusions."}, {"front": "Which ancient philosopher reported Zeno's paradoxes, and in which work?", "back": "Aristotle, in his work *Physics*."}, {"front": "What was the core philosophical tenet of Parmenides that Zeno sought to defend?", "back": "Parmenides argued that reality is fundamentally one, unchanging, and indivisible, and that the world of change and motion we perceive is an illusion."}, {"front": "Briefly describe the 'Achilles and the Tortoise' paradox.", "back": "Achilles races a tortoise with a head start. By the time Achilles reaches the tortoise's previous position, the tortoise has moved slightly ahead. This process repeats infinitely, making it seem Achilles can never overtake the tortoise."}, {"front": "What is the apparent logical contradiction presented by the Achilles paradox?", "back": "It suggests that despite experience, Achilles can never close the gap entirely and overtake the tortoise, as he must complete an infinite series of shrinking distances."}, {"front": "Describe the 'Dichotomy' paradox in its forward form.", "back": "To cross any distance, one must first cross half the distance, then half of the remaining half, and so on, requiring the completion of an infinite number of sub-journeys in a finite time."}, {"front": "How does the 'Dichotomy' paradox challenge the *beginning* of motion?", "back": "To reach any point, one must first reach the halfway point, then the quarter-mark, then the eighth-mark, etc. This implies one must complete infinitely many tasks before even starting to move."}, {"front": "What fundamental issue did Zeno believe his paradoxes exposed about our concepts of space, time, and motion?", "back": "That if these concepts lead to contradictions, then there is something fundamentally wrong with them, supporting the idea that motion is an illusion."}, {"front": "How did Diogenes the Cynic famously attempt to 'refute' Zeno, and why was this considered logically insufficient?", "back": "Diogenes reportedly stood up and walked across the room. This was satisfying as theater but useless as logic because Zeno's question was about logical coherence, not whether motion empirically happens."}, {"front": "What major mathematical development provided the rigorous resolution to Zeno's paradoxes?", "back": "The development of rigorous theories of infinite series and limits in the nineteenth century."}, {"front": "What is the key mathematical principle that resolves Zeno's paradoxes regarding the completion of infinite tasks?", "back": "An infinite number of quantities can sum to a finite total, meaning infinitely many tasks can be completed in a finite amount of time if each subsequent task takes proportionally less time."}, {"front": "Provide the mathematical example from the text illustrating how an infinite series can converge to a finite sum.", "back": "The series $1/2 + 1/4 + 1/8 + 1/16 + \\dots$ converges to exactly 1."}, {"front": "According to the mathematical resolution, why can Achilles complete his infinite number of sub-journeys in a finite time?", "back": "Each subsequent sub-journey takes a proportionally smaller amount of time, so the sum of these infinitely many time intervals is finite."}, {"front": "What significant impact did Zeno's paradoxes have on the development of mathematics?", "back": "They forced the development of rigorous mathematical analysis, contributed to the foundations of calculus, and exposed a genuine gap in ancient mathematics."}, {"front": "Besides mathematics, what other philosophical debates do Zeno's paradoxes continue to inform?", "back": "Debates about the nature of space, time, and continuity."}, {"front": "What intellectual skill did Aristotle credit Zeno with inventing?", "back": "Dialectic."}, {"front": "What is 'dialectic' as Aristotle defined it, and how does it relate to Zeno's method?", "back": "The art of arguing by drawing contradictions from an opponent's assumptions. Zeno used this to show contradictions in the assumption of motion through divisible space."}, {"front": "Why are Zeno's paradoxes considered more than just 'word games' or philosophical puzzles?", "back": "They exposed a genuine gap in ancient mathematics regarding the understanding of infinity that took over two millennia to fill, leading to profound mathematical advancements."}, {"front": "How do Zeno's paradoxes find practical application in modern fields like computer science or engineering?", "back": "They relate to processes that 'converge,' like numerical methods that iterate to get closer and closer to a correct answer, or algorithms that stop when an answer is 'close enough.'"}, {"front": "What is the ultimate takeaway about 'infinity' derived from the resolution of Zeno's paradoxes?", "back": "That 'infinity' needs proper mathematical understanding; infinite series can converge to finite sums, meaning infinitely many tasks can indeed be completed in finite time, contrary to intuition."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
