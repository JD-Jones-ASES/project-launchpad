<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 23, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "From what field did the concept of \"Margin of Safety\" originally emerge?", "back": "Engineering, where structures are designed to bear loads far beyond their expected maximum."}, {"front": "Who introduced the \"Margin of Safety\" concept to investment thinking, and in which major works?", "back": "Benjamin Graham, in his books *Security Analysis* (1934) and *The Intelligent Investor* (1949)."}, {"front": "What did Warren Buffett famously call \"the three most important words in investing\"?", "back": "\"Margin of Safety.\""}, {"front": "How does an engineer define \"Margin of Safety\" when designing a structure like a bridge?", "back": "It is the difference between the bridge's expected load and its actual capacity, designed to absorb unpredictable factors like heavier traffic, material fatigue, or extreme weather."}, {"front": "What is the core principle behind the \"Margin of Safety\" in any context?", "back": "To build in room to be wrong without catastrophe, acknowledging that errors and unexpected events are inevitable."}, {"front": "How did Benjamin Graham translate the engineering \"Margin of Safety\" into investment strategy?", "back": "He argued investors should buy securities only when the market price is substantially below their estimate of the security's intrinsic value."}, {"front": "In investing, if you estimate a company is intrinsically worth $100 per share, what price would Benjamin Graham suggest you buy at to establish a margin of safety?", "back": "A price substantially below $100, such as $60 or $70, to absorb errors in your estimation of intrinsic value."}, {"front": "What is the primary benefit of having a \"Margin of Safety\" in investing?", "back": "It absorbs errors of estimation and unexpected negative events, reducing potential losses even if the initial valuation was significantly wrong."}, {"front": "According to Warren Buffett's extended thinking, why is a thin \"Margin of Safety\" still risky even if the math seems to work?", "back": "Because any single estimate (e.g., truck weight, bridge capacity) might be off, and a combination of multiple small errors can lead to catastrophe."}, {"front": "Give an example of applying \"Margin of Safety\" to time management.", "back": "If a task is expected to take three hours, block out four hours to account for unexpected delays or complications."}, {"front": "How does the \"Margin of Safety\" principle apply to personal financial planning?", "back": "By maintaining emergency reserves for expenses that cannot be predicted, such as job loss or unexpected medical bills."}, {"front": "In project management, what does \"Margin of Safety\" typically involve?", "back": "Building in buffer time for delays that are consistently underestimated due to the Planning Fallacy."}, {"front": "How can one apply the \"Margin of Safety\" principle to personal health?", "back": "By maintaining fitness and health above the minimum rather than at the minimum, so that an illness or injury does not immediately lead to a crisis."}, {"front": "What is the main \"cost\" associated with implementing a \"Margin of Safety\"?", "back": "Inefficiency; for example, a stronger bridge uses more material, or emergency funds earn less than invested capital."}, {"front": "Why is the \"Margin of Safety\" not considered \"waste\" despite its cost in efficiency?", "back": "It acts as insurance against the unexpected, which is a certainty in complex systems, ensuring survival when conditions deviate from expectations."}, {"front": "Who was Benjamin Graham, and what is his legacy in finance?", "back": "A British-born American economist, investor, and professor, widely regarded as the father of value investing and security analysis, who greatly influenced investors like Warren Buffett."}, {"front": "What real-world event is cited as a prime example of \"Margin of Safety\" saving lives?", "back": "The Apollo 13 mission, where redundant systems and repurposable components (like the Lunar Module) provided crucial buffers against an unforeseen explosion."}, {"front": "What was the ultimate outcome of the Apollo 13 incident regarding \"Margin of Safety\"?", "back": "The margins of safety built into the spacecraft did not prevent the failure but made the failure survivable for the crew."}, {"front": "Which psychological bias, mentioned in the text, emphasizes the need for buffer time in planning, thereby reinforcing the \"Margin of Safety\" principle?", "back": "The Planning Fallacy, which describes our tendency to underestimate the time and resources needed for tasks."}, {"front": "Which principle, also mentioned in the text, suggests that if something can go wrong, it will, thereby highlighting the necessity of a \"Margin of Safety\"?", "back": "Murphy's Law."}, {"front": "What is the ultimate benefit of designing systems, plans, and investments with a \"Margin of Safety\"?", "back": "Survival and resilience when conditions inevitably deviate from expectations and errors occur."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
