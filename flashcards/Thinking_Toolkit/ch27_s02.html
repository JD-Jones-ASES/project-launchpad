<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 27, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental question does the Halting Problem ask?", "back": "Given a computer program and its input, will the program eventually stop running (halt), or will it run forever in an infinite loop?", "id": "fc01"}, {"front": "Who proved the Halting Problem, and in what year?", "back": "Alan Turing, in his 1936 paper “On Computable Numbers, with an Application to the Entscheidungsproblem.”", "id": "fc02"}, {"front": "What does it mean for the Halting Problem to be 'undecidable'?", "back": "It means there is no algorithm (no general-purpose program) that can solve it for all possible programs and inputs.", "id": "fc03"}, {"front": "What is the core implication of the Halting Problem for computing power?", "back": "It establishes fundamental limits on what any computer, no matter how powerful or sophisticated, can ever do.", "id": "fc04"}, {"front": "What strategy does Turing's proof of the Halting Problem use?", "back": "It uses a self-referential strategy and proof by contradiction, similar to G\"odel's incompleteness proof.", "id": "fc05"}, {"front": "Briefly describe the initial assumption made in Turing's proof by contradiction.", "back": "It assumes, for the sake of contradiction, that a universal 'halting detector' program, $H$, exists which can correctly determine if any program $P$ with input $I$ will halt or loop.", "id": "fc06"}, {"front": "How is the 'diabolical' program $D$ constructed in Turing's proof?", "back": "Program $D$ takes a program $P$ as input. It then asks the hypothetical halting detector $H(P, P)$ if $P$ halts when given itself as input. If $H$ says 'halts,' $D$ goes into an infinite loop. If $H$ says 'loops,' $D$ halts immediately.", "id": "fc07"}, {"front": "What is the crucial step in Turing's proof involving program $D$?", "back": "The crucial step is to run program $D$ on itself, i.e., $D(D)$, and observe the outcome predicted by $H$ versus the actual behavior of $D$.", "id": "fc08"}, {"front": "Explain the contradiction that arises when running $D(D)$.", "back": "If $H(D, D)$ says 'halts,' then by $D$'s construction, $D$ loops forever (contradiction). If $H(D, D)$ says 'loops,' then by $D$'s construction, $D$ halts immediately (contradiction). In either case, $H$ gives the wrong answer.", "id": "fc09"}, {"front": "What is the conclusion derived from the contradiction in Turing's proof?", "back": "Since the assumption of a universal halting detector $H$ leads to a contradiction, such a program $H$ cannot exist. Therefore, the Halting Problem is undecidable.", "id": "fc10"}, {"front": "How does the Halting Problem relate to G\"odel's incompleteness theorems?", "back": "Both results are deeply connected; G\"odel showed unprovable mathematical truths, and Turing showed unanswerable computational questions. Both use self-reference to defeat claims of universality.", "id": "fc11"}, {"front": "Is the Halting Problem a limitation of current technology or a mathematical impossibility?", "back": "It is a mathematical impossibility—a permanent, theoretical boundary on the power of computation, not a practical limitation that can be overcome by faster or more sophisticated computers.", "id": "fc12"}, {"front": "Who was Alan Turing, and what was his primary contribution related to the Halting Problem?", "back": "Alan Turing was a British mathematician and pioneer of computer science. He formalized computation with the 'Turing machine' and proved the undecidability of the Halting Problem, founding computability theory.", "id": "fc13"}, {"front": "Provide a real-world example of an undecidable problem derived from the Halting Problem related to software security.", "back": "No antivirus program can perfectly detect all possible malware, because determining if a program is malicious often reduces to the Halting Problem (e.g., determining if it halts after performing a harmful action).", "id": "fc14"}, {"front": "How does the Halting Problem affect compiler optimization?", "back": "No compiler can perfectly optimize all code because tasks like determining whether 'dead code' (unreachable code) is truly unreachable are undecidable, stemming from the Halting Problem.", "id": "fc15"}, {"front": "What are the implications of the Halting Problem for universal program verification tools?", "back": "While specific program verification techniques exist, no universal automated verifier can exist to prove that all programs are bug-free, as proving program correctness often involves solving undecidable problems.", "id": "fc16"}, {"front": "Why is it important to understand that 'Some Questions Are Provably Unanswerable by Algorithms'?", "back": "This concept, demonstrated by the Halting Problem, defines fundamental, permanent boundaries of what computation can achieve, informing research and development in computer science.", "id": "fc17"}, {"front": "Could an infinitely fast supercomputer with unlimited memory solve the Halting Problem?", "back": "No. The Halting Problem is a theoretical, mathematical impossibility, not a resource-bound problem. Even with infinite resources, no algorithm can solve it for all cases.", "id": "fc18"}, {"front": "In the context of the proof, what would happen if program 'D' did not do the 'opposite' of what H predicts?", "back": "If 'D' did not do the opposite, it would not create the self-referential paradox required for the contradiction. The proof relies on 'D' always behaving counter to H's prediction about it.", "id": "fc19"}, {"front": "What other computational limitation is mentioned in relation to the Halting Problem?", "back": "P vs. NP, which deals with computational hardness (problems that are solvable but take too much time) rather than impossibility, is mentioned as a different kind of computational limitation.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
