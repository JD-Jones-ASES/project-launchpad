    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 31, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the '10/10/10 Rule' in decision-making?", "back": "A simple framework, introduced by Suzy Welch, for breaking through short-term emotion and gaining clarity in difficult decisions."}, {"front": "Who developed and popularized the 10/10/10 rule?", "back": "Suzy Welch, in her 2009 book '10-10-10: A Life-Transforming Idea.'"}, {"front": "What is the primary purpose of using the 10/10/10 rule?", "back": "To overcome short-term emotional responses and gain a longer-term perspective when making difficult decisions, especially when emotions are running high."}, {"front": "What are the three core questions asked when applying the 10/10/10 rule?", "back": "How will I feel about this decision in 10 minutes? How will I feel about it in 10 months? How will I feel about it in 10 years?"}, {"front": "What is the 'power' or main benefit of the 10/10/10 rule?", "back": "It exposes the gap between short-term emotion and long-term value, showing how decisions that feel urgent and consequential in the moment may look very different over time."}, {"front": "How does the 10/10/10 rule help in differentiating between short-term comfort and long-term value?", "back": "It forces you to step outside the emotional immediacy of the present and consider whether your decision optimizes for immediate satisfaction or enduring benefit."}, {"front": "Give an example of how the 10/10/10 rule might apply to sending a heated email.", "back": "Sending a blistering reply might feel satisfying in 10 minutes, but could damage working relationships in 10 months, and likely won't matter at all in 10 years."}, {"front": "How can the 10/10/10 rule be used when considering a career promotion requiring relocation to an undesirable city?", "back": "In 10 minutes, the flattery feels wonderful. In 10 months, you might be miserable. In 10 years, the career advancement might have opened significant doors, or the misery might have led you to quit the company entirely."}, {"front": "Does the 10/10/10 framework always provide a clear, definitive answer?", "back": "No, it does not always produce a clear answer, but it reliably produces better thinking by prompting consideration of different time horizons."}, {"front": "What types of decisions is the 10/10/10 rule particularly useful for?", "back": "Decisions driven by strong emotions such as anger, excitement, fear, romantic infatuation, or social pressure, which tend to be powerful in the short-term but fade over time."}, {"front": "According to the 10/10/10 rule, what characterizes 'the best decisions'?", "back": "The best decisions are those that hold up well and feel good across all three time horizons: 10 minutes, 10 months, and 10 years."}, {"front": "Apply the 10/10/10 rule to the decision of making an impulse purchase versus consistent saving.", "back": "Impulse purchases score high at 10 minutes (retail therapy) but low at 10 months (buyer's remorse). Consistent saving scores low at 10 minutes (boring) but high at 10 years (financial security)."}, {"front": "How does the 10/10/10 framework help analyze the decision to avoid a necessary but uncomfortable conversation?", "back": "Avoiding it feels good at 10 minutes. At 10 months, the unresolved issue may have festered. At 10 years, you might regret the avoidance more than the awkwardness."}, {"front": "Use the 10/10/10 rule to evaluate a health choice like skipping a workout.", "back": "Skipping a workout feels great at 10 minutes. At 10 months, the habit of skipping might be ingrained. At 10 years, the cumulative effect of consistent avoidance—or consistent exercise—is transformative."}, {"front": "What is the core insight revealed by the 'gap' between how a decision feels at 10 minutes, 10 months, and 10 years?", "back": "This gap reveals whether you are primarily being guided by short-term emotion or by a consideration of long-term value."}, {"front": "Why is it important to consider how a decision will look 'when the emotion has subsided'?", "back": "Strong emotions are powerful in the 10-minute window but tend to fade over 10 months. The 10/10/10 rule helps assess if the decision still holds merit beyond that initial emotional peak."}, {"front": "What common pitfall does the 10/10/10 rule help you avoid?", "back": "Making decisions based solely on immediate emotional gratification or urgent pressure, without considering their lasting impact or consequences."}, {"front": "Can the best decision for 'ten minutes from now' also be the best decision for 'ten years from now'?", "back": "Often, the best decision for ten minutes from now is not the best decision for ten years from now—and vice versa. The rule highlights this potential conflict."}, {"front": "What broader goal does the 10/10/10 rule support in decision-making?", "back": "It encourages optimizing for long-term value and well-being over short-term comfort or immediate emotional impulses."}, {"front": "Name two other decision-making concepts related to the 10/10/10 rule, as mentioned in the text's 'connections' section.", "back": "Regret Minimization, Loss Aversion, Peak-End Rule, Eisenhower Matrix (any two of these)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
