    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 16, Section 7</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Keynesian Beauty Contest analogy?", "back": "It's an analogy introduced by John Maynard Keynes to describe speculative behavior in financial markets, where success depends on predicting what others will choose, not on objective value."}, {"front": "Who introduced the Keynesian Beauty Contest analogy and in what work?", "back": "John Maynard Keynes introduced it in his 1936 work, 'The General Theory of Employment, Interest and Money'."}, {"front": "Describe the rules of the newspaper beauty contest as described by Keynes.", "back": "Readers choose six prettiest faces from a hundred photos. The prize goes not to those who pick the objectively prettiest, but to those whose selections most closely match the average selections of all other participants."}, {"front": "What is the optimal strategy for a participant in the Keynesian beauty contest?", "back": "The winning strategy is to anticipate what others think others think others think will be chosen, leading to a potentially infinite regress of expectations about expectations."}, {"front": "Explain the 'infinite regress of expectations' in this context.", "back": "It refers to the escalating chain of reasoning where individuals try to predict what others will predict about what others will find appealing or valuable, rather than relying on personal judgment."}, {"front": "How does Keynes apply this beauty contest analogy to financial markets?", "back": "He suggests that stock prices reflect not a company's underlying value, but what investors believe other investors believe the stock is worth."}, {"front": "According to Keynes, what primarily drives stock prices in a market influenced by the beauty contest?", "back": "Stock prices are driven by investors' expectations about other investors' expectations, rather than the company's fundamental value (revenue, earnings, growth prospects)."}, {"front": "What is an investor truly purchasing when participating in a financial market exhibiting Keynesian beauty contest dynamics?", "back": "The investor is buying a prediction about other people's predictions regarding the stock's future price, not the company's underlying assets or earnings."}, {"front": "In a Keynesian beauty contest scenario, when is buying an overvalued stock considered a rational purchase?", "back": "It is rational if the investor believes other investors will push its price even higher, allowing for a profitable resale, despite acknowledging its overvaluation by fundamental measures."}, {"front": "Why does the Keynesian beauty contest behavior create a peculiar kind of instability in financial markets?", "back": "It dissolves the 'anchor' of fundamental value, allowing prices to detach and be driven solely by recursive expectations, leading to prolonged overvaluation and sudden crashes."}, {"front": "What does it mean for the 'anchor' to dissolve in a beauty contest market?", "back": "It means prices are no longer tied to a company's underlying earnings or value, removing the fundamental justification that would eventually support or fail to support a stock's price."}, {"front": "When do prices crash in a market driven by the Keynesian beauty contest dynamics?", "back": "Prices crash when the recursive reasoning of 'I know it's overpriced, but I think someone else will pay even more' stops working, and investors no longer believe someone else will buy at a higher price."}, {"front": "List examples of real-world situations, beyond stock markets, where the Keynesian beauty contest structure applies.", "back": "Fashion trends, viral content, political primary elections, and cryptocurrency speculation are all situations where success depends on predicting what others will do."}, {"front": "In situations governed by the beauty contest, what matters more than the 'fundamental' quality of the thing?", "back": "The social dynamics of belief about belief (i.e., collective expectations about what others expect) matter more than the inherent quality."}, {"front": "Summarize the core concept of 'Pricing on What Others Think Others Think'.", "back": "In competitive prediction environments, the optimal strategy is not to identify the objectively 'best' option but to predict what others will choose, creating recursive layers of expectation that can detach collective behavior from underlying fundamentals."}, {"front": "How does the dot-com bubble of the late 1990s illustrate the Keynesian beauty contest?", "back": "Many investors acknowledged that technology stocks were overvalued but continued buying, expecting prices to rise further, demonstrating a focus on predicting market sentiment over fundamental value."}, {"front": "Explain how social media virality reflects the Keynesian beauty contest.", "back": "Content creators optimize not for what they deem 'good' but for what they predict the algorithm and audience will reward, which is itself a prediction about what other people will engage with."}, {"front": "How do fashion trends exemplify the Keynesian beauty contest?", "back": "Designers predict what consumers will want, and consumers buy what they think others will find stylish, creating a recursive loop of trend prediction driven by social expectations."}, {"front": "How might the beauty contest concept apply to personal choices like choosing what to wear or post on social media?", "back": "Individuals often choose not based solely on personal preference but on anticipating what others will approve of or find stylish/engaging, reflecting expectations about others' expectations."}, {"front": "How does the Keynesian beauty contest relate to Game Theory?", "back": "It falls under the broader framework of strategic interaction in Game Theory, where individuals' decisions are interdependent and based on anticipating others' actions."}, {"front": "How does the beauty contest view of prices contrast with 'The Price Signal as Information'?", "back": "The beauty contest suggests prices are driven by recursive expectations, detaching them from fundamentals, whereas 'The Price Signal as Information' views prices as carriers of genuine information about underlying value."}, {"front": "What allows a stock to remain overvalued for extended periods in a beauty contest scenario?", "back": "The collective reasoning of buyers who acknowledge its overvaluation but believe someone else will pay an even higher price, sustaining the speculative bubble until beliefs change."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
