<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who developed Prospect Theory and when was it introduced?", "back": "Daniel Kahneman and Amos Tversky, in their 1979 paper “Prospect Theory: An Analysis of Decision under Risk.”"}, {"front": "What classical economic assumption did Prospect Theory challenge?", "back": "It challenged the classical assumption that people evaluate outcomes in absolute terms (total wealth) rather than relative to a reference point."}, {"front": "According to Prospect Theory, how do most people choose between a guaranteed gain of $500 and a 50% chance of gaining $1,000?", "back": "Most people are risk-averse for gains and choose the guaranteed gain of $500 (the sure thing)."}, {"front": "According to Prospect Theory, how do most people choose between a guaranteed loss of $500 and a 50% chance of losing $1,000?", "back": "Most people are risk-seeking for losses and choose the gamble (50% chance of losing $1,000) to avoid a sure loss."}, {"front": "What is the 'core insight' of Prospect Theory regarding decision-making under risk?", "back": "The framing of a choice as a gain or a loss, relative to a reference point, completely reverses people's preferences, even if the expected value is the same."}, {"front": "What is a 'reference point' in the context of Prospect Theory?", "back": "It is a starting point or baseline against which people evaluate outcomes as either a gain or a loss, rather than in absolute terms of total wealth."}, {"front": "What is the fundamental psychological asymmetry identified by Prospect Theory regarding gains and losses?", "back": "The psychological impact of moving away from a reference point is asymmetric: losses hurt more than equivalent gains feel good."}, {"front": "Roughly how much more intense is the pain of losing a given amount compared to the pleasure of gaining the same amount?", "back": "Kahneman and Tversky found the pain of losing to be roughly twice as intense as the pleasure of gaining an equivalent amount."}, {"front": "What is 'loss aversion'?", "back": "Loss aversion is a deep feature of human psychology where the pain of losing a given amount is roughly twice as intense as the pleasure of gaining the same amount."}, {"front": "Describe the 'disposition effect' in investing.", "back": "The disposition effect is the tendency for investors to hold losing investments for too long (hoping to 'get back to even') while selling winning investments too quickly (locking in small gains)."}, {"front": "How does the disposition effect relate to loss aversion?", "back": "It is explained by loss aversion because selling at a loss makes the loss feel real and final, which people try to avoid due to the disproportionate pain of loss."}, {"front": "Explain how 'framing' can influence medical decisions, using the surgeon example.", "back": "A surgeon stating '90% survival rate' gets more patient agreement than one stating '10% mortality rate,' because the first frames the outcome as a gain (survival) while the second frames it as a loss (mortality), despite identical information."}, {"front": "How do retailers apply loss aversion principles when encouraging cash payments?", "back": "By framing a credit card charge as a '$5 surcharge' (a loss) rather than a cash payment as a '$5 discount' (a gain), they more effectively drive customers to pay with cash due to loss aversion."}, {"front": "What is the 'endowment effect'?", "back": "The endowment effect is the phenomenon where people value something more once they own it, viewing giving it up as a loss relative to their ownership reference point."}, {"front": "Provide an example demonstrating the endowment effect.", "back": "In experiments, people given a coffee mug demanded roughly twice as much to sell it as others were willing to pay to buy it, because ownership created a reference point and parting with the mug felt like a loss."}, {"front": "How does loss aversion explain people's decisions regarding insurance and extended warranties?", "back": "Loss aversion explains over-insuring because the potential loss (even if unlikely) looms so large psychologically that people pay far more in premiums than the expected loss would justify."}, {"front": "What distinguishes someone who is 'risk-averse' from someone who is 'risk-seeking' in decision-making?", "back": "A risk-averse person prefers a certain outcome over a gamble of equal or greater expected value. A risk-seeking person prefers a gamble over a certain outcome of equal or greater expected value."}, {"front": "How does Prospect Theory contrast with classical economic theory's view on how people evaluate outcomes?", "back": "Classical theory assumes evaluation in absolute terms (total wealth), whereas Prospect Theory argues people evaluate outcomes relative to a flexible reference point, and losses loom larger than gains."}, {"front": "What is a key characteristic of the 'reference point' in Prospect Theory that allows for manipulation?", "back": "The reference point is flexible and manipulable, which is why framing—how information is presented—is so powerful in influencing choices."}, {"front": "What broad range of otherwise puzzling behaviors does loss aversion help explain?", "back": "Loss aversion explains behaviors such as holding losing investments too long, selling winning investments too quickly (disposition effect), the power of framing, the endowment effect, and over-insuring."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
