<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the IKEA Effect?", "back": "A cognitive bias where we place disproportionately high value on things we have had a hand in creating, even if our contribution is modest and the final product is objectively no better (or worse) than ready-made alternatives."}, {"front": "Who named and experimentally demonstrated the IKEA Effect, and when?", "back": "Michael Norton, Daniel Mochon, and Dan Ariely in a 2012 paper published in the Journal of Consumer Psychology."}, {"front": "Describe the historical precursor to the IKEA Effect involving General Mills instant cake mixes.", "back": "Sales were poor because consumers felt the 'just add water' process was too easy, lacking personal involvement. Psychologist Ernest Dichter suggested requiring bakers to add a fresh egg, creating a sense of labor and creation, which significantly boosted sales."}, {"front": "What fundamental human need or psychological factor drives the IKEA Effect?", "back": "The sense of personal involvement, labor, and creation; the feeling that the product or idea is 'theirs' or an extension of their identity."}, {"front": "How did experiments with IKEA storage boxes demonstrate this effect?", "back": "Participants who assembled storage boxes consistently valued their own handiwork significantly more than identical boxes assembled by someone else."}, {"front": "What did the origami experiment reveal about the IKEA Effect regarding objective quality?", "back": "Participants who built origami rated their own 'clumsy' creations almost as favorably as expert-made origami, while outside observers clearly noted the quality gap."}, {"front": "What crucial condition must be met for the IKEA Effect to occur?", "back": "Successful completion of the creation task. If participants were prevented from finishing, the extra valuation disappeared."}, {"front": "Does mere exposure or time spent on a task create the IKEA Effect?", "back": "No, it is the satisfaction of having finished the work. Completion transforms effort into identity, not just exposure or time."}, {"front": "How does the IKEA Effect influence our evaluation of our own ideas and work?", "back": "It systematically biases us to judge our own creations more favorably than they objectively are, making us poor judges because our 'fingerprints' are on them."}, {"front": "Provide an example of the IKEA Effect's negative impact in organizational settings.", "back": "Managers may defend their own initiatives (e.g., a restructuring plan they designed) beyond what evidence supports, because 'killing the plan feels like killing a part of themselves.'"}, {"front": "What is a positive aspect or benefit of the IKEA Effect?", "back": "The extra value we place on self-made things can increase satisfaction and engagement, such as the genuine satisfaction from a home-cooked meal, even if it's not objectively 'better.'"}, {"front": "Why might a home-cooked meal be more satisfying than an identical restaurant meal, according to the IKEA Effect?", "back": "Not necessarily because it tastes better, but because the labor invested creates a sense of accomplishment and ownership, making the process of creation part of the value."}, {"front": "Summarize the core message of 'Labor Leads to Love' in the context of the IKEA Effect.", "back": "We overvalue things we helped create, even with small contributions and mediocre results. This bias makes us poor judges of our own work."}, {"front": "What is the recommended antidote to counter the negative biases caused by the IKEA Effect?", "back": "Seek outside evaluation from people who did not participate in the building or creation process."}, {"front": "Give a real-world example of the IKEA Effect in software development.", "back": "Engineers are often reluctant to discard their own code, even when a cleaner rewrite would be better, because the original code carries the emotional weight of the hours spent writing it."}, {"front": "How do companies like Build-a-Bear leverage the IKEA Effect?", "back": "They deliberately inject customer labor (choosing fabrics, stuffing, adding a 'heart') to increase the perceived value, allowing them to charge a premium for a product the customer helped assemble."}, {"front": "How does the IKEA Effect sometimes work in concert with the Sunk-Cost Fallacy?", "back": "In situations like software development, emotional attachment to one's own created work (IKEA Effect) combines with continued investment due to past expenditures (Sunk-Cost Fallacy) to resist abandoning projects."}, {"front": "Which other cognitive bias is related to the IKEA Effect in how we misjudge our own competence?", "back": "The Dunning-Kruger Effect, where individuals with low ability overestimate their own competence."}, {"front": "Explain the connection between the IKEA Effect and Confirmation Bias.", "back": "The IKEA Effect leads us to value our creations, and Confirmation Bias then makes us seek out and favor evidence that supports the idea that our creations are indeed good."}, {"front": "When is the IKEA Effect 'not always a distortion'?", "back": "It's not always a distortion when the process of creation itself genuinely contributes to satisfaction and engagement, such as the personal fulfillment from cooking a meal or building a hobby project."}, {"front": "In the context of the IKEA Effect, what does it mean to 'systematically bias' creators?", "back": "It means that creators are consistently and predictably prone to make non-objective judgments about their own work, favoring it due to their involvement rather than its actual merits."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
