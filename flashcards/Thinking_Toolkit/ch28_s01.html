<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 28, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Enrico Fermi, and what is he renowned for?", "back": "Enrico Fermi was an Italian-American physicist, Nobel laureate, and a central figure in the Manhattan Project. He was legendary for his ability to make quick, surprisingly accurate estimates from minimal data, which now bear his name."}, {"front": "What classic problem is famously associated with Fermi estimation?", "back": "Enrico Fermi's classic question: 'How many piano tuners are in Chicago?'"}, {"front": "Define Fermi estimation.", "back": "Fermi estimation is the art of arriving at useful approximate answers to questions that seem unanswerable, by decomposing them into tractable sub-problems and combining rough estimates."}, {"front": "What is the fundamental approach of Fermi estimation?", "back": "Breaking a seemingly complex or unanswerable problem into smaller, more manageable pieces, for each of which a rough estimate can be made."}, {"front": "What is the primary goal or purpose of Fermi estimation?", "back": "To arrive at useful approximate answers, often within the right order of magnitude, when precise data is unavailable or impractical to obtain."}, {"front": "In the Chicago piano tuners example, what was the first estimation step?", "back": "Estimating the total population of Chicago (approximately 3 million for round numbers)."}, {"front": "After population, what was the next step in estimating Chicago's piano tuners?", "back": "Estimating the number of households in Chicago, based on average household size (e.g., 3 million people / 2.5 people/household = 1.2 million households)."}, {"front": "What fraction of households was estimated to own a piano in the Chicago example?", "back": "Approximately 1 in 20 households, or about 5%, resulting in roughly 60,000 pianos."}, {"front": "How often was a piano estimated to be tuned per year in the Fermi example?", "back": "Perhaps once or twice a year on average, approximated as 1.5 times per year (leading to 90,000 tuning jobs per year for 60,000 pianos)."}, {"front": "How many tunings could one piano tuner service per year, according to the example's estimation?", "back": "Approximately 1,000 tunings per year (based on 4 pianos/day * 250 working days/year)."}, {"front": "What was the final Fermi estimate for the number of piano tuners in Chicago?", "back": "Approximately 90 piano tuners (90,000 tuning jobs / 1,000 jobs per tuner)."}, {"front": "How accurate are Fermi estimates generally, compared to actual figures?", "back": "They are often remarkably close, typically well within the right order of magnitude (within a factor of 10 of the true answer)."}, {"front": "Explain one reason why Fermi estimation works, concerning errors.", "back": "Errors tend to cancel: When multiple independent rough estimates are made, some will be too high and some too low, partially canceling each other out to produce a more accurate final answer."}, {"front": "Explain another reason why Fermi estimation works, regarding precision.", "back": "Order of magnitude is usually enough: For many practical questions, knowing if the answer is 100 or 1,000 or 10,000 is far more useful than an exact figure. Fermi estimation reliably provides this level of approximation."}, {"front": "What is considered the 'deeper skill' behind Fermi estimation?", "back": "It is a way of thinking – a discipline of decomposition and approximate reasoning that applies to any domain where precise data is unavailable. It forces you to identify assumptions and structure ambiguous problems."}, {"front": "List three types of real-world questions where Fermi estimation is applied.", "back": "Examples include: Estimating a city's daily water usage, market size for a new product, servers needed for a major website, or checking the plausibility of a business plan's revenue projection."}, {"front": "How does Fermi estimation relate to 'first-principles thinking'?", "back": "It is, in essence, first-principles thinking applied to quantitative estimation, involving reasoning from foundational components and explicit assumptions rather than relying on existing analogies."}, {"front": "What was Enrico Fermi's contribution to the Manhattan Project?", "back": "He was a central figure, leading the team that created the first controlled nuclear chain reaction in 1942."}, {"front": "What is the 'Fermi Paradox'?", "back": "Enrico Fermi's famous question concerning the apparent contradiction between the high probability of extraterrestrial life and the lack of evidence for it: 'Where is everybody?'"}, {"front": "How do scientists and engineers utilize Fermi estimation?", "back": "Physicists use it to quickly check the plausibility of a calculation's result before investing time in detailed computation. Engineers use it for preliminary feasibility assessments and design estimates."}, {"front": "How is Fermi estimation used in business and consulting?", "back": "Startups use it to estimate market size, consultants use it to test whether a client's projections are realistic, and it helps in making initial strategic decisions."}, {"front": "Why do companies like Google use Fermi questions in job interviews?", "back": "They are less interested in the exact answer and more in the candidate's reasoning process, which reveals analytical skill, comfort with uncertainty, and the ability to structure ambiguous problems."}, {"front": "Which cognitive bias can Fermi estimation help to correct?", "back": "The Planning Fallacy, by providing a structured method for making more realistic, approximate projections and counteracting overly optimistic estimates."}, {"front": "What is emphasized as the crucial aspect of the Fermi estimation process for useful results?", "back": "Identifying the right sub-questions, making assumptions explicit, and ensuring the reasoning process is sound, rather than just the arithmetic precision."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
