<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 28, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What real-world game show inspired the Monty Hall Problem?", "back": "The American television game show \"Let's Make a Deal,\" hosted by Monty Hall.", "id": "fc01"}, {"front": "Who famously published the correct solution to the Monty Hall Problem in 1990?", "back": "Marilyn vos Savant, in her Parade magazine column.", "id": "fc02"}, {"front": "What was the initial reaction to Marilyn vos Savant's published solution?", "back": "Thousands of angry letters, many from PhD mathematicians, insisted she was wrong, despite her being correct.", "id": "fc03"}, {"front": "Describe the initial setup of the Monty Hall Problem for the contestant.", "back": "Three doors stand before you. Behind one is a car; behind the other two are goats. You pick one door.", "id": "fc04"}, {"front": "After the contestant picks a door, what specific action does Monty Hall take?", "back": "Monty, who knows where the car is, opens a *different* door, *always* revealing a goat.", "id": "fc05"}, {"front": "What crucial question does Monty Hall ask the contestant after revealing a goat?", "back": "\"Would you like to switch to the other unopened door?\"", "id": "fc06"}, {"front": "What is the common, intuitive answer to whether one should switch doors?", "back": "Most people believe it does not matter, thinking there are two doors left, so the odds are 50/50.", "id": "fc07"}, {"front": "Is the common intuition about the Monty Hall Problem correct?", "back": "No, the common intuition is wrong. The odds are not 50/50.", "id": "fc08"}, {"front": "What is the correct strategy in the Monty Hall Problem?", "back": "You should always switch doors.", "id": "fc09"}, {"front": "Quantify the probability of winning if you switch doors.", "back": "Switching gives you a 2/3 chance of winning.", "id": "fc10"}, {"front": "Quantify the probability of winning if you stay with your initial door choice.", "back": "Staying with your initial choice gives you only a 1/3 chance of winning.", "id": "fc11"}, {"front": "Why does the common intuition that the odds are 50/50 fail in the Monty Hall Problem?", "back": "It fails because it treats the two remaining doors as equally likely, ignoring the information provided by the host's non-random action.", "id": "fc12"}, {"front": "What critical detail about Monty's action affects the probabilities?", "back": "Monty *always* opens a door with a goat, *never* the car door, and *never* your chosen door. His action is constrained by his knowledge and is not random.", "id": "fc13"}, {"front": "Describe Case 1 for switching: The car is behind your initial door (1/3 probability).", "back": "If the car is behind your initial door, Monty opens a goat door. If you switch, you get a goat (switching loses).", "id": "fc14"}, {"front": "Describe Case 2 for switching: The car is behind an unpicked door (1/3 probability).", "back": "If the car is behind an unpicked door, Monty *must* open the *other* unpicked door revealing a goat. If you switch to the car door, you win (switching wins).", "id": "fc15"}, {"front": "How does the initial 2/3 probability that the car is behind one of the *other two* doors shift after Monty opens a goat door?", "back": "That 2/3 probability concentrates entirely on the *one remaining unopened door*, because Monty was forced to avoid the car. Your initial door still holds its 1/3 chance.", "id": "fc16"}, {"front": "How does a version of the problem with 100 doors help clarify the solution?", "back": "If you pick one door (1/100 chance) and Monty opens 98 goat doors, it becomes intuitively clear the remaining single door holds almost all the probability (99/100), making switching the obvious choice.", "id": "fc17"}, {"front": "What does the controversy surrounding the Monty Hall Problem demonstrate about human intuition regarding probability?", "back": "It demonstrates that even people trained in probability can be fooled by problems where a knowledgeable agent alters the information landscape, highlighting the limits of intuition.", "id": "fc18"}, {"front": "What key mathematical concept does the Monty Hall Problem powerfully demonstrate?", "back": "Conditional probability — probability updated by new information, which often does not align with our initial intuitions.", "id": "fc19"}, {"front": "What is the general lesson from the Monty Hall Problem regarding agents and options?", "back": "Whenever a knowledgeable agent filters options, the remaining options are *not* equally likely because the agent's constrained behavior transfers information.", "id": "fc20"}, {"front": "Provide a real-world application of the Monty Hall logic in a medical context.", "back": "A doctor ruling out certain diagnoses (based on expert knowledge) changes the probabilities of the remaining diagnoses, which are not simply split evenly among what's left.", "id": "fc21"}, {"front": "Provide a real-world application of the Monty Hall logic in a hiring context.", "back": "When a recruiter eliminates job candidates based on information, the surviving candidates are not a random sample of the original pool; their probabilities of selection are updated unequally.", "id": "fc22"}, {"front": "The Monty Hall Problem is connected to which other probability-related concepts mentioned in the text?", "back": "Base Rate Neglect, The Gambler's Fallacy, and Simpson's Paradox.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
