<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the origin of the phrase 'Catch-22'?", "back": "The phrase 'Catch-22' was introduced into English by Joseph Heller's 1961 novel, *Catch-22*.", "id": "fc01"}, {"front": "In Joseph Heller's novel, what is Yossarian's main goal?", "back": "Yossarian, a bombardier in World War II, wants to be grounded from flying dangerous combat missions.", "id": "fc02"}, {"front": "Explain the specific Catch-22 Yossarian faces in the novel.", "back": "The rule states that anyone insane can be grounded by asking. However, asking to be grounded proves rationality (because only a sane person would want to avoid danger), thus disqualifying him from being grounded. If truly insane, he wouldn't ask.", "id": "fc03"}, {"front": "What does the novel's Catch-22 demonstrate about self-referential rules?", "back": "The rule defeats itself; the very act of trying to use it disqualifies you from its protection, making escape logically impossible.", "id": "fc04"}, {"front": "What is the general definition of a Catch-22 in everyday terms?", "back": "A Catch-22 is any situation where the rules create a logical loop that makes the desired outcome impossible.", "id": "fc05"}, {"front": "What is the 'defining feature' of a Catch-22?", "back": "The defining feature is 'self-reference': the rule refers to itself in a way that guarantees its own enforcement, regardless of one's actions.", "id": "fc06"}, {"front": "Why is a Catch-22 difficult to escape, even when the trap is visible?", "back": "Because the trap is built into the logic of the rule itself; seeing it doesn't help you escape because the rule's internal structure prevents a solution from within the system.", "id": "fc07"}, {"front": "Describe the 'experience paradox' as an everyday Catch-22 example.", "back": "You need experience to get a job, but you need a job to get experience. Many entry-level positions require prior experience.", "id": "fc08"}, {"front": "Provide an example of a 'bureaucratic loop' Catch-22.", "back": "To get a driver's license, you need a birth certificate. To get a birth certificate, you need a valid photo ID. To get a valid photo ID, you need your driver's license.", "id": "fc09"}, {"front": "How do 'insurance catch-22s' typically manifest?", "back": "You cannot get health insurance because of a pre-existing condition, but the condition is considered 'pre-existing' only because you didn't have insurance when it was diagnosed.", "id": "fc10"}, {"front": "Explain the 'credit history' Catch-22.", "back": "You cannot get a credit card because you have no credit history, and you cannot build a credit history because no one will give you a credit card.", "id": "fc11"}, {"front": "Are Catch-22s in systems typically fixable by individuals working within the system?", "back": "No, Catch-22s are often 'bugs' that no individual within the system has the authority or incentive to fix. Each rule might make sense on its own, but their interaction creates the trap.", "id": "fc12"}, {"front": "What is the primary way to break out of a Catch-22?", "back": "Catch-22s are broken not by working within the rules, but by changing them or by finding a path outside the logical loop.", "id": "fc13"}, {"front": "How can the 'experience paradox' Catch-22 be solved?", "back": "It can be solved by introducing new variables like internships, volunteer work, or side projects that build experience without requiring a traditional job.", "id": "fc14"}, {"front": "How can the 'credit-history' Catch-22 be solved?", "back": "It can be solved by introducing new variables like secured credit cards or authorized-user arrangements.", "id": "fc15"}, {"front": "What is the common structure of solutions to Catch-22s?", "back": "Solutions introduce a new variable that the original logical loop did not account for, effectively bypassing the loop.", "id": "fc16"}, {"front": "What question should one ask when feeling trapped by a self-referential rule?", "back": "One should step outside the system and ask: 'What assumption is this loop built on, and can I bypass it?'", "id": "fc17"}, {"front": "Define 'Self-Defeating Rules' as a key concept.", "back": "A Catch-22 is a rule or system whose internal logic makes the desired outcome impossible. The trap is self-referential, closing every exit, and escape requires identifying and bypassing the loop's underlying assumption.", "id": "fc18"}, {"front": "Who was Joseph Heller?", "back": "Joseph Heller (1923–1999) was an American novelist, a World War II bombardier, and the author of *Catch-22*, which contributed the phrase 'catch-22' to the English language.", "id": "fc19"}, {"front": "Beyond its literary impact, what unique contribution did Heller's novel *Catch-22* make?", "back": "It introduced the phrase 'catch-22' into common English speech, making Heller one of the rare novelists to contribute a new concept to the language.", "id": "fc20"}, {"front": "What other logical concepts are related to self-referential traps, similar to Catch-22?", "back": "The Liar Paradox and Russell's Paradox are formal logical versions of self-referential traps.", "id": "fc21"}, {"front": "What diagnostic question helps determine if a problem is a Catch-22 versus a problem solvable by effort?", "back": "The diagnostic question is 'Mountain to Climb vs. Maze with No Exit,' which asks whether effort can solve the problem or if the problem is logically inescapable from within the system.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
