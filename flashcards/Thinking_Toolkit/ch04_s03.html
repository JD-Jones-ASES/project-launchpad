<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who first identified the representativeness heuristic and when?", "back": "Daniel Kahneman and Amos Tversky, in the early 1970s, exploring it in depth in their 1983 paper on the conjunction fallacy."}, {"front": "What famous problem became a key demonstration of the representativeness heuristic?", "back": "The \"Linda problem.\""}, {"front": "Describe the core premise of the 'Linda problem' that reveals the representativeness heuristic.", "back": "Participants are given a detailed description of Linda (e.g., outspoken, philosophy major, concerned with social justice) and asked to rank the probability of two statements: (a) Linda is a bank teller, and (b) Linda is a bank teller and is active in the feminist movement."}, {"front": "What is the conjunction fallacy, as demonstrated by the Linda problem?", "back": "The conjunction fallacy is the error of judging a conjunction of two events (e.g., 'bank teller AND feminist') to be more probable than one of the constituent events alone (e.g., 'bank teller')."}, {"front": "Why is judging 'Linda is a bank teller and is active in the feminist movement' as more probable than 'Linda is a bank teller' a fallacy?", "back": "Because the set of 'feminist bank tellers' is entirely contained within the set of 'bank tellers.' Adding a condition can only narrow the category, never expand its probability."}, {"front": "Define the representativeness heuristic.", "back": "It is your brain's tendency to judge the probability that something belongs to a category by how much it resembles the typical member of that category, rather than by consulting actual statistical base rates."}, {"front": "How does the representativeness heuristic explain the common error made in the Linda problem?", "back": "People build a mental portrait (stereotype) of Linda from her description. 'Feminist bank teller' matches that portrait better than 'bank teller' alone, leading them to substitute resemblance to a stereotype for actual probability."}, {"front": "What common saying is used as an analogy for the representativeness heuristic?", "back": "It is the mental equivalent of 'judging a book by its cover,' except applied to probabilities."}, {"front": "In what types of situations does the representativeness heuristic typically work well?", "back": "It works reasonably well in many everyday situations where resemblance directly correlates with probability, such as identifying an animal that looks, walks, and quacks like a duck."}, {"front": "When does the representativeness heuristic predictably fail?", "back": "It fails when resemblance and actual probability (or statistical base rates) diverge significantly."}, {"front": "Explain how the representativeness heuristic can lead to an incorrect judgment when considering if a shy, quiet, orderly person is more likely to be a librarian or a salesperson.", "back": "Most people say librarian due to resemblance to the stereotype. However, the heuristic ignores the base rate that there are far more salespeople than librarians, making it statistically more likely the person is a salesperson."}, {"front": "What fundamental cognitive substitution occurs when we use the representativeness heuristic?", "back": "The question 'How typical does this seem?' replaces the question 'How likely is this, given the numbers?'"}, {"front": "How does the representativeness heuristic manifest in hiring decisions?", "back": "Candidates who 'look the part' or resemble the mental image of a successful person in a role are rated as more likely to succeed, often regardless of actual statistical predictors of success."}, {"front": "Provide an example of the representativeness heuristic in medical diagnosis.", "back": "A patient whose symptoms 'look like' a rare disease may receive that diagnosis, even when a common condition is far more probable given the base rates."}, {"front": "How does the 'hot hand' phenomenon in basketball relate to the representativeness heuristic?", "back": "Fans perceive a player making multiple shots in a row as having a 'hot hand' (genuine skill) because the streak resembles what they think a skilled streak should look like, even if statistical analysis suggests it's often consistent with random chance."}, {"front": "Explain the 'cultural fit' trap in hiring through the lens of the representativeness heuristic.", "back": "Companies hiring for 'cultural fit' often select candidates who resemble existing team members. This feels like good judgment but systematically filters out potentially high-performing individuals who don't fit the stereotype."}, {"front": "What related cognitive error is closely associated with the representativeness heuristic, particularly concerning the ignoring of prior probabilities?", "back": "Base Rate Neglect."}, {"front": "How might Confirmation Bias relate to the representativeness heuristic?", "back": "Confirmation Bias involves seeking information that fits our existing mental images, which can reinforce judgments made based on resemblance to a stereotype formed by the representativeness heuristic."}, {"front": "What is the relationship between the Halo and Horn Effect and the representativeness heuristic?", "back": "The Halo and Horn Effect describes how one trait colors our judgment of all others. If a person 'looks the part' (representativeness), this positive impression (halo) might influence judgments about their other unrelated abilities."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
