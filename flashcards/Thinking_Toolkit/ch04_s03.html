    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'base rate neglect'?", "back": "The tendency to focus on specific evidence (e.g., a positive test result) while ignoring the prior probability (the base rate of the condition in the population)."}, {"front": "From which theoretical framework does the concept of base rate neglect emerge?", "back": "Bayesian probability theory, formalized by Thomas Bayes in the 18th century."}, {"front": "Who demonstrated that people systematically ignore base rates in the 1970s?", "back": "Kahneman and Tversky."}, {"front": "Imagine a disease affects 1 in 1,000 people. A test is 99% sensitive and 95% specific. If you test positive, what is the *common intuitive* answer for the probability you have the disease?", "back": "Most people, including doctors, answer around 95% or 99%."}, {"front": "In the medical test scenario (disease 1 in 1,000, 99% sensitive, 95% specific), what is the *actual* probability of truly having the disease given a positive test?", "back": "Approximately 1.9% (or 2%)."}, {"front": "Why can an 'accurate' test for a rare disease still yield a high proportion of false positives?", "back": "When the disease is rare, even a small false-positive rate generates a flood of false alarms that vastly outnumber the true cases. The base rate matters enormously."}, {"front": "In plain English, what does Bayes' theorem state about updating our beliefs?", "back": "The probability of a hypothesis given the evidence depends on three things: how likely the evidence is if the hypothesis is true, how likely the hypothesis was before seeing the evidence, and how likely the evidence is overall."}, {"front": "What are the three core components needed for a Bayesian calculation to find the probability of having a disease given a positive test (P(D|+))?", "back": "Prior probability (base rate, P(D)), Sensitivity (P(+|D)), and False-positive rate (P(+|not D))."}, {"front": "What is the key insight provided by Bayesian reasoning regarding diagnostic tests for rare conditions?", "back": "Even a very accurate test produces mostly false positives when the condition being tested for is rare. The prior probability (base rate) is crucial."}, {"front": "How does base rate neglect impact criminal justice decisions, particularly concerning forensic evidence like DNA matches?", "back": "A DNA profile match, even if rare (e.g., 1 in a million), can be less compelling if considering a large population or database search, as many people might share that profile. Neglecting the population base rate overestimates its strength."}, {"front": "How can base rate neglect lead to misallocated resources in public health or policy?", "back": "Screening programs for rare conditions, if base rates are ignored, may generate far more false positives than true positives, leading to unnecessary anxiety, follow-up procedures, and expense."}, {"front": "What crucial question should always be asked to avoid base rate neglect when evaluating a test or screening program?", "back": "'How good is the test relative to how common the condition is?'"}, {"front": "Explain the key concept: 'The Prior Matters'.", "back": "When evaluating evidence, you must consider how likely the hypothesis was before you saw the evidence. A positive result on an accurate test can still be a false alarm if the underlying condition is rare."}, {"front": "How did Gigerenzer's studies on mammography screening demonstrate base rate neglect among physicians?", "back": "The majority of physicians dramatically overestimated the probability that a positive mammogram indicated actual breast cancer, often estimating 80-90% when the correct answer is typically 5-15%."}, {"front": "Describe how base rate neglect is evident in airport security screening.", "back": "The base rate of any individual traveler being a genuine threat is extraordinarily low, meaning even highly accurate screening systems generate enormous numbers of false positives for every true detection."}, {"front": "If a medical test has a specificity of 95%, what is its false-positive rate?", "back": "5%. Specificity is the true negative rate, so the false-positive rate is 1 - specificity."}, {"front": "If a medical test has a sensitivity of 99%, what is its false-negative rate?", "back": "1%. Sensitivity is the true positive rate, so the false-negative rate is 1 - sensitivity."}, {"front": "What is another cognitive bias that explains how memorable events can distort our sense of frequency, related to base rate neglect?", "back": "The Availability Heuristic."}, {"front": "Which fallacy, mentioned as a connection to base rate neglect, involves misunderstanding probability sequences?", "back": "Gambler's Fallacy."}, {"front": "Which paradox, where aggregated data can reverse apparent trends, is related to understanding data contexts alongside base rates?", "back": "Simpson's Paradox."}, {"front": "Why is 'The Prior Matters' an essential takeaway from understanding base rate neglect?", "back": "Because ignoring the initial likelihood of an event (the base rate) leads to severe misjudgments of probability when new evidence is introduced, even if that evidence seems compelling on its own."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
