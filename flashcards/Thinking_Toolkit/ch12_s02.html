<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Utility Monster thought experiment, and who introduced it?", "back": "The Utility Monster is a thought experiment introduced by Robert Nozick in Anarchy, State, and Utopia (1974) to illustrate a reductio ad absurdum of classical utilitarianism."}, {"front": "Describe the core characteristic of the Utility Monster.", "back": "The Utility Monster is a hypothetical creature that derives enormously more pleasure (ecstatic, overwhelming joy) from every unit of resource than any ordinary person does (modest satisfaction)."}, {"front": "How does classical utilitarianism apply its calculus to the Utility Monster scenario?", "back": "Classical utilitarianism, which aims to maximize total happiness, dictates that all resources (dollars, meals, etc.) should be given to the Utility Monster, as its immense capacity for pleasure means this distribution would yield the highest aggregate happiness."}, {"front": "What is the 'grotesque' outcome of applying simple utilitarianism to the Utility Monster?", "back": "Everyone else is impoverished and stripped of all resources, while the monster feasts. A simple utilitarian must approve of this because total happiness has been maximized, despite the extreme inequality."}, {"front": "What fundamental flaw in utilitarian thinking does Nozick's Utility Monster aim to reveal?", "back": "It reveals that classical utilitarianism lacks an internal mechanism to prevent one entity's enormous capacity for pleasure from consuming everyone else's resources, treating people as mere vessels for happiness rather than individuals with rights."}, {"front": "Why does Nozick argue the Utility Monster reveals a 'structural' problem, even though the monster isn't real?", "back": "Nozick's point is that any theory focused solely on maximizing total welfare is vulnerable to scenarios where a wildly unequal distribution is considered 'optimal,' making the vulnerability impossible to ignore."}, {"front": "In less fantastical terms, when does the 'monster's logic' surface in real-world ethical dilemmas?", "back": "The logic appears whenever harming a minority is justified for the benefit of a majority, such as the struggle to explain why torturing one innocent person for immense happiness for millions is wrong, conflicting with individual rights."}, {"front": "How does the Utility Monster highlight the divergence between consequentialism and rights-based ethics?", "back": "It forces a choice: a consequentialist says the right action produces the best outcome, while a rights theorist says some things may not be done to a person regardless of the outcome, emphasizing individual protections over aggregate welfare."}, {"front": "What is 'diminishing marginal utility,' and how do utilitarians use it to respond to the Utility Monster problem?", "back": "Diminishing marginal utility suggests each additional unit of a resource produces less happiness than the last. If utility diminishes fast enough, an equal distribution may actually maximize total happiness, countering the monster's claim."}, {"front": "How does 'rule utilitarianism' address the Utility Monster problem?", "back": "Rule utilitarians ask which rules, if everyone followed them, would maximize happiness. A rule allowing one entity to commandeer all resources would lead to long-term instability and distrust, so a utilitarian rule would prohibit it."}, {"front": "Explain 'preference utilitarianism' and how it avoids the Utility Monster's implications.", "back": "Preference utilitarianism maximizes the satisfaction of people's actual preferences, rather than raw pleasure. Since no one prefers to be stripped of resources for a monster's benefit, this approach avoids the trap."}, {"front": "According to Nozick, what do the utilitarian responses (diminishing marginal utility, rule, and preference utilitarianism) ultimately concede?", "back": "Nozick would argue these responses concede his main point: pure, simple utilitarianism needs to be supplemented or modified with considerations beyond mere total happiness to avoid 'monstrous' conclusions."}, {"front": "What is the main takeaway regarding 'The Limits of Pure Utilitarianism' as demonstrated by the Utility Monster?", "back": "If only maximizing total happiness matters, any being with sufficient pleasure capacity can justify absorbing everyone else's resources, showing that a moral theory focused exclusively on aggregate welfare can violate intuitions about fairness and individual rights."}, {"front": "Provide a real-world example where the utilitarian logic of 'give to whoever benefits most' (like the Utility Monster) conflicts with fairness.", "back": "Examples include disproportionately investing in gifted students (highest social return), giving all bonuses to a top salesperson (generates most revenue), or allocating scarce organs based solely on life-years gained, all of which run into competing claims of fairness and equal treatment."}, {"front": "Which other philosophical thought experiments or concepts are related to the Utility Monster and its critique of consequentialism?", "back": "Related concepts include the Trolley Problem (consequentialist vs. deontological intuitions), Rawls's Veil of Ignorance (protecting the worst-off), and Parfit's Repugnant Conclusion (paradoxes of aggregating welfare)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
