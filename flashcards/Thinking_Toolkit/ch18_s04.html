<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 18, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does the planning fallacy manifest at the individual level?", "back": "Individuals systematically underestimate how long tasks will take and how much they will cost."}, {"front": "What distinguishes the organizational planning fallacy from the individual bias?", "back": "At the organizational level, it's an 'institutional epidemic' driven by structural forces beyond mere cognitive biases."}, {"front": "Who is Bent Flyvbjerg, and what did his research reveal about large-scale projects?", "back": "Bent Flyvbjerg is an economist who studied large infrastructure projects, finding that cost overruns and schedule delays are the norm, not exceptions."}, {"front": "According to Flyvbjerg's analysis, what percentage of large infrastructure projects exceed their budgets?", "back": "Nine out of ten (90%) large infrastructure projects exceed their budgets."}, {"front": "What were the average cost overruns found by Flyvbjerg for roads, rail, and buildings?", "back": "Roads: 28%; Rail: 45%; Buildings: 20%."}, {"front": "What is the 'inside view' explanation for individual planning fallacy, according to Kahneman?", "back": "Planners focus on specific project features and construct optimistic scenarios based on best-case assumptions, neglecting historical base rates of similar projects."}, {"front": "Identify one structural force that compounds the planning fallacy at the organizational level.", "back": "Incentives to underestimate; Group optimism; Complexity and interdependence."}, {"front": "Explain 'incentives to underestimate' as a cause of organizational planning fallacy.", "back": "Project proposals compete for funding, creating a structural incentive for planners to present optimistic forecasts (faster, cheaper) to win approval, even if estimates are shaded through selective emphasis."}, {"front": "What is 'strategic misrepresentation' in the context of project planning?", "back": "Flyvbjerg's term for estimates being shaded not due to planner foolishness, but because honest estimates are less likely to win competition for approval and funding."}, {"front": "How does 'group optimism' contribute to organizational planning fallacy?", "back": "Planning committees reinforce each other's optimism, and raising concerns is socially costly, leading to collective reassurance rather than genuine risk assessment."}, {"front": "Describe how 'complexity and interdependence' exacerbate the planning fallacy in large projects.", "back": "Large projects have thousands of tasks with individual uncertainties. Planners who estimate components separately systematically undercount interactions and cascading delays, leading to overall underestimates."}, {"front": "What is the most promising antidote to the organizational planning fallacy?", "back": "Reference class forecasting."}, {"front": "Define reference class forecasting.", "back": "Kahneman and Tversky's 'outside view' applied systematically, where estimates are based on the historical outcomes of similar projects rather than internal, optimistic projections of the current plan."}, {"front": "How does reference class forecasting change the fundamental question asked during project estimation?", "back": "Instead of asking 'How long will this project take, given its specific features?', it asks 'How long did similar projects actually take?'"}, {"front": "Why do organizations often resist implementing reference class forecasting?", "back": "It requires the 'painful admission' that their project is not special and that optimistic assumptions are likely wrong, which threatens the narratives used to justify the project."}, {"front": "What is 'Institutional Optimism Bias'?", "back": "At the organizational level, the planning fallacy is structurally reinforced by competitive incentives to underestimate, group dynamics that suppress dissent, and the inherent complexity of large projects."}, {"front": "How does the Sydney Opera House serve as an example of the planning fallacy?", "back": "It was originally estimated at $7 million and four years, but ultimately cost $102 million and took sixteen years because the estimate was not grounded in realistic assessment of challenges."}, {"front": "What were the cost and time overruns for the Boston Big Dig, and what drove them?", "back": "Estimated at $2.8 billion and completed in 2007 at $14.6 billion, driven by unforeseen engineering challenges, regulatory requirements, and scope changes – all predictable from the base rate of similar projects."}, {"front": "What do the Standish Group's reports consistently show about software projects and the planning fallacy?", "back": "They consistently find that the majority of software projects exceed their budgets and timelines, with large projects faring the worst, demonstrating widespread planning fallacy."}, {"front": "If a project manager wanted to apply the 'outside view' to estimate a new construction project, what steps would they take?", "back": "They would gather data on similar past construction projects (the reference class) to establish a base rate for costs and timelines, then adjust their estimate only for truly distinguishing factors, rather than building from optimistic internal projections."}, {"front": "Which other concept describes the self-referential nature of estimation errors, often making predictions about delays themselves delayed?", "back": "Hofstadter's Law."}, {"front": "What is a technique mentioned that helps surface hidden risks, countering optimistic planning?", "back": "Pre-Mortem Analysis."}, {"front": "How does 'Parkinson's Law' relate to time estimation and project work?", "back": "Parkinson's Law states that work expands to fill the time available for its completion, which can distort estimations and lead to projects taking longer than necessary."}, {"front": "Why might a planning committee member hesitate to voice concerns about an optimistic project timeline?", "back": "Because it can be socially costly, marking them as a pessimist or obstructionist who doesn't share the team's vision, leading to self-censorship and reinforcing group optimism."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
