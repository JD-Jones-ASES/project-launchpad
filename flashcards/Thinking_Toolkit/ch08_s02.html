<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central story of the Ring of Gyges?", "back": "A shepherd named Gyges discovers a ring that makes him invisible. He uses its power to seduce the queen, kill the king, and seize the throne without being held accountable."}, {"front": "In what work and by whom is the story of the Ring of Gyges recounted?", "back": "It is told by Plato's brother Glaucon in Book II of Plato's *Republic*."}, {"front": "What is Glaucon's main challenge to Socrates regarding the Ring of Gyges?", "back": "Glaucon challenges Socrates to prove that a perfectly just person, given a ring of invisibility, would behave differently (i.e., justly) than an unjust person, who would use it for personal gain. Glaucon suspects they would not."}, {"front": "What crucial philosophical question about the foundations of justice does the Ring of Gyges raise?", "back": "It asks whether we behave well because we genuinely desire to, or simply because we are afraid of the negative consequences if we do not. Is justice intrinsically valuable or merely a social contract?"}, {"front": "Explain Glaucon's argument if justice is merely a 'social contract.'", "back": "If justice is only a social contract, then the rational person who finds Gyges' ring should use it for personal gain because the contract only binds when enforcement is possible, and the ring removes enforcement."}, {"front": "What is *instrumental justice*?", "back": "Instrumental justice is the theory that we behave well because of external incentives, such as reputation, fear of punishment, or the desire for reward."}, {"front": "What is *intrinsic justice*?", "back": "Intrinsic justice is the theory that we behave well because justice is inherently valuable and constitutive of a good life; an unjust soul is considered disordered, regardless of external success."}, {"front": "How does Socrates refute Glaucon's challenge about the Ring of Gyges?", "back": "Socrates argues that an unjust person, even one who 'gets away with it,' has a disordered soul. Justice is about the internal harmony of a person's character, not external rewards or punishments."}, {"front": "According to Socrates, how does an unjust person's soul become 'disordered'?", "back": "An unjust person's soul is in chaos, ruled by appetite and desire rather than by reason, making them, in a meaningful sense, 'unfree.'"}, {"front": "Why does Plato (through Socrates) believe the tyrant who gets everything he wants is actually the most miserable person?", "back": "Because the tyrant's soul is enslaved to insatiable appetites, leading to perpetual dissatisfaction and internal disharmony, regardless of external power or wealth."}, {"front": "What does Glaucon's quote, 'No man would keep his hands off what was not his own when he could safely take what he liked,' suggest about human nature?", "back": "This quote suggests that humans are naturally self-interested and will act unjustly if they can do so without fear of consequences or accountability."}, {"front": "Why is the question 'Would you be moral if no one were watching?' considered a 'sharp diagnostic tool in ethics'?", "back": "It helps reveal not only what one believes about morality but also what one fundamentally believes about human nature and the true motivations behind ethical behavior."}, {"front": "What two fundamental theories of justice does the Ring of Gyges thought experiment help distinguish?", "back": "It helps distinguish between instrumental justice (behaving well due to external incentives) and intrinsic justice (behaving well because justice is good in itself)."}, {"front": "Provide examples of 'effective invisibility' in modern life that parallel the Ring of Gyges.", "back": "Anonymous online behavior, unsupervised authority, and transactions where no one is checking are modern parallels where people can act without perceived consequences."}, {"front": "How does the internet, in many ways, act as a 'Gyges' ring'?", "back": "The internet provides a space where people can believe they are acting without consequences or accountability, leading to behavior that reveals the relationship between character and the absence of observation."}, {"front": "What is the 'paradoxbox' in the text asking you to consider regarding the Ring of Gyges?", "back": "It asks whether one would still behave morally if completely invisible and undetectable, and what the answer reveals about one's commitment to justice and human nature."}, {"front": "What philosophical concept is implicitly challenged by Glaucon's argument that justice is merely a social contract?", "back": "The concept that justice is intrinsically valuable, good in itself, or a virtue pursued for its own sake, regardless of external outcomes."}, {"front": "What other thought experiments are mentioned as connections to the themes of the Ring of Gyges?", "back": "The Experience Machine and Rawls's Veil of Ignorance are mentioned as related thought experiments."}, {"front": "What is the underlying premise of Glaucon's challenge concerning the 'perfectly just person' and the Ring of Gyges?", "back": "Glaucon's premise is that all humans, regardless of their perceived justice, are primarily motivated by self-interest and will act unjustly if they can avoid negative consequences."}, {"front": "What internal state does Socrates associate with true freedom, in contrast to the unjust person's condition?", "back": "Socrates associates true freedom with a soul ordered by reason, not enslaved by appetites, which he argues characterizes the just person whose soul is in harmony."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
