<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, what is 'virtue' (aretē)?", "back": "Virtue (aretē) is a disposition to act at the mean between two extremes — one of excess and one of deficiency.", "id": "fc01"}, {"front": "What deceptively simple question does Aristotle open the Nicomachean Ethics with?", "back": "Aristotle opens the Nicomachean Ethics with the question: 'what is the good life?'", "id": "fc02"}, {"front": "How does Aristotle define 'the good life,' or eudaimonia?", "back": "Eudaimonia, often translated as 'happiness' or 'flourishing,' is not a feeling but an activity: the activity of living in accordance with virtue, sustained over a complete life.", "id": "fc03"}, {"front": "What is Aristotle's 'Golden Mean'?", "back": "The Golden Mean is the idea that every virtue is a mean — a sweet spot — between two corresponding vices, one of excess and one of deficiency.", "id": "fc04"}, {"front": "How does Aristotle illustrate the Golden Mean using the virtue of courage?", "back": "Courage is the mean between the vice of deficiency (cowardice) and the vice of excess (recklessness).", "id": "fc05"}, {"front": "Provide an example of a virtue and its corresponding vices of excess and deficiency, according to the Golden Mean.", "back": "Generosity is the mean between stinginess (deficiency) and extravagance (excess).", "id": "fc06"}, {"front": "Summarize Aristotle's definition of virtue from the Nicomachean Ethics, emphasizing its core components.", "back": "Virtue is 'a state of character concerned with choice, lying in a mean relative to us, this being determined by reason and in the way in which the man of practical wisdom would determine it.'", "id": "fc07"}, {"front": "What does Aristotle mean when he states that the mean is 'relative to us'?", "back": "It means the mean is not a mathematical midpoint, but is contextual. The right amount or response varies based on the individual and the specific situation (e.g., food for an athlete vs. office worker).", "id": "fc08"}, {"front": "What is 'phronesis,' and why is it crucial for finding the Golden Mean?", "back": "Phronesis is practical wisdom, the ability to perceive what a situation demands and respond appropriately. It is a skill developed through experience, reflection, and practice.", "id": "fc09"}, {"front": "How does one develop phronesis (practical wisdom)?", "back": "Phronesis is developed through experience, reflection, and practice, similar to how a skilled musician develops an ear. It cannot be learned purely from a textbook.", "id": "fc10"}, {"front": "Why does Aristotle's approach to ethics differ from a 'moral algorithm'?", "back": "He does not provide a formula for producing the right answer in every situation. Instead, he gives a framework for developing a character that tends to find the right answer.", "id": "fc11"}, {"front": "What is the primary focus of Aristotle's ethical framework regarding rules and individuals?", "back": "The focus is not on rules but on the person developing (or not developing) a virtuous character that enables them to make good choices.", "id": "fc12"}, {"front": "What is a common misreading of Aristotle's Golden Mean, and why is it incorrect?", "back": "A common misreading is 'always take the moderate position.' This is incorrect because the mean is about finding the right response for the circumstances, which may sometimes call for extreme actions.", "id": "fc13"}, {"front": "Give an example demonstrating why the Golden Mean is not always about moderation.", "back": "A person who responds moderately to a grave injustice is not virtuous; they are deficient in the virtue of righteous anger. Some situations require extreme courage or generosity.", "id": "fc14"}, {"front": "Who was Aristotle, and what was his historical relationship with Plato?", "back": "Aristotle (384–322 BC) was a Greek philosopher and polymath, a student of Plato, and later the tutor of Alexander the Great.", "id": "fc15"}, {"front": "What is Aristotle's enduring legacy in Western thought, particularly in contrast to Plato's approach to truth?", "back": "His influence is immense, writing on almost every subject. Where Plato sought truth in abstract Forms, Aristotle looked for it in the empirical world. His Nicomachean Ethics is a foundational text of moral philosophy.", "id": "fc16"}, {"front": "How can the Golden Mean framework be used as a diagnostic tool in everyday life decisions?", "back": "It helps reframe questions from 'What should I do?' to 'In which direction am I off-balance?' by identifying if one is erring toward excess or deficiency in a situation (e.g., too cautious or too reckless).", "id": "fc17"}, {"front": "How can understanding the Golden Mean help individuals improve their behavioral patterns?", "back": "People often find their characteristic errors cluster on one side of the mean (e.g., consistently too harsh or too lenient). Naming these patterns (excess or deficiency) is the first step toward correcting them.", "id": "fc18"}, {"front": "Is happiness (eudaimonia) a feeling for Aristotle? Explain.", "back": "No, for Aristotle, eudaimonia is not a feeling, but an activity: the activity of living in accordance with virtue, sustained over a complete life.", "id": "fc19"}, {"front": "What is the primary text where Aristotle discusses the Golden Mean and his ethical philosophy?", "back": "The Nicomachean Ethics.", "id": "fc20"}, {"front": "Explain the difference between finding the 'mean' and simply choosing a 'middling' option.", "back": "The mean is about the *right* response, which is situationally appropriate and determined by practical wisdom (phronesis). A middling option might be insufficient or inappropriate, not truly virtuous.", "id": "fc21"}, {"front": "What is the ultimate goal of Aristotle's ethical framework regarding an individual's character?", "back": "The ultimate goal is to develop the kind of character that tends to find the right answer consistently, fostering a virtuous disposition rather than providing a moral algorithm for every choice.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
