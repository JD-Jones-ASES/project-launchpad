    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core question addressed by the Byzantine Generals Problem?", "back": "The problem asks how loyal generals can agree on a common plan (attack or retreat) when some generals might be traitors who send conflicting messages to sabotage coordination."}, {"front": "How does the Byzantine Generals Problem differ from the Two Generals' Problem?", "back": "The Two Generals' Problem addresses coordination when messages might be lost, while the Byzantine Generals Problem asks the harder question of coordination when some participants (generals) might be actively deceptive (traitors)."}, {"front": "Describe the classic scenario of the Byzantine Generals Problem.", "back": "Several generals surround an enemy city, communicating by messenger. They must agree on a common plan, but some generals may be traitors sending conflicting messages to different loyal generals to prevent consensus."}, {"front": "What is the primary challenge loyal generals face in the Byzantine Generals Problem?", "back": "The challenge is not just communication reliability, but trust in the face of potential deception, as they cannot distinguish between honest messages and treacherous ones."}, {"front": "Who authored the foundational paper 'The Byzantine Generals Problem'?", "back": "Leslie Lamport, Robert Shostak, and Marshall Pease."}, {"front": "What mathematical condition, derived by Lamport and colleagues, determines when consensus is possible in the Byzantine Generals Problem?", "back": "Consensus is possible only if $n > 3t$, where $n$ is the total number of generals and $t$ is the number of traitors."}, {"front": "Explain the condition $n > 3t$ in practical terms for loyal and traitorous generals.", "back": "In plain English, the loyal generals must outnumber the traitors by more than two to one."}, {"front": "Can three generals (one traitor) reach consensus in the Byzantine Generals Problem? Why or why not?", "back": "No, consensus is impossible. With $n=3$ and $t=1$, the condition $n > 3t$ ($3 > 3*1$) is not met. The two loyal generals cannot tell if conflicting information comes from the traitor or a confused loyal general."}, {"front": "Can four generals (one traitor) reach consensus in the Byzantine Generals Problem? Why or why not?", "back": "Yes, consensus is possible. With $n=4$ and $t=1$, the condition $n > 3t$ ($4 > 3*1$) is met. The two honest reports from loyal generals can outnumber the one dishonest report from the traitor, allowing for majority voting."}, {"front": "Why is the Byzantine Generals Problem considered foundational in computer science?", "back": "Every distributed computer system (e.g., banking, cloud computing, aircraft control) faces analogous challenges, where components can fail in arbitrary and inconsistent ways, similar to traitors."}, {"front": "In computer science, what is a 'Byzantine failure'?", "back": "It refers to any failure mode where a component behaves inconsistently, giving different responses or information to different observers or parts of the system."}, {"front": "How does a 'Byzantine failure' differ from a 'crash failure'?", "back": "A Byzantine failure involves inconsistent or deceptive behavior, making it harder to detect and tolerate. A crash failure simply means a component stops working, which is much easier to handle."}, {"front": "What is the most famous modern application that addresses the Byzantine Generals Problem?", "back": "Blockchain technology, particularly Bitcoin, which allows for consensus among a large number of potentially dishonest or compromised computers."}, {"front": "How does blockchain technology, like Bitcoin, solve the Byzantine Generals Problem without requiring a supermajority of honest participants?", "back": "It uses proof-of-work, which makes deception computationally expensive. To corrupt the ledger, an attacker would need more computing power than the rest of the network combined."}, {"front": "What condition would an attacker need to fulfill to corrupt a blockchain ledger like Bitcoin?", "back": "The attacker would need more computing power than the rest of the network combined, a condition that economic incentives make prohibitively costly."}, {"front": "How is the Byzantine Generals Problem relevant to flight-critical aviation systems?", "back": "Such systems use redundant sensors and voting mechanisms. If one sensor gives a different reading than two others, the system trusts the majority, working as long as at most one sensor is faulty."}, {"front": "How does the Byzantine Generals Problem apply to organizational decision-making?", "back": "In any committee where some members may act in bad faith, honest members must significantly outnumber the dishonest ones for sound decisions to emerge, analogous to the $n > 3t$ rule."}, {"front": "What is the fundamental limit governing systems that must be reliable despite internal corruption, as described by 'Consensus in the Presence of Bad Actors'?", "back": "Honest participants can reach consensus only if they sufficiently outnumber the dishonest ones, typically by more than two to one, limiting the design of robust distributed systems."}, {"front": "What historical reference does the name 'Byzantine Generals Problem' allude to?", "back": "The name references the Byzantine Empire's reputation for intricate political treachery."}, {"front": "Give two examples of distributed computer systems that face the Byzantine Generals Problem.", "back": "Banking networks, cloud computing, and aircraft control systems are common examples."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
