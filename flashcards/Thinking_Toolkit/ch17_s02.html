<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Two Generals' Problem?", "back": "A classic distributed computing problem where two parties must coordinate a simultaneous action by communicating over an unreliable channel, but neither can be certain the other received the latest message.", "id": "fc01"}, {"front": "Who first described and formalized the Two Generals' Problem?", "back": "It was first described by E. A. Akkoyunlu, K. Ekanadham, and R. V. Huber in 1975, and later formalized and named by Jim Gray in 1978.", "id": "fc02"}, {"front": "Describe the scenario setup for the Two Generals' Problem.", "back": "Two allied generals are encamped on opposite sides of an enemy city. They need to attack simultaneously to win; if only one attacks, they will be defeated. They communicate via messengers through an enemy-occupied valley, where messengers may be captured.", "id": "fc03"}, {"front": "What is the critical constraint on communication in the Two Generals' Problem?", "back": "The communication channel (messengers through the valley) is unreliable, meaning any message sent might be lost or captured, and the sender cannot be certain of its delivery.", "id": "fc04"}, {"front": "What is the consequence if only one general attacks in the Two Generals' Problem?", "back": "If only one general attacks, that general will be defeated, making rational commitment to an attack impossible without certainty of the other's participation.", "id": "fc05"}, {"front": "Why does a simple 'message-acknowledgment' sequence not solve the Two Generals' Problem?", "back": "Even after multiple messages (e.g., 'Attack', 'OK', 'Got your OK'), the sender of the last message can never be certain it was received, leading to an infinite regress of acknowledgments where certainty is never achieved.", "id": "fc06"}, {"front": "What is the fundamental logical barrier preventing coordination certainty in the Two Generals' Problem?", "back": "No matter how many messages are exchanged, neither general can ever be absolutely certain that the other received the *last* critical message. Without this certainty, rational commitment to a simultaneous attack is impossible.", "id": "fc07"}, {"front": "What remarkable property does the Two Generals' Problem possess regarding its solvability?", "back": "It is provably unsolvable. No protocol, no matter how clever or complex, can guarantee coordination between two parties communicating over an unreliable channel.", "id": "fc08"}, {"front": "Briefly explain the core idea behind the proof that the Two Generals' Problem is unsolvable.", "back": "The proof uses induction: if a protocol works with 'n' messages, consider if the 'n-th' message is lost. Neither party can distinguish this from a late message, so the protocol must still work with 'n-1' messages, implying the 'n-th' was unnecessary. This contradiction, by induction, proves no finite number of messages suffices.", "id": "fc09"}, {"front": "How do humans typically handle similar coordination problems in everyday life, despite the logical impossibility of certainty?", "back": "Humans solve it by accepting less than certainty. We rely on social norms, shared expectations, and a tolerance for small risks rather than requiring absolute logical certainty.", "id": "fc10"}, {"front": "Why can't computer systems simply 'accept less than certainty' like humans do for critical transactions?", "back": "The stakes can be much higher in computer systems (e.g., online purchases). If one computer thinks a transaction succeeded while the other doesn't, it leads to significant problems, requiring a lower tolerance for failure.", "id": "fc11"}, {"front": "What is the implication of the Two Generals' Problem for building reliable distributed computer systems?", "back": "It explains why distributed computer systems are inherently difficult to build reliably, as perfect coordination over unreliable networks is impossible. Practical solutions must involve probabilistic guarantees rather than absolute certainty.", "id": "fc12"}, {"front": "Since absolute certainty is impossible, what do practical solutions for distributed coordination offer instead?", "back": "Practical solutions offer probabilistic guarantees or high reliability, meaning they are designed to work correctly most of the time but cannot guarantee 100% perfect coordination in all failure scenarios.", "id": "fc13"}, {"front": "Give an example of an Internet protocol that is a practical solution to a version of the Two Generals' Problem.", "back": "The TCP 'three-way handshake' used to establish network connections is a practical (not perfect) solution. It achieves high reliability but cannot guarantee perfect coordination in every conceivable failure state.", "id": "fc14"}, {"front": "How do business agreements mitigate the uncertainty inherent in coordination over unreliable communication?", "back": "Mechanisms like contracts, witnesses, and escrow services are used to reduce (but not eliminate) the uncertainty, providing a framework for managing risk rather than achieving perfect certainty.", "id": "fc15"}, {"front": "How do real military operations, which face a direct analogy to the Two Generals' Problem, typically address the challenge?", "back": "They use strategies like redundancy (multiple messengers, multiple communication channels) and standing orders that specify default actions if communication fails, accepting some level of risk.", "id": "fc16"}, {"front": "Which game-theoretic model is mentioned as related to coordination under uncertainty?", "back": "The Stag Hunt.", "id": "fc17"}, {"front": "What is the Byzantine Generals Problem, and how does it relate to the Two Generals' Problem?", "back": "It's a harder version of the Two Generals' Problem that also includes the possibility of traitorous participants (nodes that might send false messages), making coordination even more complex.", "id": "fc18"}, {"front": "What engineering principle is mentioned as related to designing for failure in systems, acknowledging the unsolvability of perfect coordination?", "back": "Murphy's Law, which suggests that if something can go wrong, it will, thereby necessitating designs that anticipate and tolerate failures.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
