    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 27, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who proved the Incompleteness Theorems and when?", "back": "Kurt G\"odel in 1931."}, {"front": "What was the ambitious dream of early 20th-century mathematicians regarding mathematics' foundation?", "back": "To place all of mathematics on a perfectly secure foundation: a formal system powerful enough to prove every true mathematical statement, and demonstrably free of contradictions."}, {"front": "How did G\"odel's work impact the dream of a complete and consistent foundation for mathematics?", "back": "He proved that this dream is impossible, showing that no such formal system can achieve both completeness (proving all truths) and consistency (freedom from contradictions)."}, {"front": "State G\"odel's First Incompleteness Theorem.", "back": "Any consistent formal system capable of expressing basic arithmetic contains true statements that the system cannot prove."}, {"front": "Define \"formal system\" in the context of G\"odel's theorems.", "back": "A precisely defined set of axioms (starting assumptions) and rules of inference (methods for deriving new statements from existing ones)."}, {"front": "What does it mean for a formal system to be \"consistent\"?", "back": "The system does not produce contradictions; it never proves both a statement and its negation."}, {"front": "What does \"capable of expressing basic arithmetic\" entail for a formal system?", "back": "The system can talk about natural numbers, addition, and multiplication. This is a modest requirement satisfied by any interesting mathematical system."}, {"front": "What is the key implication of G\"odel's First Theorem regarding a system's completeness?", "back": "Such a system is 'incomplete,' meaning there exist true statements expressible within the system that the system cannot prove. These are genuine mathematical truths."}, {"front": "What is the core idea (the \"stroke of genius\") behind G\"odel's proof?", "back": "To make a mathematical system talk about itself, primarily through self-reference."}, {"front": "Explain G\"odel numbering.", "back": "A coding scheme invented by G\"odel that assigns a unique natural number to every symbol, formula, and proof within a formal system."}, {"front": "How does G\"odel numbering enable self-reference in a formal system?", "back": "It translates statements about the system (meta-mathematical statements like 'formula X is provable') into statements within the system (arithmetic facts about G\"odel numbers), allowing the system to reason about its own properties."}, {"front": "What does G\"odel's self-referential sentence G essentially state?", "back": "G says, 'This statement is not provable in this system.' or 'I am not provable.'"}, {"front": "What happens if G\"odel's sentence G is provable within a consistent system?", "back": "If G is provable, then the system has proved a statement that explicitly says it is not provable. This means the system has proved something false, making it inconsistent."}, {"front": "What happens if G\"odel's sentence G is *not* provable within a consistent system?", "back": "If G is not provable, then what G says ('I am not provable') is true. Therefore, G is a true statement that the system cannot prove, making the system incomplete."}, {"front": "What ancient paradox does G\"odel's proof structure mirror, and what is the key difference?", "back": "It mirrors the Liar Paradox ('I am false'). The difference is that the Liar Paradox produces a contradiction, while G\"odel's sentence ('I am not provable') produces incompleteness."}, {"front": "State G\"odel's Second Incompleteness Theorem.", "back": "No consistent formal system capable of expressing basic arithmetic can prove its own consistency."}, {"front": "What historical mathematical program did G\"odel's Second Incompleteness Theorem directly challenge?", "back": "Hilbert's program, which aimed to prove the consistency of mathematics using only 'safe,' finitary methods."}, {"front": "What is the implication of the Second Incompleteness Theorem for proving a system's consistency?", "back": "To prove that a system is consistent, you need a stronger system, whose own consistency, in turn, cannot be proved internally. There is no ultimate, self-proving foundation."}, {"front": "To what kinds of systems do G\"odel's theorems specifically apply?", "back": "Formal systems – precisely defined sets of axioms and rules of inference."}, {"front": "Provide one common misunderstanding of G\"odel's theorems.", "back": "The theorems do not prove that 'There are things humans can know that computers can't,' nor that 'Mathematics is unreliable,' nor that 'Truth is relative.' They are precise mathematical results with specific scope."}, {"front": "What is a key structural feature of formal reasoning that G\"odel's theorems reveal about \"blind spots\"?", "back": "Every formal system, no matter how powerful, has blind spots: truths that lie within its language but beyond its reach."}, {"front": "What philosophical stance did Kurt G\"odel hold regarding mathematical objects?", "back": "He was a philosophical Platonist, believing that mathematical objects exist independently of human minds."}, {"front": "Name two other self-referential paradoxes or foundational issues related to G\"odel's work.", "back": "The Liar Paradox, Russell's Paradox, and The Halting Problem (Turing's computational analogue)."}, {"front": "When we recognize that G\"odel's sentence G is true, does this mean human understanding goes beyond formal systems?", "back": "This is a profound question. It could mean humans are using a different (stronger) system to recognize G's truth, a system that itself would have its own blind spots. It doesn't necessarily imply a unique human non-formal capability."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
