    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 27, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who proved the Incompleteness Theorems and when were they published?", "back": "Kurt G\"odel in 1931, in his paper \"\"Uber formal unentscheidbare S\"atze der Principia Mathematica und verwandter Systeme\"."}, {"front": "What was the ambitious dream of early 20th-century mathematicians that G\"odel's work disproved?", "back": "To place all of mathematics on a perfectly secure foundation: a formal system powerful enough to prove every true mathematical statement, and demonstrably free of contradictions."}, {"front": "State G\"odel's First Incompleteness Theorem.", "back": "Any consistent formal system capable of expressing basic arithmetic contains true statements that the system cannot prove."}, {"front": "Define \"formal system\" in the context of G\"odel's theorems.", "back": "A precisely defined set of axioms (starting assumptions) and rules of inference (methods for deriving new statements from existing ones)."}, {"front": "What does it mean for a formal system to be \"consistent\"?", "back": "The system does not produce contradictions; it never proves both a statement and its negation."}, {"front": "What does the requirement \"capable of expressing basic arithmetic\" imply for a formal system?", "back": "The system can talk about natural numbers, addition, and multiplication."}, {"front": "What is the core idea or \"stroke of genius\" behind G\"odel's proof strategy?", "back": "To make a mathematical system talk about itself through self-reference."}, {"front": "Explain G\"odel numbering and its purpose.", "back": "A coding scheme that assigns a unique natural number to every symbol, formula, and proof in a formal system. This allows statements about the system (meta-mathematics) to be expressed as arithmetic statements within the system."}, {"front": "What does G\"odel's self-referential sentence $G$ essentially state?", "back": "\"This statement is not provable in this system.\""}, {"front": "If G\"odel's sentence $G$ is provable in a consistent system, what conclusion must be drawn?", "back": "If $G$ is provable, then the system has proved a statement that says it is not provable. This means the system has proved something false, implying the system is inconsistent. This contradicts the initial assumption of consistency."}, {"front": "If G\"odel's sentence $G$ is not provable in a consistent system, what conclusion must be drawn?", "back": "If $G$ is not provable, then what $G$ says (\"I am not provable\") is true. Thus, $G$ is a true statement that the system cannot prove, demonstrating the system's incompleteness."}, {"front": "What earlier mathematical technique did G\"odel's proof adapt for its construction of the self-referential sentence?", "back": "Cantor's diagonal argument, the same technique used to show that the real numbers are uncountable."}, {"front": "How does G\"odel's self-referential sentence $G$ ('I am not provable') differ in outcome from the Liar Paradox ('I am false')?", "back": "The Liar Paradox produces a contradiction, while G\"odel's sentence produces incompleteness (a true but unprovable statement), which is a more mathematically productive outcome."}, {"front": "State G\"odel's Second Incompleteness Theorem.", "back": "No consistent formal system capable of expressing basic arithmetic can prove its own consistency."}, {"front": "What was the main impact of the Second Incompleteness Theorem on Hilbert's program?", "back": "It was a direct blow, showing that the goal of proving the consistency of mathematics using only finitary methods within the system itself is impossible."}, {"front": "According to G\"odel's theorems, what happens if you try to prove the consistency of a sufficiently powerful formal system?", "back": "To prove the consistency of such a system, you would need to use a stronger system, whose consistency, in turn, could not be proved internally. There is no ultimate, self-certifying foundation."}, {"front": "Are G\"odel's theorems considered practical or structural limitations of formal reasoning?", "back": "They are structural, permanent features of formal reasoning itself, not merely practical limitations. Every formal system has 'blind spots'."}, {"front": "What is a common misconception about G\"odel's theorems regarding human vs. computer capabilities?", "back": "The theorems do not prove that 'There are things humans can know that computers can't.' This is an unjustified leap beyond their precise mathematical scope."}, {"front": "Do G\"odel's theorems imply that mathematics is unreliable or that objective truth does not exist?", "back": "No. The theorems assume consistency rather than undermining mathematics, and G\"odel himself was a Platonist who believed in objective mathematical truth."}, {"front": "To what kind of systems do G\"odel's theorems strictly apply?", "back": "They apply to formal systems—precisely defined sets of axioms and rules for deductive reasoning. They do not apply to empirical investigation or broader philosophical ideas without careful justification."}, {"front": "What famous problem in computer science is often considered a computational analogue of G\"odel's incompleteness?", "back": "The Halting Problem, which demonstrates fundamental limits to what can be computed."}, {"front": "G\"odel's theorems show a system cannot prove all truths expressible within it. When humans recognize that the G\"odel sentence $G$ is true, what does this suggest about human mathematical understanding?", "back": "It suggests either human understanding goes beyond formal systems, or that humans are operating within a different (stronger) formal system when discerning the truth of G, which itself would have its own blind spots."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
