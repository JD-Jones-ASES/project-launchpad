    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 18, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Brooks's Law?", "back": "Brooks's Law states that 'adding manpower to a late software project makes it later.' It describes the counter-intuitive effect of increasing personnel on already delayed projects."}, {"front": "Who articulated Brooks's Law and in what seminal work?", "back": "Fred Brooks articulated Brooks's Law in his influential book, 'The Mythical Man-Month: Essays on Software Engineering' (1975)."}, {"front": "What real-world project experience led Fred Brooks to formulate his law?", "back": "Brooks's Law was based on his experience managing the development of IBM's OS/360, one of the largest software projects of its era in the 1960s."}, {"front": "What is the common management instinct when a software project falls behind schedule?", "back": "The common management instinct is to add more programmers, assuming that more people mean more work gets done and the project will catch up."}, {"front": "What is the first reason new team members reduce productivity on a late project?", "back": "New team members require time to learn the codebase, understand the architecture, absorb project conventions, and build working relationships, making them unproductive initially."}, {"front": "How does onboarding new team members affect experienced team members?", "back": "Experienced team members, who can least afford to stop working, are pulled away from their tasks to train and bring newcomers up to speed, further delaying the project."}, {"front": "How does adding people affect communication overhead in a team?", "back": "Adding people significantly increases communication overhead because the number of possible pairs of people who might need to talk grows rapidly with team size."}, {"front": "Describe the relationship between team size and communication overhead vs. productive capacity.", "back": "Communication overhead grows roughly with the square of team size, while productive capacity grows only linearly (at best). At some point, overhead consumes more time than additional hands contribute."}, {"front": "What is the third, subtler problem with adding people to a late project?", "back": "The third problem is that some tasks are not divisible; they have an inherent sequential structure, meaning step B cannot begin until step A is complete, regardless of additional personnel."}, {"front": "What analogy did Brooks use to illustrate indivisible tasks?", "back": "Brooks used the memorable analogy: 'nine women cannot have a baby in one month.'"}, {"front": "What does the term 'mythical man-month' refer to?", "back": "The 'mythical man-month' refers to the false assumption that work and time are interchangeable, believing that a project requiring twelve man-months can be completed in one month by twelve people."}, {"front": "Does Brooks's Law mean that adding people is *never* helpful?", "back": "No, Brooks's Law does not mean adding people is never helpful. It specifically applies to late projects where remaining work is tightly interconnected and the deadline is near."}, {"front": "Under what specific conditions does Brooks's Law most strongly apply?", "back": "Brooks's Law most strongly applies when a project is late, the remaining work is tightly interconnected, and the time required to integrate new members exceeds the time they save."}, {"front": "Besides 'The Mythical Man-Month,' what significant recognition did Fred Brooks receive?", "back": "Fred Brooks received the Turing Award in 1999 for his seminal contributions to computer architecture, operating systems, and software engineering."}, {"front": "How does Brooks's Law apply directly to software development?", "back": "In software, codebases are complex, interdependencies are dense, and the cost of miscommunication is high. Doubling a team often does not double its output due to these factors."}, {"front": "Provide an example of Brooks's Law in the context of construction projects.", "back": "Adding workers to a construction site when remaining tasks are sequential (e.g., wiring must follow framing) can lead to crowding and interference, not acceleration."}, {"front": "How might Brooks's Law manifest in academic collaboration?", "back": "A research paper written by two people is not necessarily written twice as fast as one written alone. Coordination, revision loops, and style reconciliation often make collaborative writing slower per person."}, {"front": "What type of tasks are an exception to Brooks's Law?", "back": "Tasks that are 'perfectly partitionable' are an exception, where each person can work on an independent piece with no need for coordination, scaling linearly with headcount."}, {"front": "Give an example of a 'perfectly partitionable' task.", "back": "Harvesting a wheat field is an example: twice as many harvesters can theoretically complete the task in half the time."}, {"front": "Why are 'perfectly partitionable' tasks rare in knowledge work?", "back": "Most knowledge work involves interdependencies, complex communication, and tasks that cannot be easily divided into independent, isolated pieces, making linear scaling difficult."}, {"front": "Name two other organizational dynamics or concepts mentioned as related to Brooks's Law.", "back": "Other related concepts include Dunbar's Number (cognitive limits on relationships), Conway's Law (team structure shapes product), and Parkinson's Law (work expands to fill the time available)."}, {"front": "What is the core message of the 'Adding People to a Late Project Makes It Later' key concept box?", "back": "When a project is behind schedule, adding people introduces training costs, increases communication overhead, and disrupts existing workflows, with these costs often exceeding any additional productive capacity."}, {"front": "What is a key characteristic of tasks where Brooks's Law does NOT apply?", "back": "Brooks's Law does not apply to tasks that are perfectly independent and require no coordination among workers, allowing for linear scalability."}, {"front": "What is the primary implication of the 'mythical man-month' concept for project planning?", "back": "It implies that project managers must be wary of assuming that adding more labor units will proportionally reduce the project's duration, especially for complex, interdependent tasks."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
