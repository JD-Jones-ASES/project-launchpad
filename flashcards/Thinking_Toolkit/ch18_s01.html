<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 18, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core principle of Parkinson's Law?", "back": "Work expands so as to fill the time available for its completion."}, {"front": "Who formulated Parkinson's Law and in what year was it first published?", "back": "C. Northcote Parkinson, in The Economist in 1955."}, {"front": "What type of observation did Parkinson present his law as?", "back": "A serious empirical observation, backed by data."}, {"front": "What striking historical evidence from the British Royal Navy did Parkinson use to support his law?", "back": "Between 1914 and 1928, the number of ships and sailors decreased significantly, but the number of Admiralty officials increased by 78%."}, {"front": "How did the British Colonial Office demonstrate Parkinson's Law?", "back": "Its staff grew even as the number of colonies it administered declined."}, {"front": "What are the two primary driving forces behind bureaucratic expansion identified by Parkinson?", "back": "The 'Law of Multiplication of Subordinates' and the 'Law of Multiplication of Work.'"}, {"front": "Explain Parkinson's 'Law of Multiplication of Subordinates.'", "back": "An official who feels overworked will request two subordinates (never one to avoid rivalry). These subordinates then generate work for each other, eventually feeling overworked themselves, and the cycle repeats."}, {"front": "According to Parkinson, why does an official request *two* subordinates instead of one?", "back": "A single subordinate could become a rival, so requesting two helps maintain the official's authority and status."}, {"front": "Describe Parkinson's 'Law of Multiplication of Work.'", "back": "A task expands to absorb the available capacity. A job that could be done quickly by one person can consume much more time and effort when handled by a committee due to reviewing, revising, commenting, and coordinating."}, {"front": "What is the deeper insight of Parkinson's Law regarding the busyness of bureaucrats?", "back": "It's not primarily about laziness, but that busyness is generated by the organization itself, rather than by external demands."}, {"front": "Give examples of how organizations generate their own busyness, according to Parkinson's Law.", "back": "Reports are written that no one reads, meetings are held to prepare for other meetings, and committees are formed that perpetuate the problems they exist to study."}, {"front": "How can Parkinson's Law be observed in a personal productivity context, such as writing an essay?", "back": "Given a weekend, week, or month to write an essay, one tends to use the entire allotted time, not because the essay requires it, but because the available time shapes the pace, number of drafts, amount of procrastination, and degree of perfectionism."}, {"front": "Who was C. Northcote Parkinson?", "back": "A British naval historian and author whose satirical essay on bureaucratic expansion in The Economist became an international sensation and gave his name to one of the most widely cited principles of organizational behavior."}, {"front": "What does the key concept 'Work Expands to Fill Available Time' primarily imply about organizational dynamics?", "back": "It implies that without external constraints, tasks will absorb whatever time, budget, or personnel are available due to work generating more work, processes creating complexity, and resources attracting additional demands."}, {"front": "What is identified as the 'antidote' to Parkinson's Law?", "back": "Deliberate scarcity."}, {"front": "Explain what 'deliberate scarcity' entails as an antidote to Parkinson's Law.", "back": "It involves setting tighter deadlines, smaller budgets, and leaner teams than seem comfortable, thereby forcing efficiency and preventing work from expanding unnecessarily."}, {"front": "How does Parkinson's Law apply to government spending?", "back": "Departments receiving budget increases rarely become more efficient; instead, the additional resources are absorbed by expanded activities, new positions, and more elaborate processes, often without proportionally more value."}, {"front": "In software development, how might Parkinson's Law manifest?", "back": "Projects with generous timelines often take just as long as estimated, even when much of the time is absorbed by scope creep, unnecessary features, and excessive process rather than core development."}, {"front": "How does Parkinson's Law explain student behavior during an exam?", "back": "Students given three hours for an exam that could be completed in ninety minutes tend to use the full three hours, engaging in second-guessing, revising, and worrying, rather than finishing early."}, {"front": "What other counterintuitive organizational dynamic is mentioned in connection to Parkinson's Law?", "back": "Brooks's Law."}, {"front": "What concept related to systematic miscalibration of project timelines is connected to Parkinson's Law?", "back": "The Planning Fallacy."}, {"front": "Which law about organizational metrics being gamed is mentioned alongside Parkinson's Law?", "back": "Goodhart's Law."}, {"front": "How does the 'Law of Multiplication of Subordinates' create a self-perpetuating cycle of growth?", "back": "Each new subordinate eventually feels overworked and requests their own subordinates, leading to exponential growth of personnel and internally generated work without necessarily increasing external output."}, {"front": "What is the key difference between Parkinson's Law and simply saying people are lazy?", "back": "Parkinson's Law focuses on systemic organizational dynamics that inherently generate work and busyness internally, rather than individual idleness or lack of motivation."}, {"front": "What is the primary impact of Parkinson's Law on organizational efficiency and effectiveness?", "back": "It leads to declining efficiency and effectiveness over time as resources are absorbed by self-generated work and bureaucratic expansion, rather than by value-producing activities tied to external demands."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
