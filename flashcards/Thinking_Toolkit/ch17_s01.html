<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 17, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental problem does Arrow's Impossibility Theorem address?", "back": "It addresses the difficulty of aggregating individual preferences into a coherent and fair collective decision or ranking, especially when there are three or more options."}, {"front": "Who developed Arrow's Impossibility Theorem and when was it published?", "back": "Kenneth Arrow, published in his 1951 doctoral dissertation 'Social Choice and Individual Values'."}, {"front": "What are the three seemingly reasonable conditions that Arrow proved cannot be simultaneously satisfied by any voting system for three or more options?", "back": "Unanimity (Pareto), Non-dictatorship, and Independence of Irrelevant Alternatives (IIA)."}, {"front": "Explain the Unanimity (Pareto) condition in Arrow's Impossibility Theorem.", "back": "If every voter prefers option A to option B, then the group ranking must also place A above B. (The system should reflect universal agreement.)"}, {"front": "Describe the Non-dictatorship condition in Arrow's Impossibility Theorem.", "back": "No single voter's preferences should automatically determine the entire group ranking; the collective decision should not be dictated by one person."}, {"front": "What does the Independence of Irrelevant Alternatives (IIA) condition state in Arrow's Theorem?", "back": "The group's ranking of any two options (A vs. B) should depend only on individual preferences between A and B, and not on how voters feel about a third, 'irrelevant' option (C)."}, {"front": "Illustrate the concept of 'preference cycling' with the dinner example.", "back": "Alice (Italian > Thai > Mexican), Bob (Thai > Mexican > Italian), Carol (Mexican > Italian > Thai). This leads to Italian > Thai, Thai > Mexican, but then Mexican > Italian, creating a cycle with no clear winner."}, {"front": "What is the main conclusion of Arrow's Impossibility Theorem when there are three or more options?", "back": "It is mathematically impossible for any voting system to simultaneously satisfy Unanimity, Non-dictatorship, and Independence of Irrelevant Alternatives."}, {"front": "According to Arrow's Theorem, what is the consequence for any voting system attempting to meet all three conditions simultaneously?", "back": "Any voting system that satisfies two of the three conditions must inherently violate the remaining one."}, {"front": "How does simple majority voting perform against Arrow's conditions?", "back": "It satisfies Unanimity and Non-dictatorship but can produce preference cycles, which is a violation related to the Independence of Irrelevant Alternatives (IIA)."}, {"front": "Which of Arrow's conditions are satisfied by a dictatorial system, and which is violated?", "back": "A dictatorship satisfies Unanimity and Independence of Irrelevant Alternatives (IIA), but it explicitly violates the Non-dictatorship condition."}, {"front": "How do various ranked-choice and scoring systems generally fare against Arrow's conditions?", "back": "They typically satisfy Unanimity and Non-dictatorship but often violate Independence of Irrelevant Alternatives (IIA), meaning the outcome can change if an 'irrelevant' candidate enters or leaves."}, {"front": "What does Arrow's Impossibility Theorem imply about the search for a 'perfect' voting system?", "back": "It proves that the search for a truly 'perfect' voting system—one that is fair, consistent, and non-dictatorial—is mathematically futile when there are three or more options."}, {"front": "Does Arrow's Theorem suggest that democracy is impossible or that voting is pointless?", "back": "No, it merely states that every voting system involves inherent trade-offs, and no system can perfectly satisfy all desirable conditions simultaneously."}, {"front": "Beyond academic political science, in what other contexts does Arrow's Theorem apply?", "back": "It applies whenever a group must aggregate individual preferences into a collective decision, such as corporate boards, hiring committees, or families deciding on a vacation."}, {"front": "What is the practical implication of Arrow's Impossibility Theorem for groups making decisions?", "back": "It suggests humility: every voting system has weaknesses, and understanding these trade-offs is crucial, as no procedure is guaranteed to be universally fair and consistent."}, {"front": "Why is the choice of a specific voting system considered a political decision according to the text?", "back": "Because different voting systems favor different outcomes and different interests; no system is truly neutral."}, {"front": "What is the Condorcet Paradox, and how does it relate to Arrow's Theorem?", "back": "The Condorcet Paradox describes situations of preference cycling where A beats B, B beats C, but C beats A. Arrow's Theorem generalizes this paradox, showing that such cycles (or violations of other conditions) are unavoidable under certain criteria."}, {"front": "What was Kenneth Arrow's significant contribution that led to his Nobel Memorial Prize?", "back": "He was awarded the Nobel Memorial Prize in Economic Sciences in 1972, in part for his foundational work on social choice theory, including the Impossibility Theorem."}, {"front": "How did Arrow's Impossibility Theorem impact the field of social choice theory?", "back": "It transformed the field by demonstrating that certain fundamental problems of collective decision-making have no perfect solution, leading to a deeper understanding of trade-offs."}, {"front": "Provide an example of how a voting system might violate the Independence of Irrelevant Alternatives (IIA).", "back": "In some ranked-choice systems, if a less preferred 'irrelevant' candidate drops out of the race, it can cause the outcome between the top two candidates to flip, even if individual preferences between those two didn't change."}, {"front": "What is a key weakness of plurality voting (first-past-the-post) mentioned in the text?", "back": "It is vulnerable to vote splitting, where multiple similar candidates can divide support, allowing a less preferred candidate to win."}, {"front": "What is a potential weakness of ranked-choice voting, according to the text?", "back": "It can sometimes produce a winner that most voters would reject in a head-to-head contest against another candidate."}, {"front": "What does the key concept 'No Perfect Voting System Exists' summarize about Arrow's Theorem?", "back": "It means that for three or more options, it's mathematically impossible to design a voting system that simultaneously satisfies unanimity, non-dictatorship, and IIA; all systems involve trade-offs."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
