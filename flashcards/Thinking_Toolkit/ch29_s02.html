    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 29, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the common, overused meaning of \"paradigm shift\" today?", "back": "It has come to mean little more than \"a big change\" in popular usage."}, {"front": "How did Thomas Kuhn's original concept of a \"paradigm shift\" differ from the idea of smooth, cumulative scientific progress?", "back": "Kuhn argued science does not progress by smooth, cumulative addition of facts, but alternates between two fundamentally different modes of activity."}, {"front": "What did Kuhn call the first mode of scientific activity?", "back": "Normal science."}, {"front": "Define \"normal science\" according to Thomas Kuhn.", "back": "Normal science is the everyday work of researchers operating within an accepted framework (a paradigm) that defines questions, legitimate methods, and what counts as a good answer."}, {"front": "What is the primary activity of scientists during \"normal science\"?", "back": "Puzzle-solving, where the paradigm provides the rules, and scientists work to extend and refine it."}, {"front": "Provide examples of scientific activities that represent \"normal science.\"", "back": "A Newtonian physicist calculating planetary orbits, a Darwinian biologist tracing lines of descent, or a plate tectonics geologist mapping fault lines."}, {"front": "What role do \"anomalies\" play in challenging an existing paradigm?", "back": "Anomalies are observations that the current paradigm cannot explain, or can only explain with awkward, ad hoc patches. Their accumulation can set the stage for revolution."}, {"front": "What conditions must typically be met for a paradigm shift (revolutionary science) to occur?", "back": "Enough anomalies must pile up, and a rival framework must emerge that explains both the old successes and the new puzzles."}, {"front": "Describe the nature of the transition from one paradigm to another, as characterized by Kuhn.", "back": "It is not a calm, rational process of weighing evidence, but rather messy, contentious, and often generational."}, {"front": "Why do defenders of an old paradigm often resist a new one?", "back": "They fight, often with good reasons, because the new paradigm doesn't just add information but changes fundamental questions, methods, and meanings of key terms."}, {"front": "How do paradigm shifts impact the meaning of key scientific terms?", "back": "A new paradigm can fundamentally change the meaning of terms; for example, 'element' changed with chemistry replacing alchemy, and 'mass'/'time' with Einstein replacing Newton."}, {"front": "What did Kuhn mean by stating that scientists on opposite sides of a paradigm shift are, in an important sense, \"working in different worlds\"?", "back": "Their foundational assumptions, questions, methods, and even the meanings of their terms differ so significantly that they interpret reality through different lenses."}, {"front": "What was the core principle of the Ptolemaic model of the universe?", "back": "It placed the Earth at the center of the universe, with planets moving on complex combinations of circles called epicycles."}, {"front": "What was the core principle of the Copernican model of the universe?", "back": "It proposed that the Sun was at the center of the universe, and Earth was just another planet orbiting it."}, {"front": "Why was the Copernican revolution not an immediate, single moment of triumph?", "back": "Copernicus's model was initially less accurate than Ptolemy's (due to using perfect circles), and it took decades of struggle and further contributions from Kepler and Galileo to tip the balance."}, {"front": "What scientific contributions were crucial in solidifying the Copernican model?", "back": "Kepler's discovery of elliptical orbits and Galileo's telescope observations."}, {"front": "According to Kuhn, what does his insight explain about how scientific progress feels from the inside versus in retrospect?", "back": "From the inside, it feels jerky and contentious, while in retrospect, it often looks smooth and inevitable."}, {"front": "Why do truly revolutionary ideas face fierce resistance, according to Kuhn?", "back": "They are not just adding a new fact, but asking everyone to rebuild their entire intellectual framework ('rebuild their intellectual furniture')."}, {"front": "What is the key difference between Kuhn's \"paradigm shift\" and its common misuse?", "back": "Kuhn's sense implies a wholesale transformation of foundational assumptions, methods, and vocabulary of an entire field, not just a 'big change' or new feature."}, {"front": "What is a central \"key concept\" regarding how science advances, according to Kuhn?", "back": "Science advances by revolution, not smooth accretion, alternating between normal science (puzzle-solving) and revolutionary science (paradigm replacement)."}, {"front": "What is the analytical challenge posed by Kuhn's idea that scientists in different paradigms speak different languages?", "back": "It raises questions about how rational debate can occur between them and whether scientific progress is ultimately rational or determined by generational shifts."}, {"front": "How rare are genuine paradigm shifts in the history of science, according to the text?", "back": "They are very rare; there have been perhaps only a dozen genuine paradigm shifts in the history of science."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
