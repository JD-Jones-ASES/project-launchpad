    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 26, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who first observed the phenomenon that led to the Coastline Paradox?", "back": "The English mathematician Lewis Fry Richardson, in the 1950s."}, {"front": "What was Lewis Fry Richardson studying when he observed the variable length of borders?", "back": "The lengths of national borders."}, {"front": "Which mathematician developed the Coastline Paradox into a foundational concept of fractal geometry?", "back": "Benoit Mandelbrot."}, {"front": "What was the title of Benoit Mandelbrot's landmark 1967 paper that discussed the variability of coastline length?", "back": "“How Long Is the Coast of Britain?”"}, {"front": "According to the Coastline Paradox, what happens to the measured length of a coastline as the measurement scale (ruler length) decreases?", "back": "The measured length increases."}, {"front": "Why does the measured length of a coastline increase as the measurement scale decreases?", "back": "Smaller rulers can follow the coast's curves more closely, capturing finer details like bays, peninsulas, inlets, and even individual pebbles, which larger rulers skip over."}, {"front": "How does a natural coastline differ from a smooth curve (like a circle) when zoomed in?", "back": "A natural coastline remains “rough” at every scale, revealing more detail as you zoom in. A smooth curve appears increasingly flat or straight at high magnification."}, {"front": "Does the measured length of a natural coastline converge to a definite value? Explain.", "back": "No, it grows without bound as the measurement scale decreases because there is no natural stopping point for detail."}, {"front": "Define the Coastline Paradox.", "back": "The Coastline Paradox states that a natural coastline has no single, well-defined length; the measured length depends entirely on the resolution or scale of the measurement, and there is no “true” answer."}, {"front": "What scientific field did the Coastline Paradox help ignite?", "back": "Fractal geometry."}, {"front": "What common property do coastlines, mountain ranges, and river networks share that is central to fractal geometry?", "back": "Self-similarity at different scales, meaning a small section, when magnified, looks statistically similar to a larger section."}, {"front": "What concept did Benoit Mandelbrot introduce to describe objects like coastlines that exhibit self-similarity and roughness?", "back": "The concept of fractal dimension."}, {"front": "What is the fractal dimension of a smooth line?", "back": "1."}, {"front": "What is the fractal dimension of a filled-in square?", "back": "2."}, {"front": "What is the approximate fractal dimension of the coast of Britain?", "back": "Approximately 1.25."}, {"front": "What does a fractal dimension of 1.25 for the coast of Britain imply about its nature?", "back": "It is “rougher” than a smooth line (dimension 1) but does not fully fill a plane (dimension 2). This number captures how quickly its measured length increases as measurement scale decreases."}, {"front": "Name three other natural phenomena, besides coastlines, that exhibit fractal properties.", "back": "Mountain ranges, river networks, cloud boundaries, blood vessel systems, the surface of broccoli, human lungs, or fluctuations of stock prices."}, {"front": "What was Mandelbrot's key insight regarding the shapes found in classical geometry versus those in nature?", "back": "He realized that the smooth, simple shapes of classical geometry (circles, triangles, planes) are the exception in nature, not the rule; the natural world is primarily fractal."}, {"front": "Who was Benoit Mandelbrot and what was his primary contribution to mathematics?", "back": "Benoit Mandelbrot (1924–2010) was a Polish-born French-American mathematician who developed fractal geometry into a major field of mathematics."}, {"front": "What was the title of Mandelbrot's influential 1982 book?", "back": "The Fractal Geometry of Nature."}, {"front": "What is the significance of the Mandelbrot set?", "back": "It is an iconic fractal image named after Benoit Mandelbrot and has become one of the most recognizable images in mathematics."}, {"front": "How does the Coastline Paradox affect international relations?", "back": "Neighboring countries may measure shared borders differently, leading to disputes over length depending on the resolution of their surveys."}, {"front": "Provide an example of how fractal geometry is relevant in environmental science.", "back": "The “length” of a river, the “area” of a wetland, or the “surface area” of a coral reef all depend on measurement scale due to their fractal nature."}, {"front": "How does the fractal structure of human lungs benefit the body?", "back": "The fractal branching pattern vastly increases the surface area available for gas exchange, maximizing oxygen absorption—a feature exploited by natural selection."}, {"front": "The Coastline Paradox highlights that some quantities have no single “true” value. What is this dependent on?", "back": "The resolution of the measurement."}, {"front": "What is the fundamental characteristic of natural coastlines and many other real-world phenomena as described by fractal geometry?", "back": "They are “rough” at every scale; zooming in reveals more detail rather than a smooth underlying shape."}, {"front": "The Sorites Paradox is mentioned as a connection to the Coastline Paradox. What concept do they both relate to?", "back": "They both relate to cases where sharp boundaries resist definition, or where quantities lack a single definitive value due to inherent fuzziness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
