    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 13, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who introduced the \"Experience Machine\" thought experiment and in what work?", "back": "Robert Nozick in his 1974 book, Anarchy, State, and Utopia."}, {"front": "What is the fundamental concept behind the Experience Machine?", "back": "It is a hypothetical machine that can provide any desired experience, indistinguishable from reality, making users believe they are living a real life without knowing they are plugged in."}, {"front": "What philosophical view does the Experience Machine primarily challenge?", "back": "Hedonism, the view that pleasure or positive subjective experience is the only thing that is intrinsically good."}, {"front": "According to Nozick, if hedonism were correct, what should be people's reaction to the Experience Machine?", "back": "People should find the machine irresistible, as it offers a lifetime of perfect, tailor-made experiences without possibility of pain or disappointment."}, {"front": "What is the typical response of most people when confronted with the choice to plug into the Experience Machine?", "back": "Most people say they would not plug in."}, {"front": "What is Nozick's first reason why people typically refuse the Experience Machine?", "back": "We want to *do* things, not merely *experience doing* them; we value genuine accomplishment over just the feeling of accomplishment."}, {"front": "Explain Nozick's second reason for refusing the Experience Machine.", "back": "We want to *be a certain kind of person* (e.g., courageous, creative, kind); plugging in means becoming a passive blob, only experiencing these qualities virtually, but not actually possessing them."}, {"front": "What is Nozick's third reason for declining the Experience Machine?", "back": "We want *contact with a deeper reality*, valuing experiences caused by actual events, people, and achievements, rather than living in an elaborate illusion."}, {"front": "What do the reasons for refusing the Experience Machine suggest about what we value beyond subjective experience?", "back": "We value truth, authenticity, genuine relationships, and real accomplishment, in addition to our subjective experiences."}, {"front": "How does the Experience Machine thought experiment impact moral philosophy?", "back": "It suggests that a theory of the good life cannot focus exclusively on how things feel from the inside, as subjective experience is not the sole determinant of value."}, {"front": "What is one argument presented by those who *would* plug into the Experience Machine, regarding the nature of 'reality'?", "back": "If the experience is truly indistinguishable from reality, then from the subject's perspective, there is no difference. 'Reality' becomes just a label we attach to one set of experiences over another."}, {"front": "What argument do proponents of the Experience Machine make regarding 'real' accomplishment?", "back": "They argue that much of what we call 'real' accomplishment is itself a kind of subjective judgment, experienced as a sequence of mental states, just as it would be inside the machine."}, {"front": "What potential bias might influence the refusal to plug into the Experience Machine, according to some counter-arguments?", "back": "The refusal may reflect a bias toward the familiar; people might prefer reality simply because it's what they know, rather than having a deeper philosophical reason."}, {"front": "Do the counter-arguments for plugging into the Experience Machine necessarily defeat Nozick's original argument?", "back": "No, they do not necessarily defeat it, but they demonstrate that the intuition against the machine is not universal or self-evident."}, {"front": "What is the ultimate value or purpose of the Experience Machine thought experiment, regardless of one's choice?", "back": "It forces individuals to articulate what they truly value and why, going beyond mere subjective pleasure or internal feelings."}, {"front": "What qualities would a person inside the Experience Machine *lack* in reality, despite *experiencing* them vividly?", "back": "They would lack genuine courage, creativity, kindness, and other virtues that require actual action and engagement with the real world; they would merely be receiving electrical stimulation."}, {"front": "According to hedonism, what does it mean for something to be 'intrinsically good'?", "back": "It means that pleasure or positive subjective experience is good in and of itself, not as a means to achieve something else, but as an end goal."}, {"front": "How does Plato's Allegory of the Cave relate to the Experience Machine?", "back": "Both explore the idea of an illusion (shadows in the cave, simulated experiences in the machine) being mistaken for reality, questioning the nature of truth and our perception of it."}, {"front": "What is the key difference in focus between the Experience Machine and the 'Brain in a Vat' thought experiment?", "back": "The Experience Machine primarily focuses on what constitutes a good life and what we value (moral philosophy), while 'Brain in a Vat' primarily focuses on epistemology (how we know if our experiences are real)."}, {"front": "If you learned you had been in an Experience Machine your entire life, would it change how you value your memories?", "back": "This question encourages reflection. One might argue that the subjective feeling of the memories would remain, but their value might diminish if 'realness' or 'authenticity' of the events is a valued component of those memories."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
