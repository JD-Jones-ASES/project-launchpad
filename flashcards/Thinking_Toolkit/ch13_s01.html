<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 13, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core premise of the 'brain in a vat' thought experiment?", "back": "It proposes that your brain might have been removed from your body, placed in a vat of nutrients, and connected to a computer that simulates all your sensory experiences perfectly, making the simulation indistinguishable from reality."}, {"front": "Who originally conceived of the 'evil demon hypothesis' that prefigured the brain-in-a-vat concept?", "back": "René Descartes, in his 1641 work, *Meditations on First Philosophy*."}, {"front": "Who updated Descartes's evil demon hypothesis to the 'brain in a vat' scenario?", "back": "Hilary Putnam, in his 1981 book, *Reason, Truth and History*."}, {"front": "According to the thought experiment, why would a brain in a vat be unable to tell if it were in a simulation?", "back": "Every test or observation it might devise (like pinching itself or consulting a friend) would itself be part of the perfectly simulated reality generated by the computer."}, {"front": "What was Descartes's primary goal in imagining the evil demon?", "back": "To discover if anything could be known with absolute certainty by pushing skepticism to its extreme limits."}, {"front": "What is Descartes's famous conclusion from his evil demon hypothesis, and what does it mean?", "back": "'I think, therefore I am' (cogito ergo sum). It means that even if everything else is an illusion, the very act of doubting proves the existence of a doubter."}, {"front": "What certainty does the 'cogito' establish, and what does it leave in doubt?", "back": "It establishes the certainty of one's own existence as a thinking thing. However, it leaves nearly everything else in doubt, such as the reality of the external world, the existence of other minds, or the genuineness of memories."}, {"front": "Who proposed the 'self-refutation argument' against the brain-in-a-vat hypothesis?", "back": "American philosopher Hilary Putnam in 1981."}, {"front": "What philosophical theory is central to Putnam's self-refutation argument?", "back": "Semantic externalism, a theory of meaning that states for a word to refer to something, there must be a causal connection to that thing."}, {"front": "According to semantic externalism, why can a normal person's word 'tree' refer to an actual tree?", "back": "Because they have causally interacted with actual trees (seen them, touched them), which caused them to form the concept 'tree'."}, {"front": "How does Putnam apply semantic externalism to a brain in a vat saying 'I am a brain in a vat'?", "back": "He argues that a brain in a vat has never causally interacted with real brains or real vats. Therefore, its words 'brain' and 'vat' refer only to the electrical patterns within the simulation, not to physical objects in the external world."}, {"front": "What is Putnam's conclusion regarding the statement 'I am a brain in a vat' when uttered by a brain in a vat?", "back": "The statement is necessarily false. If you are a brain in a vat, you cannot truly say so because your words cannot refer to the actual brains and vats that would make the statement true."}, {"front": "What is a major criticism of Putnam's self-refutation argument?", "back": "It depends on accepting semantic externalism, a theory that is not universally endorsed by all philosophers."}, {"front": "What is the main lesson about 'radical skepticism' highlighted by the brain-in-a-vat scenario?", "back": "We cannot prove the external world exists using evidence drawn solely from experience, as all such evidence could be fabricated. We navigate the world using unproven assumptions."}, {"front": "How did René Descartes contribute to modern philosophy and other fields?", "back": "He is often called the father of modern philosophy due to his method of systematic doubt. He also invented the Cartesian coordinate system, linking algebra and geometry, and made contributions to optics and the mind-body relationship."}, {"front": "Name two popular culture examples that explore themes similar to the brain-in-a-vat scenario.", "back": "Films like *The Matrix* (1999) and *The Truman Show* (1998)."}, {"front": "How do virtual reality systems relate to the brain-in-a-vat scenario in the real world?", "back": "As VR systems create increasingly convincing simulations, they raise the practical question of whether the distinction between simulated and real experiences still matters when they become indistinguishable."}, {"front": "What is 'Agrippa's Trilemma' and how is it related to the brain-in-a-vat problem?", "back": "Agrippa's Trilemma refers to the deeper problem of justifying any belief without circularity, infinite regress, or dogmatism. It highlights the difficulty of establishing foundational knowledge, a challenge also faced when confronting radical skepticism like the BIV."}, {"front": "Which ancient philosophical thought experiment is a predecessor to the brain-in-a-vat scenario?", "back": "Plato's Allegory of the Cave, which depicts prisoners mistaking shadows for reality."}, {"front": "What ethical question is related to the brain-in-a-vat, mentioned as the 'Experience Machine'?", "back": "Whether one would choose a simulated life if it felt completely real and offered constant pleasure or ideal experiences."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
