    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 24, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the Sorites Paradox, also known as the Paradox of the Heap?", "back": "It's a logical paradox that demonstrates the problem of vagueness. It arises when small, incremental changes to a collection of objects (like grains of sand) do not seem to change its category (e.g., from 'not-a-heap' to 'a-heap'), yet eventually the category clearly changes."}, {"front": "Who is credited with formulating the Sorites Paradox?", "back": "Eubulides of Miletus, a 4th-century BC Greek philosopher."}, {"front": "Describe the basic structure of the Sorites Paradox argument.", "back": "Premise 1: One grain of sand is not a heap. Premise 2: Adding one grain of sand to a non-heap does not make it a heap. Conclusion: Therefore, no number of grains is a heap (which is obviously false)."}, {"front": "Why is the Sorites Paradox considered a paradox?", "back": "Because its two premises seem undeniably true, and the logic is valid, yet the conclusion is obviously false, creating a logical contradiction that challenges our understanding of categories and language."}, {"front": "How does the 'reverse' version of the Sorites Paradox (from a heap to a single grain) illustrate the same problem?", "back": "If removing one grain from a heap still leaves a heap, and this is repeated, at what point does it stop being a heap? No single removal seems to make the difference, yet the heap disappears."}, {"front": "Provide examples of concepts other than a 'heap' that are susceptible to the Sorites Paradox.", "back": "Baldness, tallness, rich, old, red. In legal contexts: when a fetus becomes a person, environmental damage, or fraud."}, {"front": "In philosophy, what are predicates like 'heap,' 'bald,' or 'tall' called?", "back": "Vague predicates."}, {"front": "What characteristic defines a 'vague predicate'?", "back": "They admit borderline cases where applying the term seems neither clearly correct nor clearly incorrect. They lack sharp, precise boundaries."}, {"front": "According to the text, why is vagueness not just a practical inconvenience but a deep logical problem?", "back": "Because our most basic categorical concepts resist the sharp boundaries that classical logic seems to require, challenging how we use language and make judgments."}, {"front": "Briefly explain Epistemicism as an attempted solution to the Sorites Paradox.", "back": "Epistemicism holds that there *is* a precise boundary (e.g., a specific number of grains for a heap), but we simply cannot know what it is. The vagueness is in our ignorance, not in the world itself."}, {"front": "What is the main criticism of Epistemicism?", "back": "It strikes most people as deeply implausible; it's hard to accept that there's an exact, unknowable point where a non-heap becomes a heap."}, {"front": "Briefly explain Supervaluationism as an attempted solution to the Sorites Paradox.", "back": "Supervaluationism suggests that vague predicates can be 'precisified' in many legitimate ways. A statement is true if it's true on all legitimate precisifications, false if false on all, and neither true nor false in borderline cases."}, {"front": "What fundamental principle of classical logic does Supervaluationism require abandoning?", "back": "The principle of bivalence, which states that every statement is either true or false."}, {"front": "Briefly explain Fuzzy Logic as an attempted solution to the Sorites Paradox.", "back": "Fuzzy logic replaces discrete true/false values with a continuous scale from 0 to 1, where statements can be partially true (e.g., 'This is a heap' might be 0.7 true)."}, {"front": "What is a common criticism or puzzle associated with Fuzzy Logic?", "back": "It can lead to new arbitrary distinctions, as the sharp boundary simply returns at a different level (e.g., why 0.7 true and not 0.71?)."}, {"front": "What is the practical lesson derived from the Sorites Paradox regarding arguments and boundaries?", "back": "Be suspicious of arguments that demand a precise boundary where none exists, and equally suspicious of arguments that exploit the absence of a boundary to deny a real difference."}, {"front": "How do legal and political systems typically handle concepts subject to the Sorites Paradox?", "back": "They often draw 'bright lines' or stipulated thresholds (e.g., age 18 for adulthood, 0.08 BAC for drunk driving) even though the underlying concepts are vague."}, {"front": "Why are legal 'bright lines' described as 'useful fictions'?", "back": "Because they are stipulated boundaries, not discovered natural ones, that allow institutions to function despite the vagueness of the underlying concepts."}, {"front": "How does the distinction between 'tax avoidance' and 'tax evasion' illustrate a Sorites boundary?", "back": "There's a gray zone of increasingly aggressive strategies, with no single clear point separating legal avoidance from illegal evasion, requiring the law to arbitrarily 'plant a flag' somewhere in the fog."}, {"front": "What is the significance of the Sorites Paradox for understanding language and categories?", "back": "It reveals that vagueness is a structural feature of how concepts work, not merely sloppiness in our language, and that many basic categories lack the sharp boundaries classical logic expects."}, {"front": "Name two other philosophical paradoxes mentioned that relate to incremental change or foundational issues.", "back": "The Ship of Theseus (a puzzle about identity through incremental change) and Zeno's Paradoxes (infinite divisibility creating paradox)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
