<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 24, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define the Lindy Effect.", "back": "The Lindy Effect states that the longer something (especially non-perishable ideas or technologies) has survived, the longer it is likely to survive into the future."}, {"front": "Define a Black Swan event as described by Nassim Nicholas Taleb.", "back": "A Black Swan event is a rare, high-impact event that no one saw coming, and whose probability is systematically underestimated by our models."}, {"front": "What apparent contradiction arises when considering the Lindy Effect and Black Swan together?", "back": "The Lindy Effect suggests longevity implies resilience and future survival, while the Black Swan suggests history is dominated by unpredictable catastrophic events, making long stability seem like the calm before the storm."}, {"front": "What is a fundamental insight in systems thinking regarding stability and fragility?", "back": "Stability and fragility are not opposites; they often coexist within the same system at the same moment."}, {"front": "Explain the concept of 'hidden fragility'.", "back": "Hidden fragility describes a system that appears robust over long periods but is quietly accumulating vulnerabilities that can lead to sudden, catastrophic failure."}, {"front": "How does the Lindy Effect sometimes create false confidence in a system's soundness?", "back": "Decades or centuries of smooth operation encourage the belief that the system will continue to operate soundly, leading to reduced vigilance, less maintenance, and increased risk-taking."}, {"front": "Describe the riverbank analogy used to illustrate hidden fragility.", "back": "A riverbank holds for decades, increasing residents' confidence and leading to reduced maintenance budgets, until a rare 'hundred-year flood' finds it weakened by neglect and sweeps through the town."}, {"front": "How did the financial system before 2008 exemplify the coexistence of stability and fragility?", "back": "Years of low volatility and apparent stability encouraged greater risk-taking, more leverage, and complex instruments, quietly accumulating systemic risk that eventually led to a sudden crash."}, {"front": "Summarize Nassim Nicholas Taleb's 'Turkey Problem'.", "back": "A turkey is fed for 1,000 days, consistently confirming its belief in benevolent human providers, only to be catastrophically surprised on day 1,001 (Thanksgiving). Its confidence was highest at its moment of greatest risk."}, {"front": "According to Taleb, why isn't the turkey's error in the 'Turkey Problem' simply stupidity?", "back": "The turkey's error is the rational application of inductive reasoning to a system that contains a hidden discontinuity. Past evidence was drawn from a distribution that excluded the catastrophic event."}, {"front": "What is the key to reconciling the Lindy Effect and Black Swan concepts without contradiction?", "back": "The key is to distinguish between different types of systems based on their inherent characteristics and nature."}, {"front": "Identify characteristics and examples of systems that reliably follow the Lindy Effect.", "back": "These are non-perishable, idea-like things with no hidden biological clock or structural reason to decay, such as books (e.g., The Iliad, Shakespeare's works), religions, mathematical theorems, or cooking recipes."}, {"front": "Identify characteristics and examples of systems that are considered 'Black Swan-prone'.", "back": "These are complex, tightly coupled systems whose stability can mask the slow accumulation of systemic risk, leading to abrupt and unpredictable failures. Examples include financial markets, ecosystems, and political regimes."}, {"front": "What kind of system is considered the 'most dangerous' in the context of the Lindy Effect and Black Swan?", "back": "Systems that *look* Lindy (having a long track record) but are actually Black Swan-prone, as their apparent longevity creates false confidence."}, {"front": "What crucial question should always be asked about a long-surviving institution or system to assess its true robustness?", "back": "The question to ask is always: 'Is this thing surviving because it is genuinely robust, or because it has not yet encountered the shock that would destroy it?'"}, {"front": "Explain the core argument: 'Stability and Fragility Coexist'.", "back": "This implies that a system can simultaneously benefit from long survival (Lindy Effect) as evidence of robustness, while also accumulating hidden vulnerabilities that make it susceptible to sudden, high-impact failures (Black Swan)."}, {"front": "Provide a real-world example of a complex system whose apparent stability masked hidden fragilities, leading to a Black Swan-like collapse.", "back": "The Ottoman Empire (lasted over six centuries, collapsed in a few years) or the Soviet Union (appeared geopolitically permanent, ceased to exist in six years)."}, {"front": "Provide a real-world example of a system that genuinely exemplifies the Lindy Effect.", "back": "The works of Shakespeare, which have been in continuous print for four centuries and show no sign of disappearing."}, {"front": "What is the practical lesson derived from observing both Lindy and Black Swan phenomena in real-world examples?", "back": "For any long-surviving institution or system, the practical lesson is to classify its nature: Is it an idea or a book (Lindy-prone), or a complex, tightly coupled system that may be accumulating hidden risks (Black Swan-prone)?"}, {"front": "What is the 'wisest approach' for dealing with systems that present both Lindy-like longevity and Black Swan potential?", "back": "The wisest approach is to take the Lindy Effect seriously as a heuristic but to maintain a healthy respect for the possibility that the next shock will be unlike anything the system has faced before. Stability earns respect, but it does not guarantee permanence."}, {"front": "In the Turkey Problem, what specific flaw in the 'evidence' led to the turkey's catastrophic surprise?", "back": "The evidence was drawn from the wrong distribution; it sampled only the calm, predictable periods and said nothing about the rare, catastrophic event that was impending."}, {"front": "Why do 'non-perishable, idea-like things' tend to follow the Lindy Effect reliably?", "back": "They have no hidden biological clock or inherent structural reasons to suddenly stop being relevant or useful; their survival is primarily a function of their continued value or applicability."}, {"front": "How does increased confidence, spurred by long periods of stability, contribute to fragility in complex systems?", "back": "Increased confidence often leads to greater risk-taking, more leverage, reduced maintenance, and the creation of more complex, interconnected instruments, all of which increase systemic brittleness and susceptibility to collapse."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
