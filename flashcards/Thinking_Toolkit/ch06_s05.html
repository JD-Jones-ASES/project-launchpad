<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'halo effect'?", "back": "The halo effect is a cognitive bias where a single salient positive quality (e.g., attractiveness, eloquence) creates a 'halo' that colors our judgment of every other unrelated quality, leading to more favorable evaluations across the board.", "id": "fc01"}, {"front": "Who first described the halo effect and in what context?", "back": "The psychologist Edward Thorndike first described it in a 1920 paper based on his observations of military officer evaluations of their subordinates.", "id": "fc02"}, {"front": "What did Edward Thorndike's 1920 study on military officers reveal about how traits are judged?", "back": "He found that ratings of one trait (e.g., physical appearance) strongly predicted ratings of entirely unrelated traits (e.g., intelligence, leadership), showing that traits are not evaluated independently but are overwhelmingly correlated.", "id": "fc03"}, {"front": "What is the 'horn effect'?", "back": "The horn effect is the negative counterpart to the halo effect, where a single negative trait (e.g., an unpleasant voice, a grammatical error) casts a 'shadow' over everything else, leading to less competent, trustworthy, and likable judgments across the board.", "id": "fc04"}, {"front": "How do the halo and horn effects demonstrate that we don't evaluate traits independently?", "back": "Both effects show that one strong impression, whether positive or negative, 'spills over' and influences our judgment of all other unrelated qualities, preventing an independent assessment of each trait.", "id": "fc05"}, {"front": "Provide an example of the halo effect shaping real-world decisions related to physical attractiveness.", "back": "Physically attractive people are often judged as more intelligent, competent, and honest; they may receive lighter sentences in criminal courts, get more job callbacks, and receive more attention and higher expectations from teachers.", "id": "fc06"}, {"front": "How might the halo effect manifest in a classroom setting?", "back": "A teacher who forms a positive first impression of a student (e.g., due to neatness, politeness) will tend to interpret that student's subsequent performance more charitably, seeing ambiguous answers as 'almost right' and behavioral infractions as anomalies.", "id": "fc07"}, {"front": "Explain how celebrity endorsements exploit the halo effect.", "back": "Celebrity endorsements leverage the positive feelings and admiration associated with a famous person's excellence in one domain (e.g., an athlete's sports prowess) to transfer those positive associations to an unrelated product, making the product 'feel' good to consumers.", "id": "fc08"}, {"front": "Why is the halo effect described as 'self-sustaining'?", "back": "Once a positive impression (halo) is established, individuals tend to notice information that confirms this impression and overlook contradictory evidence, reinforcing the initial positive view over time.", "id": "fc09"}, {"front": "Why are the halo and horn effects particularly dangerous when combined with confirmation bias?", "back": "When combined with confirmation bias, an initial impression (halo or horns) creates a filter that selectively admits evidence consistent with itself, causing us to notice good qualities and overlook bad ones (with a halo) or vice-versa (with horns), making the impression self-reinforcing and hard to change.", "id": "fc10"}, {"front": "What is the primary 'antidote' or mitigation strategy for the halo and horn effects?", "back": "The antidote is structured evaluation, which involves assessing each dimension or quality separately, ideally without knowing the others, before forming an overall judgment.", "id": "fc11"}, {"front": "How do structured interviews help reduce the halo effect in hiring?", "back": "Structured interviews mitigate the halo effect by requiring all candidates to answer the same questions, which are then scored independently for specific competencies, forcing evaluators to focus on objective criteria rather than overall impressions or initial charm.", "id": "fc12"}, {"front": "Give an example of a 'corporate halo effect'.", "back": "Brand loyalty is an example, where a consumer's positive experience with one product from a strong brand (e.g., Apple's phones) leads them to evaluate all other products from that brand (e.g., Apple's computers, watches) more favorably.", "id": "fc13"}, {"front": "What types of qualities are considered 'salient positive qualities' that can trigger the halo effect?", "back": "Attractiveness, eloquence, fame, warmth, being neatly dressed, polite, or attentive are examples of salient positive qualities mentioned in the text.", "id": "fc14"}, {"front": "What types of negative traits can trigger the horn effect?", "back": "An unpleasant voice, a visible tattoo, or a grammatical error in an email are examples of negative traits that can trigger the horn effect.", "id": "fc15"}, {"front": "According to the text, what impact do physically attractive defendants tend to receive in criminal courts?", "back": "They tend to receive lighter sentences, even when controlling for actual intelligence, competence, and honesty.", "id": "fc16"}, {"front": "Describe the 'one trait colors the whole' concept in relation to the halo and horn effects.", "back": "This concept illustrates that a single strong positive trait creates a halo, making us judge everything else about a person or product more favorably, while a single strong negative trait creates horns, leading to harsher judgments across the board. We rarely evaluate qualities independently.", "id": "fc17"}, {"front": "In what specific professional context are halo and horn effects particularly prevalent according to the text?", "back": "Unstructured job interviews are cited as a context dominated by halo and horn effects, where initial impressions can unduly influence subsequent evaluations.", "id": "fc18"}, {"front": "What did Thorndike's 1920 paper suggest about human judgment, contrary to his expectations?", "back": "Contrary to his expectation that different traits would be rated independently, Thorndike found that human judgment is highly correlated across unrelated traits, indicating a bias where one impression influences all others.", "id": "fc19"}, {"front": "How do the halo and horn effects relate to the Fundamental Attribution Error?", "back": "Both are cognitive biases that lead us to misjudge people. While the Fundamental Attribution Error involves overemphasizing dispositional factors over situational ones, the halo/horn effects show how a single perceived trait influences the overall perception of a person's character and abilities.", "id": "fc20"}, {"front": "How do the halo and horn effects relate to the Representativeness Heuristic?", "back": "Both are cognitive shortcuts in judgment. The Representativeness Heuristic involves judging something based on how well it matches a prototype or stereotype, similar to how a single prominent positive or negative trait can trigger a generalized favorable or unfavorable overall impression.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
