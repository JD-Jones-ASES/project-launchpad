<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define Hindsight Bias.", "back": "Hindsight bias is the phenomenon where, once people know the outcome of an event, they systematically overestimate how predictable that outcome was, reconstructing their memory of prior beliefs to make it seem inevitable."}, {"front": "What is another common name for hindsight bias?", "back": "It is sometimes called the 'knew-it-all-along effect.'"}, {"front": "Who experimentally demonstrated hindsight bias and when?", "back": "Baruch Fischhoff experimentally demonstrated hindsight bias in a series of studies beginning in 1975."}, {"front": "Is hindsight bias a deliberate lie or an unconscious process?", "back": "Hindsight bias is not a deliberate lie; it is a genuine, unconscious failure of memory where the past is rewritten to make oneself appear more prescient."}, {"front": "How does the brain contribute to hindsight bias?", "back": "Confronted with a known outcome, the brain automatically reorganizes evidence, making facts that pointed toward the outcome salient and facts pointing elsewhere fade, removing ambiguity."}, {"front": "Describe a key finding from Baruch Fischhoff's original experiments on hindsight bias.", "back": "Participants who were told outcomes of historical events rated those outcomes as significantly more predictable, and even 'remembered' having predicted the correct outcome all along, despite their actual recorded predictions being different."}, {"front": "Provide a real-world example of hindsight bias related to economic events.", "back": "After the 2008 financial crisis, many claimed they had predicted the collapse and explained why it was 'inevitable,' despite the prevailing view before the crisis being that the financial system was sound."}, {"front": "What are some general negative consequences of hindsight bias?", "back": "It makes us overconfident in our ability to foresee the future, too harsh in judging others' past decisions, and unable to learn from genuine surprises."}, {"front": "How does hindsight bias affect judgments in courtrooms?", "back": "Jurors who know a defendant caused harm judge the defendant's prior behavior as more reckless than jurors who evaluate the same behavior without knowing the outcome."}, {"front": "Describe the impact of hindsight bias on medical professionals reviewing cases.", "back": "Doctors who know a patient died evaluate treatment decisions as more obviously wrong than doctors reviewing the same case without knowing the outcome."}, {"front": "What effect can hindsight bias have in corporate settings, especially after project failures?", "back": "Executives who know a project failed judge the original decision as obviously flawed and may fire those responsible, even if the decision was reasonable given information at the time."}, {"front": "Explain how hindsight bias can sabotage genuine learning.", "back": "If every outcome feels predictable after the fact, there's an illusion of foresight that prevents genuine analysis of what was actually known, missed, or should be done differently next time."}, {"front": "What is a recommended antidote to mitigate hindsight bias?", "back": "To mitigate hindsight bias, one should record their predictions before knowing the outcome and then honestly compare them to the actual result."}, {"front": "How does hindsight bias manifest in evaluating military strategy?", "back": "After a battle, decisions of a losing general may look obviously foolish, but this overlooks the incomplete information and 'fog of war' the general faced at the time."}, {"front": "Explain how hindsight bias can affect our perception of past investment decisions.", "back": "After a stock crashes, people question why anyone would have bought it, ignoring that at the time, analysts might have recommended it based on seemingly sound reasons."}, {"front": "Summarize the core concept: 'History Feels Inevitable in Retrospect' as related to hindsight bias.", "back": "Once we know how events turned out, we unconsciously revise our memories to make the outcome seem predictable, leading to overconfidence, harsh judgments of others, and hindering genuine learning."}, {"front": "How does hindsight bias relate to our memory of our own predictions?", "back": "People tend to reconstruct their memory of prior beliefs, making themselves 'remember' having predicted the correct outcome, even if their actual prior predictions were different."}, {"front": "What is necessary for genuine learning in the context of overcoming hindsight bias?", "back": "Genuine learning requires admitting uncertainty, acknowledging that outcomes were not obvious, and recognizing that prior understanding was incomplete."}, {"front": "According to the text, what happens to relevant facts when hindsight bias is at play?", "back": "The facts that pointed toward the outcome become salient, while the facts that pointed elsewhere fade into the background."}, {"front": "Why is hindsight bias sometimes called the 'knew-it-all-along effect'?", "back": "Because individuals not only know what happened but genuinely feel that they always knew it would happen, even if they didn't prior to the event."}, {"front": "How does hindsight bias impact our self-perception regarding future prediction?", "back": "It creates an illusion of foresight, making us overconfident in our ability to foresee the future."}, {"front": "How does hindsight bias influence our judgment of others' past decisions?", "back": "It makes us too harsh in judging others' past decisions because we evaluate their actions based on information they didn't have at the time, knowing the outcome."}, {"front": "What crucial analytical process does hindsight bias prevent?", "back": "It prevents the genuine analysis of what one actually knew, what was missed, and what should be done differently next time, thereby sabotaging learning."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
