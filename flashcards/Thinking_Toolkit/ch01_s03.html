<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Thinking_Toolkit.html">&larr; Back to The Thinking Toolkit</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core definition of \"moving the goalposts\" in rhetoric and informal logic?", "back": "\"Moving the goalposts\" is the pattern of changing the criteria for success after the original criteria have been met.", "id": "fc01"}, {"front": "What is the origin of the phrase \"moving the goalposts\"?", "back": "The image is drawn from the sports metaphor of literally moving the goalposts on a playing field so that a successful kick no longer counts.", "id": "fc02"}, {"front": "What are the two primary ways \"moving the goalposts\" can manifest?", "back": "It can be a deliberate rhetorical tactic to avoid conceding a point in an argument, or an unconscious defense mechanism to protect a belief from disconfirming evidence.", "id": "fc03"}, {"front": "Why is \"moving the goalposts\" considered a form of \"bad faith\" when used as a rhetorical tactic?", "back": "It signals that the person has no intention of being persuaded, as the standard of sufficiency is continuously redefined, making any presented evidence insufficient.", "id": "fc04"}, {"front": "Describe a common scenario illustrating \"moving the goalposts\" in a personal context.", "back": "A person achieves a goal (e.g., an 'A' on an exam), but the standard of success is immediately raised (e.g., 'Did you get the highest grade?', 'Was it an AP class?', 'Will it get you into a top college?').", "id": "fc05"}, {"front": "What is the key test to determine if someone is genuinely asking questions or employing the \"moving the goalposts\" tactic in an argument?", "back": "The test is whether they stated their criteria for being convinced *before* the evidence was presented. If they shift the standard after the evidence arrives, it's clear goalpost-moving.", "id": "fc06"}, {"front": "When \"moving the goalposts\" is an unconscious defense, what is its primary psychological purpose?", "back": "Its purpose is to protect a cherished belief from disconfirmation by unconsciously raising the evidentiary bar every time evidence threatens the position.", "id": "fc07"}, {"front": "How is \"moving the goalposts\" related to confirmation bias?", "back": "Moving the goalposts is described as what confirmation bias looks like in a conversation, where individuals scrutinize or dismiss evidence that challenges their existing beliefs.", "id": "fc08"}, {"front": "Are people who unconsciously \"move the goalposts\" necessarily lying or trying to deceive?", "back": "No, they often genuinely feel that new evidence is 'not quite enough,' with this feeling generated by the need to protect a belief rather than a deliberate intent to deceive.", "id": "fc09"}, {"front": "How does \"moving the goalposts\" feature prominently in conspiracy theories?", "back": "Any evidence presented against a conspiracy theory is reinterpreted and incorporated into the conspiracy itself, making it seem like further proof of the cover-up (e.g., 'no evidence means the cover-up is powerful').", "id": "fc10"}, {"front": "Explain how \"moving the goalposts\" can render a theory \"unfalsifiable.\"", "back": "Because every possible piece of counter-evidence is reinterpreted as confirmation, the theory cannot, even in principle, be disproven, making it unfalsifiable.", "id": "fc11"}, {"front": "What is Karl Popper's criterion of falsifiability, and why is it relevant to understanding \"moving the goalposts\"?", "back": "Popper's criterion states that a claim that cannot be disproven by any evidence is not a claim about the world. Goalpost-moving turns a testable hypothesis into an unfalsifiable commitment.", "id": "fc12"}, {"front": "What is the recommended antidote or counter-tactic to \"moving the goalposts\"?", "back": "The antidote is to define success criteria *before* examining the evidence, and to hold oneself to the same standard demanded of others.", "id": "fc13"}, {"front": "Provide a real-world example of \"moving the goalposts\" in the context of political debate.", "back": "One side demands specific evidence for a policy, receives it, and then immediately demands a different kind of evidence (e.g., 'Yes, but has it reduced violent crime in specific neighborhoods?'), revealing the demand was for capitulation, not proof.", "id": "fc14"}, {"front": "Give a real-world example of \"moving the goalposts\" in performance reviews.", "back": "An employee meets every stated goal for the year, but at review time, is told that the 'real' criteria were unstated qualities like 'softer skills' or 'cultural fit,' thereby shifting the standard after the fact.", "id": "fc15"}, {"front": "How does \"moving the goalposts\" impact the possibility of genuine persuasion in an argument?", "back": "It makes genuine persuasion impossible, as the standard for what constitutes sufficient evidence or success is continuously altered, ensuring no achievement or proof will ever be enough.", "id": "fc16"}, {"front": "When a claim becomes unfalsifiable due to \"moving the goalposts,\" what does it essentially transform into?", "back": "It transforms from a genuine hypothesis about the world into a commitment masquerading as a testable claim, as it can never be disproven.", "id": "fc17"}, {"front": "What does the text suggest is the ultimate goal of defining success criteria beforehand when dealing with potential \"goalpost-moving\"?", "back": "To establish a fixed target for evaluation, preventing endless debate and revealing whether an opponent is truly open to persuasion or simply avoiding concession.", "id": "fc18"}, {"front": "What ethical concern does the deliberate rhetorical use of \"moving the goalposts\" raise in discussions?", "back": "It raises concerns about intellectual honesty and fair discourse, as it undermines the foundation of rational debate by refusing to engage with evidence on agreed-upon terms.", "id": "fc19"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
