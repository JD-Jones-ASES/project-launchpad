<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Thinking Toolkit &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the meaning of the idiom 'the elephant in the room'?", "back": "An obvious problem or issue that everyone present is aware of but no one is willing to discuss or acknowledge."}, {"front": "What is the origin of the idiom 'the elephant in the room'?", "back": "It derives from the absurdity of ignoring something as large and conspicuous as an elephant standing in a living room, widely attested from the 1950s onward."}, {"front": "What defines an 'elephant in the room' situation in a social setting?", "back": "It's a problem so obvious everyone can see it, but no one is willing to name it, with silence maintained by social pressures."}, {"front": "How is the silence surrounding an 'elephant in the room' typically maintained?", "back": "It's maintained by a web of social pressures, each one rational at the individual level but collectively destructive."}, {"front": "Explain 'fear of conflict' as a reason people stay silent about an elephant in the room.", "back": "Naming the elephant risks confrontation, potential anger, or emotional distress, shattering the comfortable fiction of normalcy."}, {"front": "Define 'diffusion of responsibility' in the context of the elephant in the room.", "back": "The tendency for individuals in a group to assume someone else will speak up, leading to no one taking action."}, {"front": "How is 'diffusion of responsibility' related to the bystander effect?", "back": "They are closely related; both describe how the presence of more people witnessing a problem decreases the likelihood of any single individual acting."}, {"front": "What is 'social punishment' and how does it contribute to silence?", "back": "The negative consequences (e.g., reassignment, ostracism) faced by individuals who point out uncomfortable truths, leading others to calibrate their behavior to avoid such costs."}, {"front": "The story of 'the emperor has no clothes' is mentioned. How does it illustrate social punishment in real organizations?", "back": "In the story, the child is charming, but in real organizations, the person who points out the obvious often pays a price, such as reassignment, for challenging the status quo."}, {"front": "How does 'genuine uncertainty' contribute to people staying silent about a potential problem?", "back": "Individuals might doubt if the problem is real or if they are overreacting, fearing they might look foolish if they speak up and no elephant turns out to be present."}, {"front": "What is the primary negative consequence of prolonged silence about an 'elephant in the room'?", "back": "The problem almost never goes away; instead, it festers, grows, and becomes far more damaging when it inevitably erupts than if it had been addressed early."}, {"front": "What is the practical lesson for dealing with an 'elephant in the room'?", "back": "Be the person who names the elephant, doing so calmly, clearly, and without aggression or self-righteousness, by stating what is being thought but not discussed."}, {"front": "Why is direct, calm honesty considered a rare and valuable trait in organizations, families, or communities?", "back": "Because it is difficult to execute and goes against the social pressures that typically maintain silence, but it is crucial for addressing problems before they escalate and cause more damage."}, {"front": "Define 'Collective Pretending' as a key concept related to the elephant in the room.", "back": "When a problem is obvious to everyone but acknowledged by no one, the silence itself becomes a problem, driven by fear of conflict, diffusion of responsibility, and social punishment."}, {"front": "What is the antidote to 'Collective Pretending'?", "back": "The willingness to state the obvious—calmly, clearly, and without waiting for someone else to go first."}, {"front": "Provide an example of 'organizational dysfunction' as a real-world manifestation of the elephant in the room.", "back": "A team knows a key project is behind schedule but no one raises the issue in meetings due to a senior sponsor, leading to public failure and later widespread acknowledgment that 'everyone knew this was going to happen.'"}, {"front": "How can 'family dynamics' illustrate the elephant in the room?", "back": "A family member's addiction is visible to everyone but never discussed, leading each person to privately worry, hope for intervention, and adjust behavior, thereby enabling the problem."}, {"front": "Give an example of 'political taboos' as an elephant in the room.", "back": "Certain policy questions become so politically charged that no public figure will address them honestly, ensuring that when they are finally confronted, the accumulated pressure makes a measured response nearly impossible."}, {"front": "What other concepts are connected to the 'elephant in the room' in this textbook section?", "back": "Fundamental Attribution Error, Groupthink, and The Boiling Frog."}, {"front": "How is 'The Boiling Frog' concept related to the elephant in the room and collective pretending?", "back": "The Boiling Frog describes gradual normalization, where people slowly adjust to a worsening problem without ever naming it directly, often working in tandem with collective pretending."}, {"front": "How can individual rationality lead to collective destruction in the context of the elephant in the room?", "back": "Each individual's decision to stay silent (due to fear, waiting for others, or uncertainty) appears rational to avoid immediate personal discomfort, but collectively, this silence prevents the problem from being addressed, leading to worse outcomes for everyone."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
