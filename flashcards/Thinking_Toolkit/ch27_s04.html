    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Thinking Toolkit &mdash; Chapter 27, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Thinking_Toolkit">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who proved the No Free Lunch Theorem and when?", "back": "David Wolpert and William Macready in 1997."}, {"front": "What does the name 'No Free Lunch Theorem' reference?", "back": "The old saying 'There's no such thing as a free lunch' — implying every apparent benefit has a hidden cost."}, {"front": "What is the core statement of the No Free Lunch Theorem regarding optimization algorithms?", "back": "Averaged across all possible problems, every optimization algorithm performs identically. An algorithm excelling on one class must perform worse on another."}, {"front": "Is there a universal best algorithm that outperforms all others on every possible problem?", "back": "No, according to the No Free Lunch Theorem, there is no universal optimizer or 'silver bullet'."}, {"front": "What is a key implication of the No Free Lunch Theorem regarding an algorithm's strengths and weaknesses?", "back": "Every strength implies a weakness; the very features that make an algorithm good at one thing make it bad at another."}, {"front": "Why does domain knowledge matter significantly in problem-solving, according to the NFLT?", "back": "Since no algorithm is universally best, understanding the specific problem's structure (e.g., landscape, symmetries) is primary, while the algorithm choice is secondary."}, {"front": "What should be your reaction to claims of a method working for 'every' optimization problem or decision scenario?", "back": "Be cautious; the NFLT suggests such claims are either wrong or define 'works' in a very narrow sense, as any gain in one domain comes at a cost in another."}, {"front": "Compare the performance of gradient descent and algorithms like simulated annealing on different problem landscapes.", "back": "Gradient descent excels on smooth, gradual optima but struggles with rugged landscapes. Simulated annealing/genetic algorithms are better for rugged landscapes but waste effort on smooth ones."}, {"front": "How does the No Free Lunch principle extend beyond computer science algorithms?", "back": "It applies to mental models and strategies; no single mental model or strategy works everywhere, illuminating one domain while casting shadows in another."}, {"front": "When might game theory be a misleading mental model, according to the NFLT principle?", "back": "While powerful for strategic interactions, it can be misleading when applied to cooperative relationships."}, {"front": "What is a crucial prerequisite for Bayesian reasoning to be useful?", "back": "It is essential for updating beliefs under uncertainty but useless without a reasonable prior."}, {"front": "What is a potential drawback of first-principles thinking, despite its ability to cut through assumptions?", "back": "It can be paralyzingly slow when a good heuristic would suffice."}, {"front": "How does the No Free Lunch Theorem relate to the book's central theme about models and maps?", "back": "It mathematically formalizes the idea that every model is a map, and every map leaves things out, proving this is a structural feature of problem-solving."}, {"front": "Is the limitation that 'every map leaves things out' a contingent limitation we might overcome?", "back": "No, the No Free Lunch Theorem proves it is a structural feature of problem-solving itself, not a temporary limitation."}, {"front": "How does the No Free Lunch Theorem explain the diversity of algorithms in machine learning?", "back": "It shows that different algorithms (neural networks, decision trees, etc.) each excel in specific domains and fail in others, requiring practitioners to select and tune them for specific problems."}, {"front": "Why are 'one weird trick' claims in business, education, or self-improvement often misleading?", "back": "Because a strategy that works brilliantly in one context will likely fail in another, as per the No Free Lunch principle."}, {"front": "What concept is a specific instance of the no-free-lunch principle concerning models tuned to data?", "back": "The Overfitting Problem, where a model tuned to one dataset fails on new data."}, {"front": "Which mental model relates to knowing which problems your tools are suited for?", "back": "The Circle of Competence."}, {"front": "What foundational metaphor underpins the No Free Lunch Theorem and its implications for models?", "back": "The Map Is Not the Territory, which suggests every model illuminates some domains and obscures others."}, {"front": "What is considered the most important factor in solving an optimization problem, according to the NFLT?", "back": "Domain knowledge—understanding the specific structure of the problem—is more important than the choice of algorithm."}, {"front": "What types of problems does gradient descent excel at?", "back": "Problems with smooth, gradual optima."}, {"front": "What types of algorithms are generally better suited for rugged, jagged optimization landscapes?", "back": "Algorithms like simulated annealing or genetic algorithms."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
