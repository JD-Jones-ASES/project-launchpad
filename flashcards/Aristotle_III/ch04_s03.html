<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Being (Aristotle III) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Thomas Aquinas and what was his primary philosophical goal?", "back": "Thomas Aquinas was a Dominican friar and the greatest philosopher-theologian of the medieval period. He devoted his life to showing how Aristotle's philosophy and Christian theology could be reconciled and mutually illuminating."}, {"front": "What famous maxim did Thomas Aquinas hold regarding grace and nature?", "back": "Aquinas held that 'grace does not destroy nature, but perfects it' (gratia non tollit naturam sed perficit)."}, {"front": "Why is Aristotle's Metaphysics Book VII (Zeta) particularly significant in the history of philosophy?", "back": "It is the most debated and commented-upon single work in the history of philosophy, opening with the fundamental question: 'What is substance?'"}, {"front": "What is 'ousia' in Aristotle's philosophy, and how is it typically translated?", "back": "'Ousia' is Aristotle's technical term for the primary kind of being—that which exists in itself, not as a property of something else. It is most commonly translated as 'substance.'"}, {"front": "What central question does Aristotle address in Metaphysics Book VII?", "back": "The question 'What is being?' ultimately comes down to the question 'What is substance?' (ousia)."}, {"front": "What are the four main candidates Aristotle considers for what constitutes substance?", "back": "(1) The substratum (underlying matter); (2) The essence (the 'what it was to be' a thing); (3) The universal (general concept); and (4) The genus (wider category)."}, {"front": "What is Aristotle's ultimate conclusion about what substance primarily is?", "back": "Substance is primarily form (eidos) — the defining structure that makes a thing what it is."}, {"front": "What does Aristotle mean by 'eidos' (form) in the context of substance?", "back": "'Eidos' refers to the defining structure or pattern that makes a thing what it is, distinguishing it from mere matter and giving it its identity."}, {"front": "What are the broad consequences of how one answers the question 'What makes a thing what it is?' according to Aristotle?", "back": "It determines how we think about identity, change, knowledge, and causation, with implications for fields like biology, ethics, and theology."}, {"front": "How does Aristotle explain the relationship between substance and the other categories of being (quality, quantity, relation, etc.)?", "back": "Substance is the root and primary category of being. All other categories belong to things only because those things are, first and foremost, substances; they exist derivatively."}, {"front": "Provide an example illustrating why substance is considered the primary bearer of properties.", "back": "A thing is red, large, or to the left of something; but there must be a 'thing'—a substance—to bear these properties. Without the substance, the properties cannot exist."}, {"front": "In how many senses is substance considered 'first' according to Aristotle in Metaphysics VII, Part 1?", "back": "Substance is first in three senses: (1) in definition, (2) in order of knowledge, and (3) in time (i.e., independent existence)."}, {"front": "What is 'to ti en einai' and how does it relate to 'essence'?", "back": "'To ti en einai' literally means 'the what it was to be' a thing, which is Aristotle's technical term for the essence. It is the formula that expresses what a thing truly and necessarily is, stripped of all incidental properties."}, {"front": "What is the difference between a thing's essence and its surface properties or the thing itself (composite)?", "back": "The essence is what a thing *truly and necessarily is* (its defining formula or structure), not just its superficial characteristics or the combination of form and matter in a particular instance."}, {"front": "What does Aristotle mean by 'propter se' when discussing essence?", "back": "'Propter se' means 'by its very nature' or 'in itself.' The essence of a thing is what it is *propter se*, meaning it is inherent and definitional, not an accidental or added attribute."}, {"front": "According to Aristotle, what kinds of things have an essence and can be properly defined?", "back": "Only substances, specifically 'primary things' whose formula does not imply the predication of one element of another, and species of a genus, have essences. Accidental compounds do not."}, {"front": "What is 'hyle' in Aristotle's philosophy?", "back": "'Hyle' refers to the matter, or the physical stuff, of which a thing is made."}, {"front": "How do form (eidos) and matter (hyle) relate in the process of 'coming-to-be' (creation or natural development)?", "back": "In coming-to-be, matter is the 'out of which' a thing is made, while form is the 'into which'—the goal, structure, or defining shape that the craftsman or nature is aiming at."}, {"front": "Use the example of a bronze statue to explain the relationship between form and matter.", "back": "The bronze is the matter (hyle), and the human figure or divine being it represents is the form (eidos). The statue *is* primarily the human figure, with the bronze merely serving as the vehicle for that figure's existence."}, {"front": "Why is 'essence' considered a better candidate for substance than 'universal' or 'genus' by Aristotle?", "back": "Essence focuses on the particular defining structure of an individual 'this,' while universals and genera are general concepts shared by many individuals and do not capture the unique primary being of a substance."}, {"front": "Why does Aristotle state that 'being a white surface' is not the essence of a surface?", "back": "Because 'surface' itself is added. The essence of a thing is expressed in a formula where the term itself is not present but its meaning is, without including accidental attributes like 'white'."}, {"front": "According to Aristotle, why might a compound like 'white man' not have an essence?", "back": "'White man' is a compound where an attribute ('white') is asserted of a subject ('man'). Essence belongs only to 'thisness,' which is unique to substances, not accidental combinations or predications."}, {"front": "When we say 'what man is' or 'what fire is,' which sense of 'being' are we primarily grasping, according to Aristotle?", "back": "We are primarily grasping the substance or essence of the thing, which is considered the most complete and fundamental form of knowledge."}, {"front": "What role did Albert the Great play in the context of Thomas Aquinas's education?", "back": "Albert the Great was Thomas Aquinas's teacher and one of the first Latin scholars to seriously engage with Aristotle's newly recovered works, influencing Aquinas's approach to reconciling Aristotle with Christian theology."}, {"front": "What does the 'imperfect tense' ('was to be') in Aristotle's phrase 'to ti en einai' (the what it was to be) imply?", "back": "The imperfect tense is deliberate, suggesting Aristotle is asking what a thing was, in its very nature, before any particular circumstances or accidental properties came along, capturing its unchanging essence."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
