    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Immanuel Kant, and what is he primarily known for in philosophy?", "back": "Immanuel Kant (1724–1804) was one of the most influential philosophers in Western history, known for his \"Copernican Revolution\" in philosophy, arguing that the mind actively structures experience."}, {"front": "What event or philosopher is said to have \"awakened\" Kant \"from his dogmatic slumber\"?", "back": "David Hume, whose arguments against the rational justification of causation, substance, and God challenged Kant's assumptions."}, {"front": "What is the overall purpose and structure of Descartes' *Meditations on First Philosophy*?", "back": "It presents six 'days' of sustained solitary reflection, a philosophical retreat designed to strip away every doubtable belief to find certainty."}, {"front": "What method does Descartes introduce in Meditation I?", "back": "The method of radical doubt, questioning the reliability of senses, the external world, his own body, and even mathematical truths."}, {"front": "What is Descartes' 'evil genius' (malin génie) and what is its purpose?", "back": "A hypothetical, all-powerful deceiver whose entire effort is directed toward making us believe things that are false, designed to push doubt to its maximum extent."}, {"front": "What is the 'cogito' and what foundational certainty does it establish for Descartes?", "back": "From the Latin 'cogito ergo sum' ('I think, therefore I am'), it establishes that the very act of doubting and thinking proves the existence of the doubter/thinker."}, {"front": "What does Descartes conclude about his essential nature in Meditation II?", "back": "He concludes that he is a 'res cogitans,' a thinking thing, fundamentally a mind rather than a body."}, {"front": "How does Descartes' 'wax argument' demonstrate the mind's role in knowledge?", "back": "It shows that our knowledge of a piece of wax (its extension, flexibility) is not derived from its changing sensible properties, but from the intellect grasping its essential nature."}, {"front": "What property did Descartes make the defining characteristic of all physical matter?", "back": "Extension."}, {"front": "How do Descartes' arguments for God's existence (Meditations III and V) differ from Aristotle's?", "back": "Descartes' arguments are formally independent of Aristotle, deriving God's existence from the contents of the thinking mind rather than from the structure of the moving world."}, {"front": "How does Descartes address the problem of error in Meditation IV?", "back": "He argues that error arises from the misuse of the will, which extends beyond the intellect; we err when we affirm or deny what we do not clearly and distinctly perceive."}, {"front": "What does Meditation VI establish concerning mind, body, and the external world?", "back": "It establishes the real distinction between mind and body and argues for the existence of the external world, relying on God's reliability for our natural inclination to believe in it."}, {"front": "What was Descartes' *Discourse on Method* and what was its significance?", "back": "It was an autobiographical account of how he developed his philosophical method, published with scientific essays to demonstrate the method's practical power in investigating nature."}, {"front": "What important mathematical contribution did Descartes make?", "back": "He invented analytic geometry, the system of coordinates that unites algebra and geometry."}, {"front": "What is the 'rationalist tradition' that followed Descartes?", "back": "The conviction that pure reason, independent of sense experience, is the primary source of genuine knowledge."}, {"front": "How did Baruch Spinoza extend Descartes' philosophical framework?", "back": "Spinoza concluded that there is only one substance—God or Nature—of which minds and bodies are attributes, pushing Descartes' ideas to a radical monist conclusion."}, {"front": "How did Gottfried Wilhelm Leibniz propose to solve the problems left by Descartes' dualism and Spinoza's monism?", "back": "He rejected both, proposing a universe of infinitely many individual substances called 'monads,' each a self-contained mirror of the whole universe."}, {"front": "Who are the three key figures typically associated with the rationalist tradition?", "back": "Descartes, Spinoza, and Leibniz."}, {"front": "What was Kant's main criticism of Aristotle regarding human knowledge of ultimate reality?", "back": "Kant argued that human reason cannot genuinely know the ultimate nature of things (like substance or first cause) in the way Aristotle supposed, contrasting Aristotle's 'yes' with his 'no'."}, {"front": "How did David Hume's philosophy challenge the traditional belief in causation?", "back": "Hume argued that our belief in causation cannot be rationally justified, as we only observe sequence of events, never necessity."}, {"front": "How did Kant's conclusion about causation differ from Hume's, despite accepting Hume's premise?", "back": "While Hume said causation couldn't be known because it wasn't from experience, Kant concluded it was a contribution of the mind to experience—a category through which the mind organizes sensation."}, {"front": "Explain Kant's 'Copernican Revolution' in philosophy.", "back": "Similar to Copernicus showing the Earth moves around the sun, Kant argued that the objects of experience conform to the mind's way of experiencing, rather than the mind conforming to objects as they are in themselves."}, {"front": "According to Kant, what are 'space and time'?", "back": "They are not features of the world as it is in itself but are the 'forms of intuition'—the innate framework through which the mind receives sensory data."}, {"front": "What are Kant's 'categories of understanding,' and what is their role?", "back": "They are fundamental concepts (e.g., substance, causality, necessity) that are not derived from experience but are innate structures through which the mind organizes raw sensory data into a coherent world of objects and events."}, {"front": "What was Kant's central argument about the human mind's interaction with the world?", "back": "The human mind does not passively receive the world as it is but actively structures and organizes experience through its own inherent forms (space and time) and categories of understanding."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
