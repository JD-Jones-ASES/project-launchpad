<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Being (Aristotle III) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What opposing views on change did Parmenides and Heraclitus hold, leading to a philosophical problem?", "back": "Parmenides argued real change is impossible (being cannot come from non-being). Heraclitus argued everything is always changing, nothing stable. Both made ordinary experience impossible to understand."}, {"front": "How did Aristotle solve the ancient philosophical problem of change between Parmenides and Heraclitus?", "back": "He introduced a third category: potentiality (dynamis), which is neither pure being nor non-being, allowing for transition from potential being to actual being."}, {"front": "Define Aristotle's concept of potentiality (dynamis).", "back": "Potentiality (dynamis) is the capacity or power to be or do something; it's a real, though incomplete, mode of being."}, {"front": "Define Aristotle's concept of actuality (energeia).", "back": "Actuality (energeia) is the realization or exercise of a capacity; the fulfillment and completion toward which potentiality is ordered."}, {"front": "Why is potentiality not the same as non-being for Aristotle?", "back": "Potentiality is a real capacity rooted in a thing's nature (e.g., an acorn genuinely has the capacity to become an oak, a stone does not), making it a real mode of being, not mere non-existence."}, {"front": "Provide an example illustrating potentiality (dynamis) and its corresponding actuality (energeia).", "back": "An acorn is potentially an oak (dynamis); the fully grown oak is its actuality (energeia). The child is potentially an adult; the adult is its actuality."}, {"front": "Describe Aristotle's 'irrational potentialities.'", "back": "Irrational potentialities are one-directional capacities (e.g., fire to heat, ice to cool) that are always exercised in the same way when conditions are right, without deliberation or choice."}, {"front": "Describe Aristotle's 'rational potentialities.'", "back": "Rational potentialities are two-directional capacities (e.g., a doctor's medical knowledge to heal or harm) that require an additional factor to determine their direction."}, {"front": "What is *proairesis* in Aristotle's philosophy and why is it important for rational potentialities?", "back": "*Proairesis* is rational choice or deliberate decision. It's crucial because rational potentialities are two-directional, meaning *proairesis* is needed to determine which direction they will be exercised."}, {"front": "How does Aristotle's distinction between rational and irrational powers connect to his ethics?", "back": "Human beings possess rational powers, which are two-directional. Virtue, in ethics, is a stable disposition to make good *proairesis* (deliberate choices) about how to exercise these powers, providing a metaphysical foundation for character."}, {"front": "Define *entelecheia* and explain its relation to *energeia*.", "back": "*Entelecheia* means 'having its end within itself,' referring to the complete fulfillment or full realization of a capacity. *Energeia* ('being at work') suggests ongoing activity. Both are aspects of actuality, with *entelecheia* representing the completed state."}, {"front": "Why does Aristotle claim actuality cannot be defined directly?", "back": "Actuality is considered more basic and prior than potentiality; it is what potentiality is for. Anything defined by reference to something else presupposes that something else, so actuality cannot be defined in terms of anything more fundamental."}, {"front": "How does Aristotle propose understanding actuality, if not by direct definition?", "back": "Through analogy and paired examples (e.g., waking is to sleeping as seeing is to having eyes with them shut). This invites students to recognize the common pattern of having a capacity versus exercising it through direct intellectual perception."}, {"front": "What is the philosophical significance of Aristotle's method of defining actuality by analogy?", "back": "It implies that the most fundamental features of being are not deducible but are basic features of experience that must be recognized directly, suggesting reality's structure is deeply empirical."}, {"front": "What is Aristotle's 'boldest claim' regarding potentiality and actuality in Book IX?", "back": "That actuality is prior to potentiality in three distinct senses: in definition, in time, and in substance."}, {"front": "Explain how actuality is prior to potentiality 'in definition.'", "back": "Every potentiality is defined by reference to the actuality it aims at (e.g., an acorn's potentiality is defined by the oak). In the logical or conceptual order, actuality comes first."}, {"front": "Explain how actuality is prior to potentiality 'in time,' considering individual vs. species.", "back": "While individuals develop from potentiality (egg before chicken), the species itself is eternally actual (chicken before egg). The chain of generation ultimately derives from something already actual."}, {"front": "Explain how actuality is prior to potentiality 'in substance,' or as the *telos*.", "back": "Actuality is the end (*telos*) toward which every potentiality is ordered. The end is more real, complete, and fundamental than the means; understanding the actuality gives the potentiality its whole meaning and direction."}, {"front": "What does the priority of actuality imply about the nature of reality for Aristotle?", "back": "Being is fundamentally active, not passive. Reality is ongoing activity directed toward fulfillment, with a direction from incomplete being (potentiality) toward complete being (actuality)."}, {"front": "What common misconception about potentiality does Aristotle caution against?", "back": "That potentiality is 'nothing' or merely 'not yet.' He emphasizes that potentiality is a real, incomplete mode of being with a genuine capacity, just dependent on actuality for its definition and purpose."}, {"front": "How does Aristotle's potentiality-actuality distinction apply to biological processes?", "back": "Biological change (growth, development, generation) is explained as the actualization of potential, such as a seed growing into a plant or an embryo developing into an adult animal."}, {"front": "How does the potentiality-actuality distinction connect to Aristotle's ethics, beyond rational powers?", "back": "Virtue is the actualization of the soul's rational capacities, and *eudaimonia* (flourishing) is the full actualization of human nature."}, {"front": "How does the potentiality-actuality distinction connect to Aristotle's theology?", "back": "God (the Unmoved Mover) is described as pure actuality (*actus purus*), with no potentiality, serving as the ultimate source of all actualization in the universe."}, {"front": "What is the key takeaway regarding the 'whole point' of potentiality?", "back": "The whole point of potentiality is to become actual. For example, the acorn's entire meaning and direction are understood by its *telos*, which is to become an oak."}, {"front": "Why is understanding a being's *telos* crucial to understanding it fully?", "back": "Because a being's *telos* (its actuality, its end) is prior in substance and gives the being's potentiality its whole meaning and direction. You must understand not only what it is now, but what it is for."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
