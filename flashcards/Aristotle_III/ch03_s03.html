    <style>

<body>

    <script>
    var CARDS = [{"front": "Which Islamic philosopher was known in the Latin West as \"The Commentator\" for his work on Aristotle?", "back": "Averroes (Ibn Rushd)"}, {"front": "What title of honor did medieval European scholars give to Aristotle?", "back": "\"The Philosopher\""}, {"front": "In what city in Muslim Spain was the philosopher Averroes born?", "back": "Cordoba"}, {"front": "Which specific work of Aristotle did Averroes interpret to help reintroduce Aristotelian philosophy to Christian thinkers?", "back": "The Metaphysics"}, {"front": "What is the primary focus of the science that Aristotle describes as investigating \"being as being\"?", "back": "It asks about being itself and the attributes belonging to it solely because it exists."}, {"front": "How does the \"first philosophy\" differ from \"special sciences\" like physics or mathematics?", "back": "First philosophy is universal to all being, while special sciences restrict themselves to a particular region of reality."}, {"front": "What synonym does Aristotle use for \"first philosophy\" when discussing the highest beings?", "back": "Theology (prote philosophia)"}, {"front": "What phrase did Aristotle use to describe the diverse senses of the word \"is\"?", "back": "\"Being is said in many ways\" (to on legetai pollachos)."}, {"front": "According to Aristotle, what is the primary sense of being upon which all other kinds (like quality or quantity) depend?", "back": "Substance (ousia)"}, {"front": "How are qualities, relations, and quantities related to substance in Aristotle’s metaphysics?", "back": "They are real only by belonging to, holding between, or being affections of a substance."}, {"front": "The Principle of Non-Contradiction states that the same attribute cannot both belong and not belong to the same subject at the same time and _____.", "back": "in the same respect"}, {"front": "Why does Aristotle describe the Principle of Non-Contradiction as \"non-hypothetical\"?", "back": "It is a principle that one must already possess to understand anything that exists."}, {"front": "What logical consequence arises from attempting to demonstrate every truth without exception?", "back": "An infinite regress"}, {"front": "Which philosophical technique involves defending a principle by showing that its denial presupposes its truth?", "back": "Retorsion (or negative demonstration)"}, {"front": "What is the minimal requirement for an opponent to participate in a negative demonstration of the Principle of Non-Contradiction?", "back": "The opponent must say something that is significant or has a definite meaning."}, {"front": "What is the result for human reasoning if a word is allowed to have an infinite number of meanings?", "back": "Reasoning is annihilated because not to have one meaning is to have no meaning."}, {"front": "Term: Accident", "back": "Definition: A property that belongs to a substance but is not part of its essential nature."}, {"front": "According to Aristotle, what happens to the concept of \"substance\" if all attributes are considered accidental?", "back": "Substance and essence are done away with, leaving no primary subject for predication."}, {"front": "Which pre-Socratic philosopher is associated with the doctrine that all things are mixed together and nothing really exists separately?", "back": "Anaxagoras"}, {"front": "What is the consequence for the nature of reality if all contradictory statements are true at the same time?", "back": "All things would be one, and distinct objects like a man and a trireme would be the same."}, {"front": "Which philosopher is famously associated with the claim that \"all opinions and appearances are true\"?", "back": "Protagoras"}, {"front": "What practical example does Aristotle use to show that even deniers of non-contradiction make unqualified judgments?", "back": "A man walking to Megara rather than staying home or walking into a well."}, {"front": "How does Aristotle use the concept of \"degree of error\" to argue for the existence of truth?", "back": "If one opinion can be \"more right\" than another, there must be a truth to which the more true is nearer."}, {"front": "Why do some thinkers incorrectly conclude that contradictories are true based on their observation of the sensible world?", "back": "They see contraries coming into existence out of the same thing through change."}, {"front": "In the context of change, what allows a thing to be two contraries at once according to Aristotle?", "back": "A thing can be two contraries potentially, but not actually."}, {"front": "What is the Heraclitean philosopher Cratylus's extreme reaction to the idea that everything is in flux?", "back": "He refused to speak at all and only moved his finger."}, {"front": "How does Aristotle distinguish between a change in quantity and a change in quality?", "back": "He argues that while quantity may change, we know each thing in respect of its unchanging form."}, {"front": "According to Aristotle, what must be true of the \"substrata\" that cause our sensations?", "back": "They must exist apart from sensation and be prior in nature to the sensation itself."}, {"front": "How does Aristotle define \"Truth\" in Book IV of the Metaphysics?", "back": "To say of what is that it is, and of what is not that it is not."}, {"front": "How does Aristotle define \"Falsity\" in Book IV of the Metaphysics?", "back": "To say of what is that it is not, or of what is not that it is."}, {"front": "Which principle states that there can be no intermediate between contradictories, requiring one to either affirm or deny a predicate?", "back": "The Law of Excluded Middle"}, {"front": "How do the Principle of Non-Contradiction and the Law of Excluded Middle complement each other?", "back": "Non-contradiction rules out both being true; excluded middle rules out both being false."}, {"front": "What is the logical result of the doctrine that there is an intermediate between the terms of a contradiction?", "back": "It makes everything false."}, {"front": "What does it mean for a subject to have a \"privation\" of an essential nature?", "back": "It is the denial of a predicate to a determinate genus."}, {"front": "Why is it impossible for \"contraries\" to belong to the same subject at the same time without qualification?", "back": "Because one contrary is a privation of the essential nature of the other."}, {"front": "What is the primary error of those who \"seek a reason for everything\" in the context of first principles?", "back": "They seek to get a starting point by demonstration, even though the starting point of demonstration is not demonstration."}, {"front": "Under what condition does Aristotle allow that \"what appears is true\"?", "back": "Only when qualified by the specific sense, time, and conditions under which it appears."}, {"front": "What Greek term refers to the science of \"being as being\"?", "back": "on he on"}, {"front": "How does Aristotle categorize the discipline of Physics in relation to Wisdom?", "back": "Physics is a kind of wisdom, but it is not the first kind."}, {"front": "According to Aristotle, why is it impossible to", "back": "Because accidental attributes are infinite in number."}, {"front": "What does \"denoting the substance\" of a thing signify regarding its essence?", "back": "It means that the essence of the thing is nothing else but that substance."}, {"front": "What is the relationship between an \"accident\" and its \"subject\"?", "back": "An accident is predicated about a subject, and the accidental always implies such predication."}, {"front": "Why can an accident not be an accident of another accident in an infinite upward series?", "back": "Because no unity can be derived from such a sum; there must be a primary subject."}, {"front": "Which philosopher argued that \"the void and the full exist alike in every part\"?", "back": "Democritus"}, {"front": "What happens to the concept of movement if all attributes belong to all subjects simultaneously?", "back": "Movement becomes impossible because there is nothing into which a thing can change."}, {"front": "In Aristotle’s view, why is the sensation of a \"foreign object\" less authoritative than the sensation of an \"appropriate object\"?", "back": "Each sense has authority only over its specific domain, such as sight for color and taste for flavor."}, {"front": "How does Aristotle define \"necessary\" in the context of being?", "back": "That which is impossible for the thing not to be."}, {"front": "If all things are relative to the person thinking, what becomes of the distinction between the thinker and the thought object?", "back": "Man and that which is thought would be the same, making the thinker relative to an infinity of things."}, {"front": "According to Aristotle, what is the starting point for all other axioms in logic?", "back": "The Principle of Non-Contradiction"}, {"front": "What is the difference between \"demonstration proper\" and \"negative demonstration\"?", "back": "Proper demonstration derives from certainties; negative demonstration shows a view's impossibility by holding the opponent to their own speech."}, {"front": "Why is it impossible for \"white\" to be the same as \"man\" in significance?", "back": "If they had one significance, then all things, including opposites, would be one."}, {"front": "What does Aristotle claim is the only way to cure those who argue \"for the sake of argument\"?", "back": "By refuting the argument as expressed in speech and words."}, {"front": "According to Aristotle, what is the relationship between being and the \"indeterminate\"?", "back": "The indeterminate exists only potentially, not in complete reality."}, {"front": "Why is it fair to prioritize the \"other part\" of the universe over the sensible world surrounding us?", "back": "The surrounding world of destruction and generation is not even a fraction of the whole material universe."}, {"front": "What does Aristotle say to those who ask who should judge the \"healthy man\" versus the \"sick man\"?", "back": "Such inquiries are as idle as asking whether we are currently asleep or awake."}, {"front": "Which philosopher did Aristotle criticize for saying one cannot step into the same river even once?", "back": "Cratylus"}, {"front": "According to the principle of excluded middle, what is the truth value of a statement saying \"what is not is\"?", "back": "False"}, {"front": "According to the principle of excluded middle, what is the truth value of a statement saying \"what is not is not\"?", "back": "True"}, {"front": "Aristotle argues that if there is an intermediate between contradictories, change would involve _____.", "back": "a middle between generation and destruction"}, {"front": "In the sphere of numbers, what would be an example of a forbidden intermediate according to the Law of Excluded Middle?", "back": "A number that is neither odd nor not-odd."}, {"front": "According to Aristotle, why is \"opinion\" less desirable than \"knowledge\" regarding the truth?", "back": "Because the person with opinions is in a state of unhealthiness compared to the one who knows the truth."}, {"front": "What does Aristotle claim the \"understanding\" always does when it connects objects by assertion or negation?", "back": "It says what is either true or false."}, {"front": "According to Aristotle, why does the geometer or arithmetician not discuss the truth or falsity of mathematical axioms?", "back": "Because these axioms hold for all being and are the domain of the philosopher, not a special inquiry."}, {"front": "Which thinkers did Aristotle describe as \"fallen victims\" to the idea that knowledge is sensation?", "back": "Empedocles and Democritus"}, {"front": "What Greek phrase represents the primary starting point: \"Being is said in many ways\"?", "back": "to on legetai pollachos"}, {"front": "If two things have the same definition, such as raiment and dress, Aristotle says they are _____.", "back": "one"}, {"front": "Aristotle describes Physics as a form of wisdom that is not \"the first kind\" because nature is only a _____.", "back": "particular genus of being"}, {"front": "Which philosopher was criticized by Cratylus for saying it is impossible to step twice into the same river?", "back": "Heraclitus"}, {"front": "According to Aristotle, why must there be some thing which is essentially a man?", "back": "To prevent all attributes from being accidents and thus having no primary subject to be predicated of."}, {"front": "What is the result if one denies the Law of Excluded Middle regarding the truth of a thing?", "back": "It results in saying that a person says what is neither true nor untrue."}, {"front": "Why does Aristotle believe beginners in philosophy might \"lose heart\" when seeking the truth?", "back": "If the greatest lovers of truth express views that truth is impossible, seeking it would be like following \"flying game.\""}, {"front": "Aristotle notes that even if sensation of a peculiar object is not false, _____ is not the same as sensation.", "back": "appearance"}, {"front": "The process of denying an intermediate with reference to both its assertion and negation leads to _____.", "back": "an infinite regress and an infinite number of realities"}, {"front": "According to Aristotle, what is the relation between \"that which moves\" and \"that which is moved\"?", "back": "That which moves is prior in nature to that which is moved."}, {"front": "Aristotle uses the example of \"gray\" to illustrate an intermediate between _____.", "back": "contraries (black and white)"}, {"front": "What is the fundamental starting point for persuading those who seek a reason for everything?", "back": "Definition"}, {"front": "Aristotle distinguishes between people who express denials due to difficulties in thinking and those who argue _____.", "back": "for the sake of argument (eristically)"}, {"front": "According to Aristotle, how does the philosopher differ from the \"natural philosopher\" (physicist)?", "back": "The philosopher's inquiry is universal and deals with primary substance rather than just one genus of being."}, {"front": "What is the defining characteristic of a \"non-hypothetical\" principle?", "back": "It is something everyone must already know who knows anything at all."}, {"front": "How does Aristotle characterize those who demand demonstration for the Principle of Non-Contradiction?", "back": "He characterizes them as having a \"want of education\" in logic."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
