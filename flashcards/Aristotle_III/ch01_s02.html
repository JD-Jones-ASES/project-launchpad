    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;

        }

            background: var(--secondary-color);
            color: white;

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;

        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is the literal translation of the Greek phrase τα μετα τα φυσικα?", "back": "The things after the Physics."}, {"front": "What was the original purpose of the label \"metaphysics\" before it became a philosophical term?", "back": "It was a librarian's organizational note used for shelving Aristotle's works after his writings on natural science."}, {"front": "Which three meanings of the Greek prefix μετα have historically influenced the interpretation of metaphysics?", "back": "After, beyond, and about."}, {"front": "Term: πρωτη φιλοσοφια (First Philosophy)", "back": "Definition: Aristotle’s name for the inquiry into being as being, first causes, and the highest principles."}, {"front": "In what sense is \"first philosophy\" considered \"first\" according to Aristotle?", "back": "It is the most fundamental study because it investigates what everything else depends on."}, {"front": "Why did Aristotle sometimes refer to his inquiry as θεολογικη (theology)?", "back": "It ultimately arrives at the study of the divine, the eternal, and the unmoved mover."}, {"front": "How many books comprise Aristotle's \"Metaphysics\"?", "back": "Fourteen."}, {"front": "Which Greek letters are used to label the fourteen books of the \"Metaphysics\"?", "back": "Alpha through Nu."}, {"front": "What is the scholarly consensus regarding the composition of the fourteen books of the \"Metaphysics\"?", "back": "They were compiled from lecture notes and research treatises composed across several decades of Aristotle's career."}, {"front": "The second book of the \"Metaphysics\" is commonly referred to by what name?", "back": "Little alpha."}, {"front": "What is the primary function of Book Δ (Delta) in the \"Metaphysics\"?", "back": "It serves as a philosophical lexicon that defines key terms."}, {"front": "Which book is considered the \"theological climax\" of the \"Metaphysics\"?", "back": "Book Λ (Lambda or XII)."}, {"front": "Term: ουσια (Ousia)", "back": "Definition: Substance or being; the primary kind of being that makes a thing what it is."}, {"front": "What does Aristotle identify as the central question of the inquiry into being?", "back": "The inquiry into ουσια (substance)."}, {"front": "Which specific book of the \"Metaphysics\" focuses on the history of philosophy and the definition of wisdom?", "back": "Book I (Alpha)."}, {"front": "In Book IV (Gamma), what fundamental principle does Aristotle defend as the most certain of all?", "back": "The principle of non-contradiction."}, {"front": "What is the primary subject of Book VII (Zeta)?", "back": "The nature of substance (ουσια)."}, {"front": "Book IX (Theta) is dedicated to explaining the distinction between which two concepts?", "back": "Potentiality and actuality."}, {"front": "How does the \"Metaphysics\" define the \"soul\" in a way that supports the \"Ethics\"?", "back": "The soul is the form of the body, the organizing principle that makes a living thing what it is."}, {"front": "What is the highest human activity in Aristotle's \"Ethics\" that approximates the divine life described in the \"Metaphysics\"?", "back": "The life of contemplation (θεωρια)."}, {"front": "Aristotle describes God, the Unmoved Mover, as what specific form of activity?", "back": "Pure thought thinking itself."}, {"front": "When Aristotle analyzes a work of art in the \"Poetics\", which four metaphysical causes does he use?", "back": "Material, formal, efficient, and final."}, {"front": "In the context of the \"Poetics\", what is the metaphysical status of a tragedy's \"plot\"?", "back": "It is the formal cause or the organizing principle that makes the tragedy what it is."}, {"front": "Why is the defense of the principle of non-contradiction in the \"Metaphysics\" essential to Aristotle's \"Rhetoric\"?", "back": "It provides the condition of possibility for all rational discourse and the correspondence between thought and being."}, {"front": "Where was Aristotle born in 384 BC?", "back": "Stagira, in northern Greece."}, {"front": "What was the profession of Aristotle's father, Nicomachus?", "back": "He was a physician to the Macedonian royal court."}, {"front": "For how many years did Aristotle study and teach at Plato’s Academy?", "back": "Twenty years."}, {"front": "Aristotle famously served as the tutor for which future world leader?", "back": "Alexander the Great (Alexander of Macedon)."}, {"front": "What was the name of the school Aristotle founded in Athens in 335 BC?", "back": "The Lyceum."}, {"front": "Term: Peripatetic school", "back": "Definition: The name for Aristotle's school, derived from the Greek περιπατειν (\"to walk about\")."}, {"front": "To which Greek deity was the gymnasium used by the Lyceum dedicated?", "back": "Apollo Lykeios."}, {"front": "Why did Aristotle withdraw from Athens to Chalcis in 323 BC?", "back": "Anti-Macedonian sentiment forced him to leave after the death of Alexander the Great."}, {"front": "What was Aristotle's famous remark regarding the difference between the educated and the uneducated?", "back": "He said they differ as the living from the dead."}, {"front": "Whose 1924 English translation is considered the standard scholarly version of the \"Metaphysics\"?", "back": "W. D. Ross."}, {"front": "How does the prose style of the \"Metaphysics\" differ from Aristotle's more polished works?", "back": "It is compressed, technical, and dense because it originated as lecture notes for advanced students."}, {"front": "Which book of the \"Metaphysics\" contains the argument for the Unmoved Mover?", "back": "Book XII (Lambda)."}, {"front": "The study of \"being as being\" is one of the primary definitions of _____.", "back": "First philosophy (or metaphysics)."}, {"front": "Concept: The Unmoved Mover", "back": "Definition: The eternal, self-thinking intellect that serves as the first cause of all motion and being."}, {"front": "What distinguishes natural theology from revealed theology in later philosophical thought?", "back": "Natural theology is reason's inquiry into God, while revealed theology is knowledge from Scripture and tradition."}, {"front": "According to the \"Metaphysics\", what is the relationship between the study of principles and the other sciences?", "back": "The principles of \"first philosophy\" are those upon which all other sciences depend."}, {"front": "Which book is described as the record of \"being as being\" and the defense of the principle of non-contradiction?", "back": "Book IV (Gamma)."}, {"front": "Aristotle's inquiry into the root of everything is aimed at the most basic and the most _____.", "back": "Exalted."}, {"front": "What does the term ουσια literally derive from in Greek?", "back": "The verb ειναι (to be)."}, {"front": "Why is the \"Metaphysics\" not considered a \"systematic progression\" like a modern textbook?", "back": "It is a record of ongoing inquiry compiled from notes rather than a single, finished literary essay."}, {"front": "In the \"Metaphysics\", Book I (Alpha) surveys first causes through which lens?", "back": "The history of philosophy."}, {"front": "Which concept from the \"Metaphysics\" explains how a person can live most like the divine?", "back": "θεωρια (contemplation)."}, {"front": "The prefix μετα in the title of Aristotle's work originally meant that the books were shelved _____ the Physics.", "back": "After."}, {"front": "Where did Aristotle conduct the biological research that filled several of his volumes after Plato's death?", "back": "Asia Minor."}, {"front": "What is the primary characteristic of the \"Unmoved Mover\" in Aristotle's theology?", "back": "It is pure thought thinking itself, eternal and unchanging."}, {"front": "In Aristotle’s metaphysical analysis, the organizing principle that makes a tragedy what it is is called the _____.", "back": "Formal cause."}, {"front": "What role does the principle of non-contradiction play in Aristotle's view of rational discourse?", "back": "It is the condition of possibility for all science, rhetoric, and rational argument."}, {"front": "What is the scholarly significance of W. D. Ross in the context of Aristotelian studies?", "back": "He was a foremost twentieth-century scholar who produced the standard, precise English translation of Aristotle's works."}, {"front": "How does Aristotle characterize the \"first causes and principles\" of existing things?", "back": "As the most fundamental things that lie at the root of everything."}, {"front": "Term: θεωρια (Theoria)", "back": "Definition: The life of contemplation, which Aristotle considers the highest form of human happiness."}, {"front": "The Greek letter Λ (Lambda) corresponds to which number in the sequence of the Metaphysics' fourteen books?", "back": "Twelve."}, {"front": "Aristotle's school, the Lyceum, became the center for research enterprise in which subjects?", "back": "Logic, natural science, biology, ethics, politics, rhetoric, and poetics."}, {"front": "What does the text suggest is the reward for \"careful, patient reading\" of the Metaphysics?", "back": "Grasping a serious inquiry into the first principles of reality."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
