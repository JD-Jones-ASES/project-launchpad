<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Being (Aristotle III) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central problem does Aristotle's Metaphysics, Book IX (Theta), address using the concepts of potentiality and actuality?", "back": "It addresses the ancient problem of how change is possible, providing a solution that navigates between the extremes of Parmenides and Heraclitus."}, {"front": "Define *dynamis* in Aristotle's philosophy.", "back": "*Dynamis* refers to potentiality, capacity, or power. It is a genuine capacity to be or do something, not merely an absence."}, {"front": "Define *energeia* in Aristotle's philosophy.", "back": "*Energeia* refers to actuality, activity, or being-at-work. It describes something actively at work or realized."}, {"front": "What is the meaning of *entelecheia*, a term related to Aristotle's concept of actuality?", "back": "*Entelecheia* means full realization or 'having its end within itself,' emphasizing the completeness and self-sufficiency of actualized being."}, {"front": "How did Parmenides of Elea argue against the possibility of genuine change?", "back": "Parmenides argued that change would require something to come from non-being (since it was not before it came to be), but non-being is nothing and cannot produce anything. Therefore, change is an illusion."}, {"front": "How did Heraclitus's view of change differ from Parmenides', and what was Aristotle's criticism of both?", "back": "Heraclitus held that everything is always changing ('You cannot step into the same river twice'), eliminating permanence. Aristotle thought both missed something real: the world contains stable beings that genuinely change."}, {"front": "How does Aristotle's concept of potentiality (dynamis) provide a solution to the problem of change posed by Parmenides and Heraclitus?", "back": "Aristotle introduces potentiality as a middle category between being and non-being. Change is thus a transition from potential to actual being (e.g., an acorn has the potential to be an oak), not something emerging from nothing."}, {"front": "Use Aristotle's 'acorn-to-oak' example to illustrate the distinction between potentiality and actuality.", "back": "The acorn is not yet an oak (not actual), but it has the genuine capacity or potentiality (*dynamis*) to become an oak. The oak is the full realization or actuality (*energeia*) of that potential."}, {"front": "What is the primary sense of *dynamis* (potentiality) as a 'principle of change'?", "back": "It is a capacity within something to produce a change, either in itself or in something else. This includes both active capacities (to act) and passive capacities (to be acted upon)."}, {"front": "How does Aristotle connect the concept of potentiality to his earlier analysis of the four causes?", "back": "He identifies potentiality with the efficient cause when it is conceived as an internal capacity within a thing to initiate change."}, {"front": "Why does Aristotle argue that potentiality is always defined by reference to the actuality it aims at?", "back": "To understand any potentiality (e.g., a sculptor's capacity), one must first understand the actuality it aims at (the act of sculpting), as actuality is the goal and fulfillment that gives potentiality its meaning."}, {"front": "Distinguish between 'irrational' and 'rational' potentialities according to Aristotle.", "back": "Irrational potentialities (e.g., fire heats, stone falls) go in only one direction. Rational potentialities (e.g., a doctor can heal or harm) contain the capacity for opposites."}, {"front": "What determines which way a rational power is exercised?", "back": "Rational choice or deliberate decision, which Aristotle calls *proairesis*."}, {"front": "What is *proairesis*, and what role does it play in Aristotle's ethics?", "back": "*Proairesis* is rational choice or deliberate decision. In ethics, virtue is understood as a stable disposition to make good choices (*proairesis*), exercising one's rational capacities in accordance with reason and the good."}, {"front": "Why does Aristotle define actuality by analogy rather than by a direct definition?", "back": "Actuality is considered more fundamental and the goal toward which potentiality is ordered, making it harder to define directly. Analogy helps grasp its meaning through comparisons of finished states to capacities."}, {"front": "Give two examples of analogies Aristotle uses to define actuality.", "back": "Examples include: waking is to sleeping; seeing is to having eyes with them shut; the finished work is to the raw material; building is to having the capacity to build."}, {"front": "According to Aristotle, in what ways is actuality 'prior' to potentiality?", "back": "Actuality is prior to potentiality in definition (we define potential by its actualization), in time (an actual being must generate a new potential), and in substance (the actualized form is more complete and perfect)."}, {"front": "What was René Descartes' fundamental criticism of the Scholastic (Aristotelian) tradition he was taught?", "back": "Descartes found Aristotelian terms like 'substantial form' and 'final cause' meaningless. He proposed to rebuild philosophy from the ground up, starting from one indubitable truth."}, {"front": "What was René Descartes' foundational 'indubitable truth' from which he proposed to rebuild philosophy?", "back": "*Cogito, ergo sum* ('I think, therefore I am')."}, {"front": "How did Descartes' vision of the universe differ from the Aristotelian view?", "back": "Descartes viewed the universe as matter in motion, governed by mathematical laws, rather than by form and purpose, which contrasted sharply with the Aristotelian emphasis on substantial forms and final causes."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
