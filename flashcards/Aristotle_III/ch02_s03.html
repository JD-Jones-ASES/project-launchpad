    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "According to the opening sentence of the Metaphysics, what do all men by nature desire?", "back": "All men by nature desire to know."}, {"front": "Which specific sense does Aristotle claim is loved for its own sake, even apart from its usefulness?", "back": "The sense of sight is loved for itself."}, {"front": "Why is the sense of sight preferred over other senses for the sake of knowledge?", "back": "It brings to light many differences between things more than any other sense."}, {"front": "In the hierarchy of knowledge, what faculty is produced in some animals from the faculty of sensation?", "back": "Memory is produced from sensation."}, {"front": "What additional sense must an animal possess alongside memory to be capable of being taught?", "back": "The sense of hearing is required for an animal to be taught."}, {"front": "How does Aristotle define the origin of 'experience' in human beings?", "back": "Experience is produced from the consolidation of several memories of the same thing."}, {"front": "According to the quote by Polus, what does 'inexperience' produce?", "back": "Inexperience produces luck."}, {"front": "How does 'art' ($techne$) arise from experience?", "back": "Art arises when a single universal judgment about a class of objects is produced from many notions of experience."}, {"front": "In terms of action, how does a man of experience compare to a man who has theory without experience?", "back": "Men of experience often succeed better in action because action is concerned with the individual, which experience knows."}, {"front": "Why is an 'artist' considered wiser than a man of mere experience?", "back": "The artist knows the cause and the 'why' of a thing, whereas the man of experience only knows that it is so."}, {"front": "What is the primary sign that distinguishes a person who knows from one who does not?", "back": "The person who knows is capable of teaching others."}, {"front": "Why does Aristotle exclude the senses from being classified as 'Wisdom'?", "back": "Senses give knowledge of particulars but do not explain the 'why' or the cause of things."}, {"front": "What allowed the mathematical arts to be founded first in Egypt?", "back": "The priestly caste in Egypt was allowed the leisure necessary for such study."}, {"front": "In the development of arts, why were inventors of non-useful arts (recreation) considered wiser than inventors of useful ones?", "back": "Their branches of knowledge did not aim at utility."}, {"front": "According to Aristotle, what is the primary subject matter of 'Wisdom'?", "back": "Wisdom deals with the first causes and the principles of things."}, {"front": "Why are 'universal' things considered the hardest for humans to know?", "back": "They are the furthest removed from the senses."}, {"front": "How does the complexity of principles affect the 'exactness' of a science?", "back": "Sciences involving fewer principles, such as arithmetic, are more exact than those involving additional principles, like geometry."}, {"front": "Why is the science that investigates causes considered the most 'instructive'?", "back": "Instructors are defined as those who can tell the causes of each thing."}, {"front": "In the hierarchy of sciences, what determines if a science is 'superior' to an ancillary one?", "back": "The superior science is desirable for its own sake and for the sake of knowing rather than for its results."}, {"front": "How does Aristotle describe the relationship between the wise man and the less wise in terms of command?", "back": "The wise man must not be ordered but must order, and the less wise must obey him."}, {"front": "What is the 'supreme good' in the whole of nature according to Aristotle's view of causes?", "back": "The supreme good is the 'end' or purpose for which each thing is done."}, {"front": "What are the names of the four causes identified by Aristotle?", "back": "The material, formal, efficient, and final causes."}, {"front": "Which cause refers to the substance or essence of a thing, often reducible to its definition?", "back": "The formal cause."}, {"front": "Which cause identifies the matter or substratum of a thing?", "back": "The material cause."}, {"front": "Which cause identifies the source of change or motion?", "back": "The efficient cause."}, {"front": "Which cause refers to the purpose, the good, or the 'end' of generation?", "back": "The final cause."}, {"front": "What first principle was identified by Thales of Miletus?", "back": "Thales identified water as the first principle."}, {"front": "Which philosopher identified Mind ($nous$) as an efficient cause?", "back": "Anaxagoras identified mind as an efficient cause."}, {"front": "What were the four material elements identified by Empedocles?", "back": "Earth, water, fire, and air."}, {"front": "What were the two efficient causes proposed by Empedocles?", "back": "Love and strife."}, {"front": "In what specific area did Socrates focus his philosophical inquiries?", "back": "Socrates focused on ethical matters and the seeking of universal definitions."}, {"front": "Why did Plato conclude that universal definitions could not apply to sensible things?", "back": "Sensible things are in a constant state of flux, making fixed knowledge of them impossible."}, {"front": "What term did Plato use to describe the relationship between sensible things and the Ideas?", "back": "Sensible things exist by 'participation' in the Ideas."}, {"front": "Before Plato's 'participation', what term did the Pythagoreans use to describe the relationship between things and numbers?", "back": "They used the term 'imitation'."}, {"front": "To what does Aristotle compare the human soul's reason when faced with things that are 'by nature most evident'?", "back": "He compares it to the eyes of bats facing the blaze of day."}, {"front": "Why does Aristotle believe the investigation of truth is collectively easy?", "back": "No one fails to hit the truth entirely, much like a proverbial door that no one can fail to hit."}, {"front": "What is the primary end or goal of 'theoretical' knowledge?", "back": "The end of theoretical knowledge is truth."}, {"front": "What is the primary end or goal of 'practical' knowledge?", "back": "The end of practical knowledge is action."}, {"front": "According to Aristotle, how is the degree of a thing's truth determined?", "back": "A thing's truth is proportional to its being; the causes of derivative truths are the most true."}, {"front": "Why should we be grateful to previous thinkers who expressed even 'superficial' views on truth?", "back": "They contributed by developing the powers of thought for those who followed."}, {"front": "What is the relationship between knowing a truth and knowing its cause?", "back": "Aristotle asserts that we do not know a truth without knowing its cause."}, {"front": "What does the term 'masterworker' imply in Aristotle's hierarchy of labor?", "back": "A masterworker is wiser than a manual worker because they know the causes of the actions being performed."}, {"front": "The principles of _____ things must be always most true, as they are the cause of the being of other things.", "back": "Eternal."}, {"front": "In the case of a physician, why is 'man' only cured in an incidental way?", "back": "The physician cures individuals like Callias or Socrates, who happen to be men."}, {"front": "What differentiates the manual worker from the masterworker in terms of how they act?", "back": "The manual worker acts through habit, while the masterworker acts through theory and knowledge of causes."}, {"front": "Aristotle describes Wisdom as the most 'useless' knowledge. What does this signify?", "back": "It is not pursued for utility or results, but for its own sake to satisfy the desire to understand."}, {"front": "Which philosopher's doctrines taught Plato that all sensible things are in a 'state of flux'?", "back": "Cratylus and the Heracliteans."}, {"front": "In the context of the four causes, what is the 'ultimate why' reducible to?", "back": "The definition."}, {"front": "According to Aristotle, what provides the most authoritative knowledge of 'particulars'?", "back": "The senses."}, {"front": "Why is arithmetic considered more 'exact' than geometry?", "back": "It involves fewer principles."}, {"front": "Which cause is described as 'the source of the change'?", "back": "The efficient cause."}, {"front": "What is the 'material cause' also referred to as in the text?", "back": "The substratum."}, {"front": "Aristotle argues that the study of truth is a _____ enterprise across generations.", "back": "Cooperative."}, {"front": "What does the 'telos' represent in the four-cause framework?", "back": "The final cause or purpose."}, {"front": "According to Aristotle, what is the relationship between the 'good' and the 'causes'?", "back": "The good is the 'end,' which is one of the causes (the final cause)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
