<head>

    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Aristotle, what does it mean to say that the desire to know is \"natural\" for humans?", "back": "It means this desire belongs to our fundamental constitution as human beings, not to upbringing, culture, or individual preferences."}, {"front": "What evidence does Aristotle offer for the claim that humans naturally desire to know?", "back": "He points to our immediate experience of delight in our senses, especially sight, even when no practical gain is involved (e.g., enjoying a sunset or a beautiful face)."}, {"front": "List Aristotle's hierarchy of cognition and knowledge, from most basic to highest.", "back": "Sensation (aisthesis) → Memory (mneme) → Experience (empeiria) → Art (techne) → Science (episteme) → Wisdom (sophia)."}, {"front": "Define Sensation (aisthesis) in Aristotle's hierarchy.", "back": "The most basic form of cognition, shared by humans and animals, which grasps particular things in the present moment but does not retain or compare."}, {"front": "Define Experience (empeiria) and explain how it differs from Sensation and Memory.", "back": "Experience is the accumulation of memories into a practical familiarity with a domain. It allows for knowing \"that\" something works, but not \"why,\" and distinguishes humans from most animals."}, {"front": "What is Art (techne) in Aristotle's framework, and how does it differ from Experience (empeiria)?", "back": "Art (craft/technique) is knowledge of the general cause or principle underlying a domain of practice. Unlike experience, it knows \"why\" something works, and is therefore teachable; it is distinctively human."}, {"front": "Define Science (episteme) in Aristotle's hierarchy.", "back": "Scientific or demonstrative knowledge; knowledge of necessary truths from their causes, grasping truths that could not be otherwise."}, {"front": "What is Wisdom (sophia) for Aristotle?", "back": "The highest form of theoretical knowledge; the \"master science\" that understands the first causes and principles of all things, being the most universal and certain."}, {"front": "How does Aristotle's term \"aitia\" (often translated as \"cause\") differ from the modern English understanding of \"cause\"?", "back": "\"Aitia\" is broader, meaning \"explanation\" or \"reason\" — whatever is responsible for something being the way it is. Modern \"cause\" often refers specifically to efficient causation."}, {"front": "What is the collective purpose of Aristotle's Four Causes?", "back": "To provide a complete account or explanation of why something is the way it is, addressing different aspects of its being."}, {"front": "Define the Material Cause (hyle) and provide an example.", "back": "The matter or stuff out of which something is made. Example: The bronze of a statue, the timber of a house, flesh and bone of a human."}, {"front": "Define the Formal Cause (eidos) and explain how it relates to Plato's Forms.", "back": "The organizing pattern, structure, or essence that makes a thing what it is (e.g., the shape of a statue, the soul of a human). Aristotle's form is *in* the thing, unlike Plato's Forms which exist separately."}, {"front": "Define the Efficient Cause and provide an example.", "back": "What brought the thing about; the source of the change or motion. Example: The sculptor for a statue, the builder for a house, parents for a human being."}, {"front": "Define the Final Cause (telos) and provide an example.", "back": "The end or purpose for which the thing exists or acts. Example: To honor a god (statue), to provide shelter (house), eudaimonia (human being)."}, {"front": "Why does Aristotle insist that a complete explanation always involves all Four Causes?", "back": "Because each cause represents a distinct kind of explanation (what it's made of, what it is, what made it, what it's for), and omitting any one leaves the account incomplete."}, {"front": "Apply the Four Causes to explain a \"table.\"", "back": "Material: wood; Formal: rectangular flat surface with legs; Efficient: the carpenter; Final: to provide a surface for eating and writing."}, {"front": "Apply the Four Causes to explain a \"human being.\"", "back": "Material: flesh, bone, brain; Formal: the particular person with their personality/intelligence (the soul as organizing principle); Efficient: parents and genetics; Final: eudaimonia (living and functioning well as a human being)."}, {"front": "Why is the Final Cause (telos) particularly important in Aristotle's philosophy, especially when considering ethics?", "back": "For Aristotle, all actions and natural processes aim at an end (telos). Understanding the final cause of human existence (eudaimonia) is central to his ethical framework, as nature itself is pervaded by final causation."}, {"front": "Describe Aristotle's \"dialectical method\" for approaching philosophical problems.", "back": "He systematically surveys the received opinions (endoxa) of his predecessors, identifying what is right and what is missed in each, to demonstrate that his own view synthesizes partial truths and corrects errors."}, {"front": "How did Aristotle view Thales' claim that water is the first principle in terms of the Four Causes?", "back": "Aristotle saw Thales as \"reaching toward the material cause,\" even if he identified it incorrectly."}, {"front": "How did Aristotle interpret Plato's theory of Forms, and what was his primary criticism regarding it?", "back": "Aristotle saw Plato as \"reaching toward the formal cause\" but criticized the \"serious error\" of separating Forms from the things that have them (i.e., Forms existing in a separate realm)."}, {"front": "What was Aristotle's unique contribution to the understanding of causes compared to his predecessors?", "back": "No one before him identified all four causes or fully understood their interrelation; Aristotle's account brought them together into a complete explanatory framework."}, {"front": "According to Aristotle, why is the study of truth difficult for humans, despite truth not being hidden?", "back": "Our minds are not equal to what is most evident or clear in itself (e.g., being itself, first causes), much like bats cannot easily look directly at daylight."}, {"front": "What does Aristotle's view of philosophy as a \"cooperative enterprise\" imply for students reading his work today?", "back": "It suggests that philosophy is a multi-generational conversation where each thinker builds on predecessors and contributes for those who come after, making students active participants."}, {"front": "Why does Aristotle describe wisdom as \"useless\" knowledge, and why does he also call it the \"most free\"?", "back": "It is \"useless\" because it is not pursued for practical problems, making money, or building things. It is \"most free\" because it is pursued for its own sake, as an end in itself, not in service of anything else."}, {"front": "A highly experienced doctor knows which remedies work but can't explain why. A less experienced doctor can explain the underlying biological causes. Which doctor, according to Aristotle, is more genuinely wise?", "back": "The less experienced doctor who can explain the causes. Aristotle argues that wisdom requires knowing *why* things work (techne), not just *that* they work (empeiria), because understanding causes allows for teaching and deeper insight."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
