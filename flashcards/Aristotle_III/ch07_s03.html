    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>

        </div>

    <script>
    var CARDS = [{"front": "What is *theoria* according to Aristotle, and why is it considered the highest human activity?", "back": "*Theoria* is intellectual contemplation, considered the highest human activity because it is the exercise of our most divine faculty (reason) on the highest objects, most resembling the life of God."}, {"front": "How does Aristotle define *Eudaimonia* (the flourishing life) in the *Nicomachean Ethics*?", "back": "*Eudaimonia* is not a feeling, but an activity to be performed and sustained over a complete human life, lived in accordance with our deepest nature, involving developed virtues and contemplation."}, {"front": "What is the meaning of Aristotle's", "back": "*Politikon zōon* means 'political animal,' indicating that humans are fitted by nature not merely for company but for self-governing political community. The *polis* is the fulfillment of a natural impulse."}, {"front": "According to Aristotle's *Politics*, what is the ultimate purpose of the city (polis)?", "back": "The purpose of the city is to provide the conditions in which citizens can live virtuously and well, enabling them to achieve the good life together, which is the same end as the *Ethics*."}, {"front": "What is *mimesis* in Aristotle's *Poetics*?", "back": "*Mimesis* is imitation or creative representation. For Aristotle, all arts are forms of *mimesis*, not mere copying, but a transformative representation of human beings in action that reveals something universal about the human condition."}, {"front": "Name the three modes of persuasion identified by Aristotle in the *Rhetoric*.", "back": "The three modes of persuasion are *ethos* (speaker's trustworthy character), *pathos* (audience's emotions), and *logos* (force of reason)."}, {"front": "Briefly define *ethos*, *pathos*, and *logos* as Aristotelian modes of persuasion.", "back": "*Ethos* is the appeal grounded in the speaker's trustworthy character; *pathos* is the appeal through the audience's emotions; and *logos* is the appeal through reasoned argument. Aristotle considered *logos* the most important."}, {"front": "What does Aristotle consider the highest form of art in the *Poetics*, and what are some of its key elements?", "back": "Tragedy is the highest form of art. Its key elements include plot, character, *hamartia* (tragic flaw), reversal, recognition, and the *katharsis* (purification) of pity and fear in the audience."}, {"front": "What primary philosophical questions does Aristotle's *Metaphysics* address?", "back": "The *Metaphysics* asks what is ultimately real, what are the first causes and principles of everything that exists, what is being as being (*on he on*), what is substance (*ousia*), and what is the relation between potentiality and actuality."}, {"front": "What does *on he on* mean in Aristotle's *Metaphysics*?", "back": "*On he on* means 'being as being,' which is the subject of first philosophy. It studies what is true of everything that exists simply because it exists, unlike other sciences that study particular kinds of being."}, {"front": "What is *ousia* (substance) for Aristotle, and why is it important?", "back": "*Ousia* is substance, identified as the primary kind of being. Qualities, relations, quantities, and processes exist in things, and their existence depends on the existence of these primary substances. It's foundational to understanding reality."}, {"front": "Explain the relationship between *dynamis* (potentiality) and *energeia* (actuality) in Aristotle's philosophy.", "back": "*Dynamis* (potentiality) refers to what something can become, while *energeia* (actuality) is what it actually is. Aristotle argues for the priority of actuality, meaning something can be potentially X only because there is, somewhere and at some time, an actual X."}, {"front": "What is the 'Unmoved Mover' in Aristotle's *Metaphysics*, and what is its primary activity?", "back": "The Unmoved Mover is a being of pure actuality, an eternal self-thinking intellect that moves all things by being supremely worth knowing. Its primary activity is *noesis noeseos* (thought thinking thought)."}, {"front": "How does Aristotle connect the contemplative life (*theoria*) from the *Ethics* to the Unmoved Mover in the *Metaphysics*?", "back": "The contemplative life (*theoria*) is the highest life in the *Ethics* because it most closely resembles the life of the divine Unmoved Mover, whose supreme activity is eternal self-contemplation (*noesis noeseos*)."}, {"front": "Why is Aristotle's *Metaphysics* considered the 'foundation' for his other works, such as the *Ethics* and *Politics*?", "back": "The *Metaphysics* answers the fundamental presuppositions of other works: the *Ethics* presupposes human nature and real goods; the *Politics* presupposes real human goods; the *Poetics* presupposes art can represent reality; and the *Rhetoric* presupposes reason's power to grasp truth. All these are metaphysical claims."}, {"front": "Name Aristotle's four causes, which provide a framework for complete explanation.", "back": "The four causes are: the material cause (what it's made of), the formal cause (its structure or form), the efficient cause (what brought it about), and the final cause (what it's for, its end or purpose)."}, {"front": "What is the significance of Aristotle's identification of substance (*ousia*) as the primary kind of being?", "back": "This insight posits that reality is ultimately a world of 'somethings' that have properties, stand in relations, and undergo processes, with qualities and relations depending on these primary substances. This ancient intuition has profoundly shaped subsequent metaphysics."}, {"front": "Explain the significance of Aristotle's insight regarding the priority of actuality over potentiality.", "back": "This means reality is fundamentally active rather than passive, being is a kind of doing, and concepts of fulfillment and excellence are not mere projections but follow from reality's structure, as the actual defines the possible."}, {"front": "What is Aristotle's principle of non-contradiction, and why is it considered a most certain truth?", "back": "The principle states that nothing can both be and not be at the same time and in the same respect. It's most certain because it cannot be proved (any proof would use it) but can be defended as the very act of asserting something meaningful presupposes it. It's a metaphysical claim about reality."}, {"front": "How does Aristotle's 'demand for a first cause' (the Unmoved Mover) function as a requirement of reason?", "back": "The demand for an Unmoved Mover, a being of pure actuality that explains the existence and order of everything else without requiring explanation itself, is presented as a requirement of reason, addressing fundamental questions like 'why is there something rather than nothing?'"}, {"front": "What is *noesis noeseos*?", "back": "*Noesis noeseos* means 'thought thinking thought.' It is Aristotle's"}, {"front": "How did Renaissance critics interpret Aristotle's *Poetics*, particularly regarding tragedy?", "back": "Renaissance critics transformed Aristotle's descriptive account of tragedy into a set of prescriptive rules, which then shaped European drama for centuries."}, {"front": "What is the overarching connection between Aristotle's *Nicomachean Ethics* and *Politics*?", "back": "Both works are ultimately aimed at the same end: the good life for human beings. The *Ethics* defines what makes a human life good, and the *Politics* describes the kind of community (the well-ordered city) that makes such a life possible."}, {"front": "According to Aristotle, how does 'true rhetoric' serve truth?", "back": "True rhetoric serves truth by making good arguments clear and compelling, providing audiences with what they need to decide well, rather than merely manipulating them."}, {"front": "Beyond specific claims, what defines the 'Unity of Aristotle's Inquiry' across his diverse works?", "back": "All five works (Ethics, Politics, Poetics, Rhetoric, Metaphysics) are parts of one great inquiry into human nature, the world, and the divine, each addressing different facets of what makes human life, community, expression, and reality good and intelligible."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
