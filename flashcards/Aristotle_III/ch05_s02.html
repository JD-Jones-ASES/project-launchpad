    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does 'teleological' mean in the context of Aristotle's philosophy?", "back": "Directed toward an end or purpose. It explains 'what something is for,' rather than 'what caused it,' and is built into the very being of natural substances."}, {"front": "How does Aristotle explain the development of an acorn into an oak tree?", "back": "For Aristotle, the acorn possesses an inherent 'potentiality' or inner directedness, rooted in its form, to become an oak. This is a real feature, not a metaphor."}, {"front": "In Aristotle's framework, what is the relationship between the 'soul' and the 'body'?", "back": "The soul is the form of the body, the organizing principle that directs the body's matter toward the actualization of human life. They are inseparable aspects of one living substance."}, {"front": "How did Descartes's vision of the universe fundamentally differ from Aristotle's teleological view?", "back": "Descartes replaced Aristotle's universe of forms, ends, and potentialities with a universe of matter in motion governed by mathematical laws, discarding teleology."}, {"front": "According to Descartes, why does an acorn develop into an oak?", "back": "An acorn develops into an oak not due to an intrinsic potentiality, but because mechanical laws governing its particles produce that outcome under relevant conditions. It's particles pushing particles."}, {"front": "Which of Aristotle's four causes did Descartes's mechanistic physics retain, and which did it discard?", "back": "Descartes's physics retained only 'efficient causation' (particles in motion acting on other particles) and discarded formal and final causes as scientifically meaningless."}, {"front": "What is Descartes's term for the 'thinking thing' or mind, and what is its primary characteristic?", "back": "Res cogitans (thinking thing). It is defined entirely by the capacity for thought and is a non-spatial, non-extended substance."}, {"front": "What is Descartes's term for 'matter' or 'body,' and what is its primary characteristic?", "back": "Res extensa (extended thing). It is defined entirely by spatial extension (length, breadth, depth) and is a purely mechanical system operating by physical laws."}, {"front": "What is the key difference between mind and body, according to Descartes in his *Meditations*?", "back": "The body is by nature always divisible, while the mind (or soul) is entirely indivisible, apprehending itself as clearly one and entire."}, {"front": "How does Descartes's concept of 'essence' differ from Aristotle's?", "back": "For Aristotle, essence is the dynamic form/principle of a thing's activity. For Descartes, essence is a static conceptual object, an eternal and necessary truth (like a geometric definition) that exists independently of the thing's existence or being thought about."}, {"front": "How does Descartes use the example of a triangle to illustrate his view of essence?", "back": "He argues that a triangle has an immutable and eternal nature/essence, with properties (e.g., angles summing to two right angles) that are true regardless of whether any triangle exists in the world or whether he initially considered those properties."}, {"front": "What major intellectual consequence resulted from Descartes's program of dismantling the teleological universe?", "back": "The birth of modern science, which shifted its inquiry from asking 'what things are for?' to 'how do they work?' by focusing on mechanical laws."}, {"front": "What profound philosophical problem emerged as a central challenge in modern thought due to Descartes's radical dualism?", "back": "The mind-body problem: The question of how two completely distinct substances (*res cogitans* and *res extensa*) can interact and relate to one another."}, {"front": "What was Descartes's proposed, but largely unaccepted, solution to the mind-body problem?", "back": "He suggested that the mind and body interact through the pineal gland, but this explanation was not convincing to his contemporaries or later philosophers."}, {"front": "How does Aristotle's view of the soul avoid the mind-body problem that Descartes's dualism created?", "back": "For Aristotle, the soul is not a separate substance but the form (organizing principle) of the body, making them inseparable aspects of a single living substance, thus no interaction problem arises."}, {"front": "What does 'actus purus' mean, and to whom did Aquinas apply this term?", "back": "Actus purus (pure act or pure actuality) is Aquinas's technical term for God. It signifies a being in whom there is no potentiality whatsoever, only pure, unalloyed actuality."}, {"front": "What are the implications of God being 'actus purus' for God's nature, according to Aquinas?", "back": "God cannot change, grow, develop, or become more or less than God already is, because there is no unrealized capacity or unachieved fulfillment in God. God is perfectly and fully what God is, eternally."}, {"front": "How do all creatures, according to Aquinas, differ from God in terms of actuality and potentiality?", "back": "Every creature is a mixture of actuality and potentiality, constantly ordered toward fulfillment and still achieving what it is meant to be. God, by contrast, is pure actuality without any potentiality."}, {"front": "What were some 'prices' or consequences of the mechanistic view of the universe that arose from Descartes's philosophy?", "back": "Questions of alienation, meaninglessness, and the place of purpose and value in a purely mechanical universe, in addition to the acute mind-body problem."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
