<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary measure of a philosopher's greatness, according to the text, when discussing Aristotle?", "back": "A philosopher's greatness is measured not only by their own achievements but by what others have built on their foundations."}, {"front": "Which of Aristotle's logical works survived in Latin-speaking Europe after the collapse of the Western Roman Empire?", "back": "The Categories, On Interpretation, and parts of the Prior Analytics."}, {"front": "Where were most of Aristotle's major scientific and philosophical treatises preserved and elaborated during the centuries they were lost to the Latin West?", "back": "In the Arabic-speaking world."}, {"front": "Who was Al-Fārābī and what was his key philosophical contribution?", "back": "A major Islamic thinker (c. 872–950) who synthesized Aristotle and Plato and argued that philosophy and prophetic religion teach the same truths by different methods."}, {"front": "Describe Avicenna's (Ibn Sīnā's) significance in the Arabic tradition.", "back": "Persian philosopher and physician (980–1037) who built one of the great philosophical systems on Aristotelian foundations, significantly influencing Islamic and Christian scholasticism (e.g., Aquinas on the necessary being)."}, {"front": "Why was Averroes (Ibn Rushd) called “the Commentator” in the Latin medieval tradition?", "back": "For his extraordinarily detailed commentaries on virtually all of Aristotle's works, which were so thorough that medieval European scholars often read Aristotle through them."}, {"front": "What “seismic effect” did the reintroduction of Aristotle's works have on European intellectual life beginning in the twelfth century?", "back": "It provided a complete philosophical system—logic, physics, biology, psychology, ethics, politics, metaphysics, theology—constructed by a pagan based on reason alone, without Scripture."}, {"front": "Why did Aristotle become known simply as “the Philosopher” in the medieval university?", "back": "His comprehensive philosophical system became the framework for the medieval university, structuring teaching, disputation, natural science, and philosophical theology."}, {"front": "List two major tensions or contradictions between Aristotle's philosophy and Christian theology that arose during its reintroduction to the Latin West.", "back": "Aristotle's insistence on the eternity of the universe contradicted Genesis, and his concept of “noesis noeseos” (a God who thinks only himself) sat uneasily with the God of Abraham. His account of the soul also seemed to threaten personal immortality."}, {"front": "Who definitively resolved the tensions between Aristotelian philosophy and Christian theology in the Middle Ages?", "back": "Thomas Aquinas."}, {"front": "Explain Thomas Aquinas's foundational principle, “gratia non tollit naturam sed perficit.”", "back": "“Grace does not destroy nature, but perfects it.” This principle established a hierarchical relationship between faith and reason, theology and philosophy, where the higher order completes what the lower order begins."}, {"front": "How did Dante honor Aristotle in The Divine Comedy?", "back": "He placed Aristotle in the highest place in Limbo (for virtuous pagans) and called him “il maestro di color che sanno” (“the master of those who know”), acknowledging his supreme achievements within natural reason."}, {"front": "How does Raphael's “School of Athens” visually represent the core philosophical difference between Plato and Aristotle?", "back": "Plato points upward toward the transcendent realm of Forms, while Aristotle gestures outward and downward toward the visible world, symbolizing their differing views on ultimate reality."}, {"front": "What Aristotelian concept forms the deep structure of Shakespeare's tragedies (e.g., Hamlet, Macbeth)?", "back": "Hamartia, an error of judgment, flaw, or failure of practical wisdom, which leads the protagonist through reversal and recognition to catastrophe, evoking pity and fear in the audience."}, {"front": "Why did John Milton choose to build his epic Paradise Lost on an Aristotelian cosmological framework despite knowing about the new astronomy?", "back": "He made the choice deliberately because the Aristotelian cosmos served as a “poem about order,” providing the imaginative scaffolding and thematic relevance needed for his poem about the disruption of order."}, {"front": "In Umberto Eco's “The Name of the Rose,” what lost work of Aristotle is central to the plot?", "back": "The lost second book of Aristotle's Poetics, which was supposedly devoted to comedy, and whose potential defense of laughter a fanatical monk kills to suppress."}, {"front": "How did modern philosophy, from Descartes onward, generally approach Aristotle's legacy?", "back": "It can be understood as a sustained attempt to replace or transcend Aristotle, by challenging final causes, shifting inquiry to the knowing mind, attacking the concept of substance, and questioning metaphysics."}, {"front": "How did Martin Heidegger re-engage with Aristotle's philosophy?", "back": "He began his career intensely focused on Aristotle's concept of being, arguing that the Western tradition had misunderstood the depth of the question of being that Aristotle had raised."}, {"front": "What was G. E. M. Anscombe's key argument for an Aristotelian revival in moral philosophy?", "back": "In “Modern Moral Philosophy” (1958), she argued that modern ethics (Kantian and utilitarian) was incoherent without the Aristotelian concept of a human telos (natural end or purpose) to give meaning to normative concepts like “ought” and “virtue.”"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
