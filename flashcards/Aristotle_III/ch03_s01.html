    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;

        .fc-breadcrumb a {
            color: var(--secondary-color);

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;

            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;

            background: var(--primary-color);

        }
        .fc-label {
            position: absolute;

        }

            background: transparent;

            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;

        .fc-progress-bar {
            height: 100%;

            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;

            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;

            font-family: 'Crimson Text', serif;

            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */

            margin-top: 1.5rem;

        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;

            border: 1px solid var(--border-color);

        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;

        </div>
    </main>

    <script>
    var CARDS = [{"front": "What does Aristotle mean by the phrase $on\\ he\\ on$?", "back": "The study of \"being as being,\" or things in the capacity of their existence rather than specific attributes."}, {"front": "How does \"first philosophy\" ($prote\\ philosophia$) differ from special sciences like biology or physics?", "back": "Special sciences restrict inquiry to a particular kind of thing, while first philosophy has no domain restriction and studies being itself."}, {"front": "Why does Aristotle occasionally refer to the science of being as being as \"theology\" ($theologike$)?", "back": "It culminates in the study of the highest and most perfectly actual beings."}, {"front": "In Aristotle's framework, what is the specific focus of the science of physics?", "back": "Physics studies natural beings, specifically bodies in motion."}, {"front": "What is the primary subject of study for the mathematician according to Book IV?", "back": "Mathematics focuses on abstract quantities such as numbers and figures."}, {"front": "How does Aristotle respond to the concern that a science of \"everything\" is hopelessly vague?", "back": "He argues that universal truths, such as the four causes and the principle of non-contradiction, are the most precise and fundamental."}, {"front": "What must Aristotle overcome to prove that \"being\" is a unified concept suitable for a single science?", "back": "The objection that \"being\" is said in many different, unrelated senses."}, {"front": "Concept: Substance ($ousia$)", "back": "Definition: The primary category of being that exists in itself rather than in another."}, {"front": "How does a dependent category, such as quality or quantity, differ from a substance?", "back": "A dependent category exists only by belonging to or being in a substance."}, {"front": "Aristotle uses the term $pros\\ hen$ equivocity, or \"focal meaning,\" to describe what relationship?", "back": "The relationship where different senses of \"being\" all refer back to one primary center, which is substance."}, {"front": "Why is substance considered the \"primary\" sense of being?", "back": "All other kinds of being—such as qualities, quantities, and relations—depend on substances for their existence."}, {"front": "What would happen to qualities and relations if all substances were destroyed?", "back": "They would disappear because they have no independent existence outside of substances."}, {"front": "Which specific branch of inquiry does the science of being as being fundamentally become?", "back": "The science of substance."}, {"front": "The Latin term $qua$ is best translated in a philosophical context as _____.", "back": "In the capacity of."}, {"front": "Aristotle clarifies that \"being as being\" is not a study of a \"super-being\" but rather an investigation into _____.", "back": "Reality at its most fundamental level."}, {"front": "What is the formulation of the Principle of Non-Contradiction regarding attributes and subjects?", "back": "The same attribute cannot at the same time belong and not belong to the same subject in the same respect."}, {"front": "Why is the qualification \"at the same time\" necessary for the Principle of Non-Contradiction?", "back": "It allows a subject to possess opposite attributes sequentially, such as a lake being warm in summer and cold in winter."}, {"front": "Why is the qualification \"in the same respect\" necessary for the Principle of Non-Contradiction?", "back": "It allows a subject to have different descriptions relative to different standards, such as a length being short relative to a mountain but long relative to a finger."}, {"front": "According to Aristotle, what is the \"most certain of all principles\"?", "back": "The Principle of Non-Contradiction."}, {"front": "Why does Aristotle claim that the Principle of Non-Contradiction cannot be proved?", "back": "It is the foundational presupposition of all proof, and any attempt to prove it would be circular."}, {"front": "If the Principle of Non-Contradiction were false, what would happen to the enterprise of logical proof?", "back": "The enterprise would collapse because there would be no guarantee that any premise is true rather than false."}, {"front": "What philosophical technique does Aristotle use to defend the Principle of Non-Contradiction without a formal proof?", "back": "Retorsion."}, {"front": "In the defense by retorsion, what is the only thing the denier must do to commit themselves to the Principle of Non-Contradiction?", "back": "Say anything that has a definite meaning."}, {"front": "Why does \"meaning something definite\" effectively affirm the Principle of Non-Contradiction?", "back": "To mean one specific thing is to necessarily exclude its opposite."}, {"front": "What happens if a denier of the Principle of Non-Contradiction refuses to speak or assign definite meaning to words?", "back": "They fall silent, and silence does not constitute a valid philosophical denial."}, {"front": "Which pre-Socratic philosopher is a target of Aristotle's defense because he taught that opposites are one?", "back": "Heraclitus."}, {"front": "Which Sophist is targeted for teaching that \"man is the measure of all things\" and that contradictory propositions can both be true?", "back": "Protagoras."}, {"front": "Define the Principle of Excluded Middle.", "back": "The principle stating that for any statement, there is no middle ground between affirmation and negation; either $S$ is $P$ or $S$ is not-$P$."}, {"front": "How do the Principle of Non-Contradiction and the Principle of Excluded Middle differ in what they prohibit?", "back": "Non-contradiction says statements cannot both be true; excluded middle says they cannot both be false."}, {"front": "The Principle of Non-Contradiction and the Principle of Excluded Middle together form the _____.", "back": "Law of bivalence."}, {"front": "What does the Law of Bivalence imply about the nature of every meaningful statement?", "back": "Every meaningful statement is either true or false."}, {"front": "How does Aristotle's Principle of Excluded Middle reflect his view on the nature of reality?", "back": "It asserts that reality is determinate and things do not exist in an indeterminate zone between being and non-being."}, {"front": "Why is the Principle of Excluded Middle considered a claim about reality rather than a claim about knowledge?", "back": "It states that the world is one way or another, regardless of whether we have the information to know which way it is."}, {"front": "In the history of philosophy, what is the primary difference between Aristotle's and Descartes' grounding of certainty?", "back": "Aristotle grounds certainty in being (the world), whereas Descartes grounds it in thought (the mind)."}, {"front": "The term for using the same word for completely different things, like \"bat\" for an animal and \"bat\" for sports equipment, is _____.", "back": "Pure equivocity (or mere synonymy)."}, {"front": "The term for using the same word for exactly the same thing, such as \"mammal\" for any mammal, is _____.", "back": "Univocity."}, {"front": "What does Aristotle claim about the word \"man\" in his retorsion argument?", "back": "It must mean something determinate, such as \"rational animal,\" which excludes its opposite."}, {"front": "What is the \"world-first\" approach in philosophy as exemplified by Aristotle?", "back": "The view that fundamental truths are based on how the world actually is at the most basic level."}, {"front": "Which of Aristotle's principles ensures that our statements about the world are either correct or incorrect?", "back": "The Principle of Excluded Middle."}, {"front": "What is the primary characteristic of a \"special science\" that makes progress possible?", "back": "The narrowing of focus to clear, determinate objects of study."}, {"front": "Aristotle's technique of turning an opponent's own claim against itself is known as _____.", "back": "Retorsion."}, {"front": "Why is a quality like \"pallor\" or \"speed\" not considered a substance?", "back": "It cannot exist on its own and must belong to a subject like Socrates or a horse."}, {"front": "In Book IV, Aristotle argues that the science of being as being is not only possible but also _____.", "back": "Necessary."}, {"front": "What logical consequence follows if the word \"man\" meant both \"rational animal\" and \"not-a-rational-animal\" simultaneously?", "back": "Language would lose its ability to say anything meaningful."}, {"front": "According to the text, what prevents the universal truths of metaphysics from being \"vague generalities\"?", "back": "They are the most precise and certain truths that govern all thought and reality."}, {"front": "The phrase \"there is nothing more certain\" explains why the Principle of Non-Contradiction cannot be derived from _____.", "back": "Premises."}, {"front": "Aristotle’s claim that \"being is said in many ways\" refers to the _____ of the term \"being.\"", "back": "Multivocity (or equivocity)."}, {"front": "What does Aristotle consider the primary kind of being in every domain?", "back": "Substance."}, {"front": "How does Aristotle characterize the relationship between the Principle of Non-Contradiction and logic?", "back": "The principle governs logic, but it is primarily a principle about being itself."}, {"front": "What does the example of \"life on a particular planet\" illustrate about the Principle of Excluded Middle?", "back": "That a question has a determinate answer in reality even if humans lack the knowledge to answer it."}, {"front": "Which principle suggests that it is impossible for the same thing to both be and not be in the same way at the same time?", "back": "The Principle of Non-Contradiction."}, {"front": "In the context of First Philosophy, what is the role of the \"four causes\"?", "back": "They serve as universal truths that explain all things across all domains."}, {"front": "Why is the study of being $qua$ being considered the most abstract inquiry?", "back": "It widens its focus to include everything that exists rather than narrowing it."}, {"front": "Aristotle's response to the \"Heraclitean challenge\" (opposites are one) relies heavily on what specific qualifications?", "back": "\"At the same time\" and \"in the same respect.\""}, {"front": "The claim that \"the world has a definite character\" is a foundational assumption of which Aristotelian principle?", "back": "The Principle of Excluded Middle."}, {"front": "In the analogy of \"standing on the ground,\" what does the \"ground\" represent?", "back": "The Principle of Non-Contradiction as the necessary foundation for all reasoning."}, {"front": "What is the relationship between the science of being as being and the establishiment of fundamental truths?", "back": "First philosophy is the only science that can establish the most fundamental truths of all reality."}, {"front": "According to the teacher's note, what is the first step in the argument structure of Book IV?", "back": "Identifying the new science of being as being."}, {"front": "How does Aristotle justify the unification of the study of being despite its diverse meanings?", "back": "By identifying substance as the focal point that relates all meanings of being."}, {"front": "What is the \"mind-first\" approach that contrasts with Aristotle's metaphysics?", "back": "The Cartesian approach that grounds certainty in the thinking self rather than the external world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
