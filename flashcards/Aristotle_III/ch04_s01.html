    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to Aristotle, what is the primary question of metaphysics that has always been and will always be asked?", "back": "What is substance?"}, {"front": "In Aristotle's categorizations of being, why are qualities and quantities considered secondary to substances?", "back": "They depend on substances for their existence."}, {"front": "What is the primary metaphysical task Aristotle pursues throughout Book VII of his work?", "back": "Determining the principle or cause of what makes something a substance."}, {"front": "What Greek term is used to denote 'substance' in Aristotle's metaphysics?", "back": "$\\textit{Ousia}$"}, {"front": "In the investigation of substance, what is the 'substratum' or 'subject'?", "back": "The underlying matter that persists through change."}, {"front": "What is the meaning of the Greek phrase $\\textit{to ti en einai}$?", "back": "The essence, or the formula stating what a thing truly and necessarily is."}, {"front": "Why does Aristotle disqualify universals from being primary substances?", "back": "They are properties shared by many things rather than being individual, particular entities."}, {"front": "Which two candidates for substance does Aristotle eventually narrow his debate down to?", "back": "Matter and form."}, {"front": "Why does Aristotle argue that matter alone cannot be substance in the primary sense?", "back": "Matter is indeterminate and lacks a definable character."}, {"front": "How does Aristotle define $\\textit{eidos}$ (form)?", "back": "The defining structure or pattern that makes a thing what it is."}, {"front": "What is the primary role of form in making an object knowable?", "back": "It provides the determinate character that can be defined and understood."}, {"front": "What is the definition of $\\textit{hyle}$ (matter)?", "back": "The physical stuff or substratum out of which things are made."}, {"front": "How is 'prime matter' characterized in a strict philosophical sense?", "back": "As pure potentiality with no form at all."}, {"front": "Where do Aristotle's forms exist in relation to physical things?", "back": "Within the particular things themselves."}, {"front": "What is the fundamental difference between Aristotle’s forms and Plato’s Forms?", "back": "Aristotle's forms are immanent in things, while Plato's are transcendent and separate."}, {"front": "What is the term for the doctrine that physical things are composites of form and matter?", "back": "Hylomorphism."}, {"front": "What Greek term signifies the composite whole of matter and form?", "back": "$\\textit{Synolon}$"}, {"front": "In the hylomorphic analysis of a bronze statue, what constitutes the matter?", "back": "The bronze."}, {"front": "In the hylomorphic analysis of a bronze statue, what constitutes the form?", "back": "The figure or shape of the god or hero."}, {"front": "How does Aristotle define the soul in the context of the human body?", "back": "The soul is the form of the body."}, {"front": "Under hylomorphism, how is the event of death defined?", "back": "The separation of the form (animating principle) from the matter."}, {"front": "Why is form considered prior to matter in the definition of a house?", "back": "The form (the plan for shelter) makes the materials a house rather than a wall or path."}, {"front": "Aristotle describes matter as the 'out of which' and form as the '_____.'", "back": "What it is to be."}, {"front": "How does hylomorphism apply to the study of biology?", "back": "It views living things as parts organized by a form to function as a whole."}, {"front": "What is the 'form' of a good soul in Aristotelian ethics?", "back": "Virtue."}, {"front": "According to $\\textit{De Anima}$, what is the process of attaining knowledge?", "back": "The possession of form without the matter."}, {"front": "Why is knowledge possible for humans according to Aristotle's theory of form?", "back": "Form is shareable and can be received by the mind without the physical material."}, {"front": "When a person perceives a triangle, what does the mind grasp?", "back": "The form of triangularity without the physical matter."}, {"front": "What is the relationship between the craftsman's plan and the bronze in the sculptor illustration?", "back": "The plan (form) determines what the bronze (matter) will become."}, {"front": "According to the teacher's note, why can a person remain the 'same' despite bodily cells being replaced?", "back": "The person's form (soul) remains constant while the matter changes."}, {"front": "Which category of being serves as the foundation for all other categories like relations and properties?", "back": "Substance."}, {"front": "What specific characteristic of form allows it to be the subject of a proper definition?", "back": "Its definable and specific character."}, {"front": "In the four candidates for substance, what is 'the genus'?", "back": "The wider category, such as 'animal,' under which species fall."}, {"front": "The investigation of 'being as being' converges on the investigation of _____.", "back": "Substance."}, {"front": "What does Aristotle call the underlying matter that remains after a bronze statue is melted down?", "back": "The subject or substratum."}, {"front": "Why is a genus not considered a primary substance?", "back": "It is a universal property shared by many, not a particular individual."}, {"front": "In hylomorphism, the term $\\textit{synolon}$ literally means '_____.'", "back": "The whole together."}, {"front": "In the example of a house, what materials represent the matter?", "back": "Bricks, timber, and mortar."}, {"front": "What is the primary answer Aristotle gives to the question 'What is substance?'", "back": "Form."}, {"front": "What aspect of a thing tells us 'what it is made of'?", "back": "The matter."}, {"front": "What aspect of a thing tells us 'what it is'?", "back": "The form."}, {"front": "Aristotle's rejection of Plato's separate Forms is one of his most important departures from his _____.", "back": "Teacher."}, {"front": "In psychology, the soul organizes flesh and bone into a _____ being.", "back": "Thinking, perceiving, and living."}, {"front": "What happens to the 'matter' of a living being at the moment of death?", "back": "It remains, but it is no longer organized by the animating form."}, {"front": "Why can the same bricks be used to make a wall or a house?", "back": "The identity of the object depends on the form imposed on the matter."}, {"front": "What does the eye receive when perceiving a statue, according to $\\textit{De Anima}$?", "back": "The form of the statue without the bronze."}, {"front": "What determines that a metal chair and a wooden chair are the 'same kind of thing'?", "back": "They share the same form (structure and function)."}, {"front": "What concept describes a stable disposition that organizes desires toward a proper end?", "back": "Virtue."}, {"front": "Which book of the Metaphysics connects the inquiry of Book VII to the broader program of Book IV?", "back": "Book VII, Section 1 (VII.1)."}, {"front": "Substance is the primary sense of being because everything else _____ on it.", "back": "Depends."}, {"front": "What is the 'formula that states what a thing truly and necessarily is' called?", "back": "Essence."}, {"front": "According to Aristotle, matter considered simply as what receives form is _____.", "back": "Passive and indeterminate."}, {"front": "Which philosopher argued that the Form of Beauty exists separately from physical things?", "back": "Plato."}, {"front": "In the 'Think Deeper' exercise, what remains constant if you change a chair's material from wood to metal?", "back": "The form."}, {"front": "What does Aristotle's hylomorphism provide the foundation for in his broader philosophy?", "back": "His biology, psychology, and ethics."}, {"front": "How does Aristotle characterize the relationship between form and definition?", "back": "Form is what is expressed when we give a proper definition."}, {"front": "The bronze of a statue is already 'formed' in practice because it is already a metal with its own _____.", "back": "Properties."}, {"front": "What does the investigator seek when asking for the 'cause' of substance?", "back": "What it is in virtue of which something is a substance at all."}, {"front": "According to Aristotle, the form of this horse is what makes this horse a _____.", "back": "Particular substance."}, {"front": "Aristotle's metaphysical framework describes matter as potentiality and form as _____.", "back": "Actuality (or determinate character)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
