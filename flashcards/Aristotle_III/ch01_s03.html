    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who are the two primary \"inheritors\" of Aristotle's metaphysics discussed in the text?", "back": "Thomas Aquinas and René Descartes."}, {"front": "Which 13th-century philosopher sought to build upon and deepen Aristotle's arguments?", "back": "Thomas Aquinas."}, {"front": "Which 17th-century philosopher sought to challenge and rebuild Aristotle's philosophical system?", "back": "René Descartes."}, {"front": "Aquinas understood the world through purpose, form, and the hierarchy of being, while Descartes understood it through _____ and mechanism.", "back": "mathematics"}, {"front": "In what year and region was Thomas Aquinas born?", "back": "1225 near Aquino in southern Italy."}, {"front": "Where did Thomas Aquinas first encounter the works of Aristotle in his early twenties?", "back": "The University of Naples."}, {"front": "During which centuries was the full corpus of Aristotle recovered in Western Europe?", "back": "The twelfth and thirteenth centuries."}, {"front": "From which language were Aristotle's works first translated into Latin during the Middle Ages?", "back": "Arabic."}, {"front": "Who was the Arabic scholar known in the medieval West as \"the Commentator\"?", "back": "Averroes (Ibn Rushd)."}, {"front": "Which Persian philosopher's works were translated into Latin and helped shape the reception of Aristotle in medieval Europe?", "back": "Avicenna (Ibn Sīnā)."}, {"front": "What unqualified honorific title did medieval scholars use for Aristotle?", "back": "The Philosopher."}, {"front": "What was Aquinas's basic approach to the pagan philosophy of Aristotle?", "back": "Embrace it, correct it where necessary, and build on it."}, {"front": "What is the title of Aquinas's comprehensive synthesis of Christian theology and Aristotelian philosophy?", "back": "Summa Theologica."}, {"front": "How did Aristotle describe God in *Metaphysics* Book XII?", "back": "As an Unmoved Mover and self-thinking thought."}, {"front": "In the Thomistic synthesis, what does the Latin phrase *gratia non tollit naturam, sed perficit* mean?", "back": "Grace does not destroy nature, but perfects it."}, {"front": "According to Aquinas's principles, what is the relationship between reason and faith?", "back": "Reason arrives at truths that faith confirms and elevates."}, {"front": "To which religious order did Thomas Aquinas belong?", "back": "The Dominican friars."}, {"front": "Under which master did Aquinas study in Cologne and Paris?", "back": "Albert the Great."}, {"front": "What was Aquinas's final remark about his own writing following a mystical experience?", "back": "\"It seems to me like straw compared to what I have seen.\""}, {"front": "In what year was René Descartes's *Meditations on First Philosophy* published?", "back": "1641."}, {"front": "The title of Descartes's *Meditations on First Philosophy* was a deliberate echo of which Aristotelian work?", "back": "The Metaphysics."}, {"front": "Why did Descartes believe Aristotelian philosophy was fundamentally unable to deliver genuine certainty?", "back": "It built too much on deceptive sense perception and unverifiable concepts."}, {"front": "What radical epistemological strategy did Descartes use to find a foundation for knowledge?", "back": "Systematic doubt of everything that can possibly be doubted."}, {"front": "What is the foundational certainty Descartes discovered that survives systematic doubt?", "back": "I am thinking, therefore I exist (the cogito)."}, {"front": "Translate the Cartesian phrase: *cogito, ergo sum*.", "back": "I think, therefore I am."}, {"front": "In Descartes's reconstructed world, what are the only two kinds of substance?", "back": "Res cogitans (thinking thing) and res extensa (extended thing)."}, {"front": "Term: *res cogitans*.", "back": "The mind or soul, defined purely by the activity of thought."}, {"front": "Term: *res extensa*.", "back": "The body and all physical matter, defined purely by spatial extension."}, {"front": "How does Descartes's view of physical nature differ from Aristotle's?", "back": "Descartes sees nature as a machine governed by mathematical laws rather than a hierarchy of forms."}, {"front": "Where was René Descartes born?", "back": "La Haye en Touraine, France."}, {"front": "Which philosopher is commonly referred to as the \"father of modern philosophy\"?", "back": "René Descartes."}, {"front": "What mathematical system is named after René Descartes?", "back": "The Cartesian coordinate system (analytic geometry)."}, {"front": "What does the term \"Thomistic\" refer to in philosophy?", "back": "Ideas specifically developed by Aquinas or in the tradition he founded."}, {"front": "What does the term \"Cartesian\" refer to in philosophy?", "back": "Ideas that come from Descartes or follow his philosophical approach."}, {"front": "According to Descartes, what defines the substance of *res extensa*?", "back": "Spatial extension (length, breadth, and depth)."}, {"front": "How does Descartes's *res cogitans* differ from Aristotle's concept of the soul?", "back": "It is a purely mental substance that could exist without any body."}, {"front": "What did Descartes identify as the criterion for truth?", "back": "Clear and distinct ideas."}, {"front": "In the context of the medieval university, why was Aristotle's arrival considered a \"crisis\"?", "back": "He offered a complete account of the world based on reason alone, independent of Christian revelation."}, {"front": "Besides the *Summa Theologica*, name another major work by Thomas Aquinas.", "back": "Summa Contra Gentiles."}, {"front": "In what year was Thomas Aquinas declared a Doctor of the Church?", "back": "1567."}, {"front": "Which philosopher died in Stockholm, Sweden, after being invited there by Queen Christina?", "back": "René Descartes."}, {"front": "According to Aristotle, the Unmoved Mover moves the cosmos by being an object of _____.", "back": "desire and love"}, {"front": "What school of thought dominated European intellectual life for nearly four hundred years before Descartes?", "back": "Aristotelian philosophy (Scholasticism)."}, {"front": "What was the significance of the 12th-century recovery of Aristotle's works like *Physics* and *Ethics*?", "back": "They had been largely lost to the Latin West for centuries."}, {"front": "Under Descartes's system, what governs the movement of physical matter?", "back": "Mechanical laws."}, {"front": "What specific academic degree did René Descartes earn from the University of Poitiers?", "back": "A degree in law."}, {"front": "According to the text, what represents the \"sovereign thinking self\" in modern thought?", "back": "Descartes's philosophy."}, {"front": "What is the primary difference between how Aquinas and Descartes viewed the \"starting point\" of philosophy?", "back": "Aquinas started with the world and its hierarchy, while Descartes started with the internal certainty of the self."}, {"front": "Which work by Descartes was published in 1637 and includes his methodological foundations?", "back": "Discourse on the Method."}, {"front": "Aquinas corrected Aristotle's God by showing he is not just an intellect, but a God who knows, loves, and _____ the world.", "back": "redeems"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
