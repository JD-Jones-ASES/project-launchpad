<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Life of Being (Aristotle III) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Life of Being (Aristotle III) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Aristotle_III">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the ultimate goal of all human actions according to the Nicomachean Ethics?", "back": "The ultimate goal is eudaimonia, or flourishing."}, {"front": "How does Aristotle define eudaimonia?", "back": "The active, excellent exercise of rational activity over a complete life."}, {"front": "According to Aristotle's 'function argument,' what is the distinctively human function?", "back": "The exercise of reason."}, {"front": "What is the meaning of the Greek term arete?", "back": "Virtue or excellence, representing the full development of a human capacity."}, {"front": "How do intellectual virtues differ from moral virtues in their development?", "back": "Intellectual virtues develop through instruction, while moral virtues develop through habit."}, {"front": "According to Aristotle, how does a person become courageous or just?", "back": "By repeatedly performing courageous or just actions until they become second nature."}, {"front": "Define the Aristotelian 'Doctrine of the Mean.'", "back": "The principle that every moral virtue is a middle point between the vices of excess and deficiency."}, {"front": "In the Doctrine of the Mean, what are the two vices associated with the virtue of courage?", "back": "Cowardice (deficiency) and rashness (excess)."}, {"front": "In the Doctrine of the Mean, what are the two vices associated with the virtue of generosity?", "back": "Stinginess (deficiency) and prodigality (excess)."}, {"front": "Which intellectual virtue enables an individual to discern the 'mean' in specific circumstances?", "back": "Practical wisdom, or phronesis."}, {"front": "How does Aristotle describe the role of a true friend in the pursuit of the good life?", "back": "A true friend is 'another self' who shares in the pursuit of genuine virtue."}, {"front": "What activity does Aristotle consider the highest form of human happiness?", "back": "Theoria, or intellectual contemplation."}, {"front": "Why is theoria considered the highest human activity?", "back": "It is the activity that most closely resembles the life of the divine as pure thought."}, {"front": "What is the meaning of Aristotle’s claim that man is a politikon zbaroon?", "back": "It means humans are 'political animals' naturally fitted for life in an organized community."}, {"front": "What is the polis in the context of Aristotelian political thought?", "back": "The polis is the self-governing community that serves as the natural fulfillment of human social life."}, {"front": "List the three 'correct' forms of government identified in the Politics.", "back": "Monarchy, aristocracy, and polity."}, {"front": "List the three 'deviant' forms of government identified in the Politics.", "back": "Tyranny, oligarchy, and democracy."}, {"front": "What distinguishes a 'correct' constitution from a 'deviant' one?", "back": "Correct constitutions serve the common good, while deviant ones serve the rulers' private interests."}, {"front": "Identify three factors Aristotle cites as causes for the collapse of constitutions.", "back": "Factionalism, extreme inequality, and the neglect of the middle class."}, {"front": "What is the primary responsibility of the state regarding its citizens?", "back": "To shape the characters of citizens through law, habituation, and public education."}, {"front": "How did Thomas Aquinas modify Aristotle's concept of the highest human good?", "back": "He argued that our ultimate end is the supernatural vision of God rather than just natural eudaimonia."}, {"front": "What is Thomas Aquinas's famous principle regarding grace and human nature?", "back": "Grace does not destroy nature but perfects it."}, {"front": "Define the concept of mimesis as presented in the Poetics.", "back": "The creative imitation or representation of human beings in action."}, {"front": "Why does Aristotle argue that poetry is 'more philosophical' than history?", "back": "Poetry reveals universal truths about what could happen, whereas history only records specific events that did happen."}, {"front": "List the six elements of tragedy identified by Aristotle.", "back": "Plot, character, thought, diction, song, and spectacle."}, {"front": "Which element of tragedy does Aristotle rank as the most important?", "back": "The plot."}, {"front": "What is anagnorisis in the context of Greek tragedy?", "back": "The moment of recognition where a character moves from ignorance to knowledge."}, {"front": "What is the term for the purification of pity and fear in a tragic audience?", "back": "Katharsis."}, {"front": "Define hamartia in Aristotelian tragic theory.", "back": "An error of judgment by a person of high character that leads to their downfall."}, {"front": "How does Aristotle define rhetoric?", "back": "The art of finding the available means of persuasion in any given case."}, {"front": "In rhetoric, what is the appeal based on the speaker's character called?", "back": "Ethos."}, {"front": "In rhetoric, what is the appeal to the audience's emotions called?", "back": "Pathos."}, {"front": "In rhetoric, what is the appeal to reason and logical argument called?", "back": "Logos."}, {"front": "Why did Aristotle insist that logos is the most important mode of persuasion?", "back": "Because it ensures the audience is genuinely persuaded by truth rather than being manipulated by emotion or personality."}, {"front": "What is 'first philosophy' as described in the Metaphysics?", "back": "The inquiry into the nature of being itself and the ultimate causes of existence."}, {"front": "How does the study of Ethics logically lead to the study of Politics?", "back": "Ethics defines the good life for the individual, while Politics defines the community that makes that life possible."}, {"front": "What metaphysical question underlies the study of Ethics?", "back": "The question of what a human being fundamentally is and what its nature is for."}, {"front": "What metaphysical presupposition underlies the study of Politics?", "back": "The assumption that there are real goods that exist beyond merely agreed-upon preferences."}, {"front": "What metaphysical presupposition underlies the study of Rhetoric?", "back": "The assumption that rational argument has the power to grasp and communicate the truth."}, {"front": "Which Renaissance development transformed Aristotle's descriptive Poetics?", "back": "Renaissance critics transformed his descriptive accounts into prescriptive rules for literature."}, {"front": "According to Aristotle, how does a speaker's use of pathos affect an audience?", "back": "It uses emotions like anger or fear to make the audience susceptible to specific arguments."}, {"front": "In the 'function argument,' how is a 'good' human defined in comparison to a 'good' knife?", "back": "A good human is one who performs the distinctively human function of reasoning with excellence."}, {"front": "What is the relationship between laws and virtue in the Politics?", "back": "Laws are a primary tool used by the state to habituate citizens toward virtuous character."}, {"front": "Which 13th-century philosopher synthesized Aristotelian philosophy with Christian theology?", "back": "Thomas Aquinas."}, {"front": "What is the 'moment of recognition' in a tragedy often paired with to produce a powerful effect?", "back": "A reversal of fortune."}, {"front": "Why is eudaimonia described as a 'kind of life' rather than a 'feeling'?", "back": "Because it is the active exercise of the soul's capacities rather than a transient state of pleasure."}, {"front": "According to the text, what prevents phronesis from being reduced to a simple rule or algorithm?", "back": "It is a cultivated capacity for seeing clearly what a unique and particular situation requires."}, {"front": "What social class did Aristotle believe was vital for the stability of a constitution?", "back": "The middle class."}, {"front": "In Aristotelian thought, why is history considered 'less philosophical' than poetry?", "back": "History is limited to what specifically happened, while poetry explores the broader possibilities of the human condition."}, {"front": "What is the ultimate subject of the third volume in this series?", "back": "The Metaphysics, or the nature of being itself."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
