<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP United States History &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Manifest Destiny", "back": "The nineteenth-century doctrine, popularized from 1845, holding that U.S. expansion across North America was both inevitable and divinely ordained. It fused American nationalism, Protestant providentialism, and racial belief in Anglo-American superiority. Historians note its internal contradiction: it celebrated liberty while denying it to indigenous peoples and Mexicans.", "id": "fc01"}, {"front": "John O'Sullivan", "back": "New York journalist who coined the phrase 'manifest destiny' in 1845, giving expansionist ideology its enduring label. The phrase crystallized beliefs that Providence had set the continent aside for Anglo-American civilization's spread.", "id": "fc02"}, {"front": "Texas Revolution (1836)", "back": "Armed revolt by American settlers (many of them slaveholders) in Mexican Texas, defeating Mexican forces under Santa Anna. It resulted in the Republic of Texas, which existed as an independent nation for nine years before U.S. annexation. A key motive was protecting slavery, which Mexico had banned.", "id": "fc03"}, {"front": "Texas Annexation (1845)", "back": "The admission of the Republic of Texas as the twenty-eighth U.S. state in December 1845, achieved by joint resolution of Congress rather than treaty. Delayed for nine years because it was inseparable from slavery — admitting Texas meant adding a huge slaveholding state and disrupting senatorial balance.", "id": "fc04"}, {"front": "James K. Polk", "back": "President (1845–49) elected on an expansionist platform who sought California and New Mexico in addition to Texas. He ordered General Taylor to advance to the Rio Grande, used the resulting clash to request a war declaration from Congress, and presided over the Mexican-American War and Treaty of Guadalupe Hidalgo.", "id": "fc05"}, {"front": "The 'spot' controversy", "back": "First-term Illinois congressman Abraham Lincoln challenged Polk's war message by demanding to know the exact 'spot' where American blood was shed — arguing it was disputed Mexican territory, not unambiguously American soil, making Polk's casus belli fraudulent.", "id": "fc06"}, {"front": "Mexican-American War (1846–48)", "back": "Two-year conflict triggered by the disputed Texas boundary. U.S. forces invaded on multiple fronts: Taylor from Texas, Kearny seizing Santa Fe, Stockton/Frémont securing California, and Scott's amphibious landing at Veracruz and march to Mexico City. Military triumph was decisive; political consequences were enormous.", "id": "fc07"}, {"front": "Treaty of Guadalupe Hidalgo (1848)", "back": "Peace settlement ending the Mexican-American War. Mexico ceded roughly half its territory (present-day California, Nevada, Utah, Arizona, New Mexico, and parts of Colorado and Wyoming) in exchange for $15 million. Simultaneously gave the U.S. Pacific ports and ignited the territorial slavery question.", "id": "fc08"}, {"front": "Wilmot Proviso", "back": "Proposed amendment introduced by Pennsylvania Representative David Wilmot in 1846 that would have banned slavery from any territory acquired from Mexico. Passed the House repeatedly (free-state majority) but failed in the Senate (slave-state near-parity). Never became law but defined the central political fault line of the next decade.", "id": "fc09"}, {"front": "Sectional arithmetic of the Wilmot Proviso votes", "back": "The Proviso's fate in each chamber dramatized sectional power: the House, apportioned by population, gave free states a majority — so the Proviso passed there. The Senate, with equal representation per state, preserved near-parity for slave states — so the Proviso failed there. This arithmetic shaped all slavery debates through 1860.", "id": "fc10"}, {"front": "Missouri Compromise line (36°30′)", "back": "The 1820 compromise formula that permitted slavery in territories south of latitude 36°30′ and banned it north of that line (except Missouri). The Mexican cession made this formula politically unsustainable — too much of the ceded land lay south of the line, and Northern politicians would no longer accept automatic slaveholding rights in new territories.", "id": "fc11"}, {"front": "Popular sovereignty (antebellum)", "back": "The doctrine that territorial settlers, not Congress, should decide whether to permit slavery. First associated with Senator Lewis Cass (1848), it was presented as a democratic middle ground. Its fundamental ambiguity — when could residents vote? — made it politically unworkable, as Bleeding Kansas demonstrated.", "id": "fc12"}, {"front": "Free Soil movement", "back": "Political position (and from 1848, the Free Soil Party platform) holding that western territories must be reserved for free white labor. It opposed slavery's expansion — not abolition where it existed — arguing that slave labor degraded the conditions of free workers. Its infrastructure was absorbed into the Republican Party after 1854.", "id": "fc13"}, {"front": "Consequences of the war for Mexico", "back": "A catastrophe: Mexico lost roughly 55 percent of its pre-war national territory — a wound to national memory persisting for generations. For Mexican and indigenous communities in the ceded territories, the Treaty's citizenship and property promises were violated systematically through legal dispossession and social exclusion.", "id": "fc14"}, {"front": "NAT + GEO theme: Manifest Destiny", "back": "Manifest Destiny's geographic imagination was inseparable from national identity claims — to define the nation as continental was simultaneously to define it as white and Anglo-American. The territorial shape Americans imagined was driven not by geographic necessity but by racial and providential ideology. Mexico had governed; indigenous nations had inhabited; the U.S. imposed a new national identity.", "id": "fc15"}, {"front": "The officers of the Mexican-American War", "back": "The war produced a generation of officers — Grant, Lee, Sherman, Stonewall Jackson, McClellan — whose Civil War careers were shaped by their Mexican experience. Former comrades, trained in the same war, would command opposing armies fifteen years later — illustrating how the sectional crisis divided even military institutions.", "id": "fc16"}, {"front": "What made the Texas Revolution controversial from the start?", "back": "Many American settlers in Mexican Texas were slaveholders who had violated Mexican law (Mexico had banned slavery). The revolution was partly a defense of slavery against Mexican abolition policy. This made the subsequent annexation question inseparable from the expansion of the slave system.", "id": "fc17"}, {"front": "How did Polk construct the casus belli for war with Mexico?", "back": "Polk ordered Taylor to advance to the Rio Grande — territory Mexico claimed as its own. When Mexican forces crossed and killed American soldiers, Polk declared 'American blood has been shed on American soil.' Critics like Lincoln challenged whether the disputed territory was actually American, suggesting Polk had manufactured the provocation.", "id": "fc18"}, {"front": "Why was California's non-indigenous population explosion significant?", "back": "Gold was discovered at Sutter's Mill in January 1848 (eight days before the Treaty of Guadalupe Hidalgo). Within two years, California's non-indigenous population grew from ~14,000 to over 100,000. California applied for statehood as a free state in 1849, directly triggering the crisis that required the Compromise of 1850.", "id": "fc19"}, {"front": "APUSH Key Concept: Territorial Expansion as Crisis Accelerant", "back": "For the AP exam: every acre acquired from Mexico made sectional crisis more acute, not less. The Wilmot Proviso demonstrated that North and South held irreconcilable positions on slavery's expansion. The Mexican War removed the last territorial buffer that had allowed Americans to avoid confronting the incompatibility of slavery and republican governance.", "id": "fc20"}, {"front": "Comparison: How did indigenous peoples figure into Manifest Destiny's logic?", "back": "Manifest Destiny's ideology treated indigenous peoples as 'obstacles rather than sovereign peoples with rights worth respecting.' The United States did not fill a vacuum — it imposed a new national identity on peoples who already had ones, including indigenous nations that had inhabited the continent for centuries.", "id": "fc21"}, {"front": "Continuity/Change: How did the Mexican-American War change the slavery debate?", "back": "Change: the Mexican cession introduced roughly 500,000 square miles of new territory that had to be organized, forcing the question of slavery's expansion into the territories onto center stage immediately. The Missouri Compromise formula (1820) had managed this question for twenty-six years; after 1848, it was no longer politically sustainable.", "id": "fc22"}, {"front": "How was the joint resolution for Texas annexation constitutionally significant?", "back": "Treaty ratification requires a two-thirds Senate majority; a joint resolution requires only simple majorities in both chambers. Using a joint resolution to admit Texas set a precedent and bypassed the two-thirds threshold that the slave-state expansion opponents might have maintained. Presidents Tyler and Polk used this mechanism to circumvent potential Senate opposition.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
