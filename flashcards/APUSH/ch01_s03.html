    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "Columbian Exchange", "back": "The movement of plants, animals, microorganisms, and diseases between the Eastern and Western Hemispheres after 1492. Historians consider it the deepest structural transformation of the encounter period — reshaping demography, ecology, agriculture, and diet on a global scale. The exchange was real in both directions but radically asymmetrical in its distribution of benefit and harm.", "id": "fc01"}, {"front": "Virgin-soil epidemic", "back": "An epidemic striking a population with no prior exposure — and therefore no acquired immunological resistance — to the disease in question. In the Americas after 1492, virgin-soil epidemics of smallpox, measles, typhus, and other Old World diseases could kill 30–90% of exposed populations. Crucially, they traveled through indigenous trade networks faster than European physical expansion, devastating communities before any European had visited them directly. Term popularized by historian Alfred Crosby.", "id": "fc02"}, {"front": "Why were indigenous Americans uniquely vulnerable to Old World diseases?", "back": "The Americas had been isolated from the Afro-Eurasian disease pool for roughly 12,000–15,000 years, since human populations first crossed the Bering land bridge. During that time, Old World populations developed partial immunological resistance to epidemic diseases through generations of exposure. Indigenous Americans had no such resistance — making Old World pathogens catastrophically lethal when introduced after 1492.", "id": "fc03"}, {"front": "Demographic collapse in Mexico (1519–1600)", "back": "Mexico's indigenous population fell from approximately 25 million in 1519 to roughly 1 million by 1600 — a reduction of over 90% in less than a century. This is the most precisely documented instance of the broader hemispheric collapse, in which scholars estimate indigenous populations fell 75–90% between 1492 and 1650 — the largest demographic catastrophe in recorded human history.", "id": "fc04"}, {"front": "Taino of Hispaniola — a case study", "back": "The indigenous Taino people of Hispaniola numbered perhaps 250,000 to 1 million at Columbus's arrival in 1492. By 1550 — fewer than sixty years later — fewer than 500 indigenous people survived on the island. Hispaniola was the first major site of European settlement and thus the first laboratory for the catastrophic consequences of virgin-soil epidemic, encomienda labor, and dispossession combined.", "id": "fc05"}, {"front": "Smallpox as vanguard of conquest", "back": "Smallpox, documented in Hispaniola by 1518, spread southward through Mesoamerica ahead of Cortés's 1519 invasion and into the Andes before Pizarro arrived in Peru in 1532. By the time Spanish soldiers entered a given region, the population had often already been decimated by waves of epidemic traveling overland through indigenous trade networks. Disease preceded and enabled conquest.", "id": "fc06"}, {"front": "Old World animals introduced to the Americas", "back": "Horses, cattle, pigs, sheep, goats, and chickens were introduced to the Americas after 1492. Their ecological effects varied: feral horses transformed Plains peoples' economies and military capacity; cattle and pigs consumed vegetation, compacted soils, and disrupted indigenous agricultural systems. Spanish livestock often destroyed carefully managed indigenous gardens and milpa fields.", "id": "fc07"}, {"front": "The horse and Plains peoples — a Columbian Exchange paradox", "back": "Horses reached the Great Plains from Spanish settlements by the late seventeenth century. Nations like the Comanche, Lakota, and Cheyenne then reorganized their entire way of life around mounted bison hunting, becoming formidable military powers. The 'horse culture' of the Plains that Europeans later romanticized as ancient tradition was itself a product of the Columbian Exchange — a transformation that occurred within living memory of first contact.", "id": "fc08"}, {"front": "American crops transferred to the Old World", "back": "Maize, potato, sweet potato, tomato, cacao, vanilla, tobacco, cassava, and numerous bean and squash varieties entered Old World agricultural systems after 1492. Their aggregate impact supported significant population growth across Eurasia and Africa, contributing to the global population doubling from roughly 500 million in 1500 to approximately 1 billion by 1800.", "id": "fc09"}, {"front": "The potato in Ireland", "back": "Introduced to Ireland by the late sixteenth century, the potato became the dietary foundation of the Irish peasantry within two generations because it could be cultivated in soils and climates hostile to grain crops and produced caloric yields per acre far exceeding wheat or rye. This dependency had catastrophic consequences when a New World blight destroyed the potato crop in 1845–1852 — causing the Great Famine that killed approximately one million and drove millions more to emigrate.", "id": "fc10"}, {"front": "American crops and Chinese population growth", "back": "The sweet potato and maize enabled cultivation of upland soils previously too poor for rice cultivation in China, contributing to significant Chinese population growth between 1600 and 1800. This is a specific example of how American crops expanded agricultural production into previously unproductive environments — one of the mechanisms by which the Columbian Exchange supported the near-doubling of global population between 1500 and 1800.", "id": "fc11"}, {"front": "Potosí and Zacatecas — silver and the global economy", "back": "Enormous silver deposits discovered at Potosí (present-day Bolivia, 1545) and Zacatecas (Mexico, 1546) made Spanish America the source of roughly 85% of the world's silver between 1500 and 1800. This silver flowed eastward through Spain to pay for European goods, then further east via the Silk Road and Indian Ocean networks to China, where the Ming dynasty used silver as the primary tax medium — integrating American mineral wealth into a genuinely global economic circuit.", "id": "fc12"}, {"front": "The first genuinely global economy", "back": "American silver connected the economies of Potosí and Manila to those of Seville and Beijing, creating the first genuinely global economic circuit. This integration — made possible by the Columbian Exchange — meant that events in American silver mines could affect tax policy in Ming China, that Spanish purchasing power in Europe depended on Andean indigenous miners, and that the global economy was structurally linked across three continents and two oceans for the first time.", "id": "fc13"}, {"front": "Alfred Crosby", "back": "The American historian who popularized the term 'virgin-soil epidemic' and developed the foundational scholarly framework for understanding the Columbian Exchange as a biological and ecological phenomenon. His work emphasized that the most transformative consequences of European expansion were biological rather than military — pathogens, plants, and animals — not armies and political decisions.", "id": "fc14"}, {"front": "The Asymmetry of the Exchange (Key Concept)", "back": "The Columbian Exchange was not an equal trade. The Americas sent crops that substantially improved Old World nutrition and supported population growth — and received epidemic diseases that killed the majority of their inhabitants. The Americas sent silver that monetized global trade — and received livestock that disrupted indigenous agricultural systems. Both directions saw profound change, but the distribution of benefit and harm was radically asymmetrical: the Old World's gain was purchased with the lives of tens of millions of indigenous Americans.", "id": "fc15"}, {"front": "SPICE-T: What Geographic/Environmental theme does the Columbian Exchange illustrate?", "back": "The GEO theme is central: geographic isolation had separated the Americas from Old World disease pools for millennia, making indigenous peoples biologically vulnerable. When geographic barriers were breached after 1492, the consequences were determined by biology, not military force or political will. Geography created the vulnerability; the exchange exploited it. The Americas' ecological separation produced both their unique crops and their immunological defenselessness.", "id": "fc16"}, {"front": "SPICE-T: What Economic/Trade theme does the Columbian Exchange illustrate?", "back": "The WXT (World Exchange and Technology) theme: American crops transformed Old World agriculture and supported population growth; American silver restructured global trade networks and created the first genuinely global economy. The exchange was the economic foundation of the early modern Atlantic world — and the mechanism by which the Americas were integrated into Afro-Eurasian trading systems for the first time.", "id": "fc17"}, {"front": "Continuity/Change: How did the introduction of horses change Plains peoples' societies?", "back": "Before horses (pre-late 17th century): Plains peoples hunted bison on foot using fire and coordinated movement; organized in smaller, more mobile bands; engaged in exchange networks with agricultural neighbors. After horses: mounted bison hunting transformed economies; nations like the Comanche, Lakota, and Cheyenne became formidable military powers. The change was rapid — within a generation or two of horses reaching the Plains — and represents one of the most significant social transformations in North American history.", "id": "fc18"}, {"front": "Comparison: How did the direction of biological exchange differ between the Eastern and Western Hemispheres?", "back": "Eastern Hemisphere TO Americas: epidemic diseases (smallpox, measles, typhus), domesticated animals (horses, cattle, pigs), and Old World plants (wheat, sugar, coffee). Americas TO Eastern Hemisphere: food crops (potato, maize, tomato, sweet potato, tobacco, cacao) and silver. The Eastern-to-Americas direction was catastrophically harmful (disease and ecological disruption); the Americas-to-Eastern direction was largely beneficial (improved nutrition, population growth).", "id": "fc19"}, {"front": "Maize (corn) in West Africa", "back": "Maize, along with cassava, expanded agricultural productivity in West Africa after its introduction via the Columbian Exchange. The irony the source identifies: this population growth helped supply the labor for the transatlantic slave trade — American crops supporting the population growth that European slave traders then violently exploited. This connection illustrates the global, interconnected, and often devastating asymmetries of the Columbian Exchange.", "id": "fc20"}, {"front": "What ecological changes did Old World livestock cause in the Americas?", "back": "Spanish cattle and pigs expanded rapidly in the Caribbean and Mexican mainland, consuming vegetation, compacting soils, and displacing indigenous agricultural systems. Where indigenous peoples had cultivated managed gardens and milpa fields, Spanish livestock trampled and grazed. European plants — wheat, barley, sugar cane, coffee, citrus — further altered the landscape, often at the direct expense of indigenous food systems. The ecological transformation was as significant as the demographic one.", "id": "fc21"}, {"front": "Why is the Columbian Exchange considered a 'structural transformation' rather than simply a list of exchanges?", "back": "The source calls it the 'deepest structural transformation of the encounter period' because its consequences were systemic and self-reinforcing: disease collapse destroyed the labor base and enabled colonial extraction; silver mining created a global economic integration; American crops restructured Old World agriculture and demography; horses transformed Plains societies. Each transfer rippled outward in ways that fundamentally altered the structure of multiple societies — not merely enriching or harming specific individuals.", "id": "fc22"}, {"front": "Global population growth and the Columbian Exchange (1500–1800)", "back": "Global population grew from roughly 500 million in 1500 to approximately 1 billion by 1800. The source argues this growth 'would not have been possible without the caloric contribution of American crops.' Maize, potato, sweet potato, and cassava expanded food production into previously unsuitable environments across Eurasia and Africa, supporting population growth that existing Old World crops alone could not have sustained.", "id": "fc23"}, {"front": "Milpa fields", "back": "Traditional Mesoamerican agricultural plots, typically rotating between cultivation and fallow — similar in ecological logic to three-sisters intercropping. When Spanish cattle and pigs were introduced, they trampled and grazed in milpa fields, destroying carefully managed indigenous agricultural systems and contributing to the ecological disruption that compounded the demographic collapse caused by epidemic disease.", "id": "fc24"}, {"front": "CED Concept: Why was disease more powerful than military force in the early colonial period?", "back": "The source's opening claim — that pathogens were more powerful weapons than swords — rests on three realities: (1) diseases traveled faster than armies, through existing trade networks, reaching populations before Spanish soldiers arrived; (2) their kill rates (30–90%) vastly exceeded battlefield casualties; and (3) they struck indiscriminately — killing leaders like Cuitláhuac and Huayna Capac who shaped the political conditions of conquest. Military force required physical presence; disease required only contact within existing networks.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
