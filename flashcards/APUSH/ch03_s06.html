<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP United States History &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 3, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Alexander Hamilton as Secretary of the Treasury (1789–1795)", "back": "No figure shaped the early republic's economic architecture more decisively. Hamilton's vision: a powerful commercial-industrial nation, integrated into the Atlantic economy, with a strong federal government directing economic development. His three reports to Congress (1790–91) — assumption, national bank, manufactures — laid out a comprehensive program whose elements endured long after his tenure.", "id": "fc01"}, {"front": "Assumption Plan", "back": "Hamilton's proposal that the federal government assume all unpaid state war debts, consolidating them into a single national debt. Goal: bind the creditor class's interests to the federal government's survival; establish U.S. creditworthiness. Southern states (which had largely paid their debts) resisted until a dinner-table deal brokered by Jefferson traded their acceptance of assumption for location of the permanent capital on the Potomac River.", "id": "fc02"}, {"front": "National Bank (Bank of the United States, 1791)", "back": "Hamilton proposed a federally chartered bank (modeled on the Bank of England) to hold federal deposits, issue currency, and manage government finances. Triggered the constitutional debate: Jefferson/Randolph argued strict construction (Congress can only do what the Constitution explicitly authorizes); Hamilton argued loose construction/implied powers (necessary and proper clause allows anything reasonably connected to enumerated powers). Washington accepted Hamilton's argument; bank chartered 1791.", "id": "fc03"}, {"front": "Strict Construction vs. Loose Construction", "back": "Strict construction (Jefferson/Madison): Congress can only exercise powers explicitly granted by the Constitution. Loose construction / implied powers (Hamilton): the 'necessary and proper' clause authorizes any action reasonably connected to executing an enumerated power. The Bank debate was the first concrete application of this debate; it has recurred in every generation of American constitutional argument.", "id": "fc04"}, {"front": "Report on Manufactures (1791)", "back": "Hamilton's third major report, proposing protective tariffs and government bounties to develop American industry. Congress did not act on it immediately. Long-term significance: established the intellectual framework that Henry Clay formalized as the 'American System' in the 1820s and that organized tariff politics for the next century. A case of ideas outlasting their immediate defeat.", "id": "fc05"}, {"front": "Thomas Jefferson — Vision of the Republic", "back": "A Virginia planter-polymath who envisioned the United States as an agrarian republic: a nation of self-sufficient farmers, free of the corruption that financial and commercial institutions would bring, governed by states close to the people rather than remote federal authority. His life embodied the republic's central contradiction: a slaveholder who wrote 'all men are created equal.'", "id": "fc06"}, {"front": "Whiskey Rebellion (1794)", "back": "Western Pennsylvania farmers rose in armed resistance to the federal excise tax on distilled spirits — which fell disproportionately on small distillers who used whiskey as frontier currency. Washington personally led ~13,000 militiamen into western Pennsylvania. The rebellion collapsed without a major battle, establishing the precedent that the federal government would enforce its laws against armed domestic resistance.", "id": "fc07"}, {"front": "Whiskey Rebellion — Divergent Interpretations", "back": "Federalists (Washington, Hamilton): Washington's response established a crucial precedent — the new government, unlike the Confederation, had both will and means to enforce federal law. Democratic-Republicans (Jefferson): a massive military response to a tax dispute was federal tyranny, exactly the kind of excessive force the Revolution had been fought to end. The same event, two opposite political meanings.", "id": "fc08"}, {"front": "Jay's Treaty (1794)", "back": "Treaty with Britain that resolved disputes over British seizure of American ships but gave the United States very little in return; widely denounced as humiliating. France interpreted it as a pro-British alignment and began seizing American merchant ships — triggering the XYZ Affair. Jay's Treaty deepened the partisan divide: Federalists supported it; Democratic-Republicans (sympathetic to France) denounced it.", "id": "fc09"}, {"front": "XYZ Affair (1797–98)", "back": "President Adams sent three diplomats to Paris; French foreign minister Talleyrand's agents (X, Y, Z) demanded a bribe of $250,000 and a large loan before negotiations could begin. Adams released the dispatches; public outrage produced the slogan 'Millions for defense, but not one cent for tribute!' An undeclared naval conflict — the Quasi-War (1798–1800) — followed.", "id": "fc10"}, {"front": "Quasi-War (1798–1800)", "back": "Undeclared naval war with France following the XYZ Affair. The Adams administration created the Department of the Navy (1798) and the Marine Corps; American and French naval vessels engaged in combat. The war ended with the Convention of 1800 (Treaty of Mortefontaine), normalizing relations with France — and contributing to the Federalists' political difficulties in the election of 1800.", "id": "fc11"}, {"front": "Alien Acts (1798)", "back": "Extended the residency requirement for citizenship from 5 to 14 years and allowed the president to deport 'dangerous' aliens. Aimed partly at French and Irish immigrants sympathetic to the Democratic-Republicans. Part of the Federalist package passed during the Quasi-War hysteria — combined with the Sedition Act, the most significant peacetime restriction on civil liberties in the early republic.", "id": "fc12"}, {"front": "Sedition Act (1798)", "back": "Made it a crime to publish 'false, scandalous, and malicious' writings against the president or Congress. Transparently aimed at Republican newspaper editors who criticized Adams. Several editors were prosecuted and convicted. Combined with the Alien Acts, provoked Jefferson and Madison's Kentucky and Virginia Resolutions — and became a major campaign issue that helped defeat Adams in 1800.", "id": "fc13"}, {"front": "Kentucky and Virginia Resolutions (1798–99)", "back": "Jefferson (Kentucky) and Madison (Virginia) drafted legislative resolutions arguing that the Alien and Sedition Acts exceeded federal constitutional authority and that states had the right to 'nullify' — declare void — unconstitutional federal acts within their borders. Established the nullification theory that John C. Calhoun later developed into a doctrine of secession.", "id": "fc14"}, {"front": "Nullification Theory", "back": "The constitutional doctrine, articulated in the Kentucky and Virginia Resolutions (1798–99), that states have the authority to declare unconstitutional federal acts void within their borders. Jefferson and Madison intended it as a protest against the Sedition Act. Calhoun later developed it into a justification for South Carolina's 1832 nullification of federal tariff law and eventually for Southern secession.", "id": "fc15"}, {"front": "First Party System", "back": "The Federalists (commercial, nationalist, sympathetic to Britain) and Democratic-Republicans (agrarian, states' rights, sympathetic to France) that emerged from the conflicts of the 1790s. The Founders regarded parties as dangerous factions; the decade demonstrated that organized political competition was not only unavoidable but the mechanism by which power could be peacefully transferred — proven in the election of 1800.", "id": "fc16"}, {"front": "Federalists (Party)", "back": "The first American political party, associated with Hamilton's economic program: strong central government, national bank, commercial-industrial development, pro-British foreign policy. Base: merchants, manufacturers, creditors, New England. Opponents: Democratic-Republicans (Jefferson, Madison). Ceased to be a national party after 1800; last Federalist presidential candidate 1816.", "id": "fc17"}, {"front": "Democratic-Republicans (Jeffersonian Republicans)", "back": "Jefferson and Madison's party: agrarian, states' rights, strict constitutional construction, pro-French foreign policy, suspicious of financial elites and commercial institutions. Base: Southern planters, small farmers, artisans. Won the presidency in 1800 (Jefferson) and dominated national politics until the 1820s. The party eventually split into Jacksonian Democrats and Whigs.", "id": "fc18"}, {"front": "CED Theme: POL — How did the 1790s reveal the paradox of anti-party republicanism?", "back": "The Founders believed organized parties were dangerous factions that elevated loyalty over national interest. Yet the same republican system that produced this belief also produced, inevitably, organized political competition. The 1790s demonstrated that in a republic where power derives from popular consent, competing interests will organize to secure that consent — parties were not a corruption of republicanism but its logical expression.", "id": "fc19"}, {"front": "Compare/Contrast: Hamilton vs. Jefferson on the Constitution", "back": "Hamilton (loose construction): the 'necessary and proper' clause authorizes any action reasonably connected to an enumerated power; the Constitution is an elastic document empowering energetic governance. Jefferson (strict construction): Congress can only do what is explicitly authorized; unenumerated powers are reserved to the states and people. This 1790s debate recurred in every generation: Marshall Court, antebellum states' rights, Civil War, New Deal.", "id": "fc20"}, {"front": "Continuity/Change: How did Hamilton's program shape post-1800 America?", "back": "Despite Jefferson's victory in 1800, Hamilton's financial architecture survived: the national debt, the Bank (rechartered 1816), and U.S. credit remained. Jefferson found, like every ideologue who takes office, that governing required pragmatism — and the Louisiana Purchase (1803) was authorized by a president who had argued the Constitution permitted only what it explicitly stated. Ideas survive their proponents' political defeat.", "id": "fc21"}, {"front": "The Dinner-Table Compromise (1790)", "back": "The deal brokered by Thomas Jefferson between Hamilton and Southern states: the South accepted Hamilton's assumption of state war debts; in return, the permanent national capital would be located on the Potomac River between Virginia and Maryland. The deal shows that early republic governance required region-specific accommodation, not just constitutional argument.", "id": "fc22"}, {"front": "Farmers and Whiskey as Currency", "back": "For frontier farmers in western Pennsylvania without access to eastern markets, whiskey was effectively currency — grain converted to a storable, transportable, tradeable commodity. Hamilton's excise tax on distilled spirits fell disproportionately on these small distillers rather than large commercial producers, making it — from the farmers' perspective — a tax on their medium of economic exchange, not merely on a luxury good.", "id": "fc23"}, {"front": "'Millions for defense, but not one cent for tribute!'", "back": "The public response to the XYZ Affair; captured the national mood after France's agents demanded bribes from American diplomats. The slogan expressed American national honor in the face of European contempt. The resulting Quasi-War (1798–1800) and naval buildup were politically popular — but the Federalists' domestic overreach (Alien and Sedition Acts) turned the political advantage into a liability.", "id": "fc24"}, {"front": "Hamilton's Assumption — Binding Creditors to Federal Government", "back": "A key strategic element of assumption: by making the federal government responsible for all state war debt, Hamilton ensured that the wealthy creditor class (who held debt certificates) had a direct financial interest in the federal government's survival and creditworthiness. This was state-building through financial alignment — creating a constituency for federal power among the people most able to influence political outcomes.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
