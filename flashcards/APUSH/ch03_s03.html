<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP United States History &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Continental Army — Key Challenges", "back": "Chronically undersupplied, underpaid, plagued by short enlistments. The Continental Congress had no taxation power and could only request funds from reluctant states. Continental dollars depreciated so rapidly that 'not worth a Continental' became a synonym for worthlessness. Survival required French intervention, British strategic mistakes, and Washington's leadership.", "id": "fc01"}, {"front": "Battle of Saratoga (October 1777)", "back": "General Horatio Gates's forces surrounded and compelled the surrender of British General Burgoyne's army (~5,700 men) in upstate New York. Military significance: neutralized British strategy of splitting New England from the southern colonies. Diplomatic consequence (greater): convinced France the American cause was viable, producing the 1778 alliance.", "id": "fc02"}, {"front": "French Alliance (1778)", "back": "Formal military alliance signed in February 1778 after Saratoga convinced France the Americans could win. France brought a navy capable of challenging British Atlantic control, troops (including Rochambeau's army), and loans. France also drew Spain and the Netherlands into the conflict, stretching British military resources across three oceans.", "id": "fc03"}, {"front": "Valley Forge (winter 1777–78)", "back": "Washington's Continental Army wintered at Valley Forge, Pennsylvania, under conditions that killed perhaps a quarter of his men from cold, hunger, and disease. The cause looked lost. Prussian officer Baron von Steuben used the winter to drill and professionalize the army, transforming it into a more effective fighting force by spring.", "id": "fc04"}, {"front": "Battle of Yorktown (October 1781)", "back": "Washington's Continental forces and French troops under Rochambeau trapped British General Cornwallis on the Virginia Peninsula while French Admiral de Grasse's fleet blocked British naval relief. Cornwallis surrendered 8,000 men on October 19, 1781 — effectively ending the war. Combined American-French land and naval cooperation was decisive.", "id": "fc05"}, {"front": "Treaty of Paris (1783)", "back": "Recognized American independence and granted the new nation territory extending to the Mississippi River. Made no provision for America's indigenous allies or enemies — Britain surrendered their territories without consultation. Required Congress to recommend restoration of Loyalist property, a provision largely ignored by the states.", "id": "fc06"}, {"front": "Lord Dunmore's Proclamation (November 1775)", "back": "Virginia's royal governor offered freedom to enslaved men who could escape their patriot masters and join British forces. Approximately 800–2,000 reached British lines; tens of thousands more fled during British military occupations of the South. The British promise was often betrayed, but the Proclamation demonstrated that enslaved people were active agents of liberation, not passive victims.", "id": "fc07"}, {"front": "Daughters of Liberty", "back": "Informal network of women who organized boycotts of British goods and domestic manufacturing alternatives (spinning cloth, making candles, refusing tea) during the imperial crisis. Their participation demonstrated that women were active agents of colonial resistance, not merely passive spectators — establishing a claim to political participation that republican motherhood would later accommodate without extending formal rights.", "id": "fc08"}, {"front": "Republican Motherhood", "back": "Post-Revolutionary ideology assigning women a civic role through motherhood and education: republican government depended on virtuous citizens; households were where virtue formed; therefore women's domestic labor was patriotically essential. It elevated women's acknowledged contribution (and supported expanded female education) while deflecting demands for formal political rights — leaving coverture, property restrictions, and voting exclusion intact.", "id": "fc09"}, {"front": "Republican Motherhood — Duality", "back": "Expansion: women's domestic and educational labor was recognized as essential to republican survival; female education expanded to include arithmetic, history, and political economy. Limitation: demands for formal political equality were channeled into 'maternal influence,' preserving coverture, property restrictions, and voting exclusion. Women could be patriots without being voters.", "id": "fc10"}, {"front": "Coverture", "back": "The legal doctrine under which a married woman's legal identity was subsumed into her husband's — she could not independently own property, enter contracts, or sue in court. Republican motherhood elevated women's ideological status without changing coverture; women's legal subordination remained intact after independence, laying the foundation for later women's rights movements.", "id": "fc11"}, {"front": "Deborah Sampson", "back": "A woman who disguised herself as a man and served in the Continental Army during the Revolutionary War — one of a small number who exceeded the formal boundaries of women's wartime roles. Her case illustrates both the wartime disruption of gender norms and the limits of that disruption: formal inclusion required concealment; no policy change followed her service.", "id": "fc12"}, {"front": "Revolution's Impact on Enslaved People — Regional Divergence", "back": "North: slavery was economically marginal; Revolution's rhetoric drove gradual emancipation (Vermont 1777, Massachusetts 1783, Pennsylvania/Rhode Island/Connecticut/New York 1780–1799). South: slavery was central to the plantation economy; removal of British authority eliminated the only external constraint on slaveholders' autonomy. Enslaved population grew from ~450,000 in 1776 to nearly 4 million by 1860.", "id": "fc13"}, {"front": "Gradual Emancipation Laws (North)", "back": "Vermont's constitution (1777) banned slavery outright. Massachusetts courts held it unconstitutional by 1783. Pennsylvania (1780), Rhode Island (1784), Connecticut (1784), and New York (1799) passed gradual emancipation laws. 'Gradual' meant children of enslaved mothers born after the law were free — but only after years of servitude — meaning many people remained enslaved for decades.", "id": "fc14"}, {"front": "Iroquois Confederacy (Haudenosaunee) — Civil War", "back": "The Confederacy had maintained neutrality in earlier Anglo-French conflicts. The Revolution forced impossible choices: Mohawks (led by Joseph Brant/Thayendanegea) fought with the British; Oneida and Tuscarora sided with the Americans. The result was civil war within an alliance that had endured perhaps three centuries — the Confederacy never recovered.", "id": "fc15"}, {"front": "Joseph Brant (Thayendanegea, 1743–1807)", "back": "Mohawk leader and Loyalist commander who fought alongside the British during the Revolutionary War. Brilliant military commander who led raids on American frontier settlements. His choice of the British side reflected the Mohawks' strategic calculation that British alignment offered better protection of Haudenosaunee land than American independence — a calculation the Treaty of Paris proved tragically mistaken.", "id": "fc16"}, {"front": "Sullivan-Clinton Expedition (1779)", "back": "American military campaign that swept through Iroquois country in New York, systematically destroying Haudenosaunee villages, food stores, and orchards. Scorched-earth strategy designed not to defeat warriors in battle but to starve entire communities. The Confederacy never recovered. A formative example of American total war against indigenous civilian society.", "id": "fc17"}, {"front": "The Revolution's Uneven Liberation", "back": "White male property owners: fullest expansion of political rights. Women: elevated ideological status (republican motherhood) but no legal equality. Enslaved people in North: gradual emancipation. Enslaved people in South: strengthened slaveholder autonomy as British authority removed. Indigenous nations: lost Proclamation Line, Confederacy fractured, territories surrendered without consultation.", "id": "fc18"}, {"front": "CED Theme: SOC — Whose revolution was the American Revolution?", "back": "The Revolution was a contested struggle over inclusion. Women's organizations, enslaved people's flight to British lines, and the Iroquois Confederacy's civil war all demonstrate that it was not a unified American act but a conflict with radically different meanings for different populations. The 'We' in 'We the People' was a contested category from the beginning.", "id": "fc19"}, {"front": "CED Theme: NAT — National identity and exclusion", "back": "The new United States had to construct national identity out of thirteen distinct colonial societies while simultaneously denying full membership to women, enslaved people, and indigenous nations who were legally or practically excluded from citizenship. National identity was built partly by defining who was NOT included — a pattern that shaped American history for centuries.", "id": "fc20"}, {"front": "Historiography: Colin Calloway on the Revolution", "back": "Historian Colin Calloway's characterization of the American Revolution as 'a disaster' for indigenous peoples captures how the same event had opposite meanings for different groups. For white male colonists, it was liberation; for indigenous nations, it removed the Proclamation Line, shattered confederacies, and unleashed a newly independent nation committed to westward expansion across their territories.", "id": "fc21"}, {"front": "The French Alliance and Global War", "back": "After Saratoga, France signed a formal alliance (1778) and also brought Spain and the Netherlands into the conflict against Britain. This stretched British military resources across three oceans and transformed a colonial rebellion into a global war — the same pattern as the Seven Years' War that had started the imperial crisis. The final victory at Yorktown was impossible without French naval and land support.", "id": "fc22"}, {"front": "Compare/Contrast: Enslaved People's Options", "back": "British offer (Dunmore's Proclamation): freedom in exchange for fighting Patriots — often not honored; many evacuated enslaved people were re-enslaved in Caribbean colonies. American option: occasional freedom for military service in the North; no systematic offer. Neither the British nor the American side offered genuine, reliable emancipation — both exploited enslaved people's desire for freedom as a tool of war.", "id": "fc23"}, {"front": "Continuity/Change: How did women's roles shift before, during, and after the Revolution?", "back": "Before: domestic roles, some women participated in boycotts (Daughters of Liberty). During: expanded economic and managerial roles as men left; camp followers; a few like Sampson in combat. After: republican motherhood formalized women's political contribution through motherhood/education — an ideological expansion without legal change. Female education improved; formal rights did not.", "id": "fc24"}, {"front": "Camp Followers", "back": "Women (and some men) who accompanied Continental Army encampments, providing cooking, laundry, nursing, and supply services essential to the army's functioning. Camp followers were not peripheral to the war effort — without their labor, the army could not have sustained operations in the field. Their contribution was rarely acknowledged in official histories.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
