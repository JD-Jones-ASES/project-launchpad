        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 4, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Manifest Destiny", "back": "The 19th-century American ideology that the territorial expansion of the United States across North America was divinely ordained and historically inevitable. Named by journalist John L. O'Sullivan in 1845 but expressing beliefs that predated the phrase. Three components: (1) Protestant providentialism — God blessed the American mission; (2) republican exceptionalism — the U.S. as the world's model of self-government; (3) racial hierarchy — Anglo-Saxon civilization as the continent's 'natural master.' Used to justify the Louisiana Purchase, Texas annexation, Oregon settlement, and Mexican-American War.", "id": "fc01"}, {"front": "John L. O'Sullivan", "back": "Democratic journalist who coined the phrase 'Manifest Destiny' in 1845, writing of 'our manifest destiny to overspread the continent allotted by Providence for the free development of our yearly multiplying millions.' His phrase gave a name to an existing ideology rather than inventing a new one. The phrase crystallized the three-part claim: divine ordination, republican mission, and racial hierarchy — what the source calls 'a doctrine of empire dressed in the language of liberty.'", "id": "fc02"}, {"front": "Monroe Doctrine (1823)", "back": "President Monroe's declaration to Congress that (1) the American continents were 'henceforth not to be considered as subjects for future colonization by any European powers,' and (2) any extension of the European political system to the Western Hemisphere would be treated as a threat to U.S. peace and safety. Drafted primarily by Secretary of State John Quincy Adams. 'Initially more rhetorical than operational' — enforced by British naval power rather than American military capability. Shaped American foreign policy for a century.", "id": "fc03"}, {"front": "Monroe Doctrine — context and triggers", "back": "Two immediate triggers: (1) Fear of Holy Alliance intervention (Austria, Prussia, Russia, possibly France) to restore Spanish authority over newly independent Latin American republics; (2) Russian expansion down the Pacific coast from Alaska toward California. Secretary of State Adams wrote the doctrine; Monroe delivered it. British Foreign Secretary Canning had proposed a joint Anglo-American declaration; Adams insisted on a unilateral American statement — 'it would have looked more candid,' Canning wrote privately, 'to avow the Monroe Doctrine as... under British protection.'", "id": "fc04"}, {"front": "John Quincy Adams as architect of the Monroe Doctrine", "back": "Adams, as Monroe's Secretary of State, was the doctrine's primary intellectual author. He insisted on a unilateral American declaration rather than a joint Anglo-American statement (as Canning proposed), asserting American hemispheric primacy in American terms. The doctrine reflected Adams's vision of American destiny as a continental republic rather than a maritime empire — one that would project power through ideology rather than military force in 1823.", "id": "fc05"}, {"front": "Monroe Doctrine — silences", "back": "The doctrine said nothing about the rights of the hemisphere's indigenous peoples, enslaved Black Americans, or the Latin American republics whose independence it purported to protect. It was 'a doctrine of American power, not hemispheric liberation.' The Latin American republics were not consulted about the protectorate relationship Monroe claimed on their behalf. The doctrine's silences are as revealing as its assertions: it defined American interests, not universal liberty.", "id": "fc06"}, {"front": "HAPP: Monroe Doctrine (1823)", "back": "Historical context: Newly independent Latin American republics; feared Holy Alliance restoration of Spanish authority; Russian Pacific coast expansion. Audience: Formally Congress; practically European governments (especially the Holy Alliance and Russia). Author's purpose: Diplomatic deterrence — assert American hemispheric primacy, warn European powers against intervention, claim a protectorate relationship with Latin American republics. Point of view: Adams's vision of American continental destiny and hemispheric primacy; presented as protecting liberty while actually asserting American power.", "id": "fc07"}, {"front": "Frederick Douglass's 'What to the Slave is the Fourth of July?' (1852)", "back": "Delivered July 5, 1852 — the day after Independence Day, a deliberate choice — to the Rochester Ladies' Anti-Slavery Society. Addressed a sympathetic white Northern audience who did not find it comfortable. Strategy: began by praising the founders and affirming the Declaration's genuine moral truths (human equality, natural rights, government by consent), then turned to argue that these principles made American slavery inescapably and structurally hypocritical. Called 'the greatest antislavery oration in American history.'", "id": "fc08"}, {"front": "Douglass's rhetorical strategy", "back": "Douglass did not argue the Declaration's ideals were false; he argued the republic's practice made a lie of them. He began by honoring the founders as 'genuinely great men' — then turned the founders' principles against the republic's conduct: 'What, to the American slave, is your 4th of July? A day that reveals to him, more than all other days in the year, the gross injustice and cruelty to which he is the constant victim.' Strategy: use the republic's own principles against it; accept the premises, expose the hypocrisy.", "id": "fc09"}, {"front": "HAPP: Douglass's Fourth of July speech (1852)", "back": "Historical context: 4 million enslaved people; Fugitive Slave Act (1850) requiring Northern complicity; antislavery movement under legal and political pressure. Audience: Rochester Ladies' Anti-Slavery Society — white, sympathetic, Northern. Author's purpose: Moral provocation — make comfortable Northerners feel the weight of complicity they had rationalized away; not comfort but challenge. Point of view: Speaking from the margins of a liberty that excluded him; combining personal authority of experience with systematic moral analysis.", "id": "fc10"}, {"front": "Monroe vs. Douglass — 'Argument about Liberty'", "back": "Monroe: The United States is liberty's guardian in the hemisphere; European monarchies are liberty's enemies; American expansion protects republican self-government. Douglass: The United States is liberty's betrayer domestically; a republic that enslaved four million people had no legitimate claim to be liberty's champion; its Fourth of July celebrations were an obscenity. Both used the language of American liberty to opposite ends — Monroe to project power outward; Douglass to expose hypocrisy inward.", "id": "fc11"}, {"front": "Monroe vs. Douglass — 'Silences and Omissions'", "back": "Monroe Doctrine: Silent about the rights of indigenous peoples, enslaved Black Americans, and the Latin American republics in whose name it purported to speak. Douglass's speech: Broke those silences explicitly — demanding that Americans apply their professed principles to the people they had excluded from them. The juxtaposition illustrates the period's central pattern: expansive liberty rhetoric masking systematic exclusion of most of the hemisphere's people from the liberty proclaimed.", "id": "fc12"}, {"front": "Manifest Destiny's domestic connections", "back": "Manifest Destiny and the Monroe Doctrine were 'different faces of the same claim: North America belongs to the United States.' Both were inseparable from domestic politics: (1) Louisiana Purchase opened indigenous homelands to white settlement; (2) Texas annexation expanded slave territory; (3) Mexican-American War raised the slavery extension question that tore the republic apart. The 'liberty' that American expansion claimed to spread was the liberty of a republic that enslaved one-seventh of its population.", "id": "fc13"}, {"front": "Holy Alliance", "back": "The post-Napoleonic conservative alliance of Austria, Prussia, and Russia (with France as a potential partner), formed to suppress liberal and nationalist movements in Europe and potentially to restore Spanish authority in Latin America. The Holy Alliance's rumored plans to intervene in Latin America were a primary trigger for the Monroe Doctrine (1823). The Alliance never actually intervened in Latin America; British commercial opposition (and naval power) made intervention impractical.", "id": "fc14"}, {"front": "Fugitive Slave Act (1850)", "back": "Federal law requiring Northern citizens to assist in the capture and return of escaped enslaved people, making slavery a national institution rather than a Southern one. Douglass cited it in the Fourth of July speech as evidence of the hypocrisy of Northern liberty claims: 'laws — the Fugitive Slave Act of 1850 — that required free Northerners to participate in the capture of escaped enslaved people.' Northern complicity was not passive; it was legally mandated.", "id": "fc15"}, {"front": "The gap between principle and practice", "back": "The source's central argument about the period 1800–1848: every major assertion of American liberty was accompanied by a systematic exclusion of most of humanity from that liberty. Louisiana Purchase: opened the continent to white settlement at indigenous peoples' expense. Market revolution: created prosperity whose raw material was enslaved labor. Jacksonian democracy: expanded white male suffrage while expelling indigenous nations. Monroe Doctrine: claimed hemispheric guardianship for a republic holding four million in bondage. Douglass: 'The gap between principle and practice was not an oversight or a temporary delay. It was a choice.'", "id": "fc16"}, {"front": "WOR + NAT Theme: Foreign policy and domestic race", "back": "The Monroe Doctrine (World Relations) and Manifest Destiny illustrate how foreign-policy assertions of American power were inseparable from domestic racial structures (National Identity). The hemisphere Monroe claimed was also the hemisphere whose indigenous populations were being displaced by American expansion. The 'liberty' Monroe protected was the liberty of a republic that enslaved one-seventh of its people. Douglass's speech made the connection explicit: a nation cannot be freedom's champion abroad and slavery's defender at home without becoming dishonest about what it actually values.", "id": "fc17"}, {"front": "Continuity/Change: How did the Monroe Doctrine shape later American foreign policy?", "back": "The Monroe Doctrine became the foundational statement of American hemispheric power. In the 1840s: used to justify opposition to European designs on Texas and California. In 1904: Roosevelt Corollary asserted U.S. right to intervene in Latin American nations unable to maintain stability (making the U.S. the hemisphere's policeman). 20th century: invoked to justify interventions in Cuba (1898, 1961), Nicaragua, Guatemala, Dominican Republic, and elsewhere. The doctrine's ideology — America as liberty's guardian, Europe as adversary — shaped hemispheric policy for over a century.", "id": "fc18"}, {"front": "Comparison: Monroe Doctrine vs. Douglass's Fourth of July speech — historical consequences", "back": "Monroe's Doctrine: Became the foundational statement of American hemispheric power; invoked to justify interventions across Latin America for a century (Roosevelt Corollary, 1904). Douglass's speech: Became a canonical text of the antislavery movement and later of American civil rights discourse — evidence that the republic's ideals could be turned against its hypocrisies. Both had lasting consequences but in different registers: Monroe shaped foreign policy; Douglass shaped the moral vocabulary of American reform.", "id": "fc19"}, {"front": "O'Sullivan's phrase vs. the ideology it named", "back": "The phrase 'Manifest Destiny' was coined by O'Sullivan in 1845, but 'the belief it named was much older.' The ideology of providential American continental expansion had already justified the Louisiana Purchase (1803), the War of 1812's War Hawks' goals, and the removal of indigenous peoples. O'Sullivan gave a name to an existing set of beliefs, making them more easily invoked and politically mobilized. The naming did not create the ideology; it consolidated and publicized it.", "id": "fc20"}, {"front": "Manifest Destiny's critics", "back": "Some Whigs, most abolitionists, and Mexican and indigenous peoples rejected Manifest Destiny as a 'sanctification of conquest.' Abolitionists in particular opposed territorial expansion because it would expand the slave power — the Mexican-American War (1846–48) was widely denounced by abolitionists (including young Abraham Lincoln in Congress) as a war of conquest to extend slavery. Mexican and indigenous peoples — whose lands were taken — need no ideological argument: they were the people from whom the 'destiny' was stolen.", "id": "fc21"}, {"front": "Douglass as the most photographed American of the 19th century", "back": "Douglass was the most photographed American of the 19th century, a fact he was consciously aware of. He believed that dignified photographs of Black Americans could counter the degrading caricatures used to justify slavery and racism. By controlling his own visual representation — refusing to smile, presenting himself in serious, dignified poses — he made every photograph a political statement. His visual self-presentation was part of his systematic effort to demonstrate Black intellectual and moral capacity.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
