<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "United States Industrial Ranking, 1860 vs. 1900", "back": "In 1860, the U.S. was the world's fourth-largest industrial economy. By 1900, it was first, producing more manufactured goods than Britain, Germany, and France combined. The speed of this transformation had no precedent in economic history.", "id": "fc01"}, {"front": "Vertical Integration", "back": "A business strategy in which a single company owns and controls successive stages of a production and distribution process — from raw-material extraction through manufacturing to final distribution. Carnegie Steel is the paradigmatic example: it owned Mesabi iron ore mines, Pennsylvania coal fields, Great Lakes ore boats, railroad cars, steel mills, and distribution infrastructure. Eliminated middlemen's margins and created near-unbeatable cost advantages.", "id": "fc02"}, {"front": "Andrew Carnegie (1835–1919)", "back": "Scottish-born; emigrated at age 12; rose from bobbin boy to telegraph operator to railroad superintendent to steel magnate. Carnegie Steel used the Bessemer process and vertical integration to slash steel costs from ~$100/ton (1875) to under $12/ton (late 1890s). Sold to J.P. Morgan for $480 million in 1901 (forming U.S. Steel, the world's first billion-dollar corporation). Donated ~$350 million to libraries, universities, and peace institutions. His Gospel of Wealth philosophy was exposed as hypocritical by his conduct in the Homestead Strike (1892).", "id": "fc03"}, {"front": "Bessemer Steel Process", "back": "A technique for converting pig iron into steel by blowing air through molten iron, dramatically reducing production time and cost. Carnegie's large-scale application of the Bessemer process at Pittsburgh mills slashed steel costs by roughly 88% between 1875 and the late 1890s — the technological foundation of his competitive dominance.", "id": "fc04"}, {"front": "Horizontal Integration", "back": "A business strategy that achieves market dominance by acquiring or eliminating direct competitors in the same industry (contrasted with vertical integration, which controls successive production stages). Rockefeller's Standard Oil is the defining example: by 1880 it controlled ~90% of U.S. oil refining through competitor acquisition and destruction.", "id": "fc05"}, {"front": "John D. Rockefeller and Standard Oil", "back": "Pursued horizontal integration by acquiring or destroying oil refining competitors. Secured secret railroad rebates plus 'drawbacks' (a portion of competitors' shipping fees paid back to Standard) that gave him a structural cost advantage no rival could match. By 1880, Standard Oil controlled ~90% of U.S. oil-refining capacity. Used the trust form (1882) to maintain centralized control across state lines.", "id": "fc06"}, {"front": "Railroad Rebates and 'Drawbacks'", "back": "Secret preferential freight rates that Rockefeller negotiated with railroads — lower rates than competitors paid, plus 'drawbacks' (a share of competitors' shipping charges paid back to Standard Oil). These arrangements gave Standard Oil a structural cost advantage that made fair competition impossible and were a central grievance in Progressive Era antitrust campaigns.", "id": "fc07"}, {"front": "Standard Oil Trust (1882)", "back": "Legal arrangement in which shareholders of nominally independent Standard affiliates across multiple states deposited their stock with a central board of trustees in exchange for trust certificates. This gave Rockefeller's organization centralized control over what appeared on paper to be separate companies, evading state laws against out-of-state corporations. Ohio dissolved the Trust in 1892; Standard reorganized as a New Jersey holding company with equivalent results.", "id": "fc08"}, {"front": "Trust (Gilded Age definition)", "back": "The legal arrangement pioneered by Standard Oil (1882) for centralized multi-state control of nominally independent companies. Became popular shorthand for any large industrial combination. The Sherman Antitrust Act (1890) declared combinations in restraint of trade illegal but was weakly enforced — courts applied it more readily against labor unions than business trusts in the 1890s.", "id": "fc09"}, {"front": "Railroad Rate Discrimination", "back": "Railroad practice of charging more per mile for short hauls than long hauls, offering secret rebates to large shippers, and varying rates arbitrarily. Farmers and small merchants in regions served by a single railroad had no alternative carrier — structural dependency that was the material foundation of agrarian radicalism and the Populist movement. Addressed first by Granger laws (1870s), then the Interstate Commerce Act (1887).", "id": "fc10"}, {"front": "Interstate Commerce Act (1887) and the ICC", "back": "Created the Interstate Commerce Commission — the first federal regulatory agency — to investigate railroad rate discrimination and enforce fairness requirements. Early ICC enforcement was hamstrung by court decisions limiting its authority. The Hepburn Act of 1906 (Progressive Era) eventually gave the ICC genuine power to set rates. A model for later federal regulatory agencies.", "id": "fc11"}, {"front": "Social Darwinism", "back": "An ideological framework applying Darwin's natural selection to economic competition: the marketplace rewarded the biologically and morally 'fit' with wealth; poverty reflected natural inferiority, not structural disadvantage. Provided secular moral justification for concentrated wealth and opposition to labor protections, progressive taxation, and welfare programs. Key American proponents: Yale sociologist William Graham Sumner; English philosopher Herbert Spencer.", "id": "fc12"}, {"front": "William Graham Sumner", "back": "Yale sociologist and leading American proponent of Social Darwinism. In What Social Classes Owe to Each Other (1884), argued that the wealthy had earned their positions through superior capacity and that redistribution would punish success and protect failure. His answer to the title's question: essentially nothing, beyond the indirect benefit of investment and economic growth.", "id": "fc13"}, {"front": "Herbert Spencer", "back": "English philosopher who coined 'survival of the fittest' and whose writings sold millions of copies in American editions. Provided the intellectual framework that American Social Darwinists like Sumner adapted. Spencer's philosophy was used to oppose all government intervention in the economy, from labor laws to public health regulation.", "id": "fc14"}, {"front": "Gospel of Wealth (Carnegie, 1889)", "back": "Carnegie's essay in North American Review arguing that the wealthy are stewards of surplus capital obligated to administer it for public benefit ('the man who dies thus rich dies disgraced'). Defended industrial concentration as efficient and natural. Written three years before the Homestead Strike (1892), where Carnegie approved the wage cuts that precipitated the violent confrontation — the defining gap between his published ideals and his industrial practice.", "id": "fc15"}, {"front": "HAPP Analysis: Gospel of Wealth (1889)", "back": "Historical context: 1889, era of intense labor conflict and public unease about industrial concentration. Audience: literate middle- and upper-class readers of North American Review (premier intellectual journal). Purpose: to defend industrial concentration; recast wealthy as stewards rather than exploiters; forestall government redistribution by promising voluntary philanthropy. Point of view: Carnegie was the era's second-richest man and an active strikebreaker — his 'stewardship' framing served his class interest even if sincerely held.", "id": "fc16"}, {"front": "Cornelius Vanderbilt and the New York Central", "back": "Assembled the New York Central Railroad from smaller northeastern lines into one of the two dominant carriers (with the Pennsylvania Railroad) on the New York–Chicago corridor. Symbol of the Gilded Age railroad baron who manipulated rates and exploited captive shippers. His descendants continued the railroad dynasty into the twentieth century.", "id": "fc17"}, {"front": "Sherman Antitrust Act (1890)", "back": "The first federal statute declaring combinations in restraint of trade illegal. Weakly enforced in its early years: courts applied it more readily against labor unions (whose strikes were classified as restraint of trade) than against the business trusts it was ostensibly designed to control. Standard Oil was not broken up until 1911 (Supreme Court). Reflects the Gilded Age judiciary's consistent alignment with capital.", "id": "fc18"}, {"front": "Granger Laws (1870s)", "back": "State-level rate regulation backed by the Patrons of Husbandry (the Grange) in Illinois, Minnesota, Wisconsin, and Iowa. Initially upheld in Munn v. Illinois (1877) as valid regulation of businesses 'affected with a public interest.' Gutted by Wabash v. Illinois (1886), which held that states could not regulate interstate commerce. The Wabash decision directly prompted the Interstate Commerce Act (1887).", "id": "fc19"}, {"front": "U.S. Steel (1901)", "back": "Formed when J.P. Morgan bought Carnegie Steel for $480 million and merged it with other steel producers. Became the world's first billion-dollar corporation. Morgan's role illustrates the rise of investment banking as a new force in industrial capitalism — financiers who assembled and controlled industrial empires without necessarily managing them.", "id": "fc20"}, {"front": "The Selective Laissez-Faire Contradiction", "back": "Gilded Age industrialists publicly championed laissez-faire and Social Darwinism to oppose labor protections and regulation, while simultaneously accepting federal tariff protection, railroad land grants, and favorable court rulings. Laissez-faire was applied to workers and regulators; active government support was accepted for capital. This selective invocation of market freedom was one of the central contradictions that Progressive Era reformers targeted.", "id": "fc21"}, {"front": "WXT Theme: Industrial Capitalism's Costs", "back": "The WXT lens on the Gilded Age illuminates both transformation and cost: the independent artisan who could not compete with Carnegie's mechanized mills; the farmer who could not negotiate against a railroad monopoly; the skilled ironworker whose craft knowledge was made obsolete by machinery run by unskilled, lower-wage labor. Industrial capitalism created enormous aggregate wealth and systematically concentrated it — Gilded Age wealth inequality was proportionally greater than early-twenty-first-century inequality.", "id": "fc22"}, {"front": "Mesabi Range", "back": "Iron ore deposit in northern Minnesota that Carnegie Steel owned through vertical integration. The Mesabi Range, together with Pennsylvania coal fields, provided the raw material base for Carnegie's steel empire and illustrates how control of natural resource supply chains was central to Gilded Age industrial dominance.", "id": "fc23"}, {"front": "Comparison: Carnegie (Vertical) vs. Rockefeller (Horizontal)", "back": "Carnegie: vertical integration — owned every stage from Mesabi ore to finished steel rail; cost leadership through process efficiency. Rockefeller: horizontal integration — acquired/destroyed all oil-refining competitors; market power through monopoly control of ~90% of refining capacity. Both achieved dominance but through structurally different mechanisms. Carnegie eventually sold out; Rockefeller's trust was judicially dissolved (1911).", "id": "fc24"}, {"front": "Continuity/Change: Government and Industrial Capitalism", "back": "CONTINUITY: Throughout the Gilded Age, the federal government consistently supported industrial capital through tariffs, land grants, favorable court rulings, and military suppression of labor. CHANGE: The Interstate Commerce Act (1887) and Sherman Antitrust Act (1890) marked the first halting acknowledgment that unchecked industrial concentration was a public problem — though effective enforcement awaited the Progressive Era (Hepburn Act 1906, Standard Oil dissolution 1911).", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
