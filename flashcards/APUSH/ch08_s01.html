<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP United States History &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Containment", "back": "The grand strategic doctrine first articulated by George Kennan in the 1946 Long Telegram and 1947 'X article,' holding that the United States should prevent further Soviet expansion through sustained, patient counterpressure at every pressure point on the communist periphery. It guided American foreign policy from 1947 to 1991 but was contested between political-economic and military interpretations throughout the Cold War.", "id": "fc01"}, {"front": "George F. Kennan", "back": "Foreign Service officer stationed in Moscow who authored the Long Telegram (February 1946) and the 'X article' (July 1947), providing the intellectual foundation for containment. Kennan later argued that policymakers had militarized his concept far beyond his original intent, which emphasized political and economic rather than military instruments.", "id": "fc02"}, {"front": "The Long Telegram (1946)", "back": "An 8,000-word cable Kennan sent to the State Department on February 22, 1946, arguing that Soviet hostility was rooted in centuries of Russian insecurity reinforced by Marxist-Leninist ideology — not resolvable grievances. It counseled patient, firm containment and became the intellectual foundation of early Cold War strategy. HAPP context: written for State Department policymakers who needed a coherent framework for postwar US-Soviet relations.", "id": "fc03"}, {"front": "Iron Curtain", "back": "The phrase Winston Churchill used in March 1946 to describe the division of Europe between Soviet-controlled Eastern bloc states and the Western democracies. It captured the growing recognition that the wartime alliance had dissolved into a confrontation over the future of the continent.", "id": "fc04"}, {"front": "Truman Doctrine (1947)", "back": "President Truman's March 1947 declaration that the United States would support 'free peoples who are resisting attempted subjugation by armed minorities or by outside pressures.' Articulated in the context of requesting aid for Greece and Turkey, but its universalist language committed the US to an open-ended global anti-communist mission — a break from previous limited commitments.", "id": "fc05"}, {"front": "Marshall Plan (1948–1952)", "back": "The European Recovery Program providing approximately $13 billion in American economic assistance to rebuild Western European economies devastated by World War II. Its strategic logic: impoverished democracies were vulnerable to communist parties; prosperity was the best prophylactic against radicalism. Western European industrial production exceeded prewar levels by 1951; communist electoral strength declined sharply.", "id": "fc06"}, {"front": "Berlin Airlift (1948–49)", "back": "The Western response to Stalin's June 1948 blockade of land access to West Berlin. American and British aircraft flew more than 200,000 flights over eleven months, supplying 2 million West Berliners with food and coal. Stalin lifted the blockade in May 1949. The airlift demonstrated that patient, non-military counterpressure could force a Soviet retreat without armed conflict.", "id": "fc07"}, {"front": "NATO (North Atlantic Treaty Organization)", "back": "Military alliance signed in April 1949 by the United States and eleven Western democracies. Article 5 declared that an attack on any member would be treated as an attack on all. For the first time in its history, the United States committed in peacetime to the collective defense of foreign nations, explicitly breaking with the isolationist tradition.", "id": "fc08"}, {"front": "Article 5 (NATO Treaty)", "back": "The collective defense clause of the North Atlantic Treaty: an attack on any NATO member is considered an attack on all. This commitment was unprecedented in American history — a peacetime mutual defense obligation that broke with Washington's Farewell Address counsel against 'entangling alliances.'", "id": "fc09"}, {"front": "NSC-68 (1950)", "back": "A secret National Security Council policy document authored largely by Paul Nitze that recast containment as a military doctrine requiring massive rearmament. Responding to the Soviet bomb, the fall of China, and the Korean invasion, NSC-68 argued that political-economic instruments were insufficient and called for quadrupling defense spending. Kennan protested that his concept had been militarized beyond his intent.", "id": "fc10"}, {"front": "Korean War (1950–1953)", "back": "The first 'hot' conflict of the Cold War, triggered when North Korea crossed the 38th parallel on June 25, 1950. Truman intervened under UN authority without a declaration of war. The war unfolded in three phases — North Korean advance, MacArthur's Inchon landing and northern pursuit, Chinese intervention and front stabilization. An armistice in July 1953 restored roughly the prewar division. Some 36,000 Americans and over 3 million Koreans died.", "id": "fc11"}, {"front": "MacArthur's Inchon Landing (September 1950)", "back": "General Douglas MacArthur's amphibious landing at Inchon on Korea's west coast that cut North Korean supply lines and forced a rapid retreat — one of the most daring military operations of the Cold War era. The subsequent decision to pursue north of the 38th parallel triggered Chinese intervention, transforming a near-victory into a costly stalemate.", "id": "fc12"}, {"front": "Truman-MacArthur Controversy (1951)", "back": "MacArthur publicly demanded authority to bomb Chinese territory and use Nationalist forces, contradicting Truman's policy of limiting the war. Truman relieved him of command in April 1951. Though politically controversial, the firing upheld the constitutional principle of civilian control of the military — a precedent as significant as the war's military outcome.", "id": "fc13"}, {"front": "38th Parallel", "back": "The line of latitude dividing North and South Korea, established at the end of World War II. The Korean War began with North Korea's crossing of this line on June 25, 1950. The armistice of July 1953 restored the division approximately at this boundary, meaning the war ended roughly where it had begun — raising questions about the costs and limits of containment.", "id": "fc14"}, {"front": "Limited War", "back": "A war fought under self-imposed political and geographic constraints to avoid broader escalation — especially Chinese or Soviet direct involvement. Korea established this model: the US accepted a stalemate rather than pursuing total victory. The strategy reflected the Korean lesson that expanding to Chinese borders risked a much larger war but also produced deep frustration over fighting without decisive outcome.", "id": "fc15"}, {"front": "The 'X Article' (1947)", "back": "Kennan's July 1947 article in Foreign Affairs, published pseudonymously, that publicly introduced the containment concept: 'a long-term, patient but firm and vigilant containment of Russian expansive tendencies.' It operationalized the Long Telegram's analysis for a broader policy audience and became the foundational public text of American Cold War strategy.", "id": "fc16"}, {"front": "Soviet Atomic Bomb (August 1949)", "back": "The USSR detonated its first atomic bomb in August 1949 — four years ahead of American intelligence estimates. Combined with the 'fall of China' that same year, the event shocked American policymakers and accelerated the shift toward NSC-68's military interpretation of containment, dramatically raising Cold War anxiety.", "id": "fc17"}, {"front": "Fall of China (1949)", "back": "Mao Zedong's communist forces defeated Chiang Kai-shek's Nationalists, establishing the People's Republic of China in October 1949. American critics blamed State Department 'softness' on communism. Combined with the Soviet bomb, it intensified the Second Red Scare and pushed Truman toward NSC-68's rearmament program.", "id": "fc18"}, {"front": "CIA and National Security Council (1947)", "back": "Institutions created by the National Security Act of 1947 as part of the Cold War architecture. The CIA provided intelligence coordination and covert action capacity; the NSC coordinated foreign policy and national security decisions. Both survived the Cold War and remain central to American foreign policy today — durable institutional legacies of the containment era.", "id": "fc19"}, {"front": "HAPP Analysis: Kennan's Long Telegram", "back": "Historical context: February 1946, six months after WWII, with the Soviet-American alliance dissolving over Poland, Germany, and Iran. Audience: State Department policymakers needing a coherent framework. Purpose: recast the Soviets as an ideologically-driven regime for whom long-term coexistence with capitalism was impossible, counseling patient containment. Point of view: a fluent-in-Russian Foreign Service officer with deep regional expertise whose analysis carried unusual authority.", "id": "fc20"}, {"front": "WOR Theme: Cold War Architecture (1947–49)", "back": "The Truman Doctrine, Marshall Plan, and NATO represented a revolution in American foreign policy (WOR): the US abandoned hemispheric retreat for permanent global engagement. These commitments broke the Washingtonian tradition of avoiding entangling alliances and created durable institutions — the CIA, NSC, NATO — that outlasted the Cold War by decades.", "id": "fc21"}, {"front": "POL Theme: Civilian Control of the Military", "back": "Truman's firing of MacArthur (April 1951) upheld the constitutional principle that military commanders are subordinate to civilian political authority. The episode illustrated a fundamental tension in democratic war-making: military commanders may believe tactical success requires escalation that civilian leaders judge politically unacceptable.", "id": "fc22"}, {"front": "Kennan's Political-Economic vs. NSC-68's Military Containment", "back": "The central interpretive tension of American Cold War strategy: Kennan envisioned supporting resilient democracies through economic and political means; NSC-68 argued Soviet military power required a commensurate American military buildup. This debate between 'containment by strength' vs. 'containment by resilience' defined American Cold War policy through the Vietnam era and beyond.", "id": "fc23"}, {"front": "Continuity/Change: American Isolationism to Cold War Internationalism", "back": "From Washington's Farewell Address (1796) through the Senate's rejection of the League of Nations (1919), American foreign policy tradition counseled avoiding entangling alliances. NATO (1949) marked the decisive break: permanent peacetime collective defense commitments in Europe and Asia represented a fundamental reversal of that tradition driven by Cold War imperatives.", "id": "fc24"}, {"front": "AP Causation: Why Did the Cold War Begin by 1947?", "back": "Multiple converging causes: Soviet installation of communist governments in Eastern Europe, violation of Polish election agreements, refusal to withdraw from Iran, and ideological incompatibility between Marxism-Leninism and Western capitalism. Kennan argued the causes were structural and historical (Russian insecurity + Marxist ideology), not the product of specific grievances that better diplomacy could have resolved.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
