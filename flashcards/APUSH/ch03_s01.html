<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP United States History &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Seven Years' War (French and Indian War)", "back": "Global conflict 1754–1763 that began when Virginia militia colonel George Washington ambushed a French patrol in western Pennsylvania. Britain won decisively, gaining Canada and all French territory east of the Mississippi, but nearly doubled its national debt — creating the fiscal conditions that led directly to colonial taxation and the imperial crisis.", "id": "fc01"}, {"front": "Peace of Paris (1763)", "back": "Treaty ending the Seven Years' War; transferred Canada and all French territory east of the Mississippi River to Britain. The extraordinary territorial gain came with an extraordinary bill — Britain's national debt had nearly doubled — driving London to require colonists to share the burden through direct taxation.", "id": "fc02"}, {"front": "Salutary Neglect", "back": "Informal British policy (c. 1688–1760s) of loosely enforcing trade regulations and allowing colonial assemblies broad latitude in self-governance. Attributed to Edmund Burke. When Britain ended this policy after 1763 to fund imperial defense, colonists who had governed themselves for a century reacted to direct taxation as a violation of their inherited rights as Englishmen.", "id": "fc03"}, {"front": "Proclamation of 1763", "back": "British order forbidding colonial settlement west of the Appalachian Mountains, reserving that territory for indigenous peoples and reducing frontier defense costs. Colonists who had fought the war expecting to open western lands found the Proclamation infuriating — a punishment disguised as policy.", "id": "fc04"}, {"front": "Stamp Act (1765)", "back": "Parliament's first direct internal tax on the colonies, requiring revenue stamps on printed materials — newspapers, legal documents, pamphlets, even playing cards. Its opponents seized the central revolutionary slogan: 'no taxation without representation.' Parliament had never before extracted money from internal colonial transactions.", "id": "fc05"}, {"front": "No Taxation Without Representation", "back": "The core constitutional principle of colonial resistance: Parliament could not legitimately tax a people who had no elected representatives in that body. Colonists insisted on actual representation through delegates of their own choosing — not Parliament's claimed 'virtual representation' of all British subjects.", "id": "fc06"}, {"front": "Virtual Representation", "back": "Parliamentary doctrine that members of the British House of Commons represented the interests of all British subjects throughout the empire — including unrepresented colonists. Used to justify the Stamp Act. Colonial leaders including James Otis and John Adams rejected it, insisting that legitimate taxation required actual, direct representation through elected delegates.", "id": "fc07"}, {"front": "Sons of Liberty", "back": "A network of artisans, merchants, and radical politicians that organized colonial resistance to the Stamp Act, including boycotts and mob actions destroying the homes of royal stamp distributors. Instrumental in the Boston Tea Party (1773); represented the extra-legal arm of colonial resistance.", "id": "fc08"}, {"front": "Stamp Act Congress (1765)", "back": "Meeting of delegates from nine colonies (October 1765) that issued resolutions denying Parliament's right to tax the colonies. One of the first instances of intercolonial political coordination, demonstrating that resistance could be organized across colonial boundaries.", "id": "fc09"}, {"front": "Declaratory Act (1766)", "back": "Passed simultaneously with the Stamp Act's repeal, asserting Parliament's authority to legislate for the colonies 'in all cases whatsoever.' Britain retreated on the specific tax but refused to concede the constitutional principle — setting up the next round of the imperial crisis.", "id": "fc10"}, {"front": "Townshend Acts (1767)", "back": "Parliamentary acts imposing duties on imported goods (glass, lead, paint, paper, tea) and establishing enforcement mechanisms — admiralty courts without juries, writs of assistance for general searches. Provoked John Dickinson's Letters from a Pennsylvania Farmer and renewed colonial boycotts.", "id": "fc11"}, {"front": "John Dickinson and Letters from a Pennsylvania Farmer (1767–68)", "back": "Dickinson argued that any parliamentary tax on the colonies — whether internal or external — was unconstitutional without colonial consent. His pamphlets expanded the constitutional argument beyond internal taxes to challenge Parliament's entire taxing authority over the colonies.", "id": "fc12"}, {"front": "Boston Massacre (1770)", "back": "Incident in which British soldiers, taunted by a crowd, fired and killed five men. Samuel Adams's label 'Boston Massacre' was a deliberate propagandistic framing — still contested by historians — that proved highly effective in building anti-British sentiment and reshaping how colonists interpreted the imperial crisis.", "id": "fc13"}, {"front": "Tea Act (1773)", "back": "Intended as a rescue package for the financially struggling British East India Company, it allowed the company to sell tea directly to colonists, bypassing colonial merchants and actually lowering the price. Colonists rejected it: accepting cheap tea meant accepting Parliament's right to tax it — making a lower price a constitutional trap.", "id": "fc14"}, {"front": "Boston Tea Party (December 16, 1773)", "back": "Sons of Liberty members, some dressed as Mohawks, boarded three ships in Boston Harbor and dumped 342 chests of East India Company tea into the water. The most dramatic act of colonial defiance before armed conflict; Parliament's response — the Coercive Acts — transformed the crisis from local to continental.", "id": "fc15"}, {"front": "Coercive Acts / Intolerable Acts (1774)", "back": "Parliament's punitive response to the Boston Tea Party: closed Boston Harbor until the tea was paid for; suspended Massachusetts's charter of self-government; allowed royal officials to be tried in Britain; required colonists to house British troops. By threatening Massachusetts's charter, Britain signaled every colony's self-governance was vulnerable.", "id": "fc16"}, {"front": "Quebec Act (1774)", "back": "Passed simultaneously with the Coercive Acts; extended Quebec's boundaries into the Ohio Valley. Revived colonial frontier land anxieties and was grouped by colonists with the Coercive Acts as part of the same punitive program — further inflaming intercolonial resistance.", "id": "fc17"}, {"front": "First Continental Congress (1774)", "back": "Emergency meeting of delegates from twelve colonies (Georgia sent none) convened to coordinate response to the Coercive Acts. Drafted a Declaration of Rights, organized the Continental Association trade boycott, and agreed to reconvene if Britain did not relent — establishing the pattern of intercolonial political organization.", "id": "fc18"}, {"front": "HAPP: Why was the Stamp Act a constitutional flashpoint, not just a tax dispute?", "back": "Historical context: colonists had governed themselves through assemblies for a century under salutary neglect. The Stamp Act's direct internal taxation violated their operating principle that only their own representatives could tax them. It was a constitutional claim about legitimate authority, not merely a complaint about the tax amount.", "id": "fc19"}, {"front": "Compare/Contrast: Navigation Acts vs. Stamp Act", "back": "Navigation Acts regulated colonial trade (external commerce) — colonists accepted this as Parliament's legitimate authority. The Stamp Act imposed a direct internal tax on colonial transactions — colonists rejected this as taxation without representation. The distinction between external trade regulation and internal taxation was the key constitutional fault line.", "id": "fc20"}, {"front": "Escalating Crisis Pattern, 1763–1774", "back": "The decade followed a cycle: Parliament imposed a measure → colonists resisted on constitutional grounds → Britain backed down partially but reasserted authority in principle → a new flashpoint generated a sharper confrontation. Each cycle eroded colonial trust. By 1774, many colonial leaders concluded Parliament's claimed authority was structurally illegitimate.", "id": "fc21"}, {"front": "CED Theme: POL — What political theory underpinned colonial resistance?", "back": "Colonial resistance drew on English common law (rights of Englishmen), Enlightenment philosophy (especially Locke's social contract and consent of the governed), and the practical experience of a century of colonial self-governance through elected assemblies. Together these supplied a coherent theory of legitimate authority.", "id": "fc22"}, {"front": "CED Theme: WOR — How was the imperial crisis shaped by global competition?", "back": "Britain's post-war fiscal crisis was itself a product of global strategic rivalry with France and Spain; colonial taxation was one front in a worldwide imperial contest. The Seven Years' War established the pattern by which North American politics would be repeatedly shaped by European power conflicts — reappearing in the Whiskey Rebellion, XYZ Affair, and War of 1812.", "id": "fc23"}, {"front": "Writs of Assistance", "back": "General search warrants established by the Townshend Acts, allowing customs officials to search any colonial premises without specific cause. Colonists viewed them as a violation of the English common-law tradition protecting private property from arbitrary search — one of the grievances later encoded in the Fourth Amendment.", "id": "fc24"}, {"front": "Continuity/Change: What changed and what persisted in Britain's colonial policy after 1763?", "back": "Change: Britain ended salutary neglect, imposing direct taxes and tightening trade enforcement. Continuity: Britain continued to claim sovereign authority over the colonies throughout, never conceding the constitutional principle — even while repealing specific acts. The persistence of the Declaratory Act shows Britain retreated on taxes but not on authority.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
