    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

    <script>
    var CARDS = [{"front": "Second Great Awakening", "back": "A wave of Protestant religious revival sweeping American society between roughly 1800 and 1840, unprecedented since the First Great Awakening (1730s–1740s). Its theological core — perfectionism — held that human beings could achieve moral perfection through divine grace. This doctrine was politically explosive: if individuals could be saved from sin, society could be reformed from vice. The Awakening's energy drove the temperance, education, prison reform, abolitionist, and women's rights movements.", "id": "fc01"}, {"front": "Perfectionism", "back": "The theological doctrine, central to Charles Finney's evangelicalism, that human beings can — through divine grace and sustained effort — achieve moral perfection within their earthly lives. Stood in sharp contrast to Calvinist predestination (humans inherently sinful, salvation entirely God's decision). Perfectionism had radical political implications: if individuals could be perfected, so could society. It provided the theological engine for all the antebellum reform movements.", "id": "fc02"}, {"front": "Calvinist predestination vs. Finney's perfectionism", "back": "Calvinist predestination: God has already determined who will be saved and who will be damned; human effort is irrelevant to salvation. Finney's perfectionism: Sinners can choose salvation; a skilled revivalist can help them make that choice. The shift from passivity (predestination) to agency (perfectionism) had profound social implications — if individuals could choose moral transformation, then organized human effort could transform society. Perfectionism authorized the reform impulse.", "id": "fc03"}, {"front": "Charles Grandison Finney", "back": "The era's most influential Eastern evangelist; a former lawyer who brought 'forensic precision' to revival mechanics. Rejected Calvinist predestination in favor of human agency in salvation. Developed 'new measures': protracted meetings (multi-day revivals), the anxious bench (sinners at the front for focused pastoral attention), and deliberate creation of emotional intensity through music and testimonials. His 1830–31 Rochester, New York revivals produced mass conversions and measurable social improvements, becoming the model for how religious enthusiasm and social reform were the same project.", "id": "fc04"}, {"front": "Finney's 'new measures'", "back": "Finney's innovative revivalist techniques: (1) protracted meetings — revivals lasting several days rather than a single sermon; (2) the 'anxious bench' — a pew at the front where sinners struggling with conversion sat for concentrated pastoral attention; (3) deliberate emotional intensity — through music, testimonials, and marathon preaching. The Rochester revival (1830–31) demonstrated these measures could produce mass conversion and measurable social change (declining alcoholism, sabbath-breaking, and public disorder).", "id": "fc05"}, {"front": "Cane Ridge Revival (1801)", "back": "A massive outdoor camp meeting in Kentucky where perhaps 10,000 to 20,000 people gathered over several days, some experiencing convulsive physical manifestations of religious emotion. The western face of the Second Great Awakening — itinerant preachers, outdoor mass gatherings, intense physical and emotional expression. Contrasted with Finney's more systematic Eastern approach, but both shared the perfectionist premise and the rejection of Calvinist passivity.", "id": "fc06"}, {"front": "Temperance movement", "back": "The most broadly successful reform movement of the antebellum era. Began as a campaign for moderation; evolved into a demand for total abstinence and eventually legal prohibition. The American Temperance Society (1826) enrolled over a million members by 1833 — the largest voluntary organization in the country. Support came from: evangelical ministers (alcohol as gateway to vice), factory owners (sober workers needed), and women (disproportionate victims of male drunkenness; temperance gave them a legitimate public platform). Pioneered mass-petition and tract-distribution techniques that all later reform movements adopted.", "id": "fc07"}, {"front": "Temperance as the 'training ground'", "back": "The temperance movement pioneered organizational techniques — mass petitions, tract distribution, public pledging ceremonies, women's auxiliary organizations — that later reform movements (abolition, women's rights) adopted wholesale. It was the school of political organization for the reformers who came after. It also had a gender dimension: the movement gave respectable women a legitimate public platform for moral advocacy at a time when direct political participation was formally denied them.", "id": "fc08"}, {"front": "Horace Mann and the common school", "back": "Appointed secretary of the Massachusetts State Board of Education in 1837. Champion of the 'common school' — publicly funded, universally accessible elementary education producing moral, informed citizens. Doubled Massachusetts school year to 6 months, established first 'normal schools' (teacher training colleges), standardized curriculum (based on Prussian model). Argued education was 'the great equalizer.' Limitation: did not challenge racial exclusion — antebellum schools were typically segregated, and Black children were excluded from or confined to inferior schools.", "id": "fc09"}, {"front": "Normal schools", "back": "Teacher training colleges established under Horace Mann's reform program in Massachusetts — the first of their kind in the United States. Raised teaching from an amateur occupation to a professional one with systematic training requirements. Part of Mann's broader vision of using education as a mechanism of social improvement and republican citizenship formation. The normal school model spread across the country through Mann's influential annual reports to the Massachusetts Board of Education.", "id": "fc10"}, {"front": "Brook Farm (1841–47)", "back": "A Transcendentalist utopian community founded near Boston by minister George Ripley. Attracted prominent intellectual figures including Nathaniel Hawthorne. Combined manual labor with intellectual life, attempting to dissolve the class distinction between workers of hand and brain. Ralph Waldo Emerson visited but declined to join, skeptical that institutional community could produce individual perfection. Financially unviable; collapsed after a fire destroyed its main building in 1847. Example of the antebellum belief that existing society was too corrupted for incremental reform.", "id": "fc11"}, {"front": "Oneida Community (1848–1881)", "back": "Utopian community in upstate New York founded by John Humphrey Noyes. Far more radical and more durable than Brook Farm. Noyes's perfectionist theology held the community had already achieved holiness, justifying radical social departures: 'complex marriage' (all adults married to each other), communal child-rearing, shared property, and eventually a eugenics program giving community elders authority over reproduction. Survived more than three decades; reorganized as a silverware manufacturing company. Still in operation today as Oneida Ltd.", "id": "fc12"}, {"front": "Dorothea Dix", "back": "Massachusetts schoolteacher and writer who conducted a comprehensive survey of Massachusetts jails and almshouses (1841–43), finding mentally ill people confined with criminals in unheated cells, subject to physical abuse, chained or caged. Her Memorial to the Legislature of Massachusetts (1843) argued that mental illness was a medical condition, not a moral failing, requiring humane state treatment. She secured new or expanded state mental hospitals in more than 30 states and several foreign countries — without the right to vote or hold office. One of the most effective single-issue reformers in American history.", "id": "fc13"}, {"front": "Dix's rhetorical strategy", "back": "Dix achieved reform by working within — rather than against — the ideology of female moral superiority: she directed her energy toward suffering people, the 'objects' that the domesticity ideology already assigned to female care. Her Memorial presented clinical findings with 'clinical precision and moral urgency.' She worked through personal persuasion and documented moral argument, without mass organizing, in a space where the domesticity ideology gave women legitimate authority — care for the most vulnerable.", "id": "fc14"}, {"front": "The reform impulse: theology into politics", "back": "The Second Great Awakening's perfectionism (individual moral improvement possible) → reform movements (social moral improvement possible). Chain: temperance pioneered mass-petition techniques → education reformers used same → prison/asylum reformers (Dix) added documented evidence argument → abolitionists demanded most radical reform → women's rights advocates discovered their own political exclusion through reform work. All drew from the same perfectionist theological source and the same organizational repertoire.", "id": "fc15"}, {"front": "Women's political consciousness through reform", "back": "Women became the primary organizers of reform campaigns (temperance, abolition, prison reform) and in doing so discovered that they were excluded from the formal political system that governed what they sought to change. This discovery — that women could identify and organize for social reform but lacked the political rights to enact it — was the source of the women's rights movement. Women's consciousness emerged through reform organizing, not from abstract philosophy.", "id": "fc16"}, {"front": "ARC + SOC Theme: Reform as social formation", "back": "The Second Great Awakening's perfectionism (ARC — ideology) authorized the reform impulse. But reform took a specific social form (SOC): middle-class, predominantly Northern, heavily female, organized through voluntary associations outside formal government. This social form was itself a product of the market revolution — which created the salaried middle class with surplus resources, spatially separated home from work, and denied women formal political participation. Reform was 'not simply an idea; it was a social formation — a new kind of organized civil society that the market revolution had made possible.'", "id": "fc17"}, {"front": "Voluntary associations", "back": "The organizational form of the antebellum reform movements: non-governmental organizations formed by citizens around shared moral goals. The American Temperance Society, the American Anti-Slavery Society, and Dix's networks were all voluntary associations. They operated outside formal government — filing petitions, distributing tracts, sponsoring lectures, organizing chapters — creating what historians call 'civil society.' For women excluded from formal political participation, voluntary associations were the primary vehicle for political engagement.", "id": "fc18"}, {"front": "Comparison: Western camp meetings vs. Finney's Eastern revivals", "back": "Western camp meetings (Cane Ridge, 1801): outdoor, mass gatherings of 10,000–20,000; itinerant preachers; convulsive physical manifestations of religious emotion; frontier social setting. Finney's Eastern revivals (Rochester, 1830–31): indoor, urban, systematic 'new measures'; forensic argument and emotional technique; targeted social reform (measurable declines in alcoholism and disorder); middle-class audience. Both shared perfectionist theology; they differed in method and social context.", "id": "fc19"}, {"front": "Continuity/Change: How did the reform impulse connect the 1820s–1840s to later American history?", "back": "The antebellum reform impulse established the organizational model — mass petitions, tract distribution, voluntary associations, women's auxiliaries — that defined American reform politics through the Progressive Era and beyond. The temperance movement eventually produced Prohibition (1919). The prison reform movement Dix launched remains the basis of mental health advocacy. Most directly, abolition and women's rights — both products of perfectionist reform logic — required the Civil War and the 19th Amendment to achieve their goals, demonstrating both the reach and the limits of moral suasion.", "id": "fc20"}, {"front": "The limits of antebellum reform", "back": "The reform movements of the 1820s–1840s shared important limits: (1) racial: Horace Mann's common schools were segregated; temperance and abolitionist organizations often maintained racial hierarchies within themselves; (2) class: reform was primarily middle-class, directed at working-class and marginalized populations as subjects of improvement, not co-leaders; (3) political: women had no vote; Black Americans had limited franchise access; all reform operated outside formal political power. Dorothea Dix's career illustrated both what was achievable and what remained beyond the reach of moral suasion.", "id": "fc21"}, {"front": "John Humphrey Noyes and the Oneida Community's eugenics program", "back": "The Oneida Community's 'stirpiculture' (eugenics) program gave community elders authority over who could reproduce within the community, attempting to breed morally superior humans. This represents the dark logical extension of perfectionism: if individuals can achieve perfection, why not engineer it in the next generation? Oneida's eugenics program prefigures later American eugenics movements of the early 20th century, illustrating how perfectionist premises could generate authoritarian social control.", "id": "fc22"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
