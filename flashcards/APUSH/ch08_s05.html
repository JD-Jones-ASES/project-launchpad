<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP United States History &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP United States History &mdash; Chapter 8, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APUSH.html">&larr; Back to AP United States History</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Gulf of Tonkin Resolution (August 1964)", "back": "Joint resolution passed 416-0/88-2 authorizing the president to use 'all necessary measures' to repel attacks and prevent further aggression in Southeast Asia, following reported North Vietnamese attacks on US destroyers. Johnson used it as the functional equivalent of a declaration of war; by 1968, over 500,000 American troops were in Vietnam. The second reported attack may not have occurred. Repealed in 1971; raised fundamental war-powers questions addressed by the War Powers Resolution (1973).", "id": "fc01"}, {"front": "Vietnamization", "back": "Nixon's strategy of gradually replacing American troops in Vietnam with South Vietnamese forces (ARVN) while withdrawing Americans — a strategy that extended the war by four years rather than ending it, as Nixon had promised. The strategy reflected the political need to reduce American casualties while maintaining the war, but South Vietnamese forces were insufficient to resist North Vietnamese pressure without American air support.", "id": "fc02"}, {"front": "Attrition Strategy (Vietnam)", "back": "General Westmoreland's strategy of inflicting unsustainable casualties on the enemy through 'search and destroy' operations until North Vietnam agreed to negotiate. The strategy failed because body-count metrics masked the enemy's capacity for replenishment — North Vietnam could absorb losses faster than American firepower could inflict them. It also devastated the Vietnamese countryside (napalm, Agent Orange) without defeating the insurgency.", "id": "fc03"}, {"front": "Tet Offensive (January 30, 1968)", "back": "Coordinated North Vietnamese Army and Viet Cong offensive against more than 100 South Vietnamese cities, including the US Embassy compound in Saigon. Militarily defeated — attackers suffered enormous casualties. Psychologically decisive: the Johnson administration had been claiming the war was being won; Tet made those claims untenable. Walter Cronkite's declaration of 'stalemate' reportedly led Johnson to say, 'If I've lost Cronkite, I've lost Middle America.'", "id": "fc04"}, {"front": "Walter Cronkite and the Credibility Gap", "back": "CBS anchor Walter Cronkite, then the most trusted journalist in America, declared the Vietnam War a 'stalemate' following the Tet Offensive. His editorial departure from reporting to opinion illustrated how the credibility gap — the growing gulf between official government claims about the war's progress and the reality visible on television — eroded the public's trust in Johnson's Vietnam policy.", "id": "fc05"}, {"front": "Great Society", "back": "LBJ's domestic reform program (1964–68): Medicare and Medicaid (1965), War on Poverty (Economic Opportunity Act 1964), Head Start, VISTA, federal education aid (ESEA 1965), Voting Rights Act (1965), Immigration Act (1965). The most ambitious expansion of federal domestic role since the New Deal. Its implementation was complicated and curtailed by the Vietnam War, which consumed federal revenues and political capital that social programs required.", "id": "fc06"}, {"front": "Medicare and Medicaid (1965)", "back": "The centerpieces of the Great Society: Medicare provided federal health insurance to Americans over 65; Medicaid provided coverage for low-income Americans of any age. Together they transformed healthcare access for the elderly and the poor and established a permanent federal role in health insurance — institutional changes that subsequent administrations could modify but not eliminate. They were the most enduring domestic legacies of the Great Society.", "id": "fc07"}, {"front": "War on Poverty", "back": "The domestic anti-poverty component of the Great Society, established by the Economic Opportunity Act (1964). Created the Office of Economic Opportunity, Head Start (preschool education for low-income children), the Job Corps (employment training), VISTA (domestic peace corps), and community action programs. Its approach — channeling funds directly to community organizations — was politically controversial and eventually defunded or restructured.", "id": "fc08"}, {"front": "Immigration and Nationality Act (1965)", "back": "Abolished the National Origins Formula (1924) that had systematically favored northern and western European immigrants. Replaced national origin quotas with family reunification preferences and skills-based criteria. Dramatically changed immigration sources toward Asia, Latin America, and Africa — transforming American demographics in ways not anticipated by the act's architects. Its long-term consequence: the US trending toward a 'majority-minority' country by the mid-21st century.", "id": "fc09"}, {"front": "National Origins Formula (1924)", "back": "The quota system embedded in the Immigration Act of 1924 that allocated immigration slots in proportion to the national origins of the existing US population — systematically privileging northern and western Europeans and excluding most others. Abolished by the Immigration and Nationality Act of 1965; its elimination was one of the most significant long-term domestic policy changes of the Johnson era.", "id": "fc10"}, {"front": "The Feminine Mystique (Friedan, 1963)", "back": "Betty Friedan's 1963 book that named the 'problem that has no name' — the frustration of educated women confined to domestic roles in postwar suburban America. Crystallized second-wave feminism politically. HAPP: historical context (postwar suburban boom, civil rights providing rights vocabulary); audience (educated white middle-class women — criticized by bell hooks for excluding working-class women and women of color); purpose (name, document, and mobilize around female confinement); point of view (Friedan as insider critic of the domesticity she was critiquing).", "id": "fc11"}, {"front": "NOW (National Organization for Women)", "back": "Co-founded by Betty Friedan in 1966; pursued gender equality through legal and political channels — the Equal Pay Act (1963), Title VII's sex discrimination prohibition, and the proposed Equal Rights Amendment (ERA). The ERA passed Congress in 1972 but failed ratification by the 1982 deadline — a significant failure that illustrated the limits of liberal feminist legislative strategy.", "id": "fc12"}, {"front": "Equal Rights Amendment (ERA)", "back": "Constitutional amendment to prohibit sex discrimination, passed Congress in 1972 but failed to win ratification by 38 states by the 1982 deadline. Its failure generated a countermovement led by Phyllis Schlafly that mobilized conservative women against feminist legislative goals and helped build the New Right coalition. The ERA fight illustrated both the reach and the limits of second-wave feminism's political agenda.", "id": "fc13"}, {"front": "Roe v. Wade (1973)", "back": "Supreme Court decision recognizing a constitutional right to abortion in the first trimester under the Fourteenth Amendment's privacy protections. The most controversial SCOTUS ruling of the era; generated a countermovement that would reshape American politics for decades, eventually producing the conservative anti-abortion movement that became central to the Republican coalition. Overturned by Dobbs v. Jackson (2022).", "id": "fc14"}, {"front": "United Farm Workers (UFW)", "back": "Labor organization co-founded by Cesar Chavez and Dolores Huerta in 1962. Led a successful nationwide grape boycott (1965–70) to win union contracts for agricultural laborers — among the most exploited workers in the country. The Chicano movement it was part of adopted the civil rights movement's rights language and organizing tactics, extending the rights revolution beyond African American communities.", "id": "fc15"}, {"front": "American Indian Movement (AIM)", "back": "Founded 1968; combined confrontational direct action (the occupation of Wounded Knee, South Dakota, 1973) with legal advocacy for treaty rights and Native American self-determination. Like the UFW and women's movement, AIM adopted the civil rights movement's rights language and organizing model while developing its own distinct analysis of Native American subordination — colonization and treaty violation rather than segregation.", "id": "fc16"}, {"front": "Stonewall Uprising (June 1969)", "back": "Resistance by patrons of the Stonewall Inn (a Greenwich Village bar) to a police raid launched the modern gay rights movement. Before Stonewall, gay organizing was largely covert (Mattachine Society, 1950s). Stonewall initiated public, confrontational organizing for gay rights — marking the transition from a defensive, private identity to a public political movement demanding recognition and legal protection.", "id": "fc17"}, {"front": "The 1968 Democratic Convention (Chicago)", "back": "The Democratic National Convention convened in Chicago in August 1968, fractured between antiwar and pro-war factions. Police riots outside the convention hall, broadcast live on television, symbolized the collapse of the liberal order. The party's inability to unite around Vietnam produced Nixon's narrow 1968 victory and marked the beginning of the Democratic Party's long retreat from its New Deal coalition.", "id": "fc18"}, {"front": "The Rights Revolution Beyond Civil Rights", "back": "The civil rights movement's rights language was claimed with remarkable speed by other marginalized groups in the late 1960s and early 1970s: women (NOW, ERA, Title VII litigation), Chicano farmworkers (UFW, La Raza), Native Americans (AIM, Wounded Knee), and gay Americans (Stonewall, gay rights organizations). Each movement both drew on civil rights precedents and developed distinct analyses of its own community's subordination.", "id": "fc19"}, {"front": "SOC + POL Theme: Rights Revolution and the Expansion of Citizenship", "back": "The rights revolution of the 1960s expanded the meaning of American citizenship by insisting that formal political rights were inseparable from social and economic rights. Each movement argued that the federal government's obligations included not merely protection from discrimination but active promotion of inclusion. This expansion of the state's role was contested, but never fully reversed, in the conservative era that followed.", "id": "fc20"}, {"front": "Key Concept: Fracturing of the Liberal Consensus", "back": "Three forces drove the collapse of postwar liberalism by 1968: (1) Vietnam consumed resources and moral credibility of the liberal state; (2) urban uprisings frightened white working-class Democrats who associated liberalism with disorder; (3) the rights movements' demands for substantive equality pushed liberalism beyond what its majority coalition would accept. The 1968 election marked the beginning of the Democratic Party's long retreat from its New Deal coalition.", "id": "fc21"}, {"front": "Agent Orange and Napalm (Vietnam)", "back": "Agent Orange: an herbicide/defoliant sprayed across millions of acres of Vietnamese jungle to deny cover to the enemy; it contained dioxin, a highly toxic carcinogen with lasting health effects on Vietnamese civilians and American veterans alike. Napalm: an incendiary gel used in bombs and flamethrowers that burned everything it touched, including civilians. Both weapons became symbols of the war's moral catastrophe.", "id": "fc22"}, {"front": "Head Start", "back": "A Great Society program providing federally funded preschool education to low-income children; established by the Economic Opportunity Act (1964). One of the War on Poverty's most enduring programs, it operated on the principle that educational disadvantage began before formal schooling — a structural intervention in child poverty that Black Power's community control advocates later influenced through demands for community involvement in the program's governance.", "id": "fc23"}, {"front": "AP Causation: Why Did Johnson's Great Society Fail to Fulfill Its Promise?", "back": "The Great Society was undermined by three converging forces: (1) Vietnam consumed the federal budget and political capital the programs required; (2) urban uprisings generated a white backlash that eroded congressional support; (3) the rights movements' demands for substantive economic equality (not just formal legal equality) outpaced what the liberal coalition was willing to fund. The Great Society's institutional legacy (Medicare, Medicaid, ESEA) survived; its anti-poverty ambitions were curtailed.", "id": "fc24"}, {"front": "Continuity/Change: American Immigration Policy Before and After 1965", "back": "Before 1965: National Origins Formula (1924) systematically favored northern and western Europeans; US immigration was demographically structured to maintain existing ethnic composition. After 1965: family reunification and skills-based criteria dramatically shifted sources to Asia, Latin America, and Africa. The change in law produced demographic transformation its architects did not anticipate — illustrating how policy changes can generate historical consequences far beyond their intended scope.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
