<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Data Compression", "back": "Reducing the number of bits needed to represent information by exploiting redundancy in the source data. Compression is a foundational necessity of modern computing: without it, streaming video would saturate networks within seconds and a 256 GB phone would hold fewer than 500 uncompressed photos. Two broad categories: lossless and lossy.", "id": "fc01"}, {"front": "Compression Ratio", "back": "The ratio of original (uncompressed) file size to compressed file size. A 4:1 ratio means the compressed file is one-quarter the original. Lossless ratios for typical images: 1.5:1 to 4:1. Lossy ratios for the same images: 10:1 to 20:1, achieved by discarding perceptually unimportant data.", "id": "fc02"}, {"front": "Lossless Compression", "back": "A compression technique in which decompressing reproduces the EXACT original file - every bit identical to the input. The defining guarantee: decompress equals exact original. Achieves modest compression ratios (1.5:1 to 4:1 typical for images) by encoding common patterns with short codes and rare patterns with long codes.", "id": "fc03"}, {"front": "Lossy Compression", "back": "A compression technique that discards information - specifically, data a perceptual model predicts will not be noticed by humans. Once discarded, the information is gone permanently; there is no way to recover the exact original. Achieves much higher ratios (10:1 to 20:1 for images, 8:1 to 15:1 for audio) than lossless.", "id": "fc04"}, {"front": "Run-Length Encoding (RLE)", "back": "The simplest lossless compression technique: replace consecutive runs of identical values with a count and the value. A row reading 'white, white, white, white, white, black, black, white, white' (9 values) becomes '5 white, 2 black, 2 white' (3 groups). 3:1 ratio on this row. Effective on images with large solid-color regions; less effective on photographs.", "id": "fc05"}, {"front": "DEFLATE / Huffman / LZ77", "back": "The lossless algorithms inside ZIP, PNG, and gzip. Huffman coding: assigns short codes to common symbols and long codes to rare symbols. LZ77 dictionary compression: replaces repeated byte sequences with pointers to earlier occurrences. DEFLATE combines both for higher ratios than either alone. Universal lossless workhorse on the modern web.", "id": "fc06"}, {"front": "PNG (Portable Network Graphics)", "back": "A lossless image format using DEFLATE. Reproduces the input exactly. Used where pixel-perfect accuracy matters: screenshots, logos, icons, medical imaging, transparent overlays. Larger files than JPEG for photographic content (no perceptual discard) but identical input/output guarantee.", "id": "fc07"}, {"front": "JPEG (Joint Photographic Experts Group)", "back": "A lossy image format using the discrete cosine transform (DCT) on 8x8 pixel blocks. High-frequency coefficients are aggressively quantized; the human visual system is relatively insensitive to fine detail, so the loss is often imperceptible. Quality settings control how aggressively coefficients are discarded. 10:1 to 20:1 typical compression ratio.", "id": "fc08"}, {"front": "MP3 / AAC / Opus Audio Compression", "back": "Lossy audio codecs that use a psychoacoustic model to identify sounds humans cannot perceive: sounds masked by louder simultaneous sounds, frequencies above audible range, very quiet sounds. Masked components are discarded; remaining content is stored at lower precision. 8:1 to 15:1 compression. Standard for streaming music and podcasts.", "id": "fc09"}, {"front": "MP4 / H.264 / H.265 Video Compression", "back": "Lossy video codecs that exploit temporal redundancy - the fact that adjacent frames usually differ only in small regions. Stores reference (key) frames at intervals, with all other frames encoded as motion-compensated differences. Enables streaming video at bandwidths orders of magnitude below uncompressed video. Each generation (H.264 -> H.265 -> AV1) achieves higher ratios at the same quality.", "id": "fc10"}, {"front": "FLAC (Free Lossless Audio Codec)", "back": "A lossless audio codec that achieves roughly 2:1 compression by exploiting statistical patterns in audio waveforms. Preferred for archival masters, audiophile distribution, and any context where bit-exact reproduction is required. Slower to encode/decode than MP3 but produces audibly indistinguishable output from the original PCM source.", "id": "fc11"}, {"front": "Metadata", "back": "Structured information that describes, contextualizes, or provides administrative detail about a primary data file, without forming part of the primary content itself. Stored in the file header or a sidecar file. Examples: EXIF in JPEGs (camera, GPS, timestamp), ID3 tags in MP3s (artist, album, track title), document properties in PDFs (author, creation date).", "id": "fc12"}, {"front": "EXIF Privacy Risk", "back": "Most photos taken on smartphones embed GPS coordinates in EXIF metadata, recording the exact location where the photo was taken. Sharing a raw photo without stripping EXIF reveals that location to anyone who downloads it. Most social networks strip EXIF GPS on upload, but the raw file (e.g., emailed or USB-transferred) still contains it. Strip metadata before sharing photos of your home, child, or other private locations.", "id": "fc13"}, {"front": "Compression as a Tradeoff", "back": "Lossless guarantees exact reconstruction at modest compression ratios; lossy achieves much higher ratios by discarding perceptually unnecessary information. The right choice depends on the application: medical images and archival masters require lossless; streaming photos and music tolerate lossy. Metadata travels alongside files for discovery and authentication, but carries privacy risks when files are shared publicly.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
