<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 8, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Crowdsourcing", "back": "The practice of obtaining information, work, or resources from a large, distributed group of contributors (often via an online platform) rather than from a small dedicated team. Crowdsourcing leverages the aggregate effort of many individuals to accomplish tasks that would be impractical for any single organization. Coordination infrastructure manages task assignment, contribution quality, and result aggregation.", "id": "fc01"}, {"front": "Two Required Properties", "back": "Crowdsourcing works only when the problem has (1) decomposability — it can be divided into independent sub-tasks that contributors can work on without tight coordination during execution; and (2) aggregation — sub-task results can be combined into a complete solution. Wikipedia decomposes by article, OpenStreetMap by map feature, Galaxy Zoo by image, Folding@home by simulation work unit.", "id": "fc02"}, {"front": "Three Infrastructure Problems", "back": "Effective crowdsourcing requires solving three problems beyond the task itself: (1) task decomposition — sub-tasks the right size for one contributor session; (2) contribution validation — detecting and correcting errors; (3) coordination and consensus — resolving disagreements about correct output. Each platform solves these differently.", "id": "fc03"}, {"front": "Contribution Validation Mechanisms", "back": "Three common patterns: redundancy (assign the same task to multiple contributors and require agreement before accepting a result, as Galaxy Zoo does); expert review (route uncertain or disputed results to verified experts); reputation weighting (give more influence to contributors with a track record of accurate submissions). Wikipedia uses a layered combination of all three.", "id": "fc04"}, {"front": "Reputation System", "back": "A mechanism in a crowdsourcing or peer-to-peer platform that tracks a contributor's history of accurate, helpful, or reliable behavior and uses that track record to modulate the contributor's influence or access level. Reputation systems create incentives for quality contributions by making past behavior visible and consequential.", "id": "fc05"}, {"front": "Consensus Protocol", "back": "A procedure for resolving disagreement among multiple contributors about the correct output for a shared task. In crowdsourcing contexts, consensus protocols range from simple majority vote to multi-round deliberation with escalating expert review. The goal is to produce a single agreed-upon result from potentially conflicting inputs while filtering out low-quality or erroneous contributions.", "id": "fc06"}, {"front": "Wikipedia", "back": "Launched 2001; the largest crowdsourced knowledge project in history. The English-language edition holds over 6 million articles maintained by ~100,000 active monthly editors. Quality is maintained by community-policy enforcement (the Five Pillars including neutral point of view, verifiability, and no original research), automated vandalism-reverting bots, and a tiered reputation system in which experienced editors can protect high-traffic pages.", "id": "fc07"}, {"front": "OpenStreetMap (OSM)", "back": "Founded 2004; a community-built geographic database of road maps, building outlines, hiking trails, and points of interest worldwide. Contributors use GPS tracks, aerial imagery, and local knowledge. OSM is used as the underlying map layer by hundreds of commercial and humanitarian applications. Coordination uses a version-control system similar to git: every edit is recorded and reversible.", "id": "fc08"}, {"front": "Folding@home", "back": "A distributed computing platform for protein-folding simulations. The Folding@home client downloads a work unit (a portion of a simulation), runs it, and returns the result for central aggregation. At peak in 2020 the network reached ~1.5 exaflops, exceeding the combined performance of the world's top 500 supercomputers. Cryptographic hashing verifies that submitted work-unit results were computed honestly.", "id": "fc09"}, {"front": "Galaxy Zoo", "back": "Launched 2007 to classify ~930,000 Sloan Digital Sky Survey galaxy images by morphology (spiral vs elliptical, presence of bars or rings, rotation direction). Over 150,000 volunteers completed initial classification in under a year. Each galaxy was assigned to multiple independent classifiers; consensus was accepted when a threshold fraction agreed — a textbook example of redundancy as a validation mechanism.", "id": "fc10"}, {"front": "Peer Review", "back": "A process in which a contributor's work is evaluated by other contributors (peers) with comparable expertise before being accepted into the shared corpus. In crowdsourcing contexts, peer review may be informal (any editor can revert a Wikipedia entry) or formal (Galaxy Zoo's multi-classifier agreement). Peer review is the primary mechanism by which crowdsourced knowledge projects maintain quality without centralized editorial control.", "id": "fc11"}, {"front": "Free-Rider Problem", "back": "A platform challenge in which contributors may use the resource without contributing back. Crowdsourcing platforms address it through social norms, reputation effects, or motivational design. Once the platform exists and the community is established, the marginal cost of additional contributions is low — but only if enough contributors actually contribute.", "id": "fc12"}, {"front": "Economic Effect of Crowdsourcing", "back": "Volunteer labor coordinated by a platform that bears the infrastructure cost can produce a public good. Wikipedia displaced the commercial encyclopedia market — the last print Encyclopaedia Britannica was published in 2012, less than a decade after Wikipedia reached critical mass. OpenStreetMap reduced geographic-data costs for applications that could not afford commercial licenses. Folding@home advanced protein-structure science at far lower cost per simulation hour than research grants alone could fund.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
