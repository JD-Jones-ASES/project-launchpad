<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 10, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Multi-Select Multiple Choice", "back": "A question type on the AP CSP exam in which a student must select EXACTLY TWO correct answers from four options. Eight such questions appear in Section I. There is no partial credit; selecting one correct and one incorrect answer scores 0 points. The correct answers are never \"all of the above\" or \"none of the above.\"", "id": "fc01"}, {"front": "Why Multi-Select Is Hard", "back": "Two sources of difficulty: (1) the stem is often a synthesis question drawing on multiple Big Ideas simultaneously; (2) the four answer choices are designed so that at least two are plausible — each is engineered to attract students with only partial understanding.", "id": "fc02"}, {"front": "Distractor Pattern: Plausible-but-Irrelevant", "back": "The statement sounds true and may even be true in general, but does not directly address what the question asks. Most dangerous when the question is narrowly scoped (\"specific algorithm\") but the distractor makes a general claim. Example: question about binary search; distractor says \"Searching algorithms are widely used in databases.\" True in general, says nothing specific.", "id": "fc03"}, {"front": "Distractor Pattern: Over-Broad", "back": "The statement is true in general but false in the specific scenario described. Often uses universal quantifiers: \"always,\" \"never,\" \"all,\" \"every.\" Example: question about a function returning the index of a target in an UNSORTED list; distractor says \"The algorithm always finds the target in O(log n) time.\" Binary search is O(log n), but linear search (required for unsorted) is O(n).", "id": "fc04"}, {"front": "Distractor Pattern: Over-Narrow", "back": "The statement is true for one specific case (e.g., one specific input value) but the question asks about general behavior. Traps students who test only one example and conclude the statement is correct. Example: function behavior for ALL integer inputs; distractor says \"The function returns a positive value\" — true for some positive inputs, false for negatives or zero.", "id": "fc05"}, {"front": "Distractor Pattern: Trick-Vocabulary", "back": "The statement uses correct technical terms in a sentence that is actually false. Most dangerous because it requires precise knowledge of what each term means. Example: \"Symmetric encryption uses two different keys for encryption and decryption.\" The word \"symmetric\" is correct AP vocabulary, but symmetric encryption uses the SAME key. Asymmetric uses two different keys.", "id": "fc06"}, {"front": "Read-All-Four-First Strategy", "back": "The single most effective multi-select technique. Read all four answer choices before evaluating any of them. Pass 1: categorize, do not decide. Pass 2: identify each option's distractor pattern (or recognize it as a candidate for correct). Pass 3: select the two that directly answer the question.", "id": "fc07"}, {"front": "Five-Step Multi-Select Process", "back": "(1) Read the question stem completely; note the scope. (2) Read all four choices without evaluating. (3) Identify each option's distractor pattern; an unassignable option is a correct candidate. (4) Select the two options that directly answer the question. (5) Time discipline — if you cannot identify both within 90 seconds, mark and move on.", "id": "fc08"}, {"front": "Multi-Select Time Cap", "back": "If you cannot identify both correct answers within 90 seconds, mark the question and move on. Do NOT let one multi-select consume four minutes while three other questions go unanswered. Return at the end of the section if time permits.", "id": "fc09"}, {"front": "What the Two Correct Answers Look Like", "back": "AP multi-select correct answers usually address the same topic from TWO DIFFERENT angles: one about mechanism, one about impact; OR one about a benefit, one about a limitation. They almost never repeat the same point. After identifying one correct answer, ask: \"What would the second one — addressing the topic from a different angle — look like?\"", "id": "fc10"}, {"front": "Contradicting Candidate Answers", "back": "If your two candidate answers seem to contradict each other, one of them is likely an over-broad or trick-vocabulary distractor. AP multi-select correct answers do not contradict — they complement. Re-evaluate using the four-pattern check.", "id": "fc11"}, {"front": "Multi-Select Synthesis Pairings", "back": "Common pairings: BI 3 + BI 2 (algorithm correctness + abstraction); BI 4 + BI 5 (network/security + societal impact); BI 1 + BI 3 (Create-PT purpose + algorithmic property). When a multi-select stem doesn't fit one Big Idea cleanly, ask: which TWO Big Ideas does this question require? Each correct answer comes from one of those two; distractors come from a third Big Idea.", "id": "fc12"}, {"front": "Universal Quantifier Red Flags", "back": "Words like \"always,\" \"never,\" \"all,\" \"every,\" \"none\" are common in over-broad distractors. They are not automatic disqualifiers — sometimes universal claims are correct (e.g., \"all valid Python identifiers must start with a letter or underscore\"). But on multi-select, universal quantifiers warrant a second look against the specific scenario described.", "id": "fc13"}, {"front": "Multi-Select Score Calculus", "back": "Eight multi-select questions × 1 point each = 8 possible points. Random guessing among 6 possible 2-of-4 combinations gives 1/6 expected hit rate ≈ 1.3 points. A student who applies the four-pattern strategy reliably gets 5–7 of the 8 — a 4-point swing. Multi-select rewards practice more than any other Section I question type.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
