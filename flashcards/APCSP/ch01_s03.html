<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "ASCII", "back": "American Standard Code for Information Interchange (1963). A 7-bit encoding assigning a unique integer 0-127 to each of 128 characters. Covers 95 printable English characters plus 33 non-printing control characters (tab, newline, carriage return). ASCII is single-byte-aligned: stored in 8 bits with the high bit set to 0, and is the foundation of all modern character encodings.", "id": "fc01"}, {"front": "ASCII Code Landmarks", "back": "Memorize these anchors. 'A' = 65 (0x41); 'a' = 97 (0x61); '0' = 48 (0x30); ' ' (space) = 32. The difference 'a' - 'A' is exactly 32 = 2^5, so toggling bit 5 flips a letter's case. The digit characters '0'-'9' occupy codes 48-57 — useful for `int(c) - ord('0')` to convert digit characters to integers.", "id": "fc02"}, {"front": "Python: ord() and chr()", "back": "ord(c) takes a single character and returns its integer code point (works for ASCII and Unicode). chr(n) takes a code point integer and returns the character. Examples: ord('A') = 65, chr(65) = 'A', ord('é') = 233. Useful for case conversion (chr(ord('b') - 32) = 'B') and character iteration.", "id": "fc03"}, {"front": "Unicode", "back": "A universal character encoding standard that assigns a unique code point (written U+XXXX in hexadecimal) to every character in every writing system - over 149,000 characters across 161 scripts as of Unicode 15.1. Unlike ASCII, which only covers English, Unicode includes Chinese, Arabic, Hindi, emoji, mathematical symbols, and historical scripts.", "id": "fc04"}, {"front": "Unicode Code Point", "back": "A non-negative integer (typically 0 to 0x10FFFF, ~1.1 million possible values) identifying a single character in Unicode. Written U+XXXX, with the X's being hex digits. Examples: U+0041 = 'A', U+00E9 = 'é', U+1F600 = grinning face emoji. Code points are abstract identifiers; UTF-8 or UTF-16 encodes them into bytes.", "id": "fc05"}, {"front": "UTF-8", "back": "A variable-length encoding of Unicode that uses 1-4 bytes per code point. Code points 0-127 (the ASCII range) are encoded as a single byte identical to the original ASCII byte - so any ASCII document is also valid UTF-8 (backward compatibility). Higher code points use 2, 3, or 4 bytes. UTF-8 is space-efficient for English and is the dominant encoding on the web.", "id": "fc06"}, {"front": "Code Points vs. Bytes", "back": "In Python 3, len(s) on a string counts code points (characters), while len(s.encode('utf-8')) counts bytes. For ASCII text these are equal. For text with non-ASCII characters they differ: 'café' has 4 code points but 5 UTF-8 bytes (the é takes 2 bytes). This distinction matters for file sizes, network packets, and database storage.", "id": "fc07"}, {"front": "Mojibake", "back": "Garbled text that appears when a file encoded in one character standard (e.g., UTF-8) is decoded using another (e.g., Latin-1 or Windows-1252). The bytes are interpreted as different characters than the writer intended. Example: 'café' encoded as UTF-8 then read as Latin-1 displays as 'café'. Cured by knowing and respecting the source encoding.", "id": "fc08"}, {"front": "Pixel", "back": "Picture element - the smallest addressable unit of a digital image or display. Each pixel stores one color value. A 1920 x 1080 (Full HD) display contains 1920 * 1080 = 2,073,600 pixels. Display sharpness is measured in pixels per inch (PPI); denser screens render text and images more crisply at the same physical size.", "id": "fc09"}, {"front": "RGB Color Model", "back": "An additive color model in which any displayable color is specified as a triple of intensity values for the three primary light colors: red, green, and blue. In standard 24-bit color, each channel uses 8 bits (0-255 decimal, 00-FF hex), yielding 256^3 = 16,777,216 total colors. Written in hex as #RRGGBB (e.g., #FF0000 = pure red).", "id": "fc10"}, {"front": "Additive vs. Subtractive Color", "back": "Additive (RGB): primary lights mixed at full intensity produce white; all zero produces black. Used for emissive displays (monitors, phones, TVs). Subtractive (CMYK): primary pigments mixed produce dark brown/black; absence produces white. Used for print (paint, ink). The two models are opposites because one adds emitted light while the other subtracts reflected wavelengths.", "id": "fc11"}, {"front": "24-Bit Color Calculation", "back": "An RGB pixel stores 24 bits (8 each for R, G, B), so 16,777,216 distinct colors. A 1920 x 1080 image at 24 bpp = 1920 * 1080 * 24 bits = ~50 Mb ~= 6 MB raw. A 24-megapixel photo: 24,000,000 * 24 = 576 Mb ~= 72 MB raw. Lossy JPEG compression typically reduces this to 5-12 MB.", "id": "fc12"}, {"front": "Encoding as Agreed-Upon Standards", "back": "ASCII, Unicode/UTF-8, and RGB are not natural facts about the world - they are agreed-upon mappings between abstract concepts (characters, colors) and bit patterns. Software interoperability depends on all parties using the same standard. The history of computing is partly a history of establishing these agreements. Mojibake is the chaos that results when systems disagree.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
