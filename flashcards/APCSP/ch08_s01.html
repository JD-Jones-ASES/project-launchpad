<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Dual-Use Computing Innovation", "back": "A computing innovation whose underlying mechanism can support both beneficial and harmful applications. The same technical capability — encryption, network broadcasting, autonomous control, image recognition — can be directed toward different ends depending on who deploys it and for what purpose. Identifying dual-use potential is a first step in technology-impact analysis.", "id": "fc01"}, {"front": "Intended Effect", "back": "An outcome of a computing innovation that its designers explicitly planned for or foresaw at deployment. Intended effects appear in design documentation, marketing materials, and stated requirements. Example: turn-by-turn directions are an intended effect of a GPS navigation app.", "id": "fc02"}, {"front": "Unintended Effect", "back": "An outcome that designers did not foresee at deployment, emerging from interactions between the technology and its actual use context. Example: a navigation app that accumulates a movement record later used to infer home addresses produces an unintended consequence — the mechanism (continuous location sampling) is the same as for routing.", "id": "fc03"}, {"front": "Moore's Law (current form)", "back": "The empirical observation, formulated by Gordon Moore in 1965 and revised in 1975, that the number of transistors on a commercially produced integrated circuit doubles approximately every two years. Moore's Law is not a physical law but an observed industry trend. The 1975 two-year form is what the AP exam tests.", "id": "fc04"}, {"front": "Moore's 1965 vs 1975 Versions", "back": "The original 1965 paper said transistor count would double every year. In 1975 Moore revised this to every two years after observing how the industry's pace had evolved. The widely-cited \"18 months\" figure is a separate observation by David House about chip performance (transistor count combined with clock speed), not the transistor-count law.", "id": "fc05"}, {"front": "Cost-per-Compute Consequence", "back": "The compounding effect of doubling every two years is dramatic over decades. The Cray-1 (1976) cost $8M for ~160 megaflops; a 2020s smartphone delivers tens of billions of FLOPS for a few dollars of material — a five to six order-of-magnitude gap. This drove cost reductions in genome sequencing (from $100M per genome in 2001 to under $1,000 by 2014), real-time image processing on phone cameras, and many other compute-bound applications.", "id": "fc06"}, {"front": "Quantum Tunneling (slowdown driver)", "back": "When transistor gate insulators become only a few atoms thick, electrons can cross them without classical-barrier permission. This leakage current wastes power and introduces logic errors, setting a physical limit on how thin gates can be made. By the early 2020s leading-edge gates reached 5-7 nm; a silicon atom is ~0.22 nm wide, so a 5 nm gate spans roughly 20 atoms.", "id": "fc07"}, {"front": "Thermal Density (slowdown driver)", "back": "Packing more transistors into the same die area increases power dissipation per unit area. Heat removal from a dense chip is the dominant engineering constraint in modern server processors and becomes harder as transistor density rises beyond a certain threshold, limiting how aggressively shrinkage alone can be pushed.", "id": "fc08"}, {"front": "Lithography Economics (slowdown driver)", "back": "Each new process node requires new fabrication equipment. EUV (extreme ultraviolet) lithography machines cost over $100 million per unit, and a leading-edge fab now exceeds $10 billion to build. At some point the commercial value of achieving the next transistor doubling does not offset the capital cost of producing it.", "id": "fc09"}, {"front": "Industry Response to Slowdown", "back": "As pure transistor shrinkage slowed, the industry shifted to architectural innovations: multi-core processors do work in parallel rather than serially; chiplet packaging combines specialized silicon dies in one package; domain-specific accelerators (GPUs, ML inference chips) achieve higher efficiency on narrow workloads than general-purpose cores. These continue to improve real compute-per-dollar through different mechanisms than classical Moore's Law.", "id": "fc10"}, {"front": "Spreadsheet Case (intended/unintended effects)", "back": "VisiCalc (1979) was designed to speed financial modeling — an intended beneficial effect. An unintended beneficial effect was democratizing financial analysis for small businesses. An unintended harmful effect was widespread shared spreadsheets prone to formula errors that propagate invisibly through supply-chain calculations, a class of error common today.", "id": "fc11"}, {"front": "GPS as Dual-Use", "back": "Smartphone GPS routes a navigation app around traffic; the same mechanism — continuous location sampling, timestamped and transmitted to a server — allows an app with background permission to build a precise daily movement record. The mechanism is identical; the difference lies in what is done with the data.", "id": "fc12"}, {"front": "Smartphone as Platform Shift", "back": "The smartphone integrates a cellular radio, capacitive multi-touch display, GPS receiver, accelerometer/gyroscope, cameras, and a general-purpose application processor. Adoption was rapid: ~1 billion devices by 2014, over 5 billion by the early 2020s — the largest deployment of a general-purpose computer in history. It displaced PCs as the primary computing device for many users and created mobile-first software design.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
