<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Trace Table", "back": "A structured worksheet with one row per loop iteration and one column per variable in scope. Trace tables transform the mental work of tracking variable state into a written record that can be checked and corrected. For nested loops, include one column for each loop variable and one column for each output or accumulator. Always label the columns before writing a single value.", "id": "fc01"}, {"front": "Three Rules of Systematic Tracing", "back": "(1) Write it down — never trace a loop of more than two iterations in your head. (2) One row per iteration — draw the trace table before you look at the answer choices. (3) Inner before outer — when nesting is involved, exhaust the inner loop's counter completely before incrementing the outer counter.", "id": "fc02"}, {"front": "Triple-Nested Loop Iteration Count", "back": "When three loops are nested with iteration counts m (outer), n (middle), p (inner), the innermost body executes m × n × p times. The inner loop runs to completion for every iteration of the middle, and the middle runs to completion for every iteration of the outer. Each level multiplies, never adds.", "id": "fc03"}, {"front": "Inner-Before-Outer Discipline", "back": "In a nested loop, the inner loop runs to completion for every single iteration of the outer loop. Always exhaust the inner counter (i.e., let it reach its terminal value) before allowing the outer counter to increment. Jumping the outer counter prematurely is the #1 source of nested-loop tracing errors on the AP exam.", "id": "fc04"}, {"front": "Short-Circuit Evaluation", "back": "In a compound Boolean expression joined by AND, if the first sub-expression is false, the entire expression is false and the remaining sub-expressions need not be evaluated. With OR, if the first sub-expression is true, the entire expression is true. On the AP exam, short-circuit behavior is not explicitly tested, but recognizing it lets you trace Boolean chains more quickly.", "id": "fc05"}, {"front": "Multi-Condition Boolean Network Strategy", "back": "For Boolean expressions with five or more inputs, evaluate each sub-expression separately before combining. Never try to evaluate a complex AND/OR/NOT chain in a single pass. Lay out the truth value of each parenthesized sub-expression in a column, then combine using the explicit operator hierarchy.", "id": "fc06"}, {"front": "NOT Operator Precedence", "back": "NOT applies to its immediate operand only — it does NOT negate an entire AND or OR chain. NOT(false) = true; NOT(true) = false. In ((a > b) OR (NOT (c < d))), NOT applies only to (c < d), not to the whole OR. Always check what is inside the parentheses immediately following NOT.", "id": "fc07"}, {"front": "Robot Grid Strategy", "back": "For each iteration, ask three questions: (1) What direction is the robot currently facing? (2) Is CAN_MOVE(forward) true at this cell? (3) Which branch of the IF/ELSE executes? Sketch the grid, mark the robot's position after each iteration, and update the facing direction. Tracking state on paper is faster than holding it mentally.", "id": "fc08"}, {"front": "MOVE_FORWARD vs. ROTATE", "back": "MOVE_FORWARD() advances the robot one cell in the current facing direction. ROTATE_LEFT() and ROTATE_RIGHT() change the facing direction (90 degrees) without moving. Reading the facing direction at every iteration is the most common source of slips — a robot facing East after a ROTATE_RIGHT moves rightward on the next MOVE_FORWARD, not upward.", "id": "fc09"}, {"front": "CAN_MOVE Function", "back": "CAN_MOVE(forward) returns true if the cell directly in front of the robot (in its current facing direction) is empty and on the grid; returns false if it is off the grid or contains an obstacle. The function does NOT move the robot — it only tests. The IF/ELSE following it determines whether MOVE_FORWARD or ROTATE+MOVE executes.", "id": "fc10"}, {"front": "Three Bug Classes", "back": "Syntax error — code fails to parse (wrong keyword, missing parenthesis). Easiest to spot. Runtime error — code parses but crashes during execution (out-of-bounds index, division by zero, infinite loop). Logic error — code runs without crashing but produces the wrong output (off-by-one, wrong condition direction). Always check in this order on the exam: syntax first, runtime second, logic last.", "id": "fc11"}, {"front": "Common Logic Errors in Loops", "back": "Off-by-one in the loop bound (e.g., low <- mid instead of low <- mid + 1 in binary search), inverted condition direction (>= where > is correct), assignment vs. equality mix (= used as comparison or as assignment), and unchanged loop variable causing infinite loop. Each requires a trace to expose.", "id": "fc12"}, {"front": "When Tracing in Your Head Fails", "back": "Mental tracing of more than two iterations consistently produces errors because the variable state is not durable in working memory. Symptoms: forgetting which value the inner counter is on, applying the wrong increment, mis-counting iterations of the outer loop. Solution: write it down. The 30 seconds spent on a trace table saves the question.", "id": "fc13"}, {"front": "Trace Table Column Layout", "back": "For a nested loop, include one column per loop counter (a, b, c for triple-nested), one column per accumulator (sum, count, etc.), and one column for output. Add a row per innermost iteration. Mark loop boundaries with horizontal lines so you can see where each outer-loop iteration begins.", "id": "fc14"}, {"front": "Output Order in Nested Loops", "back": "The order in which DISPLAY values appear matches the inner-before-outer execution order. For three nested loops with counters a, b, c each ranging 1..2, the displayed values are abc = 111, 112, 121, 122, 211, 212, 221, 222 — the rightmost (innermost) digit cycles fastest, the leftmost (outermost) cycles slowest.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
