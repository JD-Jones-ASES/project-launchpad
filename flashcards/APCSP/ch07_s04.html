<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Scalability", "back": "The property of a system that lets it handle increasing amounts of work by adding resources, without requiring fundamental changes to its design. The Internet is highly scalable because new users, devices, or networks need only implement the existing protocols (IP, TCP, etc.) — there is no central authority to ask, no global registry update, no architectural change needed in existing hardware.", "id": "fc01"}, {"front": "Redundancy", "back": "The inclusion of extra components or paths in a system so that if one fails, another can immediately take over. In the Internet, redundancy means multiple physical paths between any two important endpoints. A message can reach its destination via path A, B, C, or D; if A fails, traffic shifts to surviving paths.", "id": "fc02"}, {"front": "Fault Tolerance", "back": "The ability of a system to continue operating correctly even when some components fail. A fault-tolerant system does not just survive failures — it continues providing its intended service during them. The Internet achieves fault tolerance through redundancy (multiple paths) and dynamic routing (protocols that automatically reroute around failures).", "id": "fc03"}, {"front": "Reliability vs. Fault Tolerance", "back": "A reliable system rarely fails. A fault-tolerant system continues to function even when it does fail. ARPANET's designers aimed for fault tolerance specifically because they could not guarantee reliability of physical infrastructure in a hostile military environment. These properties are complementary, not interchangeable.", "id": "fc04"}, {"front": "Failure Detection and Graceful Degradation", "back": "Two properties a fault-tolerant system must satisfy. (1) Failure detection: the system must recognize when a component has failed (routers detect failed links via routing-protocol heartbeats). (2) Graceful degradation: the system continues providing service at reduced capacity rather than simply stopping (a network with ten paths can still route if seven fail).", "id": "fc05"}, {"front": "Distributed Topology", "back": "A network architecture in which many nodes each have multiple connections to neighbors. Destroying any subset of nodes leaves remaining nodes interconnected through alternative paths. ARPANET adopted this design from Paul Baran's 1964 RAND analysis, which showed it could survive substantial losses — exactly the military-survivability requirement at the time.", "id": "fc06"}, {"front": "Centralized vs. Distributed Architecture", "back": "Paul Baran's 1964 RAND report compared two architectures. Centralized: all traffic routes through a single hub — extremely vulnerable, since destroying the hub destroys the network. Distributed: many nodes with multiple connections — survives loss of a substantial fraction of nodes. ARPANET implemented the distributed design; every Internet architecture since has inherited it.", "id": "fc07"}, {"front": "Submarine Cable Redundancy", "back": "Critical ocean routes (North Atlantic, Trans-Pacific) are served by multiple independent submarine cables. When a cable is cut by a ship's anchor — which happens several times a year — traffic reroutes through other cables within seconds, often imperceptibly to users. The 2008 Mediterranean cuts illustrated both the rerouting and its capacity limits.", "id": "fc08"}, {"front": "Internet Exchange Points (IXPs)", "back": "Physical facilities where many ISPs connect directly to exchange traffic. A major IXP such as DE-CIX in Frankfurt handles over 10 Tbps. IXPs provide redundant connectivity for the networks that peer there, since each peer can reach many destinations through the same physical site without needing to traverse a long-distance backbone.", "id": "fc09"}, {"front": "BGP Peering and Multi-Homing", "back": "Border Gateway Protocol (BGP) lets an autonomous system have multiple upstream ISPs and automatically shift traffic to surviving peers if one fails. This is called multi-homing. It is a primary form of redundancy at the inter-ISP level. BGP's continuous update cycle is what propagates topology changes globally within seconds.", "id": "fc10"}, {"front": "End-to-End Principle", "back": "An architectural guideline stating that application-specific functions should live at the communicating endpoints (clients and servers) rather than in the network's interior (routers and links). Smarts at the edges, dumb pipes in the middle. This keeps the network simple, general-purpose, and scalable; new applications can be built without modifying the network core.", "id": "fc11"}, {"front": "Consequences of the End-to-End Principle", "back": "(1) Innovation at the edges: anyone can invent a new application protocol (Zoom, BitTorrent, Spotify) without permission from network operators. (2) Simplicity in the core: routers implement only packet forwarding; reliability, ordering, encryption, application semantics are at the endpoints. (3) Generality: the same network that carried email in 1973 carries video streaming in 2023 without core modification.", "id": "fc12"}, {"front": "Graceful Degradation in Practice", "back": "In every large-scale Internet incident, the outcome is degraded performance rather than complete failure. Users in affected regions experience slower speeds, higher latency, or intermittent connectivity — but the network does not go dark. This proportional, partial reduction in capacity is the hallmark of a well-designed fault-tolerant system: no single point of failure.", "id": "fc13"}, {"front": "Infrastructure vs. Logical Fault Tolerance", "back": "BGP fat-finger incidents (China Telecom 2010, Pittsburgh ISP 2019) illustrate that fault tolerance operates well at the infrastructure level — a cut cable can be rerouted — but less perfectly at the logical level. A misconfigured routing protocol can redirect traffic globally within minutes before being detected and corrected by the same BGP propagation that caused it.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
