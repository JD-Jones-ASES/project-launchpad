<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 9, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Four Written Response Categories", "back": "(1) Program Design, Function, and Purpose; (2) Algorithm Development; (3) Errors and Testing; (4) Data and Procedural Abstraction. Each is scored independently — a weak response in one category does not affect scoring in another. All four must be addressed; skipping any one forfeits its sub-item points.", "id": "fc01"}, {"front": "Category 1 — Purpose, Inputs, Outputs", "back": "Asks students to describe the overall purpose of the program (audience + problem + benefit) and identify the program's input and output. Three sub-items, 1 point each. The purpose sub-item is the one Section 9.1 trains; inputs and outputs are typically the function description.", "id": "fc02"}, {"front": "Category 2 — Algorithm Development", "back": "Asks students to describe how the student-developed procedure uses sequencing, selection, and iteration to achieve its purpose, and to describe what would occur if the procedure were called with a different argument value. Four sub-items, 1 point each. Use precise vocabulary; cite line numbers from the PPR.", "id": "fc03"}, {"front": "Category 3 — Errors and Testing", "back": "Asks students to identify a non-trivial logic or runtime error encountered during development, explain its root cause, and describe steps taken to find and correct it. Two sub-items, 1 point each. Trivial fixes (single-keystroke syntax errors) earn zero — the rubric expects evidence of real debugging.", "id": "fc04"}, {"front": "Category 4 — Data and Procedural Abstraction", "back": "Asks students to explain how the list manages complexity (the scale problem it solves) and how the student-developed procedure achieves procedural abstraction (same code, different arguments, different results). Multiple sub-items: data abstraction (1) and procedural abstraction (2-3). Specificity of scale and reusability claims is what earns points.", "id": "fc05"}, {"front": "Three Traits of High-Scoring Responses", "back": "(1) Cite the PPR by screenshot number and line range — converts vague claims into falsifiable evidence. (2) Use precise algorithmic vocabulary — \"sequencing,\" \"selection,\" \"iteration\" — rather than synonyms. (3) Distinguish purpose from function in every category where the distinction is relevant.", "id": "fc06"}, {"front": "Category 1 Zero-Point Pattern", "back": "\"My program tracks study sessions. It takes subject and minutes as input and prints a number as output.\" Function description, no audience, no problem, no benefit. Purpose sub-item: 0. Section 9.5 walks through this exact response as the textbook 0-point example.", "id": "fc07"}, {"front": "Category 1 Full-Credit Template", "back": "\"My program helps [specific audience] who [concrete problem] by [accepting/processing inputs]. Inputs: [name them precisely]. Output: [name it precisely].\" Names audience and benefit; explicitly identifies inputs and outputs. Earns 3/3 on the purpose-input-output sub-items.", "id": "fc08"}, {"front": "Category 2 Full-Credit Template", "back": "\"compute_streak(records, target_subject) at lines N1-N2 of my PPR uses sequencing through four phases [name them], selection at line N3 (if subject == target_subject and minutes >= 30), iteration at lines N4 (for record in records) and N5 (for i in range...). Calling with 'spanish' instead of 'math' changes the selection filter and yields a different streak count.\"", "id": "fc09"}, {"front": "Category 3 Trivial-Error Trap", "back": "\"I got a syntax error because I forgot a colon. I added the colon and it worked.\" Earns 0 because a single-keystroke fix shows no investigation. The rubric wants a non-trivial bug whose root cause was non-obvious — typically a logic error or a runtime error appearing under specific conditions.", "id": "fc10"}, {"front": "Category 3 Full-Credit Template", "back": "\"During development, [specific bug behavior]. The error was in [specific code construct]. I had written X instead of Y. The cause was [language/logic detail]. I found the bug by [debugging technique], observing [concrete observation]. I fixed it by [specific change], then verified with [test case].\"", "id": "fc11"}, {"front": "Category 4 Data Abstraction Specificity", "back": "Vague: \"My list manages complexity.\" Earns 0. Specific: \"Without this list, I would need a separate variable for every session — if the student logs 100 sessions, that would require 100 variables. The list allows the program to store an arbitrary number of sessions under one name.\" Earns 1 because the scale problem is concrete.", "id": "fc12"}, {"front": "Category 4 Procedural Abstraction Specificity", "back": "Vague: \"My procedure abstracts well.\" Earns 0. Specific: \"compute_streak achieves procedural abstraction because the same code computes the streak for any subject — the caller passes target_subject, and the procedure body uses it to filter without the caller knowing the implementation. Demoed with 'math' and 'spanish.'\" Earns 1 (or more, depending on parameter explanation).", "id": "fc13"}, {"front": "Cohesion Across Categories", "back": "The four categories should reference the same audience, the same data structures, the same procedure. Purpose (Cat 1) describes who; algorithm (Cat 2) explains how the procedure serves them; testing (Cat 3) describes how a real bug was found in that algorithm; abstraction (Cat 4) explains why the list and procedure are well-designed for the audience and algorithm. Cohesion is a hallmark of high-scoring submissions.", "id": "fc14"}, {"front": "Best Preparation Strategy", "back": "Draft responses to all four categories before the submission deadline. Read them aloud while looking at the PPR. If you cannot find the line numbers you cite, or if your response refers to a variable not in the PPR, that is a fixable gap. Section 9.5 names this as the single most effective preparation activity.", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
