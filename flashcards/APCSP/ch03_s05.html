<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 3, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Nested Conditional", "back": "An if statement placed inside the body (true or false branch) of another if statement. The inner condition is evaluated only when the outer condition reaches its branch. Nesting forms multi-level decision trees: outer condition is the root, inner conditions are child nodes, and print/assign statements are leaves.", "id": "fc01"}, {"front": "Decision Tree", "back": "A branching diagram representing a multi-level decision process. Each node is a condition (Boolean expression); each edge is the True or False branch; each leaf is a terminal action. Nested conditionals in code implement decision trees. The same structure underlies machine-learning classifiers.", "id": "fc02"}, {"front": "Pyramid of Doom", "back": "An anti-pattern where deeply nested conditionals march progressively rightward, forming an arrowhead-shaped indentation. Technically correct but cognitively expensive: reviewers must track which else pairs with which if. Refactoring with compound Booleans or early returns flattens the pyramid.", "id": "fc03"}, {"front": "Compound Boolean Refactor", "back": "Replace nested ifs that all check 'are these conditions simultaneously true?' with a single if and a compound expression using and/or/not. Example: nested `if a: if b: ...` becomes `if a and b: ...`. Pros: single-level indentation, named Boolean (e.g. `can_post`), clear happy path. Cons: error messages separated from their conditions.", "id": "fc04"}, {"front": "Early Return Pattern", "back": "In a function, check edge cases at the top and return immediately when detected. The main logic afterwards runs without nesting. Example: `if price < 0: return 0` and `if age < 0: return price` at the top of a discount function eliminate the need to wrap the main logic in else branches.", "id": "fc05"}, {"front": "Guard Clause", "back": "A short conditional at the top of a function that handles invalid or trivial inputs and exits early. Synonym for early return. Examples: bounds checks, null/None checks, empty-list checks. The main logic runs assuming the guards have already filtered bad input.", "id": "fc06"}, {"front": "When to PREFER nesting", "back": "(1) When inner condition is meaningless or harmful if outer is False (guard pattern: divisor != 0 before dividing). (2) When each branch has substantially different complex logic (10+ lines per branch). (3) When the structure is naturally hierarchical (tiered business rules). Rule of thumb: prefer nesting when checking 'given this outer fact, what sub-decision now?'", "id": "fc07"}, {"front": "When to PREFER compound expressions", "back": "(1) When checking 'are all these conditions simultaneously true?' (2) When the happy path matters most. (3) When the conditions can be named meaningfully (`can_post`, `is_eligible`, `within_bounds`). Rule of thumb: prefer compound when checking 'are all these true at once?'", "id": "fc08"}, {"front": "Tracing Nested Conditionals (4-step method)", "back": "1) Evaluate the outermost condition first. 2) Enter the appropriate branch (if True, enter outer if; if False, check elif/else). 3) Repeat for inner conditions inside the chosen branch. 4) Record the output (statements in branches NOT entered never execute). Used to answer 'what does this code print when x = 4, y = -1?'", "id": "fc09"}, {"front": "Dangling Else (Python)", "back": "Ambiguity about which if a given else pairs with. Languages with braces have to specify rules; Python uses INDENTATION to unambiguously pair an else with the if at the same indentation level. Logic errors still arise if indentation is wrong, but the syntax-level pairing is always clear.", "id": "fc10"}, {"front": "Trace example: nested if", "back": "For `if x > 0: if y > 0: print('both positive') else: print('x pos, y non-pos') else: print('x non-pos')` with x = 4, y = -1: x > 0 True (enter outer if); y > 0 False (enter inner else); print 'x pos, y non-pos'. Outer else skipped because outer if was True.", "id": "fc11"}, {"front": "Indentation depth as a warning", "back": "2 levels of nesting is usually fine. 3+ levels is a warning sign that the code may need refactoring (compound expressions or early returns). Each level adds cognitive load: reviewers must track which else belongs to which if and which branches are reachable.", "id": "fc12"}, {"front": "Hierarchical decisions", "back": "Naturally hierarchical business rules (classify by customer type, then by quantity, then by season) match nested conditionals well. The hierarchy in the code mirrors the hierarchy in the requirement. Compound expressions can flatten this but lose the tiered structure.", "id": "fc13"}, {"front": "Outer condition as a guard", "back": "When the inner condition's evaluation would be unsafe (division by zero, attribute access on None, index out of range) without an outer check, nest deliberately. Short-circuit `and` could often replace this with a compound expression, but the nested form makes guard intent explicit to readers unfamiliar with short-circuiting.", "id": "fc14"}, {"front": "Tradeoff: error message locality", "back": "Nested style co-locates each branch's error message with its condition. Compound style centralizes the happy path and pushes error dispatching into a separate elif chain. Choose based on whether tracing a condition to its message is more important (nest) or whether reading the happy path matters most (compound).", "id": "fc15"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
