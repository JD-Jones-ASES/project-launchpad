<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 7, Section 6</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Symmetric Encryption", "back": "An encryption scheme in which the same key is used for both encryption and decryption. The sender encrypts plaintext with the key to produce ciphertext; the receiver decrypts with the same key. Symmetric encryption is fast (AES-256 runs at multi-Gbps speeds) but requires both parties to securely share the key in advance. Examples: AES, ChaCha20.", "id": "fc01"}, {"front": "Caesar Cipher", "back": "The simplest symmetric cipher. Each letter is shifted by a fixed number of positions in the alphabet, wrapping from Z back to A. Julius Caesar used a shift of 3. To encrypt, compute (letter_index + shift) mod 26; to decrypt, shift in the opposite direction. Completely insecure by modern standards (only 25 keys, trivial brute force) but illustrates the core idea of symmetric encryption.", "id": "fc02"}, {"front": "Asymmetric (Public-Key) Encryption", "back": "An encryption scheme using a mathematically related key pair: a public key (shared openly) and a private key (kept secret). Data encrypted with the public key can only be decrypted with the corresponding private key. Knowing the public key does not help an attacker compute the private key in any reasonable time. Examples: RSA, ECC.", "id": "fc03"}, {"front": "Symmetric vs. Asymmetric Trade-off", "back": "Symmetric is fast (multi-Gbps) but requires secure key distribution. Asymmetric solves the key distribution problem but is 100 to 1000 times slower than symmetric. HTTPS combines them: public-key cryptography exchanges a symmetric session key; the session key then handles the bulk encryption of traffic. Best of both worlds.", "id": "fc04"}, {"front": "Key Distribution Problem", "back": "The fundamental challenge of symmetric encryption: how do Alice and Bob agree on a shared key without Eve (the eavesdropper) learning it? If they exchange the key over the Internet, Eve intercepts it. If they meet in person, the Internet is pointless. Public-key cryptography and the Diffie-Hellman key exchange both solve this problem in different ways.", "id": "fc05"}, {"front": "Diffie-Hellman Key Exchange", "back": "An algorithm by which Alice and Bob jointly compute a shared secret over an insecure channel — even though Eve sees every message they send. Alice picks a private exponent a and sends g^a mod p; Bob picks b and sends g^b mod p; each computes g^(ab) mod p. Recovering a or b from the public values requires solving the discrete logarithm problem — computationally infeasible.", "id": "fc06"}, {"front": "One-Way Function", "back": "A mathematical function that is easy to compute in one direction but computationally infeasible to invert. Modular exponentiation is the canonical example: g^a mod p is cheap to compute, but recovering a from the result (the discrete logarithm) is hard for large primes. One-way functions are the foundation of public-key cryptography and Diffie-Hellman.", "id": "fc07"}, {"front": "Whitfield Diffie and Martin Hellman", "back": "Stanford researchers who in 1976 published 'New Directions in Cryptography,' introducing public-key cryptography and the Diffie-Hellman key exchange to the open academic world. They received the 2015 ACM Turing Award — computer science's highest honor — for work the committee called 'critical contributions to making digital security ubiquitous on the Internet.'", "id": "fc08"}, {"front": "Common Threats", "back": "Malware: malicious software (viruses, worms, ransomware, spyware) installed without user consent. Phishing: fraudulent communications impersonating trusted entities to capture credentials. Man-in-the-Middle (MitM): intercepting traffic between two parties. Denial of Service (DoS/DDoS): flooding a server to prevent legitimate access. SQL Injection: injecting malicious queries into web form inputs.", "id": "fc09"}, {"front": "Common Defenses", "back": "HTTPS / TLS: authenticates servers and encrypts web traffic. Multi-Factor Authentication (MFA): requires two or more independent factors (something you know, something you have, something you are). Secure password practices: unique random passwords managed by a password manager. Software updates: most real-world attacks exploit known unpatched vulnerabilities.", "id": "fc10"}, {"front": "HTTPS / TLS", "back": "HTTPS is HTTP carried over TLS (Transport Layer Security). TLS does two jobs: authenticate the server identity using a certificate signed by a trusted authority, and encrypt the channel using a symmetric session key established via key exchange. Together they prevent MitM attacks. The padlock and 'https://' in your browser indicate the channel is encrypted and the server's identity verified.", "id": "fc11"}, {"front": "Multi-Factor Authentication (MFA)", "back": "Requiring two or more independent authentication factors. Three categories: something you know (password), something you have (phone, hardware token), something you are (fingerprint, face). Even if an attacker steals one factor (like a password), MFA prevents login without the others. Strong, low-cost defense against credential theft.", "id": "fc12"}, {"front": "NIST Cybersecurity Framework", "back": "A voluntary framework from the U.S. National Institute of Standards and Technology that organizes cybersecurity activity into five Core Functions: Identify, Protect, Detect, Respond, and Recover. The functions are performed concurrently and continuously, forming an operational culture rather than a serial checklist. The de facto standard for cybersecurity governance across industries.", "id": "fc13"}, {"front": "Defense in Depth", "back": "The principle that no single security measure is sufficient — real security requires multiple overlapping layers (encryption, MFA, updates, user awareness, network controls). If any one layer is breached, others continue to protect. Defense in depth is the closing key concept of the section because cybersecurity is a system property, not a single feature.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
