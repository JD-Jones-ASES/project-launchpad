<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Bit", "back": "The fundamental unit of digital information, representing a single binary choice: 0 or 1 (off or on). The word is a contraction of 'binary digit.' One bit distinguishes between two equally probable outcomes; n bits can encode 2^n distinct values, so the number of bits required grows logarithmically with the number of distinct values to be represented.", "id": "fc01"}, {"front": "Byte", "back": "Eight bits grouped together. A byte can encode 2^8 = 256 distinct values - enough for the 128-character ASCII set with room to spare. The byte became the standard grouping because early computers processed data in 8-bit chunks; today multiples of the byte (KB, MB, GB) form the universal vocabulary of storage capacity.", "id": "fc02"}, {"front": "Analog vs. Digital Signals", "back": "Analog signals (sound waves, light, voltage) vary continuously without discrete steps - the natural form of physical phenomena. Digital signals are discrete sequences of bits sampled from a continuous source. Bridging the two requires sampling and quantization, the engineering core of analog-to-digital conversion (ADC).", "id": "fc03"}, {"front": "Sampling Rate", "back": "The number of measurements taken per second when converting an analog signal to digital, measured in hertz (Hz) or kilohertz (kHz). Higher sampling rates capture more rapid signal variation. CD audio uses 44.1 kHz; videos may use 48 kHz; phone audio uses 8 kHz. The rate must be at least 2f to faithfully reproduce frequencies up to f Hz (Nyquist-Shannon).", "id": "fc04"}, {"front": "Bit Depth", "back": "The number of bits used to represent each individual sample in a digitized signal. Greater bit depth allows more distinct amplitude levels and reduces quantization error - the rounding error from snapping each analog measurement to the nearest discrete level. CD audio uses 16-bit depth (2^16 = 65,536 levels per sample); digital images typically use 8 bits per color channel.", "id": "fc05"}, {"front": "Nyquist-Shannon Sampling Theorem", "back": "To faithfully reproduce a signal containing frequencies up to f Hz, the sampling rate must be at least 2f Hz. Human hearing extends to roughly 20 kHz, so audio is typically sampled at 40 kHz or higher; CD audio's 44.1 kHz comfortably exceeds the Nyquist minimum. Sampling below 2f produces aliasing - higher frequencies disguised as lower ones.", "id": "fc06"}, {"front": "Quantization Error", "back": "The rounding error introduced when each analog measurement is snapped to the nearest discrete amplitude level allowed by the bit depth. Greater bit depth = more allowed levels = smaller quantization error. With 16-bit depth (65,536 levels), the error is below human perception for music; with only 4 bits (16 levels), audio sounds gritty and degraded.", "id": "fc07"}, {"front": "Claude Shannon", "back": "American mathematician and engineer (1916-2001) whose 1948 paper 'A Mathematical Theory of Communication' is the founding document of information theory. Shannon proved that information content is the number of binary choices required to specify a message, established the bit as the natural unit of information, and showed that any data source has an irreducible minimum size called its entropy.", "id": "fc08"}, {"front": "Shannon Entropy", "back": "The average number of bits required to encode a message from a given source, capturing its inherent unpredictability. A fair coin flip has 1 bit of entropy per toss; a biased coin that lands heads 99% of the time has much less. Entropy is the lower bound for lossless compression: no losslessly compressed message can be smaller than its entropy.", "id": "fc09"}, {"front": "CD Audio Bandwidth Calculation", "back": "One second of stereo CD audio = 44,100 samples/sec x 16 bits/sample x 2 channels = 1,411,200 bits/sec, approximately 1.4 Mb/s. A 4-minute song therefore takes about 4 x 60 x 1.4 Mb = 336 Mb (~42 MB) before compression. MP3 and similar codecs compress this by a factor of 10 or more.", "id": "fc10"}, {"front": "Photo File Size Calculation", "back": "A 24-megapixel photo at 24 bits per pixel (8 each for R, G, B) = 24,000,000 x 24 = 576,000,000 bits, approximately 72 MB raw. JPEG compression reduces this to roughly 5-12 MB. The same calculation pattern (pixels x bits/pixel, then divide by 8 for bytes) applies to any uncompressed image.", "id": "fc11"}, {"front": "SI vs. Binary Prefixes", "back": "SI prefixes (kilo = 10^3, mega = 10^6, giga = 10^9) are decimal-based; binary-aligned prefixes (kibi = 2^10 = 1024, mebi = 2^20, gibi = 2^30) are powers of 2. A 1 KB SI = 1,000 bytes; 1 KiB = 1,024 bytes. Storage manufacturers typically use SI; operating systems often use binary, which is why a '1 TB' disk shows as 931 GiB.", "id": "fc12"}, {"front": "Bits as Universal Medium", "back": "All digital information - audio, images, text, video, programs - is ultimately stored and transmitted as sequences of bits. The conversion from continuous analog to discrete digital involves two engineering knobs: sampling rate (how often) and bit depth (how precisely). Higher values yield more faithful reproduction at the cost of larger files. Shannon's information theory makes the tradeoffs precise.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
