<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Digital Divide", "back": "The gap in broadband Internet access — measured in availability, speed, latency, and cost relative to income — between different geographic and demographic groups. The mechanisms driving the gap are technical and economic: deployment cost per connection varies with population density and terrain, while revenue per connection varies with income. Where deployment cost exceeds expected revenue, private investment does not occur without external incentives.", "id": "fc01"}, {"front": "Last-Mile Problem", "back": "The technical and economic challenge of connecting individual end-user premises to the nearest high-capacity network backbone. \"Last mile\" refers to the final segment — the cabling, wireless towers, or satellite dishes that link homes and businesses. Last-mile costs dominate total deployment costs in low-density areas because each connection spans a greater physical distance with fewer customers to share the expense.", "id": "fc02"}, {"front": "Backbone vs Last-Mile", "back": "Backbone infrastructure (fiber-optic trunk lines, regional exchange points) is expensive per kilometer but serves thousands of simultaneous connections, so it amortizes well in dense areas. Last-mile infrastructure is the per-premise connection from a neighborhood node to each home; it does not amortize as efficiently and is the dominant cost driver in rural deployments.", "id": "fc03"}, {"front": "Broadband (FCC definition)", "back": "An Internet connection that provides at least 25 Mbps download and 3 Mbps upload (FCC pre-2024). In 2024 the FCC raised the threshold to 100 Mbps download and 20 Mbps upload for fixed broadband. Connections below the threshold are classified as narrowband and are considered inadequate for HD video, video conferencing, or large file transfer.", "id": "fc04"}, {"front": "Four Connectivity Metrics", "back": "Broadband access quality is measured along four dimensions: (1) download speed in Mbps, (2) upload speed in Mbps, (3) latency in milliseconds (round-trip time), and (4) monthly cost as a percentage of median household income. The cost metric captures affordability separately from physical availability, since a connection can exist but be economically out of reach.", "id": "fc05"}, {"front": "Latency Thresholds", "back": "Low latency (under 20 ms) is required for real-time interactive applications: video calls, online gaming, remote machine control. Geostationary satellite latency is 600-700 ms due to the 35,786 km orbital altitude, acceptable for file downloads but problematic for real-time interaction. LEO satellite latency drops to 20-40 ms because satellites orbit at 550-1,200 km, much closer to Earth.", "id": "fc06"}, {"front": "Fiber Optic (FTTH)", "back": "Fiber to the Home delivers the highest bandwidth (symmetrical 1 Gbps or more is now common) and lowest latency (under 5 ms). Deployment requires physically digging and laying cable to every premise, making fiber most cost-effective in dense urban areas. Outside dense areas, the per-connection cost rises sharply.", "id": "fc07"}, {"front": "Cable (HFC) and DSL", "back": "Cable (Hybrid Fiber-Coaxial) uses fiber to neighborhood nodes and coaxial cable for the last mile; download speeds typically range 100 Mbps - 1 Gbps with lower upload (10-50 Mbps for DOCSIS 3.0). DSL (Digital Subscriber Line) uses existing telephone copper, making it geographically widespread but speed-limited; downstream speeds drop sharply with distance from the exchange.", "id": "fc08"}, {"front": "Fixed Wireless and LEO Satellite", "back": "Fixed wireless access (FWA) uses cellular towers (4G/5G) to broadcast Internet to a customer-premises receiver; speeds 25-300 Mbps with no last-mile cabling cost. Low-Earth orbit (LEO) satellite (Starlink-class) places satellites at 550-1,200 km, providing 50-250 Mbps download and 20-40 ms latency. LEO is the primary option for premises with no cable, no DSL, and no cellular coverage.", "id": "fc09"}, {"front": "Federal Infrastructure Grants", "back": "The Broadband Equity, Access, and Deployment (BEAD) program, authorized under the Infrastructure Investment and Jobs Act (2021), allocates $42.45 billion across U.S. states and territories to fund deployment in unserved and underserved locations. BEAD requires recipients to meet minimum speed thresholds and offer low-income plans; allocation is by formula based on each state's percentage of unserved locations.", "id": "fc10"}, {"front": "Municipal Broadband", "back": "A city or county builds and operates a fiber network, either serving customers directly or leasing infrastructure to competing private providers (the open-access model). Chattanooga, Tennessee, deployed a city-owned gigabit fiber network beginning in 2010 that now serves roughly 105,000 premises at speeds up to 10 Gbps. Viability depends on financing rate, expected take-rate, and the competitive response from incumbent providers.", "id": "fc11"}, {"front": "LEO Satellite Expansion", "back": "Constellations like Starlink reduce per-subscriber cost and latency as satellite counts and ground-station density increase. Satellite broadband is independent of terrestrial geography: it can serve a farmstead in Wyoming or a village in Sub-Saharan Africa equally, provided the subscriber can afford the hardware and subscription. Current U.S. monthly subscriptions run $80-$120.", "id": "fc12"}, {"front": "Educational Access Constraint", "back": "Online educational resources, remote learning, and cloud-based tools mean that a student's educational options are partly a function of home broadband. A household with 25 Mbps DSL can support one student on a video lesson; a household with five students and 5 Mbps DSL cannot support simultaneous video calls. The textbook frames this as a description of the technical constraint, separate from any normative claim about remedy.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
