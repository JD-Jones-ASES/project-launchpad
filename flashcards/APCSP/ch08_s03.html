<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Computing Bias", "back": "A systematic error in the outputs of a computing system that produces outcomes which are less accurate or differently distributed for some categories of input than for others. Bias can arise from training-data composition, feature selection, evaluation procedure, or historical data collected under unequal conditions. It is distinct from random error: a biased system produces errors correlated with input category rather than uniformly distributed.", "id": "fc01"}, {"front": "Sampling Bias", "back": "The condition that arises when a dataset does not represent the distribution of inputs the deployed model will encounter in production. Sampling bias occurs when data collection procedures systematically under-sample certain input types — because historical records were less complete for some groups, or because instruments were deployed in locations that over-represent one population. Sampling bias is a data property, not a model property; it exists before training begins.", "id": "fc02"}, {"front": "Why Sampling Bias Distorts the Model", "back": "Loss functions used during training minimize error averaged over all training examples. If 90% of examples are from category A and 10% from category B, A errors dominate the average loss and the optimizer prioritizes minimizing them. B errors contribute less to the optimization signal, so the model generalizes more thoroughly within A than within B, producing systematically higher per-category error rates at deployment.", "id": "fc03"}, {"front": "Facial-Recognition Worked Example", "back": "Published studies (Buolamwini and Gebru 2018, plus replications) measured commercial facial-recognition error rates of under 2% for lighter-skinned male faces and 5-35% for darker-skinned female faces. The textbook frames this as evidence of sampling bias in training datasets — under-represented demographic groups contributed fewer training examples, so the model optimized less thoroughly for their characteristics. The framing is technical: the mechanism is training-set composition.", "id": "fc04"}, {"front": "Feature Selection Bias", "back": "The bias that arises when chosen features serve as proxy variables for demographic attributes the system is not supposed to use. A model trained to minimize prediction error may learn to use a correlated proxy as an indirect stand-in for the protected attribute, even when the attribute itself is excluded from the inputs.", "id": "fc05"}, {"front": "Proxy Variable", "back": "A variable in a dataset that is statistically correlated with an attribute the model is not intended to use, so that including the proxy allows the model to implicitly depend on the underlying attribute. Common examples: ZIP code (correlated with race and income in segregated metro areas), first name (correlated with gender and ethnicity), high school graduation year combined with birth date (proxy for age), commute distance from specific neighborhoods.", "id": "fc06"}, {"front": "Evaluation Gap", "back": "The condition in which a model evaluation procedure measures aggregate performance but does not measure performance within specific subgroups of the input space. An aggregate accuracy of 95% can hide a situation in which accuracy is 99% for the majority group and 70% for a minority group. The gap is closed by computing subgroup performance metrics — accuracy, precision, recall, or error rate — separately for each relevant subgroup.", "id": "fc07"}, {"front": "Dataset Rebalancing", "back": "The standard mitigation for sampling bias. Options: (1) oversample the under-represented category by collecting additional data; (2) undersample the over-represented category by removing examples; (3) generate synthetic examples for under-represented categories using data augmentation. The goal is to align the training distribution with the deployed input distribution.", "id": "fc08"}, {"front": "Feature Auditing", "back": "The standard mitigation for feature-selection bias. Before training, each candidate feature is tested for correlation with protected attributes; features above a correlation threshold can be excluded or replaced. After training, attribution methods like SHAP (SHapley Additive exPlanations) reveal which features drove specific predictions, allowing proxy-variable usage to be detected post-hoc.", "id": "fc09"}, {"front": "Subgroup Performance Metrics", "back": "The standard mitigation for the evaluation gap. Performance metrics (accuracy, precision, recall, error rate) are computed separately for each relevant subgroup and reported alongside aggregate metrics. This practice is also called disaggregated evaluation. It is procedural — it changes how the evaluation is designed, not the model itself.", "id": "fc10"}, {"front": "Model Card", "back": "A standardized documentation artifact for a machine-learning model that records: intended use cases, training-data provenance and known limitations, evaluation methodology and metrics, and per-subgroup performance results for demographic or contextual subgroups relevant to the deployment domain. Introduced by Google researchers in 2019, model cards enable downstream users to understand the conditions under which a model is and is not reliable.", "id": "fc11"}, {"front": "Training Data", "back": "The labeled dataset used to fit a machine-learning model's parameters during the supervised learning process. The statistical properties of the training data — its size, diversity, label quality, and distribution across input types — directly determine the model's behavior, including its bias characteristics.", "id": "fc12"}, {"front": "Bias Beyond Machine Learning", "back": "Computing bias also arises in non-ML systems. A search engine that ranks results by historical click-through rates ranks highly the content that historically attracted clicks — which may reflect the demographics of the original user population rather than the broader user base. A content recommender trained to maximize engagement optimizes for the engagement patterns of high-time users, not all users equally. Any algorithm whose outputs depend on biased historical data can amplify that bias.", "id": "fc13"}, {"front": "Three Mechanism-Mitigation Pairs", "back": "(1) Sampling bias -> dataset rebalancing. (2) Feature selection bias -> feature auditing (correlation testing pre-training, SHAP post-training). (3) Evaluation gap -> subgroup performance metrics packaged in a model card. The AP exam tests whether students can identify the mechanism in a scenario and name the corresponding mitigation.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
