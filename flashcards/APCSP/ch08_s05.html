<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 8, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Intellectual Property", "back": "Legal rights granted to creators over their original works. For digital computing, the most relevant form is copyright. Copyright duration, exceptions (including fair use), and licensing systems (Creative Commons, open-source software licenses) determine the conditions under which others may use a copyrighted work.", "id": "fc01"}, {"front": "Copyright (U.S.)", "back": "A legal right that arises automatically the moment an original work is fixed in a tangible medium of expression. It grants the creator (or employer for work-for-hire) the exclusive right to copy, distribute, modify, publicly perform, and publicly display the work. No registration, notice, or publication is required for protection to exist. Registration is required to bring a lawsuit for statutory damages.", "id": "fc02"}, {"front": "Copyright Duration", "back": "Works by individual authors created in or after 1978: life of the author plus 70 years. Works made for hire (employee works in scope of employment, certain commissioned works including most company-produced software): 95 years from publication or 120 years from creation, whichever is shorter. Works published before 1928 are in the U.S. public domain regardless of the life-plus-70 rule.", "id": "fc03"}, {"front": "Public Domain", "back": "The set of creative works that are not subject to copyright protection — either because copyright has expired, because the work was created by the U.S. federal government (which cannot hold copyright), or because the creator explicitly dedicated the work. Public-domain works may be freely used, copied, modified, and distributed without permission or payment.", "id": "fc04"}, {"front": "Fair Use", "back": "A limitation on copyright protection in U.S. law (17 U.S.C. 107) that permits reproduction of portions of a copyrighted work without permission for certain purposes. Fair use is determined by a four-factor test; all four factors are weighed together; no single factor is sufficient. Fair use is a legal defense evaluated case-by-case, not a category of automatically permitted uses.", "id": "fc05"}, {"front": "Four-Factor Test", "back": "(1) Purpose and character of the use — transformative uses (commentary, parody, education, news) favor fair use over purely substitutive commercial reproduction. (2) Nature of the original work — factual works receive narrower protection than creative ones. (3) Amount and substantiality taken — using the heart of a work weighs against fair use even at small absolute amount. (4) Effect on the market for the original — substituting for the original or reducing licensing revenue weighs against fair use.", "id": "fc06"}, {"front": "Creative Commons (CC) System", "back": "Standardized, machine-readable licenses developed in the early 2000s that creators apply to grant specific permissions in advance. CC licenses operate within copyright by constituting a standing license grant; they do not replace copyright. There are six primary CC license types defined by combinations of four conditions plus a public-domain dedication option (CC0).", "id": "fc07"}, {"front": "Four CC Conditions", "back": "BY (Attribution) — users must credit the creator; included in every CC license except CC0. SA (ShareAlike) — adapted versions must use the same license. NC (NonCommercial) — no commercial use. ND (NoDerivatives) — no modified versions may be distributed. CC0 dedicates the work to the public domain with no conditions.", "id": "fc08"}, {"front": "CC BY-SA", "back": "Attribution-ShareAlike. Permits any use including commercial, requires credit to the original creator, and requires that any distributed adaptation be released under the same license (or a compatible one). The ShareAlike condition propagates: it creates a legal mechanism for maintaining openness across an entire family of derived works — a copyleft-style strategy applied through a standardized license.", "id": "fc09"}, {"front": "Open-Source Software", "back": "Software whose source code is made publicly available under a license that permits inspection, modification, and redistribution. Open-source licenses vary in their conditions: permissive licenses (MIT, BSD) impose minimal constraints; copyleft licenses (GPL) require derivative works also be released under the same license. The Open Source Initiative's definition specifies ten criteria a license must meet.", "id": "fc10"}, {"front": "Permissive License (MIT/BSD)", "back": "Requires only that the original copyright notice and license text be retained in any distribution. Users may incorporate permissively licensed code into proprietary products, modify without releasing modifications, and distribute compiled binaries without sharing source. Examples: NGINX, SQLite, OpenSSL, much macOS infrastructure, the Linux kernel Debian installer.", "id": "fc11"}, {"front": "Copyleft License (GPL)", "back": "A licensing condition similar to CC BY-SA: any derivative work distributed to others must also be released under the same copyleft license, with the source code made available. The GNU General Public License (GPL) is the most widely used copyleft license. Used by the Linux kernel, the GNU compiler toolchain, and most GNU utilities.", "id": "fc12"}, {"front": "Copyleft (term)", "back": "A licensing mechanism in which a copyright holder grants permission to use, modify, and distribute a work on the condition that derivative works carry the same license. Copyleft creates a legal mechanism by which open permissions propagate through derivative works. The term was coined by Richard Stallman to describe the GPL's strategy of using copyright law to enforce perpetual openness.", "id": "fc13"}, {"front": "Economic Effects of Open Source", "back": "Permissive licensing lets companies build proprietary products on open foundations without source-disclosure obligations — used widely in commercial cloud services (AWS, Azure) whose infrastructure layers are substantially built on open-source components. Copyleft licensing requires modifications be released back, creating a contribution dynamic where improvements return to the community. Neither is universally superior; each produces a different distribution of economic value among original contributors, commercial users, and the broader community.", "id": "fc14"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
