<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Computer Science Principles &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">AP Computer Science Principles &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/APCSP.html">&larr; Back to AP Computer Science Principles</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Overflow", "back": "An error that occurs when an arithmetic result exceeds the range representable by the allocated bits. For unsigned integers, overflow typically wraps around (255 + 1 = 0 in 8-bit unsigned arithmetic). For signed integers, overflow can produce sign-flipping (a large positive sum becoming a large negative number). In security-critical software, integer overflow is a common source of exploitable vulnerabilities.", "id": "fc01"}, {"front": "Unsigned Integer Range", "back": "An n-bit unsigned integer represents 0 to 2^n - 1. 8-bit max = 255; 16-bit max = 65,535; 32-bit max = ~4.3 billion. Adding 1 to the maximum value wraps to 0 because the carry bit is discarded. The maximum is exactly 2^n - 1, not 2^n.", "id": "fc02"}, {"front": "Signed Integer Range (Two's Complement)", "back": "An n-bit two's complement signed integer represents -2^(n-1) to +2^(n-1) - 1. 8-bit signed: -128 to +127. The asymmetry (one more negative than positive) reflects zero counting as part of the non-negative side. Overflow can flip sign: a large positive value becomes a large negative one.", "id": "fc03"}, {"front": "Wraparound", "back": "The default behavior when an unsigned integer overflows: the result is the true sum modulo 2^n. Adding 1 to 255 (8-bit unsigned) gives 0; 200 + 100 = 300, but 300 mod 256 = 44, so the register holds 44. Hardware silently performs this modular reduction unless overflow detection is enabled.", "id": "fc04"}, {"front": "IEEE 754", "back": "The 1985 standard for floating-point arithmetic (revised 2008 and 2019). Defines single (32-bit), double (64-bit), and quadruple (128-bit) precision formats with sign + exponent + significand structure. Standardizes rounding rules (round-to-nearest-even default), special values (infinity, NaN), and exception handling. Universal across modern hardware.", "id": "fc05"}, {"front": "IEEE 754 Format Components", "back": "Each float has three fields. Single (32-bit): 1 sign bit, 8 exponent bits, 23 significand bits. Double (64-bit, Python's default): 1 sign bit, 11 exponent bits, 52 significand bits. The significand stores the binary fraction of the value; the exponent scales the value by a power of 2. The sign bit indicates positive (0) or negative (1).", "id": "fc06"}, {"front": "Roundoff Error", "back": "The error introduced when a real number cannot be represented exactly in the finite binary fraction of IEEE 754. A binary fraction can exactly represent only numbers whose denominator is a power of 2 (1/2, 1/4, 1/8). Most decimal fractions (0.1, 0.2, 0.3) are infinitely repeating in binary and must be truncated, accumulating tiny errors with each operation.", "id": "fc07"}, {"front": "0.1 + 0.2 != 0.3", "back": "The canonical floating-point surprise. In Python: 0.1 + 0.2 prints as 0.30000000000000004 because neither 0.1 nor 0.2 has an exact binary representation; their stored approximations sum to a slightly different value than the stored approximation of 0.3. The lesson: never use == to compare floats; always compare within a tolerance like abs(x - y) < 1e-9.", "id": "fc08"}, {"front": "decimal.Decimal", "back": "Python's library for exact decimal arithmetic, used in financial software where 0.1 + 0.2 must equal 0.3. Critical: pass a STRING argument like Decimal('0.1') to preserve exact value; passing a float like Decimal(0.1) reads the imperfect IEEE 754 approximation and stores ~0.100000000000000005... Java's BigDecimal and C#'s decimal serve the same purpose.", "id": "fc09"}, {"front": "Tolerance-Based Comparison", "back": "The safe way to compare floating-point values for approximate equality: abs(x - y) < tolerance, where tolerance is small (typically 1e-9 for double-precision). The tolerance accounts for accumulated roundoff. Never use == to compare the result of a float computation; the bit-level patterns can differ even when the mathematical values 'should' match.", "id": "fc10"}, {"front": "Python int vs. Fixed-Width int", "back": "Python's built-in int is arbitrary-precision: it grows to as many bits as needed and never overflows. Fixed-width integers (NumPy's int32, C's short, Java's byte) overflow at their type's limits. Overflow risk in Python code typically arises only at the C-extension boundary (NumPy operations, struct.pack, ctypes interop).", "id": "fc11"}, {"front": "Real-World Overflow Disasters", "back": "Ariane 5 (1996): 64-bit float converted to 16-bit signed int overflowed; unhandled exception crashed the rocket 37s after launch. MS-DOS file system: 32-bit unsigned size field couldn't represent files >4 GB, corrupting them. Boeing 787 (2015): an unsigned int counter overflowed after 248 days of continuous operation, requiring planes to be rebooted.", "id": "fc12"}, {"front": "Currency and Floating-Point", "back": "Banking and financial software universally avoid floating-point for currency. Reason: a sales tax of 19.99 * 0.0825 should be exactly $1.65, but float gives 1.6491750000000001. Across millions of transactions, tiny per-transaction errors accumulate to thousands of dollars. Always use decimal.Decimal (Python), BigDecimal (Java), or decimal type (C#) for money.", "id": "fc13"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
