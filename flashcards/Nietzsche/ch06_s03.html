<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Nietzsche's terminology, how does a \"free spirit\" differ from a \"freethinker\"?", "back": "The free spirit has outgrown inherited values, while the freethinker is a shallow rationalist who merely adopts new dogmas."}, {"front": "What is the primary characteristic of the \"great emancipation\" that defines a free spirit?", "back": "A violent and painful severing of bonds from once-revered traditions, piety, and values."}, {"front": "According to Beyond Good and Evil 24, what is the \"granitelike foundation\" upon which human knowledge is built?", "back": "A far more powerful will to ignorance, simplification, and falsification."}, {"front": "Nietzsche argues that language is often awkward because it speaks in terms of opposites rather than _____.", "back": "Degrees and refinements of gradation."}, {"front": "What does Nietzsche define as \"Tartuffery\" in the context of morality?", "back": "Hypocrisy, specifically the religious variety."}, {"front": "Why does Nietzsche warn philosophers to \"beware of martyrdom\" for the truth?", "back": "It destroys the innocence and neutrality of the conscience and makes the thinker headstrong against objections."}, {"front": "Nietzsche suggests that there is more truthfulness in a philosopher's _____ than in their favorite doctrines.", "back": "Interrogative marks (questions)."}, {"front": "What is the purpose of the \"masks\" and \"ruses\" Nietzsche advises the free spirit to use?", "back": "To ensure they are mistaken for something else or feared, protecting their independence from common misunderstanding."}, {"front": "How does Nietzsche describe the \"good solitude\" necessary for the free spirit?", "back": "A free, wanton, and lightsome solitude that allows one to remain \"good\" in a personal sense."}, {"front": "According to Nietzsche, what is the unfailing sign that a philosopher has lost their \"philosophical humour\"?", "back": "The presence of moral indignation."}, {"front": "Why does Nietzsche label thinkers like Spinoza and Giordano Bruno as \"refined vengeance-seekers\"?", "back": "He believes their philosophies were poisoned by the long, personal fear and persecution they endured as recluses."}, {"front": "To whom does Nietzsche attribute the privilege of being \"independent\"?", "back": "The strong (the very few)."}, {"front": "What metaphor does Nietzsche use for the hidden dangers of seeking total independence?", "back": "Entering into a labyrinth."}, {"front": "What is the \"minotaur of conscience\" in the context of an independent thinker?", "back": "The internal force that can isolate and destroy a thinker who has lost their way in the pursuit of independence."}, {"front": "According to the \"esoteric\" perspective, how are things viewed in comparison to the \"exoteric\" perspective?", "back": "The esoteric class views things from above downwards, while the exoteric class views from below upwards."}, {"front": "How does Nietzsche view the relationship between the virtues of the \"common man\" and those of a philosopher?", "back": "The virtues of the common man might be considered vice or weakness in a philosopher."}, {"front": "Why does Nietzsche find \"books for the general reader\" offensive?", "back": "He believes the \"odour of paltry people\" and the populace clings to them."}, {"front": "What Russian-born intellectual and psychoanalyst was Nietzsche’s equal and interlocutor in 1882?", "back": "Lou Andreas-Salomé."}, {"front": "Nietzsche claims that conventional morality is actually a form of _____.", "back": "Cowardice or a refusal to face the complexity of existence."}, {"front": "Nietzsche's \"genealogical method\" asks what question about a moral conviction?", "back": "What kind of person needs to believe this?"}, {"front": "According to BGE 39, what is the measure of the \"strength of a mind\"?", "back": "The amount of \"truth\" it can endure without requiring it to be sweetened or falsified."}, {"front": "Why does Nietzsche suggest that the \"wicked and unfortunate\" are more favorably situated for discovering certain truths?", "back": "Their conditions of severity and craft are more conducive to developing strong, independent spirits than \"good-nature.\""}, {"front": "What are the three traits Stendhal identifies as necessary for a \"good philosopher\"?", "back": "Dry, clear, and without illusion (sec, clair, sans illusion)."}, {"front": "Whom does Nietzsche label as \"philosophical workers\" rather than real philosophers?", "back": "Kant and Hegel."}, {"front": "What is the primary task of \"philosophical workers\"?", "back": "To fix and formalize existing bodies of valuations and \"truths.\""}, {"front": "What is the defining task of \"real philosophers\" according to Nietzsche?", "back": "To be commanders and law-givers who create new values."}, {"front": "Nietzsche equates the \"will to truth\" in the philosopher of the future with what concept?", "back": "Will to Power."}, {"front": "Nietzsche scorns modes of thinking like hedonism and utilitarianism because they measure the worth of things solely by _____.", "back": "Pleasure and pain."}, {"front": "What is Nietzsche’s view on the goal of \"doing away with suffering\"?", "back": "He believes it is foolish and enervating, as only great suffering has produced all human elevations."}, {"front": "What are the two distinct aspects of man that Nietzsche describes in BGE 225?", "back": "The creature (matter, clay, chaos) and the creator (sculptor, hammer, spectator)."}, {"front": "Definition: Intellectual Conscience (intellektuelles Gewissen)", "back": "The inner demand for honesty that refuses to accept beliefs merely because they are traditional, comfortable, or popular."}, {"front": "Why does Nietzsche claim to \"mistrust all systematizers\"?", "back": "He views the \"will to a system\" as a lack of integrity."}, {"front": "According to BGE 30, how can a book be \"dangerous\" for an inferior soul but a \"herald-call\" for a higher one?", "back": "The value and effect of a book depend on the vitality and power of the soul using it."}, {"front": "What does the \"Pathos der Distanz\" refer to in Nietzsche’s writing?", "back": "His aristocratic tone and insistence on the distance between different \"ranks\" of spirits."}, {"front": "Nietzsche argues that the will to knowledge is not the opposite of the will to ignorance, but rather its _____.", "back": "Refinement."}, {"front": "What does Nietzsche mean by the philosopher of the future being a \"legislator\"?", "back": "They determine the \"Whither\" and \"Why\" of mankind by creating the framework of values for the future."}, {"front": "How does Nietzsche's \"lofty and further-sighted sympathy\" differ from common sympathy?", "back": "It is not sympathy for social distress, but for how mankind \"dwarfs itself\" through the avoidance of suffering."}, {"front": "In the metaphor of the creator and the creature, what happens to the \"creature in man\"?", "back": "It must be fashioned, bruised, forged, stretched, and roasted."}, {"front": "The free spirit is described as having \"fettered\" by what before their emancipation?", "back": "Reverence and piety."}, {"front": "Nietzsche suggests that those who attempt independence without being \"obliged\" to do so prove they are _____.", "back": "Daring beyond measure."}, {"front": "Why does Nietzsche believe that the failure of an independent thinker is beyond human sympathy?", "back": "Because the isolation and path of such a person are so far removed from common comprehension."}, {"front": "What does Nietzsche call the condition of man when well-being is the primary goal?", "back": "Ludicrous and contemptible."}, {"front": "According to BGE 211, what roles must a philosopher experience as \"preliminary conditions\"?", "back": "Critic, dogmatist, historian, poet, collector, traveler, riddle-reader, moralist, and seer."}, {"front": "What is the primary sign of the \"populace\" that Nietzsche warns against in churches and books?", "back": "A bad smell (stink) resulting from a lack of \"pure air.\""}, {"front": "How does Nietzsche justify the use of \"masks\" for a thinker's genuine thoughts?", "back": "Genuine thoughts cannot be communicated to those who lack the specific experiences to understand them."}, {"front": "Nietzsche measures the \"strength of a mind\" by its need for truth to be _____.", "back": "Attenuated, veiled, sweetened, damped, and falsified."}, {"front": "In BGE 211, what does the real philosopher use the past as?", "back": "A means, an instrument, and a hammer."}, {"front": "What does Nietzsche mean when he says \"sympathy AGAINST sympathy\"?", "back": "His lofty sympathy for human greatness resists common sympathy for human comfort."}, {"front": "According to Nietzsche, why is a long fear \"personal\" and \"crafty\"?", "back": "It forces one to watch enemies constantly, leading to a \"poisonous\" and unopen character."}, {"front": "What does the phrase \"O sancta simplicitas!\" in BGE 24 refer to?", "back": "The strange simplification and falsification in which man lives to enjoy life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
