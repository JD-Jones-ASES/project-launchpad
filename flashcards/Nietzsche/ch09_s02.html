    <style>
        .fc-container {
            max-width: 700px;

        .fc-breadcrumb {
            margin-bottom: 2rem;

        .fc-face {

            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);

            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;

        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }

        .fc-btn {

            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Which two Roman Stoic philosophers are noted for teaching the acceptance of fate without complaint?", "back": "Marcus Aurelius and Epictetus"}, {"front": "According to the Stoic tradition, what is the 'logos'?", "back": "The rational order that governs the universe."}, {"front": "How did Epictetus counsel individuals to approach events to ensure life 'goes well'?", "back": "By wanting events to happen exactly as they do happen."}, {"front": "What is the primary motivation behind the Stoic attitude of 'resigned acceptance' toward fate?", "back": "Trust that the cosmos is rationally ordered."}, {"front": "What specific quality of Stoicism did Nietzsche admire?", "back": "Stoic toughness, including the refusal to whine and facing suffering without self-pity."}, {"front": "In what way does Nietzsche’s 'amor fati' differ from Stoic acceptance regarding the nature of the universe?", "back": "Stoics believe in a rational order (logos), while Nietzsche believes the universe is indifferent and chaotic."}, {"front": "Nietzsche demands not just acceptance of fate, but _____ of fate.", "back": "love"}, {"front": "How does Nietzsche describe the universe in contrast to the Stoic 'logos'?", "back": "As 'chaos'—without order, purpose, or care for human happiness."}, {"front": "Which philosophical position serves as the 'exact opposite' response to a godless universe compared to Nietzsche's 'amor fati'?", "back": "Schopenhauer's pessimism"}, {"front": "According to Schopenhauer, what is the fundamental driver of existence?", "back": "A blind, irrational Will that can never be satisfied."}, {"front": "What did Schopenhauer believe was the fundamental nature of existence?", "back": "Suffering"}, {"front": "Name one of the two ways Schopenhauer suggested individuals could achieve a temporary escape from the Will.", "back": "Aesthetic contemplation"}, {"front": "What was Schopenhauer’s ultimate goal for the individual regarding the 'will to live'?", "back": "The denial of the will to live."}, {"front": "Which two religious concepts did Schopenhauer associate with the 'quieting of desire'?", "back": "Buddhist nirvana and Christian sainthood"}, {"front": "How did Nietzsche refer to Schopenhauer, despite eventually rejecting his pessimism?", "back": "His 'great teacher'"}, {"front": "On what diagnosis of the human condition do Schopenhauer and Nietzsche agree?", "back": "Life involves unavoidable suffering with no cosmic plan to redeem it."}, {"front": "How does Nietzsche's response to suffering differ from Schopenhauer's response?", "back": "Schopenhauer advocates for denial (nay-saying), while Nietzsche advocates for affirmation (yea-saying)."}, {"front": "Nietzsche viewed Schopenhauer's pessimism as a 'failure of ______': the courage to see the truth, but not the courage to affirm it.", "back": "nerve"}, {"front": "What is the Buddhist term for the endless cycle of birth, death, and rebirth?", "back": "Samsara"}, {"front": "What forces drive the cycle of 'samsara' in Buddhist cosmology?", "back": "Desire and ignorance"}, {"front": "What is the primary goal of an enlightened person in Buddhism regarding the cycle of recurrence?", "back": "To escape the cycle (achieve nirvana)."}, {"front": "How does Nietzsche's 'eternal recurrence' invert the Buddhist view of the cycle of existence?", "back": "Nietzsche views the cycle as a test to be embraced rather than a problem to be escaped."}, {"front": "Whose interpretation shaped Nietzsche’s understanding of Buddhism as a philosophy of 'world-denial'?", "back": "Schopenhauer's interpretation"}, {"front": "Which branch of Buddhism does the text suggest might have been more 'congenial' to Nietzsche than the monasticism he studied?", "back": "The Mahayana tradition"}, {"front": "According to the text, why is the popular motto 'live with no regrets' a 'debased' version of eternal recurrence?", "back": "It focuses on impulsive pleasure and avoiding reflection rather than honest self-examination."}, {"front": "In the context of the eternal recurrence, what does it mean to truly 'have no regrets'?", "back": "To have thought about the past with absolute honesty and chosen to affirm all of it, including the pain."}, {"front": "What requirement does the eternal recurrence place on a person's view of their own failures and wounds?", "back": "They must be affirmed as necessary to the whole of one's life."}, {"front": "What core question does the eternal recurrence ask during routine daily decisions?", "back": "Would you will this choice forever?"}, {"front": "Why does Nietzsche refer to the eternal recurrence as 'the greatest weight'?", "back": "Because it transforms life from something that happens to you into something you actively choose."}, {"front": "Term: Amor Fati", "back": "Definition: Love of fate; the radical affirmation of one's life and the universe exactly as they are."}, {"front": "Contrast: Stoic vs. Nietzschean fate", "back": "Stoics accept fate because it is rational; Nietzsche loves fate because it is necessary, despite being irrational."}, {"front": "Concept: Asceticism (in Schopenhauer's context)", "back": "The 'nay-saying' response to life characterized by the denial of desire and the will to live."}, {"front": "How does the 'greatest weight' change the nature of routine decisions?", "back": "It transforms routine decisions into existential ones by increasing their significance."}, {"front": "In the Enchiridion, Epictetus suggests that wanting events to happen as they do leads to what outcome?", "back": "Life will go well."}, {"front": "Nietzsche admired Schopenhauer's _____: his willingness to stare into the abyss without blinking.", "back": "honesty"}, {"front": "What is the difference between Nietzsche's 'affirmation' and simple 'acceptance'?", "back": "Affirmation is an active 'love' and 'willing' of the recurrence, whereas acceptance can be a 'resigned' or passive state."}, {"front": "The phrase 'live with no regrets' is often a philosophy of _____, rather than the depth demanded by Nietzsche.", "back": "impulse"}, {"front": "What is the specific 'test' posed by the idea of the Eternal Recurrence?", "back": "The ability to face every moment of one's life and desire its infinite repetition."}, {"front": "According to the text, the person who affirms the eternal recurrence does not avoid regret by avoiding _____.", "back": "reflection"}, {"front": "How does Nietzsche characterize the universe's attitude toward human happiness or suffering?", "back": "The universe is indifferent."}, {"front": "What did Schopenhauer believe was the 'best we can hope for' in a world of suffering?", "back": "Temporary escape through aesthetic contemplation."}, {"front": "For Nietzsche, the eternal recurrence is a demonstration that it is possible to face the worst and still say _____.", "back": "yes"}, {"front": "Nietzsche believed Schopenhauer's pessimism was a form of 'life-_____'.", "back": "denial"}, {"front": "The Stoic wise person recognizes that the universe operates according to a rational order _____ human control.", "back": "beyond"}, {"front": "What distinction does the text make regarding 'cosmic justification' between Stoicism and Nietzsche?", "back": "Stoics find justification in divine reason (logos); Nietzsche demands love of fate without any cosmic justification."}, {"front": "Nietzsche's eternal recurrence demands the most rigorous _____ imaginable.", "back": "self-examination"}, {"front": "Instead of asking 'is this the right thing to do?', the eternal recurrence asks 'is this how I want to spend my ____?'", "back": "eternity"}, {"front": "In the Buddhist context, what is 'the problem' that the enlightened person seeks to solve?", "back": "Samsara (the cycle of suffering)."}, {"front": "Why is Nietzsche's position described as more 'radical' than that of the Stoics?", "back": "Because it requires loving a fate that is part of a purposeless, chaotic universe."}, {"front": "What is the result of the 'greatest weight' on how a person experiences their life?", "back": "Life turns from something that happens to the individual into something the individual actively chooses."}, {"front": "Epictetus and Marcus Aurelius are associated with which philosophical tradition?", "back": "Stoicism"}, {"front": "Which philosopher proposed the 'denial of the will to live' as a solution to suffering?", "back": "Schopenhauer"}, {"front": "Nietzsche’s 'yea-saying' is his ultimate answer to which philosopher’s pessimism?", "back": "Schopenhauer"}, {"front": "The Stoic attitude toward fate is described as 'resigned acceptance rooted in ____'.", "back": "trust"}, {"front": "According to the text, what prevents 'live with no regrets' from being a truly Nietzschean concept?", "back": "It lacks the rigorous honesty and the affirmation of painful, necessary failures."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
