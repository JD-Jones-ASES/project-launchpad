<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Nietzsche's argumentative style differ from traditional philosophers like Plato or Aristotle?", "back": "He avoids careful, step-by-step demonstrations and consistent term definitions."}, {"front": "Nietzsche’s use of _____ is so layered that scholars still debate whether he is being sincere.", "back": "irony"}, {"front": "What is the primary structural unit used in works like 'Beyond Good and Evil' and 'The Gay Science'?", "back": "Numbered aphorisms"}, {"front": "Define the length range of a typical Nietzschean aphorism.", "back": "They vary from a single explosive sentence to several dense paragraphs."}, {"front": "Why does Nietzsche characterize systematic philosophy as 'intellectual dishonesty'?", "back": "It pretends that the world can be fully captured within a logical, cohesive structure."}, {"front": "Nietzsche believes that _____ is messier and more contradictory than any philosophical system can contain.", "back": "reality"}, {"front": "In the context of Nietzsche’s style, what is the function of an aphorism?", "back": "It serves as a specific perspective, a provocation, or a test for the reader."}, {"front": "What responsibility does the aphoristic style place upon the reader?", "back": "The reader must actively connect the sections and hold contradictory ideas in tension."}, {"front": "Why does Nietzsche intentionally undermine a claim in one aphorism with a different claim in the next?", "back": "To demonstrate that there is no single, absolute perspective from which to view the world."}, {"front": "The philosophical practice of viewing a question from multiple angles is known as _____.", "back": "perspectivism"}, {"front": "What does a contradiction in Nietzsche’s text reveal about the subject matter?", "back": "It shows that the question being asked is more complex than it initially appears."}, {"front": "What is Nietzsche’s primary goal when using shocking or offensive claims?", "back": "To unsettle the reader and force them to question deeply held assumptions."}, {"front": "According to Nietzsche, what is a prerequisite for 'genuine thinking'?", "back": "The courage to question assumptions that one did not know they held."}, {"front": "Why is it often difficult to distinguish between Nietzsche's sincerity and his performance?", "back": "He frequently dramatizes positions to expose truths about them rather than simply stating his own view."}, {"front": "In Nietzsche's writing, a provocation that invites a reader toward a deeper insight is metaphorically called a _____.", "back": "door"}, {"front": "What is a 'provocation as a wall' in the context of reading Nietzsche?", "back": "A genuine position held by Nietzsche that the reader may need to argue against."}, {"front": "Why is it often the 'wrong question' to ask what Nietzsche specifically believes?", "back": "His work is primarily intended to provide profound questions rather than definitive answers."}, {"front": "List one of the major existential questions Nietzsche poses regarding truth.", "back": "Why do we value truth over untruth?"}, {"front": "What question does Nietzsche ask concerning the origin of ethics?", "back": "Where do our moral judgments actually come from?"}, {"front": "Nietzsche asks if a person can affirm their life so completely that they would will its _____.", "back": "eternal repetition"}, {"front": "What literal meaning does the German term 'Wiederkäuen' have?", "back": "Chewing the cud"}, {"front": "How does the metaphor of 'chewing the cud' apply to reading philosophy?", "back": "It describes the process of taking in a passage, revisiting it, and reflecting on it deeply."}, {"front": "What type of professional reader does Nietzsche use as a model for how his own work should be read?", "back": "A philologist"}, {"front": "According to Nietzsche, a good reader must read with 'delicate eyes and fingers' and keep _____.", "back": "doors left open"}, {"front": "What does Nietzsche warn against to ensure an aphorism is truly understood?", "back": "Reading too quickly or assuming comprehension after a single reading."}, {"front": "How does the structure of 'On the Genealogy of Morals' differ from Nietzsche's other works?", "back": "It is more continuously argued, though still divided into numbered sections."}, {"front": "Nietzsche argues that the 'aphoristic style honors' the _____ of the real world.", "back": "messiness"}, {"front": "What should a reader ask when encountering a 'monstrous' claim in Nietzsche's work?", "back": "Is he stating a position or dramatizing it to expose something about it?"}, {"front": "Nietzsche suggests that if a claim does not _____ the reader, it is likely not very interesting.", "back": "disturb"}, {"front": "What characterizes the 'systematic' approach that Nietzsche rejects?", "back": "The belief that everything in the world fits together without loose ends or mysteries."}, {"front": "Which Nietzschean work consists of three essays divided into numbered sections?", "back": "On the Genealogy of Morals"}, {"front": "Nietzsche's advice to read 'with reservations' implies that the reader should maintain a sense of _____.", "back": "skepticism or critical distance"}, {"front": "The method of 'rumination' requires the reader to _____ the text instead of speed-reading.", "back": "sit with and return to"}, {"front": "Nietzsche views philosophy not as a single truth, but as a matter of _____.", "back": "perspective"}, {"front": "According to the text, what is the 'main event' when studying Nietzsche's philosophy?", "back": "Nietzsche's actual words and prose rather than paraphrases."}, {"front": "What is the intended effect of Nietzsche's use of exaggeration and insults?", "back": "They are part of a deliberate method to provoke and engage the reader."}, {"front": "In 'On the Genealogy of Morals', where does Nietzsche provide direct advice on how to read his work?", "back": "The preface"}, {"front": "What does Nietzsche call the 'beautiful lie' of traditional philosophy?", "back": "The idea that the world can be captured in a logical structure."}, {"front": "True or False: Nietzsche believes that a reader has understood an aphorism once they have finished reading its sentences.", "back": "False"}, {"front": "How does Nietzsche's prose style relate to European literature as a whole?", "back": "It is considered one of the glories of European literature."}, {"front": "What is the primary danger of seeking only 'answers' when reading Nietzsche?", "back": "The reader may miss the transformative power of the questions he poses."}, {"front": "Why does Nietzsche encourage readers to 'argue back' against his text?", "back": "Because his work is intended as a provocation that requires active engagement."}, {"front": "Term: Aphorism", "back": "Definition: A brief, pithy statement or section expressing a general truth or specific perspective."}, {"front": "Concept: Perspectivism", "back": "Definition: The philosophical view that knowledge is always filtered through a particular point of view."}, {"front": "Concept: Wiederkäuen", "back": "Definition: A slow, repetitive process of mental digestion required to understand complex philosophical thoughts."}, {"front": "What quality does Nietzsche require in a reader’s 'eyes and fingers'?", "back": "Delicacy"}, {"front": "What does the tension between two contradictory claims in Nietzsche's work often represent?", "back": "The central point or depth of the question being explored."}, {"front": "Which work by Nietzsche is cited as an example of a numbered aphoristic book?", "back": "The Antichrist"}, {"front": "How should a reader respond when Nietzsche's claims make them uncomfortable?", "back": "By using that discomfort as an opportunity to question their own assumptions."}, {"front": "Nietzsche's writing is described as a 'performance' because he often _____ positions to reveal their nature.", "back": "dramatizes"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
