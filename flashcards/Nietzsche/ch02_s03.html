    <style>
        .fc-container {
            max-width: 700px;

        .fc-breadcrumb {

        .fc-card {
            position: relative;

        .fc-btn:hover {

        .fc-btn:disabled {

        .fc-btn:disabled:hover {

        .fc-counter {
            font-family: 'Cinzel', serif;

        /* Progress bar */
        .fc-progress {
            width: 100%;

        /* Toolbar */

        .fc-tool:hover {
            border-color: var(--secondary-color);

        }
        .fc-tool.active {
            background: var(--secondary-color);

        /* Keyboard hint */

            background: #f5f0e8;

            border-radius: 3px;
            border: 1px solid var(--border-color);

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;

                min-height: 220px;
            }

                gap: 0.5rem;

        }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;

            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is an aphorism in the context of Nietzsche's writing?", "back": "A short, pithy statement that serves as a compressed argument, provocation, or thought experiment."}, {"front": "According to Nietzsche, what do great philosophers like Plato and Kant mistake for universal reason?", "back": "Their own hidden desires, unconscious needs, and deeply personal commitments."}, {"front": "What provocative metaphor does Nietzsche use at the beginning of \"Beyond Good and Evil\" to describe Truth?", "back": "He supposes that Truth is a woman who has not allowed herself to be won by dogmatists."}, {"front": "Term: Wille zur Wahrheit", "back": "Definition: The \"Will to Truth,\" or the drive that compels philosophers to seek truth above all else."}, {"front": "Instead of asking if a claim is objectively true, what \"prior question\" does Nietzsche ask about the Will to Truth?", "back": "He asks about the value of this Will and why we do not prefer untruth or uncertainty instead."}, {"front": "The belief that things of highest value must have a separate, \"pure\" origin is what Nietzsche calls the typical prejudice of _____.", "back": "metaphysicians"}, {"front": "Nietzsche describes the biased, limited viewpoints of metaphysicians as \"_____ perspectives.\"", "back": "frog"}, {"front": "Under what condition does Nietzsche believe a \"false\" opinion might be more valuable than a true one?", "back": "When the opinion is life-furthering, life-preserving, or species-preserving."}, {"front": "Nietzsche argues that every great philosophy is actually a form of \"involuntary and unconscious _____.\"", "back": "auto-biography"}, {"front": "What does Nietzsche identify as the \"true vital germ\" from which every philosophical system grows?", "back": "The moral (or immoral) purpose of the originator."}, {"front": "How does Nietzsche characterize the difference between a \"scholar\" and a \"philosopher\" regarding their personal involvement in their work?", "back": "Scholars are often impersonal \"clock-work,\" while a philosopher's morality reveals the deep order of their nature."}, {"front": "Why does Nietzsche find the Stoic command to \"live according to nature\" self-contradictory?", "back": "Nature is boundlessly indifferent, whereas living requires valuing, preferring, and being limited."}, {"front": "Nietzsche describes philosophy as the \"most spiritual Will to Power\" because it seeks to create the world in _____.", "back": "its own image"}, {"front": "According to Nietzsche, why is the \"I\" in Descartes' \"I think\" not an \"immediate certainty\"?", "back": "It assumes a unified subject and a cause-effect relationship that are metaphysical suppositions rather than facts."}, {"front": "Nietzsche argues that a thought comes when \"____-\" wishes, rather than when the subject wishes.", "back": "it"}, {"front": "In Nietzsche's analysis, the belief in the \"Ego\" as the cause of thought is largely a result of _____.", "back": "grammatical habit"}, {"front": "Nietzsche defines \"Willing\" not as a simple act, but as a complex of sensation, thinking, and _____.", "back": "emotion"}, {"front": "What specific emotion does Nietzsche associate with the act of \"Willing\"?", "back": "The emotion of the command, or the feeling of supremacy over that which must obey."}, {"front": "Term: Wille zur Macht", "back": "Definition: The Will to Power; the fundamental drive in all living things to grow, extend themselves, and overcome resistance."}, {"front": "Term: Perspectivism", "back": "Definition: The view that all knowledge is shaped by the specific interests, values, and perspective of the knower."}, {"front": "Why does Nietzsche claim there is no \"view from nowhere\" in human knowledge?", "back": "Because every claim to truth reflects a particular set of physiological conditions and personal values."}, {"front": "What does Nietzsche call the new era of thinkers who move away from dogmatic certainty and embrace the \"dangerous perhaps\"?", "back": "Philosophers of the dangerous \"Perhaps.\""}, {"front": "Why was the \"soul-superstition\" significant to Nietzsche's critique of modern philosophy?", "back": "He argues it persists in the form of the \"subject-superstition\" and the \"ego-superstition.\""}, {"front": "Nietzsche suggests that high values like \"truth\" might actually be essentially identical to \"____-\" things like selfishness or deception.", "back": "evil"}, {"front": "According to Nietzsche, what are \"logical fictions\"?", "back": "Useful untruths, such as the idea of absolute numbers or stable objects, that are necessary for human life."}, {"front": "In the context of \"Willing,\" what is the meaning of the phrase \"L'effet c'est moi\"?", "back": "The person who wills identifies themselves with the success of the action, as a governing class identifies with the state."}, {"front": "Nietzsche views the human body as a \"social structure\" composed of many \"____-\".", "back": "souls"}, {"front": "What was \"Plato's invention\" that Nietzsche considers the most dangerous error in Western history?", "back": "The invention of \"Pure Spirit\" and \"the Good in Itself.\""}, {"front": "How does Nietzsche describe the \"Will to Power\" in the context of a plant pushing through concrete?", "back": "It is the fundamental drive to overcome resistance and master its environment."}, {"front": "According to Nietzsche, how did the \"un-terrestrial\" pretensions of ancient astrology benefit humanity?", "back": "They led to the development of the \"grand style of architecture\" in Asia and Egypt."}, {"front": "Nietzsche refers to the \"____-\" nature of every human impulse, meaning each one attempts to philosophize and rule the others.", "back": "imperious"}, {"front": "What is the primary target of Nietzsche's critique in the first section of \"Beyond Good and Evil\"?", "back": "The unexamined prejudices and hidden dogmas of the Western philosophical tradition."}, {"front": "Nietzsche notes that the word for \"Truth\" in Greek, aletheia, is grammatically _____.", "back": "feminine"}, {"front": "What phrase does Nietzsche use to describe the \"heavy-handed\" and ineffective approach dogmatists take toward winning Truth?", "back": "Clumsy importunity"}, {"front": "Nietzsche believes that \"De omnibus dubitandum\" (Everything is to be doubted) was actually ignored by philosophers at the level of _____.", "back": "valuation"}, {"front": "How does Nietzsche describe the relationship between the \"Will to Truth\" and the \"Will to Power\"?", "back": "The Will to Truth is a form of the Will to Power, as it is a desire to master reality by making it intelligible."}, {"front": "Nietzsche argues that the \"____-\" of an opinion is not necessarily an objection to it if it serves the flourishing of life.", "back": "falseness"}, {"front": "What does \"beyond good and evil\" mean specifically regarding the philosopher's version of those terms?", "back": "It means moving beyond the rigid opposition where \"truth\" is always good and \"falsity\" is always evil."}, {"front": "According to Nietzsche, what is the \"fundamental belief\" that characterizes metaphysicians of all times?", "back": "The belief in antitheses of values, or the idea that things of high value cannot originate from their opposites."}, {"front": "What does Nietzsche mean by describing philosophy as a \"tyrannical impulse\"?", "back": "It is a drive to dictate one's own morals and ideals to nature and force the world to mirror the philosopher."}, {"front": "In Nietzsche's analysis of the \"will,\" what are the sensations of \"away from which\" and \"towards which\"?", "back": "They are the plurality of sensations that constitute the feeling of moving from one state to another during volition."}, {"front": "How does grammar influence the scientific concept of the \"atom,\" according to Nietzsche?", "back": "It leads thinkers to assume a material particle (a subject) must exist behind every operating power (a predicate)."}, {"front": "Nietzsche identifies \"____-\" as the Greek principle of rational order that Stoics erroneously claimed to find in nature.", "back": "Logos"}, {"front": "What does Nietzsche mean by calling dogmatic philosophy a \"noble puerilism\"?", "back": "It is a necessary but immature stage of intellectual development, like a \"caricature\" that precedes a great work."}, {"front": "Nietzsche describes the feeling of \"freedom of the will\" as the emotion of supremacy over a part of oneself that _____.", "back": "must obey"}, {"front": "In the comparison of the will to a commonwealth, who does the \"Governing Class\" identify with?", "back": "The successes of the commonwealth (the actions resulting from the will)."}, {"front": "According to Nietzsche, why is the philosopher's morality \"decisive testimony\" of who they are?", "back": "It reveals the hierarchy and order in which the deepest impulses of their nature stand to each other."}, {"front": "Nietzsche claims that the assertion \"I think\" involves a retrospective connection with further \"____-\" to identify the activity as thinking.", "back": "knowledge"}, {"front": "What does Nietzsche suggest about the relationship between \"selfishness\" and \"the generous deed\"?", "back": "They might be essentially identical, with the latter being a subtle manifestation of the former."}, {"front": "How does Nietzsche describe the Will to Truth's effect on philosophers regarding risk?", "back": "It tempts them to many a \"hazardous enterprise\" and strange, perplexing questions."}, {"front": "Nietzsche says we should grow \"____-\" of the Will to Truth and its Sphinx-like questions about origin and value.", "back": "distrustful"}, {"front": "Concept: Causa Prima", "back": "Definition: The \"first cause\"; the ultimate origin that a philosophy attempts to create when it makes the world in its own image."}, {"front": "Why does Nietzsche label the belief in \"immediate certainties\" a \"contradictio in adjecto\"?", "back": "Because the terms \"immediate\" and \"certainty\" are linguistic contradictions that ignore the mediation of language and interpretation."}, {"front": "What does Nietzsche mean by \"species-preserving\" opinions?", "back": "Beliefs that allow the human species to survive and thrive, regardless of their objective truth value."}, {"front": "Nietzsche refers to the \"soul-superstition\" as having evolved into the modern \"____-\" superstition.", "back": "subject"}, {"front": "In Nietzsche's view, what governs the relations between different \"impulses\" in a person performing an act of philosophy?", "back": "A internal hierarchy of supremacy where one impulse acts as the \"Lord\" over the others."}, {"front": "How does Nietzsche describe the taste of the \"new order of philosophers\" he sees appearing?", "back": "They have tastes and inclinations that are the reverse of those previously prevalent, valuing the \"dangerous perhaps.\""}, {"front": "Nietzsche compares the gold and labor spent on dogmatic philosophy to the resources historically wasted on _____.", "back": "astrology"}, {"front": "What is the \"super-terrestrial\" pretension Nietzsche mentions in the context of ancient Asia and Egypt?", "back": "The dogmatic claims that provided the \"grand style\" for their religious and philosophical architecture."}, {"front": "What does Nietzsche suggest is the ultimate result of a complete \"renunciation of false opinions\"?", "back": "A negation or denial of life itself, as life requires certain \"untruths\" to function."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
