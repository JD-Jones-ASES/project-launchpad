    <style>
        .fc-container {

        .fc-counter {
            font-family: 'Cinzel', serif;

        /* Progress bar */
        .fc-progress {
            width: 100%;

        /* Toolbar */

        .fc-tool:hover {

        }
        .fc-tool.active {

        }

        /* Keyboard hint */

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;

            }

                gap: 0.5rem;

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Which character in 'The Brothers Karamazov' is associated with the argument that 'everything is lawful' if there is no soul immortality?", "back": "Ivan Karamazov"}, {"front": "How did Jean-Paul Sartre modify Ivan Karamazov's original nuanced argument about morality without God?", "back": "He sharpened it into the phrase 'If God does not exist, everything is permitted.'"}, {"front": "In Dostoevsky's view, the idea that 'everything is permitted' without God serves as a _____ for holding onto faith.", "back": "Reductio ad absurdum"}, {"front": "How does Nietzsche's response to the loss of divine moral sanction differ from Dostoevsky's?", "back": "Nietzsche sees it as a starting point for creating new values rather than a reason to return to faith."}, {"front": "Which Dostoevsky work did Nietzsche praise as the product of 'the only psychologist from whom I had something to learn'?", "back": "Notes from Underground"}, {"front": "While Dostoevsky's answer to human suffering is Christ, Nietzsche's answer is _____.", "back": "Amor fati"}, {"front": "What shared trait do Dostoevsky and Nietzsche possess regarding their analysis of modern thought?", "back": "Extraordinary psychological penetration and a refusal to accept easy answers."}, {"front": "Who is often referred to as the 'father of existentialism'?", "back": "Søren Kierkegaard"}, {"front": "According to Kierkegaard, what was the 'real crisis' of his time regarding religion?", "back": "The domestication of God and the reduction of Christianity to a social institution."}, {"front": "What philosopher exerted a deep influence on both Nietzsche and Kierkegaard, despite no evidence of them reading each other?", "back": "Arthur Schopenhauer"}, {"front": "Kierkegaard's 'leap of faith' demands that the individual confront God without the mediation of what?", "back": "Institutions, dogmas, or rational proofs."}, {"front": "How does Kierkegaard describe the nature of authentic faith?", "back": "An anguished, absurd commitment made in the teeth of uncertainty."}, {"front": "In the comparison of their 'leaps,' toward what does Nietzsche leap in a godless world?", "back": "The creation of human meaning"}, {"front": "In the comparison of their 'leaps,' toward what does Kierkegaard leap?", "back": "God"}, {"front": "Both Nietzsche and Kierkegaard are noted for their shared contempt for which social group?", "back": "The comfortable bourgeois who avoids existential confrontation."}, {"front": "Who authored the 2007 book 'A Secular Age'?", "back": "Charles Taylor"}, {"front": "Taylor defines the shift from a universal belief in God to belief as 'one option among many' as the process of _____.", "back": "Secularization"}, {"front": "In Charles Taylor's analysis, what is a 'porous self'?", "back": "A self open to transcendence and vulnerable to enchantment."}, {"front": "In Charles Taylor's analysis, what is a 'buffered self'?", "back": "A self closed off from transcendence and self-sufficient."}, {"front": "How does Taylor's view of the 'death of God' differ from Nietzsche's 'event' perspective?", "back": "Taylor sees it as a long, slow process of cultural transformation."}, {"front": "Unlike Nietzsche, how does Charles Taylor evaluate the outcome of secularization?", "back": "As a genuine loss and the foreclosure of possibilities of meaning."}, {"front": "Does Charles Taylor believe the move to a 'buffered self' is an irreversible final state?", "back": "No, he argues that new forms of spiritual experience are still possible."}, {"front": "Which early twenty-first-century movement does the text identify as the 'shallow response' Nietzsche mocked?", "back": "New Atheism"}, {"front": "Name the four prominent writers associated with 'New Atheism' mentioned in the text.", "back": "Richard Dawkins, Sam Harris, Christopher Hitchens, and Daniel Dennett."}, {"front": "According to Nietzsche's diagnosis, why is the optimism of New Atheists considered 'naive'?", "back": "They assume 'rationality' and 'humaneness' can survive without the God that underwrote them."}, {"front": "Nietzsche compares New Atheists to the 'laughing atheists in the marketplace' because they fail to reckon with what?", "back": "The consequences and meaning of the death of God."}, {"front": "What 'incoherence' did Nietzsche diagnose in secular thinkers who maintain Christian morality without the Christian God?", "back": "They keep the values (like human rights) while discarding the tradition that gave them authority."}, {"front": "According to Nietzsche's critique, from what tradition do values like 'compassion' and the 'reduction of suffering' originate?", "back": "A tradition rooted in the belief that human beings are made in the image of God."}, {"front": "Dietrich Bonhoeffer, a German Lutheran theologian, wrote about 'religionless Christianity' while imprisoned by which group?", "back": "The Nazis"}, {"front": "Bonhoeffer argued that Christianity must learn to live in a 'world come of age' without relying on God as a _____.", "back": "Hypothesis"}, {"front": "What was the central aim of the 1960s 'Death of God' theology?", "back": "To affirm the death of God as a theological event."}, {"front": "Which two thinkers are specifically mentioned in the context of 1960s 'Death of God' theology?", "back": "Altizer and Hamilton"}, {"front": "For Ivan Karamazov, the loss of soul immortality leads directly to the loss of _____.", "back": "Virtue"}, {"front": "What is the primary difference in the focus of the crisis for Nietzsche versus Kierkegaard?", "back": "Nietzsche focused on God's death; Kierkegaard focused on God's domestication."}, {"front": "Kierkegaard's fierce attack on the Danish state church accused it of replacing faith with what?", "back": "A cozy Sunday routine"}, {"front": "What does the 'buffered self' typically lack, according to Charles Taylor's framework?", "back": "Vulnerability to enchantment or openness to transcendence."}, {"front": "How do the 'laughing atheists' in the marketplace react to the news that God is dead?", "back": "They find it amusing and treat it as a simple intellectual victory."}, {"front": "In 'The Brothers Karamazov', what is the specific consequence of the absence of immortality?", "back": "Everything is lawful."}, {"front": "Which philosopher's critique of institutional Christianity is described as being 'as fierce as anything in Nietzsche'?", "back": "Søren Kierkegaard"}, {"front": "Nietzsche views the 'death of God' as the exposure of a life-denying _____.", "back": "Illusion"}, {"front": "According to the text, what is the 'madman’s complaint' against the atheists in the marketplace?", "back": "They are unserious about the consequences of God's death."}, {"front": "In the 'Dostoevsky–Nietzsche comparison,' what is the shared view of the death of God?", "back": "Both see it as a catastrophe affecting morality, politics, and individual meaning."}, {"front": "What is the 'direction' of the individual's requirement for facing ultimate questions in both Nietzsche and Kierkegaard?", "back": "The individual must face them alone."}, {"front": "Term: Secularization Thesis", "back": "Definition: The theory tracing the cultural shift from universal belief in God to belief as a non-default option."}, {"front": "Term: Amor fati", "back": "Definition: A Latin phrase meaning 'love of fate,' used by Nietzsche to describe the embrace of one's life and suffering."}, {"front": "What is the specific year associated with Nietzsche's 'death of God' diagnosis in the connection box?", "back": "1882"}, {"front": "What is the specific year associated with Dostoevsky's 'The Brothers Karamazov' in the text?", "back": "1880"}, {"front": "How does New Atheism characterize the triumph of reason over religion?", "back": "As an intellectual victory where science disproves superstition."}, {"front": "According to Charles Taylor, modern Western societies moved from a condition of universal belief to one where it is _____.", "back": "One option among many"}, {"front": "What does Nietzsche suggest is the true origin of 'rationality' and 'humaneness' in Western culture?", "back": "A Christian tradition rooted in divine command."}, {"front": "Kierkegaard's 'leap of faith' is described as being made in the teeth of _____.", "back": "Uncertainty"}, {"front": "Bonhoeffer's concept of living 'without God as a hypothesis' is called _____.", "back": "Religionless Christianity"}, {"front": "What does Taylor call the condition where the self is 'open to transcendence'?", "back": "Porous self"}, {"front": "Nietzsche argues that New Atheists are 'unserious' because they keep _____ while discarding its foundation.", "back": "Christian morality"}, {"front": "What was Kierkegaard's stance on the mediation of institutions in the individual's encounter with God?", "back": "He insisted it must be direct and without mediation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
