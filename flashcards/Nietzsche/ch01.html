<html lang="en">
<head>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Nietzsche.html">&larr; Back to The Dangerous Perhaps (Nietzsche)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Nietzsche's philosophical writing style differ significantly from traditional philosophers like Plato or Descartes?", "back": "Nietzsche does not build careful, step-by-step demonstrations, define terms precisely, or use them consistently. He often contradicts himself, exaggerates, insults, and uses layered irony.", "id": "fc01"}, {"front": "The text states Nietzsche's unconventional style is not a defect. What is it instead?", "back": "It is a deliberate method designed to reflect the messy, stranger, and more contradictory nature of reality, and to challenge the reader's assumptions.", "id": "fc02"}, {"front": "What is the 'aphoristic style' characteristic of most of Nietzsche's works?", "back": "It consists of short, self-contained, numbered sections that range from a single explosive sentence to several dense paragraphs, each presenting a perspective, provocation, or test.", "id": "fc03"}, {"front": "According to Nietzsche, why is the aphoristic style superior to systematic philosophy?", "back": "Nietzsche believed systematic philosophy is intellectually dishonest, as it pretends reality can be captured in a logical, contradiction-free structure. Aphorisms honor reality's inherent messiness and contradictions.", "id": "fc04"}, {"front": "What is the reader's responsibility when encountering Nietzsche's aphoristic style?", "back": "The reader must actively do the work of connecting the aphorisms and be willing to hold contradictory ideas in tension rather rather than resolving them prematurely.", "id": "fc05"}, {"front": "Why does Nietzsche intentionally contradict himself, sometimes even within the same page?", "back": "He practices perspectival philosophy: if there is no single absolute perspective, then philosophy must look at the same question from multiple angles, each revealing something different. The tension is often the point.", "id": "fc06"}, {"front": "How should a reader approach what appears to be a contradiction in Nietzsche's work?", "back": "Resist the urge to dismiss it. Instead, ask what each perspective reveals and what Nietzsche is testing. The tension between two contradictory claims is often precisely the point.", "id": "fc07"}, {"front": "What is the purpose of Nietzsche's provocative, shocking, or offensive statements?", "back": "He aims to unsettle readers and make them uncomfortable, believing that genuine thinking requires the courage to question deeply held, often unconscious, assumptions.", "id": "fc08"}, {"front": "How can a reader distinguish between different types of Nietzsche's provocations?", "back": "The art of reading involves discerning 'doors' (invitations to deeper insight) from 'walls' (genuine positions you may need to argue with). The line between sincerity and performance is often deliberately blurred.", "id": "fc09"}, {"front": "What is the most important aspect to focus on when reading Nietzsche, according to the text?", "back": "His greatest gift lies in his questions (e.g., 'Why do we value truth over untruth?'), which are what matter and will stay with the reader, rather than his often elusive answers.", "id": "fc10"}, {"front": "Explain Nietzsche's concept of 'Wiederkäuen' (chewing the cud) as advice for reading his work.", "back": "It's a metaphor for slow, deep, ruminative reading—taking a passage into one's mouth, swallowing it, bringing it back up, and chewing it again. It emphasizes not rushing and not assuming quick understanding.", "id": "fc11"}, {"front": "Where and when was Friedrich Nietzsche born, and what was his family's religious background?", "back": "Born on October 15, 1844, in Röcken, Prussian Saxony. His father and both grandfathers were Lutheran pastors, meaning his family was steeped in Protestant piety.", "id": "fc12"}, {"front": "How did his father's early death affect young Nietzsche?", "back": "His father died when Friedrich was four years old of 'softening of the brain,' leading to Nietzsche's persistent dread of having inherited a fatal neurological weakness.", "id": "fc13"}, {"front": "What ironic nickname did Nietzsche's schoolmates give him, and why?", "back": "They called him 'the little pastor' for his ability to recite Bible verses from memory, which is ironic given his later fierce opposition to Christianity.", "id": "fc14"}, {"front": "How did Schulpforta, the prestigious boarding school, influence Nietzsche?", "back": "Its rigorous classical curriculum (heavy on Greek and Latin) permanently shaped his prose style and cultivated his passion for classical philology, which became his academic profession.", "id": "fc15"}, {"front": "What significant health challenges did Nietzsche face throughout his life, and why is this important to remember?", "back": "He suffered from chronic migraines and digestive ailments. Much of his philosophy was written in physical pain, by a man who rarely enjoyed a full day of health, providing important context for his work.", "id": "fc16"}, {"front": "What 'decisive event' occurred during Nietzsche's time at Leipzig University in 1865?", "back": "He discovered Arthur Schopenhauer's *The World as Will and Representation*, which he described as a philosophical conversion experience that struck him 'like a thunderbolt'.", "id": "fc17"}, {"front": "What was Arthur Schopenhauer's core philosophical idea that profoundly influenced Nietzsche?", "back": "Schopenhauer argued that fundamental reality is a blind, irrational Will—a purposeless striving driving all nature, including humans. Because the Will can never be satisfied, existence is fundamentally suffering.", "id": "fc18"}, {"front": "How did Nietzsche initially react to Schopenhauer's philosophy, and how did he eventually diverge?", "back": "Nietzsche was a devoted Schopenhauerian for several years, deeply shaped by his analysis of suffering. However, he eventually rejected Schopenhauer's pessimistic conclusions, moving from 'deny life' to 'affirm life, even its suffering'.", "id": "fc19"}, {"front": "What was remarkable about Nietzsche's appointment as professor of classical philology at the University of Basel?", "back": "In 1869, at the age of twenty-four, he was appointed without having completed his doctorate (it was awarded retroactively based on his published work), making him the youngest person ever to hold the chair.", "id": "fc20"}, {"front": "What intellectual shift occurred for Nietzsche during his time at Basel, despite his academic profession?", "back": "His intellectual energies began pulling him away from pure classical scholarship (philology) and increasingly towards philosophy.", "id": "fc21"}, {"front": "Who was Richard Wagner, and what was the nature of his early relationship with Nietzsche?", "back": "Wagner was the most famous and controversial composer in Europe. Nietzsche, aged 24, was immediately and intensely captivated by the 55-year-old Wagner's brilliance, charisma, and his ambitious artistic project, *Der Ring des Nibelungen*.", "id": "fc22"}, {"front": "What was the title of Nietzsche's first book, published in 1872, and what was its connection to Wagner?", "back": "His first book was *The Birth of Tragedy*. It was in many ways a product of his profound admiration and intense friendship with Richard Wagner at that time.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
