<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central question explored in the third essay of Nietzsche's Genealogy of Morals?", "back": "What do ascetic ideals mean?"}, {"front": "According to Nietzsche, what is the primary reason for the historical success of the ascetic ideal?", "back": "It gave suffering a meaning."}, {"front": "What can human beings endure as long as they believe their pain serves a specific purpose?", "back": "Extraordinary physical or emotional suffering."}, {"front": "What specific type of suffering does Nietzsche claim is impossible for humans to endure?", "back": "Meaningless suffering."}, {"front": "Which psychiatrist survival of Nazi concentration camps validated Nietzsche's views on the human need for meaning?", "back": "Viktor Frankl."}, {"front": "What is the name of the therapeutic approach built by Viktor Frankl around the human need for meaning?", "back": "Logotherapy."}, {"front": "In the Nietzschean quote used by Viktor Frankl, he who has a _____ to live for can bear almost any how.", "back": "why"}, {"front": "How does the ascetic ideal prevent suffering from being perceived as absurd?", "back": "By providing explanations such as sin, fallen worlds, or discipline of the flesh."}, {"front": "According to Nietzsche, what is the ascetic priest's primary function regarding suffering?", "back": "Making suffering bearable by making it intelligible."}, {"front": "What is the final line of Nietzsche's Genealogy of Morals?", "back": "Rather would man will nothingness than not will."}, {"front": "How does Nietzsche define the fundamental nature of human beings in the context of the Genealogy?", "back": "They are creatures that will."}, {"front": "What happens to the human will when no positive goals or values are available to organize existence?", "back": "It attaches itself to a negative goal."}, {"front": "How does Nietzsche’s view of the will's persistence differ from Schopenhauer’s?", "back": "Nietzsche believed the will cannot be extinguished, only redirected."}, {"front": "What state of existence did Schopenhauer believe could be achieved through ascetic self-denial?", "back": "A state of will-less rest."}, {"front": "Nietzsche considers the idea of a quieted or extinguished will to be a _____.", "back": "fantasy"}, {"front": "What does the term 'will to nothingness' describe in Nietzschean psychology?", "back": "The will directed toward the denial of life and the rejection of the body."}, {"front": "Why is 'willing nothingness' still preferable to humans than having nothing to will?", "back": "It avoids the paralysis of having no direction or purpose at all."}, {"front": "According to Nietzsche, a person who cannot will at all has ceased to be _____.", "back": "human"}, {"front": "What motivated Nietzsche's strategic respect for the ascetic priest despite his hostility toward Christianity?", "back": "The priest's extraordinary ingenuity as a strategist."}, {"front": "Nietzsche's admiration for the priest's creativity is analogous to his view on which historical development?", "back": "The slave revolt in morality."}, {"front": "Why does Nietzsche believe the 'weak' are often more creative than the 'strong'?", "back": "Their desperate situation demands ingenuity for survival."}, {"front": "In the third essay, Nietzsche characterizes the ascetic priest as a doctor for the _____.", "back": "sick"}, {"front": "How does the ascetic priest keep the suffering patient alive?", "back": "By providing a reason for their existence through the reinterpretation of suffering."}, {"front": "What internal state does the priest link to suffering to make it purified and intelligible?", "back": "Guilt."}, {"front": "What is the long-term consequence of the priest reinterpreting suffering as guilt?", "back": "It creates a permanent condition of self-punishment that worsens the pain."}, {"front": "To what does Nietzsche compare the priest’s method of masking symptoms with harmful remedies?", "back": "A quack doctor."}, {"front": "What does Nietzsche identify as the most modern form of the ascetic ideal?", "back": "Science."}, {"front": "Why is the scientific commitment to truth considered a form of the ascetic ideal?", "back": "It requires the sacrifice of comforting illusions through a form of self-denial."}, {"front": "What makes the 'will to nothingness' distinct from the 'absence of will'?", "back": "It is an active striving directed toward annihilation rather than a cessation of striving."}, {"front": "According to the text, the ascetic priest does not cure the disease but keeps the patient _____.", "back": "alive"}, {"front": "What organizing principle does the human will require to justify its existence?", "back": "A goal or direction for striving."}, {"front": "What does Nietzsche argue is the only framework that has successfully given meaning to suffering?", "back": "The ascetic ideal."}, {"front": "In the ascetic framework, humans are told they suffer because their _____ is weak and must be disciplined.", "back": "flesh"}, {"front": "Nietzsche describes the priest's patient population as people who need a reason to _____.", "back": "go on living"}, {"front": "What is the result of suffering that seems truly meaningless according to Nietzsche's insight?", "back": "Absurdity and psychological paralysis."}, {"front": "According to Nietzsche, the will can only be _____ rather than extinguished.", "back": "redirected"}, {"front": "The priest's remedy is described as worse than the disease because it deepens rather than _____ the original pain.", "back": "resolves"}, {"front": "What quality of the third essay makes it stand out from the other two in the Genealogy?", "back": "Its structural complexity."}, {"front": "What does the 'will to nothingness' provide that prevents the cessation of being human?", "back": "A purpose or goal, even if it is negative."}, {"front": "Under what condition can humans endure emotional devastation or physical torture?", "back": "As long as they believe the pain means something."}, {"front": "Nietzsche argues that the ascetic ideal was dominant not because it was true, but because it was _____.", "back": "the only ideal available"}, {"front": "What does the ascetic priest use to mask the symptoms of the sick?", "back": "A remedy that creates new and worse symptoms."}, {"front": "Concept: The 'Will to Nothingness'.", "back": "Definition: A negative redirection of the will toward self-denial and the rejection of life."}, {"front": "In Nietzsche's view, the priest treats suffering as if it were a form of _____.", "back": "guilt"}, {"front": "What happens to the human will when the 'old gods have died' and no new values are created?", "back": "It turns toward nihilistic willing."}, {"front": "Nietzsche's treatment of the ascetic priest is described not as moral respect, but as _____ respect.", "back": "strategic"}, {"front": "What is the consequence of having nothing to will at all?", "back": "The paralysis of the human essence."}, {"front": "Nietzsche claims that man would sooner have the _____ for his purpose than not will.", "back": "void"}, {"front": "What characterizes the priest's пациентов in terms of their psychological state?", "back": "They are weak, lost, and suffering."}, {"front": "How does the priest make suffering intelligible?", "back": "By framing it as a purifying punishment for sin or guilt."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
