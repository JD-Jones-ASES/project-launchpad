    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;

        .fc-breadcrumb a {

        /* Card */

            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;

        .fc-front {

            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);

            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;

        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "On what date and in what village was Friedrich Nietzsche born?", "back": "October 15, 1844, in R\\\"ocken, Saxony."}, {"front": "What was the profession of Friedrich Nietzsche's father and both of his grandfathers?", "back": "Lutheran pastor."}, {"front": "What medical diagnosis for Carl Ludwig Nietzsche's death haunted Friedrich throughout his life?", "back": "Softening of the brain."}, {"front": "Following the death of his father, in what city was Nietzsche raised in a household of women?", "back": "Naumburg."}, {"front": "What ironic nickname did Nietzsche's schoolmates give him due to his ability to recite Bible verses?", "back": "The little pastor."}, {"front": "Name the prestigious German boarding school Nietzsche attended starting at age fourteen.", "back": "Schulpforta."}, {"front": "Which academic discipline, involving the study of ancient Greek and Latin texts, became Nietzsche's profession?", "back": "Classical philology."}, {"front": "What physical ailments plagued Nietzsche for the majority of his adult life?", "back": "Migraines and digestive ailments."}, {"front": "Who was the influential professor at Leipzig who recognized Nietzsche's brilliance and recommended him for a professorship?", "back": "Friedrich Ritschl."}, {"front": "Which philosopher's work did Nietzsche discover in a secondhand bookshop in 1865, leading to a \"philosophical conversion\"?", "back": "Arthur Schopenhauer."}, {"front": "How did Schopenhauer describe the fundamental reality underlying all phenomena?", "back": "A blind, irrational, and purposeless Will."}, {"front": "In what major way did Nietzsche eventually differ from Schopenhauer regarding the value of existence?", "back": "Nietzsche affirmed life and its suffering rather than denying the will to live."}, {"front": "At what age was Nietzsche appointed as a professor of classical philology at the University of Basel?", "back": "Twenty-four."}, {"front": "What was unusual about the University of Leipzig's decision to grant Nietzsche his doctorate?", "back": "It was awarded retroactively without a dissertation defense based on his published work."}, {"front": "In November 1868, Nietzsche met which famous and controversial composer who became a close friend?", "back": "Richard Wagner."}, {"front": "What four-opera cycle was Richard Wagner working on during his friendship with Nietzsche?", "back": "Der Ring des Nibelungen."}, {"front": "What was the title of Nietzsche's first book, published in 1872?", "back": "The Birth of Tragedy."}, {"front": "What specific Wagnerian opera did Nietzsche view as a \"capitulation to Christianity\"?", "back": "Parsifal."}, {"front": "Identify the factors in Richard Wagner's ideology that eventually led Nietzsche to break their friendship.", "back": "German nationalism, virulent anti-Semitism, and megalomania."}, {"front": "Who was the Russian woman Nietzsche met in 1882 whom he considered an intellectual equal?", "back": "Lou Salom\\\\'e."}, {"front": "What term did Nietzsche use to describe the intellectual commune formed by himself, Lou Salom\\\\'e, and Paul R\\\\'ee?", "back": "The holy trinity."}, {"front": "What provocative object is Lou Salom\\\\'e holding in the famous 1882 photograph with Nietzsche and R\\\\'ee?", "back": "A whip."}, {"front": "What was Lou Salom\\\\'e's response to Nietzsche's marriage proposals?", "back": "She refused them, preferring intellectual friendship over romance."}, {"front": "Which person worked to \"poison\" the relationship between Nietzsche and Lou Salom\\\\'e out of jealousy and dislike?", "back": "Elisabeth F\\\"orster-Nietzsche."}, {"front": "Identify one famous intellectual associate of Lou Salom\\\\'e later in her life, besides Nietzsche.", "back": "Sigmund Freud (or Rainer Maria Rilke)."}, {"front": "In what year did Nietzsche resign his professorship at Basel due to ill health?", "back": "1879."}, {"front": "During his \"Wandering Years,\" where did Nietzsche typically spend his summers?", "back": "Sils-Maria in the Swiss Alps."}, {"front": "Approximately how many copies of Beyond Good and Evil were sold in its first year?", "back": "Fewer than 200 copies."}, {"front": "List three major works written by Nietzsche during his lonely decade of wandering (1879–1889).", "back": "The Gay Science, Thus Spoke Zarathustra, and On the Genealogy of Morals."}, {"front": "In which city did Nietzsche suffer his final mental collapse in January 1889?", "back": "Turin."}, {"front": "What iconic event allegedly triggered Nietzsche's mental breakdown in the Piazza Carlo Alberto?", "back": "Witnessing a coachman beating a horse."}, {"front": "What two names did Nietzsche use to sign his \"madness letters\" (Wahnsinnsbriefe) sent after his collapse?", "back": "Dionysos and The Crucified."}, {"front": "On what date did Friedrich Nietzsche die?", "back": "August 25, 1900."}, {"front": "Who took control of the Nietzsche Archive and shaped his legacy after his collapse?", "back": "Elisabeth F\\\"orster-Nietzsche."}, {"front": "What was the name of the racially \"pure\" German colony founded by Bernhard F\\\"orster in Paraguay?", "back": "Nueva Germania."}, {"front": "What was Nietzsche's personal view on anti-Semitism and Bernhard F\\\"orster's colonial scheme?", "back": "He was appalled by anti-Semitism and thought the colonial scheme was idiotic."}, {"front": "What is the title of the posthumously compiled book that distorted Nietzsche's philosophy to support nationalist views?", "back": "The Will to Power."}, {"front": "How did Elisabeth F\\\"orster-Nietzsche manipulate her brother's unpublished notebooks for publication?", "back": "She selected, arranged, and altered passages to create the impression of a systematic treatise."}, {"front": "What symbolic item did Elisabeth give to Adolf Hitler during his visit to the Nietzsche Archive in 1934?", "back": "Nietzsche's walking stick."}, {"front": "Which scholar is noted for recovering Nietzsche's legacy from his sister's distortions?", "back": "Walter Kaufmann."}, {"front": "What did Nietzsche describe as the \"thunderbolt\" of his time in Leipzig?", "back": "The discovery of Arthur Schopenhauer's philosophy."}, {"front": "In Schopenhauer's view, why is existence fundamentally suffering?", "back": "Because the blind Will can never be satisfied."}, {"front": "The University of Basel appointed Nietzsche to his chair in 1869 despite his lack of a ____.", "back": "Doctorate."}, {"front": "Where was the estate of Richard and Cosima Wagner located, where Nietzsche spent his \"happiest experiences\"?", "back": "Tribschen, on Lake Lucerne."}, {"front": "Nietzsche received the news of Wagner's death while he was writing which major work?", "back": "Thus Spoke Zarathustra."}, {"front": "Who was the philosopher and psychologist that introduced Nietzsche to Lou Salom\\\\'e?", "back": "Paul R\\\\'ee."}, {"front": "What book did Lou Salom\\\\'e publish in 1894 regarding Nietzsche's thought?", "back": "Friedrich Nietzsche in seinen Werken."}, {"front": "How did Nietzsche describe his own mental state in the days leading up to his collapse in the \"madness letters\"?", "back": "He declared himself the ruler of the world."}, {"front": "Which relative cared for Nietzsche in his final years of mental decline before his sister took over?", "back": "His mother."}, {"front": "Term: Wahnsinnsbriefe", "back": "Definition: The \"madness letters\" sent by Nietzsche to friends and public figures immediately following his mental collapse."}, {"front": "Nietzsche's family was \"steeped in Protestant _____,\" making his later views on Christianity striking.", "back": "Piety."}, {"front": "Which school's curriculum is credited with permanently shaping Nietzsche's rigorous prose style?", "back": "Schulpforta."}, {"front": "True or False: Nietzsche enjoyed consistent physical health during the decade he produced his greatest works.", "back": "False (he was half-blind and wracked by migraines)."}, {"front": "What was the eventual fate of Bernhard F\\\"orster in Paraguay?", "back": "He died in 1889, likely by suicide."}, {"front": "The compilation known as The Will to Power was actually constructed from Nietzsche's unpublished ____.", "back": "Notebooks."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
