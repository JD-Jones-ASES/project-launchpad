    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

    <script>
    var CARDS = [{"front": "What is the literal translation of the German word \"Uber\" in Nietzsche's term \"Ubermensch\"?", "back": "Over or beyond."}, {"front": "What is the literal translation of the German word \"Mensch\" in Nietzsche's term \"Ubermensch\"?", "back": "Human being."}, {"front": "Which translator preferred the term \"overman\" for \"Ubermensch\" to avoid comic-book associations?", "back": "Walter Kaufmann."}, {"front": "Concept: The \"Ubermensch\"", "back": "Definition: A metaphor for human self-overcoming through the creation of personal values. Example: A person moving beyond conventional morality."}, {"front": "In which specific work does Nietzsche primarily use the term \"Ubermensch\"?", "back": "Thus Spoke Zarathustra."}, {"front": "The \"Ubermensch\" is described by Nietzsche as a(n) _____ toward which human greatness might aspire, rather than a political blueprint.", "back": "Horizon"}, {"front": "Why should readers be skeptical of the book titled \"The Will to Power\"?", "back": "It is a posthumous compilation altered by Nietzsche's sister to fit her ideological agenda."}, {"front": "Who compiled and rearranged Nietzsche's notebook entries to create \"The Will to Power\"?", "back": "Elisabeth Förster-Nietzsche."}, {"front": "Which two Italian scholars produced the definitive critical edition of Nietzsche's works between the 1960s and 1980s?", "back": "Giorgio Colli and Mazzino Montinari."}, {"front": "How does the Colli and Montinari edition differ from Elisabeth's \"The Will to Power\" regarding notebook entries?", "back": "The entries are published chronologically as Nietzsche wrote them."}, {"front": "Nietzsche broke his friendship with the composer _____ in part because of the latter's increasing anti-Semitism.", "back": "Richard Wagner"}, {"front": "Nietzsche broke with his sister Elisabeth over her marriage to which anti-Semitic agitator?", "back": "Bernhard Förster."}, {"front": "In \"Beyond Good and Evil\" 251, Nietzsche calls for the _____ of anti-Semitic agitators from Germany.", "back": "Expulsion"}, {"front": "According to \"Beyond Good and Evil\" 251, which group does Nietzsche praise as the \"strongest, toughest, and purest race\" in Europe?", "back": "The Jews."}, {"front": "In an 1887 letter to his sister, Nietzsche stated that her association with an anti-Semitic chief expressed a \"_____\" to his whole way of life.", "back": "Foreignness"}, {"front": "What derogatory terms did Nietzsche use for anti-Semites in his private correspondence?", "back": "Failures and abortions."}, {"front": "Approximately how many years before Hitler's rise to power did Friedrich Nietzsche die?", "back": "Thirty-three years."}, {"front": "What was Nietzsche's general attitude toward German nationalism as expressed in \"Ecce Homo\"?", "back": "He loathed it and despised the German state."}, {"front": "How did Nietzsche view his brother-in-law's attempt to found a racially pure Aryan colony in Paraguay?", "back": "He viewed it as a catastrophic embarrassment."}, {"front": "Which organization did Elisabeth Förster-Nietzsche use to cultivate relationships with National Socialism?", "back": "The Nietzsche Archive."}, {"front": "Who authored the 1950 study \"Nietzsche: Philosopher, Psychologist, Antichrist\" to dismantle the Nazi reading of Nietzsche?", "back": "Walter Kaufmann."}, {"front": "In \"Beyond Good and Evil\" 232, Nietzsche claims that when a woman has _____ inclinations, there is generally something wrong with her sexually.", "back": "Scholarly"}, {"front": "Nietzsche regarded _____ as his intellectual equal and wanted to collaborate with her philosophically.", "back": "Lou Salomé"}, {"front": "Who suggested the staging of the famous 1882 photograph where Lou Salomé holds a whip over Nietzsche and Paul Rée?", "back": "Friedrich Nietzsche."}, {"front": "What personal event might have colored Nietzsche's later bitter remarks about women in his published works?", "back": "His rejection by Lou Salomé."}, {"front": "Nietzsche does not advocate for nihilism; instead, he _____ it as a crisis of modernity.", "back": "Diagnoses"}, {"front": "What is the core conviction of nihilism according to Nietzsche's diagnosis?", "back": "The conviction that life has no meaning or that values are baseless."}, {"front": "Nietzsche describes the announcement \"God is dead\" as a _____ event rather than a triumphant one.", "back": "Catastrophic"}, {"front": "Nietzsche views nihilism as the result of the collapse of the religious and _____ foundations of Western civilization.", "back": "Metaphysical"}, {"front": "Term: Transvaluation of all values", "back": "Definition: An attempt to create new values that affirm life in the absence of transcendent guarantees."}, {"front": "List three Nietzschean concepts intended to answer the crisis of nihilism.", "back": "Eternal recurrence, amor fati, and the Ubermensch."}, {"front": "Why did Nietzsche attack Christian morality and Platonic metaphysics if he was not a nihilist?", "back": "He was identifying the systems whose collapse led to the modern crisis of nihilism."}, {"front": "According to the text, the Nazi version of Nietzsche is a \"carefully constructed _____\" created by his sister.", "back": "Fiction"}, {"front": "What phrase did Nietzsche use in a letter to describe anti-Semites as people whose association filled him with \"ire or melancholy\"?", "back": "Anti-Semitic chief."}, {"front": "Nietzsche's published comments on women in \"Beyond Good and Evil\" are described by the text as ranging from patronizing to _____.", "back": "Genuinely offensive."}, {"front": "What is the primary question driving Nietzsche’s entire body of work?", "back": "How do we create values that can survive the death of God?"}, {"front": "Nietzsche asked his publisher specifically not to advertise his books in _____ journals.", "back": "Anti-Semitic"}, {"front": "Nietzsche's loathing of the \"mass politics\" of his time suggests he would have despised which later 20th-century movement?", "back": "The Nazi regime (National Socialism)."}, {"front": "What does the text identify as the single most misused term in all of philosophy?", "back": "Ubermensch."}, {"front": "According to \"Beyond Good and Evil\" 239, Nietzsche claimed that \"Woman wants to be taken, to be accepted as a _____.\"", "back": "Possession"}, {"front": "The Colli and Montinari edition \"demolished the authority\" of which specific text?", "back": "The Will to Power."}, {"front": "What role did Walter Kaufmann play in the post-war understanding of Nietzsche's works?", "back": "He systematically dismantled the Nazi reading and provided standard English translations."}, {"front": "Nietzsche identified the collapse of Western values as a result of the \"death\" of what?", "back": "God."}, {"front": "True or False: The Ubermensch represents an existing human being or racial category.", "back": "False."}, {"front": "In the context of self-overcoming, the Ubermensch moves beyond which conventional binary?", "back": "Good and evil."}, {"front": "Nietzsche’s sister, Elisabeth, altered her brother's material to fit her own _____ agenda.", "back": "Ideological"}, {"front": "The \"Will to Power\" concept appears throughout Nietzsche's _____ works, unlike the compiled book of the same name.", "back": "Published"}, {"front": "Nietzsche mocked the idea of \"_____ purity,\" which was later central to Nazi ideology.", "back": "Racial"}, {"front": "Nietzsche's sister, Elisabeth Förster-Nietzsche, controlled the _____ Archive, which she used to promote National Socialism.", "back": "Nietzsche"}, {"front": "Nietzsche claimed in \"Ecce Homo\" that he was not sure he would get along with himself if he were a(n) _____.", "back": "German"}, {"front": "The 1882 photograph of Lou Salomé, Nietzsche, and Paul Rée is described as a \"self-aware _____\" against simple readings of his misogyny.", "back": "Provocation"}, {"front": "Nietzsche's philosophy is presented as a(n) _____ to the problem of nihilism.", "back": "Response"}, {"front": "According to the text, a reader who thinks Nietzsche preached \"nothing matters\" has _____.", "back": "Failed to understand him (or been failed by the book)."}, {"front": "Nietzsche's opposition to anti-Semitism is described as emphatic, consistent, and _____.", "back": "Furious"}, {"front": "What two things does Nietzsche demand \"above all else,\" which the text says we owe him in return?", "back": "Honesty."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
