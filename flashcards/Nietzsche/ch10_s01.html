<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 10, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What specific method does Nietzsche provide for investigating the origin of values?", "back": "The genealogical method."}, {"front": "Beyond a method, what specific 'disposition' does Nietzsche's work encourage?", "back": "The courage to question inherited values even when it is dangerous."}, {"front": "In 'Beyond Good and Evil' 42, Nietzsche describes a 'new species of philosopher' who ventures a _____.", "back": "dangerous perhaps"}, {"front": "Why does Nietzsche label the philosopher of the future a 'tempter'?", "back": "They seduce us into thinking thoughts we would otherwise prefer to avoid."}, {"front": "According to Martin Heidegger, Nietzsche was the 'last _____' of the West.", "back": "metaphysician"}, {"front": "What did Heidegger believe Nietzsche's philosophy did to the Western metaphysical tradition?", "back": "Brought it to its ultimate climax and total collapse."}, {"front": "Which philosopher wrote the influential and controversial two-volume work titled 'Nietzsche' based on lectures from 1936–1940?", "back": "Martin Heidegger."}, {"front": "Jean-Paul Sartre's famous dictum '_____ precedes _____' echoes Nietzsche's rejection of a fixed human nature.", "back": "existence; essence"}, {"front": "According to Sartre, what is the 'terrifying' consequence of the death of God?", "back": "Human beings have no objective foundation for their choices."}, {"front": "Which philosopher wrote 'The Myth of Sisyphus' to grapple with the question of whether life is worth living without inherent meaning?", "back": "Albert Camus."}, {"front": "What is Albert Camus's secular, Mediterranean variation on Nietzsche's 'amor fati'?", "back": "The command that 'one must imagine Sisyphus happy.'"}, {"front": "Why did Sigmund Freud claim he avoided reading Nietzsche's works?", "back": "To preserve his own originality."}, {"front": "Nietzsche's 'genealogy of morals' is viewed as an anticipation of which 20th-century psychological discipline?", "back": "Psychoanalysis."}, {"front": "Which philosopher coined the term 'masters of suspicion' for Nietzsche, Marx, and Freud?", "back": "Paul Ricœur."}, {"front": "According to Paul Ricœur, what 'hidden meaning' did Karl Marx see behind human behavior?", "back": "Economic interest."}, {"front": "According to Paul Ricœur, what 'hidden meaning' did Sigmund Freud see behind human behavior?", "back": "Unconscious desire."}, {"front": "According to Paul Ricœur, what 'hidden meaning' did Friedrich Nietzsche see behind human behavior?", "back": "The will to power."}, {"front": "Which postmodern thinker applied the genealogical method to the history of the prison and the clinic?", "back": "Michel Foucault."}, {"front": "In 'Discipline and Punish', Foucault argues that modern punishment shifted from public spectacle to invisible _____.", "back": "disciplinary control"}, {"front": "What was the name of Jacques Derrida's philosophical method, which drew on Nietzsche's critique of metaphysical binaries?", "back": "Deconstruction."}, {"front": "Concept: Perspectivism", "back": "Definition: The view that all knowledge is situated and shaped by the knower's drives and interests."}, {"front": "How does Nietzsche's perspectivism differ from 'lazy relativism'?", "back": "It maintains that some perspectives are more honest and life-affirming than others."}, {"front": "Which historical figure was responsible for the selectively edited 'proto-fascist' caricature of Nietzsche?", "back": "Elisabeth Förster-Nietzsche (his sister)."}, {"front": "The Nazi caricature of Nietzsche celebrated him as a herald of the '_____ _____,' which they misinterpreted as a Nordic racial type.", "back": "blonde beast"}, {"front": "Nietzsche famously broke with his sister over her husband's _____, proving he was not a proto-Nazi.", "back": "racism (or anti-Semitism)"}, {"front": "Which scholar's 1950 book 'Nietzsche: Philosopher, Psychologist, Antichrist' is credited with recovering the 'real' Nietzsche?", "back": "Walter Kaufmann."}, {"front": "Which Nietzsche scholar wrote 'Life as Literature' (1985), viewing Nietzsche's work as a project of aesthetic self-creation?", "back": "Alexander Nehamas."}, {"front": "What is the primary argument used by those who view Nietzsche as a 'dangerous elitist'?", "back": "He despised democracy and was indifferent to the suffering of ordinary people."}, {"front": "What is the primary argument used by those who view Nietzsche as a 'liberator'?", "back": "He freed thinkers from dogma and showed how to create new values."}, {"front": "According to the source, Nietzsche's 'gift' to readers lies in his _____, rather than his answers.", "back": "questions"}, {"front": "Nietzsche diagnosed _____ as the defining crisis of modernity.", "back": "nihilism"}, {"front": "Nietzsche attacks the foundations of morality to determine if we can create values that do not depend on _____.", "back": "God (or metaphysics/self-deception)"}, {"front": "Rather than a triumphant declaration, Nietzsche's 'death of God' is described as a 'terrifying _____' of modernity.", "back": "diagnosis"}, {"front": "What is the existential purpose of Nietzsche's doctrine of 'eternal recurrence'?", "back": "To serve as a test for the ultimate affirmation of life."}, {"front": "Term: Amor Fati", "back": "Definition: The 'love of fate'; the unconditional affirmation of existence exactly as it is."}, {"front": "Why did Nietzsche despise the Nazi-style cult of 'blood and soil'?", "back": "He regarded it as a form of 'herd stupidity.'"}, {"front": "Foucault used Nietzsche's genealogy to expose the _____ concealed behind the humanitarian language of prison 'reform.'", "back": "will to power"}, {"front": "Nietzsche's critique of binaries like 'truth/falsity' and 'good/evil' is a foundational insight of which 20th-century movement?", "back": "Postmodernism."}, {"front": "Which philosopher offered careful analytical reconstructions of Nietzsche's arguments, continuing Walter Kaufmann's work?", "back": "Richard Schacht."}, {"front": "Which biographer placed Nietzsche's ideas in their full cultural and biographical context in a 2000 publication?", "back": "Rüdiger Safranski."}, {"front": "The 'dangerous perhaps' is described as an invitation to examine the origins of one's values and live _____.", "back": "authentically"}, {"front": "Why would Nietzsche have 'despised followers'?", "back": "He insisted that every serious thinker must find their own individual path."}, {"front": "In Nietzsche's perspectivism, what determines the nature of knowledge?", "back": "The knower's drives and interests."}, {"front": "What 'hidden meaning' did Paul Ricœur identify as the core of Nietzsche's suspicion?", "back": "The will to power."}, {"front": "Which academic movement was founded partly on Nietzsche's idea that philosophical categories are valuations rather than neutral", "back": "Postmodernism."}, {"front": "The term for Nietzsche's unpublished, selectively edited fragments used by the Nazis is the _____.", "back": "Nachlass"}, {"front": "Nietzsche's 'amor fati' is a response to despair that offers _____ of existence rather than optimism or hope.", "back": "unconditional affirmation"}, {"front": "How did Foucault view the evolution of punishment from public spectacle to modern prisons?", "back": "As a shift toward invisible disciplinary control."}, {"front": "What is the primary difference between Nietzsche's perspectivism and relativistic 'herd' thinking?", "back": "Perspectivism demands rigor, honesty, and a distinction between 'life-affirming' and 'lazy' views."}, {"front": "Nietzsche's concept of the 'new philosopher' in BGE 42 centers on the willingness to risk the '_____ _____.'", "back": "dangerous perhaps"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
