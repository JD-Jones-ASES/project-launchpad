<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What literary genre does Nietzsche employ for 'Thus Spoke Zarathustra'?", "back": "A philosophical novel or prose poem."}, {"front": "In 'Thus Spoke Zarathustra', Nietzsche uses a parody of which historical text?", "back": "The Bible."}, {"front": "Which of Nietzsche's works is described as his literary masterpiece and most sustained vision?", "back": "Thus Spoke Zarathustra."}, {"front": "What is the primary linguistic style used in 'Thus Spoke Zarathustra'?", "back": "A prophetic or oracular style."}, {"front": "Which work contains the most poetic and least systematic form of the 'Ubermensch'?", "back": "Thus Spoke Zarathustra."}, {"front": "What three major Nietzschean ideas first appear in their most poetic form in 'Zarathustra'?", "back": "The Ubermensch, the eternal recurrence, and the will to power."}, {"front": "Which works should be read to provide grounding before attempting 'Thus Spoke Zarathustra'?", "back": "Beyond Good and Evil, On the Genealogy of Morals, and The Gay Science."}, {"front": "Who provided the 2005 literary translation of 'Thus Spoke Zarathustra'?", "back": "Graham Parkes."}, {"front": "Who translated 'Thus Spoke Zarathustra' for the 2006 Cambridge Texts series?", "back": "Adrian Del Caro."}, {"front": "What is the nature of Nietzsche's 1888 work 'Ecce Homo'?", "back": "It is an intellectual autobiography."}, {"front": "In 'Ecce Homo', Nietzsche includes provocative chapter titles such as 'Why I Am So _____'.", "back": "Wise"}, {"front": "What is the scholarly term for Nietzsche's performance in 'Ecce Homo' where he creates a philosophical persona?", "back": "Self-mythologizing."}, {"front": "Which individual heavily edited 'Ecce Homo' before its publication in 1908?", "back": "Elisabeth (Nietzsche's sister)."}, {"front": "Which work serves as Nietzsche's own guide to the self-understanding of his previous books?", "back": "Ecce Homo."}, {"front": "What is the subtitle of 'Twilight of the Idols'?", "back": "How to Philosophize with a Hammer."}, {"front": "In 'Twilight of the Idols', the metaphor of the hammer refers to what specific instrument?", "back": "A tuning fork."}, {"front": "In 'Twilight of the Idols', what does Nietzsche do to the 'idols' of philosophy and morality?", "back": "He taps them to see if they ring hollow."}, {"front": "What does Nietzsche define as a 'hollow idol'?", "back": "A concept that sounds impressive but contains no substance."}, {"front": "Which book is considered Nietzsche's 'greatest hits' or best short introduction to his mature thought?", "back": "Twilight of the Idols."}, {"front": "The title 'Die fröhliche Wissenschaft' refers to the Provencal troubadour tradition known as _____.", "back": "Gai saber"}, {"front": "What is the English translation for the Provencal term 'gai saber'?", "back": "The art of poetry."}, {"front": "In 'The Gay Science', Nietzsche argues that knowledge should be pursued as _____ rather than grim duty.", "back": "Delight"}, {"front": "Which section of 'The Gay Science' contains Nietzsche's most mature and nuanced thinking?", "back": "The fifth book (added in 1887)."}, {"front": "Which section of 'The Gay Science' (GS) discusses the 'death of God'?", "back": "GS 125."}, {"front": "In 'The Gay Science', which section introduces the concept of 'amor fati'?", "back": "GS 276."}, {"front": "Which section of 'The Gay Science' introduces the concept of 'eternal recurrence'?", "back": "GS 341."}, {"front": "Who wrote the 1950 book that rescued Nietzsche from Nazi appropriation?", "back": "Walter Kaufmann."}, {"front": "Walter Kaufmann's scholarship emphasizes Nietzsche's role as a _____ rather than a ranting prophet.", "back": "Psychologist"}, {"front": "Which scholar wrote 'Nietzsche: Life as Literature' (1985)?", "back": "Alexander Nehamas."}, {"front": "What is the central insight of Alexander Nehamas regarding Nietzsche's philosophy?", "back": "It is a unified project of self-creation where life is transformed into art."}, {"front": "Which author wrote the philosophical biography that weaves Nietzsche’s ideas with his personal experiences?", "back": "Rüdiger Safranski."}, {"front": "Maudemarie Clark's book 'Nietzsche on Truth and Philosophy' focuses on which philosophical field?", "back": "Epistemology."}, {"front": "Which scholar is recommended for an analytical reconstruction of Nietzsche's arguments on perspectivism?", "back": "Maudemarie Clark."}, {"front": "According to the source, whose translations are considered the standard English editions for sustained engagement?", "back": "Walter Kaufmann."}, {"front": "Which series is recommended for reliable and affordable Nietzsche translations?", "back": "Penguin Classics (translated by R. J. Hollingdale)."}, {"front": "Whose public domain translation of 'The Antichrist' is praised for its 'energy' despite inaccuracies?", "back": "H. L. Mencken."}, {"front": "What is the primary drawback of public domain translations by Zimmern or Samuel?", "back": "They are often dated."}, {"front": "Nietzsche describes the 'art of exposition' as requiring the ability to read like which animal?", "back": "A cow."}, {"front": "What specific term does Nietzsche use for the slow, repetitive style of reading he demands?", "back": "Rumination."}, {"front": "In 'Ecce Homo', Nietzsche famously claims, 'I am no man, I am _____.'", "back": "Dynamite"}, {"front": "Which Nietzschean work covers Socrates, reason, and the transvaluation of values in barely a hundred pages?", "back": "Twilight of the Idols."}, {"front": "The concept of 'amor fati' is translated as the love of _____.", "back": "Fate"}, {"front": "Which secondary source is described as reading 'like a novel about ideas'?", "back": "Nietzsche: A Philosophical Biography (by Rüdiger Safranski)."}, {"front": "How does Walter Kaufmann's portrayal of Nietzsche differ from previous interpretations?", "back": "He presents Nietzsche as a rigorous thinker rather than a prophet."}, {"front": "In the context of Nietzsche’s reading philosophy, what must happen after an aphorism is 'read'?", "back": "It must be expounded or deciphered through rumination."}, {"front": "Term: The Gay Science", "back": "Definition: A work emphasizing philosophy as joyful wisdom, covering art, solitude, and the nature of knowledge."}, {"front": "In 'Twilight of the Idols', what does Nietzsche find inside most philosophical 'idols'?", "back": "Nothing (they are hollow)."}, {"front": "Which work was written during the same burst of productivity as 'The Antichrist'?", "back": "Ecce Homo."}, {"front": "According to the source, why is 'Thus Spoke Zarathustra' considered difficult to read?", "back": "It veers between the sublime and the ridiculous in an oracular style."}, {"front": "Which secondary source offers a 'philosophically sophisticated' but 'accessibly written' alternative to system-building approaches?", "back": "Alexander Nehamas (Life as Literature)."}, {"front": "What was the primary goal of the 'Cambridge Texts' series regarding Nietzsche?", "back": "To provide scholarly editions with excellent introductions."}, {"front": "What does the title 'Ecce Homo' translate to in the context of Nietzsche's self-mythologizing?", "back": "Behold the man."}, {"front": "Nietzsche contrasts the 'gay science' with which traditional approach to philosophy?", "back": "Knowledge as a 'grim duty'."}, {"front": "Who wrote 'Nietzsche: Philosopher, Psychologist, Antichrist'?", "back": "Walter Kaufmann."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
